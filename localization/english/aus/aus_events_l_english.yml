l_english:
    #March on Budapest
    joi_flavor_aus.1.t: "March on Budapest"
    joi_flavor_aus.1.d: "The armies of [ROOT.GetCountry.GetName] have entered the Hungarian capital of Budapest, provoking fierce resistance from the Hungarian nobility."
    joi_flavor_aus.1.f: "\"It is God-given that we hold the right to rule over our peasants and estates! Even the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] cannot strip us of these privileges!\"\n\n\"Nonsense! The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is your liege lord and sovereign. God has entrusted [ROOT.GetCountry.GetRuler.GetHerHim] with authority over you; how could [ROOT.GetCountry.GetRuler.GetSheHe] not revoke your privileges?\"\n\n\"Though [ROOT.GetCountry.GetRuler.GetSheHe] is our sovereign, ancient traditions cannot simply be swept aside. If [ROOT.GetCountry.GetRuler.GetSheHe] persists, we must renounce our oaths of loyalty and pray that God will forgive us.\""
    joi_flavor_aus.1.a: "Crush them utterly!"

    #National Compromise
    joi_flavor_aus.2.t: "A National Solution"
    joi_flavor_aus.2.d: "Following consultations between [ROOT.GetCountry.GetName] and representatives of the [SCOPE.sCulture('hungarian_culture').GetName], [SCOPE.sCulture('czech_culture').GetName], and [SCOPE.sCulture('north_italian_culture').GetName] peoples, the Imperial Court has decided to abolish long-standing discriminatory laws within the Empire."
    joi_flavor_aus.2.f: "As nationalist sentiments grow stronger, the Imperial Court now recognizes the importance of unity and equality among its diverse peoples. Today, a powerful minister from a key Interest Group has thrown [ROOT.GetCountry.GetRuler.GetHerHis] support behind reform, even at the cost of alienating some entrenched elites.\n\nThis marks a bold step forward: no longer confined to a narrow German identity, the Empire now aspires to embrace universal principles and build a realm where all subjects may stand as equals.\n\nThis is a moment of historic progress!"
    joi_flavor_aus.2.a: "It is the sacred duty of government to ensure fairness and justice."

    #Dual Monarchy
    joi_flavor_aus.3.t: "The Austro-Hungarian Compromise"
    joi_flavor_aus.3.d: "We have reached an agreement with the [SCOPE.sCulture('hungarian_culture').GetName] people; after centuries of unequal rule, Hungary will now stand as an equal partner within Austria-Hungary."
    joi_flavor_aus.3.f: "So long as [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] rules with wisdom, [ROOT.GetCountry.GetRuler.GetSheHe] will see that this compromise serves both Austria and Hungary well. Austria gains the loyalty of Hungary's elite, while those elites, satisfied with their place at court, will faithfully serve the Empire."
    joi_flavor_aus.3.a: "We must accept this compromise."

    #Hungarian Provincialization
    joi_flavor_aus.4.t: "Hungary Made a Province"
    joi_flavor_aus.4.d: "Today, under the divine authority of His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], Hungary's regional autonomy has been revoked, marking the beginning of true unity within Cisleithania."
    joi_flavor_aus.4.f: "We have crushed Hungarian separatism and reclaimed the Crown of Saint Stephen. With provincialization underway, we now face a crucial decision: should Hungary retain its distinct identity within a federal structure, or shall we forge ahead with the vision of a unified 'Greater Austria'?\n\nOn one side lies stability and prosperity; on the other, the promise of an indivisible, centralized Empire."
    joi_flavor_aus.4.a: "Hungary is an equal part of the Empire."
    joi_flavor_aus.4.b: "There are no Hungarians, only Greater Austrians!"

    #End of Noble Rule
    joi_flavor_aus.5.t: "The End of Noble Rule"
    joi_flavor_aus.5.d: "The centuries-old privileges of the Hungarian nobility have been abolished by the court in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], excising a malignant growth that plagued the Empire for generations."
    joi_flavor_aus.5.f: "With noble dominance finally broken, debate now rages over what to do with the remaining Magyar aristocracy. Should their titles be revoked entirely to deter further rebellion, or preserved to soothe tensions and ensure their cooperation in local governance?\n\nThe choice we make will define the balance between Imperial authority and regional appeasement."
    joi_flavor_aus.5.a: "Strip them of all privileges!"
    joi_flavor_aus.5.b: "Preserve their titles to maintain stability."

    #Hungary Submits
    joi_flavor_aus.6.t: "Hungary Submits"
    joi_flavor_aus.6.d: "Facing the relentless advance of [ROOT.GetCountry.GetName]'s armies, Hungarian separatism has collapsed. Budapest, the Magyar stronghold, has once again fallen under Imperial control."
    joi_flavor_aus.6.f: "\"Even as pleas for mercy echoed through the town hall, Budapest rose in defiance. Though our so-called government abandoned the artillery in Szeged, refused arms offered by Turkey and others, and groveled in submission, none of this could silence Budapest’s growing fury.\nAt last, the government was forced to arm the city and feign solidarity with its people, lest it be swept aside entirely.\""
    joi_flavor_aus.6.a: "They had no choice but to kneel."

    #Bohemia Provincialized
    joi_flavor_aus.7.t: "Bohemia Made a Province"
    joi_flavor_aus.7.d: "Today, His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has revoked Bohemia's autonomy, marking the full unification of the Czech lands within the Empire."
    joi_flavor_aus.7.f: "As reform continues, Prague’s unrest has subsided, replaced by stability. Yet we must decide: shall Bohemia retain its distinct identity, or be subsumed into a vision of a unified Greater Austria?"
    joi_flavor_aus.7.a: "Bohemia is an equal part of the Empire."
    joi_flavor_aus.7.b: "There are no Czechs, only Greater Austrians!"

    #Galicia Provincialized
    joi_flavor_aus.8.t: "Galicia Made a Province"
    joi_flavor_aus.8.d: "Today, His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has revoked Galicia and Lodomeria's autonomy, binding Austrian Poland fully into the Empire."
    joi_flavor_aus.8.f: "Galicia is no longer merely a fragment torn from Poland, but a province firmly under Imperial authority. Shall we recognize the identities of Poles and Ukrainians, or enforce an indivisible Austrian nation?"
    joi_flavor_aus.8.a: "Galicia is an equal part of the Empire."
    joi_flavor_aus.8.b: "There are no Poles, only Greater Austrians!"

    #Illyria Provincialized
    joi_flavor_aus.9.t: "Illyria Made a Province"
    joi_flavor_aus.9.d: "Today, His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has revoked Illyria’s autonomy, cementing Imperial rule over the Balkans."
    joi_flavor_aus.9.f: "Once a crown land of the Empire, Illyria is now firmly under direct administration. Shall we embrace the South Slavs as equals, or insist upon a singular Austrian identity?"
    joi_flavor_aus.9.a: "Illyria is an equal part of the Empire."
    joi_flavor_aus.9.b: "There are no Balkan peoples, only Greater Austrians!"

    #Lombardy Provincialized
    joi_flavor_aus.10.t: "Lombardy Made a Province"
    joi_flavor_aus.10.d: "Today, His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has revoked Lombardy’s autonomy, reclaiming the Iron Crown for its rightful sovereign."
    joi_flavor_aus.10.f: "Though Lombardy has always been tied to Italy, it is now unquestionably a province of [ROOT.GetCountry.GetName]. Shall we recognize Italian identity, or subsume it beneath a singular Austrian nation?"
    joi_flavor_aus.10.a: "Lombardy is an equal part of the Empire."
    joi_flavor_aus.10.b: "There are no Italians, only Greater Austrians!"

    #Veneto Provincialized
    joi_flavor_aus.11.t: "Veneto Made a Province"
    joi_flavor_aus.11.d: "Today, His Imperial Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] has dissolved Venice’s ancient council, bringing the former Serenissima under direct Imperial rule."
    joi_flavor_aus.11.f: "Veneto, once the domain of the wealthy but decadent Republic of Venice, has long been under Imperial dominion. Shall we affirm Venetian equality, or proclaim it eternally Austrian soil?"
    joi_flavor_aus.11.a: "Veneto is an equal part of the Empire."
    joi_flavor_aus.11.b: "The City of Saint Mark has always been ours by right!"

    # Federalization of the Austrian Empire
    joi_flavor_aus.12.t: "The First Federal Parliament"
    joi_flavor_aus.12.d: "With the completion of imperial centralization and the remolding of the Empire, the federalization process to listen to opinions from across [ROOT.GetCountry.GetName] has begun; representatives from all over the Empire have arrived in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], formed a parliament, jointly sang the Austrian Empire’s national anthem, and began discussions on the constitutional matters of federalization."
    joi_flavor_aus.12.f: "\"#bold God bless our Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], our good Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nA great ruler, a great sage, standing tall in divine radiance!\nMay laurel branches grow for him, becoming glorious wreaths, forever his!\n\n#bold God bless our Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], our good Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nUpon fertile lands, his power knows no bounds.\nUnder his banner, march forth to victory and bounty!\nHis throne is noble, just, and worthy;\nOn his shield’s coat of arms, justice shines bright!\n\n#bold God bless our Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], our good Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nMay he gladly receive the wishes of his homeland and people!\nMay he see the people united as one, bound above all by loyalty!\nMay he even in his grave hear the praises\nof descendants gathered around his tomb!\n\n#bold God bless our Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting], our good Emperor [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\""
    joi_flavor_aus.12.a: "God bless our Emperor [ROOT.GetCountry.GetRuler.GetFirstName]!"

    # Winds of Liberalism Event
    joi_flavor_aus.13.t: "Radicals Surround [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
    joi_flavor_aus.13.d: "The tide of radical revolution has engulfed all of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], where frenzied revolutionaries have openly rioted and occupied the palace. His Majesty [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] was forced to flee the capital, yet the Prime Minister and the army outside the city remain inactive."
    joi_flavor_aus.13.f: "\"The Emperor and his court fled [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] for Innsbruck as early as May 16; here are crowds of fervent young men, whose loyalty to the crown reignited at the threat of enemy invasion; some urged the Emperor to review the National Guard, and courtiers and generals fawned over these armed citizens. Proudly acknowledged as the decisive force of the nation, these citizens grew ever more arrogant.\"\n\n\"Outside the city stands the reorganized [ROOT.GetCountry.GetName] army, sixty to seventy thousand strong, well-armed and well-organized. Though poorly commanded, they still have commanders. Inside the city, however, chaos and disarray reign amid class conflict; the parliament is powerless, debating petty theories even as flames reach their rooftops. The leadership committee lacks spirit and resolve; and with the enemy within cannon range of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], the palace-occupying revolutionaries soon fell into confusion.\""
    joi_flavor_aus.13.a: "The Prime Minister can put on women’s clothes and escape [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] first!"
    joi_flavor_aus.13.b: "Order the city garrison to strike immediately and slaughter all rebels!"

    joi_flavor_aus.14.t: "The Pillersdorf Constitution"
    joi_flavor_aus.14.d: "Amidst the fervent radical wave, scholars and citizens of [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] jointly drafted a constitution in the Emperor’s name calling for reform of censorship laws and the implementation of liberalization, petitioning the imperial government to adopt it."
    joi_flavor_aus.14.f: "\"I, [ROOT.GetCountry.GetRuler.GetFirstName], Emperor of Austria by the grace of God, firmly believe that state institutions must follow the progress of our people's culture and intellect. Recognizing that under the blessings of long peace, our entrusted people have not fallen behind, we have pledged them a constitution through petition.\n\nRelinquishing our sacred word is enough to calm our hearts, repaying the loyal devotion of our beloved people by solemnly expressing our concern for their welfare and legal status, granting them the right to participate in governing the affairs of [ROOT.GetCountry.GetName]. Considering this, upon the advice of our ministers and careful review, we have resolved to issue the attached constitutional document, placing it under the joint protection of all peoples of our Empire. Firmly trusting in the bond between crown and people, and the centuries-old union of monarchies for common good, we proclaim this constitution.\n\nTherefore, we decree: the articles contained in this constitutional document shall, without exception, be sacred and inviolable principles for all our subjects and for all spiritual, civil, and military authorities.\""
    joi_flavor_aus.14.a: "We can do nothing about it."
    joi_flavor_aus.14.b: "Reject the insolent demands of the rabble!"

    joi_flavor_aus.15.t: "The Hungarian Rebellion!"
    joi_flavor_aus.15.d: "Hungarian intellectuals and the bourgeoisie, influenced by radicalism, have surged with the fervor of independence. Just yesterday, Kossuth, proclaimed leader of Hungarian independence, declared Hungary's independence from [ROOT.GetCountry.GetName]."
    joi_flavor_aus.15.f: "\"We, the National Assembly representing the Hungarian nation, by this solemn declaration, restore Hungary and all its lands and provinces to their inalienable natural rights, placing them among the independent states of Europe, and proclaim before God and the world the deposition of the insolent House of Habsburg.\n\nWe affirm our moral duty to state our reasons plainly, so that all civilized nations understand that Hungary is driven not by overconfidence or revolutionary zeal, but by persecution, exhausted patience, and the instinct of self-preservation.\""
    joi_flavor_aus.15.a: "Absolute nonsense."

    # Federal Parliament
    joi_flavor_aus.16.t: "Establishment of the Federal Parliament"
    joi_flavor_aus.16.d: "Composed of delegates from all lands and peoples of the Empire, the [ROOT.GetCountry.GetName] Parliament today issued a constitutional resolution, announcing under the authority of His Majesty [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] the establishment of the Federal Parliament as a permanent institution representing the Empire."
    joi_flavor_aus.16.f: "\"All peoples of the Empire enjoy equal rights, each with the inviolable right to preserve and use its own language. The Federation recognizes the equality of all customary languages in schools, offices, and public life. In multi-ethnic regions, public and educational institutions shall, beyond necessary German instruction, ensure every ethnicity can educate in its own language.\"\n\n\"No member state of the Federation may maintain separate tariffs, armies, or diplomatic ties with foreign nations. Each member state's territory shall establish regional parliaments retaining legislative powers granted by the constitution in civil law. Administration is to be conducted by officials elected under federal supervision and submitted for imperial assent to His Majesty [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] and his lawful heirs.\"\n\n\"The Federal Parliament’s resolutions and laws hold ultimate legislative authority throughout the Empire. Any local laws conflicting with federal legislation are void. The Parliament holds the power of regular financial accounting, determining representative quotas, and approving joint expenditures; member states must arrange finances in accordance with its decisions.\""
    joi_flavor_aus.16.a: "United we stand, we shall never be defeated!"

    # Imperial Dissolution
    joi_flavor_aus.17.t: "The End of the Empire"
    joi_flavor_aus.17.d: "With the abolition of [GetLawType('law_monarchy').GetName] in [ROOT.GetCountry.GetName], former crown lands have declared their secession from the illegitimate non-monarchical government."
    joi_flavor_aus.17.f: "With the fall of the crown, the new republic ultimately lacked legitimate authority and failed to rally the people amidst the scattered turmoil. The [ROOT.GetCountry.GetName] government has lost control of its territories; aside from Austria proper and Slovenia still loyal to [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], all regions have renounced their oaths of allegiance and declared the illegality of the current non-monarchical regime.\nFormer lands of the Emperor’s crown have declared independence and seceded from [ROOT.GetCountry.GetName], while Bukovina has been seized. A truly sorrowful day."
    joi_flavor_aus.17.a: "How pitiful... yet we are powerless!"

    # Character Flavor
    joi_flavor_aus.18.t: "The Funeral of Archduke Charles"
    joi_flavor_aus.18.d: "Archduke Charles, the most renowned marshal of the Napoleonic Wars era, passed away yesterday in Vienna. [ROOT.GetCountry.GetName] held a state funeral for this hero, where [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] personally attended and gave a brief speech honoring the great commander."
    joi_flavor_aus.18.f: "\"When I appointed my imperial brother as Commander-in-Chief of the Army, I could not have imagined that he would so nobly and movingly embody the sacred force of driving work toward its goal. With #bold heroic and unyielding spirit#!, he bore the misfortunes that befell him and, in moments decisive for victory and defeat, with humility suited to our age, became the conqueror of the world’s conqueror!\n\nHere I present a painting: Charles astride his white horse, shining like a victorious angel at Aspern, leading his staff across the battlefield. That morning, as our army’s center wavered and Napoleon ordered his cavalry to break through, it was Charles who seized the banner of the Imperial Royal Line Infantry Regiment’s 1st Battalion, advancing toward the enemy’s blasted line, #bold rallying our embattled imperial forces#! and leading them forward once more, #bold thereby defeating Bonaparte and securing victory!#!\n\nTo the heroic leader of Austria’s army! To the tireless warrior for German honor! #bold His fame will never fade; may maidens and laurels crown him—oh Laurentius, our unconquerable victor!#!\""
    joi_flavor_aus.18.a: "Let us offer our highest honors to this great commander!"

    joi_flavor_aus.19.t: "Sisi of Bavaria"
    joi_flavor_aus.19.d: "An unexpected vacation led young [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] to meet Princess Elisabeth of Bavaria. The emperor, smitten with her, has demanded the court arrange a betrothal between himself and the princess."
    joi_flavor_aus.19.f: "\"Elisabeth is the second daughter of Duke Maximilian of Bavaria and Princess Ludovika of Bavaria: carefree, impulsive, and fond of nature, she shunned courtly etiquette and often skipped lessons to ride in the countryside. This year, she left Bavaria’s Possenhofen Castle to vacation in Bad Ischl in [ROOT.GetCountry.GetName], where she met [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]. The emperor, seemingly unaware she was his cousin, invited her to hunt in the Alps that afternoon. They met in the mountains as planned, conversed, and became acquainted. Enchanted by her, the emperor petitioned Empress Dowager Sophie to help arrange his engagement to Sisi.\""
    joi_flavor_aus.19.a: "She should be free to remain in her homeland."
    joi_flavor_aus.19.b: "She shall become Empress of the Empire."
    
    # Flood and Reconstruction
    joi_flavor_aus.20.t: "The Great Flood of Pest!"
    joi_flavor_aus.20.d: "In the spring of 1838, due to the increased snowmelt from the previous winter and a significant rise in spring rainfall, the water levels of the Danube River surged dramatically, eventually breaching the dikes between Buda and Pest. The floodwaters rapidly inundated the city of Pest, with continuous disasters nearly destroying the entire city."
    joi_flavor_aus.20.f: "\"Evacuate? Where to, Vienna? We're about to lose even our underwear to the water! I tell you, within an hour this whole street will become a branch of the Danube. Do you want to drown or climb onto the roof and wait for God to take you?\"\n\n\"Don't just scream, grab that chest—yes, the one with the silver shields and gold bars. Only take what's valuable, you fool, not the portraits of courtesans! We need to get out while we can still wade through the water: when this flood is over, all that will be left of Pest is mud and rats.\""
    joi_flavor_aus.20.a: "Oh, God!"
    
    joi_flavor_aus.21.t: "Rebuilding Budapest"
    joi_flavor_aus.21.d: "The flood of spring 1838 has ended, and officials from [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] have arrived in Pest as ordered. [SCOPE.sCharacter('pest_rebuild_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pest_rebuild_general_scope').GetLastName] has also led troops to take over the city and is about to announce the decree from [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
    joi_flavor_aus.21.f: "Officials of [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], dressed in dark suits and gold-epauletted uniforms, slowly stepped onto the mud-soaked square on the western bank of Pest. Several military engineers were setting up measuring instruments and stakes. The mud revealed the tilted spires of churches and broken beams, while apprentices in casual dress and veterans were clearing the streets hollowed out by the river water.\n\n[SCOPE.sCharacter('pest_rebuild_general_scope').GetFullNameNoFormatting] stood before the ruined wall of the former town hall, the mud soaking [SCOPE.sCharacter('pest_rebuild_general_scope').GetHerHis] boots as [SCOPE.sCharacter('pest_rebuild_general_scope').GetHerHis] watched the surveyors with their blueprints. \"Yes, Your Majesty,\" [SCOPE.sCharacter('pest_rebuild_general_scope').GetHerHis] said softly, \"I know what I need to do.\""
    joi_flavor_aus.21.a: "The invisible hand of the market will fix itself!"
    joi_flavor_aus.21.b: "Let us reshape civilization along the Danube."
