l_english:
    # The Constitutional Question of the Empire
    joi_flavor_ger.1.t: "The Constitutional Question of the Empire"
    joi_flavor_ger.1.d: "With the unification of [ROOT.GetCountry.GetName] comes the fundamental question of the new state's basic law: its constitution."
    joi_flavor_ger.1.f: "The first Imperial Diet has convened in the capital, dedicated to debating the political system of our great nation, the powers of its constituent states, and the balance between the monarch and parliament. Three proposals are under discussion:\n\n1. #bold Adopt the old imperial constitution#!: Under this system, power in [ROOT.GetCountry.GetName] would be centralized in a single imperial cabinet, with ministers appointed by the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] upon recommendation. Elections and a parliament would be abolished. While most delegates oppose this autocratic measure, a small faction supports its strong-handed approach.\n\n2. #bold Adopt Bismarck's proposed constitution#!: This system would establish the #boldBundesrat#! as the upper house, with weighted votes favoring Prussia and other major German states. A #boldReichstag#! of 382 members would be elected by eligible citizens, serving as representatives of the people with parliamentary immunity. Laws passed by the Reichstag would require Bundesrat approval. Though popular among conservatives, liberals decry its limited suffrage and monarchical dominance.\n\n3. #bold Adopt the liberals' draft constitution#!: This would establish a Bundesrat with votes proportional to population and a fully empowered Reichstag of 382 members, free from the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]'s direct control. While supported by bourgeois elites, it faces fierce opposition from conservatives.\n\nThe vote hangs in the balance—#bold a nudge from the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] could tip the scales.#!"
    joi_flavor_ger.1.a: "Divine right shall not be constrained!"
    joi_flavor_ger.1.b: "Bismarck's compromise satisfies both sides."
    joi_flavor_ger.1.c: "Long live liberty!"

    # German Foreign Policy
    joi_flavor_ger.2.t: "Germany's Foreign Policy"
    joi_flavor_ger.2.d: "As [ROOT.GetCountry.GetName] emerges on the European stage, the old powers watch our next move with suspicion..."
    joi_flavor_ger.2.f: "For centuries, 'Germany' existed only as a fractured concept. Since Wallenstein's ambitions crumbled, every attempt at unification—or revival of the Holy Roman Empire—was thwarted by France, Britain, the Netherlands, Sweden, and Russia. Yet Napoleon's destruction of the Empire in 1806 paradoxically planted the seeds of unity.\n\nPrussia's reforms after Jena in 1806 and victory in 1815 laid the groundwork. Now, [ROOT.GetCountry.GetName] rises like a colossus—but shadows loom. The Chancellor warns the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] that [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('RUS_scope').GetName] may ally with [SCOPE.sCountry('FRA_scope').GetName] to crush this new 'German power center.' He paints a nightmare: Slav and Roman united against the Germanic heartland. His advice? Prioritize continental diplomacy over overseas ambitions.\n\nIndustrialists vehemently disagree, arguing that only colonial expansion can secure Germany's place through a balance of power.\n\nThe Reichstag is deadlocked—#bold a word from the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] could decide our course.#!"
    joi_flavor_ger.2.a: "Europe first!"
    joi_flavor_ger.2.b: "To the colonies!"

    # The Permanent Reichstag
    joi_flavor_ger.3.t: "The Reichstag Institutionalized"
    joi_flavor_ger.3.d: "With the new constitution enacted, the Reichstag now sits permanently in the capital, fulfilling its constitutional mandate."
    joi_flavor_ger.3.f: "Article II: Imperial law supersedes state law...\nArticle IV: The Empire holds authority over:\n1. Freedom of movement, citizenship, passports, and policing of foreigners;\n2. Customs, trade, and taxation;\n3. Weights, measures, and currency;\n4. Consular services and maritime trade;\n5. Railways;\n6. Postal and telegraph services;\n7. Uniform civil/criminal codes;\n8. Army and navy...\nArticle V: Laws require #bold the Reichstag's majority consent.#"
    joi_flavor_ger.3.a: "Long live the Empire!"
    ger_event_2_1_tt: "Reichstag elections commence."

    # Imperial Colonial Office
    joi_flavor_ger.4.t: "The Imperial Colonial Office"
    joi_flavor_ger.4.d: "With [ROOT.GetCountry.GetName]'s overseas expansion, a new high authority is born: the German Colonial Office, named by [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] himself."
    joi_flavor_ger.4.f: "Once, we could only envy [SCOPE.sCountry('GBR_scope').GetName] and [SCOPE.sCountry('FRA_scope').GetName]'s colonial empires. Now, our strength sustains a greater one: rubber from Kamerun and Togoland, ores from Southwest Africa, coffee from East Africa, dyes from Asia, and banana plantations stretching from Guinea to the Pacific. [ROOT.GetCountry.GetName] stands as a true colonial power!"
    joi_flavor_ger.4.a: "Deutschland über alles!"

    # West Africa
    joi_flavor_ger.5.t: "Governorate of West Africa"
    joi_flavor_ger.5.d: "With [ROOT.GetCountry.GetName]'s conquest of Kamerun and Togoland, a new governorate is established."
    joi_flavor_ger.5.f: "\"General, your campaign in Kamerun—what insights can you share?\"\n\"Heat. Dust. Our men faltered under the sun, while the natives thrived. We lacked water, food... and the insects! No German would willingly endure such hell.\"\n\"Then how shall we rule it?\"\n\"Minimal presence. A few officials with whips to command native labor—no need to waste good Germans there.\""
    joi_flavor_ger.5.a: "Deutschland über alles!"

    # Southwest Africa
    joi_flavor_ger.6.t: "Governorate of Southwest Africa"
    joi_flavor_ger.6.d: "The conquest of Namibia brings a new governorate under [ROOT.GetCountry.GetName]'s rule."
    joi_flavor_ger.6.f: "\"Sir, you’re investing in that Namibian wasteland?\"\n\"As Governor! Investors clamor for land—geologists swear there’s ore, even gold!\"\n\"You’d trade Berlin’s comforts for that?\"\n\"Hah! A brief tour suffices. Let the natives and bureaucrats toil. I’ll collect my salary from afar!\""
    joi_flavor_ger.6.a: "Deutschland über alles!"

    # East Africa
    joi_flavor_ger.7.t: "Governorate of East Africa"
    joi_flavor_ger.7.d: "Tanzania's conquest establishes a new governorate under [ROOT.GetCountry.GetName]."
    joi_flavor_ger.7.f: "I solemnly swear loyalty to [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName], to uphold imperial law, defend German citizens' rights, ensure stability, and serve [ROOT.GetCountry.GetName] with honor!"
    joi_flavor_ger.7.a: "Deutschland über alles!"

    # New Guinea
    joi_flavor_ger.8.t: "German Port in New Guinea"
    joi_flavor_ger.8.d: "With Pacific conquests, [ROOT.GetCountry.GetName] builds naval bases to project power."
    joi_flavor_ger.8.f: "Port Moresby becomes the hub of the German Pacific Squadron, safeguarding trade routes to Australia and the Americas. Banana plantations flourish, exporting Dessertbananen to delighted Germans at home."
    joi_flavor_ger.8.a: "Dessertbananen for all!"

    # German East Asia
    joi_flavor_ger.9.t: "Governor of German East Asia"
    joi_flavor_ger.9.d: "As Indochina and Malaya fall to [ROOT.GetCountry.GetName], the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] appoints a victorious general as Governor."
    joi_flavor_ger.9.f: "The Ostasien administration in Singapore coordinates these disparate colonies—naval bases, plantations, and trading posts—under the Navy Office. It is less a bureaucracy than a patchwork of compromises between local elites and imperial ambition."
    joi_flavor_ger.9.a: "Hail this knight of the Reich!"

    # Silesian Textile Workers' Petition
    joi_flavor_ger.10.t: "The Silesian Weavers' Petition"
    joi_flavor_ger.10.d: "Silesia's industrial expansion brings social unrest as textile workers, organized by their union, strike for higher wages."
    joi_flavor_ger.10.f: "\"I shall lead my people to prosperity. Those who aid me shall be rewarded; those who oppose me, crushed. Power is ours. Our future lies upon the waters—our fleet shall make the world revere [ROOT.GetCountry.GetName]'s flag. We received too little when the world was divided... this shall be remedied.\"\n\n\"German industry can provide the steel plate and cannon we require.\"\n\n\"Excellent, Minister. But we need workers to achieve this. Some concessions must be made: restrict child labor, guarantee Sunday rest... perhaps even raise wages slightly.\"\n\n\"Raise wages?! We'd lose all competitiveness, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!\"\n\n\"I propose an international conference of governments to standardize labor conditions...\"\n\n\"A brilliant notion, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. The Empire is fortunate.\"\n\n\"Divide et impera—we tested this in Essen. Split the workers' ranks, appease some, crush the rest.\"\n\n\"You understand me well, Krupp. Summon the Staatsrat.\""
    joi_flavor_ger.10.a: "Divide the workers—offer concessions to some, punish the rest. Superb!"
    joi_flavor_ger.10.b: "Higher wages? Sundays off? Who funds this sedition? Fifty thousand francs or pounds?!"

    # Bavarian Locomotive Works
    joi_flavor_ger.11.t: "The Bavarian Locomotive Works"
    joi_flavor_ger.11.d: "Bavaria's industrialization births a new engine manufacturer, now its greatest industrial titan."
    joi_flavor_ger.11.f: "\"This factory is unlike any other.\"\n\"How so?\"\n\"Where Bavarian workshops have listless workers like plucked chickens, here they labor with vigor! Their locomotives surpass even American models—no more breakdowns, no more deafening noise. They include spare parts for repairs, saving us fortunes!\""
    joi_flavor_ger.11.a: "A triumph of German engineering!"

    # German Naval Supremacy
    joi_flavor_ger.12.t: "Germany Rules the Waves"
    joi_flavor_ger.12.d: "The High Seas Fleet now surpasses even [SCOPE.sCountry('GBR_scope').GetName]'s Royal Navy—the masters of the seas must bow before our might."
    joi_flavor_ger.12.f: "\"My passion for the navy stems from my English ancestry. As a boy, I admired British ships; now we build better ones! Our policy is clear: German commerce and interests demand naval supremacy. Officers agree—no fleet rivals ours.\""
    joi_flavor_ger.12.a: "The seas belong to Germany!"

    # German-Austrian Alliance
    joi_flavor_ger.13.t: "A German-Austrian Alliance?"
    joi_flavor_ger.13.d: "[SCOPE.sCountry('GER_scope').GetName]'s foreign minister secretly proposes an alliance, claiming mutual benefit."
    joi_flavor_ger.13.f: "Our northern cousins have seized continental hegemony from France—their industry booms, their armies terrify Europe. After losing leadership of the German states, we turned to the Balkans, but [SCOPE.sCountry('RUS_scope').GetName] and Italy now tear at our fragile empire. Germany's offer could revive our industry, reform our military, and deter enemies... but binding ourselves to their reckless ambitions may drag us into a war we cannot survive."
    joi_flavor_ger.13.a: "Let them keep their distance!"
    joi_flavor_ger.13.b: "The Blue Danube and Green Rhine united!"

    # German-Italian Alliance
    joi_flavor_ger.14.t: "A German-Italian Alliance?"
    joi_flavor_ger.14.d: "[SCOPE.sCountry('GER_scope').GetName]'s envoy secretly proposes a defensive pact in Rome."
    joi_flavor_ger.14.f: "Article I: Mutual peace and consultation on political/economic matters.\nArticle II: Full military aid if [SCOPE.sCountry('FRA_scope').GetName] attacks either party unprovoked.\nArticle III: Benevolent neutrality if a third power threatens one signatory.\nArticle IV: Joint military planning when threatened.\nArticle V: Treaty terms to remain secret.\n(Ratification required within three weeks.)"
    joi_flavor_ger.14.a: "We need no Teutonic help!"
    joi_flavor_ger.14.b: "Our alliance shall be ironclad!"

    # Silesian Weavers' Uprising (with Heine's poem)
    joi_flavor_ger.15.t: "The Silesian Weavers' Revolt"
    joi_flavor_ger.15.d: "Silesia's brutal industrialization sparks rebellion as textile workers rise against exploitation."
    joi_flavor_ger.15.f: "#bold No tears from their gloomy eyes are flowing,#!\nThey sit at the loom, their white teeth showing:\n\"Germany, we weave your shroud,\nInto it we weave the three-fold curse—\n#bold We weave, we weave!#!\n\n\"One curse upon the God to whom we prayed,\nIn vain did we hope, and in vain did we wait,\nHe only derided and mocked our sad fate—\n#bold We weave, we weave!#!\n\n\"One curse upon the King, the rich man’s King,\nWho takes our last penny away,\nAnd lets us like dogs in the highway be shot—\n#bold We weave, we weave!#!\n\n\"One curse upon this false Fatherland,\nWhere shame and disgrace alone are seen thriving,\nWhere flowers are crushed before they bloom,\nWhere rot and mould hasten the worms’ work—\n#bold We weave, we weave!#!\n\n\"The shuttle flies, the loom creaks loud,\nAssiduously we weave night and day—\nThy shroud, Old Germany, now weave we,\nInto it we weave the three-fold curse—\n#bold We weave, we weave!#!\""
    joi_flavor_ger.15.a: "If you won't work, others will!"
