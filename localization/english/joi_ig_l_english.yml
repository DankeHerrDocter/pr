l_english:
    ideology_inclusiveness: "Universalist"
    ideology_inclusiveness_desc: "#lore Universalism advocates for diversity in religious management and doctrine, promoting dialogue and consensus among different opinions. It embraces various perspectives, cultures, ethnicities, or beliefs with benevolence.#!"

    ideology_bourgeoisie_capitalism: "Capitalist"
    ideology_bourgeoisie_capitalism_desc: "#lore This group staunchly supports the inviolability of private property and believes the government should minimize social intervention, except to maintain the rule of law. Politically, they endorse liberal ideology and seek to establish a limited democratic system.#!"

    ideology_british_capitalism:0 "Capitalist"
    ideology_british_capitalism_desc:0 "#lore This group possesses a long-standing tradition of parliamentary governance, follows the doctrines of David Hume and Adam Smith, firmly upholds the inviolability of private property, and regards the pursuit of individual interest and profit as the key to economic growth.#!"

    ideology_interventionism: "Interventionist"
    ideology_interventionism_desc: "#lore Keynesian economics advocates that governments should adopt contractionary or expansionary economic policies and fiscal deficits to maintain stable economic growth. Appropriate national intervention is seen as crucial for sustained market prosperity.#!"

    ideology_enlightlism: "Enlightened Liberal"
    ideology_enlightlism_desc: "#lore This group upholds liberal ideology, believing that the legitimacy of government should be based on a social contract authorized by citizens and a legal system that is fair and equal for all, aiming to achieve social justice and protect individual freedoms.#!"

    ideology_english_enlightlism: "British Liberal"
    ideology_english_enlightlism_desc: "#lore This group advocates for political reforms such as the expansion of voting rights and social reforms to address poverty and labor conditions. They emphasize a balance between individual freedoms and social responsibility, often supporting state intervention to improve social conditions. British Liberals are pragmatic, focusing on gradual reform within the existing political framework, shaped by the specific historical and social conditions of Victorian Britain, including industrialization, urbanization, and the challenges of governing a global empire.#!"

    ideology_authoritarianism: "Authoritarian"
    ideology_authoritarianism_desc: "#lore This group advocates for a strong bureaucratic government, favoring autocratic or oligarchic rule to ensure absolute political obedience to the social elite.#!"

    ideology_misoneism: "Conservative"
    ideology_misoneism_desc: "#lore This group resists changes to traditional reforms, accepting only very limited institutional improvements to maintain the social hierarchy.#!"

    ideology_expansionism: "Expansionist"
    ideology_expansionism_desc: "#lore This group advocates for seeking broader development space to expand the land and wealth owned by the nation's citizens.#!"

    ideology_imperialism: "Imperialist"
    ideology_imperialism_desc: "#lore Establishes political or military control over other countries to place oneself in a politically and economically advantageous position to seize any possible living space.#!"

    ideology_british_whig_liberalism:0 "Whig Liberal"
    ideology_british_whig_liberalism_desc:0 "#lore British Whig liberalism is founded upon the thought of philosophers such as James Tyrrell and John Locke. It upholds parliamentary sovereignty and constitutional monarchy centred upon the Bill of Rights, emphasises individual liberty, natural rights, and limited government, and seeks to gradually expand civil liberties and representative democracy through incremental reforms conducted in accordance with procedural justice.#!"

    ideology_british_tory_conservatism_old:0 "Tory Conservative"
    ideology_british_tory_conservatism_old_desc:0 "#lore British Tory conservatism is founded upon the thought of philosophers such as Edmund Burke and David Hume. It advocates the preservation of established institutions and traditional principles within a political system of democracy, emphasising the importance of historical experience, customary practice, and inherited wisdom, while supporting social and economic measures intended to benefit the common people within the framework of the traditional order.#!"

    ideology_british_tory_conservatism_reformed:0 "Tory Conservative"
    ideology_british_tory_conservatism_reformed_desc:0 "#lore British Tory conservatism is founded upon the thought of philosophers such as Edmund Burke and David Hume. It advocates the preservation of established institutions and traditional principles within a democratic political framework, emphasising historical experience, customary practice, and inherited wisdom, while endorsing social and economic measures designed to benefit the wider population, ultimately placing upon the elite classes the duty to improve the welfare of the rest of society.#!"

    ideology_tory_patriarchal:0 "Patriarchalist"
    ideology_tory_patriarchal_desc:0 "#lore This group believes that men ought to hold political authority, while women should remain obedient to their fathers and husbands.#!"

    ideology_british_hierarchic:0 "Hierarchist"
    ideology_british_hierarchic_desc:0 "#lore This group supports maintaining the hierarchical structure of society through traditional forms of taxation and labour relations.#!"

    ideology_british_conservatism: "British Conservative"
    ideology_british_conservatism_desc: "#lore British conservative reformers advocate gradual reforms in response to social demands while respecting Britain's glorious traditions and culture. They oppose potential radical threats and uphold the British constitutional monarchy based on the Bill of Rights.#!"

    ideology_revolutionism: "Radical Republican"
    ideology_revolutionism_desc: "#lore This group upholds the radical ideas of the French Revolution and considers itself the true heir of the 1791 revolution. They aim to mobilize the masses to overthrow the authoritarian regime from the bottom up and establish a democratic republic.#!"

    ideology_junker_militarism: "Junker Offiziere"
    ideology_junker_militarism_desc: "#lore This group represents the Prussian Junker military aristocracy, advocating that the state should prioritize military interests and establish an efficient state apparatus to ensure the army adheres to aristocratic discipline and honor.#!"

    ideology_puritan: "Puritan"
    ideology_puritan_desc: "#lore American Puritans, exiled from Britain, seek an egalitarian republican system and advocate their secular work and life as a form of religious devotion and worship.#!"

    ideology_innovationist: "Reformist"
    ideology_innovationist_desc: "#lore Legacy of the Decembrists, influenced by the French Revolution, seeking to modernize Russia through reforms.#!"

    ideology_westernlism: "Self-Strengthening Reformer"
    ideology_westernlism_desc: "#lore Advocates for Western-style reforms under the slogan 'Learn from the Barbarians to Control Them,' introducing advanced Western science and technology to develop Chinese industry while maintaining traditional Chinese institutions.#!"

    ideology_revivalism: "Revivalist"
    ideology_revivalism_desc: "#lore Enthusiastic about Italy's great historical past and attempts to revive a strong Italian nation in this era.#!"

    ideology_tanzimatism: "Tanzimat Reformer"
    ideology_tanzimatism_desc: "#lore This group advocates for institutional reforms to ensure the survival and territorial integrity of the Ottoman Empire, supporting modernization measures known as Tanzimat.#!"

    ideology_shariah: "Sunni Sharia"
    ideology_shariah_desc: "#lore This group advocates for Sharia law, the commandments of Allah, as the legal guide for every aspect of daily life.#!"

    ideology_anti_shogunate: "Anti-Shogunate"
    ideology_anti_shogunate_desc: "#lore This group believes that the rule of Japan should belong solely to the descendants of the Emperor, a descendant of the goddess Amaterasu, and upholds a constitutional monarchy under the Emperor.#!"

    ideology_austria_centraliser: "Centralist"
    ideology_austria_centraliser_desc: "#lore This group seeks to maintain the Austrian Empire as a centralized unitary state.#!"

    ideology_austria_federalist: "Federalist"
    ideology_austria_federalist_desc: "#lore This group aims to reform the Austrian Empire into a federal state with equal autonomy for all ethnic groups.#!"

    ideology_agrarian_russian: "Communalist"
    ideology_agrarian_russian_desc: "#lore This group supports peasants collectively holding land in the form of a commune.#!"

    ideology_progressivism: "Progressivist"
    ideology_progressivism_desc: "#lore American progressives seek to improve the human condition through social reforms based on advances in science, technology, and social organization. They advocate for social progress and positive change, such as the expansion of democracy and increased egalitarianism.#!"

    ideology_protestant_church: "Protestant Church"
    ideology_protestant_church_desc: "#lore Stemming from the Reformation, the national Protestant Church denies the authority of the Roman Curia, believing every believer has the ability to worship God and should interpret the Bible according to their conscience.#!"

    ideology_catholic_church: "Roman Catholic Church"
    ideology_catholic_church_desc: "#lore Catholics believe in the authority of the historic Roman Curia, revere the dignity of the Pope, and interpret the Bible according to the opinions of the cardinals stationed by the Curia in various places.#!"

    ideology_german_nobles: "German Nobility"
    ideology_german_nobles_desc: "#lore The ancient nobles of the German lands, while playing the role of hereditary landowners, have an obligation to serve in the military, making them somewhat inclined to cater to the needs of the army.#!"

    ideology_western_confucian: "Reformist Confucian"
    ideology_western_confucian_desc: "#lore The reform movement changed traditional Confucian scholars' views on politics, seeking pragmatic reforms for the state.#!"

    ideology_catholicisme_social: "Christian Socialist"
    ideology_catholicisme_social_desc: "#lore The social doctrine of the Catholic Church seeks broader care for social distribution injustices according to Christian principles, achieving social justice without altering the class structure.#!"

    ideology_opportunistes: "Moderate Republican"
    ideology_opportunistes_desc: "#lore This group acknowledges the liberal ideas of the French Revolution but opposes overly radical populist agitation. They hope to prevent authoritarianism through parliamentary change and establish a democratic republic within a stable constitutional framework.#!"

    ideology_bonapartiste: "Bonapartist"
    ideology_bonapartiste_desc: "#lore This group wishes to appeal directly to the people and have the government led by a Caesar-like figure authorized by the citizens, centralizing administrative power and actively intervening in social affairs to lead France into a new era of destined strength.#!"

    ideology_us_federalism: "Federalist"
    ideology_us_federalism_desc: "#lore This group staunchly supports the United States Constitution effective since 1789, endorses representative democracy, and upholds the autonomy of the states and the powers lawfully granted to the federal government.#!"

    ideology_patriotism: "Patriot"
    ideology_patriotism_desc: "#lore This group has a deep love and loyalty for their country and its unique way of life, a strong identification with the nation's cultural traditions and values, and a willingness to sacrifice for them.#!"

    ideology_united_states_constitution: "Constitutional Defender"
    ideology_united_states_constitution_desc: "#lore This group staunchly supports the United States Constitution effective since 1789, believing the military has a duty to obey only the President's commands that are in accordance with Congress and the Constitution.#!"

    ideology_militarism: "Militarist"
    ideology_militarism_desc: "#lore This group subscribes to aggressive militarist ideology, believing the state should maintain strong military capabilities to serve the military, whose duty should be to expand national interests at all costs.#!"

    ideology_puritan_ecumenical: "Universal Congregationalism"
    ideology_puritan_ecumenical_desc: "#lore The American Universalist movement sought to mend divisions among Christian churches by embracing diversity in denominations and ethnicities, encouraging cooperation and unity among various groups, and ultimately achieving the ideal of a universal church.#!"

    ideology_protestant_awakening: "Great Awakening"
    ideology_protestant_awakening_desc: "#lore The Great Awakening movement believed that salvation was not limited to personal repentance but also involved efforts to achieve moral renewal in society, bringing grace into public life through institutions and organizations, and ultimately eradicating all forms of sin.#!"

    ideology_ecumenical_anglicanism: "Universal Anglicanism"
    ideology_ecumenical_anglicanism_desc: "#lore The Church of England is recognized as the foremost among the worldwide Anglican Communion, using the Book of Common Prayer as a guide for theology and practice, adhering to traditional sacraments, and advocating for the unity of the Catholic Church and the diversity of religious affairs.#!"

    ideology_british_anglicanism: "Church of England"
    ideology_british_anglicanism_desc: "#lore The Anglican Church in Britain follows traditional sacraments, recognizes the British monarch as the leader of the church, and believes that the truth of the Christian faith comes from the Bible and the ecumenical creeds, and should be understood in combination with tradition, reason, and experience.#!"

    ideology_evangelical_revival: "Evangelicalism"
    ideology_evangelical_revival_desc: "#lore Evangelicalism regards the Bible as the ultimate authority in faith, emphasizes personal conversion, advocates for the purification of personal sin through the propagation of the gospel and social action, and ultimately achieves justification by faith and repentance.#!"

    ideology_indian_farmer_sovereignist:0 "Sovereignist"
    ideology_indian_farmer_sovereignist_desc:0 "#lore This group opposed the repressive measures imposed by the colonial authorities and favored policies of national self-government.#!"

    ideology_ottomanism: "Ottomanist"
    ideology_ottomanism_desc: "#lore This group advocates the abolition of inequalities within the state based on ethnicity and religion, seeking to establish equality before the law for all peoples in order to create a new sense of Ottoman national unity and prevent the Empire from being divided by the religious millet system.#!"

    ideology_salafi: "Salafi"
    ideology_salafi_desc: "#lore This group advocates the restoration of the sacred purity of Islam in accordance with the teachings of the Qur’an and the Hadith, opposing interpretations that go beyond or depart from the scriptures themselves, while emphasising strict adherence to Sharia and loyalty to Islamic rulers as the highest priority.#!"

    ideology_janissary: "Janissary Corps"
    ideology_janissary_desc: "#lore This group seeks to preserve the special privileges and status of the Janissaries, opposing any modernising reforms imposed upon the army by liberal or other foreign influences.#!"

    ideology_economic_statism:0 "Statists"
    ideology_economic_statism_desc:0 "#lore This group believes that a strong, authoritative state inherently possesses political authority without requiring special sources of legitimacy, and advocates that the government should play an important, necessary, and legitimate role in guiding the key aspects of the economy.#!"

    ideology_national_conservatism:0 "National Conservatives"
    ideology_national_conservatism_desc:0 "#lore This group is committed to defending the cultural identity of the nation, supports the preservation of national sovereignty, endorses state intervention and protectionism, and seeks to establish a strong citizen army to safeguard national interests.#!"

    # Character Ideologies
    ideology_westernlism_leader: "Self-Strengthening Reformer"
    ideology_westernlism_leader_desc: "#lore Advocates for Western-style reforms under the slogan 'Learn from the Barbarians to Control Them,' introducing advanced Western science and technology to develop Chinese industry while maintaining traditional Chinese institutions.#!"

    ideology_liberal_bonapartist: "Bonapartist"
    ideology_liberal_bonapartist_desc: "#lore This leader wants the nation to be led by a Bonapartist Emperor authorized by a plebiscite to lead France into a new era of destined strength.#!"

    ideology_kemalism_leader:0 "Turkish Secularist"
    ideology_kemalism_leader_desc:0 "#lore This leader supports establishing the Six Principles—republicanism, populism, secularism, reformism, nationalism, and statism—as the ideological pillars of the Turkish state, and seeks to shape and preserve a secular and free Turkish nation-state in accordance with these principles.#!"

    ideology_gladstonian_liberalism_leader:0 "Gladstonian Liberal"
    ideology_gladstonian_liberalism_leader_desc:0 "#lore Gladstonian liberalism, named after William Ewart Gladstone, advocates limiting government expenditure and reducing taxation while maintaining a balanced budget. It supports free trade, individual free will and choice, opposes government intervention in the economy, and regards liberty as a great moral ideal.#!"

    ideology_reactionism_leader:0 "Reactionary Absolutist"
    ideology_reactionism_leader_desc:0 "#lore This leader upholds traditional Orthodox values in governance, seeking to restore and defend political institutions and social orders considered traditional and autocratic in modern society, and to extend this order to neighbouring states.#!"

    ideology_one_nation_conservatism_leader:0 "One-Nation Conservative"
    ideology_one_nation_conservatism_leader_desc:0 "#lore One-Nation Conservatism, first articulated by Benjamin Disraeli, holds that in a democratic nation the members of society owe duties to one another. The elite classes ought to practise a paternalistic form of aristocratic responsibility, striving to reconcile the interests of all social strata and to share their wealth with the wider community, rather than equating the welfare of society solely with the interests of the elite.#!"

    ideology_imperial_reformer_leader:0 "Imperial Reformer"
    ideology_imperial_reformer_leader_desc:0 "#lore This leader supports wide-ranging social reforms, believing that the state should alleviate social tensions, address poverty, and protect the working classes. Opposing free trade doctrine, they favour protectionist reforms such as tariff systems in order to integrate the British Empire into a unified political entity.#!"

    ideology_polk_jingoist_leader:0 "Polkist Expansionist"
    ideology_polk_jingoist_leader_desc:0 "#lore This character is not only a devoted adherent of Jacksonian Democracy—supporting low tariffs and a restrained federal authority—but also firmly believes that the United States, guided by Providence, is destined to expand from the Atlantic to the Pacific, fulfilling its sacred national mission.#!"