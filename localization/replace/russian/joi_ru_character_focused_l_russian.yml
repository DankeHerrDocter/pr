l_russian:
 acceptance_events.1.t: "Запретная любовь"
 acceptance_events.1.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'узнала', 'узнал')], что [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'её', 'его')] [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'наследница', 'наследник')] [SCOPE.sCharacter('romeo').GetFullName] [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'устроила', 'устроил')] грандиозный переполох, объявив, что любовь всей своей жизни - это человек, представляющий #tooltippable_name #tooltip:[SCOPE.sCulture('juliet').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('juliet').GetCustom('RU_CUL_ADJ')|l]ий#!#! народ."
 acceptance_events.1.f: "#italic Автор считает, что [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'наша суматошная', 'наш суматошный')] [SCOPE.sCharacter('romeo').GetPrimaryRoleTitle] действительно, безнадёжно и бесповоротно [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'влюблена', 'влюблён')]. Конечно, эти новости всколыхнули высший свет - подобные скандалы не оставляют равнодушным никого, но, сдаётся мне, перед #tooltippable_name #tooltip:[SCOPE.sCulture('juliet').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('juliet').GetCustom('RU_CUL_ADJ')|l]им#!#! народом вновь забрезжит лучик надежды.#!\n\n- Представляете? И [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'она', 'он')] даже не [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'подумала', 'подумал')] о приличиях, крича об этом направо и налево!\n- А как же чистота крови?\n- Да! И как же дети? Неужели никто не подумает о наследниках?!\n- Не волнуйтесь. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|U] непременно вмешается."
 acceptance_events.1.a: "[SCOPE.sCharacter('romeo').GetPrimaryRoleTitle] будет действовать так, как [SelectLocalization(SCOPE.sCharacter('romeo').IsFemale, 'ей', 'ему')] подобает."
 acceptance_events.1.b: "К сожалению, предмет этой пылкой страсти попросту бесследно исчез."
 acceptance_events.1.c: "Любовь есть любовь. И да будет так."