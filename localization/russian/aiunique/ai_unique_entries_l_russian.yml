l_russian:
 ai_great_power_buff: "Викторианская эпоха"
 ai_great_power_buff_reason: "Коронация королевы Виктории в 1837 году официально открыла для Британской империи и всего мира Викторианскую эпоху. В ослепительном сиянии «Британского мира» завершилась Первая промышленная революция, принеся с собой небывалый расцвет городов.\n\nНа европейском континенте знаменитый австрийский канцлер Меттерних создал Венскую систему. Пруссия, Россия и Австрия объединились, чтобы стать оплотом старого порядка, сдерживающим революционные потоки.\n\nСтрадания, принесённые Наполеоновскими войнами, закончились, и компромисс великих держав принёс многострадальному европейскому континенту недолгий мир. Однако, хотя пламя революции временно угасло, идеи национализма и либерализма всё ещё живы. В эту эпоху небывалого технического прогресса люди подвергнут сомнению то, во что веками верили их предки, и создадут новые убеждения."
