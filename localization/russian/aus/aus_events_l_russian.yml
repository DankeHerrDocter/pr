l_russian:
  #
 joi_flavor_aus.1.t: "Марш на Будапешт"
 joi_flavor_aus.1.d: "Армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вошла в Будапешт, столицу Венгерского королевства, что вызвало яростное сопротивление венгерского дворянства."
 joi_flavor_aus.1.f: "«Это привилегия, дарованная нам Богом: мы имеем естественное право властвовать над нашими крестьянами и поместьями, и даже [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] не может лишить нас этого права!»\n\n«Что за вздор! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — ваш господин и суверен. Бог наделил [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'её', 'его')] властью управлять вами. Как [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] не может лишить вас привилегий?»\n\n«[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Она', 'Он')], конечно, наш сюзерен, но [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] не вправе покончить с древними традициями. Если [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] будет упорствовать, мы можем лишь освободить себя от присяги на верность. Да простит меня Господь»."
 joi_flavor_aus.1.a: "Уничтожить их!"
  #
 joi_flavor_aus.2.t: "Решение национального вопроса"
 joi_flavor_aus.2.d: "После совещаний с представителями #tooltippable_name #tooltip:[SCOPE.sCulture('hungarian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('hungarian_culture').GetCustom('RU_CUL_ADJ')|l]ого#!#!, #tooltippable_name #tooltip:[SCOPE.sCulture('czech_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('czech_culture').GetCustom('RU_CUL_ADJ')|l]ого#!#! и #tooltippable_name #tooltip:[SCOPE.sCulture('north_italian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('north_italian_culture').GetCustom('RU_CUL_ADJ')|l]ого#!#! народов, имперский двор [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] решил пойти на компромисс и положить конец дискриминационным законам, долгое время существовавшим в империи."
 joi_flavor_aus.2.f: "В условиях растущего национализма императорская семья осознала важность национального единства и равенства и приложила усилия для продвижения реформы.\n\nСегодня, когда один из влиятельных министров поддержал эти преобразования, реформа получила мощный толчок. Несмотря на недовольство некоторых, это решение чрезвычайно полезно для будущего империи, поскольку оно выводит нас за узкие рамки германизма и направляет к всеобщему равенству.\n\nСегодня — день великого прогресса!"
 joi_flavor_aus.2.a: "Священный долг правительства — обеспечить справедливость и правосудие в империи."
  #
 joi_flavor_aus.3.t: "Австро-венгерское соглашение"
 joi_flavor_aus.3.d: "Мы достигли соглашения с #tooltippable_name #tooltip:[SCOPE.sCulture('hungarian_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('hungarian_culture').GetCustom('RU_CUL_ADJ')|l]им#!#! народом. После столетий неравноправного правления они теперь будут играть равную роль в Австро-Венгрии."
 joi_flavor_aus.3.f: "Если [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] проявит благоразумие, то [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] поймёт, что союз Австрии и Венгрии выгоден обеим сторонам. Австрия сможет положиться на венгерскую элиту, а та, удовлетворённая своим положением при дворе, будет преданно служить империи."
 joi_flavor_aus.3.a: "Мы должны пойти на этот компромисс."
  #
 joi_flavor_aus.4.t: "Провинциализация Венгрии"
 joi_flavor_aus.4.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня отозвал у Венгрии региональную автономию, что знаменует начало подлинного объединения Транслейтании с империей."
 joi_flavor_aus.4.f: "Мы успешно подавили венгерский сепаратизм и вернули корону святого Иштвана. Провинциализация Венгрии стоит на повестке дня, и теперь перед нами выбор: признать венгров равными или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание венгерских земель, с другой — возможное единство империи в будущем. Каков будет наш выбор?"
 joi_flavor_aus.4.a: "Венгрия — равноправная часть империи."
 joi_flavor_aus.4.b: "Нет венгров, есть только австрийцы!"
  #
 joi_flavor_aus.5.t: "Конец власти аристократии"
 joi_flavor_aus.5.d: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] наконец отменила привилегии венгерского дворянства. Злокачественная опухоль, веками терзавшая империю, удалена."
 joi_flavor_aus.5.f: "С окончанием многовекового господства аристократии и подавлением восстаний в Венгрии, судьба традиционного мадьярского дворянства оказалась на разделочной доске. Настало время принять решение.\n\nСейчас среди чиновников идут ожесточённые дебаты о том, стоит ли отбирать дворянские титулы. Сторонники конфискации утверждают, что с мятежниками нужно расправляться быстро и решительно, чтобы устрашить всех, кто помышляет о бунте. Противники же считают, что сохранение титулов поможет успокоить панику и недовольство среди аристократии, которая по-прежнему играет ключевую роль в управлении Венгрией.\nКаков будет наш выбор?"
 joi_flavor_aus.5.a: "Лишить их всех привилегий!"
 joi_flavor_aus.5.b: "Сохранить им титулы и достоинство."
  #
 joi_flavor_aus.6.t: "Капитуляция Венгрии"
 joi_flavor_aus.6.d: "Под натиском армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] венгерские сепаратисты были вынуждены капитулировать. [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] захватила власть, а оплот мадьяр, Будапешт, вновь находится под контролем империи."
 joi_flavor_aus.6.f: "«И вот, когда ратуша взывала о пощаде и помощи, Будапешт восстал в праведном гневе. Несмотря на то что наше так называемое правительство бросило пушки в Сегеде, отказалось от оружия, предложенного Турцией и другими странами, и не сделало никаких приготовлений, униженно пресмыкаясь, — всё это не помешало Будапешту с каждым днём становиться всё более грозным.\nПравительству пришлось раздать оружие в Буде и сделать вид, что оно полностью разделяет чувства и речи его жителей, надев маску решимости и сопротивления, иначе оно было бы осуждено и покинуто всеми»."
 joi_flavor_aus.6.a: "У них не было иного выбора, кроме как пасть к нашим ногам."
  #“”
 joi_flavor_aus.7.t: "Провинциализация Богемии"
 joi_flavor_aus.7.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня отозвал у Богемии региональную автономию, что знаменует начало подлинного объединения чешских земель с империей."
 joi_flavor_aus.7.f: "По мере продолжения реформ, брожение в Праге утихло, и в Богемии воцарилось спокойствие. Теперь перед нами выбор: провозгласить равенство чехов или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание Богемии, с другой — возможное единство империи в будущем. Что же мы выберем?"
 joi_flavor_aus.7.a: "Богемия — равноправная часть империи."
 joi_flavor_aus.7.b: "Нет чехов, есть только австрийцы!"
 joi_flavor_aus.8.t: "Провинциализация Галиции"
 joi_flavor_aus.8.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня отозвал у Галиции и Лодомерии региональную автономию, что знаменует начало подлинного объединения австрийской Польши с империей."
 joi_flavor_aus.8.f: "Королевство Галиции и Лодомерии больше не является просто куском, отторгнутым от Польши, и одной из корон императора, а полноценной провинцией империи. Теперь перед нами выбор: провозгласить равенство поляков и украинцев или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание Галиции, с другой — возможное единство империи в будущем. Что же мы выберем?"
 joi_flavor_aus.8.a: "Галиция — равноправная часть империи."
 joi_flavor_aus.8.b: "Нет поляков, есть только австрийцы!"
 joi_flavor_aus.9.t: "Провинциализация Иллирии"
 joi_flavor_aus.9.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня отозвал у Иллирии региональную автономию, что знаменует начало подлинного объединения балканских регионов с империей."
 joi_flavor_aus.9.f: "Иллирия, некогда прямое владение империи и одна из её корон, теперь, благодаря долгим политическим усилиям, полностью подчинена центру. Перед нами выбор: провозгласить равенство южных славян или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание Иллирии, с другой — возможное единство империи в будущем. Что же мы выберем?"
 joi_flavor_aus.9.a: "Иллирия — равноправная часть империи."
 joi_flavor_aus.9.b: "Нет балканцев, есть только австрийцы!"
 joi_flavor_aus.10.t: "Провинциализация Ломбардии"
 joi_flavor_aus.10.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня отозвал у Ломбардии региональную автономию. Железная корона вновь на голове своего истинного монарха."
 joi_flavor_aus.10.f: "Хотя Ломбардское королевство всегда было частью Италии, теперь провинция Ломбардия без сомнения принадлежит [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]! Перед нами выбор: провозгласить равенство итальянцев или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание Ломбардии, с другой — возможное единство империи в будущем. Что же мы выберем?"
 joi_flavor_aus.10.a: "Ломбардия — равноправная часть империи."
 joi_flavor_aus.10.b: "Нет итальянцев, есть только австрийцы!"
 joi_flavor_aus.11.t: "Провинциализация Венеции"
 joi_flavor_aus.11.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], благословенный Богом австрийский император, сегодня распустил региональный совет города Святого Марка. Империя наконец установила прямое правление над этим городом, бывшей торговой республикой."
 joi_flavor_aus.11.f: "Древняя земля Венето, кажется, с незапамятных времён принадлежала богатой, но порочной Венецианской республике, однако она уже так давно находится под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Теперь перед нами выбор: провозгласить равенство итальянцев или продвигать идею единой великоавстрийской нации. С одной стороны — стабильность и процветание Венеции, с другой — возможное единство империи в будущем. Что же мы выберем?"
 joi_flavor_aus.11.a: "Венеция — равноправная часть империи."
 joi_flavor_aus.11.b: "Город Святого Марка — наша земля по праву!"
  #
 joi_flavor_aus.12.t: "Первый Федеральный совет"
 joi_flavor_aus.12.d: "С завершением централизации и переустройством империи начался процесс федерализации, призванный учесть мнения всех регионов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Представители со всех концов империи прибыли в столицу и сформировали совет. Они вместе исполнили гимн Австрийской империи и начали обсуждение конституции для будущей федерации."
 joi_flavor_aus.12.f: "«#bold Славься [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Наш добрый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nВеликий правитель, мудрый владыка, в священном сиянии стоящий!\nПусть ветви лавра для него растут, венцом славы его увенчая!\n\n#bold Славься [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Наш добрый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nНа плодородной земле его власть безгранична.\nПод его знамёнами мы идём к победам и урожаям!\nЕго трон благороден, справедлив и достоин;\nНа его гербе сияет правосудие!\n\n#bold Славься [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Наш добрый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!\nПусть с радостью он примет благословения отечества и народа!\nПусть увидит он народ, единый сердцем, где дружба превыше всего!\nПусть и в могиле он услышит\nХвалу потомков, собравшихся у его гробницы!\n\n#bold Славься [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Наш добрый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — [ROOT.GetCountry.GetRuler.GetFirstNameNoFormatting]!#!»"
 joi_flavor_aus.12.a: "[ROOT.GetCountry.GetRuler.GetFirstName]! Славься [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
  #
 joi_flavor_aus.13.t: "Радикализм в столице"
 joi_flavor_aus.13.d: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] охвачена волной радикализма. Фанатичные революционеры подняли мятеж и захватили дворцовый комплекс. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] был[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] вынужден[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] бежать из столицы, однако премьер-министр и армия за стенами города медлят с действиями."
 joi_flavor_aus.13.f: "«Император и его двор ещё 16 мая покинули столицу и бежали в Инсбрук. Здесь их окружали фанатичные тирольцы, в которых угроза вторжения неприятельской армии вновь пробудила верность династии. Императору устроили смотр национальной гвардии, и придворные и генералы наперебой расточали комплименты этим вооружённым горожанам, которые были в восторге от того, что их публично признали решающей силой страны».\n\n«За стенами города стояла реорганизованная армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] численностью в шестьдесят-семьдесят тысяч человек, хорошо вооружённая и организованная. Хотя командование было не на высоте, по крайней мере, были командиры. В городе же царили хаос и анархия, порождённые классовыми противоречиями. Парламент был беспомощен и, когда огонь уже почти охватил крышу над их головами, всё ещё обсуждал какие-то мелочные теоретические вопросы. Руководящий комитет был лишён и духа, и энергии. Они находились на расстоянии пушечного выстрела от столицы и революционеры, захватившие дворец, снова пришли в смятение»."
 joi_flavor_aus.13.a: "Премьер-министр может переодеться в женское платье и бежать из столицы!"
 joi_flavor_aus.13.b: "Приказать городской страже немедленно выступить и перебить всех мятежников!"
 joi_flavor_aus.14.t: "Пиллерсдорфская конституция"
 joi_flavor_aus.14.d: "Под влиянием сильных радикальных настроений, учёные и горожане столицы, от имени императора составили проект конституции, которая реформировала бы законы о цензуре и вводила либеральные свободы. Петиция была передана имперскому правительству."
 joi_flavor_aus.14.f: "«Мы, Божьей милостью император австрийский [ROOT.GetCountry.GetRuler.GetFirstName], убеждены, что государственные институты должны следовать за прогрессом в культуре и интеллектуальном развитии народа. Мы всегда признавали, что в благословенные годы долгого мира доверенные нам народы не отстали на этом пути, и мы заверили их в даровании конституции.\n\nДостаточно отказаться от нашего святого слова, чтобы успокоить наши сердца, и, торжественно выразив нашу заботу об их благополучии и правовом статусе, дать им право участвовать в управлении делами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], дабы отплатить за бесчисленные проявления верной любви и преданности наших возлюбленных народов. Учитывая это, по совету нашего совета министров и после тщательного рассмотрения, мы решили издать прилагаемый конституционный документ, который мы ставим под общую защиту всех народов нашей империи. Мы твёрдо верим, что узы доверия между короной и народом, а также многовековой союз королевств, составляющих монархию, во имя общего блага, станут ещё крепче.\n\nПосему мы постановляем, чтобы положения, содержащиеся в настоящем конституционном документе, стали нерушимыми и священными принципами для всех наших подданных и всех духовных, гражданских и военных властей без исключения»."
 joi_flavor_aus.14.a: "Мы ничего не можем с этим поделать."
 joi_flavor_aus.14.b: "Отклонить дерзкие требования черни!"
 joi_flavor_aus.15.t: "Венгерское восстание!"
 joi_flavor_aus.15.d: "Под влиянием радикализма среди венгерской интеллигенции и горожан поднялась волна сепаратизма. Вчера лидер венгерского движения за независимость, Лайош Кошут, опубликовал Декларацию независимости Венгрии, объявив об отделении от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_aus.15.f: "«Мы, Национальное собрание, законные представители венгерской нации, настоящим торжественным заявлением восстанавливаем неотъемлемые естественные права Венгрии и всех её частей и провинций, включаем их в число независимых и суверенных государств Европы и объявляем перед Богом и миром, что вероломная династия Габсбургов низложена.\n\nМы признаём своим моральным долгом изложить причины нашего решения, дабы весь цивилизованный мир знал, что не излишняя самоуверенность или революционная страсть, а иссякшее терпение и инстинкт самосохранения привели венгерскую нацию, доведённую до крайности гонениями, к этому шагу»."
 joi_flavor_aus.15.a: "Какая чушь."
  #Федеральный совет
 joi_flavor_aus.16.t: "Учреждение Федерального совета"
 joi_flavor_aus.16.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] уполномочил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] парламент [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], состоящий из представителей всех регионов и народов империи, издать конституционную резолюцию. В ней провозглашается, что Федеральный совет учреждается как постоянный представительный орган империи."
 joi_flavor_aus.16.f: "«Все народы империи имеют равные права, и каждый народ имеет неотъемлемое право на сохранение и использование своего языка. Федерация признаёт равенство всех общеупотребительных языков в школах, учреждениях и общественной жизни. На территориях, населённых несколькими народами, организация общественных и образовательных учреждений должна, помимо необходимого обучения немецкому языку, обеспечивать каждому народу возможность получать образование на родном языке».\n\n«Между государствами-членами федерации не могут устанавливаться отдельные таможенные пошлины, содержаться отдельные армии или поддерживаться какие-либо внешние дипломатические сношения. В каждом государстве-члене учреждается региональный парламент, сохраняющий законодательные полномочия в области гражданского права, предоставленные конституцией. Административные дела в каждом государстве-члене осуществляются после выборов под надзором Федерального совета. Их утверждение находится в ведении благословенного Богом австрийского императора [ROOT.GetCountry.GetRuler.GetFirstName] и его законных наследников».\n\n«Решения и законы Федерального совета имеют юрисдикцию и высшую законодательную силу на всей территории империи. Если местное законодательство противоречит законодательству Федерального совета, оно считается недействительным. Федеральный совет имеет право на регулярную финансовую отчётность, определение квот представительства и утверждение распределения общих расходов. Государства-члены должны организовывать свои финансовые дела в соответствии с решениями Федерального совета»."
 joi_flavor_aus.16.a: "В единстве наша сила, нас никогда не победить!"
  #Распад империи
 joi_flavor_aus.17.t: "Конец империи"
 joi_flavor_aus.17.d: "После отмены закона «[GetLawType('law_monarchy').GetName]» в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], земли, некогда подчинённые короне, одна за другой объявляют об отделении от незаконного немонархического правительства."
 joi_flavor_aus.17.f: "С падением короны новая республика, лишённая легитимности, не смогла сплотить народ в условиях всеобщего хаоса. Правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] утратило контроль над регионами. За исключением Австрии и Словении, которые всё ещё подчиняются правительству, все остальные земли объявили о разрыве присяги на верность и о незаконности текущего немонархического строя.\nРегионы, некогда принадлежавшие императорской короне, один за другим объявили о независимости и вышли из состава [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Буковина также была захвачена. Поистине печальный день."
 joi_flavor_aus.17.a: "Как это печально... но мы бессильны!"
  #Персональные события
 joi_flavor_aus.18.t: "Похороны эрцгерцога Карла"
 joi_flavor_aus.18.d: "Вчера в Вене скончался эрцгерцог Карл, один из величайших полководцев эпохи Наполеоновских войн. [ROOT.GetCountry.GetNameNoFlag] устроило герою государственные похороны. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] лично присутствовал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на церемонии и произнёс[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', '')] короткую речь в память о великом полководце."
 joi_flavor_aus.18.f: "«Когда я назначал этого августейшего брата главнокомандующим армией, я и не предполагал, с какой возвышенной и трогательной силой он продемонстрирует божественную мощь, ведущую к цели. С #bold героической стойкостью#! он переносил все несчастья, что выпадали на его долю, и в решающий момент, со скромностью, достойной нашего времени, стал победителем победителя мира!»\n\n«Вот картина, которую я хочу подарить ему: Карл на своём белом коне, сияющий, как ангел победы, при Асперне, ведёт свой штаб через поле битвы. В то утро, когда центр нашей армии начал колебаться, и Наполеон приказал французской кавалерии прорвать его, именно Карл схватил знамя первого батальона Императорского и Королевского линейного пехотного полка и, устремившись в сторону, пробитую вражеской картечью, #bold своей беспримерной храбростью сплотил теснимые имперские войска#!, повёл их снова вперёд и #bold так одолел Бонапарта, одержав победу!#!»\n\n«Героическому вождю австрийской армии! Неутомимому борцу за честь Германии! #bold Его слава никогда не померкнет, пусть девы и лавры венчают его, о, Лаурентий, наш непревзойдённый победитель!#!»"
 joi_flavor_aus.18.a: "Воздадим величайшие почести этому великому полководцу!"
 joi_flavor_aus.19.t: "Сисси из Баварии"
 joi_flavor_aus.19.d: "Во время неожиданной поездки на отдых молодой [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] познакомился с баварской принцессой Елизаветой. Влюбившись, император настоял, чтобы двор устроил его помолвку с принцессой."
 joi_flavor_aus.19.f: "«Елизавета — вторая дочь герцога Максимилиана Баварского и принцессы Софии. Это было беззаботное, импульсивное и любящее природу дитя, далёкое от придворного этикета, часто пропускавшее уроки ради верховых прогулок по сельской местности. В этом году она покинула замок Поссенхофен в Баварии, чтобы отдохнуть на курорте Бад-Ишль в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Там и состоялась её встреча с императором. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], который, похоже, не знал, что девушка — его кузина, пригласил её на охоту в Альпы. Они встретились, как было условлено, в горах, разговаривали и знакомились. Император влюбился в неё и попросил эрцгерцогиню Софию помочь ему устроить помолвку с Сисси»."
 joi_flavor_aus.19.a: "Она должна оставаться свободной на своей родине."
 joi_flavor_aus.19.b: "Она станет императрицей."
  #Наводнение и восстановление
 joi_flavor_aus.20.t: "Великое наводнение в Пеште!"
 joi_flavor_aus.20.d: "Весной 1838 года из-за обильного таяния снега в конце зимы и сильных весенних дождей уровень воды в Дунае резко поднялся и в итоге река прорвала дамбы между Будой и Пештом. Вода стремительно хлынула в город, и последующие бедствия почти полностью разрушили Пешт."
 joi_flavor_aus.20.f: "«Эвакуация? Куда, в Вену? У нас уже последние штаны водой уносит! Говорю тебе, через час вся эта улица превратится в приток Дуная. Хочешь утонуть или лезть на крышу и ждать, пока Бог за тобой придёт?»\n\n«Хватит орать, хватай тот ящик — да, тот, где серебряные талеры и золотые слитки. Бери только ценное, дурак, а не портреты шлюх! Надо уносить ноги, пока ещё можно идти по воде. Когда всё это закончится, в Пеште останутся только грязь и крысы»."
 joi_flavor_aus.20.a: "О, Господи!"
 joi_flavor_aus.21.t: "Восстановить Будапешт?"
 joi_flavor_aus.21.d: "Весеннее наводнение 1838 года закончилось. Чиновники из столицы прибыли в Пешт по приказу. [SCOPE.sCharacter('pest_rebuild_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('pest_rebuild_general_scope').GetLastName] во главе армии взял город под свой контроль. [SCOPE.sCharacter('pest_rebuild_general_scope').GetHeShe] должен объявить указ. Так повелел [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_aus.21.f: "Чиновники из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, одетые в тёмные фраки с золотыми эполетами, медленно вошли на затопленную грязью площадь на западном берегу Пешта. Несколько сапёров устанавливали теодолиты и колья. Из грязи торчали накренившийся шпиль церкви и обломки балок. Ученики инженеров и отставные солдаты в штатском расчищали размытые рекой улицы.\n\n[SCOPE.sCharacter('pest_rebuild_general_scope').GetFullNameNoFormatting] стоял перед руинами бывшей ратуши. Грязь испачкала [SCOPE.sCharacter('pest_rebuild_general_scope').GetHerHis] длинные сапоги. [SCOPE.sCharacter('pest_rebuild_general_scope').GetHeShe] смотрел на геодезистов с чертежами в руках. «Да, Ваше Величество, — тихо произнес[SelectLocalization(SCOPE.sCharacter('pest_rebuild_general_scope').IsFemale, 'ла', '')] [SCOPE.sCharacter('pest_rebuild_general_scope').GetHeShe], — я знаю, что мне нужно делать»."
 joi_flavor_aus.21.a: "Невидимая рука рынка всё исправит сама!"
 joi_flavor_aus.21.b: "Воссоздадим цивилизацию на берегах Дуная."
 ##
 joi_flavor_aus.22.t: "Старые добрые времена"
 joi_flavor_aus.22.d: "Теперь, когда коронные земли усмирены, сторонники старого порядка всё настойчивее говорят о своём желании: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] восстановить владения Габсбургов в границах до Французской революции — а то и вернуть династии земли времён Карла V."
 joi_flavor_aus.22.f: "«После их кончины по закону природы и наследования этот священный католический престол достался мне, дабы я следовал их примеру и жил — а если потребуется, и умер — ради него. Поэтому я и доныне верно следовал наставлениям предков: я твёрдо решил вернуть всё, что прежние императоры создавали прежде и вплоть до наших дней.»\n\n«Как вам известно, мы питаем к чужеземным врагам давнюю ненависть, и дружить с ними нам весьма нелегко. Но, государь, вы должны сдерживать эту ненависть, пока она не служит нашей пользе. Императрица Мария Терезия ненавидела короля Фридриха, но признавала его способности; она не могла забыть потерю Силезии, но понимала суровую действительность.»"
 joi_flavor_aus.22.a: "Пусть [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь возьмёт в руки скипетр!"
 joi_flavor_aus.22.b: "Нужно сосредоточиться на внутренних делах, а не раздражать другие великие державы."
 joi_flavor_aus.23.t: "Католический монарх новой эпохи"
 joi_flavor_aus.23.d: "#yellow Италия#!, #yellow Испания#! и #yellow Нидерланды#! вновь склонились перед династией #yellow Габсбургов#!, а #yellow Силезия#! вернулась в состав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Уже никто не сможет отрицать: мы совершили одно из самых поразительных деяний эпохи."
 joi_flavor_aus.23.f: "«Блажен ты, Симон, сын Ионин, потому что не плоть и кровь открыли тебе это, но Отец Мой Небесный. И Я говорю тебе: ты — Пётр, и на этом камне Я создам Церковь Мою, и врата ада не одолеют её. И дам тебе ключи Царства Небесного: что свяжешь на земле, то будет связано на небесах; что разрешишь на земле, то будет разрешено на небесах.»\n\n«Всякая душа да будет покорна высшим властям, ибо нет власти не от Бога; существующие власти от Бога установлены. Посему противящийся власти противится Божьему установлению; а противящиеся сами навлекут на себя осуждение.»"
 joi_flavor_aus.23.a: "#yellow Империя Габсбургов#! вновь вступает в золотой век!"
 joi_flavor_aus.23.b: "Порядок установлен. #tooltippable_name [ROOT.GetCountry.GetAdjective]ой#! державе суждено править миром!"
 joi_flavor_aus.24.t: "Коронное герцогство прежних времён"
 joi_flavor_aus.24.d: "Династия [ROOT.GetCountry.GetRuler.GetLastName] вернулась в Силезию — землю, которая с 1742 года оставалась в руках Пруссии. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь правит ею."
 joi_flavor_aus.24.f: "«Я питаю к Божеству глубочайшее благоговение и потому остерегаюсь приписывать ему несправедливость или непостоянство — то, что осудил бы даже самый ничтожный смертный. Поэтому, дорогой брат, я предпочитаю не верить, будто этот всемогущий и милосердный Бог занимается человеческими делами. Напротив, всё, что происходит с живыми существами, и всякое последствие я отношу к неисчислимой цепи причин и следствий; я молча преклоняюсь перед этим достойным поклонения Божеством, признавая, что ничего не знаю о путях его, ибо его святая мудрость решила не открывать мне их.»"
 joi_flavor_aus.24.a: "Силезия! Как же мы тосковали по этой земле."
 joi_flavor_aus.24.b: "Позор Семилетней войны наконец смыт."
 joi_flavor_aus.25.t: "Имперский лен прежних времён"
 joi_flavor_aus.25.d: "Династия [ROOT.GetCountry.GetRuler.GetLastName] вернулась во Фландрию — землю, которая с 1795 года оставалась в руках Наполеона. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь правит ею."
 joi_flavor_aus.25.f: "«Оптимизм, практичность и политическая наивность; беспринципность вместе с тонким владением интригой; чувствительная и простодушная натура; поразительная восприимчивость ко всему прекрасному, особенно к изобразительным искусствам, и ко всем веяниям времени — политическому национализму, литературно-философскому гуманизму, экономическому капитализму; жажда личной славы и народной любви, а главное — ясное осознание собственной индивидуальности: [ROOT.GetCountry.GetRuler.GetFullName] снова и снова [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'проявляла', 'проявлял')] все эти черты.»"
 joi_flavor_aus.25.a: "Фландрия, да пребудет она навеки с Империей!"
 joi_flavor_aus.25.b: "Вспомним прошлое и проведём священную церемонию инвеституры."
 joi_flavor_aus.26.t: "Скипетр прежних времён"
 joi_flavor_aus.26.d: "Династия [ROOT.GetCountry.GetRuler.GetLastName] вернулась в Неаполь — землю, которая с 1734 года оставалась в руках Бурбонов. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь правит ею."
 joi_flavor_aus.26.f: "«Можно сказать, что отправление правосудия — первая обязанность государя. Ведь правосудие касается благополучия множества людей, находящихся под его властью, и государь обязан ставить его выше всех собственных интересов. Как же тогда объяснить голый эгоизм, самовозвеличивание, произвол и деспотизм, которые проповедует Макиавелли? Государь вовсе не абсолютный хозяин народа, которым правит, а лишь первый его слуга.»\n\n«Чтобы утвердить справедливость среди людей, мы должны защищать добродетель и показать миру, что порок приносит только беды и гибель, а в конце концов обрушивается и на самого преступника. Именно преступник становится последней жертвой своего преступления.»"
 joi_flavor_aus.26.a: "Империя и королевство — священны и неделимы!"
 joi_flavor_aus.26.b: "Королевство Сицилия по эту сторону Маяка — навеки за домом Габсбургов!"
 joi_flavor_aus.27.t: "Корона прежних времён"
 joi_flavor_aus.27.d: "Династия [ROOT.GetCountry.GetRuler.GetLastName] вернулась в Испанию — землю, которая после Утрехтского договора 1713 года оставалась в руках Бурбонов. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь правит ею."
 joi_flavor_aus.27.f: "«Поскольку [ROOT.GetCountry.GetRuler.GetFirstName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'сама ревностно предана Церкви', 'сам ревностно предан Церкви')] и продолжает благочестие своих предков, мы постановляем: после утверждения прав Римской церкви [ROOT.GetCountry.GetRuler.GetFirstName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна быть признана королевой и получить священную корону', 'должен быть признан королём и получить священную корону')].»\n\n«Мы хорошо знаем, какая грозная опасность нависла над Церковью Божьей и всем христианским миром; верим, что ваша мудрость также видит это. Всем известно: если вы храбро защитите всё, что предки добыли доблестью, это станет лучшим свидетельством вашего благородства и честности. Но если случится обратное, доблесть предков померкнет в их потомках.»"
 joi_flavor_aus.27.a: "Владения #tooltippable_name [ROOT.GetCountry.GetAdjective]ой#! державы должны раскинуться до бесконечности!"
 joi_flavor_aus.27.b: "В Испании [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] восстановит владения династии #yellow Габсбургов#!."
 joi_flavor_aus.27.c: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] восстановит величие Карла V!"