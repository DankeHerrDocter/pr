 imperial_diet: "Федеральный совет"
 imperial_diet_reason: "Шкала прогресса показывает количество мест в #bold совете, которое контролирует доминирующий член федерации.#! \n#bold Австрийские места#!: #variable [ROOT.GetCountry.MakeScope.Var('aus_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_aus_tooltip_advance условиями#!. \n#bold Венгерские места#!: #variable [ROOT.GetCountry.MakeScope.Var('hun_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_hun_tooltip_advance условиями#!. \n#bold Богемские места#!: #variable [ROOT.GetCountry.MakeScope.Var('boh_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_boh_tooltip_advance условиями#!. \n#bold Галицийские места#!: #variable [ROOT.GetCountry.MakeScope.Var('pol_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_pol_tooltip_advance условиями#!. \n#bold Итальянские места#!: #variable [ROOT.GetCountry.MakeScope.Var('ita_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_ita_tooltip_advance условиями#!. \n#bold Иллирийские места#!: #variable [ROOT.GetCountry.MakeScope.Var('yug_imperial_diet').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],imperial_diet_yug_tooltip_advance условиями#!.\n\nВозрождённая Австрийская империя, которую возглавляет Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], теперь стала великим #bold федеративным государством#!. Народы, живущие в империи, достигли согласия по многим вопросам и объединились, отбросив былые предрассудки. Пережив бури #bold радикализма и национализма#!, наше отечество, [ROOT.GetCountry.GetNameNoFlag], избавилось от страшной тени сепаратизма и стало #bold единым под общей короной [GetLawType('law_monarchy').GetName|l]#!. Каждый член федерации имеет в общем совете #bold не более 400 и не менее 50 мест, и отныне они нерушимо связаны друг с другом.#!\n\nХотя в прошлом, под властью #variable династии Габсбургов#!, мы почти тысячу лет жили в эпоху #bold абсолютизма и просвещённого деспотизма#! и никогда не знали ничего подобного, сегодня даже #bold самые преданные монархисты#! вынуждены признать важность демократических реформ и представительного [Concept('concept_institution', 'института')] — Федерального совета — для сохранения единства империи. Пройдя через испытания промышленной революции и национализма, [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName|l], [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName|l] и [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName|l] получили власть в [Concept('concept_government', 'правительстве')] и стали опорой нашей славной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в новую эпоху. Именно они ведут отечество к #bold прогрессу и развитию#!, превратив нашу страну в #bold великую индустриальную [Concept('concept_country', 'державу')]#!.\n\n#bold Политика мультикультурализма#! — основа мощи нашего отечества. Мы — #bold маяк в Центральной Европе, освещающий путь народам, страдающим под гнётом тирании#!. Мы — #bold дом для всех, с великодушием и терпимостью принимающий разнообразие.#!\n\n#variable Да здравствует наш император [ROOT.GetCountry.GetRuler.GetFirstName]!#!"
 imperial_diet_aus_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения южнонемецкой культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 imperial_diet_hun_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения венгерской культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 imperial_diet_boh_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения чешской культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 imperial_diet_pol_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения польской культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 imperial_diet_ita_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения североитальянской культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 imperial_diet_yug_tooltip_advance: "#bold +5 мест в месяц при следующих условиях#!: \n•#variable Доля населения хорватской культуры достигла 10%#!\n•#variable Доля населения сербской культуры достигла 10%#!\n\n#bold -1 место в месяц при следующих условиях#!: \n•#variable Любое другое государство-член получает места#!"
 status_imperial_diet_aus: "#P #B Австрия возглавляет совет#!#!"
