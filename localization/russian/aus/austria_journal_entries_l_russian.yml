  #
 house_of_habsburg: "Дом Габсбургов"
 house_of_habsburg_reason: "#V #P #B Святой Апостольский Король Венгрии, Богемии, Словении, Галиции, Иллирии, Венеции и Ломбардии, благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]#!#!#!#B #V  является нынешним главой и монархом дома Габсбургов.#!#!\n\nПрославленный и древний #variable род Габсбургов#! берёт своё начало в швабских землях Швейцарии. С тех пор как #bold Рудольф I в 1282 году#!, будучи герцогом Австрии, был коронован #bold королём Германии#!, священная кровь тысячелетиями передавала #bold имперскую корону, символ римского наследия#!, до наших дней. И хотя бесчисленные королевства и земли, которыми некогда правила династия, и даже слава империи, над которой никогда не заходило солнце, остались в прошлом, власть над нынешними владениями крепка как никогда.\n\nДинастия Габсбургов — это оплот древнего и священного традиционного порядка в Европе, а также господин и защитник бесчисленных подданных [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Всемогущий Бог, прощающий грехи мира, #bold да будет благословлен положением и властью Святых Апостолов, [ROOT.GetCountry.GetRuler.GetFirstName]#!, дабы вся земная слава принадлежала ему во веки веков. Корона, дарованная династии Богом, есть #bold награда за праведность и благие дела#!, свидетельствующая о #bold духовном и нравственном превосходстве#! монарха. Обладатель короны — это #bold воплощение победы, власти и благородства#!, олицетворяющее его #bold долг вершить правосудие и оберегать добродетель.#!\n\nИ хотя идеи либерализма и национализма охватывают Европу, славный #bold дом Габсбургов#! не утратит своего древнейшего наследия и не сгинет в реке истории. #bold Мы — избранники Божьи, нам суждено править здесь вечно!#!\n\n#variable Австрия будет смеяться последней!#!"
 house_of_habsburg_status: "#V #O #B Древнейший и славнейший род#!#!#!"
 duke_of_karl_dead_tt: "Эрцгерцог Карл скончался."
