 wind_of_liberalism_on_complete_tt: "Наша страна будет развиваться в соответствии с выбранным нами курсом реформ."
 aus_political_liberalism: "Реформа: Политическая либерализация"
 aus_political_liberalism_reason: "Мы должны реформировать [Concept('concept_government', 'правительство')] нашей страны, чтобы оно соответствовало либеральным ожиданиям радикалов."
 aus_economic_liberalism: "Реформа: Экономическая либерализация"
 aus_economic_liberalism_reason: "Мы должны прислушаться к призывам сторонников свободного рынка и устранить государственное вмешательство в экономику."
 aus_social_liberalism: "Реформа: Либерализация слова"
 aus_social_liberalism_reason: "Либералы призывают к свободе слова. Мы должны гарантировать гражданам империи право без сомнений критиковать [Concept('concept_government', 'правительство')]."
 aus_political_conservatism: "Реформа: Политический консерватизм"
 aus_political_conservatism_reason: "Консервативная политическая среда — ключ к поддержанию центральной власти. Наше [Concept('concept_government', 'правительство')] должно обеспечить, чтобы традиционные элиты оставались у власти, не поддаваясь влиянию радикализма."
 aus_economic_conservatism: "Реформа: Экономический консерватизм"
 aus_economic_conservatism_reason: "Государство не может отказаться от возможности вмешиваться в экономику. Необходимо поддерживать стабильность внутреннего рынка."
 aus_social_conservatism: "Реформа: Консерватизм в печати"
 aus_social_conservatism_reason: "Наши священные и великие [Concept('concept_government', 'правительство')] и [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] не должны подвергаться произвольной критике. Для этого нам нужен более строгий [Concept('law', 'закон')] о цензуре."
 aus_choose_radical_way_in_springtime: "#variable Это поставит нас на путь либеральных реформ.#!"
