 austrian_crown: "Австрийская корона"
 austrian_crown_reason: "От #bold короны Богемии до титула Святого Апостольского короля Венгрии#!, от #bold традиций Священной Римской империи до славы австрийского императора#! — всё это сплотила воедино великая [ROOT.GetCountry.GetNameNoFlag]. Нас возглавляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], а многочисленные титулы и короны, которыми он обладает, символизируют священную кровь Габсбургов. Однако личная самодержавная власть нашего нынешнего правителя уже не та, что прежде. [Concept('interest_group', 'Заинтересованные группы')] в [Concept('concept_government', 'правительстве')] постоянно борются за власть, поддерживая функционирование [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\n#bold Либерализм и национализм#! бурно развиваются в Европе, и #bold Венская система, созданная герцогом Меттернихом#!, трещит по швам. Мы должны действовать быстро, чтобы решить эти проблемы и объединить подвластные нам #bold коронные земли#! в единое целое.\n\nРазвитие националистических идей, несомненно, изменит статус-кво, который империя поддерживала веками, но мы не должны проявлять лишь осторожность и уступчивость. [ROOT.GetCountry.GetNameNoFlag] — многонациональное государство без ярко выраженного титульного этноса, и это даёт нам повод для беспокойства. В грядущие неспокойные времена мы должны либо создать #bold новую, верную [Concept('concept_country', 'государству')] [Concept('concept_culture', 'культурную')] и национальную идентичность#!, либо #bold пойти на уступки народам империи, чтобы они могли участвовать в [Concept('concept_government', 'управлении')]#!. В любом случае, мы обязаны искоренить язву национализма и сохранить единство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\n#bold Дом Габсбургов#! не смирится с забвением в реке истории. #bold Мы — избранники Божьи, нам суждено править здесь вечно.#!"
 austrian_crown_complete_tt: "Завершено 6 пунктов #bold [Concept('concept_journal_entry', 'Записи в дневнике')] «Австрийская корона»#!"
 austrian_crown_status: "#bold Обеспечить подчинение народов Австрии власти империи#!"
 remove_aus_habsburg_territory_turrible_tt: "Все модификаторы #variable коронных земель#! будут удалены из империи."
 crown_status: "Покончить с автономией коронных земель"
 crown_value_birgger_zero: "Автономия больше 0"
 become_aus_cultural_homeland: "#variable Становится родиной для южных немцев#!"
 hungarian_crown: "Корона Венгрии"
 hungarian_crown_reason: "Шкала прогресса показывает #V автономию Венгрии#!. Уровень автономии #bold влияет на регион в зависимости от своего значения.#! \n\n#bold Наш благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] по совместительству является королём Венгрии.#!\n\n#bold Корона Венгрии#! — один из важнейших титулов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], символизирующий #bold законную власть#! над этой землёй. Однако бесчисленные народы, населяющие обширные венгерские земли, всегда были источником угрозы для власти Вены.\n\nВ последние годы, на фоне роста #bold венгерского национализма#!, #bold венгерские #v $academics$#! и #v $aristocrats$#!#! организуют [Concept('turmoil', 'беспорядки')] против имперской власти. Мы не можем уступить #bold этим ничтожествам#! корону Венгрии, которую мы приняли из рук христианства после #bold Великой Турецкой войны в 1699 году#!. Чтобы коренным образом изменить ситуацию в регионе, необходим ряд #bold реформ#!:\n\n#bold Мы должны, пока венгерская [Concept('revolution', 'революция')] за независимость не причинила огромного вреда#!, сформировать у местного населения общую с [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] [Concept('concept_culture', 'культурную')] идентичность, чтобы сохранить власть империи. В противном случае нам, возможно, придётся пойти на не самые приятные уступки."
 hungarian_crown_complete_tt: "Автономия Венгрии не выше 0"
 hungarian_crown_complete_2_tt: "Успешно завершена [concept_journal_entry] «#bold Привилегии венгерского дворянства#!»"
 hungarian_crown_1_button: "Провести финансовую реформу"
 hungarian_crown_1_button_desc: "Местные могущественные #v $aristocrats$#! контролируют финансы Венгрии, а продажные #v $bureaucrats$#! разворовывают остатки. До венского двора доходят лишь жалкие крохи. Более того, таможенные барьеры между Венгрией и остальной империей серьёзно тормозят экономический рост. Необходимо реформировать финансы для сохранения единства империи."
 hungarian_crown_2_button: "Провести реформу образования"
 hungarian_crown_2_button_desc: "Венгерский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 hungarian_crown_3_button: "Провести земельную реформу"
 hungarian_crown_3_button_desc: "#v $aristocrats$#! контролируют земли в Венгрии через свои поместья. Некоторые из них втайне до сих пор используют давно запрещённое крепостное право. Это нужно изменить. Земли должны быть выкуплены у аристократии, а их новыми владельцами станут #v $farmers$#! и #v $capitalists$#!."
 hungarian_crown_4_button: "Провести административную централизацию"
 hungarian_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Венгрии находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены в Венгрии."
 hungarian_nobles_problem: "Привилегии венгерского дворянства"
 hungarian_nobles_problem_reason: "Шкала прогресса показывает текущий #V авторитет дворянства#! в #bold Венгрии.#! \n\nВенгерские #v $aristocrats$#! издревле обладали многочисленными привилегиями: таможенными правами, правом на частные армии, крепостным правом, налоговыми, административными и судебными правами. Эти #v $aristocrats$#!, в основном мадьяры, храбры и воинственны, и командуют собственными отрядами. Во времена #bold Марии Терезии#! пришлось проливать слёзы и давать обещания, чтобы добиться от них военной помощи.\n\nОднако венгерские #v $aristocrats$#! не являются единой силой. Это всего лишь уродливое содружество #bold оппортунистов, потомственных бездельников и горячих голов#!. Во имя империи #bold мы должны бросить этих паразитов, мешающих развитию, за решётку!#!"
 hungarian_nobles_problem_complete_tt: "Завершено #bold «Марш на Будапешт»#!\nВласть аристократии в Венгрии не выше 0"
 hungarian_kick_nobles_tt: "Власть аристократии больше 0"
 hungarian_nobles_problem_1_button: "Расколоть аристократию"
 hungarian_nobles_problem_1_button_desc: "Разобщённость венгерского дворянства даёт нам возможность для подкупа. Пообещав им выгоды, мы можем ослабить их как единую силу."
 hungarian_nobles_problem_2_button: "Марш на Будапешт"
 hungarian_nobles_problem_2_button_desc: "Проблему аристократии нельзя решить мягкими методами. Армия империи должна быть готова силой войти в Будапешт и физически уничтожить их. Однако это, несомненно, приведёт к восстанию в Венгрии!"
 marching_through_budapest: "Марш на Будапешт"
 marching_through_budapest_reason: "Из-за силовой политики империи, направленной против них, венгерские #v $aristocrats$#! и мадьярское дворянство подняли восстание в некоторых регионах Венгрии и объявили о независимости от короны. Мы должны уничтожить их и пресечь любую возможность сопротивления империи."
 hungarian_nobles_problem_button_tt: "Это приведёт к насильственному лишению всех привилегий, которыми обладают венгерские #v $aristocrats$#!.\nВенгерские #v $aristocrats$#! поднимут восстание в ответ на эти действия. Чем выше их власть, тем больше территорий они получат при объявлении независимости!"
 marching_through_budapest_complete_tt: "Мятежные венгерские #v $aristocrats$#! разбиты, их земли возвращены"
 bohemian_crown: "Корона Богемии"
 bohemian_crown_reason: "Шкала прогресса показывает #V автономию Богемии#!. Уровень автономии #bold влияет на регион в зависимости от своего значения.#! \n\n#bold Наш благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] по совместительству является королём Богемии.#!\n\n#bold Земли Богемии#!, расположенные на пересечении путей из Германии, Польши и Венгрии, являются центром Европы. Их промышленность и торговля вызывают восхищение во всём мире. Богатый [Concept('concept_resource_potential', 'ресурсный потенциал')] способствует #bold процветанию мануфактур#!, и регион долгое время был основным источником [Concept('concept_taxes', 'налогов')] для венского двора.\n\nОднако с #bold подъёмом национализма#! прежде покорные чехи всё чаще выражают недовольство империей. #bold Богемские #v $aristocrats$#!#!, находящиеся в составе #bold Германского союза#!, сформировали чешский сейм для удовлетворения своих политических амбиций. Их стремление распространять свой язык и использовать его для продвижения националистических идей очевидно для Вены.\n\nС развитием промышленности растёт и потенциальное недовольство крестьян. Города процветают, но вместе с этим возрастает и вероятность [Concept('concept_revolution', 'революции')]. Чтобы предотвратить любую катастрофу, которая может дестабилизировать Богемию, мы должны #bold провести коренные реформы#! в этих коронных землях и обеспечить власть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в регионе."
 bohemian_crown_complete_tt: "Автономия Богемии не выше 0"
 bohemian_crown_1_button: "Провести финансовую реформу"
 bohemian_crown_1_button_desc: "Продажные #v $bureaucrats$#! разворовывают большую часть налогов в Богемии, а таможенные барьеры серьёзно тормозят экономический рост. Необходимо реформировать финансы для сохранения единства империи."
 bohemian_crown_2_button: "Провести реформу образования"
 bohemian_crown_2_button_desc: "Чешский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 bohemian_crown_3_button: "Провести земельную реформу"
 bohemian_crown_3_button_desc: "#v $aristocrats$#! контролируют земли в Богемии через свои поместья. Некоторые из них втайне до сих пор используют давно запрещённое крепостное право. Это нужно изменить. Земли должны быть выкуплены у аристократии, а их новыми владельцами станут #v $farmers$#! и #v $capitalists$#!."
 bohemian_crown_4_button: "Провести административную централизацию"
 bohemian_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Богемии находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены в Богемии."
 galician_crown: "Корона Галиции"
 galician_crown_reason: "Шкала прогресса показывает #V автономию Галиции#!. Уровень автономии #bold влияет на регион в зависимости от своего значения.#! \n\n#bold Наш благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] по совместительству является королём Галиции.#!\n\n#bold С момента раздела Польши в 1795 году#! [ROOT.GetCountry.GetNameNoFlag] прочно контролирует земли австрийской Польши — Галицию и Лодомерию. Формально независимый Вольный город Краков также фактически находится под нашим контролем.\n\nДо Наполеоновских войн Вена не интересовалась развитием Польши. Хотя закон «[GetLawType('law_serfdom').GetName]» был отменён под нашим милосердным правлением, польские #v $aristocrats$#! до сих пор разгневаны, и этот гнев не утих. Они начали якшаться с польскими организациями за независимость, стремясь либо выйти из-под власти Габсбургов, либо добиться большей автономии. Краков стал оплотом оппозиции, где плетутся заговоры с целью свержения [Concept('concept_government', 'правительства')], которое возглавляет Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Мы должны нанести по этому сокрушительный удар.\n\nОднако наша снисходительная политика привела к тому, что местные #v $farmers$#! оказывают нам широкую поддержку. Возможно, нам следует обратить внимание на [Concept('concept_resource_potential', 'ресурсный потенциал')] их земель, чтобы #v $farmers$#! остались сплочёнными и верными короне, и создать по-настоящему имперскую польскую территорию."
 galician_crown_complete_tt: "Автономия Галиции не выше 0"
 galician_crown_1_button: "Провести финансовую реформу"
 galician_crown_1_button_desc: "Местные могущественные #v $aristocrats$#! контролируют финансы Галиции, а продажные #v $bureaucrats$#! разворовывают остатки. До венского двора доходят лишь жалкие крохи. Необходимо реформировать финансы для сохранения единства империи."
 galician_crown_2_button: "Провести реформу образования"
 galician_crown_2_button_desc: "Польский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 galician_crown_3_button: "Субсидировать сельское хозяйство"
 galician_crown_3_button_desc: "С тех пор как польские #v $farmers$#! были освобождены от крепостной зависимости, они живут за счёт натурального хозяйства, и их доходы остаются очень низкими. Возможно, предоставление им субсидий поможет решить эту проблему."
 galician_crown_4_button: "Провести административную централизацию"
 galician_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Галиции находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены в Польше."
 illyrian_crown: "Корона Иллирии"
 illyrian_crown_reason: "Шкала прогресса показывает #V автономию Иллирии#!. Уровень автономии #bold влияет на регион в зависимости от своего значения.#! \n\n#bold Наш благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] по совместительству является королём Иллирии.#!\n\n[ROOT.GetCountry.GetNameNoFlag] уже несколько сотен лет защищает балканские земли, освобождённые от #bold злых турецких еретиков#!. Даже #bold недолгое правление Наполеона#! не изменило того факта, что эти земли в конечном итоге принадлежат нам. Здесь живут хорваты, сербы, боснийцы и небольшое количество итальянцев.\n\nВ настоящее время под нашей властью находятся Королевство Хорватия, отделённое от венгерской короны, и Королевство Далмация, наследие Венецианской республики. Мы должны активно продвигать идею иллиризма. Это название является символом верности империи, а не представителем так называемых славянских народов. Исходя из этого, мы должны объединить короны и защитить наши #bold интересы в бассейне Дуная и в Средиземноморье.#!"
 illyrian_crown_complete_tt: "Автономия Иллирии не выше 0"
 illyrian_crown_1_button: "Арестовать диссидентов"
 illyrian_crown_1_button_desc: "Балканские народы культурно разнообразны и давно ведут антиимперскую пропаганду. Больше нельзя это терпеть, пора нанести сокрушительный удар!"
 illyrian_crown_2_button: "Провести реформу образования"
 illyrian_crown_2_button_desc: "Балканский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 illyrian_crown_3_button: "Провести земельную реформу"
 illyrian_crown_3_button_desc: "#v $aristocrats$#! контролируют земли на Балканах через свои поместья. Некоторые из них втайне до сих пор используют давно запрещённое крепостное право. Это нужно изменить. Земли должны быть выкуплены у аристократии, а их новыми владельцами станут #v $farmers$#! и #v $capitalists$#!."
 illyrian_crown_4_button: "Провести административную централизацию"
 illyrian_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Иллирии находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены на Балканах."
 lombardy_crown: "Корона Ломбардии"
 lombardy_crown_reason: "Шкала прогресса показывает #V автономию Ломбардии#!. Уровень автономии #bold влияет на регион в зависимости от своего значения.#! \n\n#bold Наш благословенный Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] по совместительству является герцогом Ломбардии.#!\n\nЕщё до начала #bold Французской революции#! [ROOT.GetCountry.GetNameNoFlag] контролировала ключевую часть земель Железной короны, включая Милан и его окрестности. После Наполеоновских войн мы объединили их в большую Ломбардию и включили под власть короны. Исторически Ломбардия была #bold процветающим промышленным и торговым центром#!. С экономическим развитием на этот полуостров пришла итальянская [Concept('concept_culture', 'культура')]. Германцы, переселившиеся сюда из других мест, привыкли к #bold итальянским обычаям#! и стали считать себя ломбардцами, а в условиях растущего #bold национализма#! всё больше ощущают себя #bold итальянцами.#!\n\nМногочисленные итальянские националисты по соседству жаждут этих земель. Местные ломбардцы также стремятся создать независимую #bold Ломбардскую республику#!. Нам пора что-то предпринять.\n\nИнтеграция экономики Ломбардии в экономику [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — неплохой способ заставить их извлекать больше выгоды из состава империи и сделать их экономически зависимыми."
 lombardy_crown_complete_tt: "Автономия Ломбардии не выше 0"
 lombardy_crown_1_button: "Арестовать диссидентов"
 lombardy_crown_1_button_desc: "Ломбардцы всегда горячо поддерживали идею объединения Италии и давно ведут антиимперскую пропаганду. Больше нельзя это терпеть, пора нанести сокрушительный удар!"
 lombardy_crown_2_button: "Провести реформу образования"
 lombardy_crown_2_button_desc: "Итальянский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 lombardy_crown_3_button: "Подавить национализм"
 lombardy_crown_3_button_desc: "Итальянское националистическое движение в последние годы набирает силу вокруг Милана. Говорят, что некая организация под названием «Карбонарии» постоянно саботирует имперское правление в Италии. Мы должны их арестовать."
 lombardy_crown_4_button: "Провести административную централизацию"
 lombardy_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Ломбардии находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены в Ломбардии."
 veneto_crown: "Корона Венеции"
 veneto_crown_reason: "Шкала прогресса показывает #V автономию Венеции#!. В зависимости от этого показателя #bold ситуация в регионе будет меняться.#! \n\n#bold Его Величество, хранимый Богом австрийский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], также носит титул великого герцога Венеции.#!\n\n#bold Город Святого Марка в Венеции#! со времён Средневековья был #bold жемчужиной Адриатики#! и #bold известным европейским промышленным и торговым центром#!. Когда-то это была сердцевина #bold Венецианской республики#!, но с окончанием #bold Наполеоновских войн#! и установлением #bold Венского порядка#!, [ROOT.GetCountry.GetNameNoFlag] под руководством #bold канцлера Меттерниха#! #bold дипломатическим путём#! заполучила этот богатый регион, чтобы увеличить наши [Concept('tax', 'налоговые')] поступления от торговли. Однако у всего есть своя цена. С течением времени наша власть в Венеции стала сладким ядом. На фоне растущего национализма венецианцы стали считать себя итальянцами и прилагать усилия для объединения Италии.\n\nМы должны укрепить нашу власть здесь, прежде чем они отделятся от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], развивая местную торговлю и судоходство. Или же создать новую идентичность, отличную от националистической.\n\nВерный империи генерал Йозеф Радецкий считает, что на этих мятежников следует обрушить всю мощь и подавить их."
 veneto_crown_1_button: "Арестовать диссидентов"
 veneto_crown_1_button_desc: "Венецианцы всегда горячо поддерживали идею объединения Италии и давно ведут антиимперскую пропаганду. Больше нельзя это терпеть, пора нанести сокрушительный удар!"
 veneto_crown_2_button: "Провести реформу образования"
 veneto_crown_2_button_desc: "Итальянский национализм коренится в их так называемой национальной идентичности. Однако, пока они ещё подчиняются нашей власти, у нас есть шанс воспитать следующее поколение верными подданными, близкими к нашей [Concept('concept_culture', 'культуре')]."
 veneto_crown_3_button: "Развивать порты"
 veneto_crown_3_button_desc: "Город Святого Марка на протяжении сотен лет был жемчужиной средиземноморской торговли. Модернизировав и перестроив их порты, мы сможем способствовать процветанию региона."
 veneto_crown_4_button: "Провести административную централизацию"
 veneto_crown_4_button_desc: "[Concept('concept_government', 'Правительственные')] органы Венеции находятся под влиянием местных сил и часто не подчиняются приказам из центра. Нам необходимо создать надёжную и подконтрольную бюрократическую систему, чтобы обеспечить власть Вены на Адриатике."
