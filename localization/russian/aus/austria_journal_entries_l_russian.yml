 imperial_diet_constitution: "Конституция Австрийской империи"
 imperial_diet_constitution_reason: "После того как коронные земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] покорно отказались от своей незаконной автономии в пользу двора, [Concept('concept_government', 'правительство')] империи стало подвергаться всё большей критике. Разгневанные националисты и либералы требуют большей автономии и #bold более радикальных реформ#! системы власти, установленной законом «[GetLawType('law_monarchy').GetName]». Народ жаждет стабильности. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], в своей щедрости и милосердии, предложил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] кабинету созвать в столице, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], представителей всех народов империи для совместного обсуждения #bold Учредительного собрания#!.\n\n#bold Новая конституция#! преобразует нашу политическую систему в более демократическую, в соответствии с пожеланиями либералов, чтобы успокоить настроения в регионах. В то же время нам необходимо работать над созданием постоянного общего парламента, состоящего из представителей разных частей империи.\n\nЦентральное правительство и парламент должны принять и претворить в жизнь #bold конституцию#! на всей территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], чтобы юридически закрепить новые отношения между бывшими коронными землями и центральным правительством. В то же время эта конституция определит #bold будущее политическое устройство#! империи."
 has_finish_aus_crown_tt: "Завершена [concept_journal_entry] «#bold Австрийская корона#!»"
 has_finish_aus_crown_2_tt: "Представители со всех концов империи будут созваны для обсуждения федеральной конституции."
 imperial_diet_constitution_complete_tt: "Учредительное собрание успешно завершило свою работу."
