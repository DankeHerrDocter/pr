 je_group_aus_imperial_affairs: "Национальный вопрос"
 imperial_national_affairs: "Национальные дела империи"
 imperial_national_affairs_reason: "#bold Согласно теории национализма#!, в империи нет ни одного народа, который можно было бы назвать #bold титульным#!. Ни немцы, ни мадьяры, ни итальянцы, ни чехи, ни славяне не обладают подавляющим численным превосходством. В условиях нарастающего национального движения это, несомненно, представляет для империи огромную опасность.\n\nВ настоящее время имперскую политику определяют в основном #bold #v $aristocrats$#! из числа немцев#!. Они гордятся своим древним австрийским происхождением и потому испытывают врождённое чувство превосходства над другими народами империи. В то же время #v $aristocrats$#!, потерпевшие поражение в политической борьбе, независимо от их происхождения, насаждают в своих владениях местечковые порядки, стремясь #bold усилить сепаратизм#! ради большей власти. В результате двор, которым правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], всё хуже справляется с управлением регионами.\n\nВозможно, нам следует #bold убедить верных Его Величеству #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!#!, чтобы они #bold пошли на компромисс во имя высшего блага империи и обеспечили равенство всех подданных нам народов.#!"
 imperial_national_affairs_status: "#N #B Решить обостряющуюся проблему [Concept('concept_discrimination', 'дискриминации')] в империи#!#!"
 imperial_national_affairs_complete_tt: "#bold Ни одна [Concept('concept_culture', 'культура')], для которой [Concept('concept_incorporated_state', 'включенная область')] является [Concept('homeland', 'родиной')], не подвергается [Concept('concept_discrimination', 'дискриминации')].#!"
 imperial_national_affairs_1_button: "Начать переговоры о компромиссе"
 imperial_national_affairs_1_button_desc: "Неудачи империи в германских делах вызвали гнев и протесты националистов внутри страны. Мы должны усмирить эти протесты. Возможно, компромисс и отмена национальной дискриминации помогут в этом."
