 wind_of_liberalism: "Ветер либерализма"
 wind_of_liberalism_reason: "Широкомасштабная волна #bold радикальных [Concept('concept_revolution', 'революций')]#! в Европе набирает силу и в нашей стране. #bold Либералы#! днём и ночью устраивают шествия и протесты в наших провинциях. Бурно развивающиеся #bold националистические идеи#! представляют серьёзную угрозу для правления, которое осуществляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName].\n\nНезависимо от того, уступим ли мы требованиям этих радикалов и проведём реформы, или продолжим нашу многовековую консервативную политику, [ROOT.GetCountry.GetNameNoFlag], без сомнения, подошла к моменту, когда реформы необходимы как никогда."
 spring_time_happened: "«Весна народов» уже началась"
