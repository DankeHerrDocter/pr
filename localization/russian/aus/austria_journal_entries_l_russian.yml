 has_imperial_diet_army_tt: "Будет издан указ о наборе!"
 imperial_diet_industy_button: "Стимулировать промышленное развитие"
 imperial_diet_industy_button_desc: "Создание промышленной системы — важнейший аспект успеха Австрии. Правительство должно вмешаться и, обеспечив конкурентоспособность нашей продукции, предоставить субсидии и стимулы для промышленников."
 imperial_diet_agroculture_button: "Стимулировать развитие сельского хозяйства"
 imperial_diet_agroculture_button_desc: "Развитие сельского хозяйства — важнейший аспект стабильности Австрии. Правительство должно вмешаться и, обеспечив конкурентоспособность нашей продукции, предоставить субсидии и стимулы для фермеров."
 imperial_diet_city_button: "Модернизировать инфраструктуру"
 imperial_diet_city_button_desc: "Инфраструктура наших городов в значительной степени устарела и не соответствует нашему блестящему городскому развитию. Мы можем утвердить бюджет и выделить средства на её модернизацию."
 imperial_diet_army_button: "Объявить всеобщую мобилизацию"
 imperial_diet_army_button_desc: "Тучи войны сгущаются над империей. Раз уж все народы империи пользуются равными правами, они должны нести и равную ответственность за её безопасность. Требуем, чтобы совет немедленно собрался и издал указ о всеобщем наборе в армию!"
  #
 integrate_bosnia: "Завоевание Боснии"
 integrate_bosnia_reason: "Хотя влияние [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] с упадком турок распространилось на весь Балканский полуостров, в условиях, когда все великие державы активно расширяют свои территории, великая [ROOT.GetCountry.GetNameNoFlag] не может отставать. Мы должны официально включить Боснию и Герцеговину в состав империи, чтобы продемонстрировать непоколебимую власть, которую Вена имеет на Балканском полуострове."
  #
 aus_zweibund: "Двойственный союз"
 aus_zweibund_reason: "[SCOPE.sCountry('GER_scope').GetNameNoFlag], #bold наше братское германское государство на севере#!, ныне занимает место одной из ведущих [Concept('concept_great_power', 'великих держав')] Европы. Их промышленность развивается семимильными шагами, армия непобедима, а государственная мощь растёт с каждым днём. Хотя наша [ROOT.GetCountry.GetNameNoFlag] временно утратила былую славу ведущей державы Европы, #bold общие кровные узы и дружба#! стали связующим звеном для заключения союза с [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_TP')].\n\nНас окружают #bold враги, исполненные величайшей враждебности#!. Такие страны, как [SCOPE.sCountry('RUS_scope').GetNameNoFlag], [SCOPE.sCountry('FRA_scope').GetNameNoFlag] и [SCOPE.sCountry('TUR_scope').GetNameNoFlag], с вожделением смотрят на наши интересы в Европе, а ситуация на юге, в Италии, также неспокойна. Союз с [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_TP')] не только поможет нам #bold развить нашу зарождающуюся промышленность#!, их первоклассные #v $officers$#! также помогут нам #bold реформировать нашу [Concept('concept_army', 'армию')]#!. Что ещё важнее, союз с такой сильной державой непременно устрашит этих ничтожеств и создаст для нашей страны огромный стратегический буфер.\n\n#bold Общие кровные узы и культурные связи германского [Concept('concept_culture', 'народа')]#! объединяют наши две страны. Хотя мы и не одно государство, #bold Рейн#! и #bold Дунай#! по-прежнему будут стоять плечом к плечу, как во времена борьбы с Наполеоном!"
 aus_dip_zweibund_status: "#bold #P Общие кровные узы могут помочь в заключении [Concept('concept_alliance', 'союза')] между нашей страной и Германией.#!#!"
 aus_zweibund_possible_tt: "Принято решение подписать союзный договор по просьбе Германии"
 aus_zweibund_1_button: "Организовать визит императорской семьи"
 aus_zweibund_1_button_desc: "Императорская семья Габсбургов издревле поддерживала тесные кровные связи с князьями германских земель. Воспользуемся этим, чтобы нанести дипломатический визит в Германию и улучшить наши отношения."
 aus_zweibund_1_button_tt: "За последние 2 года визитов не проводилось"
 aus_zweibund_2_button: "Сдать в аренду тяжёлую артиллерию"
 aus_zweibund_2_button_desc: "Тяжёлые орудия производства «Шкоды» — самое известное и мощное оружие нашей армии. Эти крупнокалиберные пушки чрезвычайно эффективны при прорыве вражеских крепостей и траншей. Этим преимуществом мы можем временно поделиться с нашими союзниками-немцами."
 aus_zweibund_2_button_tt: "За последние 5 лет артиллерия в аренду не сдавалась"
 aus_zweibund_3_button: "Закупить немецкое золото"
 aus_zweibund_3_button_desc: "С укреплением немецкой марки золотые запасы Германии неуклонно растут. Мы можем воспользоваться союзническими отношениями, чтобы приобрести партию золота из их казны по выгодной цене."
 aus_zweibund_3_button_tt: "За последние 5 лет золото не закупалось"
 aus_zweibund_4_button: "Расширить медицинское сотрудничество"
 aus_zweibund_4_button_desc: "Венский медицинский университет издревле является одним из лучших в Европе, как и Гейдельбергский университет в Германии. Мы можем организовать академический обмен и стажировки между нашими больницами, чтобы способствовать техническому развитию наших стран."
 aus_zweibund_4_button_tt: "За последние 5 лет медицинское сотрудничество не расширялось"
 aus_zweibund_5_button: "Провести совместные военные учения"
 aus_zweibund_5_button_desc: "Наш союз с Германией по своей сути является военным, поэтому мы должны наладить тесное взаимодействие между нашими армиями для подготовки к войне. Хотя это и потребует некоторых расходов, польза будет несомненной."
 aus_zweibund_5_button_tt: "За последние 10 лет совместных учений не проводилось"
 aus_zweibund_6_button: "Расторгнуть Двойственный союз"
 aus_zweibund_6_button_desc: "Наш союз с Германией исчерпал себя. Пора покончить с этим союзом, противоречащим духу реальной политики. Пусть немцы убираются!"
 aus_zweibund_6_button_tt: "Это приведёт к расторжению Двойственного союза!"
 leave_zweibund_tt: "Наша страна выйдет из Двойственного союза!"
 effect_of_aus_zweibund_add_point: "Доверие увеличится на 25"
 effect_of_aus_zweibund_minues_point: "Доверие уменьшится на 50"
 aus_has_leave_zweibund: "Австрия вышла из Двойственного союза."
 aus_zweibund_button_need_50_tt: "Требуется не менее 50 доверия"
  #
 bohemia_industrialize: "Индустриализация Богемии"
 bohemia_industrialize_reason: "#bold Богемия#! со времён Средневековья была известным #bold промышленным и торговым центром#! Центральной Европы, а Прага — жемчужиной в короне Богемии. Эти земли богаты природными ресурсами, а #bold судоходство по Эльбе#! даёт Богемии все шансы стать великим промышленным центром.\n\nВена должна поддержать этот регион политически и финансово, чтобы новый богемский промышленный район процветал и стал частью растущей мощи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nЗдесь набирает силу [Concept('concept_company', 'компания')] под названием «Шкода». Её развивающееся производство #tooltippable_name #tooltip:[SCOPE.sGoods('engines_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('engines_scope').GetTextIcon][SCOPE.sGoods('engines_scope').GetCustom('RU_GL_RP')]#!#!, #tooltippable_name #tooltip:[SCOPE.sGoods('steel_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('steel_scope').GetTextIcon][SCOPE.sGoods('steel_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('artillery_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('artillery_scope').GetTextIcon][SCOPE.sGoods('artillery_scope').GetCustom('RU_GL_RP')]#!#! обладает хорошим техническим потенциалом. При необходимости [Concept('concept_government', 'правительство')] может инвестировать в неё."
 bohemia_industrialize_status: "Превратить Богемию в мощный двигатель промышленного развития нашей страны"
 wien_industrialize: "План застройки Вены"
 wien_industrialize_reason: "#V Вена#! — одна из древнейших столиц Европы. Здесь издавна располагается резиденция, в которой живёт [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и знать, и здесь же находятся такие исторические дворцовые комплексы, как #B Шёнбрунн и Хофбург#!.\n\nОднако города империи стремительно растут. За пределами блестящего внутреннего города, #V Вена#! #B уже давно перегружена:#! городские стены, некогда защищавшие столицу, теперь лишь #B мешают её расширению#!, а многие #B некогда незначительные деревушки вырастают из виноградников и мельниц, становясь продолжением города#!.\n\nМы должны #B объединить эту древнюю столицу с её новыми пригородами#! и с помощью #V современной промышленности#! перестроить её в истинное сердце [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: #B великий мегаполис, достойный былой славы и чести.#!"
 wien_industrialize_status: "Объединить старый город Вены с прилегающими пригородами в новый мегаполис"
 great_flood_of_pest: "Великое наводнение в Пеште"
 great_flood_of_pest_reason: "#V Прорыв дамбы весной 1838 года#! стал настоящей катастрофой для и без того обветшалого Пешта. Подъём воды в #V Дунае#! затопил почти весь город. Беженцы надеются, что Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] примет особые меры для спасения их родного города и #B после наводнения восстановит его.#!"
 great_flood_of_pest_status: "#R Мощное наводнение обрушилось на город Пешт#!"
 budapest_industrialize: "Восстановление Будапешта"
 budapest_industrialize_reason: "Когда #V великое наводнение 1838 года#! отступило, в Пеште остались лишь грязь и руины. Однако это бедствие дало нам прекрасную возможность восстановить этот #B обветшалый старый город#! из пепла: #B дамбы должны быть восстановлены и сделаны прочнее прежнего#!; улицы будут перепланированы по рациональной сетке, а узкие переулки уступят место широким бульварам; будут проложены железнодорожные пути, газовое освещение и канализация, которые станут новой основой города.\n\n#V Будапешт#! в прошлом всегда был центром #V Венгерского королевства#!, #B и он должен сохранить этот статус#!. А для этого #B необходим новый, современный мегаполис.#!"
 budapest_industrialize_status: "Превратить Будапешт в жемчужину Венгрии"
 budapest_industrialize_complete_tt: "Ваш субъект завершил эту запись в дневнике."
 ## Сброс журнала
 memories_of_the_old: "Воспоминания о старых временах"
 memories_of_the_old_reason: "«Вы знаете, что я — потомок благочестивейших христианских императоров великой немецкой нации, католических королей Испании, эрцгерцогов Австрии и герцогов Бургундии: всю свою жизнь они оставались верными сынами Римской церкви.»\n\nВ самый тяжёлый для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] час эти заговорщики, клявшиеся нам в верности, вступили в сговор с врагами всех стран. Когда вся Европа оказалась в руках радикалов, лишь империя #yellow Габсбургов#! продолжала служить Богу в лоне [GetReligion('catholic').GetCustom('RU_RL_RP')]. Но теперь пала и она, а многие земли, по праву принадлежащие дому, захвачены предателями.\n\nГрехи неверных непременно будут искуплены. Властью Всемогущего Бога и святого Петра, главы апостолов, мы должны подняться — твёрдо и бесстрашно. Кровь смоет их тиранию, тысячи пленных братьев будут спасены из их рук, имя Христа воссияет в нашу эпоху, а наша славная история, известная всему миру, останется незапятнанной."
 event_aus_tt_a_tt: "Это поведёт нас по пути нового #G возвращения#! прежних [Concept('concept_crown_land_subject', 'коронных земель')].\nЭто #R разгневает#! европейские великие державы, довольные нынешним порядком. Пока отношения с ними не будут как минимум #G доброжелательными#!, они станут куда охотнее вмешиваться в наши [Concept('concept_diplomatic_play', 'дипломатические игры')]."
 event_aus_tt_b_tt: "Это удалит [Concept('concept_journal_entry', 'запись в дневнике')] #V «Воспоминания о старых временах»#!"
 memories_of_the_old_possible_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Австрийская корона»#!"
 memories_of_the_old_complete_tt: "Завершены 4 [Concept('concept_journal_entry', 'записи в дневнике')] #B «Возвращение»#!"
 status_memories_of_the_old_1: "#O #B Вернуть коронные земли, которыми Габсбурги правили в прежние времена#!#!"
 status_memories_of_the_old_2: "Старая империя всё ещё вне нашей досягаемости"
 memories_of_the_old_silesia: "Возвращение Силезии"
 memories_of_the_old_silesia_reason: "Утрата #yellow Силезии#! стала итогом несправедливой #B Войны за австрийское наследство#!, когда эти земли достались королю #yellow Пруссии#!. Новое поражение в #V Семилетней войне#! вынудило императрицу Терезию уступить северным наглецам древнее владение Богемской короны. Теперь империя вернулась, и прежний позор должен быть смыт."
 memories_of_the_old_lowland: "Возвращение Западных Нидерландов"
 memories_of_the_old_lowland_reason: "Западные Нидерланды, или #yellow Фландрия#!, как их называют, с самого начала нашего владычества были северной жемчужиной Империи. Но затем их уступили в ходе расчётов и сделок, затеянных #B корсиканским чудовищем#! и великими державами. Власти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] больше не потерпят, чтобы наследие дома присваивали чужаки: мы должны вернуть свой #V имперский лен#!."
 memories_of_the_old_italy: "Возвращение Неаполя"
 memories_of_the_old_italy_reason: "Неаполь — естественное продолжение священного дома #yellow Габсбургов#!. С тех пор как в 1734 году он оказался в руках #V Бурбонов#!, эта земля была вырвана из естественного порядка [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Империя должна наказать мятежников и вернуть то, что принадлежит нам."
 memories_of_the_old_spain: "Возвращение Испании"
 memories_of_the_old_spain_reason: "Испанский престол некогда был жемчужиной короны [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и династии #yellow Габсбургов#!. Во времена великого императора Священной Римской империи #B Карла V#! эта корона означала великий порядок, принадлежавший [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] и распростёртый по всему миру, — порядок, который когда-то называли #V империей, над которой не заходит солнце#!.\n\nПоражение в #B Войне за испанское наследство#! и #V Утрехтский договор#! 1713 года положили конец владычеству дома в Испании, но эти глупые и недальновидные мятежники должны понять: власть #yellow Габсбургов#! над ними будет восстановлена. Наша держава вечна, и мы перейдём моря и горы, чтобы вернуть корону прежних времён."
 memories_of_the_old_spain_button: "Захватить испанский престол"
 memories_of_the_old_spain_button_desc: "Притязания Габсбургов на испанский престол священны и законны, а иберийская корона неизбежно станет реальностью. Армия Империи должна действовать, даже если вмешаются европейские великие державы. Вперёд, на Мадрид!"
 memories_of_the_old_spain_button_tt: "За последние 10 лет эта мера не предпринималась"
 memories_of_the_old_spain_button_effect_tt: "Это начнёт против #yellow Испании#! [Concept('concept_diplomatic_play', 'дипломатическую игру')] #B «Установление протектората»#!. В случае #G победы#! мы сможем выбрать, восстановить ли её как [Concept('concept_crown_land_subject', 'коронную землю')] или заключить с ней [Concept('concept_personal_union', 'личную унию')].\nЭто нанесёт серьёзный #R ущерб#! нашим отношениям с европейскими великими державами и подтолкнёт их к #R противостоянию#! с нами!"
 memories_of_the_old_spain_tt: "Является родиной #tooltippable_name #tooltip:[GetCulture('spanish').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('spanish').GetCustom('RU_CUL_ADJ')|l]ой#!#! культуры"
