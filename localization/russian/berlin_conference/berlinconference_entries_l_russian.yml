 berlin_conference_north_africa: "Повестка: Раздел Алжира"
 berlin_conference_north_africa_reason: "#variable #bold Согласно принципу эффективной оккупации, страна, контролирующая более 60% провинций в этом регионе, получит 100 голосов.#!#!\n\n#variable Страны-участницы, являющиеся [Concept('concept_great_power', 'великими державами')], по умолчанию получают 2 голоса, остальные — 1 голос. Страны с несколькими [Concept('concept_claim', 'притязаниями')] получают дополнительный голос. При равенстве голосов регион отходит стране с наивысшим международным статусом.#!#!\n\n#bold Побережье Алжира#! — это плацдарм для средиземноморских держав. Здесь не только #bold плодородные прибрежные равнины и пути вглубь Сахары#!, но и ворота в сердце Африки. От древних финикийских портов и римских провинций до османских берберийских эялетов и эмиратов Магриба — кто утвердится в Алжире, тот будет властвовать над всем Магрибом. Власть Французской империи утвердилась на этих землях после «инцидента с веером», однако плодородные равнины и богатые минеральные ресурсы Северной Африки привлекают взоры всех великих держав. #bold Теперь пришло время по-новому определить принадлежность этих земель.#!"
 berlin_conference_north_africa_states: "Этот раунд конференции определит принадлежность следующих земель: #V #P Константина, Алжир, Оран, Сахара, Восточная Сахара#!#!"
 berlin_conference_west_africa: "Повестка: Раздел Западной Африки"
 berlin_conference_west_africa_reason: "#variable #bold Согласно принципу эффективной оккупации, страна, контролирующая более 60% провинций в этом регионе, получит 100 голосов.#!#!\n\n#variable Страны-участницы, являющиеся [Concept('concept_great_power', 'великими державами')], по умолчанию получают 2 голоса, остальные — 1 голос. Страны с несколькими [Concept('concept_claim', 'притязаниями')] получают дополнительный голос. При равенстве голосов регион отходит стране с наивысшим международным статусом.#!#!\n\n#bold Побережье Западной Африки#! некогда было синонимом золота и слоновой кости, а легенды о паломниках из империи Мали, соривших золотом, до сих пор живы в исламском мире. На протяжении сотен лет это был центр треугольной торговли, и побережье усеяно заброшенными фортами и следами работорговли. В то же время, здесь плодородные земли с высоким сельскохозяйственным потенциалом, а в глубине континента могут скрываться неразведанные месторождения. Кто будет контролировать Западную Африку, тот получит плацдарм в атлантической торговле и сможет протянуть свои щупальца к югу от Сахары. #bold Теперь пришло время по-новому определить принадлежность этих земель.#!"
 berlin_conference_west_africa_states: "Этот раунд конференции определит принадлежность следующих земель: #V #P Мавритании, Внутренней Мавритании, Тимбукту, Сенегала, Западного Мали, Восточного Мали, Вольты, Внешнего Хаусаленда, Гвинеи, Наветренного берега, Берега Слоновой Кости и Дагомеи#!#!."
