 berlin_conference_libya_reason: "#variable #bold Согласно принципу эффективной оккупации, страна, контролирующая более 60% провинций в этом регионе, получит 100 голосов.#!#!\n\n#variable Страны-участницы, являющиеся [Concept('concept_great_power', 'великими державами')], по умолчанию получают 2 голоса, остальные — 1 голос. Страны с несколькими [Concept('concept_claim', 'притязаниями')] получают дополнительный голос. При равенстве голосов регион отходит стране с наивысшим международным статусом.#!#!\n\n#bold Ливия#!, расположенная между Средиземным морем и Сахарой, с древних времён является транспортным узлом и торговыми воротами. Её прибрежные города, такие как Триполи и Бенгази, контролируют коридор из Северной Африки на Ближний Восток. Несмотря на засушливый климат, оазисы и подземные воды образуют внутренние пути, подходящие для создания сетей снабжения и факторий. Этот регион долгое время был вилайетом Триполитанией в составе #variable Османской империи#!, и её претензии на сюзеренитет до сих пор не были полностью отвергнуты международным сообществом. Если конференция отвергнет власть Османов, страна-победительница неизбежно столкнётся с сопротивлением турок. #bold Теперь пришло время по-новому определить принадлежность этих земель.#!"
 berlin_conference_libya_states: "Этот раунд конференции определит принадлежность следующих земель: #V #P Ливия, Триполи, Ливийская пустыня#!#!"

