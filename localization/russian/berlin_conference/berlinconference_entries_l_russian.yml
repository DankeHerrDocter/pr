 berlin_conference: "Берлинская конференция"
 berlin_conference_reason: "#variable Каждый раунд конференции продлится 2 месяца. Все страны-участницы смогут голосовать в течение этого периода, чтобы повлиять на раздел региона.#! \n\n#V #P Страны с большей вероятностью будут голосовать за себя при наличии важных интересов, и за дружественные страны с хорошими отношениями — при их отсутствии.#!#! #V #N Они откажутся голосовать за страны с плохими отношениями или высокой дурной славой!#!#!\n\nПо мере того как исследователи, компании и правительства разных стран всё глубже проникают в Африку, #variable раздел континента#! идёт полным ходом, и на этой тёмной земле почти не осталось незавоёванных территорий.\n\nЧтобы как можно скорее разделить эти #variable «последние рубежи»#! и по возможности сохранить мир и координацию в африканских делах, полномочные представители правительств [SCOPE.sCountry('berlin_conference_gbr_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_fra_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_bel_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_ger_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_por_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_spa_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_1_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_2_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_3_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_4_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_5_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_6_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_8_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_7_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_9_power').GetNameNoFlag] и других стран приняли приглашение и прибыли в Берлин. Они готовятся #bold заключить надёжное международное соглашение о разграничении африканских территорий и распределении сфер влияния, надеясь надолго обеспечить мир в африканских делах во всём мире.#!"
 berlin_conference_complete_tt: "Достигнуто соглашение о разделе #V #P Алжира, Западной Африки, Экваториальной Африки, Камеруна, Нигера-Ганы, Того, Конго, Анголы, Северной Родезии, Мозамбика, Юго-Западной Африки, Восточной Африки, Кении, Южной Африки и Ливии#!#!."
 berlin_conference_15_states: "Следующий раунд конференции будет посвящён разделу #V #P Западной Африки#!#!"
