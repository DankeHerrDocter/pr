l_russian:
  #
 joi_flavor_colony.1.t: "Берлинская конференция"
 joi_flavor_colony.1.d: "Чтобы определить справедливое разграничение территорий и сфер влияния в Африке, могущественные колониальные империи мира — [SCOPE.sCountry('berlin_conference_gbr_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_fra_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_bel_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_ger_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_por_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_spa_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_1_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_2_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_3_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_4_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_5_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_6_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_8_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_7_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_9_power').GetNameNoFlag] и другие — собрались в Берлине на масштабную международную конференцию для координации своих действий в африканских делах."
 joi_flavor_colony.1.f: "«Интерес, который цивилизованные нации проявляют к материальному освоению Африки, обеспечивает их сотрудничество в задаче регулирования торговых отношений в Африке, а практика сдерживания коммерческих конфликтов на основе равной конкуренции уже доказала свою эффективность в Азии».\n\n«Мы уверены, что все приглашённые правительства разделяют общее стремление приобщить коренные народы Африки к цивилизации, для чего необходимо открыть внутренние районы Африки для международной торговли, предоставив африканскому населению средства для образования и самопросвещения».\n\n«Правительства, участвующие в этих консультациях, уверены в том, что смогут предложить державам схему сотрудничества, основанную на равных правах и сбалансированных интересах, которая, с соответствующими изменениями, будет применима и к Африке. Все державы, осуществляющие суверенитет или имеющие сферы влияния в бассейне реки Конго, должны взять на себя ответственность за защиту и поддержку миссионерской деятельности и всех институтов, направленных на просвещение и цивилизацию коренных народов, а также на то, чтобы они поняли и оценили блага цивилизации».\n\n«Внимание, которое страны-участницы этой конференции уделяют цивилизационному развитию Африки, — внимание, проявленное в смелых исследовательских экспедициях, коммерческой деятельности, а также в жертвах и усилиях, приложенных для достижения вышеуказанных целей, — гарантирует успех нашей цивилизаторской миссии»."
 joi_flavor_colony.1.a: "Африка — это великолепный торт, и мы должны получить свой кусок."
 joi_flavor_colony.1.b: "Стоит нам лишь взяться за перо, и родится новая граница!"
  #
 joi_flavor_colony.2.t: "Берлинский трактат"
 joi_flavor_colony.2.d: "Представители стран-участниц, в числе которых [SCOPE.sCountry('berlin_conference_gbr_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_fra_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_bel_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_ger_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_por_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_spa_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_1_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_2_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_3_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_4_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_5_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_6_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_8_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_7_power').GetNameNoFlag], [SCOPE.sCountry('berlin_conference_9_power').GetNameNoFlag] и другие, рассмотрели и приняли общий трактат. В соответствии с территориальными актами, он устанавливает международное публичное право в Африке, обязательства по суверенитету, равенству в торговле и отмене рабства."
 joi_flavor_colony.2.f: "«Во имя Всемогущего Бога, чрезвычайные и полномочные представители Их Величеств и Высочеств договаривающихся сторон, стремясь в духе взаимных консультаций создать наиболее благоприятные условия для развития торговли и цивилизации в Африке, обеспечить всем народам свободное судоходство по двум главным африканским рекам, впадающим в Атлантический океан, и предотвратить возможные в будущем недоразумения и споры по поводу приобретения новых владений на африканской территории, подписали настоящее соглашение:\n\nПри распространении принципа свободы торговли на восточные территории, страны-участницы принимают на себя обязательства только в отношении самих себя, и этот принцип применяется только к территориям, в настоящее время принадлежащим какому-либо независимому суверенному государству, и только с согласия этого государства.\n\nНи одно государство, осуществляющее или имеющее намерение осуществлять суверенитет на вышеуказанных территориях, не должно предоставлять на этих территориях никаких монополий или привилегий в области торговли. Иностранцы в отношении личности и имущества, а также в ведении торговли, должны пользоваться равным обращением и правами с подданными данного государства, без каких-либо различий.\n\nЧтобы обеспечить новые гарантии безопасности для торговли и промышленности и, путём поддержания мира, способствовать цивилизационному развитию стран, упомянутых в первой статье и подпадающих под режим свободы торговли, высокие договаривающиеся стороны, подписавшие настоящий протокол, уважают суверенитет и нейтралитет территорий или частей территорий вышеуказанных стран. Все договаривающиеся стороны соглашаются совместно защищать законные права этих государств»."
 joi_flavor_colony.2.a: "Солнце [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] освещает Тёмный континент и отныне оно никогда не зайдёт!"
  #
 joi_flavor_colony.3.t: "Алжирский акт"
 joi_flavor_colony.3.d: "После переговоров между странами-участницами Берлинской конференции, границы алжирских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.3.f: "«Разграничение Алжира, определённое настоящим протоколом, включает: от побережья Средиземного моря на 36°45' северной широты, от западной части Орана вдоль северных склонов Большого Атласа на восток до долины Буг-Зеггаль к востоку от города Алжир; его восточная граница проходит от 36°30' северной широты вдоль гор Джурджура на восток, через Тизи-Узу, до 35°10' северной широты и 7°20' восточной долготы, где она соединяется с тунисским хребтом; южная граница проходит по водоразделу на северной окраине гор Орес и Ахаггар, от 33°20' северной широты до края оазисов между Туггуртом и Уарглой и, наконец, заканчивается на северной линии Сахары»."
 joi_flavor_colony.3.a: "Приемлемый договор."
 joi_flavor_colony.3.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.4.t: "Западноафриканский акт"
 joi_flavor_colony.4.d: "После переговоров между странами-участницами Берлинской конференции, границы западноафриканских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.4.f: "«Настоящий протокол определяет границы прибрежного региона Западной Африки: его западная граница начинается в точке впадения в Гвинейский залив на 1°00' восточной долготы и следует по побережью на восток до 3°15' восточной долготы, оттуда на север, вдоль основного русла реки Вольта и её водораздела до 10°10' северной широты; северная граница определяется южными возвышенностями притоков реки Биримба и проходит с запада на восток через внутренние холмы до долины реки Бенуэ; восточная граница начинается на возвышенностях перед слиянием рек Кофи и Нигер и возвращается к побережью вдоль водораздела на 5°30' восточной долготы; южная граница — побережье Атлантического океана»."
 joi_flavor_colony.4.a: "Приемлемый договор."
 joi_flavor_colony.4.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.5.t: "Центральноафриканский акт"
 joi_flavor_colony.5.d: "После переговоров между странами-участницами Берлинской конференции, границы центральноафриканских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.5.f: "«Настоящий протокол определяет границы центрального региона Экваториальной Африки: северная граница начинается на 8°20' северной широты и следует по основному руслу реки Шари и её притокам на запад до долины реки Логон; восточная граница определяется водоразделом между верховьями реки Уэле и истоками Нила и доходит до 28°10' восточной долготы; южная граница проходит от слияния рек Убанги и Мбому, вдоль их южного берега до 16°30' восточной долготы; западная граница возвращается к северной границе по водоразделу долин рек Санга и Нгоко»."
 joi_flavor_colony.5.a: "Приемлемый договор."
 joi_flavor_colony.5.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.6.t: "Камерунский акт"
 joi_flavor_colony.6.d: "После переговоров между странами-участницами Берлинской конференции, границы камерунских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.6.f: "«Границы региона Камерун, определённые настоящим протоколом, проходят: западная граница — от Гвинейского залива на 8°50' восточной долготы, вдоль побережья на север до залива Виктория; северная граница — вдоль южных склонов плоскогорья Адамава до 9°20' северной широты; восточная граница — по водоразделу притоков реки Мбере, горам Нганга и холмистой местности верховьев реки Мбому; южная граница — от холмов верховьев реки Ньонг и гор между бассейнами рек Вури и возвращается к побережью»."
 joi_flavor_colony.6.a: "Приемлемый договор."
 joi_flavor_colony.6.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.7.t: "Нигерский акт"
 joi_flavor_colony.7.d: "После переговоров между странами-участницами Берлинской конференции, границы нигерских провинций и Ганы были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.7.f: "«Разграничение Нигера, определённое настоящим протоколом: северная граница начинается на 14°20' северной широты и следует по водоразделу южных склонов плато Аир на восток до края плато Билма; восточная граница определяется возвышенностями верховьев восточного берега реки Нигер между 10°10' и 10°50' восточной долготы; южная граница поворачивает на юго-запад от среднего течения реки Нигер на 10°00' северной широты и следует по извилистым притокам южного берега до истоков притоков Вольты; западная граница возвращается к начальной точке северной границы по водоразделу между котловиной Масина и плато Гундам на 1°20' восточной долготы»."
 joi_flavor_colony.7.a: "Приемлемый договор."
 joi_flavor_colony.7.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.8.t: "Тоголезский акт"
 joi_flavor_colony.8.d: "После переговоров между странами-участницами Берлинской конференции, границы региона Того были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.8.f: "«Настоящий протокол определяет границы прибрежной зоны Того и её внутренних холмистых районов: южная граница — побережье Гвинейского залива, простирающееся от 0°30' до 1°50' восточной долготы; западная граница определяется средним и нижним течением реки Моно, простираясь от 6°00' северной широты на север до южных склонов гор Атакора; северная граница проходит по 10°30' северной широты с запада на восток через плато Пана и долину реки Оти; восточная граница простирается с севера на юг по водоразделу верховьев притоков реки Оти и заканчивается на побережье в 1°50' восточной долготы в устье реки Ани»."
 joi_flavor_colony.8.a: "Приемлемый договор."
 joi_flavor_colony.8.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.9.t: "Конголезский акт"
 joi_flavor_colony.9.d: "После переговоров между странами-участницами Берлинской конференции, границы конголезских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.9.f: "«Все регионы в бассейне реки Конго и её притоков, определённые настоящим протоколом, ограничены горами смежных бассейнов, в частности бассейнами рек Ниари, Огове, Шари и Нил на севере, восточным водоразделом притоков озера Танганьика на востоке и горами бассейнов рек Замбези и Лог на юге. Северная граница проходит по 2°30' параллели северной широты, от побережья до пересечения с географическим бассейном Конго, но не затрагивая бассейн Огове. Южная граница проходит по руслу реки Лог до её истока, а оттуда поворачивает на восток до пересечения с географическим бассейном Конго. Таким образом, она включает все регионы, по которым протекают река Конго и её притоки, включая озеро Танганьика и его восточные притоки»."
 joi_flavor_colony.9.a: "Приемлемый договор."
 joi_flavor_colony.9.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.10.t: "Ангольский акт"
 joi_flavor_colony.10.d: "После переговоров между странами-участницами Берлинской конференции, границы ангольских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.10.f: "«Настоящий протокол определяет границы юго-западного африканского региона Ангола: западная граница — побережье Атлантического океана, простирающееся от 5°30' до 17°40' южной широты у северной оконечности пустыни Намиб; северная граница определяется рекой Конго и её притоком Кванго, от 13°20' до 16°00' восточной долготы; восточная граница проходит по водоразделу плато Бие, от верховьев реки Кванго на юг до истока реки Кунене; южная граница определяется рекой Кунене, от её истока до пересечения с северной границей пустыни Намиб, возвращаясь к конечной точке на побережье»."
 joi_flavor_colony.10.a: "Приемлемый договор."
 joi_flavor_colony.10.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.11.t: "Мозамбикский акт"
 joi_flavor_colony.11.d: "После переговоров между странами-участницами Берлинской конференции, границы мозамбикских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.11.f: "«Настоящий протокол определяет границы восточноафриканского прибрежного региона Мозамбик и бассейна реки Замбези. Восточная граница — побережье Индийского океана, от 10°40' до 23°10' южной широты у залива Делагоа; северная граница проходит от устья реки Рувума по её основному руслу до 11°00' северной широты; западная граница определяется восточным берегом озера Ньяса, рекой Шире и водоразделом восточных возвышенностей притоков Замбези; южная граница проходит по холмистой местности северного берега реки Лимпопо и возвращается к побережью на 33°00' восточной долготы»."
 joi_flavor_colony.11.a: "Приемлемый договор."
 joi_flavor_colony.11.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.12.t: "Юго-Западноафриканский акт"
 joi_flavor_colony.12.d: "После переговоров между странами-участницами Берлинской конференции, границы намибийских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.12.f: "«Границы Юго-Западной Африки, определённые настоящим протоколом: западная граница — побережье Атлантического океана, между 17°40' и 29°30' южной широты; северная граница проходит по верховьям реки Кунене до водораздела истоков притоков Окаванго; восточная граница определяется холмистой местностью западной окраины пустыни Калахари, простираясь от 20° до 27° южной широты; южная граница проходит от устья реки Оранжевой по основному руслу реки до 18°50' восточной долготы, затем поворачивает вглубь материка, соединяясь с возвышенностями Калахари»."
 joi_flavor_colony.12.a: "Приемлемый договор."
 joi_flavor_colony.12.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.13.t: "Восточноафриканский акт"
 joi_flavor_colony.13.d: "После переговоров между странами-участницами Берлинской конференции, границы восточноафриканских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.13.f: "«Настоящий протокол определяет границы региона Восточной Африки до побережья Индийского океана и озера Танганьика. Восточная граница проходит от Индийского океана на 4°50' северной широты, вдоль побережья на юг до 10°20' южной широты; северная граница простирается от 4°40' северной широты по водоразделу гор Улугуру и подножия Килиманджаро до северного берега озера Виктория; западная граница определяется восточным берегом озера Танганьика и водоразделом истоков реки Руфиджи; южная граница проходит по реке Рувума и её южным притокам до мозамбикского хребта»."
 joi_flavor_colony.13.a: "Приемлемый договор."
 joi_flavor_colony.13.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.14.t: "Кенийский акт"
 joi_flavor_colony.14.d: "После переговоров между странами-участницами Берлинской конференции, границы кенийских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.14.f: "«Настоящий протокол определяет границы региона Кении и Уганды: восточная граница — побережье Индийского океана, от 3°50' до 5°20' северной широты; северная граница — от 36° восточной долготы, вдоль восточного берега озера Туркана и водораздела гор северной части Восточно-Африканской рифтовой долины до 5°00' северной широты; западная граница определяется северо-восточным берегом озера Виктория и горами верховьев реки Нзоя; южная граница проходит по плато Нгоронгоро и горам Чиалу, возвращаясь к побережью»."
 joi_flavor_colony.14.a: "Приемлемый договор."
 joi_flavor_colony.14.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.15.t: "Южноафриканский акт"
 joi_flavor_colony.15.d: "После переговоров между странами-участницами Берлинской конференции, границы южноафриканских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.15.f: "«Границы прибрежного и высокогорного региона Южной Африки, определённые настоящим протоколом: южная граница — южное побережье между Атлантическим и Индийским океанами, от 17°00' до 33°30' восточной долготы; западная граница — по основному руслу верховьев реки Оранжевой и водоразделу её северных высокогорий; северная граница определяется юго-восточной окраиной плато Калахари и возвышенностями Мафикенга; восточная граница проходит по главному хребту Драконовых гор до побережья Наталя»."
 joi_flavor_colony.15.a: "Приемлемый договор."
 joi_flavor_colony.15.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.16.t: "Северородезийский акт"
 joi_flavor_colony.16.d: "После переговоров между странами-участницами Берлинской конференции, границы замбийских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.16.f: "«Настоящий протокол определяет границы верховьев реки Замбези и высокогорного региона Северной Родезии: северная граница определяется южным берегом озера Танганьика, котловиной Капута и горами Мбоко, простираясь с запада от 30°00' восточной долготы; восточная граница определяется водоразделом притоков реки Луапула и возвышенностями Лунды; южная граница — основное русло реки Замбези и её южные холмистые берега, от 14°30' северной широты до 23°00' восточной долготы; западная граница соединяется с истоками притоков Касаи по водоразделу котловины Кабинды»."
 joi_flavor_colony.16.a: "Приемлемый договор."
 joi_flavor_colony.16.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_colony.17.t: "Ливийский акт"
 joi_flavor_colony.17.d: "После переговоров между странами-участницами Берлинской конференции, границы ливийских провинций были чётко зафиксированы в меморандуме к соглашению. Все страны поставили свои подписи и печати, согласившись с тем, что он является неотъемлемой частью итогового международного трактата."
 joi_flavor_colony.17.f: "«Настоящий протокол определяет границы региона Ливии: северная граница — южное побережье Средиземного моря, от 10°10' до 25°30' восточной долготы; западная граница — по песчаным дюнам Сахары к западу от оазиса Джуфра, от 30°40' до 25°00' южной широты; восточная граница определяется возвышенностями Киренаики и линией оазисов, граничащих с Египтом; южная граница — водораздел между плато Феццан и южной Сахарой, проходящий с запада на восток через сердце пустыни до оазиса Куфра»."
 joi_flavor_colony.17.a: "Приемлемый договор."
 joi_flavor_colony.17.b: "Это победа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"