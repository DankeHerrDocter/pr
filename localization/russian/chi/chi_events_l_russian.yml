l_russian:
  #
 joi_flavor_chi.1.t: "Доклад о великом плане самоусиления"
 joi_flavor_chi.1.d: "Призывы к изучению западных технологий при дворе звучат всё громче. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] получил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] доклад с предложениями по реформам, составленный видным сановником от лица сторонников самоусиления."
 joi_flavor_chi.1.f: "«Западные державы, используя весь интеллект нации, развивают земледелие, торговлю и ремёсла. Опираясь на коммерческую мощь, они содержат армию и флот, защищая сельское хозяйство и промышленность.\n\nГосударство не может быть сильным без армии; чтобы иметь отборные войска, способные ответить на любой вызов, необходимо их обучать. Войска не могут обучаться без средств; чтобы расширить источники дохода, необходимо развивать торговлю. Но если армией и финансами не будут управлять достойные люди, то сколько ни говори об обучении и управлении, не будет ни боеспособной армии, ни надёжных финансов. Поэтому необходимо воспитывать таланты».\n\n«То, в чём преуспели западные люди, — принципы математики, законы физики, методы создания механизмов, — всё это основано на практичности и изложено в книгах. Из них переведена лишь десятая или двадцатая часть. Необходимо прочитать все непереведённые книги, чтобы постичь их тайны и от грубых основ перейти к тонкостям.\n\nРазве мудрость и ум нашего Срединного государства уступают западным? Если найдутся знатоки западных языков, которые посвятят себя передаче знаний, то все премудрости пароходов и огнестрельного оружия постепенно станут нам понятны, что, несомненно, поможет Китаю на пути к самоусилению»."
 joi_flavor_chi.1.a: "Путь к истокам лежит через самоусиление. А путь к самоусилению — через обучение армии."
 joi_flavor_chi.2.t: "Китайская сущность, западное применение?"
 joi_flavor_chi.2.d: "По мере того как реформаторское движение набирает обороты, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] узнал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] о бесконечных спорах при дворе о «китайском учении» и «западном учении»."
 joi_flavor_chi.2.f: "В резиденциях высших чиновников, в залах дворца и даже перед самим Сыном Неба не утихают споры. Большинство сторонников самоусиления считают, что западные естественные науки и технологии — лишь средство для укрепления политической системы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Некоторые полагают, что достаточно лишь изучить военное дело. По их мнению, в основе всего должны лежать китайские этические нормы и учения, дополненные западными методами для достижения богатства и силы, без реформирования самой системы.\n\nДругие же настаивают на более широком изучении передовых западных технологий и институтов. Часть радикалов даже считает, что необходимо провести «полную вестернизацию» и встать на путь конституционной монархии. Каково же будущее Поднебесной?"
 joi_flavor_chi.2.a: "Конфуцианские традиции — это прошлое. Наша страна нуждается в полной вестернизации."
 joi_flavor_chi.2.b: "Мудрость предков — вот основа управления нашей Поднебесной."
 joi_flavor_chi.3.t: "Конец движения за самоусиление"
 joi_flavor_chi.3.d: "После отмены целого ряда указов, движение за самоусиление, столкнувшись с противодействием консерваторов, было официально прекращено."
 joi_flavor_chi.3.f: "В начале правления, в период опеки, прилагались все усилия для процветания государства, и среди советников было много мудрых мужей, что давало надежду на возрождение. После смерти первого советника Вэньсяна, Шэнь Гуйфэнь и другие, следуя его примеру, завоевали доверие государя своей преданностью и в делах придерживались справедливости. Хотя им не хватало опыта старшего поколения, они всё же служили образцом. Однако во время франко-китайской и японо-китайской войн страна столкнулась с внешними угрозами и внутренними смутами. Вдовствующая императрица Цыси, устав от дел, занялась обустройством садов и парков, предаваясь развлечениям, и государственная дисциплина постепенно ослабла. Вэн Тунхэ долгое время состоял в Военном совете и пользовался особым расположением. Ли Хунчжан ценился за свою осмотрительность, а князь Гун — за свою решительность. Среди них суетился Вэн Тунхэ, и его усердие было заметно. В целом, благодаря их усилиям по сглаживанию углов, удавалось избегать серьёзных проблем. Однако из-за разногласий во взглядах борьба группировок перекинулась на дворцовые дела и продолжалась десятилетиями, и даже мудрые мужи не могли избежать упрёков."
 joi_flavor_chi.3.a: "Наша Поднебесная так богата, зачем нам подражать каким-то западным варварам?"
 joi_flavor_chi.4.t: "Консерваторы выступают против западного учения"
 joi_flavor_chi.4.d: "На очередном придворном совете один из видных чиновников, представляющий #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, выступил с резкой речью."
 joi_flavor_chi.4.f: "«Думаю, все присутствующие здесь коллеги понимают, что нет ничего не унизительного в том, что делают сторонники самоусиления, и нет ничего не варварского в том, что делают реформаторы. Угрозу от внешних врагов понимает даже самый простой крестьянин, но если позволить этим предателям разлагать двор, Небо непременно покарает их.\n\nНаши предки усердно сражались и установили законы, твёрдые, как сталь. Разве можно их менять? Западные варвары одержали лишь временную и незначительную победу. Как мы можем учиться у них, если их ноги не сгибаются для коленопреклонения? Срединное государство, существующее под взором Небес, должно следовать законам Неба. Даже если кровь прольётся на три чи, изящество учёного-конфуцианца не должно померкнуть.\n\nЯ верю, что Ваше Величество мудры и храбры, и не можете не понимать этой истины. Вас лишь ослепили эти злодеи, и вы не видите истинного положения дел. Умоляю вас, Ваше Величество, откройте глаза и узрите этих министров, что подобны шакалам и волкам!»"
 joi_flavor_chi.4.a: "Разве диковинные безделушки варваров могут сравниться с великим путём священного учения Поднебесной?"
 joi_flavor_chi.4.b: "Наш двор по-прежнему должен изучать ремёсла и техники варваров."
 joi_flavor_chi.4.c: "Они не смогут противостоять голосу подданных, которые становятся всё богаче!"
  #
 joi_flavor_chi.5.t: "Статус конфуцианства"
 joi_flavor_chi.5.d: "По мере развития реформаторского движения, [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] поставили под сомнение официальный статус конфуцианства."
 joi_flavor_chi.5.f: "«Государство, возрождая управление, заимствует и западные методы, ибо установление власти для блага народа — общее дело для Китая и Запада, а западные методы могут восполнить наши пробелы. Ныне учёные мужи, не зная о заморских странах, говорят, будто там нет никаких правил. Они не знают, что все западные установления в основном направлены на просвещение народа и приумножение его достатка. Лучшие из них способны облагородить нрав и продлить жизнь. Блага для народа преумножаются безгранично. Мы денно и нощно трудимся, преобразуя всё, и не ради погони за новизной, но из заботы о наших подданных, дарованных нам Небом и предками. Если не обеспечить им всем благополучие и согласие, наш долг не будет исполнен. К тому же, иноземные державы теснят нас со всех сторон. Если не перенять их сильные стороны, мы не сможем сохранить то, что имеем. Наши помыслы полны великих трудов, но простой народ ещё не знает о них. Виной тому нерадивые чиновники и консервативные учёные, неспособные донести нашу волю. Они лишь распространяют пустые слухи, смущая и пугая народ. Даже старики в глухих деревнях, опирающиеся на посохи, не слышали о новых реформах, о чём мы глубоко сокрушаемся. Ныне мы объявляем о смысле реформ всей Поднебесной, дабы народ уразумел наши помыслы и понял, что на своего государя можно положиться. Когда верхи и низы будут едины сердцем, новые реформы свершатся, и Китай станет сильным. На это мы возлагаем величайшие надежды»."
 joi_flavor_chi.5.a: "Именно этого мы и желали, но не смели просить."
 joi_flavor_chi.5.b: "Нет! Нельзя отрекаться от своих корней!"
 joi_flavor_chi.6.t: "Консерваторы захватывают двор"
 joi_flavor_chi.6.d: "Сегодня ранним утром вдовствующая императрица внезапно вернулась из Летнего дворца в Запретный город. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], реформатор, был[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] заключён[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] под домашний арест, после чего был издан указ о регентстве."
 joi_flavor_chi.6.f: "«О, никак это второй господин? Что же вы сегодня на рынке делаете?»\n«Да вот, вдовствующая императрица головы рубить будет, я пришёл поглазеть».\n«Так это и есть те самые реформаторы? А с виду-то — одна голова, две руки, ничего особенного».\n«А то! Люди как люди, что ж им, с двумя головами быть! Эй, слыхали, говорят, и университеты те тоже закрыли... Ба, совсем забыл спросить, третий господин, а вы-то сами как тут очутились?»\n«Да так, ребёнок дома захворал, лекаря позвал. Говорит, если кровь бунтовщика на пампушку намазать да съесть, то поможет. А где ж в обычный день бунтовщика-то сыщешь? Вот, подвернулся случай, нельзя было упускать!»"
 joi_flavor_chi.6.a: "Обезглавить этих реформаторов и выставить их головы на площади!"
 joi_flavor_chi.7.t: "Конец системы государственных экзаменов"
 joi_flavor_chi.7.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], при поддержке реформаторов, положил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] конец тысячелетней системе государственных экзаменов."
 joi_flavor_chi.7.f: "«Времена трудные, и срочно нужны меры для самоусиления. Чиновники как в столице, так и на местах придерживаются старых порядков. Ранее мы уже издавали указ, призывая их заниматься современными делами и не повторять ошибок династий Сун и Мин. Но обновление — дело великое, и пунктов в нём множество. Приходится собирать мнения многих и находить компромисс. Министры, обсуждающие дела, должны тщательно всё взвешивать, не прикрываясь классическими текстами и не цепляясь за старые идеи ради личной выгоды. Если они будут лишь на словах соглашаться, а в душе противиться, это пойдёт вразрез с нашим стремлением к истине. Мы, глубоко понимая необходимость перемен, начали всё это из крайней нужды. Посему обращаемся к вам, министры: очистите свои сердца, избавьтесь от предрассудков, дабы верхи и низы были едины. Тогда государство обретёт покой, а правление будет процветать»."
 joi_flavor_chi.7.a: "Продолжить реформу нашей системы управления."
 joi_flavor_chi.7.b: "Просвещение народа — вот истинное средство контроля над чиновниками."
 joi_flavor_chi.8.t: "Конец Военного совета"
 joi_flavor_chi.8.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], при содействии реформаторов, реорганизовал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] кабинет министров, после чего Военный совет, хоть и сохранился формально, фактически прекратил своё существование."
 joi_flavor_chi.8.f: "Военный совет, некогда учреждённый императором Юнчжэном, предком нашего правителя, был распущен по воле его потомка.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] смотрел[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на ворота Военного совета, с волнением вспоминая тот вечер, когда [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] обсуждал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] это с [SCOPE.sCharacter('chi_intelligentsia_leader_scope').GetFullName]. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Она', 'Он')] не знал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')], что подумают о [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ней', 'нём')] предки в ином мире, и не станет ли [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она', 'он')] тем «недостойным правителем», о котором в детстве говорил учитель, и как к этому отнесётся вдовствующая императрица.\n\nТем временем лидеры #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, едва сдерживая волнение, но сохраняя внешнее спокойствие, уже планировали следующий этап реформ: «В ходе реформ [ROOT.GetCountry.GetNameNoFlag] обретёт вечную славу»."
 joi_flavor_chi.8.a: "При дворе должны быть услышаны голоса новых подданных."
 joi_flavor_chi.8.b: "Ваше Величество, следует избегать гнева шэньши."
 joi_flavor_chi.8.c: "Перед лицом перемен, невиданных за пять тысяч лет, мы должны смело идти вперёд!"
  #
 joi_flavor_chi.9.t: "Торговый устав"
 joi_flavor_chi.9.d: "[ROOT.GetCountry.GetNameNoFlag] и [SCOPE.sCountry('GBR_scope').GetNameNoFlag] подписали новый договор, который предоставляет льготные условия британским чиновникам, приглашённым в Главное таможенное управление для надзора за таможенными тарифами."
 joi_flavor_chi.9.f: "«После уплаты налогов на товары, китайским купцам разрешается перевозить их по всей стране, и таможни на пути следования не могут взимать дополнительные пошлины, а лишь определённый процент от оценочной стоимости... До сих пор точный размер транзитных пошлин не был установлен, и британские купцы часто жаловались, что при перевозке товаров из внутренних районов в порты или наоборот, местные таможни устанавливают новые правила и взимают налоги по своему усмотрению, что вредит торговле. Теперь, после заключения договора, в течение четырёх месяцев во всех действующих и будущих портах консулы должны направить официальные запросы таможенным инспекторам с требованием чётко указать точный размер пошлин, подлежащих уплате на пути следования, и обнародовать эту информацию для сведения как китайских, так и британских купцов. Если британский купец, закупив товары во внутренних районах для вывоза или ввезя иностранные товары для продажи, пожелает уплатить налог единовременно, чтобы избежать многочисленных сборов на пути, ему будет разрешено сделать это».\n\n«Для местных товаров пошлина уплачивается на первой таможне на пути следования, а для британских — в порту. Выдаётся квитанция, служащая доказательством того, что на других таможнях сборы не взимаются. Размер пошлины составляет два с половиной цяня серебра со ста лянов стоимости товара. При пересмотре тарифов в Шанхае можно будет также обсудить и установить ставки для различных видов товаров. Это лишь способ избежать мелких сборов на пути, портовые таможенные пошлины по-прежнему уплачиваются в соответствии с установленными правилами, и эти два порядка не противоречат друг другу»."
 joi_flavor_chi.9.a: "Лишь государственная политика меняется."
 joi_flavor_chi.10.t: "Конференция по Договору девяти держав"
 joi_flavor_chi.10.d: "Несколько [Concept('concept_great_power', 'великих держав')], контролирующих порты [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')], собрались в столице [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')] и подписали совместный договор, провозглашающий нейтралитет каждой из стран в китайском вопросе."
 joi_flavor_chi.10.f: "Высокие Договаривающиеся Стороны согласились:\n\n«Уважать суверенитет, независимость и территориальную и административную неприкосновенность [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')]; предоставить Китаю полную и ничем не стеснённую возможность развивать и поддерживать сильное и стабильное правительство; использовать своё влияние для реального установления и поддержания принципа равных возможностей для торговли и промышленности всех наций на всей территории Китая; воздерживаться от использования условий в [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_PP')] для поиска особых прав, которые могли бы ущемить права подданных дружественных государств, и не допускать действий, наносящих ущерб безопасности таких государств...»\n\n«Правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] обязуется не применять и не разрешать на своих железных дорогах никаких несправедливых дискриминационных мер, таких как различия в тарифах и удобствах, прямые или косвенные, в отношении пассажиров, независимо от их национальности, страны отправления или назначения, а также в отношении товаров, независимо от их происхождения, владельца, страны отправления или назначения».\n\n«Независимо от национальности и владельца судов или других транспортных средств до или после их использования на китайских железных дорогах, Договаривающиеся Стороны, за исключением [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')], несут те же обязательства в отношении своих железных дорог, над которыми они или их подданные могут осуществлять любой контроль на основании какой-либо уступки, специального соглашения или иного акта»."
 joi_flavor_chi.10.a: "По крайней мере, безопасность обеспечена."
 joi_flavor_chi.10.b: "Открытие Китая пойдёт на пользу всем нам."
 joi_flavor_chi.11.t: "[SCOPE.sCountry('CHI_scope').GetNameNoFlag] просит о помощи с таможней"
 joi_flavor_chi.11.d: "Правительство [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] обратилось к нам за помощью наших передовых таможенных чиновников в управлении их таможней. Конечно, нам была обещана и выгода."
 joi_flavor_chi.11.f: "«Китайцы — это умная и образованная раса, спокойная, трудолюбивая, со своей собственной цивилизацией, китайской во всех отношениях — в языке, мыслях и чувствах. Их численность составляет около четырёхсот миллионов человек, они живут на своей территории, в стране, где они выросли, с плодородными землями и многочисленными реками, с разнообразными горами и равнинами, холмами и долинами, с различными климатическими условиями. На земле произрастает всё необходимое для нации, а под землёй скрыты нетронутые несметные сокровища».\n\n«Эта раса, после тысячелетий самодовольства и изоляции, была вынуждена под давлением обстоятельств и огромного превосходства чужеземцев вступить в договорные отношения с остальным миром. Однако они считают это унижением, знают, что не извлекут из этих отношений никакой выгоды, и надеются, что однажды [SCOPE.sCountry('CHI_scope').GetNameNoFlag] станет достаточно сильной, чтобы вернуться к прежней жизни и избавиться от любого иностранного вмешательства и вторжения со стороны [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]...»"
 joi_flavor_chi.11.a: "Нет, это угрожает нашим интересам."
 joi_flavor_chi.11.b: "Мы должны воспользоваться этой возможностью, чтобы получить доступ к китайской таможне."
  #
 joi_flavor_chi.12.t: "Отречение императора Цин"
 joi_flavor_chi.12.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], не в силах более выдерживать давление республиканцев, утром [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')] — в этот памятный день — опубликовал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] в столице указ об отречении."
 joi_flavor_chi.12.f: "«В связи с восстанием народной армии и откликом провинций, вся страна объята пламенем, а народ страдает. Мы специально направили посланников для обсуждения общей ситуации с представителями народной армии, с целью созыва Национального собрания и совместного решения вопроса о форме правления. За два месяца так и не было найдено приемлемого решения. Север и Юг разделены и противостоят друг другу. Торговля прервана, учёные мужи скитаются. Лишь потому, что форма правления не определена, народ не знает покоя.\n\nНыне сердца всего народа склоняются к республике. Южные провинции выступили с этой инициативой ранее, а северные генералы поддержали её позже. Куда устремлены сердца людей, такова и воля Неба.\n\nКак можем мы, ради величия одного рода, пренебрегать волей миллионов? Посему, видя общую тенденцию и вняв общественному мнению, мы передаём верховную власть всей нации, устанавливая республиканскую конституционную форму правления. Дабы утешить сердца тех, кто устал от смуты и жаждет мира, и в далёкой перспективе соответствовать древней мудрости о том, что Поднебесная принадлежит всем»."
 joi_flavor_chi.12.a: "Первоочередная задача республики — созыв парламента."
 joi_flavor_chi.12.b: "Принять временную конституцию и провозгласить республику!"
 joi_flavor_chi.13.t: "Посещение мавзолея Сяолин"
 joi_flavor_chi.13.d: "В 11 часов утра [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] вместе с лидерами правительства отправил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ась', 'ся')] в карете к мавзолею Сяолин. Он вспомнил о походе императора Хунъу против монголов и сравнил его с сегодняшними событиями, считая их продолжением деяний основателя династии Мин и утешением для его духа. По его мнению, это и есть великая победа #yellow китайской#! нации."
 joi_flavor_chi.13.f: "«Увы! Внешние угрозы преследовали нашу страну с древних времён. В конце династии Сун её сменили монголы, и Срединное государство погрузилось во мрак почти на сто лет. Наш великий император Хунъу восстал в своё время, очистил Срединную землю, и солнце и луна снова засияли, а горы и реки были возрождены. Его великое дело восстановления справедливости стало примером для будущих поколений. К несчастью, в последние годы правления династии Мин начались смуты, и государственная мощь ослабла, чем и воспользовались маньчжуры, захватив Срединную землю.\n\nО, наши соотечественники, отцы и братья! Вы восставали и падали на протяжении двухсот шестидесяти восьми лет. Увы! И дух нашего великого императора Хунъу скорбел и страдал все эти двести шестьдесят восемь лет. В год Синьхай, в восьмой луне, в Учане поднялось восстание, и была основана республика. Праведный клич разнёсся по всей Поднебесной, и за восемьдесят семь дней было освобождено семнадцать провинций. По общему согласию народа в Нанкине было учреждено временное правительство.\n\nЯ, [ROOT.GetCountry.GetRuler.GetFirstName], по своей скромной добродетели был избран временным президентом. Глядя на северо-запад, я вижу, что не все земли ещё освобождены, и с чувством вины я стою перед духом нашего великого императора Хунъу. Ныне, благодаря единству всех воинов и праведности учёных мужей, цинский двор наконец одумался и двенадцатого числа сего месяца объявил об отречении.\n\nОтныне [ROOT.GetCountry.GetNameNoFlag] полностью едина, и наши соотечественники будут вечно наслаждаться счастьем свободы. Это поистине великое дело восстановления справедливости нашим императором Хунъу, который просветил последующие поколения и позволил свершиться этому великому деянию. Лишь сегодня мы с соотечественниками осмеливаемся сказать, что не виновны перед нашим великим императором. С почтением, перед своим уходом в отставку, я от имени нации выражаю общую радость и ликование. Да узрит это наш великий император!»"
 joi_flavor_chi.13.a: "Изгнать варваров, возродить Китай!"
 joi_flavor_chi.14.t: "Армия с косичками входит в столицу"
 joi_flavor_chi.14.d: "Воспользовавшись политическим хаосом в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], Чжан Сюнь, лидер бывшей цинской армии Динъу, устроил в Пекине переворот и провозгласил реставрацию старого императора, всё ещё проживавшего в Запретном городе."
 joi_flavor_chi.14.f: "«Когда решение было принято, из внутренних покоев вынесли придворные одежды. С почтением переодевшись, они отправились в цинский дворец. Было уже три стражи. Всего на аудиенцию отправилось более пятидесяти человек. Военных возглавлял Чжан, а гражданских — Кан. Среди военных, кроме Вана, Цзяна, Чэня и У, было ещё двадцать адъютантов Чжана; среди гражданских — Лю Тинчэнь, Шэнь Цзэнчжи, Лао Найюань, Гу Юань, Жуань Чжуншу и ещё более двадцати человек. Только Чжан Сюнь ехал в паланкине до самых ступеней зала Чжунхэ. Там он остался сидеть в паланкине. Из ворот Цяньцинмэнь также в паланкине выехал император Сюаньтун. У ступеней Гу Юань помог Сюаньтуну выйти из паланкина и подойти к ступеням, а затем помог Чжан Сюню сойти с паланкина. Чжан Сюнь был одет в синий халат из газа и жёлтую куртку, а Сюаньтун — в жёлтый халат из газа и куртку, на голове — осенняя шапка, покрытая красным шёлком. Они поднялись в зал. Чжан и Кан повели за собой чиновников, и все пали ниц, совершив тройное коленопреклонение и девять земных поклонов»."
 joi_flavor_chi.14.a: "Наказать мятежников!"
 joi_flavor_chi.15.t: "Реставрация монархии!"
 joi_flavor_chi.15.d: "Юань Шикай, лидер Бэйянской клики, укрепив своё положение в Пекине, сегодня по просьбе народа принял титул императора, восстановил монархию и объявил об отмене республиканского строя в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_chi.15.f: "«В пятый месяц года Жэнь-цзы, народ, сострадая ужасам войны, позволил старым цинским чиновникам искупить свою вину и с полной искренностью вручил временное правительство Юань Шикаю. Повсюду разносились вести: прекратить войну, успокоить народ и заняться строительством — вот великое дело милосердия и справедливости. Наш народ с полной искренностью уповал на Юаня. И чем же Юань отплатил народу? Война Синьхай пролила кровь на тысячи ли. Люди любят жизнь, так почему же они пошли на это? Если бы они знали, что тирания Юаня будет ещё хуже, чем у Цин, зачем бы им было проливать кровь десятков тысяч, чтобы один человек стал императором!\n\nОни были готовы умереть без сожаления, ибо поклялись быть с республикой до конца. Ныне Юань нарушил прежние клятвы и силой установил монархию. Он распустил органы самоуправления, и у простого народа не осталось покоя. Он распустил парламент, и в стране не осталось праведного слова. Он растратил казённые средства, убивал таланты и поставил страну в опасное положение. Он сфабриковал дела против членов народной партии, и многие невинные пострадали. При этих четырёх условиях страна не может не погибнуть!\n\nЕсли погибнет страна, народ станет рабом. Лишь Юань и несколько его приспешников смогут сохранить свои богатства и положение. Увы! Как же несчастен наш народ, что вверил судьбу страны Юань Шикаю! С тех пор как Юань стал президентом, в полях умирают от голода, а в столице не смолкает музыка. Страна в беде, а он не забывает о пышных церемониях. Слёзы десятков тысяч — ради короны одного. Есть ли в его сердце хоть слово «республика»?\n\nРаз он попрал республику, он — враг народа. Мы, совершившие когда-то эту огромную ошибку из великого милосердия и справедливости, как можем не пойти на трудности и не поклясться убить этого врага народа, чтобы спасти наш народ? Куда направлена справедливость, там нет непреодолимых преград. Призываем всех патриотов объединиться для этого дела!»"
 joi_flavor_chi.15.a: "Возможно, монархия всё же больше подходит Китаю?"
 joi_flavor_chi.15.b: "Мы должны защитить республику, созданную павшими героями!"
 joi_flavor_chi.16.t: "Бэйянский переворот"
 joi_flavor_chi.16.d: "То, что начиналось как раздор между двумя милитаристскими кликами, по мере обострения ситуации привело к расколу всей страны."
 joi_flavor_chi.16.f: "«Опыт последних нескольких лет показал, что империалисты и продажные милитаристы являются препятствием на пути к мирному объединению и врагами революционных сил. Поэтому, пока власть империалистов и продажных милитаристов не будет свергнута, не только не будет надежды на создание единого правительства, но и революционная база, единственная надежда Китайской Республики, окажется под угрозой совместного нападения империалистов и продажных милитаристов. Наша партия, чтобы удовлетворить единственную потребность китайского народа — создание единого правительства, и укрепить базу национальной революции, не может не выступить с оружием в руках, чтобы искоренить власть продажных милитаристов.\nНаша партия взывает к народу и избавляет страну от предателей. Успех или неудача, выгода или убыток — нас это не волнует. Мы не пожалеем никаких жертв. Наша партия, чтобы следовать стратегии, указанной нашим лидером, и исполнить свой долг, определила свою цель и готова отдать за неё жизнь.\nМы надеемся, что все соотечественники, которые в мирное время сочувствовали принципам и программе нашей партии, перенесут своё сочувствие на наше выступление, поддержат его и примут участие в нашей борьбе. Тогда свержение власти милитаристов ускорится, создание единого правительства станет более надёжным, а успех национальной революции — более близким»."
 joi_flavor_chi.16.a: "Мы не можем сидеть сложа руки, пока родина раскалывается на части!"
  #
 joi_flavor_chi.17.t: "План национального строительства"
 joi_flavor_chi.17.d: "Тысячелетняя история феодальных династий закончилась, и теперь начинается история [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] как республики."
 joi_flavor_chi.17.f: "«Неожиданно, сразу после свершения революции, в партии возникли разногласия. Говорили, что мои идеи слишком идеалистичны и не подходят для Китая. Слухи, словно плавящие металл, распространились повсюду, и даже мои соратники были сбиты с толку. Поэтому мои предложения на посту президента республики оказались менее действенными, чем во времена, когда я был революционным лидером. Вот почему строительство после революции не удалось, а после разрушения государственные дела с каждым днём становились всё хуже. Устранив деспотизм одной маньчжурской династии, мы породили бесчисленный деспотизм разбойников, который оказался ещё более ядовитым. И народ стал жить ещё хуже!\nИзначально наша партия начала революцию с целью спасти страну и народ, вывести людей из огня и воды и дать им покой. Теперь же мы, наоборот, заставили их ещё глубже погрузиться в воду и ещё сильнее обжечься огнём. Это полностью противоречит первоначальным целям революции. Конечно, это и моя вина: моей добродетели не хватило, чтобы повлиять на соратников, моих способностей оказалось недостаточно, чтобы повести за собой массы. Однако и наши товарищи по партии не могут избежать упрёка в недостаточной вере в цели и принципы революции и в нерадивом их исполнении. И причина этого не всегда в том, что они, достигнув успеха и выгоды, изменили своим идеалам, а чаще в том, что из-за идейных заблуждений их воля ослабела»."
 joi_flavor_chi.17.a: "Возрождение родины — это долгий путь."
  #
 joi_flavor_chi.18.t: "Военная академия?"
 joi_flavor_chi.18.d: "Начальник штаба главнокомандующего, посетивший с инспекцией дружественные западные страны, недавно вернулся на родину. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] принял[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] его отчёт, остался очень доволен и от имени главнокомандующего назначил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] его председателем подготовительного комитета по созданию Военной академии."
 joi_flavor_chi.18.f: "Назначенный ответственным генерал поначалу был не в восторге, но [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] упрекнул[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] его, и тот с полной отдачей занялся созданием школы.\nСегодня состоялось официальное открытие. Директор выступил с речью перед первыми курсантами в городе Гуанчжоу, в районе Вампоа. Вся стратегия развития академии будет находиться в его полном ведении. Он может сосредоточиться на обучении, повышая военную квалификацию курсантов и поощряя исследования в области вооружений, чтобы, следуя завету Отца нации, создать современную армию. Но он может также сделать упор на политико-идеологическое воспитание, чтобы создать преданную армию, укрепить свой авторитет и личную власть."
 joi_flavor_chi.18.a: "Сосредоточить усилия на военной подготовке."
 joi_flavor_chi.18.b: "Сосредоточить усилия на идеологической обработке."
 joi_flavor_chi.19.t: "Выдающийся курсант"
 joi_flavor_chi.19.d: "На недавних военных учениях особенно отличился один выдающийся курсант. [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] видят в нём будущую опору армии."
 joi_flavor_chi.19.f: "«Если Китай не сможет вырваться из окружения великих держав, то, если его и не разделят между собой, его поглотит одна из них. Сегодняшние мировые тенденции, кажется, меняются. Китайский народ, веками угнетаемый, пробудился и готов идти в ногу с мировым прогрессом. Объединится ли он для войны? Или для мира? Первое — это путь, который предлагают наши милитаристы и реакционеры, стремящиеся японизировать Китай. Если так и произойдёт, то, когда придёт время, цивилизованный мир может снова столкнуться с восстанием „боксеров“. Но создатели Китайской Республики изначально стремились к миру, поэтому я смею утверждать: использование моего пера для этого плана во имя мира будет иметь больший эффект, чем использование оружия для свержения маньчжурской династии»."
 joi_flavor_chi.19.a: "Он должен вести наши армии к победам!"
 joi_flavor_chi.19.b: "Он должен вести наш народ на защиту родины!"
 joi_flavor_chi.20.t: "Боевая подготовка?"
 joi_flavor_chi.20.d: "После некоторого периода обучения генералы нашей армии предложили провести для курсантов академии Вампоа учения в боевых условиях, иначе они станут бесполезными теоретиками."
 joi_flavor_chi.20.f: "«Множество учеников, преданных и искренних, три народных принципа — наш революционный клич. Герои революции, авангард нации, снова и снова продолжают дело павших. Товарищи по учёбе и по пути, с радостью следуем наставлениям, до конца жизни не забудем нашу школу. Кровью украсим цветы, школу сделаем домом, терпя лишения, будем строить Китай»."
 joi_flavor_chi.20.a: "Только в бою можно воспитать настоящие таланты."
 joi_flavor_chi.20.b: "Им нужно усердно учиться, а не тратить казну впустую!"
  #
 joi_flavor_chi.21.t: "Новая аграрная система"
 joi_flavor_chi.21.d: "Закон «[GetLawType('law_commercialized_agriculture').GetName]», который продвигал [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName], был принят и начал распространяться по [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_chi.21.f: "«Прежде всего, необходимо, чтобы люди могли свободно производить, продавать и покупать на рынке всё, что можно произвести или продать. Важно, чтобы возможности для занятия различными видами деятельности были открыты для всех на равных условиях, и закон не должен позволять никаким отдельным лицам или группам ограничивать это с помощью явной или скрытой силы. Любая попытка контролировать цены или количество какого-либо товара лишает конкуренцию её способности эффективно координировать усилия людей, поскольку изменения цен перестают отражать все соответствующие объективные условия и больше не служат надёжным ориентиром для действий каждого»."
 joi_flavor_chi.21.a: "Надеюсь, новые аграрные предприятия улучшат жизнь в деревне."
 joi_flavor_chi.22.t: "Движение за народные коммуны"
 joi_flavor_chi.22.d: "Закон «[GetLawType('law_collectivized_agriculture').GetName]», который продвигал [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName], был принят и начал распространяться по [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_chi.22.f: "«Земля членов коммуны должна быть передана в единое пользование сельскохозяйственному производственному кооперативу, поскольку основное условие его создания — это объединение разрозненных земельных участков для их рационального и планового использования... Особые угодья, принадлежащие членам коммуны, такие как пруды для разведения лотоса, рыбные пруды, камышовые заросли и т. п., если они достаточно велики и не подходят для индивидуального ведения хозяйства, также могут быть переданы в единое пользование кооперативу с согласия владельца. Для удовлетворения потребностей членов коммуны в выращивании овощей или других садовых культур следует разрешить им иметь небольшие приусадебные участки. Размер приусадебного участка для каждой семьи должен определяться в зависимости от числа её членов и наличия земли в данной местности, но не должен превышать пяти процентов от среднего размера земельного надела на душу населения в деревне»."
 joi_flavor_chi.22.a: "Народ не пощадит реакционеров в деревне!"
  #
 joi_flavor_chi.23.t: "«Новая молодёжь»"
 joi_flavor_chi.23.d: "Студент, вернувшийся из Японии, основал у себя дома журнал под названием «Молодёжный журнал»."
 joi_flavor_chi.23.f: "Закончив статью, которую он счёл весьма неплохой, молодой человек вышел из дома и направился в своё любимое кафе.\n«Господин Чэнь, здравствуйте! Слышал, вы недавно основали журнал под названием... „Молодёжный журнал“?»\n«Здравствуйте. Да, это так. А в чём дело?»\n«Как продажи?»\n«Это всего лишь малоизвестный журнальчик. Вместе с подаренными и обменянными экземплярами, всего около тысячи».\n«А, вот в чём дело. Мы из шанхайского отделения YMCA. Название вашего журнала совпадает с нашими журналами „Молодёжь“ и „Шанхайская молодёжь“. Если вы не смените название, мы будем вынуждены обратиться в суд».\n«Ох, прошу прощения. Я обязательно сменю название в следующем номере».\nПроводив гостя, молодой человек остался сидеть в кафе в раздумьях. «Какое же выбрать название?»\n«Назову-ка я его... „Новая молодёжь“»."
 joi_flavor_chi.23.a: "Чтобы выйти из эпохи невежества, нужно в равной мере ценить науку и права человека."
 joi_flavor_chi.24.t: "Предложения по реформе литературы"
 joi_flavor_chi.24.d: "Китайский студент Колумбийского университета написал статью для «Ежеквартального вестника иностранных студентов», а заодно отправил копию в редакцию «Новой молодёжи»."
 joi_flavor_chi.24.f: "«Сегодня многие говорят о литературной реформе. Я, скромный ученик, не смею рассуждать об этом. Однако в последние годы я много размышлял на эту тему, обсуждал её с друзьями, и пришёл к некоторым выводам, которые, как мне кажется, заслуживают внимания. Поэтому я изложил свои взгляды в восьми пунктах, чтобы обсудить их с теми, кто интересуется литературной реформой.\nЯ считаю, что сегодня литературная реформа должна начаться с восьми вещей. Каких же?\nВо-первых, писать по существу.\nВо-вторых, не подражать древним.\nВ-третьих, соблюдать грамматику.\nВ-четвёртых, не стонать без причины.\nВ-пятых, избавляться от избитых выражений.\nВ-шестых, не использовать аллюзии.\nВ-седьмых, не гнаться за параллелизмом.\nВ-восьмых, не избегать простонародных слов и выражений»."
 joi_flavor_chi.24.a: "Нужна великая реформа."
  #
 joi_flavor_chi.25.t: "Убийство избранного премьера"
 joi_flavor_chi.25.d: "Новый премьер-министр, победивший на последних выборах, был убит на шанхайском вокзале неизвестным злоумышленником. Это потрясло всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_chi.25.f: "«Сегодня ночью я должен был сесть на поезд в столицу, чтобы с почтением явиться к Вашему Превосходительству.\nВ 10:45 на вокзале мне выстрелили в спину. Пуля вошла в поясницу и вышла внизу живота. Рана смертельна. С тех пор как я встал на путь служения, я всегда был осмотрителен, и хотя не избежал ошибок, никогда не наживал личных врагов.\nКогда правление Цин было несправедливым, я встал на путь реформ, но всегда следовал гуманности и справедливости, не смея преследовать личные интересы. Ныне, когда основы государства ещё не укреплены, а благосостояние народа не приумножено, я ухожу, и смерть моя полна сожалений. Умоляю Вас, господин президент, будьте искренни и справедливы, всеми силами защищайте права народа, дабы страна обрела прочную и незыблемую конституцию. Тогда и день моей смерти станет днём моего рождения. Это мои предсмертные слова, умоляю Вас, прислушайтесь к ним»."
 joi_flavor_chi.25.a: "Вся страна скорбит!"
 joi_flavor_chi.26.t: "Отказ от присяги"
 joi_flavor_chi.26.d: "Лидеры демократических партий, участвующие в заседании, отказались приносить присягу, ссылаясь на её политико-идеологическое содержание."
 joi_flavor_chi.26.f: "«Мы не во всём согласны с идеологией правящей партии и не должны быть ею связаны. Свобода вероисповедания и свобода мысли, закреплённые в проекте конституции, должны быть немедленно реализованы.\n\nМы уважаем свободу вероисповедания наших друзей из других партий и в то же время сохраняем за собой свободу мысли. Вот почему мы не участвуем в повторной присяге»."
 joi_flavor_chi.26.a: "Тогда пусть убираются!"
 joi_flavor_chi.26.b: "Следует уважать их политические взгляды."
 joi_flavor_chi.27.t: "Партийный флаг или государственный?"
 joi_flavor_chi.27.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] получил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] протест от лидеров демократических партий по поводу флагов, вывешенных перед залом заседаний. Они требуют убрать партийные знамёна."
 joi_flavor_chi.27.f: "«Сегодняшнее собрание — это собрание всей нации, а не одной партии. Если вывешивать флаг одной партии, то следует вывесить и флаги всех остальных. Предлагаем вывесить только государственный флаг, чтобы продемонстрировать верховенство закона и принцип первичности государства над правительством»."
 joi_flavor_chi.27.a: "Партия — это и есть государство!"
 joi_flavor_chi.27.b: "Государство должно быть превыше партий."
 joi_flavor_chi.28.t: "Конституция Китайской Республики"
 joi_flavor_chi.28.d: "После долгих обсуждений была принята новая конституция, которая заменила временный основной закон и стала новой конституцией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_chi.28.f: "«Особенность нашей новой конституции в том, что она гарантирует всем нашим соотечественникам основные элементы современных прав человека — достоинство и свободу личности. Эта новая конституция утверждает различные свободы всех граждан страны. Она родилась в духе свободного народа, в условиях государственного единства и свободы.\nМы считаем, что вступление в силу новой конституции — это лишь первый шаг к достижению нашей конечной цели — построению нового Китая. Но это эпохальный прогресс для нашей страны, три тысячи лет жившей в условиях самодержавия и феодального общества. Я желаю, чтобы все наши соотечественники, с верностью и энтузиазмом, сообща и усердно двигались вперёд»."
 joi_flavor_chi.28.a: "Новый день в истории республики!"
 joi_flavor_chi.29.t: "Трудовые контракты с Китаем"
 joi_flavor_chi.29.d: "После открытия границ Китая, их правительство предложило нам контракт на отправку рабочей силы."
 joi_flavor_chi.29.f: "«Ваше превосходительство, посол, вы должны знать, что китайцы всегда были трудолюбивы и усердны. Зарплата, которую требуют эти кули, о, простите, рабочие, непременно будет намного ниже средней зарплаты рабочих в вашей стране. Они готовы на всё и даже могут работать целый день за еду, и будут за это благодарны»."
 joi_flavor_chi.29.a: "Нам нужны такие рабочие."
 joi_flavor_chi.29.b: "Нам не нужно такое соглашение."
  #
 joi_flavor_chi.30.t: "Нанкинский договор"
 joi_flavor_chi.30.d: "После сокрушительного поражения армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Опиумной войне, мы были вынуждены подписать унизительный договор с победителем — [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')]."
 joi_flavor_chi.30.f: "«Отныне Его Величество Император всемилостивейше дозволяет британским подданным со своими семьями и имуществом проживать для ведения торговли в городах Гуанчжоу, Фучжоу, Сямынь, Нинбо и Шанхай без каких-либо помех. Его Величество Британский Монарх назначит в эти пять городов консулов или других должностных лиц для ведения дел с местными властями от имени британских купцов. Британцы будут уплачивать пошлины и сборы в соответствии с нижеследующими правилами».\n\n«Поскольку британские торговые суда, совершая далёкие морские переходы, часто нуждаются в ремонте, им должно быть предоставлено место на побережье для ремонта судов и хранения материалов. Ныне Его Величество Император жалует остров Гонконг Его Величеству Британскому Монарху и его наследникам в вечное владение, с правом издавать законы и управлять им по своему усмотрению».\n\n«Поскольку уполномоченные министры Цинской династии несправедливо обошлись с британскими чиновниками и подданными, что потребовало отправки войск для восстановления справедливости, ныне устанавливается компенсация за военные расходы в размере двенадцати миллионов серебряных долларов, которую Его Величество Император обязуется выплатить. Однако суммы, полученные британцами в качестве выкупа за города после [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')], с одобрения Его Величества, будут вычтены из этой суммы»."
 joi_flavor_chi.30.a: "Это может стать для нас возможностью открыть глаза на мир."
  #
 joi_flavor_chi.31.t: "Прорыв дамбы в Тунвасяне"
 joi_flavor_chi.31.d: "В шестой луне пятого года правления [ROOT.GetCountry.GetRuler.GetFirstName], [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')], в уезде Ланъи префектуры Кайфэн в [SCOPE.sState('burst_state').GetStateRegion.GetCustom('RU_SL_PP')] произошёл крупный прорыв дамбы на реке Хуанхэ. Русло реки сильно сместилось на север, пройдя через провинции [SCOPE.sState('thrace_1_scope').GetStateRegion.GetCustom('RU_SL_RP')], [SCOPE.sState('thrace_2_scope').GetStateRegion.GetCustom('RU_SL_RP')] и [SCOPE.sState('thrace_3_scope').GetStateRegion.GetCustom('RU_SL_RP')]. Пострадали миллионы людей."
 joi_flavor_chi.31.f: "«В шестой луне пятого года, прорвав дамбу в Тунвасяне уезда Ланъян, река устремилась через Чанъюань и Дунмин до Чжанцю, пробила Великий канал и влилась в реку Дацинхэ, впадающую в море. Старое русло пересохло. Государь, помня о незавершённых военных действиях и нехватке продовольствия, повелел, если возможно, направить течение реки так, чтобы оно было ровным до самого моря, а ремонт прорыва в Ланъяне временно отложить».\n\n«Река уже пошла на север, и сдерживают её лишь крестьянские насыпи. О дноуглубительных работах речи не шло. Есть опасения, что русло постепенно заилится, и если устье будет хоть немного заблокировано, положение станет ещё хуже. В районе Пу и Фань раньше была Золотая дамба. Когда я был губернатором Шаньдуна, я пытался её восстановить, но вскоре её снова прорвало. Выше по течению, в уезде Кайчжоу провинции Чжили, также есть прорывы. Пока в Кайчжоу не начнутся работы, строить в Пу и Фань бессмысленно»."
 joi_flavor_chi.31.a: "Мы ничего не можем поделать."
 joi_flavor_chi.31.b: "Немедленно выделить средства на заделку прорыва!"
 joi_flavor_chi.32.t: "Хуанхэ впадает в море"
 joi_flavor_chi.32.d: "Катастрофа, связанная с изменением русла Хуанхэ, наконец миновала. Новое русло начинается в [SCOPE.sState('yellow_1_scope').GetStateRegion.GetCustom('RU_SL_PP')], протекает через [SCOPE.sState('yellow_2_scope').GetStateRegion.GetCustom('RU_SL_VP')] и [SCOPE.sState('yellow_3_scope').GetStateRegion.GetCustom('RU_SL_VP')] и впадает в море. Однако ущерб, нанесённый в ходе изменения русла, и угроза будущих наводнений остаются серьёзными."
 joi_flavor_chi.32.f: "«Способы усмирения реки сводятся к четырём вещам: изучению местности, пониманию характера воды, планированию работ и взвешиванию выгод и потерь. Но самое главное — это направление течения. Нынешний прорыв в Тунвасяне имеет ширину около десяти ли, а глубина промоины огромна. Даже в межень она превышает один-два чжана. В старом русле, ниже прорыва, глубина воды составляет два-три чжана. Если мы хотим вернуть реку в старое русло, придётся прорыть отводной канал глубиной более трёх чжанов, чтобы направить поток на восток. Но человеческие силы не безграничны, и прорыть канал глубже чем в полтора чжана уже невозможно. Как же мы сможем выкопать канал в три чжана?»\n\n«Закрыть прорыв шириной в десять ли — это неслыханно. С начала правления нашей династии прорывы на Хуанхэ не превышали трёх-четырёх сотен чжанов, и их часто прорывало снова и снова, и на ремонт уходили годы. Как же мы сможем закрыть этот прорыв и сделать его надёжным? Если поднять воду из глубины в три чжана и пустить её по руслу высотой в три чжана над землёй, то заиливание и неминуемый прорыв — это лишь вопрос времени, и любой зрячий это понимает. Даже если дамбы со временем высохнут и их отремонтируют...»"
 joi_flavor_chi.32.a: "Задача усмирения Хуанхэ теперь лежит на наших плечах."
 joi_flavor_chi.33.t: "Чудо Северного Китая"
 joi_flavor_chi.33.d: "После долгих и упорных усилий [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], река Хуанхэ была наконец полностью взята под контроль. [Concept('concept_yellow_river_flood_area', 'Зона затопления Хуанхэ')] навсегда исчезла с равнин Северного Китая. Этот многовековой кошмар #yellow ханьского#! народа наконец-то закончился. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] свершил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] то, о чём мечтали пять тысяч лет. Какое великое достижение!"
 joi_flavor_chi.33.f: "«Тогда Яо, вняв совету Четырёх владык, поручил Гуню усмирить потоп. Девять лет бушевали воды, и труд не приносил плодов. Шунь, узрев, что Гунь не справился, покарал его смертью на горе Юйшань, и вся Поднебесная сочла это деяние справедливым. Тогда Шунь возвысил Юя, сына Гуня, повелев ему продолжить дело отца. Юй же, вместе с И и Хоу-цзи, приняв волю Императора, призвал князей и простой люд возводить насыпи. Дракон Инлун чертил хвостом русла, скалы Ицюэ были рассечены, леса на горах помечены, и определены были высокие горы и великие реки».\n\n«Жёлтый Император сокрыл сокровище в недрах горы Куайцзи, в пещере глубиной в тысячу чи, запечатав её огромным камнем. Когда Юй, усмиряя воды, дошёл до Куайцзи и заночевал на хребте Хэнлин, дух ущелья Ваньвэй поднёс ему нефритовый ларец с двенадцатью свитками. Не успел Юй взять их, как четыре свитка улетели в источник, четыре — вознеслись в небо, и лишь четыре достались Юю. Развернув их, он узрел 'Карту Дуньцзя, открывающую горы'»."
 joi_flavor_chi.33.a: "Несравненное чудо нации!"
 joi_flavor_chi.34.t: "Разлив Хуанхэ в [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_chi.34.d: "Хуанхэ снова показывает признаки разлива. [TimeKeeper.GetCurrentDate.Format('d MMMM')] река прорвала дамбы и начала затоплять всю [Concept('concept_yellow_river_flood_area', 'зону затопления')]. Бесчисленные беженцы покинули свои дома."
 joi_flavor_chi.34.f: "«Когда воды из всех прорывов устремляются в озеро, в уездах Цзянду, Гаою и Баоин каждый год укрепляют дамбы, и они становятся всё выше, как и вода. Тысячи ли бурной воды бьются о тонкую линию высокой дамбы. Когда дует западный ветер, вздымая волны, один прорыв — и всё затоплено на тысячи цинов. К востоку от Цзянду, Гаою, Баоина и Тайчжоу не остаётся полей, а к северу от Синхуа — ни городов, ни домов. Другие озёра, такие как Луян и Пинван, мелки и не могут вместить столько воды».\n\n«Были строгие приказы открывать шлюзы для спуска воды, но работы были долгими и дорогостоящими, а к тому же мешали корыстные солепромышленники у побережья, и в итоге ничего не было сделано. Вода, сделав крюк, впадает в море у залива Мяовань на северо-востоке, и поля и дома в семи уездах тонут на целые годы. Едва уходит старая вода, как приходит новая»."
 joi_flavor_chi.34.a: "Будем молить Небеса о защите."
 joi_flavor_chi.34.b: "Необходимо выделить средства для помощи пострадавшим!"