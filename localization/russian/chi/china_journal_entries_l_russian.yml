 chinsese_royal_court: "Императорский двор"
 chinsese_royal_court_reason: "Шкала прогресса показывает влияние #bold доминирующей фракции при дворе.#! \n\n#bold Влияние внешнего двора#!: #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_bureaucrat_var').GetValue|0]#!; еженедельно изменяется в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_1_tooltip_advance условиями#!. \n\n#bold Влияние внутреннего двора#!: #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_emperor_var').GetValue|0]#!; еженедельно изменяется в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_2_tooltip_advance условиями#!. \n\n#bold Влияние евнухов#!: #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_eunuch_var').GetValue|0]#!; еженедельно изменяется в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_3_tooltip_advance условиями#!. \n\n#bold Влияние Восьми знамён#!: #variable [ROOT.GetCountry.MakeScope.Var('chinsese_royal_court_woman_var').GetValue|0]#!; еженедельно изменяется в соответствии со следующими #tooltippable;tooltip:[Country.GetTooltipTag],chinsese_royal_court_4_tooltip_advance условиями#!.\n\nПравление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] из столицы, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], фактически основано на сотрудничестве маньчжуров и ханьцев после завоевания Китая. Между маньчжурами и ханьцами всегда не хватало #bold взаимного доверия и равенства#!, но в силу обстоятельств они были #bold вынуждены сотрудничать#!. Поэтому при дворе, на поверхности царит спокойствие, а под водой — бурные течения.\n\nВнутренняя борьба за власть — это не только проблема маньчжуров и ханьцев. Со времён династии Мин #variable Сын Неба и учёные-чиновники правят Поднебесной совместно#!, и противоречия при дворе часто включают в себя борьбу между аристократическими и незнатными родами, и даже #bold фракционную борьбу внутри императорского клана#!. Эти группы плетут интриги ради собственных интересов, но сообща противятся попыткам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] уравновесить и ослабить их общую власть.\n\nБюрократическая структура [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], передаваемая из поколения в поколение, сегодня подобна резному столу: у каждого угла своя опора, но они не подчиняются друг другу, и если убрать хоть один угол, весь стол рухнет. [ROOT.GetCountry.GetNameNoFlag] — не единственная династия, столкнувшаяся с острой внутренней борьбой за власть. Предыдущие павшие династии преподали нам уроки о том, как уравновешивать силы в центре, и о последствиях ошибок. Чтобы сохранить #variable Небесный мандат#! и абсолютную власть [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName] в нашей Поднебесной, необходимо принять новые меры для сдерживания этих изменений..."
 status_chinsese_royal_court_bureaucrat: "#I Внешний двор обладает всей полнотой власти#!"
 status_chinsese_royal_court_emperor: "#U Внутренний двор обладает всей полнотой власти#!"
 status_chinsese_royal_court_eunuch: "#N Евнухи обладают всей полнотой власти#!"
 status_chinsese_royal_court_woman: "#O Восемь знамён обладают всей полнотой власти#!"
 status_chinsese_royal_court_always: "#P При дворе установился баланс сил#!"
 chinsese_royal_court_1_tooltip_advance: "[Concept('concept_building_level', 'Уровни')] правительственных учреждений дают #variable [Country.MakeScope.Var('chinsese_royal_court_bureaucrat_progress').GetValue|+=]#! очков"
 chinsese_royal_court_2_tooltip_advance: "[Concept('concept_legitimacy', 'Легитимность')] [Concept('concept_government', 'правительства')] даёт #variable [Country.MakeScope.Var('chinsese_royal_court_emperor_progress').GetValue|+=]#! очков"
 chinsese_royal_court_3_tooltip_advance: "[Concept('concept_popularity', 'Популярность')] монарха даёт #variable [Country.MakeScope.Var('chinsese_royal_court_eunuch_progress').GetValue|+=]#! очков"
 chinsese_royal_court_4_tooltip_advance: "[Concept('concept_budget_income_taxes', 'Налоговые поступления')] [Concept('concept_country', 'государства')] даёт #variable [Country.MakeScope.Var('chinsese_royal_court_woman_progress').GetValue|+=]#! очков"
 chinsese_royal_court_1_button: "Отстранить придворных"
 chinsese_royal_court_1_button_desc: "Влияние придворных из внешнего двора растёт с каждым днём. Для поддержания баланса при дворе мы можем целенаправленно подавить и отстранить часть чиновников."
 chinsese_royal_court_1_button_tt: "Влияние внешнего двора не менее 300"
 chinsese_royal_court_1_button_effect_tt: "Это снизит влияние внешнего двора на 250 очков."
 chinsese_royal_court_2_button: "Сократить гарем"
 chinsese_royal_court_2_button_desc: "Запрет на вмешательство гарема в политику — это завет предков. Мы должны убедиться, что наш двор по-прежнему следует этому завету."
 chinsese_royal_court_2_button_tt: "Влияние внутреннего двора не менее 300"
 chinsese_royal_court_2_button_effect_tt: "Это снизит влияние внутреннего двора на 250 очков."
 chinsese_royal_court_3_button: "Сократить число евнухов"
 chinsese_royal_court_3_button_desc: "Вмешательство евнухов в политику было недопустимо во все времена. Предыдущая династия Мин сильно пострадала от этого, и мы не должны повторять её ошибок."
 chinsese_royal_court_3_button_tt: "Влияние евнухов не менее 300"
 chinsese_royal_court_3_button_effect_tt: "Это снизит влияние евнухов на 250 очков."
 chinsese_royal_court_4_button: "Обуздать Восемь знамён"
 chinsese_royal_court_4_button_desc: "Завоевать Поднебесную с коня — одно, а управлять ею — другое. Продажные знаменосцы не подходят на роль опоры при дворе. Накажем же сурово взяточников среди них."
 chinsese_royal_court_4_button_tt: "Влияние Восьми знамён не менее 300"
 chinsese_royal_court_4_button_effect_tt: "Это снизит влияние Восьми знамён на 250 очков."
