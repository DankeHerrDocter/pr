 way_of_neisheng: "Путь внутреннего совершенства"
 way_of_neisheng_reason: "Благородный муж в бою хоть и полагается на строй, но в основе его лежит храбрость. В похоронных обрядах хоть и соблюдаются ритуалы, но в основе их лежит скорбь. В управлении хоть и ценятся знания, но в основе лежит добродетель. #bold Если основа непрочна, то не будет близости с людьми, а без близости с людьми не свершится ни одно дело.#! Поэтому правитель, управляя Поднебесной, должен сперва внимательно присмотреться к своему окружению. Если приближённые не совершенствуют свою добродетель, их ждёт порицание. Станет ли человек #bold благородным мужем, исполненным человеколюбия#!, зависит только от него самого.\n\n#bold Путь Великого учения состоит в том, чтобы проявлять светлую добродетель, быть близким к народу и стремиться к высшему благу#!. #variable Суть конфуцианства#! — в совершенствовании внутреннего мира, а не во внешних проявлениях. Если и есть в этом слава, то она ни в коем случае не от военных завоеваний. Монарх представляет Небо и правит мириадами по воле Неба, потому и зовётся Сыном Неба. Посему двор [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFirstName] должен #bold следовать воле Неба#!, осуществлять просвещённое правление, совершенствовать управление и временно прекратить споры о расширении земель.\n\nТолько когда мудрый правитель подаёт пример, устанавливая порядок через ритуал и справедливость, все люди начинают ценить доверие и стремиться к гармонии, и тогда наш [ROOT.GetCountry.GetNameNoFlag] достигнет уровня правления Трёх властителей и Пяти императоров. Только следуя #bold учению мудрецов#!, храня Дао в сердце и действуя через недеяние на благо мира, можно достичь #bold общества Великого единения#! и обеспечить нашему [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] вечное процветание."
 way_of_neisheng_1_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #variable «Движение за самоусиление»#! и #variable «Реформы»#!"
 way_of_neisheng_2_tt: "Завершена [concept_journal_entry] #variable «Синьхайская революция»#!"
 way_of_neisheng_3_tt: "Завершена [concept_journal_entry] #variable «Северный поход»#!"
