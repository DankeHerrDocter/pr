l_russian:
  #
 western_affairs_movement: "Движение за самоусиление"
 western_affairs_movement_reason: "Поражение нашего двора в #variable Опиумной войне#! потрясло всю Поднебесную. Когда-то мы были самой передовой и могущественной страной в округе, а теперь нас осаждают варвары, пришедшие невесть откуда. У них #bold передовое оружие#!, и наши храбрые и преданные воины не могут им противостоять, будучи разбитыми англичанами без всякой надежды на сопротивление.\n\nЕсли мы и дальше будем игнорировать реальность, то гибель государства не за горами. Ныне лидеры #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! требуют от двора реформ, изучения западных технологий и предметов. Наша Поднебесная должна сперва стремиться к самоусилению, а затем — к богатству.\n\nТеперь мы должны отбросить свою гордость и изучить их технологии, чтобы достичь цели — #bold «перенять мастерство варваров, чтобы управлять варварами»#!."
 western_affairs_movement_tt: "Завершить 6 #bold [Concept('concept_journal_entry', 'Записей в дневнике')] сторонников самоусиления#!"
 western_affairs_movement_status: "#bold #U Изучить западные технологии для модернизации Китая#!#!"
 western_diplomatic_affairs_movement: "самоусиление: Установление дипломатии"
 western_diplomatic_affairs_movement_reason: "С момента поражения [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в #variable Опиумной войне#! и в условиях всё более частых контактов с чужеземцами, наше государство было вынуждено пойти на уступки перед лицом их #bold мощного оружия и сильных армий#!. Прежняя #variable данническая система#! Поднебесной постепенно рушится.\n\nХотя варвары уже захватили множество прав, их конечная цель — не свержение правления двора [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Поэтому мы, наоборот, можем искать с ними сотрудничества, чтобы подавить внутреннее инакомыслие. Или использовать их противоречия для взаимного сдерживания. Однако наши традиционные #bold институты и правила для дел с варварами#! более не подходят для новых дипломатических отношений с западными державами. Наша дипломатическая система нуждается в срочной реформе."
 western_diplomatic_affairs_movement_complete_tt: "Прошло 10 лет с момента отмены закона «[GetLawType('law_closed_borders').GetName]»."
 western_diplomatic_affairs_movement_tt: "Будет учреждён Цзунли ямэнь, ответственный за иностранные дела."
 western_diplomatic_affairs_movement_button: "Отменить морской запрет"
 western_diplomatic_affairs_movement_button_desc: "Морской запрет, введённый в #bold двенадцатом году правления императора Шуньчжи#!, в нынешних условиях, когда наши морские границы часто подвергаются нападениям, уже неактуален. Однако за этим запретом стоят огромные контрабандные интересы чиновников-шэньши. Отмена этого завета предков, несомненно, вызовет их гнев."
 western_industry_affairs_movement: "самоусиление: Развитие промышленности"
 western_industry_affairs_movement_reason: "«Чтобы возродить наш [ROOT.GetCountry.GetNameNoFlag], необходимо сперва развить промышленность. Если промышленность не будет развита, то и самоусиления не будет».\n\nТак называемые западные пушки и ружья на самом деле не так уж и страшны. Наша Поднебесная уже давно использует огнестрельное оружие. Но западное оружие отличается высоким качеством изготовления и невиданной скоростью производства. Поэтому, чтобы победить западные державы, необходимо сперва создать #bold промышленную систему, способную производить качественное оружие.#!"
 western_industry_affairs_movement_tt: "Новые промышленники станут твёрдой опорой движения за самоусиление!"
 western_railway_affairs_movement: "самоусиление: Строительство железных дорог"
 western_railway_affairs_movement_reason: "В железных дорогах на самом деле нет ничего удивительного — это всего лишь пути, сделанные из железа. Но поезда, которые по ним ходят, — это действительно полезная диковинка. Однако поезд не может двигаться по обычной дороге. Чтобы эта диковинка пришла в движение, необходимо проложить рельсы. Ныне в западных странах полным ходом идёт строительство железных дорог. Если наш [ROOT.GetCountry.GetNameNoFlag] хочет идти по пути самоусиления, то он также должен #bold строить железные дороги.#!"
 western_railway_affairs_movement_tt: "Строительство железных дорог будет способствовать укреплению внутренних связей в нашей стране."
 western_army_affairs_movement: "самоусиление: Обучение новой армии"
 western_army_affairs_movement_reason: "Подумать только, нашей #variable системе государственных экзаменов#! уже тысяча лет, и сколько же выдающихся военачальников она породила! Но сегодня ни один #bold военный цзюйжэнь#! или #bold воин Восьмизнамённой армии#! во всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] не владеет западным оружием и не превосходит европейскую военную тактику. Однако суть западного оружия и тактики также происходит из Поднебесной. Раз уж они превзошли своего учителя, то и нам не зазорно последовать завету Конфуция и, скрепя сердце, обучить новую армию по западному образцу."
 western_army_affairs_movement_tt: "Создание новой армии будет способствовать дальнейшему продвижению движения за самоусиление."
 western_navy_affairs_movement: "самоусиление: Реформа флота"
 western_navy_affairs_movement_reason: "Уроки #variable Опиумной войны#! показывают, что флот, способный выполнять задачи по #bold обороне побережья#!, чрезвычайно важен. Вспомним династию Мин: её флот господствовал на морях, и никто не мог ему противостоять. Сегодняшний флот [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], хоть и превосходит флот Мин, всё же уступает таким странам, как [SCOPE.sCountry('GBR_scope').GetNameNoFlag]. Раз уж западные державы пришли с моря, то Великая Цин должна построить настоящий [Concept('concept_fleet', 'флот')], превосходящий флоты всех западных стран, чтобы защитить покой Поднебесной."
 western_navy_affairs_movement_tt: "Создание нового флота будет способствовать дальнейшему продвижению движения за самоусиление."
 western_education_affairs_movement: "самоусиление: Вестернизация образования"
 western_education_affairs_movement_reason: "#bold Мудрец сказал: «Учиться и не размышлять — напрасно терять время, размышлять и не учиться — губительно».#! Наш двор с самого основания придавал большое значение экзаменам и обучению чиновников. Однако #variable система государственных экзаменов#! в последние годы всё реже даёт #bold таланты, способные управлять государством#!, из-за чего нам не хватает специалистов по западным технологиям. Университеты и система государственного образования, принятые в Европе - превосходны и воспитывают множество талантов. Нашему двору не мешало бы поучиться у них и попробовать основать несколько школ нового образца."
 western_education_affairs_movement_tt: "Люди, получившие образование нового образца, станут важной опорой движения за самоусиление."
  #
 imperial_examination_system: "Система государственных экзаменов"
 imperial_examination_system_reason: "Суть правления — в обретении достойных людей. Если они есть — правление процветает, если их нет — оно приходит в упадок. #variable Система государственных экзаменов#! зародилась тысячу лет назад, во времена династий #bold Суй и Тан#!, развилась при Сун и достигла зрелости при Мин и Цин. Её цель — отбор талантов из простого народа путём многоступенчатых экзаменов. За тысячу лет эта система постоянно менялась, но её суть оставалась неизменной: отбор талантов на основе #bold «Четверокнижия» и «Пятикнижия»#!, невзирая на происхождение.\n\n#variable Система государственных экзаменов#! — это лестница для простолюдинов, ведущая к вершинам власти, и испытание для талантов, желающих служить отечеству. Династии сменяли друг друга, но каждая из них через #bold экзамены#! находила бесчисленное множество талантов, чьи имена сияют в реке истории. Наш [ROOT.GetCountry.GetNameNoFlag] — не исключение.\n\nСо времён, когда #bold наш предок Шуньчжи вошёл за Великую стену#!, [ROOT.GetCountry.GetNameNoFlag] идеально соединила маньчжурскую и ханьскую культуры, что нашло отражение и в экзаменах, обеспечив чистоту правления. Однако, с проникновением западного учения, неизвестно, поставит ли это точку в истории экзаменов, или же они преобразятся и вновь обретут былую славу."
 imperial_examination_system_status: "#bold Чиновники для двора отбираются по результатам государственных экзаменов#!"
  #
 grand_council: "Военный совет"
 grand_council_reason: "В начале своего существования, при #bold императоре-предке Юнчжэне#!, #variable Военный совет#! был лишь небольшим органом в Запретном городе, созданным для ведения войны с Джунгарским ханством. Но после того, как #bold император-предок Цяньлун#! реорганизовал его, в ведение совета стали входить не только военные, но и все дела [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: от шести ведомств и храмов, коменданта столичной стражи и евнухов Управления дворцового хозяйства до пятнадцати провинций, генералов в Фэнтяне, Гирине и Хэйлунцзяне на северо-востоке, генералов в Или и Яркенде на юго-западе и дел всех вассальных государств — всё сходилось в этом органе.\n\nНо даже при этом положение #variable Военного совета#! нельзя сравнивать с #bold тремя палатами династии Тан#!. #bold Великий советник#! — не канцлер и даже не первый министр, а всего лишь член #bold личного секретариата императора#!. Поэтому, если однажды император пожелает распустить Военный совет, у великих советников будет лишь один выбор — #bold покорно подчиниться высочайшей воле.#!\n\nОднако времена меняются, и, возможно, рано или поздно Военный совет будет реорганизован и обретёт новую жизнь?"
  #
 hundred_days_reform: "Реформы [ROOT.GetCountry.GetRuler.GetFirstName]"
 hundred_days_reform_reason: "Могущество европейских держав зиждется не только на #bold передовых технологиях, но и на надёжности их институтов#!. Наш [ROOT.GetCountry.GetNameNoFlag], хоть и занимает положение Поднебесной, не избавлен от #bold продажности чиновников#! и #bold самодержавия [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]#!.\n\nВ древности Шан Ян отменил систему «колодезных полей», открыл новые земли, поощрял воинские заслуги и в итоге объединил шесть царств под властью Цинь. Ван Аньши развивал производство, обогащал государство и укреплял армию, отбирал таланты и устранял излишества, что привело к возрождению династии Сун. Чжан Цзюйчжэн своим «методом одного кнута» спас гибнущую династию Мин. Путь управления государством — это прежде всего следование примерам предков и #bold обновление существующих законов.#!\n\nРади выживания империи мы должны, подобно мудрецам прошлого, реформировать законы, искоренить пороки, покончить с тысячелетней деспотией и, следуя чаяниям всего народа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], установить #bold новую систему, основанную на демократии и науке#!, которая заменит старую."
 hundred_days_reform_tt: "Завершить 3 #variable [Concept('concept_journal_entry', 'Записи в дневнике')] реформаторов#!"
 hundred_days_reform_status: "#bold Быстро завершить реформы, чтобы предотвратить контрудар консерваторов#!"
 at_least_finish_3_western_affairs: "Завершено не менее 3 #variable [Concept('concept_journal_entry', 'Записей в дневнике')] сторонников самоусиления#!"
 hundred_days_reform_examination: "Реформаторы: Отмена системы экзаменов"
 hundred_days_reform_examination_reason: "Наш [ROOT.GetCountry.GetNameNoFlag], следуя старым порядкам династий Сун и Мин, отбирает чиновников на основе #bold «восьмичленных сочинений»#!. В годы правления Канси восьмичленные сочинения временно отменялись в пользу экзаменов по политике, но вскоре всё вернулось на круги своя. В последнее время нравы всё больше приходят в упадок, а литературный стиль — в негодность. Всё это потому, что содержание и суть #bold государственных экзаменов#! всё больше отрываются от реальности. Чиновники, прошедшие через эту закостенелую систему, уже не могут справиться с управлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] в новых внутренних и внешних условиях. Реформа должна коснуться системы отбора талантов. Необходимо #bold отменить устаревшую систему восьмичленных сочинений и государственных экзаменов#! и заменить её #variable экзаменами по западному образцу#!."
 hundred_days_reform_examination_tt: "Мы издали указ об отмене #variable системы государственных экзаменов#!."
 hundred_days_reform_examination_button: "Издать указ об отмене государственных экзаменов"
 hundred_days_reform_examination_button_desc: "Система государственных экзаменов, просуществовавшая тысячу лет, к настоящему времени прогнила и более не способна поставлять ко двору таланты, необходимые для реформ. Немедленно издать указ об отмене экзаменов, нашему двору нужны новые чиновники!"
 hundred_days_reform_council: "Реформаторы: Роспуск Военного совета"
 hundred_days_reform_council_reason: "«Преимущество конституционного правления в том, что оно чётко определяет структуру и полномочия всех государственных органов, строго пресекая их взаимное вмешательство. Это позволяет каждому органу действовать свободно, и за успех или провал дела отвечает только он сам, не перекладывая ответственность на других. Сегодняшняя главная беда Китая — это путаница в полномочиях центральных и местных властей. На первый взгляд, у всех есть свои полномочия, но на деле все уклоняются от ответственности».\n\nПолномочия #variable Военного совета#! не определены чётко, #bold великих советников#! много, и порядка нет, к тому же совет — лишь инструмент самовластия [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и всё более коснеет. Следует распустить Военный совет и, по примеру #bold западных конституционных государств#!, учредить вместо него #bold ответственный кабинет министров#!."
 hundred_days_reform_council_tt: "Мы издали указ о роспуске #variable Военного совета#!."
 hundred_days_reform_council_button: "Издать указ о роспуске Военного совета"
 hundred_days_reform_council_button_desc: "Военный совет, учреждённый императором-предком Юнчжэном, сегодня стал огромным препятствием на пути наших реформ. В нём безнаказанно орудуют всевозможные тёмные личности, и он превратился в инструмент вмешательства дворцовых клик в политику. Мы должны покончить с влиянием Военного совета на управление государством."
 hundred_days_advisory_council: "Реформаторы: Учреждение Совещательной палаты"
 hundred_days_advisory_council_reason: "Могущество западных держав кроется в их институтах. До реформ они не были сильнее нашей Поднебесной. Но преимущество их системы в том, что она объединяет правителя и народ, и они вместе управляют страной. Это делает государство сильным, а подданных — преданными.\n\nНыне, проводя реформы, мы должны учредить Совещательную палату, чтобы сплотить народ. Только так [ROOT.GetCountry.GetNameNoFlag] сможет достичь процветания."
 hundred_days_reform_on_complete_tt: "Если мы завершим не менее 5 #V [Concept('concept_journal_entry', 'Записей в дневнике')] сторонников самоусиления#!, мы станем признанной державой."
  #
 advisory_council: "Совещательная палата"
 advisory_council_reason: "#variable Совещательная палата#! — это продукт парламентской системы конституционной монархии в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Двести депутатов со всей страны собираются здесь, чтобы обсуждать государственные дела. Палата стоит выше любого бюрократического органа и обладает правом утверждать бюджет и командовать армией.\n\nКак компромисс между конституционалистами и республиканцами, Совещательная палата и [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] совместно осуществляют #bold законодательную власть#!. Теоретически это #bold высший орган власти#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], выполняющий функцию #bold совместного правления монарха и народа#!, чтобы сделать государство сильным, а подданных — преданными."
 advisory_council_1_button: "Распустить спорный кабинет"
 advisory_council_1_button_desc: "Нынешний кабинет министров не отвечает нуждам империи. Его Величество Император может, следуя воле народа, распустить его и назначить новые выборы."
 advisory_council_1_button_tt: "За последние 5 лет кабинет не распускался"
 advisory_council_2_button: "Созвать заседание Совещательной палаты"
 advisory_council_2_button_desc: "Конституция гласит, что Его Величество Император должен прислушиваться к мнению Совещательной палаты при осуществлении исполнительной власти. Возможно, мы сможем получить от парламента больше полезных советов."
 advisory_council_2_button_tt: "За последний год Совещательная палата не собиралась"
  #
 isolationist_policies: "Политика изоляции"
 isolationist_policies_reason: "Со времён династии Мин наше государство проводит строгую политику изоляции: #bold «Поднебесная богата всем, и нет нужды в товарах заморских варваров»#!. С другой стороны, идеи варварских миссионеров отравляют умы китайского народа и угрожают стабильности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nВо времена #variable императора-предка Шуньчжи#! было издано три указа о морском запрете, требовавших переселения прибрежных жителей вглубь страны и запрещавших торговлю с заморскими странами, чтобы предотвратить ущерб от набегов японских пиратов. А #variable император-предок Цяньлун#! ужесточил эту систему, строго ограничив деятельность иностранных купцов и оставив для торговли лишь #bold один порт — Гуанчжоу#!, полностью передав его под надзор #bold «Тринадцати факторий»#!.\n\nХотя эти запреты привели к фактической изоляции [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], контрабандная торговля никогда не прекращалась. Однако #variable политика изоляции#! до сих пор затрагивает интересы многих придворных и богатых купцов. Оковы #bold морского запрета и заветов предков#! прочно лежат на [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], и кажется, что в Поднебесной они сохранятся навечно."
 open_market_policies: "Политика открытых дверей"
 open_market_policies_reason: "#B #N Пока эта запись в дневнике активна, будет принудительно действовать «[GetLawType('law_free_trade').GetName]».#!#!\n\n#bold Крах пограничного контроля#! положил конец нашей прежней политике #variable изоляционизма#!, и теперь торговой политикой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] стала «[GetLawType('law_free_trade').GetName]», пришедший на смену заветам предков.\n\nОтсутствие таможни вынуждает нас мириться с торговым давлением со стороны великих держав, что ослабляет конкурентоспособность нашего внутреннего рынка и мешает развитию промышленности. Мы должны добиться отмены навязанных нам #bold торговых соглашений#!, создать новую надёжную таможню и защитить наши товары, приняв «[GetLawType('law_protectionism').GetName]»."
 open_market_policies_tt: "Завершена [concept_journal_entry] #bold «Реформа таможенной системы»#!"
 reform_chinese_customs: "Реформа таможенной системы"
 reform_chinese_customs_reason: "Наша старая таможенная система была учреждена #variable императором Канси#! на побережье Цзяннани и Фуцзяни. Однако за сотни лет #bold продажные чиновники#! прогнили насквозь, а западные [Concept('concept_great_power', 'великие державы')] наводнили рынок [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] своими товарами, не платя пошлин. Таможенная система фактически перестала существовать.\n\nТаможенные пошлины должны стать одним из крупнейших источников дохода [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Для оздоровления наших финансов необходимо изгнать всех паразитов, разлагающих таможню, создать новую рыночную и защитную систему и, путём #variable реформы таможенной системы#!, искоренить это явление."
 can_reform_chinese_customs_tt: "Имеется [concept_journal_entry] #bold «Политика открытых дверей»#!"
 finish_reform_chinese_customs_tt: "Таможенная система была реформирована с помощью иностранцев."
 reform_chinese_customs_1_button: "Нанять британских экспертов"
 reform_chinese_customs_1_button_desc: "Британцы — главные виновники Опиумной войны, но они, без сомнения, обладают самой развитой таможенной системой в мире. Улучшив отношения, мы можем попросить их направить опытных специалистов для работы в нашей таможне, чтобы искоренить коррупцию и создать более эффективную систему."
 reform_chinese_customs_1_button_tt: "Таможенники из Британии ещё не нанимались."
 reform_chinese_customs_2_button: "Нанять французских экспертов"
 reform_chinese_customs_2_button_desc: "Хотя французы часто погружены во внутренние смуты, у них также есть хорошо организованная система таможенного контроля. Улучшив отношения, мы можем попросить их направить опытных специалистов для работы в нашей таможне, чтобы искоренить коррупцию и создать более эффективную систему."
 reform_chinese_customs_2_button_tt: "Таможенники из Франции ещё не нанимались."
 reform_chinese_customs_3_button: "Нанять американских экспертов"
 reform_chinese_customs_3_button_desc: "Америка выступает за равенство интересов в нашей стране и уже выразила готовность помочь в восстановлении нашей экономики. Путём дружественных визитов и переговоров мы можем попросить их направить опытных специалистов для работы в нашей таможне, чтобы искоренить коррупцию и создать более эффективную систему."
 reform_chinese_customs_3_button_tt: "Таможенники из Америки ещё не нанимались."
 reform_chinese_customs_4_button: "Нанять немецких экспертов"
 reform_chinese_customs_4_button_desc: "Германия успешно возродила экономику своей страны с помощью протекционизма, и нам следует поучиться у них. Путём переговоров с немецким послом в Пекине мы можем попросить их направить опытных специалистов для работы в нашей таможне, чтобы искоренить коррупцию и создать более эффективную систему."
 reform_chinese_customs_4_button_tt: "Таможенники из Германии ещё не нанимались."
 reform_chinese_customs_1_monthly_tt: "Прогресс реформы таможни будет увеличиваться на 1 в месяц после их согласия."
 reform_chinese_customs_2_monthly_tt: "Прогресс реформы таможни будет увеличиваться на 0.5 в месяц после их согласия."
