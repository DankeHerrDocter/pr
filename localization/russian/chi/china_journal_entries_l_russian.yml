 xinfeng_yellow_river_diversion: "Великое изменение русла Хуанхэ 1855 года"
 xinfeng_yellow_river_diversion_reason: "Со времён #R захвата русла Хуайхэ#! во второй год правления Цзянь-янь династии #V Южная Сун#! русло Хуанхэ оставалось относительно стабильным. Однако #B недавний прорыв дамбы кардинально изменил его направление#!. Эта ужасная река пытается повернуть на север и снова впасть в Восточно-Китайское море через #yellow Шаньдун#!.\n\n#R Текущее русло Хуанхэ#!: поворачивает в [SCOPE.sState('burst_state').GetStateRegion.GetCustom('RU_SL_PP')], протекает через [SCOPE.sState('thrace_1_scope').GetStateRegion.GetCustom('RU_SL_VP')] и впадает в море в [SCOPE.sState('thrace_2_scope').GetStateRegion.GetCustom('RU_SL_PP')].\n\n#P Предполагаемое будущее русло#!: поворачивает в [SCOPE.sState('burst_state').GetStateRegion.GetCustom('RU_SL_PP')], протекает через [SCOPE.sState('thrace_4_scope').GetStateRegion.GetCustom('RU_SL_VP')] и впадает в море в [SCOPE.sState('thrace_3_scope').GetStateRegion.GetCustom('RU_SL_PP')]."
 xinfeng_yellow_river_diversion_its_time_tt: "Хуанхэ начала менять русло"
 control_the_yellow_flood: "Усмирение Хуанхэ"
 control_the_yellow_flood_reason: "#R Провинции, которые серьёзно пострадают во время #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_3_effects_tt $yellowriver_great_flood$#!#!: [GetStateRegion('STATE_HENAN').GetName], [GetStateRegion('STATE_NORTHERN_ANHUI').GetName] и [GetStateRegion('STATE_SHANDONG').GetName].\n\nСо времён #V изменения русла в 1855 году#!, #yellow Хуанхэ#! повернула и стала впадать в море через [SCOPE.sState('thrace_3_scope').GetStateRegion.GetCustom('RU_SL_VP')], смывая тысячи ли дамб и #B уничтожая бесчисленные города и поля#!. С #R разрушительной силой#! Хуанхэ пронеслась по #I Северо-Китайской равнине#!, принеся с собой [Concept('concept_famine', 'голод')], #O эпидемии#! и #O толпы беженцев#!.\n\nНа самом деле, #yellow Хуанхэ#! никогда не была спокойной рекой. Со времён #V усмирения потопа Великим Юем#! она #B славилась частыми изменениями русла и постоянными прорывами дамб#!. Династии Центральных равнин тратили бесчисленные человеческие и материальные ресурсы на борьбу с Хуанхэ, но так и не смогли окончательно усмирить эту заиленную реку. Поскольку [ROOT.GetCountry.GetNameNoFlag] теперь контролирует ключевые дамбы на #yellow Хуанхэ#!, мы #V унаследовали это тяжёлое бремя#!. #B Хотим мы того или нет, усмирение Хуанхэ стало неотложной обязанностью [Concept('concept_government', 'правительства')]#!.\n\nЭто #R долгая и почти невыполнимая задача#!. Однако если ничего не делать, Хуанхэ #B рано или поздно снова выйдет из берегов, принеся ещё более страшные бедствия, чем в прошлом#!. Мы можем лишь вкладывать больше сил и средств, используя возможности, которые дают нам новые [Concept('concept_technology', 'технологии')], и #V делать всё возможное, чтобы укротить эту дикую реку, даже зная, что однажды она снова взбунтуется#!."
 control_the_yellow_flood_complete_tt: "Шкала прогресса заполнена, #yellow Хуанхэ#! окончательно усмирена."
 control_the_yellow_flood_status: "#O Окончательно усмирить бедствие Хуанхэ, терзавшее Северный Китай тысячи лет, — хотя это почти невозможно#!"
 control_the_yellow_flood_progress_desc_integer: "#V Шкала прогресса показывает текущую степень усмирения Хуанхэ. Чем выше прогресс, тем меньше угроза во время #R разливов#!.#!"
 event_effects_joi_flavor_chi.33_tt: "Получен модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_1_effects_tt $control_the_yellow_flood_success_modifier$#!\nПравитель получает черту #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_2_effects_tt $control_the_yellow_flood_leader_modifier$#!\nБедствия Хуанхэ навсегда прекратятся, а [Concept('concept_yellow_river_flood_area', 'зона затопления Хуанхэ')] будет удалена и больше не будет нам угрожать."
 yellow_river_modifier_1_effects_tt: "[GetStaticModifier('control_the_yellow_flood_success_modifier').GetName|v]\n[GetStaticModifier('control_the_yellow_flood_success_modifier').GetDesc]"
 yellow_river_modifier_2_effects_tt: "[GetStaticModifier('control_the_yellow_flood_leader_modifier').GetName|v]\n[GetStaticModifier('control_the_yellow_flood_leader_modifier').GetDesc]"
 yellow_river_modifier_3_effects_tt: "[GetStaticModifier('yellowriver_great_flood').GetName|v]\n[GetStaticModifier('yellowriver_great_flood').GetDesc]"
 control_the_yellow_flood_goal: "Хотя Хуанхэ почти невозможно полностью усмирить, с ростом прогресса в её обуздании частота и серьёзность #R #tooltippable;tooltip:[GetPlayer.GetTooltipTag],yellow_river_modifier_3_effects_tt $yellowriver_great_flood$#!#! будут #G значительно снижены#!. #V Технологии железобетона и паровых турбин#! увеличат эффективность наших работ на 60% каждая."
 control_the_yellow_flood_1_button: "Начать ирригационные работы"
 control_the_yellow_flood_1_button_desc: "Усмирение Хуанхэ — это долгий и трудный путь. Путь в тысячу ли начинается с первого шага. Давайте снова начнём это дело, которым занимались тысячи лет."
 control_the_yellow_flood_button_stop_tt: "За последние 2 года #V ирригационные работы не прекращались#!"
 control_the_yellow_flood_1_button_effect_tt: "Каждая провинция в [Concept('concept_yellow_river_flood_area', 'зоне затопления Хуанхэ')] ежегодно будет получать от 10 до 25 ед. [Concept('arable_land', 'пахотной земли')] в зависимости от эффективности работ.\nВ зависимости от эффективности работ, ежегодный #V прогресс усмирения#! будет увеличиваться от 100 до 250."
 control_the_yellow_flood_2_button: "Прекратить ирригационные работы"
 control_the_yellow_flood_2_button_desc: "Наша казна больше не может нести расходы по усмирению Хуанхэ. Необходимо приостановить работы и вернуться к этому вопросу позже."
 control_the_yellow_flood_button_timer_tt: "За последний год #V ирригационные работы не начинались#!"
 control_the_yellow_flood_3_button: "Построить дамбу в Хуаюанькоу"
 control_the_yellow_flood_3_button_desc: "Хуаюанькоу — это важный участок на южном берегу Хуанхэ, к северу от Чжэнчжоу в провинции Хэнань. Предыдущие династии строили здесь неэффективные дамбы, но с новыми технологиями мы сможем обновить ключевые укрепления и обеспечить надёжную поддержку в усмирении Хуанхэ."
 control_the_yellow_flood_3_button_possible: "Дамба в Хуаюанькоу ещё не построена или была разрушена"
 control_the_yellow_flood_3_button_possible_1_tt: "За последние 5 лет #V дамба в Хуаюанькоу не взрывалась#!"
 control_the_yellow_flood_4_button: "Взорвать дамбу в Хуаюанькоу"
 control_the_yellow_flood_4_button_desc: "Хуаюанькоу — ключевая дамба, сдерживающая разливы Хуанхэ. Взорвав её, мы сможем эффективно остановить врага, продвигающегося вглубь Центральной равнины, но это принесёт огромные бедствия местному населению."
 control_the_yellow_flood_4_button_war_tt: "Линия фронта любого врага достигла #yellow Хэнани#!, #yellow Шаньдуна#!, #yellow Северного Аньхоя#! или #yellow Цзянсу#!."
 control_the_yellow_flood_4_button_possible: "Дамба в Хуаюанькоу уже построена"
 control_the_yellow_flood_4_button_possible_1_tt: "Дамба в Хуаюанькоу не была построена в течение последнего года"
 increase_yellow_flood_progress_tt: "#P Увеличить #!#V прогресс усмирения#! на #P 1000#!"
 decrease_yellow_flood_progress_tt: "#R Снизить #!#V прогресс усмирения#! на #R 1000#!"
 china_warlord_explosion_joi_decrease_tt: "Прогресс #V «Хрупкого единства»#! уменьшится на 1"
 china_warlord_explosion_joi_increase_tt: "Прогресс #V «Хрупкого единства»#! увеличится на 1"