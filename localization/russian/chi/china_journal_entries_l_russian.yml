 northern_expedition: "Северный поход"
 northern_expedition_reason: "#bold Раскол Бэйянского правительства#! вверг [ROOT.GetCountry.GetNameNoFlag] в ужасную междоусобную войну. Во имя единства китайской нации и победы национальной революции, воины, преданные революции, собрались в Гуандуне и поклялись начать Северный поход, чтобы отвоевать территории, захваченные милитаристами, и положить конец ужасной гражданской войне."
 china_become_broken_tt: "Милитаристы по всей стране выйдут из-под прямого контроля центрального правительства.\nМы начнём Северный поход, чтобы вернуть под контроль предавших нас милитаристов!"
 war_of_northern_expedition_tt: "Милитаристы подавлены, отколовшиеся провинции возвращены"
 war_of_northern_expedition_fail_tt: "Милитаристы вышли из-под контроля национального правительства."
  #
 roc_military_academy: "Академия Вампоа"
 roc_military_academy_reason: "После свержения монархии династии Цин мы обнаружили, что в окружении [Concept('concept_great_power', 'великих держав')] наш [ROOT.GetCountry.GetNameNoFlag] подобен ребёнку с огромным богатством в руках. Чтобы сделать страну сильной, нужно сперва укрепить армию. Без сильной армии невозможно защитить плоды [Concept('concept_revolution', 'революции')]. Этим нужно заняться немедленно.\n\nМы должны искать помощи у иностранных государств, чтобы создать #bold военную академию, способную готовить наши собственные современные военные кадры#!. Это позволит нашей армии избавиться от устаревших методов и стать силой, способной стоять на мировой арене и защищать [Concept('concept_country', 'страну')] и народ."
 roc_military_academy_tt: "Национально-революционная армия закалилась в Северном походе"
 roc_military_academy_2_tt: "Отношения с любой европейской [Concept('concept_great_power', 'великой державой')] не ниже 40"
 chi_land_reform: "Земельная реформа"
 chi_land_reform_reason: "В деревнях бывшей Цинской империи земли контролировали [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName|l], а [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName|l] были арендаторами, живя в нищете и страдании. Из-за отсталых сельскохозяйственных технологий урожайность была низкой. Отсталая земельная система стала гнойной раной, и если её немедленно не вылечить, болезнь будет только усугубляться, пока не превратится в неизлечимую язву на теле [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nРеформа #variable земельной системы#! не терпит отлагательств. Чтобы достичь цели «каждому пахарю — своё поле» и равных прав на землю, мы должны провести радикальные преобразования, чтобы освободить крестьян от ужасного гнёта. Только так мы сможем осуществить нашу мечту о сильной стране."
 chi_land_reform_tt: "Землевладельцы понесли тяжёлые потери в Северном походе"
 chi_land_reform_complete_tt: "Различные методы земельной реформы будут иметь разные последствия."
 new_culture_movement: "Движение за новую культуру"
 new_culture_movement_reason: "Шкала прогресса показывает текущую #variable степень культурных реформ#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n#variable Степень культурных реформ#! будет увеличиваться, когда [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] #concept_powerful влиятельны#! и #concept_in_government находятся у власти#!.\n\nПосле свержения монархии #bold династии Цин#! на землях [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] появилось бесчисленное множество новых идей, и [Concept('concept_culture', 'культура')] переживает расцвет. Главным лозунгом стало поклонение #bold господину Дэ и господину Саю#!, то есть призыв к #bold демократии и науке#!. Для Китая это означает избавление от оков старой эпохи и вступление в новую.\n\nПосле того как новая литература и новая мораль постепенно избавятся от #bold пережитков деспотизма#!, все верят, что долгожданные права человека и демократия сделают возможным построение нового государства и нового общества по западному образцу. #bold Сильный народ — сильная страна. Будущий [ROOT.GetCountry.GetNameNoFlag] непременно займёт достойное место в мире!#!"
 new_culture_movement_complete_tt: "Степень культурных реформ достигла 180"
 new_culture_movement_status: "#bold #U Реформировать древнюю конфуцианскую культуру и классический язык, заменив их просвещёнными политическими идеями и разговорным языком#!#!"
