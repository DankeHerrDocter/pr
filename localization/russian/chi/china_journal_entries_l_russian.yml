 yangtze_delta_industrialize: "Урбанизация дельты Янцзы"
 yangtze_delta_industrialize_reason: "С древних времён #V земли Цзяннани#! были самыми богатыми в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Как гласит пословица, #B «когда в Сучжоу и Хучжоу созревает рис, вся Поднебесная сыта»#!. Ныне, с приходом #B железных дорог, портов и новых механизмов#!, регион, центром которого является #V нижнее течение дельты Янцзы#!, стремительно превращается из традиционной сельской местности в #B ярко освещённые современные города#!.\n\n#B Торговые договоры и сеттльменты#! способствуют контактам дельты Янцзы со всем миром, а #V естественные гавани#! и #V судоходство по Янцзы#! #B придают экономическому развитию региона жизненную силу#!. Для дальнейшего содействия промышленному прогрессу и экономическому росту [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #B [Concept('concept_government', 'правительство')] обязано всеми средствами укреплять процесс урбанизации в префектурах дельты Янцзы и обеспечивать их статус как ворот #V великих торговых портов Востока#!.#!"
 yangtze_delta_industrialize_status: "Превратить превосходные порты дельты Янцзы в современную городскую агломерацию"
 hanyeping_industrialize: "Индустриализация Ханьепина"
 hanyeping_industrialize_reason: "#V коридор Ханьепин#! в провинциях Хубэй и Цзянси — это общее название для сталелитейного завода в Ханьяне, железорудного рудника в Дае и угольных шахт в Пинсяне. Со времён #V Движения за самоусиление#! заводы, возникшие здесь благодаря богатым месторождениям, постепенно стали центром новой промышленности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако по сравнению с западными [Concept('concept_great_power', 'великими державами')] это оборудование всё ещё неэффективно, управление — слабое, а производственные мощности далеко не удовлетворяют промышленные потребности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nЧтобы догнать другие [Concept('concept_great_power', 'великие державы')] мира, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] приказал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] полностью реформировать промышленную систему #V Ханьепина#! на основе #B государственно-частного партнёрства#!. Мы #B построим современные сталелитейные заводы, проложим железные дороги, соединяющие рудники с другими провинциями#!, будем поставлять сталь и сырьё для других отраслей и военной промышленности и превратим #V коридор Ханьепин#! в настоящее #B ядро тяжёлой промышленности#! южных провинций [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 hanyeping_industrialize_status: "Создать ключевой промышленный район Китая в коридоре Ханьепин"
