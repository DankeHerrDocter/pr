 beijing_and_state: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и Провинции"
 beijing_and_state_reason: "Индикатор показывает уровень #variable автономии#! #bold местных властей под управлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!.\n\n#variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! имеет долгую историю в качестве столицы. С древних времён этот величественный город был #bold важным военным и экономическим центром#!. Будь то из соображений географического удобства или политического равновесия в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], этот древний город идеально подходит на роль [Concept('concept_capital_state', 'столицы')] нашей великой [Concept('concept_country', 'страны')] и величественно возвышается, символизируя нашу власть над всей китайской землёй, но в то же время являясь #bold ареной борьбы между местными властями и центром.#! \n\nПровинции обширного Китая не подчиняются [Concept('concept_government', 'правительству')] в #variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]е#! по своей природе. Как говорили древние, #bold «Земли — это царство гор и рек, обитель народов со своими обычаями. Каждая земля имеет своё правление и свою власть»#!. Если бы не мощь центральной власти, провинции не склонили бы головы в знак покорности. Поэтому, как и все династии, правившие Китаем в прошлом, #variable [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! сталкивается с той же суровой проблемой: тысячелетиями китайское [concept_government] полагалось на различные #bold централизованные институты#! и #bold могущественные армии#!, чтобы сдерживать провинции, но эта система всегда начинала давать сбой по мере разложения чиновничества и упадка армии. Политическая обстановка, при которой провинции брали верх над центром, неизбежно означала #bold крах правления и утрату власти#!.\n\nВ наше время меры, принятые в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] со дня основания, поначалу были весьма эффективны в сдерживании провинций и учёной элиты, однако по мере ослабления центральной власти и усиления местных сил провинции стали #bold слишком сильны, чтобы ими можно было управлять#!: они постоянно бросают вызов власти #bold [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]а#! как [Concept('concept_capital_state', 'столицы')] и усиливают своё влияние по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]..."
 status_beijing_and_state_1: "#P #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] поддерживает контроль над всей страной#!#!"
 status_beijing_and_state_2: "#O #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] всё слабее контролирует отдалённые земли#!#!"
 status_beijing_and_state_3: "#O #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] издаёт указы, которые на местах исполняются лишь для вида#!#!"
 status_beijing_and_state_4: "#N #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] переживает небывалый упадок власти#!#!"
 status_beijing_and_state_5: "#N #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] практически утратил контроль над регионами#!#!"
 status_beijing_and_state_always: "#V #P #B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] обладает сильной властью#!#!"
 chinese_central_government_callpes_tt: "Регионы получат огромную власть.\nВ будущем они могут даже формально отделиться от центра!"
 chinese_central_government_will_callpes_tt: "#V Местная автономия#! #R достигла 1000#!"
 beijing_and_state_1_button: "Расширить полномочия наместников"
 beijing_and_state_1_button_desc: "Чиновники в провинциях всегда были опорой нашего правления по всей стране. Предоставив им больше власти на местах, мы можем заручиться их преданностью."
 beijing_and_state_1_button_tt: "Автономия ниже 300"
 beijing_and_state_1_button_effect_tt: "Ежемесячный прирост автономии увеличится на 4"
 beijing_and_state_2_button: "Разрешить набор войск на местах"
 beijing_and_state_2_button_desc: "Приказы о наборе из центра на местах всегда превращаются в формальность, и чиновники не выполняют их с должным усердием. Но, передав военные полномочия на места, мы сможем увеличить наши возможности по набору войск."
 beijing_and_state_2_button_tt: "Автономия ниже 500"
 beijing_and_state_2_button_effect_tt: "Ежемесячный прирост автономии увеличится на 6"
 beijing_and_state_3_button: "Ослабить цензуру"
 beijing_and_state_3_button_desc: "Стабильность нашего правления всегда зависела от контроля над крамольными речами. В предыдущей династии существовали «литературные инквизиции». Но если мы ослабим эти ограничения, наша культура и мысль смогут развиваться."
 beijing_and_state_3_button_tt: "Автономия ниже 750"
 beijing_and_state_3_button_effect_tt: "Ежемесячный прирост автономии увеличится на 2"
 beijing_and_state_4_button: "Провести тотальную проверку чиновников"
 beijing_and_state_4_button_desc: "Наше огромное и неповоротливое государство на протяжении тысячелетий было рассадником взяточничества и казнокрадства. Необходимо начать тотальную проверку этих мерзавцев, чтобы обеспечить неукоснительное исполнение законов."
 beijing_and_state_4_button_tt: "Автономия ниже 750"
 beijing_and_state_4_button_effect_tt: "Ежемесячный прирост автономии уменьшится на 2"
 beijing_and_state_var_progress_bar: "Местная автономия"
 beijing_and_state_var_progress_bar_desc: "Уровень местной автономии: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/1000)"
 beijing_and_state_var_progress_bar_1_progress: "#V Расширение полномочий местных наместников#!"
 beijing_and_state_var_progress_bar_2_progress: "#V Разрешение на местный набор войск#!"
 beijing_and_state_var_progress_bar_3_progress: "#V Ослабление цензуры#!"
