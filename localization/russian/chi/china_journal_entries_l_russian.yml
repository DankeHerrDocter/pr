 china_company_jingdezhen_character: "Императорские печи Цзиндэчжэня"
 china_company_jingdezhen_character_reason: "@porcelain!#V Фарфор#! — это #B изысканное изделие, зародившееся в нашей Поднебесной#!. Со времён династии Хань, когда фарфор стал излюбленным товаром #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, он является #B символом блестящих достижений древней #tooltippable_name [SCOPE.sCulture('han_scope').GetAdjective|l]ой#! цивилизации#!. Иногда варвары даже называют нашу страну Фарфоровой.\n\nС #B начала правления династии Мин#! в Цзиндэчжэне были основаны #V императорские печи#!, и на изделиях стали указывать девизы правления [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l]. #B Ремесло передавалось из поколения в поколение, а делами печей строго управляли государственные учреждения#!, что делало их частью государственной системы. Здесь всегда собирались #B лучшие гончары и мастера Цзиндэчжэня и всего Китая, представляя вершину китайского искусства изготовления @porcelain!#V фарфора#!.#!\n\nОднако существование императорских печей в Цзиндэчжэне, привлекавших слишком много мастеров к местному производству, привело к тому, что качество фарфора в других провинциях [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] стало неравномерным и не могло сравниться с #V изделиями из Цзиндэчжэня#!. #B Впрочем, эта система приносила казне немалый доход, и, по крайней мере, при нынешней династии она кажется выгодной.#!"
