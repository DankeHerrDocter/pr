 china_defend_korea: "Защита Кореи"
 china_defend_korea_reason: "Как Поднебесная, мы обязаны защищать нашего ближайшего северного данника — [SCOPE.sCountry('KOR_scope').GetNameNoFlag]. Хотя в современной дипломатии это и не приносит нам прямой выгоды, это необходимо для поддержания нашего #variable Небесного мандата#! и устрашения мелких соседей. В будущем это также позволит нам оказывать на них большее влияние и просвещать их как подданных Поднебесной.\n\nДля них это великая честь. Если же мы будем бездействовать, когда на них нападают непокорные варвары, [Concept('concept_legitimacy', 'легитимность')] нашего [Concept('concept_government', 'правительства')] и наше [Concept('concept_influence', 'влияние')] серьёзно пострадают."
 keep_korea_interest_tt: "Мы по-прежнему сохраняем сюзеренитет над Корейским полуостровом"
 lose_korea_interest_1_tt: "Корея пала"
 lose_korea_interest_2_tt: "Мы утратили сюзеренитет над Корейским полуостровом"
 china_defend_vietnam: "Защита Вьетнама"
 china_defend_vietnam_reason: "[SCOPE.sCountry('DAI_scope').GetNameNoFlag] хоть и не так близок нам, как [SCOPE.sCountry('KOR_scope').GetNameNoFlag], но является важным барьером на наших южных рубежах. Экспансия [Concept('concept_great_power', 'великих держав')] в Юго-Восточной Азии заставляет нас быть начеку, особенно из-за возможного сговора с ними южных вождей и наместников.\n\nВ любом случае, мы должны сделать всё возможное, чтобы не допустить этих ужасных западных варваров к нашим южным границам. Будь то для защиты юга или для сохранения шаткой #variable даннической системы#!, Вьетнам не должен достаться никому, кроме нас!"
 keep_vietnam_interest_tt: "Мы по-прежнему сохраняем сюзеренитет над Вьетнамом"
 lose_vietnam_interest_1_tt: "Вьетнам пал"
 lose_vietnam_interest_2_tt: "Мы утратили сюзеренитет над Вьетнамом"
