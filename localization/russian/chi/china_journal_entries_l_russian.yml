 national_constituent_assembly: "Учредительное национальное собрание"
 national_constituent_assembly_reason: "Шкала прогресса показывает #variable текущий прогресс обсуждения конституции#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\n«Сорок лет я посвятил национальной революции, стремясь к свободе и равенству для Китая. Сорокалетний опыт показал мне, что для достижения этой цели необходимо пробудить народные массы и объединиться в общей борьбе с теми народами мира, которые относятся к нам как к равным. Революция ещё не завершена. Все мои товарищи должны продолжать усердно работать, чтобы довести её до конца».\n\n[ROOT.GetCountry.GetNameNoFlag] сегодня оправился от гибели Цинской империи и хаоса гражданской войны, успешно создав республику. Однако истечение срока действия #variable временной конституции#! и споры о новой конституции разгораются с новой силой. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] был[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] вынужден[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] прислушаться к мнению общества и созвать в столице, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], политическую конференцию для обсуждения конституции."
 national_constituent_assembly_tt: "Учредительное собрание завершило обсуждение конституции."
 national_constituent_assembly_possible_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #variable «Синьхайская революция»#! или #variable «Северный поход»#!"
 national_constituent_assembly_status: "Идёт обсуждение в Учредительном собрании"
 national_constituent_assembly_fail_tt: "Учредительное собрание было сорвано возможным государственным переворотом"
 national_constituent_assembly_event_yes_tt: "Прогресс собрания уменьшится на 10"
 national_constituent_assembly_event_no_tt: "Прогресс собрания увеличится на 10"
  #
 chinese_labor_go_out: "Отправка рабочей силы"
 chinese_labor_go_out_reason: "Наша страна обладает #bold дешёвой рабочей силой#!, и это одно из наших преимуществ. Используя его, мы можем предоставлять наших рабочих иностранным государствам, чтобы зарабатывать валюту и обеспечивать этих людей средствами к существованию. Это выгодно для всех.\n\nХотя за границей они часто выполняют самую грязную, тяжёлую и опасную работу, мы будем помнить о них. Их сегодняшний вклад — это вклад в завтрашний день [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 chinese_labor_go_out_gbr_button: "Трудовой договор с Британией"
 chinese_labor_go_out_gbr_button_desc: "Спрос на рабочую силу в самой Британии растёт с каждым днём. Уверены, Уайтхолл не откажется от нашего предложения."
 chinese_labor_go_out_fra_button: "Трудовой договор с Францией"
 chinese_labor_go_out_fra_button_desc: "Франция уже давно страдает от нехватки рабочих рук. Париж станет отличным местом для заработка для наших рабочих."
 chinese_labor_go_out_ger_button: "Трудовой договор с Германией"
 chinese_labor_go_out_ger_button_desc: "Немцам срочно нужна рабочая сила для выполнения базовых работ. Уверены, они с радостью примут наших высококачественных рабочих."
 chinese_labor_go_out_usa_button: "Трудовой договор с Америкой"
 chinese_labor_go_out_usa_button_desc: "Америка заявляет, что приветствует иммигрантов всех национальностей, а для строительства их железных дорог срочно нужны иностранные рабочие. Там мы точно сможем заработать свой первый капитал."
 chinese_labor_go_out_aus_button: "Трудовой договор с Австрией"
 chinese_labor_go_out_aus_button_desc: "Вена славится как столица искусств. Наши рабочие, несомненно, будут рады увидеть эту великую страну."
 chinese_labor_go_out_rus_button: "Трудовой договор с Россией"
 chinese_labor_go_out_rus_button_desc: "Россия — наш «дружественный» сосед. Хотя у них нет недостатка в рабочей силе, на просторах Сибири наверняка найдётся работа для наших людей."
 chinese_labor_go_out_ita_button: "Трудовой договор с Италией"
 chinese_labor_go_out_ita_button_desc: "Экономика Италии находится на подъёме. Уверены, Рим не откажется от нашей качественной рабочей силы."
 chinese_labor_go_out_spa_button: "Трудовой договор с Испанией"
 chinese_labor_go_out_spa_button_desc: "Испания сталкивается с нехваткой рабочих в горнодобывающей промышленности, и мы можем извлечь из этого выгоду."
 chinese_labor_go_out_bel_button: "Трудовой договор с Бельгией"
 chinese_labor_go_out_bel_button_desc: "Условия труда в Бельгии превосходны. Местное правительство наверняка будет радо приезду наших рабочих."
 chinese_labor_go_out_tur_button: "Трудовой договор с Турцией"
 chinese_labor_go_out_tur_button_desc: "Экономика Турции находится на подъёме. Наши рабочие наверняка найдут там хорошую работу."
 accept_labor_agreement_tt: "Мы примем трудовой договор, предложенный китайским правительством"
 refuse_labor_agreement_tt: "Мы отклоним трудовой договор, предложенный китайским правительством"
 chinese_labor_go_gbr_tt: "За последние 5 лет трудовой договор с Британией не заключался"
 chinese_labor_go_fra_tt: "За последние 5 лет трудовой договор с Францией не заключался"
 chinese_labor_go_ger_tt: "За последние 5 лет трудовой договор с Германией не заключался"
 chinese_labor_go_usa_tt: "За последние 5 лет трудовой договор с Америкой не заключался"
 chinese_labor_go_aus_tt: "За последние 5 лет трудовой договор с Австрией не заключался"
 chinese_labor_go_rus_tt: "За последние 5 лет трудовой договор с Россией не заключался"
