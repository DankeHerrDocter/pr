 xinhai_revolution: "Синьхайская революция"
 xinhai_revolution_reason: "Шкала прогресса показывает #variable время существования#! #bold республиканского строя#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nС ночным выстрелом власть #variable императорского дома Цин#! начала рушиться. [GetLawType('law_monarchy').GetName|l], правившая китайской землёй тысячи лет, была сокрушена. Все думали, что этот день когда-нибудь наступит, но никто не ожидал, что он наступит так быстро. На фоне непопулярного правления #bold цинского правительства#! повсюду вспыхнули восстания, и в мгновение ока весь юг оказался под контролем повстанцев. Под давлением высших сановников двор, понимая безнадёжность сопротивления, #bold поспешно отрёкся от престола.#!\n\nЗа разрушением следует возрождение. В #bold революционной партии#! нет сильного лидера, способного объединить всех. #bold Монархисты#! тайно подстрекают армию, а #bold Юань Шикай, командующий сильной новой армией#!, начинает проявлять свои амбиции. [Concept('concept_great_power', 'Великие державы')], не успевшие вмешаться, наблюдают за ситуацией в новой стране. Если новорождённый [Concept('concept_revolution', 'революционный')] режим не сможет быстро утвердить свою [Concept('concept_legitimacy', 'легитимность')] и власть, то #bold эта пороховая бочка взорвётся#!, и [ROOT.GetCountry.GetNameNoFlag], возможно, погрузится в кровопролитную [Concept('war', 'войну')] и даже канет в бездну.\n\nВ условиях тайной и явной борьбы различных сил [ROOT.GetCountry.GetNameNoFlag] подобна листу, сорванному с дерева. Никто не знает, куда его унесёт ветер времени."
 xinhai_revolution_possible_1_tt: "Провалены #variable Движение за самоусиление#! и #variable реформы#!, а #variable автономия#! не ниже 400"
 xinhai_revolution_possible_2_tt: "Республиканцы захватили власть силой"
 xinhai_revolution_possible_3_tt: "[Concept('concept_turmoil', 'Беспорядки')] в [Concept('concept_capital_state', 'столице')] выше 50%, и любая [Concept('concept_interest_group', 'заинтересованная группа')] с #variable республиканским#! лидером влиятельна"
 xinhai_revolution_complete_tt: "Республиканский строй продержался более 10 лет"
 xinhai_revolution_fail_tt: "Правящее правительство раскололось.\nЕсли [Concept('concept_legitimacy', 'легитимность')] [Concept('concept_government', 'правительства')] упадёт ниже 50, антиреспубликанские силы и клики милитаристов поднимут мятеж и попытаются расколоть республику."
 allow_national_constituent_assembly: "Это позволит республике начать новые политические реформы после стабилизации обстановки."
 xinhai_revolution_fail_2_tt: "Правящее правительство нестабильно"
 old_qing_loyalists_tt: "Армия с косичками возведёт на престол императора Цин в Пекине и восстановит монархию!"
 war_of_huguo: "Война в защиту республики"
 war_of_huguo_reason: "Бэйянские милитаристы во главе с #variable Юань Шикаем#! свергли республиканский строй и, нарушив #variable временную конституцию#!, развязали гражданскую войну с целью реставрации монархии. Необходимо наказать этих предателей и защитить республиканский строй."
 war_of_huguo_tt: "Реставраторы подавлены, отколовшиеся провинции возвращены"
 war_of_huguo_event_1_tt: "Империя начнёт объединительную войну, чтобы покончить с республикой!"
 war_of_huguo_event_2_tt: "Республика начнёт войну в свою защиту, чтобы вновь объединить Китай!"
