 foreign_china_trade_power: "Торговые привилегии в Китае"
 foreign_china_trade_power_reason: "Огромный [Concept('concept_market', 'рынок')] [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] пал под натиском военной мощи нашего великого [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. #bold Несметные богатства#!, созданные половиной населения мира, живущего на этих обширных землях, теперь лежат прямо перед нами.\n\nОднако каждый участник этого пира знает, что не сможет заполучить [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_VP')] в единоличное владение. Чтобы защитить общие интересы и не дать никому взять верх, мы вынуждены собраться вместе. Раз уж так, то давайте поступим как #B цивилизованные люди#! и сядем за стол переговоров, чтобы #V разделить этот торт#!."
 nine_power_treaty: "Договор девяти держав"
 nine_power_treaty_reason: "Гордость #bold Поднебесной#! сокрушена, слава Небесного мандата померкла. Наше великое государство теперь сковано цепями закона «[GetLawType('law_free_trade').GetName]», навязанного #variable Договором девяти держав#!. Суверенитет и народ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] попраны. Варвары без конца спорят за столом переговоров, а мы, как проигравшие, можем лишь ждать решения своей судьбы. Это самые тёмные времена за тысячу лет.\n\nК счастью, варвары не едины, у каждого свои корыстные цели, что позволило нам минимизировать потери. Надежда ещё есть. Чужеземные дьяволы не смогут вечно контролировать [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Они непременно будут изгнаны. Каждое поколение китайцев будет бороться за то, чтобы [ROOT.GetCountry.GetNameNoFlag] снова стала великой."
 nine_power_treaty_possible_tt: "Более 5 [Concept('concept_great_power', 'великих держав')] или [Concept('concept_major_power', 'крупных держав')] имеют в нашей стране [Concept('concept_treaty_port', 'договорные порты')]."
 nine_power_treaty_complete_tt: "Не более 2 [concept_great_power] или [concept_major_power] имеют в нашей стране [Concept('concept_treaty_port', 'договорные порты')]."
 nine_power_china_treaty_signed_1_tt: "[concept_great_power] и [concept_major_power], имеющие в нашей стране [Concept('concept_treaty_port', 'договорные порты')], совместно подпишут соглашение, гарантирующее нашу независимость."
 nine_power_china_treaty_signed_2_tt: "Мы совместно со всеми [concept_great_power] и [concept_major_power], имеющими [Concept('concept_treaty_port', 'договорные порты')] в Китае, подпишем договор, гарантирующий его независимость."
