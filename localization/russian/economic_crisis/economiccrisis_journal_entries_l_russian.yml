l_russian:
first_economic_crisis: "Экономический кризис"
first_economic_crisis_reason: "[ROOT.GetCountry.GetNameNoFlag] переживает #R глубокий экономический кризис#!. Процветание на [Concept('concept_market', 'рынке')] рухнуло в одночасье, #B фабрики закрываются, торговля замерла, банки банкротятся#!, а бесчисленное [Concept('concept_pop', 'население')] лишилось работы и дохода. #B Безработные на улицах и голодающие семьи#! стали самой заметной картиной в стране, повсюду растут недовольство и волнения.\n\nЕсли позволить ситуации и дальше ухудшаться, #R наш государственный аппарат пошатнётся#!. Чтобы восстановить экономику и вернуть доверие народа, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и [Concept('concept_government', 'правительство')] должны принять меры: #B только решительная и эффективная политика позволит #V государству выйти из тени кризиса и вернуться на путь роста и процветания#!#!."
first_economic_crisis_status: "#B #R Биржевая паника и волна банкротств ведут к тяжёлому финансовому кризису#!#!"
first_economic_crisis_goal: "Чтобы как можно скорее преодолеть экономический кризис, вам необходимо поднять ВВП до 100% от докризисного уровня. Во время кризиса законы о #V интервенционизме и протекционизме#! #P откроют выгодные варианты#! в определённых событиях."
economic_crisis_compete_tt: "ВВП восстановлен до 100% от докризисного уровня, что успешно стабилизировало доверие на рынке"
economic_crisis_colddown_tt: "#B С момента последнего экономического кризиса прошло не менее 20 лет#!"
railway_mania_cause_crisis_tt: "#B Паника, вызванная крахом железнодорожного бума, распространилась на биржу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].#!"
economic_crisis_possible_1_tt: "#B Обвал [Concept('concept_market_price', 'рыночных цен')] у первой [Concept('concept_great_power', 'великой державы')] или второй [Concept('concept_great_power', 'великой державы')] с высоким объёмом экспорта распространился на нашу страну.#!"
economic_crisis_rank_possible_1_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @clothes!#V одежду#!, @silk!#V шёлк#! и @luxury_clothes!#V роскошную одежду#! #R #B ниже -30%#!#!"
economic_crisis_rank_possible_2_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @coal!#V уголь#!, @iron!#V железо#! и @steel!#V сталь#! #R #B ниже -30%#!#!"
economic_crisis_rank_possible_3_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @porcelain!#V фарфор#!, @glass!#V стекло#!, @furniture!#V мебель#! и @luxury_furniture!#V роскошную мебель#! #R #B ниже -30%#!#!"
economic_crisis_rank_possible_4_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @groceries!#V бакалею#!, @grain!#V зерно#! и @liquor!#V алкоголь#! #R #B ниже -30%#!#!"
economic_crisis_rank_possible_5_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @fabric!#V ткани#!, @silk!#V шёлк#! и @dye!#V красители#! #R #B ниже -45%#!#!"
economic_crisis_rank_possible_6_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @oil!#V нефть#! #P #B выше +30%#!#!, а [Concept('concept_market_price', 'цена')] на @automobiles!#V автомобили#! #R #B ниже -35%#!#!"
economic_crisis_rank_possible_7_tt: "[Concept('concept_market_price', 'Рыночная цена')] на @opium!#V опиум#!, @tea!#V чай#! и @wine!#V вино#! #R #B ниже -40%#!#!"
economic_crisis_rank_possible_8_tt: "Является [Concept('concept_incorporated_state', 'национальной областью')]"
economic_crisis_rank_possible_9_tt: "#V #B При выполнении следующих условий вступают в силу#O особые#! условия [Concept('concept_market_price', 'рыночных цен')]:#!#!\n·#V #B Вы — первая [Concept('concept_great_power', 'великая держава')] или вторая [Concept('concept_great_power', 'великая держава')] с высоким объёмом экспорта#!#!\n·#V #B Являетесь #O #B ведущим производителем#!#! определённых товаров#!#!"
economic_crisis_begin_event_tt: "#R Паника, вызванная крахом фондового рынка первой [Concept('concept_great_power', 'великой державы')], распространилась на биржу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Экономический спад и финансовый кризис вот-вот обрушатся на нашу страну. Готовьтесь...#!"
economic_crisis_begin_now_event_tt: "#R Паника от обвала фондового рынка захлестнула биржу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Экономический спад и финансовый кризис вот-вот обрушатся на нашу страну... и на весь мир!#!"
three_great_powers_leave_crisis_tt: "Как минимум три [Concept('concept_great_power', 'великие державы')] вышли из экономического кризиса \n\n#V #L Дефолт по долговым обязательствам#!#! немедленно завершит экономический кризис и приведёт к краткосрочному снижению процентных ставок."
has_at_least_year_crisis: "Кризис длится не менее 1 года"
economic_crisis_progress_desc_integer: "#V Шкала прогресса показывает изменение ВВП [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] после начала кризиса. Чтобы преодолеть кризис, поднимите ВВП до целевого значения, указанного в правом конце шкалы.#!"

second_economic_crisis: "Экономический кризис"
second_economic_crisis_reason: "[ROOT.GetCountry.GetNameNoFlag] переживает #R глубокий экономический кризис#!. Процветание на [Concept('concept_market', 'рынке')] рухнуло в одночасье, #B фабрики закрываются, торговля замерла, банки банкротятся#!, а бесчисленное [Concept('concept_pop', 'население')] лишилось работы и дохода. #B Безработные на улицах и голодающие семьи#! стали самой заметной картиной в стране, повсюду растут недовольство и волнения.\n\nЕсли позволить ситуации и дальше ухудшаться, #R наш государственный аппарат пошатнётся#!. Чтобы восстановить экономику и вернуть доверие народа, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и [Concept('concept_government', 'правительство')] должны принять меры: #B только решительная и эффективная политика позволит #V государству выйти из тени кризиса и вернуться на путь роста и процветания#!#!."
second_economic_crisis_status: "#B #R Кредитный кризис и золотая паника ведут к масштабной экономической рецессии#!#!"
second_economic_crisis_goal: "Чтобы как можно скорее преодолеть экономический кризис, вам необходимо поднять ВВП до 100% от докризисного уровня. Во время кризиса законы о интервенционизме и протекционизме откроют выгодные варианты в определённых событиях."

