l_russian:

 joi_flavor_expand.1.t: "Конференция во дворце Шёнбрунн"
 joi_flavor_expand.1.d: "Во дворце Шёнбрунн состоялась конференция, посвящённая обсуждению нового союзного договора между Германией, Австрией и Россией..."
 joi_flavor_expand.1.f: "Движимые равным желанием укрепить всеобщий мир посредством соглашения, призванного обеспечить оборонительные позиции своих стран, [SCOPE.sCountry('GER_scope').GetNameNoFlag], [SCOPE.sCountry('RUS_scope').GetNameNoFlag] и [SCOPE.sCountry('AUS_scope').GetNameNoFlag] решили подтвердить договорённости, достигнутые между тремя державами. Уполномоченные Его Величества императора [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], Его Величества императора [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')] и чрезвычайный и полномочный посол [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] согласовали следующие статьи:\n\nСтатья I. В случае если одна из договаривающихся сторон окажется в состоянии войны с четвёртой великой державой, две другие будут сохранять по отношению к ней благожелательный нейтралитет и приложат все усилия для локализации конфликта. В случае если одна из сторон окажется в оборонительной войне, остальные обязуются присоединиться к ней и оказать помощь.\n\nСтатья II. Германия признаёт исторически приобретённые права России на Балканском полуострове, в частности законность её преобладающего и решающего влияния в Болгарии и Восточной Румелии... Обе державы обязуются не допускать никаких изменений территориального статус-кво вышеупомянутого полуострова без предварительного соглашения между ними и выступать против любой попытки нарушить или изменить этот статус-кво без их согласия.\n\nСтатья III. Настоящий договор будет действовать в течение двадцати лет со дня обмена ратификационными грамотами.\n\nСтатья IV. Высокие договаривающиеся стороны взаимно обязуются хранить в тайне содержание и существование настоящего договора и прилагаемого к нему протокола. Ратификация должна состояться и ратификационные грамоты должны быть обменены в течение двух недель или ранее.\n\nВ удостоверение чего соответствующие уполномоченные подписали настоящий договор и приложили к нему свои гербовые печати."
 joi_flavor_expand.1.a: "Отклонить соглашение."
 joi_flavor_expand.1.b: "Возродим же дружбу времён Священного союза!"
 #
 joi_flavor_expand.2.t: "Наследники Уилберфорса"
 joi_flavor_expand.2.d: "Сегодня, спустя много лет после того, как наша метрополия, [SCOPE.sCountry('GBR_scope').GetNameNoFlag], приняла Акт об отмене рабства, премьер-министр [SCOPE.sCharacter('prinimister_leader').GetFullName] стал свидетелем освобождения рабов в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Отныне они свободны в соответствии с Актом об отмене рабства 1833 года."
 joi_flavor_expand.2.f: "Принимая во внимание, что в различных колониях, принадлежащих [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его')] Величеству, различные лица находятся в рабстве, и что справедливо и целесообразно, чтобы все такие лица были освобождены и чтобы за ними последовало полное освобождение от рабства, и что следует предоставить разумную компенсацию лицам, ранее имевшим право на услуги таких рабов, за потерю, которую они понесут в результате лишения их права на такие услуги;\n\nи принимая во внимание, что также целесообразно принять меры для поощрения трудолюбия и обеспечения хорошего поведения освобождённых лиц в течение ограниченного периода после их освобождения; и что необходимо немедленно внести такие изменения в действующие законы вышеупомянутых колоний, которые могут потребоваться для приспособления к новому состоянию и общественным отношениям, которые возникнут после всеобщего освобождения вышеупомянутых рабов;\n\nпосему да будет постановлено Его Величеством Королём по совету и с согласия духовных и светских лордов и общин, собравшихся в настоящем парламенте, и властью того же парламента:\n\nвсе рабы, привезённые в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_VP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] с согласия их владельцев, и все рабы, которые впредь будут привозиться в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_VP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] с тем же согласием, после принятия настоящего Акта #bold будут во всех отношениях и для всех целей абсолютно и полностью свободны.#!"
 joi_flavor_expand.2.a: "Наконец-то желание Уилберфорса исполнилось."
 joi_flavor_expand.2.b: "Во имя свободы и справедливости!"
 #:
 joi_flavor_expand.3.t: "Революция: [TimeKeeper.GetCurrentDate.Format('MMMM')]"
 joi_flavor_expand.3.d: "По мере распространения либеральных революций по всей Европе, радикальные настроения в Германском союзе становятся сильны как никогда. [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] и [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName|l], воодушевлённые националистическими идеями и организованные #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_TP')|l]#!#!, устроили сегодня массовые демонстрации, требуя единства и свободы. Протесты и беспорядки охватили всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] практически под контролем протестующих, а связь со многими крупными городами страны потеряна. В сложившейся ситуации сам [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle|l] [SCOPE.sCharacter('frankfurter_ruler').GetFirstName] [SCOPE.sCharacter('frankfurter_ruler').GetLastName] опасается повторения Французской революции."
 joi_flavor_expand.3.f: "Новости о революции за границей достигли города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Несмотря на строгую цензуру, первые неофициальные сообщения дошли до всех слоёв общества: единство, справедливость и свобода. Многие жители столицы вышли на улицы; тёплая и ясная погода способствовала собраниям на открытом воздухе, что позволило организовывать политические митинги. Кофейни стали местом встреч образованного среднего класса, где революционные события в далёких странах связывались с конкретными ожиданиями реформ в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nНа прошлой неделе небольшая группа студентов собралась в столичном пригороде. Подобно иностранным революционерам, они надеялись обобщить требования народа и представить их в виде петиции непосредственно [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle|l]. Их встреча не привела к соглашению и закончилась ничем; однако она привлекла многих #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! и даже получила финансирование от сочувствующих #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!.\n\nСитуация обострилась, когда [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('frankfurter_ruler').GetFirstName] отказался принять петицию от делегации народного собрания. Разгневанные люди пытались вооружиться и заблокировать улицы. По всему городу выросли баррикады из булыжников, мешков с шерстью и брёвен. Хотя солдатам удалось снести несколько баррикад, вид изуродованных тел лишь укрепил волю революционеров к сопротивлению. По всему городу зазвонили церковные колокола, призывая всё больше граждан к борьбе. В итоге беспорядки вышли из-под контроля и распространились по всей стране. [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] и его правительство были вынуждены отступить в центр города, который всё ещё находился под контролем армии. Полиция начала переходить на сторону восставших. В конце концов, [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] уступил, объявив, что #bold «ставит себя и свой народ под древние знамёна Германской империи и присоединяет [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] к Германии»#!."
 joi_flavor_expand.3.a: "Германия пробуждается! Во имя единства — требуем созыва представителей от всех членов союза!"
 joi_flavor_expand.3.b: "У нас нет выбора, кроме как принять требования революционеров. Пусть [SCOPE.sCharacter('frankfurter_leader').GetFirstName] представит нашу страну."
 #
 joi_flavor_expand.4.t: "Конституция Паульскирхе"
 joi_flavor_expand.4.d: "После долгих дебатов, принятия решений и решающих побед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на поле боя, оппозиция в союзе наконец сдалась. [ROOT.GetCountry.GetRuler.GetFullName] официально коронован франкфуртским парламентом в Ахенском соборе. Была принята и подписана единая конституция. Сегодня парламент объявил всему миру: германская нация, разделённая на протяжении сотен лет, вновь объединилась. Древняя корона, некогда принадлежавшая #variable королю Германии, императору римлян#!, после десятилетий забвения вновь возложена на голову достойного правителя. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], котор[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ая', 'ый')] взош[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', 'ёл')] на трон, некогда занимаемый Карлом Великим. Вся германская нация ликует в честь коронации!"
 joi_flavor_expand.4.f: "«[ROOT.GetCountry.GetNameNoFlag] состоит из территорий бывшего Германского союза. Только граждане Германии могут быть назначены на должности в правительствах и административных органах государств. Имперская конституция и законы имеют равную силу в этих государствах. В рамках ограничений, установленных имперской конституцией, германские государства сохраняют свою автономию, их монархи сохраняют свои титулы, а суверенитет над территориями передаётся имперскому правительству».\n\n«Право объявления войны и заключения мира принадлежит исключительно имперской власти. Все вооружённые силы находятся в распоряжении имперских властей. Имперская власть имеет исключительное право на законодательство и организацию военных дел. Любая присяга на верность в первую очередь включает в себя обязательство верности главе империи и имперской конституции».\n\n«Германская империя образует таможенную и торговую зону, окружённую общей таможенной границей. Все внутренние пошлины отменяются. Государства не имеют права взимать пошлины на товары, ввозимые или вывозимые через границы Германии. Имперская власть издаёт законы, касающиеся торговли, судоходства и промышленности. Патенты на изобретения выдаются только империей в соответствии с имперским законодательством».\n\n«Имперское правительство имеет право регулировать банковское дело и выпуск бумажных денег посредством имперского законодательства. Расходы на все меры и учреждения, осуществляемые имперскими средствами, покрываются имперской властью из имперских ресурсов. Имперское правительство обязано защищать права, предоставленные имперской конституцией всем немцам. Имперская власть отвечает за поддержание мира в империи и принимает необходимые меры для обеспечения внутренней безопасности и порядка»."
 joi_flavor_expand.4.a: "Единство, справедливость и свобода: за германское отечество!"
 joi_flavor_expand.4.b: "Германия! Германия превыше всего!"
 joi_flavor_expand.5.t: "Франкфуртский парламент распущен"
 joi_flavor_expand.5.d: "Усилия по объединению и освобождению Германии в конечном итоге потерпели неудачу, и в Германии был восстановлен традиционный порядок. Франкфуртское национальное собрание, рождённое в огне революции, было распущено. После того как армия захватила Паульскирхе, был воссоздан Германский союз, который ранее был распущен парламентом, а власть монархов была вновь утверждена. Оставшиеся члены парламента разбежались: некоторые прибыли в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], другие же бежали за границу."
 joi_flavor_expand.5.f: "«Регент-имперский викарий неоднократно выражал желание сложить с себя полномочия и вернуть их всем членам Германского союза в соответствии с властью, предоставленной ему Союзным актом... В соответствии с соглашением, с целью сохранения Германского союза как международного объединения германских князей и вольных городов, поддержания независимости и неприкосновенности входящих в него государств, а также обеспечения внутренней и внешней безопасности Германии, принято решение об отмене временной конституции».\n\n«Дела, до сих пор находившиеся в ведении временного центрального правительства Германии, в той мере, в какой они подпадают под юрисдикцию Союзного сейма в соответствии с законами союза, на переходный период передаются Союзному сейму... После утверждения и получения согласия имперского викария, регент сложит с себя полномочия и передаст права и обязанности, возложенные на него союзом, Его Величеству императору [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и Его Величеству королю [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')]»."
 joi_flavor_expand.5.a: "Изгнать этих мятежников из Германии!"
 joi_flavor_expand.5.b: "В конце концов, они боролись за Германию. Приютим их."
 #
 joi_flavor_expand.6.t: "Моему народу и германской нации"
 joi_flavor_expand.6.d: "Столкнувшись с растущим националистическим пылом, консервативный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] начал сомневаться в своей власти. Тем временем законный наследник престола, [SCOPE.sCharacter('heir_1848_scope').GetFirstName], сегодня выступил перед восторженной толпой у дворца с речью, которая была встречена с большим энтузиазмом. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] задумался об отречении от престола и передаче его более популярному наследнику, чтобы обеспечить преемственность династии."
 joi_flavor_expand.6.f: "«Во времена наполеоновского вторжения, в самые опасные дни, я с полной уверенностью обращался к своему народу, и моя уверенность не была посрамлена. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вместе со своим народом спас [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] и Германию от позора и унижения. Сегодня, когда отечество находится в величайшей опасности, я снова с полной уверенностью обращаюсь к германской нации:\n\nВеликое германское отечество охвачено внутренними беспорядками и может столкнуться с угрозой внешней опасности со многих сторон. Избавиться от этой двойной — внутренней и внешней — опасности можно только под руководством одного лидера. И я — [SCOPE.sCharacter('heir_1848_scope').GetFirstName] [SCOPE.sCharacter('heir_1848_scope').GetLastName] — сегодня принимаю на себя обязанности, чтобы в эти опасные дни помочь германской нации, которую я любил и за которую боролся всю свою жизнь».\n\n«Национальное собрание, созванное несколько дней назад во Франкфурте, является законным средством и органом для спасения и умиротворения Германии в союзе с моим народом. Я намерен в форме, которая будет немедленно детально рассмотрена, предоставить германским князьям и дворянам возможность провести совместное заседание с представителями национального собрания... Сегодня я принимаю древнее германское знамя и ставлю себя и свой народ под древние знамёна Германской империи»."
 joi_flavor_expand.6.a: "Да здравствует Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('heir_1848_scope').GetFirstName]!"
 joi_flavor_expand.6.b: "Нынешний [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уже достаточно сделал для Германии."

 joi_flavor_expand.7.t: "Проект семнадцати"
 joi_flavor_expand.7.d: "С целью создания единой конституции для будущей #O Германской империи#!, представители парламента назначили комитет из семнадцати широко признанных учёных, политиков и священнослужителей для разработки проекта конституции. Их работа сегодня была представлена на голосование в парламенте."
 joi_flavor_expand.7.f: "«Германия веками несла наказание за свою раздробленность. Теперь, пока не закончился второй век после окончания мира, который сделал её слабой, она должна без промедления достичь национального и государственного единства. Никто в мире не имеет достаточной силы, чтобы помешать нации с населением более сорока миллионов человек отныне решать свою собственную судьбу».\n\n«Искушение властью живёт в сердце каждого человека, который хочет сделать вывод о необходимости устранения всякого выдающегося величия, поскольку оно является препятствием для свободы. Наши королевские дома связаны не только древними обычаями повиновения, которые нельзя произвольно перенести куда-либо ещё».\n\n«Если наша многогранная государственная жизнь по своей сути зависит от продолжения германских династий, то главой империи, на которого возложена ответственность за управление всей страной, может быть только тот, кто обладает таким же правом наследования. Если человечество откажется от этого качества, являющегося источником всей человеческой власти, то легитимность человеческой власти будет неравной по сравнению с теми, кто во имя общего блага признаёт обязанность подчинить свою наследственную власть суверенитету»."
 joi_flavor_expand.7.a: "Работа Комитета семнадцати не имеет никакой ценности для имперской конституции."
 joi_flavor_expand.7.b: "Это создаёт отличный прецедент для будущей имперской конституции."

 joi_flavor_expand.8.t: "Союзный избирательный закон"
 joi_flavor_expand.8.d: "Сегодня парламент принял резолюцию о избирательном праве и гражданском представительстве, требуя от всех членов Германского союза организовать выборы представителей в парламент среди всех совершеннолетних независимых мужчин и направить их во #yellow Франкфурт#!."
 joi_flavor_expand.8.f: "«Для ускорения разработки основ новой федеральной конституции, Союзный сейм при содействии лиц, пользующихся общественным доверием, уже начал предварительную работу... Для дальнейшего продвижения этого важного дела, федеральное правительство решило призвать федеральные правительства во всех своих провинциях, входящих в германскую государственную систему, избрать национальных представителей конституционным путём».\n\n«Ввиду настоятельной необходимости, принято решение временно использовать определённый демографический стандарт для выборов представителей от каждого федерального государства, требуя от каждого из них обеспечить избрание одного представителя от каждых семидесяти тысяч совершеннолетних независимых мужчин, включая те государства, где население меньше».\n\n«Эти представители соберутся в месте нахождения Союзного сейма в установленную дату, чтобы начать конституционную работу для Германии в сотрудничестве между правительствами и гражданами»."
 joi_flavor_expand.8.a: "Так называемая избирательная резолюция не имеет для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] обязательной силы."
 joi_flavor_expand.8.b: "Отныне избирательное право будет распространено на всех совершеннолетних мужчин!"

 joi_flavor_expand.9.t: "Временное правительство Германии?"
 joi_flavor_expand.9.d: "С принятием временной конституции, заменяющей Акт о Германском союзе 1815 года, парламент объявил о создании во #yellow Франкфурте#! временного центрального правительства, которое заменит прежние институты и будет управлять делами #yellow Германии#! до окончательного принятия конституции. Однако название временного правительства и будущая форма государственного устройства страны остаются предметом острых споров, особенно между левыми и правыми либералами в парламенте."
 joi_flavor_expand.9.f: "«До окончательного установления германской государственной власти будет назначена временная центральная власть для управления всеми общими делами германской нации... Она будет осуществлять исполнительную власть во всех вопросах, касающихся общей безопасности и благосостояния германских федеральных государств; будет верховным главнокомандующим всеми вооружёнными силами и, в частности, будет назначать главнокомандующего вооружёнными силами; будет представлять Германию в вопросах международного права и торговли и с этой целью назначать послов и консулов».\n\n«Разработка конституции остаётся вне компетенции центральной власти. Центральное правительство должно по возможности согласовывать исполнительные меры с уполномоченными представителями правительств государств. Как только конституционная работа будет завершена и конституция вступит в силу, деятельность временного центрального правительства прекратится»."
 joi_flavor_expand.9.a: "Славная легитимность германского императора должна происходить непосредственно от Священной Римской империи."
 joi_flavor_expand.9.b: "Германия должна быть федеративной республикой, состоящей из государств и вольных городов."

 joi_flavor_expand.10.t: "Общее положение о векселях"
 joi_flavor_expand.10.d: "Вексель — это универсальный долговой инструмент, который можно использовать для международных денежных переводов, обмена валюты и даже в качестве суррогатной валюты. Однако в Германском союзе не было общепризнанного законодательства, и каждое государство и вольный город имели свои собственные законы. Учитывая эту ситуацию, парламент вчера издал стандартный гражданский закон о принятии, выдаче, залоге и обмене векселей, чтобы обеспечить дальнейшее экономическое единство Германии."
 joi_flavor_expand.10.f: "«Любое лицо, способное принимать на себя обязательства по договору, имеет право на обмен векселей... Должник по векселю несёт ответственность за исполнение обязательств по векселю лично и своим имуществом. Трассант (лицо, выдавшее вексель) несёт ответственность за акцепт и оплату».\n\n«Держатель векселя имеет право немедленно предъявить его плательщику для акцепта. В случае отказа в акцепте может быть составлен протест в неакцепте. Вексель, предъявляемый к оплате через определённый срок после предъявления, в случае отказа в акцепте должен быть опротестован держателем в течение срока предъявления».\n\n«Если в векселе указана конкретная дата платежа, то сроком платежа является эта дата. Если дата платежа установлена на середину месяца, то вексель подлежит оплате 15-го числа этого месяца и должен быть заверен нотариусом или судебным должностным лицом»."
 joi_flavor_expand.10.a: "Сообщить парламенту, что из-за экономических проблем в нашей стране, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] решил отложить исполнение."
 joi_flavor_expand.10.b: "Новый закон о векселях будет немедленно включён в законодательство и введён в действие!"

 joi_flavor_expand.11.t: "Соглашение Симона-Гагерна"
 joi_flavor_expand.11.d: "Вопрос о том, может ли #O Австрия#! интегрироваться в германское национальное государство, стал причиной серьёзного раскола в парламенте при разработке конституции. Временный премьер-министр парламента, #variable Симон-Гагерн#!, решил заключить временное соглашение между парламентскими фракциями, чтобы отложить споры по великогерманскому вопросу и обеспечить продолжение работы над другими частями конституции."
 joi_flavor_expand.11.f: "«Правительства Германского союза, после консультаций с имперским регентом, договорились о временном соглашении, согласно которому Австрия и Пруссия от имени всех правительств союза будут осуществлять центральную власть Германского союза до принятия конституции, если только эта власть не будет передана ранее определённому органу».\n\n«Члены Союзного совета должны, в соответствии с действующими союзными законами, в частности, с Союзной военной конституцией, распределить порученные им дела и выполнять их самостоятельно или под руководством и надзором Его Величества императора [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и Его Величества короля [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')]»."
 joi_flavor_expand.11.a: "Коронация германского императора — вот что важнее всего. Австрийский вопрос можно отложить."
 joi_flavor_expand.11.b: "Если мы хотим, чтобы Австрия присоединилась, нет другого выхода, кроме как пойти на уступки и принять федеративную систему."

 joi_flavor_expand.12.t: "Манифест коммунистической партии"
 joi_flavor_expand.12.d: "Брошюра левого толка под названием #R «Манифест коммунистической партии»#!, изданная в Лондоне, столице [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], недавно распространилась в Германском союзе. Даже во Франкфуртском парламенте многие изложенные в ней идеи находят поддержку у некоторых радикальных левых депутатов. Однако большинство по-прежнему обеспокоено так называемым «обществом общественной собственности» и требует, чтобы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] принял экстренные меры для запрета этого текста, противоречащего основным устоям общества [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_expand.12.f: "«Призрак бродит по Европе — призрак коммунизма. Все силы старой Европы объединились для священной травли этого призрака: папа и Царь, Меттерних и Гизо, французские радикалы и немецкие полицейские».\n\n«История всех до сих пор существовавших обществ была историей борьбы классов. Свободный и раб, патриций и плебей, помещик и крепостной, мастер и подмастерье, короче, угнетающий и угнетаемый находились в вечном антагонизме друг к другу, вели непрерывную, то скрытую, то явную борьбу».\n\n«Пусть господствующие классы содрогаются перед Коммунистической Революцией. Пролетариям нечего в ней терять кроме своих цепей. Приобретут же они весь мир!»"
 joi_flavor_expand.12.a: "Лучший способ борьбы с коммунизмом — это повышение социальной справедливости."
 joi_flavor_expand.12.b: "Строго запретить эту брошюру!"

 joi_flavor_expand.13.t: "Имперский флот"
 joi_flavor_expand.13.d: "Для защиты интересов Германии на море, включая сопровождение торговых судов и обеспечение прав в территориальных водах в отношениях с такими странами, как [SCOPE.sCountry('GBR_scope').GetNameNoFlag] и [SCOPE.sCountry('DEN_scope').GetNameNoFlag], парламент принял закон о создании единого германского #blueимперского флота#!. В будущей конституции будут прописаны его роль, командование и финансирование."
 joi_flavor_expand.13.f: "«Первый германский военный корабль появился и встал на якорь в устье Везера, показав многочисленным немцам, что они больше не зависят исключительно от деспотической воли тиранов, а опираются на поддержку сорока миллионов человек... Создание нашего германского отечественного флота — это не просто военный или коммерческий вопрос, а прежде всего вопрос национальный».\n\n«Военно-морские силы являются исключительной прерогативой империи. Ни одно государство не может иметь собственные военные корабли или выдавать каперские свидетельства... Назначение морских офицеров и чиновников является исключительным правом имперского правительства. Экспроприация, необходимая для строительства военных портов и военно-морских объектов, а также полномочия назначенных для этой цели имперских властей, будут определяться будущим имперским законом»."
 joi_flavor_expand.13.a: "Этот флот будет назван «Имперский флот (Reichsflotte)!»"
 joi_flavor_expand.13.b: "Нам платить за армию? Денег нет!"

 joi_flavor_expand.14.t: "Основные права германского народа"
 joi_flavor_expand.14.d: "Парламент принял новый закон, касающийся политических и гражданских прав германских граждан. Он был провозглашён частью будущей #V конституции#! и разослан в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Народ ликует и выходит на улицы, требуя от нашего правительства претворить этот закон в жизнь."
 joi_flavor_expand.14.f: "«Германский народ обладает следующими основными правами, которые должны служить нормой для конституций германских государств, и никакая конституция или законодательство германского государства не могут их отменить или ограничить:\n\nГерманский народ состоит из граждан государств, образующих Германскую империю... Каждый немец имеет гражданство Германской империи и может осуществлять свои права в любом германском государстве, имеет право проживать и селиться в любом месте на территории Германии и заниматься любой деятельностью для своего жизнеобеспечения.\n\nВсе немцы равны перед законом. Все титулы, не связанные с должностью, отменяются и не могут быть восстановлены... Все имеющие на то право лица могут в равной степени занимать государственные должности и должны в равной степени нести обязательную военную службу.\n\nЛичная свобода неприкосновенна. Арест, за исключением задержания на месте преступления, может быть произведён только на основании судебного приказа с указанием причин... Полицейские власти должны на следующий день освободить задержанного или передать его судебным властям. Смертная казнь, а также колодки, клеймение и телесные наказания отменяются, за исключением случаев, предусмотренных военным законодательством.\n\nЧастная собственность священна и неприкосновенна. Изъятие писем и документов должно производиться только по судебному ордеру, в котором должны быть указаны причины ареста, и который должен быть немедленно или в течение следующих двадцати четырёх часов вручён соответствующему лицу»."
 joi_flavor_expand.14.a: "[ROOT.GetCountry.GetNameNoFlag] без сомнения последует решению парламента!"
 joi_flavor_expand.14.b: "Мы должны учитывать мнение оппозиции в правительстве."

 joi_flavor_expand.15.t: "Имперский регент"
 joi_flavor_expand.15.d: "Ещё при принятии закона о #yellow временном правительстве#! была предусмотрена должность «регента», который должен был возглавить временное правительство Германской империи. Однако из-за борьбы различных государств за этот пост, конкретный кандидат так и не был назначен. По мере доработки конституции и уточнения функций правительства, этот вопрос больше нельзя откладывать, и он стал новым яблоком раздора в парламенте."
 joi_flavor_expand.15.f: "«Временная центральная власть принадлежит регенту, избираемому Национальным собранием... Регент осуществляет свою власть через министров, назначаемых им и ответственных перед Национальным собранием. Все приказы, изданные министрами, для своей действительности требуют подписи как минимум одного ответственного министра... Регент не несёт личной ответственности. Законодательная власть принадлежит парламенту, а исполнительная — кабинету министров.\n\nМинистры имеют право присутствовать на заседаниях Национального собрания и быть выслушанными... Министры обязаны по требованию Национального собрания присутствовать на заседаниях и предоставлять информацию. Министры имеют право голоса только в том случае, если они избраны членами Национального собрания... Должность регента несовместима с должностью члена Национального собрания»."
 joi_flavor_expand.15.a: "Эта должность должна принадлежать славному королю [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_expand.15.b: "Эта должность должна принадлежать великому императору [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_expand.15.c: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] более чем достоин!"

 joi_flavor_expand.16.t: "Целостность союза"
 joi_flavor_expand.16.d: "Сегодня в парламенте началось обсуждение вопроса о распределении власти в новых имперских институтах. В центре спора — представители [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')]. Однако настойчивость великих держав в отстаивании своих прав в Германии привела парламент в тупик."
 joi_flavor_expand.16.f: "«Кому принадлежит Германская империя? Точнее, какому государству? Императору [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], королю [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')] или монархам других стран... даже если это господство будет лишь символическим?\n\nИ что входит в Германский союз? Восточная Пруссия? Земли венгерской короны? Итальянские владения? Австрия хотела бы, чтобы это стало реальностью, но члены союза не желают посылать войска для защиты личных владений императора. Даже если в Вене произойдёт восстание, какое отношение это имеет к Берлину, Мюнхену или Франкфурту? Вена — это собственность императора, так же как дворец Шёнбрунн закрыт для жителей Вены.\n\nА кому принадлежит парламент? Короли и герцоги хотят иметь как можно больше голосов, как и император. А как будут организованы комитеты и кабинет? Великие державы всегда стремятся превратить их в очередной инструмент для расширения своей власти и воли, а не в инструмент управления германской нацией»."
 joi_flavor_expand.16.a: "Германский союз неделим, но в вопросах власти мы можем пойти на уступки."
 joi_flavor_expand.16.b: "Если презренная [SCOPE.sCountry('AUS_scope').GetNameNoFlag] не пойдёт на уступки, то о создании института, включающего весь союз, не может быть и речи!"
 joi_flavor_expand.16.c: "Если презренная [SCOPE.sCountry('PRU_scope').GetNameNoFlag] не пойдёт на уступки, то о создании института, включающего весь союз, не может быть и речи!"
 joi_flavor_expand.16.e: "Если презренные [SCOPE.sCountry('PRU_scope').GetNameNoFlag] и [SCOPE.sCountry('AUS_scope').GetNameNoFlag] не пойдут на уступки, то о создании института, включающего весь союз, не может быть и речи!"

 joi_flavor_expand.17.t: "Песнь немцев"
 joi_flavor_expand.17.d: "В период подъёма германского национализма #yellow Франкфуртский парламент#! решил утвердить национальный гимн для будущей Германии. В итоге единогласное одобрение получила «Песнь немцев», написанная известным композитором #variable Гофманом фон Фаллерслебеном#! на мелодию #variable «Императорского квартета» Йозефа Гайдна#!. Было решено сделать её национальным гимном Германии."
 joi_flavor_expand.17.f: "«#bold Германия, Германия превыше всего, превыше всего на свете#!,\nКогда для защиты и обороны братья навеки сплочены!\nОт Мааса до Мемеля, от Эча до Бельта,\n#bold Германия, Германия превыше всего, превыше всего на свете!#!»\n\n«Немецкие женщины, немецкая верность,\nНемецкое вино и немецкая песнь,\nПусть в мире сохранят свою древнюю, прекрасную славу,\n#bold И вдохновляют нас на благородные дела всю нашу жизнь!#!»\n\n«Единство, право и свобода для германского отечества!\nДавайте все стремиться к этому,\nБратски, с сердцем и рукой!\nЕдинство, право и свобода — залог нашего счастья.\n#bold Цвети в сиянии этого счастья, цвети, германское отечество!#!»"
 joi_flavor_expand.17.a: "Германия, Германия превыше всего, превыше всего на свете; Единство, право и свобода для германского отечества!"
 joi_flavor_expand.17.b: "Песни нашей королевской семьи больше подходят на роль национального гимна."

 joi_flavor_expand.18.t: "Великая Германия?"
 joi_flavor_expand.18.d: "Министр финансов, назначенный Франкфуртским парламентом, #variable Герман фон Бекерат#!, вчера публично призвал #bold «включить как Австрию, так и Пруссию в единую Германскую империю»#!. Это вызвало бурю среди сторонников великогерманского пути в парламенте. После того как временный председатель #variable Эдуард фон Симсон#! выразил свою поддержку, левые фракции, такие как «Доннерсберг» и «Вюртембергский двор», объединились с правыми из «Кафе Милани», публично призвав все германские государства «совместно войти в состав единой Германской империи» и отказаться от гарантий правления мелких монархов."
 joi_flavor_expand.18.f: "«#bold Что является отчизной немца?#!\nПруссия ли? Швабия ли?\nИли Рейн, где растёт виноград?\nИли Бельт, где кричат чайки?\nО нет, нет, нет!\nЕго отчизна должна быть больше!»\n\n«#bold Что является отчизной немца?#!\nТолько одна страна может считаться великой,\nИ не нужно гадать, это может быть только Австрия!\nИбо там повсюду слава и победы,\nО нет, нет, нет!\nЕго отчизна должна быть больше!»\n\n«#bold Что является отчизной немца?#!\nНазови мне эту великую единую страну,\nВезде, где звучит немецкий язык,\nИ где славят Бога на небесах,\nВот она, вот она:\n#bold Отчизна храброго немца!#!»"
 joi_flavor_expand.18.a: "Вот она, вот она! Отчизна храброго немца!"
 joi_flavor_expand.18.b: "Благородные и древние короны монархов — вот истинная Германия."

 joi_flavor_expand.19.t: "Корона из сточной канавы"
 joi_flavor_expand.19.d: "После серии обсуждений во #yellow Франкфуртском парламенте#! наконец было принято решение об объединении Германии. Парламент постановил, что наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] будет коронован как #variable «император всех немцев»#!. #bold Территория под его короной будет включать весь Германский союз, включая Австрию#!. Приглашение на коронацию было доставлено сегодня в город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], но сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] всё ещё колеблется, принимать ли эту «корону, дарованную чернью»."
 joi_flavor_expand.19.f: "«Я, [ROOT.GetCountry.GetRuler.GetFullName], Божьей милостью [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], после того как германские князья и вольные города единодушно призвали нас восстановить и принять имперское достоинство, бездействовавшее более шестидесяти лет после основания Германской империи, и внесли соответствующие положения в конституцию, настоящим объявляю:\n\nМы считаем своим долгом прислушаться к призыву германских князей и городов и принять достоинство древней Германской империи, что является нашей ответственностью перед общим отечеством. Поэтому мы и наши наследники на престоле [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] отныне будем использовать титул императора во всех отношениях и делах Германской империи и уповаем на Бога, что германская нация под символом своей древней славы поведёт отечество к счастливому будущему».\n\n«Мы глубоко осознаём свою ответственность, верны Германии, принимаем на себя имперское достоинство, защищаем права империи и её членов, поддерживаем мир и, опираясь на объединённую силу германского народа, защищаем независимость Германии, чтобы германский народ в прочном мире, в пределах своих границ, мог получить вознаграждение за свою яростную, самоотверженную борьбу, обеспечив тем самым отечеству безопасность, которой ему не хватало веками».\n\n«Да дарует Бог мне и наследникам нашего престола славное право постоянно расширять Германскую империю не военными завоеваниями, а победами в области национального благосостояния, гражданской свободы и нравственности!»"
 joi_flavor_expand.19.a: "Во имя германской нации, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] [ROOT.GetCountry.GetRuler.GetFullName] коронован императором всех немцев! Троекратное ура Германии!"
 joi_flavor_expand.19.b: "Мы не примем корону, подобранную в сточной канаве!"

 joi_flavor_expand.20.t: "Император всех немцев?"
 joi_flavor_expand.20.d: "Согласно решению Франкфуртского парламента, [SCOPE.sCountry('crossdeutsche_crown_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] будет коронован как #variable «император всех немцев»#! с правом на власть над нашими германскими территориями. Когда новость достигла города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] приш[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', 'ёл')] в ярость и заявил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')], что будет решительно защищать независимость [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_expand.20.f: "«Каждый германский дворянин, на чьём гербе есть крест или полоса, на сто процентов не примет эту корону, выкованную из грязи и нечистот революции, вероломства и государственной измены...»\n\n«Истинная, древняя и законная корона германской нации, бездействующая с 1806 года, — вот корона, дарованная Богом. Она делает своего носителя высшей властью в Германии, которой люди должны подчиняться по совести, и принять её можно только тогда, когда чувствуешь, что сила и врождённый долг позволяют это сделать».\n\n«Но только [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName] и такие, как мы, могут даровать корону. И горе тому, кто захочет получить её без нас и примет её!»"
 joi_flavor_expand.20.a: "[SCOPE.sCountry('crossdeutsche_crown_country').GetNameNoFlag] грезит! Уведомить об этом другие великие державы!"

 joi_flavor_expand.21.t: "Корона из сточной канавы"
 joi_flavor_expand.21.d: "После серии обсуждений во #yellow Франкфуртском парламенте#! наконец было принято решение об объединении Германии. Парламент постановил, что наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] будет коронован как #variable «император немцев»#!. #bold Территория под его короной будет включать весь Германский союз, за исключением Австрии#!. Приглашение на коронацию было доставлено сегодня в город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], но сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] всё ещё колеблется, принимать ли эту «корону, дарованную чернью»."
