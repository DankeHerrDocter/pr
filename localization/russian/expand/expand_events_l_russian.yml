 joi_flavor_expand.21.a: "Во имя германской нации, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] [ROOT.GetCountry.GetRuler.GetFullName] коронован императором немцев! Троекратное ура Германии!"
 joi_flavor_expand.21.b: "Мы не примем корону, подобранную в сточной канаве!"

 joi_flavor_expand.22.t: "Император немцев?"
 joi_flavor_expand.22.d: "Согласно решению #yellow Франкфуртского парламента#!, [SCOPE.sCountry('crossdeutsche_crown_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] будет коронован как #variable «император немцев»#!, а под его власть перейдут все германские земли, за исключением Австрии. Когда новость достигла города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] приш[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', 'ёл')] в ярость и заявил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')], что будет решительно защищать авторитет [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и существование Германского союза."
 joi_flavor_expand.22.f: "«Каждый германский дворянин, на чьём гербе есть крест или полоса, на сто процентов не примет эту корону, выкованную из грязи и нечистот революции, вероломства и государственной измены...»\n\n«Истинная, древняя и законная корона германской нации, бездействующая с 1806 года, — вот корона, дарованная Богом. Она делает своего носителя высшей властью в Германии, которой люди должны подчиняться по совести, и принять её можно только тогда, когда чувствуешь, что сила и врождённый долг позволяют это сделать».\n\n«Но только [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName] и такие, как мы, могут даровать корону. И горе тому, кто захочет получить её без нас и примет её!»"
 joi_flavor_expand.22.a: "[SCOPE.sCountry('kleindeutsche_crown_country').GetNameNoFlag] размечтал[SelectLocalization(SCOPE.sCountry('kleindeutsche_crown_country').GetRuler.IsFemale, 'ась', 'ся')]!"

 joi_flavor_expand.23.t: "Интервенция в Германии"
 joi_flavor_expand.23.d: "[SCOPE.sCountry('crossdeutsche_crown_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] недавно был провозглашён #yellow Франкфуртским парламентом#! #variable «императором всех немцев»#! с правом на власть над всей территорией союза. Для нашей страны это немыслимо. Без сомнения, политика равновесия, которой [ROOT.GetCountry.GetNameNoFlag] всегда следовал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')], и европейский порядок, установленный после Венского конгресса, изменятся из-за объединения #I Германского союза#!. Чтобы обеспечить безопасность нашей страны, премьер-министр решил направить [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_DP')] дипломатическую ноту с требованием принять разработанный кабинетом договор об ограничении военно-морских вооружений, угрожая в противном случае вступить в войну, чтобы помешать их амбициям."
 joi_flavor_expand.23.f: "«Соотношение 35:100 должно быть постоянным, то есть общий тоннаж флота [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] не должен превышать 35% от общего тоннажа военно-морских сил [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], установленного договором, или, если в будущем такой договор не будет ограничивать этот тоннаж, не должен превышать 35% от фактического суммарного тоннажа Британской империи...\n\nЕсли какой-либо будущий общий договор об ограничении военно-морских вооружений не будет использовать метод согласованных пропорций между флотами различных великих держав, правительство Германии не будет настаивать на включении в будущий общий договор пропорции, указанной в предыдущем пункте, при условии, что принятый в этом договоре будущий метод ограничения военно-морских вооружений сможет в достаточной мере гарантировать Германии возможность поддерживать эту пропорцию...\n\nПравительство Его Величества Короля считает, что соглашение, которое будет подписано с правительством [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')], с сегодняшнего дня должно рассматриваться как постоянное и чёткое соглашение между двумя правительствами, которое также будет способствовать достижению всеобщего соглашения по этим вопросам между всеми военно-морскими державами мира»."
 joi_flavor_expand.23.a: "Если они подпишут договор, наша страна сохранит нейтралитет. В противном случае [ROOT.GetCountry.GetNameNoFlag] вступит в войну!"

 joi_flavor_expand.24.t: "Рейнская область или война"
 joi_flavor_expand.24.d: "[SCOPE.sCountry('crossdeutsche_crown_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] недавно был провозглашён #yellow Франкфуртским парламентом#! #variable «императором всех немцев»#! с правом на власть над всей территорией союза. Это создаёт серьёзную угрозу безопасности наших границ. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и его кабинет единогласно решили, что если [SCOPE.sCountry('crossdeutsche_crown_country').GetNameNoFlag] не согласится немедленно передать нам Рейнскую область в обмен на мир, наша страна вмешается, чтобы пресечь их незаконные амбиции по объединению."
 joi_flavor_expand.24.f: "«Границы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] отмечены самой природой. Мы дойдём до четырёх сторон горизонта, до берегов Рейна, до берегов океана, до Пиренеев и до Альп. Там должны быть границы нашей страны».\n\n«Некоторые считают, что, похоронив французские идеалы под Рейном, можно лучше послужить нашей стране. Возможно, это и так, но когда я держу в руках свободу тысяч французов и не делаю ничего, чтобы спасти их, это выше моих сил... Моё сердце отвергает этот поступок»."
 joi_flavor_expand.24.a: "Требуйте от них Рейнскую область — или пусть ждут, когда славные солдаты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] пересекут границу!"

 joi_flavor_expand.25.t: "Объединение Германии?"
 joi_flavor_expand.25.d: "[SCOPE.sCountry('crossdeutsche_crown_country').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('crossdeutsche_crown_country').GetAltNameNoFlag('RU_CL_RP')] недавно был провозглашён #yellow Франкфуртским парламентом#! #variable «императором всех немцев»#! с правом на власть над всей территорией союза. Когда новость достигла города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] приш[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', 'ёл')] в ярость и приказал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] военному министру немедленно мобилизовать армию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], войти во Франкфурт и разнести их жалкую церковь в щепки!"
 joi_flavor_expand.25.f: "«Объединение Германии — это прекрасная мечта, но она опасна для мира в Европе... Если русский медведь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] решит больше не молчать, создание Германии останется лишь мечтой.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] не даст молчаливого согласия: Паульскирхе не может предложить корону, поэтому так называемому императору нечего ни принимать, ни отвергать. Эта так называемая корона — вовсе не корона, а собачий ошейник, которым эти немцы хотят приковать всю Европу к революции!»"
 joi_flavor_expand.25.a: "Сообщите им, чтобы готовились быть раздавленными великим катком [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"

 joi_flavor_expand.26.t: "[SCOPE.sCountry('GBR_scope').GetNameNoFlag] требует ограничения военно-морских вооружений"
 joi_flavor_expand.26.d: "Правительство [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], опасаясь, что титул — #variable «император всех немцев»#! — нарушит мир в Европе и будет угрожать их заморским интересам, сегодня через своё посольство в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] направило нам дипломатическую ноту. В ней говорится, что #bold если наша страна не согласится подписать договор об ограничении военно-морских вооружений, между нашими двумя странами разразится война.#!."
 joi_flavor_expand.26.f: "«Соотношение 35:100 должно быть постоянным, то есть общий тоннаж германского флота не должен превышать 35% от общего тоннажа военно-морских сил [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], установленного договором, или, если в будущем такой договор не будет ограничивать этот тоннаж, не должен превышать 35% от фактического суммарного тоннажа Британской империи...\n\nЕсли какой-либо будущий общий договор об ограничении военно-морских вооружений не будет использовать метод согласованных пропорций между флотами различных великих держав, правительство Германии не будет настаивать на включении в будущий общий договор пропорции, указанной в предыдущем пункте, при условии, что принятый в этом договоре будущий метод ограничения военно-морских вооружений сможет в достаточной мере гарантировать Германии возможность поддерживать эту пропорцию...\n\nПравительство Его Величества Короля считает, что соглашение, которое будет подписано с правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], с сегодняшнего дня должно рассматриваться как постоянное и чёткое соглашение между двумя правительствами, которое также будет способствовать достижению всеобщего соглашения по этим вопросам между всеми военно-морскими державами мира»."
 joi_flavor_expand.26.a: "[ROOT.GetCountry.GetNameNoFlag] не потерпит такого унижения!"
 joi_flavor_expand.26.b: "Подписать договор. Мы не сможем победить [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_VP')]."

 joi_flavor_expand.27.t: "[SCOPE.sCountry('FRA_scope').GetNameNoFlag] требует уступки Рейнской области"
 joi_flavor_expand.27.d: "Правительство [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] под предлогом коронации нашего правителя как #variable «императора всех немцев»#! заявляет, что это серьёзно угрожает безопасности их границ. Они требуют, чтобы наше правительство уступило и признало суверенитет [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] над Рейнской областью в качестве компенсации."
 joi_flavor_expand.27.f: "«Границы [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] отмечены самой природой. Мы дойдём до четырёх сторон горизонта, до берегов Рейна, до берегов океана, до Пиренеев и до Альп. Там должны быть границы нашей страны».\n\n«Некоторые считают, что, похоронив французские идеалы под Рейном, можно лучше послужить нашей стране. Возможно, это и так, но когда я держу в руках свободу тысяч французов и не делаю ничего, чтобы спасти их, это выше моих сил... Моё сердце отвергает этот поступок»."
 joi_flavor_expand.27.a: "Хотите немецкие земли? Придите и возьмите!"
 joi_flavor_expand.27.b: "Уступим им. Мы не можем рисковать войной с [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_TP')]."

 joi_flavor_expand.28.t: "[SCOPE.sCountry('RUS_scope').GetNameNoFlag] объявляет об интервенции"
 joi_flavor_expand.28.d: "После коронации нашего правителя как #variable «императора всех немцев»#!, [SCOPE.sCountry('RUS_scope').GetNameNoFlag], опасаясь разрушения старого европейского порядка и распространения национализма в России, решила вновь исполнить свою роль «жандарма Европы» и вмешаться, чтобы помешать нашему объединению Германии."
 joi_flavor_expand.28.f: "«Объединение Германии — это прекрасная мечта, но она опасна для мира в Европе... Если русский медведь [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] решит больше не молчать, создание Германии останется лишь мечтой.\n\n[SCOPE.sCountry('RUS_scope').GetRuler.GetPrimaryRoleTitle] не даст молчаливого согласия: Паульскирхе не может предложить корону, поэтому так называемому императору нечего ни принимать, ни отвергать. Эта так называемая корона — вовсе не корона, а собачий ошейник, которым эти немцы хотят приковать всю Европу к революции!»"
 joi_flavor_expand.28.a: "Пусть приходят! Славная [ROOT.GetCountry.GetNameNoFlag] не боится!"
 #Эрфуртский союз
 joi_flavor_expand.29.t: "Эрфуртский союз"
 joi_flavor_expand.29.d: "Несмотря на провал #yellow Франкфуртского парламента#!, мечта об #G объединении Германии#! остаётся весьма привлекательной для многих в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], и даже сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] находит эту идею привлекательной. По приглашению северогерманских государств, [ROOT.GetCountry.GetNameNoFlag] пров[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ела', 'ёл')] с ними переговоры в Готе. На встрече все страны согласились создать федеративное государство, включающее Северную Германию, чтобы продолжить идеалы Франкфуртского парламента. Однако новости из [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] неутешительны: похоже, они намерены силой воспрепятствовать созданию союза."
 joi_flavor_expand.29.f: "«В соответствии с институциональными рамками, установленными Организационным актом Германского союза 1815 года и последующими дополнениями, германские государства в рамках механизма союза должны действовать на основе совместных консультаций и коллегиальности, а не по единоличному призыву или реорганизации одного из членов... Нынешние действия правительства [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] явно выходят за рамки духа этой системы и договорных границ, представляя собой вызов существующей структуре союза и вызывая неизбежные опасения за региональный мир и стабильность».\n\n«Если правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в будущем продолжит продвигать этот союз и наделять его юридической силой, как внешней, так и внутренней, то правительство [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] будет вынуждено рассматривать этот шаг как серьёзное действие, угрожающее порядку в союзе, и оставляет за собой право принять ответные меры в подходящее время, характер, способ и масштабы которых будут определяться в зависимости от развития ситуации»."
 joi_flavor_expand.29.a: "Может, стоит прощупать позицию Австрии по этому вопросу?"
 joi_flavor_expand.29.b: "Лучше не стоит. Давайте уладим всё миром с Австрией."

 joi_flavor_expand.30.t: "Эрфуртский кризис"
 joi_flavor_expand.30.d: "Под давлением [SCOPE.sCountry('erfurter_scope').GetAltNameNoFlag('RU_CL_RP')] северогерманские государства были вынуждены согласиться на их незаконные требования и сформировать так называемый «Эрфуртский союз», чтобы продолжить своё так называемое «объединение Германии». Когда новость достигла города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], министры кабинета один за другим стали просить, чтобы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName] уполномочил премьер-министра мобилизовать армию и принять решительные меры для поддержания авторитета Германского союза."
 joi_flavor_expand.30.f: "«Если германское государство имеет общего главу государства с негерманским, то оно должно иметь свою собственную конституцию, правительство и администрацию, отдельные от конституции, правительства и администрации негерманского государства... Германские государства, если они не ограничены конституцией, сохраняют свою независимость; они обладают всеми суверенными правами и полномочиями, если те не были явно переданы имперским властям».\n\n«Правительства отдельных государств могут свободно направлять представителей в Имперский исполнительный комитет... Правительства имеют право заключать договоры с другими германскими правительствами, однако все договоры, не относящиеся к чисто частному праву, должны быть представлены имперским властям для ознакомления; а если затронуты имперские интересы, то и для утверждения»."
 joi_flavor_expand.30.a: "В эти неспокойные времена нам лучше заняться собственными делами."
 joi_flavor_expand.30.b: "Скажите этим проклятым #tooltippable_name [SCOPE.sCountry('erfurter_scope').GetAdjective|l]им#! деятелям, что какие бы идеи они ни вынашивали, у их так называемого союза есть только два пути: роспуск или война!"

 joi_flavor_expand.31.t: "Эрфуртская конституция"
 joi_flavor_expand.31.d: "Благодаря уступкам со стороны [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], был быстро разработан текст конституции по образцу «Конституции Паульскирхе». Несмотря на её #O консервативный характер#!, многие немцы считают, что [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle|l] [ROOT.GetCountry.GetRuler.GetFullName] сделал ключевой шаг на пути к объединению Германии."
 joi_flavor_expand.31.f: "«Имперское правительство возглавляется имперским исполнительным комитетом под руководством Палаты князей... Титул главы имперской администрации связан с короной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]; государства, назначающие общих представителей в имперскую палату, должны достичь соглашения об их избрании; в случае отсутствия соглашения, порядок сотрудничества сторон будет определён имперским законом».\n\n«Имперский исполнительный комитет представляет Германскую империю и германские государства в соответствии с международным правом; назначает имперских послов и консулов и ведает дипломатическими сношениями... Имперский исполнительный комитет в сотрудничестве с Рейхстагом может заключать союзы и договоры с иностранными государствами, представляя их на утверждение в тех случаях, когда затрагиваются интересы империи»."
 joi_flavor_expand.31.a: "Да здравствует [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]!"

 joi_flavor_expand.32.t: "Ольмюцкое соглашение"
 joi_flavor_expand.32.d: "Из-за огромного давления, оказанного в последнее время правительством [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], члены Эрфуртского союза один за другим объявили о выходе. Ввиду этого [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] был[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] вынужден[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] принять условия Австрии и объявить о роспуске союза. Многие сочли это падением славы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и знаком капитуляции перед Австрией — они назвали это «Ольмюцким унижением»."
 joi_flavor_expand.32.f: "«Правительства [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] заявляют о своём намерении окончательно и бесповоротно урегулировать дела курфюршеств Гессен и Гольштейн совместным решением всех германских правительств... Для обеспечения сотрудничества между правительством во Франкфурте и другими германскими правительствами, следует как можно скорее назначить по одному комиссару от членов союза во Франкфурте и от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] для согласования совместных мер».\n\n«[SCOPE.sCountry('PRU_scope').GetNameNoFlag] соглашается распустить союз и восстановить Германский союз, а [SCOPE.sCountry('AUS_scope').GetNameNoFlag] также соглашается на усиление обороноспособности союза, организацию и дополнение правовой защиты и удовлетворение материальных потребностей государств-членов»."
 joi_flavor_expand.32.a: "Беспрецедентный позор для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]! Мы должны создать армию, чтобы отомстить в будущем!"
 joi_flavor_expand.32.b: "Беспрецедентный позор для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]! Мы должны развивать промышленность, чтобы отомстить в будущем!"
 #События, связанные с кризисом из-за Святых мест##############################################################
 joi_flavor_expand.33.t: "[SCOPE.sCountry('RUS_scope').GetNameNoFlag] требует Иерусалим!"
 joi_flavor_expand.33.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] получил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] уведомление от [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], требующую, чтобы наша страна «вернула» им Святую землю, #V Иерусалим#!, до воскресенья первой недели следующего месяца. Они заявляют, что если мы не подчинимся, наши гонения на местных православных христиан вынудят их применить против нас военную силу."
 joi_flavor_expand.33.f: "«У нас на руках больной, очень больной человек. Будет большой бедой, если он однажды ускользнёт от нас, особенно до того, как будут сделаны необходимые приготовления».\n\n«Ваше Величество столь милостивы, позвольте мне добавить ещё кое-что. Ваше Величество говорите, что человек болен, и это совершенно верно; но, с вашего позволения, я скажу, что долг сильного и великодушного человека — обходиться с больным и слабым с нежностью»."
 joi_flavor_expand.33.a: "Мы можем лишь стерпеть унижение."
 joi_flavor_expand.33.b: "Призвать к джихаду, уведомить великие державы и просить их о помощи!"

 joi_flavor_expand.34.t: "Кризис из-за Святых мест!"
 joi_flavor_expand.34.d: "Территориальные претензии [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] на #yellow Иерусалим#! спровоцировали новую войну с [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_TP')]. Учитывая растущую угрозу со стороны [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] на Ближнем Востоке и в Средиземноморье, Султан прислал посланника, чтобы убедить нашу страну присоединиться к войне против российской агрессии."
 joi_flavor_expand.34.f: "«Спор о Святых местах приобрёл новый характер — несправедливость, которую греческая церковь надеялась предотвратить, уже свершилась, и теперь цель должна состоять в том, чтобы найти способ исправить эту несправедливость. Успех [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на переговорах в Константинополе был достигнут исключительно благодаря интригам и насилию. [SCOPE.sCountry('RUS_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] всегда считал насилие последним средством, но на деле их нынешний правитель с самого начала привык к его использованию»."
 joi_flavor_expand.34.a: "[SCOPE.sCountry('RUS_scope').GetNameNoFlag] слишком сильна, мы не сможем её победить."
 joi_flavor_expand.34.b: "Это отличный шанс навсегда изгнать [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_VP')] из Средиземноморья. Вперёд, на Балканы!"

 joi_flavor_expand.35.t: "Хранитель Святых мест"
 joi_flavor_expand.35.d: "С возвращением #yellow святого города Иерусалима#! под управление Патриархата, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] достиг[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ла', '')] апогея своего влияния. Московский патриарх провозгласил его «Святым и Хранителем Святых мест», что вызвало волну празднований. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] приказал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] объявить сегодняшний день новым праздником в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] в честь возвращения Святой земли и славных подвигов армии."
 joi_flavor_expand.35.f: "И сказал Бог: «Возьми сына твоего, единственного твоего, которого ты любишь, Исаака; и пойди в землю Мориа и там принеси его во всесожжение на одной из гор, о которой Я скажу тебе».\n\nИ пришли на место, о котором сказал ему Бог; и устроил там Авраам жертвенник, разложил дрова и, связав сына своего Исаака, положил его на жертвенник поверх дров. И простёр Авраам руку свою и взял нож, чтобы заколоть сына своего. Но Ангел Господень воззвал к нему с неба и сказал: «Авраам! Авраам!» Он сказал: «Вот я». Ангел сказал: «Не поднимай руки твоей на отрока и не делай над ним ничего, ибо теперь Я знаю, что боишься ты Бога и не пожалел сына твоего, единственного твоего, для Меня».\n\nИ возвёл Авраам очи свои и увидел: и вот, позади овен, запутавшийся в чаще рогами своими. Авраам пошёл, взял овна и принёс его во всесожжение вместо сына своего. И нарёк Авраам имя месту тому: Иегова-ире; потому и ныне говорится: «на горе Господней усмотрится»."
 joi_flavor_expand.35.a: "Да здравствует [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]!"

 joi_flavor_expand.36.t: "Парижский мир: поражение"
 joi_flavor_expand.36.d: "Договор, подписанный в #yellow Париже#!, положил конец войне между нами, [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_TP')] и другими странами. Наша попытка вернуть #yellow Иерусалим#! провалилась. В то же время сообщается, что [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] скончался во дворце от пневмонии. Ходят слухи, что на самом деле он покончил с собой, не вынеся унижения."
 joi_flavor_expand.36.f: "«Статья VII. Высокая Порта признана допущенною к участию в выгодах общего права и союза держав европейских. Их величества обязуются, каждый со своей стороны, уважать независимость и целость [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]».\n\n«Статья XI. Чёрное море объявляется нейтральным: открытое для торгового мореплавания всех народов, оно навсегда закрывается для военных судов как прибрежных, так и всех других держав... Его Величество Царь [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] и Его Величество Султан обязуются не создавать и не сохранять на этих берегах никаких военно-морских арсеналов».\n\n«Статья XXX. Его Величество Царь всероссийский и Его Величество Султан сохраняют в целости свои владения в Азии в том составе, в каком они находились законно перед разрывом».\n\n«Статья XXXIV. Настоящий трактат будет ратификован, и ратификации будут обменены в Париже в течение четырех недель или ранее, если это возможно».\n\nВ удостоверение чего уполномоченные подписали и скрепили его своими печатями."
 joi_flavor_expand.36.a: "Великий позор для империи!"

 joi_flavor_expand.37.t: "Парижский мир: победа"
 joi_flavor_expand.37.d: "Договор, подписанный в #yellow Париже#!, положил конец нашей войне с [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')]. Мы одержали блестящую победу, и [SCOPE.sCountry('RUS_scope').GetRuler.GetPrimaryRoleTitle] был вынужден пойти на уступки великой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. Более того, говорят, что правитель [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], не вынеся унижения, умер от ярости в своём Зимнем дворце."
 joi_flavor_expand.37.f: "«Статья VII. Высокая Порта признана допущенною к участию в выгодах общего права и союза держав европейских. Их величества обязуются, каждый со своей стороны, уважать независимость и целость [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]».\n\n«Статья XI. Чёрное море объявляется нейтральным: открытое для торгового мореплавания всех народов, оно навсегда закрывается для военных судов как прибрежных, так и всех других держав... Его Величество Царь [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] и Его Величество Султан обязуются не создавать и не сохранять на этих берегах никаких военно-морских арсеналов».\n\n«Статья XXX. Его Величество Царь всероссийский и Его Величество Султан сохраняют в целости свои владения в Азии в том составе, в каком они находились законно перед разрывом».\n\n«Статья XXXIV. Настоящий трактат будет ратификован, и ратификации будут обменены в Париже в течение четырех недель или ранее, если это возможно».\n\nВ удостоверение чего уполномоченные подписали и скрепили его своими печатями."
 joi_flavor_expand.37.a: "Туда им и дорога, открываем шампанское!"

 ##德意志邦联事件
 joi_flavor_expand.38.t: "Закон о контроле над прессой от [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_expand.38.d: "Благодаря неукоснительному исполнению Карлсбадских указов, радикализм, социализм и либерализм в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] постепенно сошли на нет. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] и правительство успешно стабилизировали реакционный порядок, к которому так стремились."
 joi_flavor_expand.38.f: "«Все государства-члены Германского союза торжественно обязуются с высочайшей бдительностью и всей серьезностью осуществлять надзор за публикуемыми в их странах газетами, журналами и брошюрами, используя для этого любые доступные средства, дабы предотвратить взаимные нападки и неприятные диспуты».\n\n«Их мнения колеблются между умеренным либерализмом и жесткими мерами. Однако стоит первобытной толпе однажды проявить себя в каком-либо государстве, нет никаких гарантий, что она не вспыхнет вновь в любой момент и против любой другой цели».\n\n— Клеменс фон Меттерних"
 joi_flavor_expand.38.a: "Государство обязано строго контролировать все слои общества!"
 joi_flavor_expand.39.t: "Наследники корпуса Лютцова"
 joi_flavor_expand.39.d: "Новый курс на либерализацию отменил реакционные союзные декреты о цензуре. Правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], издавшее новые законы, получило единодушную поддержку академических кругов и многих слоев общества. В столице был поднят черно-красно-золотой флаг, берущий свое начало от добровольческого корпуса Лютцова, а [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] был провозглашен «Освободителем германской нации»."
 joi_flavor_expand.39.f: "«Мы клянемся быть истинным братством, неразлучным ни в час опасности, ни перед лицом смерти; мы клянемся обрести свободу, как наши предки, и скорее умрем, нежели будем влачить жалкое существование в рабстве. То, что некогда воспевалось пламенной арфой, ныне отвоевано свободным мечом!»\n\n— Фридрих Шиллер"
 joi_flavor_expand.39.a: "Да здравствует свобода слова!"
 joi_flavor_expand.39.b: "Свободная наука укажет путь к процветанию нации!"