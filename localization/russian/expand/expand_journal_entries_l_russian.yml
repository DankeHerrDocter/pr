 war_of_german_unification_frankfurter_kleindeutsche_reason: "[ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] провозглашен Франкфуртским национальным собранием #variable «императором всех немцев»#!, властителем всего Германского союза.\nОднако многие противники как на международной арене, так и внутри Союза, опасаясь за свою власть, объявили Собрание нелегитимным и отказались признать объединение. Грядёт война, и только блистательная победа заложит основу нашей великой #variable Германской империи#!. Проигравших ждёт забвение."
