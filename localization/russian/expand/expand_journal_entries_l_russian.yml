 perfer_a_complete_deutsch_reich: "Мы официально поддержим сторонников «Великой Германии» в Собрании. Это, несомненно, вызовет подозрения у великих держав, следящих за его работой."
 not_perfer_a_complete_deutsch_reich: "Мы официально выступим против сторонников «Великой Германии» и будем придерживаться этой позиции в дальнейших обсуждениях."
 perfer_a_complete_deutsch_reich_2: "Мы твёрдо заявим о своей поддержке «Великой Германии», что значительно воодушевит её сторонников в Собрании!"
 not_perfer_a_complete_deutsch_reich_2: "Мы решительно выступим против «Великой Германии». Если другие великие германские державы не выразят свою поддержку, этот план будет отложен в пользу «Малой Германии»."
 accept_crossdeutsche_crown_tt: "Мы примем титул #bold «императора всех немцев»#! и корону от Франкфуртского собрания. Это вызовет панику среди европейских держав, которые, объединившись с противниками коронации, начнут войну, чтобы заставить нас отказаться от титула. Однако, если мы одержим победу, германским государствам придётся признать наше право на объединение!"
 refuse_crossdeutsche_crown_tt: "Наша страна откажется от титула #bold «императора всех немцев»#!. Собрание попытается найти другую великую германскую державу, готовую принять титул. Если желающих не найдётся, план «Великой Германии» будет отложен, и Собрание переключится на «Малую Германию»."
 accept_kleindeutsche_crown_tt: "Наша страна примет титул #bold «императора немцев»#! и корону от Франкфуртского собрания. Однако другие великие германские державы откажутся признать легитимность этого титула и начнут войну против нас."
 refuse_kleindeutsche_crown_tt: "Наша страна откажется от титула #bold «императора немцев»#!. Собрание попытается найти другую великую германскую державу, готовую принять титул. Если желающих не найдётся, Собрание будет распущено, и все усилия по объединению Германии окажутся напрасными."
 deutsch_frankfurter_nationalversammlung_fail_4_tt: "Поражение в войне за объединение."
 give_north_italy_to_fra_tt: "Поскольку мы не контролируем Рейнскую область, Франция потребует уступить #O Северную Италию#! и #O Далмацию#!."
  #Войны за объединение Германии
 war_of_german_unification_frankfurter_crossdeutsche: "Война за объединение Германии"
 war_of_german_unification_frankfurter_crossdeutsche_reason: "[ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] провозглашен Франкфуртским национальным собранием #variable «императором всех немцев»#!, властителем всего Германского союза.\nОднако многие противники как на международной арене, так и внутри Союза, опасаясь за свою власть, объявили Собрание нелегитимным и отказались признать объединение. Грядёт война, и только блистательная победа заложит основу нашей великой #variable Германской империи#!. Проигравших ждёт забвение."
 war_of_german_unification_frankfurter_crossdeutsche_tt: "Франкфуртское собрание одержит победу, и наша страна установит власть над всем Германским союзом."
 war_of_german_unification_frankfurter_crossdeutsche_fail_tt: "Авторитет Франкфуртского собрания будет подорван, и оно будет распущено. Призывы к объединению Германии утихнут на долгое время."
 war_of_german_unification_frankfurter_crossdeutsche_status: "#bold Во имя короны, дарованной Собранием, сокрушите всех врагов, стоящих на пути к единству Германии!#!"
