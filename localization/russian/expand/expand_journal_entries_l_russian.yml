l_russian:
  #Германский союз
 deutsch_bundestag: "Германский союз"
 deutsch_bundestag_status: "#bold Германские государства, изучившие #variable национализм#! и переживающие #variable «Весну народов»#!, могут спровоцировать революцию. Её целью будет созыв Национального собрания, которое заменит существующий Союз и попытается объединить Германию!#!"
 deutsch_bundestag_frankfurter_status: "#N #B Революционное Франкфуртское национальное собрание временно взяло на себя все функции Союзного сейма.#!#!"
 deutsch_bundestag_rebuild_status: "#bold После реорганизации Германский союз продолжает свою работу, хотя и носит во многом формальный характер.#!"
 deutsch_bundestag_reason: "Пока существует #O Германский союз#!, #variable Франкфуртское национальное собрание#! может быть созвано в любом #yellow немецком государстве#! при выполнении следующих условий:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_nationalism_tech_researched_checkbox')] Изучена [concept_technology|l] #v «Национализм»#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_spring_time_of_people_checkbox')] Активна [concept_journal_entry|l] #v «Весна народов».#!\n\n#bold Германский союз#!, учреждённый на #variable Венском конгрессе 1815 года#!, был создан для защиты германских княжеств, уцелевших после агрессии со стороны #tooltippable_name [SCOPE.sCountry('FRA_scope').GetAdjectiveNoFlag|l]ой#! державы. Эта конфедерация была ещё более рыхлой, чем прежние Священная Римская империя или Рейнский союз. Входящие в неё государства не были связаны ни #bold военным#!, ни #bold торговым союзом#!, и не существовало единого свода законов, который бы их объединял.\n\nХотя Союз и не был полноценным государством, его #B Союзный сейм, заседавший во Франкфурте,#! обладал определённым авторитетом. Однако на его решения решающее влияние оказывали две #B ведущие державы#!: #bold [SCOPE.sCountry('AUS_scope').GetNameNoFlag], бессменный председатель#!, и #bold [SCOPE.sCountry('PRU_scope').GetNameNoFlag], его заместитель#!.\n\n#V Франкфуртский союзный сейм#! продолжает действовать. В случае оборонительной [Concept('concept_war', 'войны')] германские государства могут обратиться за помощью к этим двум державам."
 deutsch_bundestag_tt_1: "Если какому-либо государству удастся #bold объединить Германию#!, Союз будет распущен, а его сейм прекратит работу."
 deutsch_bundestag_1_button: "Сослаться на статью XI Союзного акта"
 deutsch_bundestag_1_button_desc: "Венский конгресс обязал две ведущие державы Союза защищать свободу и независимость германских княжеств. Поскольку мы втянуты в оборонительную войну, согласно статье XI Союзного акта, Австрия и Пруссия обязаны оказать нам военную поддержку."
 deutsch_bundestag_1_button_tt: "    #bold Требования#!:\n• Участие в оборонительной войне\n• Отсутствие войны с Пруссией или Австрией\n• Вы являетесь малым германским государством"
 deutsch_bundestag_1_2_button_tt: "#bold Требование нейтралитета#!:\nНельзя выступать против Пруссии или Австрии в каких-либо [Concept('concept_diplomatic_play', 'дипломатических играх')]."
 deutsch_bundestag_1_3_button_tt: "  #bold Требование для малых держав#!:\nТолько малые германские государства могут ссылаться на эту статью. Ваша страна не может быть Пруссией или Австрией."
 deutsch_bundestag_1_effect_tt: "[SCOPE.sCountry('PRU_scope').GetNameNoFlag] и [SCOPE.sCountry('AUS_scope').GetNameNoFlag] получат [Concept('concept_obligation', 'обязательство')] перед обороняющейся стороной."
 deutsch_bundestag_2_button: "Внести выгодное предложение"
 deutsch_bundestag_2_button_desc: "Германский союз должен служить площадкой, где великие германские державы демонстрируют своё влияние. Следует инициировать в Союзном сейме обсуждение законопроекта, который принесёт выгоду нашему государству."
 deutsch_bundestag_2_button_tt: "Предложение можно вносить только раз в 5 лет."
 deutsch_bundestag_1_button_tt_2: "Вы не #bold ссылались на эту статью#! в течение последних 5 лет."
 deutsch_bundestag_2_button_tt_2: "Вы не #bold вносили выгодных предложений#! в течение последних 5 лет."
  #Мечты о Германии
 dream_of_germany: "Мечты о Германии"
 dream_of_germany_reason: "«#variable Первые, изначальные и истинно природные границы государств#!, без сомнения, — их внутренние границы. Люди, говорящие на одном языке, соединены друг с другом множеством незримых уз самой природой, задолго до того, как зародилось какое-либо человеческое искусство; они понимают друг друга и способны совершенствовать это понимание; они принадлежат друг другу и по природе своей едины и неразделимы».\n\n#yellow Священная Римская империя#! давно стала достоянием истории. На протяжении сотен лет у нашей нации не было #V сильного центрального правительства#!, но это не мешало процветанию нашей родины. #yellow Ганзейский союз#!, объединявший сотни городов Северной Германии, сыграл ключевую роль в достижении нынешнего благосостояния. Рост знаний, а также морская и сухопутная торговля способствовали бурному развитию земель #yellow Германского союза#!, превратив их в процветающий промышленный центр.\n\nНастала эпоха #V национализма#!, и мечта о #P единой Германии#! пылает в сердцах бесчисленных соотечественников. #B Удобство транспортного сообщения способствовало культурному обмену, а Германский таможенный союз и Германский союз укрепили сплочённость нации.#! Всё это предвещает наступление величайшего, #V судьбоносного дня#! для немецкого народа: #B германская отчизна будет едина на европейском континенте!#!\n\nВеликие германские державы жаждут этой вечной славы. [ROOT.GetCountry.GetNameNoFlag] не може[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')] оставаться в стороне, ведь мы верим, что #V честь объединения Германии#! будет принадлежать нам!\n\n#variable Вперёд, за германскую отчизну!#!"
 dream_of_germany_1_tt: "Наше государство объединило Германию."
 dream_of_germany_status: "#bold #U Судьбоносный день для германской нации близок!#!#!"
 dream_of_germany_2_tt: "Германия была объединена другим государством."
  #Врата на континент
 belgium_interest: "Врата на континент"
 belgium_interest_reason: "Индикатор показывает, какие [Concept('concept_country', 'страны')] в данный момент обладают влиянием в Бельгии.\n\nРасположенная в #V самом сердце Нижних земель#!, между #yellow Францией#! и #yellow Германским союзом#!, [SCOPE.sCountry('BEL_scope').GetNameNoFlag] после обретения независимости от #yellow Объединённого королевства Нидерландов#! стала важным европейским торговым центром. Антверпен и Брюссель, находящиеся на пересечении морских путей #bold Атлантики#! и #bold Рейна#!, благодаря своему #bold выгодному географическому положению#! и #bold низким пошлинам#!, стали не только воротами для британских товаров на европейский рынок, но и основными городами для торговли между немецкими и французскими купцами.\n\nОднако, зажатая между соседями, [SCOPE.sCountry('BEL_scope').GetNameNoFlag] в политическом плане не так спокойна, как в торговом. #yellow Франция#! стремится к #bold «естественным границам»#! и мечтает подчинить Бельгию. #yellow Великобритания#!, исходя из стратегических интересов, сдерживает французское вторжение. А державы #yellow Германского союза#! надеются включить Нижние земли в свою сферу влияния для обеспечения военных интересов.\n\nСудьба Бельгии, окружённой соседями, #V зависит от исхода противостояния великих держав.#!"
 some_one_get_highest_score: "Одна из [Concept('concept_country', 'стран')]-участниц набрала 500 очков влияния."
 now_has_belgium_interest: "Бельгия, врата Европы, всё ещё независима."
 end_belgium_interest: "#V [concept_journal_entry] «Врата на континент»#! будет удалена у всех стран-участниц.\nЕсли [SCOPE.sCountry('BEL_scope').GetNameNoFlag] перестанет существовать, эта запись в дневнике станет недействительной!\nЕсли страна-участница не станет победителем этой [Concept('concept_journal_entry', 'записи в дневнике')], она получит отрицательный модификатор со следующим эффектом:"
 status_gbr_advantage: "Великобритания получает преимущество."
 status_ger_advantage: "Германия получает преимущество."
 status_fra_advantage: "Франция получает преимущество."
 status_no_advantage: "Ни одна [Concept('concept_country', 'страна')] не имеет преимущества."
 belgium_invest_cold_tt: "Отсутствует [concept_modifier] #bold «Инвестиции в Бельгию»#!."
 no_belgium_interest: "Бельгия уже склонилась на сторону одного из участников.\nЕсли Бельгия перестанет существовать, эта запись в дневнике станет недействительной!"
 higher_than_1000_bel: "Наше влияние в Бельгии: #bold 500#!."
 belgium_invest_gbr_tt: "Ваше государство — #bold Великобритания#!."
 belgium_invest_fra_tt: "Ваше государство — #bold Франция#!."
 belgium_invest_ger_tt: "Ваше государство — #bold Германия или Священная Римская империя#!.\nЧтобы участвовать в борьбе за Бельгию, Германия должна быть единой!"
 belgium_interest_1_button: "Инвестировать в Бельгию"
 belgium_interest_1_button_desc: "Чтобы сохранить влияние [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Бельгии и обеспечить наши торговые преимущества на континенте, канцлер казначейства предложил кабинету план. Согласно ему, Банк Англии предоставит финансовую помощь [SCOPE.sCountry('BEL_scope').GetAltNameNoFlag('RU_CL_DP')], что усилит её экономическую зависимость от нас и укрепит наши позиции."
 belgium_interest_2_button: "Инвестировать в Бельгию"
 belgium_interest_2_button_desc: "Будучи небольшой страной, граничащей с могущественной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], [SCOPE.sCountry('BEL_scope').GetNameNoFlag], несомненно, испытывает тревогу. Однако из-за влияния Британии и германских государств наши планы по [Concept('concept_war', 'войне')] с Бельгией в ближайшее время неосуществимы. Почему бы не поручить Банку Франции инвестировать в бельгийскую экономику, чтобы установить над ней контроль?"
 belgium_interest_3_button: "Инвестировать в Бельгию"
 belgium_interest_3_button_desc: "Слабая [SCOPE.sCountry('BEL_scope').GetNameNoFlag] не выказывает страха перед нашей могучей армией, и за этим, без сомнения, стоят козни англичан и французов. Географическое положение Бельгии открывает стратегический путь во Францию. Кабинет считает, что вместо военных действий можно оказать бельгийцам финансовую помощь из нашей казны. Это заставит их быть благодарными и постепенно поставит в зависимость от нас."
 belgium_interest_4_button: "Потребовать подписания Лондонского договора"
 belgium_interest_4_button_desc: "Влияние Великобритании в [SCOPE.sCountry('BEL_scope').GetAltNameNoFlag('RU_CL_PP')] теперь превосходит влияние всех конкурентов. Используем это, чтобы заставить правительство в Брюсселе подписать выгодный для нас договор и положить конец борьбе за Бельгию!"
 belgium_interest_5_button: "Потребовать подписания Парижского договора"
 belgium_interest_5_button_desc: "Влияние Франции в [SCOPE.sCountry('BEL_scope').GetAltNameNoFlag('RU_CL_PP')] теперь превосходит влияние всех конкурентов. Используем это, чтобы заставить правительство в Брюсселе подписать выгодный для нас договор и положить конец борьбе за Бельгию!"
 belgium_interest_6_button: "Потребовать подписания Берлинского договора"
 belgium_interest_6_button_desc: "Влияние Германии в [SCOPE.sCountry('BEL_scope').GetAltNameNoFlag('RU_CL_PP')] теперь превосходит влияние всех конкурентов. Используем это, чтобы заставить правительство в Брюсселе подписать выгодный для нас договор и положить конец борьбе за Бельгию!"
 belgium_interest_button_tt: "Начинает ежемесячно добавлять 5 #bold влияния в Бельгии#!."
 resent_cancel_bel_investment_tt: "Инвестиции не отменялись в течение последних 3 месяцев."
 belgium_interest_7_button: "Отменить инвестиции"
 belgium_interest_7_button_desc: "Инвестиции в Бельгию стали тяжёлым бременем для нашей казны. Чтобы сдержать рост дефицита бюджета, мы должны уведомить бельгийскую сторону о приостановке финансирования."
 belgium_interest_7_button_possible_tt: "В последние 3 месяца инвестиции в Бельгию не производились."
 belgium_interest_7_button_effect_tt: "Мы прекратим расходы на инвестиции в Бельгию."
 belgium_interest_gbr_progress_bar: "Влияние Великобритании"
 belgium_interest_gbr_progress_bar_desc: "Влияние Великобритании: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 belgium_interest_fra_progress_bar: "Влияние Франции"
 belgium_interest_fra_progress_bar_desc: "Влияние Франции: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 belgium_interest_pru_progress_bar: "Влияние Германии"
 belgium_interest_pru_progress_bar_desc: "Влияние Германии: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 is_investing_belgium: "Инвестирует в #B Бельгию#!"
  #Союз трёх императоров
 dip_dreikaiserabkommen: "Союз трёх императоров"
 dip_dreikaiserabkommen_reason: "Старый баланс сил в #yellow Европе#! изменился с объединением и возвышением [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')]. Хотя #V Священный союз#! остался в далёком прошлом, #B общность политических систем и интересов#! между #yellow Германской империей#!, #yellow Австрией#! и #yellow Российской империей#! позволяет нам создать новый альянс. Он поможет #B урегулировать геополитические разногласия и поддерживать мир на восточных границах#!.\n\nНаши общие границы в Восточной Европе часто создавали #R напряжённую обстановку#!, и ранее не существовало эффективных международных соглашений для разрешения конфликтов.\n\nОднако подписание #V «Венского соглашения»#! позволило нашим трём державам преодолеть былые разногласия и вновь объединиться. Мы стремимся установить дружеские и доверительные отношения, чтобы, как и во времена #variable Священного союза, поддерживать естественный порядок в Европе#!."
 dip_dreikaiserabkommen_tt: "Поддерживайте действие договора Союза трёх императоров для обеспечения мира в Восточной Европе."
 refuse_dreikaiserabkommen_tt: "Это откроет для нашей страны возможность создать Союз трёх императоров.\nЕсли одна из сторон откажется от соглашения, эта [Concept('concept_journal_entry', 'запись в дневнике')] будет закрыта!"
 dip_dreikaiserabkommen_possible_tt: "[concept_journal_entry] #bold Священный союз#! для всех трёх держав прекращена."
 dip_dreikaiserabkommen_fail_tt: "Любой из #bold участников#! Союза трёх императоров вышел из договора."
 dip_dreikaiserabkommen_fail_rus_tt: "Состояние [Concept('concept_war', 'войны')] с Россией."
 dip_dreikaiserabkommen_fail_aus_tt: "Состояние [Concept('concept_war', 'войны')] с Австрией."
 dip_dreikaiserabkommen_fail_ger_tt: "Состояние [Concept('concept_war', 'войны')] с Германией."
 dip_dreikaiserabkommen_possible_1_tt: "[Concept('concept_relations', 'Отношения')] с Германией не ниже 60."
 dip_dreikaiserabkommen_possible_2_tt: "[Concept('concept_relations', 'Отношения')] с Австрией не ниже 60."
 dip_dreikaiserabkommen_possible_3_tt: "[Concept('concept_relations', 'Отношения')] с Россией не ниже 60."
 dip_dreikaiserabkommen_1_button: "Продлить «Договор перестраховки»"
 dip_dreikaiserabkommen_1_button_desc: "Срок действия предыдущего [Concept('concept_diplomatic_pact', 'дипломатического пакта')] между нашими тремя странами истёк. Для сохранения доверия было бы полезно подписать новое соглашение, проникнутое духом мира и дружбы."
 dreikaiserabkommen_1_possibel_tt: "Прошло не менее 10 лет с момента подписания последнего «Договора перестраховки»."
 dip_dreikaiserabkommen_2_button: "Потребовать исполнения союзнических обязательств"
 dip_dreikaiserabkommen_2_button_desc: "Согласно условиям союзного договора, мы ведём оборонительную войну. Пришло время потребовать от наших союзников выполнить свои военные обязательства и прийти на помощь!"
 dreikaiserabkommen_2_possibel_tt: "Требовать исполнения обязательств можно лишь раз в 10 лет."
 dip_dreikaiserabkommen_2_effect_tt: "Все участники договора получат [Concept('concept_obligation', 'обязательство')] перед обороняющейся стороной."
 dip_dreikaiserabkommen_3_button: "Выйти из «Союзного договора»"
 dip_dreikaiserabkommen_3_button_desc: "Союзный договор больше не отвечает геополитическим интересам нашей страны. Возможно, выход из него будет лучшим решением."
 dreikaiserabkommen_3_possible_tt: "Наша страна состоит в Союзе трёх императоров."
 dreikaiserabkommen_3_effect_tt: "Наша страна #bold выйдет из Союза трёх императоров#!.\nЭто действие удалит [Concept('concept_journal_entry', 'запись в дневнике')] о Союзе трёх императоров у #bold всех участников#!."
  #Священный союз
 holy_league_main: "Священный союз"
 holy_league_main_reason: "«#variable Во имя Пресвятой и Нераздельной Троицы#!, ввиду великих событий, ознаменовавших последние годы в Европе, и в особенности исходя из веры в #I Божественный порядок и провидение#!, их величества император [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], король [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')] и царь [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] убеждены, что их взаимоотношения должны основываться на высших истинах, преподанных нам вечной религией Бога Спасителя... Посему мы торжественно объявляем всему миру о нашей непоколебимой решимости: #bold ради защиты веры, мира и справедливости на континенте#! наши три правительства подпишут нерушимый союзный договор».\n\n#variable Великая французская революция#! и многие другие события служат предостережением: христианский мир, некогда стабильный и процветающий, подвергается разрушению. Как хранители и защитники #B древнего, истинного и священного европейского порядка#!, мы обязаны объединиться. Наш долг — сохранить мир и стабильность, установленные #variable Венским конгрессом#!. [GetLawType('law_monarchy').GetName] должна защитить славное и милосердное правление от любых заговоров и подрывной деятельности."
 holy_league_fail_tt: "Два или более члена вышли из #bold Священного союза#!."
 holy_league_fail_2_tt: "#bold Германия#! объединена."
 holy_league_fail_3_tt: "Наша страна решила выйти из #bold Священного союза#!."
 equal_leave_holy_league_tt: "Наша страна выйдет из #bold Священного союза#!."
 holy_league_status: "Защита древнего и священного порядка в Европе, основой которого является «[GetLawType('law_monarchy').GetName]»."
 holy_league_1_button: "Возродить антифранцузскую коалицию"
 holy_league_1_button_desc: "История Французской революции, похоже, повторяется: республиканское восстание охватило Францию, а древняя и священная королевская семья была изгнана и больше не занимает свой законный трон. Мы не можем оставаться в стороне! Пришло время объединиться и подавить этих смутьянов!"
 holy_league_2_button: "Ввести войска для подавления прусских революционеров"
 holy_league_2_button_desc: "Королевство Пруссия, член Священного союза, столкнулось с угрозой со стороны радикальных революционеров. Ради стабильности в Европе, согласно договору, мы должны направить войска на помощь прусской короне для подавления мятежа!"
 holy_league_3_button: "Ввести войска для подавления австрийских революционеров"
 holy_league_3_button_desc: "Австрийская империя, член Священного союза, столкнулась с угрозой со стороны радикальных революционеров. Ради стабильности в Европе, согласно договору, мы должны направить войска на помощь австрийской короне для подавления мятежа!"
 holy_league_4_button: "Ввести войска для подавления российских революционеров"
 holy_league_4_button_desc: "Российская империя, лидер Священного союза, столкнулась с угрозой со стороны радикальных революционеров. Ради стабильности в Европе, согласно договору, мы должны направить войска на помощь российской короне для подавления мятежа!"
 holy_league_5_button: "Выйти из Священного союза"
 holy_league_5_button_desc: "Хотя Священный союз в прошлом был выгоден нашей стране, с изменением международной обстановки этот альянс, основанный на непрагматичных интересах, стал для нас бесполезен. Возможно, выход из него будет правильным решением."
 holy_league_1_tt: "Совместная атака на Францию возможна лишь раз в 10 лет."
 holy_league_10_tt: "Подавление революции возможно лишь раз в 10 лет."
 holy_league_5_button_tt: "Наша страна выйдет из Священного союза."
 holy_league_5_button_2_tt: "Наша страна состоит в Священном союзе."
  #Закон о железных дорогах
 law_of_railway: "Закон о железных дорогах"
 law_of_railway_reason: "#bold Железные дороги и поезда#!, изобретённые в #V 1814 году#! в #yellow Великобритании#! «отцом железных дорог» #V Джорджем Стефенсоном#!, стали #P величайшим достижением промышленной революции#! и быстро завоевали популярность. Их #B высокая скорость перевозок и огромная прибыльность#! побудили все великие державы мира начать активное строительство железнодорожных сетей, и наша страна не должна отставать.\n\nОднако развитие железных дорог требует от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] значительных капиталовложений. Наши [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] жалуются, что одних их инвестиций #B недостаточно, чтобы покрыть нашу великую страну сетью железных дорог#!. Мы не можем позволить, чтобы нехватка средств тормозила наше промышленное развитие. Правительство должно издать новый закон для #V содействия и регулирования железнодорожной отрасли.#!"
 law_of_railway_possible_tt: "Уже основана любая [Concept('concept_company', 'компания')], связанная со #bold строительством железных дорог#!, или этот закон уже принимался ранее."
 law_of_railway_fail_tt: "Не основано ни одной [Concept('concept_company', 'компании')], связанной со #bold строительством железных дорог#!."
  #Имперский закон об отмене рабства
 abolition_of_slavery_act: "Имперский закон об отмене рабства"
 abolition_of_slavery_act_reason: "Согласно #variable «Закону об отмене рабства 1833 года»#!, изданному нашим сюзереном, [SCOPE.sCountry('GBR_scope').GetNameNoFlag], #bold рабство является незаконным на всей территории Британской империи#!. Все рабы, являющиеся подданными империи, #bold должны быть освобождены по закону#!. Однако из-за особых исторических обстоятельств в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] рабство всё ещё существует.\n\nУайтхолл уже выразил нашему правительству серьёзную озабоченность по поводу нарушения имперского законодательства. Премьер-министр передал нам волю британского правительства: если мы в ближайшее время не подчинимся решению Вестминстера и не отменим рабство, #bold то [SCOPE.sCountry('GBR_scope').GetNameNoFlag] оставля[SCOPE.sCountry('GBR_scope').GetAltNameNoFormatting('RU_CL_END_T')] за собой право применить любые меры, включая военную силу, против работорговцев в наших имперских владениях.#!"
 abolition_of_slavery_act_button: "Исполнить «Закон об отмене рабства 1833 года»"
 abolition_of_slavery_act_button_desc: "Исходя из принципов морали и человеческой свободы, мы должны подчиниться воле парламента и Уайтхолла. В соответствии с «Законом об отмене рабства 1833 года» мы начинаем законодательный процесс по отмене рабства на нашей территории."
  #Деспотизм
 despotism_inside_your_nation: "Деспотия в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 despotism_inside_your_nation_reason: ""
 despotism_inside_your_nation_fail_tt: "Антидеспотические настроения достигли предела, и либеральные идеи охватили всё общество."
 despotism_inside_your_nation_on_fail_tt: "Наши граждане поднимут восстание против действующего правительства. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен' )] принять ключевое решение относительно своей деспотической власти!"
 despotism_inside_your_nation_low: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] всё ещё имеет много сторонников."
 despotism_inside_your_nation_medium: "Призывы к свержению деспота находят отклик у граждан."
 despotism_inside_your_nation_high: "Антидеспотические настроения охватили всё общество."
 despotism_inside_your_nation_always: "Легитимность деспотической власти пользуется широким признанием."
  #Франкфуртское национальное собрание
 deutsch_frankfurter_nationalversammlung: "Франкфуртское национальное собрание"
 deutsch_frankfurter_nationalversammlung_reason: "Со времён #variable наполеоновских войн#! #bold националистические настроения в Германском союзе#! вновь набирают силу, а революционеры взывают к #variable единству, справедливости и свободе!#!\nВ ходе #bold Мартовской революции#! восставшие вынудили правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и нашего [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle]а принять их условия. В результате, [SCOPE.sCharacter('frankfurter_leader').GetFirstName] был направлен во Франкфурт в качестве нашего представителя для участия в Национальном собрании, где обсуждаются вопросы #bold объединения Германии и принятия конституции#!.\n\nДля #bold радикалов и либералов#! нашей страны созыв Франкфуртского собрания — это знаковая победа. Однако #bold [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] и консерваторы,#! так не считают. В собрании преобладают сторонники #bold либерализма#!, и из-за обсуждаемой ими #variable имперской конституции#!, [SCOPE.sCharacter('frankfurter_ruler').GetPrimaryRoleTitle] скорее всего, будет вынужден отказаться от значительной части власти. Возможно, они даже, вдохновятся примером [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')], #bold заставят всех германских монархов отречься от престола и провозгласят республику.#!\n\nВпрочем, ещё ничего не решено. Собрание продолжает свою работу, и, оказывая на него влияние, мы, возможно, сможем добиться #bold выгодного для нашей страны решения.#!"
 deutsch_frankfurter_nationalversammlung_status: "#O Собрание продолжает работу и в любой момент может принять решение по конституции и германскому вопросу. Чем выше международный статус германского государства, тем весомее его голос.#!"
 deutsch_frankfurter_nationalversammlung_complete_1_tt: "Либералы получили абсолютное большинство в Собрании (70 и более)."
 deutsch_frankfurter_nationalversammlung_complete_2_tt: "Одна из великих германских держав приняла корону из рук Собрания и успешно объединила Германию."
 deutsch_frankfurter_nationalversammlung_fail_1_tt: "Влияние либералов в Национальном собрании ослабло (20 и менее)."
 deutsch_frankfurter_nationalversammlung_fail_2_tt: "Как минимум две великие германские державы покинули Собрание."
 deutsch_frankfurter_nationalversammlung_fail_3_tt: "Все великие германские державы отказались принять корону от Собрания."
 deutsch_frankfurter_nationalversammlung_1_button: "Покинуть Национальное собрание"
 deutsch_frankfurter_nationalversammlung_1_button_desc: "Деятельность Национального собрания начинает представлять серьёзную угрозу для нашего правительства. Так больше продолжаться не может! Несмотря на возможные протесты внутри страны, правительство должно приказать всем нашим представителям немедленно покинуть Собрание."
 deutsch_frankfurter_nationalversammlung_1_button_tt: "Наша страна выйдет из Национального собрания и не будет участвовать в дальнейших обсуждениях. Однако, если великие германские державы согласуют проект объединения, они могут силой принудить нас к его принятию."
 deutsch_frankfurter_nationalversammlung_2_button: "Покинуть Национальное собрание"
 deutsch_frankfurter_nationalversammlung_2_button_desc: "Радикализация Национального собрания сделала наше участие в нём невозможным. Интересы Германии? Это не главное. Приоритетом должны быть интересы нашего правительства. Немедленно отозвать представителей!"
 deutsch_frankfurter_nationalversammlung_2_button_tt: "Наша страна выйдет из Национального собрания. Лишившись нашей ключевой поддержки, Собрание, скорее всего, будет распущено, что может спровоцировать волну радикализма по всей Германии."
 deutsch_frankfurter_nationalversammlung_liberalism_progress_bar_name: "Влияние либералов"
