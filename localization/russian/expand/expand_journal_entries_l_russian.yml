  #Кризис из-за святых мест
 defend_the_holy_city: "Защита Святой земли"
 defend_the_holy_city_reason: "Царь [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], самопровозглашённый #B «защитник православия»#!, начал масштабное вторжение в нашу страну. Его солдаты пересекли Дунай, а флот вошёл в Босфор, стремясь захватить #V святыню всех мусульман — священный город Иерусалим#!.\n\nС тех пор как султан #V Селим I Грозный#! отвоевал Иерусалим у мамлюков, власть над Святой землёй принадлежит нам. Здесь #V пророк Мухаммед#! получил заветы от Аллаха, и отсюда происходит титул [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #B Хранитель святых мест#!. Мы не можем позволить нашему извечному врагу и неверным отнять у нас священный город! [ROOT.GetCountry.GetNameNoFlag] #B должна защитить свой суверенитет!#!"
 defend_the_holy_city_status: "#B #O Защитите наш суверенитет над Иерусалимом!#!#!"
 protect_the_holy_city: "Возвращение Святой земли"
 protect_the_holy_city_reason: "#B Настал славный час!#! Бесчисленные войны и удары ослабили нашего южного врага, [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]. Великая [ROOT.GetCountry.GetNameNoFlag] получила прекрасную возможность заявить о своих правах на Святую землю. Кроме того, имперские амбиции в Средиземноморье влекут нас преодолеть блокаду Босфора и утвердить нашу власть в #V Средиземном море#!.\n\nВ этот судьбоносный момент #B Император и Самодержец Всероссийский, Великий князь Финляндский, Царь Польский и защитник православных, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]#!, издал указ. Имперская армия, возродив великий #B дух крестовых походов#!, #V вернёт Землю обетованную под сень Господню.#!"
 protect_the_holy_city_status: "#B #P Захватите Землю обетованную: Иерусалим!#!#!"
 holy_city_crisis: "Кризис из-за святых мест"
 holy_city_crisis_reason: "Претензии [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] на #v Иерусалим#! спровоцировали новую масштабную войну в Европе. Этот несносный царь со времён #v наполеоновских войн#! возомнил себя #v «жандармом Европы»#!. Он не только вынашивает захватнические планы в Восточной Европе, но и постоянно вмешивается в наши дела.\n\nНужно показать [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_DP')], #b кто на самом деле хозяин в Европе и в мире#!. Нельзя позволить царю #b безнаказанно распространять своё влияние на Средиземноморье#! и угрожать нашим интересам. В этот критический момент мы должны помочь [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')], подвергшейся нападению, и #b хорошенько проучить зарвавшихся русских#!."
 holy_city_crisis_status: "#B #P Ослабьте влияние России на Ближнем Востоке!#!#!"
 claiming_the_right_of_holy_places_possible_tt: "Завершена [concept_journal_entry] #V «Завещание Петра Великого: покорение степей»#!."
 claiming_the_right_of_holy_places_taken_tt: "Мы потребуем от Османской империи передать нам право опеки над священным городом Иерусалимом.\nОднако это вызовет тревогу и даже вмешательство других великих держав!"
  #Национальная академия
 establish_national_academy: "Учреждение Национальной академии"
 establish_national_academy_reason: "#B Индикатор показывает текущий #V прогресс строительства#!. После начала финансирования #V ежемесячный прогресс будет увеличиваться на 1#!.#!\n\nСо времён #V промышленной революции#! [ROOT.GetCountry.GetNameNoFlag] совершил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] #B прорыв во многих областях, и всё это благодаря быстрому развитию [Concept('concept_technology', 'технологий')]#!. Очевидно, что для постоянного и мощного потока [Concept('concept_innovation', 'инноваций')] нельзя полагаться лишь на гениев-одиночек и частных меценатов. Нужен #B высокопрофессиональный, официальный и централизованный научный институт#!.\n\nНекоторые из #B лучших #v $academics_only_icon$ ученых#! нашей страны#! уже подали прошение нашему правительству. Они просят о государственном финансировании для создания настоящей #V Национальной академии#!. Она станет #B великим храмом науки для лучших умов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#! из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! в различных областях."
 establish_national_academy_complete_tt: "Строительство завершено."
 start_national_academy_project_button: "Финансировать создание академии"
 start_national_academy_project_button_desc: "Для создания профессиональной Национальной академии требуются постоянные государственные инвестиции в строительство и закупку оборудования, чтобы привлечь достаточное количество учёных. Для развития науки и философии в нашей стране эти вложения, несомненно, окупятся."
 establish_national_academy_goal: ""

 ###德意志邦联内容
 carlsbad_decrees_journal: "Карлсбадские указы"
 carlsbad_decrees_journal_reason: "Убийство генерального консула [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] в #V Германском союзе#! #yellow Августа фон Коцебу#! 23 марта 1819 года стало недвусмысленным сигналом для всех дворов конфедерации: внутри союза существуют группировки, чья явная и обдуманная цель — превращение Германии в республику. Они намерены свергнуть законное правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], развращая умы молодежи и простого народа, не гнушаясь при этом кровопролитием и насилием.\n\nУсилиями [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и канцлера #yellow Меттерниха#! в августе того же года Союзный сейм утвердил #B #L Карлсбадские указы#!#!. Их цель — подавить любые проявления #B либерализма и национализма#!, гарантировав, что причастные к этому лица будут #V лишены права на публичные высказывания#! или #V изгнаны из страны#!.\n\nОчевидно, что для защиты нашей монархии и правительства от дальнейших угроз со стороны #tooltippable_name [GetIdeology('ideology_radical').GetName]а#! мы обязаны неукоснительно соблюдать предписания #B #L Карлсбадских указов#!#! и гарантировать, что эти смутьяны #B не посмеют поднять голову#!."
 carlsbad_decrees_journal_tt: "#B Германия#! уже объединена"
 carlsbad_decrees_journal_1_button: "Отменить Карлсбадские указы"
 carlsbad_decrees_journal_1_button_desc: "Параноидальный страх перед неминуемой революцией, стоящий за этими указами, абсолютно беспочвенен — его разжигают намеренно. Пришло время даровать нашему народу определенную свободу слова. Именно это по-настоящему укрепит существующий порядок, включая авторитет правительства и монарха."
 carlsbad_decrees_journal_2_button: "Привести в исполнение указы о наказаниях"
 carlsbad_decrees_journal_2_button_desc: "Тайные и полулегальные группы демократов ведут активную деятельность в политических и общественных кругах нашей страны. Вне всяких сомнений, они плетут заговоры против монархии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Ради спокойствия нации правительство обязано принять решительные меры."


