 won_war_tt: "Победа в войне за объединение."
 won_war_2_tt: "Война за объединение не проиграна."
 paulskirchenverfassung_success_event_tt: "#G Будет провозглашено объединение германских земель, а остальные земли, не входящие в конфедерацию, согласно решению парламента, станут [Concept('concept_lander_der_krone', 'Коронными землями')].#!"
 paulskirchenverfassung_success_event_2_tt: "#R Мы временно возьмём негерманские земли под прямое управление, а затем решим их судьбу. Это вызовет враждебность со стороны других стран!#!"
