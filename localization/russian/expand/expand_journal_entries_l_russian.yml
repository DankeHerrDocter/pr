 anglo_german_naval_treaty_event_tt: "Если в дальнейшем наша страна будет поддерживать хорошие отношения с Великобританией, этот договор можно будет расторгнуть путём переговоров."
 deutsch_frankfurter_nationalversammlung_journal_has_finish: "Должна быть завершена [concept_journal_entry|l] #variable «Франкфуртское национальное собрание»#!.\n#O Собрание#! может быть созвано в любом #yellow немецком государстве#! при выполнении следующих условий:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_nationalism_tech_researched_checkbox')] Изучена [concept_technology|l] #v «Национализм»#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_spring_time_of_people_checkbox')] Активна [concept_journal_entry|l] #v «Весна народов»#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_deutsch_bundestag_checkbox')] Активна [concept_journal_entry|l] #v «Германский союз»#!"
