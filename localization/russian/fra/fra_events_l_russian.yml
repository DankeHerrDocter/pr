l_russian:
  #Парламент республики
 joi_flavor_fra.1.t: "Воссоздание Национального собрания!"
 joi_flavor_fra.1.d: "Республиканские идеалы, рождённые в эпоху Великой революции, вновь возродились в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Гражданское собрание, некогда учреждённое третьим сословием, было воссоздано, и ему вернули имя той самой организации, что провозгласила «Декларацию прав человека и гражданина»: Национальное собрание!"
 joi_flavor_fra.1.f: "«Люди рождаются и остаются свободными и равными в правах... Цель всякого политического союза — обеспечение естественных и неотъемлемых прав человека. Таковые — свобода, собственность, безопасность и сопротивление угнетению. Никто не может подвергаться обвинению, задержанию или заключению иначе, как в случаях, предусмотренных законом и в предписанных им формах. Тот, кто испрашивает, издает, исполняет или заставляет исполнять произвольные приказы, подлежит наказанию».\n\n«Свободное выражение мыслей и мнений есть одно из драгоценнейших прав человека; Гарантия прав человека и гражданина требует государственной силы; эта сила создается в интересах всех, а не для частной пользы тех, кому она вверена»."
 joi_flavor_fra.1.a: "Полномочия Собрания не должны быть безграничны."
 joi_flavor_fra.1.b: "Да здравствует свободная Французская Республика!"
  #Дебаты о вотуме недоверия
 joi_flavor_fra.2.t: "Дебаты об импичменте"
 joi_flavor_fra.2.d: "Сегодня в Бурбонском дворце, месте заседаний Национального собрания, состоялись дебаты о том, соответствует ли [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] занимаемой должности."
 joi_flavor_fra.2.f: "«Ничто так не доказывает некомпетентность этого правительства, как сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!»\n«Мерзавец! Лидер оппозиции занимается бесстыдным политическим оппортунизмом, ставя партийные интересы выше государственных! Он просто хочет скрыть тот факт, что у него нет никакой политики по этому важнейшему вопросу!»\n«Мы — демократическая страна, и наша партия определит, с какой политикой мы пойдём на выборы... Недавний исторический позорный провал — результат хаоса и некомпетентности правительства. Очевидно, что центральный план нынешнего правительства по важнейшему для страны вопросу не может получить поддержки. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] потерял контроль, правительство — способность управлять».\n«Тишина! Депутат может просить слова, но не должен в отчаянии выкрикивать свои замечания на весь зал!»\n«Благодарю вас, господин спикер. Но, как я уже ясно дал понять, все прецеденты показывают, что когда правительство терпит такое поражение, как вчера вечером, оно должно уйти в отставку и позволить народу избрать новый парламент для решения стоящих перед страной проблем»."
 joi_flavor_fra.2.a: "301 голос «за», 299 «против», [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уходит!"
 joi_flavor_fra.2.b: "299 голосов «за», 301 «против», [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] остаётся!"
  #Алжир: дневник Венганлу
 joi_flavor_fra.3.t: "С уважением, Токвиль"
 joi_flavor_fra.3.d: "Завоевание Алжира завершено. Однако управление им остаётся серьёзной проблемой, над которой предстоит подумать правительству в #tooltippable_name [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]е#!..."
 joi_flavor_fra.3.f: "«#bold Как вам известно, господа#!, почти по прямой линии с запада на восток, параллельно морю, тянется цепь высоких гор, именуемая #bold Атласскими горами#!. Иногда она резко отступает к югу, открывая взору длинные и широкие равнины. Иногда же, напротив, она внезапно приближается к побережью и омывает волнами свои последние отроги. Время от времени она образует складки, в которых укрываются глубокие долины.\n\nВ Атласских горах живут #bold берберы и арабы#!. Едва завидев гору, вы можете быть уверены, что в её изгибах притаилось арабское племя, а узрев равнину — предвидеть, что на горизонте скоро появится лагерь берберов. Я убеждён, что #bold религиозные убеждения#! берберов весьма прохладны. Это народ спокойный и эгоистичный, который гораздо больше заботится о мире земном, нежели о загробном. #bold Их легче победить нашей роскошью и нашими искусствами, чем нашими пушками!#!\n\nКроме того, у арабов африканского побережья есть и множество пороков: как и все полудикие народы, они превыше всего ставят #bold власть и силу#!. Они не ценят человеческую жизнь, #bold презирают торговлю и искусства#!, а #bold более всего любят войну и шум#!. Они горды, легковерны, порой впадают в безрассудный энтузиазм, а порой — в чрезмерное уныние. Их поступки часто чрезмерны, и они всегда больше поддаются чувствам, нежели разуму.\n\nСловом, господа, я показал вам, чем был Алжир #bold до нашего завоевания#!... Я мог бы ещё многое рассказать вам об арабах, но вынужден остановиться — того требуют рамки этого журнала»."
 joi_flavor_fra.3.a: "Правительство примет это к сведению."
  #Герой войны: Венганлу
 joi_flavor_fra.4.t: "Герои Африки"
 joi_flavor_fra.4.d: "Солдаты, сражавшиеся в Африке, вернулись в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], где их встретили как героев."
 joi_flavor_fra.4.f: "«Мама! Что это за отряды?»\n«Это солдаты Франции, дитя. Это солдаты Наполеона».\n«Кто такой Наполеон?»\n«Он наш император, наш величайший полководец... наверное. В общем, англичане и австрийцы объединились с русскими и шведами, чтобы напасть на нас... Нам пришлось дать отпор, дитя».\n«О! А почему они на нас напали?»\n«Наша страна... они хотят уничтожить нашу родину; они придут, чтобы убивать и грабить, они нападут на нас... они все плохие».\n«Правда?»\n«Да, милый... Твой папа тоже в этом отряде, видишь? Он машет тебе!»\n«Папа! Папа!»\n«Твой папа уходит... А я так хотела, чтобы он остался...»"
 joi_flavor_fra.4.a: "Пригласить его в столицу!"
 joi_flavor_fra.4.b: "Пусть спокойно уйдёт на покой."
  #Тунис: дневник Венганлу
 joi_flavor_fra.5.t: "Младший лейтенант"
 joi_flavor_fra.5.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно захватила Тунис, и над городом был поднят французский флаг."
 joi_flavor_fra.5.f: "«Его беспокоил наряд. Быть #bold настоящим пехотинцем#!, носить ленты и кресты, облачиться в #bold мундир Великой Армии#! — всё это прекрасно, но нужно было ещё и показать, что ты #bold не деревенщина#!. В поезде он продумал всё, что мог позволить себе в своей бедности. Фиакр доставил его на улицу Мира. Было уже поздно, и он буквально вломился в магазин Шаве, когда двери уже закрывались.\n«Мне нужна рубашка», — сказал он с той #bold весёлой грубостью#!, которой набрался в кабачке неподалёку.\n«У нас нет готовых рубашек, сударь», — ответил господин Шаве, с большим уважением к солдату, но и с опаской за социальный статус, который мог скрываться под мундиром.\nВенганлу покраснел. Он, конечно, впервые оказался в подобном заведении, о котором слышал от старых офицеров в поезде.\nГосподин Шаве с разочарованным и сочувствующим видом сказал: «Послушайте, господин Робер. Один клиент оставил у меня заказ... он внезапно уехал в Америку по заданию... если эти рубашки вам подойдут...»\nВенганлу с восторгом рассматривал выбор этого, без сомнения, джентльмена со вкусом: #bold рубашки были из тончайшей голубой ткани#!. Венганлу провёл по ним рукой, поглаживая эполеты. «Но подойдут ли они, сударь? Боюсь, рукава...»\nОн был так очарован изысканным цветом и тканью, что это #bold разожгло в нём желание#!, в которое он сам едва мог поверить.\n«Да, подойдут».\nНа улице Венганлу огляделся с победной улыбкой на лице: такой #bold высокий, стройный пехотинец#! в тяжёлой шапке, наслаждающийся тёплой, ароматной атмосферой и мягкостью рубашки»."
 joi_flavor_fra.5.a: "Поздравляем наших храбрых солдат!"
  #Марокко: дневник Венганлу
 joi_flavor_fra.6.t: "Паршивый корабль"
 joi_flavor_fra.6.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно захватила столицу Марокко. Над городом Мекнес был поднят французский флаг."
 joi_flavor_fra.6.f: "Мой дорогой дядя Биггс,\n\nУ меня сейчас есть настроение для письма, поэтому пользуюсь случаем, чтобы черкнуть вам пару строк и сообщить, как у меня дела, в надежде, что когда-нибудь и я буду иметь удовольствие получить от вас весточку. Ваше письмо будет для меня большим интересом, так как я уже более шести месяцев не видел никого и не получал новостей в Мекнесе.\n\nЯ покинул Тулон 16 марта на «Тетисе», и мы прошли мимо Майорки и Орана. Путешествие было приятным, еда и жильё для военного корабля были хорошими, и мы каждый день купались. Но всему хорошему приходит конец, и нам пришлось пересесть на ненавистный «Арсон», где мы провели четыре недели мучений. Корабль был просто ужасен (кишел вшами), и нам приходилось терпеть ежедневные проверки рубах. Еда была плохой и скудной, а столовая — ещё хуже. Я был рад добраться до Касабланки и сойти с этого разваливающегося судна. За те четыре недели я сильно похудел.\nЗдесь большую часть работы для нас выполняют туземные женщины, что кажется странным, но мужчины делают очень мало, и воскресенье для них — такой же день, как и любой другой, ведь у них свои религиозные праздники. Сигареты Турецкой табачной компании продаются по 11 сантимов за 100 штук, и они неплохие.\nВ этом месте есть пара отелей и итальянский ресторан, но в остальном оно ничем не отличается от Алжира, такое же грязное.\nПисем мы здесь получаем мало, так как почта ходит очень нерегулярно, и мы никогда не знаем, когда придёт следующее.\nЭто не то место, которое я бы выбрал сам, но выбора, конечно, не было.\nС наилучшими пожеланиями,\nВаш племянник, Робер Жозеф Жан-Венганлу"
 joi_flavor_fra.6.a: "Возможно, стоит улучшить условия."
  #Сахара: дневник Венганлу
 joi_flavor_fra.7.t: "Жалобы на пустыню"
 joi_flavor_fra.7.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно расширила свои владения до просторов пустыни Сахара."
 joi_flavor_fra.7.f: "Дорогая мама,\n\nБольшое спасибо за ваше длинное и интересное письмо. Не волнуйтесь, я напишу подробно, когда будет более подходящий момент.\n\nКак вы видите из адреса, я покинул Бискра. Наш полк в январе покинул границу Сахары, где зима была очень холодной, и после трёхдневного путешествия на поезде мы отплыли из Боны. Затем, после трёх самых приятных дней плавания, мы прибыли в Аяччо, где высадились и теперь являемся частью седьмой дивизии. Я командовал сильным отрядом в пустыне, недалеко от туземцев, которые часто нас беспокоили, но не причинили никакого материального ущерба. Жаркая погода после холодной пустынной зимы была очень тяжёлой: палящее солнце, бескрайние пески и бесчисленные мучительные мухи. Жизнь здесь сильно отличается от Марселя. Я никогда не думал, что буду пересекать Сахару на верблюде. Я рад сообщить, что я в полном здравии, но буду счастлив, когда борьба закончится, и я буду знать, что я один из тех, кто благополучно вернётся домой.\n\nИ ещё: меня повысили, так что не беспокойтесь обо мне.\n\nНадеюсь, у вас всё хорошо.\n\nС наилучшими пожеланиями и тёплым приветом моей сестре.\n\nС любовью, ваш Робер"
 joi_flavor_fra.7.a: "Пусть он немного отдохнёт."
  #Интеграция Северной Африки
 joi_flavor_fra.8.t: "Предложение [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_fra.8.d: "Заморские провинции Северной Африки перешли под прямое управление города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] задумал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] план по превращению Северной Африки в неотъемлемую часть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.8.f: "Всех, кто не принимает наши условия, следует грабить. Всё должно быть захвачено и уничтожено, невзирая на возраст и пол. Там, где ступала французская армия, трава больше не вырастет.\nЧто бы ни говорили наши филантропы, кто хочет цели, тот хочет и средств. Я лично предупредил всех достойных солдат, которых имею честь возглавлять, что если они приведут ко мне живого араба, то получат удар саблей плашмя...\nМой дорогой друг, вот как мы должны вести войну с арабами: убивать всех мужчин старше пятнадцати лет, забирать всех их женщин и детей, грузить их на корабли и отправлять на Маркизские острова или куда-нибудь ещё.\nОдним словом, уничтожить всё, что не будет ползать у наших ног, как собаки."
 joi_flavor_fra.8.a: "Исконные земли Франции всегда должны оставаться в Европе."
 joi_flavor_fra.8.b: "Кто посмеет сказать, что Алжир — не часть Франции?!"
  #Западная Африка: дневник Венганлу
 joi_flavor_fra.9.t: "Нехватка бумаги"
 joi_flavor_fra.9.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно расширила свои владения до плодородных равнин Западной Африки."
 joi_flavor_fra.9.f: "Дорогая Анна,\n\nПрости, что так долго не отвечал на твоё письмо, но в последнее время у меня было много дел, так что, надеюсь, ты не обидишься. Так как я сейчас не могу добраться до своего вещмешка, придётся написать короткое письмо, потому что у меня заканчиваются конверты, так что в следующий раз я должен буду наверстать упущенное.\n\nЯ получил твой предыдущий бюджет, но он пришёл уже после того, как я отправил тебе открытку. Уверен, ты потратила много времени, чтобы написать всё это заглавными буквами, но я был рад прочитать, потому что здесь я обнаружил, что не могу написать интересное письмо. Боюсь, мои письма часто тебя утомляют. Я внимательно прочитал твоё письмо и отметил все новости об офисе и о наших друзьях, служащих за границей. Но главный пункт, который ты упомянула, — это бедняга старый Рипингтон. Я впервые о нём услышал, бедняга.\nЯ искренне надеюсь, что наши друзья, которые всё ещё в пустыне, благополучно переживут это ужасное испытание. Я заметил, что Андре Конин и ещё несколько братьев ушли, это печально.\nТеперь я должен заканчивать, Анна, потому что, как ты видишь, бумага почти кончилась. Надеюсь, ты на этот раз не обидишься. Пожалуйста, передай мои наилучшие пожелания всем дома и всем, кто спрашивает обо мне...\nИскренне твой, Венганлу"
 joi_flavor_fra.9.a: "Как это, нехватка бумаги?"
  #Мавритания: дневник Венганлу
 joi_flavor_fra.10.t: "Отправленное письмо"
 joi_flavor_fra.10.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно расширила свои владения до пустынь Мавритании."
 joi_flavor_fra.10.f: "Дорогая Анна,\n\nПросто несколько строк, чтобы ты знала, как мы тут. Я уже забыл, когда писал тебе в последний раз и что рассказывал. Через несколько дней после возвращения из отпуска нам приказали идти вдоль реки Нигер до Ниамея, где сосредоточено много туземных племён, и примерно столько же их в Маради, дальше на границе. Как ты знаешь, Сахара — суровое место, ничего кроме песка, песка и ещё раз песка. Мы провели там несколько недель, каждый день в пути. Это была настоящая тренировка на выносливость: невыносимая жара, многокилометровые марши день за днём, весь транспорт — на мулах и верблюдах через скалистые перевалы. Во время одной стоянки мы наткнулись на плохую воду, и около сорока наших товарищей заболели брюшным тифом, семеро из них умерли, но остальным повезло выжить.\n\nНу, несмотря на все трудности, после временного затишья в Мавритании мы вернулись в Сен-Луи целыми и невредимыми.\n\nПожалуйста, передай мои тёплые приветы отцу и матери. Надеюсь, у вас всё хорошо, и через несколько месяцев мы снова увидимся.\n\nС наилучшими пожеланиями,\n\nИскренне твой, Робер Венганлу"
 joi_flavor_fra.10.a: "Надеюсь, они смогут встретиться."
  #Нигер: дневник Венганлу
 joi_flavor_fra.11.t: "Внутри"
 joi_flavor_fra.11.d: "После многочисленных сражений и боёв [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно расширила свои владения до берегов озера Чад."
 joi_flavor_fra.11.f: "Дорогая мама,\n\nМой адрес говорит о том, что сейчас у меня всё хорошо. О, это другая жизнь, сначала было тяжело, спать на четырёх одеялах на полу, очень жёстко. Только прошлой ночью я привык, это была моя первая ночь хорошего отдыха. Еда нормальная, но обслуживание грубое. Конечно, погода ужасная, но моё положение всё такое же, как и при отъезде. У меня нет возможности, как вы просили, ухаживать за волосами, а цвет моего воротничка немного напоминает решётку в офисе. В прошлый четверг я немного кашлял, но в целом всё неплохо.\nЗабыл сказать, когда мы прибыли, нас всех распределили по разным палаткам, и моя оказалась очень хорошей, здесь очень уютно, условия проживания действительно намного лучше, чем в лагере, так что не беспокойтесь. Со мной здесь трое офицеров, очень хорошие ребята из Лиона и Бретани, один из них даже знал моего директора в военной академии. Могу сказать, они очень хорошо ко мне относятся, помогают больше, чем некоторые из наших, я удивлён.\n\nНу, на этом я с вами прощаюсь. Я часто вспоминаю, как мы с вами ходили в город, и поля и луга нашей маленькой деревни в Марселе. Кажется, это было так давно. Надеюсь только, что я смогу снова вернуться. Но это нужно сделать, и остаётся лишь надеяться, что конец скоро наступит.\n\nС любовью, ваш Робер"
 joi_flavor_fra.11.a: "Желаю ему вернуться."
  #Провинции Западной Африки
 joi_flavor_fra.12.t: "Создание заморской административной области в Западной Африке"
 joi_flavor_fra.12.d: "Заморские провинции Западной Африки перешли под прямое управление города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Там была создана новая система управления, служащая интересам как Франции, так и местного населения."
 joi_flavor_fra.12.f: "Господа, я прошу вас попытаться представить этих проворных и упорных сынов пустыни, втянутых в тысячи процедур нашего бюрократического аппарата, вынужденных подчиняться медлительности, регулярности, мелочам и деталям нашей централизованной власти. Старое правительство страны использовало в качестве средств поддержания порядка лишь ятаган и палку. Всё остальное стало французским.\nЗа триста лет после завоевания арабами африканские негры полностью утратили привычку к самоуправлению. Самые выдающиеся из них были отстранены от общественных дел из-за зависти завоевателей. Поэтому старое правительство было отвратительным, и новое французское правительство должно стать единственной связующей нитью между различными народами, точкой схождения множества разных лучей."
 joi_flavor_fra.12.a: "Поздравим чиновников и солдат в Западной Африке!"
  #Чад: дневник Венганлу
 joi_flavor_fra.13.t: "«Военная медаль»"
 joi_flavor_fra.13.d: "Благодаря храбрости солдат, [ROOT.GetCountry.GetNameNoFlag] наконец-то успешно завоевала Чад."
 joi_flavor_fra.13.f: "Подполковнику Роберу, седьмая дивизия: нынешнее правительство, парламент и кабинет передают наилучшие пожелания всему составу седьмой дивизии.\n\nРобер Жозеф Жан-Венганлу:\nОт имени своих товарищей награждается орденом Почётного легиона в знак признания заслуг храбрейшего солдата и выдающегося командира перед отечеством.\nА также часы, карманный портсигар и серебряный карандаш в честь награждения военной медалью.\nЦеремония награждения состоится в Доме инвалидов, о дате вам сообщат дополнительно.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]: [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_fra.13.a: "Ещё одна победа отечества!"
  #Камерун: дневник Венганлу
 joi_flavor_fra.14.t: "Грех"
 joi_flavor_fra.14.d: "Тропические леса Конго и Экваториальной Африки наконец покорились [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], и французский флаг был водружён над этим огромным тёмным континентом."
 joi_flavor_fra.14.f: "Моя дорогая мама,\n\nМой отряд только что пережил особенно тяжёлые времена. Мы вошли в окопы в среду вечером, а в воскресенье в 5 утра наша артиллерия начала бомбардировку вражеского города. Через 20 минут мы перешли через вал. Боже мой, какой горячий приём нам устроили конголезцы, они откуда-то достали кучу ружей и палили по нам! Насколько я знаю, это, скорее всего, дело рук англичан.\nЭто ужасно, видеть, как умирают мои солдаты, особенно когда знаешь каждого лично, это делает всё ещё хуже. На самом деле, называть их мужчинами неправильно, ведь большинство из них — просто мальчишки, такие же, как я когда-то.\n\nГоворят, у злых нет покоя. Если это правда, то я, должно быть, очень плохой человек.\n\nС любовью, ваш преданный сын, Робер Венганлу."
 joi_flavor_fra.14.a: "Все совершают ошибки, это неважно."
  #Генерал-губернаторство Французской Экваториальной Африки
 joi_flavor_fra.15.t: "Создание заморской административной области в Центральной Африке"
 joi_flavor_fra.15.d: "Заморские провинции Центральной Африки перешли под прямое управление города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Там была создана новая система управления для обеспечения абсолютного верховенства Франции."
 joi_flavor_fra.15.f: "Господа, вы помните, я уже говорил вам, что всё гражданское и военное управление в регентстве находилось в руках местных. Когда мы стали хозяевами Экваториальной Африки, мы поспешили собрать всех последних вождей, от султана до последнего солдата его ополчения, и отправили эту группу на азиатское побережье.\nЧтобы лучше стереть следы правления врага, мы начали рвать или сжигать все письменные документы и административные реестры, которые могли бы оставить нам какие-либо следы прошлого, будь они подлинными или нет.\nЗавоевание — это новая эра. Опасаясь неразумного смешения прошлого с настоящим, мы даже разрушили множество улиц в их городах, чтобы перестроить их по нашему образцу, и дали французские имена всем покорённым, кому было позволено остаться.\nМногие туземцы в тропических лесах приняли наше прямое правление, и я уверен, что так и должно было быть."
 joi_flavor_fra.15.a: "Великолепная работа!"
  #Федерализация заморских провинций?
 joi_flavor_fra.16.t: "Федерализация заморских провинций?"
 joi_flavor_fra.16.d: "Законопроект о предоставлении политических прав и гражданства французским подданным во французских африканских заморских провинциях был предложен генерал-губернаторами Алжира, Сенегала, Нигера и Конго от имени Его Превосходительства:"
 joi_flavor_fra.16.f: "#bold Господа#!, конгресс в Алжире организовал #bold процедуру натурализации#! для местных мусульман. Эта процедура, после натурализации, предоставляет им #bold все преимущества законодательства, применимого к гражданам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!, и в большинстве случаев, по общему праву, распространяется на нерождённых детей натурализованного лица. С этой целью в наше законодательство о федерализации Африки вводится упрощённая процедура, разработанная в соответствии с пожеланиями французских мусульман.\n\nГражданский кодекс регулирует все последствия натурализации, но опыт показывает, что #bold невозможно продолжать рассматривать огромное количество французов в Африке как субъектов, лишённых основных политических прав#!. Они полностью ассимилировали французские идеи, но по семейным или религиозным причинам не могут отказаться от своего личного статуса. Сейчас было бы несправедливо отказывать в осуществлении политических прав самым передовым из них или тем, кто предоставляет важные гарантии лояльности. Следует подчеркнуть, что предоставление этих прав местным жителям Африки не является нашим нововведением. Напротив, мы лишь следуем прецедентам других заморских провинций: #bold подведение лояльных к [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] местных жителей и их потомков под правовую систему#!, предоставление им гражданства, в частности, избирательного права, с сохранением их частноправового статуса и установлением соответствующих военных обязательств.\n\nВ нынешней ситуации действительно невозможно не предпринять срочно эту необходимую работу по ассимиляции, которая имеет решающее значение для #bold морального здоровья#! основных заморских провинций Французской Африки."
 joi_flavor_fra.16.a: "Франция должна быть единой под одним знаменем. Пора открыто признать это, если мы сможем устранить страх перед расколом."
 joi_flavor_fra.16.b: "Государство должно остановить это нелепое начинание, которое очернит Францию!"
  #Франко-русский союз (Франция)
 joi_flavor_fra.17.t: "Франко-русский союз?"
 joi_flavor_fra.17.d: "В условиях постоянно меняющейся мировой обстановки, особенно перед лицом серьёзной угрозы безопасности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] со стороны [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')] в Центральной Европе, идея примирения и союза с бывшим врагом, [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')], получила широкое признание."
 joi_flavor_fra.17.f: "Веками Франция искала союзников на востоке, чтобы уравновесить своих континентальных врагов. В XII веке мы дружили с Шотландией против Англии, в XVI веке заключили святотатственный союз с турками против австрийцев... В интересах нашего государства, исходя из реальных геополитических соображений и для противодействия огромной, неоспоримой угрозе безопасности, исходящей от новорождённой [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')], а также её возможных ужасных последствий, мы должны отбросить идеологические и исторические разногласия и заключить новый союз с Россией на востоке."
 joi_flavor_fra.17.a: "Лучше не связываться с этими восточноевропейскими варварами."
 joi_flavor_fra.17.b: "Давайте отправимся с визитом в Россию!"
  #Франко-русский союз (Россия)
 joi_flavor_fra.18.t: "Франко-русский союз!"
 joi_flavor_fra.18.d: "Чтобы противостоять угрозе со стороны [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('FRA_scope').GetNameNoFlag] направила дипломатическую миссию из нескольких военных кораблей по Балтийскому морю в Финский залив с просьбой о создании общего союза с нашей страной."
 joi_flavor_fra.18.f: "Дипломатическая политика поддержания стратегического равновесия в германских землях, проводившаяся со времён антифранцузских коалиций, потерпела крах. Однако дружба с сильной западноевропейской державой может принести нашей стране огромную пользу, особенно в геополитическом плане. Прошлая вражда между [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_TP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] осталась в прошлом, история не должна мешать реальной политике. Союз с Францией на западе может обеспечить нам преимущество в возможном военном конфликте. Кроме того, французские технологии и финансы могут быть нам очень полезны."
 joi_flavor_fra.18.a: "Мы не должны забывать о вражде с Францией."
 joi_flavor_fra.18.b: "Выпьем за наших новых французских друзей!"
  #Визит русской делегации
 joi_flavor_fra.19.t: "Визит русской делегации"
 joi_flavor_fra.19.d: "В знак дружбы с Россией, по приказу московского правительства, в нашу страну с дружественным визитом прибыла дипломатическая делегация [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.19.f: "«Очевидное обновление союза и политические цели, которые он преследует, создали в Европе ситуацию, которая побуждает к обмену мнениями для определения наиболее подходящей позиции для наших правительств, искренне желающих поддержать мир и обеспечить его наилучшим образом...»\n«В случае угрозы агрессии в отношении одной из сторон, обе страны договорились о немедленных и одновременных мерах, которые необходимо принять в такой ситуации»."
 joi_flavor_fra.19.a: "Добро пожаловать, наши русские друзья!"
  #Мост Александра III
 joi_flavor_fra.20.t: "Торжественное открытие моста Александра III"
 joi_flavor_fra.20.d: "[TimeKeeper.GetCurrentDate.Format('d m y г.')] наконец-то состоялось торжественное открытие моста Александра III, символа франко-русской дружбы, строительство которого началось несколько лет назад. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] присутствовал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на церемонии и поздравил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] представителей франко-русской дружбы."
 joi_flavor_fra.20.f: "«Я имею честь присутствовать сегодня на открытии символа нашей франко-русской дружбы: моста Александра III, соединяющего Большой дворец на правом берегу и Дом инвалидов на левом. Он, без сомнения, станет самым великолепным мостом на Сене. Он украшен множеством изысканных скульптур, а ночью его освещают жёлтые фонари. По обеим сторонам моста возвышаются четыре высокие колонны, на вершинах которых установлены четыре позолоченные бронзовые статуи, символизирующие «Науку» и «Искусство», «Битву» и «Войну». Этот мост — подарок нашего союзника, [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. Наша дружба будет передаваться из поколения в поколение, как и этот мост. Сена и Нева навсегда вместе!»"
 joi_flavor_fra.20.a: "Выпьем за нашу великую дружбу!"
  #Троицкий мост
 joi_flavor_fra.21.t: "Торжественное открытие Троицкого моста"
 joi_flavor_fra.21.d: "[TimeKeeper.GetCurrentDate.Format('d m y г.')] наконец-то состоялось торжественное открытие Троицкого моста, символа русско-французской дружбы, строительство которого началось несколько лет назад. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] присутствовал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на церемонии и поздравил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] представителей русско-французской дружбы."
 joi_flavor_fra.21.f: "«Я имею честь присутствовать сегодня на открытии символа нашей русско-французской дружбы: Троицкого моста, соединяющего Каменноостровский проспект и Суворовскую площадь. Он, без сомнения, станет самым красивым мостом на Неве. Он украшен множеством изысканных скульптур и гармонирует с расположенным рядом Зимним дворцом. Ворота, перила и фонарные столбы выполнены из художественного чугуна, фонарные столбы имеют форму пик с двуглавым орлом в венке на центральной вершине. Овальные щиты на фоне скрещённых мечей украшены отдельными элементами из чугуна и меди, покрытыми сусальным золотом. Этот мост — подарок нашего союзника, [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. Наша дружба будет передаваться из поколения в поколение, как и этот мост. Нева и Сена навсегда вместе!»"
 joi_flavor_fra.21.a: "Выпьем за нашу великую дружбу!"
  #Мадагаскар
 joi_flavor_fra.22.t: "Мадагаскарская королевская семья?"
 joi_flavor_fra.22.d: "После того как остров Мадагаскар перешёл под наше правление, в наши руки попала и королевская семья, некогда правившая королевством Мерина."
 joi_flavor_fra.22.f: "«Говорят, этот надоедливый король — католик?\nТы ошибаешься, кажется, он лютеранин».\n«Ха! Какая разница? Просто глупый африканский туземец!»"
 joi_flavor_fra.22.a: "Пусть их королевская семья продолжает существовать."
 joi_flavor_fra.22.b: "Казнить их."
  #Индокитай
 joi_flavor_fra.23.t: "Вмешательство в Индокитай?"
 joi_flavor_fra.23.d: "Общие интересы религии и империи требуют от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] действий в Индокитае от имени католиков."
 joi_flavor_fra.23.f: "Господь Всевышний призывает нас к действию! Во имя священной цели мы должны спасти наших братьев по вере! И если по пути мы случайно приобретём некоторые территории, кто скажет, что это не часть божественного плана?"
 joi_flavor_fra.23.a: "Выдвигаемся! Нанесём удар по [SCOPE.sCountry('potential_imperialism_target').GetAltNameNoFlag('RU_CL_DP')]!"
 joi_flavor_fra.23.b: "Мы должны нести мир, а не войну."
  #Сирия
 joi_flavor_fra.24.t: "Поход на Сирию"
 joi_flavor_fra.24.d: "После блестящей победы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Сирии, художник по имени Александр де Лаборд исполнил для семьи правителя в Елисейском дворце песню, восхваляющую доблесть армии."
 joi_flavor_fra.24.f: "В поход на Сирию!\nЮный и прекрасный Дюнуа,\nМолился Деве Марии,\nПрося её о чуде:\n«Прошу вас, бессмертная Царица,\n— Сказал он ей, уходя, —\n«Я люблю прекраснейшую,\nИ надеюсь стать храбрейшим».\nОн выгравировал славную клятву\nНа камне;\nОн отправится на поле битвы,\nСледуя за своим господином-графом.\nС благородным и благочестивым желанием,\nОн говорил в бою:\n«Любовь — прекраснейшей,\nСлава — храбрейшему!»"
 joi_flavor_fra.24.a: "Слава храбрейшему!"
  #Технический прогресс
 joi_flavor_fra.25.t: "Пеллетье и Каванту"
 joi_flavor_fra.25.d: "Два выдающихся парижских химика, Пьер Жозеф Пеллетье и Жозеф Бьенэмэ Каванту, в своей лаборатории синтезировали новое вещество, которое они назвали хинином."
 joi_flavor_fra.25.f: "«Это вещество получают из коры дерева, которое мы купили в Боливии, в Южной Америке. Инки когда-то называли его священным деревом — и не зря! В редких случаях его можно получить путём синтеза самого природного продукта, а затем сравнить с подлинным образцом. Таким образом, синтез с дополнительным анализом часто является вопросом практической необходимости. С этим лекарством мы больше не будем бояться ужасной африканской малярии»."
 joi_flavor_fra.25.a: "Великое изобретение!"
  #Русские рабочие
 joi_flavor_fra.26.t: "Привлечение русских рабочих"
 joi_flavor_fra.26.d: "Подписан новый договор о привлечении рабочей силы с [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')] для пополнения наших заводов их обильными людскими ресурсами."
 joi_flavor_fra.26.f: "«Согласно этому щедрому соглашению, сударь, вы получаете невиданную возможность: отправиться в передовую, сильную и богатую [ROOT.GetCountry.GetNameNoFlag], получить новую работу и выучить французский язык, чтобы жить в их стране».\n«Пресвятая Богородица! Не могу поверить, что это правда! Неужели Бог послал мне такую удачу, чтобы я покинул это нищее, Богом забытое место и отправился в Париж, где, говорят, улицы вымощены золотом?!»"
 joi_flavor_fra.26.a: "Да, счастливчик!"
  #Вторая волна французских событий (июнь 2025 г.)###############################################################
 joi_flavor_fra.27.t: "Исполнительный комитет [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_fra.27.d: "[ROOT.GetCountry.GetNameNoFlag] была основана после бегства короля из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Однако из-за внезапности революции временному правительству всё ещё не хватает организационных способностей. Поэтому под руководством [SCOPE.sCharacter('french_provisional_republic_leader').GetFirstName] [SCOPE.sCharacter('french_provisional_republic_leader').GetLastName] было создано временное учредительное собрание. Депутаты решили назначить временный исполнительный комитет для организации выборов и выполнения конституционных функций, который будет действовать совместно с председателем временного совета министров."
 joi_flavor_fra.27.f: "«На углах улиц толпы красноречивых бунтарей обращались к народу; в церквях другие били в набат; мы отливали пули, мы катили патроны; деревья на бульварах, общественные туалеты, скамейки, решётки, газовые фонари — всё было сломано и повалено; к утру [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] был усеян баррикадами».\n\n«Вскоре после начала сопротивления Национальная гвардия вмешалась в полном составе, так что к восьми часам вечера народ, добровольно или по принуждению, занял пять казарм, почти все мэрии и самые надёжные стратегические пункты. К полуночи монархия, естественно, быстро и без всяких препятствий рухнула»."
 joi_flavor_fra.27.a: "Нам нужны республиканцы, такие как профессор Альфонс де Ламартин, чтобы сохранить государство."
 joi_flavor_fra.27.b: "Такой уважаемый центрист, как господин Жюль Фавр, может обеспечить стабильность."
 joi_flavor_fra.27.c: "Сэр Анри де Ламорисьер сможет хорошо объединить монархистов!"
  #
 joi_flavor_fra.28.t: "Национальные мастерские"
 joi_flavor_fra.28.d: "Из-за продолжающегося влияния революции и экономического кризиса в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], местные рабочие и социалисты создали организацию под названием «Национальные мастерские», чтобы предоставлять помощь и работу безработным. Однако, наш уважаемый господин [SCOPE.sCharacter('french_provisional_republic_indu_leader').GetFirstName] [SCOPE.sCharacter('french_provisional_republic_indu_leader').GetLastName] предупредил [ROOT.GetCountry.GetRuler.GetFirstName], что эти люди имеют опасные социалистические наклонности и в любой момент могут организовать восстание в для свержения правительства."
 joi_flavor_fra.28.f: "«Господа, на мой взгляд, прогресс существует только тогда, когда он приносит пользу всем без исключения. Для меня прогресс — это признанное и реализованное единство всех заинтересованных групп. Знаете, почему я в глубине души до смерти воюю с принципом антагонизма? Потому что он порождает тиранию, а я ненавижу тиранию, откуда бы она ни исходила».\n\n«Неограниченная конкуренция вредна для тех, кто её восхваляет, из-за их недостатка глубокого мышления и планирования на будущее. В условиях антагонизма никто не полагается на себя, каждый полагается на группу людей с совершенно иными интересами... Ответ, который мы ищем, я говорю от всего сердца: прогресс положит конец революциям! А справедливость — войнам!»"
 joi_flavor_fra.28.a: "В такие неспокойные времена правительство должно с ними сотрудничать."
 joi_flavor_fra.28.b: "Внимательно следить за их опасными социалистическими наклонностями."
  #
 joi_flavor_fra.29.t: "Распространение революции?"
 joi_flavor_fra.29.d: "С новым возрождением республиканской революции в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] радикальные идеи распространились по всей Европе, вызвав волнения во многих местах. Польские и венгерские националисты, а также другие борцы за независимость в континентальной Европе, начали устанавливать контакты с временным правительством в надежде, что оно продолжит политику наполеоновской эпохи и поможет им начать войну против тех, кого они называют «угнетателями». В нашей стране действия этих людей также разожгли революционный энтузиазм у многих радикалов."
 joi_flavor_fra.29.f: "«Свобода укоренилась в сердцах людей, как деревья в сердце земли. Как и дерево, которое она питает, её ветви простираются в небеса. И, как дерево, она постоянно растёт, укрывая своей тенью поколения. Первое древо свободы было посажено самим Богом тысяча восемьсот лет назад на горе Голгофе: это был крест, на котором Иисус Христос пожертвовал собой ради свободы, равенства и братства человечества»."
 joi_flavor_fra.29.a: "Пообещать им, что правительство будет содействовать справедливости за рубежом."
 joi_flavor_fra.29.b: "Мы не должны наследовать агрессивные войны!"
  #
 joi_flavor_fra.30.t: "Демонстрация: [TimeKeeper.GetCurrentDate.Format('MMMM')]"
 joi_flavor_fra.30.d: "Из-за дальнейшего усугубления хаоса в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], недовольные члены Национальных мастерских и республиканцы объединились. Воспользовавшись недовольством всё ещё недостаточно революционной внешней политикой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], они собрали большое количество санкюлотов и прошли маршем по бульварам от площади Бастилии. Они даже временно заняли зал заседаний Бурбонского дворца и передали временному правительству петицию."
 joi_flavor_fra.30.f: "«Представьте себе зал, переполненный сенаторами: толпы людей в лохмотьях врываются, вернее, спускаются по колоннам нижних и даже верхних трибун в зал, повсюду развеваются тысячи флагов, испуганные женщины вскидывают руки, бунтовщики сидят на столах журналистов, коридоры забиты людьми».\n\n«Повсюду головы, плечи, кричащие лица, протянутые руки и сжатые кулаки. Никто не говорит, все кричат, депутаты неподвижны. Это вторжение длилось три часа. Президентский кабинет, столы секретарей, трибуна — всё исчезло под грудой людей, стоящих повсюду в зале»."
 joi_flavor_fra.30.a: "Принять их петицию и пообещать поддержать правое дело за границей."
 joi_flavor_fra.30.b: "Вызвать Национальную гвардию и немедленно арестовать организаторов демонстрации!"
  #
 joi_flavor_fra.31.t: "Налог в сорок пять сантимов"
 joi_flavor_fra.31.d: "Из-за серьёзного бюджетного дефицита, унаследованного от Орлеанской монархии, временное правительство обсуждает введение дополнительного налога в 45 сантимов на четыре прямых налога, включая земельный, чтобы собрать больше средств с крестьян и рабочих-потребителей для пополнения казны. Однако противники утверждают, что это может вызвать волнения среди крестьян в южных регионах."
 joi_flavor_fra.31.f: "«Министр финансов уполномочен взимать дополнительный налог. Эти средства будут зачислены на специальный счёт в казначействе и предназначены исключительно для погашения краткосрочного долга, за исключением ценных бумаг со сроком погашения один год или менее. Предел налога не может превышать 45 сантимов на один товар».\n\n«Уплата этих налогов будет подтверждаться выдачей специальных сертификатов с именем налогоплательщика и датой уплаты. В официальном бюллетене будет публиковаться отчёт о характере и общей сумме погашенных или выкупленных ценных бумаг, чтобы гарантировать, что средства действительно используются для восстановления финансов»."
 joi_flavor_fra.31.a: "Мы не можем решать проблемы за счёт налогов."
 joi_flavor_fra.31.b: "Одобрить введение дополнительного налога."
  #
 joi_flavor_fra.32.t: "Восстание: [TimeKeeper.GetCurrentDate.Format('MMMM')]"
 joi_flavor_fra.32.d: "По мере того как банки всё больше испытывали нехватку ликвидности для выдачи кредитов и поддержки дисконтирования, усугубление экономического кризиса привело к тому, что недовольный рабочий класс под руководством некоторых анархистов и социалистов поднял восстание в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Восставшие горожане даже тяжело ранили архиепископа, что вынудило временное правительство и Учредительное собрание отступить и созвать экстренное совещание для принятия мер по подавлению."
 joi_flavor_fra.32.f: "«Представители граждан, в тот день в полдень я первым вошёл со штыком на баррикаду на улице Сен-Мартен и некоторое время пробыл один среди повстанцев, чьи сердца были полны невыразимой ярости. Обе стороны сражались до последнего. Они могли бы убить меня, но не сделали этого! Я был в Национальной гвардии, в генеральской форме; они уважали старого солдата, сражавшегося при Аустерлице и Ватерлоо!»\n\n«Их великодушие никогда не сотрётся из моей памяти... Я сражался с ними насмерть, я видел в них храбрых французов. Они снова пощадили меня. Они, к несчастью, потерпели поражение, а я обязан им куском хлеба... что бы ни случилось»."
 joi_flavor_fra.32.a: "Назначить генерала Сент-Арно ответственным за подавление протестующих из Национальных мастерских."
 joi_flavor_fra.32.b: "Уполномочить генерала Кавеньяка сформировать правительство и подавить протестующих из Национальных мастерских!"
  #
 joi_flavor_fra.33.t: "Социальный католицизм?"
 joi_flavor_fra.33.d: "С появлением ремесленного труда и развитием наёмного труда индустриализация привела к резким переменам в нашей стране. В некогда консервативной группе [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] также начали появляться различные новые течения. В городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] эти идеи, уделяющие внимание социальной справедливости, получили широкую поддержку среди рабочего класса."
 joi_flavor_fra.33.f: "«В течение столетия в мире появились новые доктрины, хлынул поток различных экономических теорий, которые представляют безграничное приумножение богатства как высшую цель человеческих амбиций и, учитывая лишь меновую стоимость вещей, искажают суть труда, низводя его до товара, покупаемого и продаваемого по самой низкой цене».\n\n«Человек, как живое существо, с душой и телом, исчез перед расчётом материальных продуктов. Социальные связи были разорваны; взаимные обязательства отменены; сам национальный интерес подчинился иллюзии космополитических интересов».\n\n«Таким образом, плодотворная и законная конкуренция была заменена безжалостной, почти варварской борьбой, которая фатально толкает всех участников к крайностям, которые мы называем борьбой за существование»."
 joi_flavor_fra.33.a: "Продолжать следить за этой идеологией."
 joi_flavor_fra.33.b: "Наша страна страдает, и мучительная болезнь — это чрезмерная конкуренция!"
  #
 joi_flavor_fra.34.t: "Всеобщие выборы в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. [TimeKeeper.GetCurrentDate.Format('MMMM')]"
 joi_flavor_fra.34.d: "Результаты подсчёта голосов на первых всеобщих выборах в республике представлены избирательной комиссии. Неожиданно, недавно вернувшийся в страну [SCOPE.sCharacter('napoleon_iii_scope').GetFirstName] [SCOPE.sCharacter('napoleon_iii_scope').GetLastName] победил на выборах, набрав 74,2% голосов, в то время как действующий глава временного правительства [ROOT.GetCountry.GetRuler.GetFullName] получил лишь 19,6%. Хотя большинство членов склонны признать результаты выборов, некоторые комиссары обеспокоены тем, что этот Наполеон, подобно своему дяде, в будущем может восстановить монархию."
 joi_flavor_fra.34.f: "[ROOT.GetCountry.GetNameNoFlag] снова выбирает. Внук показывает газету деду.\n«Этот», — говорит дед, указывая на имя в газете.\n«Вы же неграмотны», — удивлённо говорит внук. «Как вы узнали, кто это? Почему вы выбрали его?»\n«Я неграмотен, но знаю эту фамилию», — он медленно поднимает голову. «Бонапарт. Это он, он вернулся, мой император вернулся!»"
 joi_flavor_fra.34.a: "Нам не нужен новый Наполеон, провести новые выборы!"
 joi_flavor_fra.34.b: "Признать победу. [SCOPE.sCharacter('napoleon_iii_scope').GetFirstName] [SCOPE.sCharacter('napoleon_iii_scope').GetLastName] - это выбор французского народа."
  #
 joi_flavor_fra.35.t: "Закон о выборах"
 joi_flavor_fra.35.d: "Вспоминая с ностальгией об ограниченном избирательном праве времён Орлеанской монархии, так называемом «порядке», комитет из семнадцати человек под руководством министра [SCOPE.sCharacter('burgraves_leader').GetFirstName] [SCOPE.sCharacter('burgraves_leader').GetLastName] недавно разработал новый законопроект об избирательном праве и представил его правителю в надежде на одобрение."
 joi_flavor_fra.35.f: "«Я испытываю безграничный ужас перед всеми пытками и насилием, совершаемыми над человечеством под предлогом служения или защиты какой-либо религии или так называемого идеала... Слова испанского инквизитора еретику „Истина или смерть!“ кажутся мне столь же отвратительными, как и слова террористов Первой республики моему деду: „Свобода, братство или смерть!“. Человеческая совесть имеет право требовать, чтобы мы никогда больше не сталкивались с этим ужасным выбором»."
 joi_flavor_fra.35.a: "Всеобщее избирательное право не должно быть поколеблено!"
 joi_flavor_fra.35.b: "Порядок должен вернуться в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], подписать законопроект."
  #
 joi_flavor_fra.36.t: "Операция «Рубикон»"
 joi_flavor_fra.36.d: "Учредительное собрание отклонило предложение [ROOT.GetCountry.GetRuler.GetFullName] нарушить конституцию республики и баллотироваться на второй срок. В ответ на это дальновидный правитель и его сторонники, заручившись поддержкой #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], распустили собрание без конституционных полномочий и объявили общенациональный референдум о восстановлении монархии. На этом референдуме, где правительство предоставляло только бюллетени «за», [ROOT.GetCountry.GetRuler.GetFirstName] быстро одержал победу с 97% голосов и был коронован как «император французов»."
 joi_flavor_fra.36.f: "«Я клянусь защищать территориальную целостность [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]; я клянусь уважать свободу вероисповедания и положения Конкордата, уважать равенство, политическую и гражданскую свободу и защищать государственную собственность; я клянусь не вводить налоги без закона; я клянусь поддерживать институт Почётного легиона; я клянусь править только в интересах, счастья и славы французского народа».\n\n«Я заполнил бездну анархии, усмирил хаос; я очистил революцию от грязи, возвысил простолюдинов, восстановил авторитет империи; я поощрял всяческое соревнование, награждал все заслуги, расширил границы славы. Всё это, поистине, не мелочи. Дорогая, эти несколько слов — вся моя история»."
 joi_flavor_fra.36.a: "Vive l'Empereur! (Да здравствует император!)"
  #Империя Наполеона
 joi_flavor_fra.37.t: "Позорное поражение"
 joi_flavor_fra.37.d: "Неожиданно [ROOT.GetCountry.GetNameNoFlag] потерпела поражение в войне. Даже личное командование правителя не изменило ситуацию, что вызвало в обществе гнев на некомпетентность имперского правительства."
 joi_flavor_fra.37.f: "«Мы помним этот холмик, уставленный пушками, по которому шатались пьяные безумцы, населённый жителями, казалось, враждебными ко всем чужакам, и чья ненависть к врагу, казалось, превосходила всё».\n\n«[ROOT.GetCountry.GetRuler.GetLastName] хотел отбить пушки напротив, и, хотя он должен был бы проявить дальновидность, он использовал хитрость; он бросил искру в пороховую бочку — [ROOT.GetCountry.GetRuler.GetFirstName], это была преднамеренная неосторожность»."
 joi_flavor_fra.37.a: "Они — вестники гибели империи."
 joi_flavor_fra.37.b: "Его Величество [ROOT.GetCountry.GetRuler.GetFirstName] должен отречься от престола, чтобы спасти империю."
  #
 joi_flavor_fra.38.t: "Имперский гимн?"
 joi_flavor_fra.38.d: "С восстановлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], унаследовавшей правовую систему императора Наполеона, отмена официального статуса старого королевского гимна стала естественной. Однако по вопросу выбора нового имперского гимна мнения разделились: следует ли продолжать использовать #V «Походную песнь»#!, гимн времён императора #V Наполеона Бонапарта#!, или принять #V «Поход на Сирию»#!, сочинённый #V Александром де Лабордом#! для империи и воспевающий дух крестоносцев?"
 joi_flavor_fra.38.f: "#B «Песнь победы, открой нам врата,#!\nСвобода ведёт нас вперёд,\nОт северных границ до южных,\nПовсюду звучит боевой рог,\nЧас битвы настал!\n#B Трепещите, враги Франции:#!\nТираны, упивающиеся кровью и гордыней,\nСвободные граждане, вперёд,\nНизвергните тиранов в могилу!»\n\n#B «Республика зовёт нас! Пусть мы знаем: победа или смерть,#!\nФранцуз должен жить для неё,\nФранцуз должен умереть за неё!\nПусть мечи их отцов,\nБудут крепко сжаты в их храбрых руках,\nПомните, как на Марсовом поле,\nВ крови королей и рабов крестились,\n#B Тот меч, благословлённый предками, с добродетелью вернётся домой с победой!#!”"
 joi_flavor_fra.38.a: "Продолжим славную традицию императора Наполеона: примем «Походную песнь»!"
 joi_flavor_fra.38.b: "Дух франкских крестоносцев поведёт нас: примем «Поход на Сирию»!"
  #
 joi_flavor_fra.39.t: "Орден Почётного легиона"
 joi_flavor_fra.39.d: "Орден Почётного легиона, учреждённый #V императором Наполеоном#! в #V 1802 году#!, был упразднён в реакционный период королевской власти. Армия подверглась чисткам, и слава Почётного легиона угасла. Однако с возвращением империи офицеры из #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, помнящие о былой славе, обратились с петицией к [ROOT.GetCountry.GetRuler.GetFirstName] с просьбой восстановить награждение этим орденом и сделать его высшей наградой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.39.f: "«Я вызываю вас показать мне республику, древнюю или современную, которая знала бы, как обойтись без различий. Вы называете их побрякушками — да, именно побрякушками мы и ведём за собой людей»."
 joi_flavor_fra.39.a: "Достаточно просто возобновить награждение орденом Почётного легиона."
 joi_flavor_fra.39.b: "Восстановить славный Почётный легион и строго регламентировать вручение новых орденов."
  #
 joi_flavor_fra.40.t: "Статуя императора Наполеона"
 joi_flavor_fra.40.d: "Статуя #V императора Наполеона#! с имперских времён стояла перед Домом инвалидов. Однако в период правления королей-легитимистов и орлеанистов за ней не ухаживали, и её подло изменили, лишив многих знаков славы императора. Теперь, с возвращением империи, [ROOT.GetCountry.GetRuler.GetFullName] намерен[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] восстановить статую своего дяди, облачив его в мундир Великой армии, надев двууголку с трёхцветной кокардой, чтобы навсегда запечатлеть в сердцах французского народа самый величественный образ императора."
 joi_flavor_fra.40.f: "«Как мог Бог дать простому смертному такую власть, чтобы он кровью написал своё имя на земле и заставил помнить о себе вечно! Да здравствует Наполеон, отец народа и солдат!»\n\n«В конце концов, человечество удостаивает высших почестей не тех, кто осторожен, отступает перед трудностями и не оставляет после себя ничего, а тех, кто обладает великими амбициями, смелостью, совершает подвиги и даже в час величайших бедствий для себя и миллионов, продолжает властвовать над сердцами миллионов. Наполеон был таким чудотворцем: этот человек навсегда останется в первых рядах бессмертных в истории человечества»."
 joi_flavor_fra.40.a: "Слава первому великому человеку французской нации, Его Величеству императору Наполеону!"
 joi_flavor_fra.40.b: "Уважение к императору не обязательно выражать восстановлением статуи."
  #
 joi_flavor_fra.41.t: "Об искоренении нищеты"
 joi_flavor_fra.41.d: "Ещё во время своей предвыборной кампании в республиканский период, [ROOT.GetCountry.GetRuler.GetFirstName] был широко популярен благодаря своей позиции по повышению социального равенства. Особенно его труд #V «Об искоренении нищеты»#! получил огромную поддержку от #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, что заложило основу для успеха Его Величества. С возвращением империи к власти, многие надеются, что правитель выполнит свои обещания и решит проблему бедности во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_fra.41.f: "«Рабочий класс ничего не имеет, у него нет иного богатства, кроме орудий своего труда, и необходимо, чтобы эти орудия были использованы с пользой для всех. Они подобны деревне рабов посреди деревни гедонистов. Они должны занять своё место в обществе, связав свои интересы с интересами земли».\n\n«Короче говоря, у них нет ни организации, ни прав, ни будущего. Правительство должно дать им права и будущее, укрепив их через ассоциации, образование и дисциплину».\n\n«Сегодня целью каждого дееспособного правительства должно быть стремление как можно скорее заявить: победа христианства уничтожила рабство; победа Французской революции отменила крепостное право; а победа демократических идей должна положить конец нищете»."
 joi_flavor_fra.41.a: "Отмахнуться, это была лишь приманка для дураков!"
 joi_flavor_fra.41.b: "Правление империи должно служить широким массам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_fra.42.t: "Покушение [SCOPE.sCharacter('orsini_affair_radical').GetFirstName]"
 joi_flavor_fra.42.d: "Вчера вечером, по дороге в театр Ле Пелетье, [ROOT.GetCountry.GetRuler.GetFirstName] стал целью покушения. Его организовал радикал [SCOPE.sCharacter('orsini_affair_radical').GetFirstName] [SCOPE.sCharacter('orsini_affair_radical').GetLastName], давно симпатизирующий итальянскому национализму и выступающий против имперского правления. Хотя сам правитель не пострадал, его бомба попала в эскорт, что привело к тяжёлым потерям. Согласно расследованию, ответственность за это несёт [SCOPE.sCountry('GBR_scope').GetNameNoFlag], которая позволила радикалам получить оружие и убежище."
 joi_flavor_fra.42.f: "«Жизнь священна, и это не просто существование, а жизнь, проявляющаяся в развитии и действии — активный принцип человека; а не просто поддержание существования — пассивный принцип человека. Чтобы страна была великой и священной, она должна жить, выполняя в жизни особую миссию, возложенную на неё Богом. Но для истинной и совершенной жизни необходима свобода действий, иначе не будет ни добродетели, ни порока, ни ответственности».\n\n«Народ, конечно, может использовать те же средства для восстановления своей свободы, которые были использованы для её лишения; либо для восстановления свободы, либо для того, чтобы её не лишиться»."
 joi_flavor_fra.42.a: "Выследить всех, кто связан с этим негодяем, и направить дипломатический протест [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_fra.42.b: "Хотя его преступление непростительно, он умер за свои идеалы и заслуживает нашего уважения."
  #
 joi_flavor_fra.43.t: "Мексика просит вмешательства [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_fra.43.d: "Радикальный политический конфликт в [SCOPE.sCountry('MEX_scope').GetAltNameNoFlag('RU_CL_PP')] в последнее время обострился. Консерваторы, терпящие поражение на поле боя и на политической арене, сегодня направили представителя в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Они надеются, что правитель направит войска в Мексику, чтобы помочь им создать новое государство с монархической формой правления. Они обещают в будущем служить нашим интересам в Северной Америке. Однако это может вызвать недовольство и вмешательство [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.43.f: "«Если нынешнее конституционное правительство [SCOPE.sCountry('MEX_scope').GetAltNameNoFlag('RU_CL_RP')] заявит посланникам союзников, что оно не нуждается в помощи, так щедро предложенной мексиканскому народу, поскольку само обладает силой и общественной поддержкой для противостояния любому внутреннему мятежу, союзники немедленно перейдут в сферу договоров, чтобы официально предъявить требования от имени своих стран».\n\n«Во время переговоров союзные войска займут три города: Кордову, Орисабу и Теуакан, в пределах их естественных границ. Если переговоры, к несчастью, сорвутся, союзные войска покинут города перед указанными позициями и вернутся на оборонительные рубежи перед Веракрусом»."
 joi_flavor_fra.43.a: "Нас не интересуют эти дрязги."
 joi_flavor_fra.43.b: "Пообещать ограниченную военную помощь."
 joi_flavor_fra.43.c: "Это прекрасная возможность подтвердить интересы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Америке!"
  #
 joi_flavor_fra.44.t: "Дворец промышленности в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 joi_flavor_fra.44.d: "В городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] был возведён великолепный дворец. Он выполнен в характерном стиле рационалистической архитектуры, из железа и стекла. Фриз портика украшает скульптурная группа работы Элиаса Робера, изображающая [ROOT.GetCountry.GetNameNoFlag], вручающую венцы Коммерции и Промышленности, в окружении имперских символов."
 joi_flavor_fra.44.f: "«Однажды правительству пришло в голову построить дворец для Всемирной выставки, которая до этого ютилась в беспорядочных деревянных и картонных павильонах. Между Королевским двором и Елисейскими полями была огромная пустая площадь, где тихие рантье играли в шары, а в праздничные дни собирались акробаты. Она называлась площадью Мариньи».\n\n«Вскоре туда привезли две-три тысячи рабочих, и был построен выставочный дворец. Каждую весну там выставлялись две-три тысячи картин, созданных современными художниками для своих современников. А летом, осенью, а иногда и зимой, там время от времени выставляли самую лучшую и жирную птицу со всех ферм страны и самые вкусные сыры со всех наших пастбищ»."
 joi_flavor_fra.44.a: "Этот величественный дворец — свидетельство великолепия города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]!"
 joi_flavor_fra.44.b: "Вершина достижений промышленной цивилизации [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_fra.45.t: "Салон отверженных"
 joi_flavor_fra.45.d: "Парижский художественный салон, спонсируемый правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и самой известной академией художеств, ежегодно представляет лучшие образцы академического искусства. Однако в этом году многие работы, сочтённые «циничными», были отвергнуты строгим жюри. Число отвергнутых художников достигло двух третей. Отвергнутые художники и их друзья начали протестовать, [ROOT.GetCountry.GetRuler.GetFirstName] узнал слухи об этом. Они просят правительство организовать дополнительную выставку для этого «нетрадиционного» нового искусства."
 joi_flavor_fra.45.f: "«Правитель получил многочисленные жалобы на художественные произведения, отвергнутые выставочным жюри. Рассмотрев их, он и его кабинет, желая дать общественности возможность оценить обоснованность этих жалоб, решили, что отвергнутые произведения будут выставлены в другом крыле Дворца промышленности. Участие в этой выставке является добровольным, и художники, не желающие участвовать, должны лишь уведомить администрацию, которая незамедлительно вернёт им их работы»."
 joi_flavor_fra.45.a: "Ересь! Пусть убираются!"
 joi_flavor_fra.45.b: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] приветствует их новое искусство!"
  #
 joi_flavor_fra.46.t: "Завтрак на траве"
 joi_flavor_fra.46.d: "В Салоне отверженных выделилась работа художника-«импрессиониста» Эдуарда Мане. На картине изображён пикник: обнажённая женщина непринуждённо сидит в лесу среди двух одетых по-современному денди. Обнажённая женщина вызывающе смотрит на зрителя, а другая женщина лениво купается в реке."
 joi_flavor_fra.46.f: "«Эта обнажённая женщина вызвала возмущение публики, потому что на картине все видели только её. Боже мой! Какая непристойность: женщина без покрывала среди двух одетых мужчин! Это было возмутительно, и люди тогда много об этом говорили! Эдуарда Мане изображали как вуайериста».\n\n«Однако художник лишь хотел добиться ярких контрастов и откровенных масс. В картине нужно было видеть не завтрак на траве, а весь пейзаж, его энергию и тонкость, его такой широкий и солидный передний план и такой лёгкий и изысканный фон, и особенно этот чарующий силуэт женщины в рубашке, который создаёт прекрасное белое пятно среди зелёной листвы, представляя этот уголок природы с такой удивительной простотой»."
 joi_flavor_fra.46.a: "Великий шедевр реалистического искусства!"
  #
 joi_flavor_fra.47.t: "Англо-французский договор о свободной торговле?"
 joi_flavor_fra.47.d: "Идеи свободной торговли в последние годы набирают популярность как в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_PP')], так и во [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_PP')]. Несмотря на прошлые разногласия, правитель [ROOT.GetCountry.GetRuler.GetFirstName] проявил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] большой интерес к торговому примирению. Поэтому [TimeKeeper.GetCurrentDate.Format('d m y г.')] наш министр финансов [SCOPE.sCharacter('free_trade_treaty_leader').GetFirstName] [SCOPE.sCharacter('free_trade_treaty_leader').GetLastName] встретился в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] с представителем другой стороны, разработал проект договора о свободной торговле и запросил одобрения правительства."
 joi_flavor_fra.47.f: "«Страна, принимающая предложение о торговом договоре, естественно, полагает, что страна, его предложившая, хочет извлечь из него какую-то выгоду. В таких вопросах разумно, в наших собственных интересах, снижать наши тарифы настолько, насколько вы считаете это выгодным для продвижения ваших собственных интересов».\n\n«Принцип свободной торговли, согласно которому каждая страна производит по самой низкой цене, неприменим к [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], так как это уничтожит наши лучшие отрасли. Наши тарифы, несомненно, содержат много бесполезных и устаревших запретов, которые, по нашему мнению, следует отменить. Мы не имеем в виду, что протекционизм должен быть слепым, фиксированным или чрезмерным, но принцип протекционизма должен твёрдо соблюдаться»."
 joi_flavor_fra.47.a: "Мы должны защищать отечественную промышленность."
 joi_flavor_fra.47.b: "Этот договор принесёт пользу обеим нашим странам!"
 joi_flavor_fra.47.c: "Этот договор принесёт пользу обеим нашим странам!"
  #
 joi_flavor_fra.48.t: "История Юлия Цезаря"
 joi_flavor_fra.48.d: "Восхищаясь завоеваниями Юлия Цезаря, правитель [ROOT.GetCountry.GetRuler.GetFirstName] приказал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] отечественным историкам написать монументальный труд по истории самого Цезаря. Правитель подписал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] эту книгу и лично написал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] первые два тома. В книге он[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] пытается провести параллели между Цезарем и императором Наполеоном, чтобы доказать величие рода [ROOT.GetCountry.GetRuler.GetLastName]."
 joi_flavor_fra.48.f: "«После окончания войны он отпраздновал пять триумфов, четыре из которых состоялись в течение одного месяца, но с интервалом в несколько дней: один после победы над Сципионом, другой — после победы над сыном Помпея. Первый и самый блестящий триумф был галльским, за ним следовал александрийский, затем понтийский, после — африканский и, наконец, испанский. Каждый триумф отличался своим убранством и демонстрацией трофеев».\n\n«В день галльского триумфа, когда Цезарь проезжал через Велабр, ось его колесницы сломалась, и его чуть не выбросило на землю. Он поднялся на Капитолий с факелами, в сопровождении сорока слонов с обеих сторон, все со светильниками. На своём понтийском триумфе он выставил на обозрение в процессии надпись из трёх слов: „Пришёл, увидел, победил“»."
 joi_flavor_fra.48.a: "Выдающийся имперский проект."
  #
 joi_flavor_fra.49.t: "Манифест шестидесяти"
 joi_flavor_fra.49.d: "Хотя [ROOT.GetCountry.GetNameNoFlag] различными способами проводила репрессивную социальную политику и успешно подавляла рабочее движение, угрожавшее правлению, эти социалистические идеи, получив помощь из-за рубежа, снова начали набирать силу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Несколько дней назад известный деятель рабочего движения #V Луи Толен#! опубликовал в газете статью под названием «Манифест шестидесяти», которая вызвала сенсацию среди рабочего класса и участников рабочего движения."
 joi_flavor_fra.49.f: "«Всеобщее избирательное право сделало нас политически зрелыми, но нам ещё предстоит освободиться в социальном плане. Свобода, завоёванная третьим сословием с такой энергией и упорством, должна распространиться на всех граждан в этой демократической стране, Франции. Равные политические права неизбежно влекут за собой равные социальные права. С 1789 года все французы равны перед законом».\n\n«У нас нет иной собственности, кроме наших рук, мы каждый день подвергаемся законным или произвольным условиям капитала. У нас не всегда есть возможность научиться читать. Мы не можем свободно собираться, чтобы организовать профессиональное обучение, и драгоценный инструмент промышленного прогресса становится привилегией капитала».\n\n«Мы повторяем: без нас буржуазия не сможет построить ничего прочного. Без их помощи наше освобождение может затянуться надолго. Давайте же объединимся для достижения общей цели: победы истинной демократии»."
 joi_flavor_fra.49.a: "Милости правителя нет конца! Эти простолюдины напрашиваются на пулю?"
 joi_flavor_fra.49.b: "К рабочим нужно относиться должным образом."
 joi_flavor_fra.49.c: "Силу рабочих следует признать политически."
  #
 joi_flavor_fra.50.t: "Правительство национальной обороны"
 joi_flavor_fra.50.d: "Имперское правление снова рухнуло. Члены императорской семьи были вынуждены покинуть [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], и [ROOT.GetCountry.GetNameNoFlag] вновь погрузилась в хаос. Было создано временное правительство, которое объявило о взятии на себя всей полноты власти и обороны страны."
 joi_flavor_fra.50.f: "«Мы — не правительство партии, мы — правительство национальной обороны. У нас одна цель, одна воля: опираясь на армию и народ, объединившись вокруг славного символа, который когда-то заставил Европу отступить, спасти отечество».\n\n«Сегодня, как и тогда, название „Республика“ означает: армия и народ тесно сплотились для защиты столицы»."
 joi_flavor_fra.50.a: "Да здравствует Республика!"
  #
 joi_flavor_fra.51.t: "Мексиканская корона"
 joi_flavor_fra.51.d: "[SCOPE.sCountry('MEX_scope').GetNameNoFlag] находится под нашим контролем. Прежнее республиканское правительство бежало за границу. Пришло время официально короновать императора Мексики. Однако трон всё ещё пуст. Кого выбрать: члена семьи [ROOT.GetCountry.GetRuler.GetLastName], иностранного аристократа высокого происхождения или самого правителя?"
 joi_flavor_fra.51.f: "«Если тебе удастся восстановить порядок из хаоса, дать надежду страдающим, объединить сердца людей, ты станешь величайшим правителем современности. Ступай же, бедный глупец! Ты ещё пожалеешь о своём прекрасном замке Мирамар!»"
 joi_flavor_fra.51.a: "Мексика должна стать личной унией, а её правителем — #V сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!."
 joi_flavor_fra.51.b: "Двоюродный брат правителя, #V принц Наполеон-Жером#!, может занять трон."
 joi_flavor_fra.51.c: "#V эрцгерцог Максимилиан#! из династии Габсбургов может занять трон."
 joi_flavor_fra.51.e: "#V великий князь Константин Николаевич#! из династии Романовых может занять трон."
 joi_flavor_fra.51.g: "#V принц Георг#! из Ганноверской династии может занять трон."
  #
 joi_flavor_fra.52.t: "Петиция [SCOPE.sCharacter('adolphe_thiers_scope').GetFirstName] [SCOPE.sCharacter('adolphe_thiers_scope').GetLastName]"
 joi_flavor_fra.52.d: "Выдающийся политический деятель, председатель Совета министров времён республики и нынешний депутат от департамента Сена, [SCOPE.sCharacter('adolphe_thiers_scope').GetFirstName] [SCOPE.sCharacter('adolphe_thiers_scope').GetLastName], подал петицию правительству с требованием отменить временные авторитарные меры и вернуть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] на путь свободы."
 joi_flavor_fra.52.f: "«Говорят: империя — это война. Я говорю: империя — это мир. Это мир, потому что Франция желает мира, а когда Франция удовлетворена, мир во всём мире. Слава — это наследие, но война — нет. Я согласен, у правителя, как и у Наполеона, много завоеваний, которые предстоит совершить. Но я также хочу, как и предыдущий император, примирить диссидентов и вернуть враждебные, никому не выгодные пути в великую реку народа».\n\n«У нас повсюду руины, которые нужно восстановить, ложных богов, которых нужно свергнуть, истины, которые должны победить, глубокое сельское невежество и местную дикость, которые нужно просветить. Вот как я понимаю империю, если она хочет процветать»."
 joi_flavor_fra.52.a: "Эти идеи угрожают власти правителя!"
 joi_flavor_fra.52.b: "Империи пора стать более либеральной."
  #
 joi_flavor_fra.53.t: "Выборы в законодательный орган"
 joi_flavor_fra.53.d: "Принята новая конституция [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Согласно ей, парламент получил множество полномочий, включая право законодательной инициативы и запроса. Авторитет правителя был ослаблен, однако этот шаг успешно успокоил многих недовольных либералов и социалистов."
 joi_flavor_fra.53.f: "«Действительно, существует мужественная и законная страсть к равенству, которая побуждает людей желать быть всемогущими и уважаемыми. Эта страсть стремится возвысить слабых до уровня сильных. Но в сердцах людей также существует извращённое стремление к равенству, которое заставляет слабых пытаться низвести сильных до своего уровня и заставляет людей предпочитать равенство в рабстве неравенству в свободе»."
 joi_flavor_fra.53.a: "Правитель в соответствии с законом распустит парламент и назначит всеобщие выборы."
 joi_flavor_fra.53.b: "Власть должна быть в большей степени передана демократическим институтам."
  #
 joi_flavor_fra.54.t: "Убийство, совершённое принцем"
 joi_flavor_fra.54.d: "Племянник правителя, #V принц Пьер-Наполеон Бонапарт#!, на прошлой неделе в ходе личной ссоры в гневе застрелил журналиста по имени Виктор Нуар. Дело пытались скрыть, но разгневанные родственники передали информацию газетам в Роне, и новость быстро распространилась по всей стране, вызвав огромное возмущение простого народа по отношению к императорской семье и лично к правителю [ROOT.GetCountry.GetRuler.GetFirstName]."
 joi_flavor_fra.54.f: "«Я осознавал свою смешанную идентичность, которая делала меня своего рода парией, „железной маской“ XIX века. Я не был ни принцем, ни гражданином, ни избирателем, не имел права и не подходил для выполнения каких-либо общественных функций или для занятия какой-либо профессией, которая могла бы обеспечить моё будущее».\n\n«Как можно быть настолько наивным, чтобы верить, что Бонапарт может быть кем-то, кроме убийцы?»"
 joi_flavor_fra.54.a: "Всего лишь простолюдин, он сам напросился на смерть!"
 joi_flavor_fra.54.b: "Арестовать принца Пьера, он должен быть наказан по закону."
  #
 joi_flavor_fra.55.t: "Похороны Виктора Нуара"
 joi_flavor_fra.55.d: "Сегодня в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] состоятся публичные похороны журналиста #V Виктора Нуара#!, застреленного некоторое время назад #V принцем Пьером-Наполеоном Бонапартом#!. Многие его сочувствующие и оппоненты правителя объявили, что примут участие в похоронах. Они даже организовали большую процессию для переноса его тела на кладбище Пер-Лашез в Париже."
 joi_flavor_fra.55.f: "«Убийца, осмелься встретиться со мной лицом к лицу! Ты трусливо убил моего друга, убийца, убийца! Умри!»\n\n«Жестокость, от которой страдает парижский народ, неизмерима. Я уверен, что не сделал ничего плохого, но сегодня я не вернусь в Париж, потому что боюсь, что меня забросают камнями... В конце концов, я принёс только боль и вызвал ненависть»."
 joi_flavor_fra.55.a: "Отправить полицию разогнать толпу, не имеющую отношения к семье покойного."
 joi_flavor_fra.55.b: "Выразить официальные соболезнования этому невинному журналисту и объявить о суровом наказании убийцы."
  #
 joi_flavor_fra.56.t: "[SCOPE.sCharacter('intelligentsia_protest_scope').GetFirstName] [SCOPE.sCharacter('intelligentsia_protest_scope').GetLastName] критикует императора"
 joi_flavor_fra.56.d: "Лидер группы [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant], известный агитатор [SCOPE.sCharacter('intelligentsia_protest_scope').GetFirstName] [SCOPE.sCharacter('intelligentsia_protest_scope').GetLastName], сегодня опубликовал в парижской газете «Век» статью, в которой резко раскритиковал «авторитарную диктатуру» правителя, что нашло отклик у многих республиканцев."
 joi_flavor_fra.56.f: "«Господа, я не радикал. Радикалы это прекрасно знают, достаточно почитать их газеты. Но, пожалуйста, поймите мои чувства. Я принадлежу к революционной партии, как во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], так и в Европе. Я хочу, чтобы правительство оставалось в руках умеренных. Я сделаю всё возможное, чтобы так и было. Но когда это правительство перейдёт в руки людей менее умеренных, чем я и мои друзья, в руки фанатиков, даже радикалов, я не откажусь от своего дела по следующей причине: я всегда буду на стороне революции»."
 joi_flavor_fra.56.a: "Пусть ругается, от этого у правителя кусок не отвалится."
 joi_flavor_fra.56.b: "Арестовать этих смутьянов!"
  #
 joi_flavor_fra.57.t: "[SCOPE.sCharacter('trade_unions_protest_scope').GetFirstName] [SCOPE.sCharacter('trade_unions_protest_scope').GetLastName] организует рабочее движение"
 joi_flavor_fra.57.d: "Лидер группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetNameWithCountryVariant], солдат времён республики и лидер профсоюзной организации города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], [SCOPE.sCharacter('trade_unions_protest_scope').GetFirstName] [SCOPE.sCharacter('trade_unions_protest_scope').GetLastName], тайно призвал многих членов профсоюзов и вчера провёл забастовку против правителя, протестуя против его диктатуры и публично заявив, что референдум о его коронации был абсолютно незаконным."
 joi_flavor_fra.57.f: "«Правитель оказал мне печальную честь, вписав моё имя на свою доску помилования или амнистии. Пять месяцев назад мой побег из Северной Африки уже заслужил снисхождение принца, и эту последнюю милость я могу приписать лишь его желанию заманить меня в новую ловушку».\n\n«Каким бы ни был указ о помиловании господина [ROOT.GetCountry.GetRuler.GetLastName], я не прощу ему преступления, совершённые в ночь на 2 декабря, резню 4-го числа, его проскрипции, подобные сулланским, его кровавые указы и его фальсифицированные урны для голосования, в подлинности которых я, как избиратель, убедился лично. Как солдат, сражавшийся за защиту конституции, я не прощу этого человека, поправшего клятву и закон»."
 joi_flavor_fra.57.a: "Имперское правительство должно тщательно рассмотреть этот вопрос."
 joi_flavor_fra.57.b: "Арестовать этих мерзких санкюлотов и голодранцев!"
  #
 joi_flavor_fra.58.t: "Бельвильская программа"
 joi_flavor_fra.58.d: "Известный политический диссидент и агитатор, который во времена республики открыто выступал против реставрации, #V Леон Гамбетта#!, недавно опубликовал программу своих радикальных взглядов во время выборов в законодательное собрание от парижского округа Бельвиль, что сильно воодушевило либералов и республиканцев в стране."
 joi_flavor_fra.58.f: "«Граждане, во имя всеобщего избирательного права, основы всей политической и социальной организации, давайте уполномочим нашего представителя подтвердить принципы радикальной демократии и решительно потребовать:\n\nСамого полного применения всеобщего избирательного права, без территориальных ограничений, для выборов мэров, муниципальных советников и депутатов;\nЛичная свобода, защищённая законом, а не административным произволом;\nПолная свобода печати, без каких-либо гарантий, отмена патентов на печать и книготорговлю;\nСвобода собраний, без препятствий и ловушек, с возможностью обсуждать любые религиозные, философские, политические или социальные вопросы;\nПолная свобода ассоциаций, отмена бюджета на культы, отделение церкви от государства;\nСветское, бесплатное и обязательное начальное образование, конкурсный отбор элиты для бесплатного высшего образования;\nВсе государственные должности назначаются путём выборов, отмена привилегий, монополий и премий за праздность;\nПостоянное изучение и поиск решений социальных проблем и политических изменений на основе принципов справедливости и социального равенства».\n\nСвобода, равенство, братство.\nБельвильский избирательный комитет"
 joi_flavor_fra.58.a: "Необходимо остановить эту либеральную тенденцию."
 joi_flavor_fra.58.b: "По крайней мере, во многом здесь есть здравый смысл."
  #
 joi_flavor_fra.59.t: "Конституционный референдум во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 joi_flavor_fra.59.d: "По просьбе правителя [ROOT.GetCountry.GetRuler.GetFirstName] имперское правительство организовало публичный общенациональный референдум для утверждения начатых правительством либеральных реформ и разработки новой конституции для империи."
 joi_flavor_fra.59.f: "«Народ одобряет либеральные реформы, осуществлённые правителем при содействии основных государственных институтов, и утверждает сенатус-консульт от 20 апреля».\n\n[ROOT.GetCountry.GetRuler.GetFullName]\nИмперская конституционная комиссия"
 joi_flavor_fra.59.a: "Референдум провалился, 71% голосов «против»."
 joi_flavor_fra.59.b: "Референдум успешно прошёл, 83% голосов «за»."
  #Серия событий Наполеоновских войн
 joi_flavor_fra.60.t: "Имперские амбиции?"
 joi_flavor_fra.60.d: "С укреплением и процветанием империи [ROOT.GetCountry.GetRuler.GetLastName] под правлением [ROOT.GetCountry.GetRuler.GetFirstName] и ростом шовинистических настроений, многие молодые граждане, ностальгирующие по наполеоновской эпохе, начали призывать империю к новой великой экспансии, чтобы возродить славу господства на европейском континенте."
 joi_flavor_fra.60.f: "«Кто может объяснить, описать или понять Наполеона? Это человек, стоящий со скрещёнными руками, всемогущий! Он — самая могущественная сила, известная человечеству, самая концентрированная, самая острая, самая едкая из всех сил. Он — необычайный гений, который повсюду нёс вооружённую цивилизацию, но нигде её не закрепил».\n\n«Он был всемогущ, потому что хотел всего. Он был человеком поразительной воли, который победил болезнь битвами и, прожив жизнь под градом пуль, должен был умереть от болезни в постели. В его голове были кодекс, меч, слово и действие»."
 joi_flavor_fra.60.a: "Нет, нет, империя должна нести мир."
 joi_flavor_fra.60.b: "Европа, ваш правитель вернулся!"
  #
 joi_flavor_fra.61.t: "Покоритель мира"
 joi_flavor_fra.61.d: "С капитуляцией последней страны антифранцузской коалиции, положение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европе было утверждено. Под руководством [ROOT.GetCountry.GetRuler.GetFirstName] французская нация превзошла даже достижения наполеоновской эпохи, став абсолютным властелином Европы и всего мира."
 joi_flavor_fra.61.f: "«Всё поле битвы, пропитанное дождём и кровью, с урожаем ржи и кукурузы, размятым копытами лошадей, было похоже на тесто».\n\n«Затем взору предстало не менее двадцати пяти тысяч убитых и раненых, и ещё больше павших лошадей. На земле были разбросаны оружие, сёдла, уздечки, сумки, различная одежда, обломки боеприпасов, военные уставы и так далее».\n\n«На следующий день тела тех, кто, казалось, перестал дышать, были сожжены на наспех сложенных кострах и похоронены в траншее, проходящей через поле битвы, без какого-либо тщательного выяснения, могут ли они ещё быть живы... Остальным телам была оказана максимально возможная помощь»."
 joi_flavor_fra.61.a: "Слава правителю [ROOT.GetCountry.GetRuler.GetFirstName]!"
  #
 joi_flavor_fra.62.t: "Восьмая антифранцузская коалиция!"
 joi_flavor_fra.62.d: "Былые опасения оправдались. После реставрации [GetIdeology('ideology_bonapartist').GetName] [SCOPE.sCountry('FRA_scope').GetNameNoFlag], подобно Наполеону, коронованному в 1803 году, вновь ввергла всю Европу в ужасную войну. История повторяется: ведущие державы Европы, как и в прошлые разы, созвали конференцию и организовали огромную коалиционную армию, поклявшись разгромить агрессоров из [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.62.f: "«Во имя Пресвятой и Нераздельной Троицы! Основываясь на вере в необходимость строить взаимоотношения на высоких истинах, которым учит вечная религия Божественного Спасителя, страны, участвующие в этом союзе, торжественно заявляют:\n\nЕдинственная цель этого соглашения — показать всему миру их непоколебимую решимость руководствоваться в управлении своими государствами и в политических отношениях с любым другим правительством только заповедями справедливости, милосердия и мира.\n\nЭти принципы должны применяться не только в частной жизни, но и непосредственно влиять на решения монархов, направляя все их действия, чтобы человеческие институты были долговечны и их несовершенства исправлялись»."
 joi_flavor_fra.62.a: "Мы не можем противостоять могущественной Франции."
 joi_flavor_fra.62.b: "Объединившись, мы победим!"
  #
 joi_flavor_fra.63.t: "Второй Венский конгресс"
 joi_flavor_fra.63.d: "После очередного поражения [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], как и в 1815 году, союзные войска вошли в Париж. В Вене была созвана вторая конференция для передела сфер влияния в Европе и наказания [GetIdeology('ideology_bonapartist').GetNameNoFlag] за военные преступления."
 joi_flavor_fra.63.f: "«Вена сегодня представляет собой удивительное зрелище: все выдающиеся личности Европы собрались здесь в блестящем составе. Российский император, императрица и великая княгиня, король Пруссии и несколько принцев его дома, король Дании, король и наследный принц Баварии, король и наследный принц Вюртемберга, герцоги и принцы Мекленбурга, Саксен-Веймара, Саксен-Кобурга, Гессена и других, половина бывших имперских князей и графов, а также бесчисленные представители великих и малых держав Европы».\n\n«Всё это создаёт движение и такое разнообразие образов и интересов, что подобное зрелище могло возникнуть только в наше необыкновенное время. Однако политическая ситуация, служащая фоном для этой картины, пока не принесла никакого реального прогресса»."
 joi_flavor_fra.63.a: "На этот раз нужно навсегда отправить этих бонапартистских негодяев в ад!"
 joi_flavor_fra.63.b: "Дворец на острове Святой Елены можно отремонтировать в ожидании прибытия правителя."
  #
 joi_flavor_fra.64.t: "Второй Тильзитский мир"
 joi_flavor_fra.64.d: "Французская армия вновь, как и в 1806 году, прошла через Бранденбургские ворота и вошла в Берлин. Прусская королевская семья бежала из столицы, а Франкфурт, место заседаний Германского союза, также попал под контроль [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')]. Правители германских государств уже выразили свою покорность. Пришло время восстановить правление [SCOPE.sCountry('RHN_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_fra.64.f: "«Государства [SCOPE.sCountry('RHN_scope').GetAltNameNoFlag('RU_CL_RP')], а именно короли Баварии и Вюртемберга, курфюрсты Рейнланда и Бадена, герцоги Берга и Клеве, ландграф Гессен-Дармштадта, князья Нассау-Узингена и Нассау-Вейльбурга, Гогенцоллерн-Гехингена и Гогенцоллерн-Зигмарингена, Зальм-Зальма и Зальм-Кирбурга, Изенбург-Бирштейна, герцог Аренберга, князь Лихтенштейна и граф Лейен, навсегда отделяются от территории Германской империи и объединяются в особую конфедерацию под названием Рейнский союз».\n\n«[ROOT.GetCountry.GetNameNoFlag] и государства [SCOPE.sCountry('RHN_scope').GetAltNameNoFlag('RU_CL_RP')], как коллективно, так и по отдельности, заключают союз, согласно которому в случае континентальной войны любая договаривающаяся сторона немедленно становится союзником всех остальных. Если соседнее государство, не входящее в союз, вооружится, договаривающиеся стороны, чтобы не быть застигнутыми врасплох, также вооружатся по просьбе министра одной из них во Франкфурте»."
 joi_flavor_fra.64.a: "Максимально ослабить автономию союза."
 joi_flavor_fra.64.b: "Подписать договор, союз будет править Германией."
  #
 joi_flavor_fra.65.t: "Испанская корона"
 joi_flavor_fra.65.d: "С падением Мадрида, Испания, хозяйка Иберийского полуострова, фактически оказалась под контролем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Король выразил желание отречься от престола. Возможно, стоит последовать примеру императора Наполеона и возвести на испанский трон члена семьи [ROOT.GetCountry.GetRuler.GetLastName]."
 joi_flavor_fra.65.f: "«Я наслаждался королевским обедом, поданным на чистом серебре, где шесть лакеев подали мне девять изысканных блюд, многие из которых я не мог даже назвать. Я проводил досуг в личных покоях Карла, любуясь гербарием и архивами принцессы, или катался с принцессой и принцем на двух элегантных скакунах по извилистым дорожкам парка, мимо цветущих рододендронов на берегу искусственного озера, по глади которого плавно скользили величественные европейские лебеди».\n\n«Я слышал, как он без обиняков говорил о своём положении во время своего короткого и бурного правления в Испании — если это вообще можно назвать правлением. Он приписывал более половины своих несчастий зависти и интригам непокорных маршалов, над которыми он не имел никакой власти. Он признавал, что был непопулярен, но также утверждал, что искренне желал блага народу»."
 joi_flavor_fra.65.a: "Испанский трон унаследуют потомки Его Величества Жозефа Бонапарта."
 joi_flavor_fra.65.b: "Нельзя повторять прошлых ошибок. Империя должна обеспечить своё господство на полуострове."
  #
 joi_flavor_fra.66.t: "Второй Флорентийский договор"
 joi_flavor_fra.66.d: "С падением Рима, представители [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] провели тайную встречу во Флоренции, где от имени антифранцузской коалиции было объявлено о признании суверенитета правителя над Италией."
 joi_flavor_fra.66.f: "«Все военнопленные, захваченные обеими сторонами на суше или на море во время войны и до настоящего времени, а также заложники, взятые или отданные, будут возвращены без выкупа в течение не более шести недель с момента обмена ратификационными грамотами настоящего договора, после уплаты долгов, которые они могли сделать во время плена. Каждая из договаривающихся сторон соответственно оплатит авансы, которые были сделаны для жизни и содержания военнопленных в стране их содержания».\n\n«С этой целью обе стороны по согласию назначат комиссию, специально уполномоченную установить и определить компенсацию, подлежащую уплате любой из договаривающихся сторон. Также обе стороны по согласию определят время и место заседания комиссии, которой будет поручено исполнение этого пункта, и которая будет учитывать не только расходы на военнопленных respective стран, но и на иностранные войска, которые до своего захвата находились на жаловании и в распоряжении одной из договаривающихся сторон»."
 joi_flavor_fra.66.a: "Восстановить в Южной Италии Неаполитанское королевство под управлением потомков маршала Мюрата."
 joi_flavor_fra.66.b: "Объединить итальянские территории в Королевство Италия под властью Его Величества [ROOT.GetCountry.GetRuler.GetFirstName]."
  #
 joi_flavor_fra.67.t: "Польская корона?"
 joi_flavor_fra.67.d: "Мы выступили на Варшаву под знаменем восстановления Польши и получили поддержку многих поляков. Однако, после того как все польские территории оказались под нашим контролем, правитель начал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] сомневаться, стоит ли восстанавливать Польское королевство."
 joi_flavor_fra.67.f: "«Его Величество император всероссийский навсегда отказывается от владения всеми провинциями, ранее входившими в состав Польского королевства и в разное время находившимися под властью России. Лица любого ранга и сословия, чьи владения и местожительство находятся в провинциях, ранее входивших в состав Польского королевства или впредь находящихся во владении Его Величества императора всероссийского, а также лица Варшавского герцогства или проживающие на территориях, включённых в состав России, или имеющие какие-либо поместья, ренты, аннуитеты или любые доходы, не будут преследоваться ни лично, ни по своим владениям, рентам, аннуитетам и доходам, ни по своему рангу и достоинству за любую деятельность, в которой они принимали участие с политической или военной точки зрения в ходе нынешней войны»."
 joi_flavor_fra.67.a: "Дворянин из династии Веттинов может стать королём Польши."
 joi_flavor_fra.67.b: "Его Величество [ROOT.GetCountry.GetRuler.GetFirstName] будет править в Варшаве."
 joi_flavor_fra.67.c: "Вопрос о восстановлении Польского королевства следует отложить. Эти земли должны стать нашей базой для похода на Россию."
  #
 joi_flavor_fra.68.t: "Пожар Москвы"
 joi_flavor_fra.68.d: "После русско-французской войны 1812 года, Москва снова оказалась под контролем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. [SCOPE.sCountry('RUS_scope').GetNameNoFlag] попытался вновь использовать тактику выжженной земли, но по приказу предусмотрительного правителя армия доставила из Польши достаточно припасов, и этот пожар оказался бесполезным. Более того, он лично приказал полностью сжечь город, включая Кремль и собор Василия Блаженного. Все тысячелетние культурные достижения русского народа превратились в пепел, а то, что не сгорело, было взорвано. Москва превратилась в ад."
 joi_flavor_fra.68.f: "«С предыдущего дня начались поиски горючих материалов, но некоторые были убраны, а остальные — выведены из строя... Поляки доложили, что они раздобыли несколько зажигательных снарядов и использовали их... Они получили известие, что правитель и военные отдали приказ сжечь весь город ночью».\n\n«Какое ужасное зрелище! Они сами разрушили столько дворцов! Какое невероятное решение! Что за люди! Это же скифы!»"
 joi_flavor_fra.68.a: "Мы можем позволить России подписать почётную капитуляцию."
 joi_flavor_fra.68.b: "Сфера влияния империи расширится на Восточную Европу!"
  #
 joi_flavor_fra.69.t: "Второй Пресбургский мир"
 joi_flavor_fra.69.d: "После сокрушительного поражения [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] и коалиции при Пресбурге, правитель направил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] представителей для подписания соглашения с антифранцузской коалицией, которое положило конец текущей войне и отняло у [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] множество территорий."
 joi_flavor_fra.69.f: "«[ROOT.GetCountry.GetNameNoFlag] сохранит полное владение и суверенитет над всеми герцогствами, княжествами, владениями и территориями за Альпами, которые до заключения настоящего мирного договора были либо объединены с Французской империей, либо находились под французским законодательством и управлением».\n\n«Его Величество император Австрии от своего имени и от имени своих потомков и преемников соглашается с распоряжениями, сделанными Его Величеством императором Франции и королём Италии в отношении герцогств Лукка и Пьомбино, и отказывается от всех прав на венецианские территории, на которые он мог претендовать по условиям Кампо-Формийского и Люневильского договоров»."
 joi_flavor_fra.69.a: "Восстановить Иллирийские провинции, остальное можно передать Конфедерации."
 joi_flavor_fra.69.b: "Мы должны поддерживать наш военный контроль в Альпах."
  #
 joi_flavor_fra.70.t: "Египет под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_fra.70.d: "Армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] заняла Нил и Суэц. Трёхцветный флаг вновь взвился на вершине пирамиды Хеопса, как и в те дни, когда Наполеон привёл сюда свои войска."
 joi_flavor_fra.70.f: "Дельта Нила, житница и сердце многих великих империй. Цезарь завоевал её, подчинив Риму; Селим I завоевал её, подчинив Османской империи. Теперь же [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] империя, вслед за походом Наполеона, вновь покорила эту землю, и трёхцветный флаг снова реет на вершинах пирамид.\nЕгипет занимает столь важное положение, что в нашу эпоху мы можем не только, подобно великим империям прошлого, сделать его аграрным центром, приносящим нам торговые и экономические выгоды, но и превратить его в военную базу для укрепления нашего мирового господства, что даст нам преимущества в переброске войск. Как же нам следует использовать эту землю?"
 joi_flavor_fra.70.a: "Египет станет центром нашей имперской мощи."
 joi_flavor_fra.70.b: "Египет обеспечит нам торговые преимущества."
  #События Антанты
 joi_flavor_fra.71.t: "Сердечное согласие"
 joi_flavor_fra.71.d: "Специальный уполномоченный нашего правительства провёл в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] тайную встречу с нашими бывшими врагами из-за Ла-Манша. Официально было объявлено, что обсуждаются вопросы, связанные с рыболовством и колониальными границами, но на самом деле был согласован договор о военном союзе, ожидающий подписания правителем [ROOT.GetCountry.GetRuler.GetFirstName]."
 joi_flavor_fra.71.f: "«Правительство Британской империи признаёт, что Франция обязана поддерживать порядок в Марокко и оказывать ей всю необходимую помощь для проведения административных, экономических, финансовых и военных реформ, особенно как держава, чья территория граничит с Марокко».\n\n«Для обеспечения свободы прохода через Гибралтарский пролив оба правительства договорились не допускать строительства каких-либо укреплений или стратегических сооружений на марокканском побережье между Мелильей и высотами на правом берегу Себу, но не включая эти два пункта».\n\n«Оба правительства договорились оказывать друг другу дипломатическую поддержку для выполнения положений настоящей декларации, касающихся Египта и Марокко... В подтверждение чего, Чрезвычайный и Полномочный Посол Французской Республики при дворе Его Величества Короля Соединённого Королевства Великобритании и Ирландии и Британских заморских владений, Императора Индии, и Министр иностранных дел Его Величества, должным образом уполномоченные, подписали и скрепили печатями»."
 joi_flavor_fra.71.a: "Нельзя доверять этим коварным негодяям из-за пролива."
 joi_flavor_fra.71.b: "Наш союз победит любого врага!"
  #
 joi_flavor_fra.72.t: "Алжирская декларация"
 joi_flavor_fra.72.d: "[SCOPE.sCharacter('algerian_parade_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('algerian_parade_general_scope').GetLastName], стоя на палубе флагмана Средиземноморского флота, «[SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_ship_name')]», объявил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] о прекращении крупномасштабных военных операций в Алжире."
 joi_flavor_fra.72.f: "Пышно одетые войска медленно двигались вдоль набережной Алжира. Ярко одетые зуавы в сомкнутом строю шли к [ROOT.GetCountry.GetAdjective] кораблям, стоявшим в порту, над которыми развевались потрёпанные знамёна побеждённых алжирских легионов. За ними следовали уланы, регулярные войска и туземная пехота, одетые так же.\n\n[SCOPE.sCharacter('algerian_parade_general_scope').GetFullName] стоял[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на квартердеке и смотрел[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] на массовое сосредоточение [ROOT.GetCountry.GetAdjective] войск. [SelectLocalization(SCOPE.sCharacter('algerian_parade_general_scope').IsFemale, 'Её', 'Его')] размышления прервал тихий кашель. «Это губернатор, сэр. Он хочет знать, каковы дальнейшие планы»."
 joi_flavor_fra.72.a: "Сегодня мы чествуем героев Африки!"
 joi_flavor_fra.72.b: "Субсидировать компании для экспроприации пахотных земель для европейских поселенцев."
 joi_flavor_fra.72.c: "Правление саблей — это прошлое. Налаживайте отношения с местными шейхами."
#
 joi_flavor_fra.73.t: "Постоянная линия обороны"
 joi_flavor_fra.73.d: "Мощная бетонная линия обороны возведена в регионе [GetStateRegion('STATE_ALSACE_LORRAINE').GetName]. Она представляет собой сложную систему подземных фортов, бетонных укреплений и военных объектов: пограничных застав, узлов связи, пехотных бункеров, заграждений, артиллерийских и пулемётных позиций, складов снабжения, инфраструктуры и наблюдательных пунктов."
 joi_flavor_fra.73.f: "«Либо произойдёт решающее сражение, и [ROOT.GetCountry.GetName] одержит в нём победу, либо, что более вероятно, линия фронта стабилизируется. В последнем случае разрушительные последствия следующей войны не затронут территорию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].»\n\n«Мы не можем позволить себе построить укрепление наподобие Великой Китайской стены — это потребовало бы колоссальных затрат. Вместо этого мы предлагаем мощную и гибкую систему обороны, основанную на двух принципах: максимальном использовании рельефа местности и создании непрерывной линии огня на всех участках»."
 joi_flavor_fra.73.a: "Она непременно защитит нашу страну!"
 #
 joi_flavor_fra.74.t: "Культ наступления"
 joi_flavor_fra.74.d: "Под влиянием моды на «моральную силу» идея всеобщего наступления завоёвывает господство среди многих политических и военных лидеров. Они уверены: войну можно выиграть лишь тогда, когда каждый солдат [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] воплотит галльский дух, например без колебаний бросаясь в штыковую атаку."
 joi_flavor_fra.74.f: "«Если солдаты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] совершат трусливую ошибку, подобную итальянцам, простой отставки будет мало. Впредь таких офицеров и солдат следует на автомобилях доставлять в Генеральный штаб и отдавать под военный суд. Я уверен, что, как и в 1793 году, их не ждёт ничего, кроме исключения из армии или смертной казни!»\n\n«Если вы хотите победить, добивайтесь этого быстрыми, жестокими, мощными и решительными средствами. Если кто-то действительно страшится идти вперёд, ему нет иного наказания, кроме немедленного расстрела! Единственный закон [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] сейчас таков: либо атака, либо смерть!»"
 joi_flavor_fra.74.a: "Сохраним хотя бы немного сомнений."
 joi_flavor_fra.74.b: "Победа принадлежит тем, кто атакует изо всех сил!"
 joi_flavor_fra.75.t: "Дух бесстрашия"
 joi_flavor_fra.75.d: "Идея наступления получила подтверждение недавними блестящими победами и воодушевила всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Многие граждане начали верить, что, если мы сохраним великий дух бесстрашия и стремительного натиска, победа в любой следующей кампании неизбежна."
 joi_flavor_fra.75.f: "«В час, когда решается судьба страны, всем следует напомнить: сейчас не время оглядываться назад. Часть, неспособная продолжать бой, всё равно должна любой ценой удерживать позицию, умереть, но не отступить, и по возможности переходить в наступление. В нынешних условиях никакое поражение недопустимо: мы будем наступать изо всех сил и не станем обращать внимания на трусливые британские войска».\n\n— Жозеф Жоффр, на Марне."
 joi_flavor_fra.75.a: "Победа принадлежит тем, у кого есть воля к завоеванию!"
 joi_flavor_fra.75.b: "Без атаки нет победы!"
 joi_flavor_fra.76.t: "Цена крови"
 joi_flavor_fra.76.d: "Несмотря на частые массированные наступления, чудовищные потери последних войн и вызванная ими усталость начинают заставлять офицеров сомневаться в правоте наступательной доктрины. Перед лицом нового смертоносного оружия должна ли армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и дальше держаться кельтской и галльской наступательной традиции, которую восхвалял Цезарь?"
 joi_flavor_fra.76.f: "«Пехота, по-видимому, забывает о необходимости организовывать себя для продолжительного боя. Она немедленно выстраивает плотные массы войск в линию, тем самым сразу подставляя их под огонь противника. Потери оказываются тяжёлыми, наступление внезапно срывается, а сами части нередко попадают под контратаку».\n\n«Какими бы люди ни представляли войны будущего, одно остаётся жизненно важным: не допустить вторжения на нашу территорию. Мы хорошо знаем, к каким разрушительным последствиям приводит такое вторжение; они столь велики, что даже победа не способна их возместить»."
 joi_flavor_fra.76.a: "Это ещё не доказывает, что наступательная доктрина полностью ошибочна."
 joi_flavor_fra.76.b: "Чрезмерное увлечение наступлением ведёт нас к худшей участи..."
