  #Франко-русский союз
 russian_franco_alliance: "Франко-русский союз"
 russian_franco_alliance_reason: "[ROOT.GetCountry.GetNameNoFlag] и [SCOPE.sCountry('RUS_scope').GetNameNoFlag] — самые отдалённые друг от друга страны Европе, и наши политические системы сильно различаются. В прошлом император Наполеон даже дошёл до самого сердца России, вынудив их Александра I сжечь Москву.\n\nОднако, с изменением мировой обстановки, ради #bold реальных политических интересов#!, [SCOPE.sCountry('RUS_scope').GetNameNoFlag] уже выразила желание преодолеть былую вражду и даже объединиться для противостояния угрозе в Центральной Европе. Кроме того, их острая потребность в #bold капитале и передовых технологиях#! для индустриализации делает нашу дружественную страну #bold взаимовыгодным экономическим партнёром#!.\n\nФранцузская дипломатическая миссия на наших военных кораблях посетила Кронштадт в том же месяце, когда наша страна выразила дружеские намерения. На побережье Финского залива, в #bold Петергофском дворце#!, русский царь устроил пышный обед в честь нашего посла. На обеде наш оркестр исполнил #bold французский гимн «Марсельезу»#!. Хотя эта песня, кажется, не пользуется популярностью у их правительства, присутствовавший царь и другие встали, чтобы выразить уважение к нашей стране.\n\nЛёд между нашими странами растоплен. Мы верим, что наша дружба будет длиться вечно, и мы вместе будем противостоять всем врагам.\n\n#bold Когда Франция и Россия едины, их сила несокрушима!#!"
 franco_russian_alliance_possible_tt: "Германия объединена"
 fra_alliance_1_button: "Инвестировать в строительство российских железных дорог"
 fra_alliance_1_button_desc: "Амбициозная Россия активно строит железные дороги, но их скудная казна заставляет их искать займы по всему миру. Мы можем воспользоваться этой возможностью, чтобы помочь им с финансированием строительства, и они, несомненно, будут нам благодарны."
 fra_alliance_1_button_tt: "В течение 5 лет не было #bold инвестиций в строительство российских железных дорог#!"
 fra_alliance_2_button: "Отправить научную миссию в Россию"
 fra_alliance_2_button_desc: "У русских, кажется, нет таланта к научным исследованиям, но это неважно. Мудрость Франции известна всему миру. Отправка нескольких выдающихся учёных в Москву для обмена опытом будет полезна нам обоим."
 fra_alliance_2_button_tt: "В течение 5 лет не было #bold отправки научной миссии в Россию#!"
 fra_alliance_3_button: "Запросить привлечение российских рабочих"
 fra_alliance_3_button_desc: "Нашей индустриализации остро не хватает надёжных рабочих, а у нашего союзника России как раз много трудолюбивых крестьян, которых можно привезти на работу во Францию. Приезжайте все!"
 fra_alliance_3_button_tt: "В течение 5 лет не было #bold запроса на привлечение российских рабочих#!"
 fra_alliance_4_button: "Запросить экспорт российского зерна"
 fra_alliance_4_button_desc: "Хотя наше сельское хозяйство всегда было сильным, зачем нам тратить драгоценные силы на обработку земли, если у нас есть такой качественный сельскохозяйственный партнёр, как Россия? Давайте наладим связи с Россией и будем импортировать больше их дешёвого зерна."
 fra_alliance_4_button_tt: "В течение 5 лет не было #bold запроса на экспорт российского зерна#!"
 fra_alliance_5_button: "Подписать «Договор о союзничестве»"
 fra_alliance_5_button_desc: "Мировая обстановка для нас крайне напряжённая. Пора напомнить русским об их союзнических военных обязательствах и призвать их на помощь в войне!"
 fra_alliance_5_button_tt: "Продлевать можно только раз в 10 лет."
 fra_alliance_6_button: "Расторгнуть франко-русский союзный договор"
 fra_alliance_6_button_desc: "Наш союз с Россией исчерпал себя. Пора покончить с этим временным союзом, пусть русские убираются!"
 russian_franco_alliance_tt: "#bold «Инвестировать в строительство российских железных дорог» и «Отправить научную миссию в Россию»#! увеличат очки сотрудничества на 50.\n#bold «Запросить привлечение российских рабочих» и «Запросить экспорт российского зерна»#! потребуют 50 очков сотрудничества.\nПри необходимости можно #bold подписать «Договор о союзничестве»#! для укрепления нашего военного союза с Россией или #bold расторгнуть франко-русский союзный договор#!, чтобы полностью прекратить любые отношения.\n"
 franco_russian_alliance_possible_2_tt: "Наша страна приняла приглашение Франции"
 franco_russian_alliance_refuse_tt: "Наша страна откажется от любого содержания, связанного с франко-русским союзом"
 franco_russian_alliance_agree_tt: "Наша страна примет приглашение Франции!\nЭто разблокирует для нашей страны журнал франко-русского союза."
 fra_alliance_button_need_50_tt: "Требуется не менее 50 очков сотрудничества."
  #Индустриализация
 paris_industrialize: "Строительные работы в Париже"
 paris_industrialize_reason: "#variable Париж#! — бесспорный центр нашей страны, на протяжении тысячи лет он был главной артерией, питающей экономику всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nОднако в наше время даже Парижу необходим #bold грандиозный план реконструкции#!, чтобы полностью преобразиться в #bold новый индустриальный город, извергающий здоровый дым промышленности#!.\n\nМы перестроим его старинные улицы, проложив широкие бульвары; мы снесём ветхие дома, возведя на их месте здания из стали и бетона. Благодаря этой реконструкции Париж достигнет невиданного процветания и великолепия."
 paris_industrialize_status: "Превратить Париж в самую яркую жемчужину Европы."
  #Сирия
 partant_pour_la_syrie: "Поход на Сирию!"
 partant_pour_la_syrie_reason: "Во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] #bold внешнеполитическая экспансия под руководством [GetIdeology('ideology_bonapartist').GetName]#! стала главным политическим течением. Они ностальгируют по славным временам #bold Французской империи#!, когда #bold император Наполеон#! и его прославленные полководцы вели бесчисленные армии на завоевание Европы, переходя Альпы.\n\n[concept_government] должно дать этим бонапартистам достойный ответ, чтобы обеспечить их лояльность. Сирия, формально принадлежащая [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')], может стать отличным выбором. Как место, где #bold император Наполеон потерпел неудачу#!, #bold флаг [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] должен там гордо реять!#!"
  #Вторая волна французских журналов (июнь 2025 г.)###############################################################
 before_french_provisional_republic_tt: "#V #P #B Временное правительство возьмёт власть в свои руки и восстановит республиканский строй, исчезнувший из Франции с 1804 года.#!#!#!\n#V #U #B Монархисты во главе с [GetIdeology('ideology_bonapartist').GetName] также нанесут ответный удар, заставив страну выбирать между укреплением республики и восстановлением династии Бонапартов, что откроет соответствующие журналы.#!#!#!"
 fra_complete_natural_borders_tt: "Завершена [concept_journal_entry] #V «Естественные границы Франции»#!."
 french_provisional_republic: "Вторая республика"
 french_provisional_republic_reason: "#B Индикатор показывает время, в течение которого #!#V республиканские силы доминируют в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].#! \n\nВслед за #V взятием Бастилии в 1789 году#! и #V тремя славными днями 1830 года#!, очередной [concept_turmoil] охватил Париж, свергнув #B монархию Орлеанского дома#!. #V Луи-Филипп#! бежал из Тюильри во время [concept_revolution], и под руководством [SCOPE.sCharacter('french_provisional_republic_ruler').GetFirstName] [SCOPE.sCharacter('french_provisional_republic_ruler').GetLastName] было создано новое временное правительство и его учредительное собрание. Со времён #V Первой империи#! #B славный республиканский строй вернулся во Францию.#!\n\nОднако [GetLawType('law_presidential_republic').GetName] во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] по-прежнему находится в шатком положении. Хотя республиканцы, подвергавшиеся цензуре при Июльской монархии, проявили энтузиазм по отношению к республике, их политический союз с так называемыми #V «республиканцами завтрашнего дня»#! — #B на самом деле, монархистами разных фракций#! — созданный для борьбы с правлением [GetIdeology('ideology_orleanist').GetName], трещит по швам. Влиятельные [GetIdeology('ideology_bonapartist').GetName] и [GetIdeology('ideology_legitimist').GetName] вновь объединяются в мощный #B монархический союз#! и, многочисленные [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], пытаются восстановить #V новую династию Бонапартов#!.\n\nБолее того, с углублением экономического кризиса и ростом безработицы в Париже, многие недовольные правительством #v $laborers$#! присоединяются к радикальным левым [Concept('concept_political_movement', 'политическим движениям')], пытаясь продвигать свои политические цели во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Беспорядки в Париже не прекратились с созданием временного правительства, они могут вспыхнуть в любой момент и нанести удар как по республиканцам, так и по монархистам.\n\n#B Будущее республики по-прежнему туманно. Сможет ли тот самый юный, пылкий, гордый, щедрый и искренний дух #V эпохи Великой революции#! вернуться и привести [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] к её предназначению?#!"
 french_provisional_republic_complete_tt: "#V Республиканцы#! превосходят по силе #V монархистов#! в течение 5 лет."
 french_provisional_republic_on_complete_tt: "Республиканский строй в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] будет укреплён."
 french_provisional_republic_fail_tt: "#V Монархисты#! превосходят по силе #V республиканцев#!, и #V семья Наполеона#! вернулась."
 french_provisional_republic_fail_2_tt: "Опасные тенденции Национальных мастерских и левых полностью подавлены."
 french_provisional_republic_fail_3_tt: "Результаты выборов объявлены, закон о выборах утверждён."
 french_provisional_republic_on_fail_tt: "Произойдёт переворот, который свергнет республиканский строй во Франции!"
 french_provisional_republic_status: "#bold Республика расколота между республиканцами и монархистами и погружена в хаос.#!"
 french_provisional_republic_republic_progress_bar: "«Республиканцы вчерашнего дня»"
 french_provisional_republic_republic_progress_bar_desc: "Сила республиканцев: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 french_provisional_republic_republic_progress_bar_change_button: "Поддержка республиканцев"
 french_provisional_republic_republic_progress_bar_change_event: "Республиканцы получили поддержку в недавних событиях"
 french_provisional_republic_monarchy_progress_bar: "«Республиканцы завтрашнего дня»"
 french_provisional_republic_monarchy_progress_bar_desc: "Сила монархистов: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/500)"
 french_provisional_republic_monarchy_progress_bar_change_button: "Поддержка роялистов"
 french_provisional_republic_monarchy_progress_bar_change_event: "Роялисты получили поддержку в недавних событиях"
 french_provisional_republic_1_button: "Поддержать республиканцев"
 french_provisional_republic_1_button_desc: "Дело республиканизма в опасности. В этот важный момент мы должны обеспечить лояльность правительства республиканскому строю."
 french_provisional_republic_2_button: "Поддержать роялистов"
 french_provisional_republic_2_button_desc: "Нынешний республиканский строй — лишь временная мера. Мы должны принять меры для скорейшего возрождения монархии во Франции."
 french_provisional_republic_button_timer_tt: "В течение 1 года не меняли сторону поддержки."
