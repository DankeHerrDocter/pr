l_russian:
  #Политика Парижа
 paris_politic: "Политика Парижа"
 paris_politic_reason: "Индикатор показывает политическое влияние самой доминирующей [Concept('concept_interest_group', 'заинтересованной группы')] в Париже.\n\n#variable Париж#!, [Concept('concept_capital_state', 'столица')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], — это не просто самый процветающий и известный мегаполис страны, но и политический центр [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nЭтот город, расположенный на #variable берегах Сены в Иль-де-Франс#!, с момента коронации Гуго Капета #bold королём Франции#! в #bold 987 году#! всегда был символом верховной власти. #bold Тюильри, Версаль, Фонтенбло...#! Великолепие Парижа выдержало тысячелетия смены династий, став свидетелем героических эпопей Франции.\n\nБолее того, влияние Парижа на [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] заключается в его #bold высочайшем#! политическом статусе: малейшие [Concept('concept_turmoil', 'беспорядки')] или [concept_revolution] в Париже способны свергнуть или потрясти любого французского правителя. Во время #variable Великой французской революции 1789 года#! восставшие в Париже [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] с лёгкостью уничтожили правившую сотни лет династию Бурбонов и обезглавили короля Людовика XVI, основав #bold Первую Французскую Республику#!. Хотя республика была сменена империей #bold Наполеона#!, а империя — разгромлена #bold антифранцузской коалицией#!, парижане сохранили огромное влияние на политическую жизнь Франции. В 1830 году во время #variable Июльской революции#! Орлеанская династия вновь захватила контроль над [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] благодаря волнениям в Париже, в то время как провинции были бессильны и могли лишь принимать любое #bold правительство из Парижа#! или #bold приказы из Парижа#!.\n\nИ сегодня Париж остаётся главной политической ареной нашей страны. Различные [Concept('concept_interest_group', 'заинтересованные группы')] плетут интриги, постоянно пытаясь легко и просто повлиять на #variable всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]...#!"
 paris_politic_complete_tt: "Если политическое влияние одной [Concept('concept_interest_group', 'заинтересованной группы')] достигнет 5000, политическая сцена Парижа окажется в руках одной всемогущей фракции!"
 status_paris_politic_intelligentsia: "#V #P #B [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] получают преимущество.#!#!#!"
 status_paris_politic_landowners: "#V #P #B [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] получают преимущество.#!#!#!"
 status_paris_politic_petty_bourgeoisie: "#V #U #B [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] получают преимущество.#!#!#!"
 status_paris_politic_industrialists: "#V #O #B [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] получают преимущество.#!#!#!"
 status_paris_politic_trade_unions: "#V #N #B [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] получают преимущество.#!#!#!"
 status_paris_politic_always: "#V #P #B Ни одна [concept_interest_group] не получает преимущества.#!#!#!"
 paris_politic_intelligentsia_button: "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_intelligentsia').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_intelligentsia_var_tooltip [ROOT.GetCountry.MakeScope.Var('intelligentsia_progress_next').GetValue|1+=]#!)"
 paris_politic_intelligentsia_var_tooltip: "Ежемесячное увеличение по следующим причинам:\n#variable Общая [concept_popularity] персонажей с идеологиями радикализма, республиканизма и гуманизма даёт [Country.MakeScope.Var('intelligentsia_progress_from_characters').GetValue|+=] очков#!\n#variable [Concept('concept_legitimacy', 'Легитимность')] [Concept('concept_government', 'правительства')] даёт [Country.MakeScope.Var('intelligentsia_progress_from_legitimacy').GetValue|+=] очков#!"
 paris_politic_intelligentsia_button_tt: "Политическое влияние группы  [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] больше 500"
 paris_politic_intelligentsia_button_desc: "По мере роста влияния группы [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] в Париже, правительству необходимо проявить к ним терпимость и прислушаться к идеям некоторых интеллектуалов об управлении государством."
 paris_politic_landowners_button: "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_landowners').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_landowners_var_tooltip [ROOT.GetCountry.MakeScope.Var('landowners_progress_next').GetValue|1+=]#!)"
 paris_politic_landowners_var_tooltip: "Ежемесячное увеличение по следующим причинам:\n#variable [concept_clout] [Concept('concept_interest_group', 'заинтересованных групп')], чьи лидеры — легитимисты, роялисты и традиционалисты, даёт [Country.MakeScope.Var('landowners_progress_from_igs').GetValue|+=] очков#!\n#variable [Concept('concept_building_level', 'Уровни')] сельскохозяйственных или плантационных [Concept('concept_building', 'сооружений')] с прибылью не менее 10 даёт [Country.MakeScope.Var('landowners_progress_from_farm').GetValue|+=] очков#!"
 paris_politic_landowners_button_1_tt: "Политическое влияние группы [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] больше 500"
 paris_politic_landowners_button_desc: "По мере роста влияния группы [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] в Париже, правительству придётся умиротворить их, отмечая прошлые заслуги аристократии."
 paris_politic_petty_bourgeoisie_button: "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_petty_bourgeoisie').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_petty_bourgeoisie_var_tooltip [ROOT.GetCountry.MakeScope.Var('petty_bourgeoisie_progress_next').GetValue|1+=]#!)"
 paris_politic_petty_bourgeoisie_var_tooltip: "Ежемесячное увеличение по следующим причинам:\n#variable [concept_clout] [Concept('concept_interest_group', 'заинтересованных групп')], чьи лидеры — бонапартисты, реформисты и социал-демократы, даёт [Country.MakeScope.Var('petty_bourgeoisie_progress_from_igs').GetValue|+=] очков#!\n#variable [Concept('concept_building_level', 'Уровни')] [Concept('concept_building', 'сооружений')] сферы услуг с прибылью не менее 10 даёт [Country.MakeScope.Var('petty_bourgeoisie_progress_from_building').GetValue|+=] очков#!"
 paris_politic_petty_bourgeoisie_button_1_tt: "Политическое влияние группы [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] больше 500"
 paris_politic_petty_bourgeoisie_button_desc: "По мере роста влияния группы [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] в Париже, кабинет должен принять в правительство чиновников, близких к интересам горожан, чтобы стабилизировать переменчивые настроения парижан."
 paris_politic_industrialists_button: "[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_industrialists').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_industrialists_var_tooltip [ROOT.GetCountry.MakeScope.Var('industrialists_progress_next').GetValue|1+=]#!)"
 paris_politic_industrialists_var_tooltip: "Ежемесячное увеличение по следующим причинам:\n#variable [concept_clout] [Concept('concept_interest_group', 'заинтересованных групп')], чьи лидеры — орлеанисты, рыночные либералы и протекционисты, даёт [Country.MakeScope.Var('industrialists_progress_from_igs').GetValue|+=] очков#!\n#variable [Concept('concept_building_level', 'Уровни')] производственных [Concept('concept_building', 'сооружений')] с прибылью не менее 15 даёт [Country.MakeScope.Var('industrialists_progress_from_building').GetValue|+=] очков#!"
 paris_politic_industrialists_button_1_tt: "Политическое влияние группы [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] больше 500"
 paris_politic_industrialists_button_desc: "По мере роста влияния группы [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] в Париже, правительство может использовать их влияние для принятия политики, благоприятствующей их инвестициям и способствующей экономическому росту страны."
 paris_politic_trade_unions_button: "[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]: #variable [ROOT.GetCountry.MakeScope.Var('fra_paris_trade_unions').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],paris_politic_trade_unions_var_tooltip [ROOT.GetCountry.MakeScope.Var('trade_unions_progress_next').GetValue|1+=]#!)"
 paris_politic_trade_unions_var_tooltip: "Ежемесячное увеличение по следующим причинам:\n#variable Общая [concept_popularity] персонажей-коммунистов, анархистов и авангардистов даёт [Country.MakeScope.Var('trade_unions_progress_from_characters').GetValue|+=] очков#!\n#variable [concept_clout] социалистических [Concept('concept_interest_group', 'заинтересованных групп')] даёт [Country.MakeScope.Var('trade_unions_progress_from_igs').GetValue|+=] очков#!"
 paris_politic_trade_unions_button_1_tt: "Политическое влияние группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] больше 500"
 paris_politic_trade_unions_button_desc: "По мере роста влияния группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] в Париже, только открытое отношение к растущему рабочему движению, особенно путём разделения или удовлетворения мнений его представителей, может стабилизировать правление парижского правительства."
 paris_politic_on_complete_tt: "Группа, успешно установившая контроль над Парижем, совершит переворот, изменит государственный строй и захватит власть."
  #Рождаемость во Франции
 french_birthrate: "Рождаемость во Франции"
 french_birthrate_reason: "Веками [ROOT.GetCountry.GetNameNoFlag] была самой населённой страной Западной Европы. Ни одна другая страна христианского мира не могла похвастаться такими же условиями: #bold тёплый и приятный климат#! и #bold плодородные и обширные земли#! взрастили французскую нацию, а #bold огромное население#! придавало нашей стране жизненную силу.\n\nВо время #bold Революционных войн#! якобинское правительство одним #bold «Декретом о всеобщей мобилизации»#! за несколько месяцев увеличило численность французской армии с нескольких сотен тысяч до миллиона, что потрясло [Concept('concept_great_power', 'великие державы')] антифранцузской коалиции. К моменту похода императора Наполеона на Россию население [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] достигло #bold тридцати миллионов#!, превосходя любую другую страну на континенте. Однако после Наполеоновских войн наша #bold рождаемость#! вошла в #bold длительный период стагнации#!. Элиты [Concept('concept_government', 'правительства')] с тревогой наблюдают за этой аномалией: одни винят в этом ослабление католической веры, другие считают это побочным эффектом промышленной революции и урбанизации, а третьи утверждают, что это результат распространения либеральных идей от #!#!#tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! к #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_DP')|l]#!#!.\n\nКак бы то ни было, ни один дальновидный человек не может больше мириться с этой ситуацией. Если не исправить проблему низкой рождаемости, рано или поздно в нашей [Concept('concept_army', 'армии')] не будет хватать верных солдат, на наших [Concept('concept_building', 'фабриках')] — усердных рабочих, а на наших [Concept('concept_arable_land', 'полях')] — сильных крестьян. Наша некогда непобедимая армия ослабнет, наша индустриализация замедлится, а продовольствия станет не хватать... Французская нация из-за демографического спада рискует потерять статус гегемона Западной Европы, который она удерживала веками.\n\n[ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] нужны дети! Как ответил Наполеон мадам де Сталь: «Лучшая женщина — та, что рожает больше всего детей!»"
  #Национальное собрание
 franch_national_assembly: "Национальное собрание"
 franch_national_assembly_reason: "Индикатор показывает количество депутатов в #bold правящей коалиции#! в Собрании.\nРадикальный альянс: #variable [ROOT.GetCountry.MakeScope.Var('radicals_seat').GetValue|0]#! мест; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_radicals_tooltip_conditions условий#!.\nФронт порядка: #variable [ROOT.GetCountry.MakeScope.Var('conservative_seat').GetValue|0]#! мест; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_conservative_tooltip_conditions условий#!.\nНародный союз: #variable [ROOT.GetCountry.MakeScope.Var('socialist_seat').GetValue|0]#! мест; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_socialist_tooltip_conditions условий#!.\nКоммунистическая группа: #variable [ROOT.GetCountry.MakeScope.Var('communist_seat').GetValue|0]#! мест; изменяется во время [Concept('concept_election', 'выборов')] под влиянием следующих #tooltippable;tooltip:[Country.GetTooltipTag],franch_national_assembly_communist_tooltip_conditions условий#!.\n\nНациональное собрание — сердце демократической системы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], рождённое в стремлении к свободе и демократии во время #variable Революции 1789 года#!. #bold Переворот 18 брюмера#! ознаменовал конец [concept_revolution], и хотя империя Наполеона достигла многого, республика и её демократия были отложены на #bold полвека#!. Июльская [GetLawType('law_monarchy').GetName] была лишь иллюзией: #bold свобода подавлялась, а равенство и братство оставались пустыми словами#!. Палата депутатов, якобы представлявшая французских граждан, на деле представляла лишь ничтожное их меньшинство и была далека от #variable идеалов 1789 года#!.\n\nОднако стремление французов к либерализму не угасло. Хотя правители на #bold Венском конгрессе#! укрепили свои троны, упрямый и прогнивший #bold Карл X#! был свергнут в ходе Июльской революции, консервативная и нерешительная #bold Орлеанская династия#! также была изгнана, а #bold бонапартисты#! исчезли. После десятилетий диктатуры великие принципы #bold Французской революции#! — #bold свобода, равенство, братство#! — вернулись в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Республиканское собрание унаследовало название #bold «Национальное собрание»#!, данное ему #bold третьим сословием#!, чтобы каждый француз мог избирать своих представителей и формировать собрание, которое действительно #bold символизирует всю нацию и её граждан#! и осуществляет власть от их имени.\n\n#variable Вперёд, сыны отечества!#! Будущее [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] может быть бурным, путь — тернистым, но это неважно, ведь идеалы, принесённые нам #bold эпохой Просвещения#!, всегда будут с [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], и мы твёрдо верим, что впереди нас ждёт триумф республиканских принципов. #variable Свобода, ведущая народ!#!"
 franch_national_assembly_possible_tt: "Республиканский строй полностью укреплён: завершена [concept_journal_entry] #V «Вторая республика»#! или #V «Правительство национальной обороны»#!."
 franch_national_assembly_complete_tt: "Различные правящие коалиции, в зависимости от количества мест, будут по-разному влиять на избирательные округа в нашей стране."
 status_franch_national_assembly_radicals: "#U #B Радикальный альянс доминирует в Собрании#!#!"
 status_franch_national_assembly_conservatism: "#P #B Фронт порядка доминирует в Собрании#!#!"
 status_franch_national_assembly_socialism: "#O #B Народный союз доминирует в Собрании#!#!"
 status_franch_national_assembly_communlism: "#N #B Коммунистическая группа доминирует в Собрании#!#!"
 status_franch_national_assembly_nobody: "#P #B Ни одна коалиция не доминирует в Собрании#!#!"
 franch_national_assembly_untrust_button: "Вынести вотум недоверия"
 franch_national_assembly_untrust_button_desc: "Согласно регламенту Национального собрания, оно имеет право инициировать процедуру импичмента, если считает, что действующее правительство явно не справляется со своими обязанностями, наносит ущерб интересам французских граждан и угрожает республиканскому строю. Нынешнее правительство, очевидно, соответствует этим критериям. Пора воспользоваться этим конституционным правом, распустить правительство и провести новые выборы!"
 franch_national_assembly_untrust_possible_tt: "В течение 6 месяцев не проводилось голосование по вотуму недоверия."
 franch_national_assembly_election_button: "Объявить о выборах в законодательные органы"
 franch_national_assembly_election_button_desc: "Начинается новый тур выборов в законодательные органы. Новые депутаты войдут в Национальное собрание, чтобы трудиться на благо Франции. Конституция не запрещает членам парламента помогать своим партиям в предвыборной кампании. Так почему бы не дать им немного времени, чтобы они могли больше посвятить себя выборам?"
 franch_national_assembly_testlaw_button: "Рассмотреть законопроект"
 franch_national_assembly_testlaw_button_desc: "Согласно конституции, священнейшая обязанность Национального собрания — рассматривать предложенные правительством законы, отклонять их или принимать и претворять в жизнь. Очевидно, что правительство уже начало процедуру представления законопроекта. Учитывая срочность этого закона, мы должны настоять на том, чтобы наши депутаты работали сверхурочно, предоставляя свои мнения и утверждая его — всё ради Франции!"
 franch_national_assembly_agro_button: "Способствовать сельскохозяйственным субсидиям"
 franch_national_assembly_agro_button_desc: "Большинство в нынешнем Собрании, похоже, очень заинтересовано в защите интересов фермеров. Они утверждают, что Франция должна уделять больше внимания развитию сельского хозяйства, чем чему-либо другому. Раз так, пусть они и реализуют свои идеи."
 franch_national_assembly_help_button: "Увеличить государственный бюджет"
 franch_national_assembly_help_button_desc: "Большинство в нынешнем Собрании всегда с энтузиазмом относится к идеям улучшения жизни граждан и обеспечения социального равенства. Они считают, что Франция должна ставить права граждан выше всего остального. Эта идея очень привлекательна, пусть они и реализуют свои идеи."
 franch_national_assembly_indu_button: "Снизить рыночные ограничения"
 franch_national_assembly_indu_button_desc: "Большинство в нынешнем Собрании имеет множество мнений по поводу экономической политики. Они считают, что величие Франции должно основываться на промышленной мощи, а действующая политика недостаточно способствует свободному росту нашего рынка. Раз так, пусть они и реализуют свои идеи."
