 french_provisional_republic_2_button_tt: "Сила #V «республиканцев завтрашнего дня» (монархистов)#! будет расти на 2 в месяц."
 french_provisional_republic_republican_event_support_increase_tt: "Сила #V «республиканцев вчерашнего дня» (республиканцев)#! будет расти на 10 в месяц в течение следующих 3 месяцев."
 french_provisional_republic_monarchy_event_support_increase_tt: "Сила #V «республиканцев завтрашнего дня» (монархистов)#! будет расти на 10 в месяц в течение следующих 3 месяцев."
