 communaute_union_france_2_button_desc: "В наших африканских владениях много неосвоенных пахотных земель, а заморские провинции имеют давние традиции земледелия. Оказав небольшую поддержку и введя стимулирующую политику, мы сможем получить из Африки больше качественных природных ресурсов."
