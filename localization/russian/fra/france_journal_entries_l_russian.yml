 second_napoleon_empire_complete_event_1_tt: "#V Стабильность империи#! увеличится на 1."
 second_napoleon_empire_operation_rubicon_happen_tt: "Дом Бонапартов правит Францией."
  #
 extinction_du_pauperisme: "Искоренение нищеты"
 extinction_du_pauperisme_reason: "#B Индикатор показывает время, в течение которого существует Земельный кредитный банк и у власти находятся [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName].#!\n\nХотя #V промышленная революция#! изменила облик общества и принесла процветание городам, из-за #V нехватки сельскохозяйственных субсидий и несправедливого обращения с рабочими#! бедность по-прежнему широко распространена среди [Concept('concept_lower_strata', 'низших слоёв')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], особенно среди #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_RP')|l]#!#!, которые являются верными сторонниками правления [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName].\n\nЕщё до #B возвращения во Францию#!, находясь в изгнании в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_PP')], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] был широко популярен во Франции благодаря своим #B «социалистическим» идеям, advocating государственное вмешательство и социальную политику#!. Именно эта популярность помогла ему занять высший пост в политической жизни республики и в конечном итоге быть коронованным как #V император французов#!.\n\nС возвращением дома [GetIdeology('ideology_bonapartist').GetNameNoFlag] и укреплением имперского правления, пришло время #B выполнить данные обещания и навсегда искоренить нищету с французской земли#!."
 extinction_du_pauperisme_complete_tt: "#V Земельный кредитный банк#! существует, и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] находятся у власти не менее 5 лет."
 set_credit_foncier_de_france_button: "Создать Земельный кредитный банк"
 set_credit_foncier_de_france_button_desc: "Основная причина widespread бедности в сельской местности Франции — нехватка средств для ведения сельского хозяйства, что вынуждает крестьян брать ростовщические займы у жадных землевладельцев и попадать в долговую кабалу. Те, кто уже достаточно богат, таким образом фактически превращают свободных крестьян в крепостных, что недопустимо. Правительство профинансирует и совместно с нашими надёжными банкирами создаст государственный банк, который будет предоставлять этим нуждающимся крестьянам доступные низкопроцентные кредиты, чтобы помочь им избавиться от гнёта землевладельцев."
 set_credit_foncier_de_france_button_tt: "Мы издадим указ о создании Земельного кредитного банка."
  #
 expedition_du_mexique: "Интервенция в Мексику"
 expedition_du_mexique_reason: "Политический раскол в [SCOPE.sCountry('MEX_scope').GetAltNameNoFlag('RU_CL_PP')] и просьба о помощи со стороны консерваторов дают нам прекрасную возможность вмешаться в дела Мехико под предлогом их просроченных долгов и установить правление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в этой бывшей испанской колонии в Северной Америке. Это также может стать первым шагом для возрождения #B великих военных достижений наполеоновской эпохи#! под властью [GetIdeology('ideology_bonapartist').GetNameNoFlag] во Франции.\n\nСилы [SCOPE.sCountry('MEX_scope').GetAltNameNoFlag('RU_CL_RP')] слабы и не могут противостоять могущественным имперским  #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_DP')|l]#!#!. Давайте организуем десант и восстановим былое величие #V американской колониальной империи#! Франции!"
 expedition_du_mexique_complete_tt: "Мы выберем члена одной из европейских королевских семей на роль правителя Мексики."
  #Серия журналов «Либеральная империя»
 empire_liberal: "Либеральная империя"
 empire_liberal_reason: "Ещё будучи #B республиканским изгнанником#! в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_PP')], [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] заявлял о намерении провести либеральные реформы во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Однако его восшествие на престол в последнее время принесло не это, а, наоборот, установило в Париже более тоталитарный режим [GetLawType('law_autocracy').GetName].\n\nОднако, по мере снижения легитимности империи и продолжения правления [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], подавление парламента, цензура прессы и замалчивание голоса рабочих привели к тому, что недовольные существующим положением [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] даже начали открыто выступать на митингах против [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и империи, что, без сомнения, представляет огромную угрозу для имперского правления.\n\nПоддержание авторитарного режима не является долгосрочным решением. Для стабильной передачи власти в династии [ROOT.GetCountry.GetRuler.GetLastName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен лично провести либеральную реформу, передав власть парламенту, покончив с имперской [GetLawType('law_censorship').GetName] и [GetLawType('law_autocracy').GetName] и заменив их свободой и демократией."
 empire_liberal_complete_tt: "Завершены все [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #V «Конституционная реформа»#!."
 empire_liberal_on_complete_tt: "Будет утверждён более надёжный и стабильный конституционный строй, империя укрепится."
 empire_liberal_on_complete_2_tt: "Существующая идеология [GetIdeology('ideology_bonapartist').GetName] будет преобразована в новое течение [GetIdeology('ideology_liberal_bonapartist').GetName]."
 empire_liberal_status: "#B Покончить с нынешним авторитарным режимом [GetIdeology('ideology_bonapartist').GetName]!#!"
 empire_liberal_pluse_tt: "Продвинуть прогресс [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Либеральная империя»#! на 1."
 empire_liberal_politic: "Конституционная реформа: политическая свобода"
 empire_liberal_politic_reason: "Долгое время [GetLawType('law_monarchy').GetName] во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] опиралась на [GetLawType('law_censorship').GetName] и [GetLawType('law_autocracy').GetName] как на два столпа стабильности. Эта ситуация больше не может продолжаться.\n\nПеред лицом широкого общественного недовольства, #V политика должна быть кардинально реформирована#!, чтобы успокоить наших граждан. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен передать часть своей власти и гарантировать, что его корона будет служить обеспечению #B свободы печати и слова, а также свободы избирать и быть избранным#! для народа."
 empire_liberal_social: "Конституционная реформа: социальная свобода"
 empire_liberal_social_reason: "В прошлом #v $laborers$#! часто рассматривались правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] лишь как винтики в машине, а не как люди, обладающие правами. Пока действовал закон «[GetLawType('law_no_workers_rights').GetName]», [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] подвергались длительному подавлению, а отсутствие какой-либо защиты со стороны государства, узаконенное принципом «[GetLawType('law_no_social_security').GetName]», обрекало бесчисленные рабочие семьи на нищету в случае производственной травмы или старости.\n\nЭта ситуация не может продолжаться. Перед лицом растущих требований рабочих империя должна принять меры для #B улучшения их благосостояния и предоставления социальных гарантий#!, иначе они в любой момент могут, подобно своим предшественникам из #V Национальных мастерских#!, устроить беспорядки или даже революцию, чтобы свергнуть власть, которую олицетворяет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 empire_liberal_social_complete_tt: "Завершена [concept_journal_entry] #V «Искоренение нищеты»#!."
 empire_liberal_reform_button: "Провести конституционный референдум"
 empire_liberal_reform_button_desc: "Нуждается ли конституция империи в реформе? Этот вопрос не могут решать ни члены правительства, ни император. Его должен решить французский народ. Следует провести всенародный референдум, чтобы народ решил, нуждается ли существующий политический строй в реформе."
 empire_liberal_reform_button_tt: "Референдум по вопросу конституционной реформы ещё не проводился."
 empire_liberal_politic_button: "Легализовать право на запрос"
 empire_liberal_politic_button_desc: "Парламент является законодательным органом, однако его полномочия в настоящее время ограничены императором. Легализовав право парламента запрашивать информацию у членов кабинета и самого императора, мы можем сделать первый шаг к парламентской реформе."
 empire_liberal_politic_button_tt: "В настоящее время у парламента нет права на запрос."
 empire_liberal_social_button: "Легализовать право на забастовку"
 empire_liberal_social_button_desc: "Рабочие должны иметь право добиваться повышения заработной платы путём забастовок и переговоров с предприятиями. Однако право на забастовку в настоящее время во Франции незаконно. Давайте примем закон, легализующий право на забастовку и гарантирующий защиту правительством законных забастовочных движений."
 empire_liberal_social_button_tt: "Забастовки по-прежнему незаконны."
  #Серия журналов «Наполеоновские войны»
 napoleonic_wars: "Наполеоновские войны"
 napoleonic_wars_reason: "Прошло много времени с тех пор, как #V император Наполеон#! вёл [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] к завоеваниям по всей Европе, создавая #B величайшие в истории достижения французской нации#!. Со времён #V Венского конгресса 1815 года#!, по замыслу #B Меттерниха и других европейских держав#!, #V Франция#! была строго ограничена своими границами в Западной Европе. Нидерланды и Британия на севере, Германский союз и Пруссия на востоке, Сардинское королевство и итальянские государства на юге, Испанское королевство на западе... всё это образовало прочную цепь, некогда надёжно удерживавшую парижских пленников.\n\nОднако #V Венская система#! к настоящему времени пришла в упадок. С новым усилением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] наша [concept_army] вновь превзошла все армии континентальной Европы, наш [concept_fleet] способен противостоять #B блокаде Королевского флота#!, наша промышленность расширилась. Сегодня [ROOT.GetCountry.GetNameNoFlag] вновь занимает место ведущей мировой державы.\n\nПора восстановить славу и величие империи. Подобно тому, как Наполеон некогда властвовал в Европе, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] сядет на коня и поведёт солдат #V Великой армии#! через Рейн и Альпы, через Вислу и Пиренеи — #B пока все враги не падут, и имперский орёл вновь не воцарится на континенте.#!"
 napoleonic_wars_possible_tt: "#V Стабильность империи#! не ниже 6."
 napoleonic_wars_complete_1_tt: "Завершены все [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #V «Наполеоновские войны»#!."
 napoleonic_wars_fail_tt: "Вражеский [concept_front] достиг города [SCOPE.sState('napoleonic_wars_state').GetCityHubName]."
 napoleonic_wars_refuse_tt: "#V #B [concept_journal_entry] «Наполеоновские войны» будет удалена!#!#!"
 napoleonic_wars_status: "#V #P Восстановить Французскую империю, некогда доминировавшую в Европе#!#!"
 napoleonic_wars_jouranls_on_complete_tt: "Продвинуть прогресс [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Наполеоновские войны»#! на 1."
 event_fra_63_tt: "Мы перекроим границы в соответствии с новым балансом сил в Европе."
 event_fra_63_2_tt: "Империя распадётся, Его Величество отречётся от престола, а оккупированные европейские территории будут разделены."
 napoleonic_wars_swi_button: "Потребовать подчинения от Швейцарии"
 napoleonic_wars_swi_button_desc: "Швейцария — сердце Европы. Император некогда воспользовался Гельветической республикой и Актом посредничества, чтобы войти в Берн и контролировать страну. Подтвердив эти претензии и применив уместную военную угрозу, маршалы уверены, что империя сможет заставить Швейцарию подчиниться нашей силе."
 napoleonic_wars_swi_button_tt: "Любая [concept_army] на границе со Швейцарией имеет более #variable 200#! [Concept('concept_unit','подразделений')]."
 napoleonic_wars_on_fail_tt: "Страны антифранцузской коалиции вновь разделят наши неисконные владения в Европе."
 guerres_de_coalitions: "Антифранцузская коалиция"
 guerres_de_coalitions_reason: "#V Париж#! вновь охвачен ужасной лихорадкой [GetIdeology('ideology_bonapartist').GetName]. Французский император, облачившись в мантию #V Наполеона I#!, снова несёт Европе катастрофическую [Concept('concept_war', 'войну')].\n\nВ ходе экспансии [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] #B Германский союз под угрозой, Итальянский полуостров в панике, Испания снова ввергнута в войну, а тень нависла над Польшей и нашими границами#!. #V Новая наполеоновская война#! пришла в наше время.\n\nНастал решающий час для каждой великой нации Европы. Ради нашей #B независимости, достоинства и свободы#!, все защитники славного и древнего порядка в Европе должны отбросить былые распри и вновь объединиться под знаменем #V антифранцузской коалиции#!. #B Вместе мы непобедимы! Отправим парижских поджигателей войны обратно в тюрьму на острове Святой Елены!#!"
 guerres_de_coalitions_tt: "Вражеский [concept_front] достиг столицы [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')]."
 guerres_de_coalitions_fail_tt: "[SCOPE.sCountry('FRA_scope').GetNameNoFlag] завершила все [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #V «Наполеоновские войны»#!."
 guerres_de_coalitions_1_button: "Созвать коалицию"
 guerres_de_coalitions_1_button_desc: "Армия Наполеона снова вторглась на наши земли. Согласно союзному договору, страны антифранцузской коалиции обязаны помочь нам в борьбе с агрессией Французской империи. Немедленно телеграфируйте правительствам всех стран, созвать коалицию снова!"
 guerres_de_coalitions_1_button_possible_tt: "В течение 3 лет не созывали антифранцузскую коалицию."
 guerres_de_coalitions_1_button_possible_2_tt: "Вы находитесь в оборонительной дипломатической игре против Франции."
 napoleonic_wars_germany: "Наполеоновские войны: Завоевание Германии"
 napoleonic_wars_germany_reason: "Германия, земля, которую #V Наполеон I разгромил в 1806 году#! и объединил в #V Рейнский союз#!, сегодня снова собирается и объединяется. Под руководством [SCOPE.sCountry('PRU_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] она постепенно становится главным инструментом европейских держав для сдерживания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на западе. Для правителя это #B недопустимая тенденция#!.\n\nГерманские государства — главное препятствие на пути наших #B имперских амбиций#!. Мы должны полностью уничтожить #V Германский союз#! и доминирующие в нём страны, расширив границы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] до побережья Северного моря!"
 no_north_german_great_powers_tt: "Не существует ни одной #tooltippable_name [SCOPE.sCulture('north_german_scope').GetAdjective|l]ой#! страны с [Concept('concept_rank', 'рангом')] выше, чем [Concept('concept_major_power', 'Крупная держава')]."
 napoleonic_wars_spain: "Наполеоновские войны: Пиренейская война"
 napoleonic_wars_spain_reason: "Реакционная [SCOPE.sCountry('SPA_scope').GetNameNoFlag] со времён #V возвращения Бурбонов в 1814 году#! всегда была во власти #B реакции и упадка#!. Возвращение династии Бурбонов не принесло порядка, напротив, #B гражданская война охватила полуостров в 1836 году#!, причинив огромные страдания народу.\n\nБолее того, при поддержке коварной [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('SPA_scope').GetNameNoFlag] считает [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] заклятым врагом, противодействуя нашей колониальной экспансии в Африке, нарушая наши морские перевозки в Америку и даже активно сотрудничая со странами антифранцузской коалиции в попытке сдержать нашу экспансию.\n\n#V Незавершённое дело#! покойного императора будет завершено [ROOT.GetCountry.GetRuler.GetFirstName]. Давайте #B снова пересечём Пиренеи и ударим в самое сердце полуострова вдоль реки Эбро!#!"
 napoleonic_wars_spain_complete_tt: "Воюем с [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_TP')]."
 napoleonic_wars_spain_toledo_tt: "Наш [concept_front] достиг города [SCOPE.sState('napoleonic_wars_spain_toledo').GetCityHubName]."
 napoleonic_wars_spain_castile_tt: "Наш [concept_front] достиг города [SCOPE.sState('napoleonic_wars_spain_castile').GetCityHubName]."
 napoleonic_wars_italy: "Наполеоновские войны: Усмирение Италии"
 napoleonic_wars_italy_reason: "Италия издревле была естественной сферой влияния [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Будь то вмешательство во времена Священной Римской империи или завоевания наполеоновской эпохи, здешние государства никогда по-настоящему не выходили из-под #B контроля Парижа#!. Однако после #V Венского конгресса#!, перекроившего карту Европе, мы потеряли почти всё наше влияние в Италии: Сардиния и Обе Сицилии унаследовали наследие наполеоновской эпохи, а Папская область больше не нуждается в нашей защите.\n\n[ROOT.GetCountry.GetNameNoFlag] не может мириться с существованием у своих южных границ #V Италии#!, полной #B раздробленности, реакции и влияния [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')]#!. Подобно #V императору Наполеону#!, который в #B 1805 году вторгся на Апеннинский полуостров#! и на время объединил всю Италию, #B империя должна унаследовать это драгоценное наследие#!."
 napoleonic_wars_poland: "Наполеоновские войны: Освобождение Польши"
 napoleonic_wars_poland_reason: "Со времён #V третьего раздела Польши в 1795 году#! польский народ страдает под гнётом иностранных захватчиков. После сокрушительного поражения покойного императора при #B Лейпциге#! #V Варшавское герцогство#! прекратило своё существование, а [SCOPE.sCountry('RUS_scope').GetNameNoFlag], [SCOPE.sCountry('PRU_scope').GetNameNoFlag] и [SCOPE.sCountry('AUS_scope').GetNameNoFlag] продолжают топтать свободные земли польского народа как оккупанты.\n\n[ROOT.GetCountry.GetNameNoFlag] не забудет #B польские легионы, сражавшиеся за империю под знамёнами императора Наполеона#!. Как законный наследник славы #V «спасителя поляков»#!, которым его провозгласил сам #V Домбровский#!, империя должна продолжить эту славную традицию и #B освободить польский народ от рабства захватчиков!#!"
 finish_napoleonic_wars_poland_tt: "Завершена [concept_journal_entry] #V «Наполеоновские войны: Освобождение Польши»#!."
 napoleonic_wars_russia: "Наполеоновские войны: Уничтожение России"
 napoleonic_wars_russia_reason: "[SCOPE.sCountry('RUS_scope').GetNameNoFlag] — та самая варварская империя, которая в #V 1812 году#! спаслась от #V пожара Москвы#! благодаря снегу и выжженной земле. Со времён поражения императора Наполеона она всегда считала себя #B «жандармом Европы»#!, постоянно вмешиваясь в не касающиеся её европейские дела и #B поддерживая реакционный старый порядок#!.\n\nПод знаменем так называемого #V «Священного союза»#! жадный и бесстыдный царь неоднократно использовал своих хвалёных #B «серых скотов»#! для подавления свободных народов Европы и выступал в авангарде #V антифранцузской коалиции#!, стремясь сдержать [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')].\n\nЧтобы империя добилась успеха, она должна #B превзойти в Москве достижения покойного императора#!. Ведя нашу [concept_army], подобно тому, как #B император Наполеон вёл Великую армию в восточный поход, мы должны окончательно сокрушить авторитет [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]#!."
 napoleonic_wars_russia_complete_tt: "Воюем с [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')]."
 napoleonic_wars_russia_moscow_tt: "Наш [concept_front] достиг города [SCOPE.sState('napoleonic_wars_russia_moscow').GetCityHubName]."
 napoleonic_wars_russia_petersburg_tt: "Наш [concept_front] достиг города [SCOPE.sState('napoleonic_wars_russia_petersburg').GetCityHubName]."
 napoleonic_wars_russia_tsaritsyn_tt: "Наш [concept_front] достиг города [SCOPE.sState('napoleonic_wars_russia_tsaritsyn').GetCityHubName]."
 nap_sign_peace_treaty_with_rus_tt: "#P #B Мы немедленно получим оккупированные территории в Восточной Европе и создадим там 3 марионеточных государства.#!#!"
 napoleonic_wars_austria: "Наполеоновские войны: Разгром Австрии"
 napoleonic_wars_austria_reason: "В эпоху #V Наполеоновских войн#! [SCOPE.sCountry('AUS_scope').GetNameNoFlag] была самым упорным и коварным врагом империи. Будь то при #V Маренго, Аустерлице#! или #V Ваграме#!, армии покойного императора снова и снова громили их, но так и не смогли окончательно искоренить эту #b габсбургскую заразу#!, притаившуюся на Дунае.\n\nОднако #V Венский конгресс#! давно стал историей, и та могущественная империя, что некогда стояла на пути #V Великой армии#!, ослабела. Пришло время пересечь Альпы и Дунай, превзойти достижения покойного императора и #B водрузить имперского орла над дворцом Шёнбрунн!#!"
 napoleonic_wars_egypt: "Наполеоновские войны: Египетская экспедиция"
 napoleonic_wars_egypt_reason: "#V Египет#! всегда имел особое значение для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Ещё до #V основания империи, в 1798 году#!, покойный император возглавил экспедиционный корпус, который разгромил мамелюков, вошёл в Каир и дошёл до Суэца, собрав в пирамидах множество ценных археологических материалов. Хотя из-за блокады [Concept('concept_fleet', 'флотом')] [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] ему пришлось отступить, он оставил французской нации богатое наследие.\n\nСегодня же, с упадком [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], эта #B ключевая территория, соединяющая Средиземное море с Индийским океаном#!, вновь оказалась в вакууме власти. Если мы сможем победить султанат, оставленный #V Мухаммедом Али#!, #B Египет станет новым и самым ценным заморским владением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].#!"
  #Правительство национальной обороны/Третья республика
 gouvernement_de_la_defense: "Правительство национальной обороны"
 gouvernement_de_la_defense_reason: "[ROOT.GetCountry.GetNameNoFlag] в кризисе: поражение в [Concept('concept_war', 'войне')] заставило императора отречься от короны. #V Династия Бонапартов#! и [GetLawType('law_monarchy').GetName] пали, и в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] на время воцарился политический вакуум. Однако [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] и  [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] создали временное правительство, которое #B от имени республики взяло на себя всю полноту власти в стране#!.\n\nНо #V Правительство национальной обороны#! непрочно держится. С одной стороны, мы должны #B организовать армию#! для защиты территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], с другой — столкнуться с #B растущим недовольством рабочего класса#!. [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] #v полон революционного духа#!. #N Парижская коммуна#!, возглавляемая #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetCustom('RU_IG_TP')|l]#!#! и поддерживаемая так называемой Национальной гвардией, уже подняла восстание и захватила [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. #V Правительство национальной обороны#! под руководством [ROOT.GetCountry.GetRuler.GetFirstName] было вынуждено переехать в #V Версаль#!.\n\n#B Республика в опасности. Сможет ли тот самый юный, пылкий, гордый, щедрый и искренний дух #V эпохи Великой революции#! вернуться и привести [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] к её предназначению?#!"
 gouvernement_de_la_defense_complete_tt: "Восстание #V Парижской коммуны#! успешно подавлено."
 troisieme_republique: "Третья республика"
 troisieme_republique_reason: "#V Третья республика#! — это третья попытка [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] установить республиканский строй со времён #V Великой революции 1789 года#!. Республика была создана на #V крови Парижской коммуны#! и #V позоре краха империи#!. #B В ней нет ни энтузиазма и щедрости Великой революции, ни романтизма и гордости Весны народов#!. Тем не менее, это стабильный режим, созданный в результате компромисса между различными [Concept('concept_interest_group', 'заинтересованными группами')] в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] ради защиты отечества.\n\n[GetIdeology('ideology_bonapartist').GetName] окончательно пал, и в нашей республике доминируют [GetIdeology('ideology_revolutionism').GetName] и [GetIdeology('ideology_opportunistes').GetName]. Раскол в [Concept('concept_ideology', 'идеологиях')] по-прежнему влияет на политику республики, приводя к острым внутренним конфликтам, за исключением случаев внешней угрозы. #B Республика пришла слишком поздно и была слишком несовершенной#!. У неё не было сил свергнуть реакцию, но она должна была противостоять вызовам радикальных идей. Ей были дарованы идеалы #V «Свободы, равенства, братства»#!, но она могла лишь искать свой путь в расколе, обиде и недоверии.\n\n#B Но, несмотря на будущее, история [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] снова будет твориться под именем «Республики», Декларация прав человека снова станет конституцией, и на этот раз республиканский строй будет вечным:#! #variable Свобода, ведущая народ!#!"
 troisieme_republique_status: "#B #U [GetLawType('law_parliamentary_republic').GetName] была укреплена#!#!"
 troisieme_republique_fail_tt: "Вражеский [concept_front] достиг города [SCOPE.sState('troisieme_republique_state').GetCityHubName]."
  #Журнал Антанты
 entente_cordiale: "Антанта"
 entente_cordiale_reason: "Противостояние [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] с державой по ту сторону Ла-Манша началось ещё во время #b #u Столетней войны#!#!, и вплоть до #B битвы при Ватерлоо в 1815 году#! наши страны оставались врагами. Однако теперь, на фоне #V грозной и вполне реальной угрозы, которую несёт подъём #tooltippable_name [SCOPE.sCountry('GER_scope').GetAdjective|l]ой#! державы#!, даже народы, враждовавшие веками, вынуждены #B забыть былую неприязнь#! и встать плечом к плечу.\n\nВласти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] должны заново оценить наше положение в Европе: одиночество уже #V не способно гарантировать безопасность страны и сохранение нашей мировой империи#!. Ради #B защиты национальных интересов и будущего нашей цивилизации#! наши государства достигли взаимопонимания. Этот союз убережёт [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] от любой системы союзов, которую [SCOPE.sCountry('GER_scope').GetName] может создать в Западной Европе, поможет совместно отстаивать свободу мировых морских путей и #B не позволит ни одной новой великой державе угрожать нашим колониям#!.\n\n#B Наши народы — величайшие в мире, наши государства — величайшие на земле; наши свершения направляли ход человеческой истории, а наша цивилизация открыла эту эпоху. #V Пока наши страны действуют сообща, мы способны одолеть любого врага в мире!#!#!"
 entente_cordiale_status: "#B #P Общие стратегические интересы заставили нас пожать друг другу руки#!#!"
 entente_cordiale_event_tt: "Мы откажемся подписывать соглашение, что приведёт к провалу [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Антанта»#!."
 entente_cordiale_event_2_tt: "Наша страна примет соглашение, активировав [concept_journal_entry] #V «Антанта»#!."
 entente_cordiale_fail_tt: "Любая из сторон соглашения объявила о выходе."
 entente_cordiale_possible_tt: "Существует единая Германия."
 entente_cordiale_possible_2_tt: "Наша страна приняла Сердечное согласие."
 entente_cordiale_1_button: "Запросить военную помощь у Великобритании"
 entente_cordiale_1_button_desc: "Согласно соглашению, между нами и Великобританией будет поддерживаться долгосрочный военный союз, но это не обязательно означает, что другая сторона должна участвовать в каждой нашей войне. Однако, благодаря этой прочной связи, мы можем предложить Лондону оказать нам посильную помощь в боевых действиях."
 entente_cordiale_1_button_possible_tt: "В течение 5 лет не запрашивали помощь."
 entente_cordiale_2_button: "Запросить военную помощь у Франции"
 entente_cordiale_2_button_desc: "Согласно соглашению, между нами и Францией будет поддерживаться долгосрочный военный союз, но это не обязательно означает, что другая сторона должна участвовать в каждой нашей войне. Однако, благодаря этой прочной связи, мы можем предложить Парижу оказать нам посильную помощь в боевых действиях."
 entente_cordiale_3_button: "Продлить военный союз"
 entente_cordiale_3_button_desc: "Из соображений стратегических интересов наш формальный союзный договор ранее был временно заморожен. Однако с изменением обстановки необходимо вновь подтвердить военные обязательства, предусмотренные Сердечным согласием, и потребовать от другой стороны выполнения союзнического договора."
 entente_cordiale_3_button_possible_tt: "В течение 10 лет не продлевали договор."
 entente_cordiale_4_button: "Выйти из Сердечного согласия"
 entente_cordiale_4_button_desc: "Наш союз со страной за проливом исчерпал себя. Пора уведомить их о прекращении нашего военного соглашения."
 entente_cordiale_4_button_possible_tt: "Сердечное согласие всё ещё в силе: ни одна из сторон не вышла из него."
 entente_cordiale_4_button_effect_tt: "Мы выйдем из Сердечного согласия, навсегда удалив [concept_journal_entry] #V «Антанта»#! для обеих сторон!"
 guide_event_tt: "Завершить руководство."
 aus_not_exists_tt: "#B Великогерманский путь#! осуществлён"
 zweibund_exists_tt: "#B Германо-австрийский союз#! уже заключён"
  #Французское шампанское
 france_company_cgv_character: "Винодельческая промышленность"
 france_company_cgv_character_reason: "#V Со времён завоевания Галлии римлянами#! на землях [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] никогда не прекращалось производство @wine!#V вина#!. Хотя во время #B Французской революции#! виноградники Шампани на севере и в центре страны сильно пострадали, @wine!винодельческая промышленность в южных провинциях, таких как Бордо, продолжала процветать. После #V изобретения шаптализации графом Шапталем в 1807 году#! она возродилась и снова завоевала мировой рынок.\n\nВо [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] @wine!#V вино#! — это не просто товар: #B это традиция, ремесло, символ статуса, а также верность стране и память о земле#!. #V «Французское @wine!шампанское»#! — это бренд, который не нуждается в переводе и вызывает уважение и восхищение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] во всём мире.\n\nС процветанием страны и развитием технологий винодельческая промышленность [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] постепенно перестала быть просто отраслью сельского хозяйства и превратилась в #B общенациональную промышленную систему#!. Она зависит как от солнца и дождей в деревнях, так и тесно связана с [Concept('concept_government', 'правительством')], [Concept('concept_company', 'компаниями')] и внешней политикой [Concept('concept_country', 'страны')]. #B Если получить больше государственной поддержки, @wine!#V вино#! вполне может стать синонимом экспортной репутации и мягкой силы Франции.#!."
  #Индустриализация и освоение
 north_coast_industrialize: "Индустриализация Севера"
 north_coast_industrialize_reason: "#variable Северное побережье Франции#! со времён #bold средневековых гильдий#! было центром торговли и ремёсел [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. #bold Кале#! и #bold Дюнкерк#! контролируют пролив, процветает текстильная промышленность #bold Лилля-Рубе-Туркуэна#!, а удобный пролив Ла-Манш связывает этот регион с мировым рынком.\n\nОднако #bold этого недостаточно#!. В эпоху, когда все великие [concept_great_power] соревнуются в индустриализации, #variable север Франции#! всё ещё недостаточно процветает, чтобы полностью раскрыть потенциал равнин и побережья. Мы должны перестроить здешние порты и города, заменив старые здания стальными каркасами, чтобы ветер пролива вращал колёса, а огонь угольных пластов зажигал печи, превратив #variable север Франции#! в мощное #bold промышленное сердце#! великого тела [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 north_coast_industrialize_status: "Превратить северное побережье Франции в главный промышленный регион."
 rhone_industrialize: "Возрождение Лиона"
 rhone_industrialize_reason: "#variable Лион#! расположен на #B слиянии рек Роны и Соны#!. Слияние двух рек способствовало процветанию торговли, и со времён Средневековья этот город носит звание #bold шёлковой столицы#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Во время #V Столетней войны#! он даже на время стал столицей короля в изгнании.\n\nДолгое время он был #B самым процветающим городом Окситании#!, однако с ростом средиземноморских портов статус #V Лиона#! пошатнулся, и он даже начал приходить в упадок. Правительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] решило выделить ресурсы на восстановление былого величия Лиона, #B реконструировать старинные каналы, расширить доки и железнодорожную сеть#!, чтобы в конечном итоге #B возродить город #V Лион#! и превратить его в самую яркую жемчужину юга [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!."
 rhone_industrialize_status: "Восстановить Лион как городской центр на юге."
 settled_in_algiers: "Заселение Алжира"
 settled_in_algiers_reason: "#variable Провинции Алжира#! уже вошли в состав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако, по сути они до сих пор остаются лишь #B далёким форпостом империи, временной военно-административной колонией#!, а не такой же #tooltippable_name #tooltip:[SCOPE.sCulture('french_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('french_culture').GetCustom('RU_CUL_ADJ')|l]ой#!#! территорией, как метрополия.\nЗдесь нет подлинно #tooltippable_name #tooltip:[SCOPE.sCulture('french_culture').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('french_culture').GetCustom('RU_CUL_ADJ')|l]ой#!#! цивилизации и [Concept('concept_government', 'правительства')].\n\nБолее того, здешние #B улицы, порты и административные здания требуют полной перестройки#!. Нам нужно укоренить на этой земле #bold промышленную цивилизацию Франции#!, #bold её судебную и административную системы#!, #bold образовательную систему#! и всю [Concept('concept_culture', 'культуру')] в целом. И, что ещё важнее, поощрять [Concept('concept_migration', 'миграцию')] из метрополии.\n\nТолько полностью искоренив здешнее сопротивление и традиции, #variable Алжир#! сможет перестать быть далёкой заморской территорией и #G стать естественным продолжением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на африканском континенте#!."
 settled_in_algiers_status: "#G #B Алжир должен стать естественным продолжением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Африке#!#!"
