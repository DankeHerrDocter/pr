  #Завоевание Алжира
 fra_conqueror_alg: "Завоевание Алжира"
 fra_conqueror_alg_reason: "Побережье Алжира некогда принадлежало могущественной [SCOPE.sCountry('TUR_scope').GetNameNoFlag], однако этот союзник былых времён давно ослаб и утратил контроль над этими землями.\n\nВ 1827 году так называемый #bold «инцидент с веером»#! привёл к тому, что #bold династия Бурбонов#! установила военную блокаду #bold алжирского действа#!. Три года спустя наши войска высадились на побережье Алжира и в битве при Стауэли нанесли сокрушительное поражение армии #bold дея Хусейна#!. Старое действо пало вместе с ним, но образовавшуюся пустоту быстро заполнили оппортунисты и честолюбцы.\n\nНаше завоевание ещё не завершено. Мы не остановимся, пока флаг [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] не будет реять над каждой деревней Алжира, а все мятежники не падут в песках.\n\n#variable Да здравствует [ROOT.GetCountry.GetNameNoFlag]!#!"
 fra_conqueror_alg_complete_tt: "Победа в Алжире откроет нам совершенно новую возможность для расширения границ в Африке!"
 fra_conqueror_alg_status: "#P #B Завершить завоевание Алжира, чтобы продолжить продвижение в Африку#!#!"
  #Поход на Тёмный континент
 fra_aferican_empire: "Поход на Тёмный континент"
 fra_aferican_empire_reason: "Прошло много времени с тех пор, как [ROOT.GetCountry.GetNameNoFlag] в последний раз создавала огромную #bold колониальную империю#!. От Квебека до Гаити, эти земли, некогда принадлежавшие #variable Французской империи#!, стали историей, и лишь немногие оставшиеся территории напоминают о былом величии.\n\nОднако имперская мечта [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] не была сломлена прошлыми неудачами. Победа в #bold Алжире#! дала нам выгодный плацдарм для дальнейшей экспансии в Северной Африке. Наши торговые посты на побережье #bold Сенегала#! и #bold Гамбии#! также могут стать опорными пунктами для дальнейшего продвижения в #bold Западную Африку#!. С развитием медицины, возможно, мы сможем расширить границы империи до #bold диких экваториальных внутренних районов#! и превратить их в #bold цивилизованный рай#! для французов.\n\nВ то же время, наш давний враг, [SCOPE.sCountry('GBR_scope').GetNameNoFlag], в отличие от былого соперничества в Америке и Индии, теперь не возражает против нашей экспансии в Африке. Это создаёт для наших завоеваний мирные условия, свободные от серьёзных дипломатических рисков.\n\nХотя путь долог, правитель [ROOT.GetCountry.GetRuler.GetFirstName] твёрдо верит: от равнин Алжира до саванн Конго, от Гвинейского залива до озера Чад, однажды флаг [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] будет реять над обширными территориями Тёмного континента. #variable Да здравствует [ROOT.GetCountry.GetNameNoFlag]!#!"
 fra_aferican_empire_complete_tt: "Завершено 9 [Concept('concept_journal_entry', 'Записей в дневнике')] из серии #bold «Тёмный континент»#!."
 fra_conqueror_alg_complete_2_tt: "Обеспечение господства на африканском континенте поможет нам создать более надёжную систему управления."
 fra_north_aferica_province_button_tt: "Любая [concept_state] #bold во Французской Северной Африке#! не является [concept_incorporated_state]."
 fra_west_aferica_province_button_tt: "Любая [concept_state] #bold во Французской Западной Африке#! не является [concept_incorporated_state]."
 fra_mid_aferica_province_button_tt: "Любая [concept_state] #bold во Французской Южной Африке#! не является [concept_incorporated_state]."
 fra_conqueror_aferica_colony_button_possible: "Это действие не выполнялось в течение 30 месяцев."
 fra_aferican_empire_status: "#V #O #B Создать вечную и великую империю в Африке.#!#!#!"
  #Иностранный легион
 fra_foreign_legion: "Французский Иностранный легион"
 fra_foreign_legion_reason: "Если мы хотим #bold править Африкой#!, нам определённо нужно установить на континенте #variable постоянное военное присутствие#!.\n\nАрмию там можно набирать только из местных жителей и храбрых или отчаявшихся иностранных солдат. Тем не менее, новый легион, созданный по образцу древних наёмных войск, но включённый в состав регулярной армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], может оказать нам помощь во многих местах. Кроме того, #bold Иностранный легион#! позволит солдатам, отслужившим в нём, получить наше гражданство, что будет мотивировать их сражаться храбро."
  #Завоевание Туниса
 fra_conqueror_tun: "Тёмный континент: Завоевание Туниса"
 fra_conqueror_tun_reason: "Одной из причин Французской революции был #bold великий голод накануне революции#!. Пахотных земель во [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] крайне мало, и для обеспечения индустриализации нам нужны заморские территории, которые будут снабжать нашу страну достаточным количеством продовольствия.\n\nРанее, с упадком [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_RP')], они постепенно утратили своё влияние в Северной Африке. Защита этих земель султаном [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] — просто смехотворна. Наша #bold война в Алжире#! уже принесла частичные победы, и вся Северная Африка является нашим плацдармом. Тунис уже в наших руках.\n\nЭта плодородная земля, дающая три урожая в год, манит нас, как сокровища в пиратском логове. Тунисский султан к тому же задолжал нам крупную сумму, что можно использовать как предлог для нападения и стереть слово #bold «берберские пираты»#! с лица истории."
  #Завоевание Марокко
 fra_conqueror_mor: "Тёмный континент: Защита Марокко"
 fra_conqueror_mor_reason: "Несколько веков назад ужасные #bold берберы#! и #bold марокканцы#! вторглись в Иберию через #bold Гибралтарский пролив#!, основали #bold Андалусский султанат#! и дошли до самого #bold Бордо#!, едва не уничтожив весь христианский мир. Теперь времена изменились, и отсталость исламского мира — неоспоримый факт. Однако мы вынуждены наблюдать, как [SCOPE.sCountry('GBR_scope').GetNameNoFlag] контролирует всё Средиземноморье из Гибралтара.\n\nОчевидно, что #bold Марокко#! — наша главная цель для получения #bold конкурентного преимущества#! над британцами. #bold Плодородные земли Марокко и торговые прибыли#!, которые они сулят, неустанно влекут нас. Пришло время для мести! Пора завоевать эту землю, которая когда-то принесла христианам столько страданий."
  #Пересечение Сахары
 fra_conqueror_sahara: "Тёмный континент: Пересечение Сахары"
 fra_conqueror_sahara_reason: "#bold Пустыня Сахара#! полна бесполезных песков, но она по-прежнему является #bold сухопутным мостом#!, связывающим нашу Западную и Северную Африку. Племена Сахары слабы и немногочисленны. Если мы сможем преодолеть суровые условия, наши солдаты легко подчинят эту огромную территорию."
 fra_conqueror_sahara_button: "Продвигать экспедицию в Сахару"
 fra_conqueror_sahara_button_desc: "Суровые условия пустыни Сахара отпугивают многих исследователей и солдат. Однако, если мы предложим больше денег и снаряжения, возможно, мы сможем привлечь по-настоящему выдающихся исследователей, которые помогут нам расширить наши владения."
 fra_conqueror_sahara_complete_tt: "Завершена [concept_journal_entry] #bold «Тёмный континент: Завоевание Туниса»#!."
 fra_conqueror_sahara_status: "Расширить наши владения в пустыне для создания единой провинции в Северной Африке."
  #Заморская провинция Французская Северная Африка
 fra_north_aferica_province: "Заморская провинция Французская Северная Африка"
 fra_north_aferica_province_reason: "Индикатор показывает количество провинций, уже преобразованных в [concept_incorporated_state].\n\nБлагодаря усилиям нашей армии, Северная Африка в основном находится под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Поскольку эти земли отделены от нашей метрополии лишь Средиземным морем, многие предлагают превратить их в заморские провинции, подчиняющиеся парижскому правительству. Однако многолетние войны в регионе вызвали у местного населения сильную враждебность к нам. Поэтому мы вынуждены прибегнуть к другому методу — [Concept('concept_migration', 'миграции')], чтобы решить проблему неприятия здесь основной [Concept('concept_primary_cultures', 'культуры')] Франции.\n\nОрганизация и сопровождение [concept_government] отечественных [concept_pop] для освоения и обработки земель здесь — лучший выход. Всего через несколько десятилетий, а то и лет, мы сможем полностью контролировать эту ценную территорию, даже не сталкиваясь со сложными проблемами национальных и колониальных восстаний. Здесь больше не будет алжирцев, берберов или тунисцев — только французы Гоби!"
 fra_north_aferica_province_complete: "Завершить полную интеграцию Французской Северной Африки в качестве провинции."
 fra_aferica_province_on_complete: "Это станет твёрдым шагом на пути к интеграции Африки."
 fra_north_aferica_province_button: "Интегрировать колонии Северной Африки"
 fra_north_aferica_province_button_desc: "Земли Северной Африки ранее были отнесены к категории колоний. Существует мнение, что их интеграция в состав метрополии будет более выгодной, однако это вызовет резкое противодействие со стороны националистов в нашей стране."
 fra_aferica_province_button_tt: "Это действие не предпринималось в течение 3 месяцев."
  #Завоевание Западной Африки
 fra_conqueror_westaferica: "Тёмный континент: Покорение Западной Африки"
 fra_conqueror_westaferica_reason: "В исламском мире издавна ходит легенда о паломниках из Мали, которые по пути в Мекку разбрасывали горсти #bold золота и драгоценных камней#!, а их одежда и сбруя коней были сделаны из чистого золота.\n\nХотя мы не можем рассчитывать на правдивость легенд, в Западной Африке определённо есть большие запасы #bold золота и плодородных земель#!. Эти ценности, конечно, должны принадлежать только [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] и её народу.\n\nКроме того, побережье Западной Африки является важным узлом атлантической торговли. Это позволит нам значительно сократить расстояние до других богатых регионов, усилить наше влияние в мире и получить более выгодные торговые преимущества. Местные территории, как говорят, имеют хорошие условия для плантаций. Возможно, мы сможем превратить их в важную #bold сырьевую базу#! для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Эту идею поддерживают многие [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]."
 fra_conqueror_westaferica_button: "Продвигать экспансию в Западной Африке"
 fra_conqueror_westaferica_button_desc: "Набирать солдат для завоевания земель с таким климатом, как в Западной Африке, непросто. Однако, если не жалеть денег, всегда найдутся желающие."
  #Завоевание Мавритании
 fra_conqueror_mauritania: "Тёмный континент: Завоевание Мавритании"
 fra_conqueror_mauritania_reason: "#bold Мавритания#! для нашего правительства не является богатой территорией. Там проживает немногочисленное население #bold берберов и коренных африканцев#!. Хотя земля здесь бедна, а климат засушлив, малочисленность населения облегчает её захват армией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nОднако геологи утверждают, что под этой пустынной землёй скрыты большие запасы полезных ископаемых. Хотя это звучит не очень правдоподобно, мы можем захватить эту территорию, пока британцы ещё не продвинулись вглубь от побережья, и использовать её как #bold плацдарм для дальнейшего продвижения в Африку#!.\n\nМавритания принадлежит [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]!"
 fra_conqueror_niger_complete_tt: "Завершена [concept_journal_entry] #bold «Тёмный континент: Покорение Западной Африки»#!."
 fra_conqueror_mauritania_button: "Продвигать колонизацию Мавритании"
 fra_conqueror_mauritania_button_desc: "Мавритания включает в себя огромную пустыню, которую трудно колонизировать. Возможно, дополнительные вложения помогут."
 fra_conqueror_mauritania_status: "Завоевать Мавританию для продолжения колонизации Нигера."
 #Завоевание Нигера
 fra_conqueror_niger: "Тёмный континент: Поход на Нигер"
 fra_conqueror_niger_reason: "Победы в Западной Африке и Мавритании открывают перед нами новую возможность — #bold возможность проникнуть вглубь африканского континента#!. Власть некогда могущественных #bold империй Мали#! и #bold Сонгай#! давно рухнула, а слухи о #bold алмазах#! во внутренних районах, а также о #bold каучуке и полезных ископаемых#! представляют собой огромные сокровища, лежащие у ног [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nНесколько веков назад Колумб, открыв Новый Свет, принёс [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_DP')] несметные богатства, и теперь перед нами открывается новая возможность. Хотя распространение малярии и суровый климат создадут много проблем для наших храбрых солдат и умных граждан, мы не можем игнорировать этот вход в сокровищницу. Давайте немедленно пересечём пустыню, преграждающую нам путь, и двинемся на Нигер.\n\nВсе тамошние племена должны подчиниться нам, все богатства — принадлежать нам, все земли — стать нашими. Да здравствует [ROOT.GetCountry.GetNameNoFlag]!"
 fra_conqueror_niger_button: "Продвигать экспедицию в Нигер"
 fra_conqueror_niger_button_desc: "Мучительный рельеф Сахеля во внутренних районах Нигера отбил у многих исследователей желание туда отправляться. Однако, если мы предложим больше средств, всегда найдутся смельчаки."
 fra_conqueror_niger_status: "Завершить завоевание Нигера для создания единой провинции в Западной Африке."
  #Заморская провинция Французская Западная Африка
 fra_west_aferica_province: "Заморская провинция Французская Западная Африка"
 fra_west_aferica_province_reason: "Индикатор показывает количество провинций, уже преобразованных в [concept_incorporated_state].\n\nЗападная Африка — это почти #bold изолированный#! исламский мир. Здесь довольно многочисленное [concept_pop], и она далеко от нашей метрополии, что, кажется, не подходит для политики [Concept('concept_migration', 'миграции')] в стиле Северной Африки для ассимиляции.\n\nНо ослабление местных религиозных представлений даёт нам новую возможность: национальное самосознание этих туземцев очень слабо. При правильном образовании и влиянии мы сможем провести [concept_assimilation] большого числа темнокожих «французов». Используя этих людей, которые духовно стали частью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], мы можем легко превратить эту колонию в настоящую заморскую провинцию, решив проблемы нехватки [concept_pop] и [Concept('concept_working_adults', 'рабочей силы')]."
 fra_west_aferica_province_complete: "Завершить полную интеграцию Французской Западной Африки в качестве провинции."
 fra_west_aferica_province_button: "Интегрировать колонии Западной Африки"
 fra_saferica_province_button_tt: "Это действие не предпринималось в течение 3 месяцев."
 fra_west_aferica_province_button_desc: "Земли Западной Африки ранее были отнесены к категории колоний. Существует мнение, что их интеграция в состав метрополии будет более выгодной, однако это вызовет резкое противодействие со стороны националистов в нашей стране."
  #Завоевание Чада
 fra_conqueror_chad: "Тёмный континент: Захват Чада"
 fra_conqueror_chad_reason: "Чад — #bold важная точка противоречий#! на нашей границе с [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')] в Африке. Он контролирует основные узлы #bold транссахарской торговли#!. Хотя большая часть его территории — пустыня, здесь есть и немало пригодных для земледелия земель. Наши [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] утверждают, что здесь можно создать крупную #bold базу по выращиванию хлопка#!.\n\nНезависимо от того, верны ли эти предположения, захват этой территории действительно принесёт большую стратегическую пользу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] в Африке. Давайте же двинемся вперёд и завоюем её."
 fra_conqueror_chad_status: "Завершить завоевание Чада для создания единой провинции в Центральной Африке."
  #Завоевание Камеруна
 fra_conqueror_cameroon: "Тёмный континент: Завоевание Камеруна"
 fra_conqueror_cameroon_reason: "#bold Камерун#! занимает одно из важнейших положений на побережье Западной Африки. Отсюда можно двигаться на север, в Нигерию, на юг — в Конго, а на востоке лежит пустыня Чад.\n\nБлизость к #bold Гвинейскому заливу#! обеспечивает здесь хороший климат и облегчает переброску наших сил. Однако, поскольку ещё со времён #bold треугольной торговли#! многие европейские страны основали здесь множество колоний и торговых постов, такие страны, как [SCOPE.sCountry('SPA_scope').GetNameNoFlag] и [SCOPE.sCountry('GBR_scope').GetNameNoFlag], являются нашими сильными соперниками за контроль над этим регионом.\n\nВ интересах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] мы должны захватить эти земли."
 fra_conqueror_cameroon_status: "Завершить завоевание Камеруна для продолжения колонизации Чада."
 fra_conqueror_cameroon_button: "Продвигать колонизацию Центральной Африки"
 fra_conqueror_cameroon_button_desc: "Дожди и малярия в Центральной Африке — главные препятствия для нашей колониальной экспансии. Однако мы можем нанять несколько хороших врачей за высокую плату, чтобы они отправились туда и обеспечили здоровье наших солдат."
  #Высадка на Мадагаскаре
 fra_conqueror_madagascar: "Тёмный континент: Высадка на Мадагаскаре"
 fra_conqueror_madagascar_reason: "#bold Королевство Мерина#! на острове Мадагаскар всегда было предметом спора между нами и [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')]. На этом огромном острове есть как высокогорья, так и саванны, а тропические леса обеспечивают местные нужды в древесине.\n\nЧто ещё важнее, он расположен на пути между Индийским и Атлантическим океанами. Если мы сможем контролировать этот остров, это обеспечит [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] #bold надёжную опору#! для защиты её интересов в Восточной Африке."
  #Заморская провинция Французская Экваториальная Африка
 fra_mid_aferica_province: "Заморская провинция Французская Экваториальная Африка"
 fra_mid_aferica_province_reason: "Индикатор показывает количество провинций, уже преобразованных в [concept_incorporated_state].\n\nЭто самый первобытный, религиозно сложный и отсталый регион Африки. Возможно, нам понадобятся «особые» методы для его контроля: переселение сюда [concept_pop] из метрополии и части #bold «французов Гоби»#! из Алжира. Это нужно не только для #bold балансировки#! местных религиозных и этнических проблем, но и является оптимальным решением в условиях, когда Центральная Африка полна племён. У нас нет ни времени, ни средств, ни затрат на содержание здесь большой армии, поэтому мы можем лишь перенять опыт британцев в управлении их колониями: #bold проникнуть в среду этих туземцев, раздробить их на части и править по принципу „разделяй и властвуй“#!.\n\nОднако это лишь временная мера. Когда-нибудь местное население по-настоящему примет Францию, и тогда настанет день полной [concept_assimilation]."
 fra_mid_aferica_province_complete: "Завершить полную интеграцию Французской Экваториальной Африки в качестве провинции."
 fra_mid_aferica_province_button: "Интегрировать колонии Центральной Африки"
 fra_mid_aferica_province_button_desc: "Земли Центральной Африки ранее были отнесены к категории колоний. Существует мнение, что их интеграция в состав метрополии будет более выгодной, однако это вызовет резкое противодействие со стороны националистов в нашей стране."
  #Поход на Вьетнам
 fra_conqueror_indochina: "Вмешательство в Индокитай"
 fra_conqueror_indochina_reason: "Таинственная завеса Азии уже давно приоткрыта перед нами. [SCOPE.sCountry('GBR_scope').GetNameNoFlag], возможно, была первой, кто попытался её приподнять, но далеко не последним. Хотя мы не можем, подобно англичанам, напрямую требовать коммерческих выгод, приобретение некоторых колоний в Индокитае — неплохой вариант.\n\nМы не можем полагаться только на ресурсы и торговлю Африки, это, несомненно, опасно для интересов нашей страны. В то же время, в отличие от Африки, о тропических рисовых полях Юго-Восточной Азии и о торговле драгоценными предметами роскоши с Дальним Востоком в Европе известно уже давно. Огромные прибыли и слабость [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] открывают перед нами новые возможности. Здесь очень влажно и жарко, а ужасная малярия встречается редко. Нам даже не нужно создавать обширные [Concept('concept_colony', 'колонии')], достаточно нанять местных жителей для работы на плантациях.\n\nВ прошлом мы были вытеснены из борьбы за Индию, но на этот раз в #bold Индокитае#! этого не повторится. Да здравствует [ROOT.GetCountry.GetNameNoFlag]!"
  #Французский Союз
 communaute_union_france: "Французский Союз"
 communaute_union_france_reason: "Индикатор показывает текущие #bold сепаратистские настроения#! в #bold африканских владениях#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nВ результате наших #bold многолетних завоеваний в Африке#! и #bold постоянного укрепления власти центрального [Concept('concept_government', 'правительства')]#! многие африканские #variable заморские провинции#! получили различную степень автономии. Под нашим руководством их мышление стало цивилизованным и просвещённым, а жизнь — лёгкой и зажиточной.\n\nОднако, #bold побочным эффектом повышения их уровня образования#! стало то, что многие злонамеренные #bold сепаратисты#! под знаменем национализма заявляют о желании отделиться от нашего милостивого правления, что просто немыслимо! Если бы не мы, принесшие этим туземцам философию и литературу, науку и правительство, эти неблагодарные люди даже не знали бы, что такое нация. Тем не менее, рост националистических настроений в заморских провинциях действительно #bold заслуживает внимания парижского правительства#!. Неудачный опыт [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] показывает нам, что тратить огромные силы и время на военное подавление этих туземцев — #bold не лучший долгосрочный путь#!. Мы должны созвать их представителей в парижский парламент, предоставить им #bold щедрые места депутатов#! и даже дать каждому потомку, проживающему в заморских провинциях, #bold гражданство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!, чтобы они получили равный статус с гражданами метрополии.\n\n#bold Франция должна быть единой под одним знаменем#!. Пора открыто признать это. Мы станем нерушимым союзом, и [ROOT.GetCountry.GetNameNoFlag] никогда не распадётся!"
