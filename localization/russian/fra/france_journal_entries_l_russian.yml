 defensive_line_in_alsace_lorraine: "Строительство линии обороны в Эльзас-Лотарингии"
 defensive_line_in_alsace_lorraine_reason: "Военная угроза со стороны [SCOPE.sCountry('french_enemy_scope').GetAltNameNoFlag('RU_CL_RP')] землям [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] всегда была крайне серьёзной проблемой. Однако недавние [Concept('concept_war', 'войны')] убедительно доказали эффективность грамотно выстроенных укреплений. Наш военный министр [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.GetFullName] [SelectLocalization(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.IsFemale, 'предложила', 'предложил')] профинансировать строительство протяжённой #V бетонной линии обороны#! в регионе [GetStateRegion('STATE_ALSACE_LORRAINE').GetName]. Эта линия будет отличаться #B мощной и гибкой системой организации#!, основанной на принципах #B максимального использования рельефа и непрерывного огневого прикрытия#!.\n\nС помощью этого оборонительного рубежа мы сможем заставить [SCOPE.sCountry('french_enemy_scope').GetAltNameNoFlag('RU_CL_VP')] сместить вектор атаки в случае начала [Concept('concept_war', 'войны')], выиграв время для мобилизации и подготовки к затяжному конфликту на истощение.\n\n@information! Ожидается, что строительство займёт #V 8 лет#!, после чего [GetStateRegion('STATE_ALSACE_LORRAINE').GetName] получит новую #O черту#!."
 defensive_line_in_alsace_lorraine_tt: "Строительство завершено"
 offensive_a_outrance: "Дух выше материи"
 offensive_a_outrance_reason: "«Без наступления нет победы: цена победы — кровь, а война есть дикость и жестокость. Она признаёт лишь одно средство достижения цели — кровопролитие».\n\nХотя появляется всё больше оружия, обладающего #B огромной поражающей силой#!, давняя традиция штыкового натиска сохраняет #V наступательной доктрине#! важное место в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Офицеры, поддерживающие эту доктрину, считают, что оборонительный огонь противника на деле не смертелен: современные винтовки слишком лёгкие, а пули якобы даже не пробивают кожу. Следовательно, солдаты будто бы не рискуют, двигаясь по полю боя во весь рост и полностью открываясь огню. Более того, по расчётам Генерального штаба, вражескому пехотинцу требуется не менее 40 секунд, чтобы перезарядить винтовку, поднять её и прицелиться. За это время наступающие солдаты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] успеют пробежать сотни метров и захватить позиции противника.\n\nЭта теория укоренилась так глубоко, что почти все высшие офицеры командования уже твёрдо уверовали в #V наступательную доктрину#! и развивают идею всеобщего наступления. Но сработает ли она в настоящем бою, покажет только #B война#!."
 offensive_a_outrance_status: "Наступательная доктрина господствует во французской армии"
 num_country_dead_least_1m_tt: "Общие потери [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в этой войне составляют не менее #R 1M#! погибших"

