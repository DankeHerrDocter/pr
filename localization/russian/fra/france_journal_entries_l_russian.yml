  #Династия Бонапартов
 second_napoleon_empire_je_before_tt: "#U #B Если эта запись в дневнике завершится победой бонапартистов, династия Бонапартов будет восстановлена во Франции.#!#!"
 second_napoleon_empire: "Династия Бонапартов"
 second_napoleon_empire_reason: "#B Индикатор показывает текущую #!#V стабильность империи#! при династии Бонапартов.\n#B Если мы проиграем войну и уступим наши [concept_homeland] или #O Алжир#!, произойдёт событие, которое заставит правителя отречься от престола. Это может #N положить конец#! #U династии Бонапартов#!, если #V стабильность империи#! будет ниже 6 и не будет завершена [concept_journal_entry] #V «Либеральная империя»#!.#!\n\n#V #P [ROOT.GetCountry.GetRuler.GetFullName], Божьей милостью и волей народа, князь Андорры, протектор Рейнского союза, король Италии, медиатор Швейцарской Конфедерации, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] французов#!#!#B #V — нынешний глава дома Бонапартов и правитель.#!\n\n#V Франция#! — земля беспокойная. С #V революции 1789 года#! правительства в Париже менялись чаще, чем #B за несколько веков в других странах#!. Так было и с короной, которую #V император Наполеон Бонапарт возложил на себя в соборе Парижской Богоматери в 1804 году#!. После поражения при Ватерлоо император Наполеон был вынужден отречься от престола. Антифранцузская коалиция сослала его на остров Святой Елены, где он и умер в изгнании. Вернулась династия Бурбонов, сторонники [GetIdeology('ideology_legitimist').GetName], но и они были свергнуты парижскими революционерами в 1830 году, уступив место Орлеанской династии. Правление сторонников [GetIdeology('ideology_orleanist').GetName] также было недолгим. #V Вторая республика#! на время заменила [GetLawType('law_monarchy').GetName] во Франции, восстановив республику революционной эпохи. Но ностальгия верных [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] по #B славным подвигам императора Наполеона#! позволила [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] вернуться и восстановить свою власть над всей страной из Парижа.\n\n#B Как и ко всем предыдущим правителям Франции#!, отношение французского народа к своему правителю всегда #V непостоянно#!: то полное обожание, то лютая ненависть. Чтобы сохранить империю и #B корону дома Бонапартов#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] должен #V осторожно править этой столь же непостоянной, как и её народ, страной#!, поддерживая баланс между различными фракциями, совершая новые подвиги и улучшая экономику страны, чтобы доказать, что #V дом [GetIdeology('ideology_bonapartist').GetName]#! может обеспечить [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] #b желанную стабильность и процветание.#!."
 second_napoleon_empire_fail_tt: "#V Стабильность империи#! упала до 0."
 second_napoleon_empire_fail_2_tt: "Поражение в [Concept('concept_journal_entry', 'записи дневника')] #V «Наполеоновские войны»#!, победа антифранцузской коалиции."
 second_napoleon_empire_on_fail_tt: "Империя будет свергнута, и во Франции будет восстановлена республика."
 second_napoleon_empire_status: "#V #U #B [ROOT.GetCountry.GetRuler.GetFirstName] — действующий император французов#!#!#!"
 second_napoleon_empire_fail_event_10_tt: "#V Стабильность империи#! снизится на 10.\nЭто приведёт к провалу [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Династия Бонапартов»#! и концу монархии Бонапартов."
 second_napoleon_empire_fail_event_5_tt: "#V Стабильность империи#! снизится на 5."
