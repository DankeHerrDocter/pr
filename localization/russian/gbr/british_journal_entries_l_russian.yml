 english_afternoon_tea: "Культура послеполуденного чая"
 english_afternoon_tea_reason: "Хотя #tooltippable_name [SCOPE.sCulture('han_scope').GetAdjective|l]ий#! #yellow народ#! начал пить чай ещё до нашей эры, в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] он стал популярен только в XVII веке благодаря #B #V королю Карлу II#! и его жене, #yellow португальской#! принцессе Екатерине Брагансской. Однако в ту эпоху @tea!#V чай#! был доступен только богатым. С развитием нашего [Concept('concept_market', 'рынка')] и поставками @tea!#V чая#! из Индии и Дальнего Востока его [Concept('concept_market_price', 'цена')] значительно снизилась.\n\nМногие #B проголодавшиеся #v $laborers$#!, завершившие тяжёлый рабочий день#!, нуждаются в пополнении сил. Так появился не просто #G чай#!, а #G полноценный перекус#!: будь то простая #O рыба с картофелем#! или изысканные #O пирожные#! и #O сконы со сливками и джемом#!, чашка #B крепкого, бодрящего @tea!#V чая#!#! всегда обязательна и становится модной традицией.\n\n@tea!#V Послеполуденный чай#! — это #B прекрасное времяпрепровождение в изысканных чайных комнатах#! и уникальный, #B элегантный и комфортный образ жизни #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их граждан#!. Мы должны всячески способствовать развитию этого #V джентльменского обычая#! и сделать его #V символом нашей #yellow британской цивилизации#!#!."
 english_afternoon_tea_complete_tt: "Следующие условия выполнялись не менее 5 лет."
 english_afternoon_tea_fail_tt: "Столица была захвачена в ходе войны."
 english_afternoon_tea_goal: ""
  #Журналы завоеваний
 finish_rule_bri_je_tt: "Завершена [concept_journal_entry] #V «Правь, Британия!»#!."
 conqueror_niger: "Покорение Нигера"
 conqueror_niger_reason: "Со времён #V Акта о запрете работорговли 1807 года#! гордость [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], #U Королевский флот#!, патрулирует побережье Западной Африки для борьбы с незаконной торговлей рабами. Сегодня торговые пути вокруг Нигера постепенно переориентировались на такие товары, как пальмовое масло, арахис и какао. Однако это богатство постоянно провоцирует [Concept('concept_civil_war', 'гражданские войны')] между местными военачальниками и религиозными вождями.\n\n#V Дельта Нигера#! не только богата пальмовым маслом и каучуком, но и является #B воротами во внутренние районы Западной Африки и Сахель#!. Если не создать упорядоченную административную и таможенную систему, #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ие#! инвестиции и судоходство в этом регионе окажутся под угрозой.\n\nХаос не способствует развитию настоящей торговли и цивилизации. Нигер и местный #yellow султанат Сокото#! должны подчиниться власти [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, ибо это единственный способ обеспечить #B будущие интересы империи в Африке и приобщение местных туземцев к цивилизации.#!."
 conqueror_niger_tt: "Провинции Нигера под нашим управлением получат преимущества со следующими эффектами:"
 conqueror_ghana: "Завоевание Ганы"
 conqueror_ghana_reason: "С тех пор как #yellow португальцы#! несколько веков назад построили первые прибрежные форты, Золотой Берег стал объектом вожделения европейских держав. В #V Первой англо-ашантийской войне 1824 года#! мы разбили армию #yellow королевства Ашанти#! и постепенно расширили наши владения на Золотом Берегу. Сегодня Ашанти фактически утратили контроль над прибрежными районами.\n\nОднако одних торговых фортов уже недостаточно для защиты интересов #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! короны. Богатые запасы золота, слоновой кости и какао, а также стратегическое положение побережья как #B ворот во внутренние районы Западной Африки#! требуют от нас более решительных мер: #V [ROOT.GetCountry.GetNameNoFlag] должна полностью подчинить себе Гану и положить конец правлению туземцев и других конкурентов#!."
 conqueror_ghana_tt: "Провинции Ганы под нашим управлением получат преимущества со следующими эффектами:"
 conqueror_ghana_button: "Купить Голландскую Гану"
 conqueror_ghana_button_desc: "Голландская Гана с центром в замке Эльмина — старейшая европейская крепость в Африке к югу от Сахары. Голландцы получали отсюда огромные торговые прибыли. Однако сегодня, с ростом нашего влияния в Африке и смещением стратегических приоритетов голландцев, мы уверены, что сможем путём мирных переговоров, заплатив определённую сумму и признав их претензии на Ачех, убедить их передать нам эту территорию."
 conqueror_malaya: "Вмешательство в Малайю"
 conqueror_malaya_reason: "С тех пор как #yellow Ост-Индская компания#! по соглашению с султаном Кедаха получила Пинанг, а #V Англо-голландский договор 1824 года#! вынудил [SCOPE.sCountry('NET_scope').GetNameNoFlag] уйти с Малайского полуострова, султанаты Малайского полуострова и Брунея, хотя и оставаясь номинально независимыми, фактически страдают от внутренних смут и борьбы фракций, что сказывается на их экономике, внутренней политике и торговле.\n\nНас привлекают богатые местные месторождения олова и каучука. Если [ROOT.GetCountry.GetNameNoFlag] сможет #B вмешаться под предлогом урегулирования споров и защиты торговли#! и убедить местных султанов принять наше милостивое правление, мы получим ещё больше преимуществ в этом ключевом проливе — #V возможно, даже мирным путём.#!."
 conqueror_malaya_complete_tt: "Султанаты Малайи либо подчинились нам, либо были уничтожены."
 conqueror_malaya_tt: "Провинции Стрейтс-Сетлментс под нашим управлением получат преимущества со следующими эффектами:"
 state_conqueror_benifits_tt: "Каждая провинция из списка задания получит преимущества со следующими эффектами:"
 conqueror_malaya_button: "Оказать давление на малайские султанаты"
 conqueror_malaya_button_desc: "Наши войска находятся в регионе, и эти слабые султаны совершенно неспособны сопротивляться. Мы уверены, что путём дружелюбных переговоров, не свергая их с престола, мы сможем фактически контролировать местные политические и финансовые дела через советников, заложив основу для наших долгосрочных интересов в Малайе."
 conqueror_malaya_button_possible_tt: "Любая [concept_army] в #O индокитайском#! [Concept('concept_hq', 'штабе')] имеет более #variable 30#! [Concept('concept_unit','военных подразделений')]."
 conqueror_malaya_button_effect_tt: "Мы окажем военное давление на местные султанаты Малайи, чтобы заставить их принять наших советников."
 integrate_malaya_button: "Объединить Стрейтс-Сетлментс"
 integrate_malaya_button_desc: "Разрозненность султанатов #yellow Стрейтс-Сетлментс#! мешает нам дальше развивать местные месторождения и обеспечивать безопасность морских путей. В интересах империи в Индонезии, мы могли бы принять меры, чтобы убедить местные султанаты отказаться от независимости и присоединиться к создаваемой нами федерации, гарантировав их семьям вечный почётный статус."
 integrate_malaya_button_possible_tt: "Любая [concept_army] в #O индокитайском#! [Concept('concept_hq', 'штабе')] имеет более #variable 50#! [Concept('concept_unit','военных подразделений')]."
 integrate_malaya_button_2_possible_tt: "Это действие ещё не предпринималось."
 integrate_malaya_button_effect_tt: "Мы убедим наши протектораты в Малайе присоединиться к новой федерации, гарантируя вечное сохранение прав наследования и автономии их султанских семей, и направим в каждый султанат резидентов для руководства."
 annex_malaya_button: "Убедить султана Брунея присоединиться к федерации"
 annex_malaya_button_desc: "Влияние #yellow султаната Бруней#! ослабевает, но мы всё ещё можем наладить с ними хорошие отношения. Если мы сможем предоставить достаточную финансовую помощь и гарантировать сохранение султанского трона, возможно, удастся убедить их присоединиться к федерации Стрейтс-Сетлментс для более эффективного использования портов и ресурсов Брунея."
 annex_malaya_button_possible_tt: "Федерация Стрейтс-Сетлментс уже создана, и султанаты Малайи присоединились к ней."
 annex_malaya_button_effect_tt: "Мы убедим султана Брунея присоединиться к нашей новой федерации Стрейтс-Сетлментс, гарантируя его права, и направим туда резидента."
  #Судостроение
 british_shipbuilding_industry_character: "Британская судостроительная промышленность"
 british_shipbuilding_industry_character_reason: "Со времён принятия #B #L Закона о премиях 1640 года#! регулирование и субсидирование судостроения в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] служили мощным фундаментом для нашей #O международной#! [Concept('concept_trade', 'торговли')] и [Concept('concept_colonial_growth', 'колониальной экспансии')]. После победы в #V Наполеоновских войнах#! мы взяли под контроль почти #B все морские маршруты и торговые потоки#! между [Concept('concept_colony', 'колониями')], что позволило нашему торговому флоту развиваться под защитой #yellow великого [Concept('concept_fleet', 'флота')]#! и #yellow отлаженной системы [Concept('concept_tariffs', 'пошлин')]#!.\n\nСегодня [ROOT.GetCountry.GetName] обладает #U #B самой совершенной судостроительной промышленностью в мире#!#!: наше #yellow судостроение#! #V грандиозно по масштабам#!, обладает полноценной системой и множеством искусных мастеров; наша экономика незыблема и способна предоставить любые материалы; морские перевозки приносят огромную прибыль и создают бесконечный спрос для верфей; мы владеем передовыми технологиями, строим лучше, прочнее и эффективнее, производя #B лучшие суда в мире#!. Всё это делает [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] #O бесспорным лидером#! мирового #yellow судостроения#!.\n\nХотя чрезмерная зависимость некоторых провинций от #yellow судостроения#! стягивает капитал и рабочую силу в доки, затрудняя развитие новых отраслей, наша великая #B #U судостроительная промышленность#!#! остаётся символом #B славной традиции #tooltippable_name #tooltip:[SCOPE.sCulture('british_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('british_scope').GetCustom('RU_CUL_ADJ')|l]ой#!#! нации, рождённой морем#!, и надёжной опорой #G морского могущества#! и #V нашего статуса#!."
  #Утилитаризм
 british_utility_principle: "Перспективный утилитаризм"
 british_utility_principle_reason: "Долгое время #V продажа должностей и кумовство#! в #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! администрации превратили существующую #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! в добычу для немногих представителей [Concept('concept_upper_strata', 'высших слоёв')]. #B Хаос и неэффективность#! правительственных #v $bureaucrats_only_icon$ чиновников#! стали почти традицией. В условиях индустриализации и усложнения колониальных дел #B эта устаревшая система стала не справляться со своими задачами#!.\n\nПрименяя методы [GetIdeology('ideology_utilitarian_leader').GetName], создав более #V эффективные экзамены для госслужащих#! и #V политически нейтральный чиновничий аппарат#!, мы сможем обеспечить, чтобы каждый элемент государственной машины [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #B служил общим интересам всех граждан#!. Это позволит #B повысить эффективность управления, восстановить общественное доверие#! и, #G в конечном счёте, стать мощной прогрессивной силой в мировом масштабе#!."
 british_utility_principle_status: "Способствовать принятию методов [GetIdeology('ideology_utilitarian_leader').GetName] в чиновничьем аппарате [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 event_effects_joi_flavor_gbr.110_tt: "Если уже приняты законы [GetLawType('law_compulsory_primary_school').GetName], [GetLawType('law_public_schools').GetName] и [GetLawType('law_appointed_bureaucrats').GetName], существующая #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! будет реформирована в более надёжную #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_1_modifier_effects_tt $civil_service_system_1$#!.\nВ противном случае, модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! будет удалён, а [Concept('concept_leader', 'лидер')], придерживающийся идеологии [GetIdeology('ideology_utilitarian_leader').GetName], уйдёт в отставку."
 event_effects_joi_flavor_gbr.102_tt: "Существующая #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! будет реформирована в более надёжную #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_1_modifier_effects_tt $civil_service_system_1$#!.\n[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] примет идеологию [GetIdeology('ideology_utilitarian_millian').GetName] вместо [GetIdeology('ideology_malthusian').GetName]."
 british_utility_principle_possible_tt: "Любой [concept_leader] имеет [Concept('concept_ideology', 'идеологию')] [GetIdeology('ideology_utilitarian_leader').GetName]."
 event_effects_joi_flavor_gbr.110_fail_tt: "Модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#! будет удалён, а [Concept('concept_leader', 'лидер')], придерживающийся идеологии [GetIdeology('ideology_utilitarian_leader').GetName], уйдёт в отставку."
 finish_british_utility_principle_tt: "Завершена [concept_journal_entry] #V «Перспективный утилитаризм»#!."
 civil_service_system_1_modifier_effects_tt: "[GetStaticModifier('civil_service_system_1').GetName|v]\n[GetStaticModifier('civil_service_system_1').GetDesc]"
 civil_service_system_modifier_effects_tt: "[GetStaticModifier('civil_service_system').GetName|v]\n[GetStaticModifier('civil_service_system').GetDesc]"
  #Имперская преференция
 joi_imperial_preference: "Имперская экономическая конференция"
 joi_imperial_preference_reason: "В условиях, когда новые [Concept('concept_great_power', 'великие державы')], такие как [SCOPE.sCountry('threat_country_1').GetNameNoFlag] и [SCOPE.sCountry('threat_country_2').GetNameNoFlag], вводят #yellow высокие [concept_tariffs]#! и #yellow торговые барьеры#!, действующие торговые правила уже не могут защищать и продвигать интересы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Поэтому мы пригласили представителей со всей Британской империи в #O Оттаву#! на экономическую конференцию, чтобы #B способствовать введению #V взаимных таможенных тарифов и системы преференций#! между [Concept('concept_dominion', 'доминионами')] и [Concept('concept_colony', 'колониями')] в рамках империи#!.\n\nТолько реализовав идею [GetLawType('law_imperial_preference').GetName], защищая товарооборот внутри #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! [Concept('concept_market', 'рынка')] и одновременно устанавливая единый #yellow защитный барьер#! из [Concept('concept_tariffs', 'тарифов')] против внешнего мира, #yellow Британская империя#! сможет #B сохранить инициативу#! в бурных потоках мировой торговли и #V удержать наш [concept_market] в качестве сильнейшей экономической силы в мире#!."
 joi_imperial_preference_leader_tt: "Любой [concept_leader] имеет [Concept('concept_ideology', 'идеологию')] [GetIdeology('ideology_utilitarian_leader').GetName] или [GetIdeology('ideology_jingoist_leader').GetName]."
 joi_imperial_preference_decition_tt: "Принято решение #V «Институционализировать имперскую конференцию»#!."
 joi_imperial_preference_on_complete_tt: "Все наши [Concept('concept_subject', 'субъекты')] получат событие #V «Имперские преференции»#!."
 event_effects_joi_flavor_gbr.122_tt: "Заменить #O торговые законы#! на [GetLawType('law_imperial_preference').GetName]."
 imperial_preference_possible_can_tt: "#B Вся Канада находится в имперской системе; владеем всеми канадскими провинциями#!"
 imperial_preference_possible_ast_tt: "#B Вся Австралия находится в имперской системе; владеем всеми австралийскими провинциями#!"
 imperial_preference_possible_saf_tt: "#B Вся Южная Африка находится в имперской системе; владеем всеми бурскими провинциями#!"
 imperial_preference_possible_raj_tt: "#B Вся Индия находится в имперской системе; туземные княжества ликвидированы#!"
 imperial_preference_can_complete_tt: "Представитель Канады согласился с предложением."
 imperial_preference_ast_complete_tt: "Представитель Австралии согласился с предложением."
 imperial_preference_saf_complete_tt: "Представитель Южной Африки согласился с предложением."
 imperial_preference_raj_complete_tt: "Представитель Индии согласился с предложением."
 imperial_preference_can_button: "Пойти на уступки Канаде"
 imperial_preference_can_button_desc: "Экономические связи Канады с нами ослабевают и она начинает подпадать под влияние других стран. Однако их лояльность к нам остаётся неизменной. Мы должны максимально использовать это для укрепления наших экономических отношений."
 imperial_preference_can_button_possible_tt: "Соглашение с канадской делегацией ещё не достигнуто."
 imperial_preference_saf_button: "Вести переговоры с Южной Африкой"
 imperial_preference_saf_button_desc: "Южная Африка обладает богатыми минеральными ресурсами и поставляет половину золота империи. Мы должны принять меры для получения выгодных условий и обеспечения наших экономических связей."
 imperial_preference_saf_button_possible_tt: "Соглашение с южноафриканской делегацией ещё не достигнуто."
 imperial_preference_ast_button: "Пойти на уступки Австралии"
 imperial_preference_ast_button_desc: "Австралийцы всегда испытывали к нам глубокие чувства, они — наши прямые потомки. Умеренные уступки, позволяющие их продукции выходить на наш рынок, укрепят наши прочные отношения."
