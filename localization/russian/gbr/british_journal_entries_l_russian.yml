  #Королевский флот
 oak_loyal: "Королевский флот"
 oak_loyal_status: "#V #U #B Первый лорд Адмиралтейства передаёт приказы Адмиралтейству через Адмиралтейский комитет.#!#!#!"
 oak_loyal_reason: "Сумма #bold военно-морского бюджета#! определяется множеством #tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_advance положительных#! и #tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_delete отрицательных#! факторов.\n\n#U #B Королевский флот#!#! — гордость [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и первая линия её обороны, её #variable «деревянные стены»#!. С момента своего создания Генрихом VII, он всегда был важнейшей частью нашего военного строительства. В #bold Трафальгарском сражении 1805 года#! #bold вице-адмирал Нельсон#! разгромил объединённый франко-испанский флот, принеся Королевскому флоту #variable венец владыки морей#!, который он носит и по сей день.\n\n#U #B Королевский флот#!#! имеет долгую и славную историю. Благодаря львиной доле военного бюджета, мы получили #V огромный и современный флот#! и #V хорошо обученных моряков#!, которые внесли неоценимый вклад в величие [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Руководство Королевским флотом осуществляется #bold Адмиралтейским комитетом и Адмиралтейством#!, под началом #bold Первого лорда Адмиралтейства#!, и он верен правительству #bold [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#!.\n\nПоддержание такого великого [Concept('concept_fleet', 'флота')] и сохранение его превосходства в мире — непростая задача. Со временем #U #B Королевскому флоту#!#! необходимо меняться, чтобы противостоять амбициозным соперникам и #b обеспечивать нашу непоколебимость в любом океане, подобно дубу#!, ведь #variable границы Британской империи простираются до Гималаев!#!\n\nДавайте же, друзья, возрадуемся нашей славе,\nМы призываем вас во имя славы, чтобы наслаждаться свободой, а не страдать в рабстве;\nСердца из дуба, как наши могучие корабли,\nБравые моряки — наши острые мечи,\nМы будем вечно идти вперёд, и кто сравнится с сынами волн в их своеволии?!"
 oak_loyal_tt_1: "Великий флот — ключ к нашему положению в мире.\nКоролевский флот должен обеспечивать абсолютное превосходство на море над всеми странами."
 oak_loyal_tt_2: "#bold «Организовать учения в открытом море»#! и #bold «Приказать искать решающего сражения»#! будут стоить 25 #bold военно-морского бюджета#!\n#bold «Построить новый линейный корабль»#! и #bold «Обеспечить „стандарт двух держав“»#! будут стоить 100 #bold военно-морского бюджета#!\n#bold «Расширить доки Королевской верфи»#! будет стоить 50 #bold военно-морского бюджета#!\n#bold «Продать доки Королевской верфи»#! принесёт 25 #bold военно-морского бюджета#!."
 oak_loyal_1_button: "Организовать учения в открытом море"
 oak_loyal_1_button_desc: "Сильный флот не может постоянно стоять в порту, ему нужны регулярные тренировки и походы! Организация учений в открытом море значительно поможет поддержать организацию и боеспособность нашего флота. Осталось лишь решить, где их проводить: в Северном море, Атлантике, Средиземноморье, Индийском океане или Южно-Китайском море."
 loyal_navy_1_tt: "Нельзя же постоянно проводить учения. Учения в открытом море можно проводить только раз в 5 лет."
 oak_loyal_2_button: "Приказать искать решающего сражения"
 oak_loyal_2_button_desc: "Королевский флот огромен, а количество мощных линейных кораблей не поддаётся счёту. Однако иметь преимущество во флоте — это одно, а найти вражеский флот и нанести ему сокрушительный удар — совсем другое. Нынешняя стратегия нашего флота слишком консервативна. Следует отдать прямой приказ Адмиралтейству: разработать детальный план решающего сражения, довести его до каждого матроса и командира, и в ясный день, обнаружив врага, вывести все основные силы и дать бой!"
 loyal_navy_2_tt: "Флоту нужно возвращаться в порт для пополнения запасов. В течение года после приказа о поиске решающего сражения повторный приказ отдать нельзя."
 oak_loyal_3_button: "Построить новый линейный корабль"
 oak_loyal_3_button_desc: "Пора отправить устаревшие корабли в музей, Королевский флот не может воевать со старьём! Наши превосходные моряки заслуживают управлять самыми современными кораблями в мире. Прикажите Уайтхоллу увеличить бюджет Королевского флота и заложить на верфях больше новых боевых кораблей. Наши адмиралы уже с нетерпением придумывают им названия!"
 loyal_navy_3_tt: "Корабли Королевского флота не так уж и стары. Новые линейные корабли можно строить только раз в 5 лет."
 oak_loyal_4_button: "Обеспечить «стандарт двух держав»"
 oak_loyal_4_button_desc: "В этом суровом мире флот — наше самое надёжное оружие. Согласно «стандарту двух держав», предложенному в парламентском «Акте о морской обороне», численность Королевского флота должна всегда превышать суммарную численность второго и третьего по величине флотов мира. Обеспечить этот стандарт непросто, это потребует от наших верфей работы на полную мощность!"
 loyal_navy_4_tt: "Постоянно просить у парламента деньги — утомительно! Лорды будут рассматривать предложения по стандарту только раз в 5 лет."
 oak_loyal_5_button: "Расширить доки Королевской верфи"
 oak_loyal_5_button_desc: "Королевский флот находится в стадии расширения, однако доков не хватает. Для поддержки нашего военно-морского строительства, возможно, лучше выделить средства на расширение отечественных верфей."
 loyal_navy_5_tt: "Компания «Армстронг-Уитворт» расширит свои доки. В течение 2 лет их нельзя будет продавать."
 oak_loyal_6_button: "Продать доки Королевской верфи"
 oak_loyal_6_button_desc: "Нынешних доков слишком много. Даже с учётом численности и потребностей Королевского флота, такое количество верфей избыточно. Лучше продать часть из них."
 loyal_navy_6_tt: "Компания «Армстронг-Уитворт» продаст свои доки. В течение 1 года их нельзя будет снова расширять."
 loyal_navy_tooltip_advance: "#bold В следующих случаях ежемесячно добавляется 2 очка военно-морского бюджета#!:\n•#variable Нахождение в состоянии войны#!\n•#variable Наличие закона [GetLawType('law_professional_army').GetName]#!\n•#variable Наличие закона [GetLawType('law_mass_conscription').GetName]#!\n•#variable Наличие закона [GetLawType('law_monarchy').GetName]#!\n•#variable Одобрение [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] не ниже 0#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] у власти#!\n•#variable Влияние [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] [Concept('concept_powerful', 'могущественное')]#!"
 loyal_navy_tooltip_delete: "#bold В следующих случаях ежемесячно вычитается 5 очков военно-морского бюджета#!:\n•#variable Одобрение [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] не выше -5#!\n•#variable Влияние [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] [Concept('concept_marginalized', 'незначительное')]#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] не у власти#!\n•#variable Отсутствие закона [GetLawType('law_monarchy').GetName]#!\n•#variable Ранг ниже [Concept('concept_great_power', 'великой державы')]#!"
 loyal_navy_earn_tt: "#bold Получено 25 очков военно-морского бюджета#!"
 loyal_navy_50_tt: "#bold Потеряно 50 очков военно-морского бюджета#!"
 loyal_navy_25_tt: "#bold Потеряно 25 очков военно-морского бюджета#!"
 loyal_navy_100_tt: "#bold Потеряно 100 очков военно-морского бюджета#!"
 loyal_navy_cash_tt_50: "Требуется 50 очков военно-морского бюджета!"
 loyal_navy_cash_tt_25: "Требуется 25 очков военно-морского бюджета!"
 loyal_navy_cash_tt_100: "Требуется 100 очков военно-морского бюджета!"
  #Министерство по делам Индии
 indian_office: "Министерство по делам Индии"
 indian_office_reason: "Индия находится под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Министерство по делам Индии, возглавляемое #V министром по делам Индии#!, назначаемым непосредственно премьер-министром, заменило прежних [Concept('concept_ruler','генерал-губернаторов')] в Калькутте и Дели и правит [Concept('concept_indian_subcontinent', 'Индийским субконтинентом')] от имени правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества.\n\nСогласно #V «Акту по делам Индии»#!, местное управление в Индии разделено между #bold независимыми [Concept('concept_election', 'выборными')] туземными советами#! и #bold верными, надёжными местными чиновниками, подчинёнными Министерству по делам Индии#!, которые назначаются секретарём кабинета. Благодаря этому [ROOT.GetCountry.GetNameNoFlag] смогла взять все дела на субконтиненте под #bold абсолютный контроль Лондона#!, чтобы они лучше служили империи. Хотя это и значительно усложнило управление, #B Уайтхолл твёрдо заверил кабинет, что приложит максимум усилий для решения дел на субконтиненте#!.\n\n#V Как бы то ни было, да здравствует надёжное правительство на веки вечные!#!"
 indian_office_1_tt: "Управление Индией — непростая задача. Независимо от того, используются ли мирные методы или позиция силы, главной обязанностью Министерства по делам Индии является обеспечение #bold стабильности на субконтиненте#! и подавление любых угроз в зародыше."
 indian_office_2_tt: "#bold «Направить дополнительных чиновников»#! и #bold «Подавить инакомыслящих»#! повысят стабильность в Индии на 10 и 20 очков соответственно.\n#bold «Повысить земельный налог Махалвари»#! и #bold «Повысить соляной налог Гастингса»#! понизят стабильность на 20 очков.\nТекущая стабильность показана на индикаторе прогресса."
 indian_office_3_tt: "Если #bold стабильность#! в Индии упадёт до 0, Лондон будет вынужден отменить «Акт по делам Индии» и вновь назначить генерал-губернатора для управления."
 indian_office_1_button: "Направить дополнительных чиновников"
 indian_office_1_button_desc: "В административных органах Индии не хватает чиновников. Направление туда новоприбывших госслужащих может помочь."
 indian_office_1_button_tt: "Увеличивает стабильность в Индии на 100\nНазначать чиновников можно лишь 1 раз в 10 лет!"
 indian_office_2_button: "Подавить инакомыслящих"
 indian_office_2_button_desc: "Среди индийского простонародья всегда скрываются враги, выступающие против имперского правления. Нельзя медлить, нужно нанести сокрушительный удар!"
 indian_office_2_button_tt: "Увеличивает стабильность в Индии на 50\nПодавлять инакомыслие можно лишь 1 раз в 5 лет!"
 indian_office_2_button_effect_tt: "Все области [Concept('concept_indian_subcontinent', 'Индии')] получат модификатор со следующими эффектами:"
 indian_office_3_button: "Повысить земельный налог Махалвари"
 indian_office_3_button_desc: "«Махал» означает несколько земельных участков под одним именем. Этот земельный налог стал основным после отмены системы откупов. Повысив его, мы сможем улучшить наше финансовое положение."
 indian_office_3_button_tt: "Снизить стабильность в Индии на 25.\nНалог Махалвари можно повышать только раз в 5 лет!"
 indian_office_4_button: "Повысить соляной налог Гастингса"
 indian_office_4_button_desc: "Уоррен Гастингс, первый генерал-губернатор Индии, ввёл соляной налог, который всегда был крупнейшим источником монопольного дохода в Индии. Повысив этот потребительский налог, мы сможем улучшить наше финансовое положение."
 indian_office_4_button_tt: "Снизить стабильность в Индии на 25.\nСоляной налог Гастингса можно повышать только раз в 5 лет!"
 indian_office_5_button: "Потребовать сбора налогов от туземных советов"
 indian_office_5_button_desc: "Туземные советы представляют влиятельных местных жителей Индии. Если удастся убедить их помочь со сбором части налогов, наша работа по сбору налогов станет гораздо эффективнее."
 indian_office_5_button_tt: "Снижает стабильность в Индии на 50\nТребовать откуп налогов у туземных княжеств можно лишь 1 раз в 10 лет!"
 indian_office_6_button: "Поддержка местной рабочей силы"
 indian_office_6_button_desc: "Индия обладает огромными трудовыми ресурсами, однако правительство не использует их в полной мере. Нам следует стимулировать развитие местной рабочей силы, расширяя её доступ к рабочим местам и образованию."
 indian_office_6_button_tt: "Снижает стабильность в Индии на 50\nОказывать поддержку местной рабочей силе можно лишь 1 раз в 10 лет!"
 indian_rule_1_tt: "#bold Получено 10 очков стабильности в Индии#!"
 indian_rule_2_tt: "#bold Потеряно 10 очков стабильности в Индии#!"
 indian_minister_tt: "#bold Получено 50 очков стабильности в Индии#!\nМинистр по делам Индии войдёт в состав кабинета. Будьте осторожны, чтобы его ведомство не было расформировано!"
 indian_office_status: "#bold Министр по делам Индии представляет Лондон и осуществляет прямое управление субконтинентом.#!"
 indian_office_need_20_tt: "Стабильность в Индии должна быть не ниже 25"
 indian_office_need_50_tt: "Стабильность в Индии должна быть не ниже 50"
  #Правительство Его Величества
 her_majestys_government: "Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества"
 her_majestys_government_reason: "#V #P #B [ROOT.GetCountry.GetRuler.GetFullName], Божьей милостью, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Соединённого Королевства Великобритании и Ирландии, а также канадских, австралийских и прочих [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] владений и территорий, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Защитница', 'Защитник')] Веры, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Императрица', 'Император')] Индии,#!#!#!#bold #V — [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'наша нынешняя правительница', 'наш нынешний правитель')].#!\n\n[GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] имеет долгую историю, восходящую к #bold 871 году#!, когда #V Альфред Великий#! был коронован как #I Король Англии#!. С тех пор сменилось множество династий. После кончины каждого правителя, его #yellow предполагаемый [concept_heir]#! немедленно становится следующим и проходит церемонию коронации.\n\nВ то же время наша [GetLawType('law_monarchy').GetName] не является абсолютной, а представляет собой древнюю и славную #yellow конституционную монархию#!. #V «Великая хартия вольностей»#! утвердила положение #O #B Вестминстера#!#! в Англии, #variable «Билль о правах»#! после #bold Славной революции 1689 года#! стал первой в мире конституцией, а #bold «Акт о престолонаследии 1701 года»#! дополнил его, установив принцип #B разделения властей и #yellow парламентского суверенитета#!. Каждый правитель должен согласиться с этим актом, чтобы взойти на престол.\n\n[GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] — это не только символ #B древних традиций и славы#!, но и узы, связывающие #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ий#! народ на протяжении веков. Для посторонних мы можем казаться #B сдержанными, выдержанными, стойкими, холодными и дисциплинированными#!, несущими это бремя. Но мы лишь усмехнёмся, ибо мы, подобно #V дубу, стоящему на ветру#!, #bold гордо шагаем вперёд перед лицом невзгод и никогда не отступаем#!. Вот что олицетворяет [GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]: #U британский консерватизм#!, #U спокойствие и стойкость#!. Это наша гордость, как гласит наш девиз:\n\n#I Бог и моё право!#!"
 her_majestys_government_status: "#V #I #B Великая и славная система#!#!#!"
  #Гребной спорт в Великобритании
 rowing_of_united_kingdom: "Гребной спорт в Англии"
 rowing_of_united_kingdom_reason: "С самых ранних упоминаний о мореплавании, в нём всегда присутствовал #V спортивный элемент#!. В #bold Англии#!, #bold Оксфордский университет в 1815 году#! впервые организовал гонки с преследованием, а #bold Кембриджский университет в 1827 году#! провёл первую настоящую регату. #B Соревнования между Оксфордом и Кембриджем#!, впервые #V проведённые в 1829 году#!, быстро завоевали огромную популярность. Этот интересный и благородный вид спорта нашёл множество поклонников даже среди членов нашей королевской семьи, включая [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество.\n\nК сожалению, этому виду спорта пока не хватает достаточного финансирования и мощного покровителя для организации #bold постоянных, международных и масштабных соревнований#!. Если бы владение лодками и яхтами стало более распространённым в нашей стране, возможно, наша королевская семья, исходя из своих интересов, стала бы выдающимся покровителем этого спорта, помогая #V популяризировать греблю#! по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
  #Имперский совет
 commonwealth_council: "Имперский совет"
 commonwealth_council_reason: "Индикатор показывает количество мест в совете, занимаемых #bold доминирующим членом империи#!.\n#bold Британские места#!: #variable [ROOT.GetCountry.MakeScope.Var('eng_commonwealth_council').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_eng_tooltip_advance условий#!.\n#bold Канадские места#!: #variable [ROOT.GetCountry.MakeScope.Var('can_commonwealth_council').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_can_tooltip_advance условий#!.\n#bold Австралийские места#!: #variable [ROOT.GetCountry.MakeScope.Var('ast_commonwealth_council').GetValue|0]#!; изменяется во время [Concept('concept_election', 'выборов')] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ast_tooltip_advance условий#!.\n#bold Ирландские места#!: #variable [ROOT.GetCountry.MakeScope.Var('ire_commonwealth_council').GetValue|0]#!; изменяется во время [concept_election] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ire_tooltip_advance условий#!.\n#bold Южноафриканские места#!: #variable [ROOT.GetCountry.MakeScope.Var('saf_commonwealth_council').GetValue|0]#!; изменяется во время [concept_election] под влиянием различных #tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_saf_tooltip_advance условий#!.\n\n#variable Имперский совет#! — символ правительств #bold [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! по всей империи, #bold высший законодательный и исполнительный орган#! всего имперского [Concept('concept_government', 'правительства')]. Его постоянный парламент, Имперский парламент, заседает в #bold Вестминстерском зале#! лондонского Парламентского дворца, рядом с парламентом Соединённого Королевства. Его исполнительный [Concept('concept_institution', 'институт')], Министерство по делам империи, расположен на Уайтхолл-стрит в Уайтхолл-паласе.\n\nКак общий парламент, символизирующий имперское [Concept('concept_unification', 'объединение')], #variable пять постоянных членов совета — Великобритания, Канада, Австралия, Ирландия и Южная Африка#! — в соответствии с #bold «Актом об унии»#! имеют в парламенте #bold не более 200#! и #bold не менее 75#! мест каждый. Ежегодно по результатам [Concept('concept_election', 'выборов')] в Имперском парламенте назначаются министры, возглавляющие различные ведомства империи. Их статус выше, чем у автономных парламентов и местных администраций стран-членов, и они отвечают за все имперские [Concept('concept_law', 'законы')], [Concept('concept_diplomatic_action', 'дипломатические действия')], [Concept('concept_war', 'войны')] и другие дела, затрагивающие всю федерацию. В то же время, девять лордов-судей, представляющих различные части империи, заседают в #bold Федеральном верховном суде в Сент-Джеймсском дворце#!, обладая #bold правом окончательного решения в рамках имперской судебной системы#!.\n\nКак демократический символ #variable вестминстерской системы#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], парламентарии и чиновники со всего мира с энтузиазмом и в единстве служат нормальному функционированию Имперского совета, защищая тем самым #bold общие идеалы свободы#!, которые нас объединяют."
 commonwealth_council_eng_tooltip_advance: "В следующих случаях #bold ежемесячно#! #bold добавляется 4 места#!:\n• Доля населения #bold английской культуры#! достигает 5%\n• Доля населения #bold английской культуры#! достигает 10%\n\nВ следующих случаях #bold ежемесячно#! #bold вычитается 1 место#!:\n• Любая другая страна-член получает места"
 commonwealth_council_can_tooltip_advance: "В следующих случаях #bold ежемесячно#! #bold добавляется 4 места#!:\n• Доля населения #bold англо-канадской культуры#! достигает 5%\n• Доля населения #bold франко-канадской культуры#! достигает 5%\n\nВ следующих случаях #bold ежемесячно#! #bold вычитается 1 место#!:\n• Любая другая страна-член получает места"
 commonwealth_council_ast_tooltip_advance: "В следующих случаях #bold ежемесячно#! #bold добавляется 4 места#!:\n• Доля населения #bold австралийской культуры#! достигает 5%\n• Доля населения #bold австралийской культуры#! достигает 10%\n\nВ следующих случаях #bold ежемесячно#! #bold вычитается 1 место#!:\n• Любая другая страна-член получает места"
 commonwealth_council_ire_tooltip_advance: "В следующих случаях #bold ежемесячно#! #bold добавляется 4 места#!:\n• Доля населения #bold ирландской культуры#! достигает 5%\n• Доля населения #bold ирландской культуры#! достигает 10%\n\nВ следующих случаях #bold ежемесячно#! #bold вычитается 1 место#!:\n• Любая другая страна-член получает места"
 commonwealth_council_saf_tooltip_advance: "В следующих случаях #bold ежемесячно#! #bold добавляется 4 места#!:\n• Доля населения #bold бурской культуры#! достигает 5%\n\nВ следующих случаях во время [Concept('concept_election', 'выборов')] #bold ежемесячно#! #bold вычитается 1 место#!:\n• Любая другая страна-член получает места"
 commonwealth_council_complete_tt: "Реализация имперской политики будет по-разному влиять на [Concept('concept_incorporated_state', 'национальные области')] стран-членов в зависимости от количества их мест."
 commonwealth_council_trade_button: "Укрепить имперскую торговлю"
 commonwealth_council_trade_button_desc: "Система имперских преференций — важный закон для поддержания свободной торговли на нашем внутреннем рынке. Однако, будучи единым целым, мы должны устранить все торговые барьеры. Давайте примем политику, которая будет способствовать ещё большей свободе товарооборота внутри страны."
 commonwealth_council_health_button: "Выделить средства на общественные услуги"
 commonwealth_council_health_button_desc: "Условия в разных частях империи сильно различаются. Для поддержания здоровья и образования наших граждан необходимы значительные государственные расходы. Давайте продвигать выделение средств на обеспечение безопасности и права на образование нашего народа."
 commonwealth_council_army_button: "Провести мобилизацию"
 commonwealth_council_army_button_desc: "Империя столкнулась с ужасной войной. Долгое время мы пренебрегали резервами солдат, которые могут предоставить различные части империи. Давайте объявим призыв, каждый должен выполнить свой долг перед короной!"
 commonwealth_council_migration_button: "Увеличить расходы на правопорядок"
 commonwealth_council_migration_button_desc: "Хотя империя и является единым целым, социальные условия в разных регионах сильно различаются. В результате, уровень безопасности для разных слоёв населения в автономных областях также разный, а в некоторых регионах уже процветают банды. Мы должны бороться с этой угрозой безопасности нашего народа."
 has_imp_council_act_tt: "Имперская политика в данный момент не проводится."
 has_imp_council_trade_act_tt: "#bold Будет начата реализация имперской торговой политики.#!"
