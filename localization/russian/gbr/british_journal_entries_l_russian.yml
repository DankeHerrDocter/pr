 uk_parliament_westminster_1_button: "Начать бюджетные дебаты"
 uk_parliament_westminster_1_button_desc: "Ежегодный финансовый акт — одно из важнейших прав и обязанностей парламента. Продвижение скорейшего представления министром финансов бюджета на текущий финансовый год и его утверждение парламентом позволит правительству обеспечить преемственность финансирования в новом году."
 uk_parliament_westminster_1_button_possible_tt: "#V Срок действия предыдущего бюджета истёк#!"
 uk_parliament_westminster_1_button_effect_tt: "Парламент немедленно начнет дебаты по бюджету.\nПосле окончания перерыва мы сможем в любой момент созвать новые дебаты, чтобы принять другой бюджет взамен действующего.\nПринимая законы, учитывайте волю большинства, иначе недовольства парламентариев не избежать!"
 uk_parliament_westminster_1_button_effect_2_tt: "Дебаты по бюджету будут приостановлены."
 uk_parliament_westminster_1_button_2_possible_tt: "Дебаты по бюджету приостановлены"
 uk_parliament_westminster_2_button: "Созвать чрезвычайную сессию Парламента"
 uk_parliament_westminster_2_button_desc: "В случае внезапного кризиса правительство имеет право рекомендовать правителю созвать специальную сессию. Даже если парламент находится на каникулах, депутаты должны немедленно вернуться в Вестминстер для голосования по решениям и законам правительства."
 uk_parliament_westminster_2_button_effect_tt: "Мы созовём парламент на внеочередное заседание для обсуждения текущей чрезвычайной ситуации."
 uk_parliament_westminster_2_button_possible_tt: "Активна [concept_journal_entry] #variable «Экономический кризис»#!."
 uk_parliament_westminster_3_button: "Вынести вотум недоверия"
 uk_parliament_westminster_3_button_desc: "Очевидно, что нынешнее правительство не в состоянии справиться с надвигающимся кризисом, угрожающим стране. Любые дальнейшие попытки — лишь проявление слабости. Нам нужно более сильное руководство, чтобы пережить грядущую бурю. Парламент должен выполнить свой долг!"
 gbr_event_48_a_tt: "#P Вотум недоверия провалился, нынешнее правительство продолжит свою работу.#!"
 gbr_event_48_b_tt: "#R Вотум недоверия будет принят, нынешнее правительство будет вынуждено уйти в отставку!#!"
 uk_parliament_westminster_3_button_possible_tt: "#V #R [concept_popularity] действующего премьер-министра ниже -50#!#!"
 uk_parliament_westminster_3_button_effect_tt: "Парламент проведёт голосование по вотуму недоверия действующему премьер-министру и кабинету. В случае принятия, премьер-министр будет вынужден уйти в отставку."
 uk_parliament_westminster_4_button: "Досрочно распустить Парламент"
 uk_parliament_westminster_4_button_desc: "Нарастающий кризис — именно та причина, по которой мы должны оставаться верными своим принципам. Независимо от причин — будь то попытка продлить своё правление или желание уйти от ответственности — мы должны досрочно распустить парламент и провести всеобщие выборы, чтобы продолжать двигаться курсом последних лет."
 uk_parliament_westminster_4_button_possible_tt: "#V С момента последних [Concept('concept_election', 'выборов')] прошло не менее 2 лет#!"
 uk_parliament_westminster_4_button_effect_tt: "Премьер-министр порекомендует правителю уполномочить Тайный совет издать указ о роспуске действующего парламента и проведении новых [Concept('concept_election', 'выборов')]."
 uk_parliament_westminster_5_button: "Рассмотреть колониальную политику"
 uk_parliament_westminster_5_button_desc: "Наша империя огромна, в ней сосредоточены ресурсы и таланты, которым завидуют многие другие страны. Однако обширность территорий усложняет управление и экспансию. Парламент должен признать это и провести регулярные дебаты по колониальной политике."
 uk_parliament_westminster_5_button_effect_tt: "Кабинет министров представит новый законопроект по делам колоний и потребует от парламента немедленно начать его обсуждение.\nПосле окончания перерыва мы сможем в любой момент созвать новые дебаты, чтобы принять другой закон взамен действующего."
 uk_parliament_westminster_5_button_possible_tt: "Дебаты о колониальной политике приостановлены"
 gbr_event_50_b_tt: "#V Во всех наших [Concept('concept_colony', 'колониях')], [Concept('concept_dominion', 'доминионах')], [Concept('concept_chartered_company', 'уставных компаниях')] и [Concept('concept_british_dominion', 'британских доминионах')] [concept_liberty_desire] снизится на 10, и они получат законодательный модификатор.#!"
 show_gbr_colonial_education_acts_tt: "#P Пример эффекта закона (в нашей стране не применяется):#!"
 gbr_event_50_c_tt: "#V Во всех наших [Concept('concept_colony', 'колониях')], [Concept('concept_dominion', 'доминионах')], [Concept('concept_chartered_company', 'уставных компаниях')] и [Concept('concept_british_dominion', 'британских доминионах')] [concept_liberty_desire] увеличится на 10!#!"
 gbr_event_50_e_tt: "#V Все наши [Concept('concept_colony', 'колонии')] и [Concept('concept_dominion', 'доминионы')] получат #O законодательный модификатор автономии#! и +25 к [Concept('concept_relations', 'отношениям')].#!"
 gbr_event_50_h_tt: "#V Все наши [Concept('concept_colony', 'колонии')] и [Concept('concept_dominion', 'доминионы')] получат #R законодательный модификатор, способствующий независимости#!, и +50 к [Concept('concept_relations', 'отношениям')].#!"
 uk_parliament_westminster_6_button: "Реорганизовать военный кабинет"
 uk_parliament_westminster_6_button_desc: "Тучи войны сгущаются над Британскими островами и всей Британской империей. Время имеет решающее значение, мы не можем сидеть сложа руки и смотреть, как враг готовится сжечь наши дома. Правительство должно быть немедленно реорганизовано, чтобы преодолеть партийные и территориальные разногласия и обеспечить сильное руководство в военное время."
 uk_parliament_westminster_6_button_effect_tt: "Премьер-министр реорганизует кабинет, создав межпартийный военный кабинет с участием наших заморских владений для противостояния [Concept('concept_war', 'войне')]."
 gbr_event_51_a_tt: "#V Во всех наших [Concept('concept_subject', 'субъектах')] [concept_liberty_desire] увеличится на 10, и они получат #R отрицательный военный модификатор.#!#!"
 gbr_event_51_b_tt: "#V Во всех наших [Concept('concept_subject', 'субъектах')] [concept_liberty_desire] снизится на 10, и они получат #P положительный военный модификатор.#!#!"
 uk_parliament_westminster_on_complete_tt: "#V Гнев сторонников идеологии [GetIdeology('ideology_royalist').GetName] почти наверняка приведёт нашу страну к [Concept('concept_civil_war', 'гражданской войне')]!#!"
 uk_parliament_westminster_on_fail_tt: "#V Гнев сторонников идеологии [GetIdeology('ideology_constitutionalist').GetName] почти наверняка приведёт нашу страну к [Concept('concept_civil_war', 'гражданской войне')]!#!"
 reset_westminster_state_of_british_isles_tt: "Перераспределить влияние провинций на места в парламенте."
 uk_parliament_westminster_7_button: "Приостановить дебаты по бюджету"
 uk_parliament_westminster_7_button_desc: "В силу определенных обстоятельств парламент вынужден приостановить бюджетные дебаты в текущем году вопреки желанию правительства."
 uk_parliament_westminster_7_button_possible_tt: "Идут дебаты по бюджету"
 uk_parliament_westminster_7_button_effect_tt: "Кабинет министров приостановит дебаты по бюджету, что повлечет за собой серьезные негативные последствия!"
 uk_parliament_westminster_8_button: "Приостановить дебаты о колониях"
 uk_parliament_westminster_8_button_desc: "В силу определенных обстоятельств парламент вынужден приостановить дебаты о колониальной политике в текущем году вопреки желанию правительства."
 uk_parliament_westminster_8_button_possible_tt: "Идут дебаты о колониальной политике"
 uk_parliament_westminster_8_button_effect_tt: "Кабинет министров приостановит дебаты о колониальной политике."
  #Английская гражданская война
 second_british_civil_war_display: "Волнения роялистов"
 second_british_civil_war_display_reason: "С момента #bold свержения [GetLawType('law_monarchy').GetName]#! и установления республики в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], страна погрузилась в невиданный доселе раскол. Хотя старый режим пал, #V ненависть и жажда мести сторонников идеологии [GetIdeology('ideology_royalist').GetName]#! всё ещё горит по всей стране. Многие [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], ранее верные короне, уже открыто выразили своё недовольство и даже тайно собирают силы, чтобы восстановить прежнюю [GetLawType('law_monarchy').GetName].\n\nВ предстоящие годы мы должны поддерживать #V твёрдый порядок и стабильность#!. #B Необходимо предотвратить тень [Concept('concept_civil_war', 'гражданской войны')], ибо только мир докажет, что новая республика — не эфемерное явление, подобное Протекторату#!. Будь то умиротворение и реформы, или подавление и суд, #yellow республика#! должна укрепить свои основы."
 second_british_civil_war_display_complete_tt: "#B [concept_revolution] не было в течение как минимум 5 лет#!"
 second_british_civil_war_display_goal: ""
 gbr_event_52_a_tt: "Сторонники идеологии [GetIdeology('ideology_royalist').GetName] не успокоятся. Готовьтесь к грядущей буре!"
 second_british_civil_war: "Английская гражданская война"
 second_british_civil_war_reason: "Заговор сторонников идеологии [GetIdeology('ideology_royalist').GetName] наконец вылился в пламя. #bold [concept_civil_war] охватила земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!. Дворяне, землевладельцы и защитники старого порядка, верные короне, объединились с разгневанными консерваторами и фанатичными церковными силами, подняв восстание в деревнях и городах под лозунгом #V «Да здравствует король!»#! против республики.\n\nРеспублика стоит на пороге гибели. Многие провинции за пределами столицы охвачены хаосом. Компромиссов больше нет: либо #yellow республика#! выдержит это испытание и полностью уничтожит остатки роялистов, либо колесо истории повернётся вспять, и [ROOT.GetCountry.GetNameNoFlag] вновь станет вассалом короны."
 second_parliament_civil_war_display: "Волнения сторонников парламента"
 second_parliament_civil_war_display_reason: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] восстановил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] священную традицию божественного права и абсолютизма, распустив нечестивый парламент. Страна вновь находится под властью [GetLawType('law_monarchy').GetName]. Однако #V сторонники идеологии [GetIdeology('ideology_constitutionalist').GetName], давно привыкшие к парламентскому правлению#!, не желают легко сдаваться. Многие [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] и [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], верные #O конституционализму#! и #O либерализму#!, уже открыто выразили своё недовольство и даже тайно собирают силы для восстановления парламентского правления.\n\n[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFirstName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен' )] #B поддерживать порядок силой#!, чтобы избежать [Concept('concept_civil_war', 'гражданской войны')] и доказать, что #V абсолютная монархия по-прежнему способна обеспечить стабильность и единство страны#!."
 second_parliament_civil_war_display_goal: ""
 second_parliament_civil_war: "Английская гражданская война"
 second_parliament_civil_war_reason: "Шумные протесты сторонников идеологии [GetIdeology('ideology_constitutionalist').GetName] наконец переросли в дым и пламя. #bold [concept_revolution] охватила земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!. Под лозунгом #V восстановления традиций#! они собрали армию мятежников. #v $clerks$#!, #v $shopkeepers$#!, #v $capitalists$#! и восставшие #v $laborers$#! в городах перешли на сторону мятежников. Многие регионы за пределами города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] охвачены хаосом.\n\nИ теперь #V судьба короны висит на волоске#!. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFirstName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен' )] призвать верных #v $soldiers_only_icon$ солдат#!, #v $aristocrats_only_icon$ аристократов#! и #v $clergymen_only_icon$ священнослужителей#! сплотиться под знаменем #yellow абсолютной монархии#!, чтобы #V полностью подавить это восстание и не допустить повторения истории Карла I в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]#!."
 gbr_event_53_a_tt: "Сторонники идеологии [GetIdeology('ideology_constitutionalist').GetName] не успокоятся. Готовьтесь к грядущей буре!"
 second_british_civil_war_complete_tt: "[concept_civil_war] завершился нашей победой."
  #Журнал парламентских реформ
 great_1867_parliament_reform: "Призыв к городскому избирательному праву"
 great_1867_parliament_reform_reason: "Со времён #bold Великой хартии вольностей#! и #bold Билля о правах#! парламентская система всегда была основой политики [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако с ростом городов и миграцией населения, вызванными #V промышленной революцией#!, старая [Concept('concept_election', 'избирательная система')] даёт трещины: #B «гнилые местечки» по-прежнему имеют места в парламенте, в то время как жители новых промышленных и торговых городов лишены должного представительства#!.\n\nТысячи представителей [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] вносят свой вклад в [concept_wealth] и [concept_taxes] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], но не имеют голоса в парламенте. Этот дисбаланс уже привёл к постоянным петициям и митингам. #B Городские жители требуют, чтобы их голос был услышан в #O Вестминстере#!#!.\n\n#B Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества должно провести реформу, иначе #V народ сам возьмёт в руки избирательные бюллетени#!#!."
 great_1918_parliament_reform: "Призыв к всеобщему избирательному праву"
 great_1918_parliament_reform_reason: "Несмотря на несколько реформ, #B большое число граждан по-прежнему лишено права голоса#!. Бесчисленные #v $laborers$#!, #v $soldiers$#! и #v $farmers$#! всё ещё не могут выразить свою волю через выборы в #B #O Вестминстере#!#!. #B Это неравенство порождает новые петиции и митинги по всей стране, требующие всеобщего [Concept('concept_election', 'избирательного')] права#! и признания политического статуса каждого взрослого гражданина.\n\nПравительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества должно откликнуться на этот призыв: #V если новый акт о реформе не будет принят, вакуум избирательных прав будет в конечном итоге заполнен протестами и насилием#!."
 great_1922_parliament_reform: "Призыв к равному избирательному праву"
 great_1922_parliament_reform_reason: "Хотя [ROOT.GetCountry.GetNameNoFlag] провела множество реформ и уступок, предоставив избирательные права широким слоям населения, этот закон, [GetLawType('law_universal_suffrage').GetName], #B всё ещё не является полным#!: #V половина населения страны — женщины — по-прежнему не включена в списки избирателей#!.\n\nС ускорением урбанизации и ростом экономики, [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] также нуждаются в том, чтобы женщины, ранее считавшиеся лишь собственностью, стали новой рабочей силой на фабриках. Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества должно откликнуться на призывы народа, признать политический статус женщин и создать поистине равную [Concept('concept_election', 'избирательную систему')]."
 new_act_influence_mps_tt: "#V Это приведёт к изменению распределения мест в Вестминстере: [concept_westminster_england], [concept_westminster_wales], [concept_westminster_scotland] и [concept_westminster_ireland].#!"
  #Хлебные законы
 gbr_corn_law: "Хлебные законы"
 gbr_corn_law_reason: "Со времён #V Наполеоновских войн#! система [GetLawType('law_protectionism').GetName], представленная #O Хлебными законами#!, была основой экономической системы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Она защищала отечественное производство @grain!#V зерна#! высокими [Concept('concept_tariffs', 'тарифами')], обеспечивая доходы наших верных [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и поддерживая сильные позиции сельского хозяйства в нашей экономике.\n\nОднако новая ситуация, вызванная #B промышленной революцией#!, делает #O Хлебные законы#! предметом споров. Рост городского населения привёл к резкому повышению [Concept('concept_market_price', 'цен')] на @grain!#V зерно#!. #v $laborers$#!, #v $shopkeepers$#! и [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] требуют отмены защитных [Concept('concept_tariffs', 'пошлин')] для импорта дешёвого @grain!#B зерна#!, что высвободит больше инвестиций для их коммерческих империй.\n\nНо за #O Хлебными законами#! стоят интересы наших #v $aristocrats_only_icon$ аристократов#! и #v $farmers_only_icon$ фермеров#!. #B Споров уже не избежать.#!#G Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества должно сделать выбор между двумя путями#!."
 gbr_corn_law_on_complete_tt: "Мы перейдём к лучшей политике — #yellow свободной торговле#!."
 gbr_corn_law_on_fail_tt: "Мы вернёмся к #yellow меркантилизму#! прошлого века."
 gbr_event_58_a_tt: "#V Все наши [Concept('concept_subject', 'субъекты')] получат +10 к [Concept('concept_liberty_desire', 'желанию свободы')] и модификатор #U «Навигационный акт».#!#!"
  #Стандарт двух держав
 rn_naval_defence_act: "Акт о морской обороне"
 rn_naval_defence_act_reason: "Со времён #bold Трафальгарского сражения#! [ROOT.GetCountry.GetNameNoFlag] удерживает морскую гегемонию благодаря превосходству #U Королевского флота#!. Однако сегодня это преимущество находится под угрозой: #B новые [Concept('concept_great_power', 'великие державы')] во главе с [SCOPE.sCountry('navy_size_scope').GetNameNoFlag] активно наращивают свои военно-морские силы и достигают технологических успехов#!, в результате чего размер и боеспособность их [Concept('concept_fleet', 'флотов')] #B постепенно приближаются к нашему уровню#!.\n\nМы должны обеспечить безопасность и свободу #V морских путей#!, от которых зависит #yellow Британская империя#!. Будь то [concept_convoys] в Индийском океане или [Concept('concept_colony', 'колонии')] в Тихом, все они нуждаются в нашем #B неоспоримом господстве на море#!. Если [ROOT.GetCountry.GetNameNoFlag] проявит малейшую слабость, вражеский [concept_fleet] может перерезать наши коммуникации с заморскими территориями, мгновенно изолировав метрополию.\n\n#O #B Вестминстер#!#! уже одобрил запрос [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]. Мы выделим беспрецедентные средства, увеличим численность наших моряков и расширим верфи, чтобы мощь #U Королевского флота#! оставалась непревзойдённой."
 rn_naval_defence_act_possible_tt: "#V Размер [Concept('concept_fleet', 'флота')] любой страны превышает 250#!"
 rn_naval_defence_act_complete: "Размер нашего [Concept('concept_fleet', 'флота')] как минимум равен:\n· Двойному размеру 2-го по величине [Concept('concept_fleet', 'флота')] в мире\n· Сумме 2-го и 3-го по величине [Concept('concept_fleet', 'флотов')] в мире"
 rn_naval_defence_act_on_complete_tt: "Мы проведём величайший в истории военно-морской парад и пригласим на него все страны мира!"
 rn_naval_defence_act_immediate_tt: "Каждый подходящий порт получит модификатор #V «Военно-морская база Королевского флота»#!, пример эффекта ниже:"
 sms_deutsch_hochseeflotte_immediate_tt: "Каждый подходящий порт получит модификатор #V «Военно-морская база Флота открытого моря»#!, пример эффекта ниже:"
 ijn_combined_fleet_shipbuilding_plan_immediate_tt: "Каждый подходящий порт получит модификатор #V «Военно-морская база Объединённого флота»#!, пример эффекта ниже:"
  #Исторические законы
 elementary_education_1870_act: "Обязательное образование в Великобритании"
 elementary_education_1870_act_reason: "Со времён #V эпохи Просвещения#! разум и знание считаются основой цивилизации. Однако в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] #B образование по-прежнему доступно лишь детям богачей или аристократов#!. Большинство детей не могут получить #B даже базовых навыков грамоты и счёта#!, их жизнь обречена на #V невежество и нищету#!.\n\nС развитием индустриализации и урбанизации растёт потребность общества в образованных рабочих и гражданах: #V неграмотный народ не может понимать законы, участвовать в рыночной экономике и защищать родину#!. В этих условиях всё громче звучат призывы к созданию #B общенациональной системы образования#!.\n\nПравительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества [ROOT.GetCountry.GetRuler.GetFirstName] должно откликнуться на этот призыв и #V дать каждому ребёнку возможность получить базовое образование#!."
 poor_law_act: "Законы о бедных"
 poor_law_act_reason: "Со времён принятия #V #tooltippable;tooltip:[GetPlayer.GetTooltipTag],poor_law_act_modifier_effects_tt $poor_law_act_je_modifier$#!#! система [GetLawType('law_poor_laws').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] основывалась на идеях [GetIdeology('ideology_malthusian').GetName]. Бедняки должны были поступать в #B работные дома, подобные тюрьмам#!, где в самых суровых условиях они могли получить лишь #B скудное пропитание#!. Хотя это и помогло побороть лень и иждивенчество, эта #V бесчеловечная система#! стала самым ненавистным законом #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! общества.\n\nНаши #B бедные граждане#! теряют в #R работных домах#! своё достоинство, #V их семьи разлучают, а с ними самими обращаются как с заключёнными#!. Однако реформа даётся нелегко: государственная казна пуста, и отмена [GetLawType('law_poor_laws').GetName] и создание новой #G системы социального обеспечения#! потребуют больших [Concept('concept_money', 'денежных')] вливаний. Кроме того, сопротивление [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] станет #B серьёзным препятствием#!.\n\n#B Возможно, [GetLawType('law_poor_laws').GetName] уже устарел, а может, он — именно то, что нужно [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]?#!"
 poor_law_act_modifier_effects_tt: "[GetStaticModifier('poor_law_act_je_modifier').GetName|v]\n[GetStaticModifier('poor_law_act_je_modifier').GetDesc]"
 poor_law_act_status: "#B Идеология [GetIdeology('ideology_malthusian').GetName] доминирует в законе [GetLawType('law_poor_laws').GetName]#!"
 poor_law_act_complete_tt: "Представлен удовлетворительный отчёт о расследовании в работных домах."
 national_insurance_1911_act_button: "Создать Комитет по помощи безработным"
 national_insurance_1911_act_button_desc: "Уровень бедности в Англии и Уэльсе остаётся высоким, особенно в военное время. Мы должны создать систему социального обеспечения, основанную на проверке нуждаемости, чтобы увеличить число людей, имеющих право на пособие."
 national_insurance_1911_act_button_effect_tt: "Мы создадим новый орган, который возьмёт на себя часть функций работных домов."
 poor_law_act_button: "Пересмотреть состояние работных домов"
 poor_law_act_button_desc: "Законы о бедных давно подвергаются критике. Учитывая недовольство народа существующей системой, парламент обязан создать специальный комитет для оценки истинного положения дел в работных домах Британии."
 poor_law_act_button_effect_tt: "Мы начнём расследование в работных домах по всей Великобритании, чтобы определить, соответствуют ли они желаемому уровню помощи."
 national_insurance_1911_act_button_possible_tt: "Комитет по помощи безработным ещё не создан."
 poor_law_act_possible_tt: "В данный момент расследование в работных домах не проводится."
 check_the_poor_law_act: "Расследование в работных домах"
 check_the_poor_law_act_reason: "Закон [GetLawType('law_poor_laws').GetName] с момента его принятия стал предметом общенациональных споров. Сегодня #B голоса протеста с улиц и фабрик уже невозможно игнорировать#!. В этой ситуации парламент решил создать #V специальный комитет#! для тщательного расследования реального положения дел с [GetLawType('law_poor_laws').GetName] по всей стране.\n\nЧлены комитета войдут в эти холодные учреждения, изучат бухгалтерские книги, выслушают показания [Concept('concept_lower_strata', 'низшего класса')]. Им предстоит столкнуться с #B нищетой, болезнями и стенами молчания#!. Хотя выводы не предопределены, можно с уверенностью сказать, что #B это расследование определит будущее [GetLawType('law_poor_laws').GetName]#!. Но как долго он сможет просуществовать под таким пристальным вниманием?"
 check_the_poor_law_act_complete_tt: "Индикатор достигнет 100, и Уайтхолл успешно завершит отчёт о расследовании."
 check_the_poor_law_act_on_complete_tt: "Полный отчёт будет способствовать продвижению парламентской законодательной процедуры по #V социальному обеспечению#!."
 check_the_poor_law_act_progress_bar: "Расследование в работных домах"
 check_the_poor_law_act_progress_bar_desc: "Прогресс расследования: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)"
 check_the_poor_law_act_progress_bar_1_tt: "Интеллигенция у [Concept('in_government', 'власти')]"
 check_the_poor_law_act_progress_bar_2_tt: "[Concept('powerful', 'Влияние')] интеллигенции [Concept('powerful', 'могущественное')]"
 check_the_poor_law_act_progress_bar_3_tt: "Профсоюзы у [Concept('in_government', 'власти')]"
 check_the_poor_law_act_progress_bar_4_tt: "[Concept('powerful', 'Влияние')] профсоюзов [Concept('powerful', 'могущественное')]"
 check_the_poor_law_act_progress_bar_5_tt: "Промышленники у [Concept('in_government', 'власти')]"
 check_the_poor_law_act_progress_bar_6_tt: "[Concept('powerful', 'Влияние')] промышленников [Concept('powerful', 'могущественное')]"
 check_the_poor_law_act_progress_bar_7_tt: "Бюрократический ресурс не менее 1000"
 check_the_poor_law_act_progress_bar_8_tt: "Англиканская церковь у [Concept('in_government', 'власти')]"
 check_the_poor_law_act_progress_bar_9_tt: "[Concept('powerful', 'Влиятельные')] мелкие буржуа у [Concept('in_government', 'власти')]"
 check_the_poor_law_act_progress_bar_10_tt: "Активность рабочего или социалистического движения не менее 30"
  #Трудовое законодательство
 workmen_compensation_1897_act: "Призыв к трудовому законодательству"
 workmen_compensation_1897_act_reason: "Рабочие в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] устали от #R ужасных условий труда#!. #B Они вынуждены работать с раннего утра до поздней ночи у грохочущих станков, вдыхая воздух, наполненный угольной пылью и металлической стружкой. В глубоких, сырых и тёмных шахтах обвалы и взрывы уносят жизни многих #v $laborers_only_icon$ рабочих#!. Рабочие не получают ни отдыха, ни защиты, их жизнь — это #V усталость, опасность и болезни#!.\n\n#v $laborers$#! заявляют, что наши [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] контролируют [concept_government], узаконивая свой грабёж, в то время как #B те, кто трудится больше всех и производит больше всех, получают меньше всех#!. Поэтому они, в сотрудничестве с группой [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], начали общенациональное #V забастовочное движение#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nПравительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества [ROOT.GetCountry.GetRuler.GetFirstName] должно провести серьёзные переговоры с [Concept('concept_leader', 'лидером')] группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], чтобы #V как можно скорее положить конец этому [Concept('concept_political_movement', 'политическому движению')], наносящему серьёзный ущерб экономическому росту #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! страны#!."
 common_labor_laws: "Призыв к трудовому законодательству"
 common_labor_laws_reason: "Рабочие в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] устали от #R ужасных условий труда#!. #B Они вынуждены работать с раннего утра до поздней ночи у грохочущих станков, вдыхая воздух, наполненный угольной пылью и металлической стружкой. В глубоких, сырых и тёмных шахтах обвалы и взрывы уносят жизни многих #v $laborers_only_icon$ рабочих#!. Рабочие не получают ни отдыха, ни защиты, их жизнь — это #V усталость, опасность и болезни#!.\n\n#v $laborers$#! заявляют, что наши [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] контролируют [concept_government], узаконивая свой грабёж, в то время как #B те, кто трудится больше всех и производит больше всех, получают меньше всех#!. Поэтому они, в сотрудничестве с группой [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], начали общенациональное #V забастовочное движение#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nМы должны провести серьёзные переговоры с [Concept('concept_leader', 'лидером')] группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName], чтобы #V как можно скорее положить конец этому [Concept('concept_political_movement', 'политическому движению')], наносящему серьёзный ущерб экономическому росту #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! страны#!."
 common_labor_laws_1_button: "Подавить рабочее движение"
 common_labor_laws_1_button_desc: "Рабочее движение набирает обороты. Очевидно, это заговор коммунистов, пытающихся свергнуть наше правительство. Мы должны остановить этих бунтовщиков силой!"
 common_labor_laws_2_button: "Поддержать рабочее движение"
 common_labor_laws_2_button_desc: "Обязанность правительства — достижение социальной справедливости. В этом вопросе мы должны поддержать требования рабочих."
 common_labor_laws_status: "#R Протесты с требованием принятия [GetLawType('law_worker_protections').GetName] охватили всю страну#!"
 great_railroad_strike: "Великая забастовка железнодорожников"
 great_railroad_strike_reason: "В ответ на призыв группы [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] к [Concept('concept_political_movement', 'политическому движению')] за трудовое законодательство, железнодорожники [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] организовали беспрецедентную #V общенациональную забастовку#!.\n\nОстановка #yellow железных дорог#! #B нанесла серьёзный удар по экономическим связям всей страны#!. Мы должны #V принять меры, чтобы вернуть этих железнодорожников к работе#!."
 great_railroad_strike_complete_tt: "Ждать, пока забастовка закончится сама собой."
  #Чартистское движение
 chartism_movement: "Чартистское движение"
 chartism_movement_reason: "Распространение #V Народной хартии#! привело к серьёзному [Concept('concept_political_movement', 'политическому движению')], охватившему всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. От #v $laborers_only_icon$ рабочих#! на фабриках до #v $clerks_only_icon$ служащих#! на улицах, протестующие по всему архипелагу скандируют: #B «Свобода, равенство, братство!»#!.\n\nОднако в #B #O Вестминстере#!#! и [Concept('concept_government', 'правительстве')] эти требования считают опасными. #I Палата лордов#! заявляет, что это разрушит порядок в стране и приведёт к бесконечным беспорядкам. #G Палата общин#! опасается, что поспешные реформы приведут к краху [Concept('concept_government', 'правительства')]. В то же время, среди #v $laborers_only_icon$ рабочих#! нет единства: одни настаивают на #B мирных петициях#!, другие склоняются к #B радикализму и насилию#!, пытаясь с помощью [Concept('concept_turmoil', 'беспорядков')] #V заставить парламент пойти на уступки#!.\n\nКак бы то ни было, #V правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества должно принять меры, чтобы пережить эту опасную бурю.#!"
