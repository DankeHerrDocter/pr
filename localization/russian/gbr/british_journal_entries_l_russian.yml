  #Завоевание Египта
 conqueror_egypt: "Завоевание Египта"
 conqueror_egypt_reason: "«Успешное правление в Египте, без сомнения, будет нам выгодно, поскольку оно соответствует нашим ближайшим целям: ослаблению исламистов и поражению и уходу [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] из Северной Африки».\n«В нынешней ситуации государство, созданное #bold Мухаммедом Али#! на руинах турецкого владычества, будет угрожать положению [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Средиземноморье и Индии... а также влиять на свободу нашей торговли. Для нас эти арабы даже #bold более нестабильны, чем турки...#! Однако, при правильном подходе, мы можем воспользоваться тем, что многие страны претендуют на эти земли, и #bold нанести удар первыми, захватив их#!, и поставив египетского султана под защиту Лондона, превратив его государство в фикцию, в набор разрозненных наместничеств, более не представляющих угрозы для империи».\n\nЕгипет — #bold важный узел, связывающий Средиземное и Красное моря#!. Слабый режим [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')] ошибочно правит здесь, а [SCOPE.sCountry('TUR_scope').GetNameNoFlag] на севере с вожделением смотрит на эти земли, претендуя на них по праву, что просто смехотворно.\n\nМы должны исправить эту ошибку и включить весь Египет в состав владений [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 conqueror_egypt_tt: "Географическое положение Египта принесёт значительные выгоды нашей глобальной империи."
 conqueror_egypt_status: "Включить Суэц и Египет в состав наших средиземноморских активов."
  #От Каира до Кейптауна
 conqueror_aferica: "От Каира до Кейптауна"
 conqueror_aferica_reason: "«Мистер Родс заявил, что намерен с помощью друзей или в одиночку продолжить путь на север от #bold Претории#!, пересечь Замбези, пройти через Ньясаленд, вдоль озера Танганьика до Уганды. И это ещё не всё... это великое путешествие означает, что ему придётся пересечь Судан... и завершить сухопутное сообщение от Кейптауна до Каира; то есть, в будущем включить все эти территории в состав африканских владений [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]».\n\nПосле того как империя укрепила свои позиции в Южной Африке, #bold доктор Родс#!, алмазный магнат и выпускник Оксфорда, представил Уайтхоллу грандиозный план: #bold продольное завоевание всех африканских территорий от Египта до Южной Африки#!, чтобы соединить воедино активы Британской империи на Тёмном континенте.\n\nБез сомнения, этот план чрезвычайно сложен. Нам предстоит столкнуться не только с восстаниями местных туземцев, но и с #bold великими державами#!, которые также претендуют на эти земли. Однако, если он осуществится, это обеспечит самую прочную гарантию интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]..."
 conqueror_aferica_tt: "Завершена [concept_journal_entry] #bold «Завоевание Египта»#!."
 conqueror_aferica_status: "Соединить британские владения на Тёмном континенте в единое целое."
