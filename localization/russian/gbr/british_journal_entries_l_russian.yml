  #Железнодорожная лихорадка
 railway_mania: "Железнодорожная лихорадка"
 railway_mania_reason: "[ROOT.GetCountry.GetNameNoFlag] — родина #O железных дорог#!. Первая в мире настоящая междугородняя железная дорога, #V Ливерпуль — Манчестер#!, была открыта на #yellow Британских островах#! в 1830 году и доказала свою успешность как в пассажирских, так и в грузовых перевозках. Хотя экономический спад несколько лет назад временно ослабил наш энтузиазм в строительстве железных дорог, с недавним #B возобновлением роста промышленности и снижением [Concept('concept_budget_interest', 'процентных ставок')]#!, акции #O железнодорожных [Concept('concept_company', 'компаний')]#! снова начали расти: #B количество перевозимых ими грузов и пассажиров постоянно увеличивается, и люди всё охотнее инвестируют в новые железные дороги.#!\n\nВ то же время, [Concept('concept_reinvestment', 'реинвестиции')] в коммерцию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] также растут: #V промышленная революция#! создала новый и всё более богатый [Concept('concept_middle_strata', 'средний класс')]. Любой может инвестировать в новые [Concept('concept_company', 'компании')], особенно в #O железные дороги#! — #B это кажется беспроигрышным вложением#!.\n\nЭто #B великая и славная эпоха#! для нас. Давайте активно инвестировать в инфраструктуру #yellow Британских островов#! и #V превратим наш внутренний [Concept('concept_market', 'рынок')] в единое целое!#!"
 railway_mania_fail_tt: "Индикатор достигнет 120, и железнодорожный пузырь лопнет."
 railway_mania_status: "#B Радужные перспективы привлекают людей к безумным инвестициям в расширение железных дорог#!"
 railway_mania_british_state_tt: "Является национальной областью английской культуры."
 railway_mania_british_complete_state_tt: "Является национальной областью английской, шотландской или ирландской культуры."
 railway_mania_crisis_event_tt: "#R Крах железнодорожной лихорадки вызовет панику на фондовом рынке по всей стране и спровоцирует мировой финансовый кризис!#!"
 railway_mania_immediate_tt: "Во всех странах, где есть железные дороги, начнётся железнодорожный бум со следующими эффектами:"
 railway_mania_possible_tt: "Акции железнодорожных компаний процветают."
