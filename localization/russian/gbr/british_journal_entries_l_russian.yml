  #Индустриализация Англии
 england_industrialize: "Промышленная революция в Англии"
 england_industrialize_reason: "#bold Века колониальной экспансии и заморской торговли#! подготовили почву для накопления богатств [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. В то время как [SCOPE.sCountry('FRA_scope').GetNameNoFlag] тратила свои средства на содержание дорогостоящей [Concept('concept_army', 'армии')] и придворные развлечения, а [SCOPE.sCountry('SPA_scope').GetNameNoFlag] глупо покупала дешёвые товары, мы сосредоточились на инвестициях в производство, что в итоге привело к нынешней #variable грандиозной промышленной революции#!.\n\n#bold Изобретение паровой машины в 1769 году#! решило проблему с энергией в промышленности. С тех пор, имея [SCOPE.sGoods('coal_scope').GetName] в качестве топлива, мы можем приводить в движение паровые машины. #bold Изобретение железной дороги Стефенсоном в 1825 году#! стало мостом, соединившим [Concept('concept_market', 'рынки')] всей страны. В результате бесчисленные [Concept('concept_building', 'здания')] стали появляться в любом подходящем месте, больше не завися от рек и транспорта. Богатые запасы [SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] стали катализатором нашего промышленного развития. Пусть наши высокие трубы извергают клубы дыма, а огромные цеха гудят, положив конец многовековой сельской идиллии средневековья.\n\nБурное развитие промышленной революции коренным образом меняет облик Англии. Давайте увеличим все возможные инвестиции в развитие промышленности и превратим [ROOT.GetCountry.GetNameNoFlag] в первую индустриальную [Concept('concept_country', 'страну')] в мире!"
 england_industrialize_status: "Превратить Англию в первый промышленный регион мира."
 scotland_industrialize: "Индустриализация Шотландии"
 scotland_industrialize_reason: "Шкала отображает текущий прогресс #V дноуглубительных работ#! на Верхнем Клайде.\n\n#yellow Шотландия#! — одна из важнейших частей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако темпы индустриализации здесь отстают от многих других наших регионов. Хотя #B Глазго#! занимает выгодное положение как порт, ориентированный на Америку, и некогда процветал благодаря торговле [SCOPE.sGoods('fabric_scope').GetCustom('RU_GL_TP')] и [SCOPE.sGoods('tobacco_scope').GetCustom('RU_GL_TP')], вскоре возникли препятствия для дальнейшего роста. Река #blue #B #L Клайд#!#!#! мелководна, и крупные океанские суда не могут войти в неё, поэтому грузы приходится перегружать на малые суда в Гриноке. #B Скалистый ландшафт нагорья и долин#! препятствует развитию транспорта и коммерции, из-за чего некогда процветающая #yellow Шотландия#! пришла в упадок.\n\nПроцветание и славу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], безусловно, следует разделить с нашими северными #tooltippable_name [GetCulture('scottish').GetCustom('RU_CUL_ADJ_scottish')|l]ими#! братьями. Наши #v $engineers$#! предлагают провести масштабные дноуглубительные работы на реке #blue #B #L Клайд#!#!#!, убрать миллионы кубических футов ила и взорвать огромную #v скалу Элдерсли#! в устье, чтобы углубить и расширить русло. Это раскроет огромный потенциал, скрытый в богатых залежах [SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')] в шотландских долинах. Если план удастся, #blue #B #L Клайд#!#!#! станет #b одним из величайших центров судостроения и производства в мире#!."
 finish_scotland_industrialize_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Индустриализация Шотландии»#!"
 scotland_industrialize_status: "Превращение устья Клайда и богатой ресурсами Шотландии в промышленный центр"
 scotland_industrialize_complete_tt: "Успешно проведены #V дноуглубительные работы на Верхнем Клайде#! и выполнено решение #V «Объявить об открытии канала Гринок — Глазго»#!"
 scotland_industrialize_1_button: "Начать дноуглубительные работы на Верхнем Клайде"
 scotland_industrialize_1_button_desc: "Ещё в 1768 году наши инженеры пытались расчистить отмели и щебень Верхнего Клайда, а отчёт Джеймса Уатта 1769 года побудил построить волнорезы, чтобы перекрыть южный фарватер и объединить два мелководных канала у отмели Дамбак. Но, как показала практика, этого оказалось недостаточно.\n\nОднако сегодня эти проблемы больше не являются неразрешимыми! Технический прогресс позволяет нам использовать мощь динамита и стали, чтобы заставить реку изменить русло, уничтожить все валуны и песок, преграждающие путь, и углубить канал. Пусть природа склонится перед народом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а этот проект станет свидетельством великой силы нашей промышленности и науки!"
 scotland_industrialize_1_button_tt: "Ещё не выполнено решение #V «Объявить об открытии канала Гринок — Глазго»#!"
 scotland_industrialize_2_button: "Объявить об открытии канала Гринок — Глазго"
 scotland_industrialize_2_button_desc: "Промышленность Глазго процветает, так воспользуемся же моментом, чтобы объявить о великом успехе дноуглубительных работ и вновь открыть судоходный путь по Клайду между Гриноком и Глазго! Несомненно, это побудит наших судостроительных гигантов быстро обосноваться в этом благодатном месте — в новом рукотворном устье Клайда!"
 scotland_industrialize_2_button_tt: "#V Прогресс дноуглубительных работ#! достиг 60"
  #Вторая волна контента
 rebuild_westminster: "Восстановление резиденции Парламента"
 rebuild_westminster_reason: "#V Пожар 1834 года#! уничтожил большую часть #B старого Вестминстерского дворца#!, оставив лишь руины и пепел. Однако наши верные парламентарии продолжают дебаты и законодательную деятельность во временных залах.\n\nКак символ парламентского суверенитета [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], наш парламент не может оставаться в таком плачевном состоянии. Мы #B должны возвести новый Парламентский дворец, достойный славы, которой наслаждается #yellow Британия#!. Согласно проекту #V сэра Чарльза Бэрри#!, новое здание будет выполнено в модном #V неоготическом стиле#! и возвысится на берегу Темзы.\n\nОднако это лишь начало долгого пути: #B затраты и время станут огромным бременем#!. Но для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] это мелочи, не так ли?"
 rebuild_westminster_goal: ""
 rebuild_westminster_complete_tt: "Строительные работы завершены."
 rebuild_westminster_button: "Утвердить план реконструкции"
 rebuild_westminster_button_desc: "План реконструкции, представленный сэром Чарльзом Бэрри, уже получил одобрение парламентариев. Нам остаётся лишь начать выделение средств в соответствии с его требованиями. Мы уверены, что он подарит Британии новый, невиданно величественный Парламентский дворец!"
 rebuild_westminster_button_possible_tt: "План реконструкции ещё не утверждён."
 rebuild_westminster_button_effect_tt: "Мы утвердим план реконструкции и начнём работы, что позволит индикатору прогресса расти на 1 пункт каждый месяц."
 rebuild_westminster_event_1_tt: "Это уменьшит прогресс реконструкции на 10."
 rebuild_westminster_event_2_tt: "Это увеличит прогресс реконструкции на 10."
 event_effects_joi_flavor_gbr.44_tt: "Добавить в #yellow #B окрестностях Лондона#!#! модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rebuild_westminster_modifier_effects_tt $new_westminster_palace_modifier$#!."
