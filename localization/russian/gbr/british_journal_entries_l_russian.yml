 ireland_food_problem_reason: "Хотя #variable Акт об эмансипации католиков 1829 года#! отменил политику [Concept('concept_religion', 'религиозной')] [concept_discrimination] в отношении ирландцев, большинство католиков в Ирландии по-прежнему живут в нищете и выживают за счёт #bold выращивания картофеля#!.\n\nК сожалению, наши ирландские переписчики обнаружили, что #bold с 1821 года#! в Ирландии мог распространиться #bold новый вид патогена#!, вызывающий #bold периодические неурожаи картофеля#!. В частности, в 1834 году в Северной Ирландии были выявлены сухая гниль и скручивание листьев, что привело к серьёзному сокращению урожая. Всё это доказывает, что картофель — #bold ненадёжный источник пищи#!. Если в будущем случится голод, #v $peasants$#! Ирландии могут оказаться на грани вымирания.\n\n#R Мы должны заблаговременно подготовиться, чтобы обеспечить Ирландию достаточным количеством продовольствия для преодоления возможной угрозы#!."
 ireland_food_problem_1_tt: "Это позволит Ирландии быть готовой к неурожаю!\nЕсли кризис голода будет преодолён, у Ирландии появится шанс #bold по-настоящему интегрироваться в Соединённое Королевство.#!"
 ireland_food_problem_2_tt: "Это оставит Ирландию беззащитной перед неурожаем!\nЕсли разразится голод, это может #bold привести к серьёзным волнениям в будущем.#!"
