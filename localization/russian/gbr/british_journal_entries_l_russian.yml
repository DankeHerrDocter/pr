 imperial_preference_raj_button: "Договариваться с Индией"
 imperial_preference_raj_button_desc: "Хотя Индия и является нашей колонией, её роль в империи очень важна. Она принимает товары, произведённые в других частях империи, и поставляет сырьё. Мы должны принять меры для обеспечения тесных импортно-экспортных отношений, избегая разрыва связей, а также учитывать экономические интересы индийцев."
