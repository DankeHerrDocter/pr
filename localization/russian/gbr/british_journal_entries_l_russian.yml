  #Англо-американские особые отношения
 anglo_american_special_relationship: "Англо-американские особые отношения"
 anglo_american_special_relationship_status: "#bold #U Кровные узы — основа сотрудничества между Британией и Америкой.#!#!"
 anglo_american_special_relationship_reason: "С тех пор как наши тринадцать колоний обрели независимость и стали [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_TP')], отношения между [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] и [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_TP')] были весьма сложными. Хотя в прошлом между нашими странами было много соперничества, благодаря #variable великому сближению в англо-американском союзе#! всё это осталось в прошлом. Сегодня мы тесно сотрудничаем в торговле, экономике, науке и других областях, что и создало наши нынешние тёплые и дружеские особые отношения.\n\nОднако в этом изменчивом мире можно доверять только #bold самым близким и надёжным узам на свете#!: #bold обе наши страны разделяют одну веру, одну [Concept('concept_culture', 'культуру')], общих предков, мы — естественные союзники#!. Наши народы объединены необычайным союзом мыслей и целей, что делает наши отношения поистине исключительными. Поэтому мы будем стоять вместе, как сказал генерал #bold Джозайя Тэттнэлл#!:\n\n#variable Кровь гуще воды!#!"
 has_usa_gbr_treaty: "Наши страны подписали дружественный Орегонский договор."
 anglo_investment_1_button: "Увеличить инвестиции в США"
 anglo_investment_1_button_desc: "[SCOPE.sCountry('USA_scope').GetNameNoFlag] доказала, что является чрезвычайно ценной землёй. Наши промышленники уверены, что если вложить часть средств в местную экономику, это не только поможет их развитию, но и в будущем принесёт [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] значительную выгоду."
 anglo_investment_1_button_tt: "В течение 2 лет не было инвестиций в США или вывода средств оттуда.\nЭто добавит 25 инвестиционных очков."
 anglo_investment_2_button: "Запланировать вывод инвестиций из США"
 anglo_investment_2_button_desc: "Часть промышленников не верит в перспективы [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')]. Они убеждают правительство вывести часть инвестиций из страны и вернуть их на родину, утверждая, что только вложения в ценные активы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] могут принести стабильную прибыль."
 anglo_investment_2_button_tt: "В течение 5 лет не было вывода инвестиций из США или вложений в них, и имеется более 25 инвестиционных очков.\nЭто уменьшит инвестиционные очки на 25."
 anglo_help_1_button: "Запросить промышленную помощь у США"
 anglo_help_1_button_desc: "Наша промышленность столкнулась с некоторыми трудностями, в то время как у нашего союзника, [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')], дела в этой сфере идут довольно хорошо. Благодаря нашим активам в стране, [ROOT.GetCountry.GetNameNoFlag] имеет значительное влияние. Мы уверены, что убедить некоторых политиков и промышленников выделить нам часть промышленной помощи не составит труда."
 anglo_help_1_button_tt: "В течение 5 лет не запрашивалась промышленная или военная помощь у США, и имеется более 50 инвестиционных очков.\nЭто уменьшит инвестиционные очки на 50."
 anglo_help_2_button: "Запросить военную помощь у США"
 anglo_help_2_button_desc: "Наше военное производство не может обеспечить достаточное количество материалов для текущей войны, однако у нашего союзника, [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')], военные запасы весьма обильны. Они пообещали, что [ROOT.GetCountry.GetNameNoFlag] сможет арендовать значительное количество вооружений для ведения войны, продав лишь часть своих активов в стране для покрытия расходов."
 anglo_help_2_button_tt: "В течение 5 лет не запрашивалась военная или промышленная помощь у США, и имеется более 50 инвестиционных очков.\nЭто уменьшит инвестиционные очки на 50."
 anglo_help_3_button: "Запросить разработку «Закона о ленд-лизе»"
 anglo_help_3_button_desc: "Война достигла критической точки, наши враги одерживают на поле боя беспрецедентные победы, империя в опасности! Ради победы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на поле боя, даже ценой всех наших активов, мы должны немедленно обратиться к нашему близкому союзнику, [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_DP')], с просьбой разработать закон о ленд-лизе в нашу пользу!"
 anglo_help_3_button_tt: "Принятие «Закона о ленд-лизе» — дело непростое. Его можно запросить лишь раз в 25 лет, и для этого требуется 100 инвестиционных очков.\nЭто уменьшит инвестиционные очки на 100."
 anglo_american_special_relationship_tt: "Инвестиции в США позволят накапливать #bold инвестиционные очки#!, которые в определённый момент могут оказать нам необходимую помощь.\nВ неблагоприятные времена можно будет немедленно продать местные активы для получения немедленной выгоды.\nЕсли мы накопим достаточно инвестиций, мы сможем пожертвовать частью активов в обмен на значительную военную поддержку от США."
 anglo_american_special_relationship_2_tt: "#bold «Увеличить инвестиции в США»#! добавит нам 25 инвестиционных очков.\n#bold «Запланировать вывод инвестиций из США»#! уменьшит их на 25.\n#bold «Запросить промышленную помощь у США»#! или #bold «Запросить военную помощь у США»#! уменьшат их на 50.\n#bold «Запросить разработку „Закона о ленд-лизе“»#! потребует 100 инвестиционных очков и, помимо мощной поддержки, оставит после себя негативные последствия...\nТекущее количество инвестиционных очков показано на индикаторе прогресса."
 anglo_cash_1_button: "Запросить заём у США"
 anglo_cash_1_button_desc: "Наше финансовое положение оставляет желать лучшего. Чтобы стабилизировать государственный бюджет и избежать дефицита, возможно, мы могли бы получить от наших союзников «заём» без процентов — и даже без обязательства возврата... Однако Уолл-стрит вряд ли будет в восторге."
 anglo_cash_1_button_tt: "Однако американцы не обязательно согласятся...\nЗаём можно запрашивать раз в 5 лет."
 invest_in_us_1_tt: "#bold Получено 25 инвестиционных очков#!"
 invest_in_us_2_tt: "#bold Потеряно 25 инвестиционных очков#!"
 usa_refuse_relation: "Наша страна откажется от любезного предложения Великобритании, что лишит обе стороны возможности восстановить #bold особые англо-американские отношения#!!"
 usa_accpet_relation: "Наша страна примет любезное предложение Великобритании, что откроет для обеих сторон особые взаимодействия в рамках #bold особых англо-американских отношений#!."
 anglo_help_need_25_tt: "Требуется не менее 25 инвестиционных очков."
