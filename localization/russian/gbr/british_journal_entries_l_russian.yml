 amazing_trip_start_tt: "Путешествие #yellow цесаревича Александра#! начинается в Англии..."
 amazing_wedding_news_tt: "Эта новость, вероятно, потрясёт весь мир..."
 strange_wedding_1_tt: "#yellow Цесаревич Александр#! станет мужем королевы."
 amazing_wedding_rus_tt: "#yellow Цесаревич Александр#! вступит в брак с британской королевой, что значительно улучшит отношения между нашими странами.\nВторой сын Его Величества Царя, #yellow Великий князь Константин#!, станет новым наследником престола."
 amazing_wedding_none_tt: "Ничего не произошло. Цесаревич в ближайшее время покинет Англию."
 amazing_wedding_try_tt: "Мы спросим мнение англичан об этом браке. Если они согласятся, цесаревич вступит в брак с #yellow королевой Викторией#! и станет её супругом, что значительно улучшит наши отношения.\nОднако англичане могут и не согласиться. Если они откажутся, путешествие цесаревича продолжится."
 amazing_wedding_others_tt: "Русский царевич женился на британской королеве? Невероятное развитие событий..."
 alexander_visit_western_europe: "Визит Александра в Западную Европу"
 alexander_visit_western_europe_reason: "[concept_heir] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], [ROOT.GetCountry.GetHeir.GetPrimaryRoleTitle] [ROOT.GetCountry.GetHeir.GetFullName], совершает визит в страны Западной Европы, надеясь перенять опыт этих передовых [Concept('concept_great_power', 'великих держав')] и привезти его в столицу. Если он сможет завершить визит и вернуться на родину, [ROOT.GetCountry.GetHeir.GetFirstName] может стать #B более открытым и прогрессивным#!."
