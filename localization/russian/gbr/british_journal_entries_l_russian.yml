 has_imp_council_migrate_act_tt: "#bold Будет начата реализация имперской миграционной политики.#!"
 has_imp_council_army_act_tt: "В течение 10 лет не проводился призыв на военную службу."
 has_imp_council_conscription_act_tt: "#bold Начнётся призыв на военную службу по всей империи!#!"
