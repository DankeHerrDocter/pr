  #Ирландское восстание
 irish_rebellion: "Ирландское восстание"
 irish_rebellion_reason: "Хотя Ирландия всегда была ближайшим соседом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], в #yellow Соединённом Королевстве#! она долгое время рассматривалась почти как [concept_colony]. Воспоминания о прошлом голоде и рост национализма в сочетании с недавней напряжённостью в Ирландии привели к тому, что ирландцы объявили о независимости и восстали против нашего правления. Нельзя уступать, мы должны воспользоваться этой возможностью, чтобы #bold устранить этого врага у нашего порога!#!"
