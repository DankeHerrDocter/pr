 create_fascist_leader_during_crisis_tt: "Лидером [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] станет сторонник идеологии [GetIdeology('ideology_fascist').GetName]."
  #Из Англии группа товарищей
 her_majestys_government_complete_tt: "В [ROOT.GetCountry.GetNameNoFlag] #B не#! принят закон [GetLawType('law_monarchy').GetName]."
 event_effects_joi_flavor_gbr.92_tt: "Сторонники идеологии [GetIdeology('ideology_communist').GetName] быстро захватят метрополию, но [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вместе с #B #U Королевским флотом#!#! эвакуируется в заморские имперские территории, #B заставив вас выбирать: остаться на #R Британских островах#! или #P отправиться за границу.#!#!"
 royal_navy_run_event_1_tt: "Верный короне Королевский флот эвакуирует правителя, членов королевской семьи и лояльных правительственных чиновников и офицеров в нашу верную Канаду, но метрополия временно окажется в руках красных бандитов..."
 royal_navy_run_event_2_tt: "Верный короне Королевский флот эвакуирует правителя, членов королевской семьи и лояльных правительственных чиновников и офицеров в нашу верную Австралию, но метрополия временно окажется в руках красных бандитов..."
 royal_navy_run_event_3_tt: "Верный короне Королевский флот эвакуирует правителя, членов королевской семьи и лояльных правительственных чиновников и офицеров в нашу верную Британскую Индию, но метрополия временно окажется в руках красных бандитов..."
 royal_navy_run_event_4_tt: "Верный короне Королевский флот немедленно эвакуирует правителя, членов королевской семьи и лояльных правительственных чиновников и офицеров, но метрополия временно окажется в руках красных бандитов..."
 royal_navy_run_event_0_tt: "Верный старой королевской семье флот поможет им бежать в заморские колонии."
 royal_navy_je_fail_tt: "[concept_journal_entry] #U «Королевский флот»#! будет #R провалена#! из-за бегства флота."
 long_way_to_home: "Долгий путь домой"
 long_way_to_home_reason: "#B Корона пала в Лондоне, и теперь банды сторонников идеологии [GetIdeology('ideology_communist').GetName] разрушили порядок и традиции нашей родины#!. Пламя и красные флаги охватили #yellow Великобританию#!, а [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFirstName] и верные парламентарии были вынуждены бежать через океан под защитой #V Королевского флота#! в лояльные имперские территории.\n\nОднако, даже если большие участки метрополии и многие древние и знаменитые города попали в руки бандитов-коммунистов и под их диктатуру, со всеми её отвратительными институтами, мы не ослабнем и не потерпим поражения. Наша заморская империя, вооружённая и охраняемая #U Королевским флотом#!, продолжает борьбу.\n\nС растущей уверенностью и силой мы будем копить силы для возвращения на родину. Мы вернём нашу [Concept('concept_homeland', 'родину')] любой ценой!"
 long_way_to_home_button: "Готовиться к возвращению домой"
 long_way_to_home_button_desc: "Красные бандиты на родине ослабли и погрязли во внутренних распрях. Мы должны собрать мощные силы и подготовиться к величайшей в истории человечества десантной операции, чтобы изгнать коммунистов из нашего дома и вернуть нашу родину!"
 long_way_to_home_status: "#G #B Мы должны отвоевать нашу родину у коммунистических банд!#!#!"
  #Викторианская мораль
 victorian_morality: "Викторианская мораль"
 victorian_morality_reason: "#yellow Коронация [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]#! знаменует новую эру процветания для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако, несмотря на то, что рост городов и гул фабрик принесли резкое увеличение [Concept('concept_wealth', 'богатства')], это также привело к #B социальному беспокойству, моральному упадку#! и #B отходу от традиционной [Concept('concept_religion', 'религиозной')] этики#! нашей страны.\n\nПроцветают #B #V пьянство, азартные игры и проституция#!. В дыму фабрик накапливаются насилие и нищета, старые социальные устои и семейные узы рушатся. Благочестивые #v $clergymen$#! из [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] считают, что [ROOT.GetCountry.GetNameNoFlag] отходит от Божьей воли.\n\n#V Грехи Содома#! не должны множиться. Подобно тому, как [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFirstName] является образцом #B чистоты, скромности и семейных ценностей#! в нашем обществе, мы должны сделать её новым ориентиром для #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! общества, чтобы граждане вновь обрели древние, предписанные Богом великие добродетели: #V умеренность, смирение, честность и семейную ответственность#!."
 queen_vitoria_review_tt: "#yellow Королева Виктория#! взошла на престол."
