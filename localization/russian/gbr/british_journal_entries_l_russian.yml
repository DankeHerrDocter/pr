  #Правила ограничения миграции
 rule_urbanization_limit_immigration_rules: "#yellow Ограничение миграции#! при высокой урбанизации!"
 setting_enable_urbanization_limit_immigration: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_urbanization_tooltip_tt #high Включить ограничение миграции#!#!#!"
 setting_enable_urbanization_tooltip_tt: "Если уровень #O центра урбанизации#! выше 1500, #O лимит миграции#! в данном [Concept('concept_state_region', 'регионе')] снижается на 35%.\nЕсли уровень #O центра урбанизации#! выше 2000, #O лимит миграции#! в данном [Concept('concept_state_region', 'регионе')] снижается на 55%.\nЕсли уровень #O центра урбанизации#! выше 2500, #O лимит миграции#! в данном [Concept('concept_state_region', 'регионе')] снижается на 75%.\nЕсли уровень #O центра урбанизации#! выше 3500, #O лимит миграции#! в данном [Concept('concept_state_region', 'регионе')] снижается на 95%."
 setting_enable_urbanization_limit_immigration_desc: "#B Высокоурбанизированные и густонаселённые#! [Concept('concept_state_region', 'регионы')] получат модификатор, снижающий #O лимит миграции#!, чтобы предотвратить чрезмерный рост населения в одном [Concept('concept_state_region', 'регионе')]."
 setting_disable_urbanization_limit_immigration: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_disable_urbanization_limit_immigration_desc #high Отключить ограничение миграции#!#!#!"
 setting_disable_urbanization_limit_immigration_desc: "Это отключит механизм #O ограничения миграции#! при высокой урбанизации, больше не ограничивая [Concept('concept_migration', 'миграцию')] в любом [Concept('concept_state_region', 'регионе')]."
