 uk_parliament_westminster: "Вестминстер"
 uk_parliament_westminster_reason: "#U #B Вестминстер#!#! — этот древний дворец не только политическое сердце [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], но и символ наших #O конституционных традиций#! и #O парламентского суверенитета#!. С тех пор как #bold Великая хартия вольностей 1215 года#! установила, что #v $aristocrats$#! и монарх вступают в договорные отношения, #U #B Вестминстер#!#! постепенно стал оплотом идеологии сторонников [GetIdeology('ideology_british_conservatism').GetName]. После #bold Славной революции#! и #bold Билля о правах#! эта система была прочно закреплена, сделав власть правителя неразрывно связанной с #V согласием Парламента#! и превратив идею #yellow парламентского суверенитета#! в центр нашего #B великого и славного #I Правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#!.\n\nСегодняшний #U #B Вестминстер#!#! — это не просто дворец, он олицетворяет #V согласие нашего народа#! и #V традицию парламентского правления#!. В Палате лордов заседают #v $aristocrats$#! и #v $clergymen$#!, а в Палате общин — #v $clerks$#!, #v $shopkeepers$#! и #v $capitalists$#!. Как высший законодательный и судебный орган [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], он предоставляет голос представителям народа со всех уголков страны, от древнейших поместий до самых оживлённых городов, позволяя действующему [Concept('concept_government', 'правительству')] функционировать путём дебатов и компромиссов.\n\n#yellow #B Парламентский суверенитет#!#! — это не только юридическая норма, но и убеждение, живущее в сердцах всех #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! граждан. Любой [concept_law] должен здесь обсуждаться, голосоваться и приниматься, любая власть должна здесь обретать легитимность. Будь то [Concept('concept_taxes', 'налоги')], [Concept('concept_war', 'война')] или управление [Concept('concept_colony', 'колониями')], #U #B Вестминстер#!#! является ярчайшим воплощением нашей демократической традиции.\n\n#U #B Вестминстер#!#! — это основа нашего #yellow #tooltippable_name [SCOPE.sCulture('british_scope').GetCustom('RU_CUL_ADJ')]ого#! образа жизни#!, #B самый достойный гордости институт и кредо#! в этом неспокойном мире. #V Да хранит Бог наших солдат и моряков, наших парламентариев и нашего правителя!#!"
