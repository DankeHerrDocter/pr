 #Имперская крепость
 joi_imperial_fortress: "Имперская крепость"
 joi_imperial_fortress_reason: "#B Развитие океанских боевых кораблей#! и #B растущая воинственность#! других великих держав заставляют нас укреплять некоторые по-настоящему стратегически важные владения: [GetStateRegion('STATE_MALTA').GetName], [GetStateRegion('STATE_CEYLON').GetName], [GetStateRegion('STATE_MALAYA').GetName], [GetStateRegion('STATE_BERMUDA').GetName] и [GetStateRegion('STATE_UPPER_ANDALUSIA').GetName]. В строгом смысле это не [Concept('concept_colony', 'колонии')], а имперские крепости, военные и военно-морские базы, созданные для поддержки владычества [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nЧтобы #V глобальный флот#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] действительно мог действовать повсюду, правительство должно обеспечить некоторые базы и угольные станции береговой обороной. В их число должны войти #V Мальта, Гибралтар, Сингапур, Бермудские острова и Коломбо#! - эти #B бесценные имперские крепости#!."
 joi_imperial_fortress_malta_tt: "#V [GetStateRegion('STATE_MALTA').GetName]#!: построено не менее #V 5#! ур. $building_naval_fortification$, #V 20#! ур. $building_arms_industry$, а также по #V 10#! ур. $building_artillery_foundry$ и $building_munition_plant$."
 joi_imperial_fortress_ceylon_tt: "#V [GetStateRegion('STATE_CEYLON').GetName]#!: построено не менее #V 5#! ур. $building_naval_fortification$, #V 20#! ур. $building_arms_industry$, а также по #V 10#! ур. $building_artillery_foundry$ и $building_munition_plant$."
 joi_imperial_fortress_malaya_tt: "#V [GetStateRegion('STATE_MALAYA').GetName]#!: построено не менее #V 5#! ур. $building_naval_fortification$, #V 20#! ур. $building_arms_industry$, а также по #V 10#! ур. $building_artillery_foundry$ и $building_munition_plant$."
 joi_imperial_fortress_bermuda_tt: "#V [GetStateRegion('STATE_BERMUDA').GetName]#!: построено не менее #V 5#! ур. $building_naval_fortification$, #V 20#! ур. $building_arms_industry$, а также по #V 10#! ур. $building_artillery_foundry$ и $building_munition_plant$."
 joi_imperial_fortress_gibraltar_tt: "#V [GetStateRegion('STATE_UPPER_ANDALUSIA').GetName]#!: построено не менее #V 5#! ур. $building_naval_fortification$, #V 20#! ур. $building_arms_industry$, а также по #V 10#! ур. $building_artillery_foundry$ и $building_munition_plant$."
 joi_imperial_fortress_malta_button: "Направить вспомогательный персонал на Мальту"
 joi_imperial_fortress_malta_button_desc: "Мальта занимает выгодное положение в центре Средиземного моря и служит важнейшим пунктом на нашей жизненной линии через Египет и Суэцкий канал к Индии и Дальнему Востоку. Вложения в её укрепления никак нельзя считать пустой тратой."
 joi_imperial_fortress_malta_button_tt: "Мы случайным образом направим из военных объектов метрополии от #V 100 тыс.#! до #V 250 тыс.#! [Concept('concept_pop', 'человек')], чтобы восполнить местные военные потребности этой крепости."
 joi_imperial_fortress_malaya_button: "Направить вспомогательный персонал в Сингапур"
 joi_imperial_fortress_malaya_button_desc: "Сингапур имеет ключевое значение для всех наших восточных колоний и жизненно важен для империи. Если любой противник, обладающий морской силой, захватит его, наша торговля окажется серьёзно нарушена или даже полностью разрушена. Сингапур должен оставаться неприступным, пока главные силы флота не прибудут и не разгромят врага."
 joi_imperial_fortress_ceylon_button: "Направить вспомогательный персонал в Коломбо"
 joi_imperial_fortress_ceylon_button_desc: "Военно-морская база в Коломбо обеспечивает надёжную поддержку действиям наших войск в Индийском океане, и потеря этого региона стала бы катастрофой. Мы должны значительно расширить объекты на острове Цейлон и принять меры для укрепления его обороны."
 joi_imperial_fortress_bermuda_button: "Направить вспомогательный персонал на Бермудские острова"
 joi_imperial_fortress_bermuda_button_desc: "Патрульная зона Североамериканской и Вест-Индской станции огромна: она охватывает Северную Атлантику, Вест-Индию и Южную Атлантику - от Галапагосских островов до пролива Дрейка. Мы должны накопить силы на Бермудских островах, чтобы при необходимости разместить там боевые соединения."
 joi_imperial_fortress_gibraltar_button: "Направить вспомогательный персонал в Гибралтар"
 joi_imperial_fortress_gibraltar_button_desc: "Гибралтар не только контролирует вход в Средиземное море, но и располагает хорошо защищённой гаванью, через которую корабли могут действовать и в Атлантике, и в Средиземноморье. Поэтому укрепление этого порта имеет первостепенное значение."
 joi_imperial_fortress_status: "Укрепление военных объектов в ключевых стратегических узлах нашей глобальной империи"
