  #Дополнительный контент имперской федерации
 british_empire_complete_3_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Умиротворение Канады»#!, #V «Умиротворение Австралии»#! и #V «Умиротворение буров»#!."
 solving_quebec_complete_tt: "Этот журнал активен не менее одного месяца."
 pacification_of_canada: "Умиротворение Канады"
 pacification_of_canada_reason: "С тех пор как [ROOT.GetCountry.GetNameNoFlag] вернула себе власть над #yellow канадскими автономными учреждениями#!, присутствие #I правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! в регионе стало ощущаться всё сильнее. Однако формальная интеграция не означает реального спокойствия: многие #V местные элиты, привыкшие к высокой степени автономии и независимости#!, по-прежнему жалуются на потерю привилегий и недовольны прямым правлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Раскол между #tooltippable_name [SCOPE.sCulture('anglo_canadian_scope').GetAdjective|l]ой#! и #tooltippable_name [SCOPE.sCulture('franco_canadian_scope').GetAdjective|l]ой#! культурами, из-за напряжённой ситуации, только усугубляется.\n\nДля поддержания порядка в #yellow Канаде#! необходимо спокойствие: мы должны #b умиротворить местные общины, восстановить единую имперскую систему#! и вернуть эту обширную северную территорию, чтобы #V укрепить престиж и власть #yellow Британской империи#! в Северной Америке#!."
 pacification_of_canada_complete_1_tt: "Завершена [concept_journal_entry] #V «Канадская тихоокеанская железная дорога»#!."
 pacification_of_canada_complete_2_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Решение проблемы Квебека»#! и #V «Развитие Верхней Канады»#!."
 pacification_of_canada_on_complete_tt: "Все канадские провинции получат модификатор, пример эффекта ниже:"
 pacification_of_canada_status: "Обеспечить признание нашего правления #tooltippable_name [SCOPE.sCulture('anglo_canadian_scope').GetAdjective|l]им#! и #tooltippable_name [SCOPE.sCulture('franco_canadian_scope').GetAdjective|l]им#! населением."
 solving_quebec: "Решение проблемы Квебека"
 solving_quebec_reason: "Квебек изначально был колонией [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], поэтому там проживает большая #tooltippable_name [SCOPE.sCulture('franco_canadian_scope').GetAdjective|l]ая#! община.\n\nОднако обострение противоречий между #tooltippable_name [SCOPE.sCulture('anglo_canadian_scope').GetAdjective|l]им#! и #tooltippable_name [SCOPE.sCulture('franco_canadian_scope').GetAdjective|l]им#! населением подрывает наш авторитет в #yellow Канаде#!. Мы #B не можем позволить инакомыслящим в Квебеке и дальше дестабилизировать Канаду. Пора принять меры для восстановления мира!#!"
 pacification_of_canada_pulse_tt: "Продвинуть прогресс [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Умиротворение Канады»#! на 1."
 developing_upper_canada: "Развитие Онтарио"
 developing_upper_canada_reason: "[SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName] — одна из наших ценных канадских территорий. #B Она обширна и малонаселённа, с множеством озёр, бескрайними лесами и полями. Здесь много неосвоенных земель, богатых ресурсов и лесных угодий#!. Однако нехватка [Concept('concept_reinvestment', 'реинвестиций')] и [Concept('concept_migration', 'миграции')] по-прежнему мешает нам эффективно осваивать этот регион.\n\n#I Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! должно вкладывать больше ресурсов и усилий в развитие [SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName]. Нам нужно поощрять #v $farmers_only_icon$ фермеров#! и #v $laborers_only_icon$ рабочих#! переезжать сюда, создавать фермы и фабрики, строить надёжную инфраструктуру и превратить это место в #V жемчужину Северной Америки#!."
 pacification_of_canada_goal: ""
  #
 pacification_of_australia: "Умиротворение Австралии"
 pacification_of_australia_reason: "С тех пор как [ROOT.GetCountry.GetNameNoFlag] вернула себе власть над #yellow австралийскими автономными учреждениями#!, присутствие #I правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! в регионе стало ощущаться всё сильнее. Однако формальная интеграция не означает реального спокойствия: многие #V местные элиты, привыкшие к высокой степени автономии и независимости#!, по-прежнему жалуются на потерю привилегий и недовольны прямым правлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. В то же время, сопротивление местных аборигенов растёт, а административная раздробленность мешает нашему управлению.\n\nДля поддержания порядка в #yellow Австралии#! необходимо спокойствие: мы должны #b умиротворить местные общины, восстановить единую имперскую систему#! и вернуть этот обширный южный континент, чтобы #V укрепить престиж и власть #yellow Британской империи#! в Тихом океане#!."
 pacification_of_australia_complete_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Умиротворение аборигенов»#! и #V «Развитие восточного побережья»#!."
 pacification_of_australia_on_complete_tt: "Все австралийские провинции получат модификатор, пример эффекта ниже:"
 pacification_of_australia_status: "Обеспечить признание нашего правления #yellow австралийцами#! и #yellow аборигенами#!."
 appeasing_the_aborigine: "Умиротворение аборигенов"
 appeasing_the_aborigine_reason: "Во внутренних и пограничных районах #yellow Австралии#! постоянно происходят конфликты между #yellow австралийскими мигрантами#! и #yellow племенами аборигенов#!. #B Расширение земель и создание пастбищ#! #yellow абригенов#! переселяться, их сопротивление вызывает новые столкновения и ответные меры, что ставит под угрозу правление #I правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! в регионе.\n\n[ROOT.GetCountry.GetNameNoFlag] должна принять более #B эффективные меры управления#!: #B при необходимости предоставлять защиту и помощь, создавать новые институты для ограничения насилия и хаоса#! и постепенно #V интегрировать #yellow общины аборигенов#! в #tooltippable_name [SCOPE.sCulture('australian_scope').GetAdjective|l]ую#! [Concept('concept_culture', 'культуру')].#!"
 pacification_of_australia_pulse_tt: "Продвинуть прогресс [Concept('concept_journal_entry', 'Записи в дневнике')] #V «Умиротворение Австралии»#! на 1."
 develop_the_east_nsw: "Развитие восточного побережья"
 develop_the_east_nsw_reason: "#yellow Восточное побережье Австралии#! — наш самый ранний опорный пункт в Южном полушарии. С момента основания первых поселений для ссыльных и портов, хотя под управлением #O ранних#! [Concept('concept_ruler','генерал-губернаторов')], таких как #O Маккуори#! и #O Брисбен#!, были построены многие города среднего размера, #B большие участки земли по-прежнему остаются пустынными, а транспортная и портовая инфраструктура крайне слабо развита#!, что мешает поддерживать необходимый уровень [Concept('concept_migration', 'миграции')] и #yellow административной власти#!.\n\n#I Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! должно продолжать политику предыдущих [Concept('concept_ruler','генерал-губернаторов')], #B развивать местные города, поощрять отечественных #v $capitalists_only_icon$ капиталистов#! и #v $aristocrats_only_icon$ аристократов#! обосновываться и развиваться здесь#!, чтобы #V превратить #yellow восточное побережье Австралии#! в новый экономический центр [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!."
 pacification_of_australia_goal: ""
