 indian_major_railway_reason: "#variable [Concept('concept_indian_subcontinent', 'Индийский субконтинент')]#! огромен, а его ландшафт суров, что затрудняет транспортировку. Если мы не сможем эффективно использовать эти земли, богатства Индии останутся для нас недосягаемыми.\n\n#variable Министерство по делам Индии#! представило амбициозный проект [Concept('concept_government', 'правительству')] в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Рассмотреть его [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] и [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]. План предусматривает строительство железной дороги, которая #bold свяжет воедино весь [Concept('concept_indian_subcontinent', 'Индийский субконтинент')]#!. Несомненно, это колоссальная стройка, но в случае успеха она обеспечит #bold невероятное удобство перевозок по всей Индии#!."
