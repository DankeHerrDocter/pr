 imperial_preference_button_possible_tt: "Последние переговоры с членом империи состоялись не менее 3 месяцев назад."
 imperial_preference_enable_tt: "Великобритания завершила [concept_journal_entry] #V «Имперская экономическая конференция»#! и ввела систему имперских преференций."
