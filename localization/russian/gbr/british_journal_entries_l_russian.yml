l_russian:
 dlc_vc: "Victorian Century"
 dlc_vc_desc: "Коронация королевы Виктории знаменует начало великой и блестящей эпохи. Под ослепительным сиянием «Британского мира» (Pax Britannica) Первая промышленная революция подходит к концу, принося с собой небывалый расцвет городов. В Европе, знаменитый австрийский канцлер Меттерних создал Венскую систему, объединив государства в оплот старого порядка, чтобы сдержать поток революций.\nСтрадания, принесённые Наполеоновскими войнами, остались позади, а компромисс великих держав даровал многострадальной Европе недолгий мир. Однако, хоть пламя революции и было временно подавлено, идеи национализма и либерализма по-прежнему живы. В эту эпоху небывалого технического прогресса людям предстоит усомниться в том, во что их предки верили из поколения в поколение, и создать совершенно новые убеждения. \n\n@green_checkmark!Victorian Century#G включён#!\n\n@information!Это включённый #blue мод#!\n\n@aristocrats!QQ: @censored!1030099762@censored!\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"
 MDF_MOD_DLC_BUTTON_TOOLTIP: "#V Victorian Century#!\nКоронация королевы Виктории знаменует начало великой и блестящей эпохи. Под ослепительным сиянием «Британского мира» (Pax Britannica) Первая промышленная революция подходит к концу, принося с собой небывалый расцвет городов. В Европе, знаменитый австрийский канцлер Меттерних создал Венскую систему, объединив государства в оплот старого порядка, чтобы сдержать поток революций.\nСтрадания, принесённые Наполеоновскими войнами, остались позади, а компромисс великих держав даровал многострадальной Европе недолгий мир. Однако, хоть пламя революции и было временно подавлено, идеи национализма и либерализма по-прежнему живы. В эту эпоху небывалого технического прогресса людям предстоит усомниться в том, во что их предки верили из поколения в поколение, и создать совершенно новые убеждения.\n\n@green_checkmark!Victorian Century#G включён#!\n\n@information!Это включённый #blue мод#!\n\n@aristocrats!QQ: @censored!1030099762@censored!\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"
  #Правь, Британия! (стартовый журнал Великобритании)
 stabilize_british_empire: "Правь, Британия!"
 stabilize_british_empire_reason: "Со времён #variable Венского конгресса 1815 года#! [ROOT.GetCountry.GetNameNoFlag] неуклонно расширяла своё влияние по всему миру и к настоящему моменту, без сомнения, стала #V величайшей империей#! в мире. #B Власть и влияние [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества простираются по всему земному шару, формируя #yellow мировой порядок#! в соответствии с интересами империи#!.\n\nВ ослепительном сиянии #bold Pax Britannica#! наши некогда могущественные соперники, от [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] до [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('NET_scope').GetAltNameNoFlag('RU_CL_RP')], померкли и склонились перед нашим #bold солнцем, которое никогда не заходит#!. Пусть даже в империи есть тёмные и грязные уголки, но что с того? #bold Даже самый бедный #v $laborers_only_icon$ рабочий#! в лондонском Ист-Энде, подумав о богатстве и промышленной мощи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], невольно расправляет плечи#!. Весь мир тесно связан [Concept('concept_market', 'рынком')], где мы играем ведущую роль: от #bold равнин Северной Америки до чайных плантаций Китая#!, от #bold кофейных полей Карибского бассейна до рудников Австралии#! — #V наше богатство и слава определяют эту эпоху#!.\n\nОднако мы не можем почивать на лаврах. Для защиты существующих [Concept('concept_colony', 'колоний')] и границ #bold необходимо осваивать новые территории#!. Нынешняя #yellow Британская империя#! всё ещё представляет собой сложный конгломерат из [Concept('concept_colony', 'колоний')] и [Concept('concept_company', 'компаний')], без чёткого видения будущего и гарантий нашего положения в [Concept('concept_dominion', 'доминионах')]. Для решения этих проблем всё громче звучат призывы #V использовать силу и дипломатию для стабилизации имперского владычества#!.\n\nПолучив власть над обширными землями и народами, мы также взяли на себя ответственность за управление ими и их защиту. #variable Правь, Британия!#!"
 stabilize_british_empire_complete_1_tt: "[concept_relations] не менее 50 как минимум с 5 канадскими [Concept('concept_subject', 'субъектами')].\nЕсли число субъектов меньше, это условие выполнить невозможно!"
 stabilize_british_empire_complete_2_tt: "[concept_relations] не менее 50 как минимум с 3 австралийскими [Concept('concept_subject', 'субъектами')].\nЕсли число субъектов меньше, это условие выполнить невозможно!"
 stabilize_british_empire_complete_5_tt: "[concept_relations] не менее 50 как минимум с 1 южно-африканским [Concept('concept_subject', 'субъектом')].\nЕсли число субъектов меньше, это условие выполнить невозможно!"
 stabilize_british_empire_complete_3_tt: "[concept_relations] не менее 50 с #bold колониальным владением или уставной компанией#! в Индии."
 stabilize_british_empire_complete_3_india_tt: "Весь [Concept('concept_indian_subcontinent', 'Индийский субконтинент')], принадлежит вам или вашим #bold княжеским [Concept('concept_subject', 'субъектам')]#!."
 stabilize_british_empire_complete_4_tt: "Завершены три [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #variable «Объединение субконтинента»#!."
 stabilize_british_empire_on_complete_tt: "В Лондоне будет созвана имперская конференция для обсуждения будущего устройства империи."
 stabilize_british_empire_on_complete_2_tt: "Вы и каждый ваш [Concept('concept_subject', 'субъект')] одной из следующих культур: [GetCulture('british').GetName], [GetCulture('anglo_canadian').GetName], [GetCulture('franco_canadian').GetName], [GetCulture('australian').GetName] или [GetCulture('boer').GetName] — получите модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!."
 stabilize_british_empire_modifier_effects_tt: "[GetStaticModifier('gbr_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('gbr_achievement_of_the_empire').GetDesc]"
 stabilize_british_empire_status: "#bold Обеспечить безопасность и стабильность в Британской империи#!"
 choose_british_empire_act_event_1_tt: "Мы выберем имперскую федерацию как будущий путь развития Британской империи."
 choose_british_empire_act_event_2_tt: "Мы выберем имперскую автономию как будущий путь развития Британской империи."
  #Три завоевания Британской империи
 conqueror_burma: "Объединение субконтинента: Завоевание Бирмы"
 conqueror_burma_reason: "«Вопрос не в том, сколько вы нам уступите, а в том, сколько мы вам вернём... Мы известим всех туземцев вашей страны, что территории, ранее находившиеся под властью вашего монарха, более ему не подчиняются, а становятся частью владений [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества. Ответственные за управление вами [Concept('concept_ruler','генерал-губернаторы')] и чиновники будут назначаться исключительно нами по усмотрению [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества... И у вас нет иного выбора, кроме как принять это».\n\nПосле #bold Яндабинского договора 1826 года#! [SCOPE.sCountry('BUR_scope').GetNameNoFlag] уступил[SCOPE.sCountry('BUR_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] Аракан, который был передан под управление #yellow Ост-Индской компании#!.\n\nОднако завоевание [SCOPE.sCountry('BUR_scope').GetAltNameNoFlag('RU_CL_RP')] ещё не завершено. Необходимо подчинить всю территорию Бирмы, чтобы #V обеспечить интересы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Индокитае#!."
 gbr_burma_disappear_tt: "#yellow Бирма#! — наш [concept_subject]."
 conqueror_punjab: "Объединение субконтинента: Завоевание Долины"
 conqueror_punjab_reason: "Прошло много времени с тех пор, как мы в #variable ходе войны с маратхами 1803 года#! продвинули границу Индии до #bold долины Инда#!. За это время плодородные земли долины Ганга принесли нам немало богатств. Долина Инда с её уникальной природой — настоящая #bold житница субконтинента#!.\n\n[SCOPE.sCountry('PAN_scope').GetNameNoFlag], занимающий эти земли, хоть и обладает многочисленной армией, но она плохо обучена. Более того, по слухам, их махараджа стар и слаб, а при дворе разгорается борьба за власть. [SCOPE.sCountry('SND_scope').GetNameNoFlag] же настолько ослаб, что без защиты сильного покровителя #bold не представляет никакой угрозы#!.\n\nЭто прекрасная возможность направить наши войска в долину Инда. Пусть прозвучит рог, зовущий к походу на Сирхинд!"
 gbr_punjab_disappear_tt: "#yellow Сикхская империя#! и #yellow Синд#! — наши [Concept('concept_subject', 'субъекты')]."
 british_empire_conqueror_punjab_button: "Применить доктрину выморочных владений в Пенджабе"
 british_empire_conqueror_punjab_button_desc: "Мы планируем создать надёжные институты на границе с Пенджабом, чтобы обеспечить постоянную связь между Дели и Пенджабом. Местные туземные княжества, несомненно, мешают, но они находятся далеко от других княжеств. Возможно, мы можем просто направить комиссаров, чтобы объявить об аннексии их земель."
 conqueror_baluchistan: "Объединение субконтинента: Афганская граница"
 conqueror_baluchistan_reason: "Бедные горные районы #bold Белуджистана#! не представляют большого экономического интереса для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], однако нельзя игнорировать их #bold стратегическое значение у врат Индии#!. Ходят слухи, что султаны #variable Афганистана#! планируют вернуть бывшие земли так называемой #variable «Дурранийской империи»#! в Белуджистане. Мы не можем уступить эти территории и должны заставить хана Калата подчиниться нашей силе!"
 gbr_baluchistan_disappear_tt: "Калат и Мекран не существуют."
  #Имперская федерация
 british_empire: "Имперская федерация"
 british_empire_reason: "Территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] по всему миру связывает не только географическое завоевание, но и узы общей #variable [Concept('concept_culture', 'культуры')] и [Concept('concept_religion', 'религии')]#!. Однако, несмотря на огромный потенциал нашей великой нации, возможности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в значительной степени тратятся впустую из-за нынешней #bold раздробленной имперской системы#!: #yellow метрополия и заморские территории#! не объединены политически и конституционно, у них нет общей политики, согласованного центрального руководства и #bold постоянных связывающих обязательств#!.\n\nТакое положение дел не может продолжаться. В то время как другие [Concept('concept_great_power', 'великие державы')] начинают следовать по стопам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а в различных [Concept('concept_dominion', 'доминионах')] появляются новые, #bold вызывающие беспокойство национальные идентичности#!, мы должны объединить всю мощь #yellow Британской империи#!, чтобы обеспечить наше положение. Хотя управление такой огромной империей сопряжено со многими трудностями, технологический прогресс даёт нам возможность создать такое трансконтинентальное сверхгосударство.\n\n#V Имперская федерация#! станет новой альтернативой для Британской империи: федеральное [Concept('concept_government', 'правительство')] будет иметь общий парламент и осуществлять единое управление. Имперские провинции по всему миру сохранят свои парламенты, поддерживая единство империи, а #O Вестминстер#! станет чисто имперским [Concept('concept_institution', 'институтом')].\n\nТолько #bold имперская федерация с общей идентичностью#!, состоящая из территорий со всего мира, сможет сохранить долгосрочную гегемонию в мировых делах и поддерживать тесные связи внутри империи. #variable Правь, Британия!#!"
 british_empire_possible_tt: "#bold На имперской конференции был выбран проект имперской федерации#!"
 rise_of_empire_tt: "Завершено 4 [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #variable «Британская империя»#!."
 rise_of_empire_2_tt: "Мы объединим наши колонии в единое целое, создав подлинно единую имперскую федерацию."
 rise_of_empire_3_tt: "У вас и всех ваших [Concept('concept_subject', 'субъектов')], имеющих модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!, он будет повышен до #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_modifier_effects_tt $imp_achievement_of_the_empire$#!."
 rise_of_empire_modifier_effects_tt: "[GetStaticModifier('imp_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('imp_achievement_of_the_empire').GetDesc]"
 rise_of_empire_4_tt: "У вас и всех ваших [Concept('concept_subject', 'субъектов')], имеющих модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!, он будет повышен до #tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_2_modifier_effects_tt $wsm_achievement_of_the_empire$#!."
 rise_of_empire_2_modifier_effects_tt: "[GetStaticModifier('wsm_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('wsm_achievement_of_the_empire').GetDesc]"
 rise_of_dominition_tt: "Если мы не сможем объединить империю до того, как автономия колоний возрастёт, нам придётся предоставить им большие привилегии."
 british_empire_status: "#V #O #B Объединить все заморские владения Британской империи в единое целое, подчиняющееся Лондону#!#!#!"
 allow_to_form_imp_tt: "#bold Нам будет позволено основать имперскую федерацию#!"
 british_empire_complete_2_tt: "Успешно завершена [concept_journal_entry] #variable «Статус Ирландии»#!."
  #Имперская автономия
 british_dominion_act: "Имперская автономия"
 british_dominion_act_reason: "#variable Величие Британской империи#! заключается не в географическом господстве, а в #variable нашей цивилизации, предприимчивости и силе#!. Наша империя состоит из #bold разнообразных территорий#!, и общие узы [Concept('concept_culture', 'культуры')] являются символом нашего единства. Однако, хотя границы империи за годы экспансии достигли небывалого размаха, наша #bold внутренняя система управления#! пребывает в хаосе: #yellow Канада#! разделена на множество различных провинций, #yellow Австралией#! управляют местные #v $bureaucrats$#! по своему усмотрению, #yellow Южная Африка#! безразлична к имперскому правлению, а власть #yellow Ост-Индской компании#! на субконтиненте становится всё слабее. Каждая из этих проблем представляет #bold угрозу для империи#!.\n\nТакое положение дел не может продолжаться. В то время как другие [Concept('concept_great_power', 'великие державы')] начинают идти по стопам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а в [Concept('concept_colony', 'колониях')] формируются новые #bold национальные идентичности#!, мы должны разработать новую имперскую систему, чтобы с наименьшими затратами извлекать максимальную выгоду из нашей империи.\n\n#V Имперская автономия#! станет альтернативой для #yellow Британской империи#!: разрозненные [Concept('concept_colony', 'колонии')] будут объединены в новые единые федеративные [Concept('concept_dominion', 'доминионы')]. Они признают лидерство империи и станут самоуправляемыми [Concept('concept_country', 'странами')], пользуясь преимуществами имперского [Concept('concept_market', 'рынка')] и поставляя ресурсы для нашей промышленности. #b Они будут сами отвечать за свою оборону, организовывать свои армии и оказывать нам самую решительную поддержку в случае [Concept('concept_war', 'войны')]#!.\n\nТолько #bold по-настоящему свободный народ#! может раскрыть свой максимальный потенциал. Поэтому мы должны ответить на призыв к автономии и сформировать #bold общую имперскую идентичность#!, чтобы вместе занять лидирующие позиции на мировой арене. #variable Правь, Британия!#!"
 british_dominion_act_possible_tt: "#bold На имперской конференции был выбран проект имперской автономии#!"
 british_dominion_act_complete_tt: "Завершено 4 [Concept('concept_journal_entry', 'Записи в дневнике')] из серии #variable «Акт об автономии»#!."
 british_dominion_act_on_complete_tt: "Автономные доминионы империи установят с нами более тесные связи в своём новом статусе."
 british_dominion_act_complete_2_tt: "Завершена [concept_journal_entry] #variable «Статус Ирландии»#!."
 british_dominion_act_status: "#V #U #B Преобразовать все заморские владения Британской империи в доминионы в рамках имперской системы#!#!#!"
 british_dominion_act_complete_3_tt: "#bold Канада, Австралия и Южная Африка#! существуют и объединены."
 british_dominion_country_unify_1_tt: "Канада создана и существует."
 british_dominion_country_unify_2_tt: "Австралия создана и существует."
 british_dominion_country_unify_3_tt: "Южная Африка создана и существует."
