 pacification_of_south_africa: "Умиротворение буров"
 pacification_of_south_africa_reason: "#B Индикатор показывает время, в течение которого #tooltippable_name [SCOPE.sCulture('boer_scope').GetAdjective|l]ие#! провинции остаются стабильными.#!\n\nС тех пор как [ROOT.GetCountry.GetNameNoFlag] установила прямое правление в Южной Африке, #tooltippable_name [SCOPE.sCulture('boer_scope').GetAdjective|l]ая#! #yellow община#! всегда была самой упорной проблемой. Они унаследовали так называемые фермерские традиции голландцев, имеют собственное вооружение и #B сильно сопротивляются#! [Concept('concept_law', 'законам')] и [Concept('concept_taxes', 'налогам')]. Они даже пытаются переселяться вглубь континента, чтобы избежать нашего правления.\n\nДля поддержания спокойствия в #yellow Южной Африке#! необходимы решительные меры: #B мы должны подавить непокорное #tooltippable_name [SCOPE.sCulture('boer_scope').GetAdjective|l]ое#! население, умиротворить [Concept('concept_loyalist', 'лоялистов')] среди них, интегрировать их обычаи и земли#!, чтобы вернуть их под контроль #I правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#! и #V укрепить престиж и власть #yellow Британской империи#! на Тёмном континенте#!."
 pacification_of_south_africa_complete_tt: "Уровень недовольства во всех #tooltippable_name [SCOPE.sCulture('boer_scope').GetAdjective|l]их#! провинциях оставался ниже 25% в течение 5 лет."
 pacification_of_south_africa_on_complete_tt: "Все южноафриканские провинции получат модификатор, пример эффекта ниже:"
 pacification_of_south_africa_status: "Обеспечить признание нашего правления #tooltippable_name [SCOPE.sCulture('boer_scope').GetAdjective|l]им#! населением."
