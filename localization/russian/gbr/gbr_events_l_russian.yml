l_russian:
  # Британский мир
 victoria.1.b: "Это станет началом новой эпохи."
 joi_flavor_gbr.1.t: "Pax Britannica"
 joi_flavor_gbr.1.d: "Это эпоха [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: солнце, висящее в небе, освещает земли Британской империи, и кажется, будто оно никогда не зайдёт за её пределы."
 joi_flavor_gbr.1.f: "                                 #bold Когда Британия по воле небес#!\n\n                                 Восстала из лазурных вод,\n\n                            Восстала, из лазурных вод,\n\n                        Таков был дан обет, хранить сию страну,\n\n                                 И ангелы запели в унисон:\n\n                              #bold Правь, Британия!#!\n\n                               Британия, правь морями!\n\n                                  #bold Британцы никогда не будут рабами!#!"
 joi_flavor_gbr.1.a: "Испанцы говорили, что над их империей никогда не заходит солнце, но в нашем случае это изречение нашло ещё более величественное воплощение."
  # Акт о Союзе Великобритании
 joi_flavor_gbr.2.t: "Акт о Союзе [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.2.d: "Имперский совет пришёл на смену Имперской конференции и стал постоянным органом для управления заморскими владениями [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Представители из-за морей, избранные своим народом, собрались в Вестминстере, чтобы присягнуть на верность общей имперской федерации. Этот день войдёт в историю как шаг Британской империи к единому союзу."
 joi_flavor_gbr.2.f: "С присоединением бывших #bold автономных#! колоний к владениям [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] власть империи над миром достигла #bold невиданной в истории вершины#!. Золотой лев победы гордо взирает с процветающего острова Британия на #bold мировой порядок, возглавляемый Британской империей#!:\n\nНи одна страна не может превзойти высшую славу британского правления, ни один лидер не может сравниться с величием, которое олицетворяет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetNameNoFlag]; #bold просторы Британской империи так велики, что солнце никогда над ними не заходит; мощь Британской империи так сильна, как волны, что несут Королевский флот к победе#! Люди назовут эту эпоху, этот век, веком [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!\n\nРавнины Северной Америки и России — наши житницы;\nЧикаго и Одесса — наши рудники;\nКанада и Скандинавия растят для нас леса;\nАвстралия пасёт для нас овец;\nАргентина разводит для нас скот;\nПеру присылает серебро, Южная Африка — золото;\nИндийцы и китайцы выращивают для нас чай, Средиземноморье — наш фруктовый сад;\nНаши хлопковые плантации простираются от юга Америки до всех тёплых уголков земли.\n\n#bold Пришло время заявить о нашем статусе сверхдержавы. Правь, Британия!#!"
 joi_flavor_gbr.2.a: "Правь, Британия!"
  # Британское самоуправление
 joi_flavor_gbr.3.t: "Закон об отношениях с доминионами [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.3.d: "Под давлением доминионов Лондон был вынужден разработать законопроект, определяющий отношения между различными правительствами под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и Лондоном. Этот закон положил конец праву Лондона вмешиваться в привилегии и конституции доминионов."
 joi_flavor_gbr.3.f: "Нынешний кабинет, представляющий правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, Божьей милостью, объявляет:\nПервое: Канада, Австралия и Южная Африка учреждаются как [Concept('concept_dominion', 'доминионы')] Империи.\n\nВторое: После вступления в силу этого закона, никакой закон или постановление, принятые в доминионе, не будут считаться недействительными из-за противоречия с законами, постановлениями или правилами, которые могут быть приняты в Соединённом Королевстве в будущем. Каждый доминион также имеет право отменять или изменять законы, постановления и правила в соответствии со своим законодательством.\n\nТретье: Парламент доминиона имеет право принимать законы, действующие за его пределами.\n\nЧетвёртое: После вступления в силу этого закона, законы, принятые в Соединённом Королевстве, не распространяются на доминион, если доминион явно не выразит просьбу и согласие на это."
 joi_flavor_gbr.3.a: "Боже, храни [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Королеву', 'Короля' )]!"
  # Британская Канада
 joi_flavor_gbr.4.t: "Освоение Севера"
 joi_flavor_gbr.4.d: "После того как #yellow Канада#! вошла в состав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], началась лихорадочная гонка за освоение этих северных территорий."
 joi_flavor_gbr.4.f: "Почему Канада? Оглянитесь! #bold Воды Гудзонова залива#! голубее самого неба, в густых лесах и на бескрайних равнинах #bold дует приятный ветерок#!, а в здешних городах вы можете #bold наслаждаться теми же услугами, что и в Англии#!, и найти более высокооплачиваемую работу! Зачем прозябать в туманном Лондоне, когда на этих огромных и безлюдных землях можно сколотить целое состояние?"
 joi_flavor_gbr.4.a: "Канада зовёт!"
 joi_flavor_gbr.5.t: "Автономное правительство Канады"
 joi_flavor_gbr.5.d: "Канада готовится к созданию единого автономного правительства..."
 joi_flavor_gbr.5.f: "Каждый подписанный документ, каждая поставленная печать приближают Северные земли к обретению государственности. Мнения колоний не всегда совпадают, но канадский народ полон решимости довести дело до конца. В ближайшем будущем, при поддержке Министерства по делам колоний и местных администраций, а также благодаря воле всего канадского народа, рождение нового государства — Канады — неизбежно."
 joi_flavor_gbr.5.a: "Что ж, хорошо."
  # Британская Австралия
 joi_flavor_gbr.6.t: "Перспективы горного дела"
 joi_flavor_gbr.6.d: "Новость об открытии железной руды в #yellow Австралии#! потрясла общество [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gbr.6.f: "О, сэр, вы и вправду думаете, что они переезжают просто ради работы? Посмотрите новости, что они там увидели? Верно! Открытые рудники! В их глазах одна лишь жадность, говорю вам, #bold ещё не поздно убраться из этой проклятой Англии#!. Что здесь есть, кроме дыма и фабрик? Слава Британской империи? О боже, в Австралии любой бедняк может запросто заполучить огромный рудник и стать богачом! К чёрту славу, когда на кону фунты стерлингов!"
 joi_flavor_gbr.6.a: "Вперёд, вперёд!"
 joi_flavor_gbr.7.t: "Автономное правительство Австралии"
 joi_flavor_gbr.7.d: "Австралия готовится к созданию единого автономного правительства..."
 joi_flavor_gbr.7.f: "Каждый подписанный документ, каждая поставленная печать приближают Австралию к обретению государственности. Мнения колоний не всегда совпадают, но австралийский народ полон решимости довести дело до конца. В ближайшем будущем, при поддержке Министерства по делам колоний и местных администраций, а также благодаря воле народов Австралии и Новой Зеландии, рождение нового государства — Австралии — неизбежно."
 joi_flavor_gbr.7.a: "Что ж, хорошо."
  # Британская Южная Африка
 joi_flavor_gbr.8.t: "Вестминстерская конференция"
 joi_flavor_gbr.8.d: "Хотя первоначальной целью было укрепление морского пути у мыса Доброй Надежды, открытие #yellow южноафриканского золота#! быстро облетело весь мир. Это стало приятным сюрпризом для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gbr.8.f: "«Сэр Пиль, учреждая золотой стандарт в 1816 году, определённо не мог представить себе такого дня».\n\n«Верно, теперь всё золото мира либо в лондонском Вест-Энде, либо в сейфах Банка Англии».\n\n«Кто бы мог подумать? Ценность фунта стерлингов будет равна золоту, и так для всего мира! Франк, марка, доллар, рубль... все они будут привязаны к фунту! Фунт станет мировой валютой! И что это нам принесёт?!»\n\n«Возможно, красивое название „Вестминстерская система“... и бесконечные богатства и власть?»"
 joi_flavor_gbr.8.a: "Вестминстерская система? Та, что про выборы?"
 joi_flavor_gbr.9.t: "Восстание буров"
 joi_flavor_gbr.9.d: "[ROOT.GetCountry.GetNameNoFlag] пыта[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')]ся вторгнуться на земли белых поселенцев в Южной Африке, и это уже не секрет..."
 joi_flavor_gbr.9.f: "«Каждый годный к службе гражданин — это солдат в запасе. В мирное время они занимаются своими делами на фермах и в городах, а в определённое время года проходят краткую военную подготовку. С началом войны они быстро собираются по регионам, формируя ополчение для отпора британским захватчикам.\nМы мобилизуем все доступные силы. Все мужчины, отказавшиеся сражаться, — предатели, которые будут повешены. Чтобы защитить свободу и независимость буров, мы должны заставить весь мир осудить это постыдное британское вторжение и доказать, что эпоха, когда империализм мог безнаказанно господствовать над малыми нациями, прошла»."
 joi_flavor_gbr.9.a: "Эти деревенщины?"
  # Британская Ирландия
 joi_flavor_gbr.10.t: "Конец продовольственного кризиса"
 joi_flavor_gbr.10.d: "Голод, некогда охвативший #yellow Ирландию#!, был преодолён. [ROOT.GetCountry.GetNameNoFlag] решил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] проблему. Благодаря переброске ресурсов из Англии в Ирландию, помощь голодающим снискала любовь местного населения."
 joi_flavor_gbr.10.f: "«Картофель? Кто ещё ест картофель? Это пережиток прошлого. Мы живём в такой могущественной империи, зачем нам беспокоиться о еде? Щедрый и милосердный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уже [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'направила', 'направил' )] ресурсы из Англии в Ирландию. Пусть гнилой картофель остаётся в земле, в городе раздают говядину и хлеб. Мы больше не будем беспокоиться о выживании. Боже, храни монарха, Боже, храни [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]!»"
 joi_flavor_gbr.10.a: "Отлично сказано!"
 joi_flavor_gbr.11.t: "Великий голод в Ирландии!"
 joi_flavor_gbr.11.d: "Новый голод обрушился на бесплодные земли Ирландии, а правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], кажется, не обращает на это внимания..."
 joi_flavor_gbr.11.f: "События 1739 года повторились. Беспрецедентная эпидемия охватила Ирландию. Картофель сгнил, неизвестный вирус поразил поля, уничтожив запасы, на которые семьи рассчитывали прожить следующий год. Крестьяне бежали из деревень в Дублин, Лондондерри, Белфаст и Корк. Есть ли там еда? Нет, города тоже полны умирающих от голода нищих. Лишь кареты респектабельных английских господ проезжают по улицам, разнося аромат жареного мяса..."
 joi_flavor_gbr.11.a: "...Почему они не едят рыбу с жареной картошкой?"
  # Британская Индия
 joi_flavor_gbr.12.t: "Акт об управлении Индией"
 joi_flavor_gbr.12.d: "С введением в действие #yellow Акта об управлении Индией#! правление Ост-Индской компании окончательно прекратилось. Вся Индия перешла под прямое управление Лондона, и отныне ею будет править назначенный кабинетом министров министр по делам Индии."
 joi_flavor_gbr.12.f: "«Все [Concept('concept_colony', 'колонии')], ныне находящиеся во владении Ост-Индской компании, а также все полномочия по управлению [Concept('concept_government', 'государством')], переданные этой[Concept('concept_company', 'компании')] монаршим указом, отныне упраздняются. #bold Вся полнота власти над территориями и их административным управлением переходит к британской короне#!. Отныне [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] будет осуществлять эту власть от своего имени; все территориальные и иные [Concept('concept_taxes', 'налоги')] в Индии, а равно и все связанные с ними подати, должны собираться от имени престола».\n\n«Для целей настоящего Акта учреждается совет из девяти членов, именуемый Министерством по делам Индии. Совет директоров Ост-Индской компании избирает троих бывших директоров этой [Concept('concept_company', 'компании')], которые будут осуществлять свои полномочия совместно с лицами, назначенными монархом. После выдвижения премьер-министром и одобрения парламентом назначается Государственный секретарь по делам Индии, который будет представлять престол. При этом парламент сохраняет за собой право #bold смещать и назначать министров#! от имени суверена».\n\n«[Concept('concept_army', 'Армия')] и [Concept('concept_fleet', 'флот')] Ост-Индской компании отныне признаются индийскими вооруженными силами Короны; для них [ROOT.GetCountry.GetName] становится главной метрополией, а [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — верховным главнокомандующим. Они будут нести те же обязательства по службе монарху, #bold какие прежде несли перед Компанией#!. По получении настоящего Акта генерал-губернатор Индии обязан в кратчайшие сроки огласить его во всех комиссариатах и органах [Concept('concept_government', 'управления')] Индии, после чего передать властные полномочия #bold Министерству по делам Индии#!»."
 joi_flavor_gbr.12.a: "Нам нужен министр по делам Индии!"
 joi_flavor_gbr.12.b: "Лучше переназначить генерал-губернатора."
 joi_flavor_gbr.12.c: "Давайте проведём реорганизацию в Индии!"
 joi_flavor_gbr.13.t: "Акт о самоуправлении Индии"
 joi_flavor_gbr.13.d: "На фоне постоянных восстаний местного населения против имперского правления, Парламент был вынужден издать указ, разрешающий #yellow местное самоуправление в Индии#!. Это было сделано, чтобы снизить издержки правления в Индии для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gbr.13.f: "Продолжая действие акта, принятого на предыдущей сессии Парламента, который предоставил больше времени для уплаты определённых долговых обязательств компании, торгующей с Ост-Индией, от торговцев из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]; утверждая дальнейшую отсрочку для уплаты определённых долговых обязательств, причитающихся общественности, и авансируя вышеупомянутой компании определённую сумму денег путём займа или казначейских билетов на упомянутых условиях:\n\nМинистрам финансов [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества или любым трём или более из них будет и может быть законным отложить и предоставить дополнительное время для уплаты суммы в шестьсот сорок четыре тысячи семьсот сорок три фунта семнадцать шиллингов и два пенса, которая должна была быть уплачена таможне в несколько сроков, упомянутых в вышеупомянутом акте; и суммы в сто тысяч фунтов, подлежащей уплате первого декабря тысяча семьсот восемьдесят первого года; и разрешить уплату таможенных пошлин в течение двенадцати месяцев после истечения срока.\n\nЕсли Ост-Индская компания действительно уплатит вышеупомянутые суммы или любую их часть в один или несколько сроков, на которые вышеупомянутые платежи соответственно отложены, то это будет иметь ту же силу, как если бы вышеупомянутые суммы были уплачены в срок или до срока их уплаты; и компания после уплаты в один или несколько отложенных сроков будет освобождена от всех убытков, процентов и потерь, понесённых ею за неуплату вышеупомянутых сумм в несколько сроков, когда они подлежали уплате, и будет иметь право на те же скидки, надбавки и льготы, как если бы вышеупомянутые суммы были уплачены в срок или до срока их уплаты."
 joi_flavor_gbr.13.a: "Они неспособны принять цивилизацию."
  # Великий ирландский голод
 joi_flavor_gbr.14.t: "Восстановление после голода"
 joi_flavor_gbr.14.d: "Ужасный голод закончился, но урон, нанесённый Ирландии, уже невосполним..."
 joi_flavor_gbr.14.f: "Ужас, один лишь ужас. Улицы усеяны трупами, умирающие лежат в тёмных углах. Пищат крысы, на земле нет ни травинки. Трудолюбивые крестьяне, некогда работавшие в процветающих деревнях, исчезли. Тех, кто не покинул эту землю, ждала только смерть. Хотя [ROOT.GetCountry.GetNameNoFlag], в конце концов обратил[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] внимание на происходящую здесь трагедию, умершие и бежавшие уже никогда не вернутся на эту землю..."
 joi_flavor_gbr.14.a: "Лучше, чем ничего не делать."
 joi_flavor_gbr.15.t: "Конец голода"
 joi_flavor_gbr.15.d: "Ужасный голод наконец закончился, оставив в Ирландии лишь трагедию и гнев..."
 joi_flavor_gbr.15.f: "Ужас, один лишь ужас. Улицы усеяны трупами, умирающие лежат в тёмных углах. Пищат крысы, на земле нет ни травинки. Трудолюбивые крестьяне, некогда работавшие в процветающих деревнях, исчезли. Тех, кто не покинул эту землю, ждала только смерть. Чиновники из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] закрывали глаза на здешнюю трагедию, даже перехватывая любые попытки иностранных держав оказать помощь, словно Ирландия не только не является частью Соединённого Королевства, но и враг для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]..."
 joi_flavor_gbr.15.a: "Я тоже гражданин [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], почему я не знаю ни о каком голоде?"
  # Завоевание Бирмы
 joi_flavor_gbr.16.t: "Победа в Бирме"
 joi_flavor_gbr.16.d: "[ROOT.GetCountry.GetNameNoFlag] в конечном итоге одержал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] победу в войне, а проигравшая сторона была вынуждена капитулировать..."
 joi_flavor_gbr.16.f: "[ROOT.GetCountry.GetNameNoFlag], Великий император Великой Цин и король Бирмы договорились о нижеследующих условиях:\nПервое: Китай признаёт за Англией право на управление Бирмой по своему усмотрению.\nВторое: Поскольку Бирма каждые десять лет направляла посланников с дарами, Англия соглашается, чтобы самый высокопоставленный министр Бирмы каждые десять лет направлял посланников для соблюдения этой традиции. Посланники должны быть выбраны из числа бирманцев.\nТретье: После заключения настоящего договора, специально назначенные министры обеих стран в столице Китая подпишут и скрепят печатями по три экземпляра договора на китайском и английском языках, которые будут представлены на утверждение монархам обеих стран и незамедлительно обменены в столице Англии для подтверждения взаимного доверия."
 joi_flavor_gbr.16.a: "Правь, Британия!"
 joi_flavor_gbr.16.b: "Бирма станет провинцией Британской Индии!"
  # Завоевание Египта
 joi_flavor_gbr.17.t: "Египет под властью Британской империи"
 joi_flavor_gbr.17.d: "Армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] заняла Нил и Суэц, Египет покорился короне Британской империи."
 joi_flavor_gbr.17.f: "Дельта Нила, житница и сердце многих великих империй. Цезарь завоевал её, подчинив Римской империи; Селим I завоевал её, подчинив Османской империи. Теперь же [ROOT.GetCountry.GetNameNoFlag] завоевал[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] эту землю. «Юнион Джек» развевается на вершинах пирамид, победа в Египте стала ещё одним драгоценным камнем в короне империи.\nВ то же время, расположение Египта настолько важно, что в нашу эпоху мы можем не только, подобно великим империям, некогда правившим Египтом, сделать его аграрным центром империи, приносящим нам торговые и экономические выгоды, но и превратить его в военную базу для укрепления мирового господства, что даст нам преимущества в переброске войск. Как же нам следует использовать эту землю?"
 joi_flavor_gbr.17.a: "Сосредоточиться на экономических инвестициях в Египет!"
 joi_flavor_gbr.17.b: "Сосредоточиться на военном строительстве в Египте!"
  # От Каира до Кейптауна
 joi_flavor_gbr.18.t: "План «Красной линии»"
 joi_flavor_gbr.18.d: "Половина Африки уже находится под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], территории Британской империи простираются через весь африканский континент."
 joi_flavor_gbr.18.f: "Взгляните на карту, господа! Никто не сможет повторить то великое деяние, что мы совершили. Красный цвет, символизирующий [ROOT.GetCountry.GetNameNoFlag], словно шёлковая лента, раскинулся на этой земле. Владения империи простираются от городов на Ниле до побережья мыса Доброй Надежды, все враги повержены в песках. Самые ценные земли Тёмного континента теперь наши. Да здравствует империя!"
 joi_flavor_gbr.18.a: "Это красный цвет цивилизации!"
  # Великая индийская полуостровная железная дорога
 joi_flavor_gbr.19.t: "Великая индийская полуостровная железная дорога"
 joi_flavor_gbr.19.d: "Строительство Великой Индийской полуостровной железной дороги, соединившей [Concept('concept_indian_subcontinent', 'Индию')], наконец завершено. Эта грандиозная магистраль стала мощным катализатором развития всего региона."
 joi_flavor_gbr.19.f: "Дикая красавица с громким голосом!\nВплети в мою песнь свою необузданную музыку, свои ночные огни;\nТвой дикий свистящий смех, грохочущий, как землетрясение, пробуждает всех;\nТвои законы совершенны, твои пути в твоих руках;\nТвой пронзительный крик вторит эху скал и холмов;\nРазносится над дальними землями, над озёрами;\nНепринуждённо,\nРадостно,\nСильно,\nК свободному небу!"
 joi_flavor_gbr.19.a: "Сквозь бурю, сквозь штиль; ты — современный пульс этого континента!"
  # Особые отношения между Великобританией и США
 joi_flavor_gbr.20.t: "Англо-американский союз!"
 joi_flavor_gbr.20.d: "С изменением мировой обстановки отношения между [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] и [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_TP')] постепенно улучшаются..."
 joi_flavor_gbr.20.f: "Хотя наши страны некогда были соперниками, перед лицом общих угроз и при наличии общих интересов былая вражда уходит в прошлое. Великобританию и Америку связывают общая культура и язык, общие институты и кровные узы, и эти тесные отношения, несомненно, будут долговечными.\nВвиду этого премьер-министр и министр иностранных дел правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества посетили Америку с визитом и провели успешные переговоры с «городом на холме». На встрече обсуждалась возможность создания двустороннего «нерушимого» военно-экономического союза."
 joi_flavor_gbr.20.a: "Пришло время укрепить наши отношения всеобъемлющим и постоянным союзом!"
 joi_flavor_gbr.20.b: "С военным союзом можно повременить, но экономическое соглашение можно заключить в первую очередь!"
 joi_flavor_gbr.21.t: "Огромный успех инвестиций в Америке"
 joi_flavor_gbr.21.d: "Несколько лучших промышленников [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] докладывают нам..."
 joi_flavor_gbr.21.f: "«Отличные новости! За последнее время наши инвестиции в Америке достигли небывалого успеха, наши предприятия процветают, и наши союзники также извлекли из этого большую выгоду. Конечно, и наши доходы от этого выросли. Какое мудрое и дальновидное вложение!»"
 joi_flavor_gbr.21.a: "Неплохо, неплохо!"
 joi_flavor_gbr.22.t: "Капитал в Америке в затруднительном положении"
 joi_flavor_gbr.22.d: "Несколько лучших промышленников [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] докладывают нам..."
 joi_flavor_gbr.22.f: "Печальные новости! Несмотря на все наши усилия, из-за недавнего спада на американском рынке все наши инвестиционные предприятия понесли большие убытки, а фабрика одного бедолаги и вовсе обанкротилась... Надо было поскорее перевести эти активы домой, чёрт побери!"
 joi_flavor_gbr.22.a: "Чёрт побери!"
 joi_flavor_gbr.23.t: "[SCOPE.sCountry('GBR_scope').GetNameNoFlag] просит у нас заём!"
 joi_flavor_gbr.23.d: "Из-за финансовых трудностей Соединённое Королевство обратило свой взор на нас, прося о помощи..."
 joi_flavor_gbr.23.f: "Финансовые проблемы Великобритании уже давно не являются секретом на международной арене. Учитывая нашу тесную дружбу, британский министр финансов посетил нашу страну с надеждой занять у нас некоторую сумму, обещая взамен множество политических выгод для нашей страны. Конгресс обсуждает просьбу британцев. Стоит ли давать им в долг?"
 joi_flavor_gbr.23.a: "Дадим, конечно, мы же щедрые спасители!"
 joi_flavor_gbr.23.b: "Мы не обязаны содержать нашего «старика»!"
  # Индийские дела
 joi_flavor_gbr.24.t: "Протест индуистских солдат"
 joi_flavor_gbr.24.d: "Патроны для новых винтовок, выданных войскам, вызвали инцидент, так как смазка для них содержала говяжий и свиной жир, что является табу в индуизме."
 joi_flavor_gbr.24.f: "Когда я раскусил патрон, я почувствовал вкус. В самый разгар боя мы, самые верные солдаты, обнаружили, что компания такими коварными и подлыми методами подрывает нашу веру. Это неслыханное предательство. Если бы я мог выстрелить в виновника, я бы сделал это без колебаний."
 joi_flavor_gbr.24.a: "Да кто ты такой? Расстрелять их!"
 joi_flavor_gbr.24.b: "Возможно, лучше проявить уважение к их религии."
 joi_flavor_gbr.25.t: "Петиция от туземных советов"
 joi_flavor_gbr.25.d: "Туземные советы обращаются с петицией к [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству из-за отмены Лондоном принятой ими политики."
 joi_flavor_gbr.25.f: "Хотя мы рассматриваем политику как ответственность парламента, а администрирование — как ответственность чиновников, вопросы административной политики могут привести к путанице между административной политикой и управлением политикой, особенно когда административные обязанности и обязанности по административной политике вступают в конфликт или пересекаются...\nКороче говоря, эти предложения, будучи реализованными, приведут к осознанию того, что в некоторых случаях альтернативные пути действий могут быть осторожно изменены, что приведёт к переоценке первоначальных областей разногласий и укажет на возможность поощрения компромисса и сотрудничества."
 joi_flavor_gbr.25.a: "Гарантировать, что мнения уважаемых членов совета будут учтены."
 joi_flavor_gbr.25.b: "Эти ребята должны понимать, кто их хозяин!"
 joi_flavor_gbr.26.t: "Выдающийся чиновник на субконтиненте"
 joi_flavor_gbr.26.d: "Сообщается, что чиновник, служащий в Министерстве по делам Индии, достиг на своём посту выдающихся успехов."
 joi_flavor_gbr.26.f: "«В текущей ситуации, рассматривая картину в целом, оглядываясь на прошлое и настоящее, учитывая средние показатели по всем ведомствам, обобщая и анализируя, возможно, можно считать, что, подводя итог, в общих чертах, вы, вероятно, обнаружите, что, хотя это может прозвучать неприятно, в любом случае, боюсь, перспективы неоднозначны, и на данном этапе можно ожидать только этого: в конце концов, я всего лишь скромный общественный инструмент, сосуд для плодов глубоких размышлений кабинета»."
 joi_flavor_gbr.26.a: "Повысить его в должности на месте."
 joi_flavor_gbr.26.b: "На родине нужны такие таланты."
 joi_flavor_gbr.27.t: "Серьёзные проблемы с продовольствием"
 joi_flavor_gbr.27.d: "Из-за продолжающейся засухи на субконтиненте многие индийцы голодают."
 joi_flavor_gbr.27.f: "«Вы слышали о последних событиях?»\n\n«А, о тех? Неважно».\n\n«Но что, если они попросят нас о помощи?»\n\n«Тогда мы поступим так: на первом этапе мы заявим, что ничего не происходит. На втором этапе скажем, что, возможно, что-то и происходит, но нам не следует вмешиваться. На третьем этапе скажем, что, возможно, и следовало бы вмешаться, но мы ничего не можем сделать. На четвёртом этапе скажем, что, возможно, раньше мы и могли что-то сделать, но теперь уже слишком поздно»."
 joi_flavor_gbr.27.a: "Да, министр!"
 joi_flavor_gbr.27.b: "Чушь собачья!"
 joi_flavor_gbr.28.t: "Правительство Британской Индии"
 joi_flavor_gbr.28.d: "Попытка учредить Министерство по делам Индии провалилась. Серьёзные волнения и оппозиция вынудили Лондон вновь передать управление Индией генерал-губернатору в Дели."
 joi_flavor_gbr.28.f: "«Это правительство пришло, чтобы управлять страной, а не просто править, как предыдущие».\n\n«И что же, по мнению премьер-министра, мы должны делать?»\n\n«Когда страна катится под откос, кто-то должен сесть за руль и нажать на газ»."
 joi_flavor_gbr.28.a: "Враг в Уайтхолле, враг в Уайтхолле!"
 joi_flavor_gbr.29.t: "Назначение министра по делам Индии"
 joi_flavor_gbr.29.d: "По указу [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, Божьей милостью, в кабинете появился новый член."
 joi_flavor_gbr.29.f: "У министра три функции. Во-первых, он занимается продвижением, убеждая Парламент и общественность принять действия министерства, он наш пиарщик. Во-вторых, он наш представитель в Парламенте, обеспечивая принятие наших законов. В-третьих, он должен нас кормить, добиваясь в кабинете финансирования, чтобы мы могли управлять нашим ведомством. Но он не должен проверять рабочие процедуры министерства и общаться с секретарями и подчинёнными."
 joi_flavor_gbr.29.a: "Я знаю, я только что был в Палате общин."
  # Особые отношения между Великобританией и США (со стороны США)
 joi_flavor_gbr.30.t: "Англо-американский союз?"
 joi_flavor_gbr.30.d: "С изменением мировой обстановки отношения между [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] и нашими бывшими врагами с Британских островов постепенно улучшаются..."
 joi_flavor_gbr.30.f: "Хотя наши страны некогда были соперниками, перед лицом общих угроз и при наличии общих интересов былая вражда уходит в прошлое. Великобританию и Америку связывают общая культура и язык, общие институты и кровные узы, и эти тесные отношения, несомненно, будут долговечными.\nВвиду этого британский премьер-министр и министр иностранных дел посетили нашу страну и на дипломатических переговорах представили нашему правителю идею о заключении «постоянного особого союза», охватывающего экономические и военные аспекты, заверив, что это принесёт выгоду как нашей стране, так и им."
 joi_flavor_gbr.30.a: "Вежливо отклонить предложение британцев."
 joi_flavor_gbr.30.b: "Соединённые Штаты с радостью примут предложение!"
  # Будущее Британской империи
 joi_flavor_gbr.31.t: "Первая имперская конференция"
 joi_flavor_gbr.31.d: "Первая имперская конференция с участием всех британских колоний состоялась в столице владычицы Британской империи — [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Церемония была величественной. По улицам маршировали представители четырёхсот миллионов подданных, а на море выстроились сто шестьдесят пять кораблей Королевского флота, линия которых растянулась на несколько миль."
 joi_flavor_gbr.31.f: "«Нам действительно нужна ваша помощь, этот изнурённый титан сражается с судьбой на слишком обширном поле. Мы несём это бремя уже много лет. Мы думаем, что пришло время нашим детям помочь нам его поддерживать».\n\n«[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] принять неизбежные последствия представительной системы. Сохраняя её, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'она будет вынуждена', 'он будет вынужден')] согласиться, что править будут те, кто пользуется доверием представителей... Что касается колоний, их полная подчинённость обеспечивается выгодами от связи с империей. Если правительство метрополии будет необоснованно вмешиваться в их внутренние дела, эта связь лишь ослабнет».\n\n«Если мы будем придерживаться экономически устаревших принципов, мы упустим возможность укрепления союза, которую нам предоставляют колонии»."
 joi_flavor_gbr.31.a: "Британская империя должна стать нерушимым целым: имперской федерацией."
 joi_flavor_gbr.31.b: "Британская империя должна развивать традиции местного демократического самоуправления: децентрализованной федерацией."
  # Королевская регата Хенли
 joi_flavor_gbr.32.t: "Королевская регата Хенли"
 joi_flavor_gbr.32.d: "Популярность гребли в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] сделала её любимым национальным видом спорта. При поддержке увлечённого этим спортом монарха на Темзе открылись первые международные соревнования по гребле: Королевская регата Хенли."
 joi_flavor_gbr.32.f: "Команда Портсмута уже опережает на 100 ярдов, команда Беркшира прибавляет! Прибавляет!\nВсё ближе к финишу, всё ближе, команда Беркшира отыгрывает два гребка, ускоряется! Частота! Растёт! Ещё вперёд! Обгоняют!\nОсталось двести метров! Держать темп! Бороться! Опережают на один гребок, работают плечи, осталось пятьдесят метров, вперёд, Беркшир!\nВеликий Беркшир, великий Беркшир! Они — наследники славных традиций Англии, в этот момент он не один, он не один!! Последние пятьдесят метров, лидируют! Ещё два гребка впереди! Вперёд!!!"
 joi_flavor_gbr.32.a: "Чёрт, этот комментатор точно из Беркшира!"
  # Акт о Британской Северной Америке
 joi_flavor_gbr.33.t: "Акт о Британской Северной Америке"
 joi_flavor_gbr.33.d: "После того как указ о Канадской Конфедерации был подписан [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, новорождённый [concept_dominion] стал равным членом Британской империи."
 joi_flavor_gbr.33.f: "#bold Поскольку провинции Нью-Брансуик, Квебек, Манитоба, Саскачеван, Альберта, Британская Колумбия, Нунавут и Земля Руперта#! выразили желание объединиться в федерацию под короной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в качестве [Concept('concept_dominion', 'доминиона')], с конституционными принципами, схожими с конституцией Соединённого Королевства; и поскольку такой союз будет способствовать благосостоянию провинций и продвижению интересов Британской империи, при учреждении федерации с разрешения Парламента следует не только определить конституцию законодательного органа [Concept('concept_dominion', 'доминиона')], но и объявить о характере исполнительной власти, чтобы федерация Британской Северной Америки могла принимать выгодные для себя правила: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] по совету Тайного совета [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества может провозглашением объявить, что в определённый день и после него, не позднее шести месяцев после принятия этого акта, провинции Британской Северной Америки образуют и станут одним [Concept('concept_dominion', 'доминионом')] под названием Канада;\n\nЕсли [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество сочтёт нужным, он[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] может время от времени уполномочивать генерал-губернатора в любом одном или нескольких регионах Канады и по усмотрению генерал-губернатора осуществлять те полномочия и функции, которые генерал-губернатор сочтёт необходимыми или целесообразными для распределения между ними. Пока они продолжают существовать и могут осуществляться после учреждения правительства Канады, они должны предоставляться и осуществляться генерал-губернатором по совету или с совета и согласия Тайного совета [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества или любого из его членов, при условии соблюдения конституции, установленной Парламентом Соединённого Королевства.\n\nПривилегии, иммунитеты и полномочия, которыми обладают и которые осуществляют Сенат и Палата общин и их члены соответственно, должны быть определены актом Парламента Канады, но подлежат рассмотрению Парламентом Соединённого Королевства; Парламент Соединённого Королевства имеет право отклонять акты Парламента Канады.\n\nПосле проведения [Concept('concept_election', 'выборов')] и учреждения Парламента в соответствии с этой статьёй, вышеупомянутый акт, одобренный [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, #bold немедленно вступает в силу для Канадской Конфедерации#!."
 joi_flavor_gbr.33.a: "Боже, храни [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Королеву', 'Короля' )]!"
  # Акт о правительстве Австралии
 joi_flavor_gbr.34.t: "Акт о правительстве Австралии"
 joi_flavor_gbr.34.d: "После того как указ об Австралийской Конфедерации был подписан [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, новорождённый [concept_dominion] стал равным членом Британской империи."
 joi_flavor_gbr.34.f: "#bold Поскольку провинции Новый Южный Уэльс, Тасмания, Виктория, Западная Австралия, Южная Австралия, Северная территория и Новая Зеландия#! выразили желание объединиться в федерацию под короной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в качестве [Concept('concept_dominion', 'доминиона')], с конституционными принципами, схожими с конституцией Соединённого Королевства; и поскольку такой союз будет способствовать благосостоянию провинций и продвижению интересов Британской империи, при учреждении федерации с разрешения Парламента следует не только определить конституцию законодательного органа [Concept('concept_dominion', 'доминиона')], но и объявить о характере исполнительной власти, чтобы федерация Британской Австралии могла принимать выгодные для себя правила:\n\nКаждый мужчина в возрасте двадцати одного года, являющийся по рождению или натурализации подданным [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, или законно получивший #bold статус гражданина Австралии#!, должен быть зарегистрирован в качестве избирателя не менее чем за шесть месяцев до даты издания приказа о выборах. Законодательный орган, сформированный на основании любого постановления или постановлений, принятых для этой цели, и #bold подлежит условиям и ограничениям, установленным законодательным органом в соответствии с законом#!:\n\nВ Конфедерации учреждается Законодательный совет, все члены которого после [Concept('concept_election', 'избрания')] гражданами, имеющими право голоса, назначаются [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, а остальные члены совета должны быть #bold избраны гражданами, имеющими право голоса#!.\n\nЭтот законодательный орган в соответствии с вышеупомянутыми законами или постановлениями принимает все необходимые положения для разделения территорий, подчинённых [Concept('concept_dominion', 'доминиону')], на удобные избирательные округа, назначает и объявляет число членов совета, избираемых от каждого округа, составляет и пересматривает списки всех лиц, имеющих право голоса на [Concept('concept_election', 'выборах')], проводимых в этих округах, назначает должностных лиц для проведения выборов, а также издаёт, подписывает и возвращает приказы, необходимые для таких выборов, определяет действительность всех оспариваемых результатов выборов, и #bold обеспечивает упорядоченное, эффективное и справедливое проведение таких выборов#!;\n\nПосле учреждения Законодательного совета в соответствии с этой статьёй, вышеупомянутый акт, одобренный [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, #bold немедленно вступает в силу для Австралийской Конфедерации#!."
 joi_flavor_gbr.34.a: "Боже, храни [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Королеву', 'Короля' )]!"
  # Акт о Южно-Африканском Союзе
 joi_flavor_gbr.35.t: "Акт о Южно-Африканском Союзе"
 joi_flavor_gbr.35.d: "После того как указ о Южно-Африканском Союзе был подписан [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, новорождённая Южная Африка стала равным членом Британской империи."
 joi_flavor_gbr.35.f: "#bold Поскольку [Concept('concept_colony', 'колонии')] Мыса Доброй Надежды, Наталь, Трансвааль и Оранжевая река#! в соответствии с резолюциями своих парламентов сочли целесообразным установить союз на согласованных условиях и определить исполнительную, законодательную и судебную власть союзного [Concept('concept_government', 'правительства')]; и поскольку целесообразно предусмотреть создание провинций, обладающих законодательной и исполнительной властью в отношении местных дел и других вопросов, которые могут быть специально зарезервированы для провинциального законодательства и управления: посему, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Всевышнее Величество, по совету и с согласия Палаты лордов и Палаты общин, на текущей сессии Парламента и с его разрешения, постановляет следующее:\n\n[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество по совету Тайного совета может законно провозглашением объявить в определённый день и после него, в течение одного года после принятия этого акта, что #bold провинции Британской Южной Африки объединяются в законодательный союз#!, подчинённый одному [Concept('concept_government', 'правительству')], под названием #bold Южно-Африканский Союз#!. В день, указанный в провозглашении, и после него, союзное [Concept('concept_government', 'правительство')] и Парламент будут обладать полной властью и авторитетом в пределах [Concept('concept_colony', 'колоний')], но [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество может в любое время после провозглашения назначить генерал-губернатора Союза; исполнительная власть в Союзе принадлежит [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству и управляется [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Ею', 'Им' )] лично или #bold генерал-губернатором как [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'её', 'его' )] представителем#!, и будет осуществляться в Союзе по усмотрению [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества.\n\nГенерал-губернатор может назначать не более 10 должностных лиц для управления ведомствами Союза, учреждёнными генерал-губернатором совместно с Исполнительным советом; после первых всеобщих выборов членов Палаты представителей срок полномочий любого министра не должен превышать трёх месяцев, если он не является членом одной из палат Парламента; генерал-губернатор #bold может назначать время заседаний Парламента по своему усмотрению#!, а также время от времени #bold провозглашением или иным образом приостанавливать работу Парламента#!.\n\nМежду днём принятия этого акта и днём учреждения Союза, соответствующие генерал-губернаторы должны назначить судью #bold Верховного суда#! для первоначального разделения провинций на [Concept('concept_election', 'избирательные')] округа, и в течение шести месяцев созвать #bold Парламент с полными полномочиями для принятия законов для порядка и благого управления Союзом#! путём [Concept('concept_election', 'выборов')], но акты этого Парламента #bold должны быть представлены на рассмотрение Парламента Соединённого Королевства#!.\n\nЧерез три месяца после опубликования этой статьи, вышеупомянутый акт, одобренный [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством, #bold немедленно вступает в силу для Южно-Африканского Союза#!."
 joi_flavor_gbr.35.a: "Боже, храни [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Королеву', 'Короля' )]!"
   # Акт об управлении Британской Индией
 joi_flavor_gbr.36.t: "Акт о Британской Индии"
 joi_flavor_gbr.36.d: "С введением в действие Акта об управлении Британской Индией правление Ост-Индской компании окончательно прекратилось. Вся Индия перешла под прямое управление Лондона, и отныне ею будет править генерал-губернатор."
 joi_flavor_gbr.36.f: "#bold Территории, управляемые Ост-Индской компанией, были вверены ей Её Величеством Королевой#!, и упомянутые в акте имущество и права находились у компании в доверительном управлении для целей вышеупомянутого [Concept('concept_government', 'правительства')]. Поскольку кабинет счёл целесообразным, чтобы вышеупомянутые территории #bold управлялись от имени Её Величества Королевы#!, с согласия Её Величества Королевы #bold постановляется Палатой лордов и Палатой общин#! и в соответствии с их полномочиями на текущей сессии Парламента:\n\nНыне находящиеся во владении Ост-Индской компании [Concept('concept_colony', 'колонии')], а также все полномочия, связанные с [Concept('concept_government', 'управлением')], которые были #bold вверены или осуществлялись#! этой [Concept('concept_company', 'компанией')] от имени [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, #bold должны быть прекращены#!. Все территориальные и административные права переходят к [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству и осуществляются от [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] имени. Все территориальные и прочие [concept_taxes], взимаемые в Индии или происходящие из Индии, а также вся дань, связанная с какой-либо территорией, должны взиматься от имени [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества.\n\nДля целей настоящего Акта учреждается совет, состоящий из пятнадцати членов, именуемый Совет генерал-губернатора Индии. Совет директоров Ост-Индской компании избирает семь лиц из числа бывших директоров [Concept('concept_company' ,'компании')], которые будут осуществлять свои полномочия совместно с лицами, назначенными [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством. После #bold избрания голосованием этого совета#! и рассмотрения Парламентом назначается генерал-губернатор Индии от имени [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества; Парламент имеет право #bold смещать и назначать генерал-губернатора без представления совета#! от имени [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества.\n\n[Concept('concept_army', 'Армия')] и [Concept('concept_fleet', 'флот')] Ост-Индской компании должны рассматриваться как индийские [concept_army] и [concept_fleet] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], и нести те же обязательства по службе [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству, #bold как и по службе компании#!.\n\nГенерал-губернатор Индии по получении настоящего Акта должен как можно скорее объявить о нём во всех комиссариатах и [Concept('concept_government', 'органах власти')] Индии."
 joi_flavor_gbr.36.a: "Боже, храни [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Королеву', 'Короля' )]!"
 joi_flavor_gbr.36.b: "Компания прекратила своё существование, но Империя вечна!"
  # Вестминстерский статут
 joi_flavor_gbr.37.t: "Вестминстерский статут [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.37.d: "Представители правительств [SCOPE.sCountry('GBR_scope').GetNameNoFlag], [SCOPE.sCountry('AST_scope').GetNameNoFlag], [SCOPE.sCountry('SAF_scope').GetNameNoFlag], [SCOPE.sCountry('CAN_scope').GetNameNoFlag], а также #yellow Индии#! и #yellow Ирландии#!, собрались вместе. В Вестминстере была созвана Имперская конференция для обсуждения положений о самоуправлении в Империи. Этот день войдёт в историю как начало пути Британской империи к свободе."
 joi_flavor_gbr.37.f: "#bold Поскольку представители [Concept('concept_government', 'правительств')] Соединённого Королевства, Доминиона Канада, Австралийского Союза, Южно-Африканского Союза, Ирландии на протяжении многих лет участвовали в Имперских конференциях в Вестминстере#!, в докладах о встречах, согласованных для совместного обсуждения, были приняты следующие декларации и резолюции:\n\n[GetLawType('law_monarchy').GetName] является #bold символом свободного союза членов Британской империи#!, и они объединены #bold общей верностью#!. Согласно установленному конституционному положению об отношениях между всеми членами Империи, любое изменение в законе, касающееся наследования престола или королевского титула и званий, отныне также #bold требует согласия всех парламентов доминионов и Парламента Соединённого Королевства#!;\n\nСогласно установленному конституционному положению, никакой закон, принятый впредь Парламентом Соединённого Королевства, не должен распространяться ни на один из вышеупомянутых [Concept('concept_british_dominion', 'британских доминионов')] как часть [Concept('concept_law', 'закона')] [Concept('concept_government', 'правительства')] этой страны, если только это не будет сделано по просьбе и с согласия этого доминиона.\n\n#bold Сохраняется действие Акта о Британской Северной Америке, Акта о правительстве Австралии, Акта о Южно-Африканском Союзе и Акта о правительстве Индии в странах, где они были приняты#!, и предоставляются полномочия парламентам вышеупомянутых доминионов или законодательным органам провинций, но только в части принятия законов, касающихся вопросов, входящих в компетенцию соответственно парламентов или законодательных органов провинций.\n\n#bold В любом акте, принятом Парламентом Соединённого Королевства после вступления в силу настоящего акта, термин [Concept('concept_colony', 'колония')] не должен включать ни одну провинцию или штат, являющиеся частью любого [Concept('concept_british_dominion', 'британского доминиона')]#!."
 joi_flavor_gbr.37.a: "Они доказали свою верность Империи!"
  # Ирландское восстание!
 joi_flavor_gbr.38.t: "Ирландское восстание!"
 joi_flavor_gbr.38.d: "Из-за долгого гнева на правление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и недавних волнений в Ирландии, местный ирландский парламент на своём законодательном собрании объявил о независимости!"
 joi_flavor_gbr.38.f: "За мальчика Кевина Барри отомстили. Месть слепа... Это усугубило трагедию. Его смерть — это не просто храбрость одного человека, а проявление христианского духа.\nЕсли бы он назвал имена своих товарищей, возможно, его жизнь была бы спасена. Это предложение должно было отменить приговор. Несмотря на нависшую над ним гильотину, он отказался. Но и после смерти он молился за своих палачей. Он был в том юношеском возрасте, когда душа наиболее щедра и благородна.\nТакие парни, как он, — это опора нации, опора земли..."
 joi_flavor_gbr.38.a: "Бред террористической организации!"
  # Конец восстания
 joi_flavor_gbr.39.t: "Акт о восстановлении порядка в Ирландии"
 joi_flavor_gbr.39.d: "Могущественная армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в конце концов разгромила Ирландскую республиканскую армию, вернув Ирландию под власть Лондона. Побеждённые могут лишь со страхом взирать на своих британских господ."
 joi_flavor_gbr.39.f: "Согласно указаниям правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, кабинет и армия должны действовать для восстановления ситуации в Ирландии. Национальная гвардия должна быть сформирована в Дублине в течение месяца после введения в действие этого акта. Высший командир местного гарнизона имеет право командовать этими силами и проводить военный трибунал над любым лицом, подозреваемым в участии в восстании."
 joi_flavor_gbr.39.a: "Весьма отрадно."
  # Соединённое Королевство?
 joi_flavor_gbr.40.t: "Соединённое Королевство Ирландии?"
 joi_flavor_gbr.40.d: "По мере стабилизации ситуации в Ирландии и роста покорности ирландцев правлению [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], возможно, настал момент для реального исполнения Акта о союзе."
 joi_flavor_gbr.40.f: "«Ввиду милостивейшего предложения [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, представленного обеим палатам парламентов Великобритании и Ирландии соответственно, рассмотреть меры, наиболее способствующие укреплению и консолидации связей между двумя странами, обе палаты парламента Великобритании и обе палаты парламента Ирландии соответственно согласились и постановили, что для содействия и обеспечения фундаментальных интересов Великобритании и Ирландии, укрепления силы, мощи и ресурсов Британской империи, рекомендуется принять избирательные меры, наиболее благоприятные для законного включения ирландского народа в состав британских граждан, и договориться о способе, сроках и условиях, определённых актами соответствующих парламентов Великобритании и Ирландии»."
 joi_flavor_gbr.40.a: "Ирландии будет предоставлено больше автономии."
 joi_flavor_gbr.40.b: "Кто посмеет сказать, что Ирландия — не часть Соединённого Королевства?"
  # Технический прогресс
 joi_flavor_gbr.41.t: "Сэр Перкин"
 joi_flavor_gbr.41.d: "Молодой бакалавр Королевского химического колледжа, сэр Уильям Генри Перкин, в своей лаборатории, изучая хинин, случайно открыл новый химический краситель."
 joi_flavor_gbr.41.f: "«Эту штуку я называю мовеин; это вещество устойчиво к свету и стирке, отлично подходит в качестве красителя! Позавчера в лаборатории, помогая профессору Гофману с хинином, я обнаружил, что анилин можно частично превратить в грубую смесь, которая при экстракции спиртом даёт тёмно-фиолетовое вещество. Так что я тайком вынес это из лаборатории и дома вместе с друзьями исследовал его. Ха! Отлично работает! Теперь я хочу запатентовать эту штуку. Я уверен, мы нашли возможную замену, мы разбогатеем!»"
 joi_flavor_gbr.41.a: "Да, вы разбогатеете!"
  # Событие-пасхалка правительства Его/Её Величества
 joi_flavor_gbr.42.t: "Празднование дня рождения монарха"
 joi_flavor_gbr.42.d: "Ежегодный #V день рождения монарха#! снова наступил в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Отдыхающие люди собираются на улицах и площадях, чтобы отпраздновать это редкое свободное время. Сам монарх на банкете по традиции объявляет список награждённых в честь дня рождения, вручая людям почести в память об этом дне."
 joi_flavor_gbr.42.f: "Со времён правления короля Георга III с 1748 года день рождения монарха стал официальным праздником на Британских островах. А после 1760 года день рождения монарха начали отмечать как официальный праздник и среди заморских подданных Британской империи. Хотя фактическая дата рождения каждого монарха разная, день рождения всегда приходится на один из июньских дней.\n\nОт Лондона до Торонто, от Сиднея до Кингстона, празднования проходят в каждом городе и деревне, каждая улица украшена королевскими гербами с золотым львом, красным львом и арфой. Для многих, верных принципу [GetLawType('law_monarchy').GetName], это хороший день, чтобы выразить свою преданность. Для других это прекрасная возможность отложить напряжённую работу и споры и просто хорошо провести день.\n\nДа здравствует монарх!"
 joi_flavor_gbr.42.a: "Боже, храни нашего монарха, даруй [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ей', 'ему' )] победы и славу!"
 joi_flavor_gbr.42.b: "Боже, храни нашего монарха, даруй [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'ей', 'ему' )] победы и славу!"
 joi_flavor_gbr.43.t: "День Империи"
 joi_flavor_gbr.43.d: "Ежегодный #V День Империи#! снова наступил в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Сторонники империи и солдаты организуют парады на улицах, проводятся грандиозные celebratory ceremonies. Во многих владениях империи по традиции устраивают фейерверки, чтобы отпраздновать этот день, символизирующий единство и славу."
 joi_flavor_gbr.43.f: "В ранней Британской империи не было праздника, посвящённого самой идее империи. Однако по предложению учёных из Королевского колониального института и лордов из Лиги имперской федерации этот день был учреждён как официальный праздник во всей Британской империи, чтобы напоминать детям, что они являются частью Британской империи. Центральным элементом этого дня является организованное, ритуальное почитание британского флага. Люди получают выходной, и создатели праздника надеются, что он будет способствовать воспитанию у молодых граждан империи чувства коллективной идентичности и имперской ответственности.\n\nОт Великобритании до Гибралтара, от Канады до Австралазии, от Дальнего Востока до Южной Африки, на площадях каждого города развеваются сине-бело-красные «Юнион Джеки» и их собственные флаги. Каждый колокол гордо возвещает о праздновании этого дня. Аристократы, офицеры и бесчисленные ветераны гордо маршируют среди ликующей толпы. Это действительно прекрасный день, день, который напоминает нам о мире и процветании, которыми мы наслаждаемся с момента основания империи.\n\nДа здравствует Империя!"
 joi_flavor_gbr.43.a: "Этот день принадлежит всем жителям Британской империи и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  # Вторая волна событий-перезагрузок. Восстановление Вестминстера
 joi_flavor_gbr.44.t: "Вестминстерский дворец"
 joi_flavor_gbr.44.d: "После того как пожар 1834 года уничтожил старый дворец, сегодня, в [TimeKeeper.GetCurrentDate.Format('y г.')], под руководством #V сэра Чарльза Бэрри#! и #V мистера Огастеса Пьюджина#! наконец-то был построен новый дворец Парламента. Он имеет примерно прямоугольную форму, его длинная ось параллельна Темзе, и он окружает центральный зал с просторным коридором, ведущим на север в Палату общин, на юг в Палату лордов, а на востоке находятся залы заседаний комитетов и библиотека, где установлены мраморные статуи выдающихся парламентариев."
 joi_flavor_gbr.44.f: "«Ваше Величество, это магнезиальный известняк песочного цвета из деревни Анстон в Южном Йоркшире и из Мэнсфилд-Вудхауса в Ноттингемшире. Его доставляют по воде через Честерфилдский канал, Северное море, а также по рекам Трент и Темза, снабжая нас необработанными блоками толщиной в четыре фута, подходящими для тонкой резьбы».\n\n«Это центральная башня, самая низкая из трёх главных башен. Я сделал её в виде шпиля, чтобы она могла работать вместе с дымоходами для отвода дыма. Это первый случай, когда наши инженерные системы оказали реальное влияние на архитектурный дизайн».\n\n«Ваше Величество, этот дворец полностью в греческом стиле, но его классический корпус изобилует тюдоровскими деталями»."
 joi_flavor_gbr.44.a: "Он станет непревзойдённым символом великолепия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_gbr.45.t: "Забастовка каменщиков"
 joi_flavor_gbr.45.d: "На строительной площадке Вестминстерского дворца каменщики начали забастовку из-за трудового спора, требуя улучшения заработной платы и условий труда. Забастовка на время остановила работы по восстановлению Парламента."
 joi_flavor_gbr.45.f: "«Позже стало известно, что эти господа, опасаясь утечки секретов, после бурных обсуждений решили, что ни один член их профессионального союза не должен начинать работу, пока строители официально не откажутся от „Ассоциации“ и пока „рабочие мистера Бэрри не прекратят забастовку“. Последний пункт был быстро урегулирован, так как незадолго до этого сэр Чарльз Бэрри провёл переговоры с каменщиками, в ходе которых он торжественно заявил, что обвинения в его адрес — полное недоразумение»."
 joi_flavor_gbr.45.a: "Не хотят работать — найдутся другие!"
 joi_flavor_gbr.45.b: "Повысить им зарплату."
  # События парламентских кнопок
 joi_flavor_gbr.46.t: "Дебаты по бюджету на [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.46.d: "В соответствии с финансовым годом, правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], должно представить в Палату общин новый бюджет, определяющий государственные расходы и источники доходов. Бюджетные дебаты касаются не только распределения ассигнований, но и политических приоритетов различных ведомств и надзорной функции Парламента за финансовым курсом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gbr.46.f: "«Бюджет устанавливает новые долгосрочные цели для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и отвечает на основные вызовы, стоящие перед экономикой. Это бюджет, направленный на обеспечение экономической стабильности, поощрение труда, стимулирование предпринимательства и содействие справедливости».\n\n«Этот бюджет является продолжением плана нынешнего правительства, которое представляет [SCOPE.sParty('ruling_party').GetName], и направлен на содействие занятости и повышение привлекательности труда посредством радикальной реформы налогов и пособий, а также пакета мер по повышению квалификации».\n\n«Меры по обеспечению справедливости помогут поддержать семьи с детьми, решить проблему бедности среди работающих, улучшить государственные услуги и окружающую среду, а также обеспечить, чтобы частные лица и предприятия платили справедливые налоги путём борьбы с уклонением от уплаты налогов»."
 joi_flavor_gbr.46.a: "Правительство должно выделить средства на поддержку обрабатывающей промышленности."
 joi_flavor_gbr.46.b: "Фермеры просят, чтобы [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] оказал им поддержку."
 joi_flavor_gbr.46.c: "Обеспечить налогоплательщикам лучшую инфраструктуру!"
 joi_flavor_gbr.46.e: "Предложить продвижение новой программы гражданского благосостояния."
 joi_flavor_gbr.46.h: "Наши вооружённые силы должны получить самый большой бюджет!"
 joi_flavor_gbr.47.t: "Чрезвычайная сессия Парламента"
 joi_flavor_gbr.47.d: "В связи с текущей особой ситуацией правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], решило рекомендовать [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству созвать чрезвычайную сессию для обсуждения срочных вопросов вне рамок установленной сессии. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество сегодня утром одобрил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] просьбу правительства, которое представляет [SCOPE.sParty('ruling_party').GetName]. Однако места в Вестминстере, похоже, не все заняты."
 joi_flavor_gbr.47.f: "«Я предлагаю, чтобы эта палата обратилась к [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству с благодарностью за великодушную речь, которую мы только что услышали от [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Неё', 'Него' )], произнесённую этим утром специальным посланником перед вновь собранным Парламентом».\n\n«Мы, как и [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество, верим, что объединение ведущих держав во всех вопросах, имеющих большое значение для Европы, обеспечит прочную гарантию поддержания мира. Кабинет, который представляет [SCOPE.sParty('ruling_party').GetName], постоянно получает обнадёживающие заверения от иностранных держав, выражающих желание поддерживать самые дружественные отношения с нашей страной».\n\n«Как бизнесмен, я с большим удовольствием вижу, что [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество в своей тронной речи поздравляет [ROOT.GetCountry.GetNameNoFlag] не с успехами во внешней политике или великими победами британской армии, а с заключением нового свободного торгового договора с одной из коммерческих наций, потому что именно на это мы должны полагаться для поддержания величия этой страны, а не на мощь нашего флота»."
 joi_flavor_gbr.47.a: "Парламент должен продвигать закон о мобилизации для подготовки к войне."
 joi_flavor_gbr.47.b: "Парламент должен предоставить правительству больше полномочий для подавления волнений!"
 joi_flavor_gbr.47.c: "Парламенту необходимо создать специальный комитет по текущему законопроекту."
 joi_flavor_gbr.47.e: "Потребовать от Парламента рассмотрения дополнительного бюджета для правительства."
 joi_flavor_gbr.48.t: "Вотум недоверия"
 joi_flavor_gbr.48.d: "В связи с ослаблением власти нынешнего правительства и его неблагоприятным положением в Палате общин, Палата стала считать, что правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], больше не может поддерживать большинство, и сегодня внесла вотум недоверия правительству [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества. Цель — подтолкнуть #yellow #B Самую лояльную оппозицию [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества#!#! и другие партии к совместному свержению правления партии [SCOPE.sParty('ruling_party').GetName]."
 joi_flavor_gbr.48.f: "«Позвольте представить [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству следующее смиренное обращение:\n\n[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Милостивейшая', 'Милостивейший' )] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle],\n\nМы, Ваши покорнейшие и преданнейшие подданные, #O #B члены Палаты общин Соединённого Королевства Великобритании и Ирландии#!#!, собравшись здесь, смиренно благодарим [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFullName] за любезную речь, обращённую к обеим палатам Парламента.\n\nНо мы обязаны с уважением донести до Вашего Величества следующее: #B нынешние советники Вашего Величества не пользуются доверием этой Палаты.#!»"
 joi_flavor_gbr.48.a: "Правящая партия должна сплотиться, чтобы противостоять вотуму."
 joi_flavor_gbr.48.b: "Голосование прошло, кабинет должен уйти в отставку!"
 joi_flavor_gbr.49.t: "Королевское провозглашение"
 joi_flavor_gbr.49.d: "Премьер-министр всегда может посоветовать [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству [ROOT.GetCountry.GetRuler.GetFullName] распустить Парламент и поручить избирательной комиссии начать новые всеобщие выборы. Нынешнее правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], учитывая благоприятную для них текущую ситуацию, уже посетило [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество и успешно убедило монарха использовать свою прерогативу, издав королевское провозглашение о роспуске Парламента и начале процедуры [Concept('concept_election', 'выборов')]."
 joi_flavor_gbr.49.f: "«Поскольку по совету Тайного совета [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество счёл(сочла) необходимым распустить нынешний Парламент, приостановив его функции; для этого мы издаём это королевское провозглашение и тем самым распускаем вышеупомянутый Парламент. Духовные и светские лорды, а также члены Палаты общин больше не обязаны присутствовать на заседаниях Парламента».\n\n«[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество желает и твёрдо намерен[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] как можно скорее встретиться со своим народом и выслушать его советы в Парламенте, и настоящим объявляет всем нашим дорогим подданным: наше королевское желание и воля — созвать новый Парламент; и настоящим далее объявляет, что по совету Тайного совета мы приказали, чтобы премьер-министр, который представляет [SCOPE.sParty('ruling_party').GetName], после получения уведомления немедленно издал в соответствии с законом и в надлежащей форме приказы о созыве нового Парламента».\n\n«Мы также настоящим королевским провозглашением, скреплённым нашей государственной печатью, требуем, чтобы премьер-министр и государственные секретари немедленно издали соответствующие приказы, чтобы духовные, светские и общинные члены Парламента после выборов официально вернулись в наш Парламент и присутствовали на заседаниях; эти приказы должны быть возвращены в соответствии с законом»."
 joi_flavor_gbr.49.a: "Министрам из партии [SCOPE.sParty('ruling_party').GetName], похоже, предстоит стать уважаемыми заднескамеечниками."
 joi_flavor_gbr.49.b: "Граждане видели заслуги партии [SCOPE.sParty('ruling_party').GetName] за последние несколько лет."
 joi_flavor_gbr.49.c: "Верим, что [SCOPE.sParty('ruling_party').GetName] сможет и дальше пользоваться доверием избирателей!"
 joi_flavor_gbr.50.t: "Колониальная политика"
 joi_flavor_gbr.50.d: "В ходе регулярных дебатов в Парламенте #O #B колониальная политика#!#! вновь стала центральной темой для всех депутатов. Сторонники экспансии подчёркивают, что присутствие империи в заморских территориях связано со стратегической обороной и продолжением экономических интересов; противники же утверждают, что чрезмерная экспансия ляжет тяжёлым бременем на бюджет и вызовет политические трения с подданными. [ROOT.GetCountry.GetNameNoFlag] должна найти баланс между поддержанием власти, содействием развитию и уважением к самоуправлению."
 joi_flavor_gbr.50.f: "«Я согласен с мнением, выраженным уважаемым депутатом [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName], что это один из самых важных вопросов, представленных на рассмотрение Парламента. Когда я читаю об этом, я совершенно не могу понять, почему некоторые так опрометчиво утверждают, что мы постыдно пренебрегли нашими обязанностями в колониях, в то время как я полагал, что, судя по их знаниям об этих территориях, они должны были бы иметь более глубокое понимание этого вопроса».\n\n«Правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], полностью признаёт, что это не означает, будто из-за всех этих улучшений существующие правительства в наших колониях являются наилучшими, какие только можно себе представить. Но я скажу так: если мы будем судить их по результатам управления в тогдашних условиях, то нет никаких оснований обвинять их в халатности и неэффективности».\n\n«Я так понимаю, вы говорите от имени многих умных людей, которые служат там на местах? — Без сомнения»."
 joi_flavor_gbr.50.a: "Нам необходимо продвигать новую колониальную экспансию."
 joi_flavor_gbr.50.b: "Правительство обязано нести истинную цивилизацию в колонии."
 joi_flavor_gbr.50.c: "Заморские подданные должны нести часть военных расходов империи."
 joi_flavor_gbr.50.e: "Им действительно нужно лучшее самоуправление!"
 joi_flavor_gbr.50.h: "Колониализм изжил себя, правительству необходимо начать программу предоставления независимости."
 joi_flavor_gbr.51.t: "Имперский военный кабинет"
 joi_flavor_gbr.51.d: "По мере того как [ROOT.GetCountry.GetNameNoFlag] втягива[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_T')]ся во всё более ожесточённый глобальный конфликт, правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], сталкивается с беспрецедентным давлением: [SCOPE.sCharacter('westminster_general_scope').GetFullName], важный чиновник, чей пост — [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle], объявил об отставке из кабинета и после ухода резко раскритиковал решения двух министров, что обострило споры о том, способно ли правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], справляться с задачами военного времени."
 joi_flavor_gbr.51.f: "«Господин спикер, требование, выдвинутое в предложении, которое вы зачитали как председатель, насколько мне известно, абсолютно беспрецедентно в истории этой Палаты: [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('westminster_general_scope').GetLastName], выдающийся [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle], по тем или иным причинам, уходит в отставку с должности, которую он занимал два года, и после ухода ставит под сомнение заявления, сделанные двумя министрами во время его пребывания в должности?»\n\n«Я говорю, что со мной обошлись несправедливо. Я думаю, [SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('westminster_general_scope').GetLastName], возможно, не говорил со мной об этом, потому что считал, что сначала следует поговорить со своим непосредственным начальством — либо с военным министром, либо с начальником Имперского генерального штаба. Возможно, он считал, что со мной ему говорить не о чем».\n\n«Сейчас [SCOPE.sCountry('enemy_country_scope').GetNameNoFlag] тихо, под покровом тумана, готовит, возможно, самый серьёзный удар в этой войне. Солдаты просят у нас больше помощи. Ради нашей общей страны, ради её судьбы сейчас и в ближайшие недели, я искренне умоляю Парламент прекратить эти нападки и направить свою энергию на поддержку наших генералов и солдат»."
 joi_flavor_gbr.51.a: "Военный кабинет должен быть готов к обороне родины и Европы."
 joi_flavor_gbr.51.b: "Кабинету нужен командный орган, способный обеспечить глобальную оборону!"
  # Английская гражданская война
 joi_flavor_gbr.52.t: "Восстание роялистов"
 joi_flavor_gbr.52.d: "После того как был отменён закон [GetLawType('law_monarchy').GetName], сторонники королевской власти собрались по всей стране и под предлогом #V защиты священной конституции#! подняли вооружённое восстание. Идеология, которой они придерживаются — [GetIdeology('ideology_royalist').GetName], и они считают нынешнее правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] узурпаторами и мятежниками. Страна движется к полномасштабной гражданской войне, которая определит форму правления и принадлежность власти."
 joi_flavor_gbr.52.f: "«Власть короля исходит от божественного права, дарованного Богом, а также от традиций и законов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] при его коронации и помазании. Власть тех, кто пытается его свергнуть, — это всего лишь грубая сила... Ни один сведущий юрист не подтвердит, что можно объявить импичмент монарху. Один из их девизов — „король не может ошибаться“».\n\n«Я должен сказать вам, что их свобода заключается в наличии правительства, но это не означает их участия в государственных делах; это их не касается. Подданный и король — совершенно разные вещи!»"
 joi_flavor_gbr.52.a: "Наступление тёмных времён."
 joi_flavor_gbr.53.t: "Парламент объявляет о низложении [ROOT.GetCountry.GetRuler.GetFullName]"
 joi_flavor_gbr.53.d: "В ходе кровавого противостояния и обостряющегося политического конфликта, сторонники идеологии [GetIdeology('ideology_constitutionalist').GetName] в конечном итоге решили по обвинению в #B государственной измене и тирании#! официально объявить трон [ROOT.GetCountry.GetRuler.GetFullName] незаконным и отменили закон [GetLawType('law_monarchy').GetName]. Они возглавили армию в вооружённом восстании против [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества. Без сомнения, впервые после #V Английской гражданской войны 1642 года#!, [ROOT.GetCountry.GetNameNoFlag] вновь ввергается в гражданскую войну, которая определит её будущее государственное устройство."
 joi_flavor_gbr.53.f: "«Король Британии, [ROOT.GetCountry.GetRuler.GetFullName], со злым умыслом пытался установить и поддерживать свою неограниченную тираническую власть, править по своей воле, свергнуть права и свободы народа, и на основе лишения и отмены прав и свобод народа осуществлять все меры по исправлению и устранению злоупотреблений; согласно основной конституции [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], эти полномочия и меры сохраняются за народом в лице регулярно созываемых парламентов или национальных тайных советов. Вышеупомянутый [ROOT.GetCountry.GetRuler.GetFullName], для осуществления своих злых замыслов, для защиты себя и своих последователей в их злых деяниях, и для достижения тех же целей, предательски и злонамеренно развязал войну против нынешнего Парламента и народа, который он представляет».\n\n«Исходя из вышеизложенного, [ROOT.GetCountry.GetRuler.GetFullName] является подстрекателем, зачинщиком и продолжателем этих противоестественных, жестоких и кровавых войн, и за все совершённые или вызванные в ходе войны государственные измены, убийства, грабежи, поджоги, разбой, разрушения, ущерб и вред, причинённые нашей стране, он по праву заслуживает смертной казни!»"
 joi_flavor_gbr.53.a: "Неслыханная дерзость!"
  # События парламентской реформы
 joi_flavor_gbr.54.t: "Акт о реформе [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.54.d: "После долгих призывов и ожесточённых дебатов, рекомендованный Парламентом Акт о реформе [TimeKeeper.GetCurrentDate.Format('y г.')] наконец получил королевское одобрение от [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества [ROOT.GetCountry.GetRuler.GetFullName] в [TimeKeeper.GetCurrentDate.Format('m г.')]. Он расширил избирательное право в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], позволив более широкому кругу мужчин зарегистрироваться в качестве избирателей. Хотя право голоса по-прежнему было связано с определённым имущественным цензом, многие горожане [ROOT.GetCountry.GetNameNoFlag] всё равно ликовали!"
 joi_flavor_gbr.54.f: "«Поскольку целесообразно изменить законы о представительстве народа Англии и Уэльса, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nС [TimeKeeper.GetCurrentDate.Format('m y г.')] каждый мужчина имеет право быть зарегистрированным в качестве избирателя и после регистрации избирать одного или нескольких членов Парламента от городского округа, если он соответствует следующим требованиям: достиг совершеннолетия и не имеет никаких юридических ограничений дееспособности; и в течение всего предыдущего двенадцатимесячного календарного периода был жителем или арендатором любого жилого помещения в округе в качестве собственника или нанимателя, и до [TimeKeeper.GetCurrentDate.Format('d m')] добросовестно уплатил сумму, равную налогу в пользу бедных.\n\nНа последний день июля любого года, и в течение предыдущих двенадцати месяцев, в качестве собственника или арендатора, был арендатором земли или дома в графстве, налогооблагаемая стоимость которого составляет двенадцать фунтов или более; и в течение периода аренды налоги, установленные для помощи бедным, за арендуемое им жильё были уплачены»."
 joi_flavor_gbr.54.a: "Правительство, которое представляет [SCOPE.sParty('ruling_party').GetName], извлечёт из этого выгоду."
 joi_flavor_gbr.54.b: "Миллионы новых избирателей, получивших право голоса, непременно будут благодарны [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству!"
 joi_flavor_gbr.55.t: "Акт о народном представительстве [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.55.d: "После долгих дебатов позиция партии [SCOPE.sParty('ruling_party').GetName] наконец одержала победу: Акт о народном представительстве [TimeKeeper.GetCurrentDate.Format('y г.')], продвигаемый [SCOPE.sCharacter('ig_intelligentsia_leader').GetFullName], получил королевское одобрение от [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества [ROOT.GetCountry.GetRuler.GetFullName]. Он предоставил всем взрослым мужчинам-гражданам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] всеобщее избирательное право, а также позволил женщинам при определённых условиях участвовать в общественной политике. Многие считают, что это станет ключевым моментом в истории конституционной демократии [ROOT.GetCountry.GetNameNoFlag]."
 joi_flavor_gbr.55.f: "«Поскольку целесообразно изменить законы об избирательном праве на парламентских и местных выборах, о регистрации избирателей на парламентских и местных выборах, о проведении выборов, и предусмотреть перераспределение мест на парламентских выборах, а также для других связанных с этим целей, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nЛюбой мужчина, достигший совершеннолетия и не имеющий никаких юридических ограничений дееспособности, и занимающий в качестве собственника или арендатора любую землю или дом в этом районе, имеет право быть зарегистрированным в качестве избирателя или кандидата в члены местного самоуправления.\n\nЛюбая женщина, если она является женой мужчины, зарегистрированного в их общем жилом помещении, или получила квалификацию, эквивалентную степени бакалавра, и ей исполнилось 30 лет, имеет право быть зарегистрированной в качестве избирателя на местных выборах.\n\nЕсли военнослужащий, находящийся на флоте или в армии, был зарегистрирован по месту жительства, которое он имел бы, если бы не его служба, он считается проживающим по этому месту жительства»."
 joi_flavor_gbr.55.a: "Палата общин — лучший представитель суверенитета граждан!"
 joi_flavor_gbr.55.b: "Идеи, которые представляет [GetIdeology('ideology_feminist').GetName], будут и дальше двигать нас к переменам."
 joi_flavor_gbr.56.t: "Акт о народном представительстве [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.56.d: "После долгого движения за права женщин, чья идеология — [GetIdeology('ideology_feminist').GetName], и парламентских дебатов, [ROOT.GetCountry.GetNameNoFlag] наконец сделал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] решающий шаг. [TimeKeeper.GetCurrentDate.Format('d m y г.')] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество [ROOT.GetCountry.GetRuler.GetFullName] одобрил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] Акт о народном представительстве [TimeKeeper.GetCurrentDate.Format('y г.')], который отменил ограничения по возрасту и семейному положению для женщин, предоставив право голоса в равной степени всем гражданам, достигшим двадцати одного года, независимо от пола. Отныне избирательное право не будет зависеть от пола. Бесчисленные женщины-граждане [ROOT.GetCountry.GetNameNoFlag], получившие право голоса, приветствуют великую реформу правительства, которое представляет [SCOPE.sParty('ruling_party').GetName]!"
 joi_flavor_gbr.56.f: "«Поскольку целесообразно уравнять избирательные права мужчин и женщин на парламентских и местных выборах и реализовать цели последующих актов, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nЛюбое лицо, зарегистрированное в качестве избирателя на парламентских выборах в любом избирательном округе, в течение периода регистрации, если это женщина, независимо от пола или семейного положения, имеет право голосовать на выборах членов Парламента в этом округе, но одно лицо не может голосовать более чем за одного кандидата на одних всеобщих выборах.\n\nСупруг или супруга лица, имеющего право быть зарегистрированным в качестве избирателя на местных выборах в местном избирательном округе в соответствии с предыдущим положением настоящей статьи, если он достиг совершеннолетия и не имеет никаких юридических ограничений дееспособности, имеет право быть зарегистрированным в качестве избирателя на местных выборах в этом округе»."
 joi_flavor_gbr.56.a: "Власть в равной степени принадлежит всему народу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  # События по Хлебным законам
 joi_flavor_gbr.57.t: "Акт об импорте [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.57.d: "После внутреннего раскола в партии [SCOPE.sParty('ruling_party').GetName] и совместной работы [SCOPE.sCharacter('corbden_leader').GetFullName] и [SCOPE.sCharacter('peel_leader').GetFullName], #V Хлебные законы#!, которые с 1815 года защищали интересы группы [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], были наконец отменены вчера #V Актом об импорте [TimeKeeper.GetCurrentDate.Format('y г.')]#!, одобренным [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством [ROOT.GetCountry.GetRuler.GetFullName]. Это ознаменовало, что принцип [GetLawType('law_free_trade').GetName] одержал полную победу."
 joi_flavor_gbr.57.f: "«Что касается представления нами этих мер, я не собираюсь лишать кого-либо заслуженной похвалы; но я скажу, что ни господа, сидящие на противоположной скамье, ни я сам, ни господа, сидящие вокруг меня, — ни одна из этих партий в строгом смысле слова не имеет права на эту заслугу. Здесь было объединение нескольких партий, и это объединение, вкупе с влиянием правительства, которое представляет [SCOPE.sParty('ruling_party').GetName], в конечном итоге способствовало успеху этих мер».\n\n«Однако, сэр, есть одно имя, которое должно быть связано с успехом этих мер: это не имя благородного столичного лорда и не моё имя. Имя, которое должно быть и будет связано с успехом этих мер, — это имя человека по имени [SCOPE.sCharacter('corbden_leader').GetFullName]».\n\n«Я уверен, что он, движимый чисто бескорыстными мотивами, с неустанным энтузиазмом, используя разум, красноречиво излагал идеи этих мер, и его красноречие было тем более восхитительно в своей простоте. Имя, которое должно быть и будет связано с успехом этих мер, — это [SCOPE.sCharacter('corbden_leader').GetFullName]; и я без колебаний приписываю ему успех этих мер»."
 joi_flavor_gbr.57.a: "Интересы фермеров по-прежнему требуют внимания."
 joi_flavor_gbr.57.b: "Новая экономическая политика — [GetLawType('law_free_trade').GetName]! Она приведёт нас к новому процветанию!"
 joi_flavor_gbr.58.t: "Навигационный акт [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.58.d: "Под сильным давлением партии [SCOPE.sParty('ruling_party').GetName] Парламент [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] принял новый #V Навигационный акт#!. Этот закон продолжает традицию, основой которой является [GetLawType('law_mercantilism').GetName], идущую с XVII века, и направлен на дальнейшую защиту экономических интересов [ROOT.GetCountry.GetNameNoFlag] путём ограничения колониальной торговли и ужесточения требований к национальной принадлежности судов. Однако эта мера вызвала недовольство у таких групп, как [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName], а также у заморских [concept_subject]."
 joi_flavor_gbr.58.f: "«Все суда, действительно принадлежащие [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], должны иметь капитана-британца и в плавании управляться экипажем, состоящим по меньшей мере наполовину из британских моряков и одного единственного британского капитана. Товары, которые они перевозят из-за пределов европейского континента, не облагаются дополнительными таможенными пошлинами».\n\n«Если какой-либо таможенный чиновник [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] выдаст какое-либо разрешение или позволит вывоз сахара, табака, имбиря, хлопка, шерсти, древесины, выращенных на землях, островах, колониях, плантациях, территориях или местах других стран, в любую другую страну или место до того, как эти товары будут сначала выгружены и доставлены в какой-либо порт или гавань [ROOT.GetCountry.GetNameNoFlag], то любой такой чиновник за такое нарушение лишается своей должности».\n\n«Если какое-либо лицо или группа лиц окажет сопротивление или силой воспротивится вышеупомянутому указу, то он будет подвергнут суровому наказанию, помимо наказаний, предусмотренных в этом указе за такие преступления, и будет отправлен в графство, где было совершено такое преступление, без права на залог или освобождение под стражу, до тех пор, пока он не предоставит наследникам и преемникам [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества залог в размере одной десятой стоимости товаров в фунтах стерлингов в качестве гарантии того, что он не совершит или не повторит подобных преступлений»."
 joi_flavor_gbr.58.a: "Наши заморские [Concept('concept_subject', 'субъекты')] должны приносить больше выгоды [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]!"
 joi_flavor_gbr.58.b: "[GetLawType('law_mercantilism').GetName] — наследие Адама Смита, которое мы должны сохранить!"
 joi_flavor_gbr.59.t: "Лига против Хлебных законов"
 joi_flavor_gbr.59.d: "Дебаты вокруг хлебных пошлин постепенно переросли в общенациональную политическую борьбу. При поддержке группы [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] известный оратор, чья идеология — [GetIdeology('ideology_market_liberal').GetName], заручился поддержкой группы [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] и сформировал новый гражданский альянс давления: #V Лигу против Хлебных законов#!. Они требуют от правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества продвигать повестку, основанную на принципе [GetLawType('law_free_trade').GetName]."
 joi_flavor_gbr.59.f: "«Когда цены на #V @grain!зерно#! высоки, люди не могут позволить себе эту еду, и у них почти не остаётся денег на #V @clothes!одежду#!. А когда у них почти нет денег на одежду, одежда не продаётся. А когда одежда не продаётся, её становится слишком много, и она очень дешевеет. А когда одежда очень дешева, доходы от её производства недостаточно высоки. В результате зарплаты текстильных рабочих падают, фабрики закрываются, бизнес идёт плохо, и вся страна оказывается в тяжёлом положении».\n\n«Но, как сейчас, когда у рабочего в кармане остаётся 25 шиллингов, он потратит эти деньги на покупку большего количества #V @clothes!одежды#!, что увеличит спрос на эти товары. А чем выше спрос, тем выше их цена. А рост цен, в свою очередь, приводит к повышению зарплат рабочих и увеличению прибыли работодателей. Таким образом, я доказываю, что высокие цены на #V @grain!зерно#! приводят к снижению зарплат, а низкие цены на #V @grain!зерно#! — к их повышению»."
 joi_flavor_gbr.59.a: "Хлебные законы должны быть отменены!"
 joi_flavor_gbr.59.b: "Правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества придерживается сдержанной позиции по этому вопросу."
 joi_flavor_gbr.60.t: "Центральное общество по защите сельского хозяйства"
 joi_flavor_gbr.60.d: "По мере того как #V движение против Хлебных законов#! набирало силу, чувствуя угрозу своим интересам, [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] и консервативные депутаты создали политический союз под названием #V Центральное общество по защите сельского хозяйства#!. Они пытаются отстоять легитимность Хлебных законов в общественном мнении и тем самым оказать давление на правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества."
 joi_flavor_gbr.60.f: "«Милорды, без сомнения, вы обязаны рассматривать все представленные вам меры, и вы имеете право голосовать за те меры, которые считаете нужными. В частности, вы обязаны голосовать против тех мер, которые кажутся поспешными и необдуманными. Однако, милорды, позвольте мне указать вам, что вы также обязаны серьёзно рассмотреть последствия любого вашего голосования по любому вопросу — серьёзно рассмотреть, в какое положение вы ставите эту Палату».\n\n«Милорды, теперь я прошу вас немного изучить законопроект, по которому вы будете голосовать сегодня вечером, — изучить, как он был вам представлен, и рассмотреть последствия, которые могут возникнуть, если вы примете этот закон. Мой благородный друг утверждает, что это голосование несовместимо с первоначальным голосованием Палаты общин по тому же вопросу и с так называемыми мнениями избирателей, которые их избрали»."
 joi_flavor_gbr.60.a: "Это определённо вызовет раскол внутри партии [SCOPE.sParty('ruling_party').GetName]."
 joi_flavor_gbr.60.b: "Так называемое общество — не более чем соска для успокоения арендаторов."
  # Флот
 joi_flavor_gbr.61.t: "Смотр Королевского флота [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.61.d: "Один за другим, новые #O #B линейные корабли#!#! и #B #O фрегаты#!#! были построены и спущены на воду при поддержке #V морского министра [SCOPE.sCharacter('lord_high_admiral').GetFullName] и Парламента#!. Величественный [concept_fleet] выстроился в гавани #V Портсмута#!. Бесконечные ряды военных кораблей покрыли всё море, и даже волны, казалось, замерли под их килями. #B Даже Посейдон померк бы перед лицом Британии!#! Зазвучала музыка военного оркестра, и спикер с гордостью сообщил ошеломлённым военным наблюдателям из [SCOPE.sCountry('great_power_2nd').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('great_power_3rd').GetAltNameNoFlag('RU_CL_RP')], что за этим великим [Concept('concept_fleet', 'флотом')] стоит не только он сам, но и мощный торговый флот [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], поддерживающий глобальные [Concept('concept_shipping_lane', 'линии снабжения')], #V и, что самое главное, великая империя.#!"
 joi_flavor_gbr.61.f: "#B «Правь, Британия! Правь волнами! Британцы никогда, никогда не будут рабами!#!\n\n#B Земля надежды и славы, мать свободы;#!\n\nКак нам восхвалить тебя, как воспеть?\n\n Твои справедливые законы, оберегаемые свободой, делают твою империю неприступной;\n\n#B Твои владения расширяются всё шире и шире; Бог сотворил тебя великой и делает тебя ещё сильнее;#!\n\nСлышишь, эта страна надежды и славы отвечает с радостью; видишь, все уста благодарны, все сердца воодушевлены!\n\n#B Моё сердце твёрдо, моё тело свободно, мы венчаем нашего монарха!»#!"
 joi_flavor_gbr.61.a: "Земля надежды и славы, как нам восхвалить тебя?"
 joi_flavor_gbr.61.b: "Правь, Британия! Британия, правь морями!"
  # Похороны герцога Веллингтона
 joi_flavor_gbr.62.t: "Похороны герцога Веллингтона"
 joi_flavor_gbr.62.d: "[TimeKeeper.GetCurrentDate.Format('d m y г.')], #V фельдмаршал, бывший премьер-министр, победитель при Ватерлоо, покоритель покорителя мира, его светлость герцог [SCOPE.sCharacter('duke_of_wellington_scope').GetFullName] Веллингтон#! скончался от инсульта. Он был самой авторитетной фигурой на политической и военной арене [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], и его смерть повергла всю нацию в траур. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество приказал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] устроить ему пышные государственные похороны. [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] заполонили тысячи людей, чтобы проводить этого величайшего маршала в его последний путь по набережной Темзы к месту вечного упокоения в соборе Святого Павла. В тот же день начался сильный дождь, словно сам Бог скорбел о смерти этого человека."
 joi_flavor_gbr.62.f: "«Сегодня вечером Палата общин призвана исполнить скорбный и высокий долг — явить зрелище сената, скорбящего по герою: похороны его светлости герцога [SCOPE.sCharacter('duke_of_wellington_scope').GetFullName] Веллингтона, прославленного фельдмаршала [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Он был не просто великим человеком, но светом в смутные времена и героем британцев. Наследие, которое он оставил своей родине, даже более велико, чем его слава: это образец его характера, величие его деяний, простота его жизни и чистота его помыслов».\n\n«Его светлость [SCOPE.sCharacter('duke_of_wellington_scope').GetFullName] был достойным образцом английского джентльмена и британской нации: он выражал их чувства, олицетворял их характер, защищал их честь и поддерживал их славу. В его победах весь народ чувствовал свой триумф, а в его уходе Британия скорбела и печалилась о нём»."
 joi_flavor_gbr.62.a: "Да упокоится он с миром и воскреснет во славе Господней."
  # События по журналам парламентских актов
 joi_flavor_gbr.63.t: "Закон о начальном образовании [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.63.d: "После долгих дебатов Парламент наконец принял эпохальный закон: на территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] будет создана всеобщая система государственных начальных школ. Это даст возможность любому ребёнку получить образование, независимо от бедности родителей, и обеспечит более светскую учебную среду, знаменуя вступление [ROOT.GetCountry.GetNameNoFlag] в эпоху обязательного образования."
 joi_flavor_gbr.63.f: "«Поскольку целесообразно обеспечить общее начальное образование на землях Соединённого Королевства, включая Англию, Уэльс, Шотландию и Ирландию, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nЗачисление или продолжение обучения любого ребёнка в школе не может быть обусловлено тем, что он должен или не должен посещать какую-либо воскресную школу или любое место религиозного поклонения, или участвовать в каких-либо религиозных обрядах или в каком-либо обучении по религиозным предметам в школе или в другом месте.\n\nШкольный совет обязан, с разрешения инспекторов [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, оплачивать полностью или частично плату за обучение в любой государственной начальной школе для любого ребёнка, проживающего в его юрисдикции, чьи родители из-за бедности не могут позволить себе оплатить обучение»."
 joi_flavor_gbr.63.a: "Обеспечить, чтобы правительство не несло чрезмерных административных затрат."
 joi_flavor_gbr.63.b: "Этот закон принесёт большую пользу следующему поколению [ROOT.GetCountry.GetNameNoFlag]."
 joi_flavor_gbr.64.t: "Закон о государственной помощи [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.64.d: "Экономическая политика, известная как [GetLawType('law_poor_laws').GetName], и соответствующие ей мальтузианские принципы когда-то были основой социальной помощи в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Но после долгой критики она всё чаще воспринимается как устаревшая, суровая и даже позорная система. Согласно новому закону Парламента, на смену придёт другая система — [GetLawType('law_old_age_pension').GetName]. Её будут финансировать совместно государственные фонды и местные власти, а помощь самым бедным слоям населения будет оказываться на гуманистических принципах."
 joi_flavor_gbr.64.f: "«Действующие законы о бедных прекращают своё действие и заменяются положениями второй части настоящего закона о предоставлении помощи нуждающимся за счёт средств, выделенных Парламентом, положениями третьей части настоящего закона о предоставлении жилья и других услуг местными властями, и соответствующими положениями четвёртой части настоящего закона».\n\n«Комитет обязан в соответствии с положениями настоящего закона оказывать помощь тем, кто в Великобритании не может удовлетворить свои потребности или чьи ресурсы должны быть дополнены для удовлетворения их потребностей; и должны быть приняты особые положения для слепых и для лиц, потерявших доход из-за лечения от туберкулёза лёгких».\n\n«Если комитет сочтёт необходимым для защиты интересов заявителя на пособие или его иждивенцев выдать всё пособие или его часть другому лицу, а не заявителю, комитет может выдать пособие соответствующим образом; любая квитанция на получение пособия освобождается от гербового сбора»."
 joi_flavor_gbr.64.a: "Это победа прогресса и гуманности."
 joi_flavor_gbr.64.b: "Законы о бедных, прочь с дороги!"
  # События по трудовому законодательству
 joi_flavor_gbr.65.t: "Закон о трудовых договорах [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.65.d: "После многих лет забастовок, митингов и ожесточённой борьбы профсоюзов, #O #b $movement_labor$#!#! наконец-то привлекло внимание Парламента. Частые несчастные случаи на производстве и бесчисленные жертвы среди рабочих склонили общественное мнение на их сторону. Под постоянным давлением и в результате протестов правительство было вынуждено уступить, издав новый закон [GetLawType('law_worker_protections').GetName]. Впервые была признана ответственность работодателя за производственные травмы и установлены требования к минимальной заработной плате."
 joi_flavor_gbr.65.f: "«Поскольку назрела необходимость в законе о компенсации рабочим, получившим травмы на производстве в результате несчастного случая, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nЕсли на любом производстве рабочий получит травму в результате несчастного случая на производстве, его работодатель обязан выплатить компенсацию в соответствии с первым приложением к настоящему закону, при соблюдении следующих условий; если травма произошла во время участия рабочего в забастовке, и он по-прежнему может получать полную заработную плату, работодатель не несёт ответственности за компенсацию.\n\nЕсли травма была вызвана халатностью или умышленными действиями работодателя, рабочий имеет право по своему выбору требовать компенсацию в соответствии с настоящим законом или подать иск в соответствии с процедурами, изложенными в настоящем законе; однако, если будет доказано, что травма была вызвана исключительно серьёзным и умышленным проступком рабочего, любой иск о компенсации за такую травму не подлежит удовлетворению.\n\nЕженедельная заработная плата рабочего не может быть ниже минимального стандарта, установленного комиссией по заработной плате; любой работодатель, нанимающий рабочего за заработную плату ниже минимального стандарта, будет оштрафован и обязан возместить недостающую заработную плату; в случае повторных нарушений работодатель может быть оштрафован судом в соответствии с настоящим законом и ему может быть предписано приостановить деятельность»."
 joi_flavor_gbr.65.a: "Профсоюзам тоже пора бы умерить пыл."
 joi_flavor_gbr.65.b: "Справедливость начинается здесь!"
 joi_flavor_gbr.66.t: "Трудовой кодекс [ROOT.GetCountry.GetNameNoFlag] [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.66.d: "После многих лет забастовок, митингов и ожесточённой борьбы профсоюзов, #O #b $movement_labor$#!#! наконец-то привлекло внимание правительства. Частые несчастные случаи на производстве и бесчисленные жертвы среди рабочих склонили общественное мнение на их сторону. Под постоянным давлением и в результате протестов [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'была вынуждена', 'был вынужден' )] уступить, издав новый закон [GetLawType('law_worker_protections').GetName]. Впервые была признана ответственность работодателя за производственные травмы и установлены требования к минимальной заработной плате."
 joi_flavor_gbr.66.f: "«Если на любом производстве рабочий получит травму в результате несчастного случая на производстве, его работодатель обязан выплатить компенсацию в соответствии с первым приложением к настоящему закону, при соблюдении следующих условий; если травма произошла во время участия рабочего в забастовке, и он по-прежнему может получать полную заработную плату, работодатель не несёт ответственности за компенсацию».\n\n«Если травма была вызвана халатностью или умышленными действиями работодателя, рабочий имеет право по своему выбору требовать компенсацию в соответствии с настоящим законом или подать иск в соответствии с процедурами, изложенными в настоящем законе; однако, если будет доказано, что травма была вызвана исключительно серьёзным и умышленным проступком рабочего, любой иск о компенсации за такую травму не подлежит удовлетворению».\n\n«Еженедельная заработная плата рабочего не может быть ниже минимального стандарта, установленного комиссией по заработной плате; любой работодатель, нанимающий рабочего за заработную плату ниже минимального стандарта, будет оштрафован и обязан возместить недостающую заработную плату; в случае повторных нарушений работодатель может быть оштрафован судом в соответствии с настоящим законом и ему может быть предписано приостановить деятельность»."
 joi_flavor_gbr.66.a: "Профсоюзам тоже пора бы умерить пыл."
 joi_flavor_gbr.66.b: "Справедливость начинается здесь!"
 joi_flavor_gbr.67.t: "Забастовка работниц спичечной фабрики в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.67.d: "На спичечной фабрике в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')] молодые работницы наконец не выдержали: их постоянно штрафовали за малейшие оплошности, а длительный контакт с белым фосфором вызывал у них ужасное заболевание — некроз челюсти. Они решили объявить всеобщую забастовку, требуя справедливого обращения и более безопасных условий труда."
 joi_flavor_gbr.67.f: "«За грязные ноги — штраф, за неубранное место — штраф; за разговоры — штраф, за сетку, запутавшуюся в станке, — штраф».\n\n«Многие беды происходят от того, что женщины не участвуют в общественной жизни; мир изначально был хорош и не стал хуже. Профсоюзы объединяются, чтобы помочь всем; не ради личной выгоды, а ради общего блага. Но они должны быть настойчивы; не просто вспышка гнева, а твёрдое единство ради всех».\n\n«Мы призываем рабочих всех стран, производящих спички, ради здоровья трудящихся оказать влияние на соответствующие правительства, чтобы были приняты законы, запрещающие использование ядовитого фосфора; а до тех пор мы призываем всех рабочих и работниц покупать только неядовитые спички»."
 joi_flavor_gbr.67.a: "Вся ответственность лежит на ужасных, бессовестных предприятиях в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]!"
 joi_flavor_gbr.67.b: "Арестовать этих зачинщиков!"
 joi_flavor_gbr.68.t: "Забастовка докеров в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.68.d: "В оживлённых доках [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_RP')] тысячи неквалифицированных рабочих — большинство в лохмотьях и голодные — прекратили работу и объявили забастовку. Они требуют повышения дневной платы и улучшения ужасных условий труда. По мере распространения забастовки и остановки доков, столичный порт оказался почти полностью парализован."
 joi_flavor_gbr.68.f: "«Эти бедняги в лохмотьях, почти без обуви, в крайне плачевном состоянии... Эти люди приходят работать в наши доки, не имея ни крошки во рту, возможно, не ели с прошлого дня. Они работают час и зарабатывают 6 пенсов; их голод не позволяет им продолжать: они берут эти 6 пенсов, чтобы купить еду, возможно, первую за последние двадцать четыре часа».\n\n«Спой песенку за 6 пенсов, докеры бастуют; морские свинки голодны, как жадные щуки; пока доки не откроются, Бёрнс будет говорить за вас; парни, мужайтесь, вы победите, и победите в течение недели!»"
 joi_flavor_gbr.68.a: "Капитал не может без труда, а труд — без капитала."
 joi_flavor_gbr.68.b: "Отправить кавалерийскую бригаду для подавления этих смутьянов!"
 joi_flavor_gbr.69.t: "Захват фабрики в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.69.d: "В [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')] группа рабочих не вышла из фабрики, как обычно, а захватила станки и котлы: они сидят за рабочими столами в цехах, отказываясь продолжать производство. Этот шаг почти полностью парализовал фабрики во всём [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]."
 joi_flavor_gbr.69.f: "«Они сидели у станков, котлов и рабочих столов, разговаривали; некоторые впервые осознали свою важность в производственном процессе в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')]. Двенадцать человек почти остановили фабрику! Активные, поддерживающие профсоюзы рядовые рабочие, разбросанные по разным цехам, по своей инициативе заявили: „Мы должны быть с ними!“ И так, все они, и члены профсоюза, и не состоящие в нём, присоединились к ним»."
 joi_flavor_gbr.69.a: "Это предвестник синдикализма, нужно остановить амбиции левых!"
 joi_flavor_gbr.69.b: "Очевидно, что захват фабрики — серьёзное нарушение закона."
 joi_flavor_gbr.69.c: "Владельцы фабрик должны понять, что они не могут обойтись без поддержки рабочих."
 joi_flavor_gbr.70.t: "Кровавое воскресенье"
 joi_flavor_gbr.70.d: "[TimeKeeper.GetCurrentDate.Format('d m')], в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')] большие толпы рабочих собрались на площади, размахивая транспарантами с лозунгами, скандируя о свободе и хлебе. Они подали монарху и правительству петицию с призывом принять закон [GetLawType('law_worker_protections').GetName]. Ситуация быстро накалялась, и правительство [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_RP')] опасалось, что демонстрация перерастёт в полномасштабное восстание."
 joi_flavor_gbr.70.f: "«Предъявив эти требования и поклявшись их исполнить, вы сделаете [ROOT.GetCountry.GetNameNoFlag] счастливой и славной, и впишете своё имя в сердца наши и наших потомков навеки; если вы не исполните эти требования, мы умрём здесь, на этой площади; нам некуда идти, у нас только два пути — либо к свободе и счастью, либо в могилу!»\n\n«Товарищи, верно? Пусть наши жизни будут принесены в жертву за страдающую [ROOT.GetCountry.GetNameNoFlag]. Мы не сожалеем об этой жертве, мы идём на неё добровольно!»\n\n«Так тому и быть! Никакого благочестия... умрём за [ROOT.GetCountry.GetNameNoFlag]! Теперь мы должны спасти [ROOT.GetCountry.GetNameNoFlag] от бюрократов, и мы пойдём впереди, в первых рядах!»"
 joi_flavor_gbr.70.a: "Приказать городскому гарнизону немедленно открыть огонь!"
 joi_flavor_gbr.70.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен' )] сначала покинуть [SCOPE.sState('labor_law_strike_scope').GetCityHubName]."
 joi_flavor_gbr.70.c: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] лично выйдет поговорить с народом!"
 joi_flavor_gbr.71.t: "Бунт на Хеймаркет"
 joi_flavor_gbr.71.d: "[TimeKeeper.GetCurrentDate.Format('d m')] в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')] митинг с призывом к #O #B восьмичасовому рабочему дню#!#! перерос в #R жестокие столкновения.#! Речь сторонника идеологии [GetIdeology('ideology_anarchist').GetName] и приказ полиции разойтись смешались воедино, и в итоге прогремевший взрыв потряс весь город."
 joi_flavor_gbr.71.f: "«Зловещие учения идеологии [GetIdeology('ideology_anarchist').GetName] сегодня вечером в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')] принесли кровавые плоды, и до рассвета по меньшей мере дюжина стойких людей отдаст свои жизни в этом бунте и кровопролитии в память о его учениях».\n\n«Прежде всего я должен вам сказать, что это собрание было созвано совсем не для таких целей. Цель этого собрания — разъяснить общую ситуацию с движением за #O #B восьмичасовой рабочий день#!#! и прояснить различные связанные с ним события».\n\n«Именем закона приказываю вам прекратить это и разойтись!»\n\n«Восемь часов на работу, восемь часов на отдых, восемь часов на что угодно; рабочие, вооружайтесь, все силы на борьбу!»"
 joi_flavor_gbr.71.a: "Мы не можем препятствовать праву граждан на забастовку."
 joi_flavor_gbr.71.b: "Именем закона, огонь!"
 joi_flavor_gbr.72.t: "Великая забастовка железнодорожников в стране [ROOT.GetCountry.GetNameNoFlag]"
 joi_flavor_gbr.72.d: "Начавшись со станции в [SCOPE.sState('labor_law_strike_scope').GetCustom('RU_SL_PP')], забастовка охватила все железнодорожные линии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Сейчас они заполнены бастующими рабочими с плакатами. Профсоюз железнодорожников требует повышения зарплат и сокращения рабочего дня, а работодатели отказываются идти на уступки. Великая забастовка распространяется, и транспортная сеть всей страны оказалась в ужасном параличе."
 joi_flavor_gbr.72.f: "«Работодатели говорят: „К чёрту рабочих!“, а мы отвечаем: „Труд заслуживает уважения!“ Наша борьба не только за себя, но и за права тех, кто будет трудиться после нас».\n\n«Когда сила трудящихся объединяется, она непреодолима. Она сокрушит систему, которая их угнетает, как молния расщепляет дуб. Однажды наше молчание будет громче, чем голоса, которые вы сегодня заглушаете!»"
 joi_flavor_gbr.72.a: "О, боже!"
 joi_flavor_gbr.72.b: "Полиция должна немедленно вмешаться."
  # Законы о бедных
 joi_flavor_gbr.73.t: "Отчёт о состоянии работных домов"
 joi_flavor_gbr.73.d: "В последние годы функционирование системы, основанной на законе [GetLawType('law_poor_laws').GetName], подвергалось резкой критике со стороны многих общественных деятелей. Вчера в Парламенте был зачитан #V Отчёт о состоянии работных домов#!, подготовленный по поручению правительства, которое представляет [SCOPE.sParty('ruling_party').GetName], #B высокопоставленным комиссаром Уайтхолла по делам бедных#! после тщательного и детального расследования. В отчёте без обиняков указывалось на недостатки и опасности закона [GetLawType('law_poor_laws').GetName], и полностью подтверждались обвинения общественности в бесчеловечных условиях в работных домах."
 joi_flavor_gbr.73.f: "«Она не способствовала ни интеллектуальному развитию, ни воспитанию мужества и независимости. Её влияние иссушило последние ростки общественной жизни; она уничтожила всякое самоуважение и лишила заключённых почти всякого сочувствия, которое свойственно по природе как равным, так и вышестоящим».\n\n«Изоляция и дискомфорт — единственные средства, с помощью которых работает тест закона [GetLawType('law_poor_laws').GetName]. Чтобы он работал, работный дом должен тщательно поддерживать эту бесчеловечную изоляцию и дискомфорт»."
 joi_flavor_gbr.73.a: "Поразительно! Закон [GetLawType('law_poor_laws').GetName] должен быть коренным образом реформирован."
 joi_flavor_gbr.74.t: "Отчёт о состоянии работных домов"
 joi_flavor_gbr.74.d: "Несмотря на то, что в последние годы функционирование системы, основанной на законе [GetLawType('law_poor_laws').GetName], подвергалось резкой критике со стороны многих общественных деятелей, вчерашний #V Отчёт о состоянии работных домов#!, подготовленный #B высокопоставленным комиссаром Уайтхолла по делам бедных#! после «тщательного и детального» расследования, полностью одобрил текущее состояние работных домов, что вызвало большое возмущение у многих левых депутатов Парламента и сочувствующих им в партии [SCOPE.sParty('ruling_party').GetName]."
 joi_flavor_gbr.74.f: "«Какое правительство немедленно решает вопрос, который коренится в многовековой практике, переплетён с привычками людей и укоренился в их предрассудках? Из всех законодательных вопросов, в которые правительству не следует грубо или преждевременно вмешиваться, не выяснив и, если возможно, не приняв во внимание преобладающие настроения в стране, я считаю, что [GetLawType('law_poor_laws').GetName] — это тот случай, где спешка наименее уместна».\n\n«В настоящее время их тюремный вид и их цель — мучить бедных — вызывают у людей спасительный страх перед ними; а щедрые компенсации за внебрачных детей приводят к росту незаконнорождённости, делая потерю целомудрия для женщин кратчайшим путём к замужеству или получению достаточного содержания, и поощряют вымогательство и лжесвидетельство»."
 joi_flavor_gbr.74.a: "О, вот как?"
  # Чартистское движение
 joi_flavor_gbr.75.t: "Народная хартия"
 joi_flavor_gbr.75.d: "Вчера шесть членов парламента и шесть рабочих провели так называемый «Чартистский митинг» в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. На нём они представили «Народную хартию» из шести пунктов, требующих всеобщего избирательного права. Это нашло отклик у многих рабочих по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Без сомнения, назревает политическая буря."
 joi_flavor_gbr.75.f: "«Учитывая, что Палата общин в настоящее время, во имя народа и как его предполагаемый представитель, осуществляет законодательную власть, и для мудрого и верного исполнения возложенных на неё великих обязанностей должна точно и правильно представлять желания, чувства и интересы народа, постановляется:\n\nС момента принятия этого постановления, в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] каждый мужчина-житель при следующих условиях получает право избирать членов парламента. Также постановляется, что для обеспечения равного представительства народа в Палате общин, [ROOT.GetCountry.GetNameNoFlag] будет разделен[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на триста избирательных округов.\n\nИзбирательный комиссар каждого округа назначает заместителя для проведения выборов на каждом избирательном участке в день голосования. Этот заместитель подчиняется и несёт ответственность за соблюдение настоящего постановления в пределах своих полномочий. По окончании сессии каждый член Палаты общин имеет право получить из казны платёжный документ в качестве вознаграждения за исполнение законодательных полномочий на службе обществу. Размер вознаграждения устанавливается в 20 фунтов в год»."
 joi_flavor_gbr.75.a: "Внимательно следить за действиями чартистов."
 joi_flavor_gbr.76.t: "Национальный чартистский съезд"
 joi_flavor_gbr.76.d: "В городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], миллионы рабочих поддержали шесть требований «Народной хартии» и через Национальный чартистский съезд подали массовую петицию. Шествие было упорядоченным, а демонстрация в целом прошла мирно. Представители съезда утверждают, что число подписей под петицией достигло трёх с половиной миллионов. Однако в #O #B Вестминстере#!#! до сих пор нет единого мнения о том, стоит ли принимать эту петицию."
 joi_flavor_gbr.76.f: "«Триста пятьдесят тысяч человек спокойно, упорядоченно, хладнокровно, мирно и твёрдо требуют справедливости от своих правителей, а правители остаются глухи к их протестам. Триста пятьдесят тысяч человек просят разрешения изложить свои обиды и отстоять свои права, а „Парламент“ решает не давать им слова!»\n\n«Триста пятьдесят тысяч рабов протянули оливковую ветвь мира классу, обладающему избирательным правом и привилегиями, стремясь к прочному и тесному союзу на принципах равенства перед законом, а класс, обладающий избирательным правом и привилегиями, отказался подписывать договор! Тот же класс по-прежнему остаётся классом рабов; клеймо и позор не будут сняты, и народ не обретёт свободу»."
 joi_flavor_gbr.76.a: "Отклонить петицию."
 joi_flavor_gbr.76.b: "Парламент рассмотрит их петицию."
 joi_flavor_gbr.76.c: "Отправить полицию разогнать их!"
 joi_flavor_gbr.77.t: "Бунт на Булл-Ринге в [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.77.d: "В [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_PP')] массовый митинг, связанный с #O #B Чартистским движением#!#!, перерос в серьёзные беспорядки. Часть местных жителей столкнулась с полицией, были подожжены здания. Очевидцы сообщают о жертвах как среди гражданских, так и среди полицейских. [SCOPE.sState('chartism_movement_state').GetCityHubName] погрузился в хаос."
 joi_flavor_gbr.77.f: "«Жители [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_RP')] считали лондонскую полицию чужаками. Какие-то безумцы в отместку поджигали дома. Вывели солдат, и мой сосед, который случайно стоял безоружным на углу Эджбастон-стрит и просто наблюдал, лишился носа... Хотя мы в одиночку пересекали Булл-Ринг, солдаты всё равно бросились на нас и пытались меня зарубить»."
 joi_flavor_gbr.77.a: "Проявить терпимость."
 joi_flavor_gbr.77.b: "Зачитать Акт о бунтах и разогнать мятежников!"
 joi_flavor_gbr.78.t: "Восстание в [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.78.d: "В [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_PP')] лидер #yellow #B чартистов#!#! [SCOPE.sCharacter('john_frost_scope').GetFullName] призвал массы к вооружённому сбору, утверждая, что по всей стране на его призыв откликнулись тысячи сторонников. Однако реальная мобилизация оказалась гораздо слабее его заявлений, но всё же вызвала ожесточённые споры о чартистах в #O #B Вестминстере#!#!."
 joi_flavor_gbr.78.f: "«Он говорил жителям [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_RP')], что чартисты из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] — молодцы, они собирают оружие. Но, к своему стыду, он сказал, что жители выставили его лжецом. В подтверждение своих слов он попросил поднять руки тех, кто уже запасся оружием. Под общий хохот поднялась одна рука».\n\n«[SCOPE.sCharacter('john_frost_scope').GetFullName] заявлял на съезде, что есть шесть тысяч чартистов, все они добрые и верные люди, полностью вооружены и ждут решающей схватки. Тогда он прекрасно знал, что [SCOPE.sCharacter('john_frost_scope').GetLastName] преувеличивает, но не опроверг его, потому что думал, что если такая молва пойдёт, это может принести пользу и побудить других к действию»."
 joi_flavor_gbr.78.a: "Парламент должен рассмотреть их петицию."
 joi_flavor_gbr.78.b: "Отправить полицию для поддержания порядка в [SCOPE.sState('chartism_movement_state').GetCustom('RU_SL_PP')]."
 joi_flavor_gbr.78.c: "Подавить бунт, арестовать и судить злодея [SCOPE.sCharacter('john_frost_scope').GetFullName]!"
 joi_flavor_gbr.79.t: "Всеобщая забастовка [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.79.d: "Под влиянием требований #O #B Чартистского движения#!#!, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и его окрестности вспыхнули от массовой забастовки. Рабочие требуют сокращения рабочего дня, повышения заработной платы и заявляют, что хартия станет для них путём к процветанию. Забастовка быстро распространяется на всю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_gbr.79.f: "«Среди хаотичной застройки появилось бесчисленное множество дворов, переулков и укромных уголков... Добавьте к этому шокирующую грязь, и, несмотря на живописные окрестности, можно представить себе отвратительную атмосферу Стейлибриджа».\n\n«Друзья! Чартизм — это не политическое движение, главной целью которого является борьба за голоса. Чартизм — это вопрос ножа и вилки: хартия означает уютное жильё, обильную еду и питьё, процветание и более короткий рабочий день! С хартией мы сможем всего этого достичь!»"
 joi_flavor_gbr.79.a: "Правительство бессильно."
 joi_flavor_gbr.79.b: "Отправить гренадерскую гвардию для подавления забастовщиков!"
 joi_flavor_gbr.80.t: "Митинг в Кеннингтон-парке"
 joi_flavor_gbr.80.d: "В [TimeKeeper.GetCurrentDate.Format('y г.')] чартисты вновь провели массовый митинг в лондонском Кеннингтон-парке, заявив, что передадут в Парламент петицию с подписями миллионов рабочих. Многие советуют монарху, что этот акт неповиновения в столице на самом деле является прелюдией к попытке государственного переворота со стороны [SCOPE.sCharacter('labor_leader_scope').GetLastName]."
 joi_flavor_gbr.80.f: "«По всей стране существовали чартистские ассоциации, но им не хватало сплочённости. Одни хотели избирательного права, другие — всеобщего избирательного права для совершеннолетних и так далее... Цели и методы радикалов были разрозненными, и надежды на какие-либо достижения почти не было».\n\n«Однако, когда была составлена „Народная хартия“, она чётко определила насущные требования рабочего класса, и мы почувствовали, что у нас появилось настоящее связующее звено. Поэтому мы должны превратить радикальные ассоциации в местные центры чартистского движения!»"
 joi_flavor_gbr.80.a: "Право на собрания не должно быть нарушено."
 joi_flavor_gbr.80.b: "Передайте им, что монарх не желает насилия."
 joi_flavor_gbr.81.t: "Закон о хартии [TimeKeeper.GetCurrentDate.Format('y г.')]"
 joi_flavor_gbr.81.d: "По мере роста популярности #yellow #B чартистских#!#! митингов и массовых петиций, призывы к парламентской реформе в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] становились всё громче. Рабочие долгое время критиковали ограниченность избирательного права, отсутствие жалованья у депутатов и неравное распределение избирательных округов. Теперь, под давлением #yellow #B чартистов#!#!, Парламент решил провести реформу избирательной системы и разработал новый закон."
 joi_flavor_gbr.81.f: "«Поскольку целесообразно, в ответ на волю петиционеров, изменить законы об избирательном праве на парламентских и местных выборах, о регистрации избирателей и о проведении выборов, по совету и с согласия духовных и светских лордов и членов Палаты общин на текущей сессии Парламента, и с его разрешения, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество постановляет следующее:\n\nВ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] каждый мужчина-житель при следующих условиях получает право избирать членов парламента. Для обеспечения равного представительства народа в Палате общин, [ROOT.GetCountry.GetNameNoFlag] будет разделен[ROOT.GetCountry.GetAltNameNoFormatting('RU_CL_END_FEM')] на триста избирательных округов.\n\nИзбирательный комиссар каждого округа назначает заместителя для проведения выборов на каждом избирательном участке в день голосования. Этот заместитель подчиняется и несёт ответственность за соблюдение настоящего постановления в пределах своих полномочий. По окончании сессии каждый член Палаты общин имеет право получить из казны платёжный документ в качестве вознаграждения за исполнение законодательных полномочий на службе обществу. Размер вознаграждения устанавливается в 20 фунтов в год»."
 joi_flavor_gbr.81.a: "Это победа #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! народа!"
 joi_flavor_gbr.82.t: "Закрытие «Northern Star»"
 joi_flavor_gbr.82.d: "По мере падения интереса к #O #B Чартистскому движению#!#!, потерявший энтузиазм [SCOPE.sCharacter('labor_leader_scope').GetFullName] в итоге решил продать самую известную пропагандистскую газету чартистов «Northern Star» другим людям. Без сомнения, Чартистское движение закончилось. [ROOT.GetCountry.GetNameNoFlag] успешно пережил[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] эту бурю. Правление правительства [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества остаётся непоколебимым!"
 joi_flavor_gbr.82.f: "«Я слышал от него бесчисленные клятвы, которые он готов был дать за вознаграждение. Могу ли я верить такому человеку? Я слышал, как он читал Библию, и всякий раз, доходя до имени Христа или апостолов, я видел, как он вырывал эти страницы со словами: „Сожжём это проклятое. Эти апостолы — величайшие негодяи, о которых я когда-либо слышал“. Однажды я слышал, как он, дойдя до имени Иуды, сказал: „Он был отличным парнем. Какое же хорошее вознаграждение он получил. Дайте мне половину, и я сделаю то же самое“»."
 joi_flavor_gbr.82.a: "Эти мерзкие подстрекатели наконец-то убрались."
 joi_flavor_gbr.82.b: "Рано или поздно потомки вспомнят о труде этих людей."
  # Экономический кризис и железнодорожная лихорадка
 joi_flavor_gbr.83.t: "Неделя ужаса"
 joi_flavor_gbr.83.d: "На фоне железнодорожного бума и кредитной экспансии финансовый рынок за короткое время стремительно вырос. Однако спекулятивный пузырь в итоге лопнул, что привело к череде банкротств банков и предприятий. Акции некогда процветающих железных дорог резко упали, и паника охватила фондовую биржу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Воющие #v $capitalists$#! назвали этот кризис #R «Неделей ужаса»#!."
 joi_flavor_gbr.83.f: "«С 1840 года кредитная экспансия возобновилась в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] и распространилась на [SCOPE.sCountry('railway_1_power').GetAltNameNoFlag('RU_CL_VP')] и [SCOPE.sCountry('railway_2_power').GetAltNameNoFlag('RU_CL_VP')]. Были построены тысячи миль железных дорог, фондовый рынок вошёл в период устойчивого роста, особенно выигрывали железнодорожные акции. Объём депозитов и кредитов всего за два года вырос в пять раз, что вызвало спекулятивную лихорадку, пока в [TimeKeeper.GetCurrentDate.Format('y г.')] в [ROOT.GetCountry.GetNameNoFlag] не разразился экономический кризис»."
 joi_flavor_gbr.83.a: "Давно говорил этим болванам не перегибать палку!"
 joi_flavor_gbr.84.t: "Чёрный понедельник"
 joi_flavor_gbr.84.d: "Начавшись с #R сокрушительного обвала фондового рынка в [SCOPE.sCountry('first_rank_power').GetAltNameNoFlag('RU_CL_PP')]#!, #R ужасный биржевой крах, финансовый кризис и неравномерное распределение на рынке привели к масштабной экономической депрессии#!, которая мгновенно охватила [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Высокие процентные ставки, ожидаемая дефляция и постоянное нежелание людей брать кредиты привели к последовательному падению потребительских расходов и инвестиций. Цены рухнули, фабрики и фермы массово банкротились, и каждый член общества страдал от этого кризиса."
 joi_flavor_gbr.84.f: "В начале [TimeKeeper.GetCurrentDate.Format('y г.')] экономические перспективы были радужными: казалось, весь рынок растёт. В середине [TimeKeeper.GetCurrentDate.Format('m')] началась массовая распродажа акций. Наконец, [TimeKeeper.GetCurrentDate.Format('d m')], в Чёрный понедельник, фондовый рынок [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] открылся падением на 11%. Меры по стабилизации рынка провалились. Во второй половине дня рынок рухнул ещё на 12%. Тысячи инвесторов разорились, потеряв миллиарды фунтов. Многие акции было невозможно продать ни за какую цену. Банки оказались не в состоянии расплатиться со всеми кредиторами и были на грани краха."
 joi_flavor_gbr.84.a: "О, Господи!"
 joi_flavor_gbr.84.b: "Твою мать!"
 joi_flavor_gbr.84.c: "Всемогущий Аллах!"
 joi_flavor_gbr.84.e: "Почему у этих иностранцев всегда всё так плохо?"
 joi_flavor_gbr.84.h: "Дурак, проблема в экономике!"
 joi_flavor_gbr.85.t: "Таможенные споры"
 joi_flavor_gbr.85.d: "Под ударом экономического кризиса дебаты о таможенной политике вновь вышли на повестку дня. Часть членов правительства выступает за сохранение принципа [GetLawType('law_free_trade').GetName] для поддержания рыночной ликвидности. Другие призывают к политике, основанной на законе [GetLawType('law_protectionism').GetName], для поддержки отечественной промышленности. [ROOT.GetCountry.GetNameNoFlag] должна сделать выбор между различными интересами и идеологиями."
 joi_flavor_gbr.85.f: "«Политическая динамика заставляет людей думать, что между тарифами и экономическими циклами нет связи: в периоды процветания доходы достаточно высоки, чтобы снижать тарифы, а когда наступает рецессия, давление в пользу их повышения возрастает. К тому времени экономика восстанавливается, создавая впечатление, что снижение тарифов привело к краху, а их повышение — к восстановлению».\n\n«В некоторых отраслях тарифы, возможно, могут ускорить развитие на несколько лет. Но реальный рост следует в большей степени приписывать богатым ресурсам и открытости для талантов и идей»."
 joi_flavor_gbr.85.a: "Рынок сам себя отрегулирует."
 joi_flavor_gbr.85.b: "Необходимо принять протекционистскую политику."
 joi_flavor_gbr.85.c: "Ввести ограниченное вмешательство."
 joi_flavor_gbr.86.t: "Кризис доверия"
 joi_flavor_gbr.86.d: "Накопление бюджетного дефицита наконец-то спровоцировало кризис государственного долга: выпущенные правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] государственные облигации потеряли доверие рынка, инвесторы отказываются их покупать, а процентные ставки взлетели. Отечественные и иностранные капиталисты массово сбрасывают облигации, и казна на грани коллапса. Продолжающаяся паника также привела к разрыву финансовых цепочек у многих частных учреждений. Общественность требует от правительства немедленных действий для восстановления доверия."
 joi_flavor_gbr.86.f: "«Правители товарообмена человечества потерпели неудачу из-за собственного упрямства и некомпетентности, они признали своё поражение и отказались от власти. Деяния беспринципных менял осуждены судом общественного мнения и отвергнуты сердцами людей».\n\n«Менялы бежали из высоких кресел нашего храма цивилизации. Теперь мы можем восстановить этот храм в соответствии с древними истинами. Мера восстановления заключается в том, насколько мы будем придерживаться более благородных общественных ценностей, чем простая денежная выгода».\n\n«Осознание ложности материального богатства как мерила успеха требует отказа от ошибочного убеждения, что ценность государственной службы и высокого политического положения определяется лишь высотой поста и личной выгодой. Поведение в банковской и коммерческой сферах, где священное доверие часто рассматривается как безжалостное и эгоистичное беззаконие, должно быть прекращено»."
 joi_flavor_gbr.86.a: "У нас больше нет золота, прекратите обмен!"
 joi_flavor_gbr.86.b: "Объявить о гарантиях курса национальной валюты."
 joi_flavor_gbr.86.c: "Необходимо принять меры для избавления финансовых учреждений от плохих активов."
 joi_flavor_gbr.86.e: "Временно конфисковать заморские золотые резервы!"
 joi_flavor_gbr.87.t: "Банкротство банков"
 joi_flavor_gbr.87.d: "Серьёзные финансовые потрясения распространяются по [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]: паническое снятие вкладов и паралич транзакций быстро распространяются, банки, неспособные обменять валюту, один за другим банкротятся, инвесторы в панике выводят средства, и рынок входит в порочный круг изъятия вкладов и бегства капитала."
 joi_flavor_gbr.87.f: "«В середине [TimeKeeper.GetCurrentDate.Format('y г.')] финансовый кризис постепенно вышел из-под контроля, начавшись с краха кредитного банка в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] в [TimeKeeper.GetCurrentDate.Format('m')]. Инвесторы были обеспокоены жёсткой фискальной политикой правительства, и по мере спиралевидного падения доверия они выводили краткосрочный капитал из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. В первую неделю [TimeKeeper.GetCurrentDate.Format('m')] было потеряно 150 миллионов фунтов, во вторую — 540 миллионов, а [TimeKeeper.GetCurrentDate.Format('d m')] за один день было потеряно ещё 150 миллионов фунтов»."
 joi_flavor_gbr.87.a: "Предоставить банкам экстренные кредиты, чтобы избежать массового изъятия вкладов!"
 joi_flavor_gbr.87.b: "Нам самим не до них, кого волнуют их проблемы?"
 joi_flavor_gbr.87.c: "Правительство должно временно взять на себя управление частными банками."
 joi_flavor_gbr.88.t: "Кризис дефицита"
 joi_flavor_gbr.88.d: "Длительный бюджетный дефицит подорвал экономическую основу нации. Правительство разрывается между долгами и расходами, а споры в Парламенте и обществе о фискальной политике становятся всё ожесточённее. Многие экономисты советуют монарху, что если не принять срочные меры, [ROOT.GetCountry.GetNameNoFlag] полностью потеряет доверие финансовых рынков."
 joi_flavor_gbr.88.f: "«В течение многих лет эта страна страдала от бездействия и безразличия правительства: страна взывала к правительству, но правительство оставалось слепо! Нам пришлось бороться с заклятыми врагами мира — коммерческой и финансовой монополией, спекуляцией, безрассудными банками, классовой борьбой, местничеством, военной наживой. Они начали рассматривать правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] как придаток к своим собственным делам».\n\n«Теперь мы знаем, что правительство, управляемое организованными деньгами, так же опасно, как и правительство, управляемое организованной толпой. Никогда в нашей истории эти силы не были так едины против одного кандидата, как сегодня. Они единодушно ненавидят меня — и я приветствую их ненависть»."
 joi_flavor_gbr.88.a: "Только повышение налогов и увеличение государственных расходов спасёт экономику!"
 joi_flavor_gbr.88.b: "Повысить налоги и сократить государственные расходы."
 joi_flavor_gbr.88.c: "Можно отвлечь внимание на внешних врагов!"
 joi_flavor_gbr.89.t: "Тяжёлое положение безработных и фермеров"
 joi_flavor_gbr.89.d: "Ударная волна экономического кризиса дошла до городов и сёл: городские рабочие теряют работу из-за закрытия фабрик, а урожай сельских фермеров остаётся невостребованным из-за сокращения рынка. Всё больше семей оказываются за чертой бедности, растёт паника в обществе и обвинения в бездействии правительства. Правительство должно решить, как реагировать на эту общенациональную беду."
 joi_flavor_gbr.89.f: "«Промышленные предприятия повсюду увядают, как сухие листья; фермерская продукция не находит рынка; сбережения тысяч семей за многие годы испарились. Более того, огромное число безработных #tooltippable_name [ROOT.GetCountry.GetAdjective|l]их#! граждан сталкивается с суровой реальностью выживания, и столько же людей усердно трудятся, не получая никакого вознаграждения. Только глупый оптимист будет отрицать мрачную действительность».\n\n«Наша важнейшая задача — обеспечить людей работой. Если мы подойдём к этому мудро и смело, эта проблема не является неразрешимой. Есть много способов её решить, но одними разговорами делу не поможешь. Мы должны действовать, и действовать быстро!»"
 joi_flavor_gbr.89.a: "Мы не можем им помочь."
 joi_flavor_gbr.89.b: "Принять меры для помощи обедневшим людям."
 joi_flavor_gbr.89.c: "Расширить инфраструктурные проекты, чтобы предоставить им работу."
 joi_flavor_gbr.90.t: "Пивной путч в [SCOPE.sState('economic_crisis_state').GetCustom('RU_SL_PP')]"
 joi_flavor_gbr.90.d: "В тени экономических трудностей и всеобщей безработицы пивные в [SCOPE.sState('economic_crisis_state').GetCustom('RU_SL_PP')] стали рассадниками для разочарованных рабочих, обанкротившихся фермеров и радикалов. Под руководством одного сторонника идеологии [GetIdeology('ideology_fascist').GetName] эти люди начали бунтовать на местах."
 joi_flavor_gbr.90.f: "«Вы можете видеть, что нашей движущей силой является не тщеславие и не личный интерес, а лишь сильное желание в этот решающий час вступить в битву за нашу #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ую#! родину. И наконец, я скажу вам ещё кое-что: либо #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ая#! революция начнётся сегодня вечером, либо на рассвете мы все умрём!»"
 joi_flavor_gbr.90.a: "Может быть, именно они смогут спасти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]?"
 joi_flavor_gbr.90.b: "Решительно подавить этих сторонников идеологии [GetIdeology('ideology_fascist').GetName]!"
 joi_flavor_gbr.90.c: "Право на собрания не означает права на вооружённый мятеж, разогнать их!"
  # События железнодорожной лихорадки
 joi_flavor_gbr.91.t: "Амбициозные железнодорожные инвесторы"
 joi_flavor_gbr.91.d: "По мере того как строительство железных дорог в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] шло полным ходом, энтузиазм инвесторов достиг апогея. В атмосфере ажиотажа они наперебой вкладывали деньги, словно каждая миля путей могла превратиться в золото. Железнодорожная компания из города [SCOPE.sState('railway_mania_state').GetCityHubName] воспользовалась моментом и начала продавать публике ипотечные акции, заявляя, что железные дороги принесут неслыханное процветание."
 joi_flavor_gbr.91.f: "«Господа! Железные дороги — это абсолютно беспроигрышное вложение. Они стимулируют спрос на строительные материалы, уголь, железо, а затем и сталь. Они обеспечивают топливом промышленные печи и домашние очаги. Они позволяют миллионам людей, которые раньше почти не путешествовали, передвигаться. Железные дороги — это сама наша цивилизация!»\n\n«Наша компания теперь предлагает широкой публике возможность инвестировать, приобретая акции всего за 10% от их стоимости... Господа, количество перевозимых нами грузов и пассажиров постоянно растёт. Вам нужно лишь вложить сегодня 10 фунтов, и завтра они превратятся в 12, послезавтра — в 15, через неделю — в 20, а через месяц у вас будет 50 фунтов!»"
 joi_flavor_gbr.91.a: "Железные дороги — это богатство, железные дороги — это будущее!"
 joi_flavor_gbr.91.b: "Абсурд! Это уже слишком!"
  # Из Англии группа товарищей, обосновавшаяся в Канаде
 joi_flavor_gbr.92.t: "Эвакуация Королевского флота"
 joi_flavor_gbr.92.d: "С [TimeKeeper.GetCurrentDate.Format('y г.')] #R коммунисты#!, не прекращавшие бунтовать, захватили [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и правительство были вынуждены под защитой #U Королевского флота#! эвакуироваться с нашей родины на заморские территории, всё ещё верные Империи. Премьер-министр [SCOPE.sCharacter('red_pm').GetFullName] в последней радиопередаче сообщил народу, что, хотя правительство временно прекращает вооружённое сопротивление наступающим коммунистическим предателям, #V со временем правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества вернётся и восстановит порядок в #yellow #B Соединённом Королевстве#!#!."
 joi_flavor_gbr.92.f: "«Война казалась бесконечной, фронт застыл, армия была срочно переброшена на юг. Ослабление линии фронта позволило синдикалистам в [TimeKeeper.GetCurrentDate.Format('m')] начать запланированное наступление. Скоординированные удары на фронте привели к прорыву у Питерборо и Лутона, и в тот же день был взят Бристоль. Когда новость об этом дошла, в город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] воцарился хаос. Последние государственные служащие эвакуировались, и [TimeKeeper.GetCurrentDate.Format('d m')] правительство покинуло город. В спешной эвакуации казна и множество правительственных документов, как секретных, так и открытых, были оставлены повстанцам. Оставшиеся войска потеряли связь с командованием и были втянуты в ожесточённые городские бои. На улицах развевались красные флаги»."
 joi_flavor_gbr.92.a: "Да здравствует революция!"
 joi_flavor_gbr.92.b: "Скорее на корабль, уходим отсюда, цель — Оттава!"
 joi_flavor_gbr.92.c: "Скорее на корабль, уходим отсюда, цель — Мельбурн!"
 joi_flavor_gbr.92.e: "Скорее на корабль, уходим отсюда, цель — Дели!"
 joi_flavor_gbr.92.h: "Сначала уходим, а с пунктом назначения разберёмся потом."
 joi_flavor_gbr.93.t: "Прибытие роялистов"
 joi_flavor_gbr.93.d: "С момента распада #yellow #B Соединённого Королевства Великобритании и Ирландии#!#! в [TimeKeeper.GetCurrentDate.Format('y г.')] изгнанники пережили долгий и мучительный период. За это время монарх, остатки правительства и более миллиона представителей имперской элиты бежали в город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]..."
 joi_flavor_gbr.93.f: "Те, кто остался верен короне, очевидно, ожидали высадки, чтобы отвоевать родину у #R коммунистических#! выскочек. Однако они быстро обнаружили, что позиции сторонников идеологии [GetIdeology('ideology_communist').GetName] оказались сильнее, чем предполагалось. Первые попытки провалились, а #R Британский Союз#!, наоборот, укрепился.\n\nПо мере того как мечта о возвращении в Лондон таяла, как призрак, оставшиеся силы Империи были вынуждены пересмотреть своё положение. Они ясно осознали, что их пребывание в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], скорее всего, не будет временным. Итак, генерал-губернатор был заменён монархом, Сенат — Палатой лордов, а красный флаг был перекрашен в синий, чтобы избежать путаницы. В городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] их называли #U #B «изгнанниками»#!#!, и они пытались обосноваться на новом месте. Однако различия между аристократической культурой старой Англии и новой культурой города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] были очевидны. Для многих #G #B «Британский король»#!#! был всего лишь дальним родственником.\n\n#B Скитающиеся изгнанники полны решимости вернуть свою родину, однако #V им в конечном итоге придётся столкнуться с жестокой политической реальностью: возможно, этого никогда не произойдёт.#!#!"
 joi_flavor_gbr.93.a: "Группа товарищей из Англии, обосновавшаяся в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]..."
 joi_flavor_gbr.93.b: "«Юнион Джек» реет, и золотой лев рычит, указывая путь к Хайленду и проливу!"
  # Викторианская мораль
 joi_flavor_gbr.94.t: "Эпоха прогресса"
 joi_flavor_gbr.94.d: "С восшествием на престол [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] начали распространяться новые моральные ценности и стандарты этикета. Люди повсеместно стали культивировать внешнее достоинство и сдержанность, одновременно ведя ожесточённые споры о том, как применять новые моральные концепции на практике. Благочестивые #v $clergymen$#! из группы [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] создали организации для надзора за поведением и призывали правительство принять меры для включения религиозной морали в общественные нормы."
 joi_flavor_gbr.94.f: "«Между 1780 и [TimeKeeper.GetCurrentDate.Format('y г.')] #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ий#! народ перестал быть одним из самых агрессивных, грубых, шумных, прямолинейных, вспыльчивых, жестоких и кровожадных народов мира, и стал одним из самых сдержанных, вежливых, упорядоченных, мягких, чопорных и лицемерных».\n\n«Эта трансформация уменьшила жестокость по отношению к животным, преступникам, душевнобольным и детям; запретила многие жестокие виды спорта и игр, такие как травля быков и петушиные бои, а также безобидные развлечения, включая многие ярмарки и бдения».\n\n«Правительство, представляющее [ROOT.GetCountry.GetNameNoFlag], отменило около двухсот смертных приговоров в уголовном кодексе, отменило систему ссылки преступников в Австралию и навело порядок в тюрьмах; превратило воскресенье в день молитвы для одних и в день воздержания для всех»."
 joi_flavor_gbr.94.a: "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] придерживается высоких моральных стандартов."
 joi_flavor_gbr.94.b: "[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] также будут следовать этим стандартам."
 joi_flavor_gbr.95.t: "Мораль против рабства"
 joi_flavor_gbr.95.d: "Сторонники идеологии [GetIdeology('ideology_abolitionist').GetName], возглавляемые [SCOPE.sCharacter('devout_leader').GetFullName], создали общенациональную сеть из сотен местных аболиционистских групп. Они открыто подали петицию в Вестминстер, осуждая постыдное рабство в [SCOPE.sCountry('slave_state').GetAltNameNoFlag('RU_CL_PP')] и требуя от [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] выполнить свою аболиционистскую миссию и бороться с жестокими рабовладельцами."
 joi_flavor_gbr.95.f: "У нас в стране нет рабов — так почему же они должны быть за границей?\nОни тоже пересекли разделяющие нас\nВолны, чтобы обрести освобождение и свободу.\n\nРаб не может дышать в Англии; если его лёгкие\nВдохнут наш воздух, в тот же миг он станет свободен!\nКак только он ступит на нашу землю, его оковы падут.\n\nЭто благородно, это показывает гордость нации,\nИ ревниво оберегает это благословение. Так распространите же его,\nПусть оно течёт по каждой вене вашей империи, чтобы они почувствовали:\nГде сила Англии, там человечество ощущает её милосердие."
 joi_flavor_gbr.95.a: "Публично осудить их аморальное рабство."
 joi_flavor_gbr.95.b: "Королевский флот покажет [SCOPE.sCountry('slave_state').GetAltNameNoFlag('RU_CL_DP')], как мы поступаем с работорговцами."
 joi_flavor_gbr.95.c: "Лучше не связываться со [SCOPE.sCountry('slave_state').GetAltNameNoFlag('RU_CL_TP')]."
 joi_flavor_gbr.96.t: "Жестокое обращение с животными"
 joi_flavor_gbr.96.d: "Обнародованный случай жестокого обращения с животными в городе [SCOPE.sState('animal_scope').GetCityHubName] вызвал бурю негодования в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] из общества против жестокого обращения с животными и сторонники идеологии [GetIdeology('ideology_utilitarian_millian').GetName] надеются убедить Парламент объявить жестокое обращение с животными вне закона."
 joi_flavor_gbr.96.f: "«Любое лицо, которое жестоким избиением, жестоким обращением, чрезмерной ездой, оскорблением или пыткой причинит какой-либо вред или ущерб любому животному, или тем самым причинит какой-либо вред или ущерб любому лицу или любому имуществу, то каждый такой правонарушитель после осуждения должен будет выплатить владельцу животного или лицу, которому был нанесён вышеупомянутый ущерб или вред, компенсацию в размере не более 10 фунтов».\n\n«За жестокое избиение, жестокое обращение, чрезмерную езду, оскорбление или пытку любого животного, или за содействие или подстрекательство к жестокому избиению, жестокому обращению, чрезмерной езде, оскорблению или пытке любого животного, каждый такой правонарушитель за каждое такое нарушение будет подвергнут конфискации имущества и уплате штрафа в размере не более 5 фунтов»."
 joi_flavor_gbr.96.a: "Сурово наказать мучителей животных в городе [SCOPE.sState('animal_scope').GetCityHubName]."
 joi_flavor_gbr.96.b: "Достаточно оштрафовать в соответствии с законом."
 joi_flavor_gbr.97.t: "Жизнь во грехе"
 joi_flavor_gbr.97.d: "С ростом урбанизации традиционные, проповедуемые в Библии моральные ценности начали подвергаться испытанию в городах. «Гедонистические грехи», такие как сожительство до брака и распутство, стали повсеместными. Люди предаются плотским утехам, что вызывает глубокое огорчение у благочестивых #v $clergymen_only_icon$ священнослужителей#! из группы [GetInterestGroupVariant('ig_devout',GetPlayer).GetName]."
 joi_flavor_gbr.97.f: "«Ибо воля Божия есть освящение ваше, чтобы вы воздерживались от блуда; чтобы каждый из вас умел соблюдать свой сосуд в святости и чести, а не в страсти похотения, как и язычники, не знающие Бога».\n\n«Брак у всех да будет честен и ложе непорочно; блудников же и прелюбодеев судит Бог. Если кто обольстит девицу необручённую и поспит с нею, тот должен дать за неё выкуп и взять её себе в жену»."
 joi_flavor_gbr.97.a: "Люди должны следовать учению Господа и избегать сожительства до брака."
 joi_flavor_gbr.97.b: "Это личное дело людей, при чём здесь правительство?"
 joi_flavor_gbr.98.t: "Страна разврата"
 joi_flavor_gbr.98.d: "Согласно недавнему отчёту, представленному группой [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], один лишь [SCOPE.sState('prostitution_scope').GetCityHubName] насчитывает более 8600 проституток. Они также отмечают, что анонимность привела к значительному росту проституции и незаконных сексуальных связей, что серьёзно подрывает моральные ценности общества [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gbr.98.f: "«Она чувствует сердцем, видит глазами, она — вершина всего, суть всего;»\n«Цель, к которой она стремится, и её воплощение;»\n«Ибо она так проста, так утончённо мила, что мой глубочайший восторг не может её описать».\n\n«Однако, задача, которую я выбрал сегодня, — воспеть её добродетели как девушки и жены;»\n«Я не могу просить о более счастливой доле, чем эта: всю жизнь петь ей хвалу»."
 joi_flavor_gbr.98.a: "Сурово бороться с этими порочными проститутками."
 joi_flavor_gbr.98.b: "Им нужна забота правительства."
 joi_flavor_gbr.99.t: "Английский джентльмен"
 joi_flavor_gbr.99.d: "Джентльменские манеры и этикет становятся самым ярким символом этой эпохи в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]: #B чёрный фрак, высокий цилиндр, трость и монокль, рыцарский дух, эрудиция мудреца, следование заветам древних мудрецов, и главная цель — устранение препятствий, мешающих свободе действий окружающих#!. #V «Английский джентльмен»#! становится славным моральным ориентиром и образом."
 joi_flavor_gbr.99.f: "«На улице стоит настоящий викторианский джентльмен: его строго скроенный длинный фрак плотно облегает фигуру, серебряная цепочка карманных часов тускло блестит на тёмной ткани; в руке в перчатке он держит трость, на лбу — высокий чёрный цилиндр, а блестящий монокль делает его взгляд острым: изучающим, почти осуждающим».\n\n«Он не слушает клевету или сплетни, он с осторожностью судит о мотивах тех, кто ему мешает, и трактует всё в лучшем свете. В споре он никогда не бывает мелочным, не пользуется преимуществом, не путает личные нападки или едкие замечания с аргументами и не намекает на то, что не осмеливается высказать».\n\n«Он обладает достаточным здравомыслием, чтобы не обижаться на оскорбления; он слишком занят, чтобы помнить обиды; он слишком суров и строг, чтобы терпеть злобу. Он придерживается философских принципов, терпелив, снисходителен, покорен. Он терпит боль, потому что она неизбежна; он переносит утрату, потому что она невосполнима; он спокойно встречает смерть, потому что такова его судьба»."
 joi_flavor_gbr.99.a: "Джентльменство влияет на каждого из нас."
 joi_flavor_gbr.99.b: "Истинное джентльменство — это благородство, выдержка и мудрость всего общества."
  #
 joi_flavor_gbr.100.t: "Английское чаепитие"
 joi_flavor_gbr.100.d: "@tea!#V Послеполуденный чай#! стал модным светским мероприятием в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Хотя изначально это был лишь способ для высшего общества заполнить промежуток между обедом и ужином, теперь он стал частью нашей культуры и образа жизни."
 joi_flavor_gbr.100.f: "«Дамы из высшего общества переодевались в длинные платья, надевали перчатки и шляпки и наслаждались @tea!#V послеполуденным чаем#! в гостиной, обычно в четыре-пять часов вечера. Подавались разнообразные изысканные сэндвичи, сконы со взбитыми сливками и джемом. Кроме того, предлагались пирожные и выпечка. Чай из Индии или Цейлона подавали в серебряных чайниках и наливали в изящные чашки из костяного фарфора».\n\n«Конечно, в способах употребления чая со сливками существуют большие региональные различия, и спор всегда сводится к двум вариантам: девонширскому и корнуолльскому. Говоря об этом, после того как тёплый скон разрезан пополам, самый важный вопрос — в каком порядке добавлять взбитые сливки и клубничный джем? Пожалуй, мы решим... сливки в первую очередь!»"
 joi_flavor_gbr.100.a: "Выпьем по чашечке чая!"
  # Дополнительное событие по викторианской морали
 joi_flavor_gbr.101.t: "Аморальный детский труд"
 joi_flavor_gbr.101.d: "Детский труд становится всё более распространённым явлением в #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ом#! обществе. Детей часто заставляют работать с раннего возраста, так как им нужно помогать своим семьям сводить концы с концами. [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName] и [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] единогласно считают, что такой труд наносит огромный вред физическому, психическому, социальному и моральному развитию детей."
 joi_flavor_gbr.101.f: "«Это был ветхий старый дом, конечно, он стоял у самой реки, и крысы кишели в нём. Его комнаты с деревянными панелями, гнилые полы и лестницы, и серые крысы, и их писк и возня, доносившиеся с лестницы в любое время, и грязь, и тлен этого места — всё это живо встаёт перед моими глазами, словно я снова там».\n\n«Внизу было ещё два-три мальчика, которые занимались тем, что закрывали крышками банки с ваксой, и получали примерно столько же. В первый понедельник утром один из них в рваном фартуке и бумажной шапке поднялся наверх, чтобы показать мне, как завязывать узел на верёвке. Его звали Боб Фейгин»."
 joi_flavor_gbr.101.a: "Мы не можем остановить колёса промышленности."
 joi_flavor_gbr.101.b: "Детский труд — позор #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! общества!"
  # Событие по утилитаризму
 joi_flavor_gbr.102.t: "Гражданская служба [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества"
 joi_flavor_gbr.102.d: "Принципы идеологии [GetIdeology('ideology_utilitarian_millian').GetName] успешно заняли центральное место в разработке #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! политики. Система гражданской службы была реорганизована, её эффективность повысилась, и эта политическая концепция глубоко укоренилась в сознании."
 joi_flavor_gbr.102.f: "Вклад [SCOPE.sCharacter('relevant_character').GetFullName] в утилитаризм укрепился благодаря успехам в развитии [ROOT.GetCountry.GetNameNoFlag]. Хотя некоторые по-прежнему сомневаются в ценности идеологии [GetIdeology('ideology_utilitarian_millian').GetName] для гражданской службы [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, группа [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] выступила в защиту утилитарных принципов управления: постоянная, единая и политически нейтральная государственная служба, основанная на меритократии и с чётким разделением повседневных обязанностей.\n\nОна успешно искоренила коррупцию, обеспечивала предоставление государственных услуг даже под давлением войны и эффективно справлялась с политическими изменениями. Мотивированная общественным благом, она была готова выполнять политику, в конечном счёте определяемую министрами."
 joi_flavor_gbr.102.a: "Надёжная государственная служба — несокрушимый хребет [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
  # События в Парламенте
 joi_flavor_gbr.103.t: "Сонный депутат"
 joi_flavor_gbr.103.d: "Вчера было замечено, что один из [Concept('concept_westminster_england', 'членов английского парламента')] уснул во время острых дебатов по закону [SCOPE.sLaw('current_law_scope').GetName]. Сначала он настаивал, что просто прикрыл глаза, но, похоже, не смог убедить общественность. На самом деле, он не первый депутат, пойманный спящим на работе, и многие граждане уже начинают сильно возмущаться этим явлением."
 joi_flavor_gbr.103.f: "«62-летний депутат, сэр, уснул в Палате общин во время дебатов по закону [SCOPE.sLaw('current_law_scope').GetName]. И он не просто закрыл глаза; уважаемый сэр почти лежал! В конце концов, он открыл глаза и понял, что, возможно, оказался на виду у журналистов, наблюдающих за заседанием из ложи прессы. Он быстро поправил позу, выглядя немного смущённым».\n\n«Это оскорбление для нас, для народа! Как они смеют так пренебрегать своим положением и важными для нашей жизни вещами?»"
 joi_flavor_gbr.103.a: "Дремать на работе — всегда плохая идея."
 joi_flavor_gbr.103.b: "Не нравится твоё положение — убирайся!"
 joi_flavor_gbr.104.t: "Абсурдная пышность"
 joi_flavor_gbr.104.d: "Громоздкие процедуры #O #B Вестминстера#!#! вызывают у многих раздражение. Недавно популярная сатирическая газета заявила, что великая, торжественная, священная и ключевая Палата общин #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ого#! государства на самом деле является «нагромождением длинной, пустой и несущественной болтовни»."
 joi_flavor_gbr.104.f: "«Видите того дородного, хриплого мужчину в синем пальто, странной короне и широкополой шляпе, в белых вельветовых бриджах и тяжёлых ботинках? Он без умолку говорит уже полчаса, и его важность вызывает немало смеха у посторонних. Это и есть „великий страж“ Вестминстерского мира».\n\n«Он — выдающийся авторитет в области прецедентов, и, разговорившись после выпивки, он расскажет вам, как такой-то сэр, будучи у власти, поднял с постели четырёх человек, чтобы они проголосовали за большинство, и трое из них умерли по дороге домой; как Парламент однажды разделился во мнениях о том, приносить ли новые свечи; как спикер случайно остался в своём кресле после окончания заседания и был вынужден просидеть в Парламенте в одиночестве три часа, пока не было внесено предложение о перерыве; и много других подобных анекдотов»."
 joi_flavor_gbr.104.a: "Эффективность должна быть повышена, мы должны сосредоточиться на законе [SCOPE.sLaw('current_law_scope').GetName]."
 joi_flavor_gbr.104.b: "Отлично, они могут подать свои предложения господам из соседнего независимого комитета."
 joi_flavor_gbr.105.t: "Спекулятивный скандал"
 joi_flavor_gbr.105.d: "Недавно выяснилось, что харизматичный спекулянт, член парламента от партии [SCOPE.sParty('par_party').GetName] и группы [SCOPE.gsInterestGroup('par_interest_group').GetName], совершил серьёзное спекулятивное мошенничество. Он использовал инсайдерскую информацию о законе [SCOPE.sLaw('current_law_scope').GetName] для получения прибыли и прикрывал свои преступления своей респектабельной политической репутацией."
 joi_flavor_gbr.105.f: "«Он использовал репутацию своей семьи, выступавшей против нонконформистов и либерализма. Он вкладывал сбережения простых людей в недвижимость, построил некоторые из лучших отелей Лондона и основал другие компании. Он подделывал отчётность, перекладывал деньги из одного кармана в другой и переводил активы из одной компании в другую».\n\n«Он тщательно планировал межфирменные переводы, чтобы выплачивать дивиденды из несуществующей прибыли, а аудиторы закрывали на это глаза. Однако сам он исчез, не сообщив никому о своём местонахождении, но предполагается, что он тайно сел на пароход и отправился в [SCOPE.sCountry('corrupt_state').GetAltNameNoFlag('RU_CL_VP')]»."
 joi_flavor_gbr.105.a: "Требуем его экстрадиции из [SCOPE.sCountry('corrupt_state').GetAltNameNoFlag('RU_CL_RP')] для суда!"
 joi_flavor_gbr.105.b: "Мы бессильны, можем лишь объявить его в розыск."
 joi_flavor_gbr.106.t: "Комитет дураков"
 joi_flavor_gbr.106.d: "После первого и второго чтения законопроект [SCOPE.sLaw('current_law_scope').GetName] перешёл на стадию комитета всей Палаты. Однако недобросовестные [SCOPE.sParty('par_party').GetName] и [SCOPE.sCharacter('shit_ig_leader').GetFullName], известный противник этого закона, сговорились и пытаются замедлить законодательный процесс путём долгих и повторяющихся обсуждений его деталей, и даже внесения сотен совершенно абсурдных поправок."
 joi_flavor_gbr.106.f: "«Поправки от партии [SCOPE.sParty('par_party').GetName] странны по содержанию и ещё более странны по форме. Структура текста хаотична, повторения бесконечны, а стиль совершенно неуместен. Вместо того чтобы использовать красноречие, свойственное научному письму — ясность, точность, краткость, — они погрязли в туманных, напыщенных выражениях, полных той чепухи, которой восхищаются пятнадцатилетние мальчишки».\n\n«Что касается группы [SCOPE.gsInterestGroup('shit_ig').GetName] и её комитета, или, точнее, деятельности господина [SCOPE.sCharacter('shit_ig_leader').GetFullName] в комитете, то это — идеальная насмешка над комитетом всей Палаты. Он небрежен в сборе фактов, неспособен рассуждать на их основе после сбора, не понимает простейших терминов и выдвигает тезис, смысла которого сам не знает. Тезис, который он хотел выдвинуть и пытался доказать, и привёл ко всем нынешним пагубным последствиям»."
 joi_flavor_gbr.106.a: "Бесконечные поправки — это отвратительно!"
 joi_flavor_gbr.106.b: "Проклятые консерваторы из [SCOPE.sParty('par_party').GetName]!"
 joi_flavor_gbr.107.t: "Коллективная неявка"
 joi_flavor_gbr.107.d: "Из-за бесполезного противодействия закону [SCOPE.sLaw('current_law_scope').GetName] со стороны [SCOPE.sParty('wid_party').GetName], разгневанные депутаты от этой партии решили устроить коллективную забастовку. Они не явились на ключевое голосование по законопроекту, чтобы заставить контролируемую партией [SCOPE.sParty('par_party').GetName] Палату общин приостановить процедуру голосования."
 joi_flavor_gbr.107.f: "«Вчера я от имени правительства, которое представляет [SCOPE.sParty('par_party').GetName], представил протокол заседания ведомства, уведомив Парламент обо всех вопросах, связанных с этим вмешательством. К сожалению, поскольку голосование проводилось во время перерыва, мы не смогли соблюсти обычный 14-дневный срок уведомления, предусмотренный для заседаний Парламента».\n\n«Что касается этих вопросов, мы, конечно, хотим быть как можно более честными, открытыми и прозрачными с Парламентом. Мы хотим как можно скорее представить отчёт Парламенту. Однако в последние несколько месяцев некоторые люди были в отпуске — мы хотим изменить эту ситуацию. Мы считаем, что этот динамичный орган неоправданно бездействует»."
 joi_flavor_gbr.107.a: "[SCOPE.sParty('par_party').GetName] проведёт процедуру голосования принудительно."
 joi_flavor_gbr.107.b: "Безответственность — позор для партии [SCOPE.sParty('wid_party').GetName]!"
 joi_flavor_gbr.108.t: "Проклятая Палата лордов"
 joi_flavor_gbr.108.d: "Законопроект [SCOPE.sLaw('current_law_scope').GetName], принятый в Палате общин, был неожиданно и вопреки обычаю отклонён в Палате лордов. Разгневанная общественность считает, что за этим заговором стоят наследственные пэры из группы [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и духовные лорды из группы [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], возглавляемые партией [SCOPE.sParty('wid_party').GetName]."
 joi_flavor_gbr.108.f: "«Если бы у [SCOPE.sParty('wid_party').GetName] не было свободы выражать свои взгляды, было бы невозможно взять на себя ответственность за представление этого отчёта [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеству. Как бы ни развивалась эта ужасная катастрофа, одно можно сказать наверняка: все партии Англии и Ирландии, от высших министров короны до самых низших слоёв общества, обязаны объединиться и сделать всё возможное, при необходимости даже пожертвовав личными интересами, чтобы остановить ужасное распространение этой огромной беды»."
 joi_flavor_gbr.108.a: "Эти сонные старики, эти окаменевшие святоши!"
 joi_flavor_gbr.108.b: "Если они не одобрят, то [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество возведёт в пэры больше сторонников [SCOPE.sParty('par_party').GetName], чтобы остановить их!"
 joi_flavor_gbr.109.t: "К порядку!"
 joi_flavor_gbr.109.d: "Дебаты по закону [SCOPE.sLaw('current_law_scope').GetName] в Палате общин переросли в ожесточённые споры, и многие депутаты даже нарушили регламент. Это вынудило господина спикера приостановить дебаты и выступить с обращением."
 joi_flavor_gbr.109.f: "«Я получил предложение от депутата из графства [SCOPE.sState('british_state').GetCityHubName], который просит разрешения рассмотреть один вопрос в приоритетном порядке как вопрос о привилегиях. Этот вопрос касается судебного дела, которое может помешать парламентскому комиссару по административным вопросам представить отчёт Парламенту в соответствии с положениями закона о парламентских комиссарах. Этот закон возлагает на комитет по государственному управлению и конституционным вопросам задачу рассмотрения таких отчётов».\n\n«Любая попытка воспрепятствовать передаче информации Парламенту или его комитетам рассматривается как неуважение к Парламенту, поэтому я решил, что этот вопрос действительно должен быть рассмотрен в приоритетном порядке как вопрос о привилегиях. Следовательно, уважаемый депутат может внести предложение, которое будет обсуждаться в четверг. Это предложение будет рассмотрено после любых срочных запросов или заявлений и до рассмотрения правительственных дел»."
 joi_flavor_gbr.109.a: "Эти депутаты что, в пабе сидят?!"
 joi_flavor_gbr.109.b: "Спикер совершенно не может совладать с этими хулиганами."
  # Утилитаризм
 joi_flavor_gbr.110.t: "Реформа без прогресса"
 joi_flavor_gbr.110.d: "Несмотря на то что правительство [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества некогда приняло политику, основанную на идеологии [GetIdeology('ideology_utilitarian_millian').GetName], и было полно надежд, эта реформаторская инициатива в конечном итоге не прижилась в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_gbr.110.f: "Приверженность [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] утилитаризму пошатнулась, когда проект потерял свою динамику. Группа [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] также перестала считать утилитарный план приоритетом.\n\nВ тихий момент уважаемый премьер-министр размышлял об уроках всего этого проекта. «Возможно, мы должны быть более прагматичными в том, как принципы определяют нашу политику», — задумчиво произнёс он."
 joi_flavor_gbr.110.a: "Да благословит Господь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_gbr.110.b: "Наше правительство теряет былую эффективность."
  # Группа событий "Правительство Его Величества"
 joi_flavor_gbr.111.t: "Прозрачное правительство?"
 joi_flavor_gbr.111.d: "Новый министр [SCOPE.sCharacter('ypm_scope').GetFullName] намерен сделать работу своего ведомства более открытой в рамках программы, которую он называет «Прозрачное правительство». Но на его пути стоит первое препятствие: верная и надёжная государственная служба [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества и, в частности, незаметный сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]."
 joi_flavor_gbr.111.f: "«Слушайте, откровенно говоря, это ведомство нуждается в капитальной чистке от всей этой унылой бюрократии Уайтхолла. Мы собираемся распахнуть окна, впустить свежий воздух, покончить со всей этой волокитой и модернизировать эту скрипучую старую бюрократическую машину...»\n«Хорошо, господин министр, вот методы реализации этой политики и предложение по „Белой книге“ для вашего одобрения. Эту „Белую книгу“ можно назвать „Открытое правительство“».\n\n«Слушай, мы должны помешать ему продолжать нести чушь об открытом правительстве. Мы назовём „Белую книгу“ „Открытое правительство“, и все части, которые легче понять, чем заголовок, нужно убрать! Чем меньше ты хочешь что-то делать, тем больше ты должен об этом говорить».\n«Либо открытость, либо правительство. Граждане демократического государства, конечно, имеют право знать, но у них есть ещё большее право быть в неведении! Знание означает лишь соучастие и вину, а в неведении есть определённое достоинство»."
 joi_flavor_gbr.111.a: "Сэр [SCOPE.sCharacter('sir_humphrey_scope').GetLastName] не захочет, чтобы кабинет узнал правду."
 joi_flavor_gbr.111.b: "В неведении есть определённое достоинство."
 joi_flavor_gbr.112.t: "Экономический стимул"
 joi_flavor_gbr.112.d: "Наш великий премьер-министр, [SCOPE.sCharacter('ypm_scope').GetFullName], планирует сократить государственную службу [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества, но сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] хочет, чтобы он сначала на собственном примере сократил свои расходы. Это заставило премьер-министра задуматься."
 joi_flavor_gbr.112.f: "«Многие ли осознают, что в налоговой службе работает больше людей, чем в Королевском флоте? Очевидно, это самый яркий пример раздутых штатов в Уайтхолле. Садитесь, [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName], мы должны сократить госслужбу, хотя бы уволив одну-две буфетчиц!»\n«Буфетчиц! Мне нужна конкретика. Я хочу знать, кто работает, что они делают, какие есть служебные здания, чем в них занимаются. Так мы поймём, с чего начать сокращение расходов, персонала и упрощение процедур».\n\n«Вот что, премьер-министр, мы можем создать Управление по надзору за бюрократией и нанять 400 госслужащих. Затем они сами наймут ещё 400 госслужащих. А потом мы закроем Управление по надзору за бюрократией и выпустим пресс-релиз, в котором скажем, что уважаемый премьер-министр [SCOPE.sCharacter('ypm_scope').GetLastName] сократил 800 должностей и сэкономил деньги налогоплательщиков».\n«Но это же чистое лицемерие, обман, нечестность, просто пускание пыли в глаза!»\n«Ничего страшного, премьер-министр. На самом деле, все правительственные пресс-релизы именно такие»."
 joi_flavor_gbr.112.a: "Отлично, мы успешно сократили 800 госслужащих. Какой огромный успех!"
 joi_flavor_gbr.112.b: "По крайней мере, получился надёжный пресс-релиз."
 joi_flavor_gbr.113.t: "Возраст окончания школы"
 joi_flavor_gbr.113.d: "Министр [SCOPE.sCharacter('ypm_scope').GetFullName] и сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] обсудили планы по реформированию системы государственного образования. Министр хочет создать специальный комитет для написания «независимого» отчёта, в то время как сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName] хотел бы более активно участвовать в этом процессе."
 joi_flavor_gbr.113.f: "«Образование в этой стране — просто катастрофа! Мы должны готовить детей к будущей работе. А в итоге три четверти времени им смертельно скучно!»\n«Возраст окончания школы повысили до 16 лет, чтобы дети учились больше, а они стали учиться меньше!»\n«На самом деле, министр, мы повысили возраст окончания школы не для того, чтобы дети больше учились! Мы повысили его, чтобы убрать подростков с рынка труда и контролировать безработицу».\n\n«Вы хотите сказать, что с образованием в этой стране всё в порядке?»\n«Нет, конечно нет, министр! Система образования — это посмешище, и всегда им была! И пока вы доверяете это дело местным советам, она всегда будет посмешищем! Я имею в виду, половина из них — ваши враги, а другая половина — такие друзья, что лучше бы вы выбрали врагов»."
 joi_flavor_gbr.113.a: "Что ж, это просто замечательно."
 joi_flavor_gbr.113.b: "Честность всегда даёт тебе неожиданное преимущество в Палате общин?"
 joi_flavor_gbr.114.t: "Великий замысел премьер-министра"
 joi_flavor_gbr.114.d: "У лидера [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], нашего великого премьер-министра [SCOPE.sCharacter('ypm_scope').GetFullName], недавно появилась ещё одна гениальная идея, и он настаивает на реализации своего «великого плана» по обеспечению безопасности [ROOT.GetCountry.GetNameNoFlag] — или, по крайней мере, её части. Однако, похоже, премьер-министру мешают проблемы с пресс-релизами и резко изменившимися настроениями министров."
 joi_flavor_gbr.114.f: "«Мы вводим воинскую повинность. Так мы решаем не только проблему обороны, но и проблему безработицы. Мы научим их ремёслам и навыкам, может быть, даже читать и писать! Дадим им всестороннее образование, чтобы восполнить пробелы в их воспитании... Одной политикой мы решаем проблемы обороны, образования и безработицы!»\n\n«Это великолепно, новый курс для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — великий замысел [SCOPE.sCharacter('ypm_scope').GetLastName]. Время от времени в истории нашего великого острова появляется человек, который берёт на себя тяжёлую ношу, чтобы вывести свой народ из долины теней на залитые солнцем высоты мира и процветания!»\n\n«Проблема в катастрофической новой оборонной концепции премьер-министра, в „великом замысле“? Он так это называет. Снизит ли это безработицу? Нет, нет. Цель нашей оборонной политики — не защитить Британию, а убедить британцев, что их защищают! Не иностранцев, а британцев! Иностранцы-то знают, что это не так».\n«Неужели премьер-министр хочет править [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]? Тогда остановите его!»"
 joi_flavor_gbr.114.a: "Главное, чтобы британцы верили, что их защищают."
 joi_flavor_gbr.114.b: "Нет, великий замысел премьер-министра должен быть исполнен."
 joi_flavor_gbr.115.t: "Кто читает газеты?"
 joi_flavor_gbr.115.d: "Уважаемый сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] выразил премьер-министру [SCOPE.sCharacter('ypm_scope').GetFullName] обеспокоенность по поводу газетных публикаций. Однако премьер-министр, похоже, не придал этому значения, заявив, что прекрасно разбирается в этих «мерзких СМИ»."
 joi_flavor_gbr.115.f: "«Не говорите мне о прессе. Я прекрасно знаю, кто читает газеты. „Daily Mirror“ читают те, кто думает, что управляет страной. „The Guardian“ читают те, кто думает, что должен управлять страной. „The Times“ читают те, кто действительно управляет страной. „Daily Mail“ читают жёны тех, кто управляет страной. „Financial Times“ читают те, кто владеет страной. „Morning Star“ читают те, кто думает, что страной должна управлять другая страна. А „The Daily Telegraph“ читают те, кто думает, что страной уже управляет другая страна».\n\n«Премьер-министр, а как насчёт тех, кто читает „The Sun“?»\n\n«Читателей „The Sun“ не волнует, кто управляет страной, лишь бы у неё была большая грудь»."
 joi_flavor_gbr.115.a: "Значит, премьер-министр, должно быть, отлично ладит со СМИ."
 joi_flavor_gbr.115.b: "Э-э, так зачем вообще читать газеты?"
 joi_flavor_gbr.116.t: "Помощь слабым"
 joi_flavor_gbr.116.d: "Нашему премьер-министру, [SCOPE.sCharacter('ypm_scope').GetFullName], трудно понять, работает ли Министерство иностранных дел для исполнения политики правительства или наоборот. Он очень раздосадован этим и винит во всём, как он выражается, коварного сэра [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]. Но сэр не желает брать на себя ответственность."
 joi_flavor_gbr.116.f: "«Премьер-министр — это проблема. Он начал сомневаться в наших советах. Он даже ставит под сомнение политику Министерства иностранных дел! Кабинет может даже попытаться проводить свою собственную внешнюю политику, но это абсурд, у страны не может быть двух внешних политик!»\n\n«Очевидно, наше Министерство иностранных дел игнорирует это. Мы не хотим обижать ни [SCOPE.sCountry('strong_country').GetAltNameNoFlag('RU_CL_VP')], ни [SCOPE.sCountry('weak_country').GetAltNameNoFlag('RU_CL_VP')]! Как только вы вмешиваетесь во внутренние распри других стран, вы вступаете на очень опасный путь. Нужно дать понять премьер-министру, что в вопросах внешней политики его работа — это лишь приёмы и церемонии».\n\n«Вы хотите сказать, сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName], что [ROOT.GetCountry.GetNameNoFlag] не должна поддерживать закон и справедливость? Не должна способствовать миру, гармонии и доброй воле? Мы должны бороться за слабых против сильных!»\n\n«Тогда почему вы не отправите войска на помощь [SCOPE.sCountry('major_power').GetAltNameNoFlag('RU_CL_DP')] в борьбе с [SCOPE.sCountry('super_power').GetAltNameNoFlag('RU_CL_TP')]?»\n«Э-э, [SCOPE.sCountry('super_power').GetNameNoFlag] слишком силён»."
 joi_flavor_gbr.116.a: "[SCOPE.sCountry('super_power').GetNameNoFlag] слишком силён."
 joi_flavor_gbr.116.b: "Работа [SCOPE.sCharacter('ypm_scope').GetFullName] — это просто церемонии."
 joi_flavor_gbr.116.c: "Не бойтесь [SCOPE.sCountry('super_power').GetAltNameNoFlag('RU_CL_RP')], они слабы!"
 joi_flavor_gbr.117.t: "Четырёхэтапная дипломатия"
 joi_flavor_gbr.117.d: "Из-за недавней неконтролируемой войны, вспыхнувшей между [SCOPE.sCountry('strong_country').GetAltNameNoFlag('RU_CL_TP')] и [SCOPE.sCountry('weak_country').GetAltNameNoFlag('RU_CL_TP')], премьер-министр [SCOPE.sCharacter('ypm_scope').GetFullName] начал гневаться на безответственность Министерства иностранных дел. Однако сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] не принимает это близко к сердцу."
 joi_flavor_gbr.117.f: "«Премьер-министр, если вы настаиваете, чтобы я говорил прямо, я могу лишь сказать, что в текущей ситуации, рассматривая картину в целом, оглядываясь на прошлое и настоящее, учитывая средние показатели по всем ведомствам, анализируя и обобщая, возможно, можно считать, что, подводя итог, в общих чертах, вы, вероятно, обнаружите, что, хотя это может прозвучать неприятно, но в любом случае, боюсь, перспективы неоднозначны».\n\n«Так да или нет? — О, премьер-министр, когда придёт время, премьер-министр, когда появится возможность, когда всё будет готово, когда созреют условия... Так что же нам делать? Сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName], скажите мне прямо?»\n\n«Так, мы обычно применяем четырёхэтапную тактику: первый этап — мы заявляем, что ничего не происходит; второй этап — мы говорим, что, возможно, что-то и происходит, но нам не следует вмешиваться; третий этап — может быть, нам и следовало бы вмешаться, но мы ничего не можем сделать; четвёртый этап — возможно, мы и могли что-то сделать раньше, но теперь уже слишком поздно»."
 joi_flavor_gbr.117.a: "Похоже, мы действительно ничего не можем сделать."
 joi_flavor_gbr.117.b: "Эти бюрократические уловки просто невыносимы!"
 joi_flavor_gbr.118.t: "Отличный план, но не сейчас"
 joi_flavor_gbr.118.d: "У нашего великого премьер-министра, [SCOPE.sCharacter('ypm_scope').GetFullName], недавно появилась ещё одна блестящая идея. Он предложил новый план, однако уважаемая государственная служба [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества и сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] заявили, что этот план всё ещё требует тщательного изучения."
 joi_flavor_gbr.118.f: "«Очевидно, комитет считает, что ваша новая политика очень хороша, но, учитывая наличие некоторых сомнений, я думаю, комитет имеет в виду, что после глубоких размышлений, несмотря на широкое одобрение программы предложения, некоторые теоретические принципы в принципе осуществимы, но некоторые аспекты слишком сложны и на практике требуют тонкого баланса».\n\n«Так что в принципе, это мудрый и осторожный план, но только после его более детального рассмотрения, укрепления преемственности между новым предложением и существующими принципами, а также принципиальных споров по принципам, предложенным к утверждению в предложении, в принципе».\n\n«Вы не предлагаете мне от него отказаться? — Боже мой, нет! Ни в коем случае! Это исключительно блестящая политика! Ключевой вопрос в том, что, прежде чем вы выскажете какое-либо мнение, вы должны позволить нам провести дальнейшее исследование»."
 joi_flavor_gbr.118.a: "Так о чём вы, собственно, говорите?"
 joi_flavor_gbr.118.b: "А-а, хорошо, так и поступим."
 joi_flavor_gbr.119.t: "Благодетели нации"
 joi_flavor_gbr.119.d: "Наш высоконравственный премьер-министр, [SCOPE.sCharacter('ypm_scope').GetFullName], недавно, вдохновившись идеей министра здравоохранения, пытается убедить членов кабинета в необходимости «великого плана по запрету #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP')]#!#!». Однако он столкнулся с сопротивлением со стороны Министерства финансов и многих чиновников, таких как сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName]."
 joi_flavor_gbr.119.f: "«Я предлагаю правительству принять меры по искоренению #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP')]#!#!, полностью запретить любое спонсорство и рекламу #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP')]#!#!, потратить 500 тысяч фунтов на анти-#tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_GEN')]#!#! пропаганду, запретить курение во всех общественных местах и в течение следующих пяти лет прогрессивно повышать налоги, пока пачка из 20 #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP_PL')]#!#! не будет стоить примерно столько же, сколько бутылка виски».\n«Единственная проблема в том, что налог на #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_DP')]#!#! — основной источник дохода правительства!»\n«#tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetName]#!#! ежегодно уносит 100 тысяч жизней, а что мы получаем? Это вопрос морали!»\n«Верно, но ведь чёткой причинно-следственной связи между ними так и не было доказано, не так ли? Статистика... данные могут доказать что угодно, даже правду».\n\n«Промышленность, связанная с #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_TP')]#!#!, создаёт 25 тысяч рабочих мест, процветающий экспорт #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP')]#!#! помогает нам поддерживать торговый баланс, 250 тысяч рабочих мест связаны с #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_TP')]#!#! — газетные киоски, упаковка, транспорт. Налог на #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_DP')]#!#! оплачивает треть расходов системы здравоохранения!»\n«Именно благодаря тем курильщикам, которые добровольно отдают свои жизни за друзей, мы спасаем больше жизней, чем могли бы спасти в противном случае. Курильщики — благодетели нации! Ну... пока они живы»."
 joi_flavor_gbr.119.a: "[SCOPE.sGoods('tax_goods_scope').GetName] продолжает губить #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ий#! народ."
 joi_flavor_gbr.119.b: "Потребители #tooltippable_name #tooltip:[SCOPE.sGoods('tax_goods_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('tax_goods_scope').GetTextIcon][SCOPE.sGoods('tax_goods_scope').GetCustom('RU_GL_RP')]#!#! — благодетели нации!"
 joi_flavor_gbr.120.t: "Один из нас"
 joi_flavor_gbr.120.d: "В ходе недавнего секретного расследования вскрылась шокирующая правда: видный министр [SCOPE.sCharacter('traitor_scope').GetFullName] оказался шпионом, работающим на [SCOPE.sCountry('russian_scope').GetAltNameNoFlag('RU_CL_VP')]. И это при том, что всего пару месяцев назад сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] полностью оправдал его в ходе ведомственной проверки безопасности."
 joi_flavor_gbr.120.f: "«Сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]! Я должен обсудить с вами одно крайне деликатное дело. Несколько месяцев назад сэр [SCOPE.sCharacter('traitor_scope').GetFirstName] подвергся проверке безопасности, которую вы лично проводили. Неужели вы не нашли никаких улик?»\n\n«Разумеется, нет. Сэр [SCOPE.sCharacter('traitor_scope').GetFirstName] - один из нас; мы дружим уже много лет. Вся эта история - выдумка газетчиков. Цель внутренней проверки как раз в том и состояла, чтобы не найти никаких улик, позволив премьер-министру заявить в парламенте: „Эти обвинения беспочвенны“».\n\n«Что ж, вынужден вас разочаровать. Большую часть своей карьеры он был #tooltippable_name [SCOPE.sCountry('russian_scope').GetAdjective|l]им#! шпионом. Он оставил правительству документы, включая подробное признание, и всё это неопровержимо подтверждается фактами».\n\n«Но... Боже правый! #tooltippable_name [SCOPE.sCountry('russian_scope').GetAdjective]ий#! шпион?!»\n\n«Вы могли провести тщательное расследование, но пустили всё на самотёк. Сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFirstName], почему вы так поспешно оправдали его?»\n\n«Боже мой! Невозможно же проверить всё на свете! Никогда не знаешь, что можешь раскопать! Он дал мне слово! Слово джентльмена! Господин премьер-министр, клянусь, я с ним не в сговоре! Я не знаю ни слова #tooltippable_name по-[SCOPE.sCountry('russian_scope').GetAdjective|l]и#!! Этого не может быть! Я не учился с ними в Кембридже, я не из их круга! Я женат, в конце концов! Я один из нас, я невиновен!»"
 joi_flavor_gbr.120.a: "Если [SCOPE.sCharacter('traitor_scope').GetFullName] — шпион, то и сэру [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] будет трудно снять с себя подозрения!"
 joi_flavor_gbr.120.b: "Нет, нет, сэр [SCOPE.sCharacter('sir_humphrey_scope').GetFullName] — один из нас!"
  # Событие по утилитаризму
 joi_flavor_gbr.121.t: "Общее благо"
 joi_flavor_gbr.121.d: "Политический лидер, придерживающийся философии [GetIdeology('ideology_utilitarian_leader').GetName], предложил амбициозный план реформы нынешней чрезмерно раздутой #V системы гражданской службы#!. Цель — полностью упорядочить #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ую#! гражданскую службу. Критики же заявляют, что это лишь способ для партии [SCOPE.sParty('ruling_party').GetName] извлечь политическую выгоду."
 joi_flavor_gbr.121.f: "Система государственной службы развивалась в Англии, а позже центром #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ой#! бюрократии стала улица Уайтхолл, от которой она и получила своё название. Чиновники назначались [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством по рекомендации премьер-министра и обычно заменялись, когда его партия теряла влияние.\n\nОднако империя постоянно росла, а вместе с ней росла и бюрократия. У каждого ведомства была своя система, а чиновники получали должности за деньги или по рекомендации Палаты лордов. Становилось всё очевиднее, что такие порядки неэффективны.\n\nЧтобы навести в этой стране лучший порядок, мы должны обеспечить, чтобы система государственной службы не использовалась правящей партией в своих политических интересах, а оставалась политически нейтральной."
 joi_flavor_gbr.121.a: "Мы должны создать нейтральную систему гражданской службы."
 joi_flavor_gbr.121.b: "Бюрократия должна быть реорганизована изнутри."
  # Имперская преференциальная система
 joi_flavor_gbr.122.t: "Имперская преференциальная система"
 joi_flavor_gbr.122.d: "На имперской экономической конференции в #yellow Оттаве#!, несмотря на сложные и трудные переговоры, участвующие делегаты, включая [ROOT.GetCountry.GetNameNoFlag], в итоге согласились подписать соглашение о торговых преференциях. Оно устанавливает льготы и беспошлинную торговлю внутри Британской империи. В то же время #yellow премьер-министр Соединённого Королевства#! заявил, что повысит пошлины на иностранные товары для защиты промышленности членов империи, даже если это нанесёт ущерб интересам метрополии."
 joi_flavor_gbr.122.f: "«В Оттаве, в Ридо-холле, на „королевском троне“ восседал величественный лорд Бессборо. Он проводил приём для генерал-губернаторов, на который были приглашены генерал-губернаторы и премьер-министры со всей империи. Он вывесил символический флаг: синее полотнище с золотой короной».\n\n«Проблема в следующем: никто не понимал лучше лорда Бессборо, что метрополия — это относительно небольшой, густонаселённый промышленный регион. Напротив, доминионы — это обширные, в основном сельские, малонаселённые территории, но с гордой и многообещающей „молодой промышленностью“. В этом и заключалась вся сложность и трудность имперской экономической конференции».\n\n«На конференции такого рода, где рассматриваются и решаются вопросы жизненной важности и большой политической значимости для всех регионов #yellow Британской империи#!, крайне важно, чтобы делегаты могли общаться друг с другом с максимальной свободой и в духе полного доверия»."
 joi_flavor_gbr.122.a: "За Бога, славу и Империю!"
  # События и журналы о наследовании монарха
 joi_flavor_gbr.123.t: "Брак [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величества?"
 joi_flavor_gbr.123.d: "[SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFullName] [SelectLocalization(SCOPE.sCharacter('royal_marriage_character').IsFemale, 'достигла', 'достиг')] брачного возраста. С [SelectLocalization(SCOPE.sCharacter('royal_marriage_character').IsFemale, 'её', 'его')] согласия, [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'благословенная', 'благословенный')] Богом монарх [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] теперь выбрать [SelectLocalization(SCOPE.sCharacter('royal_marriage_character').IsFemale, 'супруга', 'супругу')] знатного происхождения."
 joi_flavor_gbr.123.f: "«Дорогой Альберт принёс мне безграничное счастье... Он обладает всеми качествами, какие я только могла желать, чтобы обрести совершенное счастье».\n\n«Он очень красив; цвет его волос почти такой же, как у меня; у него большие голубые глаза, красивый нос, милый рот и ровные зубы; но очарование его лицу придаёт выражение, такое приятное»."
 joi_flavor_gbr.123.a: "#O Принц Альберт#! из #yellow Саксен-Кобург-Готской#! династии — лучший кандидат. Он глубоко любит [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество."
 joi_flavor_gbr.123.b: "Член семьи [SCOPE.sCharacter('foreign_ruler_1').GetLastName] из #tooltippable_name [SCOPE.sCountry('marriage_country_1').GetAdjective|l]ой#! страны будет очень подходящей партией."
 joi_flavor_gbr.123.c: "У правителя [SCOPE.sCountry('marriage_country_2').GetAltNameNoFlag('RU_CL_RP')] есть подходящий родственник."
  #
 joi_flavor_gbr.124.t: "[SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('prince_scope').GetFirstName] в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')]"
 joi_flavor_gbr.124.d_1: "Из [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] сегодня в Лондон прибыл [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('prince_scope').GetFirstName].[SelectLocalization(SCOPE.sCharacter('queen_scope').IsFemale, 'Её', 'Его' )] Величество королева [SCOPE.sCharacter('queen_scope').GetFirstName] встретила его. Встреча прошла в дружеской обстановке, и [SelectLocalization(SCOPE.sCharacter('queen_scope').IsFemale, 'Её', 'Его' )] Величество даже пообещал[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] сопроводить его при осмотре некоторых достопримечательностей."
 joi_flavor_gbr.124.d_2: " [SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('prince_scope').GetFirstName] прибыл в Лондон и [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('queen_scope').GetFirstName] провела с ним дружескую встречу. Королева пообещала, что он сможет свободно осматривать достопримечательности по всей Британии, и в свободное время они будут делать это вместе."
 joi_flavor_gbr.124.f: "«[SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('prince_scope').GetFirstName] высок и строен, выглядит решительным, но, несмотря на это, его лицо добродушно. Легко понять, что он добр и сердечен. Когда он снимает шляпу, в его выражении лица появляется нечто очень благородное»."
 joi_flavor_gbr.124.a: "Надеюсь, он многому научится в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_PP')]!"
 joi_flavor_gbr.124.b: "Добро пожаловать, ваше высочество."
  #
 joi_flavor_gbr.125.t: "[SCOPE.sCharacter('prince_scope').GetFirstName] и его удивительные приключения"
 joi_flavor_gbr.125.d_1: "Сдержав обещание, [SelectLocalization(SCOPE.sCharacter('queen_scope').IsFemale, 'Её', 'Его' )] Величество [SCOPE.sCharacter('queen_scope').GetFirstName] и [SCOPE.sCharacter('prince_scope').GetFirstName], вчера вдвоём осматривали многие достопримечательности Лондона. Однако по возвращении [SelectLocalization(SCOPE.sCharacter('queen_scope').IsFemale, 'Её', 'Его' )] Величество с румянцем на щеках сообщила премьер-министру, что желает выйти замуж..."
 joi_flavor_gbr.125.d_2: "Сдержав обещание, [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('queen_scope').GetFirstName] и [SCOPE.sCharacter('prince_scope').GetFirstName], вчера вдвоём осматривали многие достопримечательности Лондона. Однако по возвращении его высочество сообщил членам делегации, что желает жениться. И [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle], похоже, весьма расположена к этому..."
 joi_flavor_gbr.125.f: "«Они ничего не говорили, ни о чём не спрашивали, просто шли, держась за руки. Иногда они останавливались и смотрели друг на друга, словно проверяя, реально ли всё это. Он смотрел на её профиль, когда дул лёгкий ветерок. Он не знал, чего именно ожидал, возможно, просто хотел, чтобы время остановилось, и она навсегда осталась в этой позе.\n\nОна шла рядом с ним, изредка тихо смеясь. Он не разбирал её слов, но слышал мелодию её голоса, и чувствовал, как будто его сердце пронзают. Он внезапно наклонился, чтобы поцеловать её руку. Она мягко отняла её, но не ушла. В воздухе, казалось, висел трепещущий свет.\n\nОн протянул руку, чтобы удержать её, его взгляд, словно пламя, упал на неё. Он достал карандаш и написал букву. Она сразу поняла, её глаза заблестели, лицо залилось румянцем, и она почувствовала, как по всему телу пробежала радостная дрожь.\nОн написал: „Ты выйдешь за меня?“\nОна прочитала, помедлила мгновение, взяла карандаш и написала: „Да“»."
 joi_flavor_gbr.125.a: "«Позвольте мне сказать вам, как пылко я восхищаюсь вами и люблю вас»."
 joi_flavor_gbr.125.b: "«Позвольте мне сказать вам, как пылко я восхищаюсь вами и люблю вас»."
 joi_flavor_gbr.125.c: "Это невозможно! Он — наследник престола!"
 joi_flavor_gbr.125.e: "Супруг [SCOPE.sCharacter('prince_scope').GetLastName]? Немыслимо!"
  #
 joi_flavor_gbr.126.t: "Свадьба века"
 joi_flavor_gbr.126.d_1: "Хотя обе стороны и представить себе такого не могли, но приехавший в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_VP')] наследный принц [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('prince_scope').GetFirstName] и [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('queen_scope').GetFirstName], полюбили друг друга с первого взгляда. С согласия царя и кабинета, сегодня в Лондоне состоялась грандиозная свадьба века. Было условлено, что королева в скором времени посетит [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_gbr.126.d_2: "Сегодня из Лондона пришла ошеломляющая новость. Приехавший в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_VP')] наследный принц [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('prince_scope').GetFirstName] и [SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('queen_scope').GetFirstName] сыграли пышную и необычную свадьбу. Никто не ожидал такого поразительного развития событий между двумя странами с такими напряжёнными отношениями."
 joi_flavor_gbr.126.f: "«В ту ночь всё сияло огнями, цветы и свечи переплетались, музыка и смех звучали долго. Взгляды новобрачных встретились при свете свечей, словно в мире остались только они двое. Их руки наконец крепко сжались. Она, в белом платье, слегка опустила голову, но её рука дрожала.\n\nОни произносили клятвы перед Богом. Он смотрел на неё и чувствовал, как всё его тело горит, словно вся его жизнь сосредоточилась в этой священной клятве. Свет свечей трепетал на её фате, и он почти не дышал, боясь нарушить святость этого мгновения.\n\nГород спал под звёздным небом, лишь их свадьба продолжалась. Факелы освещали улыбки толпы, и ночь от этого становилась теплее. Звёзды сияли над ними, словно благословляя их»."
 joi_flavor_gbr.126.a: "Боже, храни... царя?"
 joi_flavor_gbr.126.b: "Боже, храни... королеву?"
 joi_flavor_gbr.126.c: "???"
  #
 joi_flavor_gbr.127.t: "Коронация Георга V"
 joi_flavor_gbr.127.d: "Король умер. На престол взошёл его сын, [SCOPE.sCharacter('george_v_relevant_ruler').GetFirstName]. Вся страна ликует. Да здравствует его долгое правление!"
 joi_flavor_gbr.127.f: "«Я потерял лучшего друга и самого любящего отца...»\n«За всю свою жизнь я ни разу не поссорился с ним».\n«Моё сердце разбито, я убит горем, но Бог поможет мне исполнить свой долг, а дорогая Мэй, как всегда, утешит меня».\n«Да дарует мне Бог силы и направит меня, чтобы я мог нести тяжёлое бремя, возложенное на меня»."
 joi_flavor_gbr.127.a: "Боже, храни короля!"
 joi_flavor_gbr.128.t: "Восшествие на престол Константина I"
 joi_flavor_gbr.128.d: "С окончанием правления Николая I, на #tooltippable_name [ROOT.GetCountry.GetAdjective|l]ий#! престол взошёл [SCOPE.sCharacter('tsar_scope').GetFullName], став царём и самодержцем всероссийским: Константином I. Многие либеральные чиновники надеются, что его правление откроет новую эру реформ."
 joi_flavor_gbr.128.f: "«Перед невидимым и пребывающим со Мной Господом Я принимаю священный обет вечно ставить своей целью благо Отечества.\n\nДа, под водительством и с благословения Господа, призвавшего Меня на это великое дело, Я буду строить Россию в высшей власти и славе, и молюсь, чтобы вечные желания и воля блаженной и вечнопамятной предшественницы Моей осуществились через Меня»."
 joi_flavor_gbr.128.a: "Боже, храни царя!"
 joi_flavor_gbr.129.t: "Похороны Александра"
 joi_flavor_gbr.129.d: "Скончался его высочество [SCOPE.sCharacter('prince_scope').GetFirstName], который десятки лет жил и правил вместе с [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством. Они познакомились случайно, и вот один из них завершил свой земной путь. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество не скорбит, он[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] молчит, словно они с ним по-прежнему неразлучны."
 joi_flavor_gbr.129.f: "«Он чувствовал, как жизнь медленно угасает, словно пламя свечи. Он закрыл глаза. Он увидел тот вечер своей молодости: медленно поднимался туман, он шёл с королевой по берегу реки, держась за руки. Они смотрели друг на друга, он взял карандаш, и его жена с румянцем на щеках смотрела на него. На его губах появилась улыбка, но она принадлежала не этому миру, а тому высокому, бесконечно спокойному небу.\n\nОн увидел, как из тёмного угла к окну подошла высокая, стройная фигура, обернулась, одетая в парадный мундир и с большой короной императрицы Екатерины на голове, и молча уставилась на него. Он знал, кто это и улыбнулся, словно давно примирился с судьбой. Сияние медленно сходило с его лица, это было мягкое угасание, как сумерки сменяют день.\n\nВнезапно его дыхание стало прерывистым и частым, глаза плотно закрылись, лицо посинело. Церковные колокола тяжело зазвонили, их звон разносился под серым небом. Лондон и Санкт-Петербург плакали»."
 joi_flavor_gbr.129.a: "Его история будет жить вечно."
 joi_flavor_gbr.130.t: "Похороны Альберта"
 joi_flavor_gbr.130.d: "Скончался его высочество  [SCOPE.sCharacter('prince_scope').GetFirstName], который десятки лет жил и правил вместе с [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величеством. Они познакомились на балу, и вот один из них завершил свой земной путь. [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'Её', 'Его' )] Величество не скорбит, он[SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'а', '')] молчит, словно они с ним по-прежнему неразлучны."
 joi_flavor_gbr.130.f: "«Вечерний воздух был так спокоен, словно вся земля затаила дыхание. Лишь отблески заката на дальних горах ещё мерцали, и ему казалось, что всё вокруг приближается к вечному покою».\n\n«В сумерках подул морской бриз, и он почувствовал, как какая-то сила зовёт его из тьмы, а его дыхание в груди становится всё легче. Он протянул к ней руки, словно передавая свою жизнь».\n\n«Пламя свечи почти погасло, свет лишь дрогнул рядом с ним и окончательно померк. В комнате было тихо, лишь королева держала его за руку»."
 joi_flavor_gbr.130.a: "Аминь."