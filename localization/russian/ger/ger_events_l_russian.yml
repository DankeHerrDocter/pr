l_russian:
  #Вопрос о конституции Империи
 joi_flavor_ger.1.t: "Вопрос о конституции Империи"
 joi_flavor_ger.1.d: "[ROOT.GetCountry.GetName] празднует долгожданное объединение. Теперь перед новым государством стоит вопрос первостепенной важности — принятие основного закона. В столице уже созван первый имперский парламент. Депутатам предстоит определить политическое устройство нашей великой державы, права отдельных земель, а также баланс сил между монархом и законодательным собранием. По итогам дебатов было сформулировано три основных проекта."
 joi_flavor_ger.1.f: "«#bold Старая имперская конституция#!. Вся полнота власти сосредотачивается в руках единого кабинета министров. Выборы и парламент упраздняются, а [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] лично назначает всех министров по представлению совета...»\n\n«#bold Конституция Бисмарка#!. Учреждается двухпалатный парламент. В верхней палате (Бундесрате) малые германские государства получат по одному голосу, крупные — по три, а наша метрополия — в пять раз больше малых. Нижняя палата (Рейхстаг) будет состоять из 382 депутатов, избираемых гражданами на основе ценза. Эти депутаты станут полноправными представителями народа, наделенными неприкосновенностью и независимыми от воли избирателей...»\n\n«#bold Проект либералов#!. Документ также предусматривает создание Бундесрата и Рейхстага, однако голоса в верхней палате будут распределяться пропорционально численности населения. В Рейхстаг же войдут 382 депутата, избираемых всеми совершеннолетними гражданами. Кроме того, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] больше не сможет ограничивать работу парламента рамками своих созывов...»\n\nГолоса в парламенте разделились почти поровну, и напряжение достигло предела. Быть может, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #bold сможет решить исход голосования своим вмешательством?#!"
 joi_flavor_ger.1.a: "Божественное право монарха не должно быть ограничено!"
 joi_flavor_ger.1.b: "Предложение Бисмарка может устроить обе стороны."
 joi_flavor_ger.1.c: "Да здравствует свобода!"
  #Внешняя политика Германии
 joi_flavor_ger.2.t: "Внешняя политика Германии"
 joi_flavor_ger.2.d: "После выхода [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на европейскую геополитическую арену, многие старые державы с пристальным вниманием следят за нашими дальнейшими шагами..."
 joi_flavor_ger.2.f: "«[ROOT.GetCountry.GetName] — это исполин, в мгновение ока возвысившийся в самом сердце Европы и устремленный к славе. Однако радость объединения омрачена предчувствием бури. Во время недавней аудиенции [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'выслушала', 'выслушал')] мрачный прогноз канцлера. Тот уверен: [SCOPE.sCountry('GBR_scope').GetName], [SCOPE.sCountry('RUS_scope').GetName] и [SCOPE.sCountry('FRA_scope').GetName] обязательно сформируют коалицию, чтобы раздавить новый „германский центр силы“. Канцлер обрисовал свой главный политический кошмар — славяне и романские народы объединяются против германского ядра Европы...»\n\n«Канцлер дал четкую рекомендацию: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'должна', 'должен')] умерить колониальные амбиции державы. Только отказавшись от зарубежной экспансии и бросив все силы на укрепление связей с европейскими соседями, страна обеспечит себе выживание. Однако крупные промышленники категорически с этим не согласны. Они заявляют, что лишь непрерывная заморская экспансия позволит создать новый баланс сил и гарантировать долговечный мир»."
 joi_flavor_ger.2.a: "Сосредоточиться на интересах на европейском континенте!"
 joi_flavor_ger.2.b: "Сосредоточиться на заморских колониальных интересах!"
  #Постоянный Рейхстаг
 joi_flavor_ger.3.t: "Постоянный Рейхстаг"
 joi_flavor_ger.3.d: "С принятием новой конституции, Рейхстаг, в соответствии со своей священной миссией, отныне будет постоянно действовать в здании парламента в столице."
 joi_flavor_ger.3.f: "Статья 2: Империя осуществляет законодательную власть на территории федерации в соответствии с настоящей конституцией, и имперские законы имеют приоритет над законами земель...\nСтатья 4: Следующие вопросы подлежат надзору и законодательной власти Империи:\n1. Установление правил о свободе передвижения, натурализации и проживания, гражданстве, паспортах, полицейском надзоре за иностранцами, а также о различных видах деятельности, включая страхование;\n2. Законодательство о таможне и торговле, а также о налогах, необходимых для нужд Империи;\n3. Установление системы мер, весов и валюты, а также основных правил выпуска бумажных денег с обеспечением или без него...\n4. Организация единой защиты немецкой торговли за рубежом, немецкого судоходства и его флага, а также создание единых консульств за счёт Империи;\n5. Железнодорожное дело...\n6. Почтовое и телеграфное дело...\n7. Единое законодательство по всему гражданскому, уголовному и процессуальному праву;\n8. Имперская армия и военно-морской флот...\nСтатья 5: Законодательная власть Империи осуществляется Бундесратом и Рейхстагом. #bold Имперские законы должны получить необходимое и достаточное большинство голосов в Рейхстаге.#!"
 joi_flavor_ger.3.a: "Да здравствует Империя!"
 ger_event_2_1_tt: "Рейхстаг начнёт выборы депутатов."
  #Имперское колониальное ведомство
 joi_flavor_ger.4.t: "Имперское колониальное ведомство"
 joi_flavor_ger.4.d: "С постоянным расширением заморских территорий [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] было создано новое высшее учреждение, ответственное за управление заморскими владениями. Наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] лично назвал его Германским колониальным ведомством."
 joi_flavor_ger.4.f: "Достижения [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] за рубежом, когда мы были ещё слабы, мы могли лишь с завистью наблюдать, не смея действовать. Теперь наша мощь давно достаточна для поддержания колониальной империи, более великой, чем у них.\nИдеал заморских колоний для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] больше не пустая мечта, а реальность: Камерун и Того поставляют нам каучук, Намибия — руду. Восточная Африка везёт кофе, Восточная Азия — красители, а наши банановые плантации простираются от Гвинеи до Тихого океана. [ROOT.GetCountry.GetNameNoFlag] по праву носит звание славной колониальной империи!"
 joi_flavor_ger.4.a: "Германия превыше всего!"
  #Западная Африка
 joi_flavor_ger.5.t: "Генерал-губернаторство Западная Африка"
 joi_flavor_ger.5.d: "После завоевания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] Камеруна и Того, эти территории были объединены в новое генерал-губернаторство."
 joi_flavor_ger.5.f: "«Генерал, вы руководили завоеванием Камеруна. Какое у вас сложилось особое мнение об этих землях?»\n«Жарко, жарко и сухо... Наши солдаты с трудом переносят эти ужасные мучения, а местные, кажется, уже приспособились к такой погоде. Во время войны нам не хватало еды и воды, а в густых джунглях повсюду были надоедливые москиты! Я уверен, ни одному немцу там не понравится».\n«Правда, генерал? И как, по-вашему, мы должны там править?»\n«О, да, мы должны обеспечить там прочное и надёжное правление... но я думаю, лучше не жертвовать благородными германцами, отправляя их туда. Думаю, достаточно послать немного чиновников и заставить этих туземцев работать на нас кнутом»."
 joi_flavor_ger.5.a: "Германия превыше всего!"
  #Намибия
 joi_flavor_ger.6.t: "Генерал-губернаторство Юго-Западная Африка"
 joi_flavor_ger.6.d: "После завоевания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] Намибии, эта территория была объединена в новое генерал-губернаторство."
 joi_flavor_ger.6.f: "«Сэр, говорят, вы планируете отправиться в Намибию... зачем, позвольте спросить?»\n«Стать генерал-губернатором, сударь! Многие планируют инвестировать туда, и я принял назначение от правительства, чтобы помочь этим щедрым и дальновидным господам. Я планирую дёшево продавать там землю, чтобы привлечь больше людей. Многие геологи утверждают, что там есть ценные месторождения, возможно, даже золото!»\n«О, сударь, по-моему, это не лучший выбор. Вы хотите отказаться от комфортной жизни в Берлине и отправиться в далёкую Африку?»\n«Ха-ха-ха, сударь, вы шутник! Я всего лишь съезжу посмотреть, и скоро вернусь! А остальную работу за меня сделают тамошние туземцы и чиновники. О чём мне беспокоиться, кроме как о получении жалованья?»\n«Правда? Звучит неплохо!»"
 joi_flavor_ger.6.a: "Германия превыше всего!"
  #Восточная Африка
 joi_flavor_ger.7.t: "Генерал-губернаторство Восточная Африка"
 joi_flavor_ger.7.d: "После завоевания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] Танзании, эта территория была объединена в новое генерал-губернаторство."
 joi_flavor_ger.7.f: "Я со всей искренностью клянусь перед законом: я буду преданно служить Его Величеству, нашему [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], и его преемникам, при исполнении полномочий генерал-губернатора буду следовать указаниям имперского правительства и служить интересам германских граждан; защищать права и свободы германских граждан в генерал-губернаторстве, исполнять и отстаивать конституцию Германской империи, защищать стабильность и процветание вверенной мне территории, безопасность чиновников и честность правительства, и преданно бороться за [ROOT.GetCountry.GetNameNoFlag]!"
 joi_flavor_ger.7.a: "Германия превыше всего!"
  #Новая Гвинея
 joi_flavor_ger.8.t: "Немецкие порты в Новой Гвинее"
 joi_flavor_ger.8.d: "После завоевания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] Новой Гвинеи и островов Тихого океана, там были построены новые военные и торговые порты для обслуживания нашего Тихоокеанского флота."
 joi_flavor_ger.8.f: "Были основаны порты и города для защиты интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Тихом океане. Флот открытого моря также сформировал небольшой новый флот — названный Германским Тихоокеанским флотом — который отправился в Новую Гвинею и базируется в недавно построенном Порт-Морсби.\nТорговля в Тихом океане также процветает, и всё больше купцов из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] отправляют торговые суда по этому маршруту в Австралию и Америку. Кроме того, здешний климат благоприятствует выращиванию бананов, и этот фрукт пользуется большой популярностью в Германии."
 joi_flavor_ger.8.a: "Dessertbanane (бананы)?"
  #Германская Восточная Азия
 joi_flavor_ger.9.t: "Назначение генерал-губернатора Германской Восточной Азии"
 joi_flavor_ger.9.d: "После того как самые ценные активы Восточной Азии — Индокитай и Малайя — перешли под контроль [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], восторженный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] лично назначил генерала, командовавшего завоеванием, на должность генерал-губернатора Германской Восточной Азии."
 joi_flavor_ger.9.f: "Согласно плану имперского кабинета, в Сингапуре было создано официальное представительство, ответственное за колониальное управление новыми колониями в Восточной Азии, названное Остазиен. Тихоокеанские колонии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], ранее управлявшиеся из Новой Гвинеи, также были переданы под надзор Остазиена для координации планов военно-морской обороны. Высшим должностным лицом на территории Остазиена является генерал-губернатор, непосредственно подчинённый имперскому военно-морскому ведомству. Генерал-губернатор является главой военной и гражданской администрации на территории. Первой управляет начальник штаба и вице-губернатор, второй — гражданский комиссар. Остазиен унаследовал ряд разнообразных и сложных колоний, отделённых от своей метрополии. Они признают превосходство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], но их структура слишком византийская, чтобы её можно было перестроить или полностью реорганизовать. Таким образом, представительство Остазиена в Сингапуре существует не как колониальное #v $bureaucrats_only_icon$ бюрократическое#! учреждение и даже не как официальный орган власти, а как юрисдикция. На этой территории относительно беспристрастное адмиралтейство должно немедленно сбалансировать местные интересы, противостоять различным колониальным системам и обеспечить защиту всего этого."
 joi_flavor_ger.9.a: "Поздравляем этого германского рыцаря!"
  #Силезский профсоюз ткачей
 joi_flavor_ger.10.t: "Петиция Силезского профсоюза ткачей"
 joi_flavor_ger.10.d: "Промышленная экспансия в Силезии принесла немало проблем. Сегодня, [TimeKeeper.GetCurrentDate.GetString], силезские ткачи под руководством профсоюза вышли на забастовку, требуя повышения заработной платы."
 joi_flavor_ger.10.f: "«Я поведу свой народ к процветанию. Кто поможет мне в этом деле, того я возвышу; а кто воспротивится мне, того я уничтожу. Сила в наших руках. Наше будущее на воде, и наш флот заставит весь мир уважать флаг нашей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. При разделе мира мы получили слишком мало, хм, это нужно исправить».\n\n«Германская промышленность может предоставить нам необходимые броневые листы и пушки».\n\n«Это прекрасно, сударь, но без рабочих этого не достичь. Дайте им что-нибудь. Я подумал, нужно ограничить детский труд, сделать воскресенье выходным; ха, можно даже немного повысить зарплату».\n\n«Повысить зарплату?! Тогда мы не сможем конкурировать на мировом рынке, мой [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!»\n\n«Ах, сударь, я собираюсь созвать международную конференцию с участием всех правительств».\n\n«Я нахожу это предложение превосходным, мой [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], к счастью для империи».\n\n«Разделяй и властвуй, мы пробовали это в Эссене. Проникнуть во вражеский стан, сначала переманить часть рабочих, а с остальными будет легче справиться».\n\n«Вы меня прекрасно понимаете, Крупп. Я собираюсь созвать Государственный совет»."
 joi_flavor_ger.10.a: "Верно, проникнуть в ряды рабочих, сначала дать им что-то, а потом наказать оставшихся, отлично сказано!"
 joi_flavor_ger.10.b: "Повысить зарплату? Требовать два выходных? С какой целью вы это пишете? Кто вас надоумил? Вам заплатили пятьсот тысяч франков или фунтов стерлингов?!"
  #Баварский локомотив
 joi_flavor_ger.11.t: "Баварский локомотивостроительный завод"
 joi_flavor_ger.11.d: "С индустриализацией Баварии, новое предприятие по производству локомотивов начало набирать обороты, став крупнейшим промышленным гигантом Баварии."
 joi_flavor_ger.11.f: "«Этот завод — самый уникальный из всех, что я видел».\n«Правда? Почему вы так говорите?»\n«Да, мой [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], их завод совершенно не похож на другие. На других заводах в Баварии рабочие вялые, как ощипанные куры, а на их заводе все бодры, трудолюбивы и умелы!»\n«И не только это, их продукция очень надёжна. Вы знаете, я управляю железной дорогой, и раньше мы часто импортировали локомотивы с заводов в Теннесси. Но американцы ненадёжны, их продукция ужасного качества! Ломается через раз, и нашим инженерам приходилось целыми днями чинить эти ужасно шумные машины. А главное, я тратил кучу денег на ремонт! Но с тех пор как мы купили их локомотивы, всё изменилось: они тихие, мощные и почти не ломаются! Они ещё и присылают много дополнительных деталей, так что мы можем быстро заменять изношенные части на оригинальные, не отправляя их на завод. Качество гарантировано!»"
 joi_flavor_ger.11.a: "Великое дело!"
  #Германия правит морями
 joi_flavor_ger.12.t: "Германский флот"
 joi_flavor_ger.12.d: "Размер Флота открытого моря теперь превзошёл Королевский флот, которым так гордилась [SCOPE.sCountry('GBR_scope').GetNameNoFlag]. Даже некогда правящий морями флот вынужден склонить свою гордую голову перед нашим великим военно-морским флотом."
 joi_flavor_ger.12.f: "«У меня особая страсть к флоту. В значительной степени это связано с моим английским происхождением. Когда я был маленьким мальчиком... я восхищался гордыми английскими кораблями. Когда я вырос, во мне зародилось желание строить свои собственные корабли, такие же хорошие, как у англичан, и иметь такой же хороший флот».\n\n«Военно-морская политика ясна и долгосрочна. Наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и кабинет министров полны решимости использовать мощь Германии по всему миру для продвижения германской торговли, собственности и интересов. Неизбежно, что германская военно-морская мощь должна быть увеличена, чтобы иметь большее преимущество, чем сейчас. Результатом этой политики будет то, что если мы окажемся в состоянии войны с любой страной в этом мире, Германия будет занимать доминирующее положение... Военно-морские офицеры, недавно видевшие много германских военно-морских сил, единодушны в том, что германский флот сделал всё возможное»."
 joi_flavor_ger.12.a: "Германия правит морями!"
  #Двойственный союз
 joi_flavor_ger.13.t: "Двойственный союз?"
 joi_flavor_ger.13.d: "Министр иностранных дел [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')] [TimeKeeper.GetCurrentDate.GetString] тайно посетил нашу страну и представил проект союзного договора, утверждая, что объединённая германо-австрийская дружба будет чрезвычайно полезна для обеих сторон."
 joi_flavor_ger.13.f: "Наши северные братья не похожи на нас. Они уже переняли у Франции эстафету гегемонии на континенте, их промышленность развивается семимильными шагами, армия непобедима, а государственная мощь растёт. Появление такой сильной державы пугает весь мир, и, естественно, нас, [ROOT.GetCountry.GetNameNoFlag], тоже.\n\nПосле потери лидерства в Германии мы отказались от идеи объединить немцев под нашим флагом и переключили свои основные интересы на Балканы. Но надо признать, что империя уже не та, что прежде. Сейчас империя борется с [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')] на востоке за господство над балканскими государствами, а итальянцы на юге постоянно провоцируют империю. Эти два дела разрывают и без того хрупкие нервы империи. Без внешней помощи мы неизбежно потерпим неудачу и там, и там. Но небо не без милости, и наши северные братья протянули нам оливковую ветвь — предложили заключить всеобъемлющий взаимопомощный союз.\n\nЕсли это удастся, то выгоды очевидны. [SCOPE.sCountry('GER_scope').GetNameNoFlag] не только поможет нам развить нашу слабую промышленность, но и их первоклассные офицеры помогут нам реформировать нашу армию. Что ещё важнее, союз с такой сильной державой, несомненно, сильно напугает мелких сошек и даст нашей стране огромный стратегический буфер. Но в мире не бывает двух хороших вещей одновременно. Намерение Германии бросить вызов мировому порядку становится всё более очевидным. Как только договор будет подписан, это будет означать, что наша страна, скорее всего, будет втянута в разрушительную войну, которую нынешняя империя не сможет вынести. Какой же выбор нам сделать?"
 joi_flavor_ger.13.a: "Пусть лучше убираются подальше."
 joi_flavor_ger.13.b: "Голубой Дунай, зелёный Рейн!"
  #Тройственный союз
 joi_flavor_ger.14.t: "Тройственный союз?"
 joi_flavor_ger.14.d: "Сегодня специальный посланник [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')] тайно посетил Рим и представил нам проект союзного договора, утверждая, что это значительно укрепит наши позиции в Европе."
 joi_flavor_ger.14.f: "Статья 1: Договаривающиеся стороны взаимно обещают мир и дружбу и не будут вступать в союзы или обязательства, направленные против одного из их государств. Они обязуются обмениваться мнениями по политическим и экономическим вопросам общего характера, которые могут возникнуть, и далее обещают взаимную поддержку в пределах своих интересов.\nСтатья 2: Если [ROOT.GetCountry.GetNameNoFlag] без прямого вызова с её стороны подвергнется нападению со стороны [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] по какой-либо причине, другая договаривающаяся сторона, а именно Германия, обязана оказать атакованной стороне помощь и содействие всеми своими силами. Такое же обязательство ложится на Италию в случае любого нападения со стороны [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] без прямого вызова на [SCOPE.sCountry('GER_scope').GetNameNoFlag].\nСтатья 3: Если одна из великих держав, не подписавших настоящий договор, будет угрожать государственной безопасности одной из договаривающихся сторон, и угрожаемая сторона будет вынуждена объявить ей войну, другая договаривающаяся сторона обязуется соблюдать по отношению к своему союзнику благожелательный нейтралитет. В этом случае, они каждая сохраняют за собой право вступить в войну, если сочтут это целесообразным, для достижения общей цели со своим союзником.\nСтатья 4: Если мир одной из договаривающихся сторон окажется под угрозой при обстоятельствах, предусмотренных в предыдущих статьях, договаривающиеся стороны своевременно проведут консультации по военным мерам, которые необходимо принять с целью возможного сотрудничества. Впредь, во всех случаях совместного участия в войне, они не будут заключать перемирия, мира или договора иначе как по взаимному согласию между собой.\nСтатья 5: Договаривающиеся стороны взаимно обязуются хранить в тайне содержание и существование настоящего договора.\nРатификационные грамоты настоящего договора будут обменены в Риме в течение трёх недель или ранее, если это возможно, и полномочные представители подписали настоящий договор и скрепили его своими гербами в подтверждение чего."
 joi_flavor_ger.14.a: "Нам не нужна помощь немцев!"
 joi_flavor_ger.14.b: "Наш союз крепок, как сталь!"
  #Восстание силезских ткачей
 joi_flavor_ger.15.t: "Восстание силезских ткачей"
 joi_flavor_ger.15.d: "Процесс индустриализации в Силезии был кровавым и жестоким. Не выдержав, ткачи наконец решили объявить забастовку и поднять восстание в знак протеста против бездействия правительства и эксплуатации на фабриках."
 joi_flavor_ger.15.f: "#bold С потухшим взором, без слезы,\nСидят они, грозя в тоске:#!\n«Германия, твой саван мы ткём,\nТройное проклятье в него мы вплетём —\n#bold Мы ткём, мы ткём!»#!\n«Проклятье богу, что глух к мольбе\nВ холодной, зимней был гульбе,\nНапрасно мы ждали, надеждой полны,\nОн издевался, морочил нам сны —\n#bold Мы ткём, мы ткём!#!\n«Проклятье королю богачей,\nКто чужд был горести нашей,\nКто вырвал последний у нас грош,\nИ нас, как собак, расстреливал тож —\n#bold Мы ткём, мы ткём!»#!\n«Проклятье отчизне лживой, где нет\nНи чести, ни славы, ни света,\nГде каждый цветок раздавлен грозой,\nГде в тленье и нечисти червь живой —\n#bold Мы ткём, мы ткём!»#!\n«Челнок снуёт, станок стучит,\nУсердно день и ночь кипит —\n#bold Германия, твой саван мы ткём,#!\nТройное проклятье в него мы вплетём,\n#bold Мы ткём, мы ткём!»#!"
 joi_flavor_ger.15.a: "Не хочешь работать — найдутся другие!"
#########第一次重置事件##########
 #世仇
 joi_flavor_ger.16.t: "Границы власти"
 joi_flavor_ger.16.d: "После того как [SCOPE.sCountry('GER_scope').GetName] завершил[SCOPE.sCountry('GER_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] исторический процесс объединения немецких земель, в Центральной Европе начала возвышаться новая могущественная империя. Ее население стремительно растет, а промышленная мощь совершает небывалый скачок. В то же время [SCOPE.sCountry('FRA_scope').GetName], гегемон континента со времен Средневековья, страдает от демографической стагнации, экономического спада и падения престижа, начавшихся еще после Наполеоновских войн. Бросая вызов этому угасающему величию, [SCOPE.sCountry('GER_scope').GetName] заявляет о своих амбициях. Многие #yellow немецкие националисты#! теперь твердо верят: единая Германия неизбежно сместит Марианну и станет новым великим гегемоном Западной Европы."
 joi_flavor_ger.16.f: "«Германская нация — самая доблестная в Европе. Из века в век, опираясь на военную мощь и возвышенные идеалы, они утверждали свое господство на континенте. Немцы проливали кровь на бесчисленных полях сражений, выковывая победы, и этот героизм передавался из поколения в поколение. Однако в разительном контрасте с этим военным гением современная Германия стала миролюбивой — быть может, даже слишком. Лишь мощное потрясение способно пробудить наши воинственные инстинкты и заставить нас явить миру свою истинную силу».\n\n«Люди, страдающие тяжелыми неврозами, порой демонстрируют неестественные всплески энергии: их работоспособность и продуктивность возрастают, они совершают то, на что не способны в нормальном состоянии, совершенно не чувствуя предела своих сил. Но эта гиперактивность всегда мимолетна. Само её чрезмерное раздувание ведет к истощению, и законы природы вскоре выносят свой суровый приговор. Германия являет нам схожую картину — она неизбежно дойдет до крайностей, истощит себя, и рано или поздно столкнется с превосходящей силой, которая её уничтожит»."
 joi_flavor_ger.16.a: "Вперед, героическая Германия!"
 joi_flavor_ger.16.b: "Славная Марианна, ты непременно победишь!"
 joi_flavor_ger.16.c: "Внимательно следить за ситуацией. От этого зависят наши интересы!"
