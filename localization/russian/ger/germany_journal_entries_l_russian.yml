l_russian:
  #
 verfassung_des_deutschen: "Имперская конституция"
 verfassung_des_deutschen_reason: "После того как [ROOT.GetCountry.GetNameNoFlag] завершила объединение германских земель, новорождённая империя включила в свой состав южные государства#!. Однако эти государства — не слишком послушные вассалы. На самом деле, их бывшие монархи и правительства #bold по-прежнему функционируют#!. Особенно на юге, эти люди, по сути, лишь сменили вывеску и формально подчиняются #bold «императору немцев»#!, которым является [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName].\n\nТакое положение дел недопустимо. Чтобы наша великая [ROOT.GetCountry.GetNameNoFlag] не повторила судьбу #bold Священной Римской империи#! и не превратилась в раздробленное государство, центральное правительство и парламент должны принять и обеспечить исполнение #bold конституции#! на всей территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], чтобы юридически закрепить и ограничить статус этих государств и центрального правительства. В то же время, эта конституция определит #bold будущее политическое устройство#! империи.\n\nПрежде чем проводить дальнейшую политику, новое имперское правительство должно сначала #bold обеспечить#! свою власть над территорией империи."
 verfassung_des_deutschen_1_tt: "Мы должны гарантировать, что в течение года не возникнет серьёзная [concept_revolution], угрожающая действующей конституции."
 verfassung_des_deutschen_2_tt: "Если мы решим принять #bold Бисмарковскую конституцию#! или #bold Либеральную конституцию#!, #bold парламент#! станет постоянно действующим органом."
 verfassung_event_1_tt: "Это #bold запретит#! будущее создание постоянно действующего Рейхстага."
 verfassung_event_2_tt: "Это #bold разрешит#! будущее создание постоянно действующего Рейхстага."
  #:
 kontinentalpolitik_des_deutschen: "Континентальная политика"
 kontinentalpolitik_des_deutschen_reason: "«Изучение сил, которые формируют, поддерживают и изменяют государства, является основой всякого политического прозрения и приводит к осознанию того, что закон силы правит миром государств так же, как закон всемирного тяготения правит миром материальным. Древняя политология полностью осознавала эту истину, но сделала из неё ложный и пагубный вывод — право сильного. Современность исправила эту аморальную ошибку, но, порвав с так называемым правом сильного, слишком склонилась к игнорированию реальной силы сильного и неизбежности его политического влияния».\n\nС момента объединения [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] наша власть была сосредоточена в Европе. Наше государство находится на перекрёстке Европы и владеет богатыми германскими землями, что заставляет даже морскую владычицу [SCOPE.sCountry('GBR_scope').GetNameNoFlag] и некогда покорившую Европу [SCOPE.sCountry('FRA_scope').GetNameNoFlag] теперь уступать нашему авторитету в европейских делах.\n\nПоскольку наши главные интересы лежат в Европе, а не за её пределами, внешняя политика [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] должна быть направлена на изоляцию любой сильной державы на континенте, чтобы не допустить их объединения против нас. В то же время, жертвуя заморскими интересами, мы не должны допустить, чтобы Соединённое Королевство стало нашим противником. Таким образом, мы создадим наилучшую дипломатическую обстановку для наших интересов в Европе.\n\nПо крайней мере, на данный момент, Германия довольствуется властью в Европе."
 change_ger_dip_1_tt: "Если у нас будет более 17 территорий за пределами европейского континента, континентальная политика прекратится.\nМы перейдём к мировой политике!"
 kontinentalpolitik_des_deutschen_status: "#V #O Власть Германии, сосредоточенная на интересах в Европе#!#!"
 ger_event_1_1_tt: "Если условия не будут выполнены, мы будем вынуждены перейти к мировой политике."
  #:
 weltpolitik_des_deutschen: "Мировая политика"
 weltpolitik_des_deutschen_reason: "«Германия стоит перед возможностью войны на #bold два фронта#!. Говоря о стремлении к миру, он привёл в пример Балканскую войну и доказал её тщетность: „Болгария, это маленькое государство между Дунаем и Балканами, далеко не является достаточно важной целью... ради которой Европа от Москвы до Пиренеев и от Северного моря до Палермо вверглась бы в войну, последствий которой никто не мог предвидеть. В конце конфликта мы бы едва ли знали, за что сражались“».\n\n[Concept(concept_great_power', 'Великие державы')] всего мира ведут неустанную борьбу за раздел #bold заморских колоний#!, и [ROOT.GetCountry.GetNameNoFlag] не должна отставать. Прежняя #bold континентальная политика#! Бисмарка уже в прошлом. С развитием нашей промышленности нам нужны заморские земли для сбыта отечественной продукции, и промышленные гиганты уже обратились к правительству с требованием захватить ценные источники сырья.\n\nЗавоевательный поход Германской империи не остановится. Даже если наши враги объединятся, мы должны германским мечом для германского плуга завоевать #bold место под солнцем!#!"
 change_ger_dip_2_tt: "Если у нас будет менее 17 территорий за пределами Европы, мировая политика прекратится.\nМы вернёмся к континентальной политике!"
 weltpolitik_des_deutschen_status: "#V #U Германская колониальная экспансия, сосредоточенная на заморских интересах#!#!"
 ger_event_1_2_tt: "Если условия не будут выполнены, мы будем вынуждены вернуться к континентальной политике."
  #
 dip_zweibund: "Двойственный союз"
 dip_zweibund_reason: "Империя была выкована железом и кровью [Concept('concept_war', 'войны')]. Хотя в борьбе за господство в Германии мы недолго воевали с [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_TP')], благодаря канцлеру Бисмарку, который настоял на своём вопреки общему мнению, мы #bold отказались#! от идеи создания #bold Великой Германии#!, подписали с ними чрезвычайно мягкий мирный договор и стали рассматривать Австрию как #bold потенциального союзника#!.\n\nМир меняется. Все европейские [Concept(concept_great_power', 'Великие державы')] ищут надёжных союзников, стремясь перекроить мир по своему усмотрению. От России на востоке до Франции на западе — наши враги окружают нас с суши. Если они заключат союз, наша родина, [ROOT.GetCountry.GetNameNoFlag], окажется в неловком положении, зажатая с двух сторон. Поэтому мы должны вырваться из этой изоляции. Наш южный сосед, [SCOPE.sCountry('AUS_scope').GetNameNoFlag], хоть и ослаблен, но его обширные территории, богатые людские и природные ресурсы делают его страной с большим потенциалом. С нашей помощью они, возможно, станут сильным и надёжным союзником.\n\n#bold Общие кровные узы и [concept_culture] немцев#! связывают наши две страны. Хотя мы и не одно государство, #bold Рейн#! и #bold Дунай#! всё же будут стоять плечом к плечу, как во времена борьбы с Наполеоном!"
 dip_zweibund_possible_tt: "В #bold Плане объединения Германии#! был выбран #bold малогерманский путь#!"
 refuse_zweibund_tt: "Это отменит [Concept('concept_journal_entry', 'запись в дневнике')] о Двойственном союзе для обеих сторон."
 dip_zweibund_status: "#bold #P Общие кровные узы могут способствовать созданию [Concept('concept_alliance', 'союза')] между нашей страной и Австрией.#!#!"
 dip_zweibund_1_button: "Отправить военных советников"
 dip_zweibund_1_button_desc: "Военное министерство считает, что австрийской армии сильно не хватает координации и современной системы командования. Их офицерам недостаёт стратегического видения, а солдаты плохо обучены и говорят на разных языках, что значительно усложняет управление. Однако наши офицеры обладают богатым опытом командования и подготовки. Отправив часть наших лучших офицеров и командиров в австрийскую армию для помощи в боевых действиях и обучении, мы сможем поднять их сухопутные силы до уровня, достаточного для оказания нам помощи."
 dip_zweibund_1_button_tt: "Это увеличит #bold доверие#! на 25.\nОтправлять советников можно только 1 раз в 5 лет!"
 dip_zweibund_2_button: "Продать промышленное оборудование"
 dip_zweibund_2_button_desc: "Промышленная система Австрии менее современна, чем наша, однако наши промышленные гиганты с радостью продадут Австрии некоторое ценное промышленное оборудование, чтобы помочь им."
 dip_zweibund_2_button_tt: "Это увеличит #bold доверие#! на 25.\nЗаключать сделку о продаже оборудования можно только 1 раз в 5 лет!"
 dip_zweibund_3_button: "Предложить дипломатический визит"
 dip_zweibund_3_button_desc: "Дружба между Германией и Австрией, несомненно, крепка, но даже самая тесная дружба требует частого взаимодействия. Личный визит Его Величества в Австрию принесёт огромную пользу нашим отношениям."
 dip_zweibund_3_button_tt: "Это увеличит #bold доверие#! на 5.\nОсуществлять дипломатический визит можно только 1 раз в год!"
 dip_zweibund_4_button: "Двустороннее экономическое сотрудничество"
 dip_zweibund_4_button_desc: "Наши торговые отношения с Австрией были тесными ещё со времён Германского союза. Австрия — наш важный рынок и партнёр. Если наши таможни смогут договориться о взаимовыгодном таможенном соглашении, это принесёт пользу и нам, и им."
 dip_zweibund_4_button_tt: "Это будет стоить 50 #bold доверия#!.\nПодписывать соглашение о сотрудничестве можно только 1 раз в 5 лет!"
 dip_zweibund_5_button: "Запросить финансовую поддержку"
 dip_zweibund_5_button_desc: "Бедность нашей казны общеизвестна. Однако наш добрый сосед и союзник, Австрия, является одной из самых богатых стран Европы, после Англии и Франции. Воспользовавшись нашими дружескими отношениями, мы можем обратиться к ним с просьбой о займе, и они не откажут."
 dip_zweibund_5_button_tt: "Это будет стоить 50 #bold доверия#!.\nЗапрашивать финансовую поддержку можно только 1 раз в 5 лет!"
 dip_zweibund_6_button: "Продлить союзный договор"
 dip_zweibund_6_button_desc: "Мировая обстановка становится всё более напряжённой. Германия и Австрия должны укрепить свой союз, чтобы защитить свои интересы. Пора напомнить австрийцам об их военных обязательствах!"
 dip_zweibund_6_button_tt: "Продлевать можно только 1 раз в 5 лет."
 dip_zweibund_need_50_tt: "Требуется не менее 50 доверия"
  #
 der_reichstag: "Рейхстаг"
 der_reichstag_reason: "Шкала прогресса показывает количество депутатов от #bold партии, занимающей большинство мест#!.\n#bold Места либеральной партии#! определяются множеством #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_liberalism_tooltip_advance положительных#! или #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_liberalism_tooltip_delete отрицательных#! условий.\n#bold Места консервативной партии#! определяются множеством #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_conservatism_tooltip_advance положительных#! или #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_conservatism_tooltip_delete отрицательных#! условий.\n#bold Места социал-демократической партии#! определяются множеством #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_socialism_tooltip_advance положительных#! или #tooltippable;tooltip:[Country.GetTooltipTag],reichstag_socialism_tooltip_delete отрицательных#! условий.\n\n#variable Рейхстаг#! и [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — символы единства империи. Административно Рейхстаг и Бундесрат совместно осуществляют #bold законодательную власть#!. Рейхстаг предлагает и разрабатывает законопроекты, передавая их в Бундесрат, и является фактически высшим органом власти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], обладая также правом совместного принятия решений по бюджету.\n\nВ Рейхстаге #variable 382#! депутата, и в нём доминируют три партии: #bold Либеральная партия#!, исповедующая либерализм, #bold Консервативная партия#!, исповедующая консерватизм, и #bold Социал-демократическая партия#!, чья программа основана на социализме. Депутаты избираются путём #bold всеобщих прямых [Concept('concept_election', 'выборов')]#!, являются представителями всего народа империи, не связаны наказами и указаниями избирателей и пользуются неприкосновенностью.\n\nРейхстаг — сердце [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Здесь разрабатываются и рассматриваются все законы, влияющие на жизнь страны."
 reichstag_liberalism_tooltip_advance: "Следующие условия #bold ежемесячно#! #bold добавляют 1 место#!:\n•Поддержка #bold Либеральной партии#!\n•Приняты законы [GetLawType('law_right_of_assembly').GetName] или [GetLawType('law_protected_speech').GetName]\n•Принят закон [GetLawType('law_elected_bureaucrats').GetName]\n•Принят закон [GetLawType('law_laissez_faire').GetName]"
 reichstag_liberalism_tooltip_delete: "Следующие условия #bold ежемесячно#! #bold отнимают 1 место#!:\n•Поддержка #bold СДПГ#!\n•Приняты законы [GetLawType('law_censorship').GetName] или [GetLawType('law_outlawed_dissent').GetName]\n•Приняты законы [GetLawType('law_regulatory_bodies').GetName] или [GetLawType('law_worker_protections').GetName]\n•Приняты законы [GetLawType('law_wage_subsidies').GetName] или [GetLawType('law_old_age_pension').GetName]"
 reichstag_conservatism_tooltip_advance: "Следующие условия #bold ежемесячно#! #bold добавляют 1 место#!:\n•Поддержка #bold Консервативной партии#!\n•Принят закон [GetLawType('law_appointed_bureaucrats').GetName]\n•Приняты законы [GetLawType('law_censorship').GetName] или [GetLawType('law_outlawed_dissent').GetName]\n•Приняты законы [GetLawType('law_dedicated_police').GetName] или [GetLawType('law_militarized_police').GetName]"
 reichstag_conservatism_tooltip_delete: "Следующие условия #bold ежемесячно#! #bold отнимают 1 место#!:\n•Поддержка #bold Либеральной партии#!\n•Приняты законы [GetLawType('law_interventionism').GetName] или [GetLawType('law_cooperative_ownership').GetName]\n•Принят закон [GetLawType('law_elected_bureaucrats').GetName]\n•Приняты законы [GetLawType('law_right_of_assembly').GetName] или [GetLawType('law_protected_speech').GetName]"
 reichstag_socialism_tooltip_advance: "Следующие условия #bold ежемесячно#! #bold добавляют 1 место#!:\n•Поддержка #bold СДПГ#!\n•Приняты законы [GetLawType('law_interventionism').GetName] или [GetLawType('law_cooperative_ownership').GetName]\n•Приняты законы [GetLawType('law_regulatory_bodies').GetName] или [GetLawType('law_worker_protections').GetName]\n•Приняты законы [GetLawType('law_wage_subsidies').GetName] или [GetLawType('law_old_age_pension').GetName]"
 reichstag_socialism_tooltip_delete: "Следующие условия #bold ежемесячно#! #bold отнимают 1 место#!:\n•Поддержка #bold Консервативной партии#!\n•Принят закон [GetLawType('law_appointed_bureaucrats').GetName]\n•Приняты законы [GetLawType('law_dedicated_police').GetName] или [GetLawType('law_militarized_police').GetName]\n•Принят закон [GetLawType('law_laissez_faire').GetName]"
 der_reichstag_complete_tt: "Партия, занимающая большинство мест, будет оказывать различное влияние на провинции по всей стране."
 status_der_reichstag_liberalism: "#U #B Либеральная партия в настоящее время занимает большинство мест.#!#!"
 status_der_reichstag_conservatism: "#O #B Консервативная партия в настоящее время занимает большинство мест.#!#!"
 status_der_reichstag_socialism: "#N #B Социал-демократическая партия в настоящее время занимает большинство мест.#!#!"
 status_der_reichstag_nobody: "#I #B Ни одна партия в настоящее время не занимает большинство мест.#!#!"
 der_reichstag_encourage_liberalism_button: "Поддержать Либеральную партию: #variable [ROOT.GetCountry.MakeScope.Var('liberalism_progress').GetValue|0]#! мест"
 der_reichstag_encourage_liberalism_button_desc: "Идеи либерализма достойны того, чтобы стремиться к мечте о демократии. Только свободная Германия сможет воссиять во всём своём блеске!"
 not_already_encourage_liberalism: "Либеральная партия в данный момент не поддерживается"
 liberalism_progress_increase_5_tt: "Количество мест у Либеральной партии начнёт увеличиваться на 3 в месяц.\nКоличество мест у Консервативной партии начнёт уменьшаться на 3 в месяц."
 der_reichstag_encourage_conservatism_button: "Поддержать Консервативную партию: #variable [ROOT.GetCountry.MakeScope.Var('conservatism_progress').GetValue|0]#! мест"
 der_reichstag_encourage_conservatism_button_desc: "Дух немецкой нации глубок, строг и консервативен, а идеи консерватизма могут эффективно предотвратить вред, наносимый стране радикализмом."
 not_already_encourage_conservatism: "Консервативная партия в данный момент не поддерживается"
 conservatism_progress_increase_5_tt: "Количество мест у Консервативной партии начнёт увеличиваться на 3 в месяц.\nКоличество мест у СДПГ начнёт уменьшаться на 3 в месяц."
 der_reichstag_encourage_socialism_button: "Поддержать СДПГ: #variable [ROOT.GetCountry.MakeScope.Var('socialism_progress').GetValue|0]#! мест"
 der_reichstag_encourage_socialism_button_desc: "Забота о нуждах большинства и стремление к материальному равенству — вот что должно делать правительство. Идеи равной демократической социалистической мысли следует поощрять."
 not_already_encourage_socialism: "СДПГ в данный момент не поддерживается"
 socialism_progress_increase_5_tt: "Количество мест у СДПГ начнёт увеличиваться на 3 в месяц.\nКоличество мест у Либеральной партии начнёт уменьшаться на 3 в месяц."
 der_reichstag_1_button: "Продвигать либеральные реформы"
 der_reichstag_1_button_desc: "Недовольство либералов текущим экономическим положением в стране общеизвестно. Их предложения о налоговых реформах и либерализации торговли для стимулирования экономического роста могут быть в любой момент вынесены на рассмотрение парламента."
 der_reichstag_1_1_button_tt: "Либеральная партия должна занимать большинство мест"
 der_reichstag_1_2_button_tt: "За последние 10 лет новые законы не рассматривались"
 der_reichstag_2_button: "Усилить государственный контроль"
 der_reichstag_2_button_desc: "Консерваторы стремятся к политической обстановке, соответствующей немецким традициям. Их предложения об усилении национализма и протекционистской торговой политики могут быть в любой момент вынесены на рассмотрение парламента."
 der_reichstag_2_1_button_tt: "Консервативная партия должна занимать большинство мест"
 der_reichstag_2_2_button_tt: "За последние 10 лет новые законы не рассматривались"
 der_reichstag_3_button: "Увеличить бюджет на социальное обеспечение"
 der_reichstag_3_button_desc: "Социал-демократы широко пропагандируют в обществе политику равного социализма. Их предложения о достижении социальной справедливости и равного благосостояния могут быть в любой момент вынесены на рассмотрение парламента."
 der_reichstag_3_1_button_tt: "Социал-демократическая партия должна занимать большинство мест"
 der_reichstag_3_2_button_tt: "За последние 10 лет новые законы не рассматривались"
