 deutsch_reich: "Германская мировая империя"
 deutsch_reich_reason: "#variable Граф Бисмарк#! когда-то опасался, что мы ввяжемся в мировые авантюры, но его взгляды, несомненно, устарели. С резким изменением мировой обстановки, [ROOT.GetCountry.GetNameNoFlag] также должна принять участие в разделе мировых интересов, иначе мы окажемся в невыгодном, отстающем положении в этой великой гонке.\n\nМы с самого начала #bold не должны были исключать Германию из конкуренции с другими странами за плодородные земли с великими перспективами.#! Эпоха, когда другие народы делили землю и моря, а [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] оставалось лишь довольствоваться властью над небесами, прошла! Мы считаем, что создание и развитие нашего судоходства, торговли и промышленности, особенно наших интересов на Востоке и в Африке, является нашей первоочередной задачей. Мы не можем допустить, чтобы в Европе возобладало мнение, что с нами можно пользоваться свободой, не разделяя её с другими странами.\n\nМы должны требовать, чтобы немецкие #bold купцы, товары, а также немецкий флаг и немецкие корабли#! в мире пользовались таким же уважением, как и у других [concept_great_power]!\n\nМы будем стремиться к нашему собственному #bold месту под солнцем#! и, следуя традициям немецкой внешней политики, прилагать все усилия для #bold защиты и расширения интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] по всему миру.#!"
 deutsch_reich_1_tt: "Принята или принималась [Concept('concept_journal_entry', 'запись в дневнике')] $weltpolitik_des_deutschen$"
 deutsch_reich_2_tt: "Захвачены #bold все#! #bold претензии#! Германской империи!"
 deutsch_reich_3_tt: "Расширение заморских интересов откроет для нашей страны новые возможности."
  #
 claim_cameroon: "Претензии на Западную Африку"
 claim_cameroon_reason: "С постоянным развитием нашей страны стратегия Германии вышла на новый этап — захват большого количества колоний для поддержания устойчивого развития отечественной промышленности. В то же время, в эпоху, когда все великие державы устремились на Тёмный континент, наша германская родина не должна отставать. Из всех территорий Западной Африки Того и Камерун кажутся неплохим началом нашего пути, а [SCOPE.sCountry('FRA_scope').GetNameNoFlag] и [SCOPE.sCountry('GBR_scope').GetNameNoFlag] сейчас заняты ожесточённой борьбой за дельту Нигера и не обращают внимания на эти, в их глазах, не имеющие стратегической ценности земли.\n\nДаже если минеральные ресурсы этих территорий ограничены, они подходят для выращивания каучука и заготовки древесины для нашей тяжёлой промышленности. Захватить эти территории для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — проще простого. Пора двигаться вперёд и осваивать новое жизненное пространство!"
 claim_cameroon_tt: "Экспансия в Западной Африке может задеть интересы Франции... но кого волнует Франция?"
  #
 claim_namibia: "Претензии на Намибию"
 claim_namibia_reason: "Большая часть территории Намибии — это горы и пустыни, но, по сведениям нашей экспедиции, под ними скрыты богатые полезные ископаемые. Намибия расположена на юго-западе Африки, на западе омывается Атлантическим океаном, на севере граничит с Анголой и Замбией, на востоке — с Ботсваной, а на юге — с Южной Африкой, находящейся под властью [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]. Это место с хорошим стратегическим положением и относительно спокойное, не вызывающее особого беспокойства у других.\n\nХотя суровые природные условия и свирепая малярия мешают продвижению наших колонистов, если нам удастся установить контроль над этим регионом, это, возможно, даст нам шанс отхватить кусок от прибыльного торгового пути вокруг мыса Доброй Надежды."
 claim_namibia_tt: "Экспансия в Южной Африке может вызвать недовольство Великобритании... но что они могут сделать?"
  #
 claim_tanzania: "Претензии на Танзанию"
 claim_tanzania_reason: "#bold Танзания#!, доступ к которой открывается с побережья Занзибара, расположена на плодородных землях Восточной Африки, окружённых богатыми месторождениями, а на севере находится #bold озеро Виктория#!. Плодородие земель и благоприятный климат Танзании общеизвестны, и предприятия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] очень хотят захватить эту территорию, чтобы #bold обеспечить нашу текстильную промышленность красителями и хлопком#!.\n\nЗанзибар, некогда владение Оманской империи, #bold контролирует важнейший торговый путь в Индийском океане#!, поэтому инфраструктура и связи, созданные нашими ранними торговыми постами, заложили основу для нашей колонизации и развития. Пока другие конкуренты не обращают на это место внимания, мы должны поспешить и заполучить его. Это место станет #bold сияющей жемчужиной#! на Тёмном континенте!"
 claim_tanzania_tt: "Завоевание Танзании принесёт экономике империи много выгод."
  #
 claim_new_guinea: "Претензии на Новую Гвинею"
 claim_new_guinea_reason: "Новая Гвинея — огромный остров, но его население, кажется, совершенно не соответствует его размерам. Здесь есть неплохие минеральные, лесные и рыбные ресурсы. Хотя остров и находится далеко, он может стать хорошей плантацией и военной базой и оказать [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] немалую помощь, а также стать нашим #bold плацдармом в Индокитае и Индонезии#!. /n/nНовая Гвинея находится близко к колониям [SCOPE.sCountry('NET_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], поэтому мы должны #bold быстро захватить#! свою долю, чтобы они нас не опередили!"
 claim_new_guinea_tt: "Новая Гвинея малонаселённая, но всё же может стать базой для дальнейшей экспансии нашей страны в Восточной Азии."
  #
 claim_malaya: "Претензии на Юго-Восточную Азию"
 claim_malaya_reason: "Юго-Восточная Азия, включающая Индокитай и Индонезию, несмотря на жаркий климат, является регионом, богатым ресурсами и ценностями. Здесь густые джунгли, где можно добывать качественный тик, и тысячи ли плодородных полей, где можно выращивать всё, что нам нужно.\n\nЕсли мы сможем завладеть этим регионом, это даст нам возможность массово выращивать опиум и шёлк, что значительно обогатит нашу промышленность. В то же время, дельта Красной реки — отличное сельскохозяйственное угодье, способное обеспечить всю [ROOT.GetCountry.GetNameNoFlag] достаточным и дешёвым продовольствием. А Малайя на Малаккском проливе контролирует самый богатый торговый путь на Востоке, и её прибыли вызывают зависть.\n\nОднако захватить этот богатый регион будет нелегко. Интересы [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] в Индокитае общеизвестны, а [SCOPE.sCountry('GBR_scope').GetNameNoFlag] уже занимает обширные территории в Малайе, такие как Сингапур. Весьма вероятно, что они объединятся против нашего вмешательства. Однако, если удастся реализовать этот блестящий замысел «Германской Восточной Азии», эта территория, несомненно, станет самой яркой жемчужиной в короне Германии..."
 claim_malaya_tt: "Великобритания и Франция чрезвычайно дорожат своими интересами в Восточной Азии, и наше вмешательство, скорее всего, их разозлит."
  #
 schlesien_industrialize: "Индустриализация Силезии"
 schlesien_industrialize_reason: "#variable Силезия#! ещё во времена #bold Священной Римской империи#! принадлежала #bold богемскому курфюрсту#!. После #bold Семилетней войны#! она перешла под власть #bold Фридриха Великого#!, который способствовал её процветанию, превратив такие города, как #bold Бреслау#!, в самые процветающие текстильные и торговые центры Германии в Восточной Европе.\n\nСегодня, в эпоху #bold промышленной революции#!, развитие промышленности и торговли стало неотъемлемой частью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Богатые месторождения Силезии привлекли внимание центрального правительства, а удобное транспортное сообщение по реке Одер способствовало долгосрочному процветанию её промышленности и городов, стабильному развитию текстильной отрасли и освоению ресурсов.\n\n#bold Однако этого недостаточно!#! Правительство должно что-то предпринять, направить значительные ресурсы на ускорение индустриализации Силезии, чтобы она стала прочным #bold сердцем#! в великом промышленном теле [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 schlesien_industrialize_status: "Превратить процветающую Силезию в настоящий промышленный регион"
  #
 bavaria_industrialize: "Индустриализация Баварии"
 bavaria_industrialize_reason: "Известная своим #bold производством пива#!, #bold Бавария#! с момента объединения была землёй с разбросанными городками и #bold почти полновластными аристократами#!. Хотя такие города, как Мюнхен, Нюрнберг и Аугсбург, быстро развивались под влиянием промышленной революции, они не могли составить промышленный регион, способный поддержать развитие империи.\n\nКак самая важная территория [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на юге, Бавария страдала от нехватки ресурсов и плохого транспортного сообщения, что сильно сдерживало её развитие. В то же время, бывший #bold баварский король#! всё ещё сохранял там значительную власть, а #bold рост [concept_pop]#! и #bold аграрные реформы#! значительно отставали от старых промышленных регионов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], таких как Пруссия.\n\nУчитывая положение Баварии, кабинет министров представил [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Кайзеру')] [ROOT.GetCountry.GetRuler.GetFirstName] масштабный план, направленный на её быстрое превращение в новый промышленный регион. Они утверждают, что этот план, с акцентом на #bold Франконию#! и #bold Пфальц#!, превратит Баварию в великий #bold новый промышленный центр#!."
 bavaria_industrialize_status: "Превратить города Баварии в новые промышленные центры"
  #
 deutsch_hochseeflotte: "План строительства Флота открытого моря"
 deutsch_hochseeflotte_reason: "«Образ Нептуна с трезубцем в руке — это символ новой миссии, которую мы должны выполнить... В любой точке мира мы должны защищать граждан Германии; в любой точке мира мы должны отстаивать честь Германии!»\n\nС ростом морской торговли и заморских интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] нам всё больше нужен флот для защиты интересов родины. В то же время, стремление [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Кайзера')] к #bold мировой политике#! также требует огромного флота: ведь всем известно, что [concept_fleet] — важнейшее оружие для обеспечения наших заморских интересов.\n\nХотя #bold Королевский флот#! [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], который долгое время господствовал на морях, до сих пор имеет над нами огромное преимущество, с развитием новых технологий, таких как #bold дредноуты#!, у нас появилась возможность превзойти Королевский флот, опираясь на нашу #bold мощную промышленность#!.\n\nХотя это, скорее всего, заденет #bold чувствительные нервы#! англичан, ради интересов Германии мы должны продвигать этот план!"
 deutsch_hochseeflotte_tt: "Огромный флот станет надёжной гарантией наших заморских интересов!"
 deutsch_hochseeflotte_complete_tt: "Размер нашего флота должен быть как минимум равен размеру Королевского флота."
  #
 dip_stahlpakt: "Стальной пакт"
 dip_stahlpakt_reason: "#bold Великое часто начинается с малого#!. Хотя наши союзники полны потенциала, они всё ещё сильно уступают нашим врагам. Учитывая это, как великая европейская держава, мы можем помочь им, создав #bold относительно спокойную внешнюю обстановку#!, что будет способствовать их внутренним реформам.\n\n[SCOPE.sCountry('AUS_scope').GetNameNoFlag] сейчас находится в серьёзном конфликте с [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')]. [SCOPE.sCountry('RUS_scope').GetNameNoFlag], под предлогом объединения славян, стремится распространить своё влияние на Балканы, что, несомненно, является вторжением в задний двор [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')]. По сравнению с этим, препятствия для наших интересов гораздо меньше. Если мы заключим с ними #bold оборонительный союз#! и направим #bold их взоры за океан#!, это, несомненно, сделает нас сильнее, а дружба с ними в долгосрочной перспективе принесёт много пользы."
 dip_stahlpakt_possible_tt: "Германия имеет [concept_journal_entry]: $kontinentalpolitik_des_deutschen$"
 dip_stahlpakt_fail_tt: "Любая из сторон соглашения вышла из #bold Стального пакта#!"
 dip_stahlpakt_fail_2_tt: "Наша страна находится в состоянии войны с Италией"
 dip_stahlpakt_fail_3_tt: "Наша страна находится в состоянии войны с Германией"
 refuse_stahlpakt_tt: "Это отменит [Concept('concept_journal_entry', 'запись в дневнике')] о Стальном пакте для обеих сторон."
 dip_stahlpakt_1_button: "Продлить оборонительный союз"
 dip_stahlpakt_1_button_desc: "Срок действия нашего союза подходит к концу. Возможно, лучше его продлить."
 stahlpakt_1_possibel_tt: "Продлевать можно только 1 раз в 10 лет"
 dip_stahlpakt_2_button: "Совместные военные учения"
 dip_stahlpakt_2_button_desc: "Наши страны расположены очень близко, что облегчает совместные военные действия. Для будущих совместных операций, возможно, было бы лучше провести совместные военные учения."
 stahlpakt_2_possibel_tt: "Проводить учения можно только 1 раз в 5 лет"
 dip_stahlpakt_3_button: "Выйти из Стального пакта"
 dip_stahlpakt_3_button_desc: "Союз в настоящее время не имеет практического смысла. В соответствии с дополнительными статьями, подписанными нашей страной, мы выйдем из союзного договора."
 stahlpakt_3_possibel_tt: "Наша страна состоит в Стальном пакте\nЭто действие удалит [Concept('concept_journal_entry', 'запись в дневнике')] о Стальном пакте у обеих сторон"
