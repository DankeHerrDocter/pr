 lander_der_krone_government: "Правление короны"
 lander_der_krone_government_reason: "#B #P Император всех немцев, апостольский король [ROOT.GetCountry.GetNameNoFlagNoFlag], Богом хранимый Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] является нынешним монархом.#!#!\n\nС момента принятия #V конституции в церкви Святого Павла#! #B по решению Франкфуртского национального собрания мы стали подданными Его Величества кайзера [SCOPE.sCountry('GER_scope').GetNameNoFlag]#!, избавившись от прежнего прямого правления и #V получив автономию#!. Будучи [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'королём')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], Его Величество постоянно проживает во Франкфурте, поэтому #V представляющий его власть генерал-губернатор [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#! исполняет от имени Его Величества [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'короля')] церемониальные обязанности в [ROOT.GetCountry.GetNameNoFlagNoFlag], а губернаторы провинций представляют [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] в своих провинциях.\n\nХотя в имперском правительстве император уже делегировал власть и под надзором франкфуртской конституции была создана #B конституционная [GetLawType('law_monarchy').GetName]#!, в нашей стране #B власть Его Величества [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'короля')] теоретически всё ещё абсолютна#!. Хотя мы вряд ли сможем ослушаться имперского правительства, ради #B независимости нашей великой нации и общих идеалов свободы#!, возможно, стоит добиваться большей автономии."
