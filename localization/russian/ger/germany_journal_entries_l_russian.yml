 berlin_industrialize: "План Хобрехта"
 berlin_industrialize_reason: "Со времён #V объединения Германии#! #V Берлин#! стал столицей и культурным символом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Несмотря на реконструкцию времён #V Фридриха Великого#!, сегодня, в эпоху #B стремительного промышленного развития и роста населения#!, город снова стал перенаселённым, с устаревшей инфраструктурой и неэффективным управлением, что не соответствует величию и славе нации.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уже утвердил масштабный план расширения Берлина, #V «план Хобрехта»#!. Мы #B расширим городскую территорию, построим несколько кольцевых дорог вокруг Берлина и Шарлоттенбурга, введём новую систему канализации и электроснабжения#!, чтобы в итоге создать #B хорошо спланированный, упорядоченный и ярко освещённый круглые сутки#! #V мегаполис [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#! и позволить #V Берлину#! по-настоящему войти в число #B величайших городов мира.#!"
