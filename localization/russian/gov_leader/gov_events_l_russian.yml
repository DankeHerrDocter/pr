l_russian:
 #
 joi_flavor_gov.1.t: "Официальная народность"
 joi_flavor_gov.1.d: "Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Николай Романов#! завершает свое правление. Он стремился восстановить и защитить священный порядок, низвергнутый в годы Наполеоновских войн. При поддержке таких сил, как #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!, и видных деятелей вроде [GetInterestGroupVariant('ig_landowners',GetPlayer).GetLeader.GetFullName], его воля оставила глубокий след в истории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gov.1.f: "«Наш общий долг — обеспечить, чтобы народное образование совершалось в соединенном духе Православия, Самодержавия и народности, согласно высочайшей воле нашего августейшего монарха. Я твердо верю, что каждый профессор и учитель, проникнутый преданностью престолу и отечеству, употребит все свои силы, чтобы стать надежным помощником правительства и заслужить его полное доверие».\n\n«Если мы и восприняли с Запада некоторые неизбежные заблуждения, то, с другой стороны, мы сохранили в себе три чистых основных чувства, таящих в себе семена и залог нашего будущего развития: они ясно показывают народу, что во всех касающихся его делах [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] действует по воле Божьей, а не по собственным прихотям или фантазиям каких-то иноземцев»."
 joi_flavor_gov.1.a: "Даже из священного единства самодержавия..."
 joi_flavor_gov.1.b: "Его деспотизм — не более чем ширма..."
 joi_flavor_gov.1.c: "Россия — большая семья: правитель в ней — отец, а подданные — дети..."
 #
 joi_flavor_gov.2.t: "Моральная ценность свободы"
 joi_flavor_gov.2.d: "Премьерский срок уважаемого #yellow Уильяма Гладстона#! подошел к концу. Он стремился укрепить в обществе равенство возможностей, выступал против протекционизма и поддерживал создание системы народного образования. Противодействуя безрассудной имперской экспансии, он сохранял международный престиж Британии и мирный порядок. Его идеи и политика оставили глубокий след в истории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gov.2.f: "«Единственное средство, которое я мог применить для повышения заработной платы шахтеров, — это стремление отменить все торговые ограничения, которые могли бы снизить цену продукта их труда, и максимально уменьшить налоги на потребляемые ими товары. Кроме того, я ориентировался на дальновидность, которая в нашей стране еще не получила такого широкого распространения, как в Шотландии или некоторых иностранных государствах».\n\n«Когда мистер Гладстон посетил Север, весть об этом мгновенно разлетелась среди рабочих, и они вышли встречать единственного премьер-министра, наделившего британский народ правами. Берег реки на протяжении двадцати миль был усыпан людьми: женщины стояли с детьми на руках, надеясь в будущем сказать им, что они своими глазами видели народного канцлера казначейства. Все гребцы останавливались, чтобы поприветствовать мистера Гладстона; тысячи суровых шахтеров, никогда прежде не подходивших к общественным деятелям, толпились вокруг его экипажа, протягивая руки, чтобы пожать руку мистеру Гладстону как своему родному человеку»."
 joi_flavor_gov.2.a: "Я искренне желаю вам..."
 joi_flavor_gov.2.b: "Желаю вам свободы и независимости..."
 joi_flavor_gov.2.c: "Человек, стоящий одной ногой в могиле..."
 #
 joi_flavor_gov.3.t: "Возвышение идеологии «[GetIdeology('ideology_one_nation_conservatism_leader').GetName]»"
 joi_flavor_gov.3.d: "[SCOPE.sCharacter('disraeli_scope').GetFullName], восходящая звезда из рядов #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')]#!#!, выступил инициатором важных перемен. В результате многие догмы идеологии «[GetIdeology('ideology_british_tory_conservatism_old').GetName]» были пересмотрены. Чтобы привлечь на свою сторону зарождающийся рабочий класс, в партии «[SCOPE.sParty('conservative_party').GetName]» набирают силу идеи течения «[GetIdeology('ideology_one_nation_conservatism_leader').GetName]», главным защитником которых он является."
 joi_flavor_gov.3.f: "«Я всегда считал, что достопочтенный [SCOPE.sCharacter('disraeli_scope').GetLastName] — величайший радикал в Палате общин. Он сделал то, чего не смог бы сделать никто другой в стране: он втащил наверх этот омнибус, битком набитый глупыми, неповоротливыми сквайрами — под „глупыми“ я имею в виду исключительно в парламентском смысле — и превратил этих консерваторов в радикальных реформаторов».\n\n«Таким образом, британский народ объединяется, стремясь избавиться от разлагающих интриг расточительной олигархии, дикого сектантства и алчной клерикальной тирании, за которыми стоят их наследственные лидеры — аристократы. Поэтому в данный момент Палата лордов представляет собой всё что угодно, только не олигархию вигов, их орудие — диссентеров — и их хозяев — ирландских священников»."
 joi_flavor_gov.3.a: "Таков долг аристократии в новую эпоху!"
 joi_flavor_gov.3.b: "Патернализм здесь неуместен."
 joi_flavor_gov.4.t: "Эндимион консерваторов"
 joi_flavor_gov.4.d: "Премьерский срок достопочтенного #yellow Бенджамина Дизраэли#! подошёл к концу. Он стремился реформировать устаревшее мышление #yellow Консервативной партии#!, способствовать экономическому равенству, развитию здравоохранения и социальной стабильности. Опираясь на мощь армии и дипломатии, он поддерживал выгодный для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] мировой порядок и расширял интересы Британской империи. Он заручился широкой поддержкой рабочего класса и приверженцев идеологии «[GetIdeology('ideology_one_nation_conservatism_leader').GetName]», ратующих за гуманность и реформы. Его идеи и политика оставили глубокий след в истории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_gov.4.f: "«Неужели произойдет полная смена правящей партии? Вернутся ли протекционисты? Они могущественны, но всегда остаются в меньшинстве, подобно некоторым континентальным державам, обладающим лучшими в мире армиями, но неизменно терпящим поражение. Вернётся ли к власти та группа самовлюблённых гениев, что вносила смуту во все кабинеты, где им доводилось работать, опершись на плечи народа, как они всегда мечтали? Хотя народ, похоже, никогда о них и не вспоминает».\n\n«Цель моего приезда не сводится лишь к осмотру этих комнат; я приехал сюда, чтобы взглянуть на нашу старую детскую, где мы прожили вместе так долго и так счастливо! Вот она; и вот мы здесь. Всё, чего я желал, всё, о чём я мечтал, сбылось. Дорогая моя, любовь моей души, среди этих декораций нашего детства и былых лет позволь мне обнять тебя в последний раз, со всеми нашими печалями и радостями».\n\n                                                    — Бенджамин Дизраэли, «Эндимион»"
 joi_flavor_gov.4.a: "Он — спаситель консерватизма..."
 joi_flavor_gov.4.b: "Я всё ещё верю, что у него была миссия..."
 joi_flavor_gov.4.c: "Мне казалось, у него было предназначение..."
 #
 joi_flavor_gov.5.t: "Воплощение «Явного предначертания»"
 joi_flavor_gov.5.d: "Президентский срок #yellow Джеймса Нокса Полка#! подошел к концу. Будучи противником протекционизма, он добивался процветания торговли за счет снижения пошлин и выступал за создание независимого казначейства, чтобы оградить государственные средства от влияния частных банков. На международной арене его политика экспансии на запад до Тихого океана и присоединения мексиканских территорий дала мощный толчок доктрине «Явного предначертания». Теперь граждане твердо верят: [ROOT.GetCountry.GetName] — это держава, ведомая самим Богом. Нам суждено не только властвовать над землями от Атлантики до Тихого океана, но и нести цивилизаторскую миссию, распространяя республиканские идеалы по всему Североамериканскому континенту."
 joi_flavor_gov.5.f: "«Я чувствую, что наконец-то полностью освободился от бремени государственных дел. Уверен, что на покое я буду гораздо счастливее, чем за те четыре года, что я занимал высший пост, доверенный мне гражданами страны».\n\nИзнурительная работа подорвала здоровье Полка: он полностью поседел и страдал от хронических недугов. Когда он покинул Белый дом и отправился в родной Теннесси, повсюду его встречали восторженные толпы, что лишь сильнее истощило его и без того ослабший организм. Он словно истинный герой: исполнил свой долг и незаметно ушел в тень, но народ никогда не забудет его заслуг."
 joi_flavor_gov.5.a: "Джеймс Нокс Полк, мы не забудем ваших трудов..."
 joi_flavor_gov.5.b: "«Молодой гикори», вам пора хорошенько отдохнуть..."
 joi_flavor_gov.5.c: "Просто старик, отживший своё..."