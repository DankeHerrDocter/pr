l_russian:
 government_leader_nicholas_i: "Православие, Самодержавие, Народность"
 government_leader_nicholas_i_reason: "После #b Наполеоновских войн#! семена #R неверности#! #b глубоко укоренились#! среди #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! — в самой основе власти #yellow династии#! [SCOPE.sCharacter('nicholas_i_scope').GetLastName]. Его Величество [SCOPE.sCharacter('nicholas_i_scope').GetFullName], верховный защитник реакции и священного порядка в Европе, взошёл на престол в разгар восстания декабристов. Это заставило его вечно подозревать окружающих в заговорах против законной власти.\n\nЧтобы #B искоренить крамолу#! и сокрушить общеевропейский заговор, грозящий уничтожить монархию, религию и мораль, Его Величество планирует создать могущественную #yellow политическую полицию#!, ввести #yellow цензуру#! и реформировать #yellow систему образования#!. Её новой целью станет #B искоренение западных идей и воспитание #V благочестивых#!, #V безусловно преданных#! престолу и #V дисциплинированных#! исполнителей монаршей воли#!. Конечная цель — объединение империи под властью абсолютного #O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],government_leader_nicholas_i_modifier_effects_tt автократа#!#!, опирающегося на авторитет [GetReligion('orthodox').GetCustom('RU_RL_RP')] и закон «[GetLawType('law_monarchy').GetName]».\n\n#yellow Реакционная повестка#! [SCOPE.sCharacter('nicholas_i_scope').GetFirstName]:\nВыполнение пунктов повестки царя [SCOPE.sCharacter('nicholas_i_scope').GetFirstName] усилит эффект от этой [Concept('concept_journal_entry', 'записи в дневнике')]. Достижения будут учтены при её #B завершении#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_1_checkbox')] Приняты [Concept('concept_law', 'законы')] «[GetLawType('law_autocracy').GetName]» и «[GetLawType('law_state_religion').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_2_checkbox')] Принят [Concept('concept_law', 'закон')] «[GetLawType('law_censorship').GetName]» или «[GetLawType('law_outlawed_dissent').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_3_checkbox')] Принят [Concept('concept_law', 'закон')] «[GetLawType('law_secret_police').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_4_checkbox')] [concept_literacy] #V ниже 15%#!, а положительный баланс [Concept('concept_bureaucracy', 'бюрократии')] составляет не менее #V 1000#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_5_checkbox')] [concept_activism] всех #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt либеральных#! и #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt социалистических#! [Concept('concept_political_movement', 'политических движений')] #B ниже 10%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_6_checkbox')] [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] находятся [concept_in_government|l] и являются [Concept('concept_powerful', 'могущественными')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_7_checkbox')] В континентальной Европе нет ни одной #L #B республики#!#! в статусе [Concept('concept_major_power', 'крупной державы')] или выше"
 government_leader_nicholas_i_possible_tt: "Это #yellow Николай Романов#!"
 government_leader_nicholas_i_modifier_effects_tt: "[GetStaticModifier('government_leader_nicholas_i_je_modifier').GetName]\n[GetStaticModifier('government_leader_nicholas_i_je_modifier').GetDesc]"
 government_leader_nicholas_i_complete_tt: "[SCOPE.sCharacter('nicholas_i_scope').GetFullName] #O скончался#!, #O отрёкся от престола#! или отправлен в [Concept('concept_exile', 'изгнание')]"
 government_leader_nicholas_i_on_complete_tt: "#V Если#! мы выполним всю #yellow повестку#!, то получим [Concept('concept_law', 'закон')] «[GetLawType('law_official_nationalism').GetName]».\n#V Если#! при завершении мы не выполним первые 3 пункта #yellow повестки#!, реакционные силы в нашей стране понесут удар."
 joi_flavor_gov_1_a_tt: "#B ...но может родиться и образцовое национальное просвещение.#!"
 joi_flavor_gov_1_b_tt: "#B ...служащая лишь прикрытием для алчности и произвола чиновников всех мастей.#!"
 joi_flavor_gov_1_c_tt: "#B ...где отец обладает непререкаемым авторитетом над детьми, даруя им взамен мир и благополучие.#!"
 #
 government_leader_william_gladstone: "Гладстоновский либерализм"
 government_leader_william_gladstone_reason: "В эпоху расцвета #B Pax Britannica#! убеждённый сторонник #blue #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt либерализма#!#! [SCOPE.sCharacter('gladstone_scope').GetFullName] бессменно занимает пост премьер-министра [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] с момента как [SCOPE.sParty('liberal_party').GetName] приходит к власти. Он управляет британским правительством, руководствуясь почти религиозной верой в #B либеральные политические идеалы#!.\n\nЕго программа направлена на укрепление #B индивидуализма, свободы и равных прав#!. Он стремится упрочить процветание [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] с помощью законов «[GetLawType('law_laissez_faire').GetName]» и «[GetLawType('law_free_trade').GetName]», а также поддерживать #B «дешёвое государство»#! с минимальным вмешательством в дела #B #V свободного общества#!#! путём снижения [Concept('concept_tariffs', 'пошлин')], сокращения [Concept('concept_government_expenses', 'государственных расходов')] и [Concept('concept_taxes', 'налогов')] при сохранении сбалансированного бюджета.\n\n#B #yellow Программа#! [SCOPE.sCharacter('gladstone_scope').GetFullName]:#!\nВыполнение пунктов программы премьер-министра [SCOPE.sCharacter('gladstone_scope').GetLastName] усилит эффект от этой [Concept('concept_journal_entry', 'записи в дневнике')]. Достижения будут учтены при её #B завершении#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_1_checkbox')] Принят [concept_law] «[GetLawType('law_laissez_faire').GetName]», и страна обладает самым высоким ВВП в мире\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_2_checkbox')] Принят [concept_law] «[GetLawType('law_free_trade').GetName]», а общий [Concept('concept_traded_quantity', 'объём')] импорта и экспорта между нашим [Concept('concept_market', 'рынком')] и [Concept('concept_world_market', 'мировым рынком')] составляет #B не менее#! #V 500 тыс.#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_3_checkbox')] #O Уровень налогообложения#! не выше #V Низкого#!, а количество взимаемых [Concept('concept_consumption_tax', 'налогов на потребление')] не превышает #V 5#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_4_checkbox')] Общий доход от [Concept('concept_reinvestment', 'реинвестиций')], получаемый [Concept('concept_investment_pool', 'инвестиционным пулом')], #B не ниже#! #V 3 млн.#!, и у страны #tooltippable_name #tooltip:[GetPlayer.GetTooltipTag],HEALTHY_ECONOMY_TOOLTIP Здоровая экономика#!#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_5_checkbox')] Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «$elementary_education_1870_act$»#!, а [concept_literacy] #B не ниже#! #V 70%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_6_checkbox')] Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «$british_empire_ireland$»#!, [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] находится у власти, а [concept_legitimacy] не ниже 80\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_7_checkbox')] В Европе в состоянии войны находится менее 2 [Concept('concept_great_power', 'великих держав')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_8_checkbox')] Принят [concept_law] «[GetLawType('law_census_voting').GetName]» или «[GetLawType('law_universal_suffrage').GetName]»"
 government_leader_william_gladstone_possible_tt: "Это #yellow Уильям Гладстон#!"
