 government_leader_benjamin_disraeli: "Гуманный консерватизм"
 government_leader_benjamin_disraeli_reason: "Индустриализация меняет не только нашу страну; [SCOPE.sParty('conservative_party').GetName]  так же подвержена #B переменам#!. Со времён отмены #O Хлебных законов#! и принятия #O Акта о реформе#! некогда славная [SCOPE.sParty('conservative_party').GetName] утратила власть из-за ослабления своей главной опоры — #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!, а также из-за наплыва миллионов избирателей из [Concept('concept_lower_strata', 'низших слоёв')].\n\nНынешний лидер, #yellow сэр#! [SCOPE.sCharacter('disraeli_scope').GetFullName], считает, что если [SCOPE.sParty('conservative_party').GetName] хочет выигрывать [Concept('concept_election', 'выборы')] среди этого нового электората, она должна #B проводить социальные реформы#!. Он надеется посредством ряда мер #B улучшить жизнь людей#!, обеспечить социальную поддержку для #B защиты рабочего класса#! и побудить [Concept('concept_upper_strata', 'высшие слои')] делиться своими богатствами и благами с низами в рамках патерналистского [Concept('concept_government', 'правительства')]. Конечная цель — построение #V милосердного и гуманного органического общества#! при сохранении #B консервативной иерархии#!.\n\n#B #yellow Программа#! [SCOPE.sCharacter('disraeli_scope').GetFullName]:#!\nВыполнение пунктов программы премьер-министра [SCOPE.sCharacter('disraeli_scope').GetLastName] усилит эффект от этой [Concept('concept_journal_entry', 'записи в дневнике')]. Достижения будут учтены при её #B завершении#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_1_checkbox')] Принят [concept_law] «[GetLawType('law_monarchy').GetName]» и есть право голоса, а [concept_activism] #B радикальных движений#!, #B рабочего движения#! и всех #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt социалистических#! [Concept('concept_political_movement', 'политических движений')] #B ниже 25%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_2_checkbox')] Принят [concept_law] «[GetLawType('law_public_health_insurance').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_3_checkbox')] Принят [concept_law] «[GetLawType('law_regulatory_bodies').GetName]» или «[GetLawType('law_worker_protections').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_4_checkbox')] [concept_sol] не ниже #V 20#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_5_checkbox')] Мы контролируем #yellow Компанию Суэцкого канала#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_6_checkbox')] Страна является [Concept('concept_great_power', 'великой державой')] №1 в мире, а [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] обладает чертой #yellow #tooltippable;tooltip:[GetPlayer.GetTooltipTag],emperor_ofindia_list_tt Император Индии#!#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_7_checkbox')] Россия или её субъекты контролируют #B не более#! #V 1#! провинции на Балканах\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_8_checkbox')] Принят [concept_law] «[GetLawType('law_census_voting').GetName]» или «[GetLawType('law_universal_suffrage').GetName]», и завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «$great_1867_parliament_reform$»#!\n"
 government_leader_benjamin_disraeli_possible_tt: "Это #yellow Бенджамин Дизраэли#!"
 government_leader_benjamin_disraeli_complete_tt: "[SCOPE.sCharacter('disraeli_scope').GetFullName] #O скончался#!, #O ушёл в отставку#! или отправлен в [Concept('concept_exile', 'изгнание')]"
 government_leader_benjamin_disraeli_on_complete_tt: "#V Если#! мы выполним не менее 5 пунктов #yellow программы Дизраэли#!, [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName], [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] и [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] смогут и в будущем получать лидеров с идеологией «[GetIdeology('ideology_one_nation_conservatism_leader').GetName]»."
 ideology_british_tory_conservatism_reformed_tt: "Изначальная консервативная идеология групп [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] будет заменена на #V реформированную#! идеологию «[GetIdeology('ideology_british_tory_conservatism_reformed').GetName]»!"
 finish_great_1867_parliament_reform_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «$great_1867_parliament_reform$»#!"
 emperor_ofindia_list_tt: "Черта #B Император Индии#! будет дарована текущему монарху после того, как ваш #B индийский#! субъект завершит [Concept('concept_journal_entry', 'запись в дневнике')] #V «Объединение субконтинента»#!.\n[Concept('concept_journal_entry', 'Запись')] #V «Объединение субконтинента»#! станет доступна вашему #B индийскому#! субъекту после изучения технологии #B «Генеральный штаб»#!; её цель — захват всех территорий [Concept('concept_indian_subcontinent', 'Индийского субконтинента')]."
 joi_flavor_gov_4_a_tt: "#B ...обладающий безупречными джентльменскими манерами и стальной волей.#!"
 joi_flavor_gov_4_b_tt: "#B ...он не исчезнет, пока не исполнит свою миссию. #!"
 joi_flavor_gov_4_c_tt: "#B ...пусть даже это лишь вселяет в людей надежду. #!"
#波尔克
 government_leader_usa_polk_character_possible_tt: "Это #yellow Джеймс Нокс Полк#!"
 government_leader_james_polk: "Обещания «Явного предначертания»"
 government_leader_james_polk_reason: "В своей предвыборной речи этот выдающийся кандидат пообещал воплотить в жизнь #B «Явное предначертание» Америки#!. Видный деятель #yellow Демократической партии#!, [SCOPE.sCharacter('polk_scope').GetFullName] был избран в Палату представителей уже в 29 лет. Со времен правления #yellow Эндрю Джексона#! он успел побывать губернатором Теннесси и спикером Палаты представителей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Партийцы видят в нем самого верного преемника президента Джексона.\n\nЕго политическая программа строится на #B экспансионистских идеях «Явного предначертания»#! и #B духе джексоновской демократии#!. Он намерен обеспечить процветание торговли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] с помощью закона «[GetLawType('law_free_trade').GetName]», а также снизить [Concept('concept_tariffs', 'пошлины')] и передать контроль над [Concept('concept_government_expenses', 'государственными расходами')] системе независимого казначейства. Сохраняя финансовую стабильность, он планирует проводить активную внешнюю экспансию, чтобы распространить демократические идеалы по всему #O Североамериканскому континенту#!.\n\n#B #yellow Предвыборные обещания#! [SCOPE.sCharacter('polk_scope').GetFullName]:#!\nВыполнение пунктов президентской программы, которую предложил [SCOPE.sCharacter('polk_scope').GetLastName], усилит эффект от этой [Concept('concept_journal_entry', 'записи в дневнике')]. Достижения будут учтены при её #B завершении#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_1_checkbox')] Принят [Concept('concept_law', 'закон')] «[GetLawType('law_free_trade').GetName]», а общий [Concept('concept_traded_quantity', 'объем')] импорта и экспорта между нашим [Concept('concept_market', 'рынком')] и [Concept('concept_world_market', 'мировым рынком')] составляет #B не менее#! #V 50 тыс.#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_2_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] или её [Concept('concept_subject', 'субъекты')] контролируют #yellow Орегон#!, #yellow Айдахо#! и #yellow Вашингтон#! (Орегонский вопрос решен)\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_3_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] или её [Concept('concept_subject', 'субъекты')] полностью контролируют #yellow Калифорнию, Аризону, Юту, Нью-Мексико, Колорадо#! и #yellow Неваду#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_4_checkbox')] Восстановлено независимое казначейство: в каждой нашей [Concept('concept_incorporated_state', 'включенной области')] построены #tooltippable_name #tooltip:[GetBuildingType('building_government_administration').GetTooltipTag],DATA_BUILDING_NAME_TOOLTIP,BuildingTooltip[GetBuildingType('building_government_administration').GetCustom('RU_BL_VP')|l]#!#!, а баланс казны положителен\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_polk_5_checkbox')] [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] полностью контролирует #yellow Техас#!, и он является [Concept('concept_incorporated_state', 'включенной областью')]"
 government_leader_james_polk_complete_tt: "[SCOPE.sCharacter('polk_scope').GetFullName] #O мертв#!, #O отправлен в отставку#! или [Concept('concept_exile', 'изгнан')]"
 government_leader_james_polk_on_complete_tt: "#V Если#! мы выполним как минимум 4 #yellow обещания «Явного предначертания»#!, в будущем у #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! и #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip[GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')|l]#!#! могут вновь появиться лидеры, поддерживающие идеологию «[GetIdeology('ideology_jacksonian_democrat').GetName]»."