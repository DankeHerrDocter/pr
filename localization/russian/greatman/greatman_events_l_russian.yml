l_russian:
  #Великие личности
 joi_great_man.1.t: "Лорд Кельвин"
 joi_great_man.1.d: "Учёный, профессор натурфилософии в Университете Глазго, #variable Уильям Томсон#!, недавно прославился благодаря своим выдающимся достижениям в термодинамике."
 joi_great_man.1.f: "«Я считаю, что тенденция в материальном мире заключается в том, что движение становится всё более рассеянным, в то время как общая тенденция к концентрации движения постепенно обращается вспять.\n\nЯ считаю, что никакая физическая активность не может восстановить тепло, излучаемое солнцем, и этот источник энергии не является неисчерпаемым; движение Земли и других планет теряет свою энергию, которая превращается в тепло.\n\nХотя Земля может восстановить часть своей энергии за счёт тепла, получаемого от Солнца, или другими способами, эта потеря не может быть точно компенсирована, и я считаю, что, скорее всего, компенсация будет недостаточной»."
 joi_great_man.1.a: "Нам нужен такой человек на научной должности в правительстве!"
 joi_great_man.1.b: "Инвестировать в его исследования в области термодинамики."
 joi_great_man.2.t: "Майкл Фарадей"
 joi_great_man.2.d: "Учёный скромного происхождения, #variable Майкл Фарадей#!, благодаря своим выдающимся достижениям в области электричества, постепенно становится известен обществу."
 joi_great_man.2.f: "«Мне наконец удалось осветить магнитные кривые, или силовые линии, и намагнитить луч света... Разделение электричества на различные виды ложно. Существует лишь одно электричество, и изменения его количества и интенсивности порождают различные группы явлений»."
 joi_great_man.2.a: "Он заслуживает повышения за это."
 joi_great_man.2.b: "Инвестировать в его исследования в области электричества!"
 joi_great_man.3.t: "Дарвин и теория эволюции"
 joi_great_man.3.d: "Биологический труд под названием #variable «Происхождение видов»#!, написанный #variable Чарльзом Дарвином#!, впервые выдвинул теорию под названием «эволюция», которая заменила библейское повествование и потрясла общество [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_great_man.3.f: "«Поскольку рождается гораздо больше особей каждого вида, чем может выжить, и, следовательно, часто повторяется борьба за существование, из этого следует, что любое существо, если оно изменяется хотя бы незначительно в любом выгодном для себя отношении при сложных и иногда меняющихся условиях жизни, будет иметь больше шансов на выживание и, таким образом, будет подвергнуто естественному отбору. В силу мощного принципа наследственности любой отобранный вариант будет стремиться к размножению своей новой и изменённой формы.\n\nВ этом взгляде на жизнь есть величие, с её несколькими силами, первоначально вдунутыми в несколько форм или в одну; и в то время как эта планета продолжает вращаться согласно установленному закону тяготения, из такого простого начала развились и продолжают развиваться бесконечные формы, самые прекрасные и самые удивительные»."
 joi_great_man.3.a: "Полная чушь!"
 joi_great_man.3.b: "Великое открытие!"
 joi_great_man.4.t: "Великая экспедиция Дэвида Ливингстона"
 joi_great_man.4.d: "Исследователь по имени #variable Дэвид Ливингстон#! пересёк дикие ущелья Восточной Африки и успешно достиг берега огромного озера, которое он назвал #variable озером Виктория#!."
 joi_great_man.4.f: "«Мы прошли мимо рабыни, застреленной или пронзённой копьём, которая лежала на дороге. Группа мужчин стояла примерно в ста ярдах от неё с одной стороны, а другая группа женщин — с другой, наблюдая за этим. Они сказали, что утром проходил араб и сделал это в гневе из-за потери денег, которые он за неё заплатил, потому что она больше не могла идти.\n\nМы также встретили мужчину, умершего от голода, он был очень худ. Один из наших людей, бродя по окрестностям, нашёл множество рабов в колодках, брошенных их хозяевами из-за нехватки еды; они были слишком слабы, чтобы говорить, и не могли сказать, откуда они; некоторые были ещё совсем молоды»."
 joi_great_man.4.a: "Выдающиеся результаты экспедиции!"
 joi_great_man.5.t: "Люк Ховард"
 joi_great_man.5.d: "Учёный по имени #variable Люк Ховард#! опубликовал труд под названием #variable «Климат Лондона»#!, что принесло известность и его предыдущей работе #variable «Об изменениях облаков»#! и принесло ему звание «отца метеорологии»."
 joi_great_man.5.f: "«Облака подвержены определённым уникальным изменениям, которые вызваны общими причинами, влияющими на все изменения в атмосфере; они часто являются хорошими видимыми индикаторами действия этих причин, подобно лицу человека, отражающему его душевное или физическое состояние»."
 joi_great_man.5.a: "Туман в Лондоне становится всё гуще, возможно, его исследования нам помогут."
 joi_great_man.6.t: "Александр Флеминг и пенициллин"
 joi_great_man.6.d: "Великий биолог по имени #variable Александр Флеминг#! открыл совершенно новый препарат под названием #variable пенициллин#!. Считается, что он может излечить почти все болезни, которые мучили человечество на протяжении тысячелетий!"
 joi_great_man.6.f: "«Иногда находишь то, чего не ищешь. Когда я проснулся на рассвете того дня, я, конечно, не думал о том, чтобы произвести революцию во всей медицине, открыв первый в мире антибиотик или убийцу бактерий. Но, полагаю, именно это я и сделал».\n\n«В будущем любой сможет купить пенициллин в магазине. Но опасность в том, что невежественный человек легко может принять недостаточную дозу, и микробы, подвергшись воздействию несмертельной дозы препарата, выработают к нему устойчивость»."
 joi_great_man.6.a: "Он, без сомнения, будет признан одним из величайших людей в истории человечества!"
 joi_great_man.7.t: "Джоуль и механический эквивалент тепла"
 joi_great_man.7.d: "Молодой учёный по имени #variable Джеймс Прескотт Джоуль#! выступил на заседании термодинамического общества с докладом под названием #variable «О механическом эквиваленте тепла»#!, который привлёк широкое внимание научного сообщества."
 joi_great_man.7.f: "«Я считаю, что эта теория... противоречит общепринятым философским принципам, поскольку из неё следует, что при неправильной конфигурации устройства живая сила может быть уничтожена. Так, господин Клапейрон делает вывод: „Температура огня на 1000°C–2000°C выше, чем у котла, и при передаче тепла от печи к котлу происходит огромная потеря живой силы“».\n\n«Я верю, что сила разрушения принадлежит только Творцу, и я утверждаю: любая теория, которая при реализации требует уничтожения силы, непременно ошибочна»."
 joi_great_man.7.a: "Пусть он продолжает исследования в области термодинамики вместе с лордом Кельвином."
 joi_great_man.7.b: "Его исследования должны быть применены в динамике."
 joi_great_man.8.t: "Джейн Эйр"
 joi_great_man.8.d: "Роман под названием #variable «Джейн Эйр»#! стал чрезвычайно популярен в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Читатели восхищаются выдающимся талантом его автора, госпожи #variable Шарлотты Бронте#!, и превозносят романтизм книги."
 joi_great_man.8.f: "«Вы думаете, я робот? Машина без чувств?... Вы думаете, потому что я бедна, скромна, невзрачна и мала, у меня нет души и нет сердца? Вы ошибаетесь — у меня столько же души, сколько и у вас, и столько же сердца!... Я говорю с вами не через обычаи, условности, и даже не через бренную плоть — это мой дух обращается к вашему духу; как будто мы оба прошли через могилу и стоим у ног Бога, равные — как мы и есть!»"
 joi_great_man.8.a: "Книга хорошая, но немного вульгарная."
 joi_great_man.8.b: "Читатель, я вышла за него замуж..."
 joi_great_man.9.t: "Мэри Энн Эванс"
 joi_great_man.9.d: "Несколько произведений, таких как #variable «Мидлмарч»#!, опубликованных #variable Мэри Энн Эванс#! под псевдонимом #variable «Джордж Элиот»#!, заставили общество задуматься о реализме и сельской жизни."
 joi_great_man.9.f: "«Её цельная натура, подобно той великой реке, которую перегородил Кир, растеклась по множеству каналов и с тех пор не пользовалась громкой славой в мире. Но её влияние на окружающих, оставаясь непрерывным, нельзя считать незначительным, ибо добро в мире отчасти зависит и от незаметных поступков; и то, что с вами и со мной дела обстоят не так плохо, как могли бы, мы наполовину обязаны тем, кто жил преданно незаметной жизнью и покоится в безымянных могилах...»"
 joi_great_man.9.a: "Самые значимые жизни — это жизни обычные и достойные."
 joi_great_man.9.b: "Элиотовская женщина с её мелкой моралью."
 joi_great_man.10.t: "Томас Карлейль"
 joi_great_man.10.d: "Серия памфлетов под названием #variable «Памфлеты последнего дня»#! широко распространилась в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], вызвав волну насмешек и критики в адрес глупости правительства."
 joi_great_man.10.f: "«Что такое демократия?\n\nЭтот огромный, неизбежный продукт судьбы, который теперь стал частью нашей Европы, — вот вопрос, который мы задаём. Откуда пришла эта всеобщая, огромная, тёмная демократия? Куда она движется? В чём её смысл? У неё должен быть смысл, иначе её бы не существовало.\n\nЕсли мы сможем найти её правильный смысл, мы, возможно, сможем мудро подчиниться ей или мудро сопротивляться и контролировать её, всё ещё надеясь жить в ней; если мы не найдём правильного смысла, если мы обнаружим только ложный смысл или отсутствие смысла, тогда жизнь станет невозможной!»"
 joi_great_man.10.a: "Просто с жиру бесятся!"
 joi_great_man.10.b: "Пусть критикуют, критика способствует прогрессу."
 joi_great_man.11.t: "Ральф Уолдо Эмерсон"
 joi_great_man.11.d: "Серия трансценденталистских литературных произведений, написанных #variable Ральфом Уолдо Эмерсоном#!, породила в литературных кругах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] моду на стремление к либерализму и красоте природы."
 joi_great_man.11.f: "«Мы живём в последовательности, в разделении, в частях и частицах.\n\nМежду тем, внутри человека находится душа целого; мудрое молчание; вселенская красота, с которой каждая часть и частица одинаково связаны; вечное Единое.\n\nИ эта глубокая сила, в которой мы существуем и к блаженству которой мы можем получить доступ, не только самодостаточна и совершенна в каждый час, но и акт видения и видимое, созерцатель и зрелище, субъект и объект — едины. Мы видим мир по частям: как солнце, луна, животное, дерево; но целое, чьими сияющими частями они являются, есть душа!»"
 joi_great_man.11.a: "Внутренний покой и малое — вот истинный Христос внутри нас."
 joi_great_man.11.b: "Господа, в путь, в путь!"
 joi_great_man.12.t: "Уолден, или Жизнь в лесу"
 joi_great_man.12.d: "Великое произведение под названием #variable «Уолден, или Жизнь в лесу»#! стало популярным в литературных кругах. В нём автор #variable Генри Дэвид Торо#! выражает своё идеальное стремление к личной свободе."
 joi_great_man.12.f: "«Я ушёл в лес, потому что хотел жить осмысленно, иметь дело только с самыми важными фактами жизни и посмотреть, смогу ли я научиться тому, чему она может научить, чтобы, умирая, не обнаружить, что я и не жил.\n\nЯ не хотел жить жизнью, которая не была жизнью, жизнь так драгоценна; я также не хотел практиковать смирение, если только это не было абсолютно необходимо.\n\nЯ хотел жить глубоко и высосать всю костную массу жизни, жить так стойко и по-спартански, чтобы изгнать всё, что не было жизнью, срезать широкий прокос и обрить его дочиста, загнать жизнь в угол и свести её к простейшим условиям, и, если она окажется подлой, тогда получить всю её подлинную подлость и объявить о её подлости миру; или если она была возвышенной, то познать её на собственном опыте и быть в состоянии дать о ней правдивый отчёт в своём следующем походе»."
 joi_great_man.12.a: "Странный человек и странная книга."
 joi_great_man.13.t: "Гражданское неповиновение"
 joi_great_man.13.d: "Эссе под названием #variable «Гражданское неповиновение»#!, в котором утверждается, что правительству не следует позволять попирать или ослаблять совесть людей, и что они обязаны не допускать молчаливого согласия, которое позволяет правительству делать их орудием несправедливости, либералы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] назвали эпохальным великим произведением."
 joi_great_man.13.f: "«При правительстве, которое несправедливо сажает в тюрьму любого, истинное место для справедливого человека — это тоже тюрьма... Меньшинство бессильно, пока оно подчиняется большинству; тогда это даже не меньшинство; но оно непреодолимо, когда оно мешает всем своим весом.\n\nНо даже если предположить, что прольётся кровь. Разве не проливается кровь, когда ранена совесть? Через эту рану вытекает истинная мужественность и бессмертие человека, и он истекает кровью до вечной смерти. Я вижу, как эта кровь течёт сейчас»."
 joi_great_man.13.a: "Я уверен, что несотрудничество со злом — такой же моральный долг, как и сотрудничество с добром."
 joi_great_man.14.t: "Принципы экономической науки"
 joi_great_man.14.d: "Макроэкономический труд #variable «Принципы экономической науки»#!, написанный #variable Альфредом Маршаллом#!, получил широкое признание в экономических кругах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_great_man.14.f: "«Эффективность почти каждого вида труда по сравнению с его стоимостью постоянно взвешивается в одном или нескольких отраслях производства с некоторыми другими видами труда, которые, в свою очередь, взвешиваются с другими. Эта конкуренция в основном «вертикальная»: это борьба за поле занятости между группами труда, принадлежащими к разным классам, но работающими в одной отрасли производства и заключёнными в одни и те же вертикальные стены.\n\nХотя жидкость не будет течь с одного конца резервуара на другой, если несколько резервуаров соединены трубами, жидкость во всех них будет стремиться к одному уровню, хотя некоторые резервуары не имеют прямого соединения с другими. И точно так же принцип замещения постоянно распределяет доходы между отраслями и даже между классами, которые не находятся в прямом контакте и на первый взгляд кажутся неспособными конкурировать друг с другом, по косвенным каналам»."
 joi_great_man.14.a: "Правительству нужен такой человек для управления экономикой!"
 joi_great_man.14.b: "Финансировать его дальнейшие исследования в этой области."
 joi_great_man.15.t: "О свободе"
 joi_great_man.15.d: "Либеральное эссе #variable «О свободе»#!, написанное #variable Джоном Стюартом Миллем#!, было опубликовано сегодня в столице [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. В нём он рассматривает стандартные отношения между властью и свободой и выдвигает идею «тирании большинства»."
 joi_great_man.15.f: "«Во-первых, если какое-либо мнение принуждается к молчанию, это мнение, насколько мы можем быть уверены, может быть истинным... Отрицать это — значит предполагать нашу собственную непогрешимость.\n\nВо-вторых, хотя замалчиваемое мнение и является ошибкой, оно может содержать и часто содержит часть истины; и поскольку общее или преобладающее мнение по любому вопросу редко или никогда не является всей истиной, только через столкновение противоположных мнений остальная часть истины имеет шанс быть восполненной.\n\nВ-третьих, даже если общепринятое мнение не только истинно, но и является всей истиной; если оно не подвергается и действительно не подвергается энергичному и серьёзному оспариванию, большинство тех, кто его принимает, будут придерживаться его как предрассудка, с малым пониманием или ощущением его разумных оснований.\n\nИ не только это, но и значение самой доктрины будет в опасности быть утраченным или ослабленным и лишённым своего жизненно важного влияния на характер и поведение: #bold догма станет простым формальным заявлением, неэффективным для добра, но загромождающим почву и препятствующим росту любого подлинного и сердечного убеждения из разума или личного опыта.#!»"
 joi_great_man.15.a: "Выдающийся классический труд либеральной мысли!"
 joi_great_man.16.t: "Ницше и воля к власти"
 joi_great_man.16.d: "Тезис «Бог умер», выдвинутый заведующим кафедрой философии Базельского университета #variable Фридрихом Ницше#!, вызвал в обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] широкий интерес к его философским идеям."
 joi_great_man.16.f: "«Человек — это нечто, что должно быть преодолено. Что вы сделали, чтобы преодолеть его? Все существа до сих пор создавали нечто превыше себя: а вы хотите быть отливом этой великой волны и скорее вернуться к состоянию зверя, чем преодолеть человека? Что такое обезьяна для человека? Посмешище или мучительный стыд.\n\nИ то же самое человек будет для сверхчеловека: посмешище или мучительный стыд. Вы прошли путь от червя до человека, и многое в вас всё ещё червь. Когда-то вы были обезьянами, и даже сейчас человек больше обезьяна, чем любая обезьяна. Даже самый мудрый из вас — лишь разлад и гибрид растения и призрака. Но разве я призываю вас стать призраками или растениями?\n\nСмотрите, я учу вас сверхчеловеку! Сверхчеловек — это смысл земли. Пусть ваша воля скажет: сверхчеловек будет смыслом земли... Человек — это канат, натянутый между животным и сверхчеловеком — канат над пропастью... Величие человека в том, что он — мост, а не цель; в человеке можно любить то, что он — переход и гибель»."
 joi_great_man.16.a: "Что за бред?"
 joi_great_man.16.b: "Духовная эволюция самосознания."
 joi_great_man.17.t: "Карл Фридрих Гаусс и «Арифметические исследования»"
 joi_great_man.17.d: "Шедевр #variable «Арифметические исследования»#!, опубликованный учёным по имени #variable Карл Фридрих Гаусс#! в 1801 году, сегодня получил широкое признание в математических кругах, а сам Гаусс был провозглашён одним из величайших математиков своей эпохи."
 joi_great_man.17.f: "«Вопросы, которые будут рассмотрены в этом томе, относятся к той части математики, которая занимается целыми числами... Перед лицом многих трудностей, для краткости при обращении к этой книге, мы опустили процесс вывода; однако во многих сложных вопросах, где синтетическое изложение является суммой, а аналитический результат должен быть опущен, можно кратко изложить процесс, а результат может определить рамки доказательства.\n\nВеличайшее удовольствие доставляет не знание, а акт учения; не обладание, а акт достижения. Когда я проясняю и исчерпываю тему, я отворачиваюсь от неё, чтобы снова погрузиться во тьму»."
 joi_great_man.17.a: "Легенда математического мира!"
 joi_great_man.17.b: "Это было в его юности; теперь ему следует продолжить свои исследования в области телеграфии."
 joi_great_man.18.t: "Георг Ом"
 joi_great_man.18.d: "Учитель по имени #variable Георг Ом#! предложил и подтвердил совершенно новый закон для электричества, который он назвал #variable «законом Ома»#!."
 joi_great_man.18.f: "«Ток в проводнике между двумя точками прямо пропорционален напряжению между этими двумя точками; вводится константа пропорциональности, сопротивление... где I — ток через проводник, V — напряжение, измеренное на проводнике, а R — сопротивление проводника. Более конкретно, закон Ома гласит, что R в этом соотношении постоянно и не зависит от тока... Взаимозаменяемость уравнения можно представить в виде треугольника»."
 joi_great_man.18.a: "Великое достижение."
 joi_great_man.18.b: "Врата в эру электричества открываются перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]!"
 joi_great_man.19.t: "Анализ Йозефа Кёнига"
 joi_great_man.19.d: "Профессор по имени #variable Йозеф Кёниг#! разработал новый метод химического анализа пищевых продуктов, который оказался чрезвычайно полезным для пищевой промышленности."
 joi_great_man.19.f: "«Недавно созданная сельскохозяйственная исследовательская станция в Мюнстере пригласила его на работу, где он продолжил свои исследования; Гёттингенский университет имени Георга-Августа гордится его достижениями»."
 joi_great_man.19.a: "Очень перспективно!"
 joi_great_man.19.b: "Приобрести его патент."
 joi_great_man.20.t: "Цикл Сименса"
 joi_great_man.20.d: "Инженер-электрик по имени #variable Карл Вильгельм Сименс#! предложил цикл для двигателя внутреннего сгорания и назвал его «цикл Сименса»."
 joi_great_man.20.f: "«Нагрев — путём сжатия газа — добавляет в газ внешнюю энергию, обеспечивая ему энергию, необходимую для цикла... Охлаждение — путём погружения газа в более холодную среду, теряя часть тепла... Охлаждение через теплообменник с использованием возвратного газа из следующей, последней стадии... Дальнейшее охлаждение путём расширения газа и совершения работы, отводя тепло и энергию.\n\nВ каждом цикле чистое охлаждение превышает тепло, добавленное в начале цикла, и по мере того, как газ проходит больше циклов, он становится холоднее»."
 joi_great_man.20.a: "Пусть он возглавит дальнейшие исследования в этой области."
 joi_great_man.20.b: "Двигатель внутреннего сгорания — будущее [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 joi_great_man.21.t: "Альфред Крупп"
 joi_great_man.21.d: "Владелец завода по имени #variable Альфред Крупп#! изобрёл совершенно новую технологию для казнозарядных орудий и уже представил её на рассмотрение военному министерству [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_great_man.21.f: "«Берётся кованый удлинённый кусок стали, раскалывается посередине, разделяется в виде кольца, растягивается и, наконец, прокатывается... Продажи вооружений быстро росли; наши заводы поставляли пушки всем основным европейским странам. Мы разработали клиновой затвор, усовершенствовали казнозарядные орудия, что позволило нашим стальным пушкам иметь вдвое большую дальность по сравнению с бронзовыми, показывать хорошую точность и в конечном итоге обогатить все предприятия Рура, которые извлекли из этого выгоду»."
 joi_great_man.21.a: "Привлечь его для дальнейших разработок."
 joi_great_man.21.b: "Активно закупать результаты его исследований!"
 joi_great_man.22.t: "Аманда Джонс и вакуумное консервирование"
 joi_great_man.22.d: "Писательница по имени #variable Аманда Джонс#! изобрела технологию вакуумного консервирования пищевых продуктов, что значительно увеличило срок их хранения."
 joi_great_man.22.f: "«Поместите запечатанные банки, наполненные фруктами и овощами, в лёгкий сироп, сок или воду, и нагревайте на пару до внутренней температуры 120 градусов по Фаренгейту, чтобы вытеснить воздух из банки, создавая герметичное уплотнение, которое защищает пищу от кислорода, способствующего росту бактерий. Используйте стеклянные банки с вакуумными крышками вместо запаянных жестяных банок, чтобы люди могли наслаждаться свежими фруктами и овощами в более позднее время года»."
 joi_great_man.22.a: "Не откажусь от фруктовых консервов."