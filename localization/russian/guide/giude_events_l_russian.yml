 setting_enable_invest_existing_buildings_only: "Только в существующие сооружения"
 setting_enable_invest_existing_buildings_only_desc: "Средства из [Concept('concept_investment_pool', 'инвестиционного пула')] будут направляться исключительно на расширение уже построенных [Concept('concept_building', 'сооружений')]. Частный капитал не станет финансировать возведение нового [Concept('concept_building', 'сооружения')] в области, если там еще нет аналогичного предприятия (это ограничение не распространяется на инфраструктуру: железные дороги, электростанции и порты)."
 setting_disable_invest_existing_buildings_only: "Без ограничений"
 setting_disable_invest_existing_buildings_only_desc: "[Concept('concept_investment_pool', 'Инвестиционный пул')] функционирует по стандартным правилам."
 rule_flavor_functional_decisions_rules: "Технические решения Victorian Century"
 setting_enable_flavor_functional_decisions: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_flavor_functional_decisions_tooltip_tt #high Включить технические решения#!#!#!"
 setting_enable_flavor_functional_decisions_tooltip_tt: "Включает ряд технических решений, таких как ограничение частных инвестиций. (#O Рекомендуется отключить в сетевой игре#!)."
 setting_enable_flavor_functional_decisions_desc: "Технические решения, такие как запрет частных инвестиций, станут доступны в игре. В #O сетевой игре#! рекомендуется отключить это правило."
 setting_disable_flavor_functional_decisions: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_disable_flavor_functional_decisions_desc #high Отключить технические решения#!#!#!"
 setting_disable_flavor_functional_decisions_desc: "Отключает ряд технических решений, таких как ограничение частных инвестиций."
