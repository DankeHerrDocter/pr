 allow_enable_ottoman_public_debt: "Эмиссия государственного долга"
 allow_enable_ottoman_public_debt_desc: "Финансовые трудности Высокой Порты продолжаются уже некоторое время. Чтобы решить проблему дефицита, министр финансов предлагает попробовать привлечь средства путём выпуска государственных облигаций на международном рынке. Однако, если мы займём слишком много, это бремя может лишь усугубить наш дефицит..."
 allow_enable_ottoman_public_debt_tt: "Мы выпустим государственные облигации на международный рынок, активировав [Concept('concept_journal_entry', 'запись в дневнике')] #V $ottoman_public_debt$#!.\n@information!#lore Эта запись позволяет обнулить весь наш внутренний долг, преобразовав его во внешний, и выплачивать проценты другим странам.#!"
 #UK
 stabilize_british_empire_lobby: "#v Добавлено модификацией Victorian Century#!\nБританская империя переживает свой золотой век: от равнин Северной Америки до чайных плантаций Китая, от кофейных полей Карибского бассейна до рудников Австралии — богатство и слава Британии определяют эту эпоху. Её цивилизация, мораль и сила должны и дальше сиять!"
 gbr_corn_law_lobby: "#v Добавлено модификацией Victorian Century#!\nХлебные законы, некогда бывшие краеугольным камнем британской экономики, стали предметом споров. В Вестминстере всё громче звучат призывы отменить их защитные пошлины. Правительству Его Величества предстоит сделать выбор."
 england_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nКолёса прогресса несутся по землям Англии, стремительно меняя облик всей страны. Мы должны наращивать инвестиции во всё, что способствует развитию промышленности, чтобы огромные заводы наполнились гулом, а высокие трубы извергали клубы здорового дыма."
 scotland_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nШотландия обладает богатыми запасами угля и превосходными портами, и её экономический потенциал, несомненно, огромен. Однако мелководье реки Клайд и пересечённая местность препятствуют развитию. Мы не сдадимся перед силами природы, но с помощью мощи промышленности преобразуем её и превратим Шотландию в величайший мировой центр судостроения и производства!"
 rn_naval_defence_act_lobby: "#v Добавлено модификацией Victorian Century#!\nМогучий флот — ключ к безопасности и свободе морских путей, от которых зависит выживание Британии. Столкнувшись с любым морским вызовом, Британия должна принять его, чтобы обеспечить неоспоримое господство Королевского флота на морях."
 english_afternoon_tea_lobby: "#v Добавлено модификацией Victorian Century#!\nЧайник крепкого ассамского чая с молоком и булочки-сконы со сливками и джемом! Это прекрасное времяпрепровождение в изысканной чайной комнате — поистине самый элегантный джентльменский обычай — должно стать самой популярной британской модой во всём мире!"
 anglo_american_special_relationship_lobby: "#v Добавлено модификацией Victorian Century#!\nВыдающиеся идеи и цели способствуют нашему единству, общие идеалы и кровь — нашей дружбе. Объединённые свободные нации никогда не потерпят поражения, ведь кровь — не водица!"
 chartism_movement_lobby: "#v Добавлено модификацией Victorian Century#!\nРаспространение «Народной хартии» вызвало радикальное движение, охватившее всю страну. Протестующие требуют всеобщего избирательного права для реализации своих политических прав. Это движение уже угрожает авторитету парламента, и правительству следует рассмотреть ответные меры."
 railway_mania_lobby: "#v Добавлено модификацией Victorian Century#!\nС новым оживлением в промышленности и снижением процентных ставок акции железнодорожных компаний взлетают до небес. Люди, разбогатевшие на индустриализации, вкладывают свои сбережения в эту сверхприбыльную феерию фунтов стерлингов. Очевидно, это абсолютно надёжная инвестиция... ведь так?"
 poor_law_act_lobby: "#v Добавлено модификацией Victorian Century#!\nПринятие поправки к Закону о бедных 1834 года, которое активно продвигали мальтузианцы, вызвало массовые общественные протесты. Возможно, она и впрямь положила конец лени и иждивенчеству бездельников, но разве эти похожие на тюрьмы работные дома — действительно подходящее пристанище для граждан Британии?"
 joi_imperial_fortress_lobby: "#v Добавлено модификацией Victorian Century#!\nС развитием мощных океанских боевых кораблей и артиллерии модернизация укреплений и военных объектов в ключевых стратегических узлах становится необходимостью. Эти места можно считать узлами нашей глобальной империи, и они должны быть надёжно защищены."
 #FRA
 paris_politic_lobby: "#v Добавлено модификацией Victorian Century#!\nПариж — центр французской политики, но он всегда славился своим хаосом и непокорностью. Если нынешнее правительство хочет удержаться у власти, его первейшая задача — укротить этих гнусных парижских санкюлотов!"
 paris_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nИндустриализация меняет нашу страну, и старый Париж уже не отвечает требованиям времени. Франции нужен новый, более великолепный и величественный Париж на берегах Сены."
 french_birthrate_lobby: "#v Добавлено модификацией Victorian Century#!\nПосле окончания Наполеоновских войн рождаемость во Франции неуклонно снижается, и эта тенденция угрожает всей нации. Правительство обязано прислушаться к нуждам народа и вернуть общество на верный путь."
 fra_aferican_empire_lobby: "#v Добавлено модификацией Victorian Century#!\nПосле завершения завоевания Алжира врата на Чёрный континент распахнулись перед Францией. Мы станем самой могущественной силой в Африке и создадим здесь новый дом для французской нации."
 fra_conqueror_indochina_lobby: "#v Добавлено модификацией Victorian Century#!\nВоля Божья призывает нас идти в далёкий Индокитай, чтобы спасти наших соотечественников и наказать тамошних варваров за их злодеяния против агнцев Господних. Вперёд, на Индокитай!"
 russian_franco_alliance_lobby: "#v Добавлено модификацией Victorian Century#!\nХотя в прошлом между нашими странами было много неприятных моментов, огромные изменения в Европе требуют от нас забыть былые обиды и вместе противостоять врагу в Центральной Европе."
 entente_cordiale_lobby: "#v Добавлено модификацией Victorian Century#!\nМы по обе стороны пролива враждовали сотни лет, однако меняющаяся геополитическая обстановка вынуждает нас пересмотреть свои позиции на континенте. Возможно, союз с хитрыми лягушатниками по ту сторону Ла-Манша — неплохой выбор?"
 je_the_paris_commune_display_lobby: "#v Добавлено модификацией Victorian Century#!\nКрасные силы поднялись в Париже, и все столичные учреждения были вынуждены переехать в Версаль. Исполнятся ли амбиции коммунистов?"
 second_napoleon_empire_lobby: "#v Добавлено модификацией Victorian Century#!\nЛегенда об императоре Наполеоне стала далёким прошлым, но имя Бонапарта всё ещё вдохновляет французский народ. Новый Бонапарт взошёл на трон, завоёванный его беспримерным предком славой и армией. Начнётся ли с него новая эпическая история?"
 french_provisional_republic_lobby: "#v Добавлено модификацией Victorian Century#!\nИюльская монархия пала, и новое республиканское правительство вновь стоит на Марсовом поле. Сможет ли вернуться та эпоха Великой революции — самая юная, пылкая, гордая, щедрая и искренняя в истории французской нации — и повести Францию к её судьбе?"
 defensive_line_in_alsace_lorraine_lobby: "#v Добавлено модификацией Victorian Century#!\nЭффективность тщательно подготовленных оборонительных траншей уже доказана на практике: горстка солдат на пулеметных точках способна выкосить сотни наступающих на открытой местности врагов. Поэтому возведение гигантской линии обороны с подземными бетонными укреплениями — это самый надежный способ отразить любую сухопутную угрозу и защитить ключевые территории нашей страны."
 offensive_a_outrance_lobby: "#v Добавлено модификацией Victorian Century#!\nБез наступления нет победы. Цена победы - кровь, а война жестока и беспощадна. Она признаёт лишь один способ достичь цели: кровопролитие."
 #PRU
 way_to_germany_lobby: "#v Добавлено модификацией Victorian Century#!\nСотни лет германской нации не хватало сильного центрального правительства. Но это не помешало процветанию нашего отечества: Ганзейский союз, некогда объединявший сотни городов Северной Германии, сыграл решающую роль в нынешнем расцвете. Рост знаний и торговля по морю и суше помогли Германии стать богатым промышленным центром. Сегодня объединение — уже не мечта. Германия будет вершить судьбы человечества."
 rhineland_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nПо итогам Венского конгресса Рейнская область отошла Пруссии, но никто не ожидал, что здесь скрыт огромный потенциал угольных месторождений. С таким преимуществом Рейнская область станет новой, главной опорой нашей промышленности."
 peussia_education_lobby: "#v Добавлено модификацией Victorian Century#!\nОбразовательные реформы, проведённые Вильгельмом фон Гумбольдтом, повысили уровень образованности нации и заложили прочный фундамент для Пруссии. Однако существующая система всё ещё несовершенна. Правительство должно и дальше способствовать развитию всеобъемлющей и бесплатной системы образования, которая в конечном итоге станет достоянием каждого."
 deutsch_bundestag_lobby: "#v Добавлено модификацией Victorian Century#!\nГерманский союз, созданный на Венском конгрессе 1815 года, был призван защитить германские княжества, уцелевшие после французского вторжения. Пруссия и Австрия, как сильнейшие его члены, оказывают наибольшее влияние. Но насколько эффективной может быть столь рыхлая организация?"
 belgium_interest_lobby: "#v Добавлено модификацией Victorian Century#!\nС момента обретения независимости от Нидерландов Бельгийское королевство является важнейшим торговым центром и стратегическим плацдармом в Западной Европе, за который борются окружающие его амбициозные державы. Сможет ли Бельгия отстоять свою независимость?"
 holy_league_main_lobby: "#v Добавлено модификацией Victorian Century#!\nФранцузская революция и многие другие события предупреждают нас: христианский мир, некогда стабильный и процветающий, подвергается разрушению. Как стражи и защитники древнего, истинного, справедливого и священного европейского порядка, мы должны обеспечить, чтобы славное и милостивое правление священных монархов не пострадало от заговоров и козней всяких ничтожеств."
 deutsch_frankfurter_nationalversammlung_lobby: "#v Добавлено модификацией Victorian Century#!\nПламя националистической революции горит на землях Германского союза. Под знаменем свободы, закона и справедливости сможет ли Германия сплотиться и воплотить мечту либералов об объединении?"
 peussia_army_reform_lobby: "#v Добавлено модификацией Victorian Century#!\nТолько железом и кровью можно достичь объединения Германии. Для исполнения этого общего чаяния германской нации потребуется передовая и непобедимая армия."
 rheinische_homerule_lobby: "#v Добавлено модификацией Victorian Century#!\nВопрос конституционной интеграции муниципалитетов и государственной власти давно вызывает споры. Особенно остро он стоит в Рейнской области, унаследовавшей от французского Гражданского кодекса современные правовые, экономические и конституционные институты. Чтобы утвердить свой авторитет в регионе и выстроить прочные правовые связи, правительству необходимо разработать новый муниципальный кодекс."
 conservative_order_prussia_lobby: "#v Добавлено модификацией Victorian Century#!\nРеакционная волна эпохи после Наполеоновских войн призывает восстановить по всей Европе древние обычаи и священные законы времен Священной Римской империи. При поддержке монарха и правительства это начинание непременно увенчается успехом."
 deutsche_gemeindeordnung_lobby: "#v Добавлено модификацией Victorian Century#!\nГосударства, образующие германскую нацию, живут по собственным законам и практически не подчиняются центральной власти. Нам следует усилить контроль над этими автономными институтами и объединить местное обычное право в единый писаный муниципальный кодекс."
 #AUS
 house_of_habsburg_lobby: "#v Добавлено модификацией Victorian Century#!\nДинастия Габсбургов правит Австрийской империей почти семьсот лет. И хотя великолепие империи, над которой никогда не заходит солнце, осталось в прошлом, власть короны по-прежнему крепка. Без сомнения, пройдя сквозь бури национализма и либерализма, Австрия выйдет победителем!"
 austrian_crown_lobby: "#v Добавлено модификацией Victorian Century#!\nТеперь, когда мы подчинили коронные земли прямому управлению Вены, пришло время для решительных реформ. Если не добиться централизации, фанатичные националисты поставят под угрозу само существование империи."
 marching_through_budapest_lobby: "#v Добавлено модификацией Victorian Century#!\nВосстание мадьярской знати против власти империи не стало неожиданностью. Этих косных стариков не усмирить мягкими мерами — только сабли и пушки заставят их слушаться."
 wind_of_liberalism_lobby: "#v Добавлено модификацией Victorian Century#!\nЛиберальные идеи охватывают Европу. Радикалы окружили нашу столицу. Уступим ли мы их требованиям, позволив появиться свободной Австрии, или же продолжим править железной рукой самодержавия?"
 aus_zweibund_lobby: "#v Добавлено модификацией Victorian Century#!\nКак братья по германской семье, мы должны преодолеть былую вражду и заключить истинный союз, основанный на кровном родстве. Давайте же искренне объединимся!"
 wien_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nРазвитие Вены уже не может быть ограничено древними городскими стенами. Правительство должно объединить старую столицу с её новыми пригородами и, с помощью промышленной мощи, превратить её в истинное сердце Австрийской империи."
 bohemia_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nСо времён Средневековья Богемия была известным промышленным и торговым центром Центральной Европы. Здесь богатые месторождения полезных ископаемых, а судоходство по Эльбе способствует её росту. Правительство должно увеличить инвестиции в Богемию и создать здесь эффективный промышленный район."
 memories_of_the_old_lobby: "#v Добавлено модификацией Victorian Century#!\nГрехи неверных непременно будут искуплены. Чтобы вернуть Габсбургам короны прежних времён, мы должны подняться — твёрдо и бесстрашно. Кровь смоет их тиранию, тысячи пленных братьев будут спасены из их рук, имя Христа воссияет в нашу эпоху, а наша славная история, известная всему миру, останется незапятнанной."
 #RUS
 alexander_reform_display_lobby: "#v Добавлено модификацией Victorian Century#!\nАлександр II взошёл на российский престол, и многие реформаторы видят в этом шанс коренным образом преобразовать устаревшую систему нашей могучей страны."
 alexander_reform_display: "Реформы Александра II"
 alexander_reform_display_reason: ""
 peter_instruction_lobby: "#v Добавлено модификацией Victorian Century#!\nНепрерывные завоевания — это ген, заложенный в крови русского народа. Россия — это море, что оплодотворяет бедную Европу, и истинно великий царь направит этот прилив, чтобы его волны сокрушили любые преграды на своём пути."
 peter_instruction_constantinople_lobby: "#v Добавлено модификацией Victorian Century#!\nДва Рима пали, третий стоит, а четвёртому не бывать. Никто не может сравниться с верностью России Христу. Царица городов сотни лет страдает под турецким игом. Пришло время освободить этот желанный для всего мира город от власти варваров!"
 peter_instruction_yellowrussia_lobby: "#v Добавлено модификацией Victorian Century#!\nПлодородные китайские земли привлекают наш взор. Маньчжурия должна стать новым домом для русского народа и плацдармом для экспансии на всём Дальнем Востоке!"
 peter_instruction_vladivostok_lobby: "#v Добавлено модификацией Victorian Century#!\nВладивосток — «Владей Востоком». Этот город свидетельствует о наших великих свершениях в освоении новых земель. Если развить этот превосходный порт, он станет для нас отличной военной базой в Тихом океане."
 bolshevik_rebellion_lobby: "#v Добавлено модификацией Victorian Century#!\nБольшевики под знаменем коммунизма захватили столицу и даже самые центральные регионы нашей родины. Царь пропал без вести, а огромная Российская империя раскололась на части. Кто одержит окончательную победу?"
 reform_obshchina_lobby: "#v Добавлено модификацией Victorian Century#!\nОбщина, с древних времён укоренившаяся на восточноевропейских землях, — это уникальный уклад жизни русского народа, основанный на кровных узах и способствовавший процветанию. Однако развитие городов требует, чтобы мы гнали больше крестьян на фабрики. Нужно ли реформировать общинный строй?"
 ukraine_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nУкраина всегда была плодородной и богатой житницей на юге нашей родины, но она также таит в себе богатые залежи руды. Развивая здесь промышленность, мы непременно превратим Украину в самый развитый и ценный центр тяжёлой промышленности российской экономики."
 #USA
 supreme_court_lobby: "#v Добавлено модификацией Victorian Century#!\nВерховный суд — самая надёжная гарантия системы разделения властей в Соединённых Штатах. Нынешний председатель — Роджер Брук Тони, назначенный президентом Джексоном в 1835 году. Сможет ли он сохранить нейтралитет и защитить свободу и единство Союза?"
 westward_movement_lobby: "#v Добавлено модификацией Victorian Century#!\nБог заключил с нами завет на Новом Свете, обещая нам бескрайние дикие земли. Мы — град на холме, на который взирает весь мир, и мы должны нести идеи цивилизации и просвещения невежественным туземцам. На Запад, братья, и растите вместе со страной!"
 us_bank_war_lobby: "#v Добавлено модификацией Victorian Century#!\nПроблема Второго банка вызвала слишком много споров, из-за неё даже было совершено покушение на президента в 1835 году. Федеральное правительство должно сделать выбор: упразднить этот центральный банк, основанный Мэдисоном, или сохранить его."
 american_gilded_age_lobby: "#v Добавлено модификацией Victorian Century#!\nВолны промышленной революции захлёстывают Соединённые Штаты. В этот великий «позолоченный век» всё старое уйдёт в прошлое, природа покорится нам, а свободная страна достигнет небывалого прогресса и процветания."
 road_to_civil_rights_lobby: "#v Добавлено модификацией Victorian Century#!\nЖёсткая расовая дискриминация порочит идеалы свободы, которые мы провозгласили в 1776 году. Неужели в нашей стране все равны, кроме чернокожих, и нет гетто, кроме как для чернокожих? Пришло время этой стране исполнить своё обещание: «Все люди сотворены равными и наделены их Творцом определёнными неотчуждаемыми правами, к числу которых относятся жизнь, свобода и стремление к счастью!»"
 manifest_destiny_lobby: "#v Добавлено модификацией Victorian Century#!\nЭкспансия Соединённых Штатов — наше «Явное предначертание». Великая нация имеет право искать свои свободные земли вплоть до Тихого океана. От моря до сияющего моря!"
 free_beacon_lobby: "#v Добавлено модификацией Victorian Century#!\nВ этом тёмном мире только наши сердца бьются в унисон со свободой. Мы — маяк демократии и свободы, стоящий над тёмной бездной, сияющий град на холме в этом несчастном мире, дарующий свет и надежду кораблям и морским путешественникам."
 greatlakes_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nРазвитый речной транспорт в районе Великих озёр создаёт условия для промышленного роста. Мы должны использовать богатые природные ресурсы, чтобы создать здесь вечное промышленное сердце, источник нашего богатства."
 #CHI
 western_affairs_movement_lobby: "#v Добавлено модификацией Victorian Century#!\nТехнологии западных людей превосходят наши, и если не перенять их, то гибель государства не за горами. Мы должны изучить их технологии, чтобы достичь цели «использовать умения варваров для контроля над варварами»."
 isolationist_policies_lobby: "#v Добавлено модификацией Victorian Century#!\nСтрогая политика изоляции, проводимая со времён династии Мин, надёжно защищала нас от ядовитых идей варварских миссионеров и набегов японских пиратов. Очевидно, что эту традицию предков двор должен поддерживать и впредь."
 reform_chinese_customs_lobby: "#v Добавлено модификацией Victorian Century#!\nНаша старая таможенная система, учреждённая ещё императором Канси на побережье Цзяннаня и Фуцзяни, погрязла в коррупции. Но с помощью иностранцев мы можем принять меры, чтобы изгнать этих паразитов и создать по-настоящему современную таможню."
 xinhai_revolution_lobby: "#v Добавлено модификацией Victorian Century#!\nПравительство Цин давно потеряло поддержку народа. Какое право имеет эта банда дикарей из-за стены править великой нацией? Пришло время сокрушить власть этих захватчиков. Да здравствует революция!"
 chi_land_reform_lobby: "#v Добавлено модификацией Victorian Century#!\nНа землях, контролируемых помещиками, жизнь арендаторов полна страданий и нищеты. Отсталая земельная система — это огромный гнойник, и правительство должно немедленно излечить эту язву, чтобы освободить крестьян от ужасного гнёта."
 new_culture_movement_lobby: "#v Добавлено модификацией Victorian Century#!\nУчение старика Конфуция прогнило до основания и пропитано отвратительной иерархией. Новые идеи — а именно, идеи науки и демократии — должны быть распространены по всему обществу. В случае успеха это движение может стать эпохой Просвещения для нашей нации."
 control_the_yellow_flood_lobby: "#v Добавлено модификацией Victorian Century#!\nИзменение русла Хуанхэ привело к страшному голоду и бедствиям. Хотя ни одна династия так и не смогла по-настоящему укротить эту непокорную великую реку, с помощью новых технологий и нашей решимости это, возможно, перестанет быть бесконечным трудом."
 china_defend_korea_lobby: "#v Добавлено модификацией Victorian Century#!\nКак Поднебесная, мы обязаны защищать нашего ближайшего вассала на севере. Если мы будем бездействовать, пока на него нападают дикие варвары, не признающие цивилизации, наш Небесный мандат и влияние серьёзно пострадают."
 #JAP
 meiji_restoration_display_lobby: "#v Добавлено модификацией Victorian Century#!\nИзолированной и застойной Японией веками правил сёгунат. Если мы хотим занять своё место в этом быстро меняющемся мире, мы должны вернуть власть законному императору."
 meiji_restoration_display: "Реставрация Мэйдзи"
 meiji_restoration_display_reason: ""
 edo_rangaku_lobby: "#v Добавлено модификацией Victorian Century#!\nРангаку — это система знаний, изучаемая группой наших учёных, которые постигают западные науки через голландский язык. Распространение этих технологий вызывает споры с придворной школой «кокугаку». Двору следует рассмотреть возможность принятия мер."
 tenpo_famine_lobby: "#v Добавлено модификацией Victorian Century#!\nС четвёртого года эры Тэмпо на Японские острова обрушился голод, сравнимый по масштабам с голодом эпох Кёхо и Тэммэй. Он принёс народу Японии неисчислимые страдания, и люди просят сёгуна принять чрезвычайные меры для их спасения."
 meiji_boshin_war_lobby: "#v Добавлено модификацией Victorian Century#!\nДаймё, некогда контролировавшие всю страну, и их сторонники в различных княжествах не собираются так просто отдавать власть. Во имя императора мы должны их подавить."
 shogunate_restoration_display_lobby: "#v Добавлено модификацией Victorian Century#!\nЭти предатели, именующие себя «патриотами реставрации», пытались принудить императора превратить страну в марионетку Запада, но их злые намерения не увенчались успехом. Под мудрым руководством сёгуна двор проведёт своевременные реформы, чтобы обеспечить преемственность японских традиций и устоев."
 shogunate_restoration_display: "Новый курс сёгуната"
 shogunate_restoration_display_reason: ""
 japanese_sanbo_honbu_lobby: "#v Добавлено модификацией Victorian Century#!\nСоздание Генерального штаба само по себе является величайшим достижением Реставрации Мэйдзи. Однако противоречия между армией и флотом ослабляют нашу боевую мощь, и Генеральный штаб должен взять на себя роль координатора."
 anglo_japanese_alliance_lobby: "#v Добавлено модификацией Victorian Century#!\nСитуация на Востоке стремительно меняется. Союз с Великобританией позволит нам получить преимущество в этих переменчивых условиях."
 kenseiyougoundo_movement_lobby: "#v Добавлено модификацией Victorian Century#!\nТак называемый «военный кабинет» в нарушение конституции взял под контроль священный имперский парламент. Конституция подвергается самому варварскому попранию. Демократию нужно спасти: эти гнусные офицеры должны убраться из правительства!"
 seikanron_conqueror_korea_lobby: "#v Добавлено модификацией Victorian Century#!\nКорейский полуостров всегда был важной целью для наших завоеваний, и сегодня династия Чосон, проводящая политику самоизоляции, предоставляет нам прекрасную возможность. Время действовать! Корея будет принадлежать императору."
 jap_conqueror_manchuria_lobby: "#v Добавлено модификацией Victorian Century#!\nРодина цинской императорской семьи сейчас не так уж и крепка, а русские глубоко проникли в её дела. Мы, конечно, не можем сидеть сложа руки и смотреть, как они забирают всё себе. Судьба империи решается в этой битве! Тенно Хэйка Банзай!"
 taisho_roman_display_lobby: "#v Добавлено модификацией Victorian Century#!\nВетер романтизма веет с Гинзы по всей Японии: царит атмосфера свободы, открытости и жизненной энергии, процветает любовь к импортным товарам, новому искусству и потребительской культуре. Это лучшие годы Страны восходящего солнца за тысячелетие. Сможет ли солнце свободы пробиться сквозь тёмные тучи деспотизма и авторитаризма, чтобы озарить новую нацию Ямато?"
 taisho_roman_display: "Романтика Тайсё"
 taisho_roman_display_reason: ""

 #BIC
 company_equity_lobby: "#v Добавлено модификацией Victorian Century#!\nВ совете директоров компании на Лиденхолл-стрит назревают споры: прибыль год от года падает, а долги растут. Многие инвесторы уже начали терять веру в компанию. Если не возродить её, национализация станет неизбежной."
 bic_company_debts_lobby: "#v Добавлено модификацией Victorian Century#!\nСо второй половины XVIII века долги компании постоянно росли, причём многие из них были займами в Банке Англии, полученными благодаря парламентским актам. Иными словами, компания выписала Уайтхоллу огромный долговой чек — и Уайтхолл уже начинает терять терпение."
 unified_subcontinent_lobby: "#v Добавлено модификацией Victorian Century#!\nКомпания уже правит большей частью Индийского субконтинента, но некоторые государства всё ещё остаются вне нашего милосердного управления. По приказу Его Величества и парламента мы должны их завоевать."
 reform_east_india_lobby: "#v Добавлено модификацией Victorian Century#!\nУправление субконтинентом — дело хлопотное. Без подходящей системы эффективность нашего правления будет крайне низкой. Мы должны коренным образом реформировать существующую экономическую и политическую систему и осуществлять дальнейшие инвестиции в индийские провинции через частные предприятия."
 ganges_irrigation_lobby: "#v Добавлено модификацией Victorian Century#!\nСельскохозяйственные условия в долине Ганга не позволяют нам выращивать надёжные товарные культуры. Однако, согласно амбициозному плану, правительство проложит в Северной Индии новую эффективную ирригационную систему, превратив некогда сухие и бесплодные земли в плодородные пашни."
 bombay_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nБомбей обладает лучшими портовыми условиями в Индии, и многие компании открыли здесь свои штаб-квартиры. Продолжая работы по осушению земель, начатые губернатором Уильямом Хорнби, мы можем объединить разрозненные острова Бомбея и в конечном итоге построить процветающий мегаполис."
 raj_indian_major_railway_lobby: "#v Добавлено модификацией Victorian Century#!\nИндийский субконтинент полон сокровищ, но его обширность и пересечённая местность затрудняют транспортировку. Если мы не сможем эффективно использовать эти земли, богатства Индии останутся недоступными. Если же мы построим железную дорогу, связывающую весь субконтинент, это значительно облегчит перевозки между провинциями."
 indian_home_rule_lobby: "#v Добавлено модификацией Victorian Century#!\nНациональное самосознание коренного населения Индии растёт. Индийцы, получившие образование в британских школах и работающие в колониальной администрации, начинают требовать равного статуса в имперской системе, больше экономических возможностей и, в конечном итоге, самоуправления для всей Индии."
 raj_towards_independence_lobby: "#v Добавлено модификацией Victorian Century#!\nХотя Уайтхолл и радикальные индийские националисты временно достигли компромисса, независимость кажется неизбежным будущим. Мы должны, после тщательной подготовки и с гарантией того, что британские интересы и престиж не пострадают, предоставить им независимость."
 bic_conqueror_all_afk_lobby: "#v Добавлено модификацией Victorian Century#!\nЗаконный наследник Дурранийской империи попал в наши руки. Используя его авторитет и притязания, мы сможем одним ударом захватить Кабул, и тогда афганские племена непременно покорятся нам."

#TUR
 peter_the_great_of_turkey_lobby: "#v Добавлено модификацией Victorian Century#!\nВеликий падишах, ознаменовавший целую эпоху, Махмуд II, болен, и, похоже, править ему осталось недолго. Как он использует отведённое ему время, чтобы закрепить реформы последних десятилетий и подготовить почву для преемника?"
 tanzimat_main_lobby: "#v Добавлено модификацией Victorian Century#!\nОсманская империя, некогда раскинувшаяся на трёх континентах, ослабла, но ещё может возродиться. При поддержке визирей и пашей — сторонников Танзимата — новый падишах должен немедленно действовать, чтобы модернизировать страну и вернуть ей авторитет среди великих держав."
 ottoman_constitutional_era_lobby: "#v Добавлено модификацией Victorian Century#!\nПри поддержке революционно настроенной интеллигенции, а также сочувствующих политиков и чиновников, конституционалисты пытаются захватить контроль над Высокой Портой путём вооружённого переворота, принять конституцию и установить в Османской империи ответственное правительство. Увенчаются ли успехом идеалы конституционализма, вернётся ли диктатура, или же... произойдёт нечто совершенно неожиданное?"
 baghdad_railway_lobby: "#v Добавлено модификацией Victorian Century#!\nНаши новоиспечённые капиталисты и инженеры выдвинули грандиозный проект: проложить стальную магистраль от Средиземного моря через Багдад прямо к Персидскому заливу. Многие верят, что этот великий план укрепит власть Высокой Порты в Ираке и послужит нашим стратегическим интересам на Ближнем Востоке."
 ottoman_conquest_lobby: "#v Добавлено модификацией Victorian Century#!\nВозрождение Империи должно быть всесторонним. Если Османская империя хочет вновь оказаться на вершине мировой власти, она должна снова ступить на тропу войны — и даже превзойти достижения великих завоевателей прошлого, захватив новые земли!"
 mesopotamia_management_lobby: "#v Добавлено модификацией Victorian Century#!\nПоймы Месопотамии всегда страдали от разливов Тигра и Евфрата. Эти земли обладают огромным потенциалом плодородия: нам лишь нужно принять меры по борьбе с наводнениями и засолением почв, а также восстановить заброшенные пашни."
 istanbul_industrialize_lobby: "#v Добавлено модификацией Victorian Century#!\nКонстантинополь, некогда прославленный как «Город, желанный миру» и «Царица городов», пришёл в упадок в эту новую индустриальную эпоху. Как столица империи и великий город, завоёванный Фатихом, он должен быть преображён, чтобы вновь стать самым прославленным мегаполисом мира."
 armenian_massacre_issue_lobby: "#v Добавлено модификацией Victorian Century#!\nАрмяне, проживающие в разных уголках Империи, долгое время сталкивались с враждебностью со стороны турок, и в последнее время эти настроения лишь усиливаются. Если не принять своевременных мер, эта вражда вполне может перерасти в чудовищный геноцид."
 great_ottomanism_lobby: "#v Добавлено модификацией Victorian Century#!\nСреди бюрократии и армейских кругов набирает популярность идеология, известная как «великий османизм». Её сторонники полагают, что она сможет создать национальное единство и тем самым предотвратить распад Империи, провоцируемый религиозной системой миллетов."
 caliph_and_ummah_lobby: "#v Добавлено модификацией Victorian Century#!\nВ нашей стране поднимается исламское фундаменталистское движение, известное как «салафия». Они надеются очистить страну от «яда модернизации» путём возвращения к чистым исламским традициям Пророка Мухаммеда и его сподвижников."
 the_unruly_arabs_lobby: "#v Добавлено модификацией Victorian Century#!\nНа Аравийском полуострове под властью османов процветают новые националистические идеи. Интеллектуальная элита, получившая западное образование, и местные муфтии, ненавидящие османское иго, при поддержке враждебных нам иностранных держав объединяются, чтобы подстрекать бедуинов к вооружённому свержению турецкой власти в Аравии."

