 setting_disable_victorian_century_ai_enhancement_desc: "Отключает любые типы усиления ИИ, возвращая его к стандартному поведению.\nВ #O сетевой игре#! с большим количеством участников рекомендуется отключать усиление во избежание рассинхронизации."
 setting_enable_advanced_victorian_century_ai_enhancement: "#tooltippable #tooltip:[GetPlayer.GetTooltipTag],setting_enable_advanced_victorian_century_ai_enhancement_tooltip #high Включить продвинутое усиление ИИ#!#!#!"
 setting_enable_advanced_victorian_century_ai_enhancement_desc: "Страны под управлением ИИ получат усиление, зависящее от их [Concept('concept_rank', 'ранга')].\nПри продвинутом усилении ИИ получит #O полный эффект.#!"
 setting_enable_advanced_victorian_century_ai_enhancement_tooltip: "Список модификаторов усиления (при продвинутом усилении ИИ получает полный эффект):\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_great_power_tt $great_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_major_power_tt $major_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_minor_power_tt $minor_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_insignificant_power_tt $insignificant_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_unrecognized_power_tt $unrecognized_major_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_regional_power_tt $unrecognized_regional_power_ai_buff$#!#!\n#tooltippable #tooltip:[GetPlayer.GetTooltipTag],advanced_small_power_tt $unrecognized_power_ai_buff$#!#!"
