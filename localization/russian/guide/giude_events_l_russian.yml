l_russian:
  #
 joi_flavor_guide.1.t: "Руководство по дневнику Франции"
 joi_flavor_guide.1.d: "Последнее обновление для Франции от 15.06.2025: #V Вторая республика, записи в дневнике, связанные с династией Бонапартов, Правительство национальной обороны, Третья республика, Англо-французское соглашение и т.д.#!"
 joi_flavor_guide.1.f: "В: Как активировать записи в дневнике, связанные с династией Бонапартов?\nО: Потерпите поражение в записи в дневнике «Раскол монархистов», чтобы перейти к записи в дневнике «Вторая республика». В этой записи, через события, добейтесь того, чтобы влияние монархистов превысило влияние республиканцев. Выполните условия провала записи в дневнике, чтобы через событие провала «Операция „Рубикон“» короновать Наполеона III и установить династию Бонапартов.\n\nВ: Как активировать записи в дневнике, связанные с Третьей республикой?\nО: Потерпите поражение в войне и потеряйте любую национальную территорию во время действия записи в дневнике «Династия Бонапартов», и это вызовет событие, которое позволит вам снова установить республику. Либо вы можете просто принять республиканскую форму правления во время действия дневника «Династия Бонапартов»."
 joi_flavor_guide.1.a: "Спасибо."
 special_character_god_save_the_queen: "Боже, храни королеву"
 special_character_god_save_the_queen_desc: "Защитница веры, Божьей милостью королева Соединённого королевства Великобритании и Ирландии. Слава королеве! Да продлится её правление!"
 special_character_emperor_of_india: "Император Индии"
 special_character_emperor_of_india_desc: "Жемчужина в короне, Его Величество император Индии и владыка Делийского дарбара, повелитель обширных земель Индийского субконтинента."
 special_character_second_world_conqueror: "Завоеватель мира"
 special_character_second_world_conqueror_desc: "Наследник императора Наполеона, он воплотил в жизнь мечту 1815 года. Превзойдя деяния своего великого предка, он кровью и славой создал легенду, которой ещё не знал мир."
 special_character_abraham_lincoln_popularity: "Великий освободитель"
 special_character_abraham_lincoln_popularity_desc: "Благодаря своей непоколебимой приверженности свободе и выдающемуся политическому таланту он отменил рабство, нанёс поражение Конфедерации и сохранил единство Союза."
 special_character_old_marshal: "Старый маршал"
 special_character_old_marshal_desc: "Один из последних живых героев наполеоновской эпохи, он лично прошёл через все войны со времён Великой революции. В горниле сражений он выковал острый полководческий талант и заслужил непререкаемый авторитет."
 special_iron_duke: "Железный герцог"
 special_iron_duke_desc: "Герцог Веллингтон, Артур Уэлсли — покоритель Завоевателя мира, спаситель Европы. Благодаря своему выдающемуся полководческому таланту и тактическому гению он одержал победу над императором Наполеоном в битве при Ватерлоо и положил конец Наполеоновским войнам. Это великое свершение принесло ему небывалую славу и всенародную любовь."
 special_young_officers: "Молодой офицер"
 special_young_officers_desc: "Этот молодой и многообещающий офицер получил блестящее военное образование. Он является сторонником новаторских идей и уже успел занять важные штабные и командные должности в армии."
 special_chief_of_general_staff: "Начальник Генерального штаба"
 special_chief_of_general_staff_desc: "Прославленный военачальник, он провёл в армии своей страны ряд новаторских реформ и снискал славу на полях сражений. Будучи главой Генерального штаба, он пользуется глубоким уважением на родине, а враги называют его гением тактики и организации."
 special_bloody_baron: "Кровавый барон"
 special_bloody_baron_desc: "Называющий себя потомком Чингисхана и одержимый тантрическим буддизмом, он известен тем, что с врагами и собственными подчинёнными расправляется с исключительной жестокостью, прибегая к самым причудливым методам. Многие татары, преклоняющиеся перед ним, видят в нём новое воплощение Бэгцэ, бога войны."
 special_ottoman_fatih: "Фатих"
 special_ottoman_fatih_desc: "Истинный падишах-завоеватель, султан двух морей и двух континентов. Он возглавил армию, чтобы повторить славный подвиг своего предка, Мехмеда II Завоевателя, и покорил вслед за Константинополем ещё один священный город — Рим."
 special_prince_governor: "Сын Османа"
 special_prince_governor_desc: "Опытный полководец и правитель, который, следуя традициям династии Османов, провёл юность в суровых военных походах и управлении провинциями. Это принесло ему бесценный опыт государственного и военного руководства, а также снискало уважение и любовь вверенных ему войск и жителей провинций."
 special_yellow_flood_leader: "Укротитель вод"
 special_yellow_flood_leader_desc: "Любимый народом выдающийся лидер, с необычайным упорством повторивший легендарный подвиг Юя Великого и приведший ханьцев к полному укрощению наводнений Хуанхэ, не дававших покоя китайским династиям на протяжении тысячелетий."
