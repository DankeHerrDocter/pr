 notification_headlines_acw_begin_csa_tooltip: "#header $notification_headlines_acw_begin_csa_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_acw_begin_csa_desc$"
 notification_headlines_acw_begin_csa_name: "#b Гражданская война в США #!"
 notification_headlines_acw_begin_csa_desc: "Столкнувшись с растущей поддержкой аболиционизма, [SCOPE.sCountry('csa_scope').GetName|l] поднял[SCOPE.sCountry('csa_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] открытое восстание. #lore Штаты-сепаратисты объявили об одностороннем выходе из Союза, захватили федеральные арсеналы и призвали к оружию местное ополчение. Госсекретарь США сообщил, что попытки федерального правительства договориться были встречены резким отказом...#!"
 notification_headlines_acw_begin_fsa_tooltip: "#header $notification_headlines_acw_begin_fsa_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_acw_begin_fsa_desc$"
 notification_headlines_acw_begin_fsa_name: "#b Северные штаты отделяются #!"
 notification_headlines_acw_begin_fsa_desc: "Столкнувшись с непреклонной позицией по вопросу рабства, [SCOPE.sCountry('fsa_scope').GetName|l] поднял[SCOPE.sCountry('fsa_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] открытое восстание. #lore Объявив федеральное правительство незаконным, свободные штаты провозгласили освобождение всех рабов на своей территории, включая беглых из рабовладельческих штатов. Федеральное правительство осудило мятежников как предателей Конституции и призвало...#!"
 notification_headlines_acw_end_slaver_tooltip: "#header $notification_headlines_acw_end_slaver_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_acw_end_slaver_desc$"
 notification_headlines_acw_end_slaver_name: "#b Рабство в Америке восторжествовало #!"
 notification_headlines_acw_end_slaver_desc: "Гражданская война в США завершилась победой сторонников рабства. #lore Президент призывает враждующие штаты к примирению и скорейшему возвращению к мирной жизни. Даже после окончания войны небольшие группы аболиционистов продолжают сопротивление...#!"
 notification_headlines_acw_end_emancipation_tooltip: "#header $notification_headlines_acw_end_emancipation_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_acw_end_emancipation_desc$"
 notification_headlines_acw_end_emancipation_name: "#b Конец Гражданской войны в США #!"
 notification_headlines_acw_end_emancipation_desc: "Гражданская война в США завершилась победой аболиционистов. #lore Президент призывает враждующие штаты к примирению и скорейшему возвращению к мирной жизни. Военизированные формирования сторонников рабства предприняли ряд...#!"
 notification_headlines_acw_end_stalemate_tooltip: "#header $notification_headlines_acw_end_stalemate_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_acw_end_stalemate_desc$"
 notification_headlines_acw_end_stalemate_name: "#b Разобщённые Штаты #!"
 notification_headlines_acw_end_stalemate_desc: "Гражданская война в США зашла в тупик, и [SCOPE.sCountry('usa_scope').GetNameNoFlag] и [SCOPE.sCountry('acw_other_one_scope').GetNameNoFlag] заключили непростое перемирие. #lore Большинство наблюдателей сходится во мнении, что мир между двумя Америками не продлится долго. Пограничные штаты сотрясают волнения, поскольку обе стороны пытаются...#!"
 notification_headlines_qing_collapse_tooltip: "#header $notification_headlines_qing_collapse_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_qing_collapse_desc$"
 notification_headlines_qing_collapse_name: "#b Хаос в Пекине — армия дезертирует #!"
 notification_headlines_qing_collapse_desc: "Оказавшись в осаде со всех сторон, власть [SCOPE.sCountry('china_scope').GetAltNameNoFlag('RU_CL_RP')] , похоже, окончательно рухнула. #lore Местные наместники и амбициозные бандиты захватили контроль над провинциями по всему Китаю, обрекая народ на неисчислимые страдания. Министерства иностранных дел нескольких европейских держав опубликовали заявления, касающиеся...#!"
 notification_headlines_bic_collapse_tooltip: "#header $notification_headlines_bic_collapse_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_bic_collapse_desc$"
 notification_headlines_bic_collapse_name: "#b Конец Британской Индии? #!"
 notification_headlines_bic_collapse_desc: "Политические волнения положили конец долгому британскому правлению в Индии, и бывшие вассальные князья восстанавливают свою власть по всему субконтиненту. #lore Порты Индии переполнены британцами, стремящимися вернуться домой на Британские острова. Министерство иностранных дел Великобритании полностью поддерживает репатриацию...#!"
 notification_headlines_dei_collapse_tooltip: "#header $notification_headlines_dei_collapse_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_dei_collapse_desc$"
 notification_headlines_dei_collapse_name: "#b Голландцы уходят — расколотая Ост-Индия #!"
 notification_headlines_dei_collapse_desc: "Колониальная администрация Голландской Ост-Индии спешно покинула острова, оставив местных жителей на произвол судьбы без их прежних сюзеренов. #lore Когда новости о катастрофе в колонии достигли Амстердама, рынки охватила паника...#!"
 notification_headlines_uca_collapse_tooltip: "#header $notification_headlines_uca_collapse_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_uca_collapse_desc$"
 notification_headlines_uca_collapse_name: "#b Федерация Центральной Америки голосует за роспуск #!"
 notification_headlines_uca_collapse_desc: "Бывшие провинции Федерации Центральной Америки официально отделились, образовав независимые государства. #lore Центральный конгресс, существовавший лишь номинально с начала года, проголосовал за официальное прекращение существования федерации и признание суверенитета провинций. На торжественной церемонии был спущен флаг федерации...#!"
 notification_headlines_ngf_formed_tooltip: "#header $notification_headlines_ngf_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_ngf_formed_desc$"
 notification_headlines_ngf_formed_name: "#b Германские государства объявляют о создании конфедерации #!"
 notification_headlines_ngf_formed_desc: "Движимые национализмом, десятки членов Германского союза объединились в [SCOPE.sCountry('ngf_scope').GetNameNoFlag]. #lore Во многих городах стихийно начались празднования в поддержку новой конфедерации. Теперь преобладает мнение, что полное объединение Германии неизбежно, поскольку...#!"
 notification_headlines_ger_formed_tooltip: "#header $notification_headlines_ger_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_ger_formed_desc$"
 notification_headlines_ger_formed_name: "#b Троекратное ура Германии #!"
 notification_headlines_ger_formed_desc: "Сегодня в городе [SCOPE.sCountry('germany_scope').GetCapital.GetCityHubName] было официально объявлено о создании [SCOPE.sCountry('germany_scope').GetAltNameNoFlag('RU_CL_RP')], объединившей разрозненные германские государства в единую нацию. #lore Восторженные толпы вышли на улицы с флагами новой объединённой Германии. Правительства европейских стран направили сдержанные поздравления...#!"
 notification_headlines_italy_formed_tooltip: "#header $notification_headlines_italy_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_italy_formed_desc$"
 notification_headlines_italy_formed_name: "#b Италия объединена #!"
 notification_headlines_italy_formed_desc: "[SCOPE.sCountry('italy_scope').GetNameNoFlag] был[SCOPE.sCountry('italy_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] создан[SCOPE.sCountry('italy_scope').GetAltNameNoFormatting('RU_CL_END_FEM')], и итальянский национализм восторжествовал на полуострове. #lore Новое правительство Италии было сформировано в городе [SCOPE.sCountry('italy_scope').GetCapital.GetCityHubName] под ликование толпы, размахивающей триколорами. Дипломаты из нескольких других европейских стран выступили с речами...#!"
 notification_headlines_central_europe_formed_tooltip: "#header $notification_headlines_central_europe_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_central_europe_formed_desc$"
 notification_headlines_central_europe_formed_name: "#b Призрак Священной Римской империи #!"
 notification_headlines_central_europe_formed_desc: "Провозглашение [SCOPE.sCountry('hre_scope').GetAltNameNoFlag('RU_CL_RP')] — знаменательный момент в истории Европы и всего современного мира. #lore Толпы людей со всей Европы заполнили улицы, чтобы стать свидетелями этого события. Переговоры об официальном языке этого панъевропейского государства всё ещё продолжаются, поскольку...#!"
 notification_headlines_scandinavia_formed_tooltip: "#header $notification_headlines_scandinavia_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_scandinavia_formed_desc$"
 notification_headlines_scandinavia_formed_name: "#b Скандинавия объявляет о союзе #!"
 notification_headlines_scandinavia_formed_desc: "Северные народы [SCOPE.sCountry('scandinavia_scope').GetAltNameNoFlag('RU_CL_RP')] сформировали единое правительство. #lore Был представлен новый флаг объединённой Скандинавии, который был поднят вместе с флагами каждого из государств-членов. Новый премьер-министр произнёс тост на нескольких языках в честь...#!"
 notification_headlines_british_republic_tooltip: "#header $notification_headlines_british_republic_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_british_republic_desc$"
 notification_headlines_british_republic_name: "#b Конец британской монархии #!"
 notification_headlines_british_republic_desc: "Сегодня британский парламент официально объявил о создании [SCOPE.sCountry('britain_scope').GetAltNameNoFlag('RU_CL_RP')], что ознаменовало закат Соединённого Королевства. #lore Королевской семье было позволено отречься от престола, но запрещено занимать какие-либо государственные должности. У Вестминстерского аббатства царило оживление: антиреспубликанские демонстранты...#!"
 notification_headlines_british_raj_tooltip: "#header $notification_headlines_british_raj_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_british_raj_desc$"
 notification_headlines_british_raj_name: "#b Конец Ост-Индской компании #!"
 notification_headlines_british_raj_desc: "После ряда провалов колониального правительства вся Ост-Индская компания была распущена решением парламента. #lore Все активы компании были конфискованы короной, а её владения в Индии реорганизованы в [SCOPE.sCountry('raj_scope').GetNameNoFlag]. Новоназначенный вице-король Индии сделал заявление по прибытии...#!"
 notification_headlines_japan_restoration_tooltip: "#header $notification_headlines_japan_restoration_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_japan_restoration_desc$"
 notification_headlines_japan_restoration_name: "#b Реставрация Мэйдзи #!"
 notification_headlines_japan_restoration_desc: "Сёгунат, правивший [SCOPE.sCountry('japan_scope').GetAltNameNoFlag('RU_CL_PP')] на протяжении веков, был распущен, и политическая власть вернулась к [SCOPE.sCountry('japan_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('japan_scope').GetRuler.GetFirstName]. #lore Новое правительство объявило о масштабных реформах, направленных на модернизацию и индустриализацию островного государства. Несколько групп недовольных самураев вступили в столкновения с правительственными войсками...#!"
 notification_headlines_billion_gdp_tooltip: "#header $notification_headlines_billion_gdp_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_billion_gdp_desc$"
 notification_headlines_billion_gdp_name: "#b Новые экономические высоты — ВВП достиг миллиарда #!"
 notification_headlines_billion_gdp_desc: "Последний экономический отчёт подтверждает, что ВВП [SCOPE.sCountry('billionare_country').GetAltNameNoFlag('RU_CL_RP')] превысил #yellow @money!1 миллиард#!. #lore Аналитики рынка прогнозируют продолжение беспрецедентного процветания, а самые оптимистичные прогнозы предсказывают удвоение экономики, как только...#!"
 notification_headlines_tanzimat_fail_tooltip: "#header $notification_headlines_tanzimat_fail_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_tanzimat_fail_desc$"
 notification_headlines_tanzimat_fail_name: "#b Османский султан отрёкся от престола #!"
 notification_headlines_tanzimat_fail_desc: "После внезапного отречения султана [SCOPE.sCountry('ottoman_scope').GetNameNoFlag] погрузил[SCOPE.sCountry('ottoman_scope').GetAltNameNoFormatting('RU_CL_END_FEM')]ся в политический паралич. #lore Столкнувшись с сопротивлением со стороны бесчисленных подданных и местных правителей, правительство за стенами султанского дворца в последние годы едва справлялось с ситуацией. Посол Великобритании в Стамбуле сказал...#!"
 notification_headlines_suez_canal_tooltip: "#header $notification_headlines_suez_canal_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_suez_canal_desc$"
 notification_headlines_suez_canal_name: "#b Суэцкий канал достроен #!"
 notification_headlines_suez_canal_desc: "[SCOPE.sCountry('suez_owner_scope').GetNameNoFlag] построил[SCOPE.sCountry('suez_owner_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] [SCOPE.sBuilding('suez_canal_scope').GetNameNoFlag], соединяющий Средиземное и Красное моря. #lore Годы изысканий и строительства увенчались успехом, и на грандиозной церемонии открытия были устроены банкет и фейерверк. Первое судно, прошедшее через канал...#!"
 notification_headlines_panama_canal_tooltip: "#header $notification_headlines_panama_canal_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_panama_canal_desc$"
 notification_headlines_panama_canal_name: "#b Панамский канал открыт #!"
 notification_headlines_panama_canal_desc: "[SCOPE.sBuilding('panama_canal_scope').GetName], построенный [SCOPE.sCountry('panama_owner_scope').GetAltNameNoFlag('RU_CL_TP')], соединяет Атлантический и Тихий океаны. #lore Проект постоянно сталкивался с задержками строительства и проблемами на месте. Проход через перешеек — это...#!"
 notification_headlines_gp_war_tooltip: "#header $notification_headlines_gp_war_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_gp_war_desc$"
 notification_headlines_gp_war_name: "#b Великие державы вступают в войну #!"
 notification_headlines_gp_war_desc: "Между [SCOPE.sCountry('great_power_scope_1').GetAltNameNoFlag('RU_CL_TP')] и [SCOPE.sCountry('great_power_scope_2').GetAltNameNoFlag('RU_CL_TP')] официально объявлено состояние войны. #lore Министерства иностранных дел обеих сторон опубликовали заявления, осуждающие друг друга. Уже замечены большие группы паникующих беженцев, спасающихся от линии фронта, так же как...#!"
 notification_headlines_taiping_appears_tooltip: "#header $notification_headlines_taiping_appears_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_taiping_appears_desc$"
 notification_headlines_taiping_appears_name: "#b Тайпины явились на землю Китая #!"
 notification_headlines_taiping_appears_desc: "На земле Китая возникло христианское движение, именующее себя [Concept('concept_country', '[SCOPE.sCountry('taiping_scope').GetNameNoFlag]')]. Оно уже подняло знамя восстания против [SCOPE.sCountry('china_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore Говорят, что секта, известная как «Общество поклонения Богу», возглавляется младшим братом Иисуса Христа, и тысячи людей стекаются...#!"
 notification_headlines_taiping_victory_tooltip: "#header $notification_headlines_taiping_victory_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_taiping_victory_desc$"
 notification_headlines_taiping_victory_name: "#b Священная Китайская империя? #!"
 notification_headlines_taiping_victory_desc: "[SCOPE.sCountry('taiping_scope').GetNameNoFlag] одержал[SCOPE.sCountry('taiping_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] победу и установил[SCOPE.sCountry('taiping_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] Общество поклонения Богу в качестве государственной религии. #lore Жестокий конфликт оставил после себя горы трупов и реки крови. [SCOPE.sCountry('taiping_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('taiping_scope').GetRuler.GetFirstName] издал[SCOPE.sCountry('taiping_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] указы о широких социальных реформах, включая...#!"
 notification_headlines_taiping_defeat_tooltip: "#header $notification_headlines_taiping_defeat_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_taiping_defeat_desc$"
 notification_headlines_taiping_defeat_name: "#b Отец Небесный убил старшего брата, царство не построить #!"
 notification_headlines_taiping_defeat_desc: "[SCOPE.sCountry('china_scope').GetNameNoFlag] подавил[SCOPE.sCountry('china_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] восстание Общества поклонения Богу. #lore Ходят слухи, что где прошла армия — там хоть граблями греби, а где чиновник — там и бритвой нечего скоблить. За один день было убито более тридцати тысяч человек...#!"
 notification_headlines_sgf_formed_tooltip: "#header $notification_headlines_sgf_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_sgf_formed_desc$"
 notification_headlines_sgf_formed_name: "#b Южно-Германская Конфедерация #!"
 notification_headlines_sgf_formed_desc: "Несколько государств южной Германии объединились в [SCOPE.sCountry('sgf_scope').GetNameNoFlag]. #lore Немецкие националисты со всех сторон съехались в город [SCOPE.sCountry('sgf_scope').GetCapital.GetCityHubName] на церемонию основания. Влияние этого события на объединение Германии вызывает бурные дебаты, учитывая...#!"
 notification_headlines_british_council_republic_tooltip: "#header $notification_headlines_british_council_republic_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_british_council_republic_desc$"
 notification_headlines_british_council_republic_name: "#b Красный Лондон #!"
 notification_headlines_british_council_republic_desc: "Правительство рабочих советов захватило контроль над [SCOPE.sCountry('britain_scope').GetAltNameNoFlag('RU_CL_PP')]. #lore Поместья по всей стране были атакованы и разграблены толпами обезумевших революционеров. Судьба королевской семьи остаётся неизвестной, поскольку...#!"
 notification_headlines_roman_republic_tooltip: "#header $notification_headlines_roman_republic_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_roman_republic_desc$"
 notification_headlines_roman_republic_name: "#b Папа изгнан из Рима #!"
 notification_headlines_roman_republic_desc: "Радикалы-республиканцы захватили Вечный город и провозгласили создание [SCOPE.sCountry('rome_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore Утверждается, что Папа Римский бежал под покровом ночи, переодевшись, ещё до того, как Ватикан был взят под контроль. Новые выборы были бойкотированы благочестивыми...#!"
 notification_headlines_cristo_redentor_tooltip: "#header $notification_headlines_cristo_redentor_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_cristo_redentor_desc$"
 notification_headlines_cristo_redentor_name: "#b Самая высокая статуя Христа в мире #!"
 notification_headlines_cristo_redentor_desc: "Строительство [SCOPE.sBuilding('cristo_redentor_scope').GetName] завершено, и теперь он возвышается над городом [SCOPE.sState('rio_scope').GetCityHubName]. #lore Статуя высотой 100 футов является чудом христианского мира. В ночь открытия величественная фигура была освещена...#!"
 notification_headlines_statue_of_liberty_tooltip: "#header $notification_headlines_statue_of_liberty_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_statue_of_liberty_desc$"
 notification_headlines_statue_of_liberty_name: "#b Свет свободы над Нью-Йорком #!"
 notification_headlines_statue_of_liberty_desc: "[SCOPE.sBuilding('statue_of_liberty_scope').GetName] возвышается над городом [SCOPE.sState('new_york_scope').GetCityHubName], приветствуя каждого гостя Нового Света. #lore Эта великая статуя Свободы была спроектирована и собрана во Франции в качестве подарка американскому народу. Усилия по сбору средств на статую были предприняты...#!"
 notification_headlines_big_ben_tooltip: "#header $notification_headlines_big_ben_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_big_ben_desc$"
 notification_headlines_big_ben_name: "#b Лондонский мост падает, падает, падает #!"
 notification_headlines_big_ben_desc: "Строительство [SCOPE.sBuilding('big_ben_scope').GetName] в городе [SCOPE.sState('home_counties_scope').GetCityHubName] завершено. #lore Большой колокол, запряжённый шестнадцатью лошадьми, везли по улицам, и потребовался целый день, чтобы поднять его на башню. Его четыре больших циферблата были точно откалиброваны...#!"
 notification_headlines_mosque_of_djenne_tooltip: "#header $notification_headlines_mosque_of_djenne_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_mosque_of_djenne_desc$"
 notification_headlines_mosque_of_djenne_name: "#b Великая мечеть Дженне восстановлена #!"
 notification_headlines_mosque_of_djenne_desc: "После десятилетий запустения [SCOPE.sBuilding('mosque_of_djenne_scope').GetName] в [SCOPE.sState('djenne_scope').GetAltNameNoFlag('RU_CL_PP')] был[SCOPE.sBuilding('mosque_of_djenne_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] восстановлен[SCOPE.sBuilding('mosque_of_djenne_scope').GetAltNameNoFormatting('RU_CL_END_FEM')]. #lore Это огромное сооружение из сырцового кирпича, датируемое как минимум 1300-ми годами, было полностью перестроено на прежнем месте. В день открытия мечети состоялся большой праздник, привлёкший...#!"
 notification_headlines_eiffel_tower_tooltip: "#header $notification_headlines_eiffel_tower_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_eiffel_tower_desc$"
 notification_headlines_eiffel_tower_name: "#b Эйфелева башня — первая в мире #!"
 notification_headlines_eiffel_tower_desc: "[SCOPE.sBuilding('eiffel_tower_scope').GetName] теперь доминирует над горизонтом, в городе [SCOPE.sState('eiffel_state').GetCityHubName]. #lore Башня, построенная с использованием новаторских технологий металлообработки и инженерии, возвышается более чем на 1000 футов. Споры вокруг дизайна башни продолжаются, среди которых...#!"
 notification_headlines_first_skyscraper_tooltip: "#header $notification_headlines_first_skyscraper_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_first_skyscraper_desc$"
 notification_headlines_first_skyscraper_name: "#b Небоскрёбы действительно касаются неба #!"
 notification_headlines_first_skyscraper_desc: "[SCOPE.sCountry('first_skyscraper_country').GetNameNoFlag] построил[SCOPE.sCountry('first_skyscraper_country').GetAltNameNoFormatting('RU_CL_END_FEM')] первый в мире «небоскрёб» в городе [SCOPE.sState('first_skyscraper_state').GetCityHubName]. #lore Это потрясающее новое здание, построенное с использованием новейших строительных материалов и технологий, полностью поддерживается каркасом из конструкционной стали. Новый дизайн вызвал некоторую озабоченность у правительственных инспекторов, которые...#!"
 notification_headlines_notable_bankrupt_tooltip: "#header $notification_headlines_notable_bankrupt_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_notable_bankrupt_desc$"
 notification_headlines_notable_bankrupt_name: "#b [SCOPE.sCountry('bankrupt_country').GetNameNoFlag] обанкротил[SCOPE.sCountry('bankrupt_country').GetAltNameNoFormatting('RU_CL_END_FEM')]ся! #!"
 notification_headlines_notable_bankrupt_desc: "Сегодня утром правительство [SCOPE.sCountry('bankrupt_country').GetAltNameNoFlag('RU_CL_RP')] официально объявило о банкротстве, что полностью разрушило экономику и международное положение страны. #lore У региональных банков вспыхнули беспорядки, так как паникующие граждане пытались...#!"
 rule_headlines_minor_events: "@headlines_newsicon!#yellow Новости#! | Второстепенные события"
 setting_headlines_all_minor_events: "Все второстепенные новости"
 setting_headlines_all_minor_events_desc: "Будут отображаться все новости."
 setting_headlines_relevant_minor_events: "Только важные второстепенные новости"
 setting_headlines_relevant_minor_events_desc: "Некоторые менее важные новости будут отображаться только в том случае, если у вас есть [concept_interest] в соответствующем регионе. #lore Например, распад Федерации Центральной Америки или повторное завоевание Францией Алжира.#!"
 setting_headlines_no_minor_events: "Не показывать второстепенные новости"
 setting_headlines_no_minor_events_desc: "Некоторые менее важные новости не будут отображаться. #lore Например, распад Федерации Центральной Америки или повторное завоевание Францией Алжира.#!"

 headlines_major_group: "@headlines_newsicon! #yellow Новости#! | Главные события"
 headlines_minor_group: "@headlines_newsicon! #yellow Новости#! | Второстепенные события"
 headlines_constructions_group: "@headlines_newsicon! #yellow Новости#! | Строительство"

 notification_headlines_yugoslavia_formed_tooltip: "#header $notification_headlines_yugoslavia_formed_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_yugoslavia_formed_desc$"
 notification_headlines_yugoslavia_formed_name: "#b Югославия объявляет о создании союза #!"
 notification_headlines_yugoslavia_formed_desc: "Западные Балканы объединились под властью [SCOPE.sCountry('yugoslavia_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore Послы нового югославского государства получили официальное признание от других европейских стран на дипломатической конференции. Слишком долго страдая под игом Австрии и Османской империи, славянские народы теперь должны...#!"
 notification_headlines_french_commune_tooltip: "#header $notification_headlines_french_commune_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_commune_desc$"
 notification_headlines_french_commune_name: "#b Коммуна захватывает Францию #!"
 notification_headlines_french_commune_desc: "Французская коммуна взяла под контроль правительство и объявила о создании [SCOPE.sCountry('france_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore На улицах Парижа развеваются красные флаги в честь рождения нового режима. Обездоленные аристократы бегут в разные уголки Европы, появляясь на иностранных пограничных пунктах... #!"
 notification_headlines_french_legitimist_tooltip: "#header $notification_headlines_french_legitimist_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_legitimist_desc$"
 notification_headlines_french_legitimist_name: "#b Реставрация Бурбонов #!"
 notification_headlines_french_legitimist_desc: "Силы легитимистов восстановили [SCOPE.sCountry('france_scope').GetRuler.GetFirstName] в качестве [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle] на #tooltippable_name [SCOPE.sCountry('france_scope').GetAdjective|l]ом#! престоле. #lore Консервативное правительство ультрароялистов пообещало вернуться к дореволюционным временам. Республиканские радикалы сорвали церемонию в столице... #!"
 notification_headlines_french_monarchy_returns_tooltip: "#header $notification_headlines_french_monarchy_returns_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_monarchy_returns_desc$"
 notification_headlines_french_monarchy_returns_name: "#b Франция возвращается к монархии #!"
 notification_headlines_french_monarchy_returns_desc: "[SCOPE.sCountry('france_scope').GetNameNoFlag] вновь восстановил[SCOPE.sCountry('france_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] монархию, короновав [SCOPE.sCountry('france_scope').GetRuler.GetFirstName] как [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle]. #lore Новоиспечённый [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle] пообещал[SCOPE.sCountry('france_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] восстановить процветание и стабильность в стране. Сообщается, что партизанская деятельность всё ещё...#!"
 notification_headlines_french_republic_tooltip: "#header $notification_headlines_french_republic_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_republic_desc$"
 notification_headlines_french_republic_name: "#b Франция вновь становится республикой #!"
 notification_headlines_french_republic_desc: "Некогда упразднённый режим [SCOPE.sCountry('france_scope').GetAltNameNoFlag('RU_CL_RP')] вновь вернулся к власти. #lore Шампанское и трёхцветные кокарды ознаменовали триумфальное шествие республиканских сил по Парижу. «Свобода, равенство, братство!» — стало громким лозунгом дня среди толпы...#!"
 notification_headlines_french_empire_tooltip: "#header $notification_headlines_french_empire_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_empire_desc$"
 notification_headlines_french_empire_name: "#b Новый Наполеон? #!"
 notification_headlines_french_empire_desc: "[SCOPE.sCountry('france_scope').GetRuler.GetFirstName] [SCOPE.sCountry('france_scope').GetRuler.GetPrimaryRoleTitle] вернул[SCOPE.sCountry('france_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] семью Бонапартов к власти и объявил[SCOPE.sCountry('france_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] о возрождении [SCOPE.sCountry('france_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore При поддержке вооружённых сил новая имперская администрация стремится восстановить положение Франции на мировой арене. Европейские дипломаты с нетерпением ждут, чтобы узнать о конкретных намерениях нового императора...#!"
 notification_headlines_french_algeria_tooltip: "#header $notification_headlines_french_algeria_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_french_algeria_desc$"
 notification_headlines_french_algeria_name: "#b Франция отвоёвывает Алжир #!"
 notification_headlines_french_algeria_desc: "[SCOPE.sCountry('france_scope').GetNameNoFlag] восстановил[SCOPE.sCountry('france_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] контроль над Алжиром после кровопролитного конфликта с местным сопротивлением. #lore Столкнувшись с растущими потерями из-за нетрадиционной тактики, французская армия прибегла к жестокой тактике выжженной земли, начав яростное наступление на сельскую местность... #!"
 notification_headlines_south_pole_tooltip: "#header $notification_headlines_south_pole_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_south_pole_desc$"
 notification_headlines_south_pole_name: "#b [SCOPE.sCountry('south_pole_country').GetAdjectiveNoFormatting]ая экспедиция достигла Южного полюса #!"
 notification_headlines_south_pole_desc: "Экспедиция, финансируемая [SCOPE.sCountry('south_pole_country').GetAltNameNoFlag('RU_CL_TP')], успешно достигла Южного полюса и благополучно вернулась. #lore Участники экспедиции пересекли антарктическую пустыню и водрузили там #tooltippable_name [SCOPE.sCountry('south_pole_country').GetAdjective|l]ий#! флаг. По возвращении они получили поздравления со всех сторон... #!"
 notification_headlines_state_atheism_tooltip: "#header $notification_headlines_state_atheism_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_state_atheism_desc$"
 notification_headlines_state_atheism_name: "#b Боги вне закона — церкви разграблены #!"
 notification_headlines_state_atheism_desc: "[SCOPE.sCountry('atheist_country').GetNameNoFlag] ввёл[SCOPE.sCountry('atheist_country').GetAltNameNoFormatting('RU_CL_END_FEM')] политику государственного атеизма, запретив вмешательство религии в общественную жизнь. #lore В городе [SCOPE.sCountry('atheist_country').GetCapital.GetCityHubName] церкви были лишены своих ценностей и закрыты. Повсюду сообщают о сожжении священных книг, и многие священнослужители...#!"
 notification_headlines_victoria_coronation_tooltip: "#header $notification_headlines_victoria_coronation_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_victoria_coronation_desc$"
 notification_headlines_victoria_coronation_name: "#b Коронация королевы Виктории #!"
 notification_headlines_victoria_coronation_desc: "На торжественной церемонии в Вестминстерском аббатстве в Лондоне, столице [SCOPE.sCountry('britain_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCharacter('queen_victoria').GetFirstName] [SCOPE.sCharacter('queen_victoria').GetLastName], в возрасте всего [SCOPE.sCharacter('queen_victoria').GetAge] лет, была официально коронована как #V #P Королева Соединённого Королевства Великобритании и Ирландии#!#!. #lore На глазах у тысяч людей корона медленно опустилась, и вся Британская империя, от Галифакса до Калькутты, от Лондона до Сиднея, праздновала коронацию нового монарха...#!"
 notification_headlines_victoria_funeral_tooltip: "#header $notification_headlines_victoria_funeral_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_victoria_funeral_desc$"
 notification_headlines_victoria_funeral_name: "#b Похороны королевы Виктории #!"
 notification_headlines_victoria_funeral_desc: "Королева Виктория скончалась, и [SCOPE.sCharacter('new_british_monarch').GetFirstName], её [SCOPE.sCharacter('new_british_monarch').GetPrimaryRoleTitle], унаследовал[SCOPE.sCharacter('new_british_monarch').GetAltNameNoFormatting('RU_CL_END_FEM')] престол. #lore На похороны королевы съехались видные деятели и аристократы со всей Европы. По всей Британской империи и её союзных государствах прошли специальные церемонии в память о конце эпохи...#!"
  #США
 notification_headlines_usa_declares_manifest_destiny_tooltip: "#header $notification_headlines_usa_declares_manifest_destiny_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_usa_declares_manifest_destiny_desc$"
 notification_headlines_usa_declares_manifest_destiny_name: "#b Явное предначертание! #!"
 notification_headlines_usa_declares_manifest_destiny_desc: "Вашингтон сегодня опубликовал официальное заявление, в котором подчёркивается, что [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')] предначертано расширить свои границы на весь североамериканский континент. #lore Правительственные чиновники, ссылаясь на «Явное предначертание», заявили, что это священный долг, возложенный историей на Соединённые Штаты, что вызвало бурную реакцию в стране и напряжённость в приграничных регионах...#!"
 notification_headlines_sbus_was_abolished_tooltip: "#header $notification_headlines_sbus_was_abolished_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_sbus_was_abolished_desc$"
 notification_headlines_sbus_was_abolished_name: "#b США приватизировали центральный банк #!"
 notification_headlines_sbus_was_abolished_desc: "Благодаря твёрдой позиции президента [SCOPE.sCharacter('usa_headlines_ruler').GetFirstName] [SCOPE.sCharacter('usa_headlines_ruler').GetLastName] Конгресс в итоге отклонил законопроект о продлении лицензии, и Второй банк Соединённых Штатов официально прекратил своё существование. #lore В своей речи президент осудил банк как «неизбранный орган аристократии» и заявил, что это решение «вернёт судьбу экономики в руки граждан», в то время как редакционные статьи нью-йоркских газет предупреждали о грядущем кредитном кризисе...#!"
 notification_headlines_civil_rights_victory_tooltip: "#header $notification_headlines_civil_rights_victory_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_civil_rights_victory_desc$"
 notification_headlines_civil_rights_victory_name: "#b Движение за гражданские права одержало победу в США #!"
 notification_headlines_civil_rights_victory_desc: "После многих лет борьбы и жертв со стороны афроамериканцев правительство [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')] наконец приняло всеобъемлющий закон о гражданских правах, положив конец системе расовой сегрегации и дискриминации. #lore Чернокожие вышли на улицы с плакатами, распевая песни о свободе; от южных церквей до монумента Вашингтону раздавались колокольный звон и радостные возгласы...#!"
 notification_headlines_us_uk_special_relations_tooltip: "#header $notification_headlines_us_uk_special_relations_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_us_uk_special_relations_desc$"
 notification_headlines_us_uk_special_relations_name: "#b Англо-американский союз #!"
 notification_headlines_us_uk_special_relations_desc: "После дипломатических переговоров в Ямайке между Лондоном и Вашингтоном, [SCOPE.sCountry('USA_scope').GetNameNoFlag] и [SCOPE.sCountry('GBR_scope').GetNameNoFlag] официально объявили о заключении двустороннего союза, что потрясло весь мир. #lore Это знаменует собой примирение после многолетних разногласий между Британской империей и Соединёнными Штатами Америки. Европейские страны выразили сильное беспокойство, а Германия заявила, что «внимательно следит за ситуацией». Руки бывшей метрополии и колонии снова крепко сжаты...#!"
 notification_headlines_treaty_of_peking_signed_now_tooltip: ""
  #Россия
 notification_headlines_treaty_of_peking_signed_now_name: "#b Подписан Пекинский трактат #!"
 notification_headlines_treaty_of_peking_signed_now_desc: "Санкт-Петербург и Пекин заключили договор, по которому правительство [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] официально уступило обширные территории на Дальнем Востоке [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_DP')], что привлекло внимание европейских держав. #lore Обширные земли на Дальнем Востоке официально перешли во владение России, открыв ворота в Китай. Санкт-Петербург празднует получение «выхода к Тихому океану», а царь называет это «Богом данными вратами на Восток». В Пекине же раздаются гневные крики о «потере суверенитета и унижении нации»...#!"
 notification_headlines_constantinople_conquerored_by_russians_tooltip: "#header $notification_headlines_constantinople_conquerored_by_russians_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_constantinople_conquerored_by_russians_desc$"
 notification_headlines_constantinople_conquerored_by_russians_name: "#b Константинополь наш! #!"
 notification_headlines_constantinople_conquerored_by_russians_desc: "Железная конница [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] ворвалась на Босфор, [SCOPE.sCountry('TUR_scope').GetNameNoFlag] оставил[SCOPE.sCountry('TUR_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] этот желанный для всего мира город, и Константинополь вновь в руках православных! #lore В соборе Святой Софии снова зазвонили колокола, минареты взорваны; царь [SCOPE.sCharacter('russian_scar_constanin').GetFirstName] [SCOPE.sCharacter('russian_scar_constanin').GetLastName] прибыл в Царьград. Европейские державы в шоке и панике, османский султан бежал в Анкару, а имперское влияние России достигло своего пика — тысячелетняя мечта о Риме стала явью...#!"
 notification_headlines_alexander_reform_start_tooltip: "#header $notification_headlines_alexander_reform_start_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_alexander_reform_start_desc$"
 notification_headlines_alexander_reform_start_name: "#b Коронация [SCOPE.sCharacter('russian_scar_refomer').GetFirstName] II #!"
 notification_headlines_alexander_reform_start_desc: "В ходе торжественной коронации в Санкт-Петербурге [SCOPE.sCharacter('russian_scar_refomer').GetFirstName] [SCOPE.sCharacter('russian_scar_refomer').GetLastName] официально взошёл на престол, став императором и самодержцем всея [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore В своей инаугурационной речи молодой царь пообещал «медленно, но верно вести империю в новую эру». Среди дворянства ходят слухи о его реформаторских наклонностях, а военные круги заняли выжидательную позицию...#!"
 notification_headlines_c_asia_conquerored_by_russians_tooltip: "#header $notification_headlines_c_asia_conquerored_by_russians_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_c_asia_conquerored_by_russians_desc$"
 notification_headlines_c_asia_conquerored_by_russians_name: "#b Россия подчиняет Среднюю Азию #!"
 notification_headlines_c_asia_conquerored_by_russians_desc: "Царские войска стремительно продвинулись вперёд, Кокандское ханство капитулировало, Бухара и Хива завоёваны — степи Средней Азии полностью перешли под контроль [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore После подписания последнего соглашения о капитуляции вся степь и горы оказались под тенью двуглавого орла. Колониальные чиновники в Индии срочно телеграфируют в Лондон, предупреждая Уайтхолл, что царь приближается к «горлу империи»...#!"
 notification_headlines_headlines_peter_instruction_victory_tooltip: "#header $notification_headlines_headlines_peter_instruction_victory_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_headlines_peter_instruction_victory_desc$"
 notification_headlines_headlines_peter_instruction_victory_name: "#b Мечта Петра Великого сбылась #!"
 notification_headlines_headlines_peter_instruction_victory_desc: "Россия достигла стратегических целей, предсказанных в легендарном завещании Петра Великого: выход к Средиземному морю, господство в Евразии. Великая [SCOPE.sCountry('RUS_scope').GetNameNoFlag] возвышается на вершине мира. #lore Царь взошёл на собор Василия Блаженного и, подняв завещание Петра Великого, провозгласил всему миру: «Миссия империи выполнена!» Вся империя ликует, православное духовенство возносит хвалу. Парижские газеты на первых полосах кричат: «Мы уже живём в русском веке!»#!"
 notification_headlines_rus_fra_alliance_tooltip: "#header $notification_headlines_rus_fra_alliance_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_rus_fra_alliance_desc$"
 notification_headlines_rus_fra_alliance_name: "#b Франко-русский союз #!"
 notification_headlines_rus_fra_alliance_desc: "Париж и Санкт-Петербург официально подписали двустороннее военное и дипломатическое соглашение, знаменующее историческое примирение двух великих держав. Тем не менее, учитывая напряжённую обстановку в Европе, для других держав это не стало сюрпризом. #lore Соглашение включает в себя совместную оборону, сотрудничество в области вооружений, обмен технологиями и инвестиционные соглашения. В официальном заявлении обеих стран говорится: «Союз заключён с целью поддержания мира и стабильности на континенте»...#!!"
 notification_headlines_ukriane_great_famine_news_tooltip: "#header $notification_headlines_ukriane_great_famine_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_ukriane_great_famine_news_desc$"
 notification_headlines_ukriane_great_famine_news_name: "#b Великий голод на Украине #!"
 notification_headlines_ukriane_great_famine_news_desc: "Из-за жестокой политики продразвёрстки, проводимой [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')], украинские равнины охватил беспрецедентный голод. Миллионы людей голодают, но советские власти хранят молчание. #lore Продовольственные квоты взимаются силой, сопротивляющихся расстреливают. Официальные СМИ празднуют «урожайный год», иностранных журналистов высылают, и лишь несколько тайно вывезенных фотографий показывают ужасающую картину. Эмигранты заявляют, что это искусственно созданная политическая чистка...#!"
  #Австрия
 notification_headlines_funeral_of_archduke_karl_tooltip: "#header $notification_headlines_funeral_of_archduke_karl_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_funeral_of_archduke_karl_desc$"
 notification_headlines_funeral_of_archduke_karl_name: "#b Скончался эрцгерцог Карл #!"
 notification_headlines_funeral_of_archduke_karl_desc: "Знаменитый фельдмаршал [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], эрцгерцог Карл, скончался вчера в Вене. Австрия устроила государственные похороны в честь героя. #lore Император Австрии лично присутствовал на похоронах и произнёс краткую речь в память о великом полководце, восхваляя его победу над Наполеоном в битве при Асперне и называя его величайшей фигурой эпохи Наполеоновских войн...#!"
 notification_headlines_aus_reich_start_to_reform_tooltip: "#header $notification_headlines_aus_reich_start_to_reform_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_aus_reich_start_to_reform_desc$"
 notification_headlines_aus_reich_start_to_reform_name: "#b Австрия становится двуединой монархией #!"
 notification_headlines_aus_reich_start_to_reform_desc: "Император [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('aus_kaiser_refomer').GetFirstName] [SCOPE.sCharacter('aus_kaiser_refomer').GetLastName] был официально коронован в Пеште как король Венгрии. Империя будет разделена на два равноправных государства, Австрию и Венгрию, с общим монархом, внешней политикой и армией. #lore В Вене и Пеште в один день были запущены фейерверки. Династия Габсбургов пытается усмирить национальные волнения путём разделения власти. Венская пресса называет это «перековкой империи», а газеты Пешта кричат о «победе венгерской нации»...#!"
 notification_headlines_wind_of_liberalism_happen_tooltip: "#header $notification_headlines_wind_of_liberalism_happen_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_wind_of_liberalism_happen_desc$"
 notification_headlines_wind_of_liberalism_happen_name: "#b Канцлер Австрии бежит из Вены #!"
 notification_headlines_wind_of_liberalism_happen_desc: "Вена охвачена всеобщими беспорядками, центр города захвачен революционными массами, а канцлер спешно бежал под покровом ночи. #lore Демонстрации, состоящие из студентов, рабочих и ветеранов, заполнили площадь перед Хофбургом. Анонимный высокопоставленный австрийский чиновник утверждает, что канцлер бежал в Прагу в женской одежде, в то время как император, давно покинувший столицу, отдал приказ о мобилизации имперской армии...#!"
 notification_headlines_aus_has_finish_fedration_reform_tooltip: "#header $notification_headlines_aus_has_finish_fedration_reform_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_aus_has_finish_fedration_reform_desc$"
 notification_headlines_aus_has_finish_fedration_reform_name: "#b Австрийская империя становится федерацией #!"
 notification_headlines_aus_has_finish_fedration_reform_desc: "Вена издала указ, согласно которому [SCOPE.sCountry('AUS_scope').GetNameNoFlag] будет реорганизован[SCOPE.sCountry('AUS_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] в «многонациональную федерацию». Народы получат автономию, парламенты и культурные права, а император [SCOPE.sCharacter('refomer_aus_kaiser').GetFirstName] [SCOPE.sCharacter('refomer_aus_kaiser').GetLastName] останется верховным главой государства. #lore Венгрия, Богемия, Галиция, Хорватия, Словения и другие земли сохранят политическую автономию в качестве «равноправных государств». Император в своей речи заявил: «Империя больше не является крепостью одного народа, а домом для всех наций»...#!"
 notification_headlines_dip_zweibund_trust_tooltip: "#header $notification_headlines_dip_zweibund_trust_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_dip_zweibund_trust_desc$"
 notification_headlines_dip_zweibund_trust_name: "#b Германо-австрийский союз #!"
 notification_headlines_dip_zweibund_trust_desc: "Берлин и Вена официально подписали военное и оборонительное соглашение, знаменующее собой первое официальное объединение двух великих германских держав, [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], со времён объединительных войн. #lore Канцлер Германии лично председательствовал на церемонии подписания, назвав это «братским союзом». Австрийский дипломат описал это как «союз стратегии и дружбы»...#!"
  #Германия/Пруссия
 notification_headlines_frankfurter_filter_tooltip: "#header $notification_headlines_frankfurter_filter_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_frankfurter_filter_desc$"
 notification_headlines_frankfurter_filter_name: "#b Созыв Франкфуртского национального собрания! #!"
 notification_headlines_frankfurter_filter_desc: "Сотни делегатов собрались в церкви Святого Павла во Франкфурте. Впервые в истории Германии официально открылся либеральный парламент Конфедерации, который поклялся заложить основу для национального единства и свободной конституции. #lore Делегаты из всех государств вошли в зал заседаний, профессора университетов, известные юристы и аристократические лидеры сидели бок о бок. Зал был украшен чёрно-красно-золотыми флагами, а в церкви звучала «Песнь немцев». Протестующие граждане и рабочие собрались с плакатами «Единство, справедливость и свобода». Вся Европа затаила дыхание в ожидании результатов этого собрания...#!"
 notification_headlines_deutsch_frankfurter_nationalversammlung_victory_news_tooltip: "#header $notification_headlines_deutsch_frankfurter_nationalversammlung_victory_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_deutsch_frankfurter_nationalversammlung_victory_news_desc$"
 notification_headlines_deutsch_frankfurter_nationalversammlung_victory_news_name: "#b Единство, справедливость и свобода #!"
 notification_headlines_deutsch_frankfurter_nationalversammlung_victory_news_desc: "После торжественной присяги в церкви Святого Павла, [SCOPE.sCharacter('deutsche_news_kaiser').GetFirstName] [SCOPE.sCharacter('deutsche_news_kaiser').GetLastName] был официально коронован как «император [SCOPE.sCountry('GER_scope').GetAltNameNoFlag('RU_CL_RP')]», получив императорскую корону от Франкфуртского национального собрания в Ахенском соборе. Мечта о национальном единстве Германии наконец осуществилась, потрясая Европу! #lore Тысячи людей ликовали у собора, высоко поднимая чёрно-красно-золотые флаги, и по всей Центральной Европе звучал один и тот же голос: «Единство, справедливость и свобода для немецкого Отечества!»#!"
 notification_headlines_deutsch_frankfurter_nationalversammlung_fail_news_tooltip: "#header $notification_headlines_deutsch_frankfurter_nationalversammlung_fail_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_deutsch_frankfurter_nationalversammlung_fail_news_desc$"
 notification_headlines_deutsch_frankfurter_nationalversammlung_fail_news_name: "#b Франкфуртское собрание распущено #!"
 notification_headlines_deutsch_frankfurter_nationalversammlung_fail_news_desc: "После месяцев тупика и отказа королевских дворов, депутаты в церкви Святого Павла наконец признали поражение и объявили о роспуске Национального собрания. Мечта о единстве рухнула. #lore Монархи германских держав отказались принять «корону из сточной канавы», и конституция не была признана ни одним из государств. Депутаты с тяжёлыми лицами молча встали на последнем заседании, многие плакали. Некоторые радикалы бежали за границу...#!"
 notification_headlines_deutsch_hochseeflotte_plab_declared_tooltip: "#header $notification_headlines_deutsch_hochseeflotte_plab_declared_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_deutsch_hochseeflotte_plab_declared_desc$"
 notification_headlines_deutsch_hochseeflotte_plab_declared_name: "#b План строительства Флота открытого моря? #!"
 notification_headlines_deutsch_hochseeflotte_plab_declared_desc: "Берлин официально принял военно-морской закон, объявив, что [SCOPE.sCountry('GER_scope').GetNameNoFlag] в течение следующих десяти лет построит океанский флот, способный бросить вызов любой великой державе. Мировая общественность потрясена, а Британская империя проявляет крайнюю настороженность. #lore Новый план включает строительство дредноутов, крейсеров и расширение заморских баз. Британский парламент созвал заседание, на котором премьер-министр предупредил, что «безопасность империи находится под прямой угрозой»...#!"
  #Британия
 notification_headlines_first_emp_meeting_news_happen_tooltip: "#header $notification_headlines_first_emp_meeting_news_happen_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_first_emp_meeting_news_happen_desc$"
 notification_headlines_first_emp_meeting_news_happen_name: "#b Первая имперская конференция? #!"
 notification_headlines_first_emp_meeting_news_happen_desc: "Лондон принял представителей со всех уголков империи, над которой никогда не заходит солнце. Официально открылась первая конференция высшего уровня в масштабах всей Британской империи, знаменуя начало эры консультативного управления. #lore Губернаторы и чиновники со всей Британской империи собрались в Вестминстере. Букингемский дворец был украшен флагами колоний, а улицы были ярко освещены. Некоторые назвали это «рассветом либерализации империи», в то время как другие заявили: «Это всего лишь позолоченная централизация»...#!"
 notification_headlines_act_of_westminister_news_tooltip: "#header $notification_headlines_act_of_westminister_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_act_of_westminister_news_desc$"
 notification_headlines_act_of_westminister_news_name: "#b Вестминстерский статут #!"
 notification_headlines_act_of_westminister_news_desc: "Монарх [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] официально подписал «Вестминстерский статут», признав Канаду, Австралию, Южную Африку и другие доминионы полностью равными метрополии в законодательном плане, что коренным образом изменило структуру империи. #lore В заявлении Уайтхолла говорилось: «Единство империи больше не основано на приказах, а на общем признании свободы». Интеллектуалы в других колониях внимательно следят за «принципом свободы», заложенным в этом акте...#!"
 notification_headlines_rise_of_imp_tooltip: "#header $notification_headlines_rise_of_imp_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_rise_of_imp_desc$"
 notification_headlines_rise_of_imp_name: "#b Восход Имперской Федерации #!"
 notification_headlines_rise_of_imp_desc: "В ответ на меняющуюся мировую обстановку, правительства Великобритании, Канады, Австралии и Южной Африки опубликовали совместное заявление, объявив о создании новой правительственной структуры — [SCOPE.sCountry('IMP_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore Этот шаг, несомненно, окажет беспрецедентное влияние на мировую ситуацию, и правительства всех стран внимательно следят за тем, что предпримут эти британцы, выигравшие главный приз в лотерее жизни...#!"
 notification_headlines_irish_great_famine_news_tooltip: "#header $notification_headlines_irish_great_famine_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_irish_great_famine_news_desc$"
 notification_headlines_irish_great_famine_news_name: "#b Великий голод в Ирландии #!"
 notification_headlines_irish_great_famine_news_desc: "Третий год подряд неурожай картофеля. Ирландская земля усеяна голодом, болезнями и смертью, весь остров в отчаянии, а помощь от правительства [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] так и не приходит. #lore От Корка до Голуэя на улицах лежат непогребённые тела, многие фермеры вынуждены покидать свои земли и отправляться на кораблях в Нью-Йорк и Галифакс, а официальные склады помощи пусты. Королева [SCOPE.sCharacter('king_of_ireland').GetFirstName] [SCOPE.sCharacter('king_of_ireland').GetLastName] объявила о пожертвовании 1000 фунтов...”#!"
 notification_headlines_rowing_of_united_kingdom_news_tooltip: "#header $notification_headlines_rowing_of_united_kingdom_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_rowing_of_united_kingdom_news_desc$"
 notification_headlines_rowing_of_united_kingdom_news_name: "#b Открытие регаты на Темзе #!"
 notification_headlines_rowing_of_united_kingdom_news_desc: "В солнечный день на западной окраине Лондона, на сверкающей Темзе, открылась первая регата, спонсируемая британской королевской семьёй. Команды Оксфорда и Кембриджа сошлись в первом же заезде. #lore Джентльмены и леди на берегу носили ленты цветов своих колледжей и держали в руках бинокли и бокалы с шампанским. Присутствовавший на соревнованиях наследный принц назвал это «символом джентльменского духа». В сумерках команда-победительница подняла бокалы, а оркестр на берегу заиграл «A Life on the Ocean Wave»...#!"
  #Китай
 notification_headlines_western_affairs_movement_news_tooltip: "#header $notification_headlines_western_affairs_movement_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_western_affairs_movement_news_desc$"
 notification_headlines_western_affairs_movement_news_name: "#b Движение за самоусиление: стремление к выживанию #!"
 notification_headlines_western_affairs_movement_news_desc: "Сын Неба [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('chi_western_affairs_emperor').GetFirstName] [SCOPE.sCharacter('chi_western_affairs_emperor').GetLastName] издал указ, разрешающий местным губернаторам «проводить эксперименты с западными делами», создавать в прибрежных и приречных районах ведомства для внедрения западной техники и вооружения, а также реорганизовывать оборону и промышленность с целью самоусиления. #lore Местные высокопоставленные чиновники начали основывать заводы и школы западного образца. В ответ на сомнения консерваторов, реформаторы заявили, что это «китайская сущность и западное применение», «изучение варварских технологий для борьбы с варварами»...#!"
 notification_headlines_xinhai_revolution_tooltip: "#header $notification_headlines_xinhai_revolution_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_xinhai_revolution_desc$"
 notification_headlines_xinhai_revolution_name: "#b Синьхайская революция #!"
 notification_headlines_xinhai_revolution_desc: "Выстрел в Учане потряс Китай, провинции одна за другой присоединялись к восстанию, цинский император отрёкся от престола, и многовековое правление династии Цин ушло в историю. #lore Тунмэнхой под руководством [SCOPE.sCharacter('xinhai_revolution_president').GetFirstName] [SCOPE.sCharacter('xinhai_revolution_president').GetLastName] поднял знамя «Трёх народных принципов», телеграммы призывали «изгнать маньчжуров, возродить Китай». Республиканское правительство издало указ о «срезании кос и смене летосчисления»...#!"
 notification_headlines_northern_expedition_news_tooltip: "#header $notification_headlines_northern_expedition_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_northern_expedition_news_desc$"
 notification_headlines_northern_expedition_news_name: "#b Национально-революционная армия идёт на север #!"
 notification_headlines_northern_expedition_news_desc: "Национально-революционная армия выступила из Гуанчжоу, нацелившись на территории, контролируемые бэйянскими милитаристами. Южные провинции одна за другой откликнулись на призыв, подняв новую волну патриотизма. #lore Лозунг «Долой империалистов, долой милитаристов!» разнёсся по всему Китаю. Куда бы ни приходила революционная армия под командованием [SCOPE.sCharacter('northern_expedition_president').GetFirstName] [SCOPE.sCharacter('northern_expedition_president').GetLastName], старые войска разбегались, а народ приветствовал их. Однако в тылу всё ещё зреют заговоры, и путь национальной революции долог...#!"
  #Франция
 notification_headlines_communaute_union_france_tooltip: "#header $notification_headlines_communaute_union_france_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_communaute_union_france_desc$"
 notification_headlines_communaute_union_france_name: "#b Федерализация Французской Африки #!"
 notification_headlines_communaute_union_france_desc: "[SCOPE.sCountry('FRA_scope').GetNameNoFlag] официально объявил[SCOPE.sCountry('FRA_scope').GetAltNameNoFormatting('RU_CL_END_FEM')] о реорганизации своих африканских колоний в «Французскую Африканскую Федерацию», обещая представительство, автономию и уважение к культуре. #lore В центрах Дакара, Абиджана и Бамако одновременно были подняты трёхцветные флаги, созданы местные ассамблеи, однако африканские интеллектуалы, стремящиеся к независимости, по-прежнему недовольны: «Федерация — лишь новое слово, колониализм никуда не делся»...#!"
 notification_headlines_partant_pour_la_syrie_news_tooltip: "#header $notification_headlines_partant_pour_la_syrie_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_partant_pour_la_syrie_news_desc$"
 notification_headlines_partant_pour_la_syrie_news_name: "#b Отправляясь в Сирию #!"
 notification_headlines_partant_pour_la_syrie_news_desc: "Экспедиционный корпус [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] высадился в Бейруте и под предлогом «содействия мандату и поддержания порядка» официально взял под свой контроль бывшие османские территории Сирии и Ливана. В Дамаске вспыхнули массовые протесты. #lore Париж заявил, что этот шаг «отвечает потребностям мира и цивилизации». В ответ на протесты Франция направила Иностранный легион для введения комендантского часа в крупных городах и разогнала арабские демонстрации с помощью оружия...#!"
 notification_headlines_entente_cordiale_headline_tooltip: "#header $notification_headlines_entente_cordiale_headline_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_entente_cordiale_headline_desc$"
 notification_headlines_entente_cordiale_headline_name: "#b  Англо-французское соглашение подписано #!"
 notification_headlines_entente_cordiale_headline_desc: "Министр иностранных дел [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] и министр иностранных дел [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] вчера подписали соглашение о примирении под названием «Сердечное согласие». #lore Это соглашение получило широкую поддержку французского правительства. Париж считает, что этот шаг поможет получить больше поддержки в случае войны с новыми державами на европейском континенте...#!"
 notification_headlines_paris_commune_news_tooltip: "#header $notification_headlines_paris_commune_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_paris_commune_news_desc$"
 notification_headlines_paris_commune_news_name: "#b  Парижская коммуна! #!"
 notification_headlines_paris_commune_news_desc: "Широкомасштабные рабочие восстания в конечном итоге привели к революции. Сегодня рабочий класс и революционеры Парижа объявили о создании [SCOPE.sCountry('PRC_scope').GetAltNameNoFlag('RU_CL_RP')], что вызвало ожесточённый конфликт внутри [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')]. #lore Правительство национальной обороны бросило большие силы на подавление восстания, стремясь восстановить контроль над Парижем, и постепенно приближается к Версалю...#!"
 notification_headlines_napoleonic_wars_news_tooltip: "#header $notification_headlines_napoleonic_wars_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_napoleonic_wars_news_desc$"
 notification_headlines_napoleonic_wars_news_name: "#b  Восьмая коалиция #!"
 notification_headlines_napoleonic_wars_news_desc: "Экспансия [SCOPE.sCharacter('little_napoleon_scope').GetFirstName] [SCOPE.sCharacter('little_napoleon_scope').GetLastName] быстро вызвала цепную реакцию. Из страха перед Бонапартом европейские страны объявили о создании Восьмой коалиции, поклявшись снова отправить императора Бонапарта на остров Святой Елены. #lore Перед лицом амбиций Наполеона тучи тотальной войны вновь сгустились над европейским континентом, и мировая политическая обстановка, возможно, снова претерпит кардинальные изменения...#!"
  #Индия
 notification_headlines_unified_subcontinent_news_tooltip: "#header $notification_headlines_unified_subcontinent_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_unified_subcontinent_news_desc$"
 notification_headlines_unified_subcontinent_news_name: "#b Колониальное правительство завоевало субконтинент #!"
 notification_headlines_unified_subcontinent_news_desc: "Колониальная армия [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] за несколько лет захватила Лахор, оккупировала Синд, завоевала княжества Раджастхана. Последние независимые силы на Индийском субконтиненте были полностью подавлены, и имперская власть распространилась на весь Индийский субконтинент. #lore Колониальное правительство объявило о создании гарнизонных округов по всей стране, железные дороги были проложены до Пешавара, карта субконтинента была перекроена, и он стал поистине «жемчужиной в короне»...#!"
 notification_headlines_sepoy_mutiny_news_tooltip: "#header $notification_headlines_sepoy_mutiny_news_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_sepoy_mutiny_news_desc$"
 notification_headlines_sepoy_mutiny_news_name: "#b Великое восстание сипаев #!"
 notification_headlines_sepoy_mutiny_news_desc: "Первый выстрел прозвучал на посту в Мератхе. Индийские солдаты в британской колониальной армии подняли восстание, и массовый мятеж охватил всю Индию. Положение [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] стало нестабильным. #lore Дели, Канпур, Лакхнау и другие города пали один за другим, последний император династии Великих Моголов был провозглашён номинальным лидером; в Калькутте резиденция генерал-губернатора объявила военное положение и запросила подкрепление из Лондона...#!"
 notification_headlines_indian_home_rule_tooltip: "#header $notification_headlines_indian_home_rule_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_indian_home_rule_desc$"
 notification_headlines_indian_home_rule_name: "#b Индия объявляет о самоуправлении #!"
 notification_headlines_indian_home_rule_desc: "Британское правительство и представители Индийского национального конгресса [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] подписали в Лондоне соглашение о самоуправлении. Индия официально получила автономию в рамках империи, с созданием выборного парламента и местных органов власти. #lore После многих лет диалога и протестов колониальное правительство наконец признало «законное стремление индийского народа к самоуправлению». Индийский национальный конгресс объявил это «победой стремления индийского народа к свободе». Газета «Таймс» назвала это «успехом либерализма»...#!"
 notification_headlines_bic_indepedence_become_bht_tooltip: "#header $notification_headlines_bic_indepedence_become_bht_name$#!\n$TOOLTIP_DELIMITER$\n$notification_headlines_bic_indepedence_become_bht_desc$"
 notification_headlines_bic_indepedence_become_bht_name: "#b Индия независима! #!"
 notification_headlines_bic_indepedence_become_bht_desc: "На митинге перед Красным фортом в Дели представители Соединённого Королевства и [SCOPE.sCountry('BHT_scope').GetAltNameNoFlag('RU_CL_RP')] подписали окончательное соглашение, провозгласив мирную независимость «жемчужины в короне» и положив конец колониальной эпохе в Индии. #lore Последний вице-король и временный премьер-министр подняли бокалы на торжественном ужине, а лидеры движения за независимость с улыбками входили в зал. Благодаря борьбе без кровопролития народы субконтинента впервые за тысячу лет обрели своё собственное, единое индийское государство.#!"