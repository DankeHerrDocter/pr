l_russian:
  #
 ig_trait_frs: "Королевское общество"
 ig_trait_frs_desc: "Наши исследования в области натурфилософии — лучшие в мире, и всё это благодаря выдающимся членам Королевского общества. Величайшие учёные умы со всех уголков Британской империи собираются в Лондоне, чтобы через гипотезы и эксперименты постигать истину мира. Дух науки — не верить никому на слово, а доверять лишь данным и проверке!"
 ig_trait_godrights: "Права, данные Богом"
 ig_trait_godrights_desc: "Единственный смысл закона и морали — защищать священные права и свободы граждан. Мы никогда не признаем, что кто-то рождён выше нас. В этом мире никто, кроме Бога, не имеет права посягать на свободу другого. На небе — Бог, у нас — права!"
 ig_trait_journalist: "Некоронованные короли"
 ig_trait_journalist_desc: "Проклятые бюрократы с Уайтхолла и твердолобые болваны из парламента, похоже, не принимают наше мнение всерьёз. Они думают, что раз нас мало, нас легко запугать? Что ж, давайте раскопаем все их глупости, опубликуем в газетах и покажем всему миру, насколько коррумпировано и некомпетентно это правительство."
 ig_trait_heart_of_oak: "Сердце дуба"
 ig_trait_heart_of_oak_desc: "Британия победила, её линкоры правят морями! Её девиз — «Справедливость», её слава — «Свобода»! Так воспряньте духом, парни, и давайте вместе споём: Боже, храни наших солдат и матросов, а также наших парламентариев и короля!"
 ig_trait_do_his_duty: "Исполнять свой долг"
 ig_trait_do_his_duty_desc: "За несколько веков мы завоевали почти весь мир, от Дальнего Востока до Северной Америки — все склонились перед нашей мощью. И эти достижения стали возможны благодаря чести и дисциплине нашей армии. Истинно любящие свою страну солдаты всегда верны присяге служить империи. Англия ждёт, что каждый исполнит свой долг!"
 ig_trait_refuse_imperialism: "Антиимпериализм"
 ig_trait_refuse_imperialism_desc: "Мы — цивилизованная нация и должны нести моральную ответственность за нецивилизованные народы по всему миру. Однако нынешнее правительство, очевидно, не осознаёт этого и увлечено несправедливым империализмом. Возможно, мы не можем ослушаться их военных приказов, но мы всё же можем поступать по совести."
 ig_trait_textile_monopoly: "Текстильная монополия"
 ig_trait_textile_monopoly_desc: "Текстильная промышленность — гордость нашей страны. Непрерывный экспорт текстиля прославил наших трудолюбивых рабочих и передовые технологии на весь мир, обеспечив нам неоспоримую монополию. Это визитная карточка Британии. Правительство понимает важность текстиля для страны и помогает предприятиям поддерживать и расширять их текстильные империи. Раз перспективы так радужны, почему бы нам не приложить все усилия для этого?"
 ig_trait_free_trade_policy: "Свободная торговля"
 ig_trait_free_trade_policy_desc: "Некоторые осуждают демпинг в торговле с другими странами как аморальный. Я же спрошу их: кто вы такие, чтобы мешать свободной торговле и свободному выбору потребителей? Где есть спрос, там мы и предлагаем. Если не мы, то другие страны наживутся на их рыночном спросе. Неужели каждая наша семья должна быть лишена богатства, которое приносит свободная торговля?"
 ig_trait_technological_laziness: "Технологическая леность"
 ig_trait_technological_laziness_desc: "Мы — колыбель промышленной революции, родина современной цивилизации. Наших блестящих достижений и передовых технологий уже достаточно, чтобы укрепить наше нынешнее беспрецедентное процветание. Зачем нам утруждать себя изучением так называемых «новинок», предложенных какими-то неизвестными, которые и в подмётки нам не годятся?"
 ig_trait_land_deeds: "Земельные грамоты"
 ig_trait_land_deeds_desc: "Жадные горожане вечно пытаются запустить свои когти в нашу простую деревню, мечтая превратить прекрасное голубое небо в такое же уродливое, как у них, затянутое густым дымом. Это просто смешно! Великобритания — страна законов. Не думайте, что сможете угрозами и подкупом отнять у нас частные земли, унаследованные от предков."
 ig_trait_workers_community: "Рабочие общины"
 ig_trait_workers_community_desc: "Задача профсоюзов — объединять разрозненных рабочих, чтобы эти честные люди могли помогать друг другу и трудиться сообща. Через общины и профсоюзы мы можем не только увеличить производство, но и создать места, где дети рабочих смогут получить начальное образование и стремиться к лучшему будущему."
 ig_trait_labor_value: "Трудовая стоимость"
 ig_trait_labor_value_desc: "Сколь бы ни был велик капитал промышленников и сколь бы ни были совершенны технологии учёных, без усердного труда рабочих всё экономическое процветание — лишь мыльный пузырь. Наше существование — источник всякого богатства. Именно наш труд создаёт стоимость продуктов, и поэтому общество обязано обеспечить даже самых низкооплачиваемых рабочих возможностью наслаждаться плодами своего труда, получать достойную плату и жить в достатке."
 ig_trait_parish_sermons: "Оправдание верой"
 ig_trait_parish_sermons_desc: "Что пользы, братия мои, если кто говорит, что он имеет веру, а дел не имеет? может ли эта вера спасти его? Если брат или сестра наги и не имеют дневного пропитания, а кто-нибудь из вас скажет им: «идите с миром, грейтесь и питайтесь», но не даст им потребного для тела: что пользы? Так и вера, если не имеет дел, мертва сама по себе."
 ig_trait_divine_crown: "Божественное право короны"
 ig_trait_divine_crown_desc: "Монарх торжественно обещает и клянётся перед Богом, что будет править народами Англии в соответствии с их законами и обычаями; будет по мере сил своих творить суд и правду с милосердием; будет всеми силами поддерживать законы Божьи и истинную веру Евангелия. Мы верим в обещание монарха и будем поддерживать его правление, чтобы оно стало более великим, чем у любого из его предков!"
 ig_trait_focus_priesthood: "Сосредоточение на пастырстве"
 ig_trait_focus_priesthood_desc: "Мы — храм Господень, и наш долг — служить Ему, а не заниматься общественными делами. Церковь — раздатчик не хлеба, а спасения. Бедным нужны исповедь и молитва, а не протесты на наших улицах!"
  #Франция
 ig_trait_citizen_salon: "Гражданский салон"
 ig_trait_citizen_salon_desc: "Участие в политической жизни страны — наш гражданский долг. Как носители суверенитета, мы обязаны отдать свой талант и верность нашей великой родине-матери. Хотя правительство не может учесть все аспекты управления, через созданные нами политические объединения правящим будет легче услышать наш голос."
 ig_trait_romanticism: "Романтизм"
 ig_trait_romanticism_desc: "В этике, политике и эстетике искренность в стремлении к внутренним целям — это самое важное. Это относится как к отдельным личностям, так и к группам — нациям, народам, движениям. Наши художники пытаются передать этот идеальный образ на холсте или в звуке. Сколько бы недостатков в этом ни было, они искупаются страстной верой в духовную свободу и романтическое творчество."
 ig_trait_defamation_expert: "Эксперты по клевете"
 ig_trait_defamation_expert_desc: "Клеветать на любую политику правительства — наш прямой долг. Правительство — всего лишь слуга, управляющий страной от нашего имени. Неужели мы не можем его немного поругать? Словесная критика — это проявление нашего патриотизма, и кто сможет это оспорить?"
 ig_trait_advanced_finance: "Высокие финансы"
 ig_trait_advanced_finance_desc: "Финансовые игры с облигациями и акциями — вот наш путь к прибыли. Выдача кредитов и инвестиции выгодны не только нашей великой стране, но и приумножают наше богатство. В континентальной финансовой игре побеждает тот, кто наносит удар первым, и мы намерены стать победителями."
 ig_trait_revolution: "Революционный авангард"
 ig_trait_revolution_desc: "Вперёд, сыны отечества, день славы настал! Против нас поднят кровавый флаг тирании! К оружию, граждане, стройтесь в батальоны! Трепещите, тираны и вы, предатели, позор всех партий! Вперёд! Вперёд! Пусть нечистая кровь пропитает наши поля!"
 ig_trait_daughter_of_god: "Старшая дочь Церкви"
 ig_trait_daughter_of_god_desc: "Наши связи с Католической церковью в Риме с древних времён не были такими тесными, как у других стран. На самом деле, наша власть в решении вопросов о епархиях внутри страны даже превосходит авторитет Его Святейшества Папы. Для наших священников первостепенная задача — служить радости верующих и политике правительства."
 ig_trait_secularism: "Секуляризм"
 ig_trait_secularism_desc: "Старые порядки давно прошли. Хотя католицизм всегда был стержнем французской культуры, мы должны признать, что отношение людей к религии в новую эпоху сильно изменилось. Пора добровольно уступить место и заняться чем-то более практичным."
 ig_trait_moral_blasphemy: "Моральное кощунство"
 ig_trait_moral_blasphemy_desc: "Посмотрите, во что превратилось это общество! Традиционные ценности, которым следовали старшие поколения, пришли в упадок, упорядоченного общества больше нет, люди с презрением относятся даже к духовным добродетелям, которыми когда-то гордилась наша страна! Вместо того чтобы потакать этим негодяям, лучше попытаться научить следующее поколение истинной морали."
 ig_trait_farmers_allies: "Союз фермеров"
 ig_trait_farmers_allies_desc: "Все фермеры страны должны объединиться. Хотя мы, возможно, и не обладаем таким же влиянием, как профсоюзы, эта организация всё же может координировать действия и сокращать убытки, вызванные плохой коммуникацией, чтобы стабилизировать доходы от продажи продукции на рынке, что, в свою очередь, принесёт пользу нашей стране."
 ig_trait_bordeaux_wine: "Виноградники"
 ig_trait_bordeaux_wine_desc: "Лучшие вина мира производятся на наших землях. От огромного количества повседневных столовых вин до самых дорогих и престижных элитных вин из лучших шато Бордо и Лангедока — ничто не пользуется таким признанием на мировом рынке, как марка наших виноделен."
 ig_trait_against_imports: "Спекуляция ценами"
 ig_trait_against_imports_desc: "С какой стати мы должны платить за так называемое «дешёвое зерно» других? Пока правительство не возместит наши убытки, мы не будем подчиняться никаким приказам об ограничении цен, которые ущемляют наши интересы."
 ig_trait_grand_army: "Великая армия"
 ig_trait_grand_army_desc: "Великая армия, созданная в эпоху Наполеоновских войн, была самой мощной и многочисленной военной силой в истории нашей страны. Хотя её уже нет, её слава по-прежнему вдохновляет наш народ, и они встанут на защиту родины, когда это потребуется. От северных границ до южных — мы либо победим, либо умрём!"
  #/
 ig_trait_leopoldina: "Национальная академия наук"
 ig_trait_leopoldina_desc: "Мы — поэты и профессора, мы — рациональный мозг нации. В Берлине, Гёттингене, Лейпциге, Йене... в академиях и на кафедрах, финансируемых государством, мы создали новое учреждение — храм науки, объединяющий натурфилософию с астрономией и географией. Цель исследований — не накопление знаний, а постижение мироздания, раскрытие внутренних связей в природе. И это — наша цель."
 ig_trait_rationalismus: "Рационализм"
 ig_trait_rationalismus_desc: "Две вещи наполняют душу всегда новым и всё более сильным удивлением и благоговением, чем чаще и продолжительнее мы размышляем о них, — это звёздное небо надо мной и моральный закон во мне. И то и другое мне нет надобности искать или только предполагать как нечто окутанное мраком или лежащее за пределами моего кругозора; я вижу их перед собой и непосредственно связываю их с сознанием своего существования."
 ig_trait_revolutionsfuhrer: "Вожди революции"
 ig_trait_revolutionsfuhrer_desc: "Мы спорили шёпотом на кафедрах, пытались убеждать в газетах, но правительство нас не слушало. И тогда мы вышли на улицы, подняли знамёна и прекратили споры. К свободе нет иного пути, кроме как через кровь, ибо не тиран боится смерти, а раб боится жить!"
 ig_trait_reactionary_enthusiasm: "Реакционный энтузиазм"
 ig_trait_reactionary_enthusiasm_desc: "Эта страна — страна юнкеров. И раз уж нынешнее правительство осмеливается так противиться воле нашего дворянства, мы покажем им последствия."
 ig_trait_offizierskorps: "Юнкерский офицерский корпус"
 ig_trait_offizierskorps_desc: "Прусский офицерский корпус традиционно состоит из хорошо обученных юнкеров-дворян, и звания передаются по наследству. Мы — ядро эффективной военной машины государства, и наши качества намного превосходят качества офицеров других стран. Пока правительство будет верным интересам юнкерства, мы клянёмся кровью и верностью вести родину от победы к победе."
 ig_trait_army_hasastate: "Армия, владеющая государством"
 ig_trait_army_hasastate_desc: "У других государств есть армия, а у нас армия имеет государство."
 ig_trait_ironcross: "Железный крест"
 ig_trait_ironcross_desc: "Железный крест, вручаемый с 1813 года, — высшая честь для нашего солдата, символ нашей крови, верности, заслуг и стальной дисциплины. Все солдаты стремятся получить Железный крест как высшую цель своей службы. Эта награда всегда вдохновляет нас сражаться за интересы родины."
 ig_trait_shadow_government: "Теневое правительство"
 ig_trait_shadow_government_desc: "На самом деле, гражданское правительство в столице ничего не решает в нашей стране. Если они не заручатся верностью нашей армии, то все так называемые законы и политика останутся пустым звуком. Генеральный штаб — вот настоящий кабинет министров. Всё в этой стране должно служить в первую очередь интересам армии."
 ig_trait_made_in_germany: "Сделано в Германии"
 ig_trait_made_in_germany_desc: "Немецкие промышленные товары ни в коем случае не должны быть синонимом низкого качества и дешевизны. «Сделано в Германии» должно стать знаком качества, отражающим дух мастерства нашей нации, и даже самым авторитетным знаком происхождения в мире. И мы приложим все усилия — даже в ущерб прибыли и издержкам — чтобы этого добиться."
 ig_trait_national_enterprise: "Национальное предприятие"
 ig_trait_national_enterprise_desc: "Наши предприятия тесно связаны с интересами государства. Правительство предоставляет нам льготы и субсидии, а мы отвечаем налогами и прибылью. Пока правительство поддерживает с нами эти тесные отношения, мы всегда будем рады служить не только своим интересам, но и интересам всего общества."
 ig_trait_social_justice: "Социальная справедливость"
 ig_trait_social_justice_desc: "Рабочий должен, в первую очередь, получать обращение, соответствующее его труду, и только потом могут быть равные отношения. Мы с энтузиазмом верим, что родина построит справедливую систему сотрудничества в обществе и на заводах, и со временем эта система будет передаваться из поколения в поколение."
 ig_trait_rigorous_work: "Добросовестный труд"
 ig_trait_rigorous_work_desc: "Неважно, какой работой мы занимаемся, мы всегда подходим к ней серьёзно и скрупулёзно. Может, у нас и нет передаваемых по наследству секретов мастерства, и, возможно, мы не достигаем совершенства, но мы всегда вкладываем всю душу, чтобы создать продукт, которым можно гордиться."
 ig_trait_organize_strike: "Забастовка"
 ig_trait_organize_strike_desc: "Забастовка — самое мощное оружие рабочего класса. Если работодатели не платят нам достойную зарплату за наш труд, мы объединимся и откажемся работать, чтобы эти высокомерные владельцы предприятий увидели силу наших профсоюзов."
 ig_trait_deutsche_nationale_identitat: "Немецкая национальная идентичность"
 ig_trait_deutsche_nationale_identitat_desc: "Германия, Германия превыше всего, превыше всего на свете! Когда для защиты и обороны по-братски мы стоим вместе! Единство, право и свобода для немецкой отчизны!"
 ig_trait_geist_der_exzellenz: "Дух превосходства"
 ig_trait_geist_der_exzellenz_desc: "Мы живём в эпоху беспрецедентных возможностей: если у вас есть амбиции и интеллект, вы можете преуспеть в любой выбранной вами области, независимо от происхождения. Нам нужно найти своё место, понимать, когда менять направление, и оставаться вовлечёнными и эффективными на протяжении всей своей долгой трудовой жизни."
  #Россия
 ig_trait_third_and_last_rome: "Третий Рим"
 ig_trait_third_and_last_rome_desc: "И видел я иного Ангела, восходящего от востока солнца и имеющего печать Бога живаго... это те, которые пришли от великой скорби; они омыли одежды свои и убелили одежды свои Кровию Агнца; за это они пребывают ныне перед престолом Бога и служат Ему день и ночь."
 ig_trait_icon_in_the_snow: "Икона на снегу"
 ig_trait_icon_in_the_snow_desc: "Господь — Пастырь мой; я ни в чём не буду нуждаться... Если я пойду и долиною смертной тени, не убоюсь зла, потому что Ты со мной... Ты приготовил предо мною трапезу в виду врагов моих; умастил елеем голову мою; чаша моя преисполнена. Так, благость и милость да сопровождают меня во все дни жизни моей, и я пребуду в доме Господнем многие дни."
 ig_trait_fire_upon: "Возносящееся пламя"
 ig_trait_fire_upon_desc: "И отошла Слава Господа от порога дома... И сказал мне Господь: сын человеческий! видишь ли ты? мало ли дому Иудину, чтобы делать такие мерзости, какие они делают здесь, чтобы Я удалился от святилища Моего?.. Вот, Я пошлю на них огонь, и он пожрёт города их!"
 ig_trait_war_frenzy: "Жажда экспансии"
 ig_trait_war_frenzy_desc: "Наши земли простираются через весь континент, от восхода до заката, и никакие границы не смогут сдержать наши амбиции. Всё принадлежит матушке-России!"
 ig_trait_register_for_army: "Воинский учёт"
 ig_trait_register_for_army_desc: "Каждый в России обязан ежегодно проходить воинский учёт и военную подготовку. Эти меры необходимы, чтобы наша великая армия могла быть быстро увеличена в любой момент. По первому же приказу мы сможем призвать на поле боя каждого мужчину нашей родины, способного держать оружие!"
 ig_trait_gray_cattle: "Серое быдло"
 ig_trait_gray_cattle_desc: "В этой тёмной стране нас, сражающихся на передовой, те, кто считает себя изящным и благородным, часто презрительно называют «серым быдлом». Раз эти вельможи и офицеры не считают нас за людей, то и мы не обязаны верно исполнять их приказы."
 ig_trait_owner_of_land: "Землевладельцы"
 ig_trait_owner_of_land_desc: "Наше богатство — это наши наследственные поместья. Эти земли дают нам огромную власть, и что бы мы ни решили, правительство вынуждено будет прислушаться. Однако, если доходы позволяют, мы обязаны щедро вкладываться в процветание страны, что, к тому же, станет отличной инвестицией."
 ig_trait_adm_expert: "Отец-батюшка"
 ig_trait_adm_expert_desc: "Наш великий лидер — отец-батюшка для всех народов России, и его авторитет и законы распространяются на всю страну благодаря нам. Стоит ему лишь взмахнуть скипетром и отдать приказ, и мы беспрекословно его исполним."
 ig_trait_master_of_city: "Хозяева города"
 ig_trait_master_of_city_desc: "Эти здания и заводы в городе сначала наши, потом государственные, и только потом — чьи-то ещё. Некоторые говорят, что наши города уступают многим европейским, но это ненадолго, потому что мы постоянно делаем их красивее и чище."
 ig_trait_rus_westernlism: "Западничество"
 ig_trait_rus_westernlism_desc: "Посмотрите на этот стремительно меняющийся мир! Нельзя отрицать, что наша родина во многом отстала от тех стран, что быстро развиваются. Но у нас всё ещё есть много возможностей догнать остальных, если только нам позволят приложить для этого усилия."
 ig_trait_spread_of_dissent: "Распространение инакомыслия"
 ig_trait_spread_of_dissent_desc: "Посмотрите, кто сейчас в правительстве! Глупые старые бюрократы, прогнившие лидеры, они в сговоре с жадными вельможами губят родину! Мы не обязаны петь дифирамбы этим ублюдкам, мы заставим их убраться!"
 ig_trait_worker_soviet: "Совет"
 ig_trait_worker_soviet_desc: "В наших рабочих советах, организованных нами самими, управление осуществляется комитетом через временных и в любой момент сменяемых делегатов, избираемых рабочими. Через советы рабочие могут сами определять свой рабочий график и потребности, а также уполномочивать временных делегатов устанавливать рабочий план и следить за его выполнением, чтобы повысить трудовой энтузиазм и производительность."
 ig_trait_worker_forces: "Рабочая гвардия"
 ig_trait_worker_forces_desc: "Если правительство признает право рабочих на свои вооружённые формирования, то они смогут не только защищать заводы, на которых мы работаем, но и в нужный момент подняться на защиту нашей родины."
 ig_trait_worker_revolution: "Вооружённая революция"
 ig_trait_worker_revolution_desc: "Вставай, проклятьем заклеймённый, весь мир голодных и рабов! Кипит наш разум возмущённый и в смертный бой идти готов. Весь мир насилья мы разрушим до основанья, а затем... мы наш, мы новый мир построим, — кто был ничем, тот станет всем!"
 ig_trait_gods_chosen_people: "Национальный характер"
 ig_trait_gods_chosen_people_desc: "Наш долг — обеспечить, чтобы мы могли трудиться в общем духе нации, в соответствии с высочайшей волей нашего благородного лидера. Каждый крестьянин на русской земле, с общей преданностью к лидеру и родине, сделает всё возможное, чтобы стать надёжным помощником правительства и заслужить его полное доверие."
 ig_trait_endure_suffering: "Терпение страданий"
 ig_trait_endure_suffering_desc: "Но вы — род избранный, царственное священство, народ святой, люди, взятые в удел, дабы возвещать совершенства Призвавшего вас из тьмы в чудный Свой свет; некогда не народ, а ныне народ Божий; некогда непомилованные, а ныне помилованы."
 ig_trait_burden_of_mission: "Бремя миссии"
 ig_trait_burden_of_mission_desc: "История не требует от нас прощения, но мы должны простить самих себя: за то, что мы выбрали остаться, чтобы завершить то, чего никто не желал делать, ради самой искренней матушки-России."
 ig_trait_mediating_reformers: "Посредники-реформаторы"
 ig_trait_mediating_reformers_desc: "В нашей стране, опирающейся на огромный бюрократический аппарат и тёмную церковь, народ в большинстве своём неграмотен, он не может ни выразить, ни по-настоящему защитить свои интересы. Мы — единственные, кто может превратить идеи в решения социальных проблем. Мы должны и обязаны вести великую Россию к переменам."
  #США
 ig_trait_philanthropy: "Филантропия"
 ig_trait_philanthropy_desc: "Зарабатывай сколько можешь, сберегай сколько можешь, отдавай сколько можешь. Наше богатство уже давно превзошло богатство обычных людей, и для нас это огромные, неисчерпаемые средства. Раз так, почему бы нам не пожертвовать часть нашего состояния на исследования и помощь нуждающимся, чтобы внести свой вклад в общество?"
 ig_trait_innovative_spirit: "Инновационный дух"
 ig_trait_innovative_spirit_desc: "В Соединённых Штатах наша страсть к технологическим инновациям намного превосходит любую другую. Технологии — это продукты, а продукты — это прибыль! Мы с радостью платим изобретателям, потому что они всегда приносят нам ещё больше прибыли, не так ли?"
 ig_trait_legal_monopoly: "Законная монополия"
 ig_trait_legal_monopoly_desc: "Наша страна — свободная страна, и кто сможет найти законные основания, чтобы утверждать, что наши честно работающие предприятия являются монополией или незаконны? Мы всего лишь достигли некоторого незначительного масштаба благодаря упорному труду. Не пытайтесь опорочить нашу честность!"
 ig_trait_loyalty_to_constitution: "Сыны свободы"
 ig_trait_loyalty_to_constitution_desc: "Вооружённые граждане — опора свободного государства. Свободный человек стоек перед лицом невзгод, и единственный гарант его прав — сам народ. Просвещённого и вооружённого гражданина не поработить никакому правительству. Сыны свободы, восстаньте с полей на защиту земли, которую возделываете!"
 ig_trait_sea_power: "Морская мощь"
 ig_trait_sea_power_desc: "Если наша страна сможет полностью контролировать открытое море, она сможет контролировать богатство мира и, следовательно, весь мир. Поэтому, если мы хотим стать мировой державой, у нас должен быть хорошо оснащённый и обученный военно-морской флот с базами по всему миру и поддержкой огромного торгового флота. И это — долг нашей армии."
 ig_trait_enemies_in_congress: "Враг на Капитолийском холме"
 ig_trait_enemies_in_congress_desc: "Почему господа из Конгресса вечно сомневаются в верности стране нас, пылких и честных солдат?! Почему Конгресс всегда отклоняет все наши необходимые и надёжные требования?! Мы проливаем кровь на передовой, а настоящие препятствия нашему служению родине создают эти проклятые конгрессмены!"
 ig_trait_frontier_pioneers: "Пионеры фронтира"
 ig_trait_frontier_pioneers_desc: "Это великая эпоха освоения нашей страны. Западный фронтир таит в себе безграничные богатства и возможности, и каждый, кто отправится его осваивать, может стать миллионером. На Запад, молодые люди, на свободный фронтир!"
 ig_trait_master_of_farm: "Хозяева ферм"
 ig_trait_master_of_farm_desc: "У нас огромные земли и фермы. Это наша собственность, мы живём за счёт них и богатеем. Раз государство преданно защищает нашу частную собственность, мы можем спокойно управлять этими землями, чтобы они процветали и передавались по наследству вместе с нами."
 ig_trait_racism: "Расизм"
 ig_trait_racism_desc: "С какой стати эти надоедливые негры живут с нами в одной стране? Эта страна — наша страна, а не страна этих негров. Пусть убираются туда, откуда пришли!"
 ig_trait_humanity_beacon: "Светоч свободы"
 ig_trait_humanity_beacon_desc: "О, скажи, видишь ты в первых зари лучах, что средь битвы мы так приветствовали? В синеве его звёзды и в алых полосах, сквозь огонь и дым нам всем предшествовал! Ты скажи, он и ныне реет над нами, флаг, повитый славой, венчанный мечтами? О, да! Звёздный стяг всегда будет веять над землёй свободных и домом храбрых!"
 ig_trait_freedom_of_speech: "Свобода слова"
 ig_trait_freedom_of_speech_desc: "Конституция даёт нам свободу знать и говорить, свободно спорить по совести, потому что свободное выражение мыслей и мнений — одно из самых драгоценных прав человека. В нашей стране каждый гражданин может свободно говорить, писать и публиковать: свобода — это думать, что хочешь, и говорить, что думаешь!"
 ig_trait_tyranny_of_majority: "Тирания большинства"
 ig_trait_tyranny_of_majority_desc: "Народ склонен к деспотизму, и большинство всегда и без исключения лишает меньшинство его прав. Права личности должны стоять выше прав группы и быть единственным благородным моральным принципом нашего общества, который не подлежит компромиссу ради вступления в какую-либо группу или подчинения какому-либо правлению."
 ig_trait_city_upon_hill: "Град на холме"
 ig_trait_city_upon_hill_desc: "Мы заключили завет с Богом, чтобы поселиться на Новом Свете. Мы — град на холме, на который смотрят все народы мира, и мы должны стать для всего мира образцом морали и свободы."
 ig_trait_gospel_of_work: "Евангелие труда"
 ig_trait_gospel_of_work_desc: "Мы верим, что труд — это воля Божья, а коммерция — путь к добру. Честная торговля, своевременная уплата налогов, добросовестный труд, накопление и благотворительность — всё это плоды веры. Бог не проклял богатство, а научил нас получать благословение через труд."
 ig_trait_higher_law: "Высший закон"
 ig_trait_higher_law_desc: "Если закон заставляет нас совершать моральное преступление, мы непременно ослушаемся его, потому что ничей приказ не может стоять выше голоса Божьего!"
 ig_trait_american_dream: "Американская мечта"
 ig_trait_american_dream_desc: "Мы мечтаем о земле, где жизнь каждого будет лучше, богаче и полнее, и где каждый получит возможность в соответствии со своими способностями или достижениями. Мы мечтаем об обществе, где каждый мужчина и каждая женщина смогут полностью раскрыть свои врождённые способности и получить признание других, независимо от их происхождения или положения. Мы мечтаем о стране, где мы и наши потомки всегда будем наслаждаться счастьем свободы!"
 ig_trait_community_self_governance: "Общинное самоуправление"
 ig_trait_community_self_governance_desc: "Лучшее правительство — то, которое правит меньше всего. Государство признаёт личность как высшую и независимую силу, из которой исходит вся его власть и авторитет, и относится к личности соответственно. Именно этот дух делает наши Соединённые Штаты по-настоящему свободным и просвещённым государством."
 ig_trait_us_populism: "Популизм"
 ig_trait_us_populism_desc: "Само по себе правительство должно постоянно находиться под наблюдением, иначе под руководством коррумпированных политических элит оно, действуя тихо и тайно, будет контролировать политическое поведение большинства и в конечном итоге развратит сам источник общественной морали."
  #Австрия
 ig_trait_holy_blood: "Священная кровь"
 ig_trait_holy_blood_desc: "Наш род древний и славный, со времён Священной Римской империи мы были правой рукой цезаря и правили венским двором. Пока цезарь будет прислушиваться к нашему мнению, мы будем делать всё возможное, чтобы помочь ему править щедро и милостиво."
 ig_trait_statutory_privilege: "Законные привилегии"
 ig_trait_statutory_privilege_desc: "Кто дал вам право облагать нас налогами? Мы — откупщики государства, защитники крестьян. Кроме той части, что мы обещали цезарю, мы не отдадим ни одного серебряного щита!"
 ig_trait_universalism: "Универсализм"
 ig_trait_universalism_desc: "Все народы Австрии должны иметь равные права. Каждый народ имеет неотъемлемое право сохранять и использовать свою национальность и язык. Мы должны признать равенство всех традиционных языков, чтобы способствовать равенству в государстве."
 ig_trait_wiener_kreis: "Венский кружок"
 ig_trait_wiener_kreis_desc: "Один из источников логических ошибок, из которых произрастает метафизика, — это двусмысленность естественного языка. Ошибка людей коренится в убеждении, что мышление может либо извлекать знания из собственных ресурсов без какого-либо эмпирического материала, либо, по крайней мере, выводить новое содержание из данного положения дел. Хотя не каждый сторонник научного мировоззрения станет борцом, сейчас нам нужно смотреть в лицо современности, отвергать эти традиционные взгляды и стоять на позициях эмпирической науки."
 ig_trait_if_for_freedom: "Если ради свободы"
 ig_trait_if_for_freedom_desc: "Жизнь — это сокровище, любовь — ещё большее. Но чтобы быть свободным, я с радостью отдам и то, и другое!"
 ig_trait_industrial_giants: "Промышленные гиганты"
 ig_trait_industrial_giants_desc: "Новые виды транспорта начинают менять повседневную жизнь людей, расширяя их горизонты. Именно в такую новаторскую эпоху мы появились, превратив энтузиазм в дело. Промышленность страны зависит от нашего творчества и движения вперёд, и мы всегда будем этим заниматься."
 ig_trait_language_barrier: "Языковой барьер"
 ig_trait_language_barrier_desc: "Наши офицеры — австрийцы и немцы, а солдаты — кто угодно. Венгры, чехи, поляки, даже хорваты? Они совершенно не понимают, что мы говорим, как же им подчиняться приказам командиров?"
 ig_trait_local_richarmy: "Местные вооружённые силы"
 ig_trait_local_richarmy_desc: "В каждой провинции и земле государства есть свои войска. Если обеспечить их постоянную верность Вене, они в нужный момент храбро откликнутся на призыв правительства и встанут на защиту империи."
 ig_trait_national_ties: "Национальные узы"
 ig_trait_national_ties_desc: "В нашей империи, состоящей из бесчисленных народов и религий, национальные конфликты и политические разногласия особенно остры. Армия — единственная настоящая связь между народами страны и единственный инструмент для выражения патриотических чувств, и она должна нести эту ответственность."
  #Великая Цин
 ig_trait_benevolence_and_righteousness: "Путь человеколюбия и справедливости"
 ig_trait_benevolence_and_righteousness_desc: "Благоволение — это человеколюбие, разум — это справедливость, умеренность — это ритуал, власть — это знание. Человеколюбие, справедливость, ритуал и знание — вот орудия человека. Поэтому, когда Сын Неба правит Поднебесной, он правит ею с человеколюбием и справедливостью, успокаивает её любовью и выгодой, ведёт её верностью и доверием, стремится устранить её беды и думает о её счастье. Тогда в Поднебесной наступает мир."
 ig_trait_wise_ruler: "Мудрый правитель, достойные сановники"
 ig_trait_wise_ruler_desc: "Когда Путь осуществляется, а планы безупречны, когда правитель мудр, а сановники достойны, тогда наступает эпоха мира и процветания. Ныне — эпоха Яо и Шуня, правитель мудр, сановники достойны, чиновничество честно. Мы, естественно, должны подчиняться со всех четырёх морей и следовать священной воле."
 ig_trait_local_emperor: "Местные царьки"
 ig_trait_local_emperor_desc: "Горы высоки, а император далеко. Какая разница, насколько мудр правитель? Вся Поднебесная полна наших людей. Если даже самый могущественный правитель не будет смиренно прислушиваться к нашему мнению, пусть сидит в своей дыре-столице и отдаёт приказы в своё удовольствие. Раз он нас не слушает, почему мы обязаны ему подчиняться?"
 ig_trait_be_confucian_teach: "Наставление"
 ig_trait_be_confucian_teach_desc: "Конфуцианство основано на наставлении, поэтому оно ценит наставление и исправление нравов. Наставление ритуала тонко, оно пресекает зло в зародыше. Поэтому мудрый правитель создаёт школы и проясняет наставление, чтобы направлять свой народ. Наша обязанность — наставлять народ, чтобы путь человеческих отношений глубоко укоренился в сердцах, и тогда наступит идеальный мир великого единения."
 ig_trait_mandate_of_heaven: "Небесный мандат"
 ig_trait_mandate_of_heaven_desc: "Добродетельный правитель получает Небесный мандат и правит Поднебесной. Мандат Неба и природа вещей не зависят от воли человека; но тот, кто может полностью раскрыть свою природу, тот полностью раскрывает и природу вещей, и тогда Небесный мандат нисходит на него, и нет ничего, чего бы он не постиг, сам не зная, как это происходит. Наш правитель получает поддержку Небес благодаря этой священной миссии, как же мы можем не следовать за ним?"
 ig_trait_confucian_ethics: "Законы предков"
 ig_trait_confucian_ethics_desc: "Законы предков — это законы семьи, они созданы для предосторожности и сдержанности. Мы должны строго их соблюдать и не сметь преступать. Священный Сын Неба правит Поднебесной с сыновней почтительностью, и в законах, оставленных предками, есть свой смысл. Какое право имеет нынешний правитель их нарушать?"
 ig_trait_social_research: "Постижение вещей"
 ig_trait_social_research_desc: "В древности те, кто желал проявить светлую добродетель в Поднебесной, сначала управляли своим государством. Желающие управлять своим государством сначала приводили в порядок свою семью. Желающие привести в порядок свою семью сначала совершенствовали себя. Желающие совершенствовать себя сначала исправляли своё сердце. Желающие исправить своё сердце сначала делали искренними свои помыслы. Желающие сделать искренними свои помыслы сначала доводили до предела своё знание. Доведение до предела знания заключается в постижении вещей. Мудрые люди должны использовать свои знания для анализа и суждения об окружающих людях и вещах, чтобы своим сердцем отличать правду от лжи."
 ig_trait_useless_speech: "Пустословие"
 ig_trait_useless_speech_desc: "Некоторые говорят, что мы много болтаем, другие — что мы занудные книжники. Что они понимают? Просто завидуют. Мы здесь для того, чтобы продвигать идеи пером. Если не говорить, что ещё остаётся делать?"
 ig_trait_peaceful_times: "Эпоха мира и процветания"
 ig_trait_peaceful_times_desc: "Мы живём в прекрасное время, когда правит мудрец, и народ живёт в достатке: на дорогах не подбирают потерянное, двери на ночь не запирают, погода благоприятна, нет ни бедствий, ни несчастий. Это делает нашу работу ещё легче."
 ig_trait_rule_of_etiquette: "Законы ритуала и иерархии"
 ig_trait_rule_of_etiquette_desc: "Правитель — образец для подданного, муж — для жены, отец — для сына. Три устоя и пять постоянств — основа ритуала. Три династии сменяли друг друга, но не могли изменить этого. Если эти три устоя в порядке, то и простой народ будет следовать им."
 ig_trait_catch_a_fire: "Поднять восстание"
 ig_trait_catch_a_fire_desc: "Народ — это вода, а правитель — лодка. Если правитель пренебрегает нашим выживанием, то и он не сможет спокойно сидеть в своём Запретном городе. Не говорите, что у каменного человека один глаз, он всколыхнёт Жёлтую реку, и вся Поднебесная восстанет!"
 ig_trait_pragmatism: "Политическая апатия"
 ig_trait_pragmatism_desc: "Мы люди маленькие, какое нам дело до государственных забот? Политика — не нашего ума дело. Пусть власти занимаются своим, а мы будем просто жить. Как говорится, «моя хата с краю». Осторожность и молчание — вот главные правила выживания в этом суровом мире."
 ig_trait_following_its_natural: "Покорность судьбе"
 ig_trait_following_its_natural_desc: "Жизнь идет своим чередом, и будь что будет. Если уж всё сложилось именно так, какой смысл сопротивляться? Будем жить одним днем. Чему быть, того не миновать, а о несбыточном и мечтать не стоит."
 ig_trait_conning_commoner: "Житейский цинизм"
 ig_trait_conning_commoner_desc: "Они не любят лишних слов, потому что знают: слова ничего не меняют. Они слишком часто оказывались обманутыми, чтобы верить в справедливость. В этом мире побеждает тот, кто наглее и безжалостнее. А честным людям остается лишь страдать."
 ig_trait_chinese_boycott: "Бойкот иностранных товаров"
 ig_trait_chinese_boycott_desc: "Наша страна сказочно богата и способна сама обеспечить себя всем необходимым. Корень всех нынешних бед — засилье омерзительных заморских товаров. Чужеземные вещи разрушают наши исконные обычаи, плодят приспешников Запада и разлагают дух нации. Иностранный газ — это блуждающие огни, железные дороги тревожат покой предков, а фотоаппараты похищают души. Мы обязаны бойкотировать товары заморских дьяволов!"
 ig_trait_government_cooperation: "Опора на государство"
 ig_trait_government_cooperation_desc: "Хотя в нашей стране издавна принято заключать договоры, законы никак не гарантируют их исполнение. Однако, заручившись поддержкой властей и опираясь на авторитет государства, мы можем не только обезопасить свои доходы, но и стремительно расширить торговую империю как внутри Китая, так и за его пределами."
 ig_trait_national_industry: "Спасение через индустриализацию"
 ig_trait_national_industry_desc: "Наша страна тяжело больна нищетой. Единственное лекарство — это возрождение национальной промышленности и образования. Чтобы спасти Китай, мы обязаны укрепить мощь государства, а для этого необходимо развивать производство. Без собственной сильной промышленности о процветании нации не может быть и речи. И мы считаем выполнение этой задачи своим главным долгом."
  #Османская империя
 ig_trait_law_and_civilization: "Закон и слава"
 ig_trait_law_and_civilization_desc: "Мир меняется, и империя не может вечно стоять на месте. Мы не еретики и не слуги Запада, мы — разумная часть империи. Мы заменяем происхождение кодексом законов, пушки — школами, а дворцовое насилие — свободными дебатами, чтобы восстановить былую славу этого древнего государства."
 ig_trait_tanzimat: "Танзимат"
 ig_trait_tanzimat_desc: "Спасение империи — неотложная задача. Счётные книги должны сходиться, суды — судить по справедливости, чиновники — быть грамотными. Великая родина в опасности, и мы — те, кто её спасёт."
 ig_trait_forbidden_books: "Запрещённые книги"
 ig_trait_forbidden_books_desc: "Правитель может сжечь бумагу, но не может сжечь мысль. Он может запретить газеты, но не может запретить истину. Раньше мы обсуждали шёпотом в кабинетах, теперь мы печатаем листовки в тёмных переулках. Если невежество продаётся как верность, мы зажжём пламя разума и сорвём маску с этой дряхлой империи."
 ig_trait_jihad: "Джихад"
 ig_trait_jihad_desc: "Воистину, Аллах купил у верующих их жизнь и имущество в обмен на Рай. Они сражаются на пути Аллаха, убивая и погибая. Таково Его обещание в Раю. Кто же может быть вернее своему завету, чем Аллах? Возрадуйтесь же сделке, которую вы заключили с Ним. Это и есть великий успех."
 ig_trait_words_remain: "Люди Писания"
 ig_trait_words_remain_desc: "Он — Тот, Кто ниспослал с неба воду, и Мы произрастили ею всякие растения. Ешьте и не творите на земле нечестия. Мы отправили к каждому народу посланника, чтобы они сказали: «Поклоняйтесь Аллаху и избегайте тагута»."
 ig_trait_faith_in_chains: "Неверующие"
 ig_trait_faith_in_chains_desc: "Аллах — покровитель тех, которые уверовали. Он выводит их из мраков к свету. А покровители тех, которые не уверовали, — тагуты, которые выводят их из света к мракам."
 ig_trait_arm_of_sultan: "Железная рука султана"
 ig_trait_arm_of_sultan_desc: "Султану нужны не просто сторонники, а исполнители. Мы — та самая железная рука, что вершит правосудие. Мы не спрашиваем «почему», мы спрашиваем «куда бить». Где восстание — там наша кавалерия. Где инакомыслие — там наши уши. Порядок не возникает сам по себе, его куют железом и огнём. Пока трон стоит, мы — та гиря, что обеспечивает его устойчивость."
 ig_trait_local_pashas: "Местные паши"
 ig_trait_local_pashas_desc: "Мы не против реформ, пока земля остаётся под нашей властью, а порядок — стабильным. Что там делают реформаторы? Пусть делают, нас это не касается. Умный бей знает, как поддерживать стабильность на своих землях. Держать ли вожжи крепко или ослабить — неважно, главное, чтобы за местом кто-то присматривал."
 ig_trait_corruption_and_privilege: "Коррупция и привилегии"
 ig_trait_corruption_and_privilege_desc: "Что понимают эти глупые чиновники? Мы ещё до их рождения умели манипулировать налоговыми книгами, подкупать гарнизоны и играть с правительством. Земля — наша, судьи — наши, и даже султану мы нужны для защиты границ. Если империя не желает подчиняться правилам старых родов, пусть готовится увидеть, как её государство распадётся на кучу бейликов!"
 ig_trait_modernists_of_sublime: "Восточные модернисты"
 ig_trait_modernists_of_sublime_desc: "Мы верим в поезда, телеграф, банки и акционерные общества. Мы — источник богатства, хозяева страны. Если султан хочет, чтобы империя не отставала от Запада, он должен знать, что истинное величие происходит от наших непрерывных инвестиций и потребления."
 ig_trait_forges_of_tigris: "Кузницы Тигра"
 ig_trait_forges_of_tigris_desc: "Провода тянутся, машины гудят. Мы не политики и не хотим быть реформаторами. Пока рынок открыт, капитал циркулирует, а порядок сохраняется, мы будем продолжать превращать эту старую империю в новый мир из металла и дымовых труб."
 ig_trait_capital_in_chains: "Капитал в цепях"
 ig_trait_capital_in_chains_desc: "Мы инвестируем, строим дороги, открываем заводы, а в ответ получаем таможенные барьеры, бюрократическую волокиту и холодные взгляды аристократов? Если капитал скован, страна не сможет двигаться вперёд. Не дадите нам прибыли — мы не дадим вам будущего."
 ig_trait_dini_ayrimcilik: "Религиозная сегрегация"
 ig_trait_dini_ayrimcilik_desc: "В этой стране, полной сегрегации и дискриминации, армия не является исключением: никто по-настоящему не захочет проливать кровь за высокомерного иноверца."
 ig_trait_el_hamidiye: "Хамидие"
 ig_trait_el_hamidiye_desc: "«Хамидие» — это наша попытка объединить племенную кавалерию с современной армией. Установление с ними отношений, основанных на верности, поможет армии защитить некоторые из наших самых уязвимых границ и фронтов."
 ig_trait_genc_subaylar: "Корпус молодых офицеров"
 ig_trait_genc_subaylar_desc: "Боеспособность армии на самом деле зависит только от командующих ею молодых офицеров. Установление правильных организационных связей и товарищества, внедрение новейшего вооружения и технологий, а также использование самых решительных методов наступления — вот в чём заключается ценность хорошего офицера для армии."
  #Италия
 ig_trait_engines_of_risorgimento: "Двигатели Рисорджименто"
 ig_trait_engines_of_risorgimento_desc: "Говорят, что армия объединит Италию. Мы говорим — это сделают заводы. Железные дороги соединяют не просто города, а судьбы общества. Машины куют не просто сталь, а облик родины. Пусть слава Италии возродится в котельных! Промышленность соединит пульсирующие сосуды всего полуострова!"
 ig_trait_land_of_chimneys: "Страна дымовых труб"
 ig_trait_land_of_chimneys_desc: "Заводам всё равно, какого цвета флаг, лишь бы топлива было в достатке, а заказы — стабильны. Промышленности всё равно, кто у власти, лишь бы рельсы вели к порту, а налоги не мешали прибыли. Любое место может стать нашим рынком."
 ig_trait_civic_watchmen: "Ночные стражи"
 ig_trait_civic_watchmen_desc: "Когда аристократия утопает в былой славе, а революционеры бьют посуду во дворцах, мы берём в руки ключи и папки. Государство — это не мечта, а система. Если на нас можно положиться, то горожане — самые надёжные шестерёнки в машине под названием Италия."
 ig_trait_people_of_procedure: "Люди процедуры"
 ig_trait_people_of_procedure_desc: "Чтобы счета сходились, уличные фонари горели, а чиновники приходили вовремя — этого достаточно. Мы не ждём перемен и не хотим смуты. Позвольте нам платить налоги, обрабатывать документы и жить по расписанию. Общество — это не романтическая драма, а сценарий с сошедшимся дебетом и кредитом."
 ig_trait_stabbed_in_the_back: "Удар в спину"
 ig_trait_stabbed_in_the_back_desc: "Эти радикалы, социалисты, атеисты — эти проклятые ублюдки! Они прикрываются именем народа, а сами сеют хаос на улицах. Они кричат о свободе, а сами оскорбляют наши вековые церкви и законы. Мы не аристократы и не генералы, но мы помним, откуда пришёлся тот удар в спину."
 ig_trait_land_of_peace: "Земля мира"
 ig_trait_land_of_peace_desc: "Иисус же сказал им: истинно говорю вам, что вы, последовавшие за Мною, — в пакибытии, когда сядет Сын Человеческий на престоле славы Своей, сядете и вы на двенадцати престолах судить двенадцать колен Израилевых. И всякий, кто оставит домы, или братьев, или сестер, или отца, или мать, или жену, или детей, или земли, ради имени Моего, получит во сто крат и наследует жизнь вечную."
 ig_trait_sancti_et_dilecti: "Святые и возлюбленные"
 ig_trait_sancti_et_dilecti_desc: "Итак облекитесь, как избранные Божии, святые и возлюбленные, в милосердие, благость, смиренномудрие, кротость, долготерпение, снисходя друг другу и прощая взаимно, если кто на кого имеет жалобу: как Христос простил вас, так и вы. Более же всего облекитесь в любовь, которая есть совокупность совершенства."
 ig_trait_supplication_prayer: "Молитва-мольба"
 ig_trait_supplication_prayer_desc: "Гласом моим к Господу воззвал я, гласом моим к Господу помолился; излил пред Ним моление моё, печаль мою открыл Ему. Когда изнемогал во мне дух мой, Ты знал стезю мою. На пути, которым я ходил, они скрытно поставили для меня сеть."
 ig_trait_risorgimento: "Дух возрождения"
 ig_trait_risorgimento_desc: "Миру не хватает страны с истинным лидерством, которая поведёт человечество по пути ответственности и братства народов. Мы должны возродить древние традиции, создать достаточно смелую страну, чтобы исправлять ошибки, поддерживать слабых, стремиться к лучшим и более удовлетворительным достижениям — облегчать страдания наших соотечественников и объединять всех, кто жаждет лучшей жизни."
 ig_trait_camicie_rosse: "Краснорубашечники"
 ig_trait_camicie_rosse_desc: "Когда рог трубит боевую тревогу, я облачаюсь в тебя; ты — символ мужества, твой цвет наводит ужас на врага. С тобой на груди я буду сражаться до конца против тиранов и сильных мира сего на этой земле. Когда смерть настигнет меня в этой доблестной борьбе, я всё ещё буду одет в эту неукротимую боевую одежду!"
 ig_trait_realists: "Реалисты"
 ig_trait_realists_desc: "Боже, сколько врагов стоит перед нами! Похоже, наши идеалы рано или поздно рухнут, если не сегодня, то завтра. Так что лучше уйти поскорее."
 ig_trait_unavis: "Единым голосом"
 ig_trait_unavis_desc: "Сражаться за Италию — высшая честь. Наши солдаты — сыновья Италии, их решимость и дисциплина не подлежат сомнению. Мы пожертвуем всем ради нации и родины!"
 ig_trait_mountain_hunter: "Горные егеря"
 ig_trait_mountain_hunter_desc: "Сложные горные ландшафты — естественная защита нашей страны. Даже карфагенянин Ганнибал потерпел поражение на нашей земле. Пока мы сохраняем навыки ведения боя в сложной местности, ни один враг не сможет вторгнуться на нашу родину."
 ig_trait_loyal_to_nations: "Верность народу"
 ig_trait_loyal_to_nations_desc: "Государство может ошибаться, но народ предавать нельзя. Наши солдаты — выходцы из народа, и наша единственная обязанность — защищать народ. Мы точно знаем эту задачу и знаем, как её по-настоящему выполнить."
  #Япония
 ig_trait_railway_bonds: "Железнодорожные облигации"
 ig_trait_railway_bonds_desc: "С принятием железнодорожной политики наши финансовые группы в регионах начали привлекать капитал для строительства железных дорог через обеспеченные векселя и государственные облигации, а также внедрять британские стандарты колеи и низковольтные технологии. Хотя центральное правительство может колебаться с административной поддержкой, мы всецело поддерживаем стратегическую ценность железнодорожной системы для соединения портов и транспортировки ресурсов из глубины страны."
 ig_trait_kobugattai: "Союз двора и сёгуната"
 ig_trait_kobugattai_desc: "Совместное правление двора и самурайства должно быть не просто закреплено в законах, а реализовано на каждом уровне правительства. Самураи и даймё — основа нашего правления. Если мы обеспечим их верность, авторитет двора будет непоколебим."
 ig_trait_sankin_kotai: "Санкин котай"
 ig_trait_sankin_kotai_desc: "Система санкин котай требует, чтобы даймё ежегодно прибывали в Киото. Пока эта система исправно функционирует, наше правление будет крепким, а двор и казна будут получать от этого выгоду."
 ig_trait_kazoku_system: "Авангард цивилизации"
 ig_trait_kazoku_system_desc: "Мы, кадзоку, — опора государства и должны совершенствовать свою добродетель, всегда блюсти достоинство и служить образцом для всего народа. Всякий, кто носит титул кадзоку, не должен полагаться лишь на своё звание, но должен помнить о долге перед страной и народом и смело вести за собой по пути цивилизации."
 ig_trait_taisei_hokan: "Возвращение власти"
 ig_trait_taisei_hokan_desc: "Я, Ёсинобу, смиренно заявляю, что желаю со всей искренностью и преданностью обеспечить спокойствие в стране. Ради блага Поднебесной и всего народа, я с почтением возвращаю верховную власть двору, дабы двор управлял всеми делами и преумножал основы империи."
 ig_trait_sonno_joi: "Сонно Дзёи"
 ig_trait_sonno_joi_desc: "Император — из непрерывной династии, основанной божественным Дзимму, и является единственным законным правителем Японии. Корабли и пушки западных варваров процветают лишь потому, что эти ничтожества лишены добродетели, их мораль разложена, а учения хаотичны. Мы не можем предать наше государство, нашу кровь, нашу божественную волю! Государь всё ещё в Киото, и мы клянёмся сражаться за истинный порядок!"
 ig_trait_divided_troops: "Расколотая армия"
 ig_trait_divided_troops_desc: "Из-за бездействия правительства армия и флот действуют сами по себе, нет единого командования, на военных советах постоянно возникают разногласия, что подрывает боевой дух. Разве это проблема нас, военных? Конечно нет, это всё происки этих проклятых чиновников!"
 ig_trait_bushido: "Бусидо"
 ig_trait_bushido_desc: "Мы, военные, должны считать верность своим долгом, подчиняться приказам начальства без малейших сомнений. Исполнение долга — наша обязанность, благопристойность — наша мораль, почитание доблести — наш дух, ценить верность — наш принцип, стремиться к простоте — наш стиль. Пусть мир узнает о справедливости воина только через нашу искреннюю преданность!"
 ig_trait_gyokusai_charge: "Атака Гёкусай"
 ig_trait_gyokusai_charge_desc: "С того момента, как мы призваны на службу и отправлены на поле боя, мы должны быть готовы умереть. Прорваться сквозь вражеский огонь и ворваться на позиции могут лишь те, кто, как мы, преисполнен решимости умереть. Цепляющийся за жизнь — умрёт, идущий на смерть — выживет!"
 ig_trait_ronin: "Ронин"
 ig_trait_ronin_desc: "Ронины — это резерв самурайского сословия. Хотя в мирное время мы бродим по городам и деревням без ограничений, но когда придёт призыв от сёгуна и даймё, мы исполним приказ и будем сражаться за нашего господина."
 ig_trait_samurai: "Военное сословие (букэ)"
 ig_trait_samurai_desc: "Совместное правление аристократии (кугэ) и самураев (букэ) составляет основу государственного управления нашей страны, а самураи — это остриё меча, на которое опирается сёгун в управлении Поднебесной. Пока положение самураев уважается, мы будем платить тем же уважением государству и двору."
 ig_trait_flower_of_free: "Цветок свободы"
 ig_trait_flower_of_free_desc: "Мы живём ради любви, жизни и поэзии. Когда мы слышим слово «свобода», в наших сердцах закипает жар, словно мы тоскуем по невиданной возлюбленной. Мы горячо надеемся, что однажды Япония станет такой же свободной страной, и мы будем трудиться ради этого."
 ig_trait_bunmei_kaika: "Цивилизация и просвещение"
 ig_trait_bunmei_kaika_desc: "Что такое просвещение? Это развитие индивидуализма. Его смысл в том, что человек, обладая волей, является субъектом ответственности и действует в соответствии со своими мыслями. В этом и есть истинный смысл просвещения."
 ig_trait_light_not_reach: "Патриотизм"
 ig_trait_light_not_reach_desc: "Эта страна, кажется, больше ценит величественный каменный монумент, чем бесчисленные человеческие жизни. Такое государство, такое существование в определённые моменты — это чудовище, холодное до ужаса... И всё же мы не можем ненавидеть эту страну. Именно поэтому наша скорбь ещё глубже. Не подчиняться приказу ради справедливости, поступать по совести — вот истинный акт верности."
 ig_trait_craftsmans_sprit: "Дух мастера"
 ig_trait_craftsmans_sprit_desc: "В нашей работе заключены японские жизненные ценности и профессиональная культура, которые требуют от нас прилагать все усилия для выполнения своей работы и вкладывать своё мастерство в производимую продукцию. Возможно, на заводе эти усилия кажутся незначительными, но именно этот преданный дух мастера делает нашу продукцию уникальной на мировом рынке."
 ig_trait_datsu_aron: "Выход из Азии, вхождение в Европу"
 ig_trait_datsu_aron_desc: "В вихре реставрации и реформ мы не только избавились от старых обычаев, но и задали новое направление для всего общества. Чтобы продемонстрировать статус Японии как цивилизованной и просвещённой страны, мы должны отделиться от наших отсталых восточноазиатских соседей и, взяв за образец европейские обычаи, влиться в новое цивилизованное общество."
 ig_trait_japan_militarism: "Милитаризм"
 ig_trait_japan_militarism_desc: "До сих пор международный порядок был основан на выживании сильнейших, где сильные страны эксплуатировали слабых. Перед лицом огромных внешних врагов Япония должна стать самой сильной, и каждый в нашем обществе должен служить этому, иначе это будет равносильно измене родине!"
  #Испания
 ig_trait_abbey_system: "Система аббатств"
 ig_trait_abbey_system_desc: "«Как хорошо и как приятно жить братьям вместе! Все верующие были вместе и имели всё общее. И каждый день они единодушно пребывали в храме и, преломляя по домам хлеб, принимали пищу в веселии и простоте сердца»."
 ig_trait_dios_patria_rey: "Бог, Отечество, Король!"
 ig_trait_dios_patria_rey_desc: "Король — наш вождь! Услышьте глас ликующего люда: по воле Господа корона вновь сияет! Она вернёт нам славу, в ней — величие Отчизны!"
 ig_trait_don_quijote: "Дон Кихот"
 ig_trait_don_quijote_desc: "Когда сама жизнь кажется безумной, кто скажет, где истинное безумие? Быть может, безумие — это излишняя практичность. Быть может, безумие — это отречься от мечты. А может, самое страшное безумие — это видеть жизнь такой, какая она есть, а не такой, какой она должна быть!"
 ig_trait_ateneo_de_madrid: "Мадридский Атенеум"
 ig_trait_ateneo_de_madrid_desc: "Всеобщий опыт показывает, что монархия воистину процветает лишь тогда, когда в ней процветают науки и искусства, удостоенные высочайшего уважения короны. Мы глубоко убеждены, что сохранение этих уз — это верный и неуклонный путь, предначертанный нашими предками для блага государства."
 ig_trait_alianza_de_oposicion: "Союз оппозиции"
 ig_trait_alianza_de_oposicion_desc: "Великие диктаторы у власти нас не сломят. Их время на троне — лишь краткий и забавный миг. Тиранам не дано вечно править городами, что принадлежат испанцам!"
 ig_trait_gran_monopoly: "Крупный монополист"
 ig_trait_gran_monopoly_desc: "В правительстве всегда найдутся достойные господа, с которыми стоит иметь дело... и быть щедрым. Такие добрые отношения принесут выгоду каждому джентльмену в этой комнате."
 ig_trait_gigantes_mineros: "Рудные магнаты"
 ig_trait_gigantes_mineros_desc: "Значение горнодобывающей промышленности для нашей страны невозможно переоценить. Тесно сотрудничая с представителями всех кругов и при наличии достаточных средств, мы сможем обеспечить ещё большую поддержку этой жизненно важной отрасли."
 ig_trait_plus_ultra: "Plus Ultra"
 ig_trait_plus_ultra_desc: "Взгляните на этот благословенный век! Когда былое величие вернётся, флотилии вновь наполнят гавань Севильи. От восхода солнца до запада его да будет прославляемо имя Господне!"
 ig_trait_conde_de_wool: "Шерстяной граф"
 ig_trait_conde_de_wool_desc: "Бесстыжие воры украли наших овец с полуострова, но нашей репутации не навредить! Кастильские мериносы всегда заставят ткацкие станки петь!"
 ig_trait_real_decreto: "Королевский указ"
 ig_trait_real_decreto_desc: "Королевская воля — вот источник наших величайших торговых преимуществ. Мы ревностно предлагаем указы, разъясняем и излагаем всё, что опыт показал необходимым. Это, без сомнения, будет способствовать процветанию подданных королевства."
 ig_trait_latifundistas: "Латифундисты"
 ig_trait_latifundistas_desc: "Всякий, кто посмеет тронуть наши поместья, бросает вызов самому порядку природы. Без землевладельца арендатор — ничто; без нас не будет и урожая. Пустословам в Мадриде лучше бы об этом помнить."
 #Нидерланды/Бельгия
 ig_trait_markets_elsewhere: "Заморские спекуляции"
 ig_trait_markets_elsewhere_desc: "Наши товары отлично продаются, в этом нет сомнений. Вот только лучшие рынки сбыта находятся далеко за морем. И если там возникнут проблемы, то здесь нас ждут куда более серьёзные потрясения."
 ig_trait_capital_must_flow: "Движение капитала"
 ig_trait_capital_must_flow_desc: "Деньги не терпят застоя — они текут туда, где безопаснее, и туда, где выше прибыль. И наша страна, несомненно, всегда умела извлекать из этого выгоду."
 ig_trait_europe_workshop: "Мастерская Европы"
 ig_trait_europe_workshop_desc: "Города из красного кирпича, гул машин и высокие трубы, извергающие бесконечные клубы дыма... Да, господа, это и есть новые рубежи цивилизации! Так пусть же из этих грязных стоков рекой потечёт чистое золото прогресса!"
 ig_trait_colonial_commerce: "Колониальная коммерция"
 ig_trait_colonial_commerce_desc: "Короче говоря, наша колониальная политика разумна, торговля приносит славу, а туземным подданным — сплошную пользу. Нигде в мире торговцев и чиновников не уважают так, как наших, и нигде туземцы не получают столь надёжных гарантий приобщения к цивилизации."
 ig_trait_chocolate_cream_soldier: "Шоколадные солдатики"
 ig_trait_chocolate_cream_soldier_desc: "Я просто не могу верить ни единому слову наших генералов! У меня нет патронов, да и какой от них толк на поле боя? Уж лучше бы выдавали шоколад — жаль только, что последний кусок я съел ещё вчера."
 ig_trait_fighting_elsewhere: "Бои на чужбине"
 ig_trait_fighting_elsewhere_desc: "У нас есть боевой опыт, вот только получен он не здесь, а в далёких краях, до которых мало кому есть дело. И когда этот опыт требуется применить на родине, всё оказывается совсем иначе."
 ig_trait_oversea_service: "Служба за морем"
 ig_trait_oversea_service_desc: "Благодаря ротации войск между заморскими гарнизонами и метрополией наша армия научилась сражаться в самых разных условиях. Если мы грамотно воспользуемся этим богатейшим опытом, то легко обеспечим себе преимущество в любом бою."
 ig_trait_carrier_of_the_seas: "Морские извозчики"
 ig_trait_carrier_of_the_seas_desc: "Процветание нашей торговли и колоний напрямую зависит от способности защитить торговые пути и проецировать силу там, где это необходимо. Мы всегда полагались в этом на могучий военно-морской флот и обязаны поддерживать его мощь и впредь."
 ig_trait_soldier_king: "Славная смерть"
 ig_trait_soldier_king_desc: "Наш долг предельно ясен — защищать родину любыми доступными средствами. Нация, готовая сражаться за своё существование, непременно завоюет всеобщее уважение. Такая нация никогда не исчезнет!"
 ig_trait_urban_suppliers: "Городские поставщики"
 ig_trait_urban_suppliers_desc: "Горячие надежды горожан увидеть в порту корабли, доверху гружёные товарами, наконец-то сбылись! Как же радостно слышать здесь победное ликование, пришедшее на смену жалобам, страху и тревоге!"
 ig_trait_efficient_cultivation: "Эффективное земледелие"
 ig_trait_efficient_cultivation_desc: "Здесь, несомненно, очаровательно, но с великолепными берегами Вехта этому месту не сравниться! Широкие аллеи, ветряные мельницы, непревзойдённая красота природы и сельской жизни — всё это великолепие тянется вплоть до самых прославленных поместий между Утрехтом и Амерсфортом!"
 ig_trait_popular_writers: "Популярные писатели"
 ig_trait_popular_writers_desc: "Публика не отличается ни особой учёностью, ни беспросветной глупостью, но она справедлива и беспристрастна. Общественное мнение подобно воску под печатью — оно безошибочно отражает оставленный на нём оттиск. Именно поэтому секрет популярности и красноречия кроется исключительно в понимании тех законов, которые заставляют аудиторию внимательно слушать или читать."
 ig_trait_liberal_sovereignty: "Свободный суверенитет"
 ig_trait_liberal_sovereignty_desc: "Могучие и процветающие свободные общины — вот она, неисчерпаемая и живая созидательная сила самой природы! В сравнении с ней даже Рим кажется лишь высокомерной, искусственной и близорукой игрой ума. Всё его былое великолепие меркнет перед нашим царством свободы."
 ig_trait_crisis_of_language: "Языковой барьер"
 ig_trait_crisis_of_language_desc: "Говорят, мы живём в одной стране, но мы даже не всегда понимаем их речь. Действительно ли мы служим единому государству, или это лишь пустое название?"
 ig_trait_patriot: "Патриоты"
 ig_trait_patriot_desc: "Столь прекрасные патриотические стихи, в каждой строке которых пылает жажда нашей славы и спасения, — будучи прочитанными с должной силой, — взывают к мужеству Геракла и духу Ахиллеса. Мы ни на миг не сомневаемся: они тронут тысячи сердец и пробудят в народе самые возвышенные патриотические чувства."
 ig_trait_municipality: "Городское самоуправление"
 ig_trait_municipality_desc: "Свобода нации кроется в гарантированном законом праве на автономию. В нашей стране горожане правят сами, опираясь на законные привилегии своих городов. И даже помазанный Богом монарх, забывший о своём долге и начавший угнетать народ, теряет право на престол. Именно эта древняя традиция и служит залогом процветания нашего государства."
  #Особые названия групп
 ig_kazoku: "Кадзоку"
 ig_kazoku_desc: "Кадзоку — это новая аристократическая система, созданная после отмены системы кугэ в ходе Реставрации Исин указом о кадзоку. Их титулы происходят от даймё различных княжеств эпохи сёгуната, заслуженных родов при дворе, выдающихся деятелей реставрации и пожалований императора. Благодаря своему высокому статусу, кадзоку были наделены определёнными пожизненными политическими привилегиями, что давало им право участвовать в управлении государством."