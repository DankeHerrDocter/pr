l_russian:
  #
 joi_flavor_jap.1.t: "Реставрация [ROOT.Var('emperor_var').GetCharacter.GetFirstName]"
 joi_flavor_jap.1.d: "Режим [GetLawType('law_bakufu').GetName] утратил власть, и правление было возвращено [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'императору')] [ROOT.GetCountry.GetRuler.GetFirstName]. Этот великий момент знаменует конец векового правления воинского сословия в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] и начало новой эпохи модернизации и реформ. Теперь [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'императору')] предстоит осторожно выбрать своих политических союзников."
 joi_flavor_jap.1.f: "Бывший сэйи-тайсёгун с почтением и стыдом поклонился императору, передав ему свою резиденцию и оплот власти — величественный замок Эдо. Работы по его перестройке начнутся незамедлительно: на месте старого замка должен появиться сияющий императорский дворец. Хотя внешне он будет напоминать прежнюю резиденцию в Киото, император намерен соединить богатые декоративные традиции Японии с непривычной западной модой. Возможно, это станет метафорой будущего Японии."
 joi_flavor_jap.1.a: "Осторожность никогда не повредит."
 joi_flavor_jap.1.b: "Реформы должны идти семимильными шагами!"
 joi_flavor_jap.1.c: "Сторонники реставрации обновят всю страну!"
  #
 joi_flavor_jap.2.t: "Союз двора и сёгуната"
 joi_flavor_jap.2.d: "С ослаблением сторонников реставрации, сёгун из #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! Токугава, [ROOT.GetCountry.GetRuler.GetFullName], вместе с [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] со всей страны подавил восстание в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], взял под контроль императорский дворец и вновь укрепил свою власть."
 joi_flavor_jap.2.f: "«Я думал, что он проявит себя в битве за Осаку, совершит невиданные подвиги. Однако он неожиданно опоздал и даже не увидел вражеских знамён. Всё из-за его лени. Даже между отцом и сыном есть место подозрениям. Это заставляет меня ещё больше сомневаться в том, о чём думает сёгун».\n\n«Даже если сёгуна не станет, ты ни на миг не должен забывать путь воина. Ты должен вечно защищать эту землю, и твоя служба императору не должна прерываться до конца жизни»."
 joi_flavor_jap.2.a: "Как и в прошлые столетия, двор и самураи продолжат править."
 joi_flavor_jap.2.b: "Нужно полностью уничтожить этих сторонников реставрации!"
  #
 joi_flavor_jap.3.t: "Договор Ансэй пяти держав"
 joi_flavor_jap.3.d: "Вчера в порт близ Киото прибыла эскадра варваров-европейцев во главе с [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('NET_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]. Они вынудили императора утвердить ряд договоров, предоставляющих им торговые привилегии."
 joi_flavor_jap.3.f: "«Порты Нагасаки и Хакодате должны быть открыты для кораблей всех стран для ремонта, получения пресной воды, продовольствия и любых других материалов, необходимых для использования судов; только корабли, терпящие бедствие из-за погоды или по не зависящим от них причинам, могут заходить в другие порты, не указанные в настоящих статьях, без разрешения правительства [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]».\n\n«Корабли всех стран, стоящие в портах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], должны соблюдать японские законы; если старший офицер или капитан нарушит любой такой закон, это приведёт к закрытию порта. Если такой закон нарушит младший офицер или капитан, он должен быть передан своему капитану для наказания».\n\n«В портах Японии, как открытых сейчас, так и тех, что могут быть открыты в будущем, корабли и подданные всех стран имеют право заходить и пользоваться равными преимуществами, которые получают голландцы и китайцы в силу их существующих отношений с Японией»."
 joi_flavor_jap.3.a: "Открытие страны станет поворотным моментом в политике [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_jap.4.t: "Западные науки?"
 joi_flavor_jap.4.d: "С проникновением западных технологий благодаря рангаку, это движение стало всё активнее участвовать в политических дебатах о внутренней и внешней политике [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Многие сторонники рангаку считают, что подражание западной культуре не только не повредит Японии, но и укрепит её. Однако эта точка зрения встречает яростное сопротивление со стороны сил во главе с #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_TP')]#!#!."
 joi_flavor_jap.4.f: "После открытия страны и постоянного притока западных знаний рангаку значительно расширилось: запрет на голландские книги был снят, десятки тысяч таких книг были изданы и распространены, множество иностранных служащих приехало в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и другие города для преподавания, а передовые технологии, изобретённые в европейских странах, постепенно получили распространение в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Наши мастера по западному образцу научились делать паровые машины и пароходы, и многие иностранные послы хвалили наши технологии, считая, что они уже могут сравниться с технологиями самых передовых стран мира."
 joi_flavor_jap.4.a: "Распахнуть ворота страны, мы должны полностью вестернизироваться!"
 joi_flavor_jap.4.b: "Эти диковинки недолговечны, важнее сохранять нашу традиционную культуру."
  #
 joi_flavor_jap.5.t: "Великие реформы Тэмпо"
 joi_flavor_jap.5.d: "Великий голод, продолжавшийся почти десять лет, закончился, однако его наследие всё ещё глубоко влияет на [ROOT.GetCountry.GetNameNoFlag]. Прежний правитель, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], был вынужден уйти в отставку, а новый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] надеется провести в стране экономические реформы, чтобы вернуть государство к процветанию времён реформ Кёхо и Кансэй и гарантировать, что голод такого масштаба больше никогда не повторится."
 joi_flavor_jap.5.f: "«Говорят, что если у страны нет запасов на девять лет, её положение шатко; если нет запасов на шесть лет — её положение опасно; а если нет запасов на три года — это не страна вовсе. Эры правления сменяются, но достойные люди всех сословий сегодня вызывают лишь беспокойство»."
 joi_flavor_jap.5.a: "Нет необходимости в дополнительных мерах, этот голод был лишь случайностью."
 joi_flavor_jap.5.b: "Необходимо провести реформы, чтобы предотвратить повторение такой катастрофы."
  #
 joi_flavor_jap.6.t: "Сонно Дзёи"
 joi_flavor_jap.6.d: "На фоне недавних провалов в правлении #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! и голода, в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и его окрестностях начала распространяться и набирать популярность идеология, направленная против сёгуната, превозносящая императора и винящая во всех бедах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вторжение иноземных варваров."
 joi_flavor_jap.6.f: "«Императорский род, непрерывно правящий с эпохи богов, существует уже два миллиона лет. Это потому, что раз установленная императорская линия передаётся из поколения в поколение. От сотворения мира до появления первого человеческого императора прошло около двух миллионов лет, а с момента появления первого императора Дзимму — ещё две тысячи триста лет, но императорская кровь никогда не прерывалась»."
 joi_flavor_jap.6.a: "Сёгун — истинный правитель, получивший мандат от Его Величества Императора."
 joi_flavor_jap.6.b: "Долой варваров, да здравствует император!"
  #
 joi_flavor_jap.7.t: "Убийство ронинами из Мито"
 joi_flavor_jap.7.d: "Множество верных императору ронинов, противников #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_DP')]#!#!, из-за крайнего недовольства политикой, которую проводит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], тайно организовали покушение на верного сторонника сёгуната, министра [SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] [SCOPE.sCharacter('shogunate_ig_minister').GetLastName]. Министр был тяжело ранен, а нападавшие арестованы."
 joi_flavor_jap.7.f: "«После покушения [SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] [SCOPE.sCharacter('shogunate_ig_minister').GetLastName] заболел, некоторое время боролся за жизнь, затем спешно подал прошение о наследовании, которое было принято, и вскоре скончался от болезни».\n\n«Хорошую утку ловят не сетью, а паланкином; больной так скромен, что ему не нужна подушка, и пишет завещание своей задницей... Сёгун приказал отрубить голову корнем женьшеня, а самурай отомстил за обиду, нанесённую плоти Токугавы»."
 joi_flavor_jap.7.a: "Несчастный министр. Эти убийцы оказались слишком неумелыми."
 joi_flavor_jap.7.b: "Принять решительные меры и казнить этих мятежников, выступивших против сёгуна!"
  #
 joi_flavor_jap.8.t: "Императорский поход за изгнание варваров"
 joi_flavor_jap.8.d: "С ростом движения за изгнание варваров, император решил действовать так, чтобы обойти решения, которые принял [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]. Через #V тайную организацию сторонников императора «Тэнтюгуми»#! он тайно направил указ даймё Нагасаки, приказывая ему возглавить самураев, изгнать варваров из [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] и прибыть в столицу для проведения реформ в сёгунате."
 joi_flavor_jap.8.f: "«Недавно двор заключил договоры, послы были направлены в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], и детали верительных грамот были переданы прибывшим в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] подчинённым. После этой важной церемонии, дарованной императором, я заявляю вам, что это не соответствует воле господина сёгуна и его вассалов, и по вашему требованию прошу дать ответ. Как вы говорите, вы будете служить чиновниками, временно доверенными государству, как же вы можете так глубоко погрязнуть в самообвинениях?»\n\n«Люди из княжества совершили какое-то преступление. Времена непредсказуемы, и весь сёгунат сейчас переживает трудный период из-за насильственного вторжения иноземцев. К тому же, другие даймё высказались на общем собрании, и все ополченцы объединились ради долгосрочного мира и стабильности: он является важным кандидатом на престол, и вся семья, вассалы и все поколения единодушно согласны с этим решением»."
 joi_flavor_jap.8.a: "Указ Его Величества Императора должен стать известен всей стране."
 joi_flavor_jap.8.b: "Нужно послать войска для подавления сил, целью которых является [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
  #
 joi_flavor_jap.9.t: "Репрессии годов [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_jap.9.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] начал беспокоиться о росте сил сторонников реставрации и отдал приказ самураям и придворным начать чистку сторонников императора в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 joi_flavor_jap.9.f: "«Тогда стремительный и опрометчивый бог-муж сказал: „Раз так, я покину императора“. Он тут же вознёсся на небо, и горы и реки содрогнулись, и земля затряслась. Император, услышав это, испугался и сказал: „Приход моего брата, должно быть, не к добру, он лишь хочет захватить мои земли“».\n\n«Когда он молился богине Аматэрасу, прося даровать ему ожерелье из пятисот безупречных, величественных самоцветов длиной в восемь сяку, намотанное на левый пучок волос, имя бога, рождённого из тумана, когда он размахивал и омывал самоцветы в небесном колодце Манаи, этот дар издал звенящий звук»."
 joi_flavor_jap.9.a: "Эти люди — праведники, их следует пощадить."
 joi_flavor_jap.9.b: "Нужно подавить этих мятежников, выступивших против двора!"
  #
 joi_flavor_jap.10.t: "Прибытие торговых судов [SCOPE.sCountry('western_merchantship_country').GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_jap.10.d: "Недавно несколько торговых судов из [SCOPE.sCountry('western_merchantship_country').GetAltNameNoFlag('RU_CL_RP')] прибыли в порт близ [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и подали прошение, которое должен был рассмотреть [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], с просьбой разрешить им встать на якорь у наших берегов для пополнения запасов. Капитан также предъявил торговую лицензию, которую от имени правительства, выдал адмирал [SCOPE.sCharacter('western_army_merchant_leader').GetFullName], и потребовал содействия."
 joi_flavor_jap.10.f: "«Впредь [ROOT.GetCountry.GetNameNoFlag] будет ремонтировать потерпевшие крушение суда [SCOPE.sCountry('western_merchantship_country').GetAltNameNoFlag('RU_CL_RP')] и предоставлять дрова, воду и продовольствие судам, испытывающим нехватку припасов; если есть уголь, он будет передан судну в обмен на золото, серебро и другие финансовые инструменты. Если золота и серебра не хватает, обмен будет производиться на товары».\n\n«[SCOPE.sCountry('western_merchantship_country').GetNameNoFlag] и [ROOT.GetCountry.GetNameNoFlag] будут оказывать взаимную помощь потерпевшим крушение судам и их экипажам и доставлять их в порты приёма; во время пребывания им будет оказан радушный приём, но они должны будут соблюдать законы соответствующей страны»."
 joi_flavor_jap.10.a: "Открыть побережье и разрешить их торговым судам швартоваться. Мы не можем ссориться с [SCOPE.sCountry('western_merchantship_country').GetAltNameNoFlag('RU_CL_TP')]."
 joi_flavor_jap.10.b: "Прогнать этих надоедливых варваров из [SCOPE.sCountry('western_merchantship_country').GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_jap.11.t: "Голландский отчёт"
 joi_flavor_jap.11.d: "Делегация из [SCOPE.sCountry('NET_scope').GetAltNameNoFlag('RU_CL_RP')] прибыла в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и, по традиции, заведённой восьмым Сёгуном, его превосходительством Токугавой Ёсимунэ, преподнесла ежегодный отчёт о событиях за рубежом."
 joi_flavor_jap.11.f: "«Господину Садани пришлось сесть и посмеяться над нашими вопросами. Очевидно, его целью было высмеять нас, но, видимо, у него заложило уши, и он замолчал, перестав строить свои самые злобные гримасы».\n\n«Хотя в деталях есть некоторые недочёты, я отдаю должное гению тех, кто смог построить эти машины, полагаясь лишь на простые чертежи, не видя самих механизмов»."
 joi_flavor_jap.11.a: "Эти сведения помогут сохранить изоляцию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.11.b: "Мы должны глубже понимать, что происходит за границей."
  #
 joi_flavor_jap.12.t: "Пропаганда рангаку"
 joi_flavor_jap.12.d: "С приходом новых технологий в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] многие учёные рангаку начали превозносить в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] превосходство этих новшеств, и слухи об этом дошли до ушей, которые носит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 joi_flavor_jap.12.f: "«Этот новейший предмет, сделанный европейцами, вызывает чувство растерянности и потерянности, словно человек, страдающий от смены часовых поясов после бессонного перелёта через Тихий океан. В этом предмете определённо чего-то не хватает, например, души»."
 joi_flavor_jap.12.a: "Запретить эти диковинки!"
 joi_flavor_jap.12.b: "Поощрять дальнейшее распространение рангаку."
  #
 joi_flavor_jap.13.t: "Патриоты Исин"
 joi_flavor_jap.13.d: "С бурным развитием реставрации, на политической арене [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] появилась группа деятелей, известных как #V «патриоты Исин»#!. В их число входили как аристократы, так и простолюдины, и они пользовались широкой поддержкой народа и сторонников реставрации."
 joi_flavor_jap.13.f: "«Реставрация имперского правления... должна быть грандиозной по своему размаху, поэтому при создании новой системы управления следует взять за основу то, что было заложено императором Дзимму, и стремиться к объединению страны, сделав обновление всего и вся своей целью».\n\n«Если мы хотим принести пользу государству, мы должны сперва отбросить старые обиды и личную неприязнь. Сейчас самое время сплотиться вокруг [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName] и подняться на борьбу»."
 joi_flavor_jap.13.a: "Они нарушают общественный порядок."
 joi_flavor_jap.13.b: "Хоть Чжоу и древнее царство, но воля Неба обновилась!"
  #
 joi_flavor_jap.14.t: "Пять пунктов императорской присяги"
 joi_flavor_jap.14.d: "Под руководством, которое осуществлял [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и правительства реставрации, [SCOPE.sCharacter('industrialists_ig_leader').GetFirstName] [SCOPE.sCharacter('industrialists_ig_leader').GetLastName] составил проект основного политического курса реставрации и восстановления имперского правления, который [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] зачитал всей нации в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 joi_flavor_jap.14.f: "«Будет созываться совещательное собрание, и все дела будут решаться путём открытого обсуждения; все классы, высшие и низшие, должны объединиться в энергичном проведении государственных дел».\n\n«Всем классам, от военных и гражданских чиновников до простолюдинов, будет позволено следовать своему призванию, чтобы не было недовольства».\n\n«Дурные обычаи прошлого будут отброшены, и всё будет основываться на справедливых законах природы; знания будут заимствоваться по всему миру, чтобы укрепить основы имперского правления, и мы ответим на беспрецедентные вызовы, стоящие перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]»."
 joi_flavor_jap.14.a: "«Я клянусь перед всеми даймё, что народ узнает, куда я иду, и что даймё будут нести ответственность за свои действия»."
  #
 joi_flavor_jap.15.t: "Указ о запрете мечей"
 joi_flavor_jap.15.d: "С развитием реставрации [ROOT.GetCountry.GetNameNoFlag] постепенно превращается в просвещённую страну. Однако в среде наших #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! #V ношение мечей и причёска тёммагэ#! по-прежнему считаются символами традиции. Многие чиновники-западники считают, что следует #B лишить их привилегии носить мечи, издать указ о запрете тёммагэ и потребовать от них носить причёски на западный манер.#!"
 joi_flavor_jap.15.f: "«Стрижка волос, ношение униформы и гражданской одежды — всё это может быть решено по желанию каждого; однако при ношении парадной формы можно носить меч».\n\n«Отныне, за исключением случаев ношения парадной формы, а также для военных и полицейских в соответствии с их уставом, ношение мечей запрещено, о чём настоящим объявляется».\n\n«У всех нарушителей их мечи будут конфискованы»."
 joi_flavor_jap.15.a: "Это символ их статуса, правительству не следует его отнимать."
 joi_flavor_jap.15.b: "Выпустить указ, запрещающий ношение мечей и причёску тёммагэ."
  #
 joi_flavor_jap.16.t: "Восстания против «налога кровью»"
 joi_flavor_jap.16.d: "Из-за всеобщего неприятия воинской повинности в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] в народе начали распространяться ужасающие слухи, из-за чего напуганные [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] стали поднимать восстания против призыва по всей стране; они называют воинскую повинность «высасыванием крови из простого народа»."
 joi_flavor_jap.16.f: "«С весны [TimeKeeper.GetCurrentDate.GetString] здесь ходит слух, что двор обманут иноземцами, и теперь народ полностью отдан на их милость: чтобы уничтожить японскую нацию, они собираются пускать кровь мужчинам от 18 до 20 лет, чтобы ослабить их, а затем отправить женщин старше 15 лет за границу. В уезде Оку уже многим пустили кровь».\n\n«Они соберут всех молодых людей в месте под названием „военная школа“, поставят там флаг, а затем придут иноземцы, всех разом задушат и высосут их кровь»."
 joi_flavor_jap.16.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и правительство должны развеять эти слухи и успокоить народ."
 joi_flavor_jap.16.b: "Кто распускает эти бредовые слухи? Всех поймать и расстрелять!"
  #
 joi_flavor_jap.17.t: "Последний самурай"
 joi_flavor_jap.17.d: "Класс самураев, некогда правивший [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], постепенно исчезает с ходом модернизации. Традиционный дух бусидо больше не почитается и не обсуждается, а оставшиеся ронины растворились в безвестности, и от былого процветания времён сёгуната не осталось и следа."
 joi_flavor_jap.17.f: "«Я пришёл на родину своих предков, чтобы ощутить благоговение в каждом вздохе, в каждой чашке чая, в каждой жизни, которую мы отнимаем — в этом и есть путь воина. Император меня не слышит, но его армия придёт. Девятьсот лет мои предки защищали наш народ. Теперь... я подвёл их».\n\n«И поэтому ты совершишь самоубийство? Потому что путь воина больше не нужен?»\n\n«Идеальный цветок — большая редкость. Можно всю жизнь искать его, и это не будет потраченным зря временем. А я, я умру от меча»."
 joi_flavor_jap.17.a: "Необходимо подчеркнуть важность гражданского правления."
 joi_flavor_jap.17.b: "Дух бусидо будет жить вечно."
  #
 joi_flavor_jap.18.t: "Конституция [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_jap.18.d: "После долгих реформ [ROOT.GetCountry.GetNameNoFlag] стала новой, современной страной, во всех отношениях равняющейся на самые передовые и просвещённые государства мира. Была принята современная конституция, которая чётко определяет, наделяет и ограничивает права и свободы правительства Его Величества, которым правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], а также парламента и японских граждан."
 joi_flavor_jap.18.f: "«[ROOT.GetCountry.GetNameNoFlag] управляется императором из непрерывной династии, и престол, в соответствии с законом об императорском доме, наследуется потомками мужского пола императора; [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] является главой государства, обладает верховной властью и осуществляет её в соответствии с положениями настоящей конституции».\n\n«[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] осуществляет законодательную власть с согласия имперского парламента; [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] созывает имперский парламент, открывает, закрывает и приостанавливает его сессии, а также распускает палату представителей; [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] для поддержания общественной безопасности или предотвращения общественных бедствий, в случае крайней необходимости, в период между сессиями имперского парламента, издаёт указы, имеющие силу закона».\n\n«Все японские подданные, отвечающие требованиям, установленным законами, могут занимать гражданские и военные должности и нести иную государственную службу; в соответствии с законом они обязаны нести воинскую повинность и платить налоги; в пределах закона они имеют свободу проживания и передвижения, не могут быть арестованы, задержаны, допрошены или наказаны иначе как по закону; и не могут быть лишены права на суд, установленный законом»."
 joi_flavor_jap.18.a: "Конституция должна подчёркивать божественность, которой обладает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_jap.18.b: "Конституция должна быть более прагматичной."
 joi_flavor_jap.18.c: "Конституция превыше всего!"
  #
 joi_flavor_jap.19.t: "Мрачные перспективы реставрации"
 joi_flavor_jap.19.d: "Усилия по реформированию, вестернизации и реставрации со временем натолкнулись на жёсткое сопротивление #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! и в конечном итоге провалились. Самые выдающиеся и влиятельные сторонники реставрации постепенно ушли, и их дело больше никого не вдохновляет. Кажется, что в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] возвращаются старые порядки периода Эдо."
 joi_flavor_jap.19.f: "Изначально те, кто кричал «#B Покинуть Азию, войти в Европу!#!» и «#B Богатая страна, сильная армия!#», после прибытия чёрных кораблей начали реформу, которая потрясла основы государства. Однако реформаторы теперь терпят поражение в [Concept('government', 'правительстве')], строительство железных дорог, заводов и школ замедлилось и даже остановилось. Западная конституция, парламент и военная система на нашей земле всё ещё подобны ряске на воде — не могут пустить корни. \n\nКогда-то мы думали, что сможем, подобно западным державам, с энтузиазмом преобразовать нацию, подобно германскому государству, с дисциплиной обучить армию. Теперь же мы можем лишь беспомощно смотреть, как броненосцы соседей входят в Восточно-Китайское море, а мы не можем построить даже одну полноценную железную дорогу. Перспективы реставрации мрачны, и, кажется, её провал предрешён."
 joi_flavor_jap.19.a: "От группы товарищей из сёгуната..."
  #
 joi_flavor_jap.20.t: "Указ о кадзоку"
 joi_flavor_jap.20.d: "С окончательным укреплением власти правительства реставрации, которое возглавляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], и изданием указа #V «Кадзокурэй»#!, который систематизировал дворянские титулы, правившие сотни лет [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] и придворная аристократия окончательно покинули политический центр [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако сторонники реставрации всё ещё спорят о том, следует ли сохранить за ними часть их политических привилегий."
 joi_flavor_jap.20.f: "«Любой, кто имеет титул, считается членом кадзоку и должен пользоваться взаимным обращением с другими членами кадзоку; вдова, имеющая титул, пока она остаётся главой дома, сохраняет свой титул. Если она становится главой дома или остаётся в нём без наследника титула, она сохраняет свой титул, пока остаётся в доме».\n\n«Наследником титула должен быть его законный наследник и его старший сын; если законного наследника нет, титул наследует его внебрачный сын; тот, кто избран наследником титула, или его законный представитель, должен получить одобрение на наследование от министра двора».\n\n«Права и привилегии прекращаются в следующих случаях: для тех, кто не может поддерживать достоинство кадзоку, и для тех, кто совершил тяжкие преступления, нарушил приказы министра двора или семейные правила; также это касается нарушителей воли, которую изъявил [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]»."
 joi_flavor_jap.20.a: "Правительство должно установить более строгий контроль над кадзоку."
 joi_flavor_jap.20.b: "Разрешить кадзоку сохранить их политическую власть."
  #
 joi_flavor_jap.21.t: "Падение [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
 joi_flavor_jap.21.d: "Восстание, поднятое [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], при поддержке мятежников в городе быстро захватило парламент и правительственные здания. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] был вынужден издать указ о возвращении власти сёгуну."
 joi_flavor_jap.21.f: "«Мятежники, используя власть, которой обладает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и силы княжеств, убивали верных людей, игнорировали приказы, которые отдавал [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], не выказывая ни раскаяния, ни сочувствия к страданиям народа. Если это преступление дойдёт до предела, [ROOT.GetCountry.GetNameNoFlag] скоро погибнет».\n\n«Если я сейчас не стану отцом для народа и не изгоню этих мятежных вассалов, как я смогу искупить вину перед духом покойного императора и отомстить за глубокие обиды народа? Вот причина моей скорби. По идее, я должен скорбеть о покойном императоре и быть сдержанным в словах и делах, но эта скорбь неудержима. Сёгун должен понять мою волю, покарать мятежников, совершить великий подвиг спасения страны и вернуть народу мир. Такова моя воля, и этот указ должен быть исполнен без промедления и колебаний»."
 joi_flavor_jap.21.a: "Это не конец, а новое начало."
  #
 joi_flavor_jap.22.t: "Армия сёгуната идёт на север"
 joi_flavor_jap.22.d: "Вчера армия, верная #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_DP')]#!#!, покинула Осаку и двинулась прямо на Киото. Однако, судя по их воззванию, это всего лишь внутренняя борьба между даймё. Должен ли двор вмешиваться в этот конфликт?"
 joi_flavor_jap.22.f: "«Ваш вассал [SCOPE.sCharacter('landowners_ig_leader').GetLastName] видит, что события, произошедшие с девятого числа прошлого месяца, не являются истинной волей двора, а вызваны интригами коварного министра Мацудайры, что известно всему миру. В частности, беспорядки и грабежи в Эдо, Нагасаки, Ното и Сагами были спровоцированы его вассалами, которые подстрекали народ по всей стране, вызывая хаос, что ненавистно и богам, и людям. Поэтому я прошу издать высочайший указ о выдаче упомянутого коварного министра. Если это не будет сделано, я буду вынужден казнить его сам»."
 joi_flavor_jap.22.a: "Занять выжидательную позицию и наблюдать за ситуацией."
 joi_flavor_jap.22.b: "Двор должен немедленно вмешаться."
  #
 joi_flavor_jap.23.t: "Законы Синсэнгуми"
 joi_flavor_jap.23.d: "С превращением [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] в политический центр [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], сюда съехались сторонники императора и сёгуната из всех княжеств. При поддержке #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! были созданы многочисленные тайные организации ронинов, самой известной из которых стал отряд #V Синсэнгуми#!, отличившийся при усмирении провинции Каи."
 joi_flavor_jap.23.f: "«Запрещается отклоняться от пути воина, самовольно покидать Синсэнгуми, самовольно брать деньги в долг».\n\n«Запрещается самовольно ввязываться в судебные тяжбы и участвовать в частных поединках. Нарушившим любой из этих пунктов будет приказано совершить сэппуку»."
 joi_flavor_jap.23.a: "Поддержать Синсэнгуми."
 joi_flavor_jap.23.b: "Они должны быть распущены!"
  #
 joi_flavor_jap.24.t: "Сдача замка Эдо"
 joi_flavor_jap.24.d: "Военная ситуация становится всё более неблагоприятной для армии #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!. Чиновники сёгуната в замке Эдо, напуганные наступлением императорских войск, встретились с [SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName] и заявили о готовности сдать Эдо и капитулировать."
 joi_flavor_jap.24.f: "Бывший сёгун с почтением и стыдом склонился перед [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], передав свою резиденцию и трон — величественный замок Эдо — вновь обретшему власть [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Скоро начнётся перестройка; на месте старого замка вырастет великолепный императорский дворец. Хотя внешне он будет похож на прежний императорский дворец в Киото, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] планирует сочетать богатые декоративные традиции Японии с незнакомой западной модой. Возможно, это метафора будущего [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.24.a: "Это очевидная уловка сёгуната."
 joi_flavor_jap.24.b: "Победа за Его Величеством, нашим [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
  #
 joi_flavor_jap.25.t: "Северный союз"
 joi_flavor_jap.25.d: "С чередой поражений армии сёгуната, даймё на северо-востоке начали опасаться за своё положение. Они заключили оборонительный союз и направили петицию ко двору в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], заявляя о своей готовности подчиниться новому правительству, но надеясь, что Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] простит им все их прегрешения."
 joi_flavor_jap.25.f: "«Если [SCOPE.sCharacter('devout_ig_leader').GetFirstName] [SCOPE.sCharacter('devout_ig_leader').GetLastName] искренне раскается, примет наказание и попросит прощения у сёгуната, возможно, ему будет оказана снисходительность».\n\n«Княжество Айдзу вело переговоры с княжествами Сэндай и другими северными княжествами и надеялось на этой основе подать петицию утешительному министру, поэтому хотело бы услышать мнение каждого княжества; если возражений нет, они надеются немедленно подать петицию и приступить к переговорам»."
 joi_flavor_jap.25.a: "Думаю, мы можем договориться."
 joi_flavor_jap.25.b: "Отправить войска и покарать этих предателей!"
  #
 joi_flavor_jap.26.t: "Стандартный язык"
 joi_flavor_jap.26.d: "Правительство реставрации, по примеру западных держав, хочет установить официальный стандартный язык для всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], чтобы облегчить проведение грядущей реформы образования. Однако единого мнения о том, какой диалект должен стать стандартным, нет. Чиновники из Канто и Кансая, похоже, хотят, чтобы именно их родной говор стал стандартом для новой [ROOT.GetCountry.GetNameNoFlagNoFlag]."
 joi_flavor_jap.26.f: "#V Токио#! — новая столица, и его #B говор букэ (военного сословия)#! строг и прост. Многие чиновники реставрации — выходцы оттуда и настаивают на его принятии. А земли #V Киото и Осаки#! с древних времён были императорской столицей и центром торговли, их #B говор Камигата#! изящен, богат и уже давно укоренился в театре, поэзии и науке, пользуясь поддержкой многих знатных родов. Какой же диалект [ROOT.GetCountry.GetNameNoFlag] должна сделать стандартным языком для всей страны?"
 joi_flavor_jap.26.a: "Диалект Кансая станет стандартным языком."
 joi_flavor_jap.26.b: "Диалект Канто станет стандартным языком."
  #
 joi_flavor_jap.27.t: "Дипломатия в Рокумэйкане"
 joi_flavor_jap.27.d: "По мере того как нашу страну стали всё чаще признавать в мире как передовую и цивилизованную, по предложению, которое внёс [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] было построено здание для дипломатических приёмов с послами разных стран. Его назвали #V «Рокумэйкан»#! в честь #B строки «ю-ю-лу-мин» («олени радостно кричат») из «Ши цзин»#!."
 joi_flavor_jap.27.f: "«Красный диск в центре флага [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] больше не будет похож на лепёшку, покрывающую запечатанную империю, а станет тем, чем он и является: благородным символом восходящего солнца, которое неуклонно движется вперёд и вверх среди просвещённых стран мира».\n\n«Это станет прекрасным воспоминанием об эпохе [ROOT.GetCountry.GetRuler.GetFirstName], и я думаю, что это будет прекрасный подарок, который люди эпохи [ROOT.GetCountry.GetRuler.GetFirstName] оставят следующему поколению»."
 joi_flavor_jap.27.a: "Это здание поможет нам заявить о своём статусе в Азии."
 joi_flavor_jap.27.b: "Это здание следует использовать для установления дипломатических отношений с западными державами."
 joi_flavor_jap.27.c: "Здесь должны собираться члены кадзоку."
  #
 joi_flavor_jap.28.t: "Генеральный штаб [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_jap.28.d: "С расширением и модернизацией армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] устаревшая система командования перестала отвечать новым военным требованиям. По предложению [SCOPE.sCharacter('armed_forces_ig_leader').GetFirstName] [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName] был создан японский Генеральный штаб по образцу прусского. Однако в вопросе о будущем военного строительства страны между генералами армии и флота возникли серьёзные разногласия."
 joi_flavor_jap.28.f: "«По вопросам, связанным с управлением государством, я советуюсь с [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]. Я всё ему рассказываю. Сейчас не то время, что было при изоляции и изгнании иностранцев, поэтому нам нужно, чтобы он работал с людьми дальновидными, способными предвидеть события на сто лет вперёд. [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName] — именно такой человек. Он обладает твёрдой проницательностью и способен претворять свои идеи в жизнь. Я советуюсь с ним по всем вопросам своей политики. Я разговариваю с ним. Я полностью ему доверяю и делюсь с ним своими секретами».\n\n«Когда люди продвигаются по службе и укрепляют своё положение, они, естественно, перестают заниматься своими делами. Они отдают приказы подчинённым, а сами ничего не делают, но [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName] никогда не был таким. Так было не только тогда, но, кажется, и всю его жизнь»."
 joi_flavor_jap.28.a: "Армия должна получать больше всего средств."
 joi_flavor_jap.28.b: "Приоритетом должны быть нужды флота."
  #
 joi_flavor_jap.29.t: "Возвращение земель и реестров"
 joi_flavor_jap.29.d: "С дальнейшей реформой административной системы сохранение старой системы бакухан стало нецелесообразным. По прошению многих даймё с юга, земли и реестры населения, которыми раньше управляли местные даймё, были возвращены двору в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], и на этих территориях было введено прямое управление."
 joi_flavor_jap.29.f: "«Прошение даймё о возвращении земель и реестров дошло до императора, и этот поступок, полный глубокого понимания долга, стал свидетельством вашей верности и мудрости. Ибо всё под небесами — земля государя, и все на этой земле — вассалы государя; поэтому даймё не могут владеть землёй и людьми в частном порядке. Император же не оставит в беде своих преданных вассалов, а потому приказывает двору разобраться в этом деле, отдав то, что должно быть отдано, и забрав то, что должно быть забрано»."
 joi_flavor_jap.29.a: "Административная система нуждается в полной реорганизации."
 joi_flavor_jap.29.b: "Разрешить сохранить часть привилегий даймё."
  #
 joi_flavor_jap.30.t: "Упразднение жалований"
 joi_flavor_jap.30.d: "С приходом к власти нового правительства и укреплением его позиций старая аристократия фактически отошла от дел при дворе. Однако формально за ними всё ещё сохраняются многие затратные должности, что позволяет им ничего не делать и получать от правительства огромные субсидии. [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName] и многие чиновники правительства реставрации начали возмущаться этим и убеждают, что [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен прекратить выплату этих жалований."
 joi_flavor_jap.30.f: "«Все [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], включая бывших даймё, должны получить облигации золотого займа на сумму, равную их жалованию за 5–14 лет за вычетом налога, с погашением в течение 30 лет. После пятилетнего периода заморозки получатели облигаций будут ежегодно выбираться путём лотереи, правительство будет выкупать облигации и выплачивать их номинальную стоимость. В зависимости от размера жалования процентные ставки составят 5%, 6%, 7% и 10%. Чем выше было жалование, тем хуже условия, и наоборот».\n\n«Если те, кто принесёт золото и серебро для обмена, смогут быстро отчеканить их и выпустить в обращение как валюту, то люди смогут сохранить свои старые обычаи, а старое золото и серебро, которые сейчас считаются сокровищами, всего за несколько лет станут равны по ценности золоту и серебру. Если это так, то важно, чтобы они как можно скорее начали торговать и циркулировать, обеспечивая сохранение истинной ценности денег»."
 joi_flavor_jap.30.a: "Выдать им расписку, и хватит с них."
 joi_flavor_jap.30.b: "Невыплаченные жалования будут выданы бывшим даймё в виде государственных облигаций."
  #
 joi_flavor_jap.31.t: "Сёгунат [ROOT.GetCountry.GetRuler.GetLastName] в новую эпоху"
 joi_flavor_jap.31.d: "Благодаря успеху нового курса #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! под руководством, которое осуществлял [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetNameNoFlag] постепенно достигла технологической модернизации и стала считаться равной великим державам мира."
 joi_flavor_jap.31.f: "«Возрадуйся, государь, и скажи: „Я родил детей и наконец обрёл трёх выдающихся потомков“. Сказав это, он со звоном снял и потряс ожерелье из жемчужин и, подарив его богине Аматэрасу, сказал: „Прошу тебя, государыня, править равниной высокого неба“. И он подарил ей ожерелье, имя которому — Микура-тана-но-ками. Затем он сказал богу лунной ночи: „Прошу тебя, государь, править царством ночи“. Так он повелел. Затем он сказал доблестному, быстрому, опрометчивому богу-мужу: „Прошу тебя, государь, править морской равниной“»."
 joi_flavor_jap.31.a: "Авторитет, которым обладает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], будет вечно направлять [ROOT.GetCountry.GetNameNoFlag]."
 joi_flavor_jap.31.b: "[ROOT.GetCountry.GetNameNoFlag] нуждается в большем количестве образованных людей при дворе."
  #
 joi_flavor_jap.32.t: "Демократия [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_jap.32.d: "По мере того как #V новое поколение японцев, выросшее после #V Реставрации Исин#!, взрослеет и начинает заявлять о себе в обществе, люди стали #B включать западную культуру в повседневную жизнь, и это процветает вместе с новой литературой, искусством и театром#!. В то же время, с распространением идей #V демократии и либерализма#!, люди начали уделять внимание повышению статуса простого народа и женщин, что создало атмосферу живой свободы и открытости во всём обществе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.32.f: "«Для кого сегодня ведётся политика? Смею сказать, что она ведётся не для Его Величества, нашего [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и не для народа, а для горстки политиков. Эти политики постепенно забывают о достоинстве, которым обладает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]; они утверждают, что служат народу, но на самом деле их указы противоречивы, награды и наказания несправедливы, а решения основаны на личных симпатиях и антипатиях».\n\n«Даже если вы попытаетесь протестовать, ваше мнение будет заблокировано, а ваши жалобы останутся без внимания. Может ли страна процветать в таких условиях? Даже ребёнок поймёт, что это невозможно, и если мы сейчас не покончим с этими старыми обычаями, государство погибнет».\n\n«Единственный способ спасти страну — это широко советоваться с народом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а единственный способ управлять, советуясь с народом, — это создать выборный парламент. Таким образом, можно будет ограничить власть некоторых тиранов, и в конечном итоге отношения между императором и народом станут гармоничными, и обе стороны смогут наслаждаться счастьем»."
 joi_flavor_jap.32.a: "Эти опасные эгоистичные идеи угрожают [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_jap.32.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен проявить к этому терпимость."
 joi_flavor_jap.32.c: "Романтизм будет способствовать развитию свободы и всеобщего счастья."
  #
 joi_flavor_jap.33.t: "Императорский театр"
 joi_flavor_jap.33.d: "В центре [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] горожане с восхищением смотрят на новое величественное здание: #V Императорский театр#!. Европейский фасад, японские ширмы и интерьер с красными лакированными балками принесли ему славу «театра цивилизации»."
 joi_flavor_jap.33.f: "«Разве великолепие цветущих цветов — это то, что можно увидеть глазами? Облака рассеиваются, и великолепие цветущих цветов так прекрасно, что хочется остановиться на мгновение, но оно быстро превращается в загадку. Я хочу продолжать слушать флейту, слушать эти леденящие шаги, а сердце моё парит в небесах. Я мужчина, это мир мимолётных снов, и я не знаю, как прожить свою жизнь».\n\n«Глаза девушки, губы девушки, лицо, украшенное цветочным макияжем, — поистине несравненная красавица. Даже монах не остался бы равнодушным. Легко поднятые рукава танцовщицы, нежность красавицы — как я и слышал, это сердце Ёсицунэ, это дочь Сидзуки Годзэн»."
 joi_flavor_jap.33.a: "Этот театр сделает [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] новой столицей культуры и искусства!"
  #
 joi_flavor_jap.34.t: "Токийское общество манги"
 joi_flavor_jap.34.d: "Недавно группа молодых художников манги, называющих себя «художниками-юмористами», собралась в Токио и основала оригинальное художественное объединение — #V Токийское общество манги#!. Они подчёркивают юмор и нетрадиционные сцены, такие как танец обнажённых, пытаясь показать, что манга — это вид искусства с системой ценностей, отличной от основного направления."
 joi_flavor_jap.34.f: "«Люди недовольны тем, что в газетной манге появляются карикатуры на политиков и борцов сумо, а у художников, которые рисуют эту мангу, сложился определённый стереотип».\n\n«Мы все считаем, что пережить такие бедствия и испытания, столкнуться с таким количеством необычных трудностей и проблем в жизни, а затем разрешить их или изобразить, представить — это, помимо наших обычных обязанностей художников и мангак, должно быть поистине приятной обязанностью»."
 joi_flavor_jap.34.a: "Эти люди слишком распустились!"
 joi_flavor_jap.34.b: "Манга действительно уникальна!"
  #
 joi_flavor_jap.35.t: "Любовь Оты Тоётаро"
 joi_flavor_jap.35.d: "Недавно опубликованный роман под названием #V «Танцовщица»#! стал очень популярным. В нём рассказывается печальная история молодого японского #v $bureaucrats_only_icon$ чиновника#! Оты Тоётаро, который во время учёбы в Германии встретил танцовщицу по имени Элиза. Их любовь пересекла границы, но из-за клеветы соотечественников его уволили, и он был вынужден вернуться в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_jap.35.f: "«Там мы целыми днями сидели за ширмой в кабинете, справа — Шопенгауэр, слева — Шиллер, и там расцвёл прекрасный цветок. С тех пор наши отношения с девушкой становились всё ближе, и даже наши земляки в городе узнали об этом и вскоре стали считать меня её мужем, хотя между нами была лишь чистая радость».\n\n«Моя любовь к ней внезапно стала ещё сильнее, и именно тогда я понял, как тяжело с ней расставаться. Я отбросил личные соображения, положение было трудным, поэтому некоторые могли сомневаться в моих действиях и даже критиковать меня, но моя любовь к Элизе никогда не была такой поверхностной. С момента нашей первой встречи её печальный вид, волосы, рассыпавшиеся по вискам, её красота и трогательность внезапно нахлынули на мой мозг, ставший ненормальным от горя».\n\n«Как человек, потерявший в море руль, смотрит на далёкие горы, так и Аидзава указал мне путь. Однако эта гора всё ещё окутана густым туманом, и я не уверен, когда смогу её достичь, и даже если достигну, принесёт ли она мне удовлетворение. Хотя я беден, нынешняя жизнь полна радости, и я не могу отказаться от своей любви к Элизе»."
 joi_flavor_jap.35.a: "Любовь с европейкой? Какая нелепость!"
 joi_flavor_jap.35.b: "Любовь и долг не всегда совместимы."
 joi_flavor_jap.35.c: "Его несчастная родина разрушила такую романтическую любовь."
  #
 joi_flavor_jap.36.t: "Культура Гиндзы"
 joi_flavor_jap.36.d: "Звон трамваев и крики газетчиков смешиваются на мощёных улицах. В сердце #V Токио#!, на #V улицах Гиндзы#!, незаметно меняется облик жизни: кофейни заменяют идзакая, универмаги — маленькие лавочки. #B Новая сцена цивилизации и #V новый образ жизни#! зарождаются среди газет, моды и городской суеты#!."
 joi_flavor_jap.36.f: "«Заходишь в кофейню на Гиндза-дори, и в воздухе витает аромат горячих сливок и газетной краски. Рядом — студентка в европейском платье, а у окна — старый джентльмен в шляпе».\n\n«Город меняется. Гиндза больше не просто оживлённая улица, по которой спешат чиновники, а место, где можно остановиться, поговорить, сделать покупки, поразмышлять и даже влюбиться».\n\n«Легкомысленный город, нечистые отношения между полами, толпы молодых людей, слоняющихся перед витринами магазинов, и одно это слоняние уже мешает бизнесу»."
 joi_flavor_jap.36.a: "Слишком легкомысленная и дурная мода."
 joi_flavor_jap.36.b: "Гиндза указывает направление эпохи!"
  #
 joi_flavor_jap.37.t: "Исповедь «неполноценного» человека"
 joi_flavor_jap.37.d: "В среде [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName] в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] тайно распространяется книга под названием #V «Исповедь „неполноценного“ человека»#!. В ней рассказывается о жизни человека по имени Оба Ёдзо, который умеет только паясничать перед людьми, но никому не может показать своё истинное лицо. Декадентский и разочарованный стиль повествования нашёл отклик у многих."
 joi_flavor_jap.37.f: "«Я прожил жизнь, полную стыда... я совершенно не могу понять, что такое „человеческая жизнь“».\n\n«Я постоянно совершал смехотворные ошибки... за это время я много раз пытался покончить с собой, и каждый раз безуспешно»."
 joi_flavor_jap.37.a: "Оба Ёдзо — это отражение каждого из нас."
 joi_flavor_jap.37.b: "Нельзя допускать распространения этой декадентской литературы в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]!"
  #
 joi_flavor_jap.38.t: "«Белая берёза»"
 joi_flavor_jap.38.d: "В кругах группы [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] набирает популярность #V небольшой литературный журнал «Белая берёза»#!. Его сторонники используют журнал для пропаганды либерализма, гуманизма и социального равенства, а также открыто критикуют традиционное чувство чести и социальную культуру нашей страны."
 joi_flavor_jap.38.f: "«Увидев мёртвую пчелу, я почувствовал что-то знакомое в её одинокой и тихой смерти... а её предсмертная суета вызвала у меня страх».\n\n«Я случайно нашёл саламандру на камне в ручье. Я бросил камень, чтобы напугать её, и она умерла. Я сочувствовал ей и одновременно ощущал её одиночество, думая о смерти этих животных и о себе, всё ещё живом»."
 joi_flavor_jap.38.a: "Этот журнал определённо займёт важное место в литературном мире [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.38.b: "Полагаю, этот журнал скоро закроется из-за «финансовых проблем»."
 joi_flavor_jap.38.c: "Очевидно, это иностранные агенты, получающие фунты стерлингов!"
  #
 joi_flavor_jap.39.t: "Сбежавший белый лотос"
 joi_flavor_jap.39.d: "Сегодня газеты [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] опубликовали сенсационную новость: дочь одного #v $aristocrats_only_icon$ аристократа#!, известная писательница, отказалась от брака, устроенного её отцом, бросила своего богатого жениха из числа [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName], владеющего угольными шахтами, и сбежала с бедным студентом-юристом."
 joi_flavor_jap.39.f: "«Я навсегда прощаюсь с теми, кто использует экономическую власть, чтобы пренебрегать достоинством женщины. Я покидаю вас, чтобы защитить и взрастить свою личную свободу и достоинство».\n\n«Это самый мучительный момент в моей жизни. Хотя я не потерплю никакого вмешательства, почему бы ей не умереть? Почему бы не уйти в монастырь?»\n\n«Если дела пойдут плохо, вы можете вместе покончить с собой, а я хотя бы зажгу благовония перед алтарём»."
 joi_flavor_jap.39.a: "Его позор — это заслуженное наказание за его прогнившие феодальные обычаи."
 joi_flavor_jap.39.b: "Беглянка должна быть исключена из числа #v $aristocrats_only_icon$ аристократии#!."
 joi_flavor_jap.39.c: "Правительство не может мириться с таким падением нравов, полиция должна вернуть эту беглянку!"
  #
 joi_flavor_jap.40.t: "Весна и Асура"
 joi_flavor_jap.40.d: "Недавно был опубликован сборник стихов под названием #V «Весна и Асура»#!, в котором автор описывает #B утопический мир#!, прекрасный благодаря духовному совершенству. Некоторые преданные читатели выяснили, что эти талантливые стихи принадлежат перу никому не известного представителя #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_RP')]#!#!."
 joi_flavor_jap.40.f: "«Я нёс белый мешок, словно случайный лесник, насвистывал в майском золотом свете и шагал в такт — какая же это счастливая весна в солнечной системе».\n\n«Всё через меня излучает свой свет; сегодня ты уйдёшь далеко, моя сестра; идёт мокрый снег, но небо необычайно светлое»."
 joi_flavor_jap.40.a: "Это всего лишь фантазии деревенщины."
 joi_flavor_jap.40.b: "Его стихи — это образ сердца мира."
  #
 joi_flavor_jap.41.t: "Движение в защиту конституции"
 joi_flavor_jap.41.d: "По указу, который дал [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], премьер-министром был назначен гэнро времён Реставрации Исин и представитель #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!, [SCOPE.sCharacter('armed_forces_ig_leader').GetFirstName] [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName], в обход выдвижения от партии большинства в парламенте. Этот шаг был назван прессой «неконституционной реставрацией» и немедленно вызвал массовые протесты со стороны #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#!, #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetCustom('RU_IG_RP')]#!#! и #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_RP')]#!#!. Толпы протестующих вышли на улицы [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], скандируя лозунг #bold «Вернуть власть народу!»#! и требуя переформирования кабинета в соответствии с результатами выборов."
 joi_flavor_jap.41.f: "«Стоит [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] открыть рот, как они начинают трубить о верности, будто преданность государю — их единственное дело. Но посмотрите на их поступки: они всегда прячутся в тени, которую отбрасывает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], чтобы нападать на политических противников. Разве они не используют императора как щит, а священные указы — как пули, чтобы, прикрываясь чужой силой, сокрушать своих врагов?»\n\n«Видя смену демократического кабинета и приход к власти военного правительства, я не мог молчать и счёл необходимым снова попытаться объединить представителей всех партий. Мы, лидеры партий, собрались вместе, я изложил им необходимость совместной защиты конституционного строя, и они единогласно согласились».\n\n«Общее мнение лидеров партий таково: [ROOT.GetCountry.GetNameNoFlag] должна стремиться к восстановлению подлинно конституционной парламентской системы»."
 joi_flavor_jap.41.a: "Правление #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! — это откровенное предательство духа конституции!"
 joi_flavor_jap.41.b: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] должны взять вину на себя, а не перекладывать ответственность на Его Величество, нашего [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_jap.41.c: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] — вот истинная опора [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_jap.42.t: "Закон о поддержании общественной безопасности"
 joi_flavor_jap.42.d: "Столкнувшись с непрерывными восстаниями и протестами, разгневанные [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] предложили законопроект под названием «Закон о поддержании общественной безопасности», который должен рассмотреть [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Согласно этому закону, правительство получит право арестовывать и тайно судить любого, чьи действия оно сочтёт угрожающими «государству»."
 joi_flavor_jap.42.f: "«Любой, кто организует или сознательно вступает в общество с целью изменения государственного строя или отрицания системы частной собственности, наказывается лишением свободы на срок до десяти лет; любой, кто с целью, указанной в первом пункте предыдущей статьи, вступает в сговор для совершения перечисленных в нём деяний, наказывается лишением свободы на срок до семи лет или арестом».\n\n«Подстрекательство к совершению деяний, перечисленных в первом пункте первой статьи, наказывается лишением свободы на срок до семи лет; предложение, обещание или предоставление денег или иных выгод с целью склонить другого к совершению преступлений, указанных в первом пункте первой статьи и в предыдущих трёх статьях, наказывается лишением свободы на срок до пяти лет. Тот, кто сознательно принимает такое предложение или даёт такое обещание, наказывается так же».\n\n«Настоящий закон применяется ко всем, кто совершил преступление на территории действия этого закона»."
 joi_flavor_jap.42.a: "Этот законопроект — откровенное предательство свободы слова и собраний!"
 joi_flavor_jap.42.b: "Утвердить закон, пора нанести решительный удар!"
 joi_flavor_jap.42.c: "Отклонить и пересмотреть, надзор должен быть ограничен."
  #
 joi_flavor_jap.43.t: "Закон о надзоре за идейными преступниками"
 joi_flavor_jap.43.d: "После того как либеральные и реформистские течения были подавлены и окончательно маргинализированы, пришедшие к власти [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] и [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] начали тотальную чистку оппонентов. Был принят строгий закон об идейных преступлениях, который дал правительству юридическое основание для ареста любого, кто «идейно» нелоялен «японским традициям и чести»."
 joi_flavor_jap.43.f: "«В отношении лиц, нарушивших закон о поддержании мира, если им назначено условное наказание или если принято решение не возбуждать уголовное дело за ненадобностью, по решению комиссии по надзору может быть установлен надзор. То же самое касается лиц, отбывших наказание или освобождённых условно-досрочно».\n\n«Под надзором понимается наблюдение за мыслями и поведением лица с целью его защиты и предотвращения риска повторного совершения преступления; надзор означает помещение лица под наблюдение инспектора по пробации, передачу его под опеку или поручение его надзору защитного учреждения, храма, церкви, больницы или другого подходящего лица. В отношении лиц, находящихся под надзором, могут быть наложены ограничения на проживание, общение, переписку и т. д.».\n\n«Любой, кто организует общество с целью реформирования государственного строя, или занимает в нём руководящую должность, наказывается смертной казнью, пожизненным заключением или лишением свободы на срок от пяти лет; любой, кто сознательно вступает в такое общество, или совершает действия для достижения его целей, наказывается лишением свободы на срок от двух лет»."
 joi_flavor_jap.43.a: "Сила #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! приведёт [ROOT.GetCountry.GetNameNoFlag] к величию!"
 joi_flavor_jap.43.b: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] действует по священному указу, который издал [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
  #
 joi_flavor_jap.44.t: "Реставрация [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_jap.44.d: "После маргинализации либералов и установления правительством надёжного контроля над #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_TP')]#!#!, призывы к восстановлению духа Реставрации Исин и установлению прямого правления императора быстро набрали силу и достигли высших эшелонов власти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.44.f: "«Весь народ должен успокоиться и глубоко задуматься о том, почему небесная кара и награда различны, установить основы, на которых [ROOT.GetCountry.GetNameNoFlag] должна быть восстановлена, определить единое национальное мнение всего японского народа и, наконец, в великом единении всего японского народа призвать, чтобы наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] применил верховную власть, и подчиниться ему, чтобы быстро завершить восстановление основ государства».\n\n«Заработная плата в принципе должна основываться на свободном договоре, рабочий день должен быть единым и составлять восемь часов, с выходными в воскресенье и праздничные дни, и с выплатой заработной платы; также запрещается использование детского труда до 16 лет».\n\n«Что это за национальная мораль, когда человек, проповедующий небесный путь для братьев и сестёр всего мира, мучает молодых братьев своей страны? Поэтому женский труд свободен, равен мужскому, и делает детей, будущих граждан, лучше»."
 joi_flavor_jap.44.a: "Божественность, которой обладает [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], не подлежит сомнению!"
 joi_flavor_jap.44.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] разделит славу со всем народом."
  #
 joi_flavor_jap.45.t: "Солнце после дождя"
 joi_flavor_jap.45.d: "После долгой эпохи культурного расцвета и открытости идей, движение за свободу и гражданские права наконец одержало победу в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Правительственные ограничения на культуру, издательское дело и искусство были сняты, [GetLawType('law_protected_speech').GetName] была внесена в конституцию, а с проведением первых всеобщих выборов было создано парламентское правительство с разделением властей. Правительство #v $bureaucrats_only_icon$ чиновников#!, #v $aristocrats_only_icon$ аристократов#! и #v $officers_only_icon$ офицеров#!, которое, как призрак, не покидало страну со времён Реставрации Исин, утратило власть, которая была передана конституции, парламенту и всем гражданам."
 joi_flavor_jap.45.f: "«Я хочу сказать вам, что у всех вас есть одно и то же сокровище. Что это за сокровище? Это дерево, которое можно измерить деньгами, или золото, серебро, драгоценные камни? Нет, не то; есть сокровище, более ценное, чем они, и это — свобода. Если не отстаивать гражданские права, не бороться за свободу, то ни счастья, ни благополучия не достичь».\n\n«Государственный строй нашей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] достоин гордости всего мира. Мы стремимся рационально истолковать его основные принципы, чтобы народ твёрдо верил в истинную суть государственного строя. Мифологические объяснения, которые проповедуют так называемые учёные-традиционалисты старой школы, не могут тронуть сердца современной молодёжи. Мы стремимся пойти дальше, определить место Японии в современных мировых тенденциях и разъяснить её глобальную миссию, то есть, какой вклад Япония должна внести в прогресс мировых гуманитарных наук и цивилизации»."
 joi_flavor_jap.45.a: "Разогнав тучи деспотизма и авторитаризма, солнце свободы светит всем гражданам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_jap.45.b: "Народ Ямато возродится из пепла."
  #
 joi_flavor_jap.46.t: "Споры о завоевании Кореи"
 joi_flavor_jap.46.d: "С ходом #V Реставрации Исин#! многие шовинисты в стране начали утверждать, что просвещённая [ROOT.GetCountry.GetNameNoFlag] имеет божественное предначертание вернуть себе земли, которые в древности входили в её состав, то есть, завоевать [SCOPE.sCountry('KOR_scope').GetNameNoFlag]."
 joi_flavor_jap.46.f: "«[SCOPE.sCountry('KOR_scope').GetNameNoFlag] умеет только обороняться, не умеет нападать, знает себя, но не знает других; её народ скрытен, хитёр, упрям и высокомерен. Они не внемлют увещеваниям, не поддаются на провокации, поэтому, если не применить к ним военную силу, они не станут нашими».\n\n«К тому же, Корея презирает нашу империю, в их письменах есть непочтительные слова, что является для нас оскорблением. В нашей империи, если оскорблён государь, вассал должен умереть. Это наш заклятый враг, которого мы должны покарать. Если мы не покараем их, величие императора не будет утверждено, и мы не будем достойными вассалами»."
 joi_flavor_jap.46.a: "Нам нужно поддерживать дружеские отношения с [SCOPE.sCountry('KOR_scope').GetAltNameNoFlag('RU_CL_TP')]."
 joi_flavor_jap.46.b: "Корейский полуостров — это судьба [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
  #
 joi_flavor_jap.47.t: "Южно-Маньчжурское железнодорожное управление"
 joi_flavor_jap.47.d: "После переговоров с представителями всех заинтересованных сторон в Маньчжурии, [ROOT.GetCountry.GetNameNoFlag], [SCOPE.sCountry('RUS_scope').GetNameNoFlag] и [SCOPE.sCountry('CHI_scope').GetNameNoFlag] совместно основали многостороннюю железнодорожную компанию. Она была передана под управление железнодорожного управления, созданного нашим правительством. Дивиденды распределяются в соответствии с долей акций каждой стороны, а право управления и владения переданы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_jap.47.f: "«В отношении развития различных предприятий в Маньчжурии стороны в принципе должны иметь равные интересы. Маньчжурская железная дорога и принадлежащее ей имущество, включая рельсы, шпалы, мосты и все прочие объекты инфраструктуры, вокзалы, платформы, склады, доки, причалы и т. д., должны быть приобретены по фактической цене, согласованной совместными представителями обеих сторон».\n\n«Признавая разумность следования японским тенденциям, компания должна быть организована под надзором [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]; структура компании должна время от времени корректироваться в зависимости от обстоятельств, с конечной целью достижения равного представительства и надзора. Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] согласился вести дела через официальную компанию, осталось лишь получить согласие партнёров, и мы верим, что такое согласие будет получено»."
 joi_flavor_jap.47.a: "Вмешательство правительства поможет укрепить правление империи в Маньчжурии."
 joi_flavor_jap.47.b: "Железнодорожное управление также должно в полной мере участвовать в честной рыночной конкуренции."
  #
 joi_flavor_jap.48.t: "Социализм в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]?"
 joi_flavor_jap.48.d: "Группа социалистов основала в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] партию под названием «Социалистическая партия Японии» и представила так называемую «партийную программу». Согласно их программе, [ROOT.GetCountry.GetNameNoFlag] в будущем изменит свой государственный строй и станет социалистической страной."
 joi_flavor_jap.48.f: "«Социалистическая партия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — это классовая массовая партия, состоящая из широких слоёв трудящихся, ядром которой является рабочий класс, а также крестьяне, мелкие предприниматели, интеллигенция, студенты и т. д. Члены партии имеют чёткие убеждения и готовы посвятить себя достижению целей партии».\n\n«Отношения между партией и массовыми организациями: члены партии наиболее отважно борются за свои организации, завоёвывают доверие и поддержку масс и своим моральным влиянием ведут борьбу этих организаций».\n\n«Текущие цели партии — достижение мира и независимости, защита свободы и демократии и защита жизни трудящихся; сохранение классового характера партии, установление внутрипартийной демократии»."
 joi_flavor_jap.48.a: "Строго запретить этих отвратительных социалистов!"
 joi_flavor_jap.48.b: "Даже если мы не согласны с ними, мы должны защищать их право на участие в политике."
  #
 joi_flavor_jap.49.t: "Англо-японский союз"
 joi_flavor_jap.49.d: "С ростом влияния [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_RP')] на Дальнем Востоке и совпадением их интересов с интересами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Тихом океане, министр иностранных дел Японии прибыл в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и предложил правительству Его Величества, нашего [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], подписать долгосрочный договор о военном союзе для укрепления дружбы между двумя странами."
 joi_flavor_jap.49.f: "«Договаривающиеся стороны взаимно признают особые интересы друг друга и заявляют, что они не подвержены агрессивным тенденциям. Однако, учитывая особые интересы сторон, из которых интересы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в основном связаны с Китаем, а [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_RP')], помимо интересов в Китае, имеет особые политические, коммерческие и промышленные интересы в Корее, договаривающиеся стороны признают, что если их интересы окажутся под угрозой из-за агрессивных действий любой другой державы или беспорядков в Китае или Корее, требующих вмешательства одной из договаривающихся сторон для защиты жизни и имущества своих подданных, любая из сторон может принять необходимые меры для защиты этих интересов».\n\n«Если одна из подписавших сторон вступит в войну в соответствии с первой статьёй, другая сторона объявит нейтралитет. Если одна из сторон вступит в войну с несколькими великими державами, другая сторона обязуется оказать поддержку. Подписавшие стороны обязуются не заключать сепаратных соглашений с другими странами в ущерб этому союзу и обязуются проводить откровенные и полные консультации, когда любой из интересов, затрагиваемых настоящим договором, окажется под угрозой»."
 joi_flavor_jap.49.a: "Эти коротышки не стоят и одной монеты."
 joi_flavor_jap.49.b: "Подписать договор, Япония станет надёжным союзником [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на Востоке!"
  #
 joi_flavor_jap.50.t: "Общие предки японцев и корейцев?"
 joi_flavor_jap.50.d: "После того как [ROOT.GetCountry.GetNameNoFlag] укрепила своё правление на Корейском полуострове, там начала распространяться теория об «общих предках японцев и корейцев». Её сторонники утверждают, что корейцы и народ Ямато на самом деле происходят от одного корня и потому должны быть одной семьёй."
 joi_flavor_jap.50.f: "«[ROOT.GetCountry.GetNameNoFlag] не намерена аннексировать Корею. Корейцы каждый раз неверно истолковывают намерения Японии, но у Японии никогда не было таких намерений, и, конечно, она не осмелится на такое. Говорят, что некоторые японцы, пользуясь этим инцидентом, призывают к аннексии Кореи. Я считаю аннексию совершенно ненужной, она лишь добавит хлопот. Следует позволить Корее развивать самоуправление».\n\n«Если страна богата и сильна, а армия могущественна, то, естественно, нечего бояться, что Корея нанесёт удар в спину. [ROOT.GetCountry.GetNameNoFlag] желает Корее богатства и силы, но с единственным условием: Корея должна долгое время поддерживать дружеские отношения с Японией и сотрудничать с ней».\n\n«Я думаю, что, подобно Германскому союзу в Вюртемберге, было бы в интересах Японии направлять Корею, развивать своё влияние, распространять финансовое и экономическое образование и в конечном итоге привести Корею к созданию федеративного правительства»."
 joi_flavor_jap.50.a: "У нас с корейцами общие предки, они по праву должны стать гражданами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.50.b: "Ерунда! Один удар кнута нашего Его Величества, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и корейские рабы будут работать!"
  #
 joi_flavor_jap.51.t: "Убийство [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName]"
 joi_flavor_jap.51.d: "Новый генерал-резидент Кореи, [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName], был убит корейским националистом во время встречи с министром финансов [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] на вокзале в Харбине. Он получил три пулевых ранения и скончался на месте. Эта новость потрясла всю [ROOT.GetCountry.GetNameNoFlag]. Подозреваемый был схвачен и доставлен в суд Квантуна для разбирательства. Многие западные адвокаты, поддерживающие его, подали заявки на его защиту."
 joi_flavor_jap.51.f: "«Я три года с трудом боролся за границей за восстановление независимости Кореи и поддержание мира на Востоке, но в итоге не смог достичь своей цели и умираю здесь. Двадцать миллионов моих братьев и сестёр, каждый из вас должен усердно учиться, развивать промышленность, восстановить свободу и независимость, и унаследовать мою волю, чтобы усопший не жалел ни о чём».\n\n«После моей смерти похороните мои останки рядом с харбинским парком, а когда суверенитет страны будет восстановлен, перевезите их на родину. Даже на небесах я буду стремиться к восстановлению нашей страны. Вернись и скажи своим соотечественникам, что каждый должен взять на себя ответственность за страну, исполнять свой гражданский долг, объединить усилия и совершить великие дела. Когда звуки независимости Кореи достигнут небес, я непременно буду радоваться за страну и нацию с небес».\n\n«В меня выстрелили трижды. Кто это... Понятно. Какой же он дурак»."
 joi_flavor_jap.51.a: "Судить его по международному праву как вражеского солдата, чтобы не делать из него национального героя для корейцев."
 joi_flavor_jap.51.b: "Тайный приказ суду Квантуна: убийца должен быть приговорён к высшей мере наказания по обвинению в терроризме!"
  #
 joi_flavor_jap.52.t: "Японо-маньчжурский протокол"
 joi_flavor_jap.52.d: "После того как Маньчжурия перешла под контроль [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], мы успешно установили там марионеточный режим и японского генерал-губернатора и начали переговоры с [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')], требуя от них признания нашего суверенитета в Маньчжурии."
 joi_flavor_jap.52.f: "«До заключения нового договора между [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')] и Японией, все существующие права и интересы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] или японских подданных на территории Маньчжурии, основанные на существующих японо-китайских договорах, соглашениях и других публичных и частных контрактах, должны быть подтверждены и уважаемы».\n\n«Маньчжоу-го и Япония подтверждают, что любая угроза территории и безопасности одной из договаривающихся сторон является также угрозой миру и существованию другой договаривающейся стороны, и договариваются о совместной обороне своих государств; для этой цели японские войска будут размещены на территории Маньчжоу-го»."
 joi_flavor_jap.52.a: "Завоевание Маньчжурии — лишь первый шаг к укрощению дракона."
 joi_flavor_jap.52.b: "Подписать договор, существующие границы Маньчжурии уже достаточно хороши."
  #
 joi_flavor_jap.53.t: "Симоносекский договор"
 joi_flavor_jap.53.d: "После сокрушительного поражения [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] в войне, правительство в Пекине было вынуждено уступить [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_DP')] Тайвань и прилегающие острова, а также Далянь. Многие считают, что это, возможно, стало похоронным звоном для небесного мандата [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_jap.53.f: "«[SCOPE.sCountry('CHI_scope').GetNameNoFlag] определённо признаёт все права [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_RP')] в Корее, поэтому выплата дани и проведение церемоний, умаляющих эту независимость и автономию, отныне должны быть полностью прекращены».\n\n«Китай навсегда уступает [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_DP')] в полное и вечное владение южную часть провинции Фэнтянь, остров Тайвань и все прилегающие к нему острова, а также острова Пэнху, то есть все острова, расположенные между 119 и 120 градусами восточной долготы от Гринвича и 23 и 24 градусами северной широты, со всеми их укреплениями, арсеналами и государственной собственностью».\n\n«[SCOPE.sCountry('CHI_scope').GetNameNoFlag] соглашается выплатить Японии военную контрибуцию в размере двухсот миллионов купинских лянов, которая будет выплачена восемью частями; первая часть в размере пятидесяти миллионов лянов должна быть выплачена в течение шести месяцев после обмена ратификационными грамотами настоящего договора»."
 joi_flavor_jap.53.a: "Незавершённое дело генерала Тоётоми Хидэёси будет доведено до конца! Сделает это наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]!"
 joi_flavor_jap.53.b: "Неужели Небесный мандат, который держит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], действительно близок к концу?"
  #
 joi_flavor_jap.54.t: "[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting] военный советник"
 joi_flavor_jap.54.d: "Проявив интерес к процессу модернизации [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('military_consultant_country').GetNameNoFlag] предложила направить к нам генерала [SCOPE.sCharacter('military_consultant_general').GetFullName] в качестве военного советника. Условия этого соглашения кажутся нам очень выгодными, но нам следует дважды подумать, прежде чем принимать услуги от иностранной державы."
 joi_flavor_jap.54.f: "«Это, сэр, пулемёт Гатлинга. Двести выстрелов в минуту. Ничто, будь то человек, зверь или машина, не выдержит адского шквала пуль, который высвобождает этот механизм. Мы научим ваших солдат обращаться с этой машиной, поддерживать современную воинскую дисциплину и беспрекословно подчиняться приказам вышестоящих»."
 joi_flavor_jap.54.a: "Мы приветствуем помощь #tooltippable_name [SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting]их#!."
 joi_flavor_jap.54.b: "Нам не нужен их отравленный кубок."
  #
 joi_flavor_jap.55.t: "Дипломатическая миссия в [SCOPE.sCountry('japan_embassy_country').GetCustom('RU_CL_VP')]"
 joi_flavor_jap.55.d: "В рамках своего путешествия на Запад наша делегация встретилась с [SCOPE.sCharacter('japan_embassy_politician').GetFullName], опытным политиком из [SCOPE.sCountry('japan_embassy_country').GetAltNameNoFlag('RU_CL_RP')]. Заинтересованный в установлении добрых отношений с недавно открывшимся режимом [ROOT.GetCountry.GetAdjectiveNoFormatting], он подготовил несколько проектов соглашений, которые мы, возможно, захотим подписать с [SCOPE.sCountry('japan_embassy_country').GetAltNameNoFlag('RU_CL_TP')]."
 joi_flavor_jap.55.f: "«В настоящее время все страны мира, хотя и общаются друг с другом с дружелюбием и учтивостью, делают это лишь для вида; в тайне же сильные продолжают угнетать слабых, а большие — унижать малых. В то время у [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] было много дружественных стран, но среди них страна, которая ценила бы национальный суверенитет так же, как [SCOPE.sCountry('japan_embassy_country').GetNameNoFlag], должна быть названа самой дружественной из всех»."
 joi_flavor_jap.55.a: "Установить прочные дипломатические отношения."
 joi_flavor_jap.55.b: "[SCOPE.sCountry('japan_embassy_country').GetNameNoFlag] может многому нас научить."
 joi_flavor_jap.55.c: "Мы ничего не получим от [SCOPE.sCountry('japan_embassy_country').GetAltNameNoFlag('RU_CL_RP')]."
  #
 joi_flavor_jap.56.t: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] инвестиции"
 joi_flavor_jap.56.d: "[SCOPE.sCharacter('western_investor_ig_leader').GetFullName], богатый и влиятельный промышленник из [SCOPE.sCountry('western_investor_country').GetNameNoFlag], видит в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] прибыльный, но ещё не освоенный рынок. В обмен на политическую поддержку в будущем [SCOPE.sCharacter('western_investor_ig_leader').GetFullName] готов поделиться с нами некоторыми промышленными технологиями своей родины."
 joi_flavor_jap.56.f: "«Некоторые из моих коллег пренебрегают интересами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], считая, что здесь нет ценных природных ресурсов и привлекательности для ведения бизнеса. Однако я вижу потенциал этой страны. Там, где сегодня девственные леса и заброшенные поля, завтра вырастут городские центры, дышащие здоровым дымом современной промышленности»."
 joi_flavor_jap.56.a: "Изобретательность #tooltippable_name [SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting]их#! поможет [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] стать богатой и сильной."
 joi_flavor_jap.56.b: "Нам не нужны иностранцы, вмешивающиеся в нашу экономику."