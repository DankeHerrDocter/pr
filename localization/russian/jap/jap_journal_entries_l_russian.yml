 sign_alliance_treaty_tt: "Мы подпишем договор о военном союзе."
 sign_alliance_treaty_2_tt: "Мы подпишем договор о совместной обороне."
 refuse_anglo_japanese_alliance_tt: "Мы откажемся от англо-японского союза, что сделает недоступной запись в дневнике #V Англо-японский союз#!."
 anglo_japanese_alliance: "Англо-японский союз"
 anglo_japanese_alliance_reason: "Хотя в прошлом [SCOPE.sCountry('GBR_scope').GetNameNoFlag] и [SCOPE.sCountry('JAP_scope').GetNameNoFlag] почти не имели исторических связей, статус #V морских держав#! и #V общие интересы в Азии#! в итоге привели к тому, что [ROOT.GetCountry.GetNameNoFlag] заключила военный союз с этой далёкой страной.\n\n#B Ситуация на Дальнем Востоке стремительно меняется#!, и новый #V военный союз#! выгоден как #B старой европейской державе, [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')], так и новой азиатской, [SCOPE.sCountry('JAP_scope').GetAltNameNoFlag('RU_CL_DP')]#!. Сдерживая другие [Concept('concept_great_power', 'великие державы')] этим договором, наши страны #B смогут взаимно защищать свои имперские интересы в Азии#!.\n\nПока этот союз действует, #B наши страны смогут изолировать любую другую [Concept('concept_great_power', 'великую державу')], пытающуюся закрепиться в Азии, и поддерживать дружественные мирные отношения.#!"
 anglo_japanese_alliance_possible_1_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Реставрация Исин#!"
 anglo_japanese_alliance_possible_2_tt: "Наша страна приняла предложение Японии о союзе."
 anglo_japanese_alliance_fail_1_tt: "Одна из сторон вышла из договора."
 anglo_japanese_alliance_fail_2_tt: "Война с Японией"
 anglo_japanese_alliance_fail_3_tt: "Война с Великобританией"
 anglo_japanese_alliance_1_button: "Продлить союзный договор"
 anglo_japanese_alliance_1_button_desc: "Союзный договор — важный дипломатический инструмент для защиты наших общих интересов в Азии, но срок его действия истекает. Мы должны провести переговоры для сохранения этого важного союза."
 anglo_japanese_alliance_2_button: "Продлить союзный договор"
 anglo_japanese_alliance_2_button_desc: "Союзный договор — важный дипломатический инструмент для защиты наших общих интересов в Азии, но срок его действия истекает. Мы должны провести переговоры для сохранения этого важного союза."
 anglo_japanese_alliance_3_button: "Арендовать японские военно-морские порты"
 anglo_japanese_alliance_3_button_desc: "Хотя у нас есть военные базы и порты в Азии, выгодное расположение и хорошее снабжение японских портов могут поддержать любые наши военные операции на Дальнем Востоке и в Тихом океане. Благодаря союзному договору мы сможем договориться об их аренде."
 anglo_japanese_alliance_4_button: "Арендовать британские военно-морские порты"
 anglo_japanese_alliance_4_button_desc: "Великобритания — старая мировая империя, чьи военные базы и порты позволяют её войскам легко действовать в любой точке мира без проблем со снабжением. Благодаря союзному договору мы сможем договориться об их аренде."
 anglo_japanese_alliance_5_button: "Выйти из англо-японского союза"
 anglo_japanese_alliance_5_button_desc: "В нынешней ситуации условия англо-японского союза больше не приносят нашей стране никакой пользы и даже мешают нашему дальнейшему расширению в Азии и Тихоокеанском регионе. Мы уведомим другую сторону, что выйдем из союза по истечении срока его действия."
 never_leave_anglo_japanese_alliance_tt: "Ни одна из сторон ещё не вышла из союза"
 anglo_japanese_alliance_5_button_tt: "Мы выйдем из союза, и запись в дневнике #V Англо-японский союз#! будет удалена у обеих сторон."
  #
 seikanron_conqueror_korea: "Споры о завоевании Кореи"
 seikanron_conqueror_korea_reason: "По мере того как наша страна постепенно просвещалась, внутри [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] стали раздаваться #B призывы к внешней экспансии#!. Среди множества целей чаще всего упоминалась [SCOPE.sCountry('KOR_scope').GetNameNoFlag], наша ближайшая соседка.\n\n#V Корейский полуостров#!, находящийся на перекрёстке путей Восточной Азии, с древних времён был культурно близок нашему государству. Однако нынешняя [SCOPE.sCountry('KOR_scope').GetNameNoFlag] продолжает цепляться за старые порядки, придерживаясь политики изоляции и игнорируя мировые тенденции. Она #B неоднократно отвергала послов и предложения о дружбе и торговле от великой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и даже проявляла неуважение#!. #B Это не только было воспринято многими лидерами #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! как #V дипломатическое унижение#!#!, но и некоторые сторонники решительных действий из числа #v $officers_only_icon$ офицеров#! напрямую предложили Его Величеству [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императору')] [ROOT.GetCountry.GetRuler.GetFirstName] #B провести быструю военную операцию, чтобы смыть позор поражения времён годов Бунроку, положить конец незаконному сюзеренитету [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] над [SCOPE.sCountry('KOR_scope').GetAltNameNoFlag('RU_CL_VP')] и передать её под власть нашей страны.#!"
 finsih_meiji_military_dip_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')] #V Исин: богатая страна, сильная армия#! и #V Исин: укрепление суверенитета#!"
 finsih_shogunate_reform_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Новый курс сёгуната#!"
 japan_refuse_seikanron_tt: "Это удалит [Concept('concept_journal_entry', 'запись в дневнике')] #V Споры о завоевании Кореи#!"
 seikanron_conqueror_korea_fail_tt: "Отказаться от завоевания Кореи"
 seikanron_conqueror_korea_complete_tt: "Принять план завоевания Кореи"
 seikanron_korean_adm: "Нестабильное правление в Корее"
 seikanron_korean_adm_reason: "#V Шкала прогресса показывает текущую стабильность правления [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на Корейском полуострове#!. \nМягкая национальная политика, всеобщее избирательное право, органы внутренних дел, сильная полиция и низкий уровень местных волнений будут способствовать повышению #V стабильности правления#!. Жёсткая национальная политика, высокий уровень местных волнений и отсутствие органов внутренних дел будут снижать #V стабильность правления#!.\n\nПравление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на #V Корейском полуострове#! нестабильно. Группа #B республиканцев, называющих себя «законным правительством»#!, бежала в [SCOPE.sCountry('CHI_scope').GetNameNoFlag] и [SCOPE.sCountry('USA_scope').GetNameNoFlag], где создала правительство в изгнании. Сам полуостров охвачен #B серьёзными [Concept('concept_turmoil', 'беспорядками')]#!. Многие #V местные смутьяны, выступающие против имперского правления#!, организуют [Concept('concept_secession', 'сепаратистские движения')], пытаясь выйти из-под власти Его Величества [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императора')] и восстановить свою независимость.\n\n#B [ROOT.GetCountry.GetNameNoFlag] должна принять меры, чтобы подавить местное сопротивление и ассимилировать Корейский полуостров, сделав его законной частью японского государства.#!"
 seikanron_korean_adm_complete_tt: "#V Стабильность в Корее#! не ниже 300"
 seikanron_korean_adm_fail_tt: "#V Стабильность в Корее#! упала до 0"
