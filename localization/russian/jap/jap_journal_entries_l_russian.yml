 japanese_imperial_troops_1_button_desc: "Япония — островное государство, чья безопасность и интересы лежат в море. Нам нужен флот для защиты наших морских путей, поэтому он должен получать максимум ресурсов."
 japanese_imperial_troops_2_button: "Направить ресурсы армии"
 japanese_imperial_troops_2_button_desc: "Япония должна заявить о своей силе на мировой арене, поэтому нам необходимо постоянно расширять сухопутные силы империи. Армия должна получать максимум ресурсов."
 japanese_imperial_troops_1_button_possible_tt: "Направление ресурсов не изменялось в течение последнего года"
 japanese_imperial_troops_3_button: "Отменить приоритет"
 japanese_imperial_troops_3_button_desc: "Армия и флот одинаково важны для империи. Необходимо прекратить споры о финансировании между видами вооружённых сил и относиться к ним справедливо."
