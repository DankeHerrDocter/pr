 combined_fleet_shipbuilding_plan: "План строительства Объединённого флота"
 combined_fleet_shipbuilding_plan_reason: "Со времён #V Реставрации Исин#! [ROOT.GetCountry.GetNameNoFlag] стремится создать #V современный военно-морской флот#!, способный сравниться с западными [Concept('great_power', 'великими державами')]. Теперь, с #B завершением индустриализации и постоянным расширением заморских интересов империи#!, #B строительство мощного флота встало на повестку дня#!.\n\nС помощью группы выдающихся морских #v $officers_only_icon$ офицеров#!, [Concept('government', 'правительство')], взяв за образец мощные [Concept('concept_fleet', 'флоты')] Европы, такие как Королевский флот, разработало грандиозный план. #B Его основой станут три эскадры линкоров, дополненные крейсерами, эсминцами и судами снабжения, чтобы создать современный [Concept('concept_fleet', 'флот')], способный вести океанские сражения, блокировать островные цепи и завоёвывать господство на море#!. Вся страна в ближайшие годы #B приложит все усилия для реализации этого проекта#!.\n\n#B Ради заморских интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] наши военно-морские силы должны быть способны сравниться с самыми [Concept('concept_powerful', 'мощными')] [Concept('concept_fleet', 'флотами')] мира!#!"
 combined_fleet_shipbuilding_plan_complete_tt: "Размер нашего флота должен быть как минимум не меньше российского и больше китайского."
