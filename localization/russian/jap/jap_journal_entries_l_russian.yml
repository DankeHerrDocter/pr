 kenseiyougoundo_movement_reason: "#V Поддержка конституции#! растёт с усилением прогрессивных сил и либеральных законов; и снижается с усилением консервативных сил, армии, а также авторитарных и цензурных законов.\n\nМногие оптимистично полагали, что под сиянием [ROOT.GetCountry.GetRuler.GetFirstName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] наступит #B эпоха свободы и демократии#!, но нынешняя ситуация развеяла их иллюзии. #B Группа #v $officers_only_icon$ офицеров#!, поддерживаемая #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_TP')]#!#!, нарушила #V Конституцию Японской империи#!, #N совершила вооружённый переворот#!, распустила #V законный кабинет#!, сформированный по итогам последних [Concept('concept_election', 'выборов')], и создала #N военный кабинет#!, который #B под предлогом «чрезвычайного положения» взял под контроль священный имперский парламент#! и открыто манипулирует [Concept('government', 'правительством')] в интересах #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!.\n\n#B Конституция [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] подвергается самому варварскому попранию#!. По всей стране проходят демонстрации против #v $officers_only_icon$ офицеров-путчистов#!. #B Лидеры нескольких демократических партий обратились к Его Величеству [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императору')] [ROOT.GetCountry.GetRuler.GetFirstName] с петицией, надеясь, что он воспользуется своими конституционными полномочиями, издаст священный указ о роспуске #N военного кабинета#! и назначит новые [concept_election].#!"
