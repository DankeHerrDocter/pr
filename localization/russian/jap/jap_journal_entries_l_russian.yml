 jap_conqueror_manchuria: "Завоевание Маньчжурии"
 jap_conqueror_manchuria_reason: "Именно с этих земель Маньчжурии, между белыми горами и чёрными водами, поднялся императорский род [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')], чтобы побороться за Срединную равнину и в итоге создать великую империю. Однако #B сегодня некогда важная Маньчжурия уже не та прародина, что была прежде#!. Политический упадок, слабая армия, хищные взгляды держав, народ, страдающий от войн и голода — всё это привело к тому, что страна, правящая этими землями, находится в глубоком внутреннем кризисе.\n\nВ то же время, в глазах #v $bureaucrats_only_icon$ чиновников#! и #v $officers_only_icon$ офицеров#! нашего [Concept('government', 'правительства')], #B Маньчжурия — это не просто географическая окраина#!, а #B центр стратегических и ресурсных интересов#!. Она обширна, соединяет Срединную равнину, Монголию и Корею; говорят, там скрыты богатые запасы угля, железной руды, леса и плодородные чернозёмы, которые могут стать отличной базой для нашей промышленности и наращивания военной мощи.\n\n[SCOPE.sCountry('RUS_scope').GetNameNoFlag] уже опередила нас, захватив множество интересов в Восточной Азии. Мы не должны отставать. Необходимо воспользоваться внутренней смутой в [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_PP')], чтобы захватить эту ценную землю и превратить её в новый дом для народа Ямато и плацдарм для наступления на Срединную равнину."
 finish_seikanron_conqueror_korea_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Споры о завоевании Кореи#!"
 finish_seikanron_conqueror_taiwan_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Завоевание Тайваня#!"
 give_back_peiking_tt: "Мы вернём Китаю оккупированные провинции Пекин и Монголию."
 jap_conqueror_taiwan: "Завоевание Тайваня"
 jap_conqueror_taiwan_reason: "Тайвань имеет важное стратегическое значение для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Южных морях. Контролируя этот остров, мы не только получим богатые ресурсы, но и обретём удобную базу для дальнейшего продвижения на острова Тихого океана.\n\n[SCOPE.sCountry('CHI_scope').GetNameNoFlag] переживает глубокий упадок своей власти. Мы должны воспользоваться этой уникальной возможностью, чтобы отнять у них этот драгоценный остров и укрепить положение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Восточной Азии."
 has_jap_conqueror_taiwan_je_tt: "Уже принято решение о походе на Тайвань"
 jap_conqueror_manchuria_je_tt: "Уже принято решение о походе на Маньчжурию"
  #
 japan_industrialize: "Индустриализация Японских островов"
 japan_industrialize_reason: "Со времён #V Реставрации Исин#! [ROOT.GetCountry.GetNameNoFlag] успешно вступила в современную эпоху. #B Внешняя торговля принесла на острова множество ресурсов и технологий, а завезённые с Запада паровые машины меняют облик мастерских. Новые заводы строятся в Канто, Кансае, на Кюсю и даже на Хоккайдо.#!\n\nОднако, поскольку #V индустриализация#! других [Concept('concept_great_power', 'великих держав')] мира продолжает стремительно развиваться, мы всё ещё #B далеки от их экономического уровня#!. Чтобы промышленность нашей страны быстро достигла мирового уровня, [Concept('government', 'правительство')], которое возглавляет наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], утвердило масштабный инвестиционный план. Мы, под руководством [Concept('government', 'правительства')], создадим на всех островах #B единую, взаимосвязанную и регионально специализированную мощную промышленную систему, чтобы [ROOT.GetCountry.GetNameNoFlag] не отстала в этой мировой промышленной гонке.#!"
 japan_industrialize_status: "Создать на родных островах единый огромный промышленный регион"
 japan_industrialize_possible_1_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Развитие производства и промышленности»#!"
 manchuria_industrialize: "Индустриализация Маньчжурии"
 manchuria_industrialize_reason: "С ростом мощи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] наш взгляд на промышленное развитие не должен ограничиваться родными островами. #bold #V Маньчжурия#!, эта обширная и плодородная земля#!, должна быть включена в долгосрочные планы нашей национальной промышленной системы.\n\nС тех пор как [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] успешно завоевала земли Маньчжурии, они рассматриваются как наш #B новый дом в Восточной Азии и отличный плацдарм для дальнейшего наступления на [SCOPE.sCountry('CHI_scope').GetNameNoFlag]#!, однако это, несомненно, #B требует инвестиций с родины#!.\n\nНаш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] утвердил предложение о создании промышленной базы в Маньчжурии. Мы будем #B планомерно направлять в Маньчжурию [Concept('concept_migration', 'мигрантов')] и превратим обширные чернозёмные земли в прочный костяк империи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Восточной Азии.#!"
 russia_finish_vladivostok_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Строительство города Владивосток#!"
 manchuria_industrialize_status: "Превратить Маньчжурию в наш передовой промышленный плацдарм в Китае"
 tohoku_industrialize: "Строительство военной промышленности в Тохоку"
 tohoku_industrialize_reason: "В процессе индустриализации [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] регионы Токио и Кансай долгое время пользовались концентрацией ресурсов и капитала, в то время как #V регион Тохоку#! всегда оставался #B «периферией»#! и игнорировался. Однако, когда над империей начали сгущаться тучи [Concept('concept_war', 'войны')], [Concept('government', 'правительство')] обнаружило #B уникальные преимущества Тохоку в плане военной безопасности.#!\n\n#V Регион Тохоку#! малонаселён, имеет много гор, находится недалеко от Корейского пролива и близок к нашим линиям фронта с другими тихоокеанскими державами. Поэтому [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] добилась от кабинета министров утверждения #B комплексного плана военного освоения#! Тохоку.\n\nПланируется строительство оружейных, артиллерийских и патронных заводов, а верфи начинают переноситься из Эдо и Нагасаки в порты Тохоку. Мы верим, что при поддержке [Concept('government', 'правительства')] #B регион Тохоку станет крупнейшим центром военной промышленности не только в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], но и во всём мире.#!"
 tohoku_industrialize_possible_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Индустриализация Японских островов#!"
 manchuria_railway_bureau: "Маньчжурское железнодорожное управление"
 manchuria_railway_bureau_reason: "#V Маньчжурское железнодорожное управление#! — это #B официальный орган, созданный правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] для управления, эксплуатации и развития железных дорог в Маньчжурии#!. Он выполняет тройную функцию: #B железнодорожного управления, коммерческого предприятия и военно-логистического узла#!. Его статус беспрецедентен, и некоторые европейские зеваки даже называют его #V «Дальневосточной Ост-Индской компанией»#!.\n\nС момента индустриализации Маньчжурии сложная #V железнодорожная сеть#! там требовала единого планирования и управления. Для этого наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] приказал создать #V Маньчжурское железнодорожное управление#! и уполномочил его #B взять под контроль все железнодорожные линии от Порт-Артура до Хэйлунцзяна, расширять ветки и военные станции, а также управлять прилегающими землями, шахтами, портами и складскими объектами#!.\n\nХотя #V Маньчжурское железнодорожное управление#! в настоящее время приносит нашему [Concept('government', 'правительству')] значительную прибыль, оно, как и любое крупное государственное предприятие, сталкивается с #B проблемами низкой эффективности управления и коррупции#!. Однако нельзя отрицать, что #B оно действительно сделало Маньчжурию неотъемлемой частью промышленной карты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!."
