 joi_jap_event_6_1_tt: "Мы признаем теорию императорского мандата, что будет увеличивать прогресс сторонников сёгуната на 0,5 в месяц в течение следующего года."
 joi_jap_event_6_2_tt: "Мы признаем доктрину «Сонно Дзёи», что будет увеличивать прогресс сторонников реставрации на 0,5 в месяц в течение следующего года."
 joi_jap_event_7_1_tt: "Мы затянем судебный процесс над убийцами, что будет увеличивать прогресс сторонников реставрации на 0,5 в месяц в течение следующего года."
 joi_jap_event_7_2_tt: "Мы немедленно казним убийц, что будет увеличивать прогресс сторонников сёгуната на 0,5 в месяц в течение следующего года."
 joi_jap_event_8_1_tt: "Императорский указ будет обнародован по всей стране, что будет увеличивать прогресс сторонников реставрации на 0,5 в месяц в течение следующего года."
 joi_jap_event_8_2_tt: "Силы отряда «Тэнтюгуми» будут подавлены сёгунатом, что будет увеличивать прогресс сторонников сёгуната на 0,5 в месяц в течение следующего года."
