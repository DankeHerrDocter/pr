 edo_period: "Период Эдо"
 edo_period_reason: "#V Прогресс сторонников реставрации#! #B увеличивается с ростом влияния прогрессивных сил, открытием страны и победой в [Concept('concept_revolution', 'революции')]#!.\n#V Прогресс сторонников сёгуната#! #B увеличивается с ростом влияния реакционных сил, политикой изоляции и поражением в [Concept('concept_revolution', 'революции')]#!.\n\nС тех пор как #B первый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, #V Токугава Иэясу#!, одержал победу в #V битве при Сэкигахаре#!, объединил страну и #B положил начало #V периоду Эдо#!, в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] уже более двухсот лет не было крупных смут. Верные [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'сёгуну')] #B даймё#! управляют землями от имени двора; законы #B кугэ и букэ#! строги, социальные классы чётко разделены, воины, крестьяне, ремесленники и торговцы исполняют свой долг, а народ послушен. Хотя страна и не стала богатой и сильной, в ней надолго воцарился мир.\n\nОднако с распространением #V великого голода годов Тэмпо#! по всей стране слышны стоны, и вековое благополучие подорвано. #B Периодические визиты западных держав и иностранных торговых судов#! подрывают #V политику изоляции (сакоку)#!, на которой держится авторитет сёгуната [ROOT.GetCountry.GetRuler.GetLastName], что ведёт к #B ослаблению центральной власти в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!. Народ ропщет, в княжествах зреет недовольство, и кажется, что правление, которое осуществляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], #B вот-вот рухнет#!.\n\n#B Период Эдо в Японии длился более двухсот лет. Сможет ли правление сёгуната [ROOT.GetCountry.GetRuler.GetLastName] продлиться ещё двести?#!"
