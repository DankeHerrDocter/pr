 meiji_boshin_war: "Реставрация имперского правления"
 meiji_boshin_war_reason: "#V Влияние сёгуната#!#B снижается с ростом прогрессивных сил и верности #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_DP')]#!#!, и растёт с ростом консервативных сил.#!\n\nС тех пор как [ROOT.GetCountry.GetRuler.GetFirstName] #V как [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] начал править лично#!, [ROOT.GetCountry.GetNameNoFlag] пытается создать систему, сочетающую старые и новые порядки, чтобы завершить реставрацию, не затрагивая основ. Однако #B [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName], некогда контролировавшие всю страну, и их сторонники в княжествах не намерены так просто отдавать власть.#!\n\nПротивники реформ из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! и #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!, верных #V сёгуну#!, заключают новые союзы и #B связываются со старыми клановыми силами по всей стране#!, пытаясь #V силой оружия свергнуть правительство Исин, возглавляемое #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_TP')]#!#!.\n\n#B Мы должны быстро укрепить свои позиции и собрать достаточные вооружённые силы для отражения#!#V возможной попытки реставрации со стороны #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!."
