 edo_sakoku: "Политика изоляции (сакоку)"
 edo_sakoku_reason: "Со времён #V указов о запрете христианства и изгнании иностранцев#! [ROOT.GetCountry.GetNameNoFlag] по примеру [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] проводит строгую #V политику изоляции (сакоку)#! для защиты от иноземного влияния. Согласно указам, лишь в #V Нагасаки#! разрешена торговля с [SCOPE.sCountry('NET_scope').GetAltNameNoFlag('RU_CL_TP')] и [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')], а #B все остальные порты строго закрыты для любых иностранных судов#!.\n\nХотя этот закон обеспечивал нашей стране #B почти двести лет стабильности и спокойствия#!, растущая мощь варваров-европейцев начинает представлять для нас серьёзную угрозу. Они развращают нравы и подстрекают простой народ, ибо сказано: #B «Чужаки мыслят иначе; диковинки их — лишь предвестие бед»#!. Поэтому #V политика изоляции#! — важнейшее средство, с помощью которого сёгунат [ROOT.GetCountry.GetRuler.GetLastName] поддерживает мир в стране. Если этот закон падёт, #B это неминуемо нанесёт сокрушительный удар по авторитету сёгуната#!."
 edo_sakoku_on_fail_tt: "Нам придётся прекратить политику изоляции и начать переговоры с западными державами об открытии страны."
 edo_sakoku_1_button: "Прекратить изгнание иностранных судов"
 edo_sakoku_1_button_desc: "Указ об отражении иностранных судов, изданный в восьмом году эры Бунсэй, более не соответствует текущей обстановке. Силы западных держав несравнимы с нашими, и если мы продолжим упрямо отказывать их торговым судам в заходе в порты, это неизбежно вызовет их гнев и приведёт к нападению. Наша страна должна трезво оценить ситуацию и снять строгие ограничения."
 joi_flavor_jap_3_tt: "Мы подпишем с западными державами договор об открытии портов и предоставлении режима наибольшего благоприятствования в торговле."
 china_lose_opium_wars_tt: "Китай потерпел поражение в Опиумной войне."
  #
 edo_rangaku: "Рангаку"
 edo_rangaku_reason: "#V Рангаку#! — #B это система знаний, изучаемая группой наших учёных, которые познают западные науки через голландский язык#!. Со #V времён годов Тэмпо#!, несмотря на #B строгий контроль морских границ указом об изоляции#!, в открытых для внешней торговли городах, таких как Нагасаки, #V знания, привезённые торговцами с Дэдзимы#!, привлекли множество увлечённых исследователей и превозносятся как врата к просвещению.\n\n#B От уличных лекарей до высокопоставленных самураев#! — нередко можно встретить людей с #B переведёнными книгами Сугиты Гэмпаку, Маэно Рётаку и им подобных#!. Эти учёные копируют устройства, перенимают западные методы лечения, и их деятельность не противоречит здравому смыслу. [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] по большей части смотрит на это сквозь пальцы.\n\nОднако #B распространение знаний рангаку#! вызывает споры при дворе среди сторонников национальных наук, которые видят в этом засилье варварского учения. #B Сёгунат [ROOT.GetCountry.GetRuler.GetLastName] должен принять взвешенное решение относительно рангаку, чтобы положить конец разногласиям.#!"
 edo_rangaku_1_button: "Подавить распространение рангаку"
 edo_rangaku_1_button_desc: "Рангаку распространяет диковинные и вредные учения, угрожая традиционным устоям нашего народа. Двор должен строго преследовать этих надоедливых учёных, чтобы предотвратить расшатывание порядка в стране."
 edo_rangaku_2_button: "Поощрять распространение рангаку"
 edo_rangaku_2_button_desc: "Если наш двор будет видеть в рангаку лишь диковинку в области медицины и естествознания, не решаясь использовать эти знания для управления государством, мы навсегда останемся позади варваров. Необходимо взять лучшее и использовать это для усиления страны, чтобы эти знания служили нам."
 edo_rangaku_3_button: "Запросить техническую помощь у голландского флота"
 edo_rangaku_3_button_desc: "Голландский торговый порт в Нагасаки процветает, и там часто швартуются их корабли. Их кораблестроительные технологии намного превосходят наши. Если мы заручимся их помощью и создадим в Нагасаки военно-морское училище, это принесёт огромную пользу обороноспособности нашей страны."
 edo_rangaku_3_button_possible_tt: "Мы создадим военно-морскую учебную базу в районе Дэдзимы в Нагасаки.\nМы также пригласим голландских инструкторов, чтобы они помогли нам строить корабли западного образца."
  #
 tenpo_famine: "Великий голод годов Тэмпо"
 tenpo_famine_reason: "С #V четвёртого года эры Тэмпо#! на [ROOT.GetCountry.GetNameNoFlag] обрушился #B масштабный [concept_famine], сравнимый с голодом эпох Кёхо и Тэммэй#!. Холода и нашествия саранчи привели к неурожаю риса от северных провинций до центральных земель, вызвав резкий рост цен на рис. Голодные смерти стали обыденностью.\n\nЭтот жестокий [concept_famine] принёс народу Японии неисчислимые страдания. Люди молят, чтобы сёгунат [ROOT.GetCountry.GetRuler.GetLastName], находящийся под властью, которую осуществляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], #B принял чрезвычайные меры и спас их от этой ужасной катастрофы#!."
 tenpo_famine_on_timeout_tt: "Можно дождаться естественного окончания голода или принять меры для помощи населению."
 tenpo_famine_status: "#R #B Великий голод, начавшийся в четвёртом году эры Тэмпо, всё ещё терзает нашу страну#!#!"
  #
 tenpo_reform: "Реформы Тэмпо"
 tenpo_reform_reason: "Со времён голода #V годов Тэмпо#! мощь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] неуклонно снижается. #B Амбары крестьян пусты, лавки торговцев закрыты, народ скитается, а власть сёгуната [ROOT.GetCountry.GetRuler.GetLastName] над княжествами пошатнулась#!. Многие простолюдины даже начали верить, что небеса отвернулись от великой Страны восходящего солнца.\n\nХотя голод и закончился, его последствия всё ещё тяжело сказываются на экономике [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] поручил министру [SCOPE.sCharacter('landowners_ig_leader').GetLastName] и старейшинам из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! провести #V аграрную реформу для возрождения духа простоты и бережливости#!, чтобы #B спасти страну от морального упадка и экономического кризиса#!."
 tenpo_reform_tt: "Успех реформ оживит экономику нашей страны."
 tenpo_reform_status: "#B Принять меры для возрождения сельской экономики нашей страны#!"
  #
 meiji_restoration_add_je_tt: "Добавить #V Реставрацию Исин#! в журнал #V #O #B Японского сёгуната#!#!#!"
 meiji_restoration: "Реставрация [ROOT.GetCountry.GetRuler.GetFirstName]"
 meiji_restoration_reason: "«Если [Concept('government', 'правительство')] сможет добросовестно проводить политику реформ, мы сможем восстановить процветание империи и укрепить мощь государства, чтобы встать в один ряд с другими странами. Но это будет нелегко. Я смиренно надеюсь, что мы, основываясь на принципах справедливости, примем великое и смелое решение о коренном обновлении всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]».\n\nИзолированная и застойная [ROOT.GetCountry.GetNameNoFlag] #B веками находилась под властью сёгуната#!. Однако с #V падением власти сёгуна#! полномочия были возвращены #V законному [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'императору')]#!, что позволило [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'императору')] [ROOT.GetCountry.GetRuler.GetFirstName] лично управлять государством. Но #B тяжкое бремя вековой изоляции#! давит на #V Страну восходящего солнца#!, из-за чего мы #B всё ещё далеки от уровня мировых держав#! и в любой момент можем стать #V жертвой колонизации и грабежа#!.\n\nРеставрация (Исин) — это не просто издание указа. [ROOT.GetCountry.GetNameNoFlag] нуждается в #B коренных преобразованиях по всей стране: отмене старых порядков, реформе законов, обогащении страны и укреплении армии, развитии промышленности#!... Новому [Concept('government', 'правительству')] во главе с #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_TP')]#!#! предстоит ещё многое сделать.\n\n#B Если [ROOT.GetCountry.GetNameNoFlag] хочет занять своё место в этом стремительно меняющемся мире, мы должны любой ценой достичь просвещения и даже стать одним из центров силы на мировой арене.#!"
 meiji_restoration_complete_tt: "Завершено 6 [Concept('concept_journal_entry', 'записей в дневнике')] из #V Реставрации Исин#! и завершена #B дипломатическая миссия на Запад#!"
 meiji_restoration_fail_tt: "Поражение во внутреннем конфликте с консерваторами"
 meiji_restoration_effect_tt: "Если мы завершим ещё 6 дополнительных [Concept('concept_journal_entry', 'записей в дневнике')] из серии #V «Реставрация Исин»#!, сработает бонусное событие:"
 meiji_restoration_status: "#B #P Преобразовать Японию в современное государство#!#!"
 meiji_restoration_birth_rate_tt: "Все [Concept('concept_state', 'области')] на #O Японском архипелаге#! получат модификатор со следующим эффектом:"
 meiji_restoration_mil: "Исин: богатая страна, сильная армия"
 meiji_restoration_mil_reason: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] — это #B наследственный феодальный воинский класс#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], существующий сотни лет. Когда-то они мчались по полям сражений, с верностью защищая своих господ, и были опорой государства.\n\nОднако #V сотни лет мира#! притупили их клинки, заставив забыть путь [Concept('concept_war', 'войны')]. Они лишь цепляются за прошлое и привилегии, дарованные им сёгунатом, и #V совершенно неспособны адаптироваться к западной военной системе#!. Если наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] будет и дальше полагаться на этот класс в вопросах обороны, это будет равносильно тушению пожара хворостом.\n\n#B Чтобы защитить наши земли и моря или расширить влияние империи за рубежом, мы должны создать новую регулярную армию, верную государству#!. Это должны быть #V современные вооружённые силы#! с чёткой структурой, хорошей подготовкой, отличным вооружением, представляющие весь народ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а не какой-то привилегированный класс."
 meiji_restoration_dip: "Исин: укрепление суверенитета"
 meiji_restoration_dip_reason: "#B Веками#! [ROOT.GetCountry.GetNameNoFlag] полагалась на #V политику изоляции#! для защиты от беспокойства со стороны иноземцев, стремясь к миру в своём уголке. Однако, когда западные военные корабли появились в водах Нагасаки и Ураги, мы осознали, что их #B мощные корабли и пушки#! способны #B сокрушить нашу страну#!.\n\nЕсли мы не откроемся миру по своей воле, нас заставят сделать это унизительным образом. Если мы не научимся вести дипломатию, наш суверенитет всегда будут попирать. Пришло время открыться миру. [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] и [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] считают, что мы должны разрушить барьеры изоляции и создать #B современную [ROOT.GetCountry.GetNameNoFlag], способную на равных общаться с [Concept('great_power', 'великими державами')] и защищать своё достоинство и интересы#!."
 meiji_restoration_eco: "Исин: развитие промышленности"
 meiji_restoration_eco_reason: "Если [ROOT.GetCountry.GetNameNoFlag] хочет противостоять [Concept('great_power', 'великим державам')], которые зарятся на наши земли и рынки, мы должны #B быстро развивать собственную промышленность#! и создать #V современную индустриальную систему#!, #B способную обеспечить самодостаточность и даже конкурировать с зарубежными странами#!.\n\nМы должны основывать государственные заводы, поощрять частные инвестиции, привлекать западных специалистов и технологии. Для этого необходимо #B не просто внедрять технологии#!, а #V коренным образом перестроить экономические основы Японии#!."
 finish_meiji_restoration_mil_je_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Исин: богатая страна, сильная армия#!"
 meiji_restoration_law: "Исин: ликвидация ханов и установление префектур"
 meiji_restoration_law_reason: "#V Система даймё в Японии#! существует почти тысячу лет, со времён позднего #V периода Хэйан#!. Хотя князья формально подчиняются [Concept('government', 'правительству')] в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], на деле они #B обладают собственными войсками, собирают налоги и являются почти полновластными правителями на своих землях#!. Даже [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] состоит из отрядов, присылаемых князьями.\n\nЭта #V раздробленная система#! не может служить основой для управления современной [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]. Мы должны полностью уничтожить эти #V пережитки системы бакуфу#!, создать единую административную систему префектур и #B достичь централизации власти, чтобы указы, которые издаёт [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], доходили до самых отдалённых уголков страны#!."
 meiji_restoration_lad: "Исин: предоставление собственности самураям"
 meiji_restoration_lad_reason: "Сотни лет [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] и [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] были #B самым знатным сословием страны#!, передавая по наследству огромные владения и привилегии. Однако с #V концом правления сёгуната#! их формально сохранённый #B высокий статус и щедрое жалование#! стали для правительства Исин крайне неудобным бременем.\n\n[Concept('government', 'Правительство')] Его Величества [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императора')] не может #B и дальше безоговорочно содержать этих дармоедов#! и смотреть, как они помыкают своими #v $slaves_only_icon$ рабами#! и #v $peasants_only_icon$ крестьянами#!. Мы должны найти способ положить конец их #V привилегированному положению#!, #B заменив их жалование времён сёгуната денежной компенсацией, чтобы они#! #V уступили место сторонникам нового правительства#!."
 meiji_restoration_ray: "Исин: строительство железных дорог"
 meiji_restoration_ray_reason: "В прошлом путешествие из Эдо в Осаку занимало несколько дней. Однако с #V развитием технологий#! наши делегации в Европе обнаружили, что #B западные [Concept('concept_great_power', 'Великие державы')] покрыты сетью железных дорог#!, что делает перевозку грузов чрезвычайно удобной. #V Товары перевозятся на сотни ри в день, а войска могут быть переброшены с севера на юг за одну ночь#!, что #B коренным образом изменило их общество#!.\n\nЕсли #B [ROOT.GetCountry.GetNameNoFlag] хочет достичь экономического паритета с#! #V мировыми державами#!, мы должны построить #B железнодорожную сеть, охватывающую всю страну#!, и превратить разрозненные префектуры в #V тесно связанные части единого современного [Concept('country', 'государства')]#!."
 pulse_meiji_restoration_progress: "Увеличить прогресс реставрации на 1"
