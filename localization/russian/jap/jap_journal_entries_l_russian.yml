 taisho_roman: "Романтика [ROOT.GetCountry.GetRuler.GetFirstName]"
 taisho_roman_reason: "#U Влияние либерализма#! растёт с усилением прогрессивных сил, левых социальных технологий и #U либеральных [Concept('concept_law', 'законов')]#!, таких как право на собрания.\n#G Влияние авторитаризма#! растёт с усилением консервативных сил, технологий централизованного планирования и #G авторитарных [Concept('concept_law', 'законов')]#!, таких как диктатура.\n#N Влияние милитаризма#! растёт с усилением консервативных сил, влияния армии и #N цензурных [Concept('concept_law', 'законов')]#!, таких как тайная полиция.\n\n#V Этой весной, после восшествия на престол [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'императора')] [ROOT.GetCountry.GetRuler.GetFirstName]#!, #B на улицах [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] витает удивительная атмосфера#!. В #V кофейнях#! сидят поэты в европейских костюмах, студентки читают переводы Руссо, Байрона и Тургенева. Газетчики на рассвете выкрикивают последние политические новости, а в новых театрах ставят Шекспира и поют о #B романтической любви, что в #V прошлом считалось неприличным#!. \n\n#U #B Ветер романтизма#!#!#B дует из сердца Гиндзы и разносится по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]#!. За десятилетия #V Реставрации Исин#! #B #V индустриализация#! страны продвинулась вперёд, экономика стремительно развивалась, а #O логистика и торговля#! достигли больших успехов#!. Развитие #O #B железнодорожной сети, водного транспорта и общественного транспорта#!#! привело к #B значительному росту городов#!. Появились #I новые медиа#!: #B газеты, книги, журналы, звукозаписи и даже фотография#! #B распространяются по всему обществу#! благодаря новому поколению художников и литераторов. Атмосфера #V свободы, открытости и жизненной энергии#! царит повсюду, а #B любовь к импортным товарам, западным идеям и потребительской культуре процветает:#! всё это создало #V небывалое процветание эпохи [ROOT.GetCountry.GetRuler.GetFirstName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]#!, наполненной #B надеждой и успехом#!. Люди, прежде жившие в нищете и невежестве, теперь связывают свои мечты с #B новыми городами и коммерцией, и всё наше общество вступило в #V эпоху величия и надежд#!.\n\n#B Однако всё это расшатывает#!#V моральные устои, на которых тысячи лет держалась культура Ямато#!. Верования отцов и предков подвергаются #B нападкам новых идей#!. В газетах спорят обо всём: от конституции до прав женщин, от #U либерализма#! до #I социализма#!. Каждая из этих тем таит в себе #B потенциальную угрозу для правительства Его Величества [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императора')]#!, из-за чего среди старейшин из #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!, #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! и #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! #B #V нарастает всё более радикальное неприятие этих веяний#!#!.\n\n#B Но как бы то ни было, [ROOT.GetCountry.GetNameNoFlag] вступает в #V самый блистательный момент за тысячи лет своей истории#!: в противоречивую эпоху, что наследует традиции и жаждет просвещения, процветает, но таит в себе скрытые течения#!. #V Идеалы, чувства и романтика#! проникают в #O душу нации и народа#!, #B #N но как долго продлится это прекрасное время, никто не может сказать.#!#!"
