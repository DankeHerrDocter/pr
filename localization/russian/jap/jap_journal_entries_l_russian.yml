 bansei_ikkei: "Непрерывная династия"
 bansei_ikkei_reason: "#V #P Прямой потомок богини Аматэрасу, живое воплощение божества в современном мире, священный и неприкосновенный Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]#!#!#V #B является нынешним монархом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!#!.\n\nИстория [Concept(GetLawType('law_monarchy').GetName, 'монархии')] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] #B является одной из самых древних в мире#!. С тех пор как Его Величество #V император Дзимму#! начал свой восточный поход, объединил равнину Нара и #B взошёл на престол на островах Ямато#!, его потомки непрерывно правили этой #V великой Страной восходящего солнца#!. В #B эпоху императора Тэмму#!, после реформ Тайка, Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] правил по велению небес, заботясь о народе и управляя добродетельно, что принесло [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] период процветания. Однако в последующий #V период Хэйан#! Его Величество #B император Сэйва#! из-за юного возраста был вынужден передать власть регенту, а после #V периода Камакура#! сформировалась #B система сёгуната#!, где главой правительства стал сёгун.\n\nОднако с #B концом сёгуната Токугава и началом личного правления [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императора')] в ходе #V Реставрации Исин#!, период, когда [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] был лишь номинальным [concept_ruler], закончился. #V Конституция Японской империи#! #B вновь вернула священную власть и славу Его Величеству [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'Императору')] [ROOT.GetCountry.GetRuler.GetFirstName]#!, что позволило [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] после Реставрации Исин вновь достичь просвещения и #B стать одной из ведущих держав на мировой арене.#! \n\n#B Путь империи основан на верности и сыновней почтительности; воля всего народа едина с волей государя#!. [GetLawType('law_monarchy').GetName] имеет особое значение для всего народа Ямато. #B Благородный пример, который подаёт Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], служит образцом для всех наций и будет продолжаться десять тысяч поколений, как поётся в нашем гимне:#!\n\n#V Правь, император, тысячи лет, царствуй на славу нам, вечно живи! Пока мох не украсит ковром скалы, что выросли из щебня веков!#!"
 bansei_ikkei_status: "#B #V #I Девиз правления нынешнего императора — [ROOT.GetCountry.GetRuler.GetFirstName]#!#!#!"
 add_je_bansei_ikkei_tt: "Добавить #V Непрерывная династия#! в журнал #V #O #B Японской империи#!#!#!"
