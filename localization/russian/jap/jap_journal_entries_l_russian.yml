 japanese_sanbo_honbu: "Генеральный штаб"
 japanese_sanbo_honbu_reason: "#V Генеральный штаб#! — это центральный военный орган, созданный в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] после реставрации по образцу #V прусского Генерального штаба#!. На него возложена важная задача по #bold координации всех вооружённых сил и разработке планов#!. Его существование — одно из величайших достижений #V Реставрации Исин#!: успешный переход системы командования от #B феодальной раздробленности княжеств к высокомодернизированной и единой [Concept('concept_war', 'военной')] машине.#! \n\nКак высший командный орган [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], Генеральный штаб включает в себя оперативный, разведывательный, транспортный, мобилизационный и другие отделы. Его штабные офицеры — это в основном #B выпускники Высшей военной академии или элитные офицеры, обучавшиеся за границей#!. Они прекрасно понимают принципы функционирования современной армии и в то же время #B привержены традиционному японскому#! #V духу бусидо#!. Они отвечают как за [Concept('concept_mobilize_army', 'мобилизацию')] и планирование в военное время, так и за стратегическое планирование, изучение военной системы и анализ военной истории в мирное.\n\nОднако баланс сил внутри #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! не является монолитным. #bold Генералы из сухопутных войск часто считают себя опорой нации, поддерживают централизацию власти и выступают за континентальную стратегию; адмиралы же, под флагом просвещения, опираются на британскую подготовку и доктрину превосходства флота, выступая за расширение морской мощи и защиту торговли.#!\n\nВ эпоху, когда все страны стремительно развиваются и наращивают свои [Concept('concept_war', 'военные')] машины, #variable наш Генеральный штаб#! должен своевременно разрешать эти противоречия, #B чтобы обеспечить полное взаимодействие наших вооружённых сил во время [Concept('concept_war', 'войны')]#!."
