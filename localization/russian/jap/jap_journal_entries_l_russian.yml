 shogunate_restoration_add_je_tt: "Добавить #V Новый курс сёгуната#! в журнал #V #O #B Японского сёгуната#!#!#!"
 shogunate_restoration: "Новый курс [ROOT.GetCountry.GetRuler.GetLastName]"
 shogunate_restoration_reason: "После долгого периода смуты великий дом [ROOT.GetCountry.GetRuler.GetLastName] и его превосходительство [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] вновь доказали прочность своей власти над [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]. Хотя мятежники, называвшие себя «патриотами Исин», пытались, прикрываясь именем императора, превратить страну в марионетку Запада, их злые умыслы провалились, и славные [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] и [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] в итоге отвоевали [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nХотя наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] восстановил порядок в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и принёс мир в страну, времена меняются. Западные [Concept('concept_great_power', 'Великие державы')] бросают на нас хищные взгляды, их торговые суда приходят всё чаще, а их ружья и пушки намного превосходят наши. Если мы не будем меняться в соответствии с духом времени и не избавимся от старого, страдания народа будут лишь расти, а авторитет #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! не сможет продержаться вечно.\n\nНаш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и его министры пришли к единому мнению: мы должны укрепить дух самурайства, пересмотреть обязанности вассальных княжеств и попытаться перенять западные дела, чтобы сохранить основы нашего государства и уберечь [ROOT.GetCountry.GetNameNoFlag] от позора."
 finish_3_shogunate_restoration_je: "Завершено 3 [Concept('concept_journal_entry', 'Записей в дневнике')] из #V Нового курса#!"
 shogunate_restoration_status: "#B #O Проведение реформ под эгидой сёгуната#!#!"
 pulse_shogunate_restoration_progress: "Продвинуть прогресс нового курса на 1"
 no_active_shogunate_restoration_tt: "Нет активной [Concept('concept_journal_entry', 'Записи в дневнике')] #V Новый курс сёгуната#!"
 shogunate_restoration_mil: "Новый курс: реформа самурайства"
 shogunate_restoration_mil_reason: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] были опорой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], стальной стеной, на которой зиждился наш сёгунат. Со времён битвы при Сэкигахаре, принесшей победу нашему дому и [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'сёгуну')] [ROOT.GetCountry.GetRuler.GetFirstName], путь воина был вписан в законы букэ, помогая поддерживать мир на протяжении сотен лет.\n\nОднако #V сотни лет мира#! притупили их клинки, заставив забыть путь [Concept('concept_war', 'войны')]. Они лишь цепляются за прошлое и привилегии, дарованные сёгунатом, и #V более неспособны выполнять свой долг по защите господина#!. Если наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] будет и дальше полагаться на этот класс для поддержания власти сёгуната, это будет равносильно тушению пожара хворостом.\n\nМы должны провести всеобъемлющую реформу сословия #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!, искоренить их привычку к роскоши и пренебрежению тренировками, и возродить былой дух воина."
 shogunate_restoration_adm: "Новый курс: возвращение земель и реестров"
 shogunate_restoration_adm_reason: "С самого основания [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_TP')]#!#! #B земли страны были розданы даймё, которые правили в своих княжествах по закону, исполняя свой долг#!. Эта феодальная система, известная как #V бакухан#!, хоть и поддерживала мир на протяжении сотен лет, более не соответствует потребностям #V централизованного государства#!. В то же время #B многие обедневшие даймё уже обратились к [Concept(ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle, 'сёгуну')] с просьбой обменять их земли на стабильное жалование.#!\n\nДля возрождения основ государства и укрепления власти букэ и кугэ #B мы должны реформировать существующую систему бакухан и вернуть власть над землями и реестрами двору в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].#!"
 remove_all_edo_local_daimyo_tt: "Модификатор #V Местный даймё#! будет удалён из всех провинций."
 shogunate_restoration_gov: "Новый курс: сохранение системы бакухан"
 shogunate_restoration_gov_reason: "Хотя нынешней [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] и нужна централизация, #V система бакухан#! остаётся #B ключом к поддержанию порядка, и её нельзя так просто отменить#!. Даймё веками служили государству, и лишить их всех полномочий было бы несправедливо по отношению к самурайскому сословию.\n\nНаш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] планирует #B сохранить титулы и жалование даймё, позволив им передавать по наследству свои звания и особый статус в знак признания их заслуг перед государством#!, а также #V сохранить за определёнными даймё право командовать войсками#! для защиты от иноземных варваров. #B Таким образом, даймё смогут сохранить славу своих родов, не ущемляя при этом централизацию и единство двора в [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].#!"
 shogunate_restoration_gov_tt: "Поддерживать законы [GetLawType('law_oligarchy').GetName] или [GetLawType('law_autocracy').GetName] в течение 10 лет."
