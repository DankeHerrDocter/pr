l_russian:
 concept_lander_der_krone: "Земли короны"
 concept_lander_der_krone_desc: "[concept_lander_der_krone] — это автономные территории, верные только общему [Concept('concept_ruler', 'правителю')] и королевской семье, обладающие собственными законодательными органами и правом издавать законы по местным вопросам с королевского разрешения. [concept_lander_der_krone] не имеют юридической связи с [Concept('concept_overlord', 'сюзереном')] и связаны лишь общим престолом. [concept_lander_der_krone] не обладают дипломатической автономией, не могут начинать собственные [Concept('concept_diplomatic_play', 'дипломатические игры')] и принудительно вступают в [Concept('concept_war', 'войны')] своего [Concept('concept_overlord', 'сюзерена')]. Они обязаны еженедельно выплачивать [Concept('concept_overlord', 'сюзерену')] #v 50%#! доходов своей [Concept('concept_treasury', 'казны')]. Эти отношения автоматически прекращаются, если у [Concept('concept_overlord', 'сюзерена')] отменяется [GetLawType('law_monarchy').GetName]."
  #
 concept_british_dominion: "Доминион Короны"
 concept_british_dominion_desc: "[concept_british_dominion] — это уникальная система, применяемая к заморским территориям в рамках плана автономии Британской империи. По сравнению с [Concept('concept_puppet', 'марионеткой')] он обладает большей автономией, но связан с [Concept('concept_overlord', 'сюзереном')] теснее, чем обычный [concept_dominion|l]. [concept_british_dominion] может начинать собственные [Concept('concept_diplomatic_play', 'дипломатические игры')], принудительно вступает в [Concept('concept_war', 'войны')] своего [Concept('concept_overlord', 'сюзерена')] и хранит верность его [Concept('concept_ruler', 'правителю')]. Они обязаны еженедельно выплачивать [Concept('concept_overlord', 'сюзерену')] #v 20%#! доходов своей [Concept('concept_treasury', 'казны')]."
  #
 concept_commonwealth_realm: "Королевство Содружества"
 concept_commonwealth_realm_desc: "[concept_commonwealth_realm] — это суверенное государство в составе Содружества, добровольно вступающее в [Concept('concept_personal_union','личную унию')], основой которой является [GetLawType('law_monarchy').GetName]. Их [Concept('concept_head_of_state', 'главой государства')] является монарх, представленный генерал-губернатором. Они равны по статусу любой другой [Concept('concept_country', 'стране')], обладают всеми правами независимого государства, не имеют ограничений по международному статусу, не обязаны выплачивать доход [Concept('concept_overlord', 'сюзерену')] и не принуждаются к вступлению в [Concept('concept_war', 'войны')] своего [Concept('concept_overlord', 'сюзерена')]. Эти отношения автоматически прекращаются, если у [Concept('concept_overlord', 'сюзерена')] отменяется [GetLawType('law_monarchy').GetName]."
  #
 concept_franco_state: "Гарнизонное государство"
 concept_franco_state_desc: "[concept_franco_state] является продолжением власти Французской империи в Европе. Лидер дома Бонапартов выступает его протектором и несёт военные обязательства перед империей в своём регионе. [concept_franco_state] может начинать собственные [Concept('concept_diplomatic_play', 'дипломатические игры')], принудительно вступает в [Concept('concept_war', 'войны')] своего [Concept('concept_overlord', 'сюзерена')] и обязано еженедельно выплачивать [Concept('concept_overlord', 'сюзерену')] #v 30%#! доходов своей [Concept('concept_treasury', 'казны')]. Эти отношения автоматически прекращаются, если у [Concept('concept_overlord', 'сюзерена')] отменяется [GetLawType('law_monarchy').GetName]."
#Британские партии
 concept_westminster_england: "Английские члены парламента"
 concept_westminster_england_desc: "Англия составляет ядро и центр власти Палаты общин. С самого Средневековья она управляет общенациональными делами из Вестминстера. Как правило, члены парламента от Англии представляют большую часть населения Соединённого Королевства и побуждают правительство отдавать приоритет интересам Англии."
 concept_westminster_wales: "Валлийские члены парламента"
 concept_westminster_wales_desc: "Уэльс был включён в Вестминстерскую систему в XVI веке согласно «Законам о Уэльсе», однако его места в парламенте были чётко распределены только после избирательной реформы 1832 года. Несмотря на ограниченное количество мест, Уэльс по-прежнему имеет влияние в Палате общин по многим вопросам."
 concept_westminster_scotland: "Шотландские члены парламента"
 concept_westminster_scotland_desc: "Парламент Шотландии был включён в Вестминстерскую систему после «Акта об унии» 1707 года. Хотя число его членов парламента обычно меньше, чем у Англии, он всё равно является значимой частью Палаты общин."
 concept_westminster_ireland: "Ирландские члены парламента"
 concept_westminster_ireland_desc: "С момента включения ирландского парламента в Вестминстерскую систему согласно «Акту об унии» 1801 года, Ирландия получила гарантированное количество мест. Однако ирландские члены парламента часто расходятся во мнениях с большинством Палаты общин по вопросам земли, религии и автономии."
 concept_indian_subcontinent: "Индийский субконтинент"
 concept_indian_subcontinent_short: "Индия"
 concept_indian_subcontinent_desc: "$concept_indian_subcontinent$ — это [Concept('concept_georegion', 'географический регион')] в Азии, расположенный к югу от Гималаев, который иногда называют просто $concept_indian_subcontinent_short$. На юге он омывается Индийским океаном, на востоке — Бенгальским заливом, а на западе — Аравийским морем.\n\n$concept_indian_subcontinent_short$ включает в себя множество [Concept('concept_state_region', 'регионов')] (береговые [Concept('concept_province', 'провинции')] в регионах [GetStateRegion('STATE_BOMBAY').GetName] и [GetStateRegion('STATE_MADRAS').GetName], принадлежащие неиндийским державам, не учитываются при расчёте владения $concept_indian_subcontinent_short$ом):\n\n#B Восточная Индия#!:\n[GetStateRegion('STATE_BIHAR').GetName], [GetStateRegion('STATE_ORISSA').GetName], [GetStateRegion('STATE_WEST_BENGAL').GetName], [GetStateRegion('STATE_EAST_BENGAL').GetName] и [GetStateRegion('STATE_ASSAM').GetName].\n\n#B Южная Индия#!:\n[GetStateRegion('STATE_BOMBAY').GetName], [GetStateRegion('STATE_HYDERABAD').GetName], [GetStateRegion('STATE_CIRCARS').GetName], [GetStateRegion('STATE_KURNOOL').GetName], [GetStateRegion('STATE_MYSORE').GetName], [GetStateRegion('STATE_TRAVANCORE').GetName], [GetStateRegion('STATE_MADRAS').GetName] и [GetStateRegion('STATE_CEYLON').GetName].\n\n#B Западная Индия#!:\n[GetStateRegion('STATE_GUJARAT').GetName], [GetStateRegion('STATE_SINDH').GetName] и [GetStateRegion('STATE_BALUCHISTAN').GetName].\n\n#B Центральная Индия#!:\n[GetStateRegion('STATE_AWADH').GetName], [GetStateRegion('STATE_CENTRAL_PROVINCES').GetName], [GetStateRegion('STATE_BUNDELKHAND').GetName], [GetStateRegion('STATE_AGRA').GetName], [GetStateRegion('STATE_DELHI').GetName], [GetStateRegion('STATE_MALWA').GetName] и [GetStateRegion('STATE_RAJPUTANA').GetName].\n\n#B Северная Индия#!:\n[GetStateRegion('STATE_PUNJAB').GetName], [GetStateRegion('STATE_HILL_PUNJAB').GetName], [GetStateRegion('STATE_KASHMIR').GetName], [GetStateRegion('STATE_PASHTUNISTAN').GetName] и [GetStateRegion('STATE_QUETTA').GetName].\n\n#B Бирма#!:\n[GetStateRegion('STATE_ARAKAN').GetName], [GetStateRegion('STATE_PEGU').GetName], [GetStateRegion('STATE_MANDALAY').GetName], [GetStateRegion('STATE_KACHIN').GetName] и [GetStateRegion('STATE_SHAN_STATES').GetName]."
  #
 concept_yellow_river_flood_area: "Зона затопления Хуанхэ"
 concept_yellow_river_flood_area_desc: "Зона затопления Хуанхэ в широком смысле относится к территориям, пострадавшим после изменения русла Жёлтой реки. Обычно это непосредственно затронутые провинции #yellow Хэнань#!, #yellow Шаньдун#! и #yellow северный Аньхой#!, а также косвенно затронутая высоким уровнем воды #yellow Цзянсу#!. За исключением #yellow Цзянсу#!, провинции в зоне затопления будут испытывать серьёзные негативные последствия во время разливов Хуанхэ, но также могут получить [concept_arable_land] по мере продвижения работ по управлению рекой."
  #
 concept_caretaker_government: "Временное правительство"
 concept_caretaker_government_desc: "[Concept('concept_caretaker_government', 'Временное правительство')] — это временное [concept_government|l] на период [Concept('concept_election', 'выборов')], которое поддерживает функционирование [Concept('concept_government', 'правительства')] до формирования нового состава. Из-за отсутствия законного мандата, получаемого на [Concept('concept_election', 'выборах')], [Concept('concept_caretaker_government', 'временное правительство')] обычно обладает ограниченными полномочиями и отвечает лишь за поддержание текущего положения дел, а не за полноценное управление [Concept('concept_country', 'страной')] или принятие новых [Concept('concept_law', 'законов')]."
#Турция
 concept_sublime_court_dissatisfaction: "Недовольство двора"
 concept_sublime_court_dissatisfaction_short: "Недовольство"
 concept_sublime_court_dissatisfaction_desc: "$concept_sublime_court_dissatisfaction$ отражает уровень заговоров и интриг против $RULER_TITLE_PADISAH$а ([Concept('concept_ruler', 'правителя')]), целью которых является его свержение. Отслеживать $concept_sublime_court_dissatisfaction_short$ можно в [Concept('concept_journal_entry', 'записи в дневнике')] #Y $tur_sublime_porte$#!.\n\nЕсли $concept_sublime_court_dissatisfaction_short$ достигнет #v 100%#!, $RULER_TITLE_PADISAH$ ([concept_ruler]) будет вынужден отречься от престола в результате переворота. [concept_sublime_porte_authority] будет #bold сброшен#! до #v 0#!, $concept_sublime_court_dissatisfaction_short$ снизится, и на трон взойдёт новый кандидат.\n\n#title Следующие условия #g #b снижают#!#! $concept_sublime_court_dissatisfaction$:#!#indent_newline:3 \n• $RULER_TITLE_PADISAH$ ([concept_ruler]) — #yellow Махмуд II#!\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('special_prince_governor').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('special_ottoman_fatih').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('experienced_political_operator').GetName]» или «[GetCharacterTrait('expert_political_operator').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('celebrity_commander').GetName]», «[GetCharacterTrait('expert_offensive_planner').GetName]» или «[GetCharacterTrait('master_bureaucrat').GetName]»\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! выше #G 5#!\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! выше #G 5#!\n• [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] — [Concept('concept_powerful', 'могущественная')] [concept_interest_group]\n• [concept_legitimacy] #G не менее 90#!\n• [concept_sublime_porte_authority] достигает #G 500#!\n• События и другие эффекты#!\n\n#title Следующие условия #r #b повышают#!#! $concept_sublime_court_dissatisfaction$:#!#indent_newline:3 \n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('reckless').GetName]», «[GetCharacterTrait('bigoted').GetName]» или «[GetCharacterTrait('cruel').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('trait_child').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('alcoholic').GetName]», «[GetCharacterTrait('opium_addiction').GetName]» или «[GetCharacterTrait('expensive_tastes').GetName]»\n• Низкая [concept_popularity] [Concept('concept_ruler', 'правителя')]\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! ниже #R 0#!\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! ниже #R -5#!\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! ниже #R -5#!\n• [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] — [Concept('concept_marginalized', 'отчужденная')] [concept_interest_group]\n• [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] — [Concept('concept_marginalized', 'отчужденная')] [concept_interest_group]\n• [concept_sublime_porte_authority] ниже #R 300#!\n• [concept_legitimacy] #R ниже 50#!\n• События и другие эффекты#!"
 concept_sublime_porte_authority: "Авторитет Высокой Порты"
 concept_sublime_porte_authority_short: "Авторитет"
 concept_sublime_porte_authority_desc: "$concept_sublime_porte_authority$ олицетворяет силу власти $RULER_TITLE_PADISAH$а ([Concept('concept_ruler', 'правителя')]). Отслеживать [Concept('concept_sublime_porte_authority', '$concept_sublime_porte_authority_short$')] можно в [Concept('concept_journal_entry', 'записи в дневнике')] #Y $tur_sublime_porte$#!.\n\nДля роста $concept_sublime_porte_authority_short$ уровень легитимности должен быть выше #v 50#!. Если [concept_sublime_court_dissatisfaction] достигнет #v 100%#!, $RULER_TITLE_PADISAH$ ([concept_ruler]) будет свергнут в результате переворота, $concept_sublime_porte_authority_short$ будет #bold сброшен#! до #v 0#!, $concept_sublime_court_dissatisfaction_short$ снизится, а на трон взойдёт $RULER_TITLE_SEHZADE$ ([concept_heir]).\n\n#title Следующие условия #g #b повышают#!#! $concept_sublime_porte_authority$:#!#indent_newline:3 \n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('special_prince_governor').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('special_ottoman_fatih').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('experienced_political_operator').GetName]» или «[GetCharacterTrait('expert_political_operator').GetName]»\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('celebrity_commander').GetName]», «[GetCharacterTrait('expert_offensive_planner').GetName]» или «[GetCharacterTrait('master_bureaucrat').GetName]»\n• [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] [Concept('concept_in_government', 'в правительстве')]\n• [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] — [Concept('concept_powerful', 'могущественная')] [concept_interest_group], и её [concept_approval] не менее #G 5#!\n• [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] [Concept('concept_in_government', 'в правительстве')], и их [concept_approval] не менее #G 5#!\n• [GetReligion('sunni').GetCustom('RU_RL_VP')] — [concept_state_religion], и [Concept('concept_enactment_of_laws_enacted', 'принят')] [concept_law] «[GetLawType('law_millet_system').GetName]»\n• [Concept('concept_enactment_of_laws_enacted', 'Принят')] [concept_law] «[GetLawType('law_professional_army').GetName]» или «[GetLawType('law_mass_conscription').GetName]»\n• [Concept('concept_enactment_of_laws_enacted', 'Принят')] [concept_law] «[GetLawType('law_autocracy').GetName]», и [concept_legitimacy] #G не менее 90#!\n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет наивысшую легитимность в порядке наследования\n• События и другие эффекты#!\n\n#title Следующие условия #r #b снижают#!#! $concept_sublime_porte_authority$:#!#indent_newline:3 \n• [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] имеет [Concept('concept_character_trait', 'черту характера')] «[GetCharacterTrait('trait_child').GetName]»\n• Не [Concept('concept_enactment_of_laws_enacted', 'принят')] [concept_law] «[GetLawType('law_subjecthood').GetName]» или «[GetLawType('law_ethnostate').GetName]»\n• Не [Concept('concept_enactment_of_laws_enacted', 'принят')] [concept_law] «[GetLawType('law_outlawed_dissent').GetName]» или «[GetLawType('law_censorship').GetName]»\n• [Concept('concept_approval', 'Одобрение')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! ниже #R -5#!\n• [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] не [Concept('concept_in_government', 'в правительстве')]\n• [Concept('concept_enactment_of_laws_enacted', 'Принят')] [concept_law] «[GetLawType('law_autocracy').GetName]», и [concept_legitimacy] #R ниже 75#!\n• [Concept('concept_enactment_of_laws_enacted', 'Принят')] [concept_law] «[GetLawType('law_autocracy').GetName]», и [concept_legitimacy] #R ниже 50#!\n• Не [Concept('concept_enactment_of_laws_enacted', 'принят')] [concept_law] «[GetLawType('law_autocracy').GetName]», и [concept_legitimacy] #R ниже 30#!\n• [concept_sublime_court_dissatisfaction] достигает #R 200#!\n• [concept_sublime_court_dissatisfaction] достигает #R 400#!\n• События и другие эффекты#!"
 concept_unruly_arabs_progress: "Арабский национальный пыл"
 concept_unruly_arabs_progress_short: "Национальный пыл"
 concept_unruly_arabs_progress_desc: "$concept_unruly_arabs_progress$ отражает единство и сплочённость арабского национализма под властью $dyn_c_ottoman_empire_RU_CL_RP$. Если $concept_unruly_arabs_progress$ достигнет 500, вспыхнет Великое арабское восстание с целью свержения власти $dyn_c_ottoman_empire_RU_CL_RP$ на Аравийском полуострове. Отслеживать [Concept('concept_unruly_arabs_progress', '$concept_unruly_arabs_progress_short$')] можно в [Concept('concept_journal_entry', 'записи в дневнике')] #b $the_unruly_arabs$#!.\n\n#title Следующие условия #r #b повышают#!#! $concept_unruly_arabs_progress$:#!#indent_newline:3 \n• [Concept('concept_legitimacy', 'Легитимность')] $dyn_c_ottoman_empire_RU_CL_RP$ ниже #v 50#!\n• $dyn_c_ottoman_empire$ находится в состоянии [Concept('concept_war', 'войны')]\n• В $dyn_c_ottoman_empire_RU_CL_PP$ #r #b есть#!#! активные [Concept('concept_political_movement', 'политические движения')] [Concept('concept_secession', 'сепаратистов')]\n• [Concept('concept_fervor', 'Пыл')] #tooltippable_name [GetCulture('bedouin').GetCustom('RU_CUL_ADJ_bedouin')]ой#! [Concept('concept_culture', 'культуры')] составляет не менее 50 и 75\n• [Concept('concept_fervor', 'Пыл')] #tooltippable_name [GetCulture('mashriqi').GetCustom('RU_CUL_ADJ_mashriqi')]ой#! [Concept('concept_culture', 'культуры')] составляет не менее 50 и 75\n• Поддержка со стороны иностранной [Concept('concept_great_power', 'великой державы')] или других арабских стран\n• Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #b $caliph_and_ummah$#!\n• Международный статус $dyn_c_ottoman_empire_RU_CL_RP$ ниже [Concept('concept_great_power', 'великой державы')]\n• $dyn_c_ottoman_empire$ контролирует не менее 50%, 70% и 90% земель в [Concept('concept_strategic_region', 'стратегическом регионе')] [GetStrategicRegion('region_arabia').GetName]\n• События, кнопки и другие эффекты\n\n#title Следующие условия #g #b снижают#!#! $concept_unruly_arabs_progress$:#!#indent_newline:3 \n• [Concept('concept_legitimacy', 'Легитимность')] $dyn_c_ottoman_empire_RU_CL_RP$ не ниже #v 90#!\n• [Concept('concept_fervor', 'Пыл')] #tooltippable_name [GetCulture('bedouin').GetCustom('RU_CUL_ADJ_bedouin')]ой#! [Concept('concept_culture', 'культуры')] не выше 25\n• [Concept('concept_fervor', 'Пыл')] #tooltippable_name [GetCulture('mashriqi').GetCustom('RU_CUL_ADJ_mashriqi')]ой#! [Concept('concept_culture', 'культуры')] не выше 25\n• Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #b $great_ottomanism$#!\n• Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #b $ottoman_conquest$#!\n• Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #b $hejaz_railway$#!\n• Международный статус $dyn_c_ottoman_empire_RU_CL_RP$ — [concept_great_power] или выше\n• $dyn_c_ottoman_empire$ контролирует не более 33% земель в [Concept('concept_strategic_region', 'стратегическом регионе')] [GetStrategicRegion('region_arabia').GetName]\n• События, кнопки и другие эффекты"
 concept_unruly_arabs_timer: "Арабская стабильность"
 concept_unruly_arabs_timer_desc: "$concept_unruly_arabs_timer$ отражает степень контроля $dyn_c_ottoman_empire_RU_CL_RP$ над Аравийским полуостровом и покорность местного населения. Чем ниже $concept_unruly_arabs_timer$, тем выше вероятность негативных событий в Аравии и вмешательства других стран. Когда [Concept('concept_unruly_arabs_progress', '$concept_unruly_arabs_progress_short$')] равен #G 0#!, $concept_unruly_arabs_timer$ ежемесячно #G растёт на 1%#!. Отслеживать [Concept('concept_unruly_arabs_timer', 'арабскую стабильность')] можно в [Concept('concept_journal_entry', 'записи в дневнике')] #b $the_unruly_arabs$#!."

