l_russian:
 ai_unique_buff_decision: "Усиление ИИ-стран"
 ai_unique_buff_decision_desc: "Это решение поможет вам усилить ИИ-страны, сделав их более могущественными и исторически достоверными. ИИ-страны, на которые распространяется это решение, получат мощные модификаторы в зависимости от своего ранга, затрагивающие экономическое развитие, технологические исследования и ведение войны, а также будет снижена вероятность гражданских войн.\nЭто значительно улучшит ваш опыт в международной конкуренции и торговле, но #variable может вызывать зависания и сбои на поздних этапах игры (если у вас слабое оборудование)#!.\n#R Не используйте в многопользовательской игре, так как это часто приводит к рассинхронизации!#!"
 ai_unique_buff_decision_tt: "ИИ-страны ещё не усилены"
 ai_unique_buff_decision_tt_2: "Это активирует усиление для всех ИИ-стран.\nЕсли вы переключитесь на другую ИИ-страну, она потеряет это усиление.\nУсиление не распространяется на децентрализованные государства."
 ai_unique_buff_get_again_decision: "Восстановить усиление"
 ai_unique_buff_get_again_decision_desc: "Это решение даст ИИ-стране соответствующий её рангу модификатор из дневника, если в данный момент он отсутствует."
 ai_unique_buff_get_again_decision_tt: "Усиление было одобрено игроком, но в данный момент не получено"
 ai_gbr_annex_india: "Передача власти над Индией Короне"
 ai_gbr_annex_india_desc: "Власть Ост-Индской компании, без сомнения, была ослаблена восстанием сипаев. Чтобы обеспечить авторитет Великобритании в Индии, мы должны передать Индию под прямое управление Империи."
 delete_private_investment_decision: "Отменить частные инвестиции"
 delete_private_investment_decision_desc: "Это решение заберёт деньги из [Concept('concept_investment_pool', 'инвестиционного пула')] и переведёт всё [Concept('concept_construction', 'строительство')] под государственный контроль."
 rebuild_private_investment_decision: "Восстановить частные инвестиции"
 rebuild_private_investment_decision_desc: "Это решение восстановит в вашей игре систему частных инвестиций, соответствующую ванильной версии."
 joi_force_privatization: "Провести приватизацию"
 joi_force_privatization_desc: "Это решение переведёт все [Concept('concept_building', 'сооружения')] в режим приватизации."
 joi_stop_force_privatization: "Остановить приватизацию"
 joi_stop_force_privatization_desc: "Это решение остановит приватизацию всех [Concept('concept_building', 'сооружений')]."
 joi_remove_chinese_state_modifier_decision: "Создать местную администрацию в Китае"
 joi_remove_chinese_state_modifier_decision_desc: "Поскольку китайские провинции переходят под наш контроль, мы должны ликвидировать на этих землях все институты и структуры власти китайского императора, установив собственное правление."
  #
 deutsch_abrogation_of_the_naval_treaty: "Пересмотр военно-морского договора"
 deutsch_abrogation_of_the_naval_treaty_desc: "С ростом нашей мощи и международного статуса, военно-морское соглашение, подписанное ранее для завоевания доверия Лондона, очевидно, устарело. Давайте, действуя с позиции силы, предложим им долгосрочный дружественный договор в обмен на снятие ограничений на наши военно-морские вооружения."
 deutsch_abrogation_of_the_naval_treaty_tt: "Британская сторона согласится аннулировать текущий военно-морской договор и заменить его долгосрочным дружественным договором."
 deutsch_abrogation_of_the_naval_treaty_single: "В одностороннем порядке расторгнуть военно-морской договор"
 deutsch_abrogation_of_the_naval_treaty_single_desc: "Положение Великобритании уже давно не позволяет ей заставлять нас соблюдать этот военно-морской договор. Хотя это и вызовет международное осуждение, в интересах нашей страны этот договор должен быть аннулирован."
 deutsch_abrogation_of_the_naval_treaty_single_tt: "Наша страна в одностороннем порядке объявит о расторжении военно-морского договора."
 expand_deutsche_reich_states_to_poland: "Предоставить статус имперской земли польским территориям"
 expand_deutsche_reich_states_to_poland_desc: "Имперское правительство давно рассматривает предложение о включении польских земель в состав Германской империи. Хотя их народ и далёк от немцев, учитывая всё более просвещённую национальную политику империи, мы верим, что парламент не откажет в просьбе о включении польских провинций в состав имперских земель."
 expand_deutsche_reich_states_to_aus: "Повысить статус германских территорий"
 expand_deutsche_reich_states_to_aus_desc: "Новые земли, некогда принадлежавшие Германскому союзу, вернулись в лоно Германии. Согласно конституции, все провинции Германского союза по праву должны быть равной частью единого германского государства. У нас есть все законные основания объявить о предоставлении немцам на этих территориях полных и равных прав и провозгласить их статус имперских земель."
  #Частные инвестиции
 joi_disable_private_investment: "Отключить частные инвестиции"
 joi_disable_private_investment_desc: "Это решение отключит функцию частного инвестирования через [Concept('concept_investment_pool', 'инвестиционный пул')] (это означает, что финансовые районы также не смогут быть приватизированы, будет доступна только приватизация компаний)."
 joi_second_disable_private_investment: "Отключить распределение частных инвестиций"
 joi_second_disable_private_investment_desc: "Это решение отменит распределение частных инвестиций (но на самом деле [Concept('concept_investment_pool', 'инвестиционный пул')] всё равно будет использоваться для частного строительства, когда вы не строите)."
 joi_enable_private_investment: "Включить частные инвестиции"
 joi_enable_private_investment_desc: "Это решение включит функцию частного инвестирования через [Concept('concept_investment_pool', 'инвестиционный пул')] и нормальное распределение частных инвестиций."
  #Кризис из-за Святых мест
 claiming_the_right_of_holy_places: "Заявить права на покровительство над Святой землёй"
 claiming_the_right_of_holy_places_desc: "Власть Османской империи окончательно ослабла, и святыня православия, да и всего христианства — священный город Иерусалим — манит нас. Как защитник православных христиан всего мира, Его Величество Царь обязан направить войска против этого нечестивого государства и вернуть славный Иерусалим! В то же время, управляя портами Палестины, мы получим ценную возможность распространить своё влияние на всё Средиземноморье."
  #Национальные руководства
 joi_french_guide_decision: "Путеводитель по Франции"
 joi_french_guide_decision_desc: "Это решение предоставит некоторые рекомендации по игре за Францию. Его можно использовать только один раз."
  #Британские решения
 direct_rule_of_ceylon: "Установить прямое правление над Цейлоном"
 direct_rule_of_ceylon_desc: "Цейлон — наша важная база в Индийском океане, с помощью которой мы можем эффективно проецировать влияние от Индийского субконтинента и Аравийского полуострова до Дальнего Востока. Из военных соображений мы должны обойти местные органы власти и приказать Министерству по делам колоний подтвердить положения Амьенского мира, взяв остров под прямое управление Лондона."
 direct_rule_of_ceylon_tt: "Мы распустим местные органы управления на #yellow #B Цейлоне#!#! и возьмём остров под прямое правление."
 direct_rule_of_malaya: "Установить прямое правление над Стрейтс-Сетлментс"
 direct_rule_of_malaya_desc: "Колонии Проливов, находящиеся в настоящее время под управлением индийского правительства, имеют разрозненное население, приносят мизерную прибыль и требуют больших затрат на управление. Однако расположение Малаккского пролива имеет огромное стратегическое значение для Империи. Мы издадим указ, требующий от Индии передать колонии Проливов в ведение лондонского Министерства по делам колоний."
 direct_rule_of_malaya_taken_tt: "Мы возьмём под свой контроль провинции колоний Проливов, включая #yellow #B Сингапур#!#!."
 agree_with_proposal_of_conference: "Одобрить предложение Имперской экономической конференции"
 agree_with_proposal_of_conference_desc: "На экономической конференции Британия пообещала, что позволит большинству имперских товаров и впредь свободно поступать на рынок, а также введёт новые пошлины на некоторые импортные продукты питания и металлы из-за рубежа. Очевидно, что такое укрепление экономических связей выгодно обеим сторонам. Мы обязуемся согласиться с текущими основными принципами конференции и сохранить установленный уровень преференций."
 agree_with_proposal_of_conference_tt: "Мы одобрим предложение Великобритании на экономической конференции.\nЕсли конференция в итоге будет утверждена, мы примем [Concept('concept_law','закон')] о #yellow #B системе имперских преференций#!#!."
 permanent_imperial_conference: "Институционализировать Имперскую конференцию"
 permanent_imperial_conference_desc: "#V Имперская конференция#! — это важный форум для подчёркивания единства империи и выражения политических устремлений автономных правительств. Превратив этот механизм в #B регулярно проводимое совещание с участием всех членов империи#!, а не только мероприятие, приуроченное к королевским торжествам с участием имперских сановников, мы обеспечим экономические связи и политическую стабильность по всей #yellow Британской империи#!."
 permanent_imperial_conference_taken_tt: "Мы превратим #V Имперскую конференцию#! в постоянный политический механизм.\nВсе наши [Concept('concept_subject', 'субъекты')] получат модификатор #B #L Имперская конференция#!#! со следующими эффектами:"
 end_of_malaya: "Расторгнуть Сингапурский договор"
 end_of_malaya_desc: "Согласно положениям #B Англо-голландского договора 1824 года#! и #B Сингапурского договора 1819 года#!, порты, такие как Сингапур, были переданы под юрисдикцию #yellow Ост-Индской компании#!. Однако, учитывая нашу потребность в дальнейшем расширении интересов на Малайском полуострове, следует уведомить султана Джохора о расторжении Сингапурского договора 1819 года."
 end_of_malaya_taken_tt: "Мы в одностороннем порядке выйдем из #yellow Сингапурского договора#!, прекратив особый статус этой территории."
 direct_rule_of_malaya_possible_tt: "#yellow Сингапурский договор#! аннулирован не менее 1 месяца назад"
 spouse_for_her_majesty: "Брачный союз для Её Величества"
 spouse_for_her_majesty_desc: "Её Величество уже некоторое время находится на престоле и выразила желание найти себе супруга. Мы должны подыскать для неё подходящего кандидата среди королевских домов Европы."
 spouse_for_her_majesty_possible_tt: "Её Величество выразила желание вступить в брак"
 spouse_for_her_majesty_taken_tt: "Мы найдём супруга для Её Величества."
 prince_alex_visit_west_europe: "Разрешить визит цесаревича Александра в Западную Европу"
 prince_alex_visit_west_europe_desc: "Нынешний цесаревич #yellow Александр#! всегда хотел, подобно своему предку Петру Великому, посетить страны Западной Европы для обучения и ознакомления. Возможно, нам следует выбрать подходящий момент и разрешить ему осуществить этот план."
 prince_alex_visit_west_europe_possible_tt: "Новый монарх #yellow Великобритании#! взошёл на престол.\nМы можем использовать это как повод для первого визита в Англию."
 prince_alex_visit_west_europe_taken_tt: "Цесаревич #yellow Александр#! отправится в Англию."
 gbr_give_crown_dependencies: "Наделить заморские острова статусом коронных земель"
 gbr_give_crown_dependencies_desc: "Хотя главные имперские вопросы уже решены, статус многих небольших заморских островов всё ещё остается неопределенным. Чтобы урегулировать эту проблему, мы можем наделить их особым статусом Коронных земель, тем самым способствуя их самоуправлению."
 gbr_give_crown_dependencies_possible: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Имперская автономия#! или #V Имперская федерация#!"
 gbr_give_crown_dependencies_taken_tt: "Все заморские острова станут [Concept('concept_homeland', 'родиной')] #O английской#! культуры и получат модификатор со следующими эффектами:"
 set_the_balfour_declaration: "Декларация Бальфура"
 set_the_balfour_declaration_desc: "Правительство Его Величества относится благосклонно к восстановлению в Палестине национального очага для еврейского народа и приложит все усилия, чтобы способствовать достижению этой цели. Поскольку мы имеем значительное влияние в Иудее и Леванте, древней родине еврейского народа, мы можем опубликовать декларацию, выражающую нашу поддержку созданию там национального государства для евреев."
 set_the_balfour_declaration_taken_tt: "Мы установим в Палестине мандат и разрешим миграцию евреев."
 expand_scotland_yard: "Расширить Скотленд-Ярд"
 expand_scotland_yard_desc: "Столичная полиция, основанная в соответствии с «Законом о столичной полиции» 1829 года, неофициально известна нашим гражданам как «Скотленд-Ярд», поскольку её штаб-квартира располагалась на Уайтхолле, 4, где когда-то проходила дорога под названием «Грейт-Скотленд-Ярд». Являясь одним из наших самых знаковых полицейских учреждений, Скотленд-Ярд упоминается в произведениях многих известных писателей и, несомненно, помог нам раскрыть не одно и не два дела."
 sign_lonian_treaty_of_london: "Судьба Ионических островов"
 sign_lonian_treaty_of_london_desc: "Со времён Наполеоновских войн #yellow Ионические острова#! были дружественным протекторатом #yellow Великобритании#!. Однако содержание этого протектората обходится дорого, а местные жители желают воссоединиться со своей греческой родиной. Мы должны пойти навстречу их желанию и передать острова Греции."
 joi_burn_the_summer_palace: "Сожжение Летнего дворца"
 joi_burn_the_summer_palace_desc: "Юаньминъюань — садово-парковый ансамбль к северо-западу от Императорского города в Пекине, служивший летней резиденцией императоров династии Цин в XVIII и XIX веках. Теперь, когда Пекин в наших руках, мы должны сжечь эту зловещую собственность китайского императора, чтобы отомстить за чудовищные зверства, совершенные против нашей дипломатической миссии."
 joi_burn_the_summer_palace_possible_tt: "Наши войска прорвались в #yellow Пекин#!."
 joi_webster_ashburton_treaty: "Подписать договор Уэбстера — Ашбертона"
 joi_webster_ashburton_treaty_desc: "Парижский мирный договор 1783 года положил конец Войне за независимость США, но не определил чётко границу между Британской Северной Америкой и Соединёнными Штатами. Претензии #yellow Соединённых Штатов Америки#! на эти спорные участки границы имеют определённые основания. Мы можем подписать договор, который установит границу по 49-й параллели между штатом Мэн и провинцией Нью-Брансуик, урегулирует совместное использование Великих озёр и призовёт обе стороны взять на себя обязательство по прекращению #V трансатлантической работорговли#!."
 joi_webster_ashburton_treaty_taken_tt: "Это предоставит обеим сторонам возможность совместного освоения Великих озёр в будущем."
 colonzed_yukon_territory: "Колонизация территории Юкон"
 colonzed_yukon_territory_desc: "#yellow Территория Юкон#! обладает огромным потенциалом, но суровый климат и труднопроходимая местность до сих пор мешали нам освоить этот край. Снарядив новые экспедиции, мы сможем водрузить флаг над этими землями и основать там постоянные поселения."
 #
 relocating_the_capital_to_chongqing: "Перенос столицы в Чунцин"
 relocating_the_capital_to_chongqing_desc: "Китай переживает свой самый мрачный час: Пекин и Нанкин пали под натиском врага. Но лучше разбиться вдребезги, как драгоценный нефрит, чем уцелеть, став простой черепицей. Ради спасения государства и чести нации, для организации непоколебимого и долгого сопротивления наше правительство обязано перенести столицу в Чунцин. С нашей необъятной территорией и бесчисленным народом, если каждый будет готов сражаться насмерть, мы непременно отстоим свою независимость и право на жизнь!"
 relocating_the_capital_to_chongqing_possible_1_tt: "Линия фронта противника достигла #yellow Пекина#!"
 relocating_the_capital_to_chongqing_possible_2_tt: "Линия фронта противника достигла #yellow Нанкина#!"
 act_state_general_mobilization_law: "Принять Закон о национальной мобилизации"
 act_state_general_mobilization_law_desc: "Опыт войны в Европе показал, что в нашу эпоху победа достижима лишь при полной отдаче каждого гражданина. Сегодня, когда Империя отчаянно нуждается в рабочих руках для нужд фронта, кабинет министров обязан испросить у императора разрешение на всеобщую мобилизацию. Правительство должно получить право принудительно привлекать граждан любого пола к труду на фабриках и заводах."
 relocating_the_capital_to_batavia: "Перенос столицы в Батавию"
 relocating_the_capital_to_batavia_desc: "Несмотря на героическое сопротивление армии, потери слишком велики — пора признать поражение. Наша метрополия пала, но прекрасно обустроенная Батавия в заморских колониях может стать нашей новой столицей. И пусть мы временно покинули родину, боевой дух нидерландцев не сломлен: мы обязательно вернёмся домой!"
 relocating_the_capital_to_batavia_possible_1_tt: "Вражеский фронт достиг города #yellow Амстердам#!"
 building_defensive_line_in_alsace_lorraine: "Строительство линии обороны в Эльзас-Лотарингии"
 building_defensive_line_in_alsace_lorraine_desc: "Эффективность грамотно выстроенных траншей неоспорима: пулемётный расчёт из нескольких солдат способен уничтожить сотни наступающих по открытой местности врагов. Масштабная линия обороны с подземными бетонными укреплениями — самый надёжный способ защитить ключевые территории нашей страны от сухопутного вторжения."
 imp_use_uk_flag: "Использовать Союзный флаг"
 imp_use_uk_flag_desc: "Сменить наш государственный флаг на Союзный флаг, представляющий Соединённое Королевство, а не на федеративное знамя."
 abolish_the_german_title: "Отказаться от немецкого титула"
 abolish_the_german_title_desc: "Немцы — враги Британии, в этом нет сомнений. В этой войне германские дьяволы нанесли нам слишком много ран; бесчисленные британские семьи погибли от их пуль. Однако королевский дом, правящий Британией как монархи Соединённого Королевства, всё ещё носит фамилию германского происхождения. Народ сомневается в верности короля стране и нации, и королевская семья должна ответить."
 colonzed_australia_desert: "Колонизировать австралийскую пустыню"
 colonzed_australia_desert_desc: "#yellow Австралийская пустыня#! таит в себе большой потенциал, но суровый климат и нехватка воды мешают нам исследовать её дальше. Снарядив новые экспедиции в австралийскую пустыню, мы сможем водрузить флаг над этими землями и основать новые поселения."
