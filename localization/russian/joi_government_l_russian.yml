l_russian:
  #Монархии
 gov_frankfurter_kaiserreich: "Имперское правительство"
 gov_frankfurter_kaiserreich_desc: "При такой [Concept('concept_government_type', 'форме правления')] во главе [Concept('concept_country', 'страны')] стоит наследственный [concept_ruler|l], носящий титул [Concept('concept_ruler','$RULER_TITLE_KAISER$')] или [Concept('concept_ruler','$RULER_TITLE_KAISERINE$')]. Он осуществляет власть в соответствии с положениями Франкфуртской конституции и уполномочивает Рейхстаг править.\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_lander_der_krone: "Земли короны"
 gov_lander_der_krone_desc: "[concept_lander_der_krone] — это уполномоченные имперским правительством королевства и владения, находящиеся под властью короны. Эту корону носит [Concept('concept_ruler','$RULER_TITLE_KAISER$')] или [Concept('concept_ruler','$RULER_TITLE_KAISERINE$')], а сами земли представлены их парламентами.\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_second_napolean_empire: "Французская империя"
 gov_second_napolean_empire_desc: "Это [concept_government|l] Его Величества, носящего титул [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] или [Concept('concept_ruler','$RULER_TITLE_EMPRESS$')] французов. Он избран Сенатом и народом Франции милостью Божьей и в соответствии с Конституцией.\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_jap_japanese_empire: "Государство Тэнно"
 gov_jap_japanese_empire_desc: "При этой [Concept('concept_government_type', 'форме правления')] трон наследует потомок богини Аматэрасу из вечной и непрерывной династии. Он носит титул [Concept('concept_ruler','$RULER_TITLE_JAPEMPEROR$')] и считается священным и неприкосновенным номинальным [Concept('concept_ruler', 'правителем')].\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_celestial_empire: "Поднебесная империя"
 gov_celestial_empire_desc: "При этой [Concept('concept_government_type', 'форме правления')] [Concept('concept_country', 'страной')] правит [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')], Сын Неба, который считается верховным и священным [Concept('concept_ruler', 'правителем')], мудро владеющим Небесным мандатом и правящим великой Срединной династией.\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_sublime_porte: "Высокая Порта"
 gov_sublime_porte_desc: "Это [Concept('concept_government', 'правительство')] Его Величества. Его возглавляет верховный [Concept('concept_ruler','$RULER_TITLE_CALIPH$')], Тень Аллаха на земле, Хранитель Святынь, [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] двух морей и двух континентов, [Concept('concept_ruler','$RULER_TITLE_SULTAN$')] тюрок и ислама, Римский [Concept('concept_ruler','$RULER_TITLE_KAISER$')], Османский [Concept('concept_ruler','$RULER_TITLE_PADISAH$')].\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_sublime_porte_caliph: "Высокая Порта"
 gov_sublime_porte_caliph_desc: "Это [Concept('concept_government', 'правительство')] Его Величества. Его возглавляет верховный [Concept('concept_ruler','$RULER_TITLE_CALIPH$')], Тень Аллаха на земле, Хранитель Святынь, [Concept('concept_ruler','$RULER_TITLE_EMPEROR$')] двух морей и двух континентов, [Concept('concept_ruler','$RULER_TITLE_SULTAN$')] тюрок и ислама, Римский [Concept('concept_ruler','$RULER_TITLE_KAISER$')], Османский [Concept('concept_ruler','$RULER_TITLE_PADISAH$')].\n\n[Concept('concept_transfer_of_power', 'Передача власти происходит по наследству')]."
 gov_spqr: "Сенат и народ Рима"
 gov_spqr_desc: "Это [Concept('concept_government', 'правительство')], действующее по воле Сената и народа Рима. Его возглавляет представитель всех свободных граждан, благородный [Concept('concept_ruler', '$RULER_TITLE_KAISER$')], Сын Божий, [Concept('concept_ruler', '$RULER_TITLE_AUGUSTUST$')], Великий понтифик, наделённый властью народного трибуна, Владыка мира и Римский [Concept('concept_ruler', '$RULER_TITLE_IMPERATOR$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
  #Республики
 gov_british_presidential_dominion: "Доминион"
 gov_british_presidential_dominion_desc: "При этой [Concept('concept_government_type', 'форме правления')] во главе [Concept('concept_country', 'страны')] стоит [Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')], который представляет британского монарха. Страна при этом обладает высокой степенью автономии.\n\n[Concept('concept_transfer_of_power', 'Власть передаётся по назначению')]."
 gov_british_parliamentary_dominion: "Доминион"
 gov_british_parliamentary_dominion_desc: "При этой [Concept('concept_government_type', 'форме правления')] [Concept('concept_country', 'страной')] управляет парламент, [Concept('concept_election','избираемый')] демократическим путём. Хотя в стране и есть [Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')], представляющий британского монарха, он не обладает реальной властью для управления государством.\n\n[Concept('concept_transfer_of_power', 'Власть передаётся по итогам выборов')]."
 gov_federal_government_of_united_states: "Федеральное правительство"
 gov_federal_government_of_united_states_desc: "При этой [Concept('concept_government_type', 'форме правления')] во главе [Concept('concept_country', 'страны')] стоит [Concept('concept_ruler','$RULER_TITLE_PRESIDENT$')], [Concept('concept_election', 'избираемый')] Коллегией выборщиков от каждого штата. Он осуществляет исполнительную власть в соответствии с Конституцией под контролем Конгресса, Верховного суда и правительств штатов.\n\n[Concept('concept_transfer_of_power', 'Власть передаётся по итогам выборов')]."
