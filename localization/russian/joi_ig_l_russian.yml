l_russian:
 ideology_inclusiveness: "Экуменизм"
 ideology_inclusiveness_desc: "#lore Экуменизм провозглашает ценность разнообразия в религиозных вопросах, призывая к диалогу и поиску согласия между различными течениями. Во имя христианского милосердия он стремится к принятию и включению различных культур, рас и верований. #!"
 ideology_bourgeoisie_capitalism: "Капитализм"
 ideology_bourgeoisie_capitalism_desc: "#lore Ключевой принцип этой идеологии — святость и неприкосновенность частной собственности. Правительство не должно вмешиваться в дела общества, за исключением поддержания правопорядка. В политике сторонники капитализма придерживаются либеральных взглядов и стремятся к созданию ограниченной представительной демократии. #!"
 ideology_british_capitalism: "Британский капитализм"
 ideology_british_capitalism_desc: "#lore Опираясь на давние традиции парламентского правления и экономические учения Дэвида Юма и Адама Смита, эта идеология провозглашает стремление к личной выгоде и прибыли двигателем экономического роста, а частную собственность — его незыблемой основой. #!"
 ideology_interventionlism: "Интервенционизм"
 ideology_interventionlism_desc: "#lore Согласно кейнсианской экономической теории, правительство обязано использовать фискальную политику и бюджетный дефицит для поддержания стабильного роста. Умеренное государственное вмешательство рассматривается как залог устойчивого процветания рынка. #!"
 ideology_enlightlism: "Идеология Просвещения"
 ideology_enlightlism_desc: "#lore Сторонники Просвещения убеждены, что легитимность власти проистекает из общественного договора и воли граждан. Её цель — построение справедливой и равноправной правовой системы, которая защищает личные свободы и обеспечивает социальную справедливость. #!"
 ideology_english_enlightlism: "Идеология Просвещения"
 ideology_english_enlightlism_desc: "#lore Сторонники Просвещения убеждены, что легитимность власти проистекает из общественного договора и воли граждан. Её цель — построение справедливой и равноправной правовой системы, которая защищает личные свободы и обеспечивает социальную справедливость. #!"
 ideology_authoritarianism: "Авторитаризм"
 ideology_authoritarianism_desc: "#lore Сторонники авторитаризма выступают за сильное, бюрократическое правительство, будь то автократия или олигархия, которое обеспечивает полное подчинение политики воле социальной элиты. #!"
 ideology_misoneism: "Консерватизм"
 ideology_misoneism_desc: "#lore Консерватизм отвергает любые реформы, изменяющие вековые традиции. Допускаются лишь крайне ограниченные системные улучшения, направленные на поддержание существующей социальной иерархии. #!"
 ideology_expansionism: "Экспансионизм"
 ideology_expansionism_desc: "#lore Главная цель экспансионизма — расширение «жизненного пространства» для приумножения земель и богатств, принадлежащих гражданам своей страны. #!"
 ideology_imperialism: "Империализм"
 ideology_imperialism_desc: "#lore Империализм стремится к установлению политического и военного контроля над другими странами ради достижения превосходства и захвата всех доступных ресурсов и территорий. #!"
 ideology_british_conservatism: "Британский консерватизм"
 ideology_british_conservatism_desc: "#lore Британские консерваторы выступают за постепенные реформы, отвечающие настроениям общества, но при глубоком уважении к традициям и культуре Великобритании. Они стремятся защитить конституционную монархию, основанную на «Билле о правах», от любых радикальных угроз. #!"
 ideology_british_whig_liberalism: "Виг-либерализм"
 ideology_british_whig_liberalism_desc: "#lore Британский вигский либерализм опирается на труды Джеймса Тиррелла и Джона Локка. Его сторонники выступают за сохранение конституционной монархии и главенства парламента, закреплённых в «Билле о правах». Они отстаивают идеалы личной свободы, естественных прав и ограниченного вмешательства государства, стремясь к постепенному расширению гражданских свобод и укреплению представительной демократии путём последовательных и законных реформ.#!"
 ideology_british_tory_conservatism_old: "Тори-консерватизм"
 ideology_british_tory_conservatism_old_desc: "#lore Британский консерватизм тори уходит корнями в философию Эдмунда Бёрка и Дэвида Юма. Его последователи стремятся сохранить устоявшиеся институты и традиционные ценности в рамках демократической системы. Они придают огромное значение историческому опыту, обычаям и мудрости предков, поддерживая при этом социальные и экономические инициативы на благо простого народа, если те не нарушают традиционный уклад.#!"
 ideology_british_tory_conservatism_reformed: "Тори-консерватизм"
 ideology_british_tory_conservatism_reformed_desc: "#lore Британский консерватизм тори уходит корнями в философию Эдмунда Бёрка и Дэвида Юма. Его последователи стремятся сохранить устоявшиеся институты и традиционные ценности в рамках демократической системы. Они придают огромное значение историческому опыту, обычаям и мудрости предков, поддерживая социальные и экономические реформы. По их мнению, элита обязана брать на себя ответственность за благополучие низших слоев общества.#!"
 ideology_tory_patriarchal: "Патриархализм"
 ideology_tory_patriarchal_desc: "#lore Сторонники этой идеологии убеждены, что политическая власть должна принадлежать исключительно мужчинам, тогда как удел женщин — во всём подчиняться своим отцам и мужьям.#!"
 ideology_british_hierarchic: "Иерархизм"
 ideology_british_hierarchic_desc: "#lore Эта группа выступает за сохранение строгой общественной иерархии посредством традиционных систем налогообложения и трудовых отношений.#!"
 ideology_revolutionism: "Революционизм"
 ideology_revolutionism_desc: "#lore Приверженцы радикальных идей Французской революции, считающие себя истинными наследниками 1791 года. Они надеются мобилизовать массы, чтобы свергнуть деспотизм и установить демократическую республику. #!"
 ideology_junker_militarism: "Юнкерский милитаризм"
 ideology_junker_militarism_desc: "#lore Идеология прусской военной аристократии, согласно которой государство обязано ставить военные интересы превыше всего. Армия должна стать образцом дисциплины и дворянской чести, опираясь на эффективный государственный аппарат. #!"
 ideology_puritan: "Пуританизм"
 ideology_puritan_desc: "#lore Изгнанные из Англии американские пуритане стремятся к созданию равноправной республиканской системы. Они верят, что добросовестный труд и праведная мирская жизнь являются высшей формой служения Богу. #!"
 ideology_innovationist: "Реформизм"
 ideology_innovationist_desc: "#lore Идейное наследие декабристов, вдохновлённое Французской революцией и нацеленное на коренную модернизацию России. #!"
 ideology_westernlism: "Политика самоусиления"
 ideology_westernlism_desc: "#lore Движение выступает за заимствование западных технологий для развития промышленности, но призывает к сохранению традиционной китайской системы управления и ценностей. #!"
 ideology_revivalism: "Ревивализм"
 ideology_revivalism_desc: "#lore Последователи этой идеологии вдохновлены великой историей итальянской нации и стремятся воссоздать в современную эпоху единое и сильное итальянское государство. #!"
 ideology_tanzimatism: "Танзимат"
 ideology_tanzimatism_desc: "#lore Сторонники Танзимата выступают за системные реформы, направленные на модернизацию и сохранение территориальной целостности Османской империи. #!"
 ideology_shariah: "Суннитский шариат"
 ideology_shariah_desc: "#lore Согласно этой доктрине, законы шариата — заповеди Аллаха — должны служить основой законодательства, направляя каждый аспект повседневной жизни верующих. #!"
 ideology_anti_shogunate: "Движение против сёгуната"
 ideology_anti_shogunate_desc: "#lore Сторонники этого движения верят, что править Японией могут лишь потомки богини Аматэрасу, то есть император. Их цель — восстановление власти императора в рамках конституционного правления. #!"
 ideology_austria_centraliser: "Австрийский централизм"
 ideology_austria_centraliser_desc: "#lore Приверженцы этой идеологии стремятся сохранить Австрийскую империю как централизованное унитарное государство. #!"
 ideology_austria_federalist: "Австрийский федерализм"
 ideology_austria_federalist_desc: "#lore Сторонники федерализма желают реформировать Австрийскую империю в государство, где все народы будут обладать равными правами и автономией. #!"
 ideology_agrarian_russian: "Народничество"
 ideology_agrarian_russian_desc: "#lore Народники поддерживают идею коллективного владения землёй в форме крестьянской общины. #!"
 ideology_progressivism: "Прогрессивизм"
 ideology_progressivism_desc: "#lore Американские прогрессисты верят в улучшение жизни человека через социальные реформы, основанные на достижениях науки и техники. Они выступают за расширение демократии, усиление равноправия и другие позитивные изменения в обществе. #!"
 ideology_protestant_church: "Протестантская церковь"
 ideology_protestant_church_desc: "#lore Протестантские государственные церкви, возникшие в ходе Реформации, отрицают авторитет Папы Римского. Они учат, что каждый верующий способен напрямую обращаться к Богу и должен толковать Библию по своей совести. #!"
 ideology_catholic_church: "Римско-католическая церковь"
 ideology_catholic_church_desc: "#lore Католики признают верховный авторитет Святого Престола и величие Папы. Библия должна толковаться в соответствии с учением кардиналов, представляющих Папу в разных землях. #!"
 ideology_german_nobles: "Германское дворянство"
 ideology_german_nobles_desc: "#lore Будучи наследственными землевладельцами, древние дворяне германских земель также несут воинскую повинность, что заставляет их с особым вниманием относиться к нуждам вооружённых сил. #!"
 ideology_western_confucian: "Конфуцианский реформизм"
 ideology_western_confucian_desc: "#lore Движение за реформы изменило взгляды традиционных конфуцианских учёных, побудив их искать пути прагматичных преобразований для своей страны. #!"
 ideology_catholicisme_social: "Социальный католицизм"
 ideology_catholicisme_social_desc: "#lore Социальное учение Католической церкви призывает уделять больше внимания несправедливому распределению благ в обществе. Следуя христианским принципам, оно стремится к социальной справедливости, не затрагивая при этом классовую структуру. #!"
 ideology_opportunistes: "Умеренный республиканизм"
 ideology_opportunistes_desc: "#lore Признавая либеральные идеи Французской революции, умеренные республиканцы выступают против радикальной популистской агитации. Они надеются предотвратить деспотизм через парламентские реформы и создать демократическую республику в стабильных конституционных рамках. #!"
 ideology_bonapartiste: "Бонапартизм"
 ideology_bonapartiste_desc: "#lore Бонапартисты стремятся передать власть цезаристскому лидеру, уполномоченному народом через прямое обращение. Он должен сконцентрировать в своих руках административную власть и активно вмешиваться в общественные дела, чтобы привести Францию в новую, великую эпоху. #!"
 ideology_us_federalism: "Американский федерализм"
 ideology_us_federalism_desc: "#lore Сторонники американского федерализма твёрдо поддерживают Конституцию 1789 года и выступают за представительную демократию, защищая как автономию штатов, так и полномочия, законно предоставленные федеральному правительству. #!"
 ideology_patriotism: "Патриотизм"
 ideology_patriotism_desc: "#lore Патриотизм — это глубокая любовь и преданность своей стране, её культуре, ценностям и уникальному образу жизни, а также готовность жертвовать собой ради неё. #!"
 ideology_united_states_constitution: "Американский конституционализм"
 ideology_united_states_constitution_desc: "#lore Сторонники этой идеологии твёрдо придерживаются Конституции Соединённых Штатов. Они считают, что армия обязана подчиняться только тем приказам президента, которые одобрены Конгрессом и соответствуют основному закону страны. #!"
 ideology_militarism: "Милитаризм"
 ideology_militarism_desc: "#lore Милитаристы убеждены, что государство должно поддерживать мощную армию, а армия, в свою очередь, должна любыми средствами расширять национальные интересы. #!"
 ideology_puritan_ecumenical: "Экуменический пуританизм"
 ideology_puritan_ecumenical_desc: "#lore Американское экуменическое движение стремится преодолеть раскол между христианскими церквями. Оно приветствует сектантское и этническое разнообразие, поощряя сотрудничество и единство между конфессиями во имя идеала вселенской церкви. #!"
 ideology_protestant_awakening: "Движение Великого пробуждения"
 ideology_protestant_awakening_desc: "#lore Сторонники Великого пробуждения считают, что спасение требует не только личного покаяния, но и нравственного обновления всего общества. Их цель — привнести благодать в общественную жизнь и искоренить все формы греха. #!"
 ideology_ecumenical_anglicanism: "Вселенское англиканство"
 ideology_ecumenical_anglicanism_desc: "#lore В Англиканском сообществе Церковь Англии признаётся «первой среди равных». Она использует Книгу общих молитв как руководство, следует традиционным таинствам и выступает за единство Вселенской церкви при плюрализме мнений. #!"
 ideology_british_anglicanism: "Британское англиканство"
 ideology_british_anglicanism_desc: "#lore Англиканская государственная церковь Великобритании почитает монарха как своего главу. Она учит, что истина христианской веры исходит из Библии и вселенских символов веры и должна постигаться через традицию, разум и личный опыт. #!"
 ideology_evangelical_revival: "Евангелизм"
 ideology_evangelical_revival_desc: "#lore Евангелисты считают Библию высшим авторитетом веры и придают огромное значение личному обращению. Они выступают за очищение от греха через распространение Евангелия и социальные действия, стремясь к оправданию верой и покаянием. #!"
 ideology_indian_farmer_sovereignist: "Суверенизм"
 ideology_indian_farmer_sovereignist_desc: "#lore Эта фракция выступает против репрессивных мер колониальных властей и поддерживает курс на национальное самоуправление.#!"
 ideology_ottomanism: "Османизм"
 ideology_ottomanism_desc: "#lore Эта группа выступает за отмену политики неравенства, основанной на этнической и религиозной принадлежности. Они стремятся к равенству всех подданных перед законом ради создания единой османской нации, чтобы предотвратить распад империи, провоцируемый религиозной системой миллетов.#!"
 ideology_salafi: "Салафитизм"
 ideology_salafi_desc: "#lore Эта группа призывает к восстановлению священной чистоты исламской традиции, основанной на поучениях Корана и Сунны. Они отвергают любые толкования, выходящие за рамки писания, и ставят во главу угла строгое соблюдение шариата и верность исламскому правителю.#!"
 ideology_janissary: "Янычаризм"
 ideology_janissary_desc: "#lore Эта группа отстаивает особые права и привилегии янычарского корпуса, выступая против либерализма и любых попыток модернизации армии под влиянием иностранных держав.#!"
 ideology_economic_statism: "Этатизм"
 ideology_economic_statism_desc: "#lore Сторонники этого течения верят, что сильное государство обладает естественной властью и не нуждается в дополнительной легитимизации. Они убеждены, что правительство обязано играть ключевую роль в управлении важнейшими секторами экономики.#!"
 ideology_national_conservatism: "Национал-консерватизм"
 ideology_national_conservatism_desc: "#lore Представители этой идеологии стремятся сохранить культурную идентичность нации и защитить государственный суверенитет. Они выступают за протекционизм, государственное вмешательство и создание мощной национальной армии для защиты интересов страны.#!"
  #Идеологии персонажей
 ideology_westernlism_leader: "Сторонник самоусиления"
 ideology_westernlism_leader_desc: "#lore Этот лидер выступает за реформы по западному образцу, внедряя передовые науку и технику для развития китайской промышленности, но при сохранении традиционной китайской системы. #!"
 ideology_liberal_bonapartist: "Либеральный бонапартизм"
 ideology_liberal_bonapartist_desc: "#lore Этот лидер убеждён, что страной должен править бонапартистский император, чья власть основана на воле народа, выраженной через плебисцит, чтобы привести Францию в новую, предопределённо великую эпоху. #!"
 ideology_kemalism_leader: "Турецкий секулярист"
 ideology_kemalism_leader_desc: "#lore Этот лидер поддерживает шесть принципов — республиканизм, народность, секуляризм, реформизм, национализм и этатизм — в качестве идеологической основы государства. Он стремится построить и сохранить светское, свободное турецкое национальное государство, опираясь на эти идеалы.#!"
 ideology_gladstonian_liberalism_leader: "Гладстонианский либерал"
 ideology_gladstonian_liberalism_leader_desc: "#lore Гладстонианский либерализм, названный в честь Уильяма Юарта Гладстона, выступает за снижение налогов и ограничение государственных расходов при строгом соблюдении баланса бюджета. Его сторонники — убеждённые защитники свободной торговли, индивидуальной независимости и свободы выбора. Они категорически против вмешательства государства в экономику, а саму свободу возводят в абсолютный моральный идеал.#!"
 ideology_reactionism_leader: "Реакционный абсолютист"
 ideology_reactionism_leader_desc: "#lore Этот лидер опирается на традиционные православные ценности, стремясь восстановить и защитить консервативные, авторитарные порядки, которые в современном мире считаются пережитком прошлого. Более того, он активно пытается распространить этот политический строй на соседние государства.#!"
 ideology_one_nation_conservatism_leader: "Консерватор одной нации"
 ideology_one_nation_conservatism_leader_desc: "#lore Концепция «одной нации», предложенная Бенджамином Дизраэли, гласит, что в демократическом государстве все члены общества несут ответственность друг перед другом. Элита должна руководствоваться принципами патернализма и благородства, сглаживая классовые противоречия и делясь своими благами с низами, а не сводить понятие общественного благополучия исключительно к собственным интересам.#!"
 ideology_imperial_reformer_leader: "Имперский реформатор"
 ideology_imperial_reformer_leader_desc: "#lore Этот лидер выступает за масштабные социальные преобразования, считая, что государство обязано смягчать классовые противоречия, бороться с бедностью и защищать рабочих. Отвергая идеи свободной торговли, он стремится сплотить Британскую империю в единое политическое целое с помощью протекционистских реформ и таможенных барьеров.#!"
 ideology_paternalistic_conservative: "Консерватор-патерналист"
 ideology_paternalistic_conservative_desc: "#lore Этот лидер считает, что правительство должно заботиться о народе, словно строгий, но любящий отец. Он выступает за масштабное государственное вмешательство в экономику ради всеобщего блага, рассчитывая заручиться поддержкой рабочего класса и повысить лояльность граждан с помощью социальных гарантий.#!"
 ideology_polk_jingoist_leader: "Последователь Полка"
 ideology_polk_jingoist_leader_desc: "#lore Этот персонаж не только свято верит в идеалы джексоновской демократии, выступая за низкие пошлины и ограничение федеральной власти, но и твердо убежден, что Америка ведома самим Богом, а её священный долг — расширить свои границы от Атлантики до Тихого океана.#!"
