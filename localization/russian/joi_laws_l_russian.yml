l_russian:
  #Trade Policy group
 law_kyushu_system: "Торговля через Нагасаки"
 law_kyushu_system_desc: "Вариант [Concept('concept_law','закона')] «$law_isolationism$», разрешающий торговлю только в одном прибрежном [Concept('concept_state_region','регионе')]."
 kyushu_system_trade_center_trigger_tt: "При [Concept('concept_law','законе')] [GetLawType('law_kyushu_system').GetName] [Concept('concept_trade_center','торговые центры')] можно строить только в #v $STATE_KYUSHU$#! до #v 50#!-го уровня."
 law_imperial_preference: "Система имперских преференций"
 law_imperial_preference_desc: "Вариант [Concept('concept_law','закона')] «$law_protectionism$», основанный на принципе «отечественные производители в первую очередь, имперские — во вторую, иностранные — в последнюю». Он подчёркивает внутреннюю торговлю и льготный режим в рамках Британской империи, минимизируя импорт иностранных товаров."
  #economic
 law_gram_swaraj: "Грам сварадж"
 law_gram_swaraj_desc: "Вариант [Concept('concept_law','закона')] «$law_agrarianism$», который делает упор на экономическую автономию и децентрализацию с деревней в качестве основной единицы."
  #
 law_imperial_examination: "Императорские экзамены"
 law_imperial_examination_desc: "Вариант [Concept('concept_law','закона')] «$law_appointed_bureaucrats$». Кэцзюй, зародившаяся при династии Суй, — это традиционная китайская система отбора чиновников, в которой император лично выступал в роли экзаменатора. Она была направлена на обеспечение лояльности чиновников конфуцианской философской традиции и иерархии «правитель-подданный», а также на укрепление абсолютной власти монарха."
  #
 law_scotland_yard: "Скотленд-Ярд"
 law_scotland_yard_desc: "Вариант [Concept('concept_law','закона')] «$law_dedicated_police$». Скотленд-Ярд — это штаб-квартира Столичной полиции Большого Лондона, расположенная по адресу Уайтхолл, 4. Являясь одной из первых в мире стандартизированных полицейских сил, Скотленд-Ярд стал синонимом британской полиции и сыскного дела."
 law_scotland_yard_enable_tt: "Уже принято решение #V Расширить Скотленд-Ярд#!."
#Налогообложение
 law_askeri_tax: "Налог бедель-и аскери"
 law_askeri_tax_desc: "Вариант закона «[GetLawType('law_per_capita_based_taxation').GetName]». Бедель-и аскери — это реформированная джизья, налог, который взимается с мужчин-немусульман в обмен на освобождение от воинской повинности."
 law_askeri_tax_enable_tt: "Выбрано реформирование джизьи в событии #V «Проблемы налогообложения»#!"
 #Образование
 law_madrasa: "Медресе"
 law_madrasa_desc: "Вариант закона «[GetLawType('law_religious_schools').GetName]». Эта система образования, зародившаяся в XI веке при династии Сельджуков, представляет собой учебные заведения, где изучают Коран, шариат, грамматику и вспомогательные предметы. Их истинная цель — сохранение религиозной ортодоксии и чистоты веры, а не академическое развитие, поэтому в медресе практически отсутствуют философия и светские науки."
 law_classical_learning: "Конфуцианские академии"
 law_classical_learning_desc: "Вариант закона «[GetLawType('law_private_schools').GetName]». Это получастная, полуофициальная система образования, распространённая в конфуцианской культурной сфере. Она сочетает обучение детей грамоте и углублённое изучение классических текстов учёными мужами. Доступная в основном выходцам из богатых семей, эта система тесно связана с государственными экзаменами и замкнута на самой себе, что лишает её черт современного академического образования."
 #Распределение власти
 law_sublime_porte_absolutism: "Диктатура халифата"
 law_sublime_porte_absolutism_desc: "Вариант закона «[GetLawType('law_autocracy').GetName]». Вся политическая власть сосредоточена в руках наследственного халифа, почитаемого как законный преемник Пророка. Это позволяет правительству Высокой Порты контролировать все аспекты жизни общества, опираясь на религиозную идеологию Корана."
 law_sublime_porte_absolutism_enable_tt: "Провалена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Эпоха конституционализма»#!, и любая #I исламская страна#! завершила запись #V «Панисламизм»#!"
 #Гражданство
 law_pan_islamism: "Панисламизм"
 law_pan_islamism_desc: "Вариант закона «[GetLawType('law_ethnostate').GetName]». Он ставит религию выше расы или национальности, рассматривая Умму (мусульманскую общину) как центр лояльности и мобилизации. Закон провозглашает исламское единство и веру в Единого Бога, основанную на руководстве Корана и Сунны."
 EFFECTS_ON_ACCEPTANCE_law_pan_islamism: "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],law_pan_islamism_modifier_effects_tt $law_pan_islamism_modifier$#!."
 law_pan_islamism_modifier_effects_tt: "[GetStaticModifier('law_pan_islamism_modifier').GetDesc]"
 law_pan_islamism_aviliable_tt: "Любое #I исламское государство#! завершило [Concept('concept_journal_entry', 'запись в дневнике')] «#V $caliph_and_ummah$#!»"
 law_official_nationalism: "Официальная народность"
 law_official_nationalism_desc: "Этот закон представляет собой вариант закона «$law_subjecthood$». Он провозглашает, что истинная природа русского народа кроется в православной вере и безграничной преданности царю и самодержавию. Эти ценности признаются абсолютным фундаментом существования России. Для защиты национальных традиций государство обязано жестко пресекать любые тлетворные иностранные влияния, в особенности распространение либерализма, национализма и социализма. Из образования и общественной жизни должны быть безжалостно искоренены вольнодумные идеи, ставящие под сомнение авторитет власти."
 EFFECTS_ON_ACCEPTANCE_law_official_nationalism: "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],law_official_nationalism_modifier_effect_tt $law_official_nationalism_modifier$#!"
 law_official_nationalism_modifier_effect_tt: "[GetStaticModifier('law_official_nationalism_modifier').GetDesc]"
 law_official_nationalism_aviliable_tt: "[Concept('concept_journal_entry', 'Запись в дневнике')] «#V $government_leader_nicholas_i$#!» завершена с выполнением #B всех условий#!"
#Поправки
 amendment_westminster_system_amendment: "Вестминстерская система"
 amendment_westminster_system_amendment_desc: "Система парламентской конституционной монархии, названная в честь Вестминстерского дворца — места заседаний британского парламента. Монарх как номинальный глава государства обладает множеством резервных полномочий, но на практике обязан следовать воле главы правительства, а его повседневные обязанности носят в основном церемониальный характер. Для стран с республиканской формой правления эта система подразумевает номинального главу государства при двухпалатной парламентской демократии. Неписаные конвенции, обычаи и прецеденты играют ключевую роль во многих аспектах, не закреплённых в конституции, обеспечивая высокую концентрацию исполнительной власти в руках кабинета, формируемого парламентским большинством, и реализуя разделение властей через политическую ответственность, а не через жесткое юридическое разделение."
 amendment_magna_carta_amendment: "Великая хартия вольностей"
 amendment_magna_carta_amendment_desc: "«Великая хартия вольностей» — правовой акт, составленный на латыни и подписанный королём Англии Иоанном Безземельным 15 июня 1215 года в Раннимеде близ Виндзора. Документ был призван защитить политические права феодалов и ограничить произвол монарха в налогообложении и правосудии. Это один из первых документов, законодательно закрепивших принципы гражданских свобод, включая право на справедливый суд и защиту от незаконного задержания."
 amendment_bill_of_rights_1689_amendment: "Билль о правах 1689 года"
 amendment_bill_of_rights_1689_amendment_desc: "«Притязания на власть приостанавливать законы или исполнение законов королевским повелением без согласия парламента незаконны; взимание сборов в пользу и в распоряжение короны без согласия парламента... незаконно; набор или содержание постоянного войска в пределах королевства в мирное время, иначе как с согласия парламента, противно закону; подданные имеют право обращаться с ходатайствами к королю, и всякое задержание и преследование за такие ходатайства незаконно; свобода слова, прений и всего того, что происходит в парламенте, не может подать повода к преследованию или быть предметом рассмотрения в каком-либо суде или месте, кроме парламента»."
 amendment_slavery_abolition_act_1833_amendment: "Акт об отмене рабства 1833 года"
 amendment_slavery_abolition_act_1833_amendment_desc: "«Рабство столь отвратительно, что во имя торжества справедливости и морали оно не должно существовать нигде в пределах Британской империи. Поэтому не будем отчаиваться, ибо это благородное дело; будем упорны, пока не добьёмся полной победы; не отступим, пока не смоем позор с имени Христова, не сбросим груз греха, что ныне лежит на нас, и не искореним полностью следы этой кровавой торговли во всем мире»."
 amendment_catholic_emancipation_act: "Акт об эмансипации католиков 1829 года"
 amendment_catholic_emancipation_act_desc: "Этот закон отменяет религиозную клятву, которая не позволяла католикам Соединённого Королевства заседать в парламенте и занимать высокие государственные должности. Он упраздняет антикатолическую присягу, закреплённую в «Акте о супрематии», и кладёт конец многолетней правовой дискриминации католиков — в первую очередь ирландских."
 amendment_gladstone_liberalism_dogmas: "Гладстонианский либерализм"
 amendment_gladstone_liberalism_dogmas_desc: "Наследие правительства Гладстона утвердило в Британии непоколебимую веру в свободную торговлю и принцип невмешательства. Сторонники этих идей оказывают колоссальное влияние на политику страны: они требуют снижения пошлин и налогов, урезания государственных расходов, сохранения бездефицитного бюджета и создания честного правительства, которое минимально вмешивается в дела свободного общества."
 amendment_american_first_amendment: "Первая поправка к Конституции"
 amendment_american_first_amendment_desc: "«Конгресс не должен издавать ни одного закона, относящегося к установлению религии либо запрещающего свободное её исповедание, либо ограничивающего свободу слова или печати, или право народа мирно собираться и обращаться к правительству с петициями об удовлетворении жалоб»."
 amendment_american_third_amendment: "Третья поправка к Конституции"
 amendment_american_third_amendment_desc: "«Ни один солдат не должен в мирное время размещаться на постой в каком-либо доме без согласия владельца; в военное время это допускается только в порядке, установленном законом»."
 amendment_american_forth_amendment: "Четвёртая поправка к Конституции"
 amendment_american_forth_amendment_desc: "«Право народа на охрану личности, жилища, бумаг и имущества от необоснованных обысков и арестов не должно нарушаться. Ни один ордер не должен выдаваться иначе, как при наличии достаточного основания, подтверждённого присягой или торжественным заявлением; при этом ордер должен содержать подробное описание места, подлежащего обыску, лиц или предметов, подлежащих аресту»."
 amendment_american_fifth_amendment: "Пятая поправка к Конституции"
 amendment_american_fifth_amendment_desc: "«Никто не должен привлекаться к ответственности за тяжкое или иное позорящее преступление иначе, как по представлению или обвинительному заключению Большого жюри, за исключением дел, возбуждаемых в сухопутных или морских вооружённых силах либо в народном ополчении... Никто не должен за одно и то же правонарушение дважды подвергаться угрозе лишения жизни или телесного наказания; никто не должен принуждаться в каком-либо уголовном деле быть свидетелем против самого себя; никто не может быть лишён жизни, свободы или собственности без надлежащей правовой процедуры; частная собственность не должна изыматься для общественных нужд без справедливого вознаграждения»."
 amendment_usa_declaration_of_independence: "Декларация независимости"
 amendment_usa_declaration_of_independence_desc: "«Мы исходим из той самоочевидной истины, что все люди созданы равными и наделены Творцом определёнными неотчуждаемыми правами, к числу которых относятся жизнь, свобода и стремление к счастью. Для обеспечения этих прав людьми учреждаются правительства, черпающие свои законные полномочия из согласия управляемых»."
 amendment_rus_obshchina_system: "Русская община"
 amendment_rus_obshchina_system_desc: "Система русской поземельной общины восходит к древним славянским традициям. Длительная история крепостного права в Восточной Европе сформировала устойчивые традиции сельского самоуправления, которые были институционализированы в России реформами графа Киселёва. В общине земля принадлежит коллективу и распределяется местным сходом (миром) между дворами по определённому стандарту. Каждый член общины обрабатывает свой надел самостоятельно, но не имеет права продать или завещать его. Таким образом, крестьянин имеет право на землю вообще, но не на конкретный участок, и не может свободно распоряжаться им."
 amendment_rus_20_years_conscription: "20-летняя воинская повинность"
 amendment_rus_20_years_conscription_desc: "Рекруты для русской армии обычно набираются из числа городских и сельских мужчин, достигших 20 лет. Количество призывников определяется ежегодными потребностями армии и выбирается посредством жеребьёвки. Этим несчастным выпадает доля служить 20 лет на действительной службе и 5 лет в запасе, причём призыв не освобождает от подушной подати. Такая система обеспечивает наличие огромной профессиональной армии с длительным сроком службы, но ценой этого становится слабость резерва и истощение людских ресурсов в затяжных конфликтах."
 amendment_table_of_ranks: "Табель о рангах"
 amendment_table_of_ranks_desc: "Учрежденная Петром Великим в 1722 году, Табель о рангах полностью перестроила фундамент российского дворянства, сделав военную, гражданскую и придворную службу основой социального статуса. Система включала 14 классов. Теоретически каждый дворянин, независимо от происхождения и богатства, начинал с самых низов и продвигался вверх благодаря верной службе царю. Несмотря на первоначальное сопротивление знати, Табель о рангах успешно сформировала образованный слой дворянской бюрократии."
 amendment_1789_decree_on_the_goods: "Декрет о церковных землях 1789 года"
 amendment_1789_decree_on_the_goods_desc: "«Декрет о передаче церковных имуществ в распоряжение нации», принятый Национальным учредительным собранием Франции 2 ноября 1789 года в ходе Великой французской революции, обязал римско-католическое духовенство передать свои земли и имущество французскому правительству для погашения государственного долга. Земли церкви стали «национальным имуществом», часть которого была продана для пополнения казны. Этот декрет создал правовую основу для конфискации имущества церкви и эмигрантов, навсегда изменив структуру землевладения во Франции, что было признано всеми последующими правительствами."
 amendment_declaration_of_the_rights_of_man: "Декларация прав человека и гражданина"
 amendment_declaration_of_the_rights_of_man_desc: "«Невежество, забвение прав человека или пренебрежение ими являются единственной причиной общественных бедствий и испорченности правительств. Люди рождаются и остаются свободными и равными в правах. Эти права суть свобода, собственность, безопасность и сопротивление угнетению. Все граждане равны перед законом и поэтому имеют равный доступ ко всем постам, публичным должностям и занятиям сообразно их способностям и без каких-либо иных различий, кроме тех, что обусловлены их добродетелями и талантами»."
 amendment_civil_code_of_french: "Кодекс Наполеона"
 amendment_civil_code_of_french_desc: "«Гражданский кодекс французов», более известный как «Кодекс Наполеона», был разработан в 1804 году под руководством Наполеона Бонапарта на основе римского права. Хотя это был не первый свод законов в континентальной Европе, он стал первым, закрепившим либеральные правовые принципы. Кодекс унифицировал хаотичную судебную систему Франции и заложил фундамент континентальной правовой семьи, оказав огромное влияние на весь мир."
 amendment_window_tax: "Налог на окна"
 amendment_window_tax_desc: "Налог на окна — это вид налога на имущество, взимаемый в зависимости от количества окон в доме. По сравнению с подоходным налогом он менее интрузивен и проще в оценке. Однако он часто ложится непропорционально тяжким бременем на разные слои населения, заставляя людей строить антисанитарные жилища с крошечными окнами, где царит полумрак и плохая вентиляция. Проживание в таких условиях нередко приводит к фатальным последствиям для здоровья бедняков."
 amendment_pru_general_state_laws: "Прусское земское уложение"
 amendment_pru_general_state_laws_desc: "«Всеобщее земское право для прусских государств» — свод законов, разработанный по инициативе Фридриха Великого и введённый в действие в 1794 году при Фридрихе Вильгельме II. Оно систематизировало гражданское, уголовное и государственное право Пруссии, став образцом просвещённого абсолютизма. Несмотря на влияние Французской революции и Кодекса Наполеона, уложение сохранило изначальное стремление законодателя укрепить сословный строй и привилегии дворянства."
 amendment_salt_monopoly: "Соляная монополия"
 amendment_salt_monopoly_desc: "Система, при которой производство, распределение и ценообразование соли находятся под прямым контролем государства, обеспечивая стабильный доход в казну через государственные предприятия или откупы. Только государство или уполномоченные лица могут добывать соль и владеть солеварнями; даже продажа соли может строго контролироваться. Хотя это приносит значительный доход государству, такая система наносит огромный ущерб интересам простого народа."
 amendment_aus_gesetzbuch: "Всеобщее гражданское уложение"
 amendment_aus_gesetzbuch_desc: "«Всеобщее гражданское уложение Австрийской империи» (ABGB), принятое 1 июня 1811 года. Оно испытало сильное влияние Кодекса Наполеона, основываясь на принципах свободы и равенства перед законом, а также следуя классификации римского права."
 amendment_common_law: "Общее право"
 amendment_common_law_desc: "Общее право — правовая система, зародившаяся в Англии. Сначала она распространилась на Британские острова и Ирландию через Акты об унии, а затем, в течение столетий имперской экспансии, — по всему миру. Особенность общего права заключается в опоре на прецедент: судьи связаны решениями по предыдущим аналогичным делам, а не только статутным правом. Это обеспечивает предсказуемость и последовательность судебных решений, но может затруднять адаптацию к меняющимся условиям и консервировать устаревшие или несправедливые нормы."
 amendment_bic_salt_tax: "Соляной налог Ост-Индской компании"
 amendment_bic_salt_tax_desc: "Налогообложение соли на Индийском субконтиненте имеет давнюю историю, но в эпоху правления Ост-Индской компании этот налог был значительно повышен. В 1835 году Комиссия по соляному налогу унифицировала и пересмотрела правила в Бенгалии и Ориссе, установив единый стандарт для всей Британской Индии, что принесло Компании колоссальную прибыль."
 amendment_1793_permanent_settlement: "Постоянное поселение 1793 года"
 amendment_1793_permanent_settlement_desc: "«Постоянное поселение» — соглашение между Ост-Индской компанией и бенгальскими землевладельцами, зафиксировавшее порядок сбора поземельного налога. Согласно этой системе, заминдары (сборщики налогов) были признаны наследственными владельцами земли при условии уплаты фиксированного, неизменного налога государству. Земля стала товаром, а заминдары получили право собирать ренту с крестьян. В обмен они лишались права содержать вооружённые отряды и творить суд. Этот акт создал класс богатых заминдаров, кровно заинтересованных в сохранении британского владычества и обладающих огромной властью над крестьянами."
 amendment_kanunname_law: "Канун-наме Сулеймана"
 amendment_kanunname_law_desc: "«Канун-наме» — свод законов, составленный в правление султана Сулеймана Великолепного, прозванного Законодателем. Он регламентировал социальную, образовательную, налоговую, уголовную и гражданскую сферы жизни империи. Объединив местные обычаи (адат) с нормами шариата, Сулейман создал относительно светскую правовую систему, определившую юридическое устройство Османской империи на столетия вперёд."
 amendment_tur_janissary: "Система девширме"
 amendment_tur_janissary_desc: "Девширме, или «налог кровью», — система принудительного набора мальчиков из христианских семей подвластных территорий. Их обращали в ислам, обучали и зачисляли в корпус янычар или на государственную службу. Подчинённые строжайшей дисциплине и связанные сильной корпоративной солидарностью, они теоретически (и чаще всего на практике) были верны лично султану."
 amendment_qing_land_tax: "Огненная земля"
 amendment_qing_land_tax_desc: "Реформа «Таньдин жуму» («Объединение подушной подати с поземельным налогом»), начатая в правление императора Юнчжэна (1723–1735). Она отменила существовавший более двух тысяч лет подушный налог на взрослых мужчин, включив его в земельный налог. Это переложило налоговое бремя с безземельных крестьян на землевладельцев и освободило ремесленников и торговцев от подушной подати, упростив систему налогообложения."
 amendment_tifayifu_act: "Тифа ифу"
 amendment_tifayifu_act_desc: "Политика «Тифа ифу» («Бритьё волос и смена платья») — принудительная мера ассимиляции, введённая маньчжурской династией Цин после завоевания Китая. Волосы имели сакральное значение в ханьской культуре («Тело, волосы и кожу мы получаем от родителей, и не смеем их повредить — вот начало сыновней почтительности»). Традиционно ханьцы не стриглись, собирая волосы в пучок. Однако после падения Нанкина в 1645 году цинские власти под страхом смерти обязали всех мужчин брить лоб и носить маньчжурскую косу, а также сменить ханьфу на маньчжурскую одежду. Несмотря на яростное сопротивление поначалу, к правлению Канси эта традиция укоренилась, став символом покорности династии Цин."
 ###
 amendment_landwehr_conscription: "Прусская воинская повинность"
 amendment_landwehr_conscription_desc: "Прусская воинская повинность — это военная система, созданная в начале XIX века для борьбы с владычеством Наполеона. Она берет начало из «крюмперской системы», разработанной Шарнхорстом по образцу французского всеобщего призыва, и была официально утверждена Фридрихом Вильгельмом III в Законе о воинской повинности 1814 года. Документ обязывал всех мужчин, достигших двадцатилетнего возраста, проходить службу с последующим зачислением в резерв или ландвер. Непрерывное обучение резервистов и строгий отбор офицеров обеспечили армии возможность быстрой мобилизации и качественного пополнения."
 amendment_landwehr_system: "Ландвер"
 amendment_landwehr_system_desc: "Изначально ландвер представлял собой особое ополчение, распространенное в государствах Священной Римской империи. В ходе военной революции, вызванной Наполеоновскими войнами, эти отряды были интегрированы в систему резерва, став важным элементом эффективной мобилизационной машины. Хотя ополчение отличалось внушительной численностью, его боеспособность оставляла желать лучшего из-за недостатка дисциплины и слабой подготовки."
 amendment_prussian_union_of_churches: "Прусский евангелический союз"
 amendment_prussian_union_of_churches_desc: "Прусский евангелический союз — это официальная протестантская организация в Пруссии, созданная в 1817 году серией указов короля Фридриха Вильгельма III. Эти документы объединили лютеранские и реформатские общины страны. В результате централизаторских реформ церковь фактически стала государственным придатком, насаждая среди верующих официальную доктрину и утвержденные монархом таинства."
 amendment_prussian_dreiklassenwahlrecht: "Трехклассная избирательная система"
 amendment_prussian_dreiklassenwahlrecht_desc: "Эта система делит избирателей на три курии в зависимости от суммы уплачиваемых налогов. Самые состоятельные граждане голосуют в первой курии, и так далее по убыванию. В результате вес голосов в разных куриях кардинально различается, что на практике обеспечивает подавляющее электоральное преимущество богатым слоям общества и обеспеченным сельским регионам."
 ###
 amendment_state_general_mobilization: "Закон о национальной мобилизации"
 amendment_state_general_mobilization_desc: "Закон о национальной мобилизации закрепляет контроль японского правительства над общественными организациями в военное время. Он вводит национализацию стратегических отраслей и средств массовой информации, а также устанавливает жесткий контроль над ценами и систему нормирования. Государство получает право использовать неограниченные бюджетные средства для субсидирования военного производства, призывать в армию всех мужчин старше 14 лет и принудительно привлекать к труду женщин старше 16 лет."
 amendment_american_sixth_amendment: "Шестая поправка"
 amendment_american_sixth_amendment_desc: "«При всяком уголовном преследовании обвиняемый имеет право на скорый и публичный суд беспристрастных присяжных того штата и округа, где было совершено преступление, причем этот округ должен быть заранее установлен законом; право быть осведомленным о характере и основаниях обвинения; право на очную ставку со свидетелями, показывающими против него; право на принудительный вызов свидетелей, показывающих в его пользу, и на помощь адвоката для своей защиты»."
 amendment_american_seventh_amendment: "Седьмая поправка"
 amendment_american_seventh_amendment_desc: "«По судебным делам, основанным на общем праве, где цена иска превышает двадцать долларов, сохраняется право на суд присяжных, и ни один факт, рассмотренный присяжными, не может быть пересмотрен каким-либо судом Соединенных Штатов иначе, как в соответствии с нормами общего права»."
 amendment_american_eighth_amendment: "Восьмая поправка"
 amendment_american_eighth_amendment_desc: "«Не должны требоваться чрезмерные залоги, или налагаться чрезмерные штрафы, или назначаться жестокие и необычные наказания»."
 amendment_american_ninth_amendment: "Девятая поправка"
 amendment_american_ninth_amendment_desc: "«Перечисление в Конституции определенных прав не должно толковаться как отрицание или умаление других прав, сохраняемых за народом»."
 amendment_american_tenth_amendment: "Десятая поправка"
 amendment_american_tenth_amendment_desc: "«Полномочия, не делегированные Соединенным Штатам настоящей Конституцией и не запрещенные для штатов, сохраняются соответственно за штатами либо за народом»."
 amendment_factories_act_1833: "Закон о фабриках 1833 года"
 amendment_factories_act_1833_desc: "Принятый на волне масштабного реформаторского движения 1830-х годов, Фабричный акт 1833 года стал важнейшим дополнением к Закону о текстильных рабочих 1831 года. Продвигаемый активистами движения за десятичасовой рабочий день под началом Энтони Эшли-Купера и депутатом от тори Майклом Сэдлером, он стал первым в мире законом, предусматривающим прямое государственное вмешательство для защиты детского труда. Акт строго запрещал работу на фабриках детям младше 9 лет, а для детей от 9 до 13 лет ограничивал рабочий день 8 часами. Также он объявлял незаконным ночной труд подростков до 18 лет и учреждал Фабричную инспекцию для контроля за соблюдением этих норм. Впрочем, из-за огромного количества фабрик и нехватки инспекторов многие владельцы предприятий всё ещё находили способы обходить этот закон."