l_russian:
  PRESTIGE_THREE_TIMES_POSSIBLE: "[Concept('concept_prestige', 'Престиж')] [ROOT.GetCountry.GetName] должен втрое превышать [Concept('concept_prestige', 'престиж')] [SCOPE.sCountry('target_country').GetAltNameNoFlag('RU_CL_RP')] #bold #red ([ROOT.GetCountry.GetPrestige]#!/#v [GetPlayer.MakeScope.ScriptValue('kates_prestige_value_3x_target')| +]#!#!)#!"
  POWER_BLOC_EXISTING_PRINCIPLE_LEVELS: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_EXISTING_PRINCIPLE_LEVELS_TT Штраф за полученные мандаты#!#"
  POWER_BLOC_EXISTING_PRINCIPLE_LEVELS_TT: "Стоимость новых [Concept('concept_power_bloc_mandate', 'мандатов')] мультипликативно увеличивается на [GetPlayer.MakeScope.ScriptValue('power_bloc_diminishing_return_exponent_base_tooltip')|%0] за каждый уже принятый [Concept('concept_power_bloc_principle', 'уровень принципа')] или доступный [Concept('concept_power_bloc_mandate', 'мандат')].\n\nТекущее увеличение стоимости: [GetPlayer.MakeScope.ScriptValue('power_bloc_diminishing_modifier_tooltip')|-%0]"
  POWER_BLOC_VALUE_PER_MEMBER: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_VALUE_PER_MEMBER_TT Прогресс мандата от членов#!#"
  POWER_BLOC_VALUE_PER_MEMBER_TT: "[Concept('concept_power_bloc_mandate_progress', 'Прогресс получения мандата')] увеличивается на квадратный корень от суммарного [Concept('concept_rank', 'ранга')] всех [Concept('concept_power_bloc_member', 'членов')] [Concept('concept_power_bloc', 'блока государств')]."
  POWER_BLOC_VALUE_PER_COHESION: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_VALUE_PER_COHESION_TT Прогресс мандата от сплочённости#!#"
  POWER_BLOC_VALUE_PER_COHESION_TT: "[Concept('concept_power_bloc_mandate_progress', 'Прогресс получения мандата')] увеличивается (вплоть до 10) в зависимости от квадрата текущего [Concept('concept_power_bloc_cohesion', 'значения сплочённости')]."
  POWER_BLOC_LOW_MEMBER_PENALTY: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_LOW_MEMBER_PENALTY_TT Штраф за малое число членов#!#"
  POWER_BLOC_LOW_MEMBER_PENALTY_TT: "Штраф для [Concept('concept_power_bloc', 'блоков государств')] с малым числом членов. [Concept('concept_power_bloc_mandate_progress', 'Прогресс получения мандата')] снижается на 10% за каждого недостающего до 8 члена."
  POWER_BLOC_REFORMED_MANDATES: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_REFORMED_MANDATES_TT Реформированный блок государств#!#"
  POWER_BLOC_REFORMED_MANDATES_TT: "Вы недавно реформировали свой [Concept('concept_power_bloc', 'блок государств')], поэтому вправе получить #variable [ROOT.Var('saved_mandates').GetValue]#! бесплатных [Concept('concept_power_bloc_mandate', 'мандатов')]."
  POWER_BLOC_FREE_FOUNDING_MANDATES: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_FREE_FOUNDING_MANDATES_TT Бесплатные учредительные мандаты#!#"
  POWER_BLOC_FREE_FOUNDING_MANDATES_TT: "Поскольку ваш [Concept('concept_power_bloc', 'блок государств')] был сформирован недавно, вы вправе получить [GetPlayer.MakeScope.ScriptValue('power_bloc_free_founding_mandates')] бесплатных [Concept('concept_power_bloc_mandate', 'мандатов')]."
  POWER_BLOC_MAX_MANDATES_RULE: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_MAX_MANDATES_RULE_TT Максимум накопленных мандатов#!#"
  POWER_BLOC_MAX_MANDATES_RULE_TT: "Вы достигли лимита накопленных [Concept('concept_power_bloc_mandate', 'мандатов')]: [GetPlayer.MakeScope.ScriptValue('power_bloc_max_mandates_rule_value')]"
  MANDATE_PROGRESS_AI_FREEZE: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],MANDATE_PROGRESS_AI_FREEZE_TT Заморозка прогресса мандата для ИИ#!#"
  MANDATE_PROGRESS_AI_FREEZE_TT: "[Concept('concept_power_bloc_mandate_progress', 'Прогресс получения мандата')] для ИИ замораживается после того, как он использует все свои потенциальные [Concept('concept_power_bloc_principle', 'уровни принципов')]. Это предотвращает ситуации, когда ИИ мог использовать отключённые ячейки [Concept('concept_power_bloc_principle', 'принципов')]."
  MANDATE_MULTIPLIER_VANILLA: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],MANDATE_MULTIPLIER_VANILLA_TT Множитель прогресса мандата от сплочённости#!#"
  MANDATE_MULTIPLIER_VANILLA_TT: "Текущее значение: [GetPlayer.MakeScope.ScriptValue('power_bloc_vanilla_cohesion_mandate_modifier')| +%0]"
  POWER_BLOC_MANDATE_PROGRESS_MULTIPLIER_RULE: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_MANDATE_PROGRESS_MULTIPLIER_RULE_TT Модификатор прогресса получения мандата#!#"
  POWER_BLOC_MANDATE_PROGRESS_MULTIPLIER_RULE_TT: "Установлено значение: [GetPlayer.MakeScope.ScriptValue('power_bloc_mandate_progress_rule_value')|%0]"
  POWER_BLOC_LATE_FOUNDING_MANDATES: "#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],POWER_BLOC_LATE_FOUNDING_MANDATES_TT Мандаты за позднее основание#!#"
  POWER_BLOC_LATE_FOUNDING_MANDATES_TT: "Недавно сформированные [Concept('concept_power_bloc', 'блоки государств')] получают 1 дополнительный бесплатный [Concept('concept_power_bloc_mandate', 'мандат')] за каждые 5 лет с начала игры."


