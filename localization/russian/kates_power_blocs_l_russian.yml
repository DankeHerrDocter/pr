  holy_war_action: "Объявить священную войну"
  holy_war_action_action_name: "Объявить священную войну"
  holy_war_action_desc: "Это [Concept('concept_diplomatic_action', 'дипломатическое действие')] позволяет инициатору начать [Concept('concept_diplomatic_play', 'дипломатическую игру')] «Священная война». Все страны с той же [Concept('concept_state_religion', 'государственной религией')], что и у цели или инициатора, получат возможность присоединиться."
