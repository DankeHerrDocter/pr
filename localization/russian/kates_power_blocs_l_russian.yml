  power_bloc_confirm_switch_identity_tt: "Вы получите #tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],saved_mandate_tt $saved_mandate$#! [Concept('concept_power_bloc_mandate', 'мандатов')] в начале следующей недели.\n\nВы сохраните всех [Concept('concept_power_bloc_member', 'членов блока')], однако [Concept('concept_power_bloc_leverage', 'влияние')] на страны, не являющиеся членами, будет сброшено, а [Concept('concept_power_bloc_leverage_advantage', 'преимущество во влиянии')] на членов будет снижено на 70%.\n\n[Concept('concept_power_bloc_cohesion', 'Сплочённость')] упадёт до 0, и вы потеряете 30 ед. [Concept('concept_relations', 'отношений')] со всеми членами. Все [Concept('concept_subject', 'субъекты')] получат 30 ед. [Concept('concept_liberty_desire', 'желания свободы')]."
