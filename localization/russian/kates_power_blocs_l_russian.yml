  country_bureaucracy_from_bloc_members_mult_desc: "Изменяет производство @bur![Nbsp][Concept('concept_bureaucracy', 'бюрократии')] в зависимости от числа [Concept('concept_power_bloc_member', 'членов блока')], не являющихся [Concept('concept_subject', 'субъектами')]."
  kates_bureaucracy_per_member_modifier: "Совет участников"
  country_mapi_per_leader_subject_mult: "$state_market_access_price_impact$ за [Concept('concept_subject', 'субъекта')] [Concept('concept_power_bloc_leader', 'лидера блока')]"
  country_mapi_per_leader_subject_mult_desc: "Изменяет $state_market_access_price_impact$ в зависимости от числа [Concept('concept_subject', 'субъектов')] у [Concept('concept_power_bloc_leader', 'лидера блока')]."
  country_mapi_per_leader_subject_mult_max: "Макс. $state_market_access_price_impact$ от [Concept('concept_subject', 'субъектов')] [Concept('concept_power_bloc_leader', 'лидера блока')]"
