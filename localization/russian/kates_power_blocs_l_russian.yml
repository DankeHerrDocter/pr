  principle_group_member_council: "Совет участников"
  principle_group_member_council_desc: "Совет, состоящий из [Concept('concept_power_bloc_member', 'государств-членов')], собирается для решения общих вопросов. Его цель — расширить влияние [Concept('concept_power_bloc', 'блока государств')] и повысить эффективность центральной [Concept('concept_bureaucracy', 'бюрократии')]."

  principle_group_deregulation: "Дерегулирование"
  principle_group_deregulation_desc: "[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] координируют свои усилия для обеспечения [Concept('concept_privatize', 'приватизации')] и [Concept('concept_foreign_investment_rights', 'прав на зарубежные инвестиции')]."

  principle_group_unified_bond_market: "Единый рынок облигаций"
  principle_group_unified_bond_market_desc: "Широкая координация казначейств позволяет снизить [Concept('concept_budget_interest', 'процентные ставки')] и способствует гибкости рынка."

  principle_group_collective_bargaining_power: "Коллективная переговорная сила"
  principle_group_collective_bargaining_power_desc: "Объединённая экономическая мощь [Concept('concept_power_bloc', 'блока государств')] позволяет вести переговоры о выгодных [Concept('concept_trade', 'торговых соглашениях')] как единому целому."

  principle_group_development_fund: "Фонд развития"
  principle_group_development_fund_desc: "[Concept('concept_power_bloc_leader', 'Лидер блока')] спонсирует [Concept('concept_construction', 'строительные проекты')] среди [Concept('concept_power_bloc_member', 'членов блока')]."

  principle_group_antitrust_commission: "Антимонопольная комиссия"
  principle_group_antitrust_commission_desc: "Законодательство, направленное на разрушение монополий, ограничивает власть #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetCustom('RU_IG_RP')]#!#! и поощряет более конкурентоспособные [Concept('concept_company', 'компании')]."

  principle_group_currency_union: "Валютный союз"
  principle_group_currency_union_desc: "Принятие валюты [Concept('concept_power_bloc_leader', 'лидера блока')] расширяет возможности его [Concept('concept_budget_minting', 'Центрального банка')], но уменьшает экономические рычаги [Concept('concept_power_bloc_member', 'членов блока')]."

  principle_group_economic_imperialism: "Экономический империализм"
  principle_group_economic_imperialism_desc: "Эксплуатационная экономическая политика обеспечивает контроль [Concept('concept_power_bloc_leader', 'лидера блока')] над экономикой его [Concept('concept_subject', 'субъектов')]."

  principle_group_leviathan: "Левиафан"
  principle_group_leviathan_desc: "Влияние [Concept('concept_power_bloc_leader', 'лидера блока')] на его [Concept('concept_power_bloc_member', 'членов')] настолько велико, что со временем подрывает их суверенитет."

  principle_group_imperial_prerogative: "Имперская прерогатива"
  principle_group_imperial_prerogative_desc: "Право сильного править слабым закреплено в законе."

  principle_group_colonial_manpower: "Колониальные кадры"
  principle_group_colonial_manpower_desc: "[Concept('concept_power_bloc_leader', 'Лидер блока')] получает возможность развёртывать солдат из своей огромной империи."

  principle_group_settlement_drive: "Поощрение заселения"
  principle_group_settlement_drive_desc: "Усилия по [Concept('concept_colonial_growth', 'колонизации')] поощряются и расширяются в рамках международной структуры."

  principle_group_pax_imperia: "Pax Imperia"
  principle_group_pax_imperia_desc: "Сила империи, направленная на поддержание мира и сотрудничества, служит стабилизирующим фактором на мировой арене."

  principle_group_entrenched_elite: "Укоренившаяся элита"
  principle_group_entrenched_elite_desc: "Власть #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! укрепляется и расширяется в интересах стабильности."

  principle_group_status_quo: "Статус-кво"
  principle_group_status_quo_desc: "[Concept('concept_power_bloc_member', 'Члены блока')] договариваются координировать усилия для противостояния опасному радикализму [Concept('concept_revolution', 'революций')]."

  principle_group_economic_consensus: "Экономический консенсус"
  principle_group_economic_consensus_desc: "Сотрудничество государств зависит не только от идеологических принципов, но и от скоординированной системы экономических взаимозависимостей."

  principle_group_direct_oversight: "Прямой надзор"
  principle_group_direct_oversight_desc: "Власть [Concept('concept_power_bloc_leader', 'лидера блока')] в вопросах закона является абсолютной."

  principle_group_international_criminal_court: "Международный уголовный суд"
  principle_group_international_criminal_court_desc: "Центральный международный суд осуществляет надзор за соблюдением прав, свобод и законности, придавая институту большую легитимность."

  principle_group_righteous_cause: "Правое дело"
  principle_group_righteous_cause_desc: "[Concept('concept_power_bloc', 'Блок государств')] отстаивает дело стабильности и идеологической чистоты — правое дело, за которое стоит вести справедливые войны."

  principle_group_conventions_of_war: "Военные конвенции"
  principle_group_conventions_of_war_desc: "Международные конвенции по гуманитарным вопросам ограничивают потери среди гражданского населения во время войны."

  principle_group_logistics_network: "Сеть снабжения"
  principle_group_logistics_network_desc: "Обширная [Concept('concept_supply', 'сеть снабжения')], координируемая [Concept('concept_power_bloc_member', 'членами блока')], обеспечивает удовлетворение логистических потребностей."

  principle_group_your_country_needs_you: "Ты нужен своей стране!"
  principle_group_your_country_needs_you_desc: "Яркие образы убеждают [Concept('concept_pop', 'население')] [Concept('concept_power_bloc_member', 'членов блока')] в необходимости [Concept('concept_training_rate', 'поступать на военную службу')] и служить своим странам."

  principle_group_chivalrous_pursuit: "Рыцарское дело"
  principle_group_chivalrous_pursuit_desc: "Война по своей сути — дело джентльменов, а [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] — величайшие из них."

  principle_group_wonder_weapons: "Чудо-оружие"
  principle_group_wonder_weapons_desc: "Войны выигрываются в лабораториях, и следующее поколение оружия должно быть создано благодаря скоординированным исследовательским усилиям."

  principle_group_joint_training_exercises: "Совместные учения"
  principle_group_joint_training_exercises_desc: "Международные учения обеспечивают готовность армий [Concept('concept_power_bloc_member', 'членов блока')] во время войны."

  principle_group_holy_wars: "Священные войны"
  principle_group_holy_wars_desc: "[Concept('concept_power_bloc_leader', 'Лидер блока')] как религиозный авторитет объявляет войну ради обращения язычников и неверных."

  principle_group_propaganda: "Пропаганда"
  principle_group_propaganda_desc: "[Concept('concept_power_bloc_cohesion', 'Сплочённость блока')] укрепляется благодаря скоординированному представлению наднациональной структуры как изначально оправданной."

  principle_group_unity: "Единство"
  principle_group_unity_desc: "[Concept('concept_power_bloc_cohesion', 'Сплочённость блока')] укрепляется благодаря усилиям по координации и компромиссу между конкурирующими потребностями его [Concept('concept_power_bloc_member', 'членов')]."

  principle_group_champion_the_true_faith: "Поборник Истинной веры"
  principle_group_champion_the_true_faith_desc: "Весь мир должен принять [GetPlayer.GetStateReligion.GetName|l], и голос #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! должен быть услышан."

  principle_group_henotheism: "Генотеизм"
  principle_group_henotheism_desc: "Практикующим другие верования предоставляется определённая степень свободы вероисповедания."

  principle_group_organised_religion: "Организованная религия"
  principle_group_organised_religion_desc: "[Concept('concept_bureaucracy', 'Бюрократическая система')] #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! не имеет себе равных."

  principle_group_alms_for_the_poor: "Милостыня для бедных"
  principle_group_alms_for_the_poor_desc: "Благотворительные пожертвования облегчают страдания нуждающихся и являются долгом каждого верующего гражданина."

  principle_group_people_of_faith: "Люди Веры"
  principle_group_people_of_faith_desc: "Благодаря союзу с мировым религиозным сообществом все [Concept('concept_country', 'страны')], исповедующие [GetPlayer.GetStateReligion.GetName|l], будут процветать."

  principle_group_sovereign_wealth_fund: "Суверенный фонд благосостояния"
  principle_group_sovereign_wealth_fund_desc: "Государственные инвестиции в финансовые активы могут приносить стабильный доход и помогать компенсировать государственные расходы."

  principle_group_preferential_colonial_trade: "Преференциальная колониальная торговля"
  principle_group_preferential_colonial_trade_desc: "Система тарифов, предназначенная для облегчения торговли между колониальными субъектами в ущерб государствам за пределами империи."

  principle_group_private_tax_collectors: "Частные сборщики налогов"
  principle_group_private_tax_collectors_desc: "Государство передаёт часть [Concept('concept_bureaucracy', 'бюрократических издержек')] по сбору налогов частным предприятиям в обмен на скромную комиссию."

