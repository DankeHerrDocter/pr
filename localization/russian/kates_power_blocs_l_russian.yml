  dp_holy_war: "Священная война"
  holy_wars.1.t: "[SCOPE.sC('initiator_country').GetName] объявляет священную войну"
  holy_wars.1.d: "Религиозные лидеры [SCOPE.sC('initiator_country').GetAltNameNoFlag('RU_CL_RP')] объявили нам священную войну и готовят вторжение. Мы обратились за помощью ко всем странам, исповедующим [GetPlayer.GetStateReligion.GetName|l]. В свою очередь, [SCOPE.sC('initiator_country').GetName] пытается сплотить вокруг себя государства, чьей [Concept('concept_state_religion', 'государственной религией')] является [SCOPE.sC('initiator_country').GetStateReligion.GetName|l]."
  holy_wars.1.f: ""
  holy_wars.2.t: "[SCOPE.sC('initiator_country').GetName] объявляет священную войну [SCOPE.sC('target_country').GetAltNameNoFlag('RU_CL_DP')]"
  holy_wars.2.d: "Религиозные лидеры [SCOPE.sC('initiator_country').GetAltNameNoFlag('RU_CL_RP')] объявили священную войну [SCOPE.sC('target_country').GetAltNameNoFlag('RU_CL_DP')] и готовят вторжение. [SCOPE.sC('target_country').GetName] призвал[SCOPE.sC('target_country').GetAltNameNoFormatting('RU_CL_END_FEM')] на помощь все страны, исповедующие [SCOPE.sC('target_country').GetStateReligion.GetName|l]. В свою очередь, [SCOPE.sC('initiator_country').GetName] пытается сплотить вокруг себя государства, чьей [Concept('concept_state_religion', 'государственной религией')] является [SCOPE.sC('initiator_country').GetStateReligion.GetName|l]."
  holy_wars.1a: "Мы победим."
  holy_wars.2a: "Мы будем защищать тех, кто исповедует [SCOPE.sC('target_country').GetStateReligion.GetName|l]."
  holy_wars.3a: "Мы будем сражаться за тех, кто исповедует [SCOPE.sC('initiator_country').GetStateReligion.GetName|l]."
  holy_wars.2b: "Они сами за себя."

