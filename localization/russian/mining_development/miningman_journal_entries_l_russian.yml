  #
 alsace_lorraine_mining_development: "Разработка месторождений Эльзаса-Лотарингии"
 alsace_lorraine_mining_development_reason: "С середины XVIII века #O #B Эльзас-Лотарингия#!#! славится своими #B богатыми запасами #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#!, особенно на Лотарингском плато, которое считается #B одним из самых перспективных горнодобывающих регионов Европы#!.\n\nС приходом #V промышленной революции#! в Европу, а также с развитием механизированной добычи и сталелитейных технологий, потенциал местных запасов #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#! стал критически важным. Некоторые дальновидные [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] убеждают [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и #v $bureaucrats_only_icon$ чиновников#! использовать государственные инвестиции для помощи инвесторам [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в создании надёжной железнодорожной сети и принятии новых законов для стимулирования процветания горнодобывающей промышленности в #O #B Эльзас-Лотарингии#!#, #B чтобы она стала главным поставщиком угля и железной руды в Европе.#!"
 alsace_lorraine_mining_development_status: "Превратить Эльзас-Лотарингию в важнейший горнодобывающий регион Европы"
  #
 ural_mining_development: "Разработка месторождений Уральских гор"
 ural_mining_development_reason: "#O #B Уральские горы#!#! — это естественный барьер, разделяющий Евразию. Хотя многие понимали, что здесь скрыты богатые запасы #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#!, в доиндустриальную эпоху #B высокие затраты на транспортировку и добычу#! отпугивали от #V Уральских гор#!, из-за чего огромный потенциал этих земель оставался нераскрытым.\n\nОднако с распространением #V железнодорожных технологий#! и #V механизированных инструментов#! холодные Уральские горы перестали быть для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] недоступной глушью. #B Некоторые дальновидные и предприимчивые [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] уже обратили свой взор на эти богатые земли#!. Они обратились к правительству с просьбой помочь им в строительстве #B трансъевразийской железнодорожной сети#! и выделить #B значительные целевые средства#!, чтобы эти #v $capitalists$#! смогли #B начать полномасштабную разработку Урала и превратить спящие горы в прочный фундамент промышленной империи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].#!"
 ural_mining_development_status: "Полностью раскрыть горнодобывающий потенциал Уральских гор"
  #
 ruhr_mining_development: "Разработка Рурского бассейна"
 ruhr_mining_development_reason: "#O #B Рурский бассейн#!#!, расположенный #B вдоль Рейна на севере Рейнской области#!, с XVIII века известен #B чрезвычайно богатыми запасами #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#!. Особенно в районах #V Эссена#! и #V Дуйсбурга#! угольные пласты залегают глубоко, а железная руда отличается высоким качеством. Геологическое общество даже назвало этот регион «#B стратегически важнейшим ресурсным поясом Европы#!».\n\nОднако #B высокие первоначальные инвестиции#! и #B неразвитая транспортная сеть#! долгое время сдерживали настоящий взлёт Рурского бассейна. Хотя здесь уже были построены некоторые шахты и чугунолитейные заводы, истинный потенциал Рура ещё не раскрыт. Распространение #V железных дорог и паровых машин#! открыло для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] дверь в промышленное будущее. Продолжая инвестировать, мы непременно сможем превратить #O #B Рурский бассейн#!#! в #B становой хребет нашей горнодобывающей промышленности.#!"
 ruhr_mining_development_status: "Расширить добычу богатых полезных ископаемых Рурского бассейна"
  #
 english_mining_development: "Разработка месторождений Англии"
 english_mining_development_reason: "С самого начала #V промышленной революции#! холмы #O #B английских графств#!#! начали демонстрировать #B несравненный ресурсный потенциал#!. В этом регионе скрыты не только богатые запасы #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#!, но и значительные залежи #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#!.\n\n[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] уже оценили богатые недра этих регионов и удобство расположения рядом с портами. Они убеждают [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] ослабить ограничения на инвестиции в железные дороги и выдачу лицензий на добычу, чтобы они могли и дальше вкладывать средства в развитие горнодобывающей промышленности #O #B английских графств#!#!."
 english_mining_development_status: "Продолжить развитие горнодобывающей промышленности в Англии"
  #
 biscay_mining_development: "Разработка месторождений Страны Басков"
 biscay_mining_development_reason: "#B Расположенные между Кантабрийскими горами и Бискайским заливом#! #O #B Страна Басков и Астурийское нагорье#!#! с древних времён хранят в себе #B чрезвычайно богатые запасы #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#!. Особенно ценятся высококачественные гематитовые руды вблизи #V Бильбао#!, которые почти не содержат фосфора и могут напрямую использоваться для выплавки стали, что высоко ценится по всей Европе.\n\nОднако до строительства #V железных дорог#! #B добыча в этом труднодоступном регионе долгое время была ограничена транспортными проблемами и нехваткой капитала#!, из-за чего его ресурсный потенциал оставался невостребованным. С развитием новых технологий в нашей стране #B дальновидные [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] и иностранные #v $capitalists$#! увидели здесь новые возможности. Было направлено прошение, чтобы наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] напрямую выделил средства для разработки этих обширных месторождений.#!"
 biscay_mining_development_status: "Расширить горнодобывающую промышленность в Стране Басков и других северных провинциях"
  #
 kiruna_mining_development: "Железный рудник в Кируне"
 kiruna_mining_development_reason: "Давно предполагалось, что на #O #B Скандинавском полуострове#!#!, вблизи #V Полярного круга#!, скрыты богатые залежи #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#!, и теперь эти догадки подтвердились. Наши геологи обнаружили в заснеженных пустошах #O #B Лапландии#!#! гору, содержащую #B высокочистый магнетит#!. Однако #B суровый климат, трудности с транспортировкой и малочисленность населения#! по-прежнему являются огромными препятствиями на пути к полномасштабной разработке.\n\nС развитием технологий появились новые способы транспортировки, достаточные для начала здесь масштабных работ. Мы должны #B сотрудничать с местными надёжными #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetCustom('RU_IG_TP')]#!#! для планирования новых рудных железных дорог и шахт#!, а также принять меры для привлечения сюда шахтёров, чтобы это место стало #B новым источником богатства для горнодобывающей промышленности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].#!"
 kiruna_mining_development_status: "Инвестировать в недавно открытые железные рудники в Лапландии"
  #
 sicily_mining_development: "Разработка серных рудников Сицилии"
 sicily_mining_development_reason: "Ещё со времён Римской империи известно, что на #O #B Сицилии#!#! находятся #B богатейшие в Европе месторождения #tooltippable_name #tooltip:[SCOPE.sGoods('sulfur_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('sulfur_scope').GetTextIcon][SCOPE.sGoods('sulfur_scope').GetCustom('RU_GL_RP')]#!#!, однако из-за низкого спроса [ROOT.GetCountry.GetNameNoFlag] долгое время не проявляла интереса к разработке этого острова.\n\nС изобретением новых взрывчатых веществ [SCOPE.sGoods('sulfur_scope').GetName] перестала быть лишь компонентом пороха для фитильных мушкетов и превратилась в #B топливо для современной войны и эффективной промышленности#!. Резкий рост спроса вызвал интерес к #O #B Сицилии#!#! у нарождающихся #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetCustom('RU_IG_RP')]#!#!. Они призывают #B правительство предоставить им эксклюзивные права на добычу, чтобы обеспечить нашей стране контроль над этим стратегическим ресурсом.#!"
 sicily_mining_development_status: "Серные рудники Сицилии могут стать опорой нашей взрывчатой промышленности"
  #
 donbas_mining_development: "Разработка Донецкого бассейна"
 donbas_mining_development_reason: "До появления железнодорожных технологий в южнорусских степях о ресурсном потенциале #V обширных равнин к востоку от Днепра#! было ничего не известно. Однако с #B прокладкой новых железнодорожных путей и развитием технологий добычи#! залежи #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#! и #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#! в #O #B Донецком бассейне#!#! быстро привлекли внимание [Concept('concept_government', 'правительства')].\n\nНаши полные энтузиазма [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] убеждают правительство срочно одобрить выдачу банками низкопроцентных кредитов на их инвестиции, а также #B проложить магистральную железную дорогу от берегов Днепра до Азовского моря#!, чтобы превратить #O #B Донецкий бассейн#!#! в #B пробудившуюся в паре и стали шахтёрскую крепость#!."
 donbas_mining_development_status: "Превратить Донбасс и Курск в опору горнодобывающей промышленности Восточной Европы"
  #
 wyoming_mining_development: "Новая угольная промышленность Вайоминга"
 wyoming_mining_development_reason: "#O #B Вайоминг#!#!, расположенный между Скалистыми горами и Великими равнинами, который индейцы называли «страной ветров», когда-то был землёй бизонов на Диком Западе. #B Но только после того, как [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] успешно проложил трансконтинентальную железную дорогу#!, здесь были обнаружены спящие пласты #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#!. По словам самых авторитетных геологов, запасов угля здесь #B достаточно, чтобы помочь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] доминировать в мировой добыче #tooltippable_name #tooltip:[SCOPE.sGoods('coal_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('coal_scope').GetTextIcon][SCOPE.sGoods('coal_scope').GetCustom('RU_GL_RP')]#!#!.\n\nМы должны вложить ресурсы в единую координацию сети разработок в #O #B Вайоминге#!#! и соседних штатах, а также выделить средства на строительство #B новых железных дорог, соединяющих шахты с портами на западе#!, чтобы #O #B Вайоминг#!#! стал #V промышленным Новым Западом#! для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], #B а его горящий @coal! [SCOPE.sGoods('coal_scope').GetName] осветил весь американский континент.#!"
 wyoming_mining_development_status: "Вайоминг может стать крупнейшим в мире производителем угля"
 finish_je_establish_national_academy_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Создание Национальной академии наук#!"
  #
 pilbara_mining_development: "Разработка Пилбары"
 pilbara_mining_development_reason: "В #O #B Западной Австралии#!#!, в её пустынных и раскалённых красных пустошах, песок и ржавчина одинаково слепят глаза. В течение десятилетий даже самые образованные геологи не догадывались о #B скрытом здесь огромном горнодобывающем потенциале#!, из-за чего эта обширная, малонаселённая и неразвитая земля долгое время оставалась без внимания.\n\nОднако после того, как #B ошеломляющие результаты разведки#!, проведённой экспедицией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в #V горах Хамерсли#!, стали достоянием общественности, местные залежи #tooltippable_name #tooltip:[SCOPE.sGoods('iron_scope').GetTooltipTag],DATA_GOODS_NAME_TOOLTIP,GoodsTooltip [SCOPE.sGoods('iron_scope').GetTextIcon][SCOPE.sGoods('iron_scope').GetCustom('RU_GL_RP')]#!#! #B высочайшего качества и с низкой стоимостью добычи#! привлекли внимание #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetCustom('RU_IG_RP')]#!#! со всего мира. Они требуют, чтобы [Concept('concept_government', 'правительство')] немедленно отменило запрет на добычу железной руды в #O #B Западной Австралии#!#!, построило железную дорогу, соединяющую рудники Пилбары с портами на северо-западном побережье, и #B превратило эту красную пустошь в самый впечатляющий железорудный регион в мире.#!"
 pilbara_mining_development_status: "Западная Австралия может стать крупнейшим в мире производителем железной руды"
  #
 ironquadrangle_mining_development: "Новый Железный четырёхугольник"
