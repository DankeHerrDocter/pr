l_russian:
  #
 joi_flavor_pru.1.t: "План объединения Германии"
 joi_flavor_pru.1.d: "С победой в войне над [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_TP')] горячее стремление к #V объединению Германии#! охватило [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], и в правительстве начались дебаты о дальнейшей политике в этом вопросе."
 joi_flavor_pru.1.f: "«Если мы включим Австрию и Богемию в состав Германской империи, это, без сомнения, поставит нас в невыгодное, изолированное положение в Европе... От [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] до [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] — все будут с опаской смотреть на наше превосходство, а новорождённая Германская империя этого не выдержит...»\n\n«Предатель! Что за вздор вы несёте! Как может Пруссия из-за призрачного страха упустить такую возможность полностью объединить немецкий народ, оставив за бортом одну лишь Австрию?! Если мы так поступим, то покроем себя вечным позором и вызовем презрение всех немцев, что ждут от нас единства!»\n\n«[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], если вы не примете мой план, мне останется лишь подать в отставку»."
 joi_flavor_pru.1.a: "Принять Великогерманский путь!"
 joi_flavor_pru.1.b: "Малогерманский путь более реалистичен."
  #
 joi_flavor_pru.2.t: "Промышленные гиганты Рейнской области"
 joi_flavor_pru.2.d: "С развитием Рейнской области план создания великого промышленного региона стал реальностью. Рокочущие станки наполняют энергией кровеносную систему [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_pru.2.f: "«Рейнская область — наш важнейший промышленный регион... Правительство всегда поощряло предприятия строить здесь новые заводы и внедрять новые технологии в производство».\n\n«Да, господин! У меня есть отличная идея... Послушайте! У нас есть новый метод производства боеприпасов, и мы верим, что с его помощью сможем построить в Рейнской области новый оружейный завод, который в будущем превзойдёт наших коллег из [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('USA_scope').GetAltNameNoFlag('RU_CL_RP')]! Я уже выбрал место в Дюссельдорфе, в Рурской области. Там прекрасные условия, и я уже приобрёл землю!»\n\n«Звучит многообещающе, сударь. Но почему вы рассказываете это мне?»\n«Дело в том, что моему заводу... не хватает средств. Я надеюсь на правительственную субсидию, которая поможет мне его построить. Взамен я готов предложить часть акций вам, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]... Поверьте! Это будет чрезвычайно выгодное дело!»"
 joi_flavor_pru.2.a: "Оружие? В Рейнской области и так достаточно оружейных заводов! Лучше направить ценные средства другим предприятиям."
 joi_flavor_pru.2.b: "Завод, способный превзойти всех конкурентов? Нашей армии это понравится, нужно инвестировать!"
  #
 joi_flavor_pru.3.t: "Закон об обязательном образовании"
 joi_flavor_pru.3.d: "Строятся новые школы, а наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уже утвердил новый закон об обязательном образовании для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_pru.3.f: "«Во-первых, мы #bold желаем, чтобы все подданные, ответственные за воспитание молодёжи#! — будь то родители, опекуны или иные лица — #bold отдавали своих или вверенных им детей#!, как мальчиков, так и девочек...»\n\n«...отправляли их в школу #bold с пятилетнего возраста#!, если не ранее, и #bold не забирали их из школы до достижения четырнадцати лет#!, пока они не только не усвоят основы физики, химии и политэкономии, но и не научатся грамотно читать, писать и считать. Всё, чему их следует обучать, должно #bold соответствовать учебникам, предписанным и утверждённым правительством#!. В рамках этой программы ученики должны полностью освоить материал и сдать экзамены, подтверждающие их готовность к выпуску».\n\n«Ученикам, показавшим на экзаменах блестящие результаты, местные власти должны #bold ежегодно выделять средства#! для поступления в #bold высшие учебные заведения#! нашей страны, дабы они могли завершить своё образование... и в конечном итоге применить свой интеллект на благо нашего государства»."
 joi_flavor_pru.3.a: "Образование для всех!"
  #
 joi_flavor_pru.4.t: "Великая военная реформа"
 joi_flavor_pru.4.d: "Программа военных реформ успешно завершена. Гельмут фон Мольтке уверенно заявил, что армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] теперь — лучшая во всей Европе."
 joi_flavor_pru.4.f: "«Генеральный штаб — душа армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], поэтому я расширил его и создал новые отделы... Но самый большой предмет моей гордости — вот это: #bold Железнодорожный отдел!#! В военное время он может, минуя правительство, напрямую контролировать все железные дороги страны, что позволяет нашим войскам мобилизоваться с невероятной скоростью».\n\n«И ещё вот... С незапамятных времён монарх всегда командовал армией, но в наше время это уже неуместно. Отныне #bold начальник Генерального штаба#! будет исполнять обязанности монарха и осуществлять верховное командование всеми сухопутными силами страны».\n\n«Мы вооружили нашу армию новым оружием — достижение, которым не может похвастаться ни одна другая европейская страна! Многие утверждают, что новое оружие ненадёжно, неудобно и дорого, но нам всё равно. Напротив, [ROOT.GetCountry.GetNameNoFlag] должен усвоить, что при составлении любого бюджета #bold приоритетом должно быть развитие вооружённых сил#!, а в военном бюджете — #bold обновление вооружения#!»."
 joi_flavor_pru.4.a: "Отныне приказы о военных действиях для армий и их отдельных соединений должны передаваться начальнику Генерального штаба."
  #
 joi_flavor_pru.5.t: "Стража на Рейне"
 joi_flavor_pru.5.d: "Призывы [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] к установлению «естественной границы» по Рейну вызвали широкое возмущение среди немецкого народа. Поэт по имени Макс Шнеккенбургер написал стихотворение «Стража на Рейне», которое спровоцировало мощную волну антифранцузских настроений по всей Германии."
 joi_flavor_pru.5.f: "Как грозный рокот, клич звучит,\nКак блеск мечей, как рёв волны!\nНа Рейн! На Рейн! Кто защитит\nПредел германской стороны?\n#bold Отечество! Народ спокоен твой: тверда на Рейне стража, край родной!#!\n\nИ клятва миллионами сердец\nЛетит стрелой из края в край!\nБоец, ты примешь свой венец,\nКогда за край наш примет рай!\n#bold Отечество! Народ спокоен твой: тверда на Рейне стража, край родной!#!\n\nПусть взор наш в небо устремлён,\nГде тени предков смотрят вдаль!\nМы поклялись — и Рейн спасён,\nСвободный Рейн — немецкий край!\n#bold Отечество! Народ спокоен твой: тверда на Рейне стража, край родной!#!"
 joi_flavor_pru.5.a: "И Рейн спасён, свободный Рейн — немецкий край!"
 joi_flavor_pru.5.b: "Отечество! Народ спокоен твой: тверда на Рейне стража, край родной!"
 #Первый сброс группы событий
 joi_flavor_pru.6.t: "Верховный епископ"
 joi_flavor_pru.6.d: "#tooltippable_name [ROOT.GetCountry.GetAdjective]ий#! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] эффективно усилил контроль над различными конфессиями [GetReligion('protestant').GetCustom('RU_RL_RP')] — в особенности над кальвинистами и лютеранами. Им предписано проводить новые таинства и подчиняться правительственным указам. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] желает пойти еще дальше: по примеру англиканской церкви объявить себя верховным епископом Прусской церкви."
 joi_flavor_pru.6.f: "«Вся церковная система [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] зиждется на неопределенном, туманном и шатком фундаменте... Остались лишь гонения на братьев и сестер лютеранского исповедания. Поэтому я сомневаюсь, является ли наша местная церковь истинно христианской, и действительно ли наше служение исполняет волю Божью».\n\n«Брат мой, Господь скажет тебе, что, несмотря на некоторые заблуждения стефанистов, слово Божье живо. Среди нас все еще есть христиане, а значит, и Церковь все еще с нами. Боже, благослови короля»."
 joi_flavor_pru.6.a: "Настало время для примирения. Даровать старолютеранам больше свободы."
 joi_flavor_pru.6.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен стать верховным епископом евангелической государственной церкви!"
# Муниципальный кодекс
 joi_flavor_pru.7.t: "Рейнский муниципальный кодекс"
 joi_flavor_pru.7.d: "После нескольких лет работы и под влиянием #V Весны народов#! новый кодекс, предназначенный для муниципалитетов #yellow Рейнской области#!, наконец-то завершен. Инициатором этого труда выступил [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName] и его сторонники. Однако [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], похоже, не желает предоставлять муниципалитетам больше законной автономии и планирует включить в кодекс особые королевские указы."
 joi_flavor_pru.7.f: "«Муниципальный округ включает в себя всю недвижимость, расположенную в его границах. Свое утверждение на изменение границ округа должен дать [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], также необходимо учесть мнение муниципального представительного органа. Если речь идет об урегулировании отношений между несколькими муниципальными округами, решение принимается государственным органом в административном порядке после заслушивания всех заинтересованных сторон; частноправовые отношения не должны пострадать от таких изменений».\n\n«Все жители муниципального округа имеют право пользоваться общественными учреждениями города и обязаны нести бремя общественных расходов города в соответствии с настоящим законом. Что касается специальных фондов, связанных с муниципальными учреждениями, их существующие правовые положения остаются в силе и не затрагиваются настоящим законом; лица, не проживающие в муниципальном округе, но владеющие в нем недвижимостью или предприятием, обязаны нести соответствующие налоги и сборы пропорционально доходу, получаемому от этой недвижимости или предприятия. Кроме того, королевским указом этот "Муниципальный закон" может быть применен по запросу к другим муниципалитетам Рейнской провинции, представленным городским сословием»."
 joi_flavor_pru.7.a: "Применить кодекс ко всем муниципалитетам, представленным в Рейнском провинциальном ландтаге."
 joi_flavor_pru.7.b: "Приказать министру внутренних дел принять все необходимые меры для исполнения королевского указа."
 joi_flavor_pru.8.t: "Имперская муниципальная конституция"
 joi_flavor_pru.8.d: "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetLeader.GetFullName] и [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetLeader.GetFullName] приложили немало усилий, благодаря чему наше правительство успешно объединило огромное количество разрозненных муниципальных кодексов, действовавших в разных частях [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Кодексы вступят в силу, как только их одобрит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_pru.8.f: "«В порядке, пронизанном национальной волей, муниципалитеты должны не только служить государству в целом, но и существовать самостоятельно. Под руководством лучших сил народа они призваны внести вклад в создание подлинной национальной общности, чтобы народ обрел чувство принадлежности к этой общности в конечном осознании; в них муниципалитеты аккумулируют жизненные силы народа в местных общностях для выполнения общественных задач в более тесном кругу родины. Они управляют своими делами под свою ответственность. Их действия должны соответствовать положениям закона и целям государственного руководства».\n\n«Муниципалитеты выполняют все общественные дела в своей юрисдикции под свою ответственность, если это прямо не запрещено законом или не возложено на другие органы в силу закона; они могут управлять своими делами посредством уставов, если законом не предусмотрено иное или если это прямо разрешено настоящим законом. Государство может посредством закона делегировать муниципалитетам выполнение государственных задач; новые обязанности могут быть возложены на муниципалитеты только законом; вмешательство в их права также должно осуществляться на основании закона. Постановления, издаваемые во исполнение таких законов, подлежат утверждению министром внутренних дел империи»."
 joi_flavor_pru.8.a: "Принцип фюрерства должен неукоснительно соблюдаться."
 joi_flavor_pru.8.b: "Традиции муниципального самоуправления — самое ценное достояние нашего государства."
#Консервативный порядок в Пруссии
 joi_flavor_pru.9.t: "Романтик на троне"
 joi_flavor_pru.9.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] приложил немало усилий для укрепления консерватизма, и это принесло плоды. Будучи традиционным монархом, твердо верящим в божественное право королей, и набожным христианином, он проводил умеренную политику, которая, тем не менее, успешно предотвратила угрозу революции и радикализма. Его идеалы сформировали облик #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ого#! государства в эту эпоху."
 joi_flavor_pru.9.f: "«Я глубоко чувствую, что стал королем исключительно по милости Божьей, и буду считать так до конца своих дней. Во мне нет ни капли зависти, и я оставляю славу и лицемерие так называемым конституционным монархам, которые суть лишь слова на бумаге, абстрактная концепция в глазах народа».\n\n«Я обладаю божественным пониманием нужд моих подданных, и любое ограничение моей фактической абсолютной власти — это безответственная помеха моей священной миссии. Ваша обязанность — не представлять чьи-то мнения и не выносить на обсуждение настроения эпохи: это совершенно не соответствует духу немецкой нации и абсолютно непрактично»."
 joi_flavor_pru.9.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] правит согласно воле Божьей."
 joi_flavor_pru.9.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — олицетворение прогресса и справедливости."
 joi_flavor_pru.10.t: "Отречение"
 joi_flavor_pru.10.d: "Консервативные силы понесли тяжелый урон в результате революций и беспорядков, организованных радикалами в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Реакционный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] был вынужден отречься от престола, а новый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] поспешно взошел на трон под дулами ружей революционеров."
 joi_flavor_pru.10.f: "«В два часа пополудни по всему городу вспыхнули беспорядки. Мы обратили на них внимание, потому что кто-то обстрелял часовых перед казармами полка Франца, примыкающими к казармам кадетского корпуса. Пришло известие, что кадетский корпус — этот оплот реакции — будет полностью уничтожен! Это поставило наших старших офицеров в весьма затруднительное положение: вся связь с внешним миром была отрезана, а полк Франца, ранее квартировавший по соседству, был переброшен, так что нам пришлось самим решать, что делать дальше».\n\n«Мы получили приказ надеть шинели, взять оружие и по приказу генерала Притвица выступить к королевскому дворцу в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]. Мы вышли на рассвете. Улица, встретила нас тремя или четырьмя брошенными баррикадами; большинство окон на улице были выбиты, а на всех домах виднелись следы от пуль»."
 joi_flavor_pru.10.a: "Да здравствует [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetHeir.GetFirstName]!"
 joi_flavor_pru.11.t: "Христианское государство"
 joi_flavor_pru.11.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] приложил немало усилий по утверждению христианских ценностей, и они нашли широкую поддержку. Благодаря возрождению искусств и священных ценностей церковь #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! стала надежной опорой для [Concept('concept_law', 'закона')] [GetLawType('law_monarchy').GetName|l] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_pru.11.f: "«Государство несет ответственность за ту великую моральную цель, которую мы ставим перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] — возвышение человеческого духа, — и само имеет двоякую обязанность: содействовать этой религиозной вере, тем самым ведя своих подданных к большему благу. Делая это, оно окажет мощное влияние на это движение, способствуя его широкому распространению и доминированию».\n\n«Борьба, направленная на торжество справедливости над злом, подлинно благородной свободы и религиозной веры над порабощением, лицемерным моральным упадком и алчной тиранией — такая борьба будет самой воодушевляющей и непременно увенчается блестящей победой. Монарх, возглавляющий эту борьбу, как благодетель человечества, должен стать истинным духовным лидером»."
 joi_flavor_pru.11.a: "Церковь #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! открывает нам божественный порядок."
 joi_flavor_pru.11.b: "Лишь христианство убережет от революции народ, которым правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 joi_flavor_pru.12.t: "Королевский указ [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_pru.12.d: "Благодаря решительным политическим мерам и своевременным компромиссам, несмотря на непрерывные удары революций и колоссальную угрозу радикализма, священный [concept_law] [GetLawType('law_monarchy').GetName|l] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] устоял по воле Божьей."
 joi_flavor_pru.12.f: "«Все плотины, воздвигнутые для сдерживания революции, оказались малоэффективны, ибо слабость, эгоизм и ложные идеи приводили то к непоследовательности в их возведении, то к опасному разрушению, позволяя разрушительной волне распространяться и оказывать свое влияние. Иллюзия, будто вернейший способ противостоять революции — это цепляться за старые привычки и строго следовать принципам, провозглашенным самой революцией, в огромной степени способствовала ее распространению и усилению».\n\n«Поэтому истинная революция, чья конечная цель — достижение великой цели человеческого прогресса благодаря мудрости правительства, а не импульсам насилия изнутри или извне, — вот наш руководящий принцип: придерживаться демократических принципов в [Concept('concept_law', 'законе')] [GetLawType('law_monarchy').GetName|l]. На мой взгляд, именно эта форма отвечает духу нашего времени. Что же до чистой демократии, то, если она когда-нибудь действительно станет пригодной для человечества, пусть это случится не раньше 2440 года»."
 joi_flavor_pru.12.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] правит так же непоколебимо и мудро, как Фридрих Великий."
 joi_flavor_pru.12.b: "Лучшая плотина против революции — это сама демократия."
 joi_flavor_pru.13.t: "Прусский промышленный кодекс"
 joi_flavor_pru.13.d: "Пока страной правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], Рейнская область, Силезия и город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] постепенно превратились в индустриальные центры. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] поддерживает технологический прогресс, принесенный промышленной революцией, в частности, путем выпуска государственных облигаций для расширения железнодорожной сети, что способствовало прогрессу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако возвышение #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetCustom('RU_IG_RP')]#!#! принесло и множество новых угроз."
 joi_flavor_pru.13.f: "«Социализм — это движение, стремящееся свергнуть существующий государственный и социальный порядок. Мы должны относиться к социализму как к врагу[ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Против такого движения нет иного пути, кроме решительного подавления; каждая их победа — это поражение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Мы не можем бороться с этой силой по правилам гражданского правосудия, а только по законам войны».\n\n«Трудящиеся, бедные граждане и весь неимущий класс имеют полное право требовать от государства направить все усилия на улучшение жалких и нищенских условий жизни рабочего класса и искать любые пути для помощи тем труженикам, которые создали все богатства, коими так кичится наша цивилизация. Все эти блага созданы их руками, и без них все общество рухнет под собственной тяжестью; поэтому долг государства — помочь им добиться более высокой и надежной заработной платы, чтобы они имели возможность получить достойное образование и, в конечном итоге, вести по-настоящему достойную жизнь»."
 joi_flavor_pru.13.a: "За рабочим движением следует установить строгий надзор."
 joi_flavor_pru.13.b: "Социализм ничем не отличается от государственной измены!"
 joi_flavor_pru.13.c: "Расслабьтесь. Рабочие просто выдвигают свои требования."
#Кельнский собор
 joi_flavor_pru.14.t: "Отголоски 1248 года"
 joi_flavor_pru.14.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], правительство и множество пылких националистов оказали финансовую поддержку, благодаря чему строительство #yellow Кельнского собора#! сегодня успешно завершено. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] посетил церемонию окончания работ, и вся #yellow немецкая нация#! ликует по случаю завершения этого великого произведения искусства и национального свершения!"
 joi_flavor_pru.14.f: "«Когда я стою перед ним, открывающееся зрелище повергает меня в трепет! Цельное и грандиозное впечатление наполняет мою душу; оно соткано из бесчисленных гармоничных деталей, которые я могу смаковать и наслаждаться ими, но не в силах ни распознать, ни объяснить. Говорят, это и есть радость рая, и сколько раз я возвращался сюда, чтобы насладиться этой радостью единения с небесами, чтобы приобщиться к великой мудрости, скрытой в творениях наших предков».\n\n«Ты стоишь там, переполняемый эмоциями, не в силах примирить противоречия, сплетенные в глубинах твоей души, то ощущая непреодолимую мощь целого, то называя меня мечтателем, потому что я вижу красоту там, где твои глаза видят лишь грубость и силу. Тебе хотят внушить, что изящные искусства проистекают из нашего врожденного стремления украшать окружающий мир, но это неправда! Ибо даже если в каком-то смысле это и так, в таких словах нуждаются лишь простолюдины и ремесленники, а не философы»."
 joi_flavor_pru.14.a: "Сквозь шесть столетий мы чувствуем духовную связь с великими предками!"
 #普鲁士美德
 joi_flavor_pru.15.t: "Прусские добродетели"
 joi_flavor_pru.15.d: "Повсеместное насаждение #yellow прусских добродетелей#! глубоко преобразило наше общество и армию. Граждане искренне стремятся к идеалам верности, самопожертвования и бескорыстного служения отечеству. Теперь [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] может с гордостью опираться на этот фундамент, ведь подобные качества снискали всеобщее уважение как для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], так и для всего #yellow германского народа#!."
 joi_flavor_pru.15.f: "«Служение превыше всего, а бравада — лишь пустая показуха... По-настоящему благородный человек подчиняется не правителю, а чувству долга. Наш удел — не наслаждения и даже не любовь, а ответственность. Именно в этом кроется истинно прусский характер. Этим мы отличаемся от других народов, и даже те, кто нас не понимает или питает к нам злобу, в конце концов осознают, что наше превосходство проистекает именно отсюда»."
 joi_flavor_pru.15.a: "«Храни верность и честность до самой холодной могилы, и ни на шаг не сходи с Божьего пути»."