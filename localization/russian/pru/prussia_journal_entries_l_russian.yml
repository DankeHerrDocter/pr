l_russian:
  #
 general_staff: "Генеральный штаб"
 general_staff_reason: "Значение #bold очков командования#! определяется множеством #tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_advance положительных#! или #tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_delete отрицательных#! факторов.\n\n#variable Генеральный штаб#! — это высшее военное учреждение в составе [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], ответственное за #bold планирование и принятие решений#! в ходе [Concept('concept_war', 'войны')] и служащее образцом для всех современных генеральных штабов. #bold Становление#! и #bold развитие#! #bold Генерального штаба#! — наше величайшее #bold преимущество#! перед противниками и #variable главная причина, почему нашей армии так боятся на поле боя.#!\n\nОснованный в #bold 1806 году#! #bold генералом Шарнхорстом#! и #bold фельдмаршалом Гнейзенау#!, #bold штаб#! был задуман как нервный центр [Concept('concept_army', 'армии')], ответственный за изучение всех аспектов [Concept('concept_war', 'войны')], разработку планов манёвров и кампаний, а также подготовку планов боевых действий и [Concept('concept_mobilize_army', 'мобилизации')]. Назначение первого #bold начальника Генерального штаба, барона Карла фон Мюффлинга#!, в #bold 1821 году#! ознаменовало официальное учреждение #bold Генерального штаба#!.\n\nСистема подготовки в #bold Генеральном штабе#! нацелена не просто на воспитание компетентных штабных офицеров, а на то, чтобы военная машина [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] работала на полную мощность и обеспечивала армии череду нескончаемых побед.\n\nЯ — пруссак, знаешь ли ты мой цвет?\nФлаг Пруссии реет предо мной,\nОрёл Пруссии парит над головой;\nМой флаг ведёт меня к славе,\nМой меч ведёт меня к победе;\nИ над сиянием Пруссии\nЯ буду стоять, как скала и дуб!"
 general_staff_status: "#V #I #B Генеральным штабом командуют начальник Генерального штаба и генерал-квартирмейстер.#!#!#!"
 general_staff_1_button: "Ротация офицеров"
 general_staff_1_button_desc: "Хотя штабные офицеры теоретически служат пожизненно, одних лишь их усилий недостаточно, чтобы наша армия своевременно внедряла тактические новшества и получала боевой опыт. В нашей системе штабные офицеры могут проходить ротацию между службой в штабе и в строевых частях. Замещающие их офицеры с передовой получают повышение в Генеральный штаб, где набираются опыта и со временем становятся выдающимися полевыми командирами. Увеличив частоту таких ротаций, мы сможем лучше подготовить наши вооружённые силы."
 general_staff_1_button_tt: "Затраты: 25 #bold очков командования#!\n#bold Ротация офицеров#! будет длиться 5 лет.\nЭто действие можно активировать, только если #bold ротация офицеров#! в данный момент не проводится."
 general_staff_2_button: "Штабное планирование"
 general_staff_2_button_desc: "Стратегическое планирование войны играет ключевую роль в достижении победы. Различные отделы Генерального штаба обладают обширными географическими данными и оперативной информацией. Им можно поручить разработку комплексного плана, который будет эффективен в текущей ситуации и позволит справиться с любыми непредвиденными обстоятельствами. Для выполнения этого плана Генеральный штаб получит полные полномочия по распределению государственных ресурсов. Кроме того, штаб может вносить детальные корректировки в планы кампаний, представленные полевыми командирами."
 general_staff_2_button_tt: "Затраты: 50 #bold очков командования#!\n#bold Штабное планирование#! будет длиться 2 года.\nЭто действие можно активировать, только если #bold штабное планирование#! в данный момент не проводится."
 general_staff_3_button: "Стойкая оборона"
 general_staff_3_button_desc: "Военная обстановка требует, чтобы наши войска упорно удерживали свои позиции на передовой. Генеральный штаб должен разработать и направить всем командирам и солдатам на фронте действенный оборонительный план, чтобы они понимали стратегические цели командования и выполняли приказ держаться до конца. Одновременно Генеральный штаб выделит значительные ресурсы для обеспечения стабильности линии фронта."
 general_staff_3_button_tt: "Затраты: 50 #bold очков командования#!\n#bold Стойкая оборона#! будет длиться 1 год.\nЭто действие можно активировать, только если приказ о #bold стойкой обороне#! в данный момент не отдан."
 general_staff_4_button: "Решительное наступление"
 general_staff_4_button_desc: "Военная обстановка требует от наших войск быстрого продвижения вперёд для захвата преимущества на фронте. Генеральный штаб должен разработать и направить всем командирам и солдатам на передовой действенный план наступления, чтобы они понимали стратегические цели командования и выполняли приказ об атаке. Одновременно Генеральный штаб выделит значительные ресурсы, чтобы войска могли проводить непрерывные атаки."
 general_staff_4_button_tt: "Затраты: 50 #bold очков командования#!\n#bold Решительное наступление#! будет длиться 1 год.\nЭто действие можно активировать, только если приказ о #bold решительном наступлении#! в данный момент не отдан."
 general_staff_5_button: "Всеобщая мобилизация"
 general_staff_5_button_desc: "Война достигла решающего момента. Любое промедление или сдержанность приведут к ущербу для интересов нашего великого государства. Ради победы Генеральный штаб получит указание мобилизовать все силы нации на службу армии. Мы бросим все ресурсы на достижение победы, чего бы это ни стоило!"
 general_staff_5_button_tt: "Затраты: 50 #bold очков командования#!\nПриказ о #bold всеобщей мобилизации#! будет действовать 5 лет.\nЭто действие можно активировать, только если приказ о #bold всеобщей мобилизации#! в данный момент не отдан.\nЧрезмерная мобилизация нанесёт ущерб экономическому порядку в нашей стране!"
 general_staff_6_button: "Чрезвычайные военные полномочия"
 general_staff_6_button_desc: "Текущая военная обстановка не внушает оптимизма. Генеральный штаб представил правительству документ с изложением своих опасений по поводу соотношения сил и попросил Кабинет временно принять закон о чрезвычайных полномочиях, передав политическую власть начальнику Генерального штаба и генерал-квартирмейстеру, чтобы с максимальной эффективностью использовать потенциал всей страны для достижения победы."
 general_staff_6_button_tt: "Затраты: 100 #bold очков командования#!\n#bold Чрезвычайные военные полномочия#! будут действовать 5 лет.\nЭто действие можно активировать, только если #bold чрезвычайные военные полномочия#! ещё не переданы Генеральному штабу.\nЧрезмерная милитаризация власти подорвёт политическую стабильность в нашей стране!"
 general_staff_tt_1: "Генеральный штаб — душа и сердце нашей армии, а сильная армия — ключ к защите наших интересов."
 general_staff_tt_2: "#bold Ротация офицеров#! стоит 25 #bold очков командования#!\n#bold Штабное планирование#! стоит 25 #bold очков командования#!\n#bold Стойкая оборона#! и #bold решительное наступление#! стоят по 50 #bold очков командования#!\n#bold Всеобщая мобилизация#! стоит 50 #bold очков командования#!\n#bold Чрезвычайные военные полномочия#! стоят 100 #bold очков командования#!."
 general_staff_unlock_button_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Военные реформы Мольтке»#!"
 general_staff_tooltip_advance: "#bold Очки командования увеличиваются на 2 каждый месяц при следующих условиях#!:\n•#variable Вы находитесь в состоянии войны#!\n•#variable Принят закон [GetLawType('law_professional_army').GetName]#!\n•#variable [concept_approval] [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] равно 5 или выше#!\n•#variable Влияние [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] [Concept('concept_powerful', 'высоко')]#!\n•#variable [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённые силы')] входят в правительство#!\n•#variable Изучена технология #bold Телеграф#!#!\n•#variable Проводится ротация офицеров#!"
 general_staff_tooltip_delete: "#bold Очки командования уменьшаются на 5 каждый месяц при следующих условиях#!:\n•#variable Ваш [concept_rank] ниже, чем [concept_great_power]\n•#variable Не принят закон [GetLawType('law_professional_army').GetName] или [GetLawType('law_mass_conscription').GetName]#!\n•#variable Влияние [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] [Concept('concept_marginalized', 'незначительно')]#!\n•#variable [concept_approval] [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] равно -5 или ниже#!\n•#variable [Concept(GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName, 'Вооружённых сил')] не входят в правительство#!"
  #
 rhineland_industrialize: "Индустриализация Рейнской области"
 rhineland_industrialize_status: "Превратить богатую ресурсами Рейнскую область в настоящий промышленный регион"
 rhineland_industrialize_reason: "Рейнская область — территория, переданная [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] по итогам Венского конгресса. Хотя она и не граничит с нашими основными землями, технологическое развитие позволило начать добычу местных природных ресурсов, что создало прекрасные условия для промышленного роста.\n\nПредприятия во главе с #bold Альфредом Круппом#! уже представили правительству в Берлине план по превращению этого региона в новый промышленный центр нашей страны. Однако для этого потребуется поддержка центральной власти.\n\nНаш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] поручил правительству считать этот план приоритетным и воплотить в жизнь проект индустриализации Рейнской области. Медленно текущий Рейн станет новой опорой экономики нашего государства."
 rhineland_indu_tt_1: "Строительство в Рейнской области принесёт нам множество преимуществ..."
  #
 peussia_education: "Прусский закон об образовании"
 peussia_education_reason: "«Если каждый ученик не проявит себя как отличный ремесленник, торговец, солдат или политик, но при этом останется честным человеком и добрым гражданином, он, не думая о своей профессии, будет искать необходимое обучение, благодаря которому легко приобретет особые навыки для работы и всегда останется свободным».\n\nСистема образования [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в настоящее время по праву считается #V самой передовой#! в Европе и во всем мире. Этим мы обязаны реформам #yellow Вильгельма фон Гумбольдта#!, проведенным в #V 1810 году#!. Действующий уже более десяти лет #blue #B #L закон Гумбольдта об образовании#!#!#! обязал всех граждан получать начальное школьное образование; началось внедрение технического обучения; а #variable Берлинский университет#! получил огромный грант из государственной казны на проведение академических исследований, что привлекло на службу выдающихся #v @academics! учёных#!.\n\nОднако в существующей #O системе образования#! есть и недостатки. Отсутствие профессионально-технического обучения и финансовые барьеры для поступления студентов препятствуют появлению новых талантов в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Несомненно, дальнейшие реформы, направленные на создание #G равной и обязательной#! системы образования, #B доступной каждому и дающей возможность для дальнейшего обучения#!, принесут нашей стране огромную пользу."
 peussia_education_tt_1: "Будет принят новый закон об образовании."
  #
 peussia_army_reform: "Военные реформы Мольтке"
 peussia_army_reform_status: "Военные реформы, продвигаемые #bold Гельмутом фон Мольтке#!, нацелены на всестороннее преобразование армии для повышения её боеспособности."
 peussia_army_reform_reason: "[SCOPE.sCharacter('eldermoltke_scope').GetFullName], ученик #yellow генерала Клаузевица#!,  представил предложение по всеобъемлющей реформе армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nОн рассчитывает #V радикально реформировать Генеральный штаб#!, значительно расширив его полномочия, чтобы во время [Concept('concept_war', 'войны')] #B #L Генеральный штаб#!#! стал «единственным советником» главнокомандующего. Именно он должен #bold разрабатывать стратегию и тактику, координировать военные и материальные ресурсы#! и централизовать руководство военными операциями. Кроме того, планируется #V внедрить новые военные технологии#!, масштабно обновить армейское снаряжение, #bold разработать новую мощную артиллерию, использовать #yellow железные дороги и телеграф#! в ходе [Concept('concept_war', 'войны')]#! для обеспечения мобильности и снабжения войск. Наконец, необходимо #V усилить подготовку офицеров Генерального штаба#! для выполнения новых военных планов, требуя от #v $officers$#! проявления инициативы, тщательного планирования операций и ведения решительных наступательных действий.\n\nЕсли правительство желает сохранить авторитет #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европе, нам следует прислушаться к советам [SCOPE.sCharacter('eldermoltke_scope').GetLastName] и провести всестороннюю модернизацию наших войск."
 peussia_army_reform_tt_1: "Успешные военные реформы откроют новые действия, доступные для #bold Генерального штаба#!!\nКроме того, наша армия будет усилена."
  #
 way_to_germany: "Путь к Германии"
 way_to_germany_reason: "«Положение [ROOT.GetCountry.GetAltName('RU_CL_RP')] в Германии зависит не от её либерализма, а от её силы... Пруссия должна копить и сохранять свои силы до благоприятного момента, который уже не раз был упущен. Границы, установленные Венскими договорами, не способствуют здоровому государственному развитию. Великие вопросы эпохи решаются не речами и резолюциями большинства, но #variable железом и кровью#!»\n\nМечта о единстве Германии уже не кажется такой далёкой. Одержав победу в [Concept('concept_war', 'войне')] и победив [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_VP')], нашего главного противника, мы сможем стать единственным [concept_unification_candidate] и, покончив с Германским союзом, по-настояшему объединить всех немцев в единое государство.\n\nОднако Германия — это не территория с чёткими границами. Одни утверждают, что достаточно земель от Мааса до Мемеля, другие настаивают на #variable объединении всего Германского союза#! военным путём.\n\nПути, открывающиеся перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], туманны. Какой же из них нам избрать?"
 big_germany_tt: "Мы получим претензии на всю территорию Германского союза.\nОднако это сделает невозможным будущий союз с Австрией."
 little_germany_tt_1: "Мы получим претензии на всю территорию Германского союза, за исключением Австрии."
 little_germany_tt_2: "Союз с Австрией станет возможен после создания Германской империи."
 way_to_germany_1_tt: " [GetPlayer.GetName] должна быть единственным [Concept('concept_unification_candidate', 'кандидатом на объединение')]."
 way_to_germany_complete_tt: "Австрия не существует."

 #3/2026
 prussian_union_of_churches: "Реформа новой прусской церкви"
 prussian_union_of_churches_reason: "Наследие курфюрста #V Иоганна Сигизмунда#! привело в #yellow маркграфство Бранденбург#! множество #B кальвинистов#!. Хотя они мирно сосуществовали, со времен Реформации в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] существовали две отдельные системы управления для двух конфессий [GetReligion('protestant').GetCustom('RU_RL_RP')] — #B кальвинистов и лютеран#!. После #V наполеоновских войн#! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Фридрих Вильгельм III#! объединил их в рамках #B министерства по делам религий#!, подчиненного [Concept('concept_government', 'правительству')], но контроль короны над этими конфессиями оставался весьма слабым, особенно вдали от столицы.\n\n#V Реформы 1829 года#! упразднили раздельные названия #B лютеранской#! и #B кальвинистской#! церквей, объединив их в #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_VP')]#!#!. Однако диссиденты, известные как #yellow «старолютеране»#!, по-прежнему сохраняют влияние в различных уголках [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Они создали собственные тайные лютеранские общины, отвергают новые таинства, которые ввёл [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и #B противостоят правительству.\n\nЕсли [concept_government] хочет усилить контроль над паствой #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#!, мы должны принять меры для #B постоянного наблюдения и арестов#! недовольных."
 event_joi_pru_6_b_tt: "1000 #tooltippable_name #tooltip:[GetCulture('north_german').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('north_german').GetCustom('RU_CUL_ADJ')]их#!#! [GetReligion('protestant').GetCustom('RU_RL_RP')] переселятся в штат #yellow Миссури#!\n1000 #tooltippable_name #tooltip:[GetCulture('north_german').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('north_german').GetCustom('RU_CUL_ADJ')]их#!#![GetReligion('protestant').GetCustom('RU_RL_RP')] переселятся в #yellow Южную Австралию#!"
#
 rheinische_homerule: "Муниципальное самоуправление Рейнской области"
 rheinische_homerule_reason: "Со времен #v Просвещения#! конституционная интеграция муниципалитетов и государства остается предметом долгих споров. Многие #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetCustom('RU_IG_NOM')]#!#! разделяют популярное мнение о том, что муниципалитеты по сути не являются частью центрального правительства, а представляют собой социальное явление.\n\nЭти разногласия особенно ярко проявляются в #yellow Рейнской области#! под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Унаследовав достижения периода правления [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], #yellow Рейнская область#! обладает современным [Concept('concept_law', 'законодательством')], #O экономикой#! и #O конституционной структурой#!, тогда как восточные провинции остаются преимущественно аграрными, с экономикой, основанной на поместьях. Хотя #B Прусский муниципальный кодекс#! #V 1831 года#! объявил область подсудной [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], на деле #yellow Рейнская область#! сохраняет высокую степень судебной и административной автономии.\n\nБудучи важнейшим промышленным и городским центром [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] должен пересмотреть отношения между муниципалитетами #yellow Рейнской области#! и центральным правительством, будь то путем предоставления им #B законной автономии#! или через #B более жесткое управление#!."
 rheinische_homerule_complete_tt: "Завершена [concept_journal_entry] #V «Составление муниципального кодекса»#!"
 rheinische_homerule_complete_3_tt: "Переживает или пережила #V Весну народов#!"
 rheinische_homerule_complete_2_tt: "#V Весна народов#! завершилась #B победой контрреволюции#!"
 rheinische_homerule_button: "Начать составление муниципального кодекса"
 rheinische_homerule_button_desc: "При содействии министров нашего кабинета мы вполне способны составить новый специальный кодекс для муниципалитетов Рейнской области, который заменит устаревшие положения Прусского муниципального закона 1831 года. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] надеется сохранить в нем основы надежного традиционного общественного порядка и гарантировать, что регион не превратится в очаг радикализма."
 rheinische_homerule_button_tt: "Работа над кодексом еще не начата\nОжидается, что процесс составления займет 5 лет"
 deutsche_gemeindeordnung: "Единый муниципальный закон Германии"
 deutsche_gemeindeordnung_reason: "Хотя #B германские государства#! под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] давно объединились в единую страну, многие традиции времен #V Священной Римской империи#! и #V Германского союза#! по-прежнему сильны — особенно в вопросах #B #L муниципального права#!#!. Члены муниципальных советов, подобно представителям эпохи Союза, обладают мандатами от политических партий или граждан, что позволяет местным органам #B муниципального управления#! оставаться независимыми от правительства города[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nРост государственного аппарата [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и требования времени диктуют необходимость радикального пересмотра всех старых #O муниципальных законов#!. Мы должны создать #V единую структуру муниципальных функций#!, четко определить обязанности муниципалитетов во всех сферах их деятельности и объединить их в единый #V имперский кодекс#!, действующий на всей территории [Concept('concept_country', 'страны')]."
 deutsche_gemeindeordnung_complete_tt: "Завершена [concept_journal_entry] #V «Унификация муниципальных законов земель»#!"
 deutsche_gemeindeordnung_button: "Начать унификацию муниципальных законов земель"
 deutsche_gemeindeordnung_button_desc: "На территории Германии насчитывается более 51 000 муниципалитетов и бесчисленное множество жителей, жизнь которых регулируется 66 различными городскими и муниципальными кодексами, действующими в разных уголках империи. Мы не можем и дальше мириться с этой дисгармонией; мы должны объединить их традиционные обычаи в единый закон."
 deutsche_gemeindeordnung_button_tt: "Процесс унификации еще не начат\nОжидается, что процесс займет 5 лет"
 #Консервативный порядок Пруссии
 conservative_order_prussia: "Консервативный порядок в Пруссии"
 conservative_order_prussia_reason: "Хотя #yellow Священная Римская империя#! распалась в #V 1806 году#! под ударами #B Наполеона#!, #O древние законы#! и #o социальные обычаи#! имперской эпохи, а также институты, сформированные этими традициями, продолжали оказывать глубокое влияние на все государства #V Германского союза#!. Реакционная волна #B постнаполеоновской эры#! призвала к восстановлению этих #B древних священных традиций#! по всей Европе, и в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] эта идея нашла широчайшую поддержку.\n\n[ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], стремится восстановить консервативный порядок в [Concept('concept_country', 'стране')] в рамках исторической #O легитимности#! (как он ее понимает), противостоять либерализации Германии и, в конечном итоге, воссоздать средневековые узы #V феодальной верности#! между народом[ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и монархом — будь то посредством #B умеренной политики#! или #B несокрушимой железной руки#!."
 conservative_order_prussia_complete_1_tt: "Выполнены 3 [Concept('concept_journal_entry', 'записи в дневнике')] из ветки #V «Консервативный порядок»#!"
 conservative_order_prussia_pulse_tt: "Прогресс шкалы #V «Консервативный порядок в Пруссии»#! увеличится на 1"
 conservative_order_prussia_1_button: "Начать награждение орденом «За заслуги в науке и искусстве»"
 conservative_order_prussia_1_button_desc: "Наш выдающийся ученый и великий исследователь — господин #yellow Александр фон Гумбольдт#! — предложил Его Величеству дополнить военный орден «За заслуги» (Pour le Mérite), учрежденный Фридрихом Великим, мирным гражданским классом «За заслуги в науке и искусстве», чтобы отмечать тех, кто внес выдающийся вклад в развитие нашего общества и культуры."
 conservative_order_prussia_1_button_tt: "Является #yellow Александром фон Гумбольдтом#!"
 conservative_order_prussia_2_button: "Издать указ о широкой амнистии политических заключенных"
 conservative_order_prussia_2_button_desc: "Многие либералы и националисты возлагают большие надежды на нашего нового правителя. Мы можем оправдать их чаяния, продемонстрировав милосердие и просвещенность короны, например, помиловав нескольких видных политических диссидентов."
 buttton_not_been_used_tt: "Это действие еще не предпринималось"
 conservative_order_prussia_religious: "Консервативный порядок: Пиетизм"
 conservative_order_prussia_religious_reason: "В #yellow германских#! государствах процветает #V романтизм#!, и ностальгия по #B Средневековью#! — вера в то, что лишь жизнь, более #B угодная Богу#!, способна возродить #V легитимную и мирную#! [Concept('concept_country', 'страну')], — набирает силу в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\n[ROOT.GetCountry.GetRuler.GetFullName], [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], также рассматривает набирающее силу #V пиетистское движение#! как #L #B крестовый поход#!#! против идей #B Просвещения#! и #B Французской революции#!. Совершенно очевидно, что если мы хотим укрепить #V традиционный консервативный порядок#!, необходимо подчеркивать и интегрировать #B волю Божью#! и #B традиции [GetReligion('protestant').GetCustom('RU_RL_RP')]#!."
 conservative_order_prussia_religious_complete_1_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Реставрация Кельнского собора»#!"
 conservative_order_prussia_constitution: "Консервативный порядок: Конституционный вопрос"
 conservative_order_prussia_constitution_reason: "«Единственная прочная конституция — это сословная монархия, уравновешенная духовенством и дворянством, она же — самая древняя и наилучшая конституция».\n\nВ рамках #V политики примирения#! с нашими новоявленными подданными-[GetIdeology('ideology_liberal').GetCustom('RU_IG_TP')] Его Величество [ROOT.GetCountry.GetRuler.GetFullName] стремится найти решение #B конституционного вопроса#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]. Он надеется найти #V баланс#! между #B радикализмом и реакцией#!, вновь #B завоевав широкую поддержку подданных#!, сохранив при этом [GetLawType('law_monarchy').GetName|l] и #yellow власть монарха#!."
 conservative_order_prussia_constitution_complete_1_tt: "Сохранять [concept_law] [GetLawType('law_autocracy').GetName|l] или [GetLawType('law_oligarchy').GetName|l] в течение 10 лет"
 conservative_order_prussia_constitution_complete_2_tt: "Был выполнен #B «Компромисс в вопросах избирательного права»#!"
 conservative_order_prussia_constitution_button: "Пойти на компромисс в вопросах избирательного права"
 conservative_order_prussia_constitution_button_desc: "Стремление народа к избирательным правам настолько велико, что мы больше не можем сдерживать его; если мы продолжим упорствовать, последствия могут оказаться куда более суровыми — мы должны пойти на компромисс. Разумеется, это должно быть сделано при условии сохранения прав и интересов правительства и короны."
 conservative_order_prussia_constitution_button_tt: "Мы даруем конституцию, закрепляющую избирательные права, что немедленно завершит эту запись.\nОдновременно мы введем #yellow трехклассную избирательную систему#!, чтобы гарантировать реальное влияние правительства на выборный парламент.\nОднако эта #O поправка#! окажет негативное воздействие на наши демократические институты."
 conservative_order_prussia_industy: "Консервативный порядок: Индустриализация"
 conservative_order_prussia_industy_reason: "#V Промышленная революция#! меняет нашу страну: столкнувшись с масштабной #B волной индустриализации#!, [ROOT.GetCountry.GetName] обязана идти в ногу со временем. Лишь #V сильное, процветающее и богатое#! государство сможет обеспечить бóльшую поддержку священному порядку.\n\nОбщественное мнение требует #B быстрых и решительных действий#!, и ситуация обязывает нас к этому: если мы хотим спасти [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] и вернуть ей процветание, мы не должны колебаться. Приложим все усилия, чтобы все подданные могли насладиться #B благами Промышленной революции#!!"
 conservative_order_prussia_industy_1_tt: "Завершена [concept_journal_entry] #V «Индустриализация Рейнской области»#!"
 conservative_order_prussia_industy_2_tt: "Завершена [concept_journal_entry] #V «Индустриализация Силезии»#!"
 restore_cologne_cathedral: "Реставрация Кельнского собора"
 restore_cologne_cathedral_reason: "#V Незавершенный проект со времен Средневековья#! — #B Кельнский собор#! на берегу #yellow Рейна#! — по сей день возвышается над городом и народом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в своем недостроенном виде; его башни брошены на полпути, камень выветрился и осыпался, словно забытое наследие веры и эпохи.\n\nОднако под влиянием #B романтизма и национального духа#! эта древняя церковь вновь обретает новый смысл: она принадлежит не только церкви, но и всей #yellow немецкой нации#!. Хотя #B финансирование, сроки и мобилизация общества#!, необходимые для этого проекта, превзойдут любые предыдущие строительные планы, мы #B обязаны завершить это грандиозное начинание#!. Пусть это великое сооружение, символ #yellow немецкого национального духа#!, перейдет от предков к нашему поколению, а от нас — предстанет перед миром во всем своем величии."
 restore_cologne_cathedral_tt: "Завершены #V строительные работы#!"
 restore_cologne_cathedral_button: "Начать строительные работы"
 restore_cologne_cathedral_button_desc: "Для возрождающейся [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] это не просто архитектурный проект — #B это манифест истории, веры и будущего нации#!. Раз уж мы зашли так далеко, разве не предначертано нам судьбой завершить его?"
 #
 prussian_state_railways: "Государственные железные дороги"
 prussian_state_railways_reason: "#yellow Железные дороги#! — кровеносные сосуды [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], и эти #B жизненно важные артерии#! должны находиться под контролем [Concept('concept_government', 'правительства')]. Нам следует создать #B специальное управление железных дорог#!, субсидировать строительство важнейших линий по всей стране и подчинить себе различные железнодорожные [Concept('concept_company', 'компании')]#O #! путем поглощения, прямого выкупа или финансовой поддержки. Более того, #V управление железными дорогами#! может стать #B невероятно прибыльным предприятием#! и даже превратиться в #B основной источник доходов казны#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 prussian_virtues: "Прусские добродетели"
 prussian_virtues_reason: "Со времен правления #V Короля-солдата#! и #V Фридриха Великого#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] укоренились принципы порядка, трудолюбия, скромности и богобоязненности. Соединившись с идеями #B пиетизма#! и рациональной терпимостью #B эпохи Просвещения#!, они выковали совершенно новый характер для народа [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Его венцом стала опирающаяся на #B рыцарский дух#! #O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_1_effects_tt $prussia_strong_army$#!#!. Именно этот моральный и социальный кодекс позволил [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] превратиться из барочного государства времен Великого курфюрста #yellow Фридриха Вильгельма#! в современную [Concept('concept_great_power', 'великую державу')] Европы.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] [SelectLocalization(ROOT.GetCountry.GetRuler.IsFemale, 'уверена', 'уверен')], что, сохраняя и преумножая эти славные традиции — #B искренность, скромность, усердие, честность, исполнительность, верность, дисциплину, бережливость, сдержанность и самоотверженность#!, мы сможем построить могучее и внушающее трепет всему миру #V Прусское государство#!, а также воспитать благородную и строгую #V германскую нацию#!."
 prussian_virtues_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Военные реформы Мольтке»#!"
 event_effects_joi_flavor_pru.15_tt: "Особенность #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_1_effects_tt $prussia_strong_army$#! получит #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_2_effects_tt #G улучшение#!#!."
 prussian_virtues_modifier_1_effects_tt: "[GetStaticModifier('prussia_strong_army').GetName|v]\n[GetStaticModifier('prussia_strong_army').GetDesc]"
 prussian_virtues_modifier_2_effects_tt: "[GetStaticModifier('prussia_superstrong_army').GetName|v]\n[GetStaticModifier('prussia_superstrong_army').GetDesc]"


