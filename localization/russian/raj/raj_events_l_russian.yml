l_russian:
  #Закон о выкупе дивидендов Компании
 joi_flavor_raj.1.t: "Закон о выкупе дивидендов Ост-Индской компании"
 joi_flavor_raj.1.d: "Согласно закону, принятому сегодня парламентом, давний вопрос, касающийся акций и дивидендов, которые имеет [SCOPE.sCountry('BIC_scope').GetNameNoFlag], закрыт. Она выполнила задачу, которую никогда не брала на себя ни одна компания в истории человечества и, возможно, никогда не возьмёт в будущем."
 joi_flavor_raj.1.f: "Ввиду необходимости разработки положений о выкупе или конвертации дивидендов по акционерному капиталу, который имеет [SCOPE.sCountry('BIC_scope').GetNameNoFlag], о передаче её гарантийного фонда статс-секретарю по делам Индии в Тайном совете, и о её роспуске, Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], по совету и с согласия духовных и светских лордов и общин, собранных в настоящем парламенте, и их властью, постановляет следующее:\n\nВ течение 6 месяцев после вступления в силу настоящего Закона, [SCOPE.sCountry('BIC_scope').GetNameNoFlag] выплатит определённую долю дивидендов, но не более; выплата этой доли должна производиться, насколько это возможно, таким же образом, как и нынешние полугодовые выплаты дивидендов, и все доверенности, действующие на момент принятия настоящего Закона или выданные в будущем на получение накопленных дивидендов по акциям Ост-Индии, если они не будут отозваны по закону, дают право указанным в них поверенным получать пропорциональные выплаты дивидендов, подлежащие уплате в сроки, установленные настоящим Законом.\n\nСтатс-секретарь по делам Индии совместно с Тайным советом может предложить всем владельцам акций, которые имеет [SCOPE.sCountry('BIC_scope').GetNameNoFlag], принять любые акции, фонды или ценные бумаги в обмен на их соответствующие доли или дивиденды. Эти акции, фонды или ценные бумаги находятся в распоряжении статс-секретаря совместно с Тайным советом или могут быть созданы и выпущены на основании любого парламентского акта. Любое такое предложение может быть сделано на тех условиях, которые статс-секретарь совместно с Тайным советом сочтёт целесообразными."
 joi_flavor_raj.1.a: "Компания прекратила своё существование, но Империя остаётся."
 joi_flavor_raj.1.b: "Миссия Компании будет продолжена иным путём."
  #
 joi_flavor_raj.2.t: "Поправки к Закону о хартии 1813 года"
 joi_flavor_raj.2.d: "После того как вопрос об акциях был решён в пользу Компании, парламент [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] в конечном итоге решил изменить некоторые положения Закона о хартии 1813 года, ограничивающие привилегии Компании, и предоставить новые торговые, судебные и административные привилегии, чтобы мы могли лучше служить интересам Империи."
 joi_flavor_raj.2.f: "Ввиду того, что парламент в 1813 году принял акт, согласно которому [ROOT.GetCountry.GetNameNoFlag] продолжает управлять территориями [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] в Индии и пользоваться некоторыми эксклюзивными торговыми правами, устанавливать дальнейшие правила управления указанными территориями, улучшать отправление правосудия в стране и облегчать торговлю с областями, входящими в сферу действия хартии Компании, постановляется следующее:\n\nУправление и правление территориями [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] в Индии, а также исключительная торговля в Ост-Индии, с определёнными эксклюзивными торговыми правами и другими ограничениями, установленными ранее изданными указами или хартией 1813 года, продолжает осуществляться Компанией [ROOT.GetCountry.GetNameNoFlag] в Ост-Индии и Индийском океане.\n\nА также все и всякие прибыли, выгоды, преимущества, привилегии, льготы, полномочия, власти, права, средства правовой защиты, способы судебного преследования, штрафы, конфискации, лишения прав, положения, дела и вещи, предоставленные или утверждённые Компании Его Королевским Величеством актом 1813 года или любым другим актом, и все другие акты, положения, дела и вещи, предусмотренные актом Его Королевского Величества 1813 года или любым другим актом, которые не ограничиваются или не могут быть истолкованы как не ограничивающиеся уставами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и её непосредственных владений, продолжают действовать и предоставлять привилегии в течение срока действия настоящего акта."
 joi_flavor_raj.2.a: "Изменить часть, касающуюся отзыва монопольных привилегий."
 joi_flavor_raj.2.b: "Изменить часть, касающуюся отзыва привилегий на управление."
  #Королевская хартия
 joi_flavor_raj.3.t: "Королевская хартия"
 joi_flavor_raj.3.d: "Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] сегодня, по рекомендации парламента и [SCOPE.sCountry('BIC_scope').GetNameNoFlag], в связи с возвращением компанией значительной прибыли, разрешил возобновить Королевскую хартию, выданную компании королём Яковом I в 1609 году, и пожаловал ей бессрочные привилегии."
 joi_flavor_raj.3.f: "«В знак любви к вашей королевской особе я приказываю всем королевствам и портам, находящимся под моей властью, принимать любого английского купца как моего друга; они могут жить где угодно и пользоваться неограниченной свободой.\n\nВ какой бы порт они ни прибыли, ни португальцы, ни кто-либо другой не смеют их беспокоить. В каком бы городе они ни поселились, я приказываю всем моим наместникам и чиновникам предоставлять им любую свободу, в которой они могут нуждаться.\n\nЧтобы укрепить нашу сердечную дружбу, я надеюсь, Ваше Величество прикажет вашим купцам привозить на своих кораблях всевозможные сокровища и товары, достойные моего дворца, а также даст вам возможность передавать мне ваши королевские письма, чтобы я мог радоваться развитию вашего дела.\n\nОни могут свободно торговать и отправлять товары в свою страну, и пусть наша дружба будет вечной»."
 joi_flavor_raj.3.a: "Что принадлежит Компании, остаётся у Компании."
 joi_flavor_raj.3.b: "Что принадлежит Империи, остаётся у Империи!"
  #Закон о погашении долгов Компании
 joi_flavor_raj.4.t: "Закон о погашении долгов Компании"
 joi_flavor_raj.4.d: "Финансовый и фондовый кризис, который пережила [ROOT.GetCountry.GetNameNoFlag], наконец стабилизировался, и был издан новый закон об административных вопросах после полного погашения её долгов."
 joi_flavor_raj.4.f: "Акт, продолжающий действие акта, принятого на прошлой сессии парламента, который даёт больше времени на уплату некоторых платежей, причитающихся компании торговцев, которыми является [SCOPE.sCountry('GBR_scope').GetNameNoFlag], торгующих с Ост-Индией; утверждает дальнейшее время для уплаты некоторых причитающихся платежей и для их авансирования общественности указанной компанией на упомянутых в нём условиях, путём привлечения определённой суммы денег посредством займа или казначейских векселей:\n\nНынешний министр финансов Его Королевского Величества отсрочил и предоставил больше времени на уплату этой суммы, а именно, законных шестисот сорока четырёх тысяч семисот сорока трёх фунтов семнадцати шиллингов и двух пенсов, которые должны быть уплачены в казну в несколько сроков, упомянутых в указанном акте; общая сумма в сто тысяч фунтов, подлежащая уплате первого декабря тысяча семьсот восемьдесят первого года; и разрешает уплату в казну причитающихся платежей в течение двенадцати месяцев после истечения срока.\n\nЕсли [ROOT.GetCountry.GetNameNoFlag] действительно и уплатит указанные суммы в один или несколько сроков, отсроченных указанным образом, соответственно, то они будут приняты таким же образом, как если бы они были уплачены в день или до дня их наступления; и компания, уплатившая в один или несколько отсроченных сроков, будет освобождена от всех убытков, процентов и потерь, понесённых ею из-за неуплаты указанных сумм в несколько сроков, и будет иметь право на те же скидки, льготы и преимущества, как если бы указанные суммы были уплачены в день или до дня их наступления."
 joi_flavor_raj.4.a: "За джентльменов с Лиденхолл-стрит!"
  #Закон о продаже акций Ост-Индии
 joi_flavor_raj.5.t: "Закон о продаже акций Ост-Индии"
 joi_flavor_raj.5.d: "В связи с тем, что сегодня истекает срок долговых обязательств Банка Англии перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], по решению парламента [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], Компания вынуждена в ограниченный срок продать акционерное имущество и таможенные доходы для погашения долга перед Банком Англии."
 joi_flavor_raj.5.f: "Нынешние уполномоченные Казначейства Его Королевского Величества должны в сроки, установленные настоящим актом, проконтролировать, чтобы [ROOT.GetCountry.GetNameNoFlag] уплатила таможенные сборы в размере шестисот сорока четырёх тысяч семисот сорока трёх фунтов семнадцати шиллингов и двух пенсов, подлежащие уплате в различные сроки, указанные в настоящем акте, а также таможенные сборы в размере ста тысяч фунтов, подлежащие уплате первого декабря тысяча семьсот восемьдесят первого года, и предоставить время для уплаты таможенных сборов, подлежащих уплате до десятого декабря тысяча семьсот восемьдесят третьего года, или любой части указанных сумм, в те сроки, которые они сочтут целесообразными, но не позднее чем через три месяца;\n\nЕсли [ROOT.GetCountry.GetNameNoFlagNoFlag] в сроки, отсроченные для уплаты указанных платежей или их частей, соответственно уплатит указанные суммы, то такие платежи должны быть приняты и получены таким же образом, как если бы они были уплачены в день или до дня их наступления; [ROOT.GetCountry.GetNameNoFlagNoFlag] после уплаты в указанные сроки будет освобождена от всех штрафов за ущерб, процентов и убытков, которые она должна была бы понести за неуплату указанных сумм в соответствующие сроки, и будет иметь право на те же скидки, вычеты и льготы, как если бы указанные суммы были уплачены в день или до дня их наступления."
 joi_flavor_raj.5.a: "Для погашения долгов Компании ничего не остаётся..."
  #Объединение субконтинента
 joi_flavor_raj.6.t: "Правительство, которым является [ROOT.GetCountry.GetNameNoFlagNoFlag], в Бирме?"
 joi_flavor_raj.6.d: "[ROOT.GetCountry.GetNameNoFlag] в конечном итоге одержала победу в войне, и проигравшая сторона была вынуждена капитулировать..."
 joi_flavor_raj.6.f: "Его Величество, император [SCOPE.sCountry('GBR_scope').GetNameNoFlag], и Его Величество, император [SCOPE.sCountry('CHI_scope').GetNameNoFlag], а также король Бирмы, постановили согласовать следующие статьи:\n\nПервое: [SCOPE.sCountry('CHI_scope').GetNameNoFlag] признаёт за [SCOPE.sCountry('GBR_scope').GetNameNoFlag] право осуществлять в Бирме ту власть, которой она в настоящее время обладает, и разрешает ей действовать по своему усмотрению.\nВторое: Поскольку Бирма каждые десять лет направляла посланников с дарами, [SCOPE.sCountry('GBR_scope').GetNameNoFlag] соглашается, чтобы каждые десять лет старший министр Бирмы направлял посланников для соблюдения этого обычая. Посланник должен быть избран из числа бирманцев.\nТретье: Настоящий договор будет заключён в Пекине специальными уполномоченными обеих стран, которые подпишут и скрепят печатями по три экземпляра на китайском и английском языках. После этого он будет представлен на ратификацию обоим монархам, а ратификационные грамоты будут немедленно обменены в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], для подтверждения его действительности."
 joi_flavor_raj.6.a: "Бирма станет провинцией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_raj.6.b: "Эту землю следует вернуть под контроль [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_raj.7.t: "Генерал-губернатор Синда?"
 joi_flavor_raj.7.d: "В ожесточённой битве при Карачи султан Синдского султаната был убит нашим доблестным генералом, которого зовут [SCOPE.sCharacter('hinde_conqueror_leader').GetLastName], и пал на поле боя. Его корона и султанат были объявлены собственностью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_raj.7.f: "Доклад от [SCOPE.sCharacter('hinde_conqueror_leader').GetFirstName] [SCOPE.sCharacter('hinde_conqueror_leader').GetLastName] для Его Превосходительства, которым является [SCOPE.sCharacter('indian_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('indian_ruler').GetFirstName]:\n\n«Peccavi (Я согрешил / Я получил Синд)».\n————17 февраля, Карачи."
 joi_flavor_raj.7.a: "Наградить сэра, которого зовут [SCOPE.sCharacter('hinde_conqueror_leader').GetFirstName] [SCOPE.sCharacter('hinde_conqueror_leader').GetLastName], за его отвагу в этой битве!"
 joi_flavor_raj.7.b: "Эта честь по праву принадлежит Его Превосходительству [SCOPE.sCharacter('indian_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('indian_ruler').GetFirstName] [SCOPE.sCharacter('indian_ruler').GetLastName], который руководил всей операцией."
 joi_flavor_raj.8.t: "Конец Дурбара"
 joi_flavor_raj.8.d: "Дурбар, некогда принадлежавший персидским монархам Сикхской империи, теперь стал трофеем армии [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Непокорный монарх был с почётом выслан и отныне ему запрещено возвращаться в Пенджаб."
 joi_flavor_raj.8.f: "После его смерти великое королевство, которое он создал, скорее всего, снова распадётся. Его премьер-министр, Дхиан Сингх, может захватить Кашмир и горные провинции. Говорят, что он достаточно силён, чтобы захватить и остальное. Но в народе склоняются к глупому сыну, Кхарак Сингху, который захватит Пенджаб. Армия подчиняется нашему дорогому другу, Шер Сингху. Но Ранджит лишил его большей части доходов, и, скорее всего, ему отрубят голову, если он не переправится на другой берег реки."
 joi_flavor_raj.8.a: "Теперь в Лахоре стоит не персидский Дурбар, а резиденция генерал-губернатора, которую имеет [ROOT.GetCountry.GetNameNoFlag]!"
 joi_flavor_raj.9.t: "Гандамакский договор"
 joi_flavor_raj.9.d: "После того как армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] полностью разгромила местных правителей Белуджистана, ворота в Персидский залив оказались в наших руках."
 joi_flavor_raj.9.f: "Его Высочество Эмир обязуется по обмене ратификационными грамотами настоящего договора объявить полную и всеобщую амнистию, освобождающую всех его подданных от любой ответственности за сношения с армией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] во время войны, и гарантировать и защищать всех лиц, независимо от ранга, от любого наказания или преследования по этому поводу.\n\nЕго Высочество Эмир Афганистана и его владений обязуется вести свои сношения с иностранными государствами в соответствии с советами и пожеланиями правительства Соединённого Королевства. Его Высочество Эмир не будет заключать никаких соглашений с иностранными государствами и не будет предпринимать никаких военных действий против любого иностранного государства без согласия имперского правительства.\n\nПри этом условии, [ROOT.GetCountry.GetNameNoFlagNoFlag] будет поддерживать Эмира деньгами, оружием или войсками против любой иностранной агрессии, и имперское правительство будет использовать любые средства, которые оно сочтёт необходимыми для достижения этой цели.\n\nЕсли имперские войска в любое время войдут в Афганистан для отражения иностранной агрессии, они немедленно вернутся в свои казармы на территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] после выполнения цели, ради которой они вошли в Афганистан."
 joi_flavor_raj.9.a: "Возможно, эту границу потомки назовут линией, которую провёл [SCOPE.sCharacter('gbr_afk_conqueror').GetLastName]?"
 joi_flavor_raj.10.t: "Кабульский договор"
 joi_flavor_raj.10.d: "Армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] ворвалась в Дурбар в Кабуле. Старый эмир бежал в Персию, а его сын был нами схвачен и заключён в Лахоре."
 joi_flavor_raj.10.f: "Ввиду дружественного союза, подтверждённого прошлыми договорами, правительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] возвращает города Кандагар и Джелалабад со всеми их территориями Его Высочеству Эмиру Афганистана и его владениям. В настоящее время, за исключением областей Курам, Пишин и Сиби, армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] владеет этой территорией.\n\nЕго Высочество Эмир Афганистана и его владений соглашается, что области Курам, Пишин и Сиби, в пределах границ, указанных в прилагаемом расписании, остаются под защитой и административным контролем правительства [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. То есть, указанные области считаются отведёнными и не должны рассматриваться как навсегда отделённые от владений Афганского королевства. Доходы этих областей, за вычетом расходов на гражданское управление, будут передаваться Его Высочеству Эмиру.\n\nПравительство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] сохранит за собой контроль над Хайберским и Мичинским перевалами, которые находятся между Пешаваром и Джелалабадом, а также над всеми отношениями с независимыми племенами, населяющими территории, непосредственно связанные с этими перевалами."
 joi_flavor_raj.10.a: "Установить в Кабуле марионеточного эмира, подконтрольного Дели."
 joi_flavor_raj.10.b: "Установить в Кабуле марионеточного эмира, подконтрольного Лондону."
 joi_flavor_raj.11.t: "Индийская империя"
 joi_flavor_raj.11.d: "Вся территория Индийского субконтинента теперь находится под контролем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: от перевалов Дуррани до джунглей Бирмы, от храмов Гималаев до дворцов Деккана — всё подчинилось нашему правлению."
 joi_flavor_raj.11.f: "Мы верим, что нынешняя ситуация может объединить славную страну, которой является [SCOPE.sCountry('GBR_scope').GetNameNoFlag], и наших подданных из [ROOT.GetCountry.GetNameNoFlag] в тесной любви;\n\nОт самых знатных до самых скромных, все почувствуют, что под нашим правлением великие принципы свободы, справедливости и правосудия гарантированы;\n\nЕго Величество [SCOPE.sCharacter('emperor_of_india').GetPrimaryRoleTitle] дарует Индии равный политический и социальный статус с подданными, которые у неё есть в [SCOPE.sCountry('GBR_scope').GetNameNoFlag]. Содействие их счастью, приумножение их процветания и повышение их благосостояния — вот вечная цель и задача нашей империи."
 joi_flavor_raj.11.a: "Боже, храни Его Величество, кем является [SCOPE.sCharacter('emperor_of_india').GetPrimaryRoleTitle] [SCOPE.sCharacter('emperor_of_india').GetFirstName]!"
  #Тибетский договор
 joi_flavor_raj.12.t: "Англо-тибетский договор"
 joi_flavor_raj.12.d: "Представитель [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и другая сторона из-за Гималаев встретились в Калькутте и в конечном итоге решили заключить соглашение по вопросу о тибетской границе. Местное правительство Тибета выразило резкий протест против этого соглашения, хотя его и не пригласили на встречу."
 joi_flavor_raj.12.f: "Тибет и Индия ещё не заключили договор о торговле, переговорах и кочевьях. Теперь согласованы правила, которые прилагаются к предыдущему договору:\n\nТибетское правительство разрешает торговлю для всех торговцев [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], и Индия может направить своего представителя в Ятунг для наблюдения за торговлей; Сикким находится под протекторатом [SCOPE.sCountry('BIC_scope').GetNameNoFlag], и признаётся, что его внутренние и внешние дела должны вестись исключительно одним государством; этот министр и его чиновники не могут вести сношения с какой-либо другой страной, за исключением дел, разрешённых управляющим.\n\nАнглийские торговцы, торгующие в Ятунге, могут свободно передвигаться от границы до Ятунга без каких-либо препятствий и могут арендовать в Ятунге жильё и склады. [SCOPE.sCountry('CHI_scope').GetNameNoFlag] должен разрешить строительство жилья и складов, которые будут соответствовать своему назначению. Кроме того, будет создано одно общественное здание для проживания представителя, направляемого Индией по своему усмотрению, как указано в первой статье. Торговцы, прибывающие в Ятунг для торговли, независимо от того, с кем они торгуют, продают свои товары, покупают тибетские товары, обменивают деньги на товары или товары на товары, а также нанимают различных лошадей и носильщиков, должны вести справедливую торговлю в соответствии с местными обычаями без каких-либо дополнительных трудностей. Все эти торговцы, их семьи и товары должны быть защищены от вреда. Между границей и Ятунгом, в таких местах, как Рангит и Дацзюнь, уже построены дома, которые торговцы могут арендовать для ночлега за посуточную плату.\n\nПредставители обеих стран совместно согласовали вышеупомянутые девять статей о торговле, переговорах и кочевьях, а также три дополнительные статьи. Было оговорено, что они должны рассматриваться наравне с первоначальным договором, и их действенность будет такой же, как если бы они были дословно включены в первоначальный договор. Обе стороны подписали и скрепили договор для подтверждения."
 joi_flavor_raj.12.a: "Даже вершины Гималаев не могут остановить наш путь!"
 joi_flavor_raj.12.b: "Границы Британской империи проходят только по Гималаям!"
 joi_flavor_raj.12.c: "Проклятые англосаксонские варвары!"
 joi_flavor_raj.13.t: "Индо-тибетский договор"
 joi_flavor_raj.13.d: "Представитель [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и другая сторона из-за Гималаев встретились в Дели и в конечном итоге решили заключить соглашение по вопросу о тибетской границе. Местное правительство Тибета выразило резкий протест против этого соглашения, хотя его и не пригласили на встречу."
 joi_flavor_raj.13.f: "Пограничные вопросы Тибета должны быть чётко определены для долгосрочной стабильности. Поэтому Его Величество император, которым является [SCOPE.sCountry('CHI_scope').GetNameNoFlag], и индийская сторона намерены заключить договор по этому вопросу и назначили полномочных министров для переговоров. Полномочный министр Великой Цинской империи, заместитель командующего в Тибете, г-н Шэн, и полномочный министр, управляющий Индией, с титулами Первого класса и Третьей степени, совместно проверили свои полномочия, выданные им высочайшими указами, и сочли их надлежащими. Было согласовано восемь статей, которые излагаются ниже:\n\nГраница Тибета и Сиккима проходит по водоразделу, начиная от горы Чимочжи на границе с Бутаном до границы с Гуркхами, разделяя воды, текущие на юг в Тисту и её притоки в Сиккиме, от вод, текущих на север в Моту и её притоки в Тибете; Сикким находится под протекторатом Индии, и признаётся, что его внутренние и внешние дела должны вестись исключительно Индией; этот министр и его чиновники не могут вести сношения с какой-либо другой страной, за исключением дел, разрешённых управляющим.\n\nПосле того, как вышеуказанные статьи будут согласованы, они будут представлены на ратификацию обеим странам. Оригиналы договора будут обменены в Дели, и каждая сторона сохранит по одному экземпляру для подтверждения."
 joi_flavor_raj.13.a: "Славная победа."
 joi_flavor_raj.13.b: "Несущественное поражение."
  #Реформы в Ост-Индии
 joi_flavor_raj.14.t: "Реформы, которые проводит [ROOT.GetCountry.GetRuler.GetFullName]"
 joi_flavor_raj.14.d: "Под руководством [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] была проведена беспрецедентная по масштабу реформа, и страна становится восходящей звездой Южной Азии."
 joi_flavor_raj.14.f: "«Любой закон [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], если он в каком-либо отношении противоречит положениям любого парламентского акта, применимого к любому вопросу, затрагиваемому этим законом, или любого приказа или постановления, изданного на основании такого парламентского акта, или любого приказа или постановления, имеющего в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] силу и действие такого акта, должен, в пределах такого противоречия, быть абсолютно недействительным и не иметь силы».\n\n«Законодательный орган Индии, в пределах своей юрисдикции, всегда должен рассматриваться как имеющий полную власть учреждать суды, упразднять и воссоздавать их, изменять их конституцию и устанавливать правила отправления правосудия; каждый представительный законодательный орган, для территорий, находящихся под его юрисдикцией, всегда должен рассматриваться как имеющий полную власть издавать законы, касающиеся конституции, полномочий и процедуры такого законодательного органа».\n\n«Все законы, изданные указанным законодательным органом или лицом или лицами, которые в данное время составляют такой законодательный орган, при условии, что они получили согласие Тайного совета Его Величества, или получили согласие генерал-губернатора Индии от имени и по поручению Его Величества, будут считаться действительными для всех целей с момента их утверждения»."
 joi_flavor_raj.14.a: "Слава [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]!"
 joi_flavor_raj.15.t: "Закон об индийских советах"
 joi_flavor_raj.15.d: "Парламент [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] ведёт затяжные дебаты по законопроекту о правительстве, представленному [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')]. Этот законопроект, несомненно, определит политическую структуру Индии на долгие годы."
 joi_flavor_raj.15.f: "«Как уважаемые члены видят из документов, обеспечение выполнения обещания, данного два с половиной года назад [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] мусульманской общине, — обещания, которое впоследствии было повторено и подчёркнуто статс-секретарём по делам Индии во втором чтении законопроекта, — состояло в том, что если индийскому народу будут предоставлены политические привилегии, мусульманская община получит долю, соразмерную её численности, и долю, соразмерную её исторической и политической значимости.\n\n«Согласно этому законопроекту, так много дел оставляется на усмотрение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], что это своего рода личное правление. Я считаю, что если выбрать правильного человека, личное правление — это лучшее правление для Индии. Чем больше личного правления и чем меньше положений, устанавливаемых парламентом для правительства Индии, тем лучше будет для этой страны и народа Индии. А индусы, они хотят править этой страной вместо нас. Мы должны сказать, что мы будем продолжать править этой страной вместо них».\n\n«Вызывает сожаление, что члены этой Палаты выдают себя за защитников индусов или мусульман, не помня о том, что интересы и тех, и других почти идентичны. Индусы и мусульмане сами это признают. Мы много слышим о различиях, но очень мало — об узах единства, которые их связывают»»."
 joi_flavor_raj.15.a: "Право голоса и членство в совете должны быть строго ограничены нашими людьми."
 joi_flavor_raj.15.b: "Право голоса и членство в совете следует разделить с местной элитой."
 joi_flavor_raj.15.c: "Право на участие в политической жизни должно быть распространено на всех грамотных местных жителей!"
 joi_flavor_raj.15.e: "Давайте проведём полную реструктуризацию политической системы!"
 joi_flavor_raj.16.t: "Экономическая политика"
 joi_flavor_raj.16.d: "Под нашим усердным правлением экономика [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] преобразилась: мы отменили рабство и феодализм, на обширных территориях выросли частные предприятия и плантации, на субконтиненте началось бурное развитие."
 joi_flavor_raj.16.f: "«Голод, восстания и эпидемии — всё это было неотъемлемой частью жизни народа под властью [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Но мы решили всё это изменить».\n\n«Под управлением [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] мы освободили крестьян, от сдачи зерна, чтобы им не приходилось отдавать тот последний рис, что кормил их семьи. Мы отменили дискриминационную экономическую политику, чтобы привлечь инвестиции от #v $capitalists_only_icon$ капиталистов#!.»\n\n«Отменив эти суровые правила и заменив их управлением частными предприятиями, мы верим, что богатство скоро придёт к местному населению и к нашей великой стране, [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]»."
 joi_flavor_raj.16.a: "Мы должны продолжать продвигать индустриализацию Индии."
 joi_flavor_raj.16.b: "Развитие сельского хозяйства — ключ к процветанию субконтинента!"
 joi_flavor_raj.17.t: "Закон о реорганизации"
 joi_flavor_raj.17.d: "Разрозненные Бенгальская, Мадрасская и Бомбейская армии теперь реорганизованы в соответствии с положениями #variable Закона о реорганизации#!. Учреждён Генеральный штаб, и в армии внедряются современные военные ведомства."
 joi_flavor_raj.17.f: "«Любое лицо, подпадающее под действие настоящего Закона, в целях настоящего Закона считается находящимся под командованием командира своего корпуса или отряда и под командованием командира части, в которой оно в данный момент служит, или любого другого назначенного офицера, а если такой офицер не назначен, то под командованием командира этой части.\n\nВсякий раз, когда лица, подпадающие под действие настоящего Закона, служат под командованием командира любого военного формирования, которого центральное правительство считает не ниже командира бригады, центральное правительство может предписать, какой командир будет осуществлять в отношении этих лиц полномочия, предоставленные настоящим Законом командирам армий, корпусов, дивизий и бригад.\n\nКогда присягнувший будет признан годным к службе или завершит установленный испытательный срок, его командир приведёт его к присяге или подтверждению в установленной форме перед его корпусом или частью его корпуса или членами его отделения, или перед любым другим назначенным лицом»."
 joi_flavor_raj.17.a: "Корпуса, ранее подчинявшиеся различным командованиям, теперь будут подчиняться непосредственно командованию из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 joi_flavor_raj.17.b: "Командная структура и офицерский корпус нуждаются в полной реорганизации."
 joi_flavor_raj.17.c: "Давайте проведём полную реформу правил призыва!"
  #Индийское самоуправление
 joi_flavor_raj.18.t: "Просьба о самоуправлении к [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')]?"
 joi_flavor_raj.18.d: "Беспрерывные движения за самоуправление и переговоры подошли к концу. Сегодня генерал-губернатор из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] отправил в Лондон согласованный проект самоуправления."
 joi_flavor_raj.18.f: "«Экономика [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] рухнула. Доходы, получаемые с народа, совершенно несоразмерны нашим доходам. Наш средний доход составляет два пенса, и из тяжёлых налогов, которые мы платим, двадцать процентов приходится на земельный налог с крестьян, а три процента — на соляной налог, который больше всего бьёт по бедным».\n\n«Деревенские ремёсла, такие как ручное прядение, были уничтожены. Крестьяне как минимум четыре месяца в году сидят без дела и, из-за отсутствия ремесла, умственно отстают. В отличие от других стран, ничто не пришло на смену уничтоженным ремёслам».\n\n«Никакая реформа не дала народу реальной политической власти. Самые высокопоставленные из нас вынуждены подчиняться власти [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]. Нас лишили права свободно выражать своё мнение и свободно объединяться. Многие наши соотечественники вынуждены жить в изгнании и не могут вернуться на родину. Все административные таланты подавлены, и массы могут довольствоваться лишь незначительными должностями деревенских старост и писарей»."
 joi_flavor_raj.18.a: "Определённой степени автономии будет достаточно, чтобы удовлетворить индийский народ."
 joi_flavor_raj.18.b: "Мы должны потребовать от Вестминстера полной автономии!"
  #Укрепление власти
 joi_flavor_raj.19.t: "Вечная слава"
 joi_flavor_raj.19.d: "Великий Индийский субконтинент полностью перешёл под административное управление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Те князья и повстанцы, что некогда выступали против нас, либо преклонили колени, либо обратились в прах."
 joi_flavor_raj.19.f: "«Правление Империи держится на тесном сотрудничестве между [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] и индийскими князьями. В последние десятилетия мы обещали индийцам богатство и престиж, даровали им воинские звания и дворянские титулы. Их служба была вознаграждена. С другой стороны, завоевав их поддержку, мы смогли сохранить спокойствие на субконтиненте».\n\n«Пока мы правим Индией, мы — самая могущественная страна в мире. Если мы потеряем Индию, мы скатимся до уровня третьесортной державы. Только деспотическими методами мы можем выжать из Индии всё, что нужно Империи»."
 joi_flavor_raj.19.a: "Мы продолжим сохранять статус-кво."
 joi_flavor_raj.19.b: "Правление Уайтхолла на субконтиненте необходимо ещё больше укрепить."
 joi_flavor_raj.19.c: "Возможно, некоторые уступки в вопросе автономии будут более выгодны в долгосрочной перспективе."
  #Управление Гангом
 joi_flavor_raj.20.t: "Управление Гангом"
 joi_flavor_raj.20.d: "После долгих работ по ирригации, строительству каналов и гидрологическому регулированию, проведённых правительством [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], Ганг теперь способен в полной мере обеспечивать сельскохозяйственные нужды в соответствующих северных бассейнах, облегчая труд местного населения."
 joi_flavor_raj.20.f: "«Я пришёл к тебе, как сирота, взращённый любовью.\n\nЯ пришёл к тебе беззащитным, ты — даритель божественного покоя.\n\nЯ пришёл к тебе, как падший, ты — возвышающий всех.\n\nЯ пришёл к тебе, измученный болезнями, ты — совершенный целитель.\n\nЯ пришёл к тебе с иссохшим сердцем, ты — океан сладкого вина.\n\nЯ молю, чтобы моё тело осталось на твоих берегах, чтобы я пил твою воду, катался в твоих волнах.\n\nПомня твоё имя, вечно взирая на тебя."
 joi_flavor_raj.20.a: "Продолжим продвигать планы по развитию бассейна Ганга."
 joi_flavor_raj.20.b: "Нам нужно эффективно использовать здешние богатые трудовые ресурсы."
  #События независимости
 joi_flavor_raj.21.t: "Закон о независимости Индии"
 joi_flavor_raj.21.d: "После сотен лет сопротивления и переговоров [ROOT.GetCountry.GetNameNoFlag] наконец обрела независимость от [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]. Сотни лет британского правления подошли к концу. Ровно в полночь [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')] [ROOT.GetCountry.GetNameNoFlagNoFlag] станет независимым государством."
 joi_flavor_raj.21.f: "С установленной даты правительство Его Величества не несёт никакой ответственности за управление какими-либо территориями, которые непосредственно до этой даты входили в состав Британской Индии; сюзеренитет Его Величества над индийскими штатами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] прекращается, включая все договоры и соглашения, действовавшие на день принятия настоящего Закона между Его Величеством и правителями индийских штатов, все функции, осуществляемые Его Величеством в тот день в отношении индийских штатов, все обязательства Его Величества, существовавшие на ту дату по отношению к индийским штатам или их правителям; кроме того, любые договоры или соглашения, действовавшие на день принятия настоящего Закона между Его Величеством и любым лицом, имеющим власть в регионе, также прекращают своё действие.\n\nНи один закон, изданный законодательным органом нового государства, и никакое положение такого закона не могут быть признаны недействительными на том основании, что они противоречат положениям законов [SCOPE.sCountry('GBR_scope').GetNameNoFlag], настоящего Закона или любого существующего или будущего акта парламента [SCOPE.sCountry('GBR_scope').GetNameNoFlag] или любого приказа; полномочия законодательного органа включают право отменять или изменять любой такой акт, приказ, правило или постановление, если оно является частью законодательства нового государства.\n\nПриказы, изданные генерал-губернатором в соответствии с вышеупомянутыми положениями настоящего Закона, должны предусматривать разделение индийских вооружённых сил Его Величества между новыми государствами, а также командование и управление этими силами до завершения разделения; с установленной даты любой член индийских вооружённых сил Его Величества, если иное не предусмотрено любым приказом, изданным в соответствии с вышеупомянутыми положениями настоящего Закона, должен в отношении индийских вооружённых сил иметь те же полномочия командования и наказания, которые соответствуют его званию и должности, и подчиняться тем же образом законам, регулирующим соответствующие вооружённые силы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_raj.21.a: "Да здравствует Республика Индия!"
 joi_flavor_raj.21.b: "Индия примет конституционную монархию."
 joi_flavor_raj.22.t: "План, предложенный лордом, чья фамилия [ROOT.GetCountry.GetRuler.GetLastName]"
 joi_flavor_raj.22.d: "После сотен лет сопротивления и переговоров [ROOT.GetCountry.GetNameNoFlag] наконец обрела независимость от [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]. Сотни лет британского правления подошли к концу. Ровно в полночь [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')] [ROOT.GetCountry.GetNameNoFlagNoFlag] станет независимым государством."
 joi_flavor_raj.22.f: "С установленной даты правительство Его Величества не несёт никакой ответственности за управление какими-либо территориями, которые непосредственно до этой даты входили в состав Британской Индии; сюзеренитет Его Величества над индийскими штатами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] прекращается, включая все договоры и соглашения, действовавшие на день принятия настоящего Закона между Его Величеством и правителями индийских штатов, все функции, осуществляемые Его Величеством в тот день в отношении индийских штатов, все обязательства Его Величества, существовавшие на ту дату по отношению к индийским штатам или их правителям; кроме того, любые договоры или соглашения, действовавшие на день принятия настоящего Закона между Его Величеством и любым лицом, имеющим власть в регионе, также прекращают своё действие.\n\nНи один закон, изданный законодательным органом нового государства, и никакое положение такого закона не могут быть признаны недействительными на том основании, что они противоречат положениям законов [SCOPE.sCountry('GBR_scope').GetNameNoFlag], настоящего Закона или любого существующего или будущего акта парламента [SCOPE.sCountry('GBR_scope').GetNameNoFlag] или любого приказа; полномочия законодательного органа включают право отменять или изменять любой такой акт, приказ, правило или постановление, если оно является частью законодательства нового государства.\n\nПриказы, изданные генерал-губернатором в соответствии с вышеупомянутыми положениями настоящего Закона, должны предусматривать разделение индийских вооружённых сил Его Величества между новыми государствами, а также командование и управление этими силами до завершения разделения; с установленной даты любой член индийских вооружённых сил Его Величества, если иное не предусмотрено любым приказом, изданным в соответствии с вышеупомянутыми положениями настоящего Закона, должен в отношении индийских вооружённых сил иметь те же полномочия командования и наказания, которые соответствуют его званию и должности, и подчиняться тем же образом законам, регулирующим соответствующие вооружённые силы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_raj.22.a: "Заявить о прекращении любых связей с монархом, которым является [SCOPE.sCountry('GBR_scope').GetNameNoFlag]."
 joi_flavor_raj.22.b: "Мы по-прежнему признаём монарха [SCOPE.sCountry('GBR_scope').GetNameNoFlag] главой наших двух государств."
  #Индия требует автономии
 joi_flavor_raj.23.t: "[SCOPE.sCountry('BIC_scope').GetNameNoFlag] требует автономии"
 joi_flavor_raj.23.d: "Генерал-губернатор [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] представил в парламент петицию об автономии, подписанную совместно местными партиями, в надежде получить одобрение, которое может дать [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и предоставить Индии автономию в составе империи."
 joi_flavor_raj.23.f: "«Уважаемые члены парламента вспомнят, что Ост-Индская компания получила права на три самых богатых провинции Индии именно от мусульманского монарха. Высшее влияние этого мусульманского монарха было признано Ост-Индской компанией, и многие индуистские вожди очень гордятся титулами, дарованными им мусульманскими королями; политическое значение всего этого неоспоримо».\n\n«Между индусами и мусульманами случались беспорядки и ссоры, в этом нет ничего удивительного. Но когда вы видите, что эта страна огромна, и миллионы мусульман и индусов живут в самых дружественных и сердечных отношениях, их отношения также самые тёплые и близкие. Поэтому парламент не должен делать вывод, что эти вспышки являются типичным проявлением нормальной ситуации между индусами и мусульманами. С тех пор как [ROOT.GetCountry.GetNameNoFlag] установила отношения с Индией, единство Индии развивалось и будет развиваться в будущем»."
 joi_flavor_raj.23.a: "Абсурд! [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] является и в будущем останется владельцеи Индии!"
 joi_flavor_raj.23.b: "Это требование уместно. Пришло время предоставить автономию этим жаждущим свободы детям."
 joi_flavor_raj.24.t: "[SCOPE.sCountry('BIC_scope').GetNameNoFlag] требует широкой автономии"
 joi_flavor_raj.24.d: "Генерал-губернатор [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] представил в парламент петицию об автономии, подписанную совместно местными партиями, в надежде получить одобрение, которое может дать [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и предоставить Индии автономию в составе империи."
 joi_flavor_raj.24.f: "«Уважаемые члены парламента вспомнят, что Ост-Индская компания получила права на три самых богатых провинции Индии именно от мусульманского монарха. Высшее влияние этого мусульманского монарха было признано Ост-Индской компанией, и многие индуистские вожди очень гордятся титулами, дарованными им мусульманскими королями; политическое значение всего этого неоспоримо».\n\n«Между индусами и мусульманами случались беспорядки и ссоры, в этом нет ничего удивительного. Но когда вы видите, что эта страна огромна, и миллионы мусульман и индусов живут в самых дружественных и сердечных отношениях, их отношения также самые тёплые и близкие. Поэтому парламент не должен делать вывод, что эти вспышки являются типичным проявлением нормальной ситуации между индусами и мусульманами. С тех пор как [ROOT.GetCountry.GetNameNoFlag] установила отношения с Индией, единство Индии развивалось и будет развиваться в будущем»."
 joi_flavor_raj.24.a: "Абсурд! [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] является и в будущем останется владельцеи Индии!"
 joi_flavor_raj.24.b: "Хотя это, возможно, несколько выходит за рамки ожиданий Уайтхолла, их предложение должно быть серьёзно рассмотрено."
  #События индийской промышленной линии
 joi_flavor_raj.25.t: "Импортозамещение?"
 joi_flavor_raj.25.d: "Разногласия по поводу торговой политики Индии дошли до стола, за которым сидит [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Обе фракции теперь ожидают окончательного решения, которое примет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_raj.25.f: "«При прочих равных условиях более высокие темпы роста производства позволят отрасли достичь более высоких темпов технического прогресса, поскольку она будет больше инвестировать; и создать ситуацию, в которой входящие в неё предприятия смогут лучше использовать эффект масштаба».\n\n«Все крупные развитые страны, включая [SCOPE.sCountry('GBR_scope').GetNameNoFlag], использовали интервенционистскую экономическую политику для продвижения индустриализации и защиты своих предприятий, пока те не достигли уровня развития, позволяющего конкурировать на мировом рынке. Риторика свободного рынка, которую эти страны применяют к другим, преследует две цели: открыть рынки для своей продукции и помешать им использовать те же стратегии развития, которые применялись развитыми странами при индустриализации»."
 joi_flavor_raj.25.a: "Индия усилит ориентацию на импорт."
 joi_flavor_raj.25.b: "Индия переориентируется на экспорт."
  #Индийское самоуправление
 joi_flavor_raj.26.t: "Закон об индийском самоуправлении"
 joi_flavor_raj.26.d: "После долгих реформ и переговоров с местными индийскими лидерами парламент [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] принял закон, преобразующий бывшую Британскую Индию в Доминион Индия."
 joi_flavor_raj.26.f: "«Ввиду того, что парламент провозгласил своей политикой предоставление народу [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] всё большего участия в различных отраслях индийской администрации и постепенное развитие институтов самоуправления с целью постепенного достижения ответственного правительства в Британской Индии как неотъемлемой части империи; и ввиду того, что одновременно с постепенным развитием институтов самоуправления в индийских провинциях необходимо предоставить этим провинциям максимальную степень независимости в провинциальных делах, совместимую с надлежащим исполнением правительством Индии своих собственных обязанностей: поэтому Его Величество [SCOPE.sCharacter('british_indian_ruler').GetPrimaryRoleTitle], по совету и с согласия духовных и светских лордов и общин, собранных в настоящем парламенте, и их властью, постановляет следующее:\n\nВ соответствии с функциями правительства, разделение субъектов на центральные и провинциальные, с целью разграничения функций местных органов власти и местных законодательных органов от функций генерал-губернатора в совете и индийского законодательного органа, делегирование полномочий по провинциальным делам местным органам власти и распределение доходов или других средств местным органам власти;\n\nС санкции генерал-губернатора в совете, в удобной мере осуществлять полномочия местных правительственных учреждений в отношении центральных дел и определять финансовое положение этих учреждений, а также передавать провинциальных подданных под управление генерал-губернатора и министров, назначенных в соответствии с настоящим Законом, и распределять для такого управления доходы или средства.\n\nЛюбой местный законодательный орган провинции имеет право, в соответствии с положениями настоящего Закона, издавать законы, чтобы обеспечивать мир и благоустройство на территориях, составляющих в данное время эту провинцию; и любой местный законодательный орган провинции может, без ущерба для законов, принятых в [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_PP')], отменять или изменять для этой провинции любой закон, изданный до или после вступления в силу настоящего Закона любым органом власти в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], кроме этого местного законодательного органа»."
 joi_flavor_raj.26.a: "Да здравствует славная Индия!"
 joi_flavor_raj.26.b: "Великая победа индийского народа!"
  #Запрос на реформу
 joi_flavor_raj.27.t: "Правительство Индии запрашивает правительственную реформу"
 joi_flavor_raj.27.d: "Под давлением индийских националистов и местных князей правительство [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')] просит нас одобрить проведение демократических выборов в индийском правительстве."
 joi_flavor_raj.27.f: "Эта просьба вызвала у некоторых в Палате лордов насмешку.\n«Чтобы голосовать, — сказал один аристократ, — нужно уметь читать и писать. Как при плачевном уровне грамотности в индийском правительстве люди смогут отличить "Раджа" от "Рама"?»"
 joi_flavor_raj.27.a: "Индийцы неспособны создать ответственное правительство."
 joi_flavor_raj.27.b: "Это необходимый шаг для стабилизации нашего режима."
 joi_flavor_raj.27.c: "Мы сами разработаем проект реформы и прикажем его реализовать."
  #Распад Индии
 joi_flavor_raj.28.t: "Конец британского правления?"
 joi_flavor_raj.28.d: "Без руля и без поддержки со стороны колониальной метрополии, [ROOT.GetCountry.GetNameNoFlag] находится на грани распада. Похоже, #tooltippable_name [SCOPE.sCulture('british_culture').GetAdjective|l]ому#! правлению пришёл конец."
 joi_flavor_raj.28.f: "«Оставить наш пост? Какой пост, какая армия? Через несколько часов сюда ворвутся либо индийцы, либо пожар, либо и то, и другое. Хватит жаловаться, бери тот мешок. Бери всё, что можно унести и что имеет ценность. Я позабочусь о том, чтобы мы все одним махом сбежали в Лондон!»"
 joi_flavor_raj.28.a: "Это падение цивилизации и конец империи."