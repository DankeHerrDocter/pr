l_russian:
  #
  company_equity: "Акции Ост-Индской компании"
  company_equity_reason: "#variable Доля Ост-Индской компании#!: #variable [ROOT.GetCountry.MakeScope.Var('company_equity_bic_progress').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],bic_company_equity_var_tooltip [ROOT.GetCountry.MakeScope.Var('bic_equity_progress_next').GetValue|1+=]#!)\n#variable Доля британского правительства#!: #variable [ROOT.GetCountry.MakeScope.Var('company_equity_gbr_progress').GetValue|0]#! (#tooltippable;tooltip:[ROOT.GetCountry.GetTooltipTag],gbr_company_equity_var_tooltip [ROOT.GetCountry.MakeScope.Var('gbr_equity_progress_next').GetValue|1+=]#!)\n#variable Долговые обязательства перед Банком Англии позволяют британскому правительству ежемесячно конвертировать часть долга в акции Компании. Чем выше требования по выплатам, тем большую долю получает Парламент.#!\n\nСо времён принятия #yellow #B Акта о хартии 1813 года#!#! в совете директоров на Лиденхолл-стрит не утихают споры о будущем [SCOPE.sCountry('BIC_scope').GetAltNameNoFlag('RU_CL_RP')]. Джентльмены из лондонского Вест-Энда утратили инвестиционный азарт времён #bold королевы Елизаветы#!, а многие банки и брокеры уже поставили крест на акциях [Concept('concept_company', 'Компании')]. Ситуация лишь усугубилась после #V #yellow Акта о хартии 1833 года#!#!, ударившего по привилегиям Компании. Пока частные инвесторы в панике сбрасывают индийские активы, Парламент уполномочил чиновников Уайтхолла скупать их по бросовым ценам, постепенно превращая #I Правительство Его Величества#! в ключевого акционера.\n\nНа сегодняшний день частные инвесторы #bold всё ещё удерживают контрольный пакет акций [Concept('concept_chartered_company', 'компании')]#!, а совет директоров формально сохраняет суверенитет над [Concept('concept_indian_subcontinent', 'Индийским субконтинентом')]. Однако финансовый крах Ост-Индии развязывает руки Парламенту: используя долги как рычаг давления, Лондон систематически отчуждает акции и готовит почву для установления прямого правления короны [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] над индийскими землями.\n\nВпрочем, надежда ещё есть: если [Concept('concept_company', 'Компания')] сумеет #bold выбраться из долговой ямы#! и #bold вовремя выкупить акции у Парламента#!, даже Его Величеству придется законодательно подтвердить #V бессрочные привилегии#! Компании."
  bic_company_equity_var_tooltip: "#bold Ежемесячное изменение по причинам, не связанным с долгом:#!\n#variable Передача акций (национализация Британией, выкуп или продажа Ост-Индской компанией) приносит [Country.MakeScope.Var('bic_equity_progress_from_buttons').GetValue|+=]#!\n\n#bold Ежемесячное уменьшение по причинам, связанным с долгом:#!\n#variable Текущий уровень требований Банка Англии приносит [Country.MakeScope.Var('bic_equity_progress_from_debts').GetValue|+=]#!"
  gbr_company_equity_var_tooltip: "#bold Ежемесячное изменение по причинам, не связанным с долгом:#!\n#variable Передача акций (национализация Британией, выкуп или продажа Ост-Индской компанией) приносит [Country.MakeScope.Var('gbr_equity_progress_from_buttons').GetValue|+=]#!\n\n#bold Ежемесячное увеличение по причинам, связанным с долгом:#!\n#variable Текущий уровень требований Банка Англии приносит [Country.MakeScope.Var('gbr_equity_progress_from_debts').GetValue|+=]#!"
  company_equity_progress_bar_sell_balance: "Закон о выкупе долгов Компании"
  company_equity_progress_bar_name: "Распределение акций"
  company_equity_progress_bar_balance: "Изменение доли акций британского правительства"
  company_equity_progress_bar_gbr_desc: "#variable Доля британского правительства#!"
  company_equity_progress_bar_bic_desc: "#variable Доля Ост-Индской компании#!"
  company_equity_gbr_complete_tt: "Принят #bold Закон о выкупе дивидендов#!, Компания полностью национализирована."
  company_equity_bic_complete_tt: "Доля акций Компании достигла 100%, она полностью приватизирована."
  company_equity_gbr_fail_tt: "Все акции, принадлежавшие правительству, были полностью выкуплены Компанией."
  company_equity_bic_fail_tt: "Парламент принял #bold Закон о выкупе дивидендов#!, Компания национализирована."
  company_equity_bic_on_fail_tt: "Наш сюзерен, [SCOPE.sCountry('GBR_scope').GetNameNoFlag], скорее всего, #bold полностью прекратит правление Компании\n и перейдёт к прямому назначению [Concept('$RULER_TITLE_GOVERNOR_GENERAL$', 'генерал-губернаторов')]#, что означает, что мы станем [Concept('concept_colony_subject', 'колонией')]."
  company_equity_bic_on_fail_1_tt: "[SCOPE.sCountry('BIC_scope').GetNameNoFlag] получит большую автономию после получения полного контроля над акциями, а Уайтхолл и Парламент #bold больше не смогут реорганизовать [Concept('concept_indian_subcontinent', 'Индийский субконтинент')] экономическими методами. Это означает, что до тех пор, пока не появятся другие законные основания, Компания сохранит свой статус [Concept('concept_chartered_company', 'чартерной компании')]#!."
  status_company_equity_bic: "#P #B Доля акций Компании в настоящее время превышает государственную#!#!"
  status_company_equity_gbr: "#U #B Государственная доля акций в настоящее время превышает долю Компании#!#!"
  company_equity_redeem_button: "Выкупить акции Компании"
  company_equity_redeem_button_desc: "Акции Компании принадлежат не только совету директоров и частным акционерам, но и Уайтхоллу в виде государственной доли. Однако, согласно «Акту об Ост-Индской компании 1697 года», совет директоров может выкупить государственные акции у правительства. Разумеется, за это Компании придётся заплатить."
  company_equity_redeem_button_1_tt: "Компания погасила все #bold долговые обязательства перед Банком Англии.#!"
  company_equity_redeem_button_2_tt: "У британского правительства есть акции, доступные для выкупа."
  company_equity_stop_redeem_button: "Прекратить выкуп акций"
  company_equity_stop_redeem_button_desc: "Экономика Компании временно не позволяет продолжать выкуп акций. Лучше на время остановиться. #bold (Когда экономика Компании окажется на грани краха, выкуп акций будет принудительно прекращён!)#!"
  company_equity_selling_shares_button: "Продать акции Компании"
  company_equity_selling_shares_button_desc: "Финансовые перспективы Компании могут быть довольно мрачными. Возможно, стоит продать часть акций Уайтхоллу, чтобы решить финансовые трудности."
  company_equity_selling_shares_tt: "У Компании ещё есть акции, которые можно продать."
  commonwealth_stop_selling_shares_button: "Прекратить продажу акций"
  commonwealth_stop_selling_shares_button_desc: "Финансовая ситуация, скорее всего, постепенно улучшится. Давайте прекратим эту краткосрочную меру по продаже акций."
  commonwealth_nationalize_company_button: "Национализировать акции Компании"
  commonwealth_nationalize_company_button_desc: "Ост-Индская компания погрязла в коррупции. Уайтхолл предлагает Парламенту выделить средства для постепенной национализации акций Компании, чтобы в конечном итоге законным путём включить её в состав правительственной администрации, что будет более выгодно для имперского правления в Индии."
  commonwealth_nationalize_company_button_tt: "У Компании всё ещё есть акции, которые можно национализировать."
  commonwealth_stop_nationalize_company_button: "Прекратить выкуп акций"
  commonwealth_stop_nationalize_company_button_desc: "Казначейство жалуется на огромные расходы, связанные с выкупом акций. Возможно, Парламенту стоит рассмотреть вопрос о временном прекращении этого специального ассигнования."
  commonwealth_end_company_rule_button: "Принять «Закон о выкупе дивидендов»"
  commonwealth_end_company_rule_button_desc: "В сложившейся ситуации целесообразно принять меры по выкупу дивидендов по акциям Ост-Индской компании. Уайтхолл должен направить Ост-Индской компании письменное уведомление о намерении Парламента выкупить дивиденды по её акциям в порядке, установленном данным законом."
  commonwealth_end_company_rule_button_1_tt: "Доля акций Компании, принадлежащая государству, превысила 75% от общего числа."
  commonwealth_end_company_rule_button_2_tt: "Закон ещё не был принят."
  commonwealth_end_company_rule_button_3_tt: "#bold «Закон о выкупе дивидендов»#! будет обсуждаться в Парламенте и вступит в силу; это решит проблему Ост-Индской компании #bold в пользу Уайтхолла.#!"
  je_joi_avert_sepoy_mutiny_tt_1: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #bold Погашение долгов Компании#!"
  je_joi_avert_sepoy_mutiny_tt_2: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #bold Объединение [Concept('concept_indian_subcontinent', 'Индийского субконтинента')]#!"
  company_equity_progress_huge_british_debt: "Долг Компании: значительные британские кредиты"
  company_equity_progress_medium_british_debt: "Долг Компании: умеренные британские кредиты"
  company_equity_progress_little_british_debt: "Долг Компании: небольшие британские кредиты"
  company_equity_progress_british_nationalize_payment: "Британское правительство финансирует покупку акций Ост-Индской компании"
  company_equity_progress_bic_selling_shares_payment: "Компания продаёт свои акции Ост-Индской компании"
  company_equity_progress_raj_payment_to_gbr: "Компания выкупает акции Ост-Индской компании, принадлежащие британскому правительству"
  #
  bic_company_debts: "Погашение долгов Компании"
  bic_company_debts_reason: "#bold Со второй половины XVIII века#! финансовое положение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] неуклонно ухудшалось. Хотя Компания становилась всё более смелой и амбициозной в завоевании непокорных государств, становилось всё очевиднее, что она не в состоянии справиться с огромными расходами на управление захваченными территориями: военные и административные издержки росли, #bold прибыльная атлантическая торговля#! приходила в упадок из-за #variable американской революции#!. В итоге пришлось обратиться за финансовой помощью к нашему сюзерену, [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')], что привело к #bold первому крупному долгу#! за всю историю Ост-Индской компании.\n\nОднако наше плачевное финансовое состояние не улучшилось благодаря субсидиям Банка Англии. Несмотря на то что длительная политика агрессии позволила нам контролировать почти всю Индию и превратить некогда могущественных правителей #variable империи Великих Моголов#! в вассалов Калькутты, военные расходы поставили экономику [Concept('concept_chartered_company', 'чартерной компании')] на грань краха. Это вынудило акционеров лоббировать в Парламенте принятие #bold «Акта о острове Святой Елены 1813 года»#! в обмен на монопольные права.\n\n#bold Наполеоновские войны#! привели к упадку европейской торговли Компании и дальнейшему расширению её владений. Даже несмотря на значительную прибыль от торговли опиумом с [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')], совету директоров пришлось передать Уайтхоллу все коммерческие и административные полномочия [Concept('concept_company', 'Компании')], обменивая монополию на Дальнем Востоке на всё новые и новые огромные кредиты от Парламента для стабилизации панических настроений на Лондонской фондовой бирже.\n\nСегодня огромные долги стали неподъёмным бременем для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Та малая прибыль, что остаётся у Компании, уходит на выплату процентов Банку Англии. В то же время Парламент, используя наши долги как рычаг давления, пытается дёшево скупить у акционеров акции, которые рынок уже считает «бесперспективными», и национализировать их, чтобы законным путём подчинить Компанию прямому контролю Уайтхолла. #variable Если мы не сможем вовремя погасить долги, совет директоров будет вынужден полностью заложить свои акции Банку Англии#!."
  status_bic_company_debts_huge: "Текущая сумма долга: #N #B Огромная#!#!"
  status_bic_company_debts_medium: "Текущая сумма долга: #O #B Средняя#!#!"
  status_bic_company_debts_little: "Текущая сумма долга: #P #B Небольшая#!#!"
  bic_company_debts_1_button: "Погасить часть долга"
  bic_company_debts_1_button_desc: "Совет директоров Компании выплатит часть долга #bold Банку Англии#!, что, несомненно, укрепит доверие инвесторов к нам."
  bic_company_debts_2_button: "Запросить отсрочку по долгу"
  bic_company_debts_2_button_desc: "Долговое бремя для Компании слишком тяжело, но королевская хартия всё ещё в силе, и Парламент не может просто так отобрать нашу собственность в счёт долга. Возможно, стоит вежливо и резонно донести это до уважаемых членов Парламента, чтобы они, исходя из интересов развития империи в Индии, убедили Банк Англии временно отсрочить часть наших процентных выплат."
  bic_company_debts_2_button_tt: "Парламент ещё не принимал специального закона об отсрочке долгов Компании."
  bic_company_debts_3_button: "Ввести дополнительный подушный налог"
  bic_company_debts_3_button_desc: "Богатства Индии огромны, так почему бы нам не прибегнуть к «небольшим» хитростям, чтобы взять себе «ещё чуть-чуть»? Нынешние налоговые законы, без сомнения, слишком мягки. Для поддержания финансовой стабильности Компании совет директоров должен поручить генерал-губернаторскому комитету ввести дополнительные налоги."
  bic_company_debts_4_button: "Увеличить годовую чеканку монет"
  bic_company_debts_4_button_desc: "Королевская хартия дарует Компании право чеканить монету в Индии. Столкнувшись с нынешним финансовым давлением, нам, возможно, придётся пойти на компромисс, чтобы быстро получить деньги. Однако этот опрометчивый шаг, без сомнения, приведёт к долгосрочным экономическим потерям."
  raj_event_5_tt: "Нам придётся продать все оставшиеся акции Компании, чтобы погасить долги."
  #
  bic_english_education_act: "Закон об образовании на английском языке"
  bic_english_education_act_reason: "#variable Джентльмены из Комитета народного просвещения#!#bold считают#!, что местные диалекты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] не содержат никакой ценной информации, а также чрезвычайно бедны и грубы. Нам трудно перевести на эти диалекты какие-либо значимые произведения, а ценность исторических сведений, собранных из всех книг на санскрите, может быть менее значимой, чем информация в самых незначительных учебниках подготовительных школ [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')].\n\nДля нужд управления мы должны научить этих людей, которые в настоящее время не могут получить современное образование на родном языке, иностранному языку, чтобы местные жители могли получить доступ ко всему огромному интеллектуальному богатству, созданному и накопленному самыми умными нациями на земле за девяносто поколений. Заодно мы воспитаем партию #bold индийских подданных с современным мышлением#: #variable и наш язык — английский — является единственным верным выбором#!.\n\nБолее того, на #variable [Concept('concept_indian_subcontinent', 'Индийском субконтиненте')]#! #variable английский язык#! является языком правящего класса, [Concept(GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName, 'промышленников')], [Concept('government', 'правительства')] и [Concept(GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName, 'интеллигенции')], а также языком нашей империи, раскинувшейся по всему миру, и связи Индии в имперской системе становятся всё теснее. Поэтому, рассматриваем ли мы внутреннюю ценность нашего языка или особые обстоятельства этого [Concept('country', 'государства')], мы видим самые веские причины, по которым из всех иностранных языков #variable английский#! наиболее полезен для наших индийских подданных.\n\nЧтобы обеспечить распространение нашей блистательной цивилизации и передачу надёжного правительства из поколения в поколение, использование #variable английского языка#! должно быть популяризировано на всём [Concept('concept_indian_subcontinent', 'Индийском субконтиненте')]."
  #
  unified_subcontinent: "Объединение Индии"
  unified_subcontinent_reason: "Хотя в момент своего основания, получив #bold королевскую хартию от Якова I#!, [ROOT.GetCountry.GetNameNoFlag] не помышляла о завоевании столь обширных земель военными средствами и довольствовалась коммерческими интересами в Бенгалии и Мадрасе, с #variable распадом империи Великих Моголов#! и #variable восстанием маратхов#!, [Concept('concept_company', 'Компания')] всё же, при поддержке [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], воспользовалась возможностью завоевать большую часть [Concept('concept_indian_subcontinent', 'Индийского субконтинента')], учредив несколько генерал-губернаторств и подчинив высокоавтономные #variable туземные княжества#! правительству.\n\nСегодня, несмотря на то что #bold почти вся#! #variable Индия#! находится под нашим управлением, границы существующих территорий по-прежнему являются источником постоянного риска. Нас окружают либо неупорядоченные государства, либо нецивилизованные племена, которыми может править кто угодно; либо амбициозные [Concept('country', 'страны')], которые то сближаются с нами, то отдаляются и даже пытаются поднять восстание.\n\nОни в любой момент могут угрожать целостности нашей территории. Для обеспечения безопасности наших ключевых владений #bold местные государства, всё ещё находящиеся вне нашего контроля#!, должны быть завоёваны, а любые #bold признаки народного сопротивления#! должны быть подавлены, прежде чем они выйдут из-под контроля."
  unified_subcontinent_complete_tt: "Завершено 4 [Concept('concept_journal_entry', 'Записи в дневнике')] из #variable Объединения Индии#!"
  unified_subcontinent_status: "#bold Завоевать оставшиеся местные государства на [Concept('concept_indian_subcontinent', 'Индийском субконтиненте')]!#!"
  bic_conqueror_burma: "Объединение Индии: Завоевание Бирмы"
  bic_conqueror_burma_reason: "«Вопрос не в том, сколько вы нам уступите, а в том, сколько мы вам вернём... Мы уведомим всех туземцев вашей страны, что территории, ранее управляемые вашим монархом, больше не будут находиться под его властью, а станут частью владений Его Величества, нашего [SCOPE.sCharacter('british_ruler').GetPrimaryRoleTitle|l]. И если будет на то воля Его Величества, то [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и чиновники, ответственные за ваше управление, будут назначаться исключительно нами... А вам не останется ничего, кроме как смириться».\n\nПосле #bold договора в Яндабо в 1826 году#! [SCOPE.sCountry('BUR_scope').GetNameNoFlag] уступила Аракан, который был передан под наше управление.\n\nОднако завоевание [SCOPE.sCountry('BUR_scope').GetAltNameNoFlag('RU_CL_RP')] ещё не завершено. [SCOPE.sCountry('GBR_scope').GetNameNoFlag] поручила нам найти повод для вторжения в Бирму, чтобы полностью подчинить её и обеспечить интересы империи в Индокитае."
  bic_conqueror_hinde: "Объединение Индии: Завоевание Синда"
  bic_conqueror_hinde_reason: "#variable Династия Талпур#!, правящая в [SCOPE.sCountry('SIN_scope').GetCustom('RU_SL_PP')], набирает силу со времён победы над #variable афганским#! #bold султаном Шах Шуджой в 1832 году#!. Несмотря на то что два брата правят разделённым султанатом, Талпуры по-прежнему вынашивают амбициозные планы в отношении многих наших туземных княжеств в Гуджарате.\n\nТем временем, местный правитель Карачи, находясь под давлением северного двора, уже связался с нами в надежде, что мы как можно скорее направим войска в [SCOPE.sCountry('SIN_scope').GetCustom('RU_SL_VP')] и сокрушим этот жестокий султанат."
  bic_conqueror_panjap: "Объединение Индии: Завоевание Пенджаба"
  bic_conqueror_panjap_reason: "Прошло много времени с тех пор, как мы в #variable Войне с маратхами 1803 года#! продвинули границу Индии до #bold Пенджабских холмов#!. За это время плодородные земли долины Ганга принесли нам немало богатств; долина Инда же, с её природными условиями, является настоящей #bold житницей Индии#!.\n\nХотя [SCOPE.sCountry('PAN_scope').GetNameNoFlag], занимающ[SCOPE.sCountry('PAN_scope').GetAltNameNoFormatting('RU_CL_END')]ий эти земли, и располагает многочисленной армией, она плохо обучена. Более того, до нас дошли слухи, что их махараджа стар и болен, а дворцовые интриги обостряются. Лишившись сильного правителя, они #bold не представляют серьёзной угрозы#!.\n\nЭто прекрасная возможность для войск [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] войти в Пенджаб. Так протрубим же сигнал к наступлению на Сирхинд!"
  bic_conqueror_afk: "Объединение Индии: Поход на Пуштун"
  bic_conqueror_afk_reason: "Бедные горы #bold Белуджистана#! не представляют большого экономического интереса для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], однако их #bold стратегическое значение у врат Индии#! нельзя игнорировать. Ходят слухи, что султаны #variable Афганистана#! планируют вернуть земли Белуджистана, некогда входившие в состав так называемой #variable «Дурранийской империи»#!. Мы ни в коем случае не можем уступить им эту территорию и должны силой заставить калатского хана подчиниться нам!"
  bic_conqueror_all_afk: "Объединение Афганистана"
  bic_conqueror_all_afk_reason: "С момента распада #variable Дурранийской империи#!, некогда правившей Афганистаном, Белуджистаном и Пенджабом, #bold афганские султаны и ханы#! разделили эту огромную империю и провозгласили себя её законными наследниками. Однако на самом деле потомки #variable династии Садозай#! попали в наши руки после завоевания Калата, а Пенджаб уже признал нашу власть. Хотя эти султаны ещё не осознали этого, именно мы являемся державой, оказывающей наибольшее влияние на Афганистан.\n\nНесмотря на то что Уайтхолл и [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] не интересуются бедными и бесполезными горами #variable Афганистана#!, завоевание Средней Азии [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_TP')] может серьёзно угрожать безопасности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Чтобы защитить границы наших ключевых владений, возможно, стоит использовать дурранийские претензии и вступить в борьбу за объединение Афганистана. Это может #bold заставить султанов объединиться под властью покорного нам режима#! — для этого нам нужно от их имени отвоевать бывшую [Concept('capital_state', 'столичную область')] #variable Дурранийской империи#!: #variable Кабул#!."
  bic_strengthening_tibet: "Укрепление границ с Тибетом"
  bic_strengthening_tibet_reason: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] считает, что пограничные споры у #variable подножия Гималаев#! стали серьёзной проблемой. Хотя граничащие с нами территории [SCOPE.sCountry('TIB_scope').GetAltNameNoFlag('RU_CL_RP')] в настоящее время находятся под контролем [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')], страны, не представляющей угрозы для Индии, силы [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], которые жадно поглядывают в эту сторону, в любой момент могут вторгнуться сюда с северо-запада и из Средней Азии. А слабые китайские правители, похоже, совершенно не способны оказать эффективное сопротивление русским войскам. Если Тибет перейдёт в другие руки, [SCOPE.sCountry('RUS_scope').GetNameNoFlag] получит прямой сухопутный доступ для вторжения в Пенджаб и Ассам.\n\nВ то же время, многие гималайские #variable туземные княжества#! по-прежнему находятся вне нашего контроля. Такие государства, как [SCOPE.sCountry('NEP_scope').GetNameNoFlag] и [SCOPE.sCountry('BHU_scope').GetNameNoFlag], не реагируют на наши знаки внимания. Возможно, только прямая победа над китайскими правителями сможет #bold заставить их подчиниться#!.\n\nДля безопасности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] мы должны нанести упреждающий удар и создать надёжную оборонительную линию у #variable подножия Гималаев#!, опередив любого врага, который может угрожать нашим северным границам."
  bic_strengthening_tibet_possible_tt: "Завершено 4 [Concept('concept_journal_entry', 'Записи в дневнике')] из #variable Объединения Индии#!"
  bic_strengthening_tibet_complete_sik_tt: "Сикким аннексирован."
  bic_strengthening_tibet_fail_tt: "Недавно мы потерпели поражение в войне с Тибетом."
  bic_strengthening_tibet_complete_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #variable Экспедиция в Тибет#!"
  uneasy_raj_finish_unify_subcont_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V Объединение Индии#!"
  #
  reform_east_india: "Реформирование Ост-Индии"
  reform_east_india_reason: "Правление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Индии становится огромным бременем как для #variable бюрократии, так и для казны#!. Мы считали себя милосердными наставниками для отсталой Индии, однако местные жители не приветствуют нашу щедрую политику социальных реформ. Существующая военная система слишком раздроблена и в некотором смысле стала #bold рассадником мятежных настроений среди индийских солдат.#!\n\nКроме того, по мере роста продаж промышленных товаров из [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] на нашем рынке и увеличения спроса на сырьё экономика Индии оказывается под всё большим давлением. Очевидно, что дальнейшее развитие Ост-Индии на основе устаревших политик земельного феодализма и рабства #bold более невозможно#!.\n\nМы должны коренным образом #variable реформировать существующую экономическую и политическую систему#!, создать адекватную систему самоуправления и #bold дальше развивать индийские провинции#! через #variable частное предпринимательство и инвестиции#!."
  reform_east_india_possible_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #variable Погашение долгов Компании#!"
  reform_east_india_complete_tt: "Завершено 3 [Concept('concept_journal_entry', 'Записи в дневнике')] из #variable Реформирования Ост-Индии#!"
  reform_east_india_status: "#bold #U Модернизация Индии#!#!"
  bic_reform_government: "Реформирование Ост-Индии: реорганизация колониального правительства"
  bic_reform_government_reason: "Набирающие силу #bold националисты#! #variable Индии#!, заручившись поддержкой [Concept(GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName, 'мелкой буржуазии')] и [Concept(GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName, 'сельских жителей')], требуют от нас реорганизовать существующее колониальное [Concept('government', 'правительство')], где диктаторскую власть осуществляет британская элита, и поделиться с ними властью. Хотя в Индии всё ещё много наследных султанов из туземных княжеств, которые их игнорируют, наше правление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Индии не может обойтись без их поддержки.\n\nДля обеспечения долгосрочной стабильности имперского правления в Индии мы должны пойти на уступки и провести соответствующие реформы по их требованию. Однако #bold для этого по-прежнему необходима поддержка нашего сюзерена — [SCOPE.sCountry('GBR_scope').GetNameNoFlag].#!"
  bic_reform_government_request_democracy_permission: "Запросить разрешение на реформу правительства"
  bic_reform_government_request_democracy_permission_desc: "Требования националистов о реформе колониального правительства становятся всё громче, и их нельзя игнорировать. Мы должны запросить у сюзерена разрешение на необходимые уступки в этом вопросе."
  raj_requested_dop_permission_tt: "За последние 5 лет запросов на реформу правительства не было."
  bic_reform_economic: "Реформирование Ост-Индии: Урбанизация"
  bic_reform_economic_reason: "Хотя в прошлом они приносили [Concept('concept_company', 'Компании')] огромную прибыль, #bold устаревшая система откупов#! и #bold мелкокрестьянское хозяйство#! явно больше не отвечают потребностям дальнейшего развития [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Индии. Уайтхолл также недоволен тем, что наша дань уже долгое время не растёт.\n\nКабинет и Парламент уполномочили нас провести #bold коренную реформу#! индийской экономики: строить новые города, фабрики и плантации, превращая Индию из древней огромной деревни в #variable образцовую колонию#!, соответствующую современным стандартам, чтобы усилить поддержку экономики империи."
  bic_reform_economic_tt: "ВВП нашей страны вырос на 50%."
  bic_reform_economic_goal: ""
  bic_reform_mailitary: "Реформирование Ост-Индии: военная реформа"
  bic_reform_mailitary_reason: "Существующая военная система Индии была #variable создана в 1757 году сэром Робертом Клайвом и генерал-губернатором Гастингсом#!. Она включает в себя три #variable армии президентств#!, каждая со своим главнокомандующим и полным комплектом артиллерийских и транспортных подразделений.\n\nХотя большая часть этих войск многие годы преданно и эффективно служила [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], с постоянным расширением владений #variable армии президентств#! явно перестали отвечать нашим #bold потребностям в обороне и подавлении мятежей#!. Более того, чрезмерно независимая военная система создаёт возможность для сговора солдат, захвата командования и предательства из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nНесмотря на то что мы успешно подавили множество военных мятежей, армия, способная защитить интересы Индии и империи, #bold не может полагаться только на то, что солдаты не взбунтуются#!. Уайтхолл поручил нам начать реорганизацию индийской армии, научить её современной воинской дисциплине и #bold подготовить к ведению боевых действий за пределами родины#!."
  #+
  ganges_irrigation: "Ирригация Ганга"
  ganges_irrigation_reason: "Сельскохозяйственные условия #variable долины Ганга#! не удовлетворяют наши потребности в выращивании надёжных товарных культур: #bold погода жаркая и переменчивая, река часто выходит из берегов, ирригационная система ненадежна...#! Любая земля, не примыкающая непосредственно к #variable главному руслу Ганга#!, страдает от тропического климата и не может гарантировать достаточные [Concept('harvest_condition', 'условия для урожая')].\n\nОтветом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на это является создание совершенно новой и эффективной ирригационной системы. Путём прокладки #bold каналов, соединённых с Гангом#!, в другие провинции, и последующего использования их для создания #bold ирригационных сетей, покрывающих всю Северную Индию#!, а также включения этих сетей в #bold хорошо спланированные промышленные сельскохозяйственные угодья#!, эффективность сельского хозяйства в Индии #bold качественно повысится.#!\n\nБолее того, эта #variable гидротехническая система#! позволит нам повысить плодородие ранее заброшенных из-за отсутствия ирригации земель и нанять #v $farmers_only_icon$ фермеров#! для их превращения в новые плодородные [Concept('arable_land', 'пахотные земли')]. Это, несомненно, значительно улучшит потенциал нашей страны для выращивания товарных культур и [Concept('harvest_condition', 'условия для урожая')] в сельском хозяйстве, укрепит [Concept('food_security', 'продовольственную безопасность')] нашего народа и поможет избежать [Concept('famine', 'голода')], часто свирепствовавшего в Индии в прошлом, и даже достичь того, чего не смогла империя Великих Моголов: #variable полностью изгнать [Concept('famine', 'голод')] с земель Индии.#!."
  ganges_irrigation_status: "Ирригационные работы будут постоянно добавлять новые [Concept('arable_land', 'пахотные земли')] в долине Ганга; если мы изучим паровые турбины, эта работа станет ещё эффективнее."
  ganges_irrigation_1_tt: "Ирригационные работы в долине Ганга завершены.\n#bold • Ожидается, что этот проект добавит в общей сложности 6400 единиц [Concept('arable_land', 'пахотных земель')] в 14 наших северных [Concept('state_region', 'регионах')].#!"
  ganges_irrigation_2_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')]: #variable Аграризация Бенгалии#!, #variable Аграризация Пенджаба#! и #variable Аграризация бассейна Кавери#!."
  indian_agriculture_possible_tt: "В событии #variable «Экономическая политика»#! в качестве направления развития страны была выбрана #variable аграрная политика#!."
  ganges_irrigation_start_button: "Начать ирригационные работы"
  ganges_irrigation_start_button_desc: "Правительство выделило достаточный бюджет на ирригационные работы в этом году. Пришло время улучшить наши сельскохозяйственные условия."
  ganges_irrigation_start_button_tt: "За последний год #variable ирригационные работы не приостанавливались#!."
  ganges_irrigation_start_button_2_tt: "Ирригационные работы ещё не завершены (прогресс менее 300)."
  ganges_irrigation_stop_button: "Приостановить ирригационные работы"
  ganges_irrigation_stop_button_desc: "Правительство распорядилось временно перенаправить бюджетные средства на другие нужды. Возможно, лучше на время приостановить работы."
  ganges_irrigation_stop_button_tt: "За последний год #variable ирригационные работы не начинались#!."
  bangladesh_agriculture: "Аграризация Бенгалии"
  bangladesh_agriculture_reason: "Несмотря на то что Бенгалия долгое время была [Concept('capital_state', 'столичной областью')] #variable Ост-Индской компании#! и под её правлением был создан ремесленный район в Калькутте, сельское хозяйство по-прежнему является основной отраслью. Опираясь на ирригацию из #variable дельты Бенгалии#! и #variable долины Ганга#!, миллионы бенгальцев живут, работая #v $peasants$ крестьянами#! за мизерную плату.\n\nДельта имеет благоприятные географические условия для развития сельского хозяйства. Благодаря #bold эффективной борьбе с наводнениями и разумному планированию в условиях жаркого климата#! мы сможем превратить Бенгалию в #bold современный сельскохозяйственный регион#! и стимулировать экспорт наших товарных культур."
  bangladesh_agriculture_status: "Превратить дельту Бенгалии в процветающий сельскохозяйственный регион."
  panjap_agriculture: "Аграризация Пенджаба"
  panjap_agriculture_reason: "С тех пор как [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] включил #variable Пенджаб#! в состав своих владений, эта земля междуречья Инда унаследовала титул #variable житницы Индии#! времён #bold империи Великих Моголов#! и до сих пор является ведущим производителем зерна для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Здесь #bold обильные водные ресурсы и плодородные почвы#!, что делает её идеальным местом для выращивания пшеницы, и её даже сравнивают с украинским чернозёмом и американскими Великими равнинами, утверждая, что она имеет потенциал стать одним из крупнейших мировых экспортёров зерна.\n\nОднако #variable капризы погоды#! и слабое управление не позволяют Пенджабу надёжно планировать сельскохозяйственное развитие, и он страдает от летней жары. [ROOT.GetCountry.GetRuler.GetFirstName], наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], поручил правительству изменить эту ситуацию, #bold привлекая частный бизнес и современные технологии#!, чтобы поднять долину Инда до уровня #variable мирового производителя продовольствия#!."
  panjap_agriculture_possible_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #variable Реформирование Ост-Индии#!"
  panjap_agriculture_status: "Превратить долину Инда в процветающий сельскохозяйственный регион."
  madras_agriculture: "Аграризация бассейна Кавери"
  madras_agriculture_reason: "Мадрас — самая богатая провинция Южной Индии под управлением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], владеющая #variable дельтой реки Кавери#!, известной как #variable «рисовая чаша Мадраса»#!. Это основной источник продовольствия для Южной Индии и традиционный сельскохозяйственный регион.\n\nОднако #bold растущий импорт дешёвого продовольствия#! из-за рубежа подрывает ценность сельского хозяйства Мадраса. Мы должны модернизировать сельскохозяйственное производство в Мадрасе, чтобы обеспечить прибыльность этого региона и его способность конкурировать с иностранными компаниями."
  madras_agriculture_status: "Превратить дельту реки Кавери в процветающий сельскохозяйственный регион."
  industrialize_india: "Индустриализация Индии"
  industrialize_india_reason: "Успех [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] доказал, что если #variable Индия#! хочет стать #bold великим [Concept('country', 'государством')], с которым действительно считаются#!, ей необходимо создать собственную промышленность. Во времена правления в #bold Калькутте#! [Concept('concept_company', 'Компания')] рассматривала Индию как объект эксплуатации, используя сельское хозяйство и плантации для извлечения богатств из индийского народа.\n\nХотя [Concept('concept_company', 'Компания')] и создала в #bold Калькутте и Бомбее#! некоторые промышленные районы определённого масштаба, их производственные мощности всё ещё далеки от уровня [Concept('great_power', 'великих держав')]. Большинство из них — это #bold дешёвые ремесленные мастерские#! без передовых технологий и надлежащего управления, существующие лишь для насыщения огромного [Concept('market', 'рынка')] #variable Индии#!.\n\nДля прогресса [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и благополучия индийского народа мы должны превратить #variable Индию#! из отсталой эксплуатируемой колонии в #variable передовую и масштабную промышленную державу#!."
  industrialize_india_1_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')]: #variable Урбанизация Бомбея#! и #variable Индустриализация Бенгалии#!."
  industrialize_india_2_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #variable Трансконтинентальная железная дорога#!"
  industrialize_india_3_tt: "В течение не менее 10 лет поддерживался закон [GetLawType('law_protectionism').GetName] или 5 лет — [GetLawType('law_mercantilism').GetName]."
  indian_industrialize_possible_tt: "В событии #variable «Экономическая политика»#! в качестве направления развития страны была выбрана #variable индустриальная политика#!."
  industrialize_india_possible_1_tt: "Индия получила автономию."
  choose_to_industrialize_india_tt: "Это разблокирует запись в дневнике #variable Индустриализация Индии#! после получения автономии."
  bangladesh_industrialize: "Индустриализация Бенгалии"
  bangladesh_industrialize_reason: "#variable Дельта Бенгалии#! была одним из самых процветающих регионов империи ещё во времена #bold империи Великих Моголов#!. В период правления [Concept('concept_company', 'Компании')] она была центром местной промышленности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а Калькутта долгое время считалась крупнейшим городом Азии и была столицей #variable Ост-Индской компании#!.\n\nТем не менее, так называемая промышленность Бенгалии на самом деле не могла конкурировать даже с промышленностью [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] в Европе. Её экспортная ценность была низкой, а конкурентоспособность полностью зависела от #bold высоких пошлин#!, которые мы вводили на иностранные товары. В этих мастерских работало множество низкооплачиваемых бедных рабочих, лишённых надлежащей правовой защиты и достойной заработной платы, вынужденных выполнять самую дешёвую работу.\n\nПравительство объявило о своей решимости провести реформы в Бенгалии. Мы должны привлечь #bold передовые иностранные технологии и капитал#!, чтобы коренным образом изменить нынешнюю ситуацию в Бенгалии."
  bangladesh_industrialize_possible_tt: "Есть [Concept('concept_journal_entry', 'запись в дневнике')] #variable Индустриализация Индии#!"
  bangladesh_industrialize_status: "Превратить ремесленные мастерские Калькутты в промышленный центр Бенгалии."
  bombay_industrialize: "Урбанизация Бомбея"
  bombay_industrialize_reason: "Бомбей изначально был торговым портом под властью [SCOPE.sCountry('POR_scope').GetAltNameNoFlag('RU_CL_RP')] и имел #bold лучшие портовые условия в Индии#!. В #bold 1661 году#! суверенитет над этим портом был передан [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_DP')]. С началом #variable работ по осушению земель#! губернатором #variable Уильямом Хорнби#! в #bold 1708 году#!, #variable Бомбей#! перестал быть скоплением семи разрозненных островов, и после их соединения здесь вырос довольно крупный город.\n\nЭто место, без сомнения, имеет потенциал стать #bold ключевым торговым центром и прибрежным городом#! Индии, и мы должны к этому основательно подготовиться, построив здесь новый большой город, чтобы превратить Бомбей в #bold самую яркую жемчужину#! среди городов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и всей Азии."
  bombay_industrialize_status: "Провести масштабное расширение городской застройки Бомбея."
  raj_indian_major_railway: "Трансконтинентальная железная дорога"
  raj_indian_major_railway_reason: "#variable [Concept('concept_indian_subcontinent', 'Индийский субконтинент')]#! полон ценностей, но его обширность и пересечённая местность затрудняют транспортировку. Если мы не сможем эффективно использовать эту территорию, то #bold богатства Индии будут бесполезны#!.\n\nНаша надёжная #variable Великая Индийская железнодорожная#! [Concept('concept_company', 'компания')] представила правительству и нашему генерал-губернатору амбициозный проект строительства #bold железной дороги, соединяющей весь [Concept('concept_indian_subcontinent', 'Индийский субконтинент')]#!. Несмотря на масштабность проекта, его реализация, несомненно, #bold значительно облегчит транспортировку в Индии.#!"
  #/)
  strengthening_colonial_rule: "Укрепление колониального правления"
  strengthening_colonial_rule_reason: "#variable Если мы сможем завоевать лояльность местного населения, нынешнее правительство сохранится; если мы не сможем своевременно решить проблему индийского националистического движения, оно вынудит правительство пойти на автономию; если наше колониальное правительство потеряет поддержку британского сюзерена, правление рухнет и будет разделено между туземными княжествами!#!\n\nАбсолютный авторитет, установленный [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')] в Индии после #bold битвы при Плесси#!, продолжается уже много лет. Некогда правившая Индией #variable империя Великих Моголов#! была уничтожена нашими доблестными войсками, падишах был взят в плен, а его титул упразднён. Туземные княжества и султаны были вынуждены присягнуть на верность генерал-губернатору, а мы в ответ даровали им автономию и привилегии, создав #bold договорные отношения по типу волнореза#!.\n\nОднако [ROOT.GetCountry.GetNameNoFlag] под властью империи не так стабильна, как это представляет себе Уайтхолл: #bold местные солдаты нелояльны, аристократия и султаны пытаются выйти из-под контроля, благочестивые индуисты препятствуют нашей просвещённой политике, отстаивая то, что они считают своими благородными традициями#!. А [ROOT.GetCountry.GetRuler.GetFirstName], наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], постоянно лавирует между предательством и верностью местных сил, поддерживая хрупкое равновесие.\n\nБолее того, с ростом #variable индийского национализма#!, многие коренные индийцы, получившие образование в школах [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и работающие в колониальной администрации, начали требовать равного статуса в имперской системе, больших экономических возможностей и, в конечном итоге, #bold создания автономного правительства во всей Индии#!. Мы позиционируем себя как ответственный и милосердный проводник, ведущий индийский народ к цивилизации, но теперь сталкиваемся с растущими призывами к автономии со стороны местного населения. Если правительство не сможет подавить эти голоса подходящими средствами, они, скорее всего, обратятся с петицией об автономии в Лондон, стремясь освободиться от контроля колониального правительства.\n\nЛюбыми средствами #bold имперское правление в Индии#! должно быть укреплено: будь то через #variable уступки и автономию#!, или через #variable железный кулак#!."
  strengthening_colonial_rule_complete_tt: "Верная колониальному правительству #variable полиция#! стабильно функционировала не менее 15 лет."
  strengthening_colonial_rule_advancing_police_action_button: "Милитаризировать местную полицию"
  strengthening_colonial_rule_advancing_police_action_button_desc: "Сепаратистские и националистические силы постоянно угрожают правлению правительства в различных частях Индии. Включение полиции в состав армии и вооружение её эффективным оружием может помочь в подавлении этих бунтовщиков."
  strengthening_colonial_rule_reform_welfare_action_button: "Создать работные дома для бедных"
  strengthening_colonial_rule_reform_welfare_action_button_desc: "Индия наводнена бездомными и голодающими бедняками, чьё существование вредит моральному облику правительства. В целях стабильности, возможно, стоит создать работные дома по образцу «Закона о бедных 1834 года», чтобы обеспечить этим людям базовые условия для выживания."
  indian_home_rule: "Индийское самоуправление"
  indian_home_rule_reason: "#variable Если наше колониальное правительство потеряет поддержку британского сюзерена, правление рухнет и будет разделено между туземными княжествами!#!\n\nПо всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] растёт #variable национальное самосознание#! коренного индийского населения. Коренные индийцы, получившие образование в школах [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и работающие в колониальной администрации, начали требовать равного статуса в имперской системе, больших экономических возможностей и, в конечном итоге, #bold создания автономного правительства во всей Индии#!. Под давлением этих призывов правительство приняло петицию и официально начало обсуждать вопрос о самоуправлении Индии.\n\nОднако Лондон не желает предоставлять Индии самоуправление в её нынешнем состоянии. Парламент издал указ, требующий, чтобы эти петиционеры продолжали подчиняться правительству до тех пор, пока они не будут признаны #bold обладающими достаточной квалификацией и экономическими возможностями#! для осуществления самоуправления.\n\nХотя компромисс временно сдержал призывы националистов, терпение индийской элиты не безгранично. Мы должны как можно скорее, пока они ещё готовы к сотрудничеству, помочь им выполнить требования Лондона, создав #bold надёжную конституцию и экономическую систему#!, а затем потребовать от Парламента #variable официального разрешения на самоуправление Индии#!."
  indian_home_rule_0_tt: "Завершены [Concept('concept_journal_entry', 'Записи в дневнике')]: #variable Политика морали#! и #variable Политика свободы#!."
  indian_home_rule_1_tt: "10 лет не было повстанцев из [Concept('concept_secession', 'сепаратистских движений')] или [Concept('concept_revolution', 'революций')]."
  indian_home_rule_on_complete_tt: "После выполнения требований Парламента мы официально подадим запрос на самоуправление в Лондон."
  bic_autonomy_negotiation_1_tt: "Британский Парламент начнёт законодательные дебаты по нашему требованию о самоуправлении.\nВ случае успеха мы станем [Concept('dominion', 'доминионом')] и будем платить меньшую дань."
  bic_autonomy_negotiation_2_tt: "Британский Парламент начнёт законодательные дебаты по нашему требованию о широкой автономии.\nВ случае успеха мы станем [Concept('british_dominion', 'британским доминионом')] и будем платить меньшую дань."
  indian_home_rule_ethics_policy: "Политика морали"
  indian_home_rule_ethics_policy_reason: "Мы — #variable милосердные проводники#! индийского народа, и наш долг — вывести невежественный и нецивилизованный [Concept('concept_indian_subcontinent', 'Индийский субконтинент')] на #bold путь цивилизации и модернизации#!. Прежние колониальные администрации позволяли своим подданным прозябать в бедности и невежестве, а народ мог существовать лишь под властью правительства, заинтересованного только в том, как выжать из него последние соки.\n\nОднако под руководством [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и при содействии местной индийской элиты у нас появился шанс сделать шаг вперёд: #bold предоставить этим трудящимся массам базовое образование и обеспечить их едой и одеждой#!, чтобы по-настоящему выполнить наше обещание вести их к цивилизации."
  indian_home_rule_political_policy: "Политика свободы"
  indian_home_rule_political_policy_reason: "Нынешнее правительство в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] по-прежнему отказывает широким массам индийского народа в правах, которыми должно обладать свободное государство: газеты и издания находятся под контролем колониальной администрации, отсутствует надлежащее всеобщее избирательное право, а права частной собственности на богатства местных жителей не имеют чётких правовых гарантий.\n\nУ правительства нет причин допускать, чтобы Индия в её нынешнем состоянии скатилась к полному хаосу или надолго оказалась под тиранией какого-либо местного диктатора. Демократическая система [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] должна быть внедрена в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], и нашей целью станет создание надёжной конституции и свободной политической системы, ради чего мы и будем проводить реформы."
  #
  raj_towards_independence: "Движение за независимость Индии"
  raj_towards_independence_reason: "#variable Если наше колониальное правительство потеряет поддержку британского сюзерена, правление рухнет и будет разделено между туземными княжествами!#!\n\nТребования автономии больше не удовлетворяют индийских националистов. Добрые отношения между лидерами умеренных националистов и #tooltippable_name [ROOT.GetCountry.GetTopOverlord.GetAdjective|l]ими#! властями были разорваны, что привело к радикализации индийского националистического движения и началу борьбы за #bold полную независимость#!. Это вызывает беспокойство у меньшинства, всё ещё приверженного миссии [Concept(SCOPE.gsInterestGroup('government_scope').GetName, '[SCOPE.gsInterestGroup('government_scope').GetName]')], которое опасается, что если не предпринять особых мер, ситуация в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] скоро станет #bold неуправляемой#!.\n\nХотя [SCOPE.sCountry('GBR_scope').GetNameNoFlag] уже отправила специального уполномоченного, который достиг временного компромисса с радикальными националистами, для большинства политиков и бюрократов многовековое правление империи подошло к концу, и независимость кажется #tooltippable_name [ROOT.GetCountry.GetTopOverlord.GetAdjective|l]ому#! правительству неизбежным будущим.\n\nПарламент поручил [ROOT.GetCountry.GetRuler.GetFirstName], нашему [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], официально рассмотреть призывы к независимости и после тщательной подготовки предоставить её, обеспечив при этом защиту интересов и престижа #tooltippable_name [ROOT.GetCountry.GetTopOverlord.GetAdjective|l]ой#! власти."
  raj_towards_independence_possible_tt: "Не удалось успешно завершить [Concept('concept_journal_entry', 'запись в дневнике')] #variable Укрепление колониального правления#!."
  raj_towards_independence_possible_1_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #variable Индийское самоуправление#!"
  raj_towards_independence_complete_1_tt: "Аннексированы все вассальные туземные княжества, объединён весь [Concept('concept_indian_subcontinent', 'Индийский субконтинент')]."
  raj_towards_independence_complete_language_tt: "Проблема #variable языкового конфликта#! решена в любой форме."
  raj_towards_independence_complete_religious_tt: "Проблема #variable религиозного конфликта#! решена в любой форме."
  raj_towards_independence_language_policy_button_tt: "Политика по проблеме #variable языкового конфликта#! ещё не определена."
  raj_towards_independence_religious_policy_button_tt: "Политика по проблеме #variable религиозного конфликта#! ещё не определена."
  raj_towards_independence_language_progress_bar: "Проблема языкового конфликта"
  raj_towards_independence_language_progress_bar_desc: "Прогресс: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/240)"
  raj_towards_independence_language_policy_hard_tt: "Идёт распространение английского языка как официального."
  raj_towards_independence_language_policy_easy_tt: "Идёт продвижение хинди как официального языка."
  raj_towards_independence_religious_progress_bar: "Проблема религиозного конфликта"
  raj_towards_independence_religious_progress_bar_desc: "Прогресс: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/240)"
  raj_towards_independence_religious_policy_hard_tt: "Идёт ослабление влияния религии."
  raj_towards_independence_religious_policy_easy_tt: "Идёт внедрение религиозной сегрегации."
  raj_towards_independence_language_policy_hard_button: "Нормализовать распространение английского языка"
  raj_towards_independence_language_policy_hard_button_desc: "Английский язык как язык будущей независимой Индии поможет поддерживать наши традиционные отношения с индийским народом. Хотя затраты могут быть огромными, введение всеобщего английского образования вполне возможно.\nМы можем выбрать только один способ и не сможем его изменить; этот способ займёт #variable больше#! времени, но #variable позволит избежать раздела Индии#!."
  raj_towards_independence_language_policy_easy_button: "Продвигать хинди как официальный язык"
  raj_towards_independence_language_policy_easy_button_desc: "Хинди является lingua franca на севере Индии. Для укрепления внутренних связей между индийскими народами мы должны принудительно внедрить хинди в южных регионах.\nМы можем выбрать только один способ и не сможем его изменить; этот способ займёт #variable меньше#! времени, но #variable не позволит избежать раздела Индии#!."
  raj_towards_independence_religious_policy_hard_button: "Ослабить статус религии"
  raj_towards_independence_religious_policy_hard_button_desc: "Индуизм, ислам... Правительство устало от постоянных конфликтов между этими конфессиями в прошлом. Для благополучия и модернизации индийского народа мы должны провести на субконтиненте масштабную религиозную реформу, исключив религиозные факторы из правительства и конституции.\nМы можем выбрать только один способ и не сможем его изменить; этот способ займёт #variable больше#! времени, но #variable позволит избежать раздела [Concept('concept_indian_subcontinent', 'Индийского субконтинента')]#!."
  raj_towards_independence_religious_policy_easy_button: "Ввести религиозную сегрегацию"
  raj_towards_independence_religious_policy_easy_button_desc: "Индуисты и мусульмане всегда недолюбливали друг друга, и управление этим религиозным конфликтом не является обязанностью нашей империи. Перед уходом нам тем более не нужно нести ответственность за эти религиозные проблемы. Лучше провести границы по религиозному признаку и позволить им жить своей жизнью.\nМы можем выбрать только один способ и не сможем его изменить; этот способ займёт #variable меньше#! времени, но #variable не позволит избежать раздела Индии#!."
  bic_become_indepedence_event_tt: "Наша страна станет независимой!"
  bic_become_indepedence_event_1_tt: "Наша страна станет независимой и войдёт в [Concept('commonwealth_realm', 'Королевство Содружества')]!"
  pak_indepedence_tt: "Пакистан отделится от нашей страны."
  pak_indepedence_1_tt: "Пакистан отделится от нашей страны и войдёт в [Concept('commonwealth_realm', 'Королевство Содружества')]."
  #
  her_majestys_indian_government: "Правительство Его Величества"
  her_majestys_indian_government_reason: "#V #P #B Его Величество [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], Божьей милостью [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Соединённого Королевства Великобритании и Ирландии, Канады, Австралии и других его королевств и территорий, Император Индии, Защитник Веры#!#!#!#bold #V является нашим нынешним монархом.#!#!\n\nКонституционная [GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] берёт своё начало во временах #V британского правления#!. Она существует с момента #B упразднения Ост-Индской компании и коронации британского монарха как Императора Индии#! и сохранилась после обретения нашей страной независимости, став #B символом единства и демократии всех наших народов#!.\n\nПоскольку [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] постоянно проживает в Великобритании, #V назначенный им #$RULER_TITLE_GOVERNOR_GENERAL$#! исполняет церемониальные обязанности в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] от имени Его Величества, а губернаторы провинций представляют его в своих провинциях. Сам Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] редко вмешивается в государственные дела. Его важнейшей обязанностью является назначение и смещение генерал-губернатора по представлению премьер-министра [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], что позволяет поддерживать здоровую работу нашей вестминстерской демократической системы в качестве #B символического [Concept('head_of_state', 'главы государства')]#!.\n\n[GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] — это не только символ демократических традиций и национального единства, но и узы, связывающие нас на протяжении многих лет. Со стороны мы кажемся обременёнными этой чопорной тяжестью — сдержанными, стойкими, холодными, дисциплинированными. Мы лишь усмехаемся в ответ, потому что на самом деле мы подобны дубу, стоящему на ветру, #bold который гордо держит голову в невзгодах и никогда не отступает#!. Вот что представляет собой [GetLawType('law_monarchy').GetName] в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]: это своего рода #bold британский консерватизм#! и #bold стоическая невозмутимость и стойкость#!. Этот дух является нашей гордостью и самолюбием, как гласит наш девиз:\n\n#variable Бог правит на небе, а я — на земле!#!"



