l_russian:
  #Завещание Петра Великого
 russia_monarchy.1.b: "Да правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] долгие годы!"
 joi_flavor_rus.1.t: "Завещание Петра Великого"
 joi_flavor_rus.1.d: "Наследие величайшего императора [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], #variable Петра I#!, в виде завещания теперь держит в руках [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]..."
 joi_flavor_rus.1.f: "«Поддерживать [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] в состоянии постоянной войны, чтобы солдаты всегда были в боевой готовности; постоянно прилагать усилия для укрепления государственной казны и улучшения армии. Выбирать наиболее благоприятный момент для нападения, преследуя выгоду, расширение и процветание России... Всеми возможными способами привлекать из самых просвещённых стран Европы учёных мужей, чтобы использовать их на благо России и во вред другим странам, не причиняя ущерба себе».\n\n«Занять как можно больше земель [SCOPE.sCountry('SWE_scope').GetAltNameNoFlag('RU_CL_RP')] и провоцировать её на нападение, чтобы иметь предлог для завоевания. Для этого необходимо отделить Данию от Швеции и разжигать между ними вражду... В первую очередь заключить торговый союз с [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')], поддерживая постоянный обмен товарами и моряками, что будет способствовать нашему мореплаванию и торговле... Непрерывно расширяться на север вдоль Балтийского моря и на юг вдоль Чёрного».\n\n«Как можно ближе подойти к Константинополю и Индии. Тот, кто будет править там, станет истинным властелином мира. Поэтому следует провоцировать пограничные войны не только в Турции, но и в Персии».\n\n«А после #bold расчленения Швеции, гибели Персии, сокрушения Польши и завоевания Турции#!, когда наши армии соединятся, а Чёрное и Балтийское моря будут под охраной наших флотов, мы должны будем по отдельности и в строжайшей тайне предложить сначала Версальскому, а затем Венскому двору разделить мировую империю».\n\n«Мы должны #bold стравливать их друг с другом, чтобы они ослабляли друг друга.#! Затем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] следует воспользоваться решающим моментом и вторгнуться во Францию с одной стороны, и в Германию — с другой. После завоевания этих двух стран остальная Европа будет беззащитна и покорится#!»"
 joi_flavor_rus.1.a: "Следуя воле покойного императора, мы покорим мир!"
  #Успех Петра
 joi_flavor_rus.2.t: "Третий Рим"
 joi_flavor_rus.2.d: "В 476 году пал великий Рим, и Константинополь стал его преемником. Ныне империя снова переместилась, и новый владыка будет коронован в Царьграде как император римского народа и сената."
 joi_flavor_rus.2.f: "«Хочу сказать несколько слов самому выдающемуся и благородному правителю нашей православной империи...\nЛюбящие Христа и Бога знают, что все христианские империи падут, и тогда наша страна унаследует их престол, как сказано в пророчествах: это будет Российская империя».\n«Два Рима пали, но третий стоит, а четвёртому не бывать. Это будет вечный Рим... и он заменит беспорядочную борьбу между государствами, установив новый мировой Pax Romana»."
 joi_flavor_rus.2.a: "Мы — истинные наследники Римской империи!"
  #Провал Петра
 joi_flavor_rus.3.t: "Сожжённое завещание"
 joi_flavor_rus.3.d: "В камине горит огонь, в него бросают листы бумаги, и они обращаются в лёгкий чёрный дым..."
 joi_flavor_rus.3.f: "#bold С 1724 года#! он заметно слабел. Бессонные дни и ночи, проведённые в трудах, усугубили его болезнь и ускорили его конец.\nКазалось, что ухудшающееся состояние здоровья скоро сведёт его в могилу. Он чувствовал жар, который ввергал его в почти непрерывный лихорадочный бред. В редкие моменты облегчения он пытался #bold что-то написать#!. Но его рука могла начертать лишь неразборчивые знаки. Среди них можно было с трудом разобрать написанное по-русски: #bold «Отдать всё...»#!\nОн позвал #bold великую княжну Анну Петровну#!, желая продиктовать ей свою волю. Но когда княжна подошла к его ложу, он уже не мог говорить.\nОн умирал шестнадцать часов. #bold Императрица Екатерина#! три дня и три ночи не отходила от его постели. #bold 28 января, около четырёх часов утра, он скончался на её руках.#!"
 joi_flavor_rus.3.a: "Завещание? Какое завещание?"
  #Успех в Средней Азии
 joi_flavor_rus.4.t: "Степи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_rus.4.d: "С покорением среднеазиатских народов и подписанием нового пограничного договора с [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')] мы окончательно уничтожили этого кочевого врага, досаждавшего нам на протяжении сотен лет..."
 joi_flavor_rus.4.f: "Мы разместили войска на границе, чтобы ясно дать понять [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_DP')], что мы в любой момент можем силой добиться выполнения наших требований. Это развёртывание ни в коем случае нельзя рассматривать как нарушение международного права или дружественных отношений: все войска находятся на землях киргизов, подданных [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], и... получили строгий приказ быть готовыми в любой момент пересечь свои сторожевые линии."
 joi_flavor_rus.4.a: "Великая степь перейдёт под прямое управление империи."
 joi_flavor_rus.4.b: "Возможно, лучше назначить надёжного генерал-губернатора для управления Средней Азией."
  #Провал в Средней Азии
 joi_flavor_rus.5.t: "Возвышение татар"
 joi_flavor_rus.5.d: "Татары заняли Казахстан, некогда принадлежавший [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], что вызвало в народе великий страх перед прошлым..."
 joi_flavor_rus.5.f: "«Затем он послал свирепого Дорбея напасть на город Мерв и продолжить покорение народов между Ираком и Индом. Он отправил храброго Субэдэя на север, чтобы тот разбил одиннадцать царств и племён, перешёл Волгу и Урал и, наконец, пошёл войной на Киев...»\n«И снова, как и прежде, пришли те злые кровопийцы-послы и сказали: „Заключите с нами мир“. Он не желал этого, ибо, как сказал пророк: „Славная война лучше позорного мира“. Эти нечестивцы и их лживый мир принесут великий ужас на нашу землю, ибо они уже сотворили здесь много зла...»"
 joi_flavor_rus.5.a: "Опять?!"
  #Успех на Ближнем Востоке
 joi_flavor_rus.6.t: "Анатолия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_rus.6.d: "С завоевательными походами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Анатолии Чёрное море стало внутренним морем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_rus.6.f: "Наш великий славянский народ, успешно отразив вмешательство [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], благодаря нашим верным, храбрым и дисциплинированным солдатам, последовательно завоевал обширные территории Турции. Теперь мы очистим эту землю и изгоним этих неполноценных тюрок-язычников с этой плодородной земли.\nНо ещё важнее — наше дело по восстановлению истинного Рима, а также последний шаг к превращению Чёрного моря в наше внутреннее море: следующая остановка — Царьград!"
 joi_flavor_rus.6.a: "Турецкое государство теперь в моих руках!"
  #Провал на Ближнем Востоке
 joi_flavor_rus.7.t: "Парижский договор"
 joi_flavor_rus.7.d: "Государи воюющих держав... желая положить конец бедствиям войны... решили заключить соглашение с Его Величеством, монархом [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], на основе восстановления и укрепления мира, обеспечивая независимость и целостность [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]..."
 joi_flavor_rus.7.f: "Семь. Высокая Порта признаётся участницей публичного права и европейского концерта, и каждая из сторон обязуется уважать независимость и территориальную целостность [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]...\nОдиннадцать. Чёрное море объявляется нейтральным: открытым для торгового мореплавания всех наций, его воды и порты формально и навсегда закрыты для военных кораблей как прибрежных, так и любых других держав...\nТринадцать. Поскольку, согласно статье одиннадцатой, Чёрное море объявлено нейтральным, поддержание или создание на его побережье военно-морских арсеналов становится ненужным. Следовательно, [ROOT.GetCountry.GetNameNoFlag] и Его Величество Султан обязуются не создавать и не поддерживать на этом побережье никаких военно-морских арсеналов... Тридцать. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и Его Величество Султан сохраняют целостность своих азиатских владений в том виде, в каком они законно существовали до разрыва...\nТридцать четыре. Настоящий договор будет ратифицирован, и ратификационные грамоты будут обменены в Париже в течение четырёх недель или, если возможно, ранее.\nВ удостоверение чего полномочные представители подписали и скрепили своими печатями. Совершено в Париже."
 joi_flavor_rus.7.a: "Боже!"
  #Успех в Персии
 joi_flavor_rus.8.t: "Победа в Персии"
 joi_flavor_rus.8.d: "После походов, которые [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] предпринял в Персию, она также вошла в состав нашей великой родины, [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_rus.8.f: "С начала войны с Персией бесчисленные сыны [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] проливали кровь на этой плодородной земле. Наша кровь оросила эту землю. Теперь мы направим наших храбрых солдат в Машрик, чтобы ещё больше укрепить наше влияние на Ближнем Востоке и, что более важно, завоевание Персии создаёт реальную угрозу для жемчужины восточной короны — Индии.\nКак только мы укрепим наши силы, мы двинемся на Индию, чтобы освободить порабощённый народ Индии от лицемерного владычества [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_rus.8.a: "Тот, кто первым взойдёт на вершину Загроса, будет пожалован в графы!"
  #Провал в Персии
 joi_flavor_rus.9.t: "Сокрушительное поражение в Персии"
 joi_flavor_rus.9.d: "Перед лицом угроз со стороны европейских держав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] пришлось отступить из Персии, чтобы сосредоточить больше сил на европейских делах..."
 joi_flavor_rus.9.f: "Гроб Петра сотрясается от гнева! Как мог такой слабый враг так легко разбить великую русскую армию?! Это позор, какой позор! Когда я соберусь с силами и вернусь, казачья конница снова будет скакать по Иранскому нагорью!"
 joi_flavor_rus.9.a: "О, Персия, как ты прекрасна..."
  #Успех на Востоке
 joi_flavor_rus.10.t: "Дальневосточный рубеж"
 joi_flavor_rus.10.d: "После тяжёлой борьбы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] наконец привёл свой народ к завоеванию долгожданных обширных территорий на севере Китая."
 joi_flavor_rus.10.f: "«Я, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], с гордостью могу заявить Петру Великому и императрице Екатерине:\nЯ исполнил волю моих предшественников, а позорный договор 1689 года — не более чем клочок бумаги!\nОтныне русские корабли будут беспрепятственно ходить по Амуру, а русский флот из Владивостока будет взирать на Восток, и в конечном счёте — на весь мир!»"
 joi_flavor_rus.10.a: "Продолжать наступление!"
  #Провал на Востоке
 joi_flavor_rus.11.t: "Забайкальский договор"
 joi_flavor_rus.11.d: "По мере ослабления [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на мировой арене её интересы на Дальнем Востоке постепенно вытесняются другими державами..."
 joi_flavor_rus.11.f: "Из-за нашего поражения в войне мы потеряли контроль над нашими дальневосточными территориями. В наши крепости и поселения, что ещё остаются под нашим контролем, как снег сыплются донесения о китайских солдатах, бродящих поблизости. Эти донесения уже легли на стол, и с ними знакомится наш [ROOT.GetCountry.GetRuler.GetFirstName]. Сибирский генерал-губернатор, опасаясь за свою безопасность, подал в отставку. Вся Сибирь в панике..."
 joi_flavor_rus.11.a: "Я, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName], ещё вернусь!"
  #Успех в Восточной Европе
 joi_flavor_rus.12.t: "Парад победы в Кракове"
 joi_flavor_rus.12.d: "Во имя Пресвятой и Нераздельной Троицы, я, [ROOT.GetCountry.GetRuler.GetFirstName], монарх и самодержец всея Руси, приветствую всех наших потомков и наследников престола, а также правительство русского народа."
 joi_flavor_rus.12.f: "Армия марширует по улицам Кракова, празднуя свою великую победу. Ограничения, наложенные на [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] Венским конгрессом, теперь сокрушены собственными руками. Польские земли, некогда захваченные императрицей Терезией, теперь возвращены их истинному хозяину — родине [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] клянётся, что это станет отправной точкой на пути к великой славянской империи, о которой мечтали бесчисленные русские правители прошлого..."
 joi_flavor_rus.12.a: "За родину, за [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], ура!"
  #Провал в Восточной Европе
 joi_flavor_rus.13.t: "Киевское соглашение"
 joi_flavor_rus.13.d: "Беззащитны в военном отношении, нежизнеспособны в экономическом... вот позор, принесённый этим соглашением."
 joi_flavor_rus.13.f: "Один. [ROOT.GetCountry.GetRuler.GetFirstName] отказывается от всех прав и претензий на территории к западу от границы, определённой в статье второй настоящего договора...\nЧетыре. С другой стороны, отказывается от всех прав и претензий на территории Украины и Белоруссии к востоку от указанной границы...\nДевять. Договаривающиеся стороны обязуются всеми средствами уважать политический суверенитет друг друга, не вмешиваться во внутренние дела, в частности, не проводить никакой агитации, пропаганды или вмешательства в любой форме, и не поощрять любые подобные действия.\nВ удостоверение чего полномочные представители подписали и скрепили своими печатями. Совершено в Киеве."
 joi_flavor_rus.13.a: "Проклятый империалистический Drang nach Osten, разрушивший наш восточноевропейский дом!"
  #Успех в Северной Европе
 joi_flavor_rus.14.t: "Северный трон"
 joi_flavor_rus.14.d: "В продолжение Великой Северной войны [ROOT.GetCountry.GetNameNoFlag] не только повторила победу Петра Великого, но и превзошла её, захватив власть над всей Северной Европой."
 joi_flavor_rus.14.f: "Стоит нам только повысить голос, и северяне, возможно, уступят. Если не уступят, мы сделаем ещё один выстрел, и они непременно поднимут руки... Так мы думали. Мы не ожидали войны, мы думали, что они примут наши требования и не вынудят нас воевать...\n#bold Часто спрашивают#!, имели ли мы юридическое и моральное право на наши действия в Северной Европе? Юридического права у нас, конечно, не было, но с моральной точки зрения, с нашей позиции, наше желание защитить себя оправдывает наши действия."
 joi_flavor_rus.14.a: "Ещё одна великая победа отечества!"
  #Провал в Северной Европе
 joi_flavor_rus.15.t: "Московский мирный договор"
 joi_flavor_rus.15.d: "Война на севере проиграна. Воюющие стороны в итоге подписали мирное соглашение в Москве..."
 joi_flavor_rus.15.f: "Правительства северных стран и правительство, которым правит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], желая положить конец враждебным действиям между двумя странами, установить прочный мир и будучи убеждёнными в необходимости создания чётких условий для взаимной безопасности...\nСчитая, что безопасность городов Санкт-Петербурга и Мурманска, а также Мурманской железной дороги отвечает интересам обеих договаривающихся сторон, и с этой целью полагая необходимым заключить мирный договор и назначить для этого своих представителей...\nВраждебные действия между странами и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] должны быть немедленно прекращены в соответствии с процедурой, изложенной в протоколе, прилагаемом к настоящему договору...\nБолее детальное определение и установление границы будет осуществляться смешанной комиссией, состоящей из представителей договаривающихся сторон, которая будет назначена в течение десяти дней с момента подписания настоящего договора."
 joi_flavor_rus.15.a: "Кого волнует Финляндия?"
  #Царьград
 joi_flavor_rus.16.t: "Царьград"
 joi_flavor_rus.16.d: "Некогда Город Желания Мира, Константинополь, теперь стал Царьградом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_rus.16.f: "Ты вернёшься, как молния, и вся страна будет пировать,\nМоре, земля и небо, под твоей молнией,\nЯ снова прикоснусь к тебе, одетый в белое,\nТвой свет и моё сердце, как я тебя люблю!\nЦарь царей, помоги нашему царю,\nЯви милость, яви милость, Боже небесный,\n[ROOT.GetCountry.GetRuler.GetFirstName], благодатью Божьей, император римлян\nУ ворот Святого Романа, царица городов,\nГород — это сабля, город — это копьё,\nЭтот город — ключ ко всей Римской империи!\nБогородица пала безмолвно, не пролив много слёз,\nСколько лет пройдёт, и этот город снова будет твоим..."
 joi_flavor_rus.16.a: "Одна корона, один [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], один Рим!"
  #Завоевание Басры
 joi_flavor_rus.17.t: "Сады Вавилона"
 joi_flavor_rus.17.d: "Завоевание Вавилона вызвало восторг у археологов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]..."
 joi_flavor_rus.17.f: "Он уже сокрыл сокровища, узрел тайное,\nОн воздвиг стены Урука, что окружают город,\nДаже сокровищница святилища Эанны не сравнится с этим:\nВзгляни на внешнюю стену, она сияет, как медь;\nВзгляни на внутреннюю стену, ничто не сравнится с ней.\nВойди в порог и узри, как он древен;\nПойди в Эанну, обитель Иштар,\nОна несравненна, пусть любой царь грядущих времён попытается превзойти!\nВзойди на стены Урука, пройдись по ним,\nОсмотри основание, проверь кирпичи,\nРазве не обожжены они в огне!\nРазве не заложены они семью мудрецами?"
 joi_flavor_rus.17.a: "Не думаю, что здесь всё так грандиозно, как в мифах."
  #Войска у границ Индии
 joi_flavor_rus.18.t: "Войска у границ Индии"
 joi_flavor_rus.18.d: "После того как наши доблестные солдаты последовательно покорили Афганистан и Персию, Индия также скоро войдёт в состав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_rus.18.f: "Индия... ты словно жемчужина в короне: плодородные земли, дешёвая рабочая сила, несметные сокровища и пряности... Всё это днём и ночью тревожит сердце [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle].\nТеперь наши храбрые казаки перейдут Инд и отнимут все богатства у британцев. Своей кровью и плотью мы сорвём эту жемчужину с короны Британской империи!"
 joi_flavor_rus.18.a: "Вперёд, вперёд!"
  #Китайская администрация
 joi_flavor_rus.19.t: "Китайская администрация"
 joi_flavor_rus.19.d: "Перейдя Амур, преодолев Большой Хинган, после многочисленных завоеваний мы наконец-то смогли воочию увидеть долгожданные тёплые земли — Китай."
 joi_flavor_rus.19.f: "На протяжении веков, с тех пор как мы перешли ледяные Уральские горы, этот древний и далёкий край, Китай, становился всё ближе благодаря нашим отважным экспедициям.\nТеперь у нас наконец-то есть возможность включить большинство городов Северного Китая в нашу административную систему. Мы, русские, установим на севере Китая самое жестокое правление, подобно тому, как сотни лет назад монголы поступали с нами, и выжмем из этой земли всё до последней капли!"
 joi_flavor_rus.19.a: "Установим прямое правление над Китаем!"
 joi_flavor_rus.19.b: "Возможно, назначить генерал-губернатора в Пекине — тоже неплохая идея."
  #Тихоокеанский порт
 joi_flavor_rus.20.t: "Тихоокеанский порт"
 joi_flavor_rus.20.d: "После усердного труда целого поколения Внешняя Маньчжурия наконец-то стала более-менее приличным местом."
 joi_flavor_rus.20.f: "Когда мы только прибыли, здесь была лишь захудалая рыбацкая деревушка: ни приличного порта, ни действующих верфей, ни одного военного корабля.\nА теперь посмотрите! Благодаря нашему строительству здесь появился лучший порт на Дальнем Востоке, самое большое количество военных кораблей на Дальнем Востоке и крупнейший торговый порт в Северо-Восточной Азии. Какое грандиозное достижение!\n[ROOT.GetCountry.GetNameNoFlag] начнёт отсюда завоевание Азии, и в будущем мы, несомненно, сможем отсюда завоевать весь мир!"
 joi_flavor_rus.20.a: "Имя ему будет Владивосток — Владей Востоком!"
  #Реформы Александра II: Успех
 joi_flavor_rus.21.t: "Величайший реформатор"
 joi_flavor_rus.21.d: "После реформ модернизации, которые возглавил [ROOT.GetCountry.GetRuler.GetFirstName], мощь [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] растёт день ото дня. Россия наконец-то может снова доминировать в мировом порядке."
 joi_flavor_rus.21.f: "Пока не пришёл [ROOT.GetCountry.GetRuler.GetFirstName], [ROOT.GetCountry.GetNameNoFlag] была лишь колоссом на глиняных ногах: в армии снаряжение давно не обновлялось, а солдаты были неграмотны; на полях имперские крепостные подвергались многократной эксплуатации, а тяжёлые оковы сковывали их в невыносимых страданиях; в правительстве прогнившая система привела нашу административную систему на грань краха, империя была близка к распаду.\n\nОднако после стремительных реформ армия [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] преобразилась и теперь достойна роли «жандарма Европы»; крепостные [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в большом количестве освобождены и направлены на заводы, где требуется много рабочих рук, для содействия индустриализации страны; правительственные учреждения стали более компактными, и теперь правительство может с меньшими, но более эффективными силами лучше исполнять волю, которую изъявляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_rus.21.a: "Пусть Бог хранит [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]!"
  #Растущая российская угроза
 joi_flavor_rus.22.t: "Растущая российская угроза"
 joi_flavor_rus.22.d: "Из-за безумного вторжения России британские интересы в Индии оказались под угрозой..."
 joi_flavor_rus.22.f: "«Если Россия искренне и всем сердцем примет наше намерение сохранить мирное владение нашими азиатскими территориями, то я совершенно уверен, что ни одно правительство в этой стране не будет ставить своей задачей препятствовать или мешать политике России в Европе. Напротив, существует острая необходимость восстановить положение и влияние России в европейских советах...»"
 joi_flavor_rus.22.a: "Ужасно!"
  #Реформы Александра II: Провал
 joi_flavor_rus.23.t: "Падение правительства"
 joi_flavor_rus.23.d: "Хотя наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и приложил все усилия, план реформ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в конечном итоге обратился в прах."
 joi_flavor_rus.23.f: "В международных делах: на севере набирает силу шведский реваншизм; на юге слабая турецкая армия умудряется на равных сражаться с нашими ближневосточными силами; на Дальнем Востоке наши войска не могут нанести китайцам ни малейшего вреда.\nВо внутренних делах: на украинских полях кричат крепостные, требуя освобождения, которого они так долго ждали; в правительственных учреждениях, #v $bureaucrats$#! погрязли в коррупции; армия, которая должна защищать суверенитет страны, развлекается пьянством, развратом и азартными играми...\nСлавянский народ взывает: когда же наша великая родина вернёт себе былую славу?!"
 joi_flavor_rus.23.a: "Сегодня без происшествий..."
  #Дворянская реформа: Успех
 joi_flavor_rus.24.t: "Первая Государственная дума"
 joi_flavor_rus.24.d: "В результате ряда реформ правовая система [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] наконец-то смогла сравняться с передовыми странами, и была создана совершенно новая политическая система."
 joi_flavor_rus.24.f: "«Тишина! Тишина! За этими вопросами стоит стремление нынешнего собрания к разделению властей и реформе исполнительных органов — стремление, которое это собрание полностью разделяет, и поэтому лидеры нашей партии недавно провели обсуждения в Москве...»\n\n«Господин спикер! Разве неверно, что наше стремление восстановить волю парламента и исполнительной власти является общественной волей, которую одобрил [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и поэтому мы должны сейчас же следовать основным положениям „Конституционного манифеста“?»\n\n«Послушайте, политическая реальность такова, что это будет означать огромное политическое давление на всех нас, не только изнутри нашей страны, но и извне...»\n\n«Так вы согласны с тем, что лучший способ защитить нашу страну — это распустить институты и разделить власть?»\n\n«Ваше превосходительство! Я считаю, что главная ответственность этого правительства и парламента — не увязать в подобных словесных баталиях, а сосредоточиться на новых законодательных вопросах... Если парламент сможет нормально функционировать, дела государства будут решаться быстрее, разве не так?»"
 joi_flavor_rus.24.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] соберёт верную и надёжную Думу!"
 joi_flavor_rus.24.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] уполномочит Думу, действующую по конституционным правилам!"
 joi_flavor_rus.24.c: "Очевидно, существует и третий путь..."
  #Уменьшение российской угрозы
 joi_flavor_rus.25.t: "Уменьшение российской угрозы"
 joi_flavor_rus.25.d: "После сокрушительного удара по амбициям России в Южной Азии Большая игра в регионе подошла к концу..."
 joi_flavor_rus.25.f: "Если бы лондонское правительство распорядилось своей властью так — искренне помогло России достичь всего, на что она вправе надеяться, — пожало бы руку Персии, — получило бы все возможные компенсации от узбеков, — заставило эмира Бухары быть справедливым к нашим афганцам и другим узбекским государствам, а также к своему собственному царству, — но к чему продолжать?\nВ любом случае, вы знаете мои расширенные взгляды: их целесообразность, даже необходимость, будет видна, и мы сыграем ту возвышенную роль, которую должна играть первая христианская нация в мире... Однако мы здесь, как и прежде, рычим друг на друга, ненавидим друг друга, но никто не желает войны."
 joi_flavor_rus.25.a: "Правь, Британия!"
  #Критика системы ссылки
 joi_flavor_rus.26.t: "Критика системы ссылки"
 joi_flavor_rus.26.d: "Критика бесчеловечности системы ссылки, распространяемая через печатные издания, повлияла на многих жителей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. В обществе поднимается волна осуждения варварства и жестокости этой системы."
 joi_flavor_rus.26.f: "«За воротами — светлый свободный мир, где люди живут одинаковой жизнью. Но за стеной этот мир представляют себе как несбыточную сказку».\n«Здесь свой, особый, безобразный мир; здесь свои особые правила, своя одежда, свои нравы и обычаи, и безжизненный мёртвый дом, такой жизни нет больше нигде, и люди здесь особенные. Я хочу описать именно этот особый уголок...»\n«Летом здесь невыносимо душно, зимой — невыносимо холодно. Все полы сгнили, покрыты слоем грязи в два-три сантиметра, на них можно поскользнуться и упасть...»\n«Узкие, засаленные окна покрыты толстым слоем инея, так что читать в помещении почти невозможно в любое время дня. На стёклах лёд в два-три сантиметра. С потолка капает, везде дым. Мы как сельди в бочке...»"
 joi_flavor_rus.26.a: "Схватить этих смутьянов и сослать в Сибирь!"
 joi_flavor_rus.26.b: "Милосердный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] не боится критики: система ссылки действительно нуждается в реформе."
  #Визит французской делегации
 joi_flavor_rus.27.t: "Визит французской делегации"
 joi_flavor_rus.27.d: "В знак дружбы с Францией, по приказу парижского правительства, нашу страну посетила дипломатическая делегация [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] с дружественным визитом."
 joi_flavor_rus.27.f: "«Очевидное обновление союза создало в Европе ситуацию, и политические цели, которые наш союз может преследовать, побудили к обмену мнениями с целью определения наиболее подходящей позиции для наших правительств, искренне желающих поддерживать мир и наиболее эффективные гарантии...»\n«В случае угрозы агрессии в отношении одной из сторон, обе страны соглашаются незамедлительно согласовать совместные меры, которые необходимо принять в связи с такой возможностью»."
 joi_flavor_rus.27.a: "Добро пожаловать, наши французские друзья!"
  #Германский вопрос
 joi_flavor_rus.28.t: "Германский вопрос"
 joi_flavor_rus.28.d: "Предложения по решению германского вопроса хлынули потоком к [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 joi_flavor_rus.28.f: "«В политической географии нет настоящей Германии. Есть королевства и великие герцогства, герцогства и княжества, населённые немцами, каждое из которых управляется независимым сувереном со всем государственным аппаратом. Однако существует естественное подспудное течение, склоняющееся к национальному чувству и объединению немцев в одну великую нацию, управляемую единым главой как единое целое».\n«Мы не можем скрыть тот факт, что в этих странах жизнь немцев имеет свои положительные и отрицательные полюсы — на первом все интересы национальные и реформистские, на втором — все интересы династические и разрушительные. Германский вопрос — это не вопрос конституции, а вопрос власти; прусская монархия сейчас полностью немецкая, в то время как австрийская — нет»."
 joi_flavor_rus.28.a: "Слава победителю!"
 joi_flavor_rus.28.b: "Выпьем за дружбу!"
  #Октябрьская революция
 joi_flavor_rus.29.t: "Гражданская война в России!"
 joi_flavor_rus.29.d: "Ужасные политические потрясения и экономическая ситуация последних лет в конечном итоге захлестнули Россию. [TimeKeeper.GetCurrentDate.Format('d MMMM y г.')] по юлианскому календарю подпольная партия большевиков, скрывавшаяся под сенью царской короны, подняла вооружённое восстание в Санкт-Петербурге. Красная гвардия заняла Зимний дворец, резиденцию царя, объявила об отмене монархии и преобразовании России в Советскую республику."
 joi_flavor_rus.29.f: "«#bold Товарищи!#! Оглянитесь вокруг, посмотрите на деревню, на армию, и вы увидите, что крестьяне и солдаты больше не могут терпеть. Крестьянские восстания, как бурная река, разливаются по всей России, потому что их до сих пор обманывают, затягивая с передачей земли. Крестьяне не могут больше терпеть. Злой царь посылает войска для подавления крестьян, для защиты помещиков. Царь вступил в сговор с дворянскими генералами и офицерами, которые поддерживают помещиков!\nЕсли власть перейдёт к Советам, то немедленно будет объявлено, что помещичьи земли являются собственностью всего народа!\nПосмотрите, против чего выступает царь и его правительство, опирающееся на кулаков, капиталистов и помещиков!\nПосмотрите, ради кого они призывают вас «терпеть», #bold в чьих интересах!#!\nВы согласны «терпеть», #bold позволить царю силой подавлять крестьян, восставших за землю?#!\nТоварищи! Помните, царь обещал созвать Учредительное собрание и уже обманул народ один раз! Он торжественно обещал созвать его в течение месяца, но в итоге обманул народ. #bold Товарищи! Тот, кто доверяет царскому правительству, — предатель своих братьев, крестьян и солдат!#!\n#bold Долой царское правительство, эксплуатирующее трудовой народ! Вся власть Советам!»#!"
 joi_flavor_rus.29.a: "Да здравствует революция!"
 joi_flavor_rus.30.t: "Капитуляция Белой армии"
 joi_flavor_rus.30.d: "После разгрома контрреволюционного мятежа Временного правительства Сибири и Юга России, уничтожения объединённых сил анархистов, ликвидации буржуазных сепаратистов в Средней Азии, монархисты наконец капитулировали перед Советами на Амуре."
 joi_flavor_rus.30.f: "«Товарищи! [ROOT.GetCountry.GetNameNoFlag] добилась мира, хотя и на крайне тяжёлых и нестабильных условиях, что даёт возможность на некоторое время сосредоточить свои силы на самом важном и трудном аспекте социалистической революции, то есть на главной задаче пролетариата и беднейшего крестьянства, которое он ведёт, — на созидательной, или творческой, работе по созданию чрезвычайно сложной и тонкой новой организационной системы планового производства и распределения продуктов, необходимых для существования миллионов людей!\nТакая революция может быть успешно осуществлена только при условии самостоятельного исторического творчества большинства населения, прежде всего большинства трудящихся. Только в том случае, если пролетариат и беднейшее крестьянство сумеют проявить достаточно сознательности, идейности, твёрдости и самоотверженности, победа социалистической революции будет обеспечена»."
 joi_flavor_rus.30.a: "Пощадить их и направить на социалистическое строительство."
 joi_flavor_rus.30.b: "Мы должны в первую очередь уничтожить этих предателей, чтобы укрепить диктатуру Советов!"
  #Голодомор на Украине
 joi_flavor_rus.31.t: "Голодомор на Украине!"
 joi_flavor_rus.31.d: "Жестокая политика продразвёрстки в рамках коллективизации и засуха, охватившая Россию, в конечном итоге уничтожили сельскохозяйственное производство на Украине. Ужасный голод охватил Россию, и особенно сильно пострадала Украина."
 joi_flavor_rus.31.f: "Ужасный неурожай и страшная засуха охватили самые плодородные чернозёмные земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Голод, холод, террор... Советское правительство в столице, кажется, ничего об этом не знает и продолжает массово вывозить отсюда зерно. Крестьянские дома, скот, птица — всё было конфисковано. В Херсоне и Киеве отбирали даже печи, чайники и вёдра.\nВооружённые продотряды с ядовитым газом и пулемётами подавляли всех крестьян, не желавших сдавать зерно, объявляя это «ликвидацией антисоциалистических кулаков». Миллионы тонн зерна были вывезены. Украина и Донбасс были отрезаны от внешнего мира. Любой голодающий, пытавшийся покинуть Украину без разрешения, арестовывался как «классовый враг». Украинский Совет просил Москву снизить нормы заготовок, оставить крестьянам достаточно семян и продовольствия, но [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] безжалостно отверг эту просьбу."
 joi_flavor_rus.31.a: "Что за антисоветскую чушь ты несёшь?!"
  #Ленин в Октябре
 joi_flavor_rus.32.t: "Ленин в Октябре"
 joi_flavor_rus.32.d: "Лидер подпольной большевистской партии времён Российской империи, Владимир Ленин, после захвата власти коммунистами быстро вернулся в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] из Германии по железной дороге и стал вождём революции."
 joi_flavor_rus.32.f: "«Мне передали записку, я вам её прочту: „Ваша власть всё равно не удержится, из вашей шкуры сделают барабаны“.\nЯ вижу, что эти слова написаны не рукой рабочего. Боюсь, что у того, кто написал эту записку, не хватит смелости выйти и встать здесь.\nТоварищи! Я сомневаюсь, что он осмелится выйти и попробовать. Товарищи! Когда революция ещё продолжается, то есть когда целый класс гибнет, это совсем не то же самое, что смерть одного человека! #bold После смерти человека тело можно вынести, но когда гибнет старое общество, то, к сожалению, этот труп буржуазии невозможно сразу заколотить в гроб и похоронить.#!\nТруп буржуазии разлагается в наших сердцах, он заражает нас всех ядом, он смердит!\nПредатели, осуждённые волей народа, должны быть беспощадно уничтожены.\nПусть буржуазия сходит с ума! Пусть плачут эти ничтожные души!\nРабочие товарищи, наш ответ таков: тройная бдительность и осторожность, и ещё терпение.\nВсе должны стоять на своих постах. Товарищи, вы должны помнить: #bold у нас только один путь — победа; и другой путь — смерть!#!"
 joi_flavor_rus.32.a: "Смерть не для рабочего класса!"
  #Конец общинной системы
 joi_flavor_rus.33.t: "Конец общинной системы"
 joi_flavor_rus.33.d: "#variable Общинная система#! была отменена под руководством Его Величества [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]. Бесчисленные земли были реорганизованы, и нынешнее правительство уже начало обсуждение вопроса о новой собственности на землю..."
 joi_flavor_rus.33.f: "«В поте лица твоего будешь есть хлеб... доколе не возвратишься в землю, из которой ты взят, ибо прах ты и в прах возвратишься».\nНекогда прогнившая общинная система давила на наш народ, не давая никому вздохнуть. Никто не верил, что можно уничтожить эту систему, существовавшую сотни лет, но мы это сделали. Сегодняшняя [ROOT.GetCountry.GetNameNoFlag], подобно царю Давиду, сокрушила гиганта, стоявшего на нашем пути.\nПоля [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] снова оживут. Бедные крестьяне получили свою землю. Возможно, правительство сможет поощрить кулаков на восточноевропейских землях к расширению своих владений за счёт слияний, используя передовые инструменты и удобрения для извлечения несметных богатств. Или же эти земли будут равномерно проданы по низкой цене тем бедным крестьянам, которые когда-то владели ими?"
 joi_flavor_rus.33.a: "Продадим землю крестьянам."
 joi_flavor_rus.33.b: "Полностью приватизируем землю!"
  #Монгольский референдум
 joi_flavor_rus.34.t: "Монгольский референдум"
 joi_flavor_rus.34.d: "Бюллетени с референдума в Монгольском административном округе получил [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]. Весь мир следит за этим референдумом, и сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] колеблется в решении судьбы Монголии."
 joi_flavor_rus.34.f: "«Скажу вам честно, мы, [ROOT.GetCountry.GetNameNoFlag], хотим Внешнюю Монголию исключительно из военно-стратегических соображений».\n\n«Наш народ нас не простит. В такой ситуации народ непременно восстанет против правительства».\n\n«Если бы у вашей страны были силы, чтобы самой воевать с врагом, я бы, естественно, не выдвигал требований. Сегодня у вас нет этих сил, и говорить об этом — пустая болтовня!»\n\n«Ввиду того, что народ Внешней Монголии неоднократно выражал своё стремление к независимости, правительство [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] заявляет, что если плебисцит граждан Внешней Монголии подтвердит это стремление, правительство [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')] признает независимость Внешней Монголии в её нынешних границах»."
 joi_flavor_rus.34.a: "Голоса за присоединение к [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] победили с результатом 88,48%. Монголия принадлежит России!"
 joi_flavor_rus.34.b: "Голоса за независимость победили с результатом 97%. Монголия станет независимым государством!"