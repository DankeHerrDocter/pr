l_russian:
  #Завещание Петра Великого
 peter_instruction: "Завещание Петра Великого"
 peter_instruction_reason: "#variable Я, Пётр I#!, #variable император и самодержец всероссийский#!, #variable во имя Пресвятой и Нераздельной Троицы#!, объявляю всем моим наследникам на российском престоле и в [Concept('concept_government', 'правительстве')]:\n\nВсемогущий Бог, даровавший мне жизнь, внушил мне веру в то, что #bold народ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] призван в будущем стать народом-властелином мира#!, ведомый божественным светом и поддерживаемый Богом.\n\nЯ уверовал в это, видя, что большинство народов мира достигло #bold старческой дряхлости#! или, во всяком случае, стремительно приближается к ней. Отсюда следует, что #bold молодая империя, достигнув их могущества, легко и непременно сможет их покорить.#!\n\nЯ считаю грядущее нашествие северных народов на западные и восточные страны #bold предопределённым и устроенным Богом#! циклическим движением, подобно тому как Он устроил нашествие варваров для возрождения #bold римского народа#!. Это движение переселения с севера на юг подобно #bold разливу Нила#!, который периодически удобряет своим илом западные земли Египта. Я вижу, что #bold [ROOT.GetCountry.GetNameNoFlag] — это такая река#!, и таковой она останется после моей смерти. Мои наследники превратят #variable Россию#! в #variable море, которое оплодотворит#! бедную Европу, и если мои потомки сумеют #bold направить этот поток#!, его волны #bold сокрушат любые преграды на своём пути#!:\n\n#variable Ради этого мы можем и должны покорить мир!#!"
 peter_instruction_1_tt: "Выполнить 7 #bold Петровских#! [Concept('concept_journal_entry', 'Записей в дневнике')]"
 peter_instruction_2_tt: "Величайшие амбиции России будут осуществлены; мы станем Римской империей новой эры!"
 peter_instruction_3_tt: "Великий замысел Петра Великого обратился в прах. Возможно, эта эпоха не предназначена для нашей славы..."
 peter_instruction_status: "#bold #O Воплотить в жизнь мечту о великой империи, завещанную Петром Великим.#!#!"
 form_third_rome_tt: "#variable Если у нас монархия, наша страна будет переименована в Римскую империю!#!"
  #Экспансия в Средней Азии
 peter_instruction_cenasia: "Петровский указ: Покорение степи"
 peter_instruction_cenasia_reason: "В 1582 году #bold казачий атаман Ермак#! с несколькими сотнями человек перешёл Уральские горы и дерзко напал на ослабевшее #bold Сибирское ханство#!, основав первый имперский форпост в Сибири. С тех пор русские, движимые гневом за годы татарского ига, неустанно продвигались на восток!\n\nПрошло более двухсот лет. На смену потомкам Рюрика, правившим Русью, пришли #bold Романовы#!. Наши восточные владения достигли Америки, а покорение Сибири и Казахстана превратило Россию из второстепенного европейского королевства в крупнейшую континентальную империю мира.\n\nТеперь наше владычество над степью прочно, как никогда. Пришло время включить Среднюю Азию в состав нашей империи.\n\nЕсли Бог за нас, кто против нас?"
 peter_instruction_cenasia_1_tt: "Захватив степи Средней Азии, границы нашей великой империи достигнут Афганистана, и до Индии останется всего один шаг..."
 peter_instruction_cenasia_2_tt: "Отделившиеся от Средней Азии ханства нанесут тяжёлый удар по империи."
 abolition_of_kazakh_khanate_button: "Упразднить Казахское ханство"
 abolition_of_kazakh_khanate_button_desc: "Прошло много времени с тех пор, как Казахское ханство распалось на три жуза и стало нашим вассалом. Раньше мы позволяли этим кочевникам самоуправление из-за удалённости, но теперь всё изменилось! В интересах матушки-России в Средней Азии земли Казахского ханства должны быть полностью включены в состав империи, чтобы они стали нашим форпостом для дальнейшей экспансии. Конечно, мы рассмотрим возможность предоставления некоторой компенсации хану, который добровольно уступит нам свой престол."
 abolition_of_kazakh_khanate_button_possible_tt: "Указ об упразднении ханства ещё не издан."
 march_into_turkestan_button: "Поход в Туркестан"
 march_into_turkestan_button_desc: "Предыдущие экспедиции по завоеванию Средней Азии провалились. Несмотря на дальность пути, технический прогресс позволяет нам собрать мощную армию для полного разгрома оставшихся ханств. Организуем же поход! Отправим армию вдоль Семиречья и киргизских степей, через Токмак прямо на Самарканд!"
 march_into_turkestan_button_possible_1_tt: "Уже издан указ об упразднении Казахского ханства"
 march_into_turkestan_button_possible_2_tt: "Масштабная операция против Туркестана ещё не начиналась."
 march_into_turkestan_button_effect_tt: "Мы немедленно начнём внезапное нападение."
  #Амбиции на Ближнем Востоке
 peter_instruction_neareast: "Петровский указ: Амбиции на Ближнем Востоке"
 peter_instruction_neareast_reason: "Ещё с 1676 года наша империя [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] враждует со своим старым южным соседом — [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_TP')]. За сто с лишним лет войны с этим сильнейшим из мусульманских государств стали свидетелями возвышения нашей великой империи: от #bold Белградского мира 1739 года#!, принёсшего нам Азов, до #bold Ясского мира 1792 года#!. Каждая победа приносила нам Крымский полуостров, Запорожье и кавказские земли. Всего шесть лет назад, в восьмой русско-турецкой войне, наши войска почти дошли до Константинополя, и султан снова капитулировал, подписав #bold Адрианопольский мир#!. Наши владения на Кавказе расширились до Армении, а европейская граница приблизилась к Дунаю.\n\nНи сам царь, ни фельдмаршалы имперской армии не сомневаются в слабости [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]. Несмотря на возможное вмешательство [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')], если мы рискнём, то, возможно, именно сейчас настало время для великого дела — уничтожения этих неверных и расширения наших владений на весь Ближний Восток?"
 peter_instruction_neareast_1_tt: "Обеспечение контроля над Анатолией окажет мощную поддержку в реализации великого замысла всех царей — возвращении Города Желания Мира."
 peter_instruction_neareast_2_tt: "Возможно, османы докажут, что они не так уж и слабы."
  #Персидская кампания
 peter_instruction_persia: "Петровский указ: Персидская кампания"
 peter_instruction_persia_reason: "В 1826 году в результате [Concept('concept_war', 'войны')] с Персией мы отняли у неё азербайджанские земли. Несмотря на незначительное сопротивление персов, ослабевшая Каджарская династия рухнула под натиском могучей казачьей конницы. Жемчужина Загроса, Тебриз, теперь находится всего в сотне миль от имперской границы.\n\nПётр Великий в своём завещании ясно указал на важность Персии как центра мира. Возможно, стоит продолжить войну, не оконченную десять лет назад, и направить войска для захвата новых персидских территорий.\n\nОднако нельзя отрицать, что по мере расширения влияния [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] в Индии, они, скорее всего, вмешаются в наше завоевание Персии. Будь то дипломатией или войной, мы должны победить в этой игре с англичанами!"
 peter_instruction_persia_1_tt: "Земли Персии станут отличной базой для дальнейшего захвата Машрика. Контроль над Персией сыграет ключевую роль в укреплении нашего влияния на Ближнем Востоке."
 peter_instruction_persia_2_tt: "Поражение в Персии ещё больше подорвёт наш престиж..."
  #Завоевание Востока
 peter_instruction_fareast: "Петровский указ: Завоевание Востока"
 peter_instruction_fareast_reason: "Амбиции Петра Великого стать #bold тихоокеанской морской державой#! и наши планы по экспансии в Средней Азии привели к тому, что после покорения Сибири мы столкнулись с могущественным [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_TP')]. Мы пытались бросить вызов авторитету этой империи, но после серии столкновений были вынуждены пойти на компромисс и подписать унизительный #bold Нерчинский договор#!.\n\nОднако времена изменились. Наше положение на Дальнем Востоке теперь непоколебимо. Пришло время исполнить волю Петра Великого и Екатерины Великой и, воспользовавшись слабостью [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')], захватить эти земли и включить Восточную Азию в состав нашей империи."
 peter_instruction_fareast_1_tt: "Слухи о том, что [SCOPE.sCountry('CHI_scope').GetNameNoFlag] слаба, подтвердились нашими войсками и распространились по всему двору. Пришло время разработать план, чтобы свергнуть эту империю с незаслуженного ею положения и превратить плодородные китайские земли в рай для русских!"
 peter_instruction_fareast_2_tt: "Наши интересы в Тихом океане не будут обеспечены..."
  #Жандарм Восточной Европы
 peter_instruction_easteurope: "Петровский указ: Жандарм Восточной Европы"
 peter_instruction_easteurope_reason: "Земли Восточной Европы издревле были раем для славянских народов. А после решающей победы империи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в #bold Наполеоновских войнах#!, европейские страны, из благодарности и страха, присвоили нам почётное звание #bold «жандарма Европы»#!. Возможно, это звание и преувеличено, но наш статус «жандарма» в Восточной Европе неоспорим.\n\nПольские земли, некогда завоёванные Фридрихом Великим, после #bold Венского конгресса#! вошли в состав матушки-России. Несмотря на это, многие наши славянские братья в Восточной Европе всё ещё находятся под игом [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], терпят мучения и страдания и отчаянно молят о присоединении к нам.\n\nХотя эта империя и кажется сейчас процветающей, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] уверен, что её сила скоро иссякнет, #bold и освобождение славянских братьев станет миссией, возложенной на нас Богом!#!"
 peter_instruction_easteurope_1_tt: "Польша, находящаяся под властью [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')], поможет нам укрепить наше абсолютное господство в славянском мире и даст возможность для дальнейшего вмешательства в дела Германии."
 peter_instruction_easteurope_2_tt: "[SCOPE.sCountry('AUS_scope').GetNameNoFlag] — нелёгкий противник. Несмотря на это, такое поражение всё равно подорвёт наш авторитет в глазах славян..."
 peter_instruction_easteurope_status: "Изгнать Габсбургов из Восточной Европы и установить там наше военное присутствие"
 peter_instruction_easteurope_complete_tt: "Любая [Concept('concept_army', 'армия')] в #O польском#! [Concept('concept_hq', 'штабе')] имеет более #variable 500#! [Concept('concept_unit', 'подразделений')]"
  #Северный лев
 peter_instruction_northeurope: "Петровский указ: Северная экспансия"
 peter_instruction_northeurope_reason: "«#bold Это страна, которую я завоевал своей армией; отныне и вовеки я присоединяю её к Российской империи.#! Ввиду этого я приказываю её жителям принести присягу на верность императору и подчиниться мне».\n\n#bold Святой царь Александр I Благословенный#! завоевал [SCOPE.sCountry('FIN_scope').GetAltNameNoFlag('RU_CL_VP')], что обеспечило нам господствующее положение на Балтийском море — важном торговом центре. Несмотря на это, на землях Северной Европы [SCOPE.sCountry('SWE_scope').GetNameNoFlag] всё ещё притворяется, что сидит на своём троне. Несомненно, с точки зрения силы, [SCOPE.sCountry('SWE_scope').GetAltNameNoFlag('RU_CL_DP')], как проигравшему в Северной войне, не подобает править такими обширными землями. Если они заключат союз с континентальными державами, то всё ещё могут представлять #bold для нас большую угрозу.#!\n\nВместе с короной [SCOPE.sCountry('NOR_scope').GetAltNameNoFlag('RU_CL_RP')], ради безопасности империи, вся Скандинавия должна перейти под милостивое правление, которое осуществляет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 peter_instruction_northeurope_1_tt: "Завоевать Северную Европы, чтобы установить там генерал-губернаторство, или заставить её подчиниться и напрямую конфисковать их территории."
 peter_instruction_northeurope_2_tt: "Процветание торговли на Балтийском море — наша жизненно важная артерия.\nЕсли её не обеспечить, города империи на севере окажутся под прямой угрозой!"
 peter_instruction_northeurope_status: "Достичь полного завоевания Скандинавского полуострова"
  #Мечта о Царьграде
 peter_instruction_constantinople: "Петровский указ: Завоевание Царьграда"
 peter_instruction_constantinople_reason: "«Я дарую им #bold империю без конца...#! Два Рима пали, третий стоит, а четвёртому не бывать: никто не сможет превзойти верность [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] Христу.\n\nС падения #bold Византийской империи#! прошло уже почти четыреста лет. Слава Римской империи попрана копытами [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]. Царица городов стенает, народы Балкан молят об освобождении от тирании врага. Несомненно, как единственная в мире страна, имеющая законные притязания на #bold «Третий Рим»#!, наша великая родина является самым подходящим защитником для этих единоверцев.\n\nНо без #bold возвращения Города Желания Мира, Константинополя#!, наши притязания и наш авторитет у балканских братьев будут бессмысленны."
 peter_instruction_constantinople_1_tt: "Константинополь станет Царьградом, принадлежащим империи;\nНаши притязания на Третий Рим станут абсолютно законными!"
 peter_instruction_constantinople_status: "Вернуть #bold Город Желания Мира#!, утраченный христианским миром в 1453 году."
  #К Евфрату
 peter_instruction_euphrates: "Господство в Месопотамии"
 peter_instruction_euphrates_reason: "Месопотамия, легендарное место Эдемского сада, взрастившая прародителей всего человечества, теперь находится в руках нецивилизованных язычников. Это неприемлемо для всего христианского мира. Но эти презренные еретики ничего не предпринимают. Пусть же мы, как истинная восточная церковь, начнём действовать.\n\nДавней мечтой Петра Великого было получить выход к Индийскому океану и влиять на богатую Индию. Хотя сложная религиозная обстановка в регионе может стать серьёзным испытанием для наших и без того ограниченных административных возможностей, русские всегда верили, что каждая начатая нами война будет последней, сокрушающей врага.\n\nИменем царя, вперёд!"
 peter_instruction_euphrates_1_tt: "Завоевание Басры принесёт нашей стране огромные выгоды в Персидском заливе."
  #Угроза Индии
 peter_instruction_threatindia: "Угроза Индии"
 peter_instruction_threatindia_reason: "#bold Афганистан#! — эта бесплодная и бесполезная земля язычников. Так можно было бы считать, если бы не богатая Индия к югу от неё.\n\nГеографическое положение этой земли сделало её объектом борьбы между нами и англичанами. Мы должны признать, что завоевание Туркестана было несколько поспешным. Англичане не потерпят даже малейшей вероятности того, что мы приблизимся к тому, что они называют «жемчужиной в короне». Но это не значит, что мы должны считаться с их мнением: как только мы захватим Афганистан, мы сможем беспрепятственно направить наш «паровой каток» на эту #bold землю, которую не смог покорить даже Александр Македонский.#!"
 peter_instruction_threatindia_1_tt: "Пусть боятся, лишь бы ненавидели!"
 peter_instruction_threatindia_2_tt: "Провальный план завоевания может вызвать месть англичан..."
  #Желтороссия
 peter_instruction_yellowrussia: "План «Желтороссия»"
 peter_instruction_yellowrussia_reason: "Богатая Азия снова вступила в полосу упадка, династии сменяют друг друга — но на этот раз не будет таких шуток, как получение дани в Москве сто лет назад:\n\nНаши исследователи, отправленные в [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_VP')], представили империи план полного продвижения и захвата наших передовых позиций в Маньчжурии с целью включения обширных и богатых земель северного Китая под власть империи.\n\nВладивосток — это только начало. Границы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] будут расширяться до самого края Азии. Мы включим в состав нашей родины весь Восток!"
 peter_instruction_yellowrussia_1_tt: "В будущем у нас появится возможность полностью русифицировать земли Северного Китая."
 peter_instruction_yellowrussia_complete_tt: "Любая [Concept('concept_army', 'армия')] в #O северокитайском#! [Concept('concept_hq', 'штабе')] имеет более #variable 300#! [Concept('concept_unit', 'подразделений')]"
  #Завоевание Монголии
 peter_instruction_conqueror_mongolia: "Завоевание Монголии"
 peter_instruction_conqueror_mongolia_reason: "Со времён #variable монгольского нашествия 1242 года#! мы никогда не были так близко к родине монголов. Угэдэй некогда выступил отсюда и дошёл до #bold земель к западу от Волги#!. Но теперь их империя давно пришла в упадок и даже попала под власть [SCOPE.sCountry('CHI_scope').GetAltNameNoFlag('RU_CL_RP')].\n\nМы уже получили множество просьб от монгольской знати и народа, которые надеются, что великий [ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] освободит их от жестокого правления Пекина. Это даёт нам совершенно законное основание для ввода войск в Монголию.\n\nЗавоевания монголов сформировали нашу раннюю империю. Теперь величие [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] поставит в Монголии идеальную точку. #bold Пришло время для окончательной мести судьбы!#!"
 peter_instruction_conqueror_mongolia_tt: "У нас будет возможность решить, будем ли мы напрямую управлять монгольскими степями."
  #Строительство Владивостока
 peter_instruction_vladivostok: "Строительство Владивостока"
 peter_instruction_vladivostok_reason: "Сотни лет мы пытались перейти ледяные Уральские горы, но находили лишь бесконечные снежные равнины.\n\nНо с нашим завоеванием Востока незамерзающий порт на Дальнем Востоке, #bold Владивосток#!, уже в наших руках.\n\nБогатые ресурсы Тихого океана и стратегические интересы на Дальнем Востоке означают, что холодная Сибирь больше не будет просто лесопилкой для ссылки преступников и военнопленных, а сможет доставлять из далёких восточных земель символы богатства — пушнину и минералы — в сокровищницу Москвы!"
 peter_instruction_vladivostok_1_tt: "Владивосток станет ключевым форпостом империи на Востоке."
 peter_instruction_vladivostok_status: "Превратить бедное побережье в принадлежащий России незамерзающий порт Владивосток."
 peter_instruction_vladivostok_2_tt: "Мы упустим возможность построить порт на Дальнем Востоке."
  #Германский вопрос
 peter_instruction_germanproblem: "Германский вопрос"
 peter_instruction_germanproblem_reason: "#bold Германский регион#! всегда оказывал глубокое влияние на Россию. #bold Екатерина II#! была немецкой принцессой, но стала одной из самых влиятельных императриц в истории России.\n\nНе только родственные связи, но и значительные интересы связывают Россию с Германией: германское побережье контролирует Эресунн, пролив между Северным и Балтийским морями, #bold от которого зависит наша жизненно важная торговля#!. А государства германского региона являются важным буфером между нами и западноевропейскими державами. Хотя Военное министерство и разработало амбициозный план, названный ими «наступательной обороной», никто не хочет повторения #bold Семилетней войны#!. Урок Петра III ещё не забыт перед Зимним дворцом. Однако мы не хотим и появления единой сильной германской державы.\n\nНа данный момент мы можем либо дипломатическими средствами препятствовать их объединению, либо прибегнуть к силе. В любом случае, решение германского вопроса определит нашу гегемонию на континенте..."
 peter_instruction_germanproblem_1_tt: "Будь то пером или мечом, наша политика в решении германского вопроса определит наши дальнейшие шаги..."
 peter_instruction_germanproblem_status: "Изменить наши интересы в германском регионе, чтобы эта соседняя земля приносила нам пользу, а не угрозу."
  #Реформы Александра II
 alexander_reform: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] — Великий Реформатор"
 alexander_reform_status: "#V #U #B В течение 30 лет после восшествия на престол нового монарха мы должны реформировать нашу родину в современную, истинную [Concept('concept_great_power', 'великую державу')].#!#!#!"
 alexander_reform_reason: "«Общество призывает к выполнению одной из самых трудных задач, которые могут стоять перед самодержавным правителем: #bold коренному преобразованию огромного государства, вверенного его попечению#!, отмене древнего порядка, основанного на рабстве, и замене его гражданским достоинством и свободой, установлению справедливости в стране, которая никогда не знала законности, перестройке всего правительства, введению свободы печати на фоне неограниченной власти, призыву на каждом шагу новых сил и созданию для них прочной правовой основы... поднять подавленное и униженное общество и дать ему возможность #bold проявить свою силу#!.»\n\n[ROOT.GetCountry.GetNameNoFlag] сегодня подобна гиганту в оковах, каждое её движение — это шаг с огромным трудом. Англия и Франция, благодаря #variable промышленной революции#!, уже давно вырвались вперёд, а мы всё ещё спорим о методах обработки земли крепостными.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] решил: время реформ пришло! Мы должны построить новую, цивилизованную русскую родину, чтобы получить преимущество во всё более острой мировой конкуренции."
 alexander_reform_1_tt: "Завершить четыре [Concept('concept_journal_entry', 'записи в дневнике')] #V реформы#!"
 alexander_reform_2_tt: "Успешная реформа значительно укрепит нашу великую родину."
 alexander_reform_3_tt: "Неудачная реформа лишь опозорит Ваше Величество..."
  #Военная реформа
 alexander_reform_army: "Реформа императорской армии"
 alexander_reform_army_reason: "«Направо! ...Дурак, это налево, ты что, право и лево не различаешь?»\n\n#bold Пётр Великий#! оставил нам передовую и дисциплинированную армию, но со временем она пришла в упадок, до такой степени, что другие страны называют наших солдат #bold «серым скотом»#!, который лишь заполняет окопы крепостными в военной форме.\n\nПришло время изменить этот стереотип. Чтобы соответствовать экспансии России и её амбициям, мы должны реорганизовать нашу армию, отменив отсталую систему, при которой крепостным просто выдают винтовку и называют солдатами. Только хорошо обученная постоянная армия сможет удовлетворить наши завоевательные устремления."
 alexander_reform_army_1_tt: "Три месяца назад они были крестьянами, ремесленниками, студентами.\nТеперь в них отвага самого архангела Михаила!"
 alexander_reform_army_2_tt: "Такая невежественная армия рано или поздно потерпит крах!"
  #Крепостная реформа
 alexander_reform_slave: "Реформа крепостного права"
 alexander_reform_slave_reason: "Хотя после #bold раздела Польши в 1795 году#! мы обнаружили, что большинству польских крепостных в России живётся лучше, чем раньше, это лишь относительно. Добрый царь не может мириться с тем, что его подданные голодают — мы владеем плодородными украинскими равнинами, но выращенные пшеница и картофель не могут прокормить тех, кто их сеет.\n\nС любой точки зрения, крепостные не должны быть привязаны к поместьям. У них должны быть своя земля и свобода.\n\nЕдинственный вопрос: следует ли быстро раздать землю крепостным, или же умеренный выкуп ускорит реформу?"
 alexander_reform_slave_1_tt: "Освобождённые от оков крепостные внесут огромный вклад в силу отечества.\nОднако это вызовет недовольство дворянства..."
 alexander_reform_slave_2_tt: "Крепостное право не может существовать вечно..."
  #Бюрократическая реформа
 alexander_reform_bera: "Реформа бюрократии"
 alexander_reform_bera_reason: "Если вы подадите заявку на открытие счёта на Лондонской фондовой бирже, это сделают быстро. Но если вы захотите открыть счёт в Москве, боюсь, это займёт дня три-четыре... О нет, в Москве счёт не открыть, здесь нет биржи.\n\n#bold Наследные бояре#! слишком долго монополизировали бюрократический аппарат. Иногда даже царские указы для них — пустой звук. Если мы хотим возродить родину, мы должны выкорчевать этих прогнивших паразитов и жадных упырей!"
 alexander_reform_bera_1_tt: "Новая бюрократическая система поможет нашей стране достичь более эффективного правления."
 alexander_reform_bera_2_tt: "Эти дворяне продолжат заправлять административным аппаратом империи..."
  #Дворянская реформа
 alexander_reform_noble: "Реформа Дворянского собрания"
 alexander_reform_noble_reason: "Многие западноевропейские державы уже ввели так называемую #bold конституционную монархию#!, и Россия не может оставаться в стороне. Хотя царь и помазанник Божий, рождённый править Россией, нам всё же необходимо разработать свод законов для сбалансирования российской политики.\n\nНужно заново разработать и принять полноценную конституцию, которая обеспечит поддержку бояр, но при этом начнёт децентрализацию царской власти. Прежняя политика придворных министров — это прогнившее дерево. Английская система партийного парламента тоже не идеальна. Возможно, мы сможем создать совершенно новую политическую систему, наилучшим образом подходящую для России."
 alexander_reform_noble_1_tt: "Создание новой «избирательной» системы может ещё больше оптимизировать нашу политику..."
 alexander_reform_noble_2_tt: "У Великой России свой путь..."
  #Сибирская ссылка
 siberian_penal_land: "Сибирская ссылка"
 siberian_penal_land_reason: "#variable Сибирь#! — эта огромная тюрьма без крыши, земля богатств и льда, земля свободной [Concept('concept_migration', 'миграции')] и несвободной [Concept('concept_exile', 'ссылки')].\n\nОсвоение Сибири началось во #variable времена Ивана Грозного#!. Изначально освоение к востоку от Урала представляло собой лишь форпосты, основанные казаками-промысловиками и немногочисленными [Concept('concept_migration', 'мигрантами')]. За несколько десятилетий нам удалось установить элементарное правление на всей территории Сибири под влиянием наших форпостов. Но очевидно, что Сибирь, по сравнению с тёплыми южнорусскими равнинами, совершенно непривлекательна. Богатства, скрытые под таёжными лесами и льдами, #bold невозможно освоить без достаточного количества людей#!, и это неприемлемо для родины. Так, при совместном правлении #variable Петра Великого и его брата Ивана V#! родилась система ссылки.\n\nЧтобы не погубить тело, мы должны избавляться от вредных веществ. То же самое и в обществе. Бесчисленное множество людей, совершивших ужасные преступления, которых [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] милостиво избавил от смертной казни. Взамен они должны отправиться в города Сибири и принести последнюю пользу родине.\n\nИндустриализация [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] делает нас более зависимыми от [Concept('concept_resource_potential', 'ресурсного потенциала')] к востоку от Урала, но существующих преступников недостаточно для освоения этой огромной и пустой пустоши. Мы должны использовать все средства, как благородные, так и... не очень.\n\n#bold Для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#! это необходимая жертва."
 siberian_penal_land_tt_1: "Тратя #bold очки ссылки#!, мы можем целенаправленно отправлять ссыльных в различные отрасли Сибири."
 siberian_penal_land_tt_2: "#bold Ссылка на рудники, ссылка на картофельные поля, ссылка на заводы, ссылка на лесозаготовки#! — всё это будет стоить нам 25 #bold очков ссылки#!.\n#bold Принятие суровых законов#! добавит нам 100 очков ссылки.\n#bold Продажа царской милости#! будет стоить нам 50 очков ссылки в обмен на значительную сумму выкупа."
 siberian_1_button: "Ссылать на рудники"
 siberian_1_button_desc: "Эти непростительные преступники, даже избежав смерти, должны отдать свои последние силы в Нерчинских рудниках!"
 siberian_1_button_tt: "Снижает очки ссылки на 25\nСсылку можно применять только раз в 3 года!"
 siberian_2_button: "Ссылать на картофельные поля"
 siberian_2_button_desc: "В Сибири ощущается острая нехватка продовольствия, а из восточноевропейских земель невозможно доставить достаточное количество еды. Однако мы можем сослать несколько заключённых для выращивания сельскохозяйственных культур, например, картофеля, чтобы они сами себя прокормили."
 siberian_2_button_tt: "Снижает очки ссылки на 25\nСсылку можно применять только раз в 3 года!"
 siberian_3_button: "Ссылать на заводы"
 siberian_3_button_desc: "Нехватка рабочей силы всегда была непреодолимой проблемой для нашей слабой промышленности. Суровый климат и неблагоприятное географическое положение приводят к тому, что на наших сибирских заводах всегда не хватает рабочих рук. Но мы можем найти другой выход: сослать на работу покорных заключённых, которым не нужно платить."
 siberian_3_button_tt: "Снижает очки ссылки на 25\nСсылку можно применять только раз в 3 года!"
 siberian_4_button: "Ссылать на лесозаготовки"
 siberian_4_button_desc: "Высокие деревья, растущие в сибирской тайге, — прекрасный материал. Они — главный экспортный товар родины, лучший выбор для строительства военных кораблей и мебели. Ссылка нескольких заключённых на лесозаготовки должна увеличить наше производство древесины."
 siberian_4_button_tt: "Снижает очки ссылки на 25\nСсылку можно применять только раз в 3 года!"
 siberian_5_button: "Принять суровые законы"
 siberian_5_button_desc: "Даже самому мудрому учёному не пришло бы в голову, что страна может беспокоиться из-за нехватки преступников. Бродяги, падшие женщины, нежелательные элементы — мы найдём способ отправить их туда, где они нужны. Хотя это может вызвать некоторую незначительную критику..."
 siberian_5_button_tt: "Добавляет 100 очков ссылки\nЗакон можно принимать только раз в 5 лет!"
 siberian_6_button: "Продавать царскую милость"
 siberian_6_button_desc: "Любой может достичь границы Европы и тёмного континента, так же как любой может за деньги получить указ о помиловании, чтобы другой человек отправился вместо него в Сибирь, включая революционеров и предателей..."
 siberian_6_button_tt: "Снижает очки ссылки на 50\nМилость можно продавать только раз в 5 лет!\n#bold Это действие доступно только при сохранении монархии в нашей стране!#!"
 panel_event_tt_1: "Получить 25 #bold очков ссылки#!"
 panel_event_tt_2: "Снизить на 25 #bold очков ссылки#!"
 panal_russia_tt: "Сослать часть неместного населения из восточноевропейских губерний\nв указанные сибирские губернии"
 siberian_penal_land_status: "#V #bold #N Бесчеловечная система ссылки может вызвать критику.#!#!#!"
 siberian_need_25_tt: "Необходимо не менее 25 очков ссылки"
 siberian_need_50_tt: "Необходимо не менее 50 очков ссылки"
  #Франко-русский союз
 franco_russian_alliance: "Франко-русский союз"
 franco_russian_alliance_status: "#bold Общие интересы в Германии могут стать прочной основой для [Concept('concept_alliance', 'союза')] между Францией и Россией.#!"
 franco_russian_alliance_reason: "Наша [ROOT.GetCountry.GetNameNoFlag] и [SCOPE.sCountry('FRA_scope').GetNameNoFlag] — самые удалённые друг от друга страны в Европе, и наши политические системы во многом различны. В прошлом французский император Наполеон даже вторгся в самое сердце нашей страны, заставив государя Александра I сжечь Москву.\n\nОднако с изменением мировой обстановки, ради #bold реальных политических интересов#!, [SCOPE.sCountry('FRA_scope').GetNameNoFlag] уже проявила желание устранить давнюю вражду с нашей страной и даже совместно противостоять угрозе из Центральной Европы. Более того, из-за острой потребности нашей страны в #bold капитале и передовых технологиях#! для индустриализации, дружелюбная Франция может стать #bold хорошим экономическим партнёром в развитии нашей страны#!.\n\nДипломатическая делегация из [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] в том же месяце, когда французские военные корабли проявили дружественные намерения, посетила Кронштадт. В #variable Петергофском дворце#! на берегу Финского залива царь устроил пышный обед в честь французских гостей. На приёме оркестр из [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] исполнил #bold французский гимн «Марсельезу»#!. Хотя эта песня в то время была полна бунтарского духа, присутствовавший царь специально встал, чтобы выслушать её в знак уважения.\n\nЛёд между нашими странами растоплен. Мы верим, что наша дружба продлится тысячи лет, и мы вместе будем противостоять всем врагам.\n\n#variable Франция и Россия вместе — их сила несокрушима!#!"
 franco_russian_alliance_tt: "#bold Предоставление дипломатической поддержки Франции и предоставление военной поддержки Франции#! увеличат очки сотрудничества на 50.\n#bold Запрос финансового кредита у Франции и запрос на технологический обмен#! будут стоить 50 очков сотрудничества.\nЕсли того потребует обстановка, можно будет стремиться к #bold подписанию «Союзного договора»#! для укрепления нашего военного союза с Францией или #bold разрыву франко-русского союзного договора#!, чтобы немедленно прекратить любые союзнические отношения."
 franco_russian_alliance_2_tt: "Любая из сторон союза выполнила действие #bold «Разорвать франко-русский союзный договор»#!"
 rus_alliance_1_button: "Оказать дипломатическую поддержку Франции"
 rus_alliance_1_button_desc: "Франция часто оказывается в неловкой изоляции на международной арене. Однако, как союзники, мы уверены, что некоторая дипломатическая поддержка будет им очень полезна."
 rus_alliance_1_button_tt: "Увеличивает очки сотрудничества на 25\nПоддержку можно оказывать только раз в 5 лет!"
 rus_alliance_2_button: "Оказать военную поддержку Франции"
 rus_alliance_2_button_desc: "Французская армия, безусловно, сильна, но ей будет трудно противостоять нескольким сильным врагам одновременно. Предоставление нескольких надёжных солдат для их Иностранного легиона будет очень кстати."
 rus_alliance_2_button_tt: "Увеличивает очки сотрудничества на 25\nПоддержку можно оказывать только раз в 5 лет!\nДля выполнения этого действия необходимо иметь законы «Профессиональная армия» или «Массовый призыв»."
 rus_alliance_3_button: "Запросить финансовый кредит у Франции"
 rus_alliance_3_button_desc: "Наша индустриализация остро нуждается в финансировании, а у нашего доброго союзника Франции финансовая система весьма развита. По политическим соображениям получить у французского правительства и банков низкопроцентные кредиты будет чрезвычайно легко."
 rus_alliance_3_button_tt: "Снижает очки сотрудничества на 50\nЗапрос можно делать только раз в 5 лет!"
 rus_alliance_4_button: "Запросить технологический обмен у Франции"
 rus_alliance_4_button_desc: "Наши научные исследования всегда отставали от мировых держав, но не у Франции. Мы уверены, что для противостояния общему врагу французское правительство с радостью направит нескольких экспертов и профессоров из Французской академии наук и университетов для визита и обмена опытом в нашу страну."
 rus_alliance_4_button_tt: "Снижает очки сотрудничества на 50\nЗапрос можно делать только раз в 5 лет!"
 rus_alliance_5_button: "Продлить «Союзный договор»"
 rus_alliance_5_button_desc: "Мировая обстановка для нас крайне напряжённая. Пришло время напомнить французам о выполнении союзнических военных обязательств и прийти нам на помощь в бою!"
 rus_alliance_5_button_tt: "Продлевать можно только раз в 10 лет."
 rus_alliance_6_button: "Разорвать франко-русский союзный договор"
 rus_alliance_6_button_desc: "Союз нашей страны с Францией подошёл к концу. Пришло время положить конец этому союзу по расчёту. Пусть французы убираются!"
 frarusallience_event_tt_1: "Получить 50 #bold очков сотрудничества#!"
 rus_alliance_button_need_50_tt: "Необходимо не менее 50 очков сотрудничества"
  #Русская православная церковь
 moscow_patriarchate: "Русская православная церковь"
 moscow_patriarchate_reason: "История #variable Русской православной церкви#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] восходит ко временам #variable великого князя Владимира#! Киевской Руси. Она прошла через взлёт и падение Киевской Руси, пережила тёмные времена монгольского нашествия, видела объединение русских земель Москвой, нашу экспансию и изменения до сегодняшнего дня, став не только #bold духовной опорой русского народа#!, но и #bold символом нашего национального единства#!.\n\nХотя в результате #bold Реформации#! и #bold Просвещения#! во многих странах Европы роль [Concept('concept_religion', 'религии')] стала ослабевать, а традиции и вера попираться, на Востоке положение #bold православия#! остаётся незыблемым. Со времён #bold учреждения Петром Великим в 1721 году Святейшего Правительствующего Синода#!, [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] были включены в состав имперской администрации нашим правительством. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] является верховным главой церкви, что прочно связывает его с авторитетом, который имеют [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], и во имя Господа он правит и защищает не только [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], но и всех верующих по всему миру.\n\nВсе верят, что наша страна под руководством помазанника Божьего уничтожит всех врагов. В вихре власти и интриг #variable Русская православная церковь#! и #bold [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#! будут стоять вечно, как #bold Уральские горы#!."
 moscow_patriarchate_status: "#I #B Поддерживать положение православия в нашей стране.#!#!"
  #Серия «Октябрьская революция»
 bolshevik_rebellion: "Октябрьская революция"
 bolshevik_rebellion_reason: "#bold [Concept('concept_war', 'Война')] и [Concept('concept_revolution', 'революция')] охватили всю территорию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: от равнин Восточной Европы до полярных областей Дальнего Востока, от Петербурга и Финского залива до Севастополя#!. Бесчисленные враги [Concept('concept_revolution', 'революции')] объединились, чтобы свергнуть созданный в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] объединёнными силами, в которые входят #v $soldiers$#!, #v $laborers$#! и #v $farmers$#!, орган, провозгласивший всему миру свою форму борьбы: «[GetLawType('law_council_republic').GetName]».#!\n\nПредставители, которых имеет [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName], и [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] идут ва-банк. Для них это последняя битва. Чтобы уничтожить советскую власть, они готовы #bold пойти на любые преступления#!, чтобы стереть всю нашу социалистическую историю. Ибо, когда трудящиеся массы сами берут власть, когда дело касается защиты кошельков правящего класса, этот класс совершает #bold невиданные преступления и массовые убийства#!. Но, хотя нам и трудно будет быстро одержать победу в этой борьбе, которая может перерасти в жестокую внутреннюю [Concept('concept_war', 'войну')], мы должны до основания разрушить прежний буржуазный строй и #bold на его руинах начать строительство нового социалистического общества!#!\n\n#bold Товарищи#!, мы начали и ведём [Concept('concept_war', 'войну')] против эксплуататоров. Буржуазии не удастся остановить эту [Concept('concept_revolution', 'революцию')]. Наша #variable социалистическая советская республика#! будет #bold твёрдо стоять#! как факел международного социализма, как пример для трудящихся масс всех стран!\n\n#variable [Concept('concept_revolution', 'Революция')] непобедима!#!"
 is_at_civil_war_with_trade_unions: "Идёт гражданская война с правящими профсоюзами"
 trade_unions_steel_power: "#bold Коммунисты захватили власть силой#!"
 rus_civil_war_begin: "Армии независимости Польши, Эстонии, Латвии, Литвы, Украины, Средней Азии и Кавказа начнут войну за независимость!\nМонархические армии Сибири начнут гражданскую войну с целью свержения советской власти!\nРеспубликанские армии Юга России начнут гражданскую войну с целью свержения советской власти!"
 complete_july_revolution: "Гражданская война окончена, советская власть укрепилась.\nПо крайней мере, все антисоветские силы, кроме польских, эстонских, литовских и латвийских, разгромлены."
 rus_civil_war_start_tt: "Гражданская война началась"
  #Эксклюзивный дневник СССР
 first_five_years_plan: "Первый пятилетний план"
 first_five_years_plan_reason: "Хотя уровень агротехники в нашей стране всё ещё низок, для всей экономики [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #bold сельское хозяйство по-прежнему занимает первое место#!.\n\nПродолжительность преобладания сельского хозяйства в экономике [Concept('concept_country', 'страны')] зависит не только от внутренних экономических успехов, но и от хода развития за рубежом. Поэтому, оценивая каждый свой шаг, не следует ни на минуту забывать или игнорировать тот факт, что сельское хозяйство преобладает.\n\nВ общей экономической структуре нашей страны #bold восстановление [Concept('concept_country', 'промышленности')] должно быть тесно связано с развитием сельского хозяйства#!. Прежде чем промышленность сможет добиться решающих успехов, необходимо получить оборотные средства из сельского хозяйства, из излишков сельскохозяйственной продукции, превышающих потребности деревни. Именно поэтому мы должны завершить аграрную реформу, #bold полностью переведя сельское хозяйство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на социалистические рельсы.#!"
 first_five_years_plan_gdp_tt: "Увеличить ваш ВВП на 25%"
 first_five_years_plan_tt: "#bold Одновременно#! быть ведущим производителем следующих [Concept('concept_goods', 'товаров')]: [SCOPE.sGoods('fertilizer_scope').GetName], [SCOPE.sGoods('tools_scope').GetName] и [SCOPE.sGoods('grain_scope').GetName]#!#!"
 first_five_years_status: "#bold Осуществить всестороннюю реформу сельскохозяйственного производства Советской Родины#!"
 first_five_years_plan_goal: ""
 second_five_years_plan: "Второй пятилетний план"
 second_five_years_plan_reason: "#bold Только с подлинным развитием промышленных предприятий#!, с восстановлением тяжёлой промышленности как единственной прочной основы для закона «[GetLawType('law_council_republic').GetName]» и с фактическим завершением строительства железных дорог, может и должно измениться соотношение сельского хозяйства и промышленности во всей экономике [Concept('concept_country', 'страны')], и центр тяжести может и должен будет переместиться с сельского хозяйства на промышленность.\n\nПартия должна систематически, непоколебимо, не жалея сил и средств, как можно быстрее развивать промышленность и тяжёлую промышленность и стремиться ускорить этот процесс. Только та промышленность, которая производит больше, чем потребляет, сможет стать победителем. Промышленность, живущая за счёт бюджета, то есть #bold за счёт сельского хозяйства, не может создать прочной и долговечной опоры для диктатуры пролетариата#!!.\n\nТаким образом, вопрос о создании прибавочной стоимости в государственной промышленности — это вопрос судьбы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], то есть судьбы пролетариата: #bold поэтому мы должны развивать отечественную промышленность.#!"
 second_five_years_plan_gdp_tt: "Увеличить ваш ВВП на 25%"
 second_five_years_plan_tt: "#bold Одновременно#! быть ведущим производителем следующих [Concept('concept_goods', 'товаров')]: [SCOPE.sGoods('steel_scope').GetName], [SCOPE.sGoods('coal_scope').GetName] и [SCOPE.sGoods('iron_scope').GetName]#!#!"
 second_five_years_status: "#bold Осуществить переход Советской Родины от аграрной страны к индустриальной#!"
 second_five_years_plan_goal: ""
 third_five_years_plan: "Третий пятилетний план"
 third_five_years_plan_reason: "Необходимым условием для возрождения и развития промышленности, особенно тяжёлой, является реальное упорядочение государственных [Concept('concept_tax', 'налогов')] в [Concept('concept_country', 'стране')] в соответствии с реальными резервами страны и планомерное расходование средств.\n\nУспех предыдущих двух #variable пятилетних планов#! доказал одно: #bold для большевиков нет неприступных крепостей!#! Мы должны продолжать осуществлять планы по значительному увеличению выпуска промышленной продукции. Только постоянная борьба, борьба и ещё раз борьба позволит #bold построить коммунистическое общество.#!\n\nЕсли мы не покончим с экономической отсталостью, передовые страны нас сокрушат. #bold Мы должны добиться полного превосходства в промышленном производстве!#!"
 third_five_years_plan_gdp_tt: "Увеличить ваш ВВП на 50%"
 third_five_years_plan_tt: "#bold Одновременно#! быть ведущим производителем следующих [Concept('concept_goods', 'товаров')]: [SCOPE.sGoods('ammunition_scope').GetName], [SCOPE.sGoods('artillery_scope').GetName], [SCOPE.sGoods('small_arms_scope').GetName] и [SCOPE.sGoods('electricity_scope').GetName]#!#!"
 third_five_years_status: "#bold Превратить Советский Союз в мощную индустриальную державу#!"
 third_five_years_plan_goal: ""
 reform_red_army: "Реформа Красной армии"
 reform_red_army_reason: "Священная задача, которую имеет [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName], — #bold защищать бедный народ от угнетения богатых#!. Этим наша армия отличается от всех других армий мира. Но не все это понимают. Есть ещё много отсталых, невежественных, угнетённых людей, которые #bold не знают ни что такое Красная армия, ни для чего она существует.#!\n\nСейчас важнейшая задача для наших товарищей, разъяснить всем кем являются #v $soldiers_only_icon$ красноармейцы#! и, что ещё важнее, доказать на деле: #bold каждый бедный крестьянин, каждый рабочий, каждая домохозяйка, каждый бездомный старик и беззащитный сирота увидят в Красной армии своего защитника.#!\n\n#bold Все честные трудящиеся — одна большая семья#!, на каком бы языке они ни говорили, где бы ни молились их отцы. Все угнетатели, эксплуататоры, паразиты, агрессоры, независимо от национальности, #bold все они — враги трудящихся и революционной Красной армии!#!\n\n[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] должна смело и с честью защищать права бедных, #bold став самой надёжной красной [Concept('concept_revolution', 'революционной')] силой диктатуры пролетариата.#!"
 reform_red_army_status: "Преобразовать Красную армию в армию, абсолютно преданную партии"
 ukrian_holodomor: "Голодомор на Украине"
 ukrian_holodomor_reason: "#bold Жестокая политика продразвёрстки по закону «[GetLawType('law_collectivized_agriculture').GetName]» и засуха, охватившая [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')],#! в конечном итоге уничтожили сельскохозяйственное производство на Украине. Ужасный неурожай и страшная засуха охватили самые плодородные чернозёмные земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Голод, холод и террор наполнили оба берега Днепра.\n\nГенеральный секретарь Украины и народные депутаты неоднократно обращались к центральному [Concept('concept_government', 'правительству')] в столице, с просьбой принять особые меры для решения этой проблемы."
 angry_ukriane_tt: "Украина отныне станет заклятым врагом Советов!"
 better_ukriane_famine: "Украина получит лучшую помощь, и её гнев на Советы будет предотвращён."
 new_economy_policy: "Новая экономическая политика"
 new_economy_policy_reason: "#bold Мы ещё не достигли стадии социализма#!. Весь прошлый опыт доказывает, что идеальная экономика по закону «[GetLawType('law_command_economy').GetName]» не может быть создана субъективно, путём умозаключений или бюрократическими методами.\n\nПодлинная социалистическая экономика, регулируемая законом «[GetLawType('law_command_economy').GetName]», охватывающая все отрасли промышленности, их взаимосвязи и связь всей промышленности со всем сельским хозяйством, может быть установлена только на основе национализации, при постоянных усилиях по практической координации работы экономических секторов и правильной оценке её результатов, #bold после долгого подготовительного опыта управления.#!\n\nЭкономический хаос и трудности, вызванные отсутствием регулирования, серьёзно вредили [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. На данный момент нам всё ещё необходимо поддерживать определённую, #bold контролируемую [Concept('concept_country', 'государством')] политику свободного рынка и капиталистической экономики#!, позволяя восстановиться частному предпринимательству и частной прибыли.\n\nДля достижения социализма мы должны создать недостающие материальные предпосылки для модернизации и промышленного развития и установить #bold план государственного капитализма, контролируемый центром и подверженный влиянию рынка, чтобы обеспечить здоровое экономическое развитие нашей [Concept('concept_country', 'страны')].#!"
 new_economy_policy_status: "#N Споры о текущей экономической политике всё ещё продолжаются#!"
  #Реформа общины
 reform_obshchina: "Общинная система"
 reform_obshchina_reason: "Зародившаяся #bold в древние времена#! на восточноевропейских землях #variable общинная система#! — это уникальный уклад жизни [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: #v $farmers$#!, #bold связанные кровными и территориальными узами, объединяются в общины#!. Община может включать несколько деревень, а собственность на землю принадлежит общине, а не отдельным лицам. #v $farmers$#! имеют право пользоваться землёй, но не могут свободно ею распоряжаться.\n\nНа протяжении долгого времени агнцы Божьи этим #bold древним и традиционным способом#! усердно трудились на своей родине, #bold служа #v $aristocrats_only_icon$ аристократии#!, и владыке всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!: #variable Его Величеству [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]#!.\n\nОднако крестьяне, в общинной системе, лишены #bold экономической возможности покинуть старые земли#!. Семейное распределение коллективной собственности даёт слишком большую власть старостам, что ещё больше мешает #variable контролю [Concept('concept_government', 'правительства')]#! над местными властями. В то же время примитивная общинная система способствует росту #bold радикальных настроений#! среди крестьянства, которые стремятся к свободному распоряжению своей землёй.\n\nВ то же время развитие наших городов требует, чтобы всё больше новых [Concept('concept_pop', 'групп населения')] шли работать в новые мастерские и на заводы, а не оставались на неэффективных землях. #bold Возможно, в какой-то необходимый момент в будущем нам придётся упразднить общинную систему?#!"
 reform_obshchina_on_complete_tt: "Все #O области#! со статусом #tooltippable #tooltip:[GetPlayer.GetTooltipTag],reform_obshchina_modifier_1_effect_tt $is_reforming_obshchina$#!#! будут реформированы и получат статус #tooltippable #tooltip:[GetPlayer.GetTooltipTag],reform_obshchina_modifier_2_effect_tt $reformed_obshchina$#!#!."
 reform_obshchina_modifier_1_effect_tt: "[GetStaticModifier('is_reforming_obshchina').GetName|v]\n[GetStaticModifier('is_reforming_obshchina').GetDesc]"
 reform_obshchina_modifier_2_effect_tt: "[GetStaticModifier('reformed_obshchina').GetName|v]\n[GetStaticModifier('reformed_obshchina').GetDesc]"
  #Водочная монополия
 russia_company_vodka_monopoly_character: "Казённая водка"
 russia_company_vodka_monopoly_character_reason: "@liquor!#V Водка#! #B с XV века является самым популярным и необходимым алкогольным напитком для #tooltippable_name [SCOPE.sCulture('russian_scope').GetAdjective|l]ого#! народа#!: она крепкая и обжигающая, но согревает народ; она бесцветная и прозрачная, но придаёт народу смелости. Даже #B сама страсть к @liquor!#V водке#! является отражением уникального образа жизни [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и нашей стойкой национальной черты#!.\n\n#B В середине XVI века#! #V Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Иван IV#! издал указ о #V государственной монополии на продажу водки#! по всей Руси. Она была включена в налоговые книги и облагалась особым #B «пьяным налогом»#!, став казённой и продолжением #B власти [Concept('concept_government', 'правительства')]#! в народе. Сегодня, за долгое правление династии, которой правит [ROOT.GetCountry.GetRuler.GetLastName], эта официальная монопольная система усовершенствовалась и приносит государству значительную прибыль.\n\nОднако эта мера, несомненно, #B вредит эффективности и интересам частных [Concept('concept_company', 'компаний')], занимающихся продажей алкоголя в нашей стране, и даже препятствует свободному обращению на рынке [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: если экономическая политика изменится, эту монополию, скорее всего, придётся отменить.#!"
  #Индустриализация
 moscow_industrialize: "Величайший город"
 moscow_industrialize_reason: "С тех пор как #B Великая армия Наполеона#! в #V Москве#! была вынуждена отступить и почти полностью уничтожена нашей суровой зимой, город уже прошёл один этап восстановления в 1815 году. Однако #B городская грязь и вонь от мусора, а также нищета и хаос жизни низших слоёв [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], только что прибывших с ферм#!, серьёзно портят репутацию города. В то же время, с развитием новых технологий и процветанием европейских городов, старая планировка и стены, некогда защищавшие Москву, стали непрактичными и даже #B мешают развитию города#!.\n\nМы должны перестроить и расширить #V Москву#!, соединив город с окрестностями, и навести порядок на улицах и повысить благосостояние жителей с помощью #V широких бульваров и площадей#!. #B Освещённые электричеством кварталы, упорядоченная административная система и сеть железных и автомобильных дорог#! создадут поистине процветающий, упорядоченный и никогда не спящий мегаполис [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и в конечном итоге сделают #V Москву#! #B самым знаменитым мегаполисом Европы и даже мира.#!"
 moscow_industrialize_status: "Превратить Москву в самый знаменитый мегаполис Европы"
 petersburg_industrialize: "Расширение Петербурга"
 petersburg_industrialize_reason: "Со времён, когда #B Пётр Великий#! основал #V Санкт-Петербург#! на берегах Невы, этот портовый город с выходом в Неву и Балтийское море всегда был окном [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европу для торговли и модернизации. С отменой закона «[GetLawType('law_serfdom').GetName]», множество бывших крепостных хлынуло в город, стихийно образуя на окраинах трущобы, из-за чего #B масштабы города перестали отвечать потребностям людей#!.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] считает, что мы должны решительно взяться за расширение #V Петербурга#!, расширить #B портовые и прибрежные сооружения#!, активно развивать промышленную базу города, заменяя отсталые ремесленные мастерские #B современными заводами#!, создать #B развитую сеть железных дорог и каналов#!, а также очистить трущобы на окраинах и включить их в новые городские районы. Только так мы сможем гарантировать, что этот город продолжит выполнять свою роль в продвижении торговли и промышленного развития [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 petersburg_industrialize_status: "Превратить Петербург в современный промышленный город"
 ukraine_industrialize: "Индустриализация Украины"
 ukraine_industrialize_reason: "#V Украина#! издревле была плодородной и богатой житницей на юге [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Но с разведкой #B Донецкого бассейна#! и #B Криворожского железорудного месторождения#! мы постепенно осознали #V огромный промышленный потенциал#! этой земли. Несмотря на это, эти богатые ресурсы до сих пор добываются лишь разрозненно и не могут конкурировать с развитыми промышленными районами других европейских [Concept('concept_great_power', 'великих держав')].\n\nПоэтому [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и [Concept('concept_government', 'правительство')] уже решили всесторонне продвигать промышленную экспансию на #V Украине#!: #B соединить шахты и города железными дорогами, заменить хаотичные и отсталые общинные деревни сталелитейными заводами и шахтёрскими посёлками#!, чтобы превратить эту #V чернозёмную землю Восточной Европы#! в #V самый развитый и важный центр#! промышленной экономики [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 ukraine_industrialize_status: "Превратить Украину в производственный центр родины"
 je_circassian_expulsions_filter_tt: "[concept_strategic_region] — #O Кавказ#!"