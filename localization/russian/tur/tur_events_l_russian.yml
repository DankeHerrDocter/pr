l_russian:
 #
 joi_flavor_tur.1.t: "Гюльханейский хатт-и-шериф"
 joi_flavor_tur.1.d: "Скончался старый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Махмуд II#!. Как и отец, новый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] выступает за преобразования. Его поддерживают паши-#O танзиматисты#!, такие как [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]. Новый правитель твердо намерен продолжить дело отца и провести радикальные реформы империи."
 joi_flavor_tur.1.f: "«Всем известно, что в первые дни правления в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] славные заповеди #yellow Корана#! и законы империи почитались беспрекословно. Империя крепла, а её подданные, без исключения, жили в достатке и спокойствии. Однако последние полтора века череда бедствий и иных причин привела к пренебрежению священными законами и установленными ими правилами, и былое могущество сменилось слабостью и бедностью».\n\n«Мы твердо верим, что при должном усердии и с помощью Всевышнего, желаемые цели будут достигнуты в течение нескольких лет. Полагаясь на помощь Аллаха и поддержку Пророка, мы считаем необходимым и мудрым посредством новых институтов обеспечить благое управление провинциями, составляющими [ROOT.GetCountry.GetAdjectiveNoFormatting]ое государство»."
 joi_flavor_tur.1.a: "Судьба перевернула страницу."
 joi_flavor_tur.1.b: "Поистине, мы принадлежим Аллаху и к Нему вернемся."
 joi_flavor_tur.1.c: "Новый рассвет империи."
 joi_flavor_tur.1.e: "Срочно необходимы великие реформы."
 #
 joi_flavor_tur.2.t: "Указы о реорганизации"
 joi_flavor_tur.2.d: "[ROOT.GetCountry.GetName] завершила модернизацию и вновь заняла достойное место на мировой арене. Для [ROOT.GetCountry.GetAdjectiveNoFormatting]ого государства началась новая эра."
 joi_flavor_tur.2.f: "Величие. Это единственное слово, достойное описания происходящего. На улицах Константинополя выросли современные фабрики и школы, марширует обученная гвардия. Там, где были фермы, теперь сияют новые городские кварталы. Кто бы мог подумать, что всего несколько десятилетий назад империя была на грани краха! Когда-то европейские державы смотрели на нас с жалостью и алчностью, выжидая момент для раздела наших земель. Теперь же в глазах их дипломатов читается трепет перед нашими достижениями, и они вынуждены говорить с нами как с равными. Аллах велик!"
 joi_flavor_tur.2.a: "Империя реорганизована, мы двинемся на старые территории."
 joi_flavor_tur.2.b: "Закон и равенство должны стать приоритетом империи."
 joi_flavor_tur.2.c: "Реорганизация означает новый экономический расцвет."
 joi_flavor_tur.2.e: "Мы пожнем плоды просвещения."
 joi_flavor_tur.3.t: "Меджлис-и-Махсуса"
 joi_flavor_tur.3.d: "Реформы Танзимата, некогда считавшиеся спасением империи, утратили популярность. Считая реформы слишком ограниченными, конституционалисты создали правительственный комитет и вынудили #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! принять разработанную ими демократическую конституцию, объявив о создании конституционного правительства."
 joi_flavor_tur.3.f: "«Все османы пользуются личной свободой при условии невмешательства в свободу других... Никто не может быть подвергнут наказанию иначе как в случаях и формах, установленных законом».\n\n«Все османы равны перед законом; они имеют одинаковые права и несут одинаковые обязанности перед государством, независимо от религии».\n\n«Условием для занятия государственной должности является знание турецкого языка, который есть официальный язык государства. Все османы допускаются к государственным должностям в соответствии со своими способностями, заслугами и умениями»."
 joi_flavor_tur.3.a: "Только полноценная конституция спасет империю!"
 joi_flavor_tur.3.b: "Возможно, [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] правы?"
 joi_flavor_tur.4.t: "Европейский мертвец"
 joi_flavor_tur.4.d: "[ROOT.GetCountry.GetName] не смогла модернизироваться и восстановить позиции на мировой арене. Стервятники уже кружат: конец [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] близок."
 joi_flavor_tur.4.f: "Высокая Порта погрузилась в тишину. Вскоре после того как [ROOT.GetCountry.GetRuler.GetFullName] объявил о намерении отречься — вероятно, под давлением министров, — правителя нашли мертвым в собственных покоях. Подобно нашей любимой империи, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] долго страдал от недугов, и, не вынеся тяжести короны, превратился в разбитую тень самого себя."
 joi_flavor_tur.4.a: "Поистине, мы принадлежим Аллаху и к Нему вернемся."
 joi_flavor_tur.5.t: "Гражданский кодекс Османской империи"
 joi_flavor_tur.5.d: "Несмотря на яростное сопротивление муфтия [SCOPE.sCharacter('devout_pasha_scope').GetFirstName], при поддержке #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! дискриминационная религиозная политика была окончательно упразднена. Многие реформаторы из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! надеются юридически превратить [ROOT.GetCountry.GetAltName('RU_CL_VP')] в полностью светское государство."
 joi_flavor_tur.5.f: "«Каждый должен владеть своим имуществом и распоряжаться им совершенно свободно, без чьего-либо позволения или препятствия; так, невиновные наследники преступника не могут быть лишены законных прав, а имущество преступника не подлежит конфискации. Эти имперские пожалования распространяются на всех наших подданных, независимо от религии или секты; они должны пользоваться ими без исключения. Посему мы гарантируем жителям империи абсолютную безопасность жизни, чести и имущества, ибо сие защищено текстом священного закона»."
 joi_flavor_tur.5.a: "Светское право заменит законы шариата."
 joi_flavor_tur.5.b: "Шариатские суды должны сохранить определенные привилегии."
 joi_flavor_tur.6.t: "Вопрос налогообложения"
 joi_flavor_tur.6.d: "Запутанная и несправедливая налоговая система прошлого была реорганизована. С помощью финансовых экспертов, таких как [SCOPE.sCharacter('progress_pasha_scope').GetFullName], налоговые институты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] преобразились."
 joi_flavor_tur.6.f: "«Если личная собственность не защищена, каждый остается равнодушным к призывам #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! и государства; никто не заботится о общественном благе, думая лишь о себе. Напротив, если гражданин уверен в сохранности своего имущества, если он с энтузиазмом трудится ради расширения своего дела и собственного комфорта, то в его сердце растет любовь к монарху и стране, а преданность родине крепнет с каждым днем».\n\n«Посему отныне необходимо взимать с каждого члена [ROOT.GetCountry.GetAdjectiveNoFormatting]ого общества фиксированный налог, пропорциональный его состоянию и доходам, и более ничего сверх того; кроме того, необходимо принять особые законы, регулирующие и ограничивающие расходы нашей армии и флота»."
 joi_flavor_tur.6.a: "Служба станет обязанностью, которую нельзя заменить налогом."
 joi_flavor_tur.6.b: "Джизья будет реформирована во избежание ошибочного взимания с мусульман."
 joi_flavor_tur.7.t: "Закон о реформе провинций [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_tur.7.d: "Множество привилегий #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! было отменено. Введена система провинциальной администрации «#yellow Вилайет#!», созданная по образцу западных держав, что значительно улучшило способность #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! и Высокой Порты управлять территориями."
 joi_flavor_tur.7.f: "«Помимо соблюдения законов, [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] несут священную обязанность: уважать науку, требования времени, собственные политические соображения, а также гражданские права и интересы государства, стоящие выше любых личных мотивов. Именно этот долг гарантирует общественный порядок. Даже если на этом пути случатся ошибки, эффективным инструментом их исправления будет не контроль над прессой, как в прошлом, а иные институты»."
 joi_flavor_tur.7.a: "Свобода передвижения людей и идей!"
 joi_flavor_tur.7.b: "Административная реформа — знак модернизации империи."
 joi_flavor_tur.7.c: "Порта должна усилить цензуру инакомыслящих."
 joi_flavor_tur.8.t: "Королевская регулярная армия"
 joi_flavor_tur.8.d: "Благодаря реформе армии #yellow Мансура#!, внедрению новой формы и западных стандартов обучения, войска [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] прошли тяжелый путь модернизации. Результат превзошел ожидания: многие западные военные наблюдатели вынуждены признать, что армия империи теперь полностью соответствует европейским стандартам."
 joi_flavor_tur.8.f: "«На войне всё кажется простым, но даже самое простое выполнить трудно. Эти трудности накапливаются, создавая своего рода "трение", которое невозможно представить, не побывав в бою. Всё это больше напоминает хаос, чем работу точного механизма».\n\n«Мужество — первое качество воина. И не только смелость перед лицом смерти, но и мужество духа: способность брать ответственность, принимать решения и переносить сомнения и неопределенность»."
 joi_flavor_tur.8.a: "Хорошей армии нужны выдающиеся офицеры и солдаты."
 joi_flavor_tur.8.b: "Боеспособность армии зависит от организации и снабжения."
 joi_flavor_tur.9.t: "Положение о всеобщем образовании"
 joi_flavor_tur.9.d: "Старые #yellow медресе#! упразднены. Высокая Порта создала систему образования западного образца, призванную обеспечить равные возможности обучения для всего общества [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.9.f: "«Общество может и действительно исполняет свои собственные веления: если оно издает ошибочные предписания вместо верных, или вмешивается туда, куда не следует, оно осуществляет социальную тиранию, более страшную, чем многие виды политического гнета. Ибо, хоть она и не грозит столь суровыми карами, от нее труднее укрыться, она проникает глубже в детали жизни и порабощает саму душу»."
 joi_flavor_tur.9.a: "Учебные заведения должны обеспечивать лояльность и веру народа."
 joi_flavor_tur.9.b: "Учебные заведения должны сосредоточиться на преподавании объективной истины."
 joi_flavor_tur.10.t: "Закон об освобождении земель"
 joi_flavor_tur.10.d: "Под милостивым и мудрым правлением #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! [ROOT.GetCountry.GetName] достигла значительного прогресса в освоении богатых ресурсов. Издан новый земельный закон, позволяющий ранее бедным #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetCustom('RU_IG_DP')]#!#! понять права и обязанности в отношениях между земледельцем и правительством."
 joi_flavor_tur.10.f: "«В отношении земель, на которые имеется тапу сроком десять лет и против которых не было возражений, право владения считается законным, если оно не было оспорено. При наличии законных препятствий иск может быть подан в течение десяти лет после их устранения, но не позднее. Если же ответчик признает факт незаконного захвата и возделывания, ссылка на срок давности не принимается; земля подлежит возврату владельцу».\n\n«Цельные участки земли в городах или деревнях не могут быть переданы одному или нескольким жителям целиком; землю надлежит разделить на участки и распределить между домохозяйствами; правительство обязано выдать документы, подтверждающие законное владение»."
 joi_flavor_tur.10.a: "Подписать указ о раздаче земли крестьянам."
 joi_flavor_tur.10.b: "Сельское хозяйство, как и другие отрасли, подчинится рынку."
 joi_flavor_tur.11.t: "Концессия Восточной железной дороги"
 joi_flavor_tur.11.d: "Некогда разрозненные деревни и города на подвластных [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] Балканах теперь связаны надежной сетью железных дорог. Воодушевленные [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName] обратились к #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]у#! с просьбой предоставить концессию на управление этой дорогой, обещая балканским провинциям великий экономический расцвет."
 joi_flavor_tur.11.f: "«Концессия включает магистраль от Стамбула до Добруджи, проходящую через Адрианополь, Софию, Ниш, Сараево и Баня-Луку. Эта линия известна как "Южная", поскольку тяготеет к Боснии, огибая Сербию».\n\n«Общая протяженность концессионных линий оценивается в 2500 км, срок концессии — 99 лет. В качестве компенсации затрат на строительство концессионер будет получать от правительства арендную плату в размере 14 000 франков за километр, а от оператора — 8 000 франков. Эти суммы рассчитаны так, чтобы обеспечить инвесторам 11% прибыли»."
 joi_flavor_tur.11.a: "Одобрить частную концессию компании."
 joi_flavor_tur.11.b: "Железные дороги должны быть монополией государственных ведомств."
 joi_flavor_tur.12.t: "Переворот «Новых османов»"
 joi_flavor_tur.12.d: "При поддержке революционно настроенных #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! и сочувствующих им #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#!, группа, называющая себя «Новые османы», ворвалась в Высокую Порту. Они похитили великого визиря [SCOPE.sCharacter('progress_pasha_scope').GetFullName], вынудив #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! уступить и передать им власть. Заговорщики немедленно провозгласили временную конституцию и объявили о начале конституционных реформ в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_tur.12.f: "«[SCOPE.sCharacter('progress_pasha_scope').GetFullName] заявил, что отставка — требование всего народа. "Никаких компромиссов, — сказал он. — Смена кабинета означает, что мы либо защитим честь нации, либо погибнем. Весь народ готов к жертвам. В финансовом отношении жертвы принесет вся нация. Мы полны решимости любой ценой положить конец неразумному правлению Порты". Это непременное условие процветания.\n\nВсе константинопольские газеты, не принадлежащие #yellow "Новым османам"#!, закрыты. Объявлено, что [SCOPE.sCharacter('army_pasha_scope').GetFirstName]-паша предал страну; действия вызывают тревогу. Ожидается, что "Новые османы" перейдут к вооруженным действиям»."
 joi_flavor_tur.12.a: "Да здравствует конституция!"
 joi_flavor_tur.12.b: "Проклятые либералы, я еще вернусь!"
 joi_flavor_tur.13.t: "Выборы в Национальное собрание [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_tur.13.d: "Благодаря усилиям конституционалистов старая политическая система полностью демонтирована. Власть, которой ранее монопольно обладали [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и Высокая Порта, передана демократически избранному Национальному собранию. Сам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] подписал конституцию, составленную [SCOPE.sCharacter('progress_pasha_scope').GetFullName], признав себя конституционным монархом и поклявшись верно охранять основной закон."
 joi_flavor_tur.13.f: "Сегодня, [TimeKeeper.GetCurrentDate.Format('d M y')] года, стоит ясная погода. Этот день войдет в историю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] как день открытия первого всенародно избранного Национального собрания. Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], присягнувший конституции, покинул дворец Топкапы и направился во дворец Долмабахче, отведенный под здание парламента. Множество граждан, впервые получивших право голоса, выстроились вдоль дороги. Многие горожане, интеллектуалы и рабочие, посвятившие жизнь делу свободы, глядя на свои бюллетени, не могли сдержать слез. Сколько поколений трудилось, чтобы эти листки оказались в их руках! Теперь они — граждане этой страны!\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вошел во дворец парламента. Конституция запрещает ему входить в нижнюю палату, и он, соблюдая закон, провел великую церемонию открытия в верхней палате. Когда он вошел, депутаты встали в знак приветствия. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] молча сел на трон, напротив стены, где высечена преамбула конституции. Да, перед лицом всех граждан и Аллаха, мы клянемся в верности нации, закону и монарху; мы клянемся не расходиться, пока свобода страны не утвердится окончательно!"
 joi_flavor_tur.13.a: "Свободная нация — величайшая нация."
 joi_flavor_tur.14.t: "Меч Османа"
 joi_flavor_tur.14.d: "#yellow Либералы#! и #yellow конституционалисты#!, некогда контролировавшие [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], были арестованы в ходе вооруженного переворота, возглавляемого [ROOT.GetCountry.GetRuler.GetFullName] и верными двору #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_IP')]#!#!. После короткого суда все они были казнены перед вратами дворца Топкапы. Предыдущий [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], под угрозой оружия со стороны [ROOT.GetCountry.GetRuler.GetFirstName], был вынужден объявить об отречении. На [ROOT.GetCountry.GetAdjective]ий престол взошел крайне деспотичный [ROOT.GetCountry.GetRuler.GetFirstName]: будущее туманно, но нет сомнений, что он будет править империей железной рукой."
 joi_flavor_tur.14.f: "Коронация в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], возможно, самое грандиозное зрелище, которое многим доводится видеть лишь раз в жизни, и церемония [ROOT.GetCountry.GetRuler.GetFirstName] не стала исключением. Шериф Коньи опоясал нового монарха #G Мечом Османа#!, а наши визири взирали на него с благоговейным трепетом.\n\nНикто не ожидал, что [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] выйдет победителем в этой жестокой политической борьбе и сменит отца. Некоторые втайне проклинают его жестокость, утверждая, что лишь насилие, а не правосудие, привело его к победе. Революционеры, заседавшие в Порте, — те самые либералы, что никогда не видели угрозы в [ROOT.GetCountry.GetRuler.GetFirstName], надеясь управлять империей через него, — просчитались. Теперь их кровь омывает площадь перед дворцом Топкапы.\n\nБесспорно одно: наш новый [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] ясно дал понять, что без колебаний нанесет удар любому, кого сочтет предателем."
 joi_flavor_tur.14.a: "Да дарует Аллах Его Величеству долгое и процветающее правление!"
 #Танзимат события
 joi_flavor_tur.15.t: "Суд шариатского трибунала"
 joi_flavor_tur.15.d: "Судебный процесс, возникший из-за земельного спора, перерастает в религиозный конфликт. Новые законы требуют совместного суда над неверными и мусульманами, но председательствующий муфтий [SCOPE.sCharacter('devout_pasha_scope').GetFullName] отказывается сидеть рядом с иноверцами."
 joi_flavor_tur.15.f: "«Они охотно внимают лжи и пожирают запретное. Если они придут к тебе на суд, рассуди их или отвернись. Если отвернешься, они не причинят тебе вреда; если же станешь судить, суди по справедливости, ибо Аллах любит справедливых. Как они могут просить твоего суда, когда у них есть Тора с судом Аллаха, а затем отворачиваться? Не верующие они».\n\n«Мы ниспослали Тору, в которой руководство и свет. Пророки, покорные Аллаху, судили по ней иудеев; раввины и книжники судили по тому, что им было доверено хранить из Писания Аллаха, и они были тому свидетелями. Не бойтесь же людей, а бойтесь Меня, и не продавайте Мои знамения за ничтожную цену. Те же, кто не судит по тому, что ниспослал Аллах, являются неверующими»."
 joi_flavor_tur.15.a: "Приказать светскому суду действовать по инструкции."
 joi_flavor_tur.15.b: "Мы должны поставить уважение к шариату на первое место."
 joi_flavor_tur.15.c: "Нас устроит замена муфтия на более надежного."
 joi_flavor_tur.16.t: "Проблема инфляции"
 joi_flavor_tur.16.d: "Веками из-за хронического дефицита бюджета Порта была вынуждена обесценивать старые куруши, что привело к резкому росту цен и хаосу в денежной системе. В империи ходят самые разные деньги: сплавы золота и серебра, местные монеты, иностранная валюта. Нужды Танзимата требуют увеличения доходов, и паша [SCOPE.sCharacter('progress_pasha_scope').GetFullName] предлагает упразднить куруш, заменив его новой лирой."
 joi_flavor_tur.16.f: "«Огромные административные расходы и череда разрушительных войн привели к дефициту бюджета, финансовым трудностям и застою. Попытки правительства [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] стабилизировать валюту в XVII-XVIII веках были тщетными и непоследовательными: власти пытались бороться с порчей монет, изымая плохие деньги, переплавляя их и выпуская новые золотые монеты с повышенным содержанием золота».\n\n«Эти меры вызвали две проблемы. Во-первых, поскольку плохие монеты изымались, людям было выгодно придерживать их, переплавлять и продавать металл как слитки по более высокой цене. Во-вторых, сработал феномен, описанный Томасом Грешемом, ныне известный как закон Грешема: монеты с высоким содержанием золота уходили из страны, а иностранные "плохие" деньги наводняли рынок»."
 joi_flavor_tur.16.a: "Очевидно, обменный курс не является причиной инфляции."
 joi_flavor_tur.16.b: "Ценность новой лиры будет гарантирована непосредственно #B #yellow Высокой Портой#!#!."
 joi_flavor_tur.16.c: "Привязав лиру к #B #O фунту стерлингов#!#!, мы обуздаем инфляцию."
 joi_flavor_tur.16.h: "Привязав лиру к #B #U франку#!#!, мы обуздаем инфляцию."
 joi_flavor_tur.17.t: "Губернаторы и гражданские чиновники"
 joi_flavor_tur.17.d: "В городе [SCOPE.sState('tur_17_event_scope').GetCityHubName] наш новый администратор из числа #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! потребовал от бывших правителей-#tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! сдать незаконные частные армии и передать административные полномочия. Однако он столкнулся с сопротивлением губернатора."
 joi_flavor_tur.17.f: "«Слово "губернатор" по-турецки звучит как "бейлербей", что означает "господин господ". В военное время они собирались под знаменем #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! и сражались как часть его войска. Однако теперь, как губернатор провинции, бейлербей несет более широкую ответственность. Он играет важную роль в распределении ленов в своей юрисдикции, отвечает за порядок и правосудие».\n\n«Пост бейлербея — самый престижный и доходный в провинциальном правительстве; султаны почти всегда выбирают визирей из их числа. Когда бейлербея снимают с должности, он часто затевает тяжбу и продолжает командовать, пока его не отзовут в Константинополь»."
 joi_flavor_tur.17.a: "Власть #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#! должна уважаться."
 joi_flavor_tur.17.b: "Приказы #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetCustom('RU_IG_RP')]#!#! превыше всего!"
 joi_flavor_tur.18.t: "Жребий призыва в городе [SCOPE.sState('tur_18_event_scope').GetCityHubName]"
 joi_flavor_tur.18.d: "На базаре города [SCOPE.sState('tur_18_event_scope').GetCityHubName] звучат барабаны: вербовщики набирают солдат как из мусульман, так и из неверных. Однако многие мусульмане возмущены: они платят больше налогов под разными предлогами, чем неверные, но все равно обязаны служить."
 joi_flavor_tur.18.f: "«Сражайтесь с теми из людей Писания, кто не верует в Аллаха и в Последний день, не считает запретным то, что запретили Аллах и Его Посланник, и не исповедует истинную религию, пока они не станут собственноручно платить джизью, оставаясь униженными. Иудеи сказали: "Узейр — сын Аллаха". Христиане сказали: "Мессия — сын Аллаха". Они произносят своими устами слова, похожие на слова прежних неверующих. Да погубит их Аллах! До чего же они отвращены от истины!»\n\n«Они хотят погасить свет Аллаха своими устами, но Аллах не допустит этого и завершит распространение Своего света, даже если это ненавистно неверующим. Он — Тот, Кто отправил Своего Посланника с верным руководством и религией истины, чтобы превознести ее над всеми остальными религиями, даже если это ненавистно многобожникам»."
 joi_flavor_tur.18.a: "Очевидно, это несправедливо по отношению к правоверным!"
 joi_flavor_tur.18.b: "Откуп от службы за счет джизьи принесет нам богатство."
 #Конституционные события
 joi_flavor_tur.19.t: "Переворот [TimeKeeper.GetCurrentDate.Format('d M')]"
 joi_flavor_tur.19.d: "Группа тайных политических обществ, давно выступающих против авторитаризма #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! [ROOT.GetCountry.GetRuler.GetFullName] — Младотурки — под предводительством своего неожиданного лидера, хорошо законспирированного [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]-паши, совершила военный переворот. Они пытаются свергнуть самодержавное правительство и принудить #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! к отречению."
 joi_flavor_tur.19.f: "«Революционеры из комитета "Единение и прогресс" во главе с [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]-пашой ворвались в кабинет министров Высокой Порты. Их встретил огонь охраны — адъютант первым выстрелил в нападавших, возможно, целясь в самого пашу. В перестрелке погиб находившийся там [SCOPE.sCharacter('army_pasha_scope').GetFullName]-паша».\n\n«По последним сведениям, войска [SCOPE.sCharacter('army_pasha_scope').GetFirstName], дислоцированные в Чаталдже и других районах, движутся на Константинополь, поклявшись отомстить за него. Несомненно, для нового правительства это крайне зловещее предзнаменование»."
 joi_flavor_tur.19.a: "Грядет новая эра."
 joi_flavor_tur.19.b: "Собрать армию, пришло время контрудара!"
 joi_flavor_tur.20.t: "Штурм Блистательной Порты"
 joi_flavor_tur.20.d: "Громкая демонстрация против кабинета [SCOPE.sCharacter('old_pasha_scope').GetFirstName] переросла в военный переворот. Поддерживавший консерваторов [SCOPE.sCharacter('army_pasha_scope').GetFullName] застрелен. Революционные войска под командованием [SCOPE.sCharacter('progress_pasha_scope').GetFullName] быстро захватили Порту и парламент, объявив о создании правительства национального спасения."
 joi_flavor_tur.20.f: "«В прошлый четверг была внезапно организована демонстрация — пятнадцать человек с шестью флагами двинулись к "Блистательной Порте". К ним присоединился [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], и тут же из соседних кофеен вышли десятки его сторонников. В итоге к воротам Порты подошла толпа из полутора сотен человек. Тем утром регулярная охрана была таинственным образом заменена войсками, сочувствующими младотуркам. [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] распахнул мундир, обнажив грудь, и закричал солдатам: "Давай! Спасайте честь родины! Она растоптана правительством предателей! Если хотите, стреляйте в меня, и я унесу этот позор в могилу — ибо в Турции больше нет чести!".\n\nТут же были застрелены [SCOPE.sCharacter('army_pasha_scope').GetFullName] и еще пятеро; вскрытие показало, что помимо пулевых ранений у жертв были ножевые; сам паша получил три пули. Под звуки выстрелов [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]-паша подошел к [SCOPE.sCharacter('old_pasha_scope').GetFirstName]-паше и сказал: "Ты должен обнародовать это или немедленно уйти в отставку — иначе прольется еще больше крови". Сохраняя хладнокровие в критический момент, [SCOPE.sCharacter('old_pasha_scope').GetFirstName]-паша выбрал отставку, чтобы избежать бойни»."
 joi_flavor_tur.20.a: "Да здравствует [SCOPE.sCharacter('progress_pasha_scope').GetFirstName]-паша!"
 joi_flavor_tur.21.t: "Осада дворца Долмабахче"
 joi_flavor_tur.21.d: "По приказу #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! [ROOT.GetCountry.GetRuler.GetFullName] верные монарху [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] совершили военный переворот в столице. Они окружили дворец Долмабахче, где заседал парламент, заставили визиря [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], председательствовавшего на заседании, и его кабинет уйти в отставку, после чего объявили о приостановке действия конституции и силой разогнали избранный парламент."
 joi_flavor_tur.21.f: "Утром [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] посетил визиря [SCOPE.sCharacter('progress_pasha_scope').GetFirstName], призывая его к отставке, но тот отказался. В 3 часа дня [SCOPE.sCharacter('old_pasha_scope').GetFirstName]-паша, получив секретный приказ #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, прибыл к дворцу Долмабахче с пятью кавалеристами.\n\nТем временем, внезапно поднятая по тревоге дворцовая стража перекрыла весь Константинополь, окружила парламент и, развернув знамя по заранее оговоренному сигналу, потребовала отставки кабинета. Появился [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] на белом коне в сопровождении бывшего посла в Вашингтоне [SCOPE.sCharacter('army_pasha_scope').GetFirstName]-паши.\n\nСпешившись у ворот, они потребовали встречи с депутатами. Двери были заперты, депутаты отказывались пускать кого-либо, кроме самого #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!. [SCOPE.sCharacter('army_pasha_scope').GetFirstName] с войсками прорвал оцепление парламентской охраны, ворвался в зал и объявил, что кабинет должен уйти. Под дулами ружей визирь [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] написал прошение об отставке и передал его правителю."
 joi_flavor_tur.21.a: "Покорнейший слуга Его Величества #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!."
 joi_flavor_tur.22.t: "Великий мятеж в городе [SCOPE.sState('armenian_state_scope').GetCityHubName]"
 joi_flavor_tur.22.d: "Либеральная конституционная революция привела к панике среди [GetReligion('sunni').GetName] населения в городе [SCOPE.sState('armenian_state_scope').GetCityHubName], опасающегося потери привилегий. В отместку они устроили резню местных #tooltippable_name [SCOPE.sCulture('armenian_scope').GetCustom('RU_CUL_ADJ')]ого#! населения. Армяне взялись за оружие против #tooltippable_name [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#! погромщиков, что привело к вмешательству гарнизона, примкнувшего к резне."
 joi_flavor_tur.22.f: "«Брат, если хочешь вестей отсюда: мы убили 1200 армян, скормили их собакам; мама, я жив-здоров. Отец, 20 дней назад мы начали войну с армянскими неверными. Слава Аллаху, мы целы».\n\n«Ходят слухи, что наш батальон отправят к вам — если так, мы перебьем армян и там. Раненых армян 511, каждый день умирают сотни. Спроси солдат и ополченцев — у них и кровь из носа не пошла; да хранит вас Аллах»."
 joi_flavor_tur.22.a: "Без сомнения, это злодейский мятеж армянских еретиков."
 joi_flavor_tur.22.b: "Принять меры, сурово наказать зачинщиков резни!"
 #Железная дорога
 joi_flavor_tur.23.t: "Железная дорога Багдад-Константинополь"
 joi_flavor_tur.23.d: "После долгих работ наконец открыта грандиозная железнодорожная линия, эффективно связывающая #yellow Константинополь#! и #yellow Багдад#!. Несмотря на технические трудности в удаленных Таврских горах, усилиями [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] этот величественный проект увенчался успехом."
 joi_flavor_tur.23.f: "«#tooltippable_name [SCOPE.sCountry('GBR_scope').GetAdjective]ие#! стратеги полагают: если Антверпен в руках континентальной державы — это, по словам Наполеона, пистолет, направленный в сердце Англии, то Багдад и Персидский залив в руках любой другой державы — это 42-сантиметровое орудие, нацеленное на Индию».\n\n«Комиссия экспертов изучила геологию Тигра и Евфрата и объявила, что регион обладает настоящими "нефтяными озерами", запасы которых практически неисчерпаемы; однако, учитывая транспортные проблемы, сомнительно, смогут ли эти месторождения конкурировать с существующими #tooltippable_name [SCOPE.sCountry('USA_scope').GetAdjective]ими#! и #tooltippable_name [SCOPE.sCountry('RUS_scope').GetAdjective]ими#! промыслами»."
 joi_flavor_tur.23.a: "Провинция Ирак расцветет благодаря железной дороге!"
 joi_flavor_tur.23.b: "Дорога поможет нашим военным маневрам."
 joi_flavor_tur.24.t: "Путь паломничества"
 joi_flavor_tur.24.d: "Благодаря инвестициям #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! построена железная дорога, соединяющая Иерусалим и Дамаск с Мединой через Хиджаз, что значительно облегчило путь ежегодным паломникам к святым местам."
 joi_flavor_tur.24.f: "«Многие сирийцы, которых я встречал, с теплотой вспоминают атмосферу в поездах. Это, конечно, одна из прелестей путешествия по железной дороге: незнакомцы собираются в общем пространстве, а мягкий ритм поезда располагает к беседе. "Каждый вагон был маленьким миром, полным дружелюбия и вежливости", — вспоминал старик».\n\n«"Но если вы ищете поезда, вы пришли не туда", — рассмеялся он. Конечно, он прав: хотя мы стоим на величественном вокзале Хиджаз в центре Дамаска, он больше не служит своей цели, здесь нет пассажиров. Сегодня это место словно застыло во времени, как снимок ушедшей эпохи; живой музей несбывшейся мечты»."
 joi_flavor_tur.24.a: "Эта дорога послужит всем паломникам."
 joi_flavor_tur.24.b: "Благочестие #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! не вызывает сомнений!"
 #События журнала возвращения территорий
 joi_flavor_tur.25.t: "Провинция Египет"
 joi_flavor_tur.25.d: "Мятежный хедив Египта прекратил сопротивление и сдался #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]у#! [ROOT.GetCountry.GetRuler.GetFullName], лично возглавившему поход, после того как войска [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вошли в Каир. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], подобно своему предку #V Селиму Грозному#! столетия назад, с победным знаменем вступил в город. Придворный художник запечатлел этот эпический момент. Многие иностранные наблюдатели считают, что это знаменует великое возрождение могущества [ROOT.GetCountry.GetAdjectiveNoFormatting]ого государства."
 joi_flavor_tur.25.f: "«Хедив стоял под знаменем, крича солдатам: "Агасы! Соберитесь! Сражайтесь, и я награжу вас!" Но никто не слушал, солдаты бежали с поля боя. "Молим Аллаха о победе!" — воскликнул хедив. — "Сейчас время молитвы". \n\nНо он не нашел ни поддержки, ни охраны; затем он почувствовал неугасимый жар. День был невероятно знойным, между армиями висела густая пыль. Это был день гнева Аллаха на египетское войско, и оно прекратило сражаться»."
 joi_flavor_tur.25.a: "Чиновники #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! заменят правление хедива."
 joi_flavor_tur.25.b: "Назначить нового губернатора Каира."
 joi_flavor_tur.26.t: "Османы просят вмешательства в Сирии"
 joi_flavor_tur.26.d: "В связи с открытым мятежом [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')] посольство Высокой Порты направило дипломатическую ноту, надеясь на поддержку [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в вопросе возвращения Сирии."
 joi_flavor_tur.26.f: "«Падишах, видя, что Мухаммед Али не довольствуется достигнутым, попытался действовать на опережение. Чтобы предотвратить дальнейшие шаги [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], он предложил Али наследственное правление в Египте и на Аравийском полуострове в обмен на уход из Сирии и Крита и отказ от полной независимости».\n\n«Однако внутри империи обе стороны уже готовились к войне. Ибрагим собрал в Сирии значительную армию. В Константинополе командующий войсками [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] #yellow Хафиз-паша#! заверил падишаха, что сможет разбить армию [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')]»."
 joi_flavor_tur.26.a: "Это нас не касается."
 joi_flavor_tur.26.b: "Мы должны поддержать [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_tur.27.t: "Вилайет Сирия"
 joi_flavor_tur.27.d: "С подавлением беспорядков в Сирии эти старые имперские земли вновь интегрированы в управление Порты. [ROOT.GetCountry.GetName] окончательно изгнала из Сирии всех врагов, посягавших на эту территорию."
 joi_flavor_tur.27.f: "«Волею Аллаха Порта утвердила власть #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! над Дамаском, Триполи, Сидоном, Цфатом, Алеппо, Иерусалимом и Наблусом, разрешив паломничество и установив ежегодные подношения гробнице Пророка».\n\n«Потомки #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! носят титул Шейха Мекки и владеют Джиддой; кроме того, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] удовлетворил просьбу губернатора, передав район Адана в ведение губернаторства Тавр с присвоением титула мухассира»."
 joi_flavor_tur.27.a: "Мир ему."
 #Османские завоевания
 joi_flavor_tur.28.t: "Благороднейшее государство"
 joi_flavor_tur.28.d: "Границы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вновь достигли пределов славной эпохи, превзойдя даже достижения времен #yellow Сулеймана Законодателя#!. Слава покорителя #V Вечного города#! увенчала #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! [ROOT.GetCountry.GetRuler.GetFullName]. Нет сомнений: #G [ROOT.GetCountry.GetAdjectiveNoFormatting]ое государство#! преодолело вековой упадок и вновь взошло на вершину мира."
 joi_flavor_tur.28.f: "«Соратники! С этим достижением слава победы стала полной: в этот радостный час мы владеем богатствами римлян, мы завоевали их империю, а их религия полностью искоренена. Наши предки жаждали этого: теперь радуйтесь, ибо ваша доблесть добыла нам эту империю».\n\n«Аллах благословил победное дело, деяния священного #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, отдав мир под власть [ROOT.GetCountry.GetAdjectiveNoFormatting]ого народа. [ROOT.GetCountry.GetAdjectiveNoFormatting]ая нация — венец творения, ее величие непревзойденно; ей судьбой предначертано править городом, царящим над народами!»"
 joi_flavor_tur.28.a: "Да здравствует римский цезарь, повелитель двух морей и двух континентов, Его Величество [ROOT.GetCountry.GetRuler.GetFullName]!"
 joi_flavor_tur.28.b: "Мир ему, падишах турок и ислама, верховный халиф Его Величество [ROOT.GetCountry.GetRuler.GetFullName]!"
 joi_flavor_tur.29.t: "Провинция Варвария"
 joi_flavor_tur.29.d: "По воле Аллаха неверные повержены. Армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] завоевала Магриб — земли, некогда подвластные Порте через #yellow варварийских пиратов#!, но позже ставшие провинцией #yellow Франции#!. Средиземноморский бриз овевает порт Алжира; мы восстановили свою мощь в этом море."
 joi_flavor_tur.29.f: "«В Тунисе почти двести школ для детей,\nИ каждая — как просторный зал.\nУчитель не по книгам учит, а с доской в руках;\n\nКаждый день толкует стих Корана, читает и повторяет,\nСнова и снова, пока сура не врежется в память.\nПорой уходят семь лет,\nЧтобы заучить Священное Слово —\n\nИ они действительно это делают»."
 joi_flavor_tur.29.a: "Создать вилайет Варвария."
 joi_flavor_tur.29.b: "Власть в Варварии следует вернуть законным эмирам."
 joi_flavor_tur.30.t: "Провинция Трансильвания"
 joi_flavor_tur.30.d: "Войска [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вернули Трансильванию, отнятую Габсбургами после 1687 года. [ROOT.GetCountry.GetRuler.GetFirstName] стоит на высокой башне древнего замка Бран, взирая на трансильванские леса и знамена имперской армии."
 joi_flavor_tur.30.f: "«Мне кажется, мы покидаем Запад и входим на Востоке.\nЭтот мост через Дунай, великолепный и грандиозный, —\nЗдесь река широка и глубока, —\nПереносит нас в атмосферу турецкого владычества.\n\nЯ читал слова:\n"Все суеверия мира собрались в подковообразной долине Карпат,\nСловно здесь их алтарь".\n\nТам живут потомки даков —\nНа западе мадьяры, на востоке и севере секеи.\nЯ еду в их обитель,\nК тем, кто называет себя потомками Аттилы и гуннов»."
 joi_flavor_tur.30.a: "Создать вилайет Трансильвания."
 joi_flavor_tur.30.b: "Восстановить провинцию Трансильвания!"
 joi_flavor_tur.31.t: "Владения в Венгрии"
 joi_flavor_tur.31.d: "#yellow Королевство Венгрия#! было нашим главным соперником на Балканах, особенно попав под власть Габсбургов. Но судьба отвернулась от них: это королевство вновь склонилось перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], как когда-то перед Сулейманом Великолепным."
 joi_flavor_tur.31.f: "«Ах, как пустынна теперь степь!\nПришла зима, и богатства природы стали призраком.\nДаже крошечный сверчок не поет в ночи.\nПоле гладкое, как замерзшее море;\n\nСолнце летит низко, словно усталая птица,\nИли как подслеповатый путник,\nКоторому нужно наклониться, чтобы разглядеть смутные очертания земли.\nНо даже так он видит немного.\n\nВ траве тишина,\nИсчез даже тишайший стрекот насекомых»."
 joi_flavor_tur.31.a: "Венгрия станет плацдармом для нового похода на Вену."
 joi_flavor_tur.31.b: "Укрепить территории, нам нужно закрепиться в Центральной Европе."
 joi_flavor_tur.32.t: "Второй Кючук-Кайнарджийский мир"
 joi_flavor_tur.32.d: "После падения Крыма в 1783 году, когда он перешел в руки [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], войска [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] вновь отвоевали многие ключевые территории, включая казацкие степи, некогда служившие северным рубежом империи. Визирь [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] считает более разумным восстановить на этих беспокойных землях автономное государство под знаменем древнего #yellow Крымского ханства#!."
 joi_flavor_tur.32.f: "«[SCOPE.sCountry('RUS_scope').GetName] возвращает Крым, Донбасс, Херсон и Молдавию. [ROOT.GetCountry.GetName] обязуется не препятствовать свободе христианского вероисповедания в этих землях и дозволяет семьям, желающим покинуть страну, свободно эмигрировать со всем своим имуществом. Со дня вступления договора в силу [ROOT.GetCountry.GetName] освобождает жителей этих областей от налогов сроком на два года. По истечении этого срока [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] обещает облагать их податями справедливо и беспристрастно».\n\n«[SCOPE.sCountry('RUS_scope').GetName] обязуется использовать свою власть и влияние для содействия [ROOT.GetCountry.GetAdjectiveNoFormatting] двору при заключении торговых договоров с протекторатами империи; а также разрешает [ROOT.GetCountry.GetAdjectiveNoFormatting] Порте возвести в Москве общественную мечеть "арабского обряда", которая навеки будет находиться под покровительством Порты»."
 joi_flavor_tur.32.a: "Крым перейдет под прямое управление Порты."
 joi_flavor_tur.32.b: "Мы должны восстановить Крымское ханство как протекторат."
 joi_flavor_tur.33.t: "Администрация Кавказа"
 joi_flavor_tur.33.d: "После того как армия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] сокрушила оккупантов из [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')], Кавказские горы вновь перешли под контроль Порты."
 joi_flavor_tur.33.f: "«Люблю с вершины бурной взирать на ночное небо —\nОблака кипят морем безбрежным;\nМолнии сверкают, гром гремит как барабан,\nПоток ревет в ущелье.\n\nНа Кавказе есть свобода —\nСкалы стоят как железо под звездами,\nСнежные пики горят призрачным огнем во тьме;\n\nОрел кружит, водопад поет,\nИ человек здесь чувствует свою малость,\nНо зрелище возносит его к высотам духа»."
 joi_flavor_tur.33.a: "Создать вилайет Кавказ."
 joi_flavor_tur.33.b: "Восстановить марионеточные государства Кавказа."
 joi_flavor_tur.34.t: "Падишах-Завоеватель"
 joi_flavor_tur.34.d: "Войска [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] завоевали земли, на которые не ступала нога даже #yellow Мехмеда II Завоевателя#!. По указу #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! #V Базилика Святого Петра#! превращена в мечеть, вокруг святыни католического мира стремительно возведены четыре минарета. Визирь [SCOPE.sCharacter('progress_pasha_scope').GetFullName] советует #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]у#! последовать примеру Завоевателя и перенести столицу в этот бывший центр #yellow Римской империи#!."
 joi_flavor_tur.34.f: "«Среди всех зверств особенно выделялось осквернение #yellow Собора Святого Петра#!: там собралось множество людей в отчаянной молитве. Знаменитые бронзовые двери были закрыты, все в муке ждали прихода [ROOT.GetCountry.GetAdjectiveNoFormatting]ого завоевателя. Вдруг страшный удар сотряс врата, они рухнули, и поток окровавленных солдат хлынул в святилище. Ради места и наживы они размахивали копьями и саблями».\n\n«Оглядевшись, они решили: удача здесь. В мгновение ока всех молодых, красивых и здоровых раздели и ограбили, а затем угнали; знатные монахини, юные нежные дворянки, теперь нагие под своими длинными волосами, стали рабынями. [ROOT.GetCountry.GetAdjectiveNoFormatting]ие хозяева связывали их чем попало: поясами, платками, епитрахилями, веревками от шатров, поводьями... Их пинками выгнали наружу, выстроили в длинные колонны навстречу позорной судьбе и развели по всем уголкам исламского мира»."
 joi_flavor_tur.34.a: "Константинополь останется столицей, но Рим получит достойный статус."
 joi_flavor_tur.34.b: "Как Фатих завоевал Константинополь, так и Рим станет новой столицей!"
 #Месопотамия и Константинополь
 joi_flavor_tur.35.t: "Умиротворение Двуречья"
 joi_flavor_tur.35.d: "Благодаря долгим инвестициям и развитию Месопотамии, древние поля Шумера и Аббасидов вновь орошаются. [ROOT.GetCountry.GetName] успешно справилась с наводнениями, восстановила засоленные земли и создала огромную ирригационную сеть, охватывающую около трех миллионов гектаров пашни."
 joi_flavor_tur.35.f: "«Багдад — рай земной, город мира, купол ислама, слияние двух рек, жемчужина городов, око Ирака, двор халифов; воздух его питательнее любого другого, вода слаще любой воды, ветерок нежнее любого ветра».\n\n«Что же до двух благородных рек — Тигра и Евфрата, их слава такова, что не требует описания; достаточно сказать: Аллах благословил их, поставив в один ряд с братом их Нилом, и потому они вечно будут восхваляемы и памятны»."
 joi_flavor_tur.35.a: "Вся [ROOT.GetCountry.GetName] извлечет из этого огромную пользу."
 joi_flavor_tur.35.b: "Народ Месопотамии будет благодарен!"
 joi_flavor_tur.36.t: "Царица городов"
 joi_flavor_tur.36.d: "После масштабной и дорогостоящей реконструкции величайший город тысячелетий — #yellow Константинополь#! — модернизирован. Построены мосты через #yellow Золотой Рог#!, широкие бульвары, новая опера, центральный рынок, водопровод, железная дорога, канализация и парки. Город с великой историей вновь возвышается над Босфором как #V грандиозный мегаполис#!."
 joi_flavor_tur.36.f: "«Мне чудится безбрежное море света, мерцание бесконечных образов и цветов;\nНос корабля пересек черту: вот он, Константинополь!\n\nНеобъятный Константинополь, гордый, высокий!\nСлава Творцу, слава его людям!\n\nА теперь — пиши, ничтожное перо, оскверняй словами это священное видение!\nКто сможет описать Константинополь? Царица городов, мечта мира!»"
 joi_flavor_tur.36.a: "Царица городов — ярчайшая жемчужина Средиземноморья!"
 joi_flavor_tur.36.b: "Город, желанный миру! Нет города величественнее!"
 #Начальные события
 joi_flavor_tur.37.t: "Больной человек Европы"
 joi_flavor_tur.37.d: "[ROOT.GetCountry.GetName] вступила в период стабильного упадка. Если мы не утвердим суверенитет [ROOT.GetCountry.GetAdjectiveNoFormatting]ого государства и не вернем себе место в мире, полном хищников, нас ждет гибель."
 joi_flavor_tur.37.f: "Мы ослабли, но можем восстать. В ходе рискованного переворота мы упразднили янычар — тех, кто жалко цеплялся за власть веками, но в последний момент согласился на реформы. Многие местные банды уничтожены, но впереди еще много работы.\n\nОднако дни [ROOT.GetCountry.GetRuler.GetFullName] #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, начавшего эти реформы, сочтены. В конце его правления мы должны заменить янычар современной армией и восстановить Высокую Порту как вершину цивилизации. Обеспечение суверенитета, поиск надежных союзников и планы по возвращению утраченных земель должны стать приоритетом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] государства."
 joi_flavor_tur.37.a: "Даже великие монархи уходят. Мы должны достойно сыграть финальный акт."
 #Османская Порта
 joi_flavor_tur.38.t: "Назначение в провинцию"
 joi_flavor_tur.38.d: "По традиции [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], наш [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] в юные годы должен быть отправлен наместником в небольшую провинцию. Однако мать #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, валиде-султан, не поддерживает это решение."
 joi_flavor_tur.38.f: "Наш любимый [Concept('concept_heir', '$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] еще слишком молод. Ему предстоит многое узнать о жизни и управлении государством. Большинство визирей считает, что мы обязаны соблюдать традицию династии, отправляя сыновей губернаторами в дальние провинции. Там они учатся править; к тому же, давая им богатые провинции, мы снижаем риск междоусобиц в будущем.\n\nГород [SCOPE.sState('prince_governor_state').GetCityHubName] в прошлом служил местом такой ссылки и мог бы подойти для [ROOT.GetCountry.GetHeir.GetFirstName]. Однако другие, включая валиде-султан, считают, что юному наследнику лучше получать образование в гареме, под присмотром учителей и близких людей."
 joi_flavor_tur.38.a: "Гарем больше подходит юному [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.38.b: "Управление городом [SCOPE.sState('prince_governor_state').GetCityHubName] пойдет на пользу [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.39.t: "Возвращение из провинции"
 joi_flavor_tur.39.d: "После обучения наш [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] вернулся с поста губернатора. Судя по всему, он мало чему научился и, возможно, требует дальнейшей подготовки."
 joi_flavor_tur.39.f: "[ROOT.GetCountry.GetHeir.GetFirstName] вернулся из губернаторства. По его словам, этот опыт во многом помог ему повзрослеть, и он готов к наследованию трона лучше, чем когда-либо, если Аллах призовет к себе нашего #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!.\n\nНам не совсем ясно, чему именно научился наш любимый сын, но в гареме шепчутся, что единственное, что выросло у [ROOT.GetCountry.GetHeir.GetFirstName] — это кошелек, раздутый от сбора налогов."
 joi_flavor_tur.39.a: "Подумать только, ему еще учиться и учиться."
 joi_flavor_tur.39.b: "Всё хорошо."
 joi_flavor_tur.40.t: "Годы губернаторства в городе [SCOPE.sState('prince_governor_state').GetCityHubName]"
 joi_flavor_tur.40.d: "Опыт управления городом [SCOPE.sState('prince_governor_state').GetCityHubName], несомненно, дал нашему [Concept('concept_heir','$RULER_TITLE_SEHZADE$')]у [ROOT.GetCountry.GetHeir.GetFullName], будущему правителю [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], ценные навыки и первый вкус настоящей власти."
 joi_flavor_tur.40.f: "[ROOT.GetCountry.GetHeir.GetFirstName] вернулся в город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], завершив службу в городе [SCOPE.sState('prince_governor_state').GetCityHubName]. Он утверждает, что эти годы многому научили его в понимании сути правления и работы нашей системы в провинциях.\n\nВдали от столицы [ROOT.GetCountry.GetHeir.GetFirstName] получил достаточно времени, чтобы командовать местными войсками, контролировать администрацию и взаимодействовать с местными элитами. Всё это позволит ему в будущем стать выдающимся #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом#!."
 joi_flavor_tur.40.a: "Он доказал, что он истинный сын Османа."
 joi_flavor_tur.41.t: "Обряд совершеннолетия"
 joi_flavor_tur.41.d: "По традиции [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], наш [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] по достижении 16 лет должен быть отправлен на службу в имперскую армию для получения командного опыта и доверия войск."
 joi_flavor_tur.41.f: "Как и прежние правители, [ROOT.GetCountry.GetHeir.GetFirstName] хочет снискать славу завоевателя, возглавляющего империю верхом на коне. Учитывая доброе здравие #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! и наше нежелание отправлять [Concept('concept_heir','$RULER_TITLE_SEHZADE$')]а на настоящую войну, эта мечта пока останется мечтой.\n\nОднако другие принцы насмехаются над [ROOT.GetCountry.GetHeir.GetFirstName], а его мать требует, чтобы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] дал ему собственный отряд. Просьба не лишена смысла, но когда кто-то хочет рисковать жизнью и здоровьем нашего любимого наследника, стоит задуматься о мотивах."
 joi_flavor_tur.41.a: "Это пойдет на пользу [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.41.b: "В гареме куда безопаснее."
 joi_flavor_tur.42.t: "Поддержка валиде-султан"
 joi_flavor_tur.42.d: "Мы назначили [ROOT.GetCountry.GetHeir.GetFirstName] преемником, и он — самый популярный среди принцев и их матерей. Но его восхождение может оказаться труднее, чем кажется, и многие винят в этом хасеки-султан. Чтобы пресечь губительные интриги, валиде-султан, мать #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, лично встала на защиту [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.42.f: "«Слухи гласят, что любимый сын #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, [ROOT.GetCountry.GetHeir.GetFirstName], готовит бунт против отца и государства. Ваше Величество, молю вас вырезать эту опухоль на теле страны и казнить [ROOT.GetCountry.GetHeir.GetFirstName]».\n\n«Сын мой, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] империи и Порты, несомненно, хасеки-султан говорит ради собственной выгоды. [ROOT.GetCountry.GetHeir.GetFirstName] не ее сын, а вот тот, кто может занять его место, — вполне возможно. Учти это. Я часто давала советы и покровительствовала ему, и верю, что он не такой человек».\n\n«Ваше Величество, [ROOT.GetCountry.GetHeir.GetFirstName] — самый достойный наследник. Но у него много братьев, завидующих его положению и занимающих важные посты. Эти ничтожества мечтают разрушить его правление и возвыситься. Лучше истребить этих шакалов, пока есть время. Но помни, это может иметь непредсказуемые последствия. Ваше Величество, будьте осторожны»."
 joi_flavor_tur.42.a: "Отозвать [ROOT.GetCountry.GetHeir.GetFirstName], его нужно тщательно проверить."
 joi_flavor_tur.42.b: "Без сомнения, поддержка матери верна, [ROOT.GetCountry.GetHeir.GetFirstName] невиновен."
 joi_flavor_tur.42.c: "Наказать клеветников и написать [ROOT.GetCountry.GetHeir.GetFirstName], что отец полностью ему доверяет."
 joi_flavor_tur.43.t: "Процветание города [SCOPE.sState('prince_governor_state').GetCityHubName]"
 joi_flavor_tur.43.d: "Недавно управление городом [SCOPE.sState('prince_governor_state').GetCityHubName] было передано нашему [Concept('concept_heir','$RULER_TITLE_SEHZADE$')]у [ROOT.GetCountry.GetHeir.GetFullName], и он справляется с делами на удивление быстро. Местная экономика процветает, центр города привлекает все больше торговцев и ремесленников, а сбор налогов стабильно улучшается."
 joi_flavor_tur.43.f: "«[SCOPE.sState('prince_governor_state').GetCityHubName] — поистине мирный и процветающий город под властью Аллаха. Его жители мудры, обаятельны, изящны и образованны. Климат здесь мягок, все блага стекаются сюда, и каждый стремится попасть в него. Люди готовы сражаться за него в любой войне, каждая рука поднимется на его защиту. Его слава гремит повсюду, и не нужно лишних слов: его великолепие превосходит воображение, оно несравненно»."
 joi_flavor_tur.43.a: "Не будем радоваться раньше времени."
 joi_flavor_tur.43.b: "Впечатляет."
 joi_flavor_tur.44.t: "Принц-губернатор на фронте"
 joi_flavor_tur.44.d: "К счастью, наш [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] извлек немалую пользу из долгой службы в армии, что проявилось в этой войне. В недавнем сражении он повел батальон в атаку и, хвала Аллаху, одержал блестящую победу. Его тактическое мышление хвалят соратники и командиры; даже паша [SCOPE.sCharacter('progress_pasha_scope').GetFullName], не знавший о его службе, планирует перевести его на более ответственную должность."
 joi_flavor_tur.44.f: "Недавняя война против [SCOPE.sCountry('enemy_country_scope').GetAltNameNoFlag('RU_CL_RP')] позволила принцу [ROOT.GetCountry.GetHeir.GetFirstName] проявить себя как полководца и моджахеда. Сообщают, что он сделал все возможное, чтобы разбить врага на своем участке и перенести войну на вражескую территорию. Верующие охотно вступают в его ряды, а военная элита присматривается к нему, возможно, готовясь поддержать в будущей борьбе за трон.\n\n«Ты достоин хвалы, как семья Мухаммеда! Воспоем доблесть [ROOT.GetCountry.GetHeir.GetFirstName], полного юности и славы: он — наша надежда в трудный час, он принял славу благородного Хасана; подобно щедрому и яркому солнцу, подобно славе и величию мира: ты — лев войны, зверь победы!»"
 joi_flavor_tur.44.a: "[ROOT.GetCountry.GetHeir.GetFirstName] может командовать кавалерией для углубления опыта."
 joi_flavor_tur.44.b: "Стоит познакомить [ROOT.GetCountry.GetHeir.GetFirstName] с нашей передовой артиллерией."
 joi_flavor_tur.45.t: "Сын #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!"
 joi_flavor_tur.45.d: "Всем известно, что наследование в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] сейчас нестабильно. Визирь [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] настаивает, что пришло время #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]у#! назначить наиболее подходящего [Concept('concept_heir', 'наследника')], чтобы избежать худшего сценария борьбы за трон."
 joi_flavor_tur.45.f: "Его Величество [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], лидер [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], султан султанов, слывет великим человеком и непоколебимым правителем. Под стать своему статусу и способностям, он воспитал множество талантливых детей, некоторые из которых проявляют царские задатки.\n\nЧиновники и сами дети знают: лишь один унаследует трон, а проигравших ждет незавидная участь. Назначение [Concept('concept_heir', 'наследника')] — хоть и не гарантирует прекращения интриг, но дает надежду предотвратить кровавую междоусобицу, которая наверняка вспыхнет, если [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] отправится к Аллаху, не назвав преемника."
 joi_flavor_tur.45.a: "Набожный сын — наш лучший выбор."
 joi_flavor_tur.45.b: "Сильный сын — наш лучший выбор."
 joi_flavor_tur.45.c: "Самый законный сын — наш лучший выбор."
 joi_flavor_tur.45.e: "Справедливый сын — наш лучший выбор."
 joi_flavor_tur.45.g: "Образованный сын — наш лучший выбор."
 joi_flavor_tur.46.t: "Меченосец-паша?"
 joi_flavor_tur.46.d: "Нынешний силахдар-паша [SCOPE.sCharacter('progress_pasha_scope').GetFullName] — несмотря на храбрость и заслуги перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')] и #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом#!, по ряду причин утратил доверие. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] решил лишить его политического поста и заменить другим. Какой новый силахдар нам нужен?"
 joi_flavor_tur.46.f: "«Говорят, пророк Мухаммед сказал: "Аллах любит храбрость, даже если она нужна лишь для того, чтобы убить змею". И [SCOPE.sCharacter('progress_pasha_scope').GetFirstName] — да помилует Аллах его душу — действительно был великим воином, твердым духом, суровым и хладнокровным; ничто не могло его устрашить».\n\n«Я сам видел его в начале зимы: отдав приказ войскам, он с горсткой людей противостоял главным силам врага, не отступая. Я спросил владыку побережья, сидевшего тогда с султаном, когда в перемирие зашла речь о численности врага».\n\n«Переводчик передал его ответ: "Я ездил с властителем Сура осмотреть их лагерь. Поднявшись на высоту, мы оценили их мощь — их армия насчитывала до пятисот тысяч человек"»."
 joi_flavor_tur.46.a: "Нам нужен прославленный паша."
 joi_flavor_tur.46.b: "Просвещенный реформатор будет полезнее всего."
 joi_flavor_tur.46.c: "Главное для армии — верность #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]у#!."
 joi_flavor_tur.46.e: "Пусть армия сама выдвинет пашу."
 joi_flavor_tur.47.t: "Указ о джихаде"
 joi_flavor_tur.47.d: "Недавняя война с нечестивыми язычниками из [SCOPE.sCountry('enemy_country_scope').GetAltNameNoFlag('RU_CL_RP')] побудила #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!, с помощью великого муфтия [SCOPE.sCharacter('progress_pasha_scope').GetFullName], от имени халифа всех суннитов и шиитов призвать мусульман к джихаду против неверных. Да хранит Аллах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]!"
 joi_flavor_tur.47.f: "«Мои воины-герои! На священном пути джихада и войны, перед лицом врага, угрожающего нашей ясной религии и любимой родине, ни на миг не теряйте решимости, твердости и самоотверженности. Гоните врага, как львы. Этой священной фетвой я призываю триста миллионов мусульман к величайшему джихаду. Жизнь и смерть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] зависят от вашей победы. Молитвы и благословения трехсот миллионов невинных и угнетенных верующих, с восторгом и радостью взывающих к Господу в мечетях и у Каабы, пребывают с вами».\n\n«Сыны мои, солдаты! На вас возложен долг, какого не знала ни одна армия мира: докажите, что вы истинные наследники османского войска, некогда потрясшего мир. Пусть неверный враг вовек не посмеет ступить на наши святые земли. Несомненно, милость Всевышнего и помощь славного Пророка даруют нам победу. Помните, вы сражаетесь плечом к плечу с величайшей армией в истории! Да принесут нам праведные мученики благую весть о победе, да будет благословен джихад газиев, и да будут остры их мечи»."
 joi_flavor_tur.47.a: "Мобилизовать исламский мир на смертный бой с неверными!"
 joi_flavor_tur.47.b: "Убедиться, что наши газии жаждут священной войны."
 joi_flavor_tur.48.t: "Дворцовая награда"
 joi_flavor_tur.48.d: "Чтобы отметить верность чиновников и сановников Порты, а также успокоить их, Его Величество [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] решил публично наградить всех отличившихся слуг Высокой Порты."
 joi_flavor_tur.48.f: "«Он никогда не хранил золото и серебро в своей сокровищнице. Напротив, получая деньги, он тратил их на дело Аллаха, раздавал беднякам и борцам за веру. Он говорил: "Именем Аллаха, я не оставлю в доме ни монеты". \n\nПри виде бедняков его сердце смягчалось, порой он снимал с себя одежду, чтобы укрыть их. Он охотно прощал и часто повторял: "Люди передо мной — творения Аллаха. Если я прощу их, Аллах простит меня"»."
 joi_flavor_tur.48.a: "Золото и почести обеспечат верность."
 joi_flavor_tur.48.b: "Раздать немного золота."
 joi_flavor_tur.48.c: "Раздать пару титулов для отвода глаз."
 joi_flavor_tur.49.t: "Новый великий визирь?"
 joi_flavor_tur.49.d: "Хотя нынешний великий визирь [SCOPE.sCharacter('progress_pasha_scope').GetFullName] прекрасно справлялся с обязанностями, политическая ситуация требует перемен. Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] решил назначить нового великого визиря."
 joi_flavor_tur.49.f: "«О просвещенный визирь, мой верный слуга [SCOPE.sCharacter('progress_pasha_scope').GetFullName]-паша! Как только получишь мой указ, не медли ни мгновения — отправляйся в священный поход вместе с моим великим полководцем [SCOPE.sCharacter('army_pasha_scope').GetFirstName]-пашой; веди султанское войско, подготовленное и дисциплинированное».\n\n«"[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]-паша — воин и министр, сражающийся на пути Аллаха, как я могу казнить его здесь? Ведь наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] всю жизнь избегал собственноручного убийства и смертных приговоров, стараясь по возможности не убивать и не приказывал убивать"»."
 joi_flavor_tur.49.a: "Великий визирь должен лучше всех исполнять волю султана."
 joi_flavor_tur.49.b: "Прислушаться к рекомендациям подчиненных."
 joi_flavor_tur.50.t: "Совет Высокой Порты [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_tur.50.d: "Его Величество [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — владыка Топкапы и Порты — издал императорский указ о созыве ежегодного совета Порты в [TimeKeeper.GetCurrentDate.Format('M')] месяце [TimeKeeper.GetCurrentDate.Format('y')] года для обсуждения положения [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_tur.50.f: "«Определение налогов крайне важно, ибо государству, владеющему землей, нужны солдаты, казармы и прочие расходы, требующие средств, а средства идут от налогов с подданных. Поэтому важно, чтобы налоги воспринимались благосклонно, с благодарностью Аллаху, ведь в прошлом их считали доходом, уходящим в казну Порты».\n\n«Чтобы избежать вмешательства, и в случае обвинений или преступлений, если они не нанесли ущерба, не следует конфисковывать имущество и лишать наследства; мусульмане и прочие представители нашего верховного суверенитета должны получать это разрешение без исключений»."
 joi_flavor_tur.50.a: "Порта должна заняться внутренней экономикой."
 joi_flavor_tur.50.b: "Порта должна сосредоточиться на флоте."
 joi_flavor_tur.50.c: "Порта должна уделить внимание сухопутной обороне."
 joi_flavor_tur.50.e: "Тучи мятежа! Строго проверить предателей в Порте."
 joi_flavor_tur.50.g: "Порта должна помочь народу империи."
 joi_flavor_tur.51.t: "Разбитое сердце"
 joi_flavor_tur.51.d: "Наш [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName], тайно служивший в армии, был ранен в пограничной стычке. Пуля прошла навылет, не задев жизненно важных органов, но тяжелая инфекция угрожает его жизни."
 joi_flavor_tur.51.f: "Какая невинная улыбка, как трогало меня его любопытство к проблемам империи! «Отец! — говорил он. — Отец, насколько велика Святая Земля?» Он спрашивал снова и снова. Я помню наш смех, когда мы вместе ели фрукты. Я думал... все, что я делал для него, было к лучшему. Но я ошибся. Мой здоровый, стойкий принц ранен, и рана так тяжела, что он лежит передо мной и, возможно, скоро уснет вечным сном.\n\nПот на лбу, тревога в глазах слуг... Он может не пережить эту ночь. Я не хочу, чтобы это был мой последний взгляд на него, но лишь Аллах решает. Вина терзает сердце. В полудреме всплывают лица всех моих детей. Как я посмотрю в глаза жене и наложницам? Теперь остались лишь вина и стыд."
 joi_flavor_tur.51.a: "Помолимся за жизнь [ROOT.GetCountry.GetHeir.GetFirstName]."
 joi_flavor_tur.51.b: "Позвать лучшего врача."
 joi_flavor_tur.51.c: "Лечить его новейшими лекарствами."
 joi_flavor_tur.51.e: "Нужен консилиум международных экспертов."
 joi_flavor_tur.51.h: "Новые антибиотики наверняка помогут."
 #События геноцида армян
 joi_flavor_tur.52.t: "Геноцид армян!"
 joi_flavor_tur.52.d: "Враждебность #tooltippable_name [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ого#! народа к #tooltippable_name [SCOPE.sCulture('armenian_scope').GetCustom('RU_CUL_ADJ')]ому#! достигла пика. Тайный приказ о резне, спланированный в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] и одобренный #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом#!, разослан по гарнизонам империи. Началась беспрецедентная бойня. Иностранные журналисты, ставшие свидетелями преступления, в ярости. «Таймс» называет #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! «врагом рода человеческого»."
 joi_flavor_tur.52.f: "«Днем [TimeKeeper.GetCurrentDate.Format('d M')] я увидел то, что навсегда врезалось в память, самое страшное зрелище в моей жизни: вдоль северной стены братской могилы вповалку лежали бесчисленные тела убитых  [SCOPE.sCulture('armenian_scope').GetCustom('RU_CUL_ADJ')]их#!#! людей. Многие были изуродованы до неузнаваемости. У одного лицо было размозжено чем-то тяжелым. У других шеи были почти перерублены. Я видел тело с содранной кожей на груди, с отрубленным предплечьем...»\n\n«Я спросил, не собаки ли это сделали. Мне ответили: [SCOPE.sCulture('turkish_scope').GetName)] это сделали ножами. Десяток тел обгорели. Все были раздеты догола, лишь на некоторых осталось белье... Одно дело — быть убитым храбрым воином в бою; совсем другое — быть хладнокровно вырезанным трусливыми вооруженными солдатами, не имея возможности защититься»."
 joi_flavor_tur.52.a: "Это лишь милосердная воспитательная акция, не верьте лжи врагов."
 joi_flavor_tur.53.t: "Армянский мятеж в городе [SCOPE.sState('armenian_scope').GetCityHubName]"
 joi_flavor_tur.53.d: "Группа #tooltippable_name [SCOPE.sCulture('armenian_culture_scope').GetCustom('RU_CUL_ADJ')]их#! радикалов, требующих автономии и озлобленных ростом антиармянских настроений, совершила вооруженное нападение в городе [SCOPE.sState('armenian_scope').GetCityHubName]. Утверждают, что правительственные учреждения захвачены, хотя некоторые чиновники полагают, что это бред местного бея, пытающегося свалить с себя ответственность."
 joi_flavor_tur.53.f: "«Мой доклад о ситуации в городе [SCOPE.sState('armenian_scope').GetCityHubName] расходится с вашим», — нерешительно, но твердо произнес [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]. — «Я не сообщал ни о каком народном восстании, а писал о многомесячных провокационных репрессиях со стороны региональных и местных властей. Они говорят о незначительных беспорядках, которые легко унять усилением полиции, но любой беспристрастный человек увидит, что переброска тысячи солдат — это преднамеренная эскалация»."
 joi_flavor_tur.53.a: "Помиловать народ города [SCOPE.sState('armenian_scope').GetCityHubName]."
 joi_flavor_tur.53.b: "Мятеж должен быть подавлен, даже если придется пролить реки крови!"
 joi_flavor_tur.54.t: "Резня [ROOT.GetCountry.GetRuler.GetFirstName]"
 joi_flavor_tur.54.d: "Враждебность к армянам нарастает. Даже сам [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] склоняется к «окончательному истреблению» #tooltippable_name [SCOPE.sCulture('armenian_culture_scope').GetCustom('RU_CUL_ADJ')]ого#! населения. Он пытается руководить верными офицерами в городе [SCOPE.sState('armenian_scope').GetCityHubName] для тайного уничтожения местной общины."
 joi_flavor_tur.54.f: "«Город [SCOPE.sState('armenian_scope').GetCityHubName] представляет собой ужасное зрелище. Он разграблен и разрушен; число погибших не поддается исчислению. Трупы валяются повсюду. В пятницу мне пришлось осторожно пробираться меж тел, чтобы не наступить на них. В субботу утром я насчитал дюжину телег с телами, которые за полчаса вывезли к реке и сбросили в воду. На кладбище роют массовые могилы».\n\n«В пятницу днем 250 так называемых #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]их#! резервистов без офицеров захватили поезд в городе [SCOPE.sState('capital_state').GetCityHubName] и заставили машиниста везти их в город [SCOPE.sState('armenian_scope').GetCityHubName]. Там они приняли участие в полном уничтожении армянского квартала — лучшей части города. Их грабеж был тщательным и быстрым»."
 joi_flavor_tur.54.a: "Остановить безумный приказ #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!."
 joi_flavor_tur.54.b: "Отличная работа, [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]! Это мы называем эффективностью."
 joi_flavor_tur.55.t: "Убийство [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]-паши"
 joi_flavor_tur.55.d: "Вчера в столице [GetCulture('armenian').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('armenian').GetCustom('RU_CUL_ADJ')|l]ий#!#! студент открыто застрелил нашего пашу, [SCOPE.sCharacter('tur_pasha_scope').GetFullName], на оживлённом углу улицы. Он выстрелил ему в затылок с близкого расстояния; пуля прошла через спинной мозг и вышла над левым глазом, мгновенно убив его. На сегодняшнем судебном заседании несколько известных иностранных адвокатов выступили в его защиту, утверждая, что он не убийца, а орудие правосудия, совершившее священную месть за резню, организованную пашой [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]."
 joi_flavor_tur.55.f: "«По приказу этого мерзкого человека жандарм увёл мою сестру, и сотни людей надругались над ней, бросив тело на улице. Вооружённые жандармы заставили армян покинуть свои дома и имущество, а как только мы вышли из города, они начали расстреливать жертв и грабить нас».\n\n«Я лучше умру сейчас, чем снова буду говорить о тех чёрных днях. Я не считаю себя виновным, моя совесть чиста... Я убил человека, но я не убийца».\n\n«Мне приснился сон: картины резни снова и снова вставали перед глазами. Я видел тело своей матери. Оно поднялось, подошло ко мне и сказало: "Ты видишь, что [SCOPE.sCharacter('tur_pasha_scope').GetFirstName] здесь, и тебе всё равно? Ты мне больше не сын!"»"
 joi_flavor_tur.55.a: "Паша мёртв, и я не в силах судить, кто прав... Пусть [GetCulture('armenian').GetName] ответят!"
 joi_flavor_tur.55.b: "Преступления [SCOPE.sCharacter('tur_pasha_scope').GetFirstName]-паши чудовищны! Оправдать убийцу!"
 joi_flavor_tur.56.t: "Резня в городе [SCOPE.sState('armenian_state_scope').GetCityHubName]"
 joi_flavor_tur.56.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] представил жестокий план уничтожения [GetCulture('armenian').GetName]. Офицер, организовавший резню, заявил, что готов к полному истреблению [GetCulture('armenian').GetName] в городе [SCOPE.sState('armenian_state_scope').GetCityHubName], чтобы освободить жизненное пространство для истинных #tooltippable_name [ROOT.GetCountry.GetAdjective]их#! граждан."
 joi_flavor_tur.56.f: "«[GetCulture('armenian').GetName] были вынуждены покинуть город [SCOPE.sState('armenian_state_scope').GetCityHubName] четырьмя партиями по 500 семей и отправиться в Эрзинджан. Им приходилось идти по трупам других [GetCulture('armenian').GetName], убитых ранее. Она показала, что по прибытии в Эрзинджан мужчин отделили от остальных депортированных, связали и бросили в реку».\n\n«Пришли жандармы и отобрали самых красивых женщин и девушек. Всех, кто сопротивлялся, пронзали штыками, разрывая ноги. Палачи вспарывали животы беременным женщинам и убивали их детей. Это было фактическое истребление всего народа [GetCulture('armenian').GetName]»."
 joi_flavor_tur.56.a: "Остановите это зверство! Зимми из числа [GetCulture('armenian').GetName] находятся под защитой священного закона!"
 joi_flavor_tur.56.b: "Устроить резню [GetCulture('armenian').GetName] в городе [SCOPE.sState('armenian_state_scope').GetCityHubName]!"
 #Болгарская резня
 joi_flavor_tur.57.t: "Геноцид болгар!"
 joi_flavor_tur.57.d: "[TimeKeeper.GetCurrentDate.Format('d MMMM y')] года [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] подписал тайный приказ, который был передан в гарнизон Софии, положив начало массовому геноциду [GetCulture('bulgarian').GetName]."
 joi_flavor_tur.57.f: "«Количество детей, погибших в этой бойне, ужасает. Их часто закалывали штыками, и у нас есть несколько свидетелей, которые видели младенцев, насаженных на штыки, которых носили по улицам — и здесь, и в Олук-Кёни. Причина проста. Когда мусульманин убивает определённое количество неверных, ему гарантирован рай, какой бы грех он ни совершил».\n\n«Там громоздились черепа, смешанные с костями разных частей тела. Почти полные скелеты гнили, а одежда, волосы и разлагающаяся плоть образовывали отвратительную кучу, поросшую густой травой. От неё исходил тошнотворный запах, как от дохлой лошади, и наше несвоевременное прибытие прервало трапезу собак... Земля здесь усеяна скелетами с прилипшими к ним лохмотьями и кусками плоти»."
 joi_flavor_tur.57.a: "Мы называем это эффективностью."
 #Сербская резня
 joi_flavor_tur.58.t: "Геноцид сербов!"
 joi_flavor_tur.58.d: "[TimeKeeper.GetCurrentDate.Format('d MMMM y')] года [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] подписал тайный приказ, который был передан в гарнизон в Сербии, положив начало массовому геноциду [GetCulture('serb').GetName]."
 joi_flavor_tur.58.f: "«Примерно в четырёх часах пути от города Йозгад мы увидели в долине сотни голов с длинными волосами — это были головы женщин и девочек. Начальника жандармов нашего конвоя звали Шукри. Я сказал ему: "Я думал, убивают только мужчин"».\n\n«Он ответил: "Нет, если мы убьем только мужчин, а женщин и детей оставим, через пятьдесят лет [GetCulture('serb').GetName] снова будут исчисляться миллионами. Поэтому мы должны уничтожить женщин и детей, чтобы решить эту проблему раз и навсегда, как дома, так и за границей. Мы должны убедиться, что не останется свидетелей, способных дать показания. В крайнем случае, загоним их в Сирийскую пустыню умирать от голода"»."
 joi_flavor_tur.58.a: "Мы называем это эффективностью."
 #Ассирийская резня
 joi_flavor_tur.59.t: "Геноцид ассирийцев!"
 joi_flavor_tur.59.d: "[TimeKeeper.GetCurrentDate.Format('d MMMM y')] года [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] подписал тайный приказ, который был передан в гарнизон Мосула, положив начало массовому геноциду [GetCulture('assyrian').GetName]."
 joi_flavor_tur.59.f: "«Я умоляю своих соотечественников, — писал он, — судьба [GetCulture('assyrian').GetName] зависит от вас больше, чем от любого другого народа Европы. Требуйте и настаивайте, чтобы наше правительство, которое всегда работало в одном направлении, теперь работало в другом, и сделало всё возможное вместе с европейскими странами, чтобы уничтожить административную власть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] над народом [GetCulture('assyrian').GetName]. Пусть [GetCulture('turkish').GetName] покончат со своими зверствами единственно возможным способом — самоуничтожением...»"
 joi_flavor_tur.59.a: "Это всё происки иностранных держав!"
 #Греческая резня
 joi_flavor_tur.60.t: "Геноцид греков!"
 joi_flavor_tur.60.d: "[TimeKeeper.GetCurrentDate.Format('d MMMM y')] года [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] подписал тайный приказ, который был передан в гарнизон Македонии, положив начало массовому геноциду [GetCulture('greek').GetName]."
 joi_flavor_tur.60.f: "«Всё указывает на то, что [GetCulture('turkish').GetName] планируют поступить с народом [GetCulture('greek').GetName] так же, как с [GetCulture('armenian').GetName], считая их врагами государства, подлежащими уничтожению. [GetCulture('turkish').GetName] используют тактику депортации людей вглубь страны, не предпринимая никаких мер для их выживания, обрекая их на смерть от голода и болезней. Затем они грабят, сжигают или разрушают брошенные дома. То, что [GetCulture('turkish').GetName] делают с народом [GetCulture('greek').GetName], — это точное повторение того, что они сделали с [GetCulture('armenian').GetName]»."
 joi_flavor_tur.60.a: "Мы называем это эффективностью."
 #Великий османизм
 joi_flavor_tur.61.t: "Подъём движения «[GetIdeology('ideology_ottomanism').GetName]»"
 joi_flavor_tur.61.d: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] набирает силу идеология, известная как [GetIdeology('ideology_ottomanism').GetName]. Её сторонники считают, что она способна создать национальное единство и предотвратить распад империи, вызванный религиозной системой миллетов."
 joi_flavor_tur.61.f: "«Когда мы говорим "зимми" (покровительствуемые), это означает: они связаны заветом с Аллахом, Его Посланником и мусульманской общиной, и мусульмане обязаны защищать их. Это долг каждого, вот что означает это слово. В настоящее время многих наших братьев оскорбляет слово "зимми". В своей книге я написал, что не вижу причин, препятствующих современному исламскому иджтихаду отказаться от термина "зимми" и называть их гражданами-немусульманами».\n\n«Ни одного зимми нельзя бить ради сбора джизьи, заставлять стоять на палящем солнце, вешать на него что-либо отвратительное или делать что-то подобное. Напротив, [ROOT.GetCountry.GetName] должна относиться к ним с терпимостью»."
 joi_flavor_tur.61.a: "Мы принадлежим Аллаху и к Нему вернёмся!"
 joi_flavor_tur.61.b: "Наша родина принадлежит каждому осману, независимо от происхождения!"
 joi_flavor_tur.62.t: "Крах идеологии «[GetIdeology('ideology_ottomanism').GetName]»"
 joi_flavor_tur.62.d: "Попытка создать новую #yellow османскую#! национальную идентичность провалилась. Многие считают, что если не принять мер по спасению наших территорий, великая [ROOT.GetCountry.GetName] будет разорвана в клочья религиозной сегрегацией и волной национализма."
 joi_flavor_tur.62.f: "«Сосуществование христиан и турок стало невозможным: только христианское правление может обеспечить равенство, справедливость и свободу совести. Христианское правление должно заменить мусульманское... Восточная Анатолия и Киликия — это регионы, где должно быть установлено христианское правление: христиане Турции этого хотят, то есть они требуют создания христианского государства, как и в других частях Европы»."
 joi_flavor_tur.62.a: "На то воля Аллаха."
 joi_flavor_tur.62.b: "Наследие [GetIdeology('ideology_ottomanism').GetName] всё ещё приносит нам немалую пользу."
 joi_flavor_tur.63.t: "#tooltippable_name[SCOPE.sCulture('gtr_event_scope').GetCustom('RU_CUL_ADJ')]ое#! национальное собрание"
 joi_flavor_tur.63.d: "Устаревшая система миллетов в отношении [SCOPE.sCulture('gtr_event_scope').GetName] подверглась реформированию. Мы отменили все дискриминационные меры против местного населения и закрепили в конституции равные права для [SCOPE.sCulture('gtr_event_scope').GetName]. Были созданы автономные советы и учреждения, объявлено, что назначение местных чиновников будет определяться местными собраниями и народом, а также даровано право самостоятельно распределять и собирать часть налогов. Город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] больше не вмешивается во внутреннее управление, отвечая лишь за общую оборону и дипломатию."
 joi_flavor_tur.63.f: "«Всякий раз, когда законодатели пытаются отнять и уничтожить собственность народа или обратить его в рабство деспотической властью, они ставят себя в состояние войны с народом. Народ с этого момента освобождается от повиновения и может искать общего убежища, которое Бог предусмотрел для всех людей против силы и насилия».\n\n«Поэтому всякий раз, когда законодатели нарушают это основное правило общества и из амбиций, страха, глупости или коррупции пытаются захватить абсолютную власть над жизнью, свободой и имуществом народа или передать её в чужие руки, они своим вероломством теряют власть, которую народ передал им для совершенно иных целей. Эта власть должна вернуться к народу, который имеет право восстановить свою изначальную свободу»."
 joi_flavor_tur.63.a: "Право народа [SCOPE.sCulture('gtr_event_scope').GetName] на автономию будет гарантировано конституцией!"
 #Исламский блок событий
 joi_flavor_tur.64.t: "Движение Салафия"
 joi_flavor_tur.64.d: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] поднимается исламское фундаменталистское движение «Салафия» ([GetReligion('sunni').GetName]). [GetIdeology('ideology_salafi').GetName] надеются очистить страну от яда модернизации, вернувшись к чистым исламским традициям Пророка Мухаммеда, его сподвижников и последователей трёх первых поколений."
 joi_flavor_tur.64.f: "«Заявлять, что ты последователь праведных предков, принадлежишь к их мазхабу и гордишься этим, не постыдно; напротив, согласно единогласному мнению учёных, это должно быть принято. Мазхаб праведных предков — это истина. Если человек следует этому закону и в сердце, и в делах, он подобен верующему, следующему истине и внутренне, и внешне».\n\n«Всё просто. Мы хотим шариата. Шариата в экономике, политике, правосудии, управлении границами и международных отношениях»."
 joi_flavor_tur.64.a: "[ROOT.GetCountry.GetName] будет твёрдо идти по пути модернизации!"
 joi_flavor_tur.64.b: "Слова и деяния Пророка и Сунна станут священным стандартом управления в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]."
 joi_flavor_tur.65.t: "Новый исламский мир"
 joi_flavor_tur.65.d: "Поскольку [ROOT.GetCountry.GetName] начинает полностью внедрять законы [GetReligion('sunni').GetCustom('RU_RL_RP')] в политике, дипломатии и военном деле, искореняя злокачественные опухоли либерализма, социализма и прочих современных идеологий, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] считает, что пришло время созвать всемирную конференцию мусульман, чтобы укрепить свой статус верховного [Concept('concept_ruler', '$RULER_TITLE_CALIPH$')]."
 joi_flavor_tur.65.f: "«Мир — это сад, а орошает его династия, то есть власть. Страж этой власти — шариат, а шариат — это и есть политика, скрепляющая империю; империя — творение армии; гарантия армии — в богатстве; богатство добывается уммой, которая через справедливость становится слугой государя; справедливость — основа благополучия мира».\n\n«Воля [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] ясна: лидеры учёных и знати должны собраться вместе и составить кодекс, основанный на незыблемых принципах священного закона, отвечающий потребностям времени, лёгкий в применении и свободный от разногласий. Затем халиф прикажет правителям [GetReligion('sunni').GetName] исполнять этот кодекс»."
 joi_flavor_tur.65.a: "[Concept('concept_ruler', '$RULER_TITLE_CALIPH$')] — наместник Аллаха!"
 joi_flavor_tur.66.t: "Высшая нация"
 joi_flavor_tur.66.d: "Попытка объединить всех мусульман-[GetReligion('sunni').GetName] провалилась. Сторонники закона «[GetLawType('law_monarchy').GetName]» понесли тяжёлые потери, предыдущий [Concept('concept_ruler', '$RULER_TITLE_CALIPH$')] был изгнан, а влияние религиозных традиций в нашей стране подорвано как никогда. Вместо этого звучит призыв национализма."
 joi_flavor_tur.66.f: "«Перед лицом знаний, науки и всего блеска цивилизации я не могу смириться с существованием в цивилизованном обществе [SCOPE.sCulture('turkish_scope').GetName] столь примитивных людей, которые ищут материального и духовного блага под руководством шейхов. [ROOT.GetCountry.GetName] не может быть страной шейхов, дервишей и мюридов. Лучший и самый истинный порядок — это порядок цивилизации: чтобы быть настоящим человеком, достаточно выполнять требования цивилизации. Лидеры дервишских орденов поймут истину моих слов, закроют свои обители и признают, что их учения устарели»."
 joi_flavor_tur.66.a: "Традиции [GetReligion('sunni').GetCustom('RU_RL_RP')] должны свято оберегаться."
 joi_flavor_tur.66.b: "Да здравствует цивилизованная #tooltippable_name [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ая#! нация!"
 joi_flavor_tur.67.t: "Язва Запада"
 joi_flavor_tur.67.d: "Антизападные и даже антимодернистские настроения в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] растут вместе с усилением влияния духовенства [GetReligion('sunni').GetCustom('RU_RL_RP')]. Многие правоверные мусульмане подают петиции [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], требуя искоренить определённые западные порядки в империи."
 joi_flavor_tur.67.f: "«На Ближнем Востоке и в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] религиозный дискурс доминирует в обществе, радиоэфире и мировоззрении. Радикальные мечети [GetReligion('sunni').GetCustom('RU_RL_RP')] растут как грибы по всей стране. Книжные магазины забиты религиозной литературой... Призывы к шариату, убеждение, что правительство отошло от исламского учения, вера в то, что ислам — ответ на все вопросы, и уверенность, что Запад объявил войну исламу — вот темы, доминирующие в общественной дискуссии. Исламисты, возможно, не контролируют парламент или государственные учреждения, но они уже захватили воображение масс»."
 joi_flavor_tur.67.a: "Ядовитый сорняк закона «[GetLawType('law_freedom_of_conscience').GetName]» должен быть вырван!"
 joi_flavor_tur.67.b: "Законы «[GetLawType('law_private_schools').GetName]» и «[GetLawType('law_public_schools').GetName]» должны быть пересмотрены в соответствии с шариатом."
 joi_flavor_tur.67.c: "Закон «[GetLawType('law_no_womens_rights').GetName]» — это воля Аллаха."
 joi_flavor_tur.67.e: "Закон «[GetLawType('law_outlawed_dissent').GetName]» способствует стабильности священного порядка."
 joi_flavor_tur.67.g: "Закон «[GetLawType('law_industry_banned').GetName]» поможет искоренить яд модернизации в империи."
 joi_flavor_tur.67.k: "Закон «[GetLawType('law_agrarianism').GetName]» поможет нам вернуть милость Аллаха."
 joi_flavor_tur.67.i: "Мы не можем отвергать современную цивилизацию."
 joi_flavor_tur.68.t: "Восстановление янычар?"
 joi_flavor_tur.68.d: "Янычарский корпус когда-то был элитной армией [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], но в ходе «Счастливого события» 1826 года он был распущен тогдашним [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Махмудом II#! и перестал существовать. Однако, учитывая недавнее восстановление #O рабства#!, нынешний [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] считает, что пришло время вернуть систему девширме и воссоздать эту великую армию, наводившую ужас на христианский мир."
 joi_flavor_tur.68.f: "«Во исполнение знаменитой фетвы шейх-уль-ислама, согласно которой любой неверный родитель или кто-либо другой, противящийся отдаче сына в янычары, должен быть немедленно повешен на дверном косяке, ибо его кровь считается нечистой».\n\n«Подумайте об этом душераздирающем горе! Сколько матерей расцарапали себе лица! Сколько отцов били себя в грудь! Какую боль испытывают эти христиане, разлучаясь с детьми при жизни... Уж лучше бы они умерли и были похоронены в наших церквях, чем живыми были схвачены, чтобы стать турками и отречься от нашей веры. Лучше бы они умерли!»"
 joi_flavor_tur.68.a: "Нынешняя армия лучше всего отвечает нашим нуждам."
 joi_flavor_tur.68.b: "Корпус янычар должен возродиться!"
 joi_flavor_tur.69.t: "Традиции рабства в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]"
 joi_flavor_tur.69.d: "Хотя в ходе модернизации закон «[GetLawType('law_slavery_banned').GetName]» был популярен и принят в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], с возрождением традиций [GetReligion('sunni').GetCustom('RU_RL_RP')] многие считают, что империя должна вернуться к практике рабства — особенно к обращению в рабство злых неверных."
 joi_flavor_tur.69.f: "«Порядки в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] должны основываться на рабстве, ибо рабы лишены человечности и собственности, подобно бессловесным животным: считать их такими же людьми, как и народ нашей страны, явно неразумно».\n\n«Раньше мы захватывали или покупали новых рабов на границах исламского мира, привозили их в крупные города и продавали там на невольничьих рынках во все концы»."
 joi_flavor_tur.69.a: "Закон «[GetLawType('law_debt_slavery').GetName]» соответствует наставлениям Аллаха."
 joi_flavor_tur.69.b: "Закон «[GetLawType('law_slave_trade').GetName]» пополнит нашу рабочую силу."
 joi_flavor_tur.69.c: "Мы не можем допустить такого регресса!"
 joi_flavor_tur.70.t: "Всемирный исламский конгресс"
 joi_flavor_tur.70.d: "[Concept('concept_ruler', '$RULER_TITLE_CALIPH$')] страны [SCOPE.sCountry('leader_scope').GetName] объявил о созыве конференции с участием мусульман всего мира для обсуждения будущего нации [GetReligion('sunni').GetName]."
 joi_flavor_tur.70.f: "«Для нашей страны и народа важны две вещи: религия и права, унаследованные от отцов. Мы знаем, чего следует избегать и что принимать ради нашего блага».\n\n«Клянусь Аллахом, мы больше не потерпим клеветы на наших предков, насмешек над нашими традиционными ценностями и хулы на нашего Бога. [ROOT.GetCountry.GetRuler.GetFullName], либо ты сам остановишь этих неверных, либо это сделаем мы. Раз ты, как и мы, против их речей, мы их устраним»."
 joi_flavor_tur.70.a: "Братья по вере [GetReligion('sunni').GetName] должны подчиниться воле халифа."
 joi_flavor_tur.70.b: "Мы подчиняемся воле халифа."
 joi_flavor_tur.70.c: "О чём вообще бредит [SCOPE.sCountry('leader_scope').GetName]?"
 #Великий Османизм завершение
 joi_flavor_tur.71.t: "Государство османов"
 joi_flavor_tur.71.d: "После долгих реформ равноправия идеалы [GetIdeology('ideology_ottomanism').GetName] были закреплены законодательно: идеи религиозного и этнического равенства внедрены в обязательное школьное образование. Высокая Порта также ввела множество льгот для ранее угнетённых народов, и секуляризация увенчалась огромным успехом."
 joi_flavor_tur.71.f: "«Дерево росло и крепло, пока не стало величественным исполином: его ветви и ствол сплелись, образуя густую сень, тень которой накрыла весь горизонт мира. Под сенью возвышались четыре горных хребта, в которых [ROOT.GetCountry.GetRuler.GetLastName] узнал Кавказ, Атлас, Тавр и Балканы».\n\n«Эти четыре горы, словно гигантские колонны, поддерживали купол этого священного дерева. Центр земли находился прямо под куполом, а из корней дерева вытекали четыре реки: Тигр, Евфрат, Дунай и Нил».\n\n«В долине сиял великолепный город с куполами и шпилями, пирамидами и обелисками, минаретами и башнями, на вершинах которых отражался свет полумесяца; внезапно налетел сильный ветер, листья на дереве превратились в острые ятаганы, и яростный шквал погнал листву-клинки на все города мира, но прежде всего — на Константинополь»."
 joi_flavor_tur.71.a: "Единые османы никогда не будут побеждены!"
#События завершения рабства/янычар
 joi_flavor_tur.72.t: "Страна золота, залив рабов"
 joi_flavor_tur.72.d: "[GetLawType('law_slave_trade').GetName|l] возродилась в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] и рынки города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] вновь наводнили #v $slaves$#!, ввозимые или захваченные в Африке и многих других местах — даже на европейских побережьях. Корабли работорговцев заполнили порты, принося нам огромные богатства."
 joi_flavor_tur.72.f: "«Раньше "средняя" черкешенка за 100 фунтов считалась очень дешевой, но теперь тот же товар можно купить всего за 5 фунтов! В прошлом черкесская рабыня почти наверняка попадала в хороший дом, где к ней не только хорошо относились, но часто она получала статус и богатство; но теперь цены так низки, что ее может купить любой, кто раньше и не помышлял о владении рабами».\n\n«Благодаря возрождению [GetLawType('law_slave_trade').GetName|l], бесконечный поток рабынь — белокурых красавиц из Грузии и Черкесии, смуглых арабских девушек с окраин Сахары — через различные обходные каналы вливается на рынки города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], чтобы жить со своими #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ми#!#! хозяевами и поддерживать с ними частые сексуальные отношения»."
 joi_flavor_tur.72.a: "В империи есть только два типа людей: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и его рабы."
 joi_flavor_tur.73.t: "Призрак янычар"
 joi_flavor_tur.73.d: "Янычары — армия, принесшая [ROOT.GetCountry.GetName] в прошлом бесчисленную славу, но также и бесчисленные беды и хаос, — была собственноручно возрождена [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] посреди ожесточенных споров. Какое влияние окажет эта армия на империю в эту эпоху, пока неизвестно, но одно неизменно: янычары вернулись!"
 joi_flavor_tur.73.f: "«Они обнаружили, что #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! силы приближаются к стенам, намереваясь вступить в бой, особенно янычары: когда один или двое янычар падали убитыми, тут же прибегали другие и уносили тела. Им было все равно, насколько близко они к стенам; наши люди стреляли в них из ружей и арбалетов, целясь в тех #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! людей, кто нес мертвых товарищей, и оба падали замертво, а затем прибегали другие янычары и уносили тела. Они были бесстрашны, предпочитая пожертвовать десятью людьми, чем стерпеть позор оставленного у стен тела янычара»."
 joi_flavor_tur.73.a: "Верность до смерти!"
 #События непокорной Аравии
 joi_flavor_tur.74.t: "Арабское пробуждение"
 joi_flavor_tur.74.d: "С распространением книгопечатания, появлением газет и издательств, а также расцветом новых националистических идей в подвластном [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')] регионе [GetStrategicRegion('region_arabia').GetName], поднялась волна арабского возрождения, известная как #V «Нахда»#!. От возрождения арабского языка, культуры и искусства до сопротивления централизованному правлению #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! властей — этот некогда спокойный полуостров начал бурлить."
 joi_flavor_tur.74.f: "«Тирания не имеет границ, она ведет ко всевозможной порче: она развращает религию, искажает мораль, душит знания, уничтожает мужество, превращая народ в рабов, а не граждан. Если тирания продолжится, народ не будет знать о свободе ничего, кроме ее названия; о достоинстве — ничего, кроме его тени».\n\n«Арабизм — это не память о прошлом и не ностальгия по ушедшим временам, а живая реальность, текущая в совести этого народа. Как бы ни разрывали границы, как бы ни дробились режимы, арабская нация всегда остается единым целым, ибо она несет в себе еще не реализованную миссию: когда этот народ пробудится и осознает свое предназначение, его история станет силой, а его будущее — ответственностью перед всем человечеством!»"
 joi_flavor_tur.74.a: "Империя должна сохранить власть на полуострове!"
 joi_flavor_tur.74.b: "Отличный шанс подорвать правление, которое ведут #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! наместники! Давайте свяжемся с этими #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ми#!#! людьми!"
 joi_flavor_tur.74.c: "[SCOPE.sCountry('TUR_scope').GetName] — наш друг! Мы должны поддержать их!"
 joi_flavor_tur.74.e: "Разве свободные #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! люди могут терпеть оковы?!"
 joi_flavor_tur.74.i: "Передадим уверения в верности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]им#!#! людям."
 joi_flavor_tur.74.g: "Интересное развитие событий, понаблюдаем."
 joi_flavor_tur.75.t: "Спящая пустыня"
 joi_flavor_tur.75.d: "Волна национализма в регионе [GetStrategicRegion('region_arabia').GetName], бушевавшая десятилетиями, в конце концов утихла под железным кулаком #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! властей и их иностранных союзников. Эта некогда пылающая пустыня вновь погрузилась в сон: несомненно, это самая значительная победа, одержанная [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')] за последнее время."
 joi_flavor_tur.75.f: "«Восстановить арабское государство и построить великую арабскую империю на месте тонущей #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ой#!#! власти? Не верьте лжи наемных писак, получающих деньги от иностранцев! Разлад между этими двумя столпами ислама приведет к гибели мусульманской силы... Как только эти два народа разделятся, они обречены на гибель».\n\n«Вклад [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] в ислам и дело мусульман несомненен, их героические деяния нельзя недооценивать. Недавние сомнения, противодействие и даже восстания многих братьев-мусульман против этой семьи причиняют боль Аллаху. Как братья по исламу, мы имеем священный долг удовлетворять нужды этой семьи и подчиняться их указаниям»."
 joi_flavor_tur.75.a: "Да здравствует слава [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_tur.75.b: "Мы не страшимся времени, пусть даже беды теснят нас..."
 joi_flavor_tur.75.c: "Похоже, этим #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]им#!#! людям на этот раз повезло."
 joi_flavor_tur.76.t: "Великое арабское восстание!"
 joi_flavor_tur.76.d: "С ростом национального энтузиазма #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ого#!#! народа под властью [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] и при помощи некоторых иностранных держав, арабы под предводительством потомка Пророка [SCOPE.sCharacter('holy_ruler').GetFullName] объявили [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] халифа [SCOPE.sCharacter('tur_ruler').GetFullName] узурпатором и нелегитимным правителем. Они собрали армию, пытаясь добиться независимости от [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.76.f: "«Мы увидели истинное лицо узурпаторов из [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]: мы узнали их злые намерения в отношении нашей веры, мы стали свидетелями их преступлений и злодеяний в наших святых землях. Наша вера указала нам путь к спасению, и во имя веры мы выполнили свой долг перед собой и мусульманами всего мира».\n\n«Мы подняли знамя восстания, чтобы угодить Аллаху, и Он даровал нам победу и пребывает с нами, поддерживая Свой закон и религию, что полностью соответствует Его мудрости. Его воля непременно возвысит благополучие этого народа».\n\n«Если в арабском народе осталась хоть капля истинного религиозного рвения, он должен спасти свои страны от бедствий, в которые они погрузились, и вырвать их из гибели и катастроф, в которые их втянули грешные руки #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! правителей!»"
 joi_flavor_tur.76.a: "Проклятые #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! мятежники!"
 joi_flavor_tur.76.b: "Немедленно созвать кабинет министров, [ROOT.GetCountry.GetName] должна принять решение!"
 joi_flavor_tur.76.c: "Вставайте, #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! воины! Жизнь в унижении и гнете — удел рабов!"
 joi_flavor_tur.77.t: "Декларация независимости"
 joi_flavor_tur.77.d: "[SCOPE.sCountry('ARA_scope').GetName] под предводительством потомка Пророка [SCOPE.sCharacter('holy_ruler').GetFullName] объявила [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] халифа [SCOPE.sCharacter('tur_ruler').GetFullName] узурпатором и нелегитимным правителем. От имени Хранителя Святынь и праведного халифа она направила ноту [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], требуя, чтобы наша страна присоединилась к справедливому делу борьбы за независимость арабской нации."
 joi_flavor_tur.77.f: "«Мы, жаждущий свободы народ [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_RP')], хотим сказать арабским братьям, что в Судный день мы признаем перед Всемогущим Аллахом: среди известных нам ныне мусульманских правителей нет никого более праведного и богобоязненного, чем потомок Его Пророка, монарх, правящий ныне страной [SCOPE.sCountry('ARA_scope').GetName], [SCOPE.sCharacter('holy_ruler').GetFullName]».\n\n«Мы не знаем никого более набожного, более верного законам Аллаха, более способного управлять делами государства так, чтобы угодить Аллаху. Народ Святой Земли провозгласил его королем лишь потому, что так он служит своей религии и стране».\n\n«Мы призываем тех, кто выступает против нас: если в вас осталась хоть капля истинного религиозного рвения, вы должны спасти другие страны от бедствий, в которые они погрузились, и вырвать их из гибели и катастроф, в которые их втянули грешные руки #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! правителей»."
 joi_flavor_tur.77.a: "Вставайте, #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! воины! Жизнь в унижении и гнете — удел рабов!"
 joi_flavor_tur.77.b: "Нет-нет, мы верные слуги [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.78.t: "Арабский кризис"
 joi_flavor_tur.78.d: "[SCOPE.sCountry('ARA_scope').GetName] под предводительством потомка Пророка [SCOPE.sCharacter('holy_ruler').GetFullName] ведет перестрелки с [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')], некогда правившей Аравийским полуостровом. Можно ожидать, что после сбора основных сил сторон эти стычки перерастут в полномасштабную войну. Какую позицию должна занять [ROOT.GetCountry.GetName]?"
 joi_flavor_tur.78.f: "«Это выгодно нам, так как соответствует нашей ближайшей цели — расколоть исламский "блок", победить и развалить [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')]. Государство, созданное [SCOPE.sCharacter('holy_ruler').GetFullName] на месте тонущей #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ой#!#! власти, для нас безвредно: #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! люди более нестабильны, чем #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#!. При правильном подходе они останутся политически раздробленными, состоящими из множества мелких, враждующих и лишенных единства эмиратов».\n\n«Я нисколько не считаю, что нынешние переговоры могут сильно повлиять на будущее устройство региона [GetStrategicRegion('region_arabia').GetName], или установить наши права в этой стране, или связать нам руки. Ситуация и ее факторы слишком сложны для этого. Сейчас мы должны направить народ #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ий#!#! на верный путь, оторвать их от #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! и привлечь на нашу сторону»."
 joi_flavor_tur.78.a: "Мы поддержим правое дело #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ого#!#! народа!"
 joi_flavor_tur.78.b: "Мы должны помочь #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]им#!#! людям подавить восстание."
 joi_flavor_tur.78.c: "Это не касается [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.78.e: "Обещать военную помощь [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_tur.78.i: "Обещать военную помощь [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_tur.79.t: "Лоуренс Аравийский"
 joi_flavor_tur.79.d: "Военная миссия [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] во главе с сэром [SCOPE.sCharacter('te_lawrence_scope').GetFullName], а также небольшой, но хорошо обученный английский отряд выступили и, как ожидается, вскоре прибудут в [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_VP')], чтобы поддержать их войну против #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! войск. Сэр [SCOPE.sCharacter('te_lawrence_scope').GetLastName] носит арабское платье; по его словам, в пустыне так чище и приличнее."
 joi_flavor_tur.79.f: "«Ценность племен ограничивается обороной, их истинная сфера — партизанская война. Они умны, энергичны, почти безрассудны, но слишком индивидуалистичны, чтобы подчиняться приказам, сражаться в строю или помогать друг другу. Я считаю невозможным организовать их в регулярную армию: война в Хиджазе — это война дервишей против регулярных войск, и мы на стороне дервишей».\n\n«Я решил не принимать никакого вознаграждения за свою работу на арабском фронте. Кабинет вдохновлял народ [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_RP')] сражаться за нас четким обещанием автономии после войны. Арабы верят людям, а не институтам. Они видели во мне свободного агента [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и требовали, чтобы я подтвердил письменные обещания [SCOPE.sCountry('GBR_scope').GetAdjectiveNoFormatting] правительства. С этой надеждой они совершили несколько блестящих подвигов»."
 joi_flavor_tur.79.a: "Приветствуем сэра [SCOPE.sCharacter('te_lawrence_scope').GetLastName]!"
 joi_flavor_tur.79.b: "Сэр [SCOPE.sCharacter('te_lawrence_scope').GetLastName] непременно поможет [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_DP')] одержать победу!"
 joi_flavor_tur.80.t: "Бремон Аравийский"
 joi_flavor_tur.80.d: "Военная миссия [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] во главе с генералом [SCOPE.sCharacter('fra_bremond_scope').GetFullName], а также небольшой, но хорошо обученный французский отряд выступили и, как ожидается, вскоре прибудут в [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_VP')], чтобы поддержать их войну против #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! войск."
 joi_flavor_tur.80.f: "«Решение об отступлении до сих пор остается загадкой. Оно было принято не в Бейруте и не в Адане, а в Мараше. Несомненно, если бы в Мараше была радиосвязь для постоянного контакта с Аданой, приказ об эвакуации не был бы отдан».\n\n«Их было около восьмисот человек, они молчали, но не выказывали ни малейшего страха от стыда. Сам [SCOPE.sCharacter('holy_ruler').GetFirstName], казалось, тоже не обращал на это внимания. Входя в город, он обернулся к командиру, следовавшему за ним, и крикнул: "Ох, наш город в руинах! Я должен телеграфировать премьер-министру, чтобы он прислал сорок каменщиков для ремонта общественных зданий". И он действительно это сделал»."
 joi_flavor_tur.80.a: "Приветствуем генерала [SCOPE.sCharacter('fra_bremond_scope').GetLastName]!"
 joi_flavor_tur.80.b: "Опытный генерал [SCOPE.sCharacter('fra_bremond_scope').GetLastName] несомненно поможет [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_DP')]."
 joi_flavor_tur.81.t: "Отправка военной миссии в регион [GetStrategicRegion('region_arabia').GetName]"
 joi_flavor_tur.81.d_1: "Иностранная военная миссия во главе с генералом [SCOPE.sCharacter('general_scope').GetFullName] прибыла в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], чтобы помочь нам в борьбе с врагами в этой войне."
 joi_flavor_tur.81.d_2: "Военная миссия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] во главе с генералом [SCOPE.sCharacter('general_scope').GetFullName], а также небольшой, но хорошо обученный [ROOT.GetCountry.GetAdjectiveNoFormatting] отряд выступили и, как ожидается, вскоре прибудут к месту назначения, чтобы вмешаться в войну между #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ими#!#! и #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ими#!#! людьми."
 joi_flavor_tur.81.f: "«Генерал [SCOPE.sCharacter('general_scope').GetFullName] яснее, чем кто-либо другой, видел видение мощи [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и ее значение в транспорте и войне. Он считал, что, служа военным советником в [ROOT.GetCountry.GetAdjectiveNoFormatting] армии, он сможет продемонстрировать достоинство этой благородной профессии и помочь привлечь самые пылкие таланты нашей молодежи в ту сферу, где они нужнее всего. За этот вклад и пример мы питаем к нему особую благодарность: это само по себе бесценный дар»."
 joi_flavor_tur.81.a: "Приветствуем генерала [SCOPE.sCharacter('general_scope').GetLastName]!"
 joi_flavor_tur.81.b: "Желаем генералу [SCOPE.sCharacter('general_scope').GetLastName] удачной поездки в [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_VP')]!"
 joi_flavor_tur.81.c: "Желаем генералу [SCOPE.sCharacter('general_scope').GetLastName] удачной поездки в [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')]!"
 joi_flavor_tur.82.t: "[SCOPE.sCountry('button_scope').GetName] атакует провинции региона [GetStrategicRegion('region_arabia').GetName]"
 joi_flavor_tur.82.d: "[SCOPE.sCountry('button_scope').GetName], используя тактическое преимущество в пустыне, направила несколько небольших эффективных отрядов для нападения на арабские провинции под властью [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]. Город [SCOPE.sState('arabic_state').GetCityHubName] понес тяжелые потери в ходе этого налета."
 joi_flavor_tur.82.f: "«На самом деле #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! силы столкнулись с непредвиденными трудностями: их гарнизоны страдали от высокой заболеваемости солдат и истощения скота — признаков переутомления и нехватки продовольствия. Постоянная активность племен в тылу также мешала им».\n\n«Некоторые племена, возможно, покинут лагерь #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]их#!#! вождей, но это не значит, что они станут надежными союзниками #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! властей. #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! войска вскоре обнаружили, что находятся во враждебном регионе: в первые две недели [TimeKeeper.GetCurrentDate.Format('M')] набеги племен в среднем стоили им сорока верблюдов и двадцати солдат убитыми и ранеными ежедневно, не считая потери припасов»."
 joi_flavor_tur.82.a: "Проклятье!"
 joi_flavor_tur.82.b: "#tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! воины никогда не будут рабами!"
 joi_flavor_tur.83.t: "Переписка [SCOPE.sCharacter('ara_ruler').GetLastName] — [SCOPE.sCharacter('great_power_politician').GetLastName]"
 joi_flavor_tur.83.d: "Эмир [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('ara_ruler').GetFullName] провел несколько секретных телеграфных переговоров с [SCOPE.sCharacter('great_power_politician').GetFullName], ключевым членом кабинета [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] и главой по делам арабов, в надежде заручиться [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] поддержкой для дальнейшего продвижения борьбы против [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.83.f: "«На основе вышеупомянутых поправок и без ущерба для наших существующих договоров с арабскими вождями, мы принимаем эти ограничения и границы. Что касается территорий, где [SCOPE.sCountry('great_power_scope').GetName] может действовать свободно, не нанося ущерба интересам своих союзников, я от имени [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительства даю следующие гарантии и отвечаю на ваше письмо следующим образом: при соблюдении вышеуказанных поправок [SCOPE.sCountry('great_power_scope').GetName] готова признать и поддержать независимость арабов в пределах территорий, предложенных шерифом [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')]».\n\n«Официально гарантирую, что любые меры, принятые во время конференции, являются лишь временными и не должны препятствовать окончательному решению. [SCOPE.sCountry('ara_scope').GetName], несомненно, пришлет представителей на мирную конференцию: если я обнаружу нарушение этих приказов, я сменю их. Напоминаю эмиру [SCOPE.sCharacter('ara_ruler').GetLastName], что [SCOPE.sCountry('great_power_scope').GetName] обязана стремиться к решению, соответствующему воле заинтересованных народов, и призываю его всецело доверять искренности [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительства»."
 joi_flavor_tur.83.a: "Мы поддержим справедливые действия эмира [SCOPE.sCharacter('ara_ruler').GetLastName] против [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.83.b: "Мы должны вежливо отклонить просьбу эмира [SCOPE.sCharacter('ara_ruler').GetLastName]."
 joi_flavor_tur.83.c: "Спасибо нашему дорогому союзнику [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_DP')]!"
 joi_flavor_tur.83.e: "О, какая жалость."
 joi_flavor_tur.84.t: "Переписка [SCOPE.sCharacter('great_power_politician').GetLastName] — [SCOPE.sCharacter('ara_ruler').GetLastName]"
 joi_flavor_tur.84.d: "[SCOPE.sCharacter('great_power_politician').GetFullName], ключевой член кабинета [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] и глава по делам арабов, провел несколько секретных телеграфных переговоров с эмиром [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('ara_ruler').GetFullName] и выразил готовность оказать [SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting] народу ключевую помощь в поддержке их борьбы против [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.84.f: "«На основе вышеупомянутых поправок и без ущерба для наших существующих договоров с арабскими вождями, мы принимаем эти ограничения и границы. Что касается территорий, где [SCOPE.sCountry('great_power_scope').GetName] может действовать свободно, не нанося ущерба интересам своих союзников, я от имени [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительства даю следующие гарантии и отвечаю на ваше письмо следующим образом: при соблюдении вышеуказанных поправок [SCOPE.sCountry('great_power_scope').GetName] готова признать и поддержать независимость арабов в пределах территорий, предложенных шерифом [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')]».\n\n«Официально гарантирую, что любые меры, принятые во время конференции, являются лишь временными и не должны препятствовать окончательному решению. [SCOPE.sCountry('ara_scope').GetName], несомненно, пришлет представителей на мирную конференцию: если я обнаружу нарушение этих приказов, я сменю их. Напоминаю эмиру [SCOPE.sCharacter('ara_ruler').GetLastName], что [SCOPE.sCountry('great_power_scope').GetName] обязана стремиться к решению, соответствующему воле заинтересованных народов, и призываю его всецело доверять искренности [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительства»."
 joi_flavor_tur.84.a: "Поддержка [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] будет нам очень полезна."
 joi_flavor_tur.84.b: "Проклятые иностранцы, убирайтесь!"
 joi_flavor_tur.84.c: "Отлично, [SCOPE.sCountry('ara_scope').GetNameNoFlag] станет важной пешкой великой [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] в уничтожении [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.84.e: "Эти неблагодарные [SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting] люди!"
 joi_flavor_tur.85.t: "Совместная декларация [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_tur.85.d: "При содействии сановника [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('great_power_politician').GetFullName] и эмира [SCOPE.sCountry('ara_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('ara_ruler').GetFullName], [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] парламент ратифицировал совместный договор, публично объявляющий миру, что [SCOPE.sCountry('great_power_scope').GetName] признает [SCOPE.sCountry('ara_scope').GetName] как уважаемое независимое государство, и подразумевающий, что этот статус должен распространяться на все государства региона [GetStrategicRegion('region_arabia').GetName], все еще находящиеся под влиянием [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.85.f: "«Цель [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] — полное освобождение народов, долгое время угнетаемых #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ими#!#! властями, и создание национальных правительств и администраций, черпающих власть в инициативе и свободном выборе местного населения. Для достижения этих целей [SCOPE.sCountry('great_power_scope').GetName] и [SCOPE.sCountry('ara_scope').GetName] объединяют усилия, поощряя и помогая созданию местных правительств и администраций в Сирии и Месопотамии, а также на территориях, которые они стремятся освободить, и признавая эти правительства и администрации сразу после их фактического создания».\n\n«[SCOPE.sCountry('great_power_scope').GetName] не имеет намерения навязывать населению этих регионов какую-либо конкретную систему, а лишь желает через поддержку и существенную помощь обеспечить нормальное функционирование правительств и администраций, свободно избранных народом. Гарантировать всем справедливое и равное правосудие, способствовать экономическому развитию страны путем поощрения местной инициативы, содействовать распространению образования и положить конец раздорам, которыми так долго пользовалась [SCOPE.sCountry('TUR_scope').GetName]»."
 joi_flavor_tur.85.a: "Как они смеют!"
 joi_flavor_tur.85.b: "Волнующе! Может, нам тоже стоит попробовать связаться с [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_INS')]?"
 joi_flavor_tur.85.c: "Интересный поворот. Похоже, ситуация складывается не в пользу #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! правителей."
 joi_flavor_tur.85.e: "Трепещите, проклятые #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! угнетатели, ваш конец близок!"
 joi_flavor_tur.85.i: "Братья-арабы! Наш час настал!"
 joi_flavor_tur.86.t: "Военная миссия [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] в Османской империи"
 joi_flavor_tur.86.d: "После переговоров военного министра [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('great_power_politician').GetFullName] с падишахом [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('tur_ruler').GetFullName], [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительство решило отправить военную миссию во главе с генералом [SCOPE.sCharacter('general_scope').GetFullName] в [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_VP')], чтобы консультировать и помогать [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] армии в подавлении беспорядков в регионе [GetStrategicRegion('region_arabia').GetName]."
 joi_flavor_tur.86.f: "«Вдохнуть в молодежь патриотизм и воинский дух, заставить их гордиться славой и величием [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], давая им при этом здоровое физическое воспитание, подготавливая к военной карьере. А также воспитать любовь к родине, воинскую доблесть и крепкое тело».\n\n«Все надежды [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] возложены на ее молодое поколение: вы — это поколение, и как только вы достигнете вершин, вы спасете эту страну»."
 joi_flavor_tur.86.a: "Благодарим [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_VP')] за помощь!"
 joi_flavor_tur.86.b: "Генерал [SCOPE.sCharacter('general_scope').GetFullName] послужит Османам."
 joi_flavor_tur.86.c: "Генерал [SCOPE.sCharacter('general_scope').GetFullName] возглавит военную миссию для поддержки #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! сил."
 joi_flavor_tur.87.t: "Военное положение в Аравии!"
 joi_flavor_tur.87.d: "Учитывая недавнюю критическую ситуацию в регионе [GetStrategicRegion('region_arabia').GetName], [SCOPE.sCountry('turkish_scope').GetAdjectiveNoFormatting] Порта решила принять жесткие меры, объявив о введении военного управления и военного положения в арабских провинциях империи."
 joi_flavor_tur.87.f: "Великой #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ой#!#! нации и всем подданным Империи в регионе [GetStrategicRegion('region_arabia').GetName]:\n\nС 3 часов утра [TimeKeeper.GetCurrentDate.Format('d M')] [SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] вооруженные силы взяли на себя административное управление регионом [GetStrategicRegion('region_arabia').GetName]. Операция, благодаря тесному сотрудничеству всех подданных и сил безопасности, прошла успешно и практически без жертв. Вводится комендантский час на всей территории Аравии для всех, кроме военнослужащих, до особого распоряжения.\n\nПорта от имени Его Величества верховного падишаха и халифа ислама [SCOPE.sCharacter('tur_ruler').GetFullName] требует: все подданные империи должны всемерно содействовать действиям вооруженных сил, активно сообщать о подозрительных элементах и вместе восстанавливать мир, которого так жаждет народ империи.\n\n[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] Порта, [TimeKeeper.GetCurrentDate.Format('d M y')] года, дворец Топкапы."
 joi_flavor_tur.87.a: "#tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ие#!#! крысы, вам негде спрятаться!"
 joi_flavor_tur.87.b: "Удивительная новость, хотя и вполне ожидаемая."
 joi_flavor_tur.87.c: "Проклятые #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ие#!#! солдафоны!"
 #Великое арабское восстание
 joi_flavor_tur.88.t: "Крах османского владычества"
 joi_flavor_tur.88.d: "[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting] войска потерпели сокрушительное поражение в этой пустынной войне. [SCOPE.sCountry('TUR_scope').GetName] была вынуждена подписать договор с [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_TP')], признав независимость арабского государства. Многие считают это погребальным звоном по мусульманской империи [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]."
 joi_flavor_tur.88.f: "«Империя истощена. Наши ресурсы выкачаны, война забрала последние силы страны. Арабское восстание стало тяжелым ударом: оно поразило самое чувствительное ядро единства империи».\n\n«Империя #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]ого#!#! народа рушится на наших глазах: после долгих страданий арабская нация вновь обрела свободу»."
 joi_flavor_tur.88.a: "Это конец империи и закат славы."
 joi_flavor_tur.88.b: "Это наша родина, земля предков!"
 joi_flavor_tur.88.c: "Мы должны признать, арабы показали мощь свободы."
 joi_flavor_tur.88.i: "Великое достижение!"
 joi_flavor_tur.89.t: "[SCOPE.sCountry('great_power_scope').GetName] претендует на Сирию"
 joi_flavor_tur.89.d: "Правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] пытается расширить свое влияние в регионе [GetStrategicRegion('region_arabia').GetName] через Великое арабское восстание. [SCOPE.sCountry('SYR_scope').GetName] уже получила уведомление от [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] с требованием принять [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] мандатное управление."
 joi_flavor_tur.89.f: "«[SCOPE.sCountry('great_power_scope').GetName] требует решения, которое, компенсируя неудобства и потери от распада [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], сохранит ее исторические и традиционные позиции в Сирии и обеспечит полное достижение ее экономических целей на Ближнем Востоке».\n\n«Я неоднократно указывал [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] правительству, что арабы испытывают глубокое отвращение к перспективе управления [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] любой арабской территорией. Это создает значительную опасность для наших будущих отношений с арабами, поскольку заставить [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_VP')] признать свою ошибку крайне трудно, если не невозможно»."
 joi_flavor_tur.89.a: "Мы должны принять реальность."
 joi_flavor_tur.89.b: "Свободные арабы никогда не склонятся!"
 joi_flavor_tur.89.c: "Великая дипломатическая победа!"
 joi_flavor_tur.89.e: "[SCOPE.sCountry('SYR_scope').GetName] должна осознать свое место."
 joi_flavor_tur.90.t: "[SCOPE.sCountry('great_power_scope').GetName] претендует на Ирак"
 joi_flavor_tur.90.d: "Правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] пытается расширить свое влияние в регионе [GetStrategicRegion('region_arabia').GetName] через Великое арабское восстание. [SCOPE.sCountry('IRQ_scope').GetName] уже получила уведомление от [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] с требованием принять [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] мандатное управление."
 joi_flavor_tur.90.f: "«Правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] требует гарантий своих позиций в Персидском заливе, возможности развивать южную Месопотамию, создания сухопутного торгового и военного коридора между Персидским заливом и Средиземным морем, а также влияния в достаточно широком радиусе для обеспечения подходящих санаториев и летних курортов для персонала, занятого в ирригационных проектах Месопотамии».\n\n«Принятие всего плана будет означать отказ [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] от значительной части интересов, но при условии обеспечения сотрудничества арабов и получения арабами Хомса, Хамы, Дамаска и Алеппо, правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] не возражало бы против такого соглашения»."
 joi_flavor_tur.90.a: "Мы должны принять реальность."
 joi_flavor_tur.90.b: "Свободные арабы никогда не склонятся!"
 joi_flavor_tur.90.c: "Великая дипломатическая победа!"
 joi_flavor_tur.90.e: "[SCOPE.sCountry('IRQ_scope').GetName] должна осознать свое место."
 joi_flavor_tur.91.t: "[SCOPE.sCountry('great_power_scope').GetName] претендует на Палестину"
 joi_flavor_tur.91.d: "Правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] пытается расширить свое влияние в регионе [GetStrategicRegion('region_arabia').GetName] через Великое арабское восстание. [SCOPE.sCountry('ARA_scope').GetName] уже получила уведомление от [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] с требованием принять [SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting] мандатное управление над Палестиной и Иорданией."
 joi_flavor_tur.91.f: "«Если наша поддержка короля [SCOPE.sCharacter('ara_ruler').GetFirstName] и других арабских лидеров, уступающих ему в происхождении и престиже, имеет какой-то смысл, то это готовность признать полную суверенную независимость палестинских арабов. Настало время ознакомить правительство [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] с нашими подробными обязательствами перед [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_TP')] и ясно дать понять, кто именно — он или кто-то другой — будет править Палестиной. [SCOPE.sCountry('ARA_scope').GetName] — единственное государство, способное стать лидером арабского мира и подчинить других эмиров».\n\n«Мандат должен отвечать за выполнение декларации правительства [SCOPE.sCountry('great_power_scope').GetAltNameNoFlag('RU_CL_RP')] от [TimeKeeper.GetCurrentDate.Format('d M y')] года, принятой вышеупомянутыми державами, в пользу создания в Палестине национального очага для еврейского народа, при ясном понимании, что не должно предприниматься ничего, что могло бы ущемить гражданские и религиозные права существующих нееврейских общин в Палестине или права и политический статус евреев в любой другой стране»."
 joi_flavor_tur.91.a: "Мы должны принять реальность."
 joi_flavor_tur.91.b: "Свободные арабы никогда не склонятся!"
 joi_flavor_tur.91.c: "Великая дипломатическая победа!"
 joi_flavor_tur.91.e: "[SCOPE.sCountry('ARA_scope').GetName] должна осознать свое место."
 joi_flavor_tur.92.t: "Здравствуй, Родина"
 joi_flavor_tur.92.d: "#tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]ий#!#! народ, освободившийся от гнета [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], под знаменами [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_RP')] и своего лидера [SCOPE.sCharacter('ara_ruler').GetFullName] отстоял независимость, выдержал давление и агрессию со всех сторон и, наконец, восстал из песков, объединившись в свободное, независимое и равноправное государство: #V новое государство для всех народов региона [GetStrategicRegion('region_arabia').GetName].#!"
 joi_flavor_tur.92.f: "«За славу и Родину живем и умираем,\nВысокие цели, дух несокрушимый.\nРазве свободный стерпит цепи?!\nЖизнь в унижении — лишь для рабов!\n\nНе страшимся лет, пусть беды грозят,\nЗа Родину пали герои-братья.\n\nЭто наша земля, где предки спят,\nПод небом, где дух и пророчества парят.\nГоры и воды, красы неземной,\nКаждая пядь — едина с тобой!»"
 joi_flavor_tur.92.a: "Клянемся не отступать до победного освобождения Родины!"
 joi_flavor_tur.92.b: "Слава нам и созданному нами государству!"
 joi_flavor_tur.92.c: "Эти арабы действительно смогли?!"
 joi_flavor_tur.92.e: "Эти проклятые арабы..."
 joi_flavor_tur.92.i: "Поздравляем наших братьев из [SCOPE.sCountry('ARA_scope').GetAltNameNoFlag('RU_CL_RP')], сбросивших вековое иго #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! правителей!"
 #События пиратов
 joi_flavor_tur.93.t: "Возрождение пиратской империи"
 joi_flavor_tur.93.d: "Под эгидой [SCOPE.sCountry('corsairs_scope').GetAltNameNoFlag('RU_CL_RP')] в Средиземноморье возрождается исламская [GetLawType('law_slave_trade').GetName|l]. Контролируя ключевые пиратские порты, такие как #yellow [SCOPE.sState('TRIPOLI_state_scope').GetCityHubName]#! и #yellow [SCOPE.sState('CRETE_state_scope').GetCityHubName]#!, средиземноморские пиратские банды, исчезнувшие после двух Берберийских войн, британской бомбардировки Алжира и инцидента с веером, вновь заявили о себе при поддержке [SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting] флота."
 joi_flavor_tur.93.f: "«В их Коране написано, что все народы, не признающие Пророка, — грешники, и верующие имеют право и обязанность грабить и порабощать их; каждый мусульманин, павший в этой войне, непременно попадет в рай. Он также сказал, что первый, кто взойдет на вражеский корабль, получит дополнительного раба. Когда они прыгали на палубу врага, каждый моряк держал по кинжалу в каждой руке и третий в зубах; это обычно вселяло в противника такой ужас, что они немедленно сдавались»."
 joi_flavor_tur.93.a: "Поднять паруса, ваш пиратский [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вернулся!"
 joi_flavor_tur.93.b: "Эти берберийские ублюдки!"
 joi_flavor_tur.94.t: "Пиратские действия [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_tur.94.d: "Пираты [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] атаковали средиземноморское побережье регионов #yellow Иберия#! и #yellow Окситания#!, вызвав разрушения и панику. [SCOPE.sCountry('TUR_scope').GetName] извлекла из этого немалую выгоду."
 joi_flavor_tur.94.f: "«Ваше Превосходительство, мой господин — человек безграничного терпения; но он знает, как поступить с теми, кто истощил его терпение лживыми словами о дружбе, — сказал он. — Я должен получить транспортное судно, полное рабов и товаров, подобное тому, что вы раньше платили алжирцам».\n\n«В договоре не было ни слова о транспортном судне! Мы скорее будем сражаться, чем поддадимся на шантаж, — возразил губернатор. — Неужели вам не стыдно требовать этого сразу после получения драгоценных даров?»\n\nСултан выпустил клуб дыма из трубки. «Мы считаем все это блефом; мы видим, как вы продолжаете воевать с [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_TP')]. Ваше смехотворное поведение вызывает лишь презрение и насмешки»."
 joi_flavor_tur.94.a: "Хе-хе-хе..."
 joi_flavor_tur.94.b: "Проклятые пираты из [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_tur.95.t: "Пиратские действия [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_tur.95.d: "Пираты [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] атаковали средиземноморское побережье регионов #yellow Италия#! и #yellow Балканы#!, вызвав разрушения и панику. [SCOPE.sCountry('TUR_scope').GetName] извлекла из этого немалую выгоду."
 joi_flavor_tur.95.f: "«Если успех — это для всех нас; если неудача — это для меня одного», — писал он, цитируя классические мемуары. «Но, — добавил он с пафосом, — любой личный риск лучше унижения переговоров с подлыми пиратами и выкупа законных наследников свободы. Откровенно говоря, я предпочел бы потерять мир и даже быть посаженным на кол, чем пойти на такие уступки. Разве мою страну нельзя разгневать?»\n\n«Нет, — ответил султан. — Мы так долго ждали выполнения наших требований, а вы ничем не отплатили за наше терпение. Все прибрежные страны раз в два-три года получают от нас такие требования; и вам, как и другим христианам, придется их выполнить»."
 joi_flavor_tur.95.a: "Хе-хе-хе..."
 joi_flavor_tur.95.b: "Проклятые пираты из [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_tur.96.t: "Пиратские действия [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]"
 joi_flavor_tur.96.d: "Пираты [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] атаковали средиземноморское побережье регионов #yellow Днепр#!, #yellow Кавказ#! и #yellow Дунай#!, вызвав разрушения и панику. [SCOPE.sCountry('TUR_scope').GetName] извлекла из этого немалую выгоду."
 joi_flavor_tur.96.f: "«Буквально на днях, — писал чиновник, — они потребовали восемьдесят 24-фунтовых монет. Такими темпами, когда закончатся наши выплаты? Я больше не могу говорить о сопротивлении и принуждении: действия нашего флота в этом сезоне ничуть не помогли моим усилиям. Правительство посылает в эти воды так называемый флот, но лучше бы прислало фрегат под командованием наемников».\n\n«Вовсе нет. Мы ожидали получить полную сумму по мирному договору в течение года, но они ничего не привезли, хотя мы неоднократно намекали #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]им#!#! властям, что ждем проявлений искренней дружбы, но до сих пор не получили никаких знаков их подлинной дружбы»."
 joi_flavor_tur.96.a: "Хе-хе-хе..."
 joi_flavor_tur.96.b: "Проклятые пираты из [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')]!"
 joi_flavor_tur.97.t: "[SCOPE.sCountry('TUR_scope').GetName] грабит торговые суда"
 joi_flavor_tur.97.d: "Пираты [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] напали на торговый конвой [SCOPE.sCountry('unlcky_scope').GetAltNameNoFlag('RU_CL_RP')], проходивший через Средиземное море. Богатства конвоя разграблены, корабли угнаны, многие [SCOPE.sCountry('unlcky_scope').GetAdjectiveNoFormatting] торговцы понесли тяжелые убытки."
 joi_flavor_tur.97.f: "«Принуждение торговых судов [SCOPE.sCountry('unlcky_scope').GetAltNameNoFlag('RU_CL_RP')] идти в Константинополь под флагом [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] для таких целей вызывает глубокое возмущение не только у самого маршала, но и у народа [SCOPE.sCountry('unlcky_scope').GetAltNameNoFlag('RU_CL_RP')]. Какую бы краткосрочную выгоду это ни принесло, оскорбление столь серьезно, что в свое время, возможно, придется пересмотреть этот вопрос. В связи с этим маршал просит воздержаться от любых заявлений или действий, которые могут неоправданно помешать компетентным органам провести расследование в защиту чести страны»."
 joi_flavor_tur.97.a: "Отличная работа, парни!"
 joi_flavor_tur.97.b: "Направить протест [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')]!"
 #Османский государственный долг
 joi_flavor_tur.98.t: "Декрет Мухаррема"
 joi_flavor_tur.98.d: "Тяжелые долговые проблемы [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] побудили Порту начать выпуск государственных облигаций для европейских держав. Однако неплатежеспособность встревожила европейских банкиров, и с их подачи долговая проблема [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] легла на столы правительств."
 joi_flavor_tur.98.f: "«Правительство [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], в свете заявления своего представителя на конференции [TimeKeeper.GetCurrentDate.Format('d M y')] года и в соответствии с обязательствами, принятыми в ноте и дополнительной ноте того же года, приглашает кредиторов по государственному долгу [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] избрать представителей для скорейшего прибытия в Константинополь. Цель — прямые переговоры с Портой для достижения соглашения о справедливом и осуществимом плане урегулирования государственного долга [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], а также обсуждение способов возобновления выплаты процентов и погашения основного долга».\n\n«Имперское правительство создало специальную комиссию для переговоров с этими представителями. Заседания комиссии начались 1 сентября сего года и продолжались в сентябре, октябре, ноябре и декабре. В итоге между имперскими комиссарами и представителями было достигнуто полное согласие, подтвержденное протоколом, подписанным обеими сторонами. На основе этого соглашения имперское правительство издаст указ»."
 joi_flavor_tur.98.a: "Надеюсь, этот заем решит проблему раз и навсегда..."
 joi_flavor_tur.98.b: "Похоже, финансовые проблемы #tooltippable_name #tooltip:[SCOPE.sCulture('turkish_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('turkish_scope').GetCustom('RU_CUL_ADJ')]их#!#! властей весьма серьезны?"
 joi_flavor_tur.98.c: "Даже перед риском банкроства, мы не станем брать кредиты у зарубежных стран!"
 joi_flavor_tur.99.t: "Новый государственный долг?"
 joi_flavor_tur.99.d: "[SCOPE.sCountry('TUR_scope').GetName] пытается получить новый #O государственный заем#! у [SCOPE.sCountry('debt_lender_scope').GetAltNameNoFlag('RU_CL_RP')]. Несмотря на заверения Порты в надежности долга, банкиры [SCOPE.sCountry('debt_lender_scope').GetAltNameNoFlag('RU_CL_RP')] опасаются возможного дефолта."
 joi_flavor_tur.99.f: "«Очевидно, что процент сам по себе не может служить вознаграждением за сбережение или ожидание. Ибо если человек хранит сбережения в наличных, он не получает никаких процентов, даже если сберегает столько же, сколько и раньше. Напротив, само определение процента ясно говорит нам, что это вознаграждение за предоставление ликвидности на определенный срок».\n\n«По аналогии можно отрицать, что заработная плата есть вознаграждение за труд, или прибыль — за риск, поскольку труд иногда выполняется без ожидания или получения вознаграждения, а люди, идущие на финансовый риск, как известно, порой несут убытки вместо прибыли»."
 joi_flavor_tur.99.a: "#tooltippable_name [SCOPE.sCountry('debt_lender_scope').GetAdjective|l]ие#! люди такие скупые!"
 joi_flavor_tur.99.b: "Благодарим [SCOPE.sCountry('debt_lender_scope').GetAltNameNoFlag('RU_CL_VP')] за щедрость!"
 joi_flavor_tur.99.c: "Давайте в долг, мы же щедрые спасители!"
 joi_flavor_tur.99.e: "Пусть катятся к своему Аллаху за деньгами!"
 joi_flavor_tur.100.t: "Декрет о суверенном долге [TimeKeeper.GetCurrentDate.Format('y')] года"
 joi_flavor_tur.100.d: "Усилиями [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] проблема #O государственного долга#!, годами терзавшая Порту, наконец решена. Хотя казна империи почти опустошена огромными процентами, этот долг, угрожавший суверенитету [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], сегодня полностью погашен Портой."
 joi_flavor_tur.100.f: "«Поэтому каждый старается использовать свой капитал для поддержки отечественной промышленности и направлять ее так, чтобы стоимость ее продукта была максимальной; каждый неизбежно стремится максимизировать годовой доход общества. На самом деле он обычно не имеет намерения содействовать общественному благу и не знает, насколько он ему содействует».\n\n«Он предпочитает поддерживать отечественную промышленность, а не иностранную, только ради собственной безопасности; и он направляет эту промышленность так, чтобы ее продукт имел наибольшую стоимость, только ради собственной выгоды. В этом, как и во многих других случаях, его ведет невидимая рука к цели, которая совсем не входила в его намерения».\n\n«И это не всегда плохо для общества. Преследуя свои интересы, он часто более действенно служит интересам общества, чем тогда, когда сознательно стремится к этому»."
 joi_flavor_tur.100.a: "Золото ушло из казны, суверенитет вернулся во дворец!"
 joi_flavor_tur.100.b: "Отрадно, по крайней мере, наши деньги вернулись в целости — да еще и с процентами!"
 #Общие события республики/конституции
 joi_flavor_tur.101.t: "Ататюрк"
 joi_flavor_tur.101.d_1: "Под жестким реформаторским руководством [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetName] преобразилась: создана однородная, единая светская нация. #V Либерализм, секуляризм и этатизм#! признаны важнейшими ценностями #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFlag|l]ого#! народа. При поддержке сторонников [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], [ROOT.GetCountry.GetAdjectiveNoFormatting] Национальное собрание решило присвоить [ROOT.GetCountry.GetRuler.GetFullName] почетное имя «#yellow Ататюрк#!», что означает «#yellow Отец турок#!»."
 joi_flavor_tur.101.d_2: "Скончался бывший [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('liberalism_leader').GetFullName]. Он считается важнейшим лидером [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] этой эпохи, заново создавшим #yellow [ROOT.GetCountry.GetAdjectiveNoFormatting]#! нацию, хотя ей еще многое предстоит, чтобы достичь его идеалов. В знак высочайшего уважения [ROOT.GetCountry.GetAdjectiveNoFormatting] Национальное собрание решило посмертно присвоить [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.sCharacter('liberalism_leader').GetFirstName] имя «#yellow Ататюрк#!», что означает «#yellow Отец турок#!»."
 joi_flavor_tur.101.f: "«Под полной независимостью мы, конечно, понимаем полную свободу в экономической, финансовой, судебной, военной, культурной и всех прочих сферах. Утрата независимости в любой из этих областей равносильна утрате всей независимости нации и государства: мы должны освободить наши понятия о справедливости, наши законы и правовые институты от оков, которые, будучи несовместимыми с потребностями нашего века, все еще крепко нас держат».\n\n«Лишение женщин политических прав не имеет логического объяснения: любые колебания и негативное отношение к этому вопросу — не более чем пережитки угасающего социального прошлого. Женщины должны иметь право голосовать и быть избранными; потому что этого требует демократия, потому что у женщин есть интересы, которые нужно защищать, и социальные обязанности, которые нужно выполнять».\n\n«В день его похорон я был на службе и рыдал, оплакивая конец эпохи. Сегодня я не скорблю, ибо 15 лет опыта научили меня: Ататюрк никогда не умрет по-настоящему»."
 joi_flavor_tur.101.a: "Надеемся, [ROOT.GetCountry.GetAdjectiveNoFormatting] государство унаследует заветы #yellow Ататюрка#!..."
 joi_flavor_tur.101.b: "#yellow Ататюрк#! создал подлинно независимую и свободную [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 joi_flavor_tur.101.c: "#yellow Ататюрк#! войдет в историю как один из величайших создателей наций этого века."
 joi_flavor_tur.101.e: "Он — Вашингтон нашей страны. #yellow Ататюрк#! войдет в историю как один из величайших создателей наций этого века."
 joi_flavor_tur.101.g: "Он — Вашингтон нашей страны. #yellow Ататюрк#! войдет в историю как один из величайших создателей наций этого века."