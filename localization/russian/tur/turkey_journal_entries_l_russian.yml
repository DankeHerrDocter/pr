 #其他日志
 tur_tobacco_industry: "Турецкая табачная промышленность"
 tur_tobacco_industry_reason: "С момента появления в империи в XVI веке @tobacco!#V табак#! быстро стал самым популярным товаром в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]: дым поднимается над ступенями мечетей, скамьями кофеен и сопровождает солдат в походах. #B Любовь к табаку стала привычкой#! — богатые и бедные #B ненадолго забывают о заботах#! в клубах дыма.\n\nОднако @tobacco!#V табак#! не должен быть просто товаром. С ростом дефицита бюджета налог на табак становится надежным источником дохода. Мы должны ввести #V монополию#!, #B строгий контроль и централизованную скупку#!, превратив этот повседневный продукт в #B опору [Concept('concept_government', 'правительства')] и финансового порядка#! — и даже гарантию кредитоспособности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — и #V самый прибыльный экспортный товар#!."
 tur_tobacco_industry_possible_tt: "Является ведущим производителем @tobacco!#V табака#!"
 #公共债务
 ottoman_public_debt: "Османский государственный долг"
 ottoman_public_debt_reason: "Под давлением #V военных расходов#! и #V затрат на реформы#! [concept_treasury] и [concept_building_balance] [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] пришли в серьезный дисбаланс. Чтобы покрыть #R дефицит#!, #G Порта#! начала часто выпускать облигации на зарубежных рынках, что сделало финансы империи зависимыми от #R внешнего долга#!.\n\nПоскольку облигации скупаются все большим числом банкиров и правительств Европы, финансовая проблема империи переросла из #B внутреннего дела#! в #V международный вопрос#!.\n\nДля [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] тяжелый #B долговой кризис#! уже #V подорвал суверенитет Порты#!. Если удастся навести порядок в финансах, сбалансировать бюджет и постепенно погасить долги, империя может #B восстановить утраченную власть#!. Но если внешний долг выйдет из-под контроля, #V тень залога и международного вмешательства неизбежно накроет Порту#!.\n\n@information!#B #O Сумма внешнего долга#!#!: количество долговых обязательств [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] перед другими участниками [Concept('concept_journal_entry', 'записи')] #V $ottoman_public_debt$#!. Чем больше долг, тем больше процентов платит Османская империя; держатели облигаций получают проценты от Османов."
 tur_clear_debt_tt: "Все текущие #V внутренние займы#! #yellow $dyn_c_ottoman_empire_RU_CL_RP$#! будут погашены."
 ottoman_public_debt_journal_possible_tt: "#yellow $dyn_c_ottoman_empire$#! начала выпуск облигаций, приняв решение #B «Эмиссия государственного долга»#!"
