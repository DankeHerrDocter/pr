 the_unruly_arabs_progress_bar_33_tt: "Правительство $dyn_c_ottoman_empire_RU_CL_RP$ эвакуировалось из арабского города"
 the_unruly_arabs_modifier_activated_tt: "Все #B национальные движения региона [GetStrategicRegion('region_arabia').GetName]#! в #yellow Османской империи#! получат модификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_unruly_arabs_modifier_effects_tt $arabic_nations_wakeup_modifier$#!."
 the_unruly_arabs_modifier_effects_tt: "[GetStaticModifier('arabic_nations_wakeup_modifier').GetName|v]\n[GetStaticModifier('arabic_nations_wakeup_modifier').GetDesc]"
 the_unruly_arabs_tur_victory_tt: "Арабское националистическое движение утихнет.\nМодификатор #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_unruly_arabs_modifier_effects_tt $arabic_nations_wakeup_modifier$#! будет удален у всех #B национальных движений региона [GetStrategicRegion('region_arabia').GetName]#! в #yellow Османской империи#!."
 the_unruly_arabs_tur_start_tt: "Националисты региона [GetStrategicRegion('region_arabia').GetName] начнут борьбу за независимость: это может выражаться в #B нападениях на наши территории#!, #B публикации арабской литературы#! и даже #V поиске иностранной поддержки#!.\nЕсли вовремя не успокоить или не подавить этих беспокойных жителей, они рано или поздно поднимут #R вооруженное восстание!#!"
 foreign_support_arab_enable_tt: "#O Арабские#! националисты начнут активные действия за независимость в #yellow Османской империи#!.\nНаша страна начнет поддерживать их, что откроет ряд #B мер поддержки#! в [Concept('concept_journal_entry', 'записи в дневнике')] #V «Непокорная Аравия»#!, помогающих #O арабам#! обрести свободу; мы можем #B прекратить поддержку#! в любой момент.\nЕсли мы решимся на #yellow военное вмешательство#!, успешно #G получившая независимость [Concept('concept_country', 'страна')] региона [GetStrategicRegion('region_arabia').GetName] может стать нашим [Concept('concept_subject', 'субъектом')]#!."
 foreign_support_arab_stay_tt: "#O Арабские#! националисты начнут активные действия за независимость в #yellow Османской империи#!.\nНаша страна поддержит репрессивные меры #yellow Османской империи#!, что откроет ряд #B мер поддержки#! в [Concept('concept_journal_entry', 'записи в дневнике')] #V «Непокорная Аравия»#!, помогающих #yellow Османской империи#! удержать власть в регионе [GetStrategicRegion('region_arabia').GetName]; мы можем #B прекратить поддержку#! в любой момент.\nЕсли #yellow Османская империя#! успешно подавит движение за независимость, #V наши отношения значительно улучшатся#! — мы даже можем получить от них #G [concept_trade_privilege], [concept_foreign_investment_rights] или [concept_treaty_port]#!."
 foreign_support_arab_rise_tt: "#O Арабские#! националисты начнут активные действия за независимость в #yellow Османской империи#!.\nНаша страна поддержит это движение и начнет борьбу за независимость от #yellow Османской империи#! или поможет другим #B братьям-арабам обрести свободу#!.\nЕсли власть #yellow Османской империи#! в регионе [GetStrategicRegion('region_arabia').GetName] рухнет, мы #V получим выгоду#! и даже сможем #G объединиться с дружественными независимыми братскими странами в более сильную федерацию#!."
 foreign_support_arab_fall_tt: "#O Арабские#! националисты начнут активные действия за независимость в #yellow Османской империи#!.\nНаша страна выступит против этого и поддержит сохранение власти #yellow Османской империи#! в регионе [GetStrategicRegion('region_arabia').GetName]. Если #yellow Османская империя#! успешно подавит движение за независимость, #V наши отношения значительно улучшатся#!, и мы получим от них титул #G #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_arab_khedive_modifier_effects_tt $the_arab_khedive_modifier$#!#!."
 the_arab_khedive_modifier_effects_tt: "[GetStaticModifier('the_arab_khedive_modifier').GetName|v]\n[GetStaticModifier('the_arab_khedive_modifier').GetDesc]"
 foreign_support_arab_neutral_tt: "#O Арабские#! националисты начнут активные действия за независимость в #yellow Османской империи#!.\nНаша страна некоторое время будет сохранять #B нейтралитет#!, но в будущем сможет выбрать сторону."
 the_unruly_arabs_tur_victory_other_tt: "#yellow Османская империя#! в итоге победила в противостоянии с арабами! Если мы поддерживали #yellow Османскую империю#!, то получим #G награду#! в зависимости от степени нашего участия."
 the_unruly_arabs_arb_fail_tt: "Не будем застревать в зыбучих песках ушедшего прошлого, какой бы прекрасной ни была его мимолетная слава."
 the_unruly_arabs_1_button: "Продвигать арабскую знать"
 the_unruly_arabs_1_button_desc: "Среди племенной и городской элиты титулы и почести часто действеннее проповедей. Умеренно продвигая знатные семьи арабской культуры в администрацию, налоговую и судебную системы, мы можем переманить самых влиятельных людей с улиц и из мечетей в кабинеты — по крайней мере, публично они будут более склонны «поддерживать порядок»."
 the_unruly_arabs_2_button: "Укрепить централизацию в Аравии"
 the_unruly_arabs_2_button_desc: "Когда местные советы, шариатские суды и частные сборщики налогов действуют сами по себе, приказы из столицы — пустой звук. Вернув ключевые функции под контроль #v @bureaucrats! чиновников#!, Порта укрепит свою власть в пустыне."
 the_unruly_arabs_2_button_allow_tt: "[concept_unruly_arabs_progress] не менее 100"
 the_unruly_arabs_3_button: "Запретить арабские общества"
 the_unruly_arabs_3_button_desc: "Если позволить частным арабским обществам и издательским сетям разрастаться, они неизбежно превратятся в организованный политический бунт. Имперская полиция должна закрыть места их сборов и перекрыть финансирование."
 the_unruly_arabs_3_button_allow_tt: "[concept_unruly_arabs_progress] не менее 200"
 the_unruly_arabs_4_button: "Ввести военное положение в Аравии"
 the_unruly_arabs_4_button_desc: "Когда ситуация переходит в открытую конфронтацию, местной администрации явно недостаточно для борьбы с арабскими мятежниками. Мы передадим города, железнодорожные станции, перевалы и источники воды под прямой контроль военных, введем комендантский час и патрулирование, чтобы обезопасить местные органы власти."
 the_unruly_arabs_4_button_allow_tt: "[concept_unruly_arabs_progress] не менее 300"
 the_unruly_arabs_5_button: "Пропагандировать арабскую литературу"
 the_unruly_arabs_5_button_desc: "Арабская нация — всё ещё молодая концепция. Мы должны финансировать газеты, школы и типографии, поощрять написание стихов, исторических трудов и политических комментариев на #O арабском языке#!, чтобы выковать из разрозненных местных идентичностей единую «нацию»."
 the_unruly_arabs_6_button: "Атаковать османские территории"
 the_unruly_arabs_6_button_desc: "Наш великий народ пустыни — мастер партизанской войны! Нападая на османские погранпосты, линии снабжения и отдаленные провинции, мы заставим турок распылять силы и сеять хаос на их землях."
 the_unruly_arabs_6_button_possible_tt: "В последние 3 месяца ни одно другое государство региона [GetStrategicRegion('region_arabia').GetName] не атаковало османские территории"
 the_unruly_arabs_7_button: "Обратиться к иностранным державам"
 the_unruly_arabs_7_button_desc: "Нам трудно утвердиться на международной арене в одиночку, не говоря уже о противостоянии могущественной Османской империей. Мы должны тайно установить контакт с иностранной [Concept('concept_great_power', 'великой державой')] через неофициальные каналы, прощупать их интересы на полуострове и попытаться заручиться помощью и признанием."
 the_unruly_arabs_7_button_possible_2_tt: "Эта страна еще не заключила соглашение ни с одним арабским государством"
 the_unruly_arabs_7_button_possible_tt: "За последний год вы или любое арабское государство не связывались с иностранной [Concept('concept_great_power', 'великой державой')]"
 the_unruly_arabs_8_button: "Связаться с арабами"
 the_unruly_arabs_8_button_desc: "Ситуация на Аравийском полуострове непредсказуема, но, возможно, пришло время сделать ставку. Нужно выяснить: чего хотят эти арабы — денег, оружия, советников или просто обещаний?"
 the_unruly_arabs_8_button_possible_1_tt: "Наша страна еще не заключила соглашение ни с одним арабским государством"
 the_unruly_arabs_8_button_possible_2_tt: "Является государством региона [GetStrategicRegion('region_arabia').GetName]"
 accept_the_unruly_arabs_8_button_tt: "Еще не приняло нашу поддержку"
 the_unruly_arabs_9_button: "Предоставить военную поддержку"
 the_unruly_arabs_9_button_desc: "Дервиши и кочевники арабского народа не способны воевать с Османской империей. Мы предоставим оружие, обучение, советников и логистику, а при необходимости поможем создать стабильную командную структуру."
 the_unruly_arabs_9_button_possible_tt: "Эта страна уже связалась с нами и достигла соглашения через #B коммуникацию#!"
 the_unruly_arabs_10_button: "Признать арабское государство"
 the_unruly_arabs_10_button_desc: "Признание — это не ввод войск, но оно делает процесс необратимым. Публично признав легитимность и независимость арабского государства, мы нанесем удар по турецкому владычеству без особых затрат."
 the_unruly_arabs_10_button_possible_1_tt: "Еще не признали публично арабское государство"
 the_unruly_arabs_10_button_possible_2_tt: "Наша страна связалась и достигла соглашения хотя бы с одним арабским государством через #B коммуникацию#!"
 great_power_unruly_arabs_10_tt: "За последние 3 месяца ни одна другая [concept_great_power] не признавала арабское государство"
 the_unruly_arabs_11_button: "Помочь арабским братьям"
 the_unruly_arabs_11_button_desc: "Как братья по вере и языку, мы обязаны поддержать борьбу против турецкой тирании. Будем продолжать посылать помощь арабским вассалам Османской империи, усиливая их возможности для пропаганды, мобилизации и вооружения."
 the_unruly_arabs_12_button: "Предоставить военную помощь"
 the_unruly_arabs_12_button_desc: "Как ни прискорбно, военная мощь Османской империи жалка. Как союзники, мы должны предоставить оружие, обучение, советников и логистику, а при необходимости помочь создать более сильную командную и военную систему."
 the_unruly_arabs_12_button_possible_tt: "Военная помощь Османам еще не предоставлялась"
 the_unruly_arabs_13_button: "Поддержать суверенитет Османской империи"
 the_unruly_arabs_13_button_desc: "Позиция должна быть закреплена дипломатически. Мы направим ноты всем странам, четко поддерживая территориальную целостность Османской империи на Аравийском полуострове: это отличный вклад в разгром арабов."
 the_unruly_arabs_14_button: "Подавить арабизм"
 the_unruly_arabs_14_button_desc: "Мы подданные законного халифа Османской империи, а не какое-то «арабское национальное сообщество»! Местные власти должны подавлять националистическую пропаганду цензурой, запретами и перевоспитанием, в первую очередь ударяя по организаторам и каналам распространения."
 the_unruly_arabs_15_button: "Сменить позицию"
 the_unruly_arabs_15_button_desc: "В изменчивом мире выжидание — тоже выбор, и его можно пересмотреть. Мы официально изменим дипломатическую позицию: от поддержки Османов к арабам или наоборот. Смена курса имеет цену, но позволяет не ставить на проигравшую лошадь."
 the_unruly_arabs_new_button: "Эвакуация из арабского города"
 the_unruly_arabs_new_button_desc: "Сопротивление арабов уже оказало огромное влияние на наше правление в Аравии и даже на стабильность всей Империи, а международное осуждение наших репрессий растёт. Очевидно, что тратить силы на подавление и удержание контроля над арабскими городами становится невыгодным делом."
 the_unruly_arabs_new_button_effect_tt: "$concept_unruly_arabs_progress$ будет ежемесячно расти на 2 в течение 2 лет"
 the_unruly_arabs_15_button_possible_tt: "Позиция не менялась в течение 1 года"
 the_unruly_arabs_15_button_ara_tt: "Мы откажемся от поддержки #yellow Османской империи#! и поддержим #yellow арабов#!."
 the_unruly_arabs_15_button_tur_tt: "Мы откажемся от поддержки #yellow арабов#! и поддержим #yellow Османскую империю#!."
 the_unruly_arabs_15_button_set_tt: "Мы случайным образом объявим позицию и сможем немедленно ее сменить."
 the_unruly_arabs_tur_act_timer_tt: "Никаких других действий за последний год не предпринималось"
 the_unruly_arabs_ara_act_timer_tt: "Никаких других действий за последний год не предпринималось"
 the_unruly_arabs_tur_act_benifit_1_tt: "[concept_unruly_arabs_progress] снижается на 0.5 ежемесячно в течение 6 месяцев"
 the_unruly_arabs_tur_act_benifit_2_tt: "[concept_unruly_arabs_progress] снижается на 0.5 ежемесячно в течение 12 месяцев"
 the_unruly_arabs_tur_act_benifit_3_tt: "[concept_unruly_arabs_progress] будет ежемесячно снижаться на 1, а [concept_unruly_arabs_timer] будет снижаться на 1 #V ежегодно#! в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_1_tt: "[concept_unruly_arabs_progress] увеличивается на 1 ежемесячно в течение 12 месяцев"
 the_unruly_arabs_ara_act_benifit_2_tt: "[concept_unruly_arabs_progress] увеличивается на 1 ежемесячно в течение 6 месяцев"
 the_unruly_arabs_ara_act_benifit_3_tooltip_tt: "Этот вариант доступен только при наличии подходящих стран для переговоров.\nЕсли [concept_great_power] согласится, [concept_unruly_arabs_progress] будет расти на 1 ежемесячно в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_3_tt: "[concept_unruly_arabs_progress] увеличивается на 1 ежемесячно в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_4_tooltip_tt: "Этот вариант доступен только при наличии подходящих стран для переговоров.\nЕсли арабы согласятся с нами, [concept_unruly_arabs_progress] будет расти на 1 ежемесячно в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_4_tt: "[concept_unruly_arabs_progress] увеличивается на 1 ежемесячно в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_5_tt: "[concept_unruly_arabs_progress] увеличивается на 0.5 ежемесячно в течение 12 месяцев"
 the_unruly_arabs_ara_act_benifit_6_tt: "[concept_unruly_arabs_progress] снижается на 0.3 ежемесячно в течение 5 лет"
 the_unruly_arabs_ara_act_benifit_8_tt: "[concept_unruly_arabs_progress] увеличивается на 1 ежемесячно в течение 3 месяцев"
 the_unruly_arabs_ara_act_benifit_9_tt: "[concept_unruly_arabs_progress] снижается на 1 ежемесячно в течение 3 месяцев"
 #阿拉伯大起义
 great_arab_revolt: "Великое арабское восстание"
 great_arab_revolt_reason: "Недовольство #tooltippable_name #tooltip:[SCOPE.sCulture('bedouin_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('bedouin_scope').GetCustom('RU_CUL_ADJ')]их#!#! кочевников правлением [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] переросло в военный конфликт. При поддержке иностранных [Concept('concept_great_power', 'великих держав')] и #yellow арабских стран#!, [SCOPE.sCountry('ARA_scope').GetName] под руководством потомка Пророка [SCOPE.sCharacter('ara_ruler').GetFullName] поднял масштабное вооруженное восстание. Если [SCOPE.sCountry('TUR_scope').GetName] не подавит его вовремя, народы региона [GetStrategicRegion('region_arabia').GetName] один за другим обретут независимость."
 great_arab_revolt_possible_tt: "$dyn_c_ottoman_empire$ провалила или не уложилась в срок в [Concept('concept_journal_entry', 'записи в дневнике')] #V $the_unruly_arabs$#!"
