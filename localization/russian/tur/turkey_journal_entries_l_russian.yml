 event_tur_history_heir_effect_tt: "Этот вариант склоняется к назначению наиболее легитимного принца наследником, что поможет увеличить наш [concept_sublime_porte_authority] после его восшествия на престол."
 event_tur_46_a_tt: "Высокая Порта назначит #V шовинистического#! пашу со случайной #V военной чертой#!, который также будет доступен как генерал.\nВероятность получения паши со следующими чертами:\n•[GetCharacterTrait('basic_offensive_planner').GetName]\n•[GetCharacterTrait('experienced_offensive_planner').GetName]\n•[GetCharacterTrait('basic_artillery_commander').GetName]\n•[GetCharacterTrait('experienced_artillery_commander').GetName]\n•[GetCharacterTrait('expert_offensive_planner').GetName]"
 event_tur_46_b_tt: "Высокая Порта назначит пашу со случайной #V реформистской#! идеологией, который также будет доступен как генерал.\nВероятность получения паши со следующими идеологиями:\n•[GetIdeology('ideology_modernizer_leader').GetName]\n•[GetIdeology('ideology_reformer').GetName]\n•[GetIdeology('ideology_liberal_leader').GetName]\n•[GetIdeology('ideology_radical').GetName]"
 event_tur_46_c_tt: "Высокая Порта назначит пашу со случайной #V реакционной#! идеологией, который также будет доступен как генерал.\nВероятность получения паши со следующими идеологиями:\n•[GetIdeology('ideology_authoritarian').GetName]\n•[GetIdeology('ideology_traditionalist').GetName]\n•[GetIdeology('ideology_royalist').GetName]\n•[GetIdeology('ideology_slaver').GetName]\n•[GetIdeology('ideology_theocrat').GetName]"
 event_tur_46_e_tt: "Нынешний лидер [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetAltNameNoFlag('RU_CL_RP')] уйдет в отставку, и будет случайно выбран преемник."
 event_tur_49_a_tt: "Нынешний Великий визирь [SCOPE.sCharacter('progress_pasha_scope').GetFullName] уйдет в отставку, и Высокая Порта случайно назначит Великого визиря из следующих идеологий:\n•[GetIdeology('ideology_modernizer_leader').GetName]\n•[GetIdeology('ideology_reformer').GetName]\n•[GetIdeology('ideology_authoritarian').GetName]\n•[GetIdeology('ideology_humanitarian_royalist').GetName]\n•[GetIdeology('ideology_positivist').GetName]\n•[GetIdeology('ideology_corporatist_leader').GetName]"
