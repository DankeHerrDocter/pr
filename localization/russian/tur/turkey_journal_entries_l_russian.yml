 armenian_massacre_issue: "Кровавые годы"
 armenian_massacre_issue_reason: "[GetCulture('armenian').GetName], живущие по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], давно сталкиваются с враждебностью #tooltippable_name #tooltip:[GetCulture('turkish').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('turkish').GetCustom('RU_CUL_ADJ')]ого#!#! населения. После недавних беспорядков эта вражда лишь усиливается в #B напряженной атмосфере внутри империи#!.\n\nЭто не просто вражда между двумя народами. В #V имперском правительстве#! группа высших чиновников во главе с #yellow [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.GetFirstName]-пашой#! разжигает #R антиармянские настроения#! и пытается мобилизовать армию, лоббируя других членов #G #L Порты#!#! для организации #V масштабного геноцида#!. Если мы не #B примем меры вовремя#!, это почти #B наверняка произойдет#!."
 armenian_massacre_issue_on_complete_tt: "Мы издадим указ, строго запрещающий любое истребление и дискриминацию #tooltippable_name GetCulture('armenian').GetCustom('RU_CUL_ADJ')]ого#! народа."
 armenian_massacre_issue_on_fail_tt: "Высокая Порта примет решительные меры, чтобы #R истребить#! #tooltippable_name GetCulture('armenian').GetCustom('RU_CUL_ADJ')]ий#! народ в империи, насколько это возможно."
 armenian_massacre_issue_fail_tt: "#R Антиармянские настроения#! достигли 120"
 anti_armenian_massacre_issue_progress_bar: "#R #B Антиармянские настроения#!#!"
 anti_armenian_massacre_issue_progress_bar_desc: "#R Антиармянские настроения#!: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/120)"
 anti_armenian_massacre_issue_progress_bar_1_tt: "Недавняя резня или конфликт с армянами"
 armenian_massacre_issue_possible_tt: "Недавно вспыхнул культурный конфликт против армян"
 increase_armenian_massacre_3_months_tt: "#R Антиармянские настроения#! будут #R расти на 2#! ежемесячно в течение #V 3 месяцев#!."
 increase_armenian_massacre_6_months_tt: "#R Антиармянские настроения#! будут #R расти на 2#! ежемесячно в течение #V 12 месяцев#!."
