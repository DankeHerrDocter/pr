 tur_sublime_porte: "Блистательная Порта"
 tur_sublime_porte_reason: "#B #G [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] Османской империи, халиф ислама, Тень Аллаха на земле, Хранитель Святынь, император двух морей и двух континентов, султан турок и мусульман, римский цезарь, Его Величество [ROOT.GetCountry.GetRuler.GetFullName] #V — нынешний монарх#!.#!#!\n\nКак самый известный титул #V имперского правительства#!, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Высокая Порта#! изначально означала ворота во внешний двор #B дворца Топкапы#!. Это название происходит от древнего обычая монархов объявлять официальные решения и приговоры у ворот дворца; [ROOT.GetCountry.GetName] следовала этому обычаю со времен [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а #V Орхана I#!. Однако в XVIII веке на #B улице Алемдар к западу от дворца Топкапы#! был построен величественный дворец, ставший резиденцией #yellow Великого визиря#! и многих министерств, который с тех пор заменил дворцовый двор и стал называться #G #B «Высокой Портой»#!#!.\n\nСо #B сменой эпох и ростом административных дел#! #G #B Порта#!#! превратилась в #V сложную и совершенную бюрократическую систему#!. #v $bureaucrats$#! и #v $aristocrats$#! имперского правительства координируют здесь #O финансы, военные дела и законодательство#!, преобразуя волю [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а в конкретные [Concept('concept_law', 'законы')] и [Concept('concept_decree', 'указы')]. Она не только вобрала в себя лучших чиновников и советников империи, но и #B поддерживала работу государственной машины#! в ходе бесчисленных внутренних и внешних кризисов, позволяя [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] #B сохранять единство и порядок#! на своих обширных территориях.\n\nОднако #G #B Порта#!#! также часто означает интриги, борьбу и предательство при дворе. Если [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] не сможет продемонстрировать Порте свой #V высший авторитет#! и #V железную руку#!, заговоры двора и города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] в любой момент могут сбросить его с трона [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а."
