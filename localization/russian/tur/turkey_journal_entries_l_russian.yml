 great_ottomanism: "Союз наций"
 great_ottomanism_reason: "До нынешнего столетия обширная [ROOT.GetCountry.GetName] была разделена на множество #B обособленных общин#!: [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] правил ими, но большинство регионов жили по своим [Concept('concept_law', 'законам')] и исповедовали свою [Concept('concept_religion', 'религию')].\n\nИ хотя когда-то это способствовало успеху #B имперских завоеваний#!, с подъемом в Европе концепции #V национального государства#!, основанного на #B общей идентичности#!, а также с проникновением европейских #O идей#! и ростом влияния европейских [Concept('concept_great_power', 'великих держав')] на [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], растущая угроза #R [Concept('concept_national_awakening', 'национального пробуждения')]#! толкает #B имперские владения к распаду#!.\n\nЧтобы вновь сплотить [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName], вдохновленные теориями #V Джона Локка, Монтескье и Руссо#!, а также #V Американской#! и #V Французской революциями#!, стремятся утвердить равенство между #G миллетами#!. Они призывают принять все народы империи независимо от [Concept('concept_religion', 'вероисповедания')]#o #!, утвердить принцип #V равенства перед [Concept('concept_law', 'законом')]#! и объединить граждан общими #O традициями#! и [Concept('concept_law', 'законами')]. Их конечная цель — сплотить империю в #B единый союз, где все будут считаться равноправными #yellow #tooltippable_name #tooltip:[GetCulture('rumeli_turkish').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('rumeli_turkish').GetCustom('RU_CUL_ADJ')]ими#!#! людьми#!."
 mesopotamia_management_possible_1_tt: "Не провалена и не просрочена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Кровавые годы»#!"
