 ottoman_constitutional_era_1_button_desc: "Как власть падишаха может быть ограничена какой-то бессмысленной конституцией? Пусть говорят мечи."
 ottoman_constitutional_era_1_button_enable_tt: "Действие конституции ещё не приостановлено"
 ottoman_constitutional_era_1_button_possible_tt: "#U Влияние парламента#! не менее 300"
 ottoman_constitutional_era_1_button_effect_tt: "[Concept('concept_ruler','$RULER_TITLE_PADISAH$')] силой распустит парламент и приостановит действие конституции, установив личную диктатуру.\nЭто может #V значительно#! увеличить #G Авторитет двора#! в будущем, но также может привести к #V резкому росту#! #U Влияния парламента#!.\nПока действие конституции приостановлено, рост #U Влияния парламента#! будет остановлен.\nПримечание: это не означает отмену конституции, поэтому #U Влияние парламента#! всё ещё может восстановиться в будущем."
