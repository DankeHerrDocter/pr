 #劫掠日志
 ottoman_corsairs: "Средиземноморские пираты"
 ottoman_corsairs_reason: "Казалось, что #B Берберийские войны, бомбардировка Алжира и французская оккупация#! навсегда покончили с угрозой, но сегодня #R пиратство в Средиземном море#! возрождается. Корсары из #yellow Северной Африки#! и #yellow Анатолии#! терроризируют побережья #V Средиземноморья#!, нападая на торговые суда и нанося ущерб [Concept('concept_trade', 'торговле')] всех стран.\n\n@information!Пока #V $ottoman_corsairs$#! контролирует #V ключевые порты#! в #V Средиземном море#!, #B набеги будут продолжаться#!. Если же она отменит закон «[GetLawType('law_slave_trade').GetName]», пиратский кризис завершится."
 ottoman_corsairs_possible_1_tt: "$dyn_c_ottoman_empire$ завершила [Concept('concept_journal_entry', 'запись в дневнике')] #V $caliph_and_ummah$#!"
 ottoman_corsairs_possible_2_tt: "$dyn_c_ottoman_empire$ завершила [Concept('concept_journal_entry', 'запись в дневнике')] #V $rebuild_muslism_slavery$#!"
 ottoman_corsairs_possible_3_tt: "#yellow Магриб#! существует"
 status_ottoman_corsairs_active: "Пираты совершают набеги"
 status_ottoman_corsairs_inactive: "Пираты бездействуют"
 status_ottoman_corsairs_banned: "Средиземноморские пираты уничтожены в ходе Берберийских войн США, британской бомбардировки Алжира и французской оккупации"
 event_tur_93_a_tt: "Нам будет разрешено грабить население и богатства средиземноморских провинций через [Concept('concept_journal_entry', 'запись в дневнике')] #V $ottoman_corsairs$#!, но это принесет дурную славу.\nВо время набегов пираты будут случайно грабить иностранные торговые суда в Средиземном море, принося нам золото и вредя чужой торговле.\nЕсли [GetLawType('law_slave_trade').GetName|l] будет отменена или мы потеряем ключевые пиратские порты, рейды придется прекратить."
 event_tur_93_b_tt: "Пока [SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting] пираты находятся в фазе #V набегов#!, они могут ограбить любую средиземноморскую провинцию, нанося ущерб. Они также могут нападать на наши торговые суда в Средиземном море.\nЧтобы набеги прекратились, [GetLawType('law_slave_trade').GetName|l] в [SCOPE.sCountry('corsairs_scope').GetAltName('RU_CL_PP')] должна быть отменена или мы должны захватить их ключевые пиратские порты."
