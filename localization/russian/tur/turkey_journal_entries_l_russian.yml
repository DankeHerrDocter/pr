 tur_sublime_porte_1_button: "Созвать конференцию Высокой Порты"
 tur_sublime_porte_1_button_desc: "Имперский совет при Порте — отличное место для падишаха, чтобы оказать влияние на Порту и править империей. Падишах должен созвать чиновников Порты во дворце Топкапы и выслушать их мнения."
 tur_sublime_porte_1_button_effect_tt: "Падишах созовет конференцию Высокой Порты и определит политику на ближайшие несколько лет.\nВ зависимости от направленности конференции может вырасти [concept_sublime_court_dissatisfaction], но также вырастет [concept_sublime_porte_authority]."
 tur_sublime_porte_2_button: "Сместить Великого визиря"
 tur_sublime_porte_2_button_desc: "Хотя великий визирь и является премьер-министром империи, истинная власть назначать и смещать его принадлежит падишаху. Если нынешний визирь кажется падишаху некомпетентным, результат очевиден..."
 tur_sublime_porte_2_button_effect_tt: "Падишах издаст указ о смещении нынешнего Великого визиря и выберет преемника, который более востребован.\nВ зависимости от выбора нового Великого визиря может вырасти [concept_sublime_porte_authority]."
 tur_sublime_porte_3_button: "Назначить нового наследника"
 tur_sublime_porte_3_button_desc: "Как хозяин османского гарема, падишах, естественно, имеет множество достойных наследников, некоторые из которых проявляют потенциал правителей. Давайте хотя бы номинально определим следующего падишаха."
 tur_sublime_porte_3_button_effect_tt: "Падишах созовет всех подданных и провозгласит нового принца нашим наследником."
 tur_sublime_porte_3_button_possible_tt: "У наследника нет [Concept('concept_character_trait', 'черты характера')] [GetCharacterTrait('special_prince_governor').GetName]"
 tur_sublime_porte_4_button: "Назначить пашу-меченосца"
 tur_sublime_porte_4_button_desc: "Силахдар-паша — верховный главнокомандующий имперской армией, и право его назначения, естественно, принадлежит Его Величеству. Падишаху нужен верный и надежный паша, а нынешний, похоже, не соответствует этому критерию?"
 tur_sublime_porte_4_button_effect_tt: "Падишах сместит нынешнего пашу-меченосца из [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetAltNameNoFlag('RU_CL_RP')] и найдет ему замену.\nВ зависимости от выбора нового паши может снизиться [concept_sublime_court_dissatisfaction]."
 tur_sublime_porte_5_button: "Призвать к джихаду"
 tur_sublime_porte_5_button_desc: "Империя — бесспорный лидер исламского мира, а Его Величество падишах — законный халиф всех мусульман. Как гази, ни один мусульманин не может уклониться от священного долга борьбы с неверными. Призовем же страны исламского мира к этому великому джихаду!"
 tur_sublime_porte_5_button_effect_tt: "Падишах в качестве Халифа издаст указ о джихаде всему исламскому миру, мобилизуя всех мусульман на войну с врагами-язычниками."
 tur_sublime_porte_6_button: "Раздать дворцовые награды"
 tur_sublime_porte_6_button_desc: "Тень мятежа нависла над Портой. Падишах должен принять меры, чтобы хотя бы переманить или обеспечить лояльность некоторых подданных."
 tur_sublime_porte_6_button_effect_tt: "Падишах выберет группу интересов и одарит её высокопоставленных представителей финансовыми наградами и титулами.\nЭто поможет снизить [concept_sublime_court_dissatisfaction]."
