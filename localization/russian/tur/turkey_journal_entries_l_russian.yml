 great_ottomanism_goal: "Успешное сохранение контроля над балканскими территориями, а также действие [concept_law] [GetLawType('law_multicultural').GetName] и [GetLawType('law_total_separation').GetName] более 10 лет"
 great_ottomanism_1_button: "Реформа #tooltippable_name #tooltip:[GetCulture('bulgarian').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('bulgarian').GetCustom('RU_CUL_ADJ')]ого#!#! миллета"
 great_ottomanism_1_button_desc: "Светские институты и политика должны сменить религиозную структуру системы миллетов. Мы обеспечим равенство в начальном образовании, призыве, налогообложении и на государственной службе, отменим привилегии мусульман и конституционно закрепим гражданское равноправие и автономию #tooltippable_name #tooltip:[GetCulture('bulgarian').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('bulgarian').GetCustom('RU_CUL_ADJ')]ого#!#! народа."
