 #共和/立宪的改革日志
 liberalism_of_turkey: "Турецкий секуляризм"
 liberalism_of_turkey_reason: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] проводит в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] серию далеко идущих #B политических, социальных, культурных и религиозных реформ#!. Цель этих мер по #V секуляризации и демократизации#! — продвижение #B #blue либерализма#!#!.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] стремится усилить в нашем обществе роль [Concept('concept_government', 'правительства')] в #B регулировании частной экономики, запретить религиозное вмешательство в государственные дела, а также утвердить дух верховенства закона, народного суверенитета и гражданской добродетели#!. Эти идеалы должны стать #V ключевыми ценностями#! для #B светской, демократической, независимой, сильной и свободной#! #yellow [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!.\n\n#yellow Секулярная повестка#! [ROOT.GetCountry.GetRuler.GetFirstName]:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_1_checkbox')] Принят [concept_law] «[GetLawType('law_universal_suffrage').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_2_checkbox')] Принят [concept_law] «[GetLawType('law_womens_suffrage').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_3_checkbox')] Принят [concept_law] «[GetLawType('law_presidential_republic').GetName]» или «[GetLawType('law_parliamentary_republic').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_4_checkbox')] Приняты [concept_law] «[GetLawType('law_right_to_associate').GetName]» и «[GetLawType('law_public_schools').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_5_checkbox')] Принят [concept_law] «[GetLawType('law_protected_speech').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_6_checkbox')] Приняты [concept_law] «[GetLawType('law_interventionism').GetName]» и «[GetLawType('law_total_separation').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_7_checkbox')] [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] не [Concept('concept_powerful', 'могущественны')] и не [Concept('concept_in_government', 'в правительстве')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_8_checkbox')] [Concept('concept_activism', 'Активизм')] всех [Concept('concept_political_movement', 'политических движений')] #B #L культурного большинства#!#! или #B #L культурного меньшинства#!#! #B ниже 50%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_9_checkbox')] [Concept('concept_activism', 'Активизм')] всех [Concept('concept_political_movement', 'политических движений')] #B #L религиозного большинства#!#! или #B #L религиозного меньшинства#!#! #B ниже 25%#!"
