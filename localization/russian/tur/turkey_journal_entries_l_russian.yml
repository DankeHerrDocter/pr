 #泛伊斯兰
 caliph_and_ummah: "Халиф и Умма"
 caliph_and_ummah_reason: "Волна #V национализма#! #R разрывает нашу страну#!: [ROOT.GetCountry.GetName] должна обрести узы более глубокие, чем кровь и язык, — и нет ничего надежнее нашей общей веры, #G [GetReligion('sunni').GetCustom('RU_RL_RP')]#!.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] — не просто правитель [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], но #B Тень Аллаха на земле, [Concept('concept_ruler','$RULER_TITLE_CALIPH$')] исламского мира#!. Эта власть не ограничивается границами [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], а простирается на всю #G умму#!: в любом уголке мира, где исповедуют #G [GetReligion('sunni').GetName]#!, признают верховный авторитет [Concept('concept_ruler', '$RULER_TITLE_CALIPH$')]а.\n\nМы должны укрепить #yellow религиозное образование#!, поддержать #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_VP')]#! и восстановить роль священного #yellow шариата#! в общественной жизни. Только так мы победим так называемую #O язву современности#! и угрозу #O [Concept('concept_great_power', 'великих держав')] Европы#!, воссоздав #b политическое единство, основанное на вере#!."
 caliph_and_ummah_complete_tt: "Сохранять [Concept('concept_law', 'законы')] [GetLawType('law_state_religion').GetName|l] и [GetLawType('law_autocracy').GetName|l] не менее 5 лет."
 caliph_and_ummah_possible: "#I Османский Халифат#! потерпел неудачу в [Concept('concept_journal_entry', 'записи в дневнике')] #V Союз наций#!"
 caliph_and_ummah_complete_1_tt: "Провал или истечение времени в [Concept('concept_journal_entry', 'записи в дневнике')] #V Кровавые годы#!"
 caliph_and_ummah_status: "Объединить исламский мир под знаменем [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]"
 caliph_and_ummah_filter_tt: "Выполняется одно из следующих условий:\n•[concept_strategic_region] — Ближний Восток\n•[concept_strategic_region] — Аравия\n•[concept_strategic_region] — Нил\n•[concept_strategic_region] — Большая Персия"
 event_tur_65_a_tt: "Первичный титул нашего [Concept('concept_ruler', 'правителя')] изменится на [Concept('concept_ruler', '$RULER_TITLE_CALIPH$')], а титул [Concept('concept_heir', 'наследника')] — на [Concept('concept_ruler', '$RULER_TITLE_SHARIF$')].\nМы отправим приглашения на Всемирный исламский конгресс всем [GetReligion('sunni').GetCustom('RU_RL_DP')] странам мира. Согласившиеся станут членами нашего блока, а наиболее дружественные могут присягнуть нам на верность и стать субъектами."
 rebuild_muslism_slavery: "Возрождение исламской работорговли"
 rebuild_muslism_slavery_reason: "Упадок [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] по сути вызван отказом от #B священного порядка предков#!: мир — это сад, орошаемый властью [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а; страж этой власти — шариат, он же — политика, скрепляющая государство. А [GetLawType('law_slave_trade').GetName|l] — это #V священный институт, одобренный шариатом#!.\n\nВ прошлом под давлением [Concept('concept_great_power', 'великих держав')] Европы, [GetLawType('law_slave_trade').GetName|l] была отменена, и священный [concept_law] был нарушен, а #B милость Аллаха утрачена#!. [ROOT.GetCountry.GetName] должна восстановить этот #V древний и праведный [concept_law]#!, чтобы империя #B вновь обрела божественное покровительство#!."
 rebuild_muslism_slavery_complete_tt: "Сохранять [GetLawType('law_slave_trade').GetName|l] или [GetLawType('law_debt_slavery').GetName|l] не менее 1 года."
 event_tur_69_a_tt: "Нам будет предъявлено требование восстановить [GetLawType('law_debt_slavery').GetName|l] в течение 5 лет."
 event_tur_69_b_tt: "Нам будет предъявлено требование восстановить [GetLawType('law_slave_trade').GetName|l] в течение 5 лет."
 caliph_and_ummah_fail_var_tt: "[Concept('concept_journal_entry', 'Запись в дневнике')] #V «Халиф и Умма»#! провалена, истекла или стала недействительной"
 rebuild_janissary: "Возрождение янычар"
 rebuild_janissary_reason: "С тех пор как в #v 1826 году#! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Махмуд II#! упразднил корпус #G янычар#!, #yellow военная система#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] всё больше подражала Европе. Однако так называемая «профессионализация» #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetCustom('RU_IG_RP')]#!#! не решила проблему #b вмешательства армии в политику#!, а лишь породила касту #v @officers! офицеров#!, мнящих себя авангардом реформ. Эти предатели, #V отравленные зловредными западными идеями#!, более не верны #B помазаннику Аллаха, Его Величеству [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!, а смеют судить о священном порядке империи.\n\nНесомненно, решение об #V упразднении янычар#! было ошибкой. Мы должны исправить её и вернуть великих #G янычар#! в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]."
 rebuild_janissary_complete_tt: "Сохранять [GetLawType('law_peasant_levies').GetName|l] не менее 1 года."
 #阿拉伯大起义
 the_unruly_arabs: "Непокорная Аравия"
 the_unruly_arabs_reason: "В регионе [GetStrategicRegion('region_arabia').GetName] баланс, державшийся на племенной структуре и религиозном авторитете, рушится под натиском #L #R национализма#!#!. С распространением #O арабского языка#!, литературы и чуждых идеологий в пустынях под властью [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')] зреют идеи сопротивления [Concept('concept_culture', 'турецкому')] правлению.\n\nПолучившие западное образование [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] и местные [GetInterestGroupVariant('ig_devout',GetPlayer).GetName], ненавидящие османское иго, при поддержке #O иностранных [Concept('concept_great_power', 'великих держав')]#!, враждебных [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_DP')], объединяются, чтобы подстрекать #tooltippable_name #tooltip:[GetCulture('bedouin').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('bedouin').GetCustom('RU_CUL_ADJ')]ое#!#! население к вооружённому свержению [Concept('concept_culture', 'турецкой')] власти в регионе [GetStrategicRegion('region_arabia').GetName].\n\nХотя ситуация ещё не вышла из-под контроля #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Высокой Порты#!, #B сепаратизм и дипломатический кризис#! уже нельзя игнорировать. Земли, веками жившие по имперским законам, охвачены #V невиданным брожением#!. Куда повернёт судьба пустыни?\n\n@information!Во время действия записи #V «$the_unruly_arabs$»#! страны региона [GetStrategicRegion('region_arabia').GetName] будут предпринимать шаги против власти [SCOPE.sCountry('TUR_scope').GetAltNameNoFlag('RU_CL_RP')], вплоть до требования независимости и поиска поддержки у других [Concept('concept_great_power', 'великих держав')]."
