 ottoman_autocratic_rule: "Просвещённый абсолютизм [ROOT.GetCountry.GetRuler.GetFirstName]"
 ottoman_autocratic_rule_reason: "После приостановки конституции деспотический двор во главе с [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] вновь взял власть в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]. Программа [ROOT.GetCountry.GetRuler.GetFirstName], исповедующего #yellow исламизм#! и принципы [GetLawType('law_autocracy').GetName|l], направлена на ослабление власти #B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt имперского правительства#!#! через #V милостивое самодержавие#!, укрепление правления [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а, поддержание авторитета #I ислама#! и #O халифа#!, подавление сепаратизма и продолжение #B централизации и модернизации#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\n#V Программа просвещенного абсолютизма#! [SCOPE.sCharacter('autocratic_ruler').GetFullName]:\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_1_checkbox')] Приняты [concept_law] [GetLawType('law_autocracy').GetName|l] и [GetLawType('law_outlawed_dissent').GetName|l]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_2_checkbox')] Приняты [concept_law] [GetLawType('law_appointed_bureaucrats').GetName|l] и [GetLawType('law_secret_police').GetName|l]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_3_checkbox')] [Concept('concept_political_movement_support', 'Поддержка')] всех #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt либеральных#! или #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt социалистических#! [Concept('concept_political_movement', 'политических движений')] #B не выше 5%#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_4_checkbox')] [concept_activism] всех #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt либеральных#! или #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt социалистических#! [Concept('concept_political_movement', 'политических движений')] #B не выше 25%#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_5_checkbox')] Завершены [Concept('concept_journal_entry', 'записи')] #V «Багдадская железная дорога»#! и #V «Хиджазская железная дорога»#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_6_checkbox')] Завершены [Concept('concept_journal_entry', 'записи')] #V «Возрождение Константинополя»#!, #V «Индустриализация Анатолии»#! и #V «Урбанизация Румелии»#!.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_8_checkbox')] [concept_rank] не ниже [Concept('concept_great_power', 'великой державы')].\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_9_checkbox')] #B ВВП#! не менее 300 млн.\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_10_checkbox')] Владеет всеми [Concept('concept_homeland', 'родинами')] #tooltippable_name #tooltip:[GetCulture('turkish').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('turkish').GetCustom('RU_CUL_ADJ')]ой#!#! и #tooltippable_name #tooltip:[GetCulture('mashriqi').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('mashriqi').GetCustom('RU_CUL_ADJ')]ой#!#! [Concept('concept_culture', 'культур')] (кроме #yellow Арабистана#! и #yellow Карса#!), и недавно не проигрывала в [Concept('concept_war', 'войне')]."
