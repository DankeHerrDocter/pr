l_russian:
 peter_the_great_of_turkey: "Турецкий Петр Великий"
 peter_the_great_of_turkey_reason: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] стал #tooltippable_name [Concept('concept_ruler','$RULER_TITLE_PADISAH$')]ом#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в #V 1808 году#! и с тех пор провёл несколько реформ, чтобы спасти империю от упадка. После #V Счастливого события 1826 года#! он расправился с мятежными янычарами и упразднил #O янычарский корпус#!; в 1827 году он построил крупнейший в мире #O линейный корабль#! «#yellow Махмудие#!», возродив имперский [concept_fleet]; в 1830 году он упразднил давно устаревшую #B систему тимаров и зеаметов#!; в 1834 году он лишил власти местных #O наследственных правителей (деребеев)#!, которые в каждой провинции империи #B провозгласили себя маленькими царями.#!\n\nОднако здоровье [ROOT.GetCountry.GetRuler.GetFullName] оставляет желать лучшего: полагают, что он болен #V чахоткой#!. С возвышением #tooltippable_name [SCOPE.sCountry('EGY_scope').GetAdjective]ого#! [Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')] #yellow Мухаммеда Али#! и #R потерей Сирии#!, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] решил в последние годы своей жизни продолжить реформирование отсталой политической и военной системы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] по образцу западноевропейских [Concept('concept_great_power', 'великих держав')]. Это требует от нас активных политических мер и сближения с западноевропейскими [Concept('concept_great_power', 'великими державами')], чтобы получить от них больше поддержки.\n\n#yellow Программа реформ [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а:#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_1_checkbox')]Принят [concept_law] «[GetLawType('law_appointed_bureaucrats').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_2_checkbox')]Является #O ведущим производителем#! [SCOPE.sGoods('tobacco_scope').GetCustom('RU_GL_RP')]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_3_checkbox')]#O Размер#! [Concept('concept_army', 'армии')] #B не менее 200#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_4_checkbox')]#O Размер#! [Concept('concept_fleet', 'флота')] #B не менее 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_5_checkbox')]Принят [concept_law] «[GetLawType('law_professional_army').GetName]»\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_6_checkbox')][concept_relations] с [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_TP')] #G не менее 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_7_checkbox')][concept_relations] с [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_TP')] #G не менее 50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_8_checkbox')]Получена [concept_military_assistance] от [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] или [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')].\n\nЕсли мы сможем выполнить как можно больше пунктов программы реформ до кончины #tooltippable_name [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#! [ROOT.GetCountry.GetRuler.GetFirstName], авторитет Высокой Порты, когда на престол взойдет [Concept('concept_heir','$RULER_TITLE_SEHZADE$')] [ROOT.GetCountry.GetHeir.GetFirstName] будет выше, а сопротивление реформам — меньше."
 peter_the_great_of_turkey_status: "#B Продолжать грандиозные реформы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а#!"
 peter_the_great_of_turkey_complete_tt: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] скончался"
 edict_of_gulhane_event_1_tt: "Его считают турецким Петром Великим, вдохнувшим новую жизнь в империю."
 edict_of_gulhane_event_2_tt: "Его считают противоречивым реформатором, который с невиданной решимостью бросил вызов разложению."
 edict_of_gulhane_event_3_tt: "Его считают могильщиком старого режима и основателем новой эры; его имя связывает упадок и возрождение."
 edict_of_gulhane_event_4_tt: "Его считают мятежным султаном, который пытался спасти свою империю, но Аллах не даровал ему успеха."
 peter_the_great_of_turkey_button: "Нанять британского эксперта"
 peter_the_great_of_turkey_button_desc: "Согласно диагнозу лучших врачей нашего двора, у Падишаха, говоря по-западному, туберкулез. У нас нет лекарства от этого, но, возможно, мы сможем заплатить #yellow Великобритании#!, самой технически развитой стране, чтобы нанять ведущих ученых Королевского медицинского общества, которые смогут хотя бы облегчить состояние Падишаха."
 peter_the_great_of_turkey_button_possible_tt: "Состояние Падишаха заметно ухудшилось (прогресс не менее 15)"
 peter_the_great_of_turkey_button_effect_tt: "Мы свяжемся с британской стороной и пригласим экспертов из Королевского медицинского общества во дворец Топкапы для консультации Падишаха.\nОжидается, что это эффективно замедлит развитие болезни, но не сможет полностью её излечить."
 #坦齐马特
 tanzimat_main: "Реформы Танзимата"
 tanzimat_main_reason: "Хотя в #G классическую эпоху#! [ROOT.GetCountry.GetName] переживала расцвет, после окончания #yellow Эпохи тюльпанов#! в #V XVIII веке#! страна погрузилась в хаос: #B территория империи неуклонно сокращалась, а ее мощь таяла по сравнению с европейскими [Concept('concept_great_power', 'великими державами')]#!. С распространением новых технологий и идей в Европе отставание империи от европейских [Concept('concept_great_power', 'великих держав')] лишь растет. Несмотря на многочисленные реформы [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а #yellow Махмуда II#!, призванные остановить упадок, на фоне стремительно меняющейся Европы они кажутся #B недостаточными#!.\n\nЧтобы переломить ход медленного угасания империи, мы должны провести #V радикальные реформы#! всех государственных функций: #O законодательства#!, #O торговой политики#!, #B секуляризации и кодификации#! системы [Concept('concept_law', 'законов')], борьбы с [GetLawType('law_slave_trade').GetName|l], #O образования, права собственности, правоохранительных органов и армии#!. Некоторые институты требуют полной реорганизации, другие — #B создания Портой с нуля#!.\n\nУчреждая новые институты и распространяя блага эффективного управления на все #O провинции#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], #yellow [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFirstName]-паша#! верит, что империя сможет создать более #G централизованное и современное#! [concept_government], повысить [concept_legitimacy] правления [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], #V восстановить ее престиж среди [Concept('concept_great_power', 'великих держав')] и даже вернуть былую славу#!."
 tanzimat_main_possible_tt: "Падишах #yellow Махмуд II#! скончался, и был издан Гюльханейский хатт-и-шериф."
 tanzimat_main_status: "#U #B Завершить модернизацию и возрождение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!#!"
 tanzimat_main_complete_tt: "Завершено 7 записей в дневнике #V Танзимат#!"
 tanzimat_main_1_button: "Издать императорский указ о реформах"
 tanzimat_main_1_button_desc: "Меры по реформированию, принятые до сих пор, недостаточны для удовлетворения текущих потребностей империи. Падишах должен подписать указ, основанный на проекте реформ Великого визиря, чтобы способствовать религиозному равенству в империи, завоевать доверие христианских держав и смягчить наши внутренние конфликты."
 tanzimat_main_1_button_possible_tt: "Завершено не менее 3 записей в дневнике #V Танзимат#!"
 tanzimat_main_1_button_visible_tt: "Указ о реформах ещё не издан"
 tanzimat_main_advance: "Продвинуть прогресс #V Танзимата#! на 1"
 tanzimat_religious_modernization: "Танзимат: Свобода вероисповедания"
 tanzimat_religious_modernization_reason: "Система [Concept('concept_law', 'законов')], основанная на #I шариате#!, устарела: с ростом #yellow национализма#! недовольство [Concept('concept_pop', 'населения')], не исповедующего #G [GetReligion('sunni').GetName]#!, особенно со стороны #O христиан#! Балкан, подрывает [concept_legitimacy] правления [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nДля воссоздания единого #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ого#! государства необходимо отменить привилегии и неравенство, основанные на [Concept('concept_religion', 'религиозной')] [Concept('concept_discrimination', 'дискриминации')]. Мы должны сформировать новое понимание #B справедливости и равенства#! в [Concept('concept_law', 'законе')] и [Concept('concept_government', 'правительстве')], устранить противоречия между #O миллетами#! и религиозными группами, определить понятие гражданства и вытекающие из него права — поставив #V гражданство#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и #B верность [ROOT.GetCountry.GetName] превыше всего, а не особую идентичность отдельной общины#!."
 tanzimat_fiscal_modernization: "Танзимат: Финансовая модернизация"
 tanzimat_fiscal_modernization_reason: "Система [Concept('concept_taxes', 'налогообложения')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] архаична и неэффективна: она полагается на местных #v $aristocrats$#! — #V ильтизамов#! — для сбора налогов, что серьезно ограничивает доходы Порты. Эта система усугубляет коррупцию в правительстве и возлагает непосильное бремя на #v @farmers! фермеров#!.\n\nЕсли [ROOT.GetCountry.GetName] хочет конкурировать с европейскими [Concept('concept_great_power', 'великими державами')], Порте необходим аппарат #v @bureaucrats! чиновников#!, способный управлять [Concept('concept_money', 'финансами')] всей страны. Мы должны последовать примеру европейских держав, создав #B независимое министерство финансов и аудиторские службы#!, внедрив #B современную систему бухгалтерского учета#! и #B унифицировав сложные налоги и ставки по всей стране#!, чтобы Порта могла составить #V настоящий долгосрочный бюджет#!."
 tanzimat_centralisation: "Танзимат: Централизация"
 tanzimat_centralisation_reason: "Хотя многие #O деребеи#!, тиранившие провинции, были уничтожены к #V 1820 году#!, власть Порты в провинциях [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] остается #b весьма шаткой#!. После #V второго сербского восстания 1815 года#! и #V греческого восстания 1828 года#! [ROOT.GetCountry.GetName] потеряла #O Пелопоннес#! и #O Северную Сербию#!, которыми правила сотни лет, что еще больше пошатнуло авторитет города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName].\n\nМы не можем позволить #R сепаратистам#! и #R местной автономии#! расколоть империю: старая система управления не отвечает требованиям времени. Мы должны провести #B полную реорганизацию#!, создав #V современную систему @bureaucrats! чиновников#!, где министерства заменят диван, а государственное управление провинциями придет на смену частной власти #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!. Необходимо четко определить их обязанности, чтобы лучше служить каждой провинции [ROOT.GetCountry.GetAltNameNoFlag(RU_CL_RP)]."
 tanzimat_centralisation_goal: "Следующие условия должны выполняться в течение 5 лет:"
 tanzimat_centralisation_complete_tt: "Завершена [concept_journal_entry] #V Финансовая модернизация#!"
 tanzimat_centralisation_complete_2_tt: "Завершена [Concept('concept_journal_entry', 'запись в дневнике')] #V «Провинциальная реформа Сирии»#!"
 tanzimat_military_modernization: "Танзимат: Военная реформа"
 tanzimat_military_modernization_reason: "Традиционные [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — #O янычары#! — утратили боевой престиж и были упразднены [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом #yellow Махмудом II#! во время #v «Счастливого события» 1826 года#!, уступив место нынешней армии #O Мансура#!. Однако перед лицом военной угрозы со стороны европейских [Concept('concept_great_power', 'великих держав')] этой армии явно недостаточно для защиты нашего суверенитета.\n\nМы должны создать армию, основанную на дисциплине и муштре, нанять лучших #v @officers! офицеров#! из Европы и обучить новобранцев по европейским тактическим стандартам. Нам также необходимо создать учреждения для изучения #O военных#! [Concept('concept_technology', 'технологий')] и #o тактики#!, наладить #B единое командование, логистику и снабжение#! — несомненно, это будет #V трудной и долгой задачей#!."
 tanzimat_reform_education: "Танзимат: Секуляризация образования"
 tanzimat_reform_education_reason: "В [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] лишь немногие обладают #v базовой грамотностью#!. Если мы хотим продолжить реформы, необходима #b полная перестройка общественной жизни#! #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ого#! народа.\n\nНам нужно #b стандартизировать и модернизировать систему образования империи#!, создать собственные #v государственные школы#! и поощрять граждан поступать в них, распространяя #yellow начальное образование#! для детей и юношества. Также необходимо открыть собственные #yellow высшие учебные заведения#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], чтобы воспитать своих академических и богословских #v @academics! учёных#!."
 tanzimat_reform_education_goal: "Увеличить [concept_literacy] в нашей стране на 20%"
 tanzimat_economic_modernization: "Танзимат: Урбанизация"
 tanzimat_economic_modernization_reason: "В нашу эпоху #V промышленность и города#! — источник силы и процветания [Concept('concept_country', 'страны')]. Однако пока страны Европы стремительно индустриализируются, [ROOT.GetCountry.GetName] отстает из-за множества институциональных и структурных ограничений.\n\n[ROOT.GetCountry.GetName] нуждается в унификации #B тарифов и коммерческого права#!, внедрении европейской системы [Concept('concept_company', 'компаний')]#O #! и #O экономического регулирования#!. Необходимо #B законодательно защитить частную собственность#!, поощрять #B новых инвесторов#!, обеспечить #V достаточную защиту#! местным ремесленникам и производителям, способствовать процветанию #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ого#! #V [Concept('concept_market', 'рынка')]#!, чтобы преодолеть экономическую отсталость и #B встать на путь индустриализации#!."
 tanzimat_economic_modernization_state_tt: "Это [concept_incorporated_state]"
 tanzimat_build_railways: "Танзимат: Строительство железных дорог"
 tanzimat_build_railways_reason: "Территория [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] огромна, а география #B сложна и разнообразна#!, что создает #V огромные трудности#! для управления и коммуникации. Во многих отдаленных [Concept('concept_state_region', 'регионах')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], отделенных #B огромными расстояниями и горами#!, приказы из города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] не могут быть эффективно переданы и исполнены.\n\nОднако изобретение #O железных дорог#! ([Concept('concept_technology', 'технология')]) открывает перед нами возможности: если мы сможем покрыть империю сетью надежных #O железных дорог#!, #B ни #V административное управление#!, ни #V переброска войск#! больше не будут проблемой#!."
 failed_sick_man_main_tt: "Не удалось завершить [concept_journal_entry] #V Реформы Танзимата#! или #V Танзимат: Централизация#!"
 #帝国兵工厂
 ottoman_imperial_arsenal: "Имперский арсенал в Галате"
 ottoman_imperial_arsenal_reason: "#yellow Имперский арсенал#! в #O Галате и Топхане#!, построенный [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом #B #G Мехмедом II Завоевателем#!#!, многие годы служил для отливки пушек. Артиллерия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] развивалась именно здесь, внеся огромный вклад в возвышение [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Расширяемый сменявшими друг друга [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ами, он долгое время оставался #B важнейшим военно-промышленным учреждением#! империи.\n\nОднако с #V XVII века#!, столкнувшись с вызовом со стороны европейской #O артиллерии#!, #O военные#! [Concept('concept_technology', 'технологии')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] начали стагнировать, что привело к упадку #yellow Имперского арсенала#!. Устаревшее оборудование и низкая эффективность привели к тому, что внутреннее производство с трудом покрывает потребности [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в вооружении, и мы вынуждены #V импортировать многие ключевые военные материалы#!.\n\nЕсли мы хотим вернуть былую славу #G имперской армии#!, наша главная задача — возродить #B техническое превосходство и мастерство#! прошлого, начав с восстановления древнего #yellow Имперского арсенала#!."
 ottoman_imperial_arsenal_usa_reform_button: "Нанять американских кораблестроителей"
 ottoman_imperial_arsenal_usa_reform_button_desc: "Эксперты по судостроению из Нового Света привезли с собой невиданные ранее концепции — стальную обшивку, гребные винты и паровые двигатели. Офицеры имперского флота относятся к ним с глубоким уважением. Если Топхане и Имперская верфь получат их помощь, верфи Золотого Рога смогут восстановить свои прошлые объемы производства."
 ottoman_imperial_arsenal_fra_reform_button: "Нанять французских артиллерийских инженеров"
 ottoman_imperial_arsenal_fra_reform_button_desc: "Французские артиллерийские школы и арсеналы долгое время считались образцом для европейской военной промышленности. В прошлом мы также многократно сотрудничали с Францией, и при поддержке Франции наша артиллерийская промышленность сможет догнать западные стандарты."
 ottoman_imperial_arsenal_gbr_reform_button: "Нанять британских инженеров-механиков"
 ottoman_imperial_arsenal_gbr_reform_button_desc: "Наши станки и литейное оборудование устарели, а старая система управления не может поддерживать дальнейшее расширение Имперского арсенала. Вдрив британские стандарты, методы управления и механические технологии, Галата возродится."
 #穆赫塔尔
 muhtar_system: "Система мухтаров"
 muhtar_system_reason: "#V Мухтар#!, что означает #B «избранный»#!, — это система местного управления, созданная [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]ом #yellow Махмудом II#! после упразднения ленов #I тимар#! и системы #I деребеев#!. Она подразумевает избрание #V местных старост#! в самых низших административных единицах [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — #G деревнях#!.\n\nДо введения этой системы управление на местах зависело от местных #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_devout',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_devout',GetPlayer).GetCustom('RU_IG_RP')]#!#! и #tooltippable_name #tooltip:[GetInterestGroupVariant('ig_landowners',GetPlayer).GetTooltipTag],EMPTY_STRING,IGTooltip [GetInterestGroupVariant('ig_landowners',GetPlayer).GetCustom('RU_IG_RP')]#!#!, что серьезно снижало эффективность сбора налогов и призыва в армию [Concept('concept_government', 'правительством')]. [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #yellow Махмуд II#! наделил этих избранных народом старейшин статусом имперских чиновников, помогая Порте избавиться от зависимости от #v @aristocrats! аристократов#! и #v @clergymen! священнослужителей#!.\n\nОднако, как новая система, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_1_effect_tt $muhtar_system_old_modifier$#! все еще очень хрупка и часто не оправдывает ожиданий [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Если мы сможем экономически усилить влияние города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] на подвластные [Concept('concept_state', 'области')], #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_2_effect_tt $muhtar_system_new_modifier$#!, вероятно, сыграет гораздо большую роль в административной системе [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 muhtar_system_status: "#B Избираемые на местах мухтары управляют деревнями в провинциях империи#!"
 muhtar_system_on_complete_tt: "Во всех #O областях#! с модификатором #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_1_effect_tt $muhtar_system_old_modifier$#! будет законодательно закреплена система местных деревенских выборов и самоуправления, что приведет к появлению модификатора #tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_2_effect_tt $muhtar_system_new_modifier$#!."
 muhtar_system_modifier_1_effect_tt: "[GetStaticModifier('muhtar_system_old_modifier').GetName|v]\n[GetStaticModifier('muhtar_system_old_modifier').GetDesc]"
 muhtar_system_modifier_2_effect_tt: "[GetStaticModifier('muhtar_system_new_modifier').GetName|v]\n[GetStaticModifier('muhtar_system_new_modifier').GetDesc]"
 #工业化与铁路建设
 baghdad_railway: "Багдадская железная дорога"
 baghdad_railway_reason: "Территория [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] простирается через весь Ближний Восток, но #B огромные расстояния и сложный рельеф#! всегда были препятствием. Между #yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! и #yellow Ираком#! лежат #B Анатолийское плоскогорье и Сирийская пустыня#!; приказы из столицы идут недели, а то и месяцы. Транспорт по-прежнему зависит от #B древних караван-сараев и верблюдов#!, что не только снижает эффективность управления, но и затрудняет военный контроль Порты над регионом.\n\nОднако с модернизацией #yellow Танзимата#! наши новые #v $capitalists$#! и #v $engineers$#! предложили грандиозный план: проложить #B стальную магистраль#! от #V [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! до #V Багдада#! и далее к #V Персидскому заливу#!. Многие чиновники Порты верят, что эта дорога несомненно принесет #G рост торговли#! и #G подъем промышленности#!, а также позволит [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] быстрее перебрасывать войска в отдаленные провинции региона [GetStrategicRegion('region_arabia').GetName], подавляя #R сепаратизм и беспорядки#!."
 baghdad_railway_status: "Построить железнодорожную линию, соединяющую Персидский залив и Средиземное море"
 hejaz_railway: "Хиджазская железная дорога"
 hejaz_railway_reason: "Как #G Хранитель Двух Святынь#!, [ROOT.GetCountry.GetName] под властью [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а не только правит обширными землями региона [GetStrategicRegion('region_arabia').GetName], но и несет ответственность за защиту #yellow священных городов#! #V Мекки#! и #V Медины#!. Однако расстояние между #yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#! и #yellow Святыми местами#! огромно, путь паломников и чиновников занимает месяцы и омрачен угрозой #R набегов племен#!.\n\nС реорганизацией административной системы и укреплением финансов, многие #v $bureaucrats$#! Порты и набожные #v $clergymen$#! предложили проложить #B железнодорожную магистраль#! от #V Дамаска#! прямо до #V Медины#!. Это обеспечит безопасное прибытие паломников, усилит #V прямое управление#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] территориями региона [GetStrategicRegion('region_arabia').GetName], укрепит статус [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а как #V законного халифа#! исламского мира и защитит южные границы империи."
 hejaz_railway_status: "Построить железную дорогу, соединяющую Мекку и Медину с Иерусалимом"
 hejaz_railway_1_button: "Собрать пожертвования с исламского мира"
 hejaz_railway_1_button_desc: "Строительство Хиджазской железной дороги — дело не только одной империи: она послужит каждому благочестивому паломнику. Если исламские страны сохранили веру в Аллаха и уважение к халифу, они должны внести свой вклад."
 hejaz_railway_1_button_possible_tt: "Сбор пожертвований на Хиджазскую железную дорогу ещё не проводился"
 hejaz_railway_1_button_effect_tt: "Падишах от имени Халифа и Хранителя Святых мест обратится к исламскому миру с призывом о пожертвованиях на строительство Хиджазской железной дороги."
 baghdad_railway_fail_tt: "Вражеский [concept_front] достиг города [SCOPE.sState('baghdad_railway_state').GetCityHubName]"
 hejaz_railway_fail_tt: "Вражеский [concept_front] достиг города [SCOPE.sState('hejaz_railway_state').GetCityHubName]"
 anatolia_industrialize: "Индустриализация Анатолии"
 anatolia_industrialize_reason: "Долгое время экономический центр [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] был сосредоточен в #V прибрежных городах#! Средиземноморья и на #V Балканах#!, в то время как обширные внутренние районы #yellow Анатолии#! сохраняли экономику, основанную на #v @peasants! крестьянах#!. #B Гористый рельеф#! и #B плохая транспортная доступность#! затрудняли интеграцию внутренних провинций в имперский [concept_market], мешая эффективному распределению ресурсов и ослабляя потенциал #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ого#! [Concept('concept_market', 'рынка')].\n\nМы должны продвигать #V урбанизацию и индустриализацию#! во внутренних районах #yellow Анатолии#!, развивать #B сеть железных дорог#!, чтобы включить разрозненное местное производство в единую систему [Concept('concept_market', 'рынка')]. Мы превратим эти исконные земли [Concept('concept_culture', 'турецкого')] народа в #V внутреннее ядро#! модернизации [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и нашу собственную #V промышленную базу#!."
 anatolia_industrialize_status: "Индустриализировать основные регионы Анатолии"
 rumeli_industrialize: "Урбанизация Балкан"
 rumeli_industrialize_reason: "Будучи ключевым владением [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европе, Балканы долгое время были одним из самых процветающих, но и #B самых неспокойных рубежей#!. Несмотря на давние торговые традиции, обширные сельские районы по-прежнему заняты #v @peasants! крестьянами#!, работающими в [Concept('concept_subsistence_building', 'натуральных хозяйствах')], и слабо связаны с #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]им#! [Concept('concept_market', 'рынком')].\n\nМы должны способствовать #V росту городов и индустриализации#! на Балканах, поощрять развитие #V промышленности и торговли#! в ключевых городах региона и постепенно интегрировать сельское население в тесную [Concept('concept_market', 'рыночную')] #o сеть#! с центром в городе [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 rumeli_industrialize_status: "Развивать городскую инфраструктуру балканских провинций"
 egypt_industrialize: "Индустриализация Египта"
 egypt_industrialize_reason: "#yellow Дельта Нила#! благодаря плодородным землям и #V выращиванию хлопка#! давно стала важнейшим сельскохозяйственным и экспортным центром [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Однако экономика #yellow дельты Нила#! сильно зависит от производства сырья и внешней торговли. Огромное [concept_wealth] утекает на [concept_world_market] в необработанном виде, не создавая прочной промышленной базы на месте, что ослабляет экономический потенциал Египта.\n\n[ROOT.GetCountry.GetRuler.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] считает, что мы должны продвигать #V урбанизацию и промышленное строительство#! в Египте, развивать текстильную, перерабатывающую и машиностроительную промышленность вдоль Нила. Сырье должно #B перерабатываться на месте#!, укрепляя связи с #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]им#! [Concept('concept_market', 'рынком')]. В конечном итоге #yellow дельта Нила#! превратится в #V новый промышленный регион#!, поддерживающий модернизацию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 egypt_industrialize_status: "Превратить дельту Нила в новый промышленный центр"
 mesopotamia_management: "Освоение Месопотамии"
 mesopotamia_management_reason: "Междуречье #yellow Евфрата#! и #yellow Тигра#!, некогда колыбель #G цивилизации#!, пришло в упадок. Наводнения двух рек сменяют друг друга, оставляя после летнего спада воды обширные #V солончаки#!. Некогда плодородные и густонаселенные земли постепенно #B превращаются в болота и пустоши#!.\n\nМногие правители, владевшие #O Месопотамией#!, пытались управлять этой землей, но так и не смогли создать #B устойчивую и системную ирригацию#!. Однако #V технический прогресс и модернизация#! открывают новые возможности. #tooltippable_name [ROOT.GetCountry.GetAdjectiveNoFormatting]ие#! #v $engineers$#! полагают, что с #V новыми материалами и методами строительства#!, а также при наличии #V достаточных сил и средств#!, мы сможем провести масштабную #G расчистку русел, укрепление дамб и промывку почв#!. Мы восстановим заброшенные [concept_arable_land], и #O Месопотамия#! вновь станет стабильным и надежным #I сельскохозяйственным центром#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], мощным гарантом #V продовольственной безопасности#! региона и всей страны."
 mesopotamia_management_possible_tt: "Завершено не менее 5 записей в дневнике #V Танзимат#!"
 mesopotamia_management_complete_tt: "Завершен проект по освоению Междуречья.\n#bold •Этот проект добавит в общей сложности 2400 ед. [Concept('concept_arable_land', 'пахотных земель')] в 4 наших [Concept('concept_state_region', 'региона')] в Междуречье.#!"
 mesopotamia_management_status: "Работы по освоению будут постоянно добавлять новые [concept_arable_land] в Междуречье; если мы изучим паровые турбины, работа пойдет эффективнее."
 mesopotamia_management_start_button: "Начать работы по управлению"
 mesopotamia_management_start_button_desc: "У правительства теперь достаточно средств для начала великого проекта по управлению Междуречьем. Давайте утвердим этот бюджет и начнем превращать солончаки и пустыни Месопотамии в сельскохозяйственные угодья!"
 mesopotamia_management_start_button_possible_tt: "Работы по управлению еще не завершены (прогресс менее 300)"
 istanbul_industrialize: "Возрождение Костантинийе"
 istanbul_industrialize_reason: "#B #italic «Если бы мир был единым государством, Константинополь непременно стал бы его столицей».#!#!\n\nС тех пор как [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] #G Мехмед II Завоеватель#! взял #yellow Константинополь#!, #G Костантинийе#! был [Concept('concept_capital_state', 'столичной областью')] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] и центром евразийской торговли. Но с #B ростом населения и приходом индустриализации#! #B узкие улочки, переполненные пристани и устаревшая инфраструктура#!, а также #B стены и старый город#!, мешающие расширению, привели к тому, что #G Костантинийе#! больше не отвечает требованиям #V образцовой столицы#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\nМы должны начать полную реконструкцию и расширение #G Костантинийе#!: расширить #V порт и доки#!, спланировать современные #V промышленные зоны и канализацию#!, построить #V железные дороги и эффективные городские кварталы#!. #V Широкие бульвары и опрятные площади#! преобразят облик города, и #G Костантинийе#! вновь станет #B жемчужиной Средиземноморья, Царицей городов, величайшим и самым желанным мегаполисом Европы#!."
 istanbul_industrialize_status: "Вернуть Костантинийе статус мегаполиса, желанного для всего мира"
 #收复领土日志
 ottoman_conqueror_greek: "Возвращение Греции"
 ottoman_conqueror_greek_reason: "#tooltippable_name #tooltip:[GetCulture('greek').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('greek').GetCustom('RU_CUL_ADJ')|U]ое#!#! восстание в #V 1827 году#! увенчалось успехом благодаря военному вмешательству [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] и [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')]. Это вынудило нас признать независимость [SCOPE.sCountry('GRE_scope').GetAltNameNoFlag('RU_CL_RP')] в #V Лондонском протоколе 1830 года#!, в результате чего [ROOT.GetCountry.GetName] потеряла провинции #O Пелопоннес и Южная Греция#!, которыми владела столетиями.\n\nЕсли [ROOT.GetCountry.GetName] хочет восстановить престиж империи на Балканах и в Европе, предатели из [SCOPE.sCountry('GRE_scope').GetAltNameNoFlag('RU_CL_RP')] должны быть уничтожены: только меч [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а заставит #tooltippable_name #tooltip:[GetCulture('greek').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('greek').GetCustom('RU_CUL_ADJ')]их#!#! сепаратистов знать свое место!"
 ottoman_conqueror_greek_fail_tt: "Не удалось завершить [Concept('concept_journal_entry', 'запись в дневнике')] #V «Реформы Танзимата»#! или #V «Танзимат: Централизация»#!"
 ottoman_conqueror_greek_on_complete_1_tt: "Все #yellow греческие провинции#! снова станут [Concept('concept_incorporated_state', 'включенными областями')].\nЕсли #yellow Ионические острова#! находятся под контролем иностранной державы, мы будем вести переговоры о возвращении островов нашей стране."
 ottoman_conqueror_greek_on_complete_2_tt: "Уничтожение #yellow Греции#! на некоторое время значительно устрашит других #O сепаратистов#!."
 ottoman_conqueror_syria: "Возвращение Сирии"
 ottoman_conqueror_syria_reason: "Восстание 1832 года, поднятое предателем — [Concept('concept_ruler', '$RULER_TITLE_KHEDIVE$')] [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')] [SCOPE.sCharacter('EGY_leader').GetFirstName], — привело к захвату города #yellow Конья#!, находящегося в опасной близости от столицы империи [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], и лишило Его Величество [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] законных прав на Сирию.\n\nПорта больше не может мириться с тем, что тиран из [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')] правит нашими священными землями: Сирия должна вернуться в лоно [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] любыми средствами!"
 ottoman_conqueror_syria_status: "Вернуть #O Сирию#!, незаконно оккупированную Египтом в 1833 году"
 ottoman_conqueror_syria_1_button: "Запросить вмешательство европейских держав"
 ottoman_conqueror_syria_1_button_desc: "Сирия является законной территорией империи, и оккупация её египетским хедивом совершенно незаконна. Среди европейских держав немало тех, кто поддерживает наши действия. Направив ноты правительствам различных стран, мы имеем большие шансы просить их вмешаться в эту войну."
 ottoman_conqueror_syria_1_button_possible_tt: "Дипломатические ноты европейским державам ещё не отправлены"
 ottoman_conqueror_syria_1_button_effect_tt: "Мы направим ноты всем европейским державам с просьбой поддержать нас в дипломатической игре.\nЧем лучше наши дипломатические отношения с соответствующей европейской державой или чем хуже дипломатические отношения Египта с ней, тем выше вероятность того, что они решат поддержать нас."
 ottoman_conqueror_egypy: "Возвращение Египта"
 ottoman_conqueror_egypy_reason: "Завоевание #yellow Египта#! в #V 1517 году#! Его Величеством #G Селимом I Грозным#! превратило [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] из анатолийско-балканского королевства на окраине исламского мира в огромную империю и даровало священный титул #I Хранителя Двух Святынь#!. Однако хаос после ухода #yellow Наполеона#! из #yellow Египта#! и мятеж Мухаммеда Али после #V 1831 года#! привели к тому, что [SCOPE.sCountry('EGY_scope').GetName] стала практически независимой от имперского правления.\n\nВернув #yellow Сирию#!, мы должны обратить взор на эту ключевую территорию, контролирующую #B житницу Средиземноморья и Красное море#!. Мы не можем позволить узурпатору из [SCOPE.sCountry('EGY_scope').GetAltNameNoFlag('RU_CL_RP')] править законными землями [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]: суверенитет империи будет восстановлен лишь тогда, когда #B силой оружия#! мы заставим #yellow Египет#! вновь склониться к ногам [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а."
 #奥斯曼征服
 ottoman_conquest: "Османское завоевание"
 ottoman_conquest_reason: "#white #B #italic «Друзья мои, подданные моей империи! Вы знаете, что наши предки прошли через бесчисленные испытания и великие опасности, чтобы создать империю, которой мы владеем ныне. Некоторые из вас, старцы, сами участвовали в их подвигах, а вы, юноши, слышали о них от отцов. Эти дела не будут забыты временем: но легенда, рассказанная очевидцем, всегда лучше, чем слух о былом эпосе».#!#!#!\n\n#B Былая слава#! [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] не досталась нам из воздуха или благодаря бумажкам и дипломатии: эти земли предки империи #V завоевали мечом#!. От #yellow Дуная#!, петляющего по #B Паннонии#!, до #yellow Атласских гор#! на #B богатом североафриканском побережье#!, от #B пышных долин#! #yellow Нила в Египте#! до опаленных солнцем берегов #yellow Евфрата#! в #B Сирии#! — [ROOT.GetCountry.GetName] когда-то владела почти половиной земель #O Римской империи#!.\n\nНо времена переменились слишком круто: #R долгий упадок#!, начавшийся в #V XVII веке#!, лишил [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] многих #B исконных владений#! — одних в ходе [Concept('concept_war', 'войн')], других за #O столом переговоров#!. Сегодня европейские [Concept('concept_great_power', 'великие державы')] перекраивают мир вокруг нас, и наше имя все реже звучит в их документах.\n\n#B Если империя завершила преобразования, должна ли Порта и дальше отступать?#! [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] должен заставить весь мир вновь признать: великая [ROOT.GetCountry.GetName] жива, и ее меч все еще способен #V вершить судьбы от Европы до всего #O мира#!#!"
 ottoman_conquest_possible_tt: "Завершена [concept_journal_entry] #V Реформы Танзимата#!"
 ottoman_conquest_complete_tt: "Завершено 7 записей в дневнике #V Великий завоеватель#!"
 ottoman_conquest_status: "#G Вновь завоевать территории, которыми [ROOT.GetCountry.GetName] управляла в своем славном прошлом#!"
 ottoman_conquest_north_africa: "Великий завоеватель: Возвращение Барбарии"
 ottoman_conquest_north_africa_reason: "#yellow Провинции Варварии#! долгое время находились под сюзеренитетом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], служа важным щитом империи в Западном Средиземноморье. Однако из-за военного вмешательства других европейских [Concept('concept_great_power', 'великих держав')], #V завоевания [SCOPE.sCountry('FRA_scope').GetAltNameNoFlag('RU_CL_RP')] в 1830 году#! и роста местной автономии этот регион постепенно вышел из-под контроля [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а.\n\nЕсли [ROOT.GetCountry.GetName] хочет восстановить стратегические позиции в Средиземноморье, североафриканские владения должны быть реинтегрированы: мы должны восстановить наш #B законный сюзеренитет#! в Варварии и обеспечить безопасность морской торговли империи."
 ottoman_conquest_morocco: "Великий завоеватель: Освобождение Марокко"
 ottoman_conquest_morocco_reason: "Хотя #yellow Марокко#! когда-то признавало вассалитет перед [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')], фактически оно давно вышло из сферы влияния #B Порты#!. С глубоким проникновением европейских сил очевидно, что #yellow Марокко#! больше не может самостоятельно защитить свой суверенитет.\n\nСвященный долг защиты исламского мира требует, чтобы #yellow Марокко#! не попало полностью в чужие руки: оно должно принять милосердное правление [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 ottoman_conquest_hungary: "Великий завоеватель: Завоевание Венгрии"
 ottoman_conquest_hungary_reason: "С тех пор как #V Сулейман Великолепный#! завоевал #B Венгрию и Трансильванию#!, #yellow Паннонская равнина#! стала важным фронтом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европе и сердцем дунайской системы. Однако с возвышением [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] Венгрия постепенно вышла из-под влияния империи, став плацдармом европейских сил.\n\nДавайте повторим славные деяния Сулеймана Великолепного, сокрушим злобную [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_VP')] и отберем принадлежащую империи Венгрию у немцев!"
 ottoman_conquest_transylvania: "Великий завоеватель: Возвращение Трансильвании"
 ottoman_conquest_transylvania_reason: "С тех пор как #V Сулейман Великолепный#! завоевал #B Венгрию и Трансильванию#!, #yellow Трансильвания#! стала важным фронтом [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] в Европе и ключевой зоной дунайской системы. Однако с возвышением [SCOPE.sCountry('AUS_scope').GetAltNameNoFlag('RU_CL_RP')] Трансильвания постепенно вышла из-под влияния империи, став плацдармом европейских сил.\n\nОчевидно, что если [ROOT.GetCountry.GetName] хочет вернуть лидерство в балканских делах, стратегическое значение этого горного региона нельзя игнорировать: мы должны вернуть эту вассальную территорию под контроль города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 ottoman_conquest_persia: "Великий завоеватель: Защита Крыма"
 ottoman_conquest_persia_reason: "Исторически #yellow Крымское ханство#! на северном побережье Черного моря долгое время поддерживало тесные вассальные отношения с [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]. Однако с возвышением [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] в Восточной Европе и разгромным поражением империи в #V русско-турецкой войне 1768 года#! эта территория была захвачена коварным северным царем и стала базой их так называемого Черноморского флота.\n\nВозрождение и реконкиста империи требуют смыть позор #V русско-турецких войн#!: прошлые договоры должны быть аннулированы, и [ROOT.GetCountry.GetName] #B загонит этих проклятых #yellow славян#! обратно в их восточноевропейские степи!#!"
 ottoman_conquest_caucasus: "Великий завоеватель: Умиротворение Кавказа"
 ottoman_conquest_caucasus_reason: "#tooltippable_name #tooltip:[GetCulture('georgian').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('georgian').GetCustom('RU_CUL_ADJ')]ие#!#!, #tooltippable_name #tooltip:[GetCulture('armenian').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('armenian').GetCustom('RU_CUL_ADJ')]ие#!#! и #tooltippable_name #tooltip:[GetCulture('azerbaijani').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [GetCulture('azerbaijani').GetCustom('RU_CUL_ADJ')]ие#!#! народы Кавказа — объединяет одно: они сопротивляются влиянию империи, опираясь на неприступные горы и защиту [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')].\n\nОчевидно, что правление [SCOPE.sCountry('RUS_scope').GetAltNameNoFlag('RU_CL_RP')] здесь неуместно. [ROOT.GetCountry.GetName] должна заставить народы Кавказа склониться перед величием города [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 ottoman_conquest_southern_italy: "Великий завоеватель: Завоевание Италии"
 ottoman_conquest_southern_italy_reason: "#B #italic «Империя опоясывает Средиземное море... ее завоеватели называют его 'Наше море'».#!#!\n\nС далеких римских времен #yellow Апеннинский полуостров#! и его #yellow средиземноморское побережье#! были центром Европы. В эпоху расцвета [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] османский флот господствовал в большей части Средиземноморья и однажды дошел до #V Отранто#, впервые после #I Арабского халифата#! высадив войска #I мусульманской империи#! в Италии.\n\nАмбициозный [ROOT.GetCountry.GetRuler.GetFullName] [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] планирует совершить то, что не удалось даже #yellow Мехмеду II Завоевателю#!: утвердить титул #O римского императора#! и, подобно тому как #V Фатих завоевал Константинополь#!, включить #yellow Рим#! — и всю Италию — в состав [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Несомненно, это станет нашим #B величайшим завоеванием!#!"
 #叙利亚的行政统治
 ottoman_rebuild_syria: "Реформы в Сирии"
 ottoman_rebuild_syria_reason: "Хотя #yellow Сирия#! вернулась под власть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], долгое правление [Concept('concept_ruler', '$RULER_TITLE_KHEDIVE$')] #yellow Египта#! принесло региону #B огромный хаос#!. Многие наши административные структуры разрушены, авторитет [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]а подорван.\n\nОднако это дает нам отличный шанс перестроить администрацию #yellow Сирии#!. Она может стать #B идеальным полигоном#! для #V новой провинциальной структуры#!, запланированной лидерами [GetIdeology('ideology_tanzimatism').GetName]. Если мы накопим здесь опыт #V современного административного управления#!, то сможем эффективнее внедрить его по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]."
 ottoman_rebuild_syria_status: "Создать сильную административную структуру в Сирии"
 #宪政
 ottoman_constitutional_era: "Эра конституционализма"
 ottoman_constitutional_era_reason: "Прогресс #U парламентаризма#! растет вместе с силой [GetIdeology('ideology_constitutionalist').GetName] и принятием #U либеральных [Concept('concept_law', 'законов')]#!, таких как право на собрания.\nПрогресс #G придворной власти#! растет с усилением [GetIdeology('ideology_reactionary').GetName] и принятием #G авторитарных [Concept('concept_law', 'законов')]#!, таких как самодержавие.\n\nПри поддержке #v @bureaucrats! чиновников#! и #v @officers! офицеров, приверженцев идеологии [GetIdeology('ideology_constitutionalist').GetName]#!, #G «Новые османы»#! пытаются через вооруженный переворот захватить #B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt Порту#!#!, принять #yellow демократическую конституцию#!, заставить [Concept('concept_ruler', '$RULER_TITLE_PADISAH$')] стать #yellow конституционным монархом#! и создать ответственное правительство в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].\n\n#U #B Ветер конституционализма#!#! быстро распространяется из столицы по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')]: десятилетия реформ #V Танзимата#! подготовили почву. #B Новые школы, железные дороги и телеграф#! передают идеи быстрее, чем когда-либо; #O газеты и печатные издания#! выносят политические дебаты из дворцов на городские улицы. Даже многие семьи #v @aristocrats! аристократов#! начинают верить, что #U парламент и писаные законы#! помогут будущему империи и завоюют уважение мира.\n\nДля #V имперского правительства#! это #B крайне неспокойное время#! как во внутренней, так и во внешней политике. Ожесточенная #V борьба за власть#! и быстрая #V смена правителей#! доминируют в политике [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Победит ли #U конституционный идеал#!, вернется ли в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')] #G придворная диктатура#!, или... произойдут #B неожиданные перемены#!?"
