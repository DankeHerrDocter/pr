 great_ottomanism_fail_1_tt: "Выполняется одно из следующих условий:\n•Владеет родиной болгарской культуры\n•Владеет родиной греческой культуры\n•Владеет родиной румынской культуры\n•Владеет родиной сербской культуры\n•Владеет родиной албанской культуры"
