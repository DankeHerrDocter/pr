 ottoman_public_debt_1_button: "Запросить иностранный заем"
 ottoman_public_debt_1_button_desc: "Порта больше не может нести долговое бремя в одиночку, нам нужно занимать у других стран."
 ottoman_public_debt_1_button_tt: "Мы попросим заем у [Concept('concept_great_power', 'великой державы')], участвующей в [Concept('concept_journal_entry', 'записи')] #V $ottoman_public_debt$#!. Если они согласятся, наша долговая шкала обнулится, но #O сумма внешнего долга#! #V увеличится на 1#!, как и проценты, выплачиваемые этой стране."
 ottoman_public_debt_2_button: "Погасить часть внешнего долга"
 ottoman_public_debt_2_button_desc: "Наши финансы восстанавливаются. Мы не можем позволить иностранцам эксплуатировать наш финансовый суверенитет — мы должны платить по долгам."
 ottoman_public_debt_2_button_tt: "Наша #O сумма внешнего долга#! #V уменьшится на 1#!, снижая выплачиваемые проценты."
 ottoman_public_debt_2_button_possible_tt: "#O Сумма внешнего долга#! не менее 1"
 event_tur_98_a_tt: "Мы получим начальную #O сумму внешнего долга#!, равную числу [Concept('concept_great_power', 'великих держав')], участвующих в [Concept('concept_journal_entry', 'записи')] #V $ottoman_public_debt$#!. Каждый последующий заем увеличивает #O сумму внешнего долга#! на 1, а погашение — уменьшает на 1.\nПроценты по внешнему долгу выплачиваются пропорционально доле каждой страны."
 event_tur_98_b_tt: "Мы разрешим банку выдать единовременный кредит $dyn_c_ottoman_empire_RU_CL_DP$ и начнем получать проценты. Если $dyn_c_ottoman_empire$ снова попросит взаймы, мы сможем отказать."
 ottoman_public_debt_3_button_any_tt: "Владеет не менее 1 долей государственного долга"
 ottoman_public_debt_3_button_minus_tt: "Уменьшить владение государственным долгом на 1"
 ottoman_public_debt_3_button: "Объявить односторонний дефолт по долгу"
 ottoman_public_debt_3_button_desc: "Кому какое дело до контрактов? Финансы империи — главный приоритет. Мы откажемся признавать этот долг и спишем его!"
 ottoman_public_debt_4_button: "Заложить Кипр"
 ottoman_public_debt_4_button_desc: "Многие державы проявляют интерес к Кипру: остров может стать базой для расширения влияния в Восточном Средиземноморье. Нам все равно — лишь бы платили долги."
 ottoman_public_debt_5_button: "Простить часть долга"
 ottoman_public_debt_5_button_desc: "Османы в беде. Если они полностью обанкротятся, это ударит по всем нам. Возможно, стоит простить часть долга, чтобы ослабить давление на Порту."
 ottoman_public_debt_5_button_1_tt: "Вы владеете не менее 1 долей #O государственного долга#!"
 ottoman_public_debt_6_button: "Задержать османские торговые суда"
 ottoman_public_debt_6_button_desc: "Османы вряд ли скоро вернут долги, но их торговые суда все еще спокойно плавают в наших водах? Захватим их корабли в счет уплаты долга."
 ottoman_public_debt_6_button_any_tt: "Вы владеете не менее 3 долями #O государственного долга#!"
 event_tur_99_c_tt: "Ваша доля #O государственного долга#! увеличится на 1, соответственно вырастут и получаемые проценты."
 event_tur_99_b_tt: "#O Сумма внешнего долга#! увеличится на 1, соответственно вырастут и выплачиваемые вами проценты."
 event_tur_99_a_tt: "Наш запрос на кредит отклонен."
 event_tur_99_e_tt: "Мы отклоним запрос $dyn_c_ottoman_empire_RU_CL_RP$ на кредит."
 reduce_building_gold_reserves_tt: "@information!Наши частные [Concept('concept_building_owners', 'владельцы сооружений')] изымут [Concept('concept_cash_reserves', 'финансовый резерв')] из тех [Concept('concept_building', 'сооружений')], где им принадлежат [Concept('concept_ownership_share', 'доли собственности')]. Полученный заём будет передан $dyn_c_ottoman_empire_RU_CL_DP$ и позволит погасить #V 75%#! её долга.\n@information!#R #B Остальные #L #V 25%#!#! #L османского долга#! будут покрыты за счёт #L #V государственных средств#!#!#!#!."
