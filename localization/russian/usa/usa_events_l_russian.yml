#Особые англо-американские отношения
joi_flavor_usa.40.t: "[SCOPE.sCountry('USA_scope').GetNameNoFlag] просит у нас заём!"
joi_flavor_usa.40.d: "Из-за финансовых трудностей Соединённые Штаты теперь обратили свой взор на нас, прося о помощи..."
joi_flavor_usa.40.f: "Финансовые проблемы Америки уже давно не являются секретом на международной арене; учитывая нашу тесную дружбу, госсекретарь США посетил нашу страну в надежде занять у нас крупную сумму, пообещав, что это принесёт нашей стране много политических выгод. Палата общин обсуждает просьбу американцев: стоит ли давать им в долг?"
joi_flavor_usa.40.a: "Не пора ли батюшке выдать непутёвому сыну немного на карманные расходы?"
joi_flavor_usa.40.b: "Сынок, у папы тоже денег нет, как же ты будешь жить нахлебником?"