l_russian:
#Второй банк США?
joi_flavor_usa.1.t: "Национальный банк?"
joi_flavor_usa.1.d: "Финансовый стержень нашей страны — #V Второй банк Соединённых Штатов#! — стоит на историческом перепутье: #B в мае этого года истекает срок действия государственной лицензии этого центрального банка.#!"
joi_flavor_usa.1.f: "«Господа! По правде говоря, #bold банк — это лишь один из плодов системы, которая противоречит работе всех наших институтов#!; эта система основана на политическом кредо, основной принцип которого — недоверие к воле народа.\n\nПолитическая власть, её великая конечная цель и неизбежный результат, #bold если она возобладает, — это консолидация всей власти нашей системы в руках одного центрального правительства#!; огромные государственные расходы и корпорации с эксклюзивными привилегиями заменят первоначальные и до сих пор работающие сдержки и противовесы в Конституции. С помощью этих средств #bold меньшинство может тайно и незаметно контролировать политические действия большинства#! и получить контроль над трудом и доходами широких народных масс; везде, где этот дух объединяется с политической властью, #bold он приносит плоды тирании и деспотизма#!.\n\nЕсли он используется для правительственных целей, за ним необходимо постоянно следить, иначе он развратит источники общественной морали и будет сеять раздор в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')], мешая гармоничному и стабильному преследованию её истинных интересов»."
joi_flavor_usa.1.a: "Мы должны продолжать политику Мэдисона."
joi_flavor_usa.1.b: "К чёрту это учреждение!"
#Слушания в Конгрессе
joi_flavor_usa.2.t: "Слушания в Конгрессе"
joi_flavor_usa.2.d: "На Капитолийском холме проходят следственные слушания для представления доказательств и дебатов по ряду вопросов, касающихся легитимности и коррупции нынешнего правительства."
joi_flavor_usa.2.f: "«Господин спикер, проблемы этого правительства стали слишком очевидны. Недавние скандалы распространились по всему обществу, и сегодня мы проводим дознание, чтобы устранить последствия этого скандала, а именно — заставить бездействующих членов правительства уйти в отставку! Министерство торговли и коммерции будет отвечать за новую программу исправления...»\n«Сэр, я считаю, что необходимо различать жаркие политические дебаты и недопустимое запугивание и насилие; я прошу вас, сэр, проявить терпение!»\n«Две недели назад, в пятницу вечером, сэр, вы пригласили в свою гостиную богатых сторонников правительства. Я хотел бы спросить вас, сэр, как вы относитесь к пожертвованиям в десятки тысяч долларов, которые эти богачи вам предоставили?»\n«Сэр, ваши обвинения в мой адрес — не что иное, как распространение теорий заговора; я принимаю друзей из правительства, что является обычным человеческим общением и не может служить доказательством моей или правительственной коррупции»."
joi_flavor_usa.2.a: "Это правительство достаточно хорошо."
joi_flavor_usa.2.b: "Пусть они все уходят в отставку, немедленно!"
#Дебаты об импичменте в Конгрессе
joi_flavor_usa.3.t: "Дебаты об импичменте в Конгрессе"
joi_flavor_usa.3.d: "Недавние антиправительственные беспорядки, а также дурная слава, которую стяжал действующий [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFulltName], в конечном итоге привели к тому, что Конгресс решил запустить процедуру импичмента."
joi_flavor_usa.3.f: "«Я должен сказать, что [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] должен немедленно уйти в отставку; очевидно, существуют политические разногласия между господином [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] и его партией, он взрастил иллюзии в своём бункере, но, к сожалению, не был свергнут...»\n«На самом деле, сэр, это правительство пережило одни из самых трудных времён в современной политической истории; нам также пришлось принять некоторые из самых мрачных решений, но я верю, что наши важные решения были правильными; эта страна очевидно использует свою новообретённую независимость для укрепления наших естественных преимуществ, делая её лучшим местом для жизни и инвестиций в мире».\n«Слушайте, вы, господин [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]! Вы лгали министрам о том, что знали, и позволяли им повторять эту ложь стране, пока его не разоблачили! Даже на прошлой неделе вы нарушили правила, настаивая на том, что нельзя слушать следственный комитет оппозиции, и незаконно продвинули союзника на высокую должность в правительстве!»\n«Да, именно так, уважаемые члены Конгресса, наш [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] переходит от одного скандала к другому, оскорбляя свой пост; он начинает тащить всех и вся на дно! Поэтому он больше не годен для государственной службы, не заслуживает доверия правительства, и он должен уйти!»"
joi_flavor_usa.3.a: "Виновен, виновен, да здравствует Конгресс!"
joi_flavor_usa.3.b: "Лучше не допускать таких скандалов."
#Банковские войны
joi_flavor_usa.4.t: "Лицензия"
joi_flavor_usa.4.d: "Позиция, которую занял [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], в конечном итоге привела к его отставке из-за банковского вопроса, и лицензия #V Второго банка Соединённых Штатов#! получила новое одобрение Конгресса."
joi_flavor_usa.4.f: "Получив чеки и векселя местных банков, внесённые государственными сборщиками налогов, банк должен постоянно погашать суммы, необходимые для этих чеков и векселей, перед местными банками. Он должен это делать, потому что может немедленно предоставить эти средства Казначейству по требованию. Поскольку местные банки производят расчёты серебряными и золотыми монетами, давление расчётов автоматически регулирует кредитование местных банков: чем больше местные банки выдают кредитов, тем больше используют банкнот и чеков, и тем большие суммы они должны выплачивать; поскольку расчёты не производятся в натуральной форме, потеря денег снижает их способность к кредитованию."
joi_flavor_usa.4.a: "Соединённые Штаты в нём нуждаются."
joi_flavor_usa.5.t: "Закон о ликвидации"
joi_flavor_usa.5.d: "В конечном итоге [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] одержал победу в этом вопросе. #V Второй банк Соединённых Штатов#! был ликвидирован по решению суда, и с тех пор в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] больше нет контролируемого правительством центрального банка. Это значительно расширило сферу деятельности частных предпринимателей и банкиров, и [Concept('concept_capitalists', 'капиталисты')] приветствуют мудрое решение, которое принял [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
joi_flavor_usa.5.f: "«Той поздней ночью мы прибыли в город. Перед сном я выглянул из окна своей комнаты и увидел напротив красивое здание из белого мрамора, его вид был мрачным и призрачным, оно выглядело уныло. Я списал это на гнетущее влияние ночи и, проснувшись утром, снова выглянул, ожидая увидеть его ступени и портики, заполненные людьми, входящими и выходящими. Однако двери оставались плотно закрытыми. Тот же холодный, унылый воздух витал вокруг здания, и казалось, будто только мраморная статуя Дона Гусмана могла бы вести дела в его тёмных стенах.\n\nЯ поспешил спросить его название и назначение, и моё удивление исчезло. Это была могила многих состояний, катакомбы инвестиций: незабвенный Второй банк Соединённых Штатов»."
joi_flavor_usa.5.a: "Мы должны доверять суждениям рынка!"
#Гражданская война
joi_flavor_usa.6.t: "Юг объявляет независимость!"
joi_flavor_usa.6.d: "Волнения, вызванные вопросом о рабстве, в конечном итоге привели к тому, что южные штаты на съезде объявили о своей независимости."
joi_flavor_usa.6.f: "«Моя главная цель в этой борьбе — спасти Союз, а не спасти или уничтожить рабство. Если бы я мог спасти Союз, не освободив ни одного раба, я бы это сделал; и если бы я мог спасти его, освободив всех рабов, я бы это сделал».\n\n«И если бы я мог спасти его, освободив одних и оставив других в покое, я бы тоже это сделал. То, что я делаю в отношении рабства и цветной расы, я делаю потому, что верю, что это поможет спасти Союз; и то, чего я воздерживаюсь делать, я воздерживаюсь, потому что не верю, что это поможет спасти Союз... Здесь я изложил свою цель в соответствии с моим видением официального долга; и #bold я не намерен изменять моё часто выражаемое личное желание, чтобы все люди повсюду были свободны.#!»"
joi_flavor_usa.6.a: "Уничтожить этих предателей!"
joi_flavor_usa.6.b: "Уничтожить этих предателей!"
joi_flavor_usa.7.t: "Прокламация об освобождении рабов"
joi_flavor_usa.7.d: "Поскольку сторонники рабства подняли восстание, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] решил издать прокламацию об освобождении всех рабов в мятежных штатах; это будет важнейшим шагом на нашем пути к аболиционизму."
joi_flavor_usa.7.f: "«В силу власти и с целью, указанной выше, я приказываю и объявляю, что все лица, содержащиеся в качестве рабов в указанных штатах и частях штатов, отныне и впредь свободны; и что исполнительная власть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], включая военные и военно-морские власти, будет признавать и поддерживать свободу таких лиц.\n\nИ я настоящим предписываю таким лицам, освобождённым, воздерживаться от всякого насилия, если это не требуется для необходимой самообороны; и я рекомендую им во всех случаях, когда это разрешено, добросовестно трудиться за разумную плату.\n\nИ я далее объявляю и сообщаю, что такие лица подходящего состояния будут приняты на вооружённую службу Соединённых Штатов для гарнизонной службы в фортах, позициях, станциях и других местах, а также для комплектования экипажей судов всех видов в указанной службе.\n\nИ по этому акту, искренне считаемому актом справедливости, оправданным по Конституции военной необходимостью, я взываю к уважительному суждению человечества и милости Всемогущего Бога»."
joi_flavor_usa.7.a: "Этот росчерк пера спасёт Союз!"
joi_flavor_usa.8.t: "Геттисбергская речь"
joi_flavor_usa.8.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] прибыл на Национальное кладбище в Геттисберге, чтобы произнести краткую речь в память о павших здесь воинах."
joi_flavor_usa.8.f: "Восемьдесят семь лет тому назад наши отцы основали на этом континенте новую нацию, #bold рождённую в свободе и посвящённую великому принципу, что все люди сотворены равными.#!\n\nНыне мы охвачены великой гражданской войной, что #bold стала испытанием на прочность для нашей нации#!!, и для любой другой нации, рождённой в тех же идеалах. Мы собрались на великом поле брани этой войны. Мы пришли, чтобы предать земле часть этого поля как место вечного упокоения тех, кто отдал здесь свои жизни во имя жизни нашей нации.\n\nНо, по большому счёту, не нам посвящать, не нам освящать, не нам благословлять эту землю. #bold Отважные люди — и живые, и павшие, — что сражались здесь, освятили её своими деяниями#!!, далеко превзойдя наши скудные силы что-либо прибавить или убавить. Мир едва ли заметит и не станет надолго запоминать то, что мы здесь говорим, #bold но он никогда не сможет забыть того, что они совершили здесь#!!.\n\nСкорее, это мы, живые, должны посвятить себя великому делу, которому столь благородно послужили павшие здесь бойцы. Именно нам предстоит посвятить себя великой задаче, что стоит перед нами: исполниться ещё большей верности тому делу, которому они отдали себя до конца; твёрдо решить здесь, что #bold смерть их не была напрасной#!!, что нация наша, с Божьей помощью, обретёт новое рождение в свободе, и что #bold правление народа, волей народа и для народа не исчезнет с лица земли#!!»"
joi_flavor_usa.8.a: "Все люди созданы равными!"
joi_flavor_usa.9.t: "Восстановление нации"
joi_flavor_usa.9.d: "Хотя военные сражения закончились, борьба за дух нации не прекратилась. [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] предстоит восстановить себя после раскола."
joi_flavor_usa.9.f: "«Я не хочу, чтобы эта страна распалась. Будь то приветствуемо или ненавидимо, станет ли она полностью одним или полностью другим, эта страна должна положить конец расколу своего тела и души»."
joi_flavor_usa.9.a: "Сложите оружие, нам нужен мир."
#Реконструкция
joi_flavor_usa.10.t: "Поправки Реконструкции"
joi_flavor_usa.10.d: "Наша страна восстановлена, обновлена и едина."
joi_flavor_usa.10.f: "«Ни рабство, ни принудительный труд, за исключением наказания за преступление, за которое лицо было надлежащим образом осуждено, не должны существовать на территории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] или в любом месте, подчинённом её юрисдикции...»\n\n«Все лица, родившиеся или натурализованные в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] и подчинённые её юрисдикции, являются гражданами Соединённых Штатов и штата, в котором они проживают. Ни один штат не должен издавать или применять какой-либо закон, умаляющий привилегии или иммунитеты граждан; ни один штат не должен лишать какое-либо лицо жизни, свободы или собственности без надлежащей правовой процедуры; ни отказывать какому-либо лицу в своей юрисдикции в равной защите законов...»\n\n«Право граждан [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] голосовать не должно отрицаться или умаляться Соединёнными Штатами или каким-либо штатом по причине расы, цвета кожи или предыдущего состояния рабства... Конгресс имеет право обеспечивать исполнение настоящей статьи посредством соответствующего законодательства»."
joi_flavor_usa.10.a: "Мы снова едины."
joi_flavor_usa.10.b: "Афроамериканцы тоже часть Союза."
joi_flavor_usa.10.c: "По крайней мере, тяжёлые времена позади."
joi_flavor_usa.11.t: "Убийство президента!"
joi_flavor_usa.11.d: "Небольшая группа недовольных южан, разгневанных политикой аболиционизма, ворвалась в ложу, где находился [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], и убила его прямо там во время спектакля."
joi_flavor_usa.11.f: "«Около 10:25 вечера вошёл мужчина и медленно прошёл по стороне ложи «Пирс». Я услышал, как кто-то сказал: «Там Бут», и повернулся, чтобы посмотреть на него. Он шёл очень медленно и, подойдя к двери ложи, остановился, достал из кармана карточку, что-то на ней написал и передал билетёру, который отнёс её в ложу. Через мгновение дверь открылась, и он вошёл.\n\nЯ продолжал идти, пока не добрался до восточного крыла, и только тогда вошёл. Там я столкнулся с отвратительным зрелищем: передо мной стоял гроб, в котором лежало тело, завёрнутое в саван. Вокруг стояли солдаты, исполнявшие роль стражи, толпа с горечью смотрела на тело с закрытым лицом, а некоторые жалобно плакали. «Кто умер?» — спросил я одного из солдат, и он ответил: «[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] убит ассасином»."
joi_flavor_usa.11.a: "Его будут вечно помнить как одного из величайших людей нашей страны."
joi_flavor_usa.12.t: "Резня в Колфаксе"
joi_flavor_usa.12.d: "В последние дни ужасающая резня, направленная против чернокожих, потрясла нашу страну, афроамериканцев и аболиционистов."
joi_flavor_usa.12.f: "В пасхальное воскресенье в Колфаксе, штат Луизиана, группа белых мятежников, включая бывших солдат Конфедерации и Союза, напала на здание суда прихода Грант, центр общественной жизни, которое было занято и окружено, но защищалось чернокожими гражданами, решившими отстоять результаты недавних выборов в штате. У них тоже было оружие, но им не хватило боеприпасов, чтобы одолеть врага, который обошёл их с фланга и продолжил убивать десятки чернокожих защитников здания суда, устроив ужасную резню даже после того, как они сдали оружие."
joi_flavor_usa.12.a: "Это убийство!"
joi_flavor_usa.12.b: "Этот суд недействителен, отменить заседание."
#Позолоченный век
joi_flavor_usa.13.t: "Распространение прогрессивизма"
joi_flavor_usa.13.d: "Размышления о текущем состоянии общества вызвали волну широких прогрессивных идей, породив мощное политическое движение."
joi_flavor_usa.13.f: "«Хищническое богатство — богатство, накопленное в больших количествах с помощью различных форм беззакония, включая угнетение наёмных рабочих, подавление конкуренции нечестными и нездоровыми способами, а также обман общественности путём спекуляций на акциях и манипуляций с ценными бумагами. Действия некоторых богатых людей с такими характеристиками должны вызывать отвращение у каждого человека с нормальной совестью.\n\nОни совершили ужасную ошибку, уча наших молодых людей, что выдающийся коммерческий успех обычно должен основываться на нечестности, но за последние несколько месяцев они добились успеха; очевидно, они объединились, чтобы дать отпор. Их усилия направлены на свержение и дискредитацию всех честных правоохранителей, предотвращение любого дополнительного законодательства для проверки и ограничения их деятельности и, насколько это возможно, обеспечение неограниченной свободы, которая позволит каждому недобросовестному преступнику действовать без ограничений.\n\nИмея достаточно денег, эти корпоративные деятели и те, кто занимается другими комбинациями, о которых я упоминал, могут оправдать свои методы накопления огромных состояний, только пропагандируя моральную систему, которая также оправдывает все формы преступности профсоюзов и все формы насилия, коррупции и мошенничества, от убийства до взяточничества и вброса бюллетеней в политике»."
joi_flavor_usa.13.a: "Нам нужно двигаться к прогрессу!"
joi_flavor_usa.14.t: "Закон Пендлтона"
joi_flavor_usa.14.d: "Проблема коррупции в государственной службе в конечном итоге дошла до Верховного суда, и Конгресс был вынужден разработать новый план реформ для устаревшей системы государственной службы."
joi_flavor_usa.14.f: "«[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] имеет право по совету и с согласия Сената назначать трёх членов Комиссии по гражданской службе... Эти три кандидата не должны принадлежать к одной и той же политической партии. Им также не разрешается занимать другие должности в правительстве [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nОбязанности членов комиссии заключаются в том, чтобы по просьбе [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] помогать ему в разработке законных правил для реализации этого закона; определять должности, подлежащие экзаменам, и проводить экзамены, заниматься классификацией должностей и устанавливать единые стандарты для классификации должностей.\n\nГосударственные служащие не предоставляют никаких средств и не принимают на себя никаких обязательств в вопросах найма, и они не будут уволены или рассматриваться по-другому из-за отказа предоставить средства или принять на себя обязательства»."
joi_flavor_usa.14.a: "Провести большие реформы."
joi_flavor_usa.15.t: "Золотой век трестов"
joi_flavor_usa.15.d: "Промышленные магнаты быстро поднялись на волне индустриализации, став гигантами, контролирующими местную экономику."
joi_flavor_usa.15.f: "«Для этих баронов-разбойников не было ни великих злодеяний, ни подлых мелочей, от преследования и изгнания богатых купцов до попрошайничества и самоубийств, от похищения и грабежа вдов и сирот, мелких торговцев в деревне и хромых разносчиков. На большой дороге — всё это использовалось этой организованной бандой коммерческих разбойников»."
joi_flavor_usa.15.a: "И что с того?"
joi_flavor_usa.16.t: "Зарождающийся средний класс"
joi_flavor_usa.16.d: "Быстрая урбанизация привела к появлению многих состоятельных горожан. С волной индустриализации, принесшей беспрецедентное процветание, этот новый класс нашёл своё место на улицах городов."
joi_flavor_usa.16.f: "«В сумерках они спешили по шумным улицам, их лица сияли облегчением и радостью после рабочего дня. Мужчины в опрятных костюмах, со шляпами набекрень, а женщины в модных платьях, под руку с друзьями и родственниками, смеялись и болтали».\n\n«Они сидели на уютных террасах кафе, наслаждаясь свежеиспечённым хлебом и свежим кофе, обсуждая последние театральные постановки или планы на пикник за городом; или же, на скамейках в парке, собирались семьи, дети резвились на траве, а взрослые сидели кружком, делясь повседневными историями и мечтами о будущем»."
joi_flavor_usa.16.a: "Они разбогатели благодаря своему уму."
joi_flavor_usa.16.b: "Наши политические круги приветствуют их голоса."
joi_flavor_usa.17.t: "Прибытие иммигрантов"
joi_flavor_usa.17.d: "Процветание Позолоченного века привлекло людей многих национальностей, которые начали иммигрировать в нашу страну в поисках богатой новой жизни."
joi_flavor_usa.17.f: "«Америка открыта не только для богатых и уважаемых чужестранцев, но и для угнетённых и преследуемых всех наций и религий; мы будем рады разделить с ними все наши права и привилегии...»\n\n«Я всегда надеялся, что эта земля станет безопасным и приятным убежищем для доброй и преследуемой части человечества, к какой бы нации они ни принадлежали»."
joi_flavor_usa.17.a: "Подозреваю, у этих людей есть опасные предметы."
joi_flavor_usa.17.b: "Соединённые Штаты приветствуют вас!"
#Гражданские права
joi_flavor_usa.18.t: "Закон о гражданских правах"
joi_flavor_usa.18.d: "Череда реформ положила конец неравноправию на выборах и расовой сегрегации в школах, на рабочих местах и в общественных пространствах. Дискриминация по признаку расы, цвета кожи, вероисповедания, пола или национального происхождения была объявлена вне закона."
joi_flavor_usa.18.f: "«Мы исходим из той самоочевидной истины, что #yellow все люди созданы равными и наделены их Творцом определенными неотчуждаемыми правами, к числу которых относятся жизнь, свобода и стремление к счастью#!. Для обеспечения этих прав людьми учреждаются правительства, черпающие свои законные полномочия из согласия управляемых».\n\n«В случае, если какая-либо форма правительства становится губительной для самих этих целей, народ имеет право изменить или упразднить ее и учредить новое правительство, основанное на таких принципах и формы организации власти которого наилучшим образом обеспечат людям безопасность и счастье»."
joi_flavor_usa.18.a: "Мы — маяк демократии и свободы, стоящий в тёмной бездне, дающий свет и надежду кораблям: свобода озаряет мир!"
joi_flavor_usa.19.t: "Марш на город [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]"
joi_flavor_usa.19.d: "Известный афроамериканский активист за гражданские права привёл своих последователей в столицу нашей страны, [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName], и произнёс речь, потрясшую всю нацию."
joi_flavor_usa.19.f: "«#bold У меня есть мечта, что однажды эта нация поднимется и будет жить в соответствии с истинным смыслом своего кредо: „Мы считаем самоочевидной истиной, что все люди созданы равными“.#!\n\n#bold У меня есть мечта#!, что однажды на красных холмах Джорджии сыновья бывших рабов и сыновья бывших рабовладельцев смогут сидеть вместе за столом братства.\n\n#bold У меня есть мечта#!, что однажды даже штат Миссисипи, штат, изнемогающий от зноя несправедливости, изнемогающий от зноя угнетения, превратится в оазис свободы и справедливости.\n\n#bold У меня есть мечта#!, что мои четверо маленьких детей однажды будут жить в стране, где их будут судить не по цвету их кожи, а по содержанию их характера.\n\n#bold У меня есть мечта, что каждая долина возвысится, каждый холм и гора понизятся, кривые пути выпрямятся, и слава Господня явится, и узрит всякая плоть.#!\n\nКогда мы позволим свободе звенеть, когда мы позволим ей звенеть из каждой деревни и каждой деревушки, из каждого штата и каждого города, мы сможем ускорить приход того дня, когда все дети Божьи, чёрные и белые, евреи и язычники, протестанты и католики, смогут взяться за руки и спеть слова старого негритянского духовного гимна: #bold „Моя страна, о тебе, милая земля свободы, о тебе я пою. Земля, где умерли мои отцы, земля гордости пилигримов, с каждого склона горы пусть звенит свобода!“#!"
joi_flavor_usa.19.a: "У меня тоже есть мечта!"
joi_flavor_usa.20.t: "Расовая сегрегация в общественном транспорте"
joi_flavor_usa.20.d: "Решение местного суда о законности правил, требующих от чернокожих уступать места в общественном транспорте, возмутило чернокожих по всей стране, и активисты за гражданские права начали призывать к бойкоту автобусов в знак протеста."
joi_flavor_usa.20.f: "Ещё одну женщину арестовали и посадили в тюрьму за то, что она отказалась встать в автобусе, чтобы уступить место белому! Это уже второй случай ареста чернокожей женщины за то же самое; это должно прекратиться. У чернокожих тоже есть права, потому что если чернокожие не будут ездить на автобусах, они не смогут работать, ведь три четверти пассажиров — чернокожие, но нас арестовывают или заставляют стоять над пустыми местами. Если мы не предпримем что-то, чтобы остановить эти аресты, они будут продолжаться. В следующий раз это можете быть вы, или ваша дочь, или мать. Дело этой женщины будет рассматриваться в понедельник. Поэтому мы просим каждого чернокожего не пользоваться автобусами в понедельник в знак протеста против ареста и суда. Не ездите в понедельник на автобусе на работу, в город, в школу или куда-либо ещё. Если у вас нет другого способа добраться, кроме автобуса, вы можете взять выходной. Вы также можете провести день за городом. Если вы работаете, постарайтесь дойти пешком. Но, дети и взрослые, пожалуйста, не пользуйтесь автобусами в понедельник."
joi_flavor_usa.20.a: "Это явное нарушение конституции!"
joi_flavor_usa.20.b: "Давайте просто закроем на это глаза."
#Явное предначертание
joi_flavor_usa.21.t: "За тысячи миль друг от друга"
joi_flavor_usa.21.d: "С успехом «Явного предначертания» во всём мире, экспансионисты [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] получили огромное влияние, что позволило им продвигать шовинистическую политику нашей страны."
joi_flavor_usa.21.f: "«Я был рэкетиром, гангстером капитализма. Тогда я подозревал, что я всего лишь часть аферы. Теперь я в этом уверен.\nЯ помог сделать Мексику, и особенно Тампико, безопасными для интересов [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]; я помог сделать Гаити и Кубу приличным местом для сбора доходов для парней из Национального городского банка. Я помогал в изнасиловании полдюжины республик Центральной Америки в пользу Уолл-стрит... Оглядываясь назад, я чувствую, что мог бы дать им несколько советов, но это бы не изменило их судьбу: наши интересы должны защищаться армией, даже если при этом нарушается суверенитет не желающих того стран... но и двери закрытых стран должны быть выбиты»."
joi_flavor_usa.21.a: "Это век империализма!"
joi_flavor_usa.22.t: "Мексиканская цессия"
joi_flavor_usa.22.d: "Мы освободили большую часть американского Юго-Запада от незаконных оков Мексики; теперь территория [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] простирается от Атлантического до Тихого океана."
joi_flavor_usa.22.f: "«О, прекрасна для просторных небес,\nДля янтарных волн зерна,\nДля пурпурных горных вершин\nНад плодородной равниной!\nАмерика! Америка!\nБог пролил на тебя свою благодать,\nИ увенчал твоё добро братством\nОт моря до сияющего моря!»"
joi_flavor_usa.22.a: "Это наше предначертание!"
joi_flavor_usa.23.t: "Пограничные войны"
joi_flavor_usa.23.d: "Последние остатки власти коренных американцев были стёрты, оставив только территорию [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
joi_flavor_usa.23.f: "У нас есть возможность построить мир заново. Такой возможности не было со времён Ноя до наших дней. Рождение нового мира близко!"
joi_flavor_usa.23.a: "Вперёд, свободный фронтир!"
#Прогрессивная эра и индустриализация
joi_flavor_usa.24.t: "Поправка Платта"
joi_flavor_usa.24.d: "После победы [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] на Кубе, Конгресс подписал новый законопроект, регулирующий отношения с Кубой."
joi_flavor_usa.24.f: "Во-первых, признавая независимость кубинского народа, требуя от правительства [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_RP')] отказаться от власти и правления на острове Куба, и вывести свои военно-морские и сухопутные силы из Кубы и её вод, и поручая [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] использовать сухопутные и военно-морские силы Соединённых Штатов для выполнения декларации этого закона, настоящим [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] уполномочен передать правительство и контроль над Кубой её народу, поэтому после учреждения правительства на Кубе в соответствии с конституцией, либо как часть конституции, либо в приложении, должны быть определены будущие отношения между Соединёнными Штатами и Кубой.\nВо-вторых, правительство Кубы никогда не должно заключать с какой-либо иностранной державой договоры или другие соглашения, которые могут нанести или нанесут ущерб независимости Кубы.\nВ-третьих, правительство не должно брать на себя или заключать какие-либо государственные долги и выплачивать по ним проценты, а также не может устанавливать разумные положения о фонде погашения для выплаты вышеупомянутых долгов, если обычные доходы острова недостаточны для покрытия текущих расходов правительства.\nВ-четвёртых, правительство Кубы соглашается с тем, что Соединённые Штаты могут осуществлять вмешательство для сохранения независимости Кубы, поддержания надлежащего правительства для защиты жизни, собственности и личной свободы.\nВ-пятых, все действия Соединённых Штатов на Кубе во время военной оккупации настоящим одобряются и подтверждаются, и все законные права, полученные таким образом, сохраняются и защищаются."
joi_flavor_usa.24.a: "Мы не намерены аннексировать Кубу."
joi_flavor_usa.24.b: "Куба должна стать заморской территорией."
joi_flavor_usa.25.t: "Коммерческий бум"
joi_flavor_usa.25.d: "С развитием законодательства и технологий коммерция начала процветать и развиваться, что привело к беспрецедентной активности в городах."
joi_flavor_usa.25.f: "С первыми лучами утреннего света город начинал свой неутомимый пульс. На улицах шумные толпы, словно бурлящие реки, каждый был свидетелем коммерческого процветания этого города. Высокие небоскрёбы, отражая солнечный свет, словно маяки в стальном лесу, освещали горизонт, полный безграничных деловых возможностей.\n\nС наступлением ночи город не засыпал; неоновые огни продолжали мерцать. Каждый уголок этого города, который никогда не спит, был наполнен дыханием возможностей. Это был город, полный жизни, каждую минуту демонстрирующий миру своё коммерческое процветание и безграничный потенциал."
joi_flavor_usa.25.a: "Коммерция выгодна всем."
joi_flavor_usa.26.t: "Движение за трезвость"
joi_flavor_usa.26.d: "Множество антиалкогольных лиг возникло по всей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')], требуя введения сухого закона."
joi_flavor_usa.26.f: "«Алкоголь развращает человека».\n\n«Благочестие нашей нации требует нравственного народа, а нравственность не может сосуществовать с алкоголем».\n\n«Мы просим федеральное правительство принудительно запретить развращённым людям употреблять алкоголь и наставить их на путь истинный»."
joi_flavor_usa.26.a: "Ох."
joi_flavor_usa.27.t: "Питтсбург: стальная столица"
joi_flavor_usa.27.d: "Питтсбург на берегу Великих озёр быстро стал величайшей стальной столицей [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] после беспрецедентного развития сталелитейной промышленности."
joi_flavor_usa.27.f: "#bold Питтсбург — это не просто город#!, это вершина активности и вихрь промышленности, место, полное пота и золота, уникальное место, где труд превращается в неутомимую производственную лихорадку, хранящую секрет вечной энергии, необъяснимой наукой.\nВ этих извергающих чёрный дым заводах есть своя прелесть в производстве стали: размеры всего — от гигантских инструментов до масштабов производства — захватывают ум с непреодолимой силой, так великолепно и безгранично! Наблюдать, как расплавленный чугун кипит и пузырится в печи, — одно удовольствие: адская жара, раскалённый добела чугун, ярко-красные слитки; #bold стены печи окружены бесчисленными язычками пламени, ослепительный свет мешает нам смотреть прямо; а эти современные Вулканы в коротких рукавах, с крепкими ногами, всё ещё куют молнии, какая картина цивилизованного прогресса!#!\nЧтобы продемонстрировать рост [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], или триумф производства и механизации, Питтсбург — самый великолепный памятник!"
joi_flavor_usa.27.a: "Сталелитейные города выковали нашу цивилизацию."
#Верховный суд
joi_flavor_usa.28.t: "Дело «Поллока против Farmers' Loan & Trust Co.»"
joi_flavor_usa.28.d: "Гражданин Массачусетса по имени Чарльз Поллок подал апелляцию в Верховный суд по поводу требования нью-йоркской компании Farmers' Loan & Trust Co. уплатить дополнительный подоходный налог в соответствии с законом, утверждая, что взимание правительством прямого подоходного налога с компании является, без сомнения, неконституционным."
joi_flavor_usa.28.f: "«Во-первых, мы придерживаемся уже высказанного мнения, что налог на недвижимость, несомненно, является прямым налогом, и налог на ренту или доход от недвижимости также является прямым налогом».\n\n«Во-вторых, мы считаем, что налог на движимое имущество или доход от движимого имущества также является прямым налогом».\n«В-третьих, дополнительный налог с 1787 года, поскольку он касается доходов от недвижимости и движимого имущества, является прямым налогом в конституционном смысле и, следовательно, является неконституционным и недействительным, поскольку не распределяется в соответствии с представительством, и все эти части, составляющие весь налоговый план, обязательно должны быть недействительными».\n\n«Поэтому ранее вынесенное в этом суде постановление будет отменено, и дело будет возвращено на новое рассмотрение с указаниями предоставить запрошенное облегчение»."
joi_flavor_usa.28.a: "Старый подоходный налог, без сомнения, неконституционен. Нам нужно разработать новые налоговые законы."
joi_flavor_usa.29.t: "Закон о реформе Сената"
joi_flavor_usa.29.d: "Учитывая текущую проблему неэффективности Сената, многие реформаторы постепенно начали поддерживать проведение радикальной реформы состава Сената, чтобы более дальновидно подходить к вопросам, представляемым Конгрессу, обеспечить достаточное количество представителей от каждого штата в федеральном правительстве и гарантировать, что они не будут слишком зависеть от общественной поддержки и сиюминутных настроений."
joi_flavor_usa.29.f: "Сенат Соединённых Штатов состоит из двух сенаторов от каждого штата, избираемых народом на шесть лет; каждый сенатор имеет один голос. Избиратели в каждом штате должны иметь квалификацию, необходимую для избирателей самой многочисленной палаты законодательного собрания штата.\n\nКогда в представительстве какого-либо штата в Сенате появляются вакансии, исполнительная власть этого штата издаёт приказ о проведении выборов для заполнения таких вакансий. Однако законодательное собрание любого штата может уполномочить исполнительную власть этого штата назначать временных сенаторов до тех пор, пока народ не заполнит вакансии путём выборов по указанию законодательного собрания.\n\nНастоящая поправка не должна толковаться таким образом, чтобы влиять на выборы или срок полномочий любого сенатора, избранного до того, как настоящая поправка станет действительной частью Конституции."
joi_flavor_usa.29.a: "Нужна большая реформа."
joi_flavor_usa.30.t: "Дело «Майнор против Хапперсетта»"
joi_flavor_usa.30.d: "Гражданка Миссури по имени Вирджиния Майнор подала апелляцию в Верховный суд, утверждая, что решение апелляционного суда Миссури о запрете женщинам участвовать в выборах нарушает Четырнадцатую поправку к Конституции."
joi_flavor_usa.30.f: "«С момента принятия Конституции до настоящего времени почти во всех штатах право голоса было ограничено только мужчинами... и явное намерение Четырнадцатой поправки заключалось в предоставлении гражданства бывшим рабам, а не в принудительном изменении других законов штатов».\n\n«Второй раздел Четырнадцатой поправки конкретно упоминает граждан мужского пола и делает вывод: «Это явно признаёт это право и, по-видимому, предполагает, что штаты будут осуществлять право ограничивать избирательное право жителей мужского пола...»\n\n«Конституция принимает квалификацию, действующую в штате, где проходят выборы, в качестве квалификации избирателей для членов Конгресса; следовательно, это право не предоставляется явно Конституцией какому-либо лицу или классу лиц, поскольку вы должны обращаться к законам штата для описания этого класса... но суд не намерен говорить, что когда этот класс или лицо так определены, его право избирать членов Конгресса по существу не основано на Конституции»."
joi_flavor_usa.30.a: "Нам нужно разработать новую конституционную поправку о женском избирательном праве."
joi_flavor_usa.31.t: "Закон Блейна"
joi_flavor_usa.31.d: "Растущее антипрогибиционистское движение охватило всю страну, и вопрос о том, должна ли Восемнадцатая поправка к Конституции о сухом законе стать первой отменённой поправкой в истории [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')], встал на повестку дня."
joi_flavor_usa.31.f: "«Когда был введён сухой закон, я надеялся, что он получит широкую поддержку общественности и что однажды люди осознают пагубное влияние алкоголя. Медленно и неохотно я пришёл к выводу, что это не так. Напротив, потребление алкоголя в целом увеличилось; подпольные бары заменили салуны; появилась огромная армия преступников; многие из наших лучших граждан открыто игнорировали сухой закон; уважение к закону значительно уменьшилось, а преступность возросла до невиданных ранее масштабов».\n\nДвадцать четыре янки, чувствуя сильную жажду,\nПересекли длинную границу, чтобы выпить ржи на севере.\nКогда открыли бутылку ржи, янки запели:\n«Боже, храни Америку, но и нашего короля тоже!»"
joi_flavor_usa.31.a: "Это нереалистичное положение должно быть отменено."
#Иммиграция
joi_flavor_usa.32.t: "Ирландские иммигранты прибывают в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_VP')]"
joi_flavor_usa.32.d: "Стремление ирландского народа к идеалам свободы нашей страны побудило их начать иммиграцию в поисках богатой новой жизни."
joi_flavor_usa.32.f: "«Америка открыта не только для богатых и уважаемых чужестранцев, но и для угнетённых и преследуемых всех наций и религий; мы будем рады разделить с ними все наши права и привилегии...»\n\n«Я всегда надеялся, что эта земля станет безопасным и приятным убежищем для доброй и преследуемой части человечества, к какой бы нации они ни принадлежали»."
joi_flavor_usa.32.a: "Какая картошка? Мы не едим картошку!"
