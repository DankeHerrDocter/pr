  #Движение на Запад
 westward_movement: "Движение на Запад"
 westward_movement_reason: "#variable Бог заключил с нами завет на Новом Континенте#!, обещая нам обширные дикие земли. #bold Мы — город на холме, на который взирает весь мир#!. Поэтому этот континент дан нам Богом для развития великого эксперимента свободы и федеративного самоуправления, доверенного #bold нам#!. Следовательно, мы имеем естественное право расширяться и занимать земли нецивилизованных индейцев.\n\nНаш долг и обязанность — нести #bold идеи цивилизации и просвещения#! в #bold невежественные и нецивилизованные племена туземцев#!. Мы должны включить эти огромные западные земли в нашу свободную державу, чтобы жизнь каждого стала лучше, богаче и полнее, чтобы каждый получил возможность в соответствии со своими способностями или достижениями. Пусть милосердные люди стремятся #bold обучить их искусствам цивилизации#! и, способствуя единству и гармонии между ними, создать #bold праведный союз.#!\n\n#bold На Запад, братья, растите вместе с [Concept('concept_country', 'государством')]!#!"
 westward_movement_status: "#bold Включить обширный Запад в наш праведный союз#!"
 westward_movement_complete_tt: "Все индейские вождества, стоявшие на нашем пути, аннексированы."
  #Банковская война
 us_bank_war: "Банковская война"
 us_bank_war_reason: "Хотя #variable законопроект о продлении лицензии, представленный в Конгресс Национальной антиджексоновской партией в 1832 году#!, был ветирован президентом, вопрос о выживании этого государственного банка, #bold лицензия которого скоро истекает#!, по-прежнему вызывает ожесточённые споры в нашем правительстве и среди банковских магнатов.\n\n#bold Покушение на президента в 1835 году#! усилило панику вокруг вопроса о Втором банке, однако президент по-прежнему твёрдо убеждён, что этот банк сконцентрировал слишком много финансовой и политической власти, его существование усугубляет разрыв между богатыми и бедными, а непрозрачность его операций позволяет немногим манипулировать им в интересах привилегированных классов, а не широких масс.\n\nСпоры между двумя сторонами достигли своего пика в год президентских выборов, и правительство должно принять решение."
 kick_away_jackson_tt: "#bold Эндрю Джексон и его банда джексонианских демократов были изгнаны с президентского поста#!"
 flavor_usa_1a_tt: "#O #B Мы продлим лицензию, что приведёт к тому, что в Банковской войне мы сохраним национальный банк и поддержим экономическое вмешательство.#!#!"
 flavor_usa_1b_tt: "#U #B Мы откажемся продлевать лицензию, что позволит нам приватизировать банк и проводить политику невмешательства в Банковской войне.#!#!"
 us_bank_war_complete_tt: "Решение о ликвидации Второго банка оставалось в силе более 6 месяцев без отмены"
 disable_second_bank_tt: "Мы примем новую, открытую политику."
  #Рабство
 before_us_civil_war: "Споры о рабстве"
 before_us_civil_war_reason: "Рабство существует в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] со времён Войны за независимость. Эта система, противоречащая духу свободы, на котором основана наша страна, тем не менее признана Конституцией и легализована в южных штатах в соответствии с #bold Ордонансом о Северо-Западе 1787 года#!, установившим границу по реке Огайо, и законом «[GetLawType('law_legacy_slavery').GetName]».\n\nИзобретение хлопкоочистительной машины привело к взрывному росту хлопковых плантаций на Юге, из-за чего в ещё больших количествах требовались #v $slaves$#!. Это нанесло серьёзный удар по аболиционистскому движению и привело к тому, что внутренняя работорговля, наряду с плантационным хозяйством, стала крупнейшей отраслью южной экономики. Работорговля, от крупных центров до региональных рынков, от городских торговцев до местных плантаторов, проникла во все аспекты жизни южного общества, и #bold лишь немногие южане могли остаться в стороне.#!\n\nРастущая экспансия рабства в Дикси в последнее время всё больше радикализирует аболиционистов. Свободные штаты Севера убеждены, что рабство — это застойная и неэффективная система, которая держится исключительно на сельском хозяйстве. Они пытаются добиться отмены закона «[GetLawType('law_legacy_slavery').GetName]» на Юге и требуют, чтобы #v $slaves$#! были освобождены.\n\nЭти споры между аболиционистами и рабовладельцами становятся всё более ожесточёнными по всей стране, и #bold рано или поздно стороны выскажут свои аргументы с помощью пуль.#!"
 is_at_war_with_southlandowners: "Гражданская война с южными плантаторами"
 is_at_war_with_major_southlandowners: "Гражданская война с правящими южными плантаторами"
 before_us_civil_war_tt: "Мы сможем лучше подготовиться к конфликту с южными плантаторами."
 before_us_civil_war_2_tt: "Южные плантаторы объявят независимость и восстанут против Союза."
 before_us_civil_war_status: "#N #B Споры вокруг закона «[GetLawType('law_legacy_slavery').GetName]» разгораются всё сильнее#!#!"
  #Гражданская война
 american_civil_war: "Гражданская война в США"
 american_civil_war_reason: "«Мы искренне надеемся, что это тяжкое бремя [Concept('concept_war', 'войны')] скоро будет снято. Но если будет на то воля Божья, чтобы война продолжалась до тех пор, пока не исчезнет всё [Concept('concept_wealth', 'богатство')], накопленное за двести пятьдесят лет #v $slaves_only_icon$ рабского#! труда, и пока, как было сказано три тысячи лет назад, каждая капля крови, пролитая под ударами бича, не будет отплачена каждой каплей крови, пролитой под ударами меча, то я всё же должен сказать: „Суды Господни истинны и праведны все“. Мы не питаем ни к кому злой воли, мы ко всем относимся с милосердием. Бог даёт нам видеть, где правда, и мы твёрдо стоим на стороне правды. Давайте же продолжим нашу борьбу, чтобы завершить начатое дело, исцелить раны [Concept('concept_country', 'страны')], позаботиться о тех, кто мужественно сражался, — о #v $soldiers_only_icon$ солдатах#!, их вдовах и сиротах, и сделать всё возможное для достижения и сохранения справедливого и прочного мира между нами и со всеми народами».\n\n[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] нарушили Конституцию Соединённых Штатов, отделившись от Союза и провозгласив независимость. Ужасная [Concept('concept_war', 'война')] уже идёт между аболиционистами. Мы должны уничтожить предателей из незаконного правительства Юга и сохранить единство [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]."
 southern_dixie_revolt_tt: "Южные плантаторы объявят независимость и восстанут против аболиционистской политики Севера!"
  #Реконструкция
 american_reconstraction: "Эпоха Реконструкции"
 american_reconstraction_reason: "«Все лица, родившиеся в Соединённых Штатах... настоящим объявляются гражданами Соединённых Штатов; и такие граждане любой расы и цвета кожи, независимо от предыдущего состояния рабства... должны иметь в каждом штате те же права... заключать и исполнять контракты, подавать иски, быть сторонами и давать показания, наследовать, покупать, арендовать, продавать, владеть и передавать недвижимое и личное имущество, и в полной и равной мере пользоваться всеми законами и процедурами для обеспечения безопасности личности и собственности, как и белые граждане, и подлежать подобным наказаниям, и никаким другим, вопреки любому закону, статуту, постановлению, предписанию или обычаю».\n\nХотя дым гражданской войны рассеялся, жестокая [Concept('concept_war', 'война')] разделила единство Севера и Юга республики. Мы должны восстановить нашу родину, чтобы снова стать #variable единым народом.#!"
 american_reconstraction_conplete_tt: "Реинтегрированы штаты, отделившиеся от Союза во время гражданской войны.\nЕсли мы сможем добиться того, чтобы #V более 20%#!#O афроамериканцев #!стали [Concept('concept_loyalist', 'лоялистами')] или примем закон «[GetLawType('law_multicultural').GetName]», то после завершения Реконструкции мы получим #O афроамериканцев#! в качестве [Concept('concept_primary_cultures', 'основных культур')]."
 flavor_usa11_tt: "Президент убит."
 flavor_usa12_tt: "Это может привести к росту белого расизма на Юге."
  #Позолоченный век и индустриализация
 american_gilded_age: "Позолоченный век"
 american_gilded_age_reason: "Скрытые противоречия и проблемы внутри [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] были решены, мы снова едины и вступаем в эпоху #bold беспрецедентного процветания промышленной революции#!: заводы заменяют прежние плантации и фермы, стальные города приходят на смену ветхим деревушкам. Несомненно, #bold это станет золотым веком нашей [Concept('concept_country', 'страны')]!#!\n\n#variable На рубеже веков#! всё старое уйдёт в прошлое. #v $aristocrats$#! и #v $farmers$#! больше не будут занимать господствующее положение. #v $shopkeepers$#! и богатые #v $capitalists$#! сформируют эту эпоху, придадут ей #bold мораль и вкус#! и наполнят её #bold [Concept('concept_ideology', 'идеологией')] и [Concept('concept_culture', 'культурой')]#!. #bold Природа покорится нам#!. Сила пара и электричества укротит её непокорный нрав, заставив природу подчиниться и стать послушной служанкой. Планы по пересечению континента больше не являются мечтой, вся [Concept('concept_country', 'страна')] будет объединена в единый рынок, #bold наслаждаясь беспрецедентным [Concept('concept_wealth', 'богатством')]#!. #bold Мы перекроим этот мир#! и приведём его к #bold невиданному прогрессу и процветанию.#!\n\nЭто лучшее, самое прекрасное время. #variable Это Позолоченный век [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]!#!"
 american_gilded_age_status: "#V #P #B Привести нашу [Concept('concept_country', 'страну')] к невиданному процветанию#!#!#!"
 american_gilded_age_complete_1_tt: "#bold ВВП вырос до 1 миллиарда#!"
 american_gilded_age_complete_tt: "#bold Одновременно является #bold ведущим производителем#! следующих товаров: [SCOPE.sGoods('steel_scope').GetName], [SCOPE.sGoods('tools_scope').GetName], [SCOPE.sGoods('coal_scope').GetName] и [SCOPE.sGoods('iron_scope').GetName]#!"
 american_gilded_age_goal: ""
  #Гражданские права
 road_to_civil_rights: "Движение за гражданские права"
 road_to_civil_rights_reason: "«Закон «[GetLawType('law_racial_segregation').GetName]», предусматривающий расовую сегрегацию белых и чёрных детей, #B оказывает пагубное влияние на цветных детей.#! Когда такая санкция имеет форму [Concept('concept_law', 'закона')], влияние ещё больше; политика «[GetLawType('law_racial_segregation').GetName]» часто подразумевает, что #tooltippable_name #tooltip:[SCOPE.sCulture('afro_american_culture_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('afro_american_culture_scope').GetCustom('RU_CUL_ADJ')|l]ое#!#! население является неполноценным».\n\nС #V 1776 года#! наша родина стремится к идеалам #V мирового движения за гражданские права и либерализм#!. Однако #B неравенство прав чернокожих и суровый закон «[GetLawType('law_racial_segregation').GetName]» на Юге#! вызывают всё большее негодование у эгалитаристов, а #tooltippable_name #tooltip:[SCOPE.sCulture('afro_american_culture_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('afro_american_culture_scope').GetCustom('RU_CUL_ADJ')|l]ие#!#! демонстрации в борьбе за свои права становятся всё более радикальными.\n\n[ROOT.GetCountry.GetNameNoFlag] провозглашает свободу по всему миру, и мы должны сдержать своё слово. Здесь мы #V ценим свободу#!. Но разве мы скажем миру и друг другу, что #B это #V свободная страна#!, но не для #tooltippable_name #tooltip:[SCOPE.sCulture('afro_american_culture_scope').GetTooltipTag],DATA_CULTURE_NAME_TOOLTIP,CultureTooltip [SCOPE.sCulture('afro_american_culture_scope').GetCustom('RU_CUL_ADJ')|l]их#!#! граждан, что есть  #V граждане первого сорта#! и есть [SCOPE.sCulture('afro_american_culture_scope').GetName|l]? Настало время этой стране выполнить своё обещание: #B [ROOT.GetCountry.GetNameNoFlag] должна решить эту #V проблему гражданских прав#!.#!"
 road_to_civil_rights_complete_tt: "Законы «[GetLawType('law_multicultural').GetName]» и «[GetLawType('law_universal_suffrage').GetName]» #V стабильно действуют не менее 5 лет.#!"
 road_to_civil_rights_status: "#B Движение против политики «[GetLawType('law_racial_segregation').GetName]» продолжает развиваться в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')]#!"
  #Серия «Явное предначертание»
 manifest_destiny: "Принять предназначение"
 manifest_destiny_reason: "#bold Народ [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] происходит от многих других народов#!. #variable Декларация независимости#! полностью основана на великих принципах свободы и равенства. В отличие от старых империй Старого Света, мы не связаны с их #bold славой и преступлениями#!. Рождение нашей [Concept('concept_country', 'страны')] — это начало новой истории, формирование и прогресс совершенно новой системы, которая отдаляет нас от грехов прошлого и связывает только со славой будущего, предопределяя нашей [Concept('concept_country', 'стране')] роль лидера будущего.\n\nНи один мудрый человек, ценящий свободу и цивилизацию, не может смотреть на историю древних режимов с [Concept('concept_law', 'законом')] «[GetLawType('law_monarchy').GetName]» и аристократических режимов без сожаления об их существовании. Ни один философ не может размышлять об угнетении, жестокости и несправедливости, которые они причинили массам, не испытывая морального ужаса. Именно поэтому нам суждено заменить их, ибо мы — защитники всех народов и угнетённых, защитники совести и свободы. #bold В наших умах — истина Божья, в наших сердцах — милосердие, а совесть наша чиста, не запятнана прошлым#!. Мы — [Concept('concept_country', 'страна')], символизирующая человеческий прогресс, и никакой враг не сможет остановить наш путь.\n\nБезграничное будущее станет величайшей эпохой [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Наша [Concept('concept_country', 'страна')] имеет предначертанную миссию вовлечь человечество в нашу свободную империю. Мы должны расшириться, чтобы охватить весь мир: #variable от берегов Америки до равнин Азии, от городов Европы до лесов Африки — это наше Явное предначертание!#!"
 manifest_destiny_status: "#bold Нашей великой [Concept('concept_country', 'стране')] предначертано раскинуться по всему континенту#!"
 manifest_destiny_complete_tt: "Завершено 5 #bold записей в [Concept('concept_journal_entry', 'дневнике')]#! о Явном предначертании"
 manifest_destiny_mex: "Явное предначертание: Мексиканская цессия"
 manifest_destiny_mex_reason: "Слабая Мексика на юге владеет многими территориями, которых не заслуживает. Эти земли по праву принадлежат нашему Союзу. Для общего блага, для их мира и процветания, мы должны действовать первыми, чтобы защитить эти наши законные владения от посягательств."
 manifest_destiny_frontier_wars: "Явное предначертание: Пограничные войны"
 manifest_destiny_frontier_wars_reason: "Мы намерены превратить плодородные Великие равнины в огромную житницу и новый дом для американского народа. Необходимо обеспечить, чтобы Великие равнины стали нашими внутренними землями. Индейские племена там смогут получить эффективную защиту только находясь в составе нашего Союза. Наши поселения будут постепенно ограничивать и сближаться с индейцами, и со временем они либо присоединятся к нам как американские граждане, либо переселятся за Миссисипи."
 manifest_destiny_cuba: "Явное предначертание: Защита Кубы"
 manifest_destiny_cuba_reason: "Народ острова Куба жаждет независимости. Этот богатый остров в Карибском море, хотя и находится в руках [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_RP')], является ключом к Мексиканскому заливу и частью нашей коммерческой системы. Необходимо применить принципы доктрины Монро. Если этот остров перестанет быть испанским, Куба неизбежно должна стать американской, а не подпасть под власть любой другой европейской державы."
 manifest_destiny_philippines: "Явное предначертание: Захват Филиппин"
 manifest_destiny_philippines_reason: "Власть [SCOPE.sCountry('SPA_scope').GetAltNameNoFlag('RU_CL_RP')] на Филиппинах всегда была нестабильной. Учитывая отсутствие у нашей страны опоры для интересов в Азии, нам необходимо воспользоваться моментом их слабости, чтобы захватить Филиппинские острова и включить их в состав Соединённых Штатов."
 manifest_destiny_philippines_tt: "На Филиппинах будет установлена наша власть, что приведёт к следующим последствиям:"
 manifest_destiny_hawai: "Явное предначертание: Аннексия Гавайев"
 manifest_destiny_hawai_reason: "Гавайское королевство правит естественной гаванью в центре Тихого океана, и многие наши соотечественники проживают там. Это даёт нам возможность предъявить претензии на эти земли. Мы должны действовать быстро, чтобы превратить Гавайи в законную территорию нашей страны."
 manifest_destiny_hawai_tt: "Гавайи станут одним из штатов Союза"
 manifest_destiny_1_button: "Провозгласить предначертание"
 manifest_destiny_1_button_desc: "От берега до берега — это наша врождённая миссия. Да здравствуют Соединённые Штаты Америки!"
 manifest_destiny_1_button_tt: "Явное предначертание ещё не было провозглашено"
 crossing_the_nueces_river_button: "Перейти реку Нуэсес"
 crossing_the_nueces_river_button_desc: "Мексика, похоже, игнорирует наши территориальные претензии. Мы не можем этого допустить. Земли к северу от Рио-Гранде до побережья Тихого океана должны принадлежать нам. Президент планирует отдать прямой приказ отважному кавалерийскому отряду на границе пересечь реку Нуэсес, разделяющую нас и Мексику, и атаковать форт Браун. Нападение мексиканских стражей на наших солдат послужит поводом для Конгресса принять законопроект о войне и вторгнуться вглубь Мексики!"
 crossing_the_nueces_river_button_possible_tt: "Секретный приказ уже передан генералу на границе."
 crossing_the_nueces_river_button_possible_2_tt: "Техас не существует"
 crossing_the_nueces_river_button_possible_3_tt: "Наши территориальные претензии были объявлены, и Мексика не согласилась с нашими претензиями на их территорию."
 crossing_the_nueces_river_button_effect_tt: "Наши солдаты перейдут реку и начнут атаку!"
 crossing_the_nueces_river_button_effect_2_tt: "Сразу после инцидента президент выступит в Конгрессе с речью, чтобы убедить его официально принять законопроект о войне."
  #Прогрессивизм
 progressive_era: "Прогрессивная эра"
 progressive_era_reason: "«Мы сейчас заняты созданием инструментов демократии: прямых праймериз, инициатив, референдумов, отзыва, коротких бюллетеней, комиссионного правления. Но в нашем энтузиазме мы, кажется, не осознаём, что эти инструменты будут бесполезны, если ими не будут пользоваться люди, исполненные братского духа... [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] необходимо создать в каждом сообществе учреждение, которое имеет прямое и важное отношение к благосостоянию района, округа или квартала, а также всего города».\n\nЭкономика процветает, богатство растёт... кажется, всё в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')] идёт хорошо. Но за блестящим фасадом скрывается растущая коррупция в [Concept('concept_government', 'правительстве')] и рост монополий трестов. Социальные противоречия, вызванные урбанизацией, разрушают нашу демократическую систему, а проникновение социалистических идей порождает всё новые рабочие движения.\n\nНеобходимо #variable реформировать нашу родину#! до того, как эти проблемы перерастут в катастрофу, чтобы наша политика наконец соответствовала нашему #variable великому экономическому положению.#!"
  #Маяк свободы
 free_beacon: "Маяк свободы"
 free_beacon_reason: "[ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] #variable истинная слава — это слава [Concept('concept_election', 'выборного')] [Concept('concept_government', 'правительства')]#!, #variable истинная независимость — это независимость свободного сознания#!. Наши сердца бьются в унисон со свободой. Мы — #bold маяк демократии и свободы#!, стоящий в тёмной бездне, #bold сияющий город на холме#! в этом несчастном мире, дающий #bold свет и надежду#! кораблям и морским путешественникам.\n\n#bold Равенство граждан#! способствует единству [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Во всех [Concept('concept_law', 'законах')] нет ни малейшего намёка на привилегии. Права одного человека — это права каждого: #bold нет сословий, нет титулов, нет наследственного достоинства#!. Народ никогда не считает себя недостойным привилегий, предоставляемых другими. Именно поэтому дети ирландцев, немцев, итальянцев, испанцев и шведов, #bold все люди разных наций и [Concept('concept_culture', 'культур')]#!, #bold сливаются воедино#! в языке, мыслях, чувствах и патриотизме. Благоговение, унаследованное ими от отцов и подходящее для старых иерархических систем, отбрасывается как мусор, оставляя лишь одно благородное политическое кредо: #variable «Все люди рождаются свободными и равными»#!.\n\n[Concept('concept_pop', 'Население')] учат жить и работать ради общего блага, а не для поддержания королевской семьи или деспотичной аристократии. Именно эти причины делают возможным развитие #bold великой [Concept('concept_country', 'страны')]#!. Мы — #variable маяк свободы#! такой подавляющей силы и масштаба, что нам не нужны [Concept('concept_army', 'армия')] или [Concept('concept_fleet', 'флот')] для обеспечения безопасности. Мы полагаемся на #bold народ, который ценит свои равные права и мирные победы и предан республиканизму.#!\n\nМиссия [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] — соблюдать верность и справедливость по отношению ко всем нациям, содействовать миру и согласию со всеми. Если мы сможем стать нацией, которая всегда #bold руководствуется возвышенным духом справедливости и милосердия#!, #bold подавая человечеству благородный и новый пример#!, то мы будем достойны быть #bold свободной, просвещённой и, в скором будущем, великой [Concept('concept_country', 'страной')]#!, истинным #bold маяком свободы#!, несравненным в благородстве и чувствах.\n\n#variable Свобода озаряет мир!#!"
 free_beacon_1_button: "Привлечь ирландских иммигрантов"
 free_beacon_1_button_desc: "Ирландцы страдают от жестокой эксплуатации британских лордов. Мы легко можем привлечь их в нашу свободную державу."
 free_beacon_2_button: "Привлечь немецких иммигрантов"
 free_beacon_2_button_desc: "Народ Южной Германии страдает. Мы можем предоставить им особые льготы, чтобы привлечь этих высококвалифицированных ремесленников."
 free_beacon_3_button: "Привлечь русских иммигрантов"
 free_beacon_3_button_desc: "Русские страдают от террора как царя, так и большевиков. Мы должны предоставить им политическое убежище."
 free_beacon_4_button: "Привлечь итальянских иммигрантов"
 free_beacon_4_button_desc: "Говорят, что народ Итальянского полуострова даже не может позволить себе еду. Это немыслимо. Мы можем побудить их бежать из этих тёмных трущоб."
 free_beacon_5_button: "Привлечь французских иммигрантов"
 free_beacon_5_button_desc: "Французы постоянно находятся под угрозой радикальных революций и политической нестабильности. Мы уверены, что некоторая пропаганда убедит их в свете и романтике нашей страны."
 free_beacon_6_button: "Привлечь испанских иммигрантов"
 free_beacon_6_button_desc: "Испания постоянно воюет сама с собой, а её народ страдает. Мы должны принять их в наш праведный союз."
 free_beacon_7_button: "Привлечь турецких иммигрантов"
 free_beacon_7_button_desc: "Слабость Османской империи очевидна, в том числе и для её собственных граждан. Мы уверены, что такая свободная страна, как наша, их заинтересует."
 free_beacon_8_button: "Привлечь китайских иммигрантов"
 free_beacon_8_button_desc: "Китайцы страдают от ужасных потрясений и упадка. Они завидуют нашему блестящему успеху и эгалитарным идеям. Мы можем широко привлекать их на наши берега."
 free_beacon_tt: "За последние 10 лет не привлекались иммигранты этой национальности"
 free_beacon_8_tt: "В течение последних 5 лет мы не привлекали мигрантов этой национальности."
  #Индустриализация
 greatlakes_industrialize: "Индустриализация Великих озёр"
 greatlakes_industrialize_reason: "Развитая речная транспортная система в районе Великих озёр создала условия для промышленного развития. Мы должны использовать богатые природные ресурсы региона, чтобы создать там #bold вечное промышленное сердце, источник нашего богатства.#!"
 greatlakes_industrialize_status: "Превратить Великие озёра в величайшее промышленное сердце нашей страны"
 westcoast_industrialize: "Урбанизация Западного побережья"
 westcoast_industrialize_reason: "Развитие Западного побережья привлекает множество новых иммигрантов, которые строят новые города. Вкладывая средства в привлечение новых иммигрантов, мы вполне способны превратить его в жемчужину Тихоокеанского побережья."
 westcoast_industrialize_status: "Превратить деревни и посёлки Западного побережья в густонаселённые городские районы"
 eastcoast_industrialize: "Урбанизация Восточного побережья"
 eastcoast_industrialize_reason: "Восточное побережье — самый традиционный городской район [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]. Со времён, когда мы были #bold Тринадцатью колониями#!, он процветал и стал самой заметной землёй в Северной Америке.\n\nС волной индустриализации старые города Восточного побережья остро нуждаются в обновлении и расширении. Давайте же будем строить для будущих поколений и превратим Восточное побережье в #bold самое яркое место в мире#!."
 eastcoast_industrialize_status: "Превратить старые городские районы Восточного побережья в самую ослепительную жемчужину нашей страны"
  #Особые англо-американские отношения
 american_anglo_special_relationship: "Особые англо-американские отношения"
 american_anglo_special_relationship_reason: "С тех пор как мы провозгласили независимость от Тринадцати колоний и стали [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_TP')], у [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')] и [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] сложились очень сложные отношения. Хотя в прошлом наши две страны долгое время конкурировали в различных сферах, благодаря #variable Великому примирению англо-американского союза#! всё это осталось в прошлом. Сегодня мы тесно сотрудничаем в торговле, экономике, науке и других областях, что привело к нашим нынешним тёплым и дружественным особым отношениям.\n\nОднако в этом изменчивом мире единственное, чему можно доверять, — это #bold самые близкие и надёжные родственные узы#!: #bold наши две страны исповедуют одну и ту же веру, унаследовали одну и ту же [Concept('concept_culture', 'культуру')], имеют общих предков, мы — естественные союзники#!. Между нашими народами существует необычайное единство мыслей и целей, что делает наши отношения поистине исключительными. Поэтому мы будем стоять вместе, единые:\n\nНаши узы, как сказал генерал #bold Джозеф Тэтналл#!:\n\n#variable Кровь гуще воды!#!"
 american_anglo_special_relationship_possible_tt: "Принят договор об англо-американском союзе с Великобританией"
 american_anglo_special_relationship_tt: "#bold Увеличение инвестиций в Великобританию#! повысит наши инвестиционные очки на 25.\n#bold Продажа активов в Великобритании#! снизит наши инвестиционные очки на 25.\n#bold Запрос промышленной помощи у Великобритании#! или #bold запрос на предоставление портов#! снизят наши инвестиционные очки на 50.\n#bold Аренда кораблей Королевского флота#! будет стоить нам 100 инвестиционных очков и предоставит мощную поддержку."
 usa_investment_1_button: "Увеличить инвестиции в Великобританию"
 usa_investment_1_button_tt: "В течение 2 лет не было инвестиций в Великобританию или продаж\nЭто увеличит инвестиционные очки на 25"
 usa_investment_1_button_desc: "[SCOPE.sCountry('GBR_scope').GetNameNoFlag] — родина промышленной революции, под её властью находится множество колоний, и её потенциал для развития огромен. Наши промышленники уверены, что выделение части средств на инвестиции в их империю не только поможет их экономическому развитию, но и принесёт много выгод [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_DP')] в будущем."
 usa_investment_2_button: "Продать активы в Великобритании"
 usa_investment_2_button_tt: "В течение 5 лет не было продаж активов в Великобритании или инвестиций, и имеется более 25 инвестиционных очков\nЭто снизит инвестиционные очки на 25"
 usa_investment_2_button_desc: "Часть промышленников не верит в перспективы [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')]. Они убеждают правительство вывести часть инвестиций из страны и вернуть их на родину, утверждая, что только вложение средств в действительно ценные земли [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] может принести стабильную прибыль."
 usa_help_1_button: "Запросить промышленную помощь у Великобритании"
 usa_help_1_button_tt: "В течение 5 лет не запрашивалась промышленная помощь или порты у Великобритании, и имеется более 50 инвестиционных очков\nЭто снизит инвестиционные очки на 50"
 usa_help_1_button_desc: "Наша промышленность столкнулась с некоторыми трудностями, в то время как у нашего союзника, [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], дела в промышленности обстоят весьма неплохо. Благодаря нашим активам в стране, [ROOT.GetCountry.GetNameNoFlag)] также обладает значительным влиянием. Мы уверены, что лоббирование некоторых политиков и промышленников с целью получения промышленной помощи не составит труда."
 usa_help_2_button: "Запросить у Великобритании предоставление портов"
 usa_help_2_button_tt: "В течение 5 лет не запрашивались порты или промышленная помощь у Великобритании, и имеется более 50 инвестиционных очков\nЭто снизит инвестиционные очки на 50"
 usa_help_2_button_desc: "Нам не хватает военных баз по всему миру для поддержки наших войн. Однако у нашего близкого союзника, [SCOPE.sCountry('GBR_scope').GetAltNameNoFlag('RU_CL_RP')], бесчисленное множество островов, портов и баз. Если мы сможем, продав им часть активов, убедить Вестминстер временно открыть эти базы для нас и обеспечить достаточное снабжение, это будет чрезвычайно выгодно для нашей армии."
 usa_help_3_button: "Арендовать корабли Королевского флота"
 usa_help_3_button_tt: "Великобритания не может так часто сдавать в аренду свои военные корабли. Аренда возможна только раз в 25 лет, и необходимо иметь 100 инвестиционных очков\nЭто снизит инвестиционные очки на 100"
 usa_help_3_button_desc: "Королевский флот очень долгое время является первым флотом в мире и обладает огромным количеством военных кораблей. Но действительно ли они все им постоянно нужны? Не обязательно. Учитывая, что война серьёзно угрожает безопасности наших морских путей, возможно, мы можем заплатить немалую цену, чтобы получить их временно ненужные качественные корабли для поддержки нашего флота."
 usa_cash_1_button: "Запросить заём у Великобритании"
 usa_cash_1_button_tt: "Однако британцы могут и не согласиться...\nЗаём можно запрашивать только раз в 5 лет."
 usa_cash_1_button_desc: "Наше финансовое положение оставляет желать лучшего. Чтобы обеспечить стабильность государственного бюджета и избежать дефицита, возможно, мы могли бы получить у наших союзников «заём» без процентов — и даже без необходимости возврата... Однако в лондонском Вест-Энде, вероятно, не будут этому рады."
 usa_investment_need_25_tt: "Необходимо не менее 25 инвестиционных очков"
 usa_investment_need_50_tt: "Необходимо не менее 50 инвестиционных очков"
 usa_investment_need_100_tt: "Необходимо не менее 100 инвестиционных очков"