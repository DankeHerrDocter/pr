l_russian:
  #Верховный суд
 supreme_court: "Верховный суд"
 supreme_court_reason: "Индикатор показывает количество находящихся в процессе принятия #bold поправок к Конституции#!.\n\n#bold «Судебная власть [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')] осуществляется Верховным судом и нижестоящими судами, которые время от времени могут быть учреждены Конгрессом#!: Судебная власть распространяется на все дела, основанные на праве и справедливости, возникающие на основании настоящей Конституции, [Concept('concept_law', 'законов')] Соединённых Штатов и договоров, которые заключены или будут заключены от их имени; на все дела, касающиеся послов, других официальных представителей и консулов; на все дела адмиралтейства и морской юрисдикции; на споры, в которых Соединённые Штаты являются стороной; на споры между двумя или более штатами; на споры между гражданами одного штата; на споры между гражданами разных штатов о правах на земли, пожалованные разными штатами; на споры между штатом или его гражданами и иностранными государствами, их гражданами или подданными».\n\nИдея Верховного суда возникла на #variable Конституционном конвенте 1787 года#! из #bold концепции разделения властей#!. #bold Отцы-основатели#!, выступавшие за создание судебного органа, избираемого законодательными [Concept('concept_institution', 'институтами')] [Concept('concept_country', 'страны')], в конечном итоге создали #bold Верховный суд с функциями судебного надзора и высшего толкователя Конституции#!.\n\n#variable Верховный суд#! — это #bold не просто#! судебный орган, а #variable страж справедливости и равенства в Соединённых Штатах.#! Надлежащая правовая процедура в Верховном суде является символом поддержания #bold авторитета и беспристрастности [Concept('concept_law', 'закона')] в Соединённых Штатах Америки#!. #bold Принципы презумпции невиновности и независимости судебной власти#! обеспечивают стабильность республиканского строя Соединённых Штатов, как и было задумано отцами-основателями при написании Конституции:\n\n#bold Мы, народ Соединённых Штатов, с целью образовать более совершенный Союз, установить правосудие, гарантировать внутреннее спокойствие, обеспечить совместную оборону, содействовать общему благосостоянию и закрепить блага свободы за нами и потомством нашим, учреждаем и принимаем эту Конституцию для [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')].#!"
 supreme_court_complete_tt: "Судебные дела, которые не могут быть разрешены апелляционными судами, могут быть переданы в Верховный суд для вынесения окончательного решения."
 supreme_court_cant_change_tt: "Согласно пятой статье Конституции, первые десять поправок, известные как Билль о правах, не могут быть изменены."
 supreme_court_cant_change_2_tt: "Верховный суд не имеет права давать дополнительные толкования этой поправки к Конституции."
 is_doing_sp_count_law: "Эта поправка к Конституции ещё не принята"
 is_doing_sp_count_18_law: "Восемнадцатая поправка находится в процессе принятия"
 supreme_court_1_button: "Первая поправка"
 supreme_court_1_button_desc: "Конгресс не должен издавать ни одного закона, относящегося к установлению религии либо запрещающего свободное её исповедание, либо ограничивающего свободу слова или печати, или право народа мирно собираться и обращаться к правительству с петициями об удовлетворении жалоб."
 supreme_court_2_button: "Вторая поправка"
 supreme_court_2_button_desc: "Поскольку хорошо организованное ополчение необходимо для безопасности свободного [Concept('concept_country', 'государства')], право народа хранить и носить оружие не должно нарушаться."
 supreme_court_3_button: "Третья поправка"
 supreme_court_3_button_desc: "В мирное время ни один солдат не должен без согласия владельца размещаться на постой в каком-либо доме; в военное же время это возможно только в порядке, установленном законом."
 supreme_court_4_button: "Четвёртая поправка"
 supreme_court_4_button_desc: "Право народа на охрану личности, жилища, бумаг и имущества от необоснованных обысков и арестов не должно нарушаться. Ни один ордер не должен выдаваться иначе, как при наличии достаточного основания, подтверждённого присягой или торжественным заявлением; при этом ордер должен содержать подробное описание места, подлежащего обыску, и лиц или предметов, подлежащих аресту."
 supreme_court_5_button: "Пятая поправка"
 supreme_court_5_button_desc: "Никто не должен привлекаться к ответственности за тяжкое или иное позорящее преступление иначе, как по представлению или обвинительному заключению Большого жюри, за исключением дел, возбуждаемых в сухопутных или военно-морских силах, либо в ополчении, когда оно призвано на действительную службу во время войны или общественной опасности. Никто не должен за одно и то же правонарушение дважды подвергаться угрозе лишения жизни или телесного наказания. Никто не должен принуждаться в уголовном деле быть свидетелем против самого себя; не может быть лишён жизни, свободы или собственности без надлежащей правовой процедуры. Частная собственность не должна изыматься для общественного пользования без справедливого вознаграждения."
 supreme_court_6_button: "Шестая поправка"
 supreme_court_6_button_desc: "При всяком уголовном преследовании обвиняемый имеет право на скорый и публичный суд беспристрастных присяжных того штата и округа, где преступление совершено, причём округ должен быть заранее установлен законом; обвиняемый имеет право быть информированным о сущности и основаниях обвинения; он имеет право на очную ставку со свидетелями, показывающими против него; он имеет право на принудительный вызов свидетелей со своей стороны и на помощь адвоката для своей защиты."
 supreme_court_7_button: "Седьмая поправка"
 supreme_court_7_button_desc: "В гражданских делах, основанных на общем праве, где цена иска превышает двадцать долларов, сохраняется право на суд присяжных. Ни один факт, рассмотренный судом присяжных, не может быть пересмотрен каким-либо судом Соединённых Штатов иначе, как в соответствии с нормами общего права."
 supreme_court_8_button: "Восьмая поправка"
 supreme_court_8_button_desc: "Не должны требоваться чрезмерные залоги, не должны налагаться чрезмерные штрафы, не должны назначаться жестокие и необычные наказания."
 supreme_court_9_button: "Девятая поправка"
 supreme_court_9_button_desc: "Перечисление в Конституции определённых прав не должно толковаться как отрицание или умаление других прав, сохраняемых народом."
 supreme_court_10_button: "Десятая поправка"
 supreme_court_10_button_desc: "Полномочия, не делегированные Соединённым Штатам настоящей Конституцией и не запрещённые ею для штатов, сохраняются соответственно за штатами либо за народом."
 supreme_court_11_button: "Одиннадцатая поправка"
 supreme_court_11_button_desc: "Судебная власть Соединённых Штатов не должна толковаться как распространяющаяся на какое-либо дело по общему праву или праву справедливости, начатое или ведущееся против одного из Соединённых Штатов гражданами другого штата либо гражданами или подданными какого-либо иностранного государства."
 supreme_court_12_button: "Двенадцатая поправка"
 supreme_court_12_button_desc: "Выборщики собираются в своих штатах и голосуют бюллетенями за президента и вице-президента... они составляют раздельные списки всех лиц, за которых голосовали как за президента, и всех лиц, за которых голосовали как за вице-президента, с указанием числа голосов, поданных за каждого; эти списки они подписывают, удостоверяют и направляют в запечатанном виде в место пребывания правительства Соединённых Штатов на имя председателя Сената; председатель Сената в присутствии Сената и Палаты представителей вскрывает все удостоверенные списки, после чего голоса подсчитываются. Лицо, получившее наибольшее число голосов на должность президента, становится президентом, если это число составляет большинство от общего числа назначенных выборщиков."
 supreme_court_13_button: "Тринадцатая поправка"
 supreme_court_13_button_desc: "Ни в Соединённых Штатах, ни в каком-либо ином месте, подчинённом их юрисдикции, не должно существовать ни рабства, ни принудительного услужения, кроме случаев наказания за преступление, за которое лицо было надлежащим образом осуждено. Все равны перед законом, и никто не может обращать другого в рабство. Конгресс имеет право обеспечить исполнение настоящей статьи посредством соответствующего законодательства."
 supreme_court_14_button: "Четырнадцатая поправка"
 supreme_court_14_button_desc: "Все лица, родившиеся или натурализованные в Соединённых Штатах и подчинённые их юрисдикции, являются гражданами Соединённых Штатов и штата, в котором они проживают. Ни один штат не должен издавать или применять какой-либо закон, умаляющий привилегии или иммунитеты граждан Соединённых Штатов; ни один штат не должен лишать какое-либо лицо жизни, свободы или собственности без надлежащей правовой процедуры; не должен отказывать какому-либо лицу в своей юрисдикции в равной защите законов."
 supreme_court_15_button: "Пятнадцатая поправка"
 supreme_court_15_button_desc: "Право голоса граждан Соединённых Штатов не должно отрицаться или умаляться Соединёнными Штатами или каким-либо штатом по причине расы, цвета кожи или предыдущего состояния рабства."
 supreme_court_16_button: "Шестнадцатая поправка"
 supreme_court_16_button_desc: "Конгресс имеет право устанавливать и взимать налоги с доходов, из какого бы источника они ни были получены, без распределения между штатами и безотносительно к какой-либо переписи или исчислению населения."
 supreme_court_17_button: "Семнадцатая поправка"
 supreme_court_17_button_desc: "Сенат Соединённых Штатов состоит из двух сенаторов от каждого штата, избираемых народом на шесть лет; каждый сенатор имеет один голос. Избиратели в каждом штате должны иметь квалификацию, необходимую для избирателей самой многочисленной палаты законодательного собрания штата. Когда в представительстве какого-либо штата в Сенате появляются вакансии, исполнительная власть этого штата издаёт приказ о проведении выборов для заполнения таких вакансий. Однако законодательное собрание любого штата может уполномочить исполнительную власть этого штата назначать временных сенаторов до тех пор, пока народ не заполнит вакансии путём выборов по указанию законодательного собрания."
 supreme_court_18_button: "Восемнадцатая поправка"
 supreme_court_18_button_desc: "Производство, продажа или транспортировка опьяняющих напитков, их ввоз или вывоз из Соединённых Штатов и всех территорий, подчинённых их юрисдикции, для потребления в качестве напитка запрещаются."
 supreme_court_19_button: "Девятнадцатая поправка"
 supreme_court_19_button_desc: "Право голоса граждан Соединённых Штатов не должно отрицаться или умаляться Соединёнными Штатами или каким-либо штатом по признаку пола."
 supreme_court_20_button: "Двадцатая поправка"
 supreme_court_20_button_desc: "Восемнадцатая поправка к Конституции Соединённых Штатов настоящим отменяется. Перевозка или ввоз в какой-либо штат, территорию или владение Соединённых Штатов для доставки или использования в них опьяняющих напитков в нарушение законов, действующих в них, настоящим запрещается."
 status_supreme_court_1: "#P #B Нынешний председатель Верховного суда — Роджер Брук Тони#!#!"
 status_supreme_court_2: "#O #B Нынешний председатель Верховного суда — Салмон Портленд Чейз#!#!"
 status_supreme_court_3: "#U #B Нынешний председатель Верховного суда — Моррисон Уэйт#!#!"
 status_supreme_court_4: "#U #B Нынешний председатель Верховного суда — Мелвилл Фуллер#!#!"
 status_supreme_court_5: "#U #B Нынешний председатель Верховного суда — Эдвард Дуглас Уайт#!#!"
 status_supreme_court_6: "#O #B Нынешний председатель Верховного суда — Уильям Говард Тафт#!#!"
 status_supreme_court_7: "#O #B Нынешний председатель Верховного суда — Чарльз Эванс Хьюз#!#!"
 pollock_vs_farmers_tt: "Шестнадцатая поправка будет обсуждаться в Конгрессе."
 act_reform_congress_tt: "Семнадцатая поправка будет обсуждаться в Конгрессе."
 minor_vs_happersett_tt: "Девятнадцатая поправка будет обсуждаться в Конгрессе."
 blaine_act_tt: "Двадцатая поправка будет обсуждаться в Конгрессе."
  #Капитолийский холм
 united_states_congress: "Капитолийский холм"
 united_states_congress_reason: "Индикатор показывает количество мест, занимаемых партией большинства в Конгрессе.\n#bold Места Демократической партии#!: #variable [ROOT.GetCountry.MakeScope.Var('democratic_party').GetValue|0]#!; во время [Concept('concept_election', 'выборов')] в следующем месяце изменится на #variable [ROOT.GetCountry.MakeScope.Var('democratic_progress_next').GetValue|1+=]#! по #tooltippable;tooltip:[Country.GetTooltipTag],usa_congress_demoncratic_tooltip_advance причине#!.\n#bold Места Республиканской партии#!: #variable [ROOT.GetCountry.MakeScope.Var('republican_party').GetValue|0]#!; во время [Concept('concept_election', 'выборов')] в следующем месяце изменится на #variable [ROOT.GetCountry.MakeScope.Var('republican_progress_next').GetValue|1+=]#! по #tooltippable;tooltip:[Country.GetTooltipTag],usa_congress_republican_tooltip_advance причине#!.\n\n«Вся законодательная власть, установленная настоящей Конституцией, принадлежит Конгрессу Соединённых Штатов, который состоит из Сената и Палаты представителей... Палата представителей состоит из членов, избираемых каждые два года народом различных штатов прямыми [Concept('concept_election', 'выборами')]... Каждый законопроект, принятый Палатой представителей и Сенатом, прежде чем стать законом, представляется на рассмотрение президента Соединённых Штатов».\n\nНынешний Конгресс Соединённых Штатов является #bold прямым преемником Конгресса Конфедерации#!, учреждённого после #bold Континентального конгресса 1781 года#!. Он осуществляет законодательную власть, предоставленную ему всеми гражданами в соответствии с положениями #variable Конституции Соединённых Штатов Америки#!, и избирается прямыми [Concept('concept_election', 'выборами')], что делает его бесспорным центром власти в [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_PP')].\n\nОдна из ключевых ролей Конгресса — #bold представлять интересы и волю граждан [ROOT.GetCountry.GetAltNameNoFlag('RU_CL_RP')]#!. Каждый член Конгресса представляет определённый избирательный округ или штат, отвечая за донесение голоса своих избирателей до процесса принятия решений [Concept('concept_country', 'страны')], стремясь к [Concept('concept_party', 'межпартийному')] консенсусу для отражения широких общественных интересов; он обеспечивает #bold прозрачность законодательства#!, позволяя выражать и учитывать различные точки зрения и интересы.\n\nХотя работа Конгресса иногда подвергается критике за неэффективность или излишнюю изощрённость, эти проблемы сами по себе отражают наши первоначальные намерения при создании #bold демократической политики#!: #variable децентрализация власти, многообразие интересов и открытость принятия решений#!. Структура и функции Конгресса направлены на содействие широкому участию и дебатам, чтобы обеспечить, что [Concept('concept_law', 'законы')] и политика отражают всестороннее рассмотрение общественных интересов.\n\nМы считаем самоочевидными следующие истины: #variable все люди созданы равными и наделены их Творцом определёнными неотчуждаемыми правами#!, к числу которых относятся жизнь, свобода и стремление к счастью; #bold для обеспечения этих прав люди учреждают [Concept('concept_government', 'правительства')]#!. И это величайшая миссия Конгресса. Возможно, он не безупречен, но он является неугасимым маяком демократии нашей страны, освещающим путь к свободе."
 usa_congress_demoncratic_tooltip_advance: "\n#variable Плантации или сельскохозяйственные [Concept('concept_building_level', 'уровни')] с прибылью не менее 10 принесли [Country.MakeScope.Var('democratic_progress_from_building').GetValue|+=] голосов демократическому электорату в штатах#!\n#variable Консервативные силы принесли #! [Country.MakeScope.Var('democratic_progress_from_igs').GetValue|+=] голосов#!"
 usa_congress_republican_tooltip_advance: "\n#variable Производственные или горнодобывающие [Concept('concept_building_level', 'уровни')] с прибылью не менее 15 принесли [Country.MakeScope.Var('republican_progress_from_building').GetValue|+=] голосов республиканскому электорату в штатах#!\n#variable Прогрессивные силы принесли #! [Country.MakeScope.Var('republican_progress_from_igs').GetValue|+=] голосов#!"
 united_states_congress_1_button: "Принять бюджет"
 united_states_congress_1_button_desc: "Конституция наделяет Конгресс правом взимать налоги, и все законопроекты о налогах и ассигнованиях должны исходить от Палаты представителей. Конгресс также требует, чтобы президент готовил и представлял ежегодный бюджет для стабилизации доверия рынка к нашему правительству. Однако, если бы Конгресс проявил немного больше снисхождения, это, несомненно, было бы встречено многими с одобрением."
 united_states_congress_2_button: "Санкционировать правительственный заём"
 united_states_congress_2_button_desc: "Займы правительства у финансовых учреждений и банков теоретически должны быть одобрены Конгрессом, особенно когда речь идёт о крупных суммах. Было бы замечательно, если бы Конгресс, учитывая потребности правительства, смягчил условия одобрения."
 united_states_congress_3_button: "Пересмотреть законодательный процесс"
 united_states_congress_3_button_desc: "Конгресс является высшим законодательным органом, принимающим законы, которые затрагивают каждого американца. Законодательство часто требует принятия решений по спорным вопросам. Однако Конгресс собирается слишком редко. Если бы можно было чаще обращаться к нему за помощью, это, несомненно, пошло бы на пользу текущему законодательному процессу."
 united_states_congress_4_button: "Провести публичные слушания"
 united_states_congress_4_button_desc: "Одна из обязанностей Конгресса по надзору за правительством — проведение публичных слушаний, особенно когда Кабинет министров подвергается сомнению. Похоже, сейчас самое подходящее время. Немедленно провести слушания и дебаты!"
 united_states_congress_5_button: "Осуществить национальную мобилизацию"
 united_states_congress_5_button_desc: "Конгресс является истинным управляющим органом наших вооружённых сил, обладая правом объявления войны и призыва на военную службу. Ввиду неблагоприятной военной ситуации, нам необходимо убедить Конгресс немедленно объявить всеобщую мобилизацию."
 united_states_congress_6_button: "Начать импичмент президента"
 united_states_congress_6_button_desc: "Широко распространено мнение, что действующий президент не подходит для своей должности. Хотя импичмент — это несколько шокирующая мера, это, несомненно, священный долг Конгресса. Пусть граждане решат судьбу главы [Concept('concept_country', 'государства')]!"
 united_states_congress_1_possible: "Бюджет на этот год ещё не принят"
 united_states_congress_2_possible: "За последние 5 лет не было санкционировано ни одного другого займа"
 united_states_congress_3_possible: "Действующий закон ещё не пересматривался"
 united_states_congress_4_possible: "За последние 10 лет не проводилось ни одного слушания"
 united_states_congress_5_possible: "За последние 15 лет не издавалось ни одного приказа о мобилизации"
 united_states_congress_6_possible: "За последние 10 лет не проводилось ни одной процедуры импичмента"
