 long_way_to_home_reason:0 "#B 王冠在伦敦沦陷，[GetIdeology('ideology_communist').GetName]暴徒如今已经推翻了祖国的秩序与传统#!：火焰与赤旗笼罩着#yellow 大不列颠#!，而[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下与忠诚的议员们却只能在#V 皇家海军的护送下横渡海洋流亡到仍然忠诚帝国领土中。#!\n\n然而，即使本土大片土地，和许多古老而著名的城市已经落入了[GetIdeology('ideology_communist').GetName]的匪徒和独裁统治，以及这些所有可恶机构的掌控，我们也不会衰弱或失败；我们海外的帝国，在#U 皇家海军#!的武装和守卫下，仍在继续战斗。\n\n我们将以日益增长的信心和日益增强的力量积蓄回归本土的力量，我们将不惜一切代价夺回我们的[concept_homeland]！"
 long_way_to_home_button:0 "准备开始归乡"
 long_way_to_home_button_desc:0 "本土的赤匪暴徒已经陷入了衰弱和内斗，我们必须组织起强大的力量，准备发动一场人类历史上史无前例的伟大登陆作战，把共产主义者赶出我们的家乡，夺回我们的母国！"
