 #英格兰工业化
 england_industrialize:0 "英格兰的工业革命"
 england_industrialize_reason:0 "#bold 数个世纪的殖民扩张和海外贸易#!为[ROOT.GetCountry.GetName]的财富积累做足了准备，当[SCOPE.sCountry('FRA_scope').GetName]还在把资金都用来维持费用浩大的[concept_army]和宫廷享乐而[SCOPE.sCountry('SPA_scope').GetName]则愚蠢地拿他们的财富购买廉价商品时，我们却在注重于生产建设的投资，并最终带来了如今这场#variable 轰轰烈烈的工业革命#!。\n\n#bold 1769年蒸汽机的问世#!解决了工业发展中的动力问题，从此以后，只要有[SCOPE.sGoods('coal_scope').GetName]作为燃料我们就可以开动蒸汽机；#bold 1825年史蒂芬森发明的铁路#!更是为全国[concept_market]的沟通提供了桥梁，因此无数的[concept_building]从任何合适的地方建立起来而不再受河流和运输的限制。[ROOT.GetCountry.GetName]丰富的[SCOPE.sGoods('coal_scope').GetName]储量更是为我们的工业化提供了蓬勃发展的契机，让我们那些高耸入云的烟囱喷出缕缕烟雾，庞大的厂房得以发出轰鸣，从此终结了中世纪以来传沿数百年的乡村田园。\n\n工业革命的迅猛发展正彻底的改变着英格兰的面貌，让我们加大一切可以推进产业发展的投资，将[ROOT.GetCountry.GetName]变成世界上第一个工业化的[concept_country]吧！"
 england_industrialize_status:0 "将英格兰转变成世界上首个工业区"
 scotland_industrialize:0 "苏格兰工业化"
 scotland_industrialize_reason:0 "进度条展示当前上克莱德河的#V 疏浚进度#!。\n\n#yellow 苏格兰#!是[ROOT.GetCountry.GetName]最重要的组成部分之一。然而，这里工业化的脚步却相比我们的许多其他地方都显得迟缓：尽管#B 格拉斯哥#!拥有着面向美洲的优越港口位置，并凭借着[SCOPE.sGoods('fabric_scope').GetName]和[SCOPE.sGoods('tobacco_scope').GetName]贸易一度形成了繁荣的经济中心，然而，进一步经济增长的障碍很快显现：#blue #B #L 克莱德河#!#!#!水浅，大型远洋船舶无法驶入，因此货物必须在格里诺克转运到小型船舶中。#B 高地和山谷的崎岖地形#!则阻碍了运输与商业的发展，这些都使得曾经繁荣的#yellow 苏格兰#!陷入了如今的衰落之中。\n\n[ROOT.GetCountry.GetName]所享有的繁荣与辉煌当然应该分享给北方的[GetCulture('scottish').GetName]兄弟们：我们的#v $engineers$#!提议对#blue #B #L 克莱德河#!#!#!进行大规模的疏浚，清除数百万立方英尺的堆积淤泥，并炸毁横亘在克莱德河口巨大的的#v 埃尔德斯利岩石#!，以加深和拓宽这条潜力非凡的河道，并进一步发掘苏格兰山谷中丰富的[SCOPE.sGoods('coal_scope').GetName]潜力。如果这些能够完成，#blue #B #L 克莱德河#!#!#!将很有机会成为#b 世界上最伟大的造船业与制造业中心之一#!。"
 finish_scotland_industrialize_tt:0 "完成了#V 苏格兰工业化#![concept_journal_entry]"
 scotland_industrialize_status:0 "将克莱德河口与资源丰富的苏格兰内陆转变成工业中心"
 scotland_industrialize_complete_tt:0 "成功#V 疏浚了上克莱德河#!，并已经执行了#V 宣布格里诺克-格拉斯哥航道通航#!"
 scotland_industrialize_1_button:0 "开始疏浚上克莱德河"
 scotland_industrialize_1_button_desc:0 "早在1768年我们的工程师就尝试过疏浚上克莱德河的沙洲与碎石，1769年詹姆斯·瓦特的报告则促使人们在当地建立起了一些防波堤，以阻断南侧航道，将邓巴克浅滩处分成两条的浅水航道合并，但事实证明，这些都不足以解决问题。\n\n然而这些难题在光明的今天，都已经不再是困难！技术的进步允许我们利用炸药和钢铁的力量迫使河流改道，摧毁阻拦在河道中的一切巨石和沙砾，加深整个河道，让自然俯首于[ROOT.GetCountry.GetAdjectiveNoFormatting]人的脚下：就让这项工程见证我们工业与科学的伟大力量吧！"
 scotland_industrialize_1_button_tt:0 "尚未执行#V 宣布格里诺克-格拉斯哥航道通航#!"
 scotland_industrialize_2_button:0 "宣布格里诺克-格拉斯哥航道通航"
 scotland_industrialize_2_button_desc:0 "格拉斯哥的工业正在蓬勃发展，就让我们乘着这个恰逢其时的好机会，宣布这项疏浚工程的伟大成功，并重新开放里诺克-格拉斯哥之间的克莱德河航道吧！毫无疑问，这将促使我们的造船巨头迅速落户这个拥有着良好条件的好地方：人造的全新克莱德河口！"
 scotland_industrialize_2_button_tt:0 "#V 疏浚进度#!达到了60"
 #第二轮重置内容
 rebuild_westminster:0 "重建议会所在地"
 rebuild_westminster_reason:0 "#V 1834年的大火#!吞噬了#B 旧威斯敏斯特宫#!的大部分建筑，只留下残破的墙垣与灰烬；不过，我们忠诚的议员们却仍然在临时大厅中进行辩论与立法。\n\n作为[ROOT.GetCountry.GetName]议会主权的象征，我们的议会可不能就这样一直寒酸下去：我们#B 必须重建一座足以匹配#yellow 不列颠尼亚#!正在享受的辉煌的新议会宫#!，根据#V 查尔斯·巴里爵士#!的设计，这座新的宫殿将采用最近流行的#V 哥特复兴式#!外观，屹立在泰晤士河畔。\n\n然而，这只是一个漫长工程的开端：#B 资金与时间的投入都将成为巨大的负担#!。但这对伟大的[ROOT.GetCountry.GetName]也不过是九牛一毛，难道不是吗？"
