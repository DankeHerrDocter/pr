 victorian_morality_reason:0 "[ROOT.GetCountry.GetRuler.GetFirstName]#yellow [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的加冕礼#!代表着[ROOT.GetCountry.GetName]的一个新繁荣纪元：然而尽管城市的扩张与工厂的轰鸣带来了[concept_wealth]的急剧增加，但#B 社会的不安与道德的动摇#!，以及#B 对我们国家传统的[concept_religion]伦理的背离#!也正在增加：\n\n#B #V 酗酒、赌博与卖淫#!滋生，工厂的烟雾中暴力与贫困不断累积，旧有的社会道德与家庭纽带在动摇#!。[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]的虔诚#v $clergymen$#!们认为，[ROOT.GetCountry.GetName]如今正在远离上帝的旨意。\n\n#V 索多玛式的罪恶#!不能继续累积，正如[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下是我们社会中#B 纯洁、端庄与家庭价值#!的典范一样，我们必须以她作为[ROOT.GetCountry.GetAdjective]社会的新标杆，确保公民们重新恢复那种古老的，上帝所规训的#V 节制，谦卑，正直与家庭责任感等公认的伟大美德#!。"
