 check_the_poor_law_act_reason:0 "[GetLawType('law_poor_laws').GetName]自颁布以来已成为全国争议的焦点，如今#B 来自街头与工厂的抗议声浪再也无法忽视#!：在这样的局势下，议院决定设立一支#V 特别委员会#!，对全国[GetLawType('law_poor_laws').GetName]的真实实施状况展开彻底的调查。\n\n委员们即将走入那些阴冷的院舍，查阅账册，听取[concept_lower_strata]的证词；他们要面对的将是#B 贫穷、疾病与沉默的墙壁#!——尽管结论并不确定，但可以肯定的是，#B 这一调查将决定[GetLawType('law_poor_laws').GetName]的未来#!：而被置于放大镜下的它还能承受多久呢？"
