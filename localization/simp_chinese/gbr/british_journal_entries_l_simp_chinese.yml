 developing_upper_canada:0 "开发安大略"
 developing_upper_canada_reason:0 "[SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName]是我们有价值的加拿大领地之一：#B 它地广人稀，湖泊纵横，森林与农田延绵无尽；它拥有着大片尚未被开垦的土地；它拥有着丰富的资源和林场#!；然而，[concept_reinvestment]和[concept_migration]的缺乏却仍然在阻止我们对当地进行有效的开发。\n\n#I [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府#!应该投入更多的资源和精力在[SCOPE.sState('developing_upper_canada_scope').GetStateRegion.GetName]的建设上：我们需要鼓励#v $farmers$#!与#v $laborers$#!来到这里安家立业，兴办农场与工厂，修筑可靠的基础设施，将这里转化成#V 北美的明珠#!。"
 pacification_of_canada_goal:0 ""
