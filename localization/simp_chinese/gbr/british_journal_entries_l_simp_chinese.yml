 appeasing_the_aborigine_reason:0 "在#yellow 澳大利亚#!广袤的内陆与边境地区，[SCOPE.sCulture('australian_scope').GetName][concept_migration]与#yellow 土著部落#!之间的冲突正在连续的发生：#B 土地的扩张与牧场的开辟#!迫使[SCOPE.sCulture('aborigine_scope').GetName]被迫迁徙，他们的反抗行动又引发更多的冲突与报复，致使#I [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府#!在当地的统治备受威胁。\n\n[ROOT.GetCountry.GetName]必须采取更多#B 切实的治理措施#!：#B 在必要时提供保护与救济，设立新的制度以限制暴力与混乱#!，并逐步使#yellow 土著社群#!#V 融入到我们的[SCOPE.sCulture('australian_scope').GetName][concept_culture]之中。#!"
 pacification_of_australia_pulse_tt:0 "推动#V 平定澳大利亚#![concept_journal_entry]进度1"
 develop_the_east_nsw:0 "开发东海岸"
 develop_the_east_nsw_reason:0 "#yellow 澳洲东海岸#!是自[ROOT.GetCountry.GetName]在南半球最早的立足点：自当初的流放地与港口建立以来，当地虽然已经在#O 麦考瑞#!和#O 布里斯班#!等#O 早期#![Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]的治理下建成了许多中等规模的城镇，但#B 大片的土地依然保持着荒芜，交通与港口设施相当落后#!，难以支撑我们治理当地所需的[concept_migration]和#yellow 行政力量#!。\n\n#I [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府#!应该继续实行历任[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]的政策，#B 繁荣当地的城镇，鼓励本土的#v $capitalists$#!与#v $aristocrats$#!在这里扎根发展#!，#V 将#yellow 澳洲东海岸#!转变为[ROOT.GetCountry.GetName]的新经济中枢#!。"
