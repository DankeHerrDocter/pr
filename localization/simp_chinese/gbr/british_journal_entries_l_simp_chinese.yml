 imperial_preference_saf_button:0 "与南非谈判"
 imperial_preference_saf_button_desc:0 "南非拥有着丰富的矿业资源，还提供了帝国一半的黄金；我们必须采取措施取得有利条件，确保我们的经济联系。"
