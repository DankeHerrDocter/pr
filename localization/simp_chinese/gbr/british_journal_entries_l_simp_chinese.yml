 conqueror_malaya_button:0 "施压马来苏丹国"
 conqueror_malaya_button_desc:0 "我们的军队正驻扎在当地，而这些弱小的苏丹们则完全无力抵抗；通过亲切友善的交流，相信我们能在不废除其王位的情况下，通过顾问实质上掌控当地政务与财政，为我们在马来亚的长远利益奠定基础。"
 conqueror_malaya_button_possible_tt:0 "#O 印度支那#![concept_hq]的任意[concept_army]拥有超过#variable 30#![Concept('concept_unit','$concept_units$')]"
 conqueror_malaya_button_effect_tt:0 "我们将以武力对马来亚的当地苏丹国施压，迫使他们接受我们派遣的顾问。"
 integrate_malaya_button:0 "统合海峡殖民地"
 integrate_malaya_button_desc:0 "#yellow 海峡殖民地#!的各个苏丹国四分五裂，并不利于我们进一步开发当地的矿产资源与保障航道安全。出于帝国在印度尼西亚利益的考虑，我们或许可以采取措施，劝说当地的苏丹国们放弃独立地位加入我们组建的联邦：通过确保他们家族的永久尊位。"
