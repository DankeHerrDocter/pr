 commonwealth_council_trade_button:0 "强化帝国贸易"
 commonwealth_council_trade_button_desc:0 "帝国特惠制是维持我们市场内部贸易畅通的重要法令，不过身为一个整体贸易上理应排除所有关卡。让我们出台更加利好于我们国内商业流通的政策吧。"
 commonwealth_council_health_button:0 "拨款公众服务"
 commonwealth_council_health_button_desc:0 "帝国各地的环境大相径庭，想要维持我们公民的健康和教育就必须花出一大笔钱在公共开支上。让我们为了人民的安全和受教育的权利而推进拨款吧。"
 commonwealth_council_army_button:0 "实施征兵动员"
 commonwealth_council_army_button_desc:0 "帝国正面临着一场可怕的战争，长久以来我们却忽视了帝国各地所能提供的士兵储备，让我们号召征兵，每个人必须尽到其对王权的责任！"
 commonwealth_council_migration_button:0 "增加治安支出"
 commonwealth_council_migration_button_desc:0 "帝国虽说是一个整体但鉴于各地的社会条件不同之处甚多，因此各个成员国的自治区内不同阶层的人群的治安情况也不同，甚至有的地区帮派业已颇为猖獗。我们必须治理这种威胁到人民安全的灾害。"
