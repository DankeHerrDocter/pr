 english_afternoon_tea:0 "下午茶文化"
 english_afternoon_tea_reason:0 "虽然[SCOPE.sCulture('han_scope').GetName]#yellow 人#!早在公元前就已经开始饮茶，但直到17世纪[ROOT.GetCountry.GetName]才开始流行喝茶，而这要归功于#B #V 查理二世国王#!和他的妻子——#yellow 葡萄牙#!公主凯瑟琳·德·布拉干萨#!。然而，对于那个时代的[ROOT.GetCountry.GetAdjectiveNoFlag]人来说，@tea!#V 茶叶#!仍然是富人的专属；不过随着我们[concept_market]的发展，自印度与远东运来的@tea!#V 茶叶#!使得它的[concept_market_price]已经下降了许多。\n\n许多#B 结束了一天辛勤劳作的，饥肠辘辘的#v $laborers$#!们#!需要补充能量，随之而来就不仅仅是#G 喝一杯茶#!，而是一顿更#G 丰盛的点心#!：无论是简单的#O 炸鱼薯条#!或者琳琅满目的#O 美味蛋糕#!和涂着#O 奶油果酱的司康饼#!，一壶#B 浓郁的，用来提振疲惫精神的@tea!#V 茶叶#!#!却总是必不可少的，且正在成为我们社会的风尚。\n\n@tea!#V 下午茶#!代表着我们在#B 精致的茶室里度过的美好时光#!，以及[ROOT.GetCountry.GetAdjectiveNoFlag]人独特的，#B 优雅舒适的生活方式#!：我们应该大力促进这一#V 绅士习俗#!的发展，并让它#V 成为我们#yellow 英式文明#!的象征典范#!。"
