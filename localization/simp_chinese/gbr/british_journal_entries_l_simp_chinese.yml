 joi_imperial_fortress_reason:0 "#B 远洋战舰的发展#!和世界上其他强权#B 好战性的日益增强#!正需求我们扩建一些真正具有战略价值的领地：例如[GetStateRegion('STATE_MALTA').GetName]，[GetStateRegion('STATE_CEYLON').GetName]，[GetStateRegion('STATE_MALAYA').GetName]，[GetStateRegion('STATE_BERMUDA').GetName]和[GetStateRegion('STATE_UPPER_ANDALUSIA').GetName]：这些地方严格意义上讲并非[concept_colony]，而是为支持[ROOT.GetCountry.GetName]统治而设立的帝国要塞、军事或海军基地。\n\n为了使[ROOT.GetCountry.GetName]的#V 全球海军#!在实践中无处不在，我们的政府必须为某些基地和煤炭补给站配备岸防设施。其中理应包括#V 马耳他、直布罗陀、新加坡、百慕大和科伦坡#!这些#B 价值非凡的帝国要塞#!。"
 joi_imperial_fortress_malta_tt:0 "在[GetStateRegion('STATE_MALTA').GetName]建立了至少5座$building_naval_fortification$，20座$building_arms_industry$和10座$building_artillery_foundry$与$building_munition_plant$。"
