 uk_parliament_westminster_1_button:0 "提请预算辩论"
 uk_parliament_westminster_1_button_desc:0 "每年的财政法案是议会最大的权利和义务之一。推动财政大臣尽快提交本财年的预算制定并依法交由议会表决，政府也可以更好的确保新财年的资金连续性。"
 uk_parliament_westminster_1_button_possible_tt:0 "#V 上次预算案已经失效#!"
 uk_parliament_westminster_1_button_effect_tt:0 "使用后，议会将立刻召开1次预算辩论。\n我们可以在休会结束后随时召开辩论，以选择新的预算案取代正在生效的预算。\n注意在颁布法案时顺从多数派的意志，否则将会导致议员们的反对！"
 uk_parliament_westminster_1_button_effect_2_tt:0 "预算案辩论将被暂停。"
 uk_parliament_westminster_1_button_2_possible_tt:0 "预算辩论处于暂停状态"
 uk_parliament_westminster_2_button:0 "召开紧急议会"
 uk_parliament_westminster_2_button_desc:0 "当国家面临突发的危机情况时，政府有权建议陛下召集一次特别会议：即便议会原本处于休会期，议员们也必须立刻返回威斯敏斯特，就政府的决议和法案进行表决和授权。"
 uk_parliament_westminster_2_button_effect_tt:0 "我们将会召集议会开始一场针对当前紧急局势的临时会议。"
 uk_parliament_westminster_2_button_possible_tt:0 "拥有#variable 经济危机#![concept_journal_entry]"
 uk_parliament_westminster_3_button:0 "动议不信任案"
 uk_parliament_westminster_3_button_desc:0 "很明显现任政府已经不足以化解这场正在迫在眉睫威胁国家的巨大危机：任何进一步的尝试都只是软弱的表现，我们需要更强有力的领导才能渡过即将到来的风暴，议会必须履行他们的责任！"
 gbr_event_48_a_tt:0 "#P 不信任动议失败了，现任政府将继续执政。#!"
 gbr_event_48_b_tt:0 "#R 不信任动议将获得通过，现任政府将被迫辞职！#!"
 uk_parliament_westminster_3_button_possible_tt:0 "#V #R 现任首相的[concept_popularity]低于-50#!#!"
 uk_parliament_westminster_3_button_effect_tt:0 "议会将会针对当前执政的首相和内阁发起不信任案投票；如果获得通过，首相将被迫下台。"
 uk_parliament_westminster_4_button:0 "提前解散议会"
 uk_parliament_westminster_4_button_desc:0 "日益加剧的危机恰恰是我们必须坚守初心的原因：无论出于什么原因，是试图延长执政还是想要从政府中解脱，我们都应该提前解散议会并召开大选，这样我们才能继续沿着近年来的航向前进。"
 uk_parliament_westminster_4_button_possible_tt:0 "#V 距离上次[concept_election]已经至少过去了2年#!"
 uk_parliament_westminster_4_button_effect_tt:0 "首相将建议陛下授权枢密院会议发布公告，解散现任议会并重新召开[concept_election]。"
 uk_parliament_westminster_5_button:0 "审议殖民政策"
 uk_parliament_westminster_5_button_desc:0 "我们的帝国幅员辽阔，其中还汇聚了无数其他国家羡慕的资源禀赋和优秀人才。然而领土的广大也增加我们治理和扩张的难度，议会必须正视这一点，并就殖民政策问题展开例行辩论。"
 uk_parliament_westminster_5_button_effect_tt:0 "内阁将向议会提交关于殖民事务的新法案，并要求议会立刻开始辩论。\n我们可以在休会结束后随时召开辩论，以选择新的法案取代正在生效的法案。"
