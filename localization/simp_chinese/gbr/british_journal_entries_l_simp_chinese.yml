 british_shipbuilding_industry_character:0 "不列颠的造船产业"
 british_shipbuilding_industry_character_reason:0 "自#B #L 1640年赏金法案#!#!颁布以来，[ROOT.GetCountry.GetName]对船只建造的规范与补贴就是我们进行#O 国际#![concept_trade]和扩张[concept_colonial_growth]的强大根基。随着#V 拿破仑战争#!的胜利，我们成功控制了[concept_colony]之间几乎#B 所有的班轮航线和贸易流量#!，使我们的商船队在#yellow 伟大的[concept_fleet]#!和#yellow 完善的[concept_tariffs]体系#!的庇护下不断发展。\n\n如今，[ROOT.GetCountry.GetName]已经发展出了#U #B 世界上最完备的造船工业#!#!：#V 我们的#yellow 造船工业#!规模庞大#!，体系完备，拥有着一大批技术熟练的工匠；我们的经济体量无可撼动，足以提供造船所需的一切材料和需求；我们的海运带来了丰富的利润，为造船厂们提供了源源不断的需求；我们拥有着先进的技术，做的更好更坚固效率也更高，生产了#B 全世界最优质的船只#!：这一切都使得[ROOT.GetCountry.GetName]成为了如今#yellow 世界造船业#!的#O 头号强国#!。\n\n尽管许多我们的省份对#yellow 造船业#!的过度依赖使得资本与人力被集中在船坞与港口，导致了许多新兴产业发展变得艰难，但我们伟大的#B #U 造船产业#!#!仍然象征着[SCOPE.sCulture('british_scope').GetName]民族#B 自海而生的光荣传统#!，更是我们#G 海上强权#!#V 地位的有力保障。#!"
 #功利主义
