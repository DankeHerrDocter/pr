 conqueror_niger:0 "统治尼日尔"
 conqueror_niger_reason:0 "自#V 1807年禁止奴隶贸易法案#!以来，[ROOT.GetCountry.GetName]最引以为傲的#U 皇家海军#!就在西非沿岸建立了海军巡逻以打击非法奴隶贩运。如今，尼日尔周边的商路已经逐渐转向棕榈油、花生与可可等商品，然而这种财富却不断引发地方军阀与宗教酋长的[concept_civil_war]。\n\n#V 尼日尔河三角洲#!不仅盛产棕榈油与橡胶，更是#B 通往西非腹地与萨赫勒的必经要道#!；若不能建立起有序的行政与关税制度，[ROOT.GetCountry.GetAdjective]在此的投资与航运都将岌岌可危。\n\n混乱的局面无助于真正的商贸与文明的发展，尼日尔和当地的#yellow 索科托苏丹#!必须臣服在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的权力之下，才是确保#B 帝国在非洲的未来利益与当地土著获得开化的唯一途径。#!"
 conqueror_niger_tt:0 "处于我们治下的尼日尔省份将获得好处，效果如下："
 conqueror_ghana:0 "征服加纳"
 conqueror_ghana_reason:0 "自从#yellow 葡萄牙#!人在几百年前最先修建起海岸堡垒，黄金海岸就成为了欧洲诸国觊觎的目标：在#V 1824年的第一次英阿战争#!中，我们击败了#yellow 阿散蒂王国#!的军队，并逐步扩大了在黄金海岸的据点；如今，阿散蒂已经实际丧失了对沿海地区的控制。\n\n然而，单纯的贸易堡垒已不足以保障[ROOT.GetCountry.GetAdjective]的利益；黄金、象牙与可可的丰厚收益，以及海岸作为#B 通往西非腹地的门户#!的战略位置都正要求我们采取更为彻底的措施：#V [ROOT.GetCountry.GetName]必须将整个加纳收入囊中，并彻底结束土著和其他竞争对手的统治#!。"
 conqueror_ghana_tt:0 "处于我们治下的加纳省份将获得好处，效果如下："
 conqueror_ghana_button:0 "购买荷属加纳"
 conqueror_ghana_button_desc:0 "以埃尔米纳城堡为中心的荷属加纳是撒哈拉以南非洲最早的欧洲要塞，荷兰人通过这里获得了大量的贸易利润；不过如今随着我们在非洲势力的增长和荷兰人战略重心的转移，相信我们能够通过和平的谈判，以支付一笔费用和承认他们对亚齐的宣称为代价，让他们同意将该地转交给我们。"
 conqueror_malaya:0 "介入马来亚"
 conqueror_malaya_reason:0 "自#yellow 东印度公司#!通过与吉打苏丹的协定获得槟榔屿和#V 1824年英荷条约#!迫使[SCOPE.sCountry('NET_scope').GetName]退出马来半岛以来，马来半岛和文莱的苏丹国们尽管在名义上仍然独立，但其经济，内政与贸易关系实际上已深受内乱与派系争夺的困扰。\n\n当地丰富的锡矿与橡胶资源正在吸引着我们：如果[ROOT.GetCountry.GetName]能够以#B 调停纷争与维护商贸的理由介入其中#!并说服当地的苏丹们接受[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]仁慈的统治，我们就将在这个关键的海峡位置上获得更多的利益——#V 甚至是通过和平的方式。#!"
