 indian_major_railway:0 "跨次大陆铁路"
 indian_major_railway_reason:0 "#variable [concept_indian_subcontinent]#!，不过其面积广大而又地形崎岖，运输不便。若不能有效利用这里，那印度的财富就形同与无物。\n\n#variable 印度事务部#!已经向[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的[concept_government]和[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]提交了一份雄心勃勃的草案，计划建设一条#bold 沟通整个[concept_indian_subcontinent]的铁路#!：毫无疑问，尽管工程庞大，但如果建成，它就能为#bold 印度的运输提供巨大便利。#!"
 indian_major_railway_tt:0 "铁路的建成将对印度的经济产生巨大的利好..."
 indian_major_railway_status:0 "建造一条联通次大陆的铁路来为印度提供运输服务。"
 #英美特殊关系
 anglo_american_special_relationship:0 "英美特殊关系"
 anglo_american_special_relationship_status:0 "#bold #U 血浓于水的亲情是英美之间的纽带#!#!"
 anglo_american_special_relationship_reason:0 "自我们的十三殖民地独立而成为[SCOPE.sCountry('USA_scope').GetName]后，[ROOT.GetCountry.GetName]和[SCOPE.sCountry('USA_scope').GetName]就有着十分复杂的关系。尽管我们两国在过去曾经有着长期的各种的竞争，不过，通过#variable 英美同盟的伟大和解#!这些都已成为过去；如今我们在贸易，经济和学术上等领域有着紧密的合作，以此成就了我们之间如今亲切友好的特殊关系。\n\n然而，在这个多变的世界中，唯一可以信任的也只有#bold 这世上最亲近最可靠的亲情#!：那就是我们#bold 两国都拥有着同样的信仰，传承着同样的[concept_culture]，共享着同样的祖先，我们正是天然的盟友#!；我们两国人民之间有着非凡的思想和目标联合，这使我们的关系成为真正非凡的关系，因此，我们定将团结一心：\n\n我们之间的联系正如#bold 约瑟夫·泰勒#!将军所说：\n\n#variable 血浓于水！#!"
 has_usa_gbr_treaty:0 "我们两国已经签署了一份友善的俄勒冈条约。"
 anglo_investment_1_button:0 "增加对美投资"
 anglo_investment_1_button_desc:0 "[SCOPE.sCountry('USA_scope').GetName]已经证明自己是一片极具价值的土地，我们的实业家相信，如果拨出一部分资金投资当地，不仅可以帮助他们的经济发展，还在未来可以为[ROOT.GetCountry.GetName]创造许多的利益。"
 anglo_investment_1_button_tt:0 "2年内未对美投资或撤资\n这将提升25投资点"
 anglo_investment_2_button:0 "计划从美撤资"
 anglo_investment_2_button_desc:0 "一部分实业家并不相信[SCOPE.sCountry('USA_scope').GetName]的价值前景，他们正劝说政府，撤出在当地的一部分投资回笼国内，并宣称将资金用在真正有价值的[ROOT.GetCountry.GetName]的土地上才能创造稳定的利润。"
 anglo_investment_2_button_tt:0 "5年内未从美撤资或投资，并且拥有高于25的投资点\n这将降低25投资点"
 anglo_help_1_button:0 "请求美国工业援助"
 anglo_help_1_button_desc:0 "我们的工业遇到了一点点麻烦，而我们的盟友[SCOPE.sCountry('USA_scope').GetName]的工业情况则颇为良好。凭借着当地的资产，[ROOT.GetCountry.GetName]也正发挥着强大的影响力，相信游说一部分政要和实业家来拨出一部分工业援助给我们并非困难之事。"
 anglo_help_1_button_tt:0 "5年内未从美请求工业或军备援助，且拥有高于50的投资点\n这将降低50投资点"
 anglo_help_2_button:0 "请求美国军备援助"
 anglo_help_2_button_desc:0 "我们的军备生产并不能确保为当前的战争准备充足的物资，不过我们的盟友[SCOPE.sCountry('USA_scope').GetName]军备储量极为丰厚。他们已经承诺，[ROOT.GetCountry.GetName]只需要出售一部分在当地的资产来充抵费用，就可以租借相当数量的军备来应付战争。"
 anglo_help_2_button_tt:0 "5年内未从美请求军备或工业援助，且拥有高于50的投资点\n这将降低50投资点"
 anglo_help_3_button:0 "请求起草《租借法案》"
 anglo_help_3_button_desc:0 "战争已经到了最危急的时刻，我们的敌人正在战场上取得空前的优势，帝国岌岌可危——为了[ROOT.GetCountry.GetName]在战场上的胜利，哪怕牺牲全部的资产，也要寻求我们的亲密盟友：[SCOPE.sCountry('USA_scope').GetName]立刻起草帮助我们的租借法案！"
 anglo_help_3_button_tt:0 "《租借法案》可不是那么好出台的，25年内只能起草一次，并且拥有100投资点\n这将降低100投资点"
 anglo_american_special_relationship_tt:0 "对美投资将可以积累我们对他们的#bold 投资点#!，并在某些时刻为我们提供必要的帮助。\n若是时势不怎么良好，也可以立刻变卖当地资产来换取即刻的好处。\n如果我们的投资额度积累足够，我们将可以牺牲一些资产从美方换取足够的战争支持。"
 anglo_american_special_relationship_2_tt:0 "#bold 增加对美投资#!可以提升我们25点投资点。\n#bold 计划从美撤资#!则会降低我们25投资点。\n#bold 请求美国工业援助#!或#bold 请求美国军备援助#!均会降低我们50投资点。\n#bold 起草《租借法案》#!将消耗我们100投资点，并在提供强力支持的同时留下后遗症...\n当前投资点如日志进度条所示。"
 anglo_cash_1_button:0 "请求美国贷款"
 anglo_cash_1_button_desc:0 "我们的财政状况正捉襟见肘，为了保证政府预算的稳定，不至于陷入赤字之中，或许我们可以从我们的盟友手里获取一笔无需利率——甚至无需偿还的“贷款”...不过华尔街估计不会为此而感到高兴的。"
 anglo_cash_1_button_tt:0 "然而美国人不见得会同意就是了...\n5年只能请求一次贷款。"
 invest_in_us_1_tt:0 "#bold 获得25投资点#!"
 invest_in_us_2_tt:0 "#bold 失去25投资点#!"
 usa_refuse_relation:0 "我国将拒绝英国的好意，这将使英美双方失去重新建立#bold 英美特殊关系#!的可能！"
 usa_accpet_relation:0 "我国将接受英国的好意，这将为英美双方解锁#bold 英美特殊关系#!的特殊互动！"
 anglo_help_need_25_tt:0 "投资点至少为25"
 anglo_help_need_50_tt:0 "投资点至少为50"
 anglo_help_need_100_tt:0 "投资点至少为100"
 #皇家海军
 oak_loyal:0 "皇家海军"
 oak_loyal_status:0 "#V #U #B 海军事务大臣将通过海军事务委员会传令到海军部。#!#!#!"
 oak_loyal_reason:0 "#bold 海军经费#!的数额由多个#tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_advance 正面#!或#tooltippable;tooltip:[Country.GetTooltipTag],loyal_navy_tooltip_delete 负面#!条件决定。\n\n#U #B 皇家海军#!#!——[ROOT.GetCountry.GetName]的骄傲和赖以生存的第一道#variable “木墙”#!，自亨利七世创建皇家海军之始，就一直是我国军事建设中最重要的部分。在#bold 1805年的特拉法尔加海战#!中，#bold 纳尔逊中将#!击败了法西联合舰队，使皇家海军夺取了#variable 世界海军之桂冠#!，直到如今。\n\n#U #B 皇家海军#!#!拥有着悠久的光荣传统，以帝国绝大多数的军费预算换来了一支#V 庞大先进的舰队#!和一群#V 训练有素的水手#!，为[ROOT.GetCountry.GetName]的无与伦比立下了汗马功劳。皇家海军的指挥部分由#bold 海军委员会和海军部#!组成，接受#bold 海军事务大臣#!的领导，效忠于#bold [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府#!。\n\n维护这样一支伟大的[concept_fleet]并使她始终居于世界之巅峰绝非易事，随着时代的改变，#U #B 皇家海军#!#!也需要做出变革以应对虎视眈眈的对手们，并#b 确保我们在任何海洋都如同橡树一般坚挺#!，因为#variable 大英帝国的领土之疆只在喜马拉雅山！#!\n\n来吧，朋友们，为我们的荣耀欢庆吧，\n我们以荣耀之名召唤你，享受自由而非惨遭奴役；\n橡树之心，正如艨艟巨舰,\n英武海员，即为我等利剑,\n我们将永无止境地踏上征途，试问何人能比波涛之子更为恣意？！"
 oak_loyal_tt_1:0 "   伟大的舰队是我国立足世界的关键。\n皇家海军必须确保对世界各国绝对的海上优势。"
 oak_loyal_tt_2:0 "#bold 组织远海演习#!和#bold 命令寻机决战#!将花费25#bold 海军经费#!\n#bold 建造新主力舰#!和#bold 确保两强标准#!将花费100#bold 海军经费#!\n#bold 扩建皇家海军造船厂船坞#!将花费50#bold 海军经费#!\n#bold 出售皇家海军造船厂船坞#!将获得25#bold 海军经费#!。"
 oak_loyal_1_button:0 "组织远海演习"
 oak_loyal_1_button_desc:0 "一支精干的海军可不能长期呆在港口内，而是需要常常训练和出去巡航！为了保持我们舰队的组织度和战斗力，组织一场远海演习将极有帮助：不过究竟是在北海，大西洋，地中海抑或是印度洋和南海举行演习就有待决定了。"
 loyal_navy_1_tt:0 "总不能天天出去演习吧？5年只能进行1次远海演习。"
 oak_loyal_2_button:0 "命令寻机决战"
 oak_loyal_2_button_desc:0 "皇家海军的舰队规模庞大，而强大的主力舰更是数不胜数；然而舰队的优势是一回事，能够出海找到敌人的舰队再对敌人实施毁灭性的打击又是另一回事。我们的舰队现在的策略实在太过于保守，应该直接对海军部下令，制作一份详细的决战计划，派发到每个水兵和指挥官手中，找一个风和日丽的日子并搜查到敌军的位置之后，主力尽出和敌舰决战！"
 loyal_navy_2_tt:0 "舰队需要回港补给，下达寻机决战命令后的1年内不能重复下令。"
 oak_loyal_3_button:0 "建造新主力舰"
 oak_loyal_3_button_desc:0 "该让舰队里的落后船只进入博物馆了，皇家海军可不能靠着一堆老家伙和敌人打仗！我们优秀的水兵理应驾驭世界上最为先进的船只，命令白厅增加皇家海军的预算，在造船厂开建更多的新锐战舰吧，我们的海军元帅已经兴致勃勃地起好舰名了！"
 loyal_navy_3_tt:0 "皇家海军的战舰哪里有那么老旧？5年只能建造1次新主力舰。"
 oak_loyal_4_button:0 "确保两强标准"
 oak_loyal_4_button_desc:0 "在这个严峻的世界，海军才是我们最值得信赖的武器。根据议会的《海军防御法案》所提出的两强标准，皇家海军的数量应当始终超越世界二三海军之和；这个标准可不容易确保，只有全力运转我们的造船厂才可以！"
 loyal_navy_4_tt:0 "天天找议会要钱很烦的！老爷们5年只会听取1次法案标准的意见。"
 oak_loyal_5_button:0 "扩建皇家海军造船厂船坞"
 oak_loyal_5_button_desc:0 "皇家海军正处于扩充期，然而船坞并不足够：为了供应我们的海军建设，拨款给本土的造船厂扩建或许会更好。"
 loyal_navy_5_tt:0 "#yellow 阿姆斯特朗爵士-惠特沃斯公司#!将扩建其船坞，2年内不能对外出售。"
 oak_loyal_6_button:0 "出售皇家海军造船厂船坞"
 oak_loyal_6_button_desc:0 "当前的船坞未免也太多了，尽管以皇家海军的数量和需求也不需要这么多的造船厂：出售一部分会更好。"
 loyal_navy_6_tt:0 "#yellow 阿姆斯特朗爵士-惠特沃斯公司#!将出售其船坞，1年内不能重新扩建。"
 loyal_navy_tooltip_advance:0 "#bold 以下情况每个月会增加2海军经费#!：\n•#variable 处在战争中#!\n•#variable 拥有[GetLawType('law_professional_army').GetName]#!\n•#variable 拥有[GetLawType('law_mass_conscription').GetName]#!\n•#variable 拥有[GetLawType('law_monarchy').GetName]#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName][concept_approval]大于等于0#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]正在执政#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName][concept_clout]是[concept_powerful]#!"
 loyal_navy_tooltip_delete:0 "#bold 以下情况每个月会降低5海军经费#!：\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName][concept_approval]小于等于-5#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName][concept_clout]是[concept_marginalized]#!\n•#variable [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]未在执政#!\n•#variable 未拥有[GetLawType('law_monarchy').GetName]#!\n•#variable [concept_rank]小于[concept_great_power]#!"
 loyal_navy_earn_tt:0 "获得25#bold 海军经费#!"
 loyal_navy_50_tt:0 "失去50#bold 海军经费#!"
 loyal_navy_25_tt:0 "失去25#bold 海军经费#!"
 loyal_navy_100_tt:0 "失去100#bold 海军经费#!"
 loyal_navy_cash_tt_50:0 "需要50#bold 海军经费#!"
 loyal_navy_cash_tt_25:0 "需要25#bold 海军经费#!"
 loyal_navy_cash_tt_100:0 "需要100#bold 海军经费#!"
 #印度事务部
 indian_office:0 "印度事务部"
 indian_office_reason:0 "印度已经纳入[ROOT.GetCountry.GetName]的统治之中，一个由首相直接任命的#V 印度事务大臣#!所领导的印度事务部代替了过去加尔各答和德里[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]的职责，代表[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府统治[concept_indian_subcontinent]。\n\n根据#V 《印度事务法案》#!的规定，印度当地的行政管理被拆分为#bold 独立[concept_election]的土邦议会#!和#bold 受印度事务部辖制的忠诚可靠的本地官员#!统治，而他们则接受内阁秘书长的任命；通过这一措施，[ROOT.GetCountry.GetName]得以将次大陆的一切事务纳入#bold 伦敦的绝对管控#!之中，以更好地为帝国而服务：尽管这也意味着行政难度的极大增加，不过#B 白厅已经给予内阁以坚决的保证，将会对次大陆的事务付以最大的力量#!。\n\n#V 不论如何，敬可靠的政府代代相传吧！#!"
 indian_office_1_tt:0 "印度的管理是一个难题，无论采取和平的方式亦或是从实力地位出发，确保#bold 次大陆的稳定#!，并将一切危害扼杀于摇篮之中都是印度事务部的最大职责。"
 indian_office_2_tt:0 "#bold 增派行政官员#!和#bold 镇压异见分子#!都将提升10点印度稳定度。\n#bold 加征马哈瓦尔地税#!和#bold 加征黑斯廷斯盐税#!将降低20稳定度。\n当前稳定度如日志进度条所示。"
 indian_office_3_tt:0 "如果印度的#bold 稳定度#!降低到0，伦敦将不得不撤销《印度事务法案》，转而重新委任一名总督行使统治。"
 indian_office_1_button:0 "增派行政官员"
 indian_office_1_button_desc:0 "印度的管理部门缺乏行政官员，增派一些新加入的公务员前去可能会有帮助。"
 indian_office_1_button_tt:0 "增加100印度稳定度\n10年只能增派1次行政官员！"
 indian_office_2_button:0 "镇压异见分子"
 indian_office_2_button_desc:0 "印度的刁民中总是隐藏着反对帝国统治的敌人，不能犹豫了，必须出重拳！"
 indian_office_2_button_tt:0 "增加50印度稳定度\n5年只能镇压1次异见分子！"
 indian_office_2_button_effect_tt:0 "所有[concept_indian_subcontinent]的省份都将获得一个修正，效果展示如下："
 indian_office_3_button:0 "加征马哈瓦尔地税"
 indian_office_3_button_desc:0 "“马哈瓦尔”是指一个户名下的若干份土地，这种土地税是包税制废除后印度的主要税种。通过加征这种土地税，我们的财政可以得到改善。"
 indian_office_3_button_tt:0 "降低25印度稳定度\n5年只能加征1次马哈瓦尔地税！"
 indian_office_4_button:0 "加征黑斯廷斯盐税"
 indian_office_4_button_desc:0 "沃伦·黑斯廷斯是印度的第一任总督，他设置的盐税一直是印度最大的垄断收入来源。通过加征这种消费税，我们的财政可以得到改善。"
 indian_office_4_button_tt:0 "降低25印度稳定度\n5年只能加征1次黑斯廷斯盐税！"
 indian_office_5_button:0 "要求土邦议会征税"
 indian_office_5_button_desc:0 "土邦议会是印度当地人中权力者的代表，他们拥有着非同凡响的影响力。如果能劝说他们帮助代征部分税收，我们的征税工作将能够事半功倍。"
 indian_office_5_button_tt:0 "降低50印度稳定度\n10年只能要求1次土邦议会包税！"
 indian_office_6_button:0 "支持本地劳动力"
 indian_office_6_button_desc:0 "印度的劳动力丰富，但却不能很好的为我们的政府所用。我们应该进一步促进当地的劳动力发展，并提升他们所能接触到的工作和教育机会。"
 indian_office_6_button_tt:0 "降低50印度稳定度\n10年只能支持1次本地劳动力！"
 indian_rule_1_tt:0 "#bold 获得10印度稳定度#!"
 indian_rule_2_tt:0 "#bold 失去10印度稳定度#!"
 indian_minister_tt:0 "#bold 获得50印度稳定度#!\n印度事务大臣将加入内阁，小心不要让他的部门被撤销了！"
 indian_office_status:0 "#bold 印度事务大臣代表伦敦直接统治次大陆。#!"
 indian_office_need_20_tt:0 "印度稳定度至少为25"
 indian_office_need_50_tt:0 "印度稳定度至少为50"
 #英王陛下政府
 her_majestys_government:0 "英王陛下政府"
 her_majestys_government_reason:0 "#V #P #B 大不列颠及爱尔兰联合王国[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，加拿大，澳大利亚及其其他领地和领土的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，印度皇帝，基督教的守卫者，蒙上帝洪恩的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!#!#!#bold #V 是目前的君主。#!#!\n\n[ROOT.GetCountry.GetName]的[GetLawType('law_monarchy').GetName]历史源远流长，自#bold 公元871年#!#V 阿尔弗雷德大帝#!加冕为#I 英格兰国王#!以来历经众多王朝而延续至今。每任[Concept('concept_ruler','$RULER_TITLE_KING_TOOLTIP$')]一旦驾崩，其#yellow 推定[concept_heir]#!立刻即位成为下一任[Concept('concept_ruler','$RULER_TITLE_KING_TOOLTIP$')]，并举行加冕典礼。\n\n同时，我国的[GetLawType('law_monarchy').GetName]并非专制独裁，而是令人骄傲的古老的#yellow 立宪君主制#!：#V 《大宪章》#!确立了#O #B 威斯敏斯特#!#!在英格兰的地位，#bold 1689年光荣革命#!后的#variable 《权利法案》#!则树立了世界上第一部宪法，而#bold 《1701嗣位法令》#!则作为《权利法案》的补充制定了#B 权力分立的#yellow 议会主权#!#!原则，历代[Concept('concept_ruler','$RULER_TITLE_KING_TOOLTIP$')]也须同意该法案以即位。\n\n[GetLawType('law_monarchy').GetName]在[ROOT.GetCountry.GetName]不仅仅是#B 古老传统和光荣象征#!的代表，也是经年累月羁绊着[ROOT.GetCountry.GetAdjectiveNoFlag]人的枷锁：在局外人看来，我们背负着这种刻板的沉重而#B 矜持，克制，坚韧，高冷，自律#!；而我们只会将其一笑了之，因为真正的我们如同#V 迎风守望的橡树#!，#bold 在逆境中昂首阔步而永不退缩#!；这就是[GetLawType('law_monarchy').GetName]在[ROOT.GetCountry.GetName]所代表的一切：一种#U 英式的保守主义#!，和#U 斯多葛式的淡泊与坚韧#!，而这种精神则正是我们的骄傲与自豪，正如我们的格言所述：\n\n#I 天有上帝，我有权力！#!"
 her_majestys_government_status:0 "#V #I #B 伟大而光荣的体制#!#!#!"
 #英国的赛艇运动
 rowing_of_united_kingdom:0 "英格兰的航海运动"
 rowing_of_united_kingdom_reason:0 "自从最早记录有关航海的文献以来，#V 体育元素#!就一直存在。而在#bold 英格兰#!，#bold 牛津大学于1815年#!首次组织了一次碰撞比赛，而#bold 剑桥大学则于1827年#!首次举办了真正的航海大会。#B 牛津大学和剑桥大学之间的比赛#!首次#V 举办于1829年#!，这项有趣且高尚的运动迅速引起了广泛的欢迎，即使是在我国王室感兴趣的粉丝也大有人在：比如我们的[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下。\n\n不过令人遗憾的是，这项运动尚且缺乏充裕的资金和一个足够强大的赞助者和支持者来举办一项#bold 常驻的，国际的和规模庞大的运动会#!。如果能够在我们的土地上更多地普及轮船和帆船的拥有，那么或许我们的皇室就能出于自己的兴趣而成为这项运动的杰出赞助人，以帮助#V 推广航海运动#!到整个[ROOT.GetCountry.GetName]。"
 #帝国理事会
 commonwealth_council:0 "帝国理事会"
 commonwealth_council_reason:0 "进度条会显示当前#bold 主导理事会的帝国成员#!的议席数量。\n#bold 不列颠席位#!：#variable [ROOT.GetCountry.MakeScope.Var('eng_commonwealth_council').GetValue|0]#!；[concept_election]时由多个#tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_eng_tooltip_advance 条件#!改变。\n#bold 加拿大席位#!：#variable [ROOT.GetCountry.MakeScope.Var('can_commonwealth_council').GetValue|0]#!；[concept_election]时由多个#tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_can_tooltip_advance 条件#!改变。\n#bold 澳大利亚席位#!：#variable [ROOT.GetCountry.MakeScope.Var('ast_commonwealth_council').GetValue|0]#!；[concept_election]时由多个#tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ast_tooltip_advance 条件#!改变。\n#bold 爱尔兰席位#!：#variable [ROOT.GetCountry.MakeScope.Var('ire_commonwealth_council').GetValue|0]#!；[concept_election]时由多个#tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_ire_tooltip_advance 条件#!改变。\n#bold 南非席位#!：#variable [ROOT.GetCountry.MakeScope.Var('saf_commonwealth_council').GetValue|0]#!；[concept_election]时由多个#tooltippable;tooltip:[Country.GetTooltipTag],commonwealth_council_saf_tooltip_advance 条件#!改变。\n\n#variable 帝国理事会#!是[ROOT.GetCountry.GetName]治下各地#bold 英王陛下政府#!的象征，是整个帝国[concept_government]的#bold 最高立法和行政机构#!，其常驻国会帝国议会的驻地位于伦敦议会大厦的#bold 威斯敏斯特厅#!，紧邻着联合王国国会的所在地；其行政[concept_institution]帝国事务部则位于白厅大街的怀特霍尔宫。\n\n作为象征着帝国[concept_unification]的共同议会，帝国的#variable 五大常任理事国：大不列颠，加拿大，澳大利亚，爱尔兰和南非#!均依照#bold 《联合法案》#!的规定在议会中拥有#bold 最高不超过200席#!和#bold 最低不少于75席#!的议会席位，并每年依据帝国议会的[concept_election]结果任命负责帝国各个部门的[concept_government]大臣，地位高于各成员国的自治议会和地方行政，负责管辖所有帝国内的[concept_law]，[concept_diplomatic_action]，[concept_war]以及其他会影响整个联邦的事务。与此同时，代表着帝国各地的九名大法官也就职于#bold 圣詹姆斯宫的联邦最高法院#!，拥有#bold 帝国司法制度下的终审判决权#!。\n\n作为[ROOT.GetCountry.GetName]#variable 威斯敏斯特体制的民主象征#!，来自世界各地代表着各个联邦成员的议员和文官们满怀热忱地团结一致服务于帝国理事会的正常运转，并借此捍卫我们借以维系联邦而#bold 共同认可的自由理念。#!"
