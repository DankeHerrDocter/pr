 rn_naval_defence_act:0 "海军防御法案"
 rn_naval_defence_act_reason:0 "自#bold 特拉法尔加海战#!以来，[ROOT.GetCountry.GetName]一直凭借#U 皇家海军#!的优势稳居世界海上霸权的地位；然而时至今日，这份优势已开始遭受挑战：#B 以[SCOPE.sCountry('navy_size_scope').GetName]为首的新兴[concept_great_power]正大规模扩充海军，技术上也在取得进步#!，导致他们的[concept_fleet]的规模和战斗力都正在#B 逐渐接近我们的水平#!。\n\n我们必须确保#yellow 大英帝国#!赖以生存的#V 海上航线#!维持安全和自由：无论是印度洋的#O 商船队#!还是太平洋的[concept_colony]，它们都需要我们#B 不容置疑的制海权#!来保障；如果[ROOT.GetCountry.GetName]稍有松懈，敌人的[concept_fleet]便可能切断我们与海外领土的联系，使我们的本土瞬间陷入孤立。\n\n#O #B 威斯敏斯特#!#!已经批准了[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的要求，我们将拨付前所未有的资金，扩充我们的水手队伍和造船厂，确保#U 皇家海军#!的力量仍然无可匹敌。"
