 pacification_of_canada:0 "平定加拿大"
 pacification_of_canada_reason:0 "自[ROOT.GetCountry.GetName]重新收回#yellow 加拿大自治机构#!的权力以来，#I [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府#!的存在感已经在当地变得越来越强烈，然而形式上的整合并不意味着现实的安宁：许多#V 习惯了高度自治和独立的本地精英#!仍然在抱怨他们失去的特权，对[ROOT.GetCountry.GetName]的直接统治愤愤不平；而[SCOPE.sCulture('anglo_canadian_scope').GetName]与[SCOPE.sCulture('franco_canadian_scope').GetName]人民之间的隔阂也因为局势紧张而加深。\n\n维持#yellow 加拿大#!的秩序需要安定：我们必须#b 安抚当地的社群，重建统一的帝国制度#!，使这片广袤的北方领土重新回到[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的体制中，这样才能#V 巩固#yellow 大英帝国#!在北美的威望与权力#!。"
