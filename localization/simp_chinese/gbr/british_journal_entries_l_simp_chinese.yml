 imperial_preference_ast_button:0 "向澳大利亚让步"
 imperial_preference_ast_button_desc:0 "澳大利亚人对我们总是有着深厚的感情，他们就是我们的直系后裔：适当的对他们让步，允许他们的产品进入我们的市场就能强化我们之间的坚定感情。"
 imperial_preference_ast_button_possible_tt:0 "尚未与澳大利亚代表团达成协议"
 imperial_preference_raj_button:0 "与印度交涉"
 imperial_preference_raj_button_desc:0 "尽管印度不过是我们的殖民地，但他们在帝国中的位置仍然举足轻重。他们接受帝国其他地区生产的商品，又提供充足的原材料，我们需要采取措施确保我们之间的进出口关系仍然连接紧密，避免我们的脱钩；同时，也必须照顾印度人的经济利益。"
