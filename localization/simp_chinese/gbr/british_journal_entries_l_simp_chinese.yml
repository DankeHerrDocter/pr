 uk_parliament_westminster_reason:0 "#U #B 威斯敏斯特#!#!——这座古老的宫殿不仅是[ROOT.GetCountry.GetName]的政治心脏，更是我们#O 宪政传统#!与#O 议会主权#!的象征。自从#bold 1215年大宪章#!确立了#v $aristocrats$#!与君主之间的契约关系以来，#U #B 威斯敏斯特#!#!就逐渐成长为了[GetIdeology('ideology_british_conservatism').GetName]们[concept_ideology]的核心；在#bold 光荣革命#!与#bold 权利法案#!后这一制度更是被牢牢确立，使得[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的权力从此与#V 议会的同意#!不可分离，让#yellow 议会主权#!的理念成为了我们#B 伟大而光荣的#I 英王陛下政府#!#!的中心。\n\n今日的#U #B 威斯敏斯特#!#!不仅仅是一座宫殿，它代表着#V 我们人民的同意#!和#V 议会治理的传统#!：上议院中#v $aristocrats$#!与#v $clergymen$#!们的代表与下议院中#v $clerks$#!，#v $shopkeepers$#!和#v $capitalists$#!的代表们在此齐聚，作为[ROOT.GetCountry.GetName]的最高立法与司法机构，从最古老的庄园到最繁华的城镇，每一位代表人民们权益的议员们都在此发声，使现任[concept_government]得以在辩论与妥协中运转。\n\n#yellow #B 议会主权#!#!不仅是制度上的条文，更是全体[ROOT.GetCountry.GetAdjective]人心中的信念：任何[concept_law]都必须在此被讨论、表决与通过，任何权力都必须在此获得正当性；无论是[concept_taxes]、[concept_war]还是[concept_colony]的治理，#U #B 威斯敏斯特#!#!就是我们民主传统的最佳代表。\n\n#U #B 威斯敏斯特#!#!就是我们#yellow [SCOPE.sCulture('british_scope').GetName]式的生活方式#!得以存在与延续的根基，一个我们在这动荡世界中#B 最值得骄傲的机构信条#!：#V 愿上帝保佑我们的士兵和水手，还有我们的议员和[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]！#!"
