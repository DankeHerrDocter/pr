 #历史法案
 elementary_education_1870_act:0 "英国的义务教育"
 elementary_education_1870_act_reason:0 "自#V 启蒙运动#!以来，理性与知识便被视为文明的根基。然而在[ROOT.GetCountry.GetName]，#B 教育仍然只属于少数有钱人或贵族的子女#!，大多数[concept_pop]的孩子们无法接受#B 最基本的识字与算术训练#!，他们的人生被#V 无知与贫困#!所困住。\n\n随着工业化与城市化的推进，社会对受过教育的工人和公民的需求正与日俱增：#V 一个目不识丁的国民无法理解法律、无法参与市场、更无法保卫祖国#!；在这样的背景下，呼吁建立#B 全国性的教育制度#!的声音正日益强烈：\n\n[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府必须回应这一诉求，#V 让每一个孩子都能接受基本的教育#!。"
 poor_law_act:0 "济贫法"
 poor_law_act_reason:0 "自#V #tooltippable;tooltip:[GetPlayer.GetTooltipTag],poor_law_act_modifier_effects_tt $poor_law_act_je_modifier$#!#!颁布以来，[ROOT.GetCountry.GetName]的[GetLawType('law_poor_laws').GetName]制度就一直建立在[GetIdeology('ideology_malthusian').GetName]的思想之上：贫困者必须进入这些#B 如同监狱一般的收容所#!，在最严格的条件下才能换取一份#B 勉强维生的救济#!；尽管它确实成功遏制了懒惰与依赖，然而这一#V 非人道的制度#!却也已使它成为了[ROOT.GetCountry.GetAdjective]最受憎恨的法案。\n\n实际上，我们#B 贫困的公民们#!正在#R 济贫院#!里失去尊严，#V 他们的家庭被拆散，本人则被当作囚犯看管#!。然而改革却并不容易：国家财政已经捉襟见肘，若要废除[GetLawType('law_poor_laws').GetName]并建立新的#G 福利制度#!就必然需要更多的[concept_money]投入；不仅如此，[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]的反对情绪也会成为一道#B 巨大的障碍#!。\n\n#B 或许[GetLawType('law_poor_laws').GetName]已经不合时宜，又或者它实际上才是[ROOT.GetCountry.GetName]真正的需求？#!"
