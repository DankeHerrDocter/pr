 solving_quebec:0 "解决魁北克"
 solving_quebec_reason:0 "魁北克原本是[SCOPE.sCountry('FRA_scope').GetName]的殖民地，因此当地拥有着庞大的[SCOPE.sCulture('franco_canadian_scope').GetName]社群。\n\n然而，[SCOPE.sCulture('anglo_canadian_scope').GetName]与[SCOPE.sCulture('franco_canadian_scope').GetName]人激化的的矛盾正在瓦解我们在#yellow 加拿大#!的权威，我们#B 不能允许魁北克的异见人士进一步扰乱加拿大，是时候采取措施恢复和平了！#!"
