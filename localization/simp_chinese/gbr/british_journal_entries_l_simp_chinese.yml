 workmen_compensation_1897_act:0 "呼吁劳动法"
 workmen_compensation_1897_act_reason:0 "在[ROOT.GetCountry.GetName]工作的工人已经受够了#R 他们所处的恶劣条件#!：他们#B 从清晨到深夜被迫留在轰鸣的机器旁，空气中弥漫着煤烟与铁屑，几乎无法呼吸；矿井深处常年潮湿、昏暗，塌方与爆炸夺走了许多#v $laborers$#!的生命#!；工人们得不到休息，得不到保护，他们的生活#V 被疲惫、危险与疾病所吞噬#!。\n\n#v $laborers$#!们宣称我们的[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]正掌握着控制[concept_government]的权力，将他们的打劫行径合法化，而#B 这些工作最努力、生产最多的工人获得的酬劳却最少#!：因此，他们与[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]合作，在[ROOT.GetCountry.GetName]发起了全行业的#V 罢工运动#!。\n\n[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府必须与[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName][concept_leader]进行深入的讨论，采取措施#V 尽快结束这一正严重影响到[ROOT.GetCountry.GetAdjective]经济增长的[concept_political_movement]#!。"
