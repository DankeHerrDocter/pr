 joi_imperial_fortress_malta_button:0 "向马耳他增派后勤人员"
 joi_imperial_fortress_malta_button_desc:0 "马耳他地处地中海中部，地理位置优越，是我们经埃及和苏伊士运河通往印度和远东的生命线上的重要中转站。加强其防御工事的投入绝非浪费。"
 joi_imperial_fortress_malta_button_tt:0 "我们将从本土的#B 军事设施#!中随机抽调最低不少于100k，最多不高于250k的[concept_pop]前往该要塞以补充当地的军事需求。"
 joi_imperial_fortress_malaya_button:0 "向新加坡增派后勤人员"
 joi_imperial_fortress_malaya_button_desc:0 "新加坡作为我们所有东方殖民地的关键，对帝国而言至关重要，因为如果任何拥有海上实力的敌人占领了它，我们的贸易将受到极大的干扰，甚至可能彻底摧毁：新加坡必须保持坚不可摧，直到主力舰队抵达并彻底击败敌人。"
 joi_imperial_fortress_ceylon_button:0 "向科伦坡增派后勤人员"
 joi_imperial_fortress_ceylon_button_desc:0 "科伦坡的海军基地为我们军队在印度洋的行动提供了可靠的支持，失去这一地区将是灾难性的。我们必须大幅扩建锡兰岛上的设施，并采取措施加强其防御。"
 joi_imperial_fortress_bermuda_button:0 "向百慕大增派后勤人员"
 joi_imperial_fortress_bermuda_button_desc:0 "北美和西印度群岛舰队的巡逻区域广阔，包括北大西洋、西印度群岛和南大西洋——从加拉帕戈斯群岛到德雷克海峡。我们必须在百慕大积蓄力量，以便在必要时能够容纳作战部队。"
 joi_imperial_fortress_gibraltar_button:0 "向直布罗陀增派后勤人员"
 joi_imperial_fortress_gibraltar_button_desc:0 "直布罗陀不仅控制着地中海的入口，还拥有一个防御严密的港口，船舶可由此在大西洋和地中海航行。因此，加强对该港口的防御至关重要。"
 joi_imperial_fortress_status:0 "加强我们全球帝国关键战略节点的军事设施"
