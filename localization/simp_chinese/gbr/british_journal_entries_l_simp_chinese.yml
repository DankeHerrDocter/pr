 uk_parliament_westminster_6_button_desc:0 "战争的阴云正笼罩着不列颠群岛和整个大英帝国：时间至关重要，我们不能坐视对手做好准备来烧毁我们的家园，政府必须立刻改组，化解党派和领地之间的矛盾，确保我们在战争时期的强大领导力。"
