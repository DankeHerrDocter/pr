 annex_malaya_button_desc:0 "#yellow 文莱苏丹国#!的势力正在衰弱，不过我们仍然可以与他们建立良好的关系：如果我们能够提供足够的财政援助与确保苏丹王位的延续，或许就能劝说他们加入劝说其接受并入海峡联邦，以便于更有效的利用文莱的港口与资源。"
