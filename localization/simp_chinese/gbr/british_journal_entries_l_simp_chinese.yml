l_simp_chinese:
 dlc_vc:0 "Victorian Century"
 dlc_vc_desc:0 "维多利亚女王的加冕礼标志着一个伟大的辉煌时代的开始：在不列颠治世的耀眼光辉之下，第一次工业革命进入尾声，带来了城市发展的空前繁荣。在欧洲大陆，著名的奥地利首相梅特涅一手构筑了维也纳体系，联合各国组成了旧秩序的堡垒，阻挡着革命的洪流。\n拿破仑战争带来的苦难已经结束，列强的妥协为多灾多难的欧洲大陆带来了短暂的和平；然而，尽管革命之火暂时熄灭，民族主义和自由主义的理念仍然生机勃勃，在这个科技空前发展的时代，人们将怀疑先祖们世世代代坚信不疑的事物，并开创崭新的信条。\n\n@green_checkmark!维多利亚世纪#G 已启用#!\n\n@information!这是一个启用的#blue 模组#!\n\n@aristocrats!QQ群：@censored!1030099762@censored!\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"
 MDF_MOD_DLC_BUTTON_TOOLTIP:0 "#V Victorian Century#!\n维多利亚女王的加冕礼标志着一个伟大的辉煌时代的开始：在不列颠治世的耀眼光辉之下，第一次工业革命进入尾声，带来了城市发展的空前繁荣。在欧洲大陆，著名的奥地利首相梅特涅一手构筑了维也纳体系，联合各国组成了旧秩序的堡垒，阻挡着革命的洪流。\n拿破仑战争带来的苦难已经结束，列强的妥协为多灾多难的欧洲大陆带来了短暂的和平；然而，尽管革命之火暂时熄灭，民族主义和自由主义的理念仍然生机勃勃，在这个科技空前发展的时代，人们将怀疑先祖们世世代代坚信不疑的事物，并开创崭新的信条。\n\n@green_checkmark!维多利亚世纪#G 已启用#!\n\n@information!这是一个启用的#blue 模组#!\n\n@aristocrats!QQ群：@censored!1030099762@censored!\n@capitalists!Discord: @censored!https://discord.gg/eVUzJNnHst@censored!"
 #统治吧！不列颠尼亚（英国起始日志）
 stabilize_british_empire:0 "统治吧！不列颠尼亚！"
 stabilize_british_empire_reason:0 "自#variable 1815年的维也纳会议#!以来，[ROOT.GetCountry.GetName]就蓬勃地在世界各地发展着她的力量，到目前，她毫无疑问已经是世界上#V 最庞大的帝国#!：#B 她的权力和影响遍及全球，以各种方式塑造帝国所需要的#yellow 世界秩序#!#!。\n\n在这#bold 不列颠治世#!的耀眼光辉之下，我们昔日强大一时的对手，从[SCOPE.sCountry('FRA_scope').GetName]到[SCOPE.sCountry('SPA_scope').GetName]抑或是[SCOPE.sCountry('NET_scope').GetName]，都被衬托得暗淡无光，纷纷屈从于我们#bold 永不落下的太阳#!之下。即便帝国的治下仍旧有着黑暗和肮脏，但这又如何呢？#bold 即便是伦敦东区最贫穷的#v $laborers$#!，一想到[ROOT.GetCountry.GetName]的财富和工业，也会不由自主地挺起胸膛#!；整个世界被以我们为主导的[concept_market]紧密联系在一起，从#bold 北美的平原到中国的茶园#!，从#bold 加勒比的咖啡田到澳大利亚的矿场#!，#V 我们的财富和荣耀正支配着#bold 这个时代的一切#!#!。\n\n但这并不代表着我们可以在这样光荣的地位上沾沾自喜而止步不进，为了保卫现有的[concept_colony]和边界，#bold 开拓新的领地正成为必要#!；目前的#yellow 大英帝国#!仍然是一个复杂的，由[concept_colony]和[concept_company]组成的动态集合，既没有对帝国前途的定论，也无法确保我们在[concept_dominion]的地位；为了面对这些问题，诉诸武力和外交来#V 稳定帝国的统治地位正被广泛呼吁#!。\n\n我们以各种方式获得对世界大片土地和人口的权力，这也意味着我们必须践行他们所带来的治理和保护的责任；#variable 统治吧！不列颠尼亚！#!"
 stabilize_british_empire_complete_1_tt:0 "与至少5个加拿大[concept_subject]的[concept_relations]至少50\n若当地附属数量不满足条件，该项将无法完成！"
 stabilize_british_empire_complete_2_tt:0 "与至少3个澳大利亚[concept_subject]的[concept_relations]至少50\n若当地附属数量不满足条件，该项将无法完成！"
 stabilize_british_empire_complete_5_tt:0 "与至少1个南非[concept_subject]的[concept_relations]至少50\n若当地附属数量不满足条件，该项将无法完成！"
 stabilize_british_empire_complete_3_tt:0 "与印度的#bold 殖民领或特许公司#![concept_subject]的[concept_relations]至少50"
 stabilize_british_empire_complete_3_india_tt:0 "整个[concept_indian_subcontinent]全部属于你或你的#bold 土邦[concept_subject]#!。"
 stabilize_british_empire_complete_4_tt:0 "完成了三项#variable 统一次大陆#![concept_journal_entry]"
 stabilize_british_empire_on_complete_tt:0 "这将在伦敦召开帝国会议讨论帝国体制的未来。"
 stabilize_british_empire_on_complete_2_tt:0 "你和你的每个[GetCulture('british').GetName]，[GetCulture('anglo_canadian').GetName]，[GetCulture('franco_canadian').GetName]，[GetCulture('australian').GetName]和[GetCulture('boer').GetName]的[concept_subject]都将获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!修正。"
 stabilize_british_empire_modifier_effects_tt:0 "[GetStaticModifier('gbr_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('gbr_achievement_of_the_empire').GetDesc]"
 stabilize_british_empire_status:0 "#bold 确保大英帝国治下的安全与稳定#!"
 choose_british_empire_act_event_1_tt:0 "我们将选择帝国联邦方案作为大英帝国未来的方向"
 choose_british_empire_act_event_2_tt:0 "我们将选择帝国自治方案作为大英帝国未来的方向"
 #大英帝国三征服
 conqueror_burma:0 "统一次大陆：征服缅甸"
 conqueror_burma_reason:0 "“问题不在于你们将割让给我们多少，而在于我们将归还给你们多少...我们将通知你们全国的土人，以前由你们的君主统治的领土将不再受他的统治，而是成为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下领土的一部分，并且在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下乐意的情况下，负责统治你们的[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]和官员将由我们全权任命...而你们除了接受，别无他法。”\n\n在#bold 1826年的《杨达波条约》#!之后，[SCOPE.sCountry('BUR_scope').GetName]割让了阿拉干地区，后者则被划归#yellow 东印度公司#!管治。\n\n然而，对[SCOPE.sCountry('BUR_scope').GetName]的征服尚未完成，我们有必要将缅甸的全部领土纳入统治之中，以#V 保证[ROOT.GetCountry.GetName]在印度支那的利益#!。"
 gbr_burma_disappear_tt:0 "#yellow 缅甸#!是我们的[concept_subject]。"
 conqueror_punjab:0 "统一次大陆：征服河谷"
 conqueror_punjab_reason:0 "自我们在#variable 1803年的马拉塔战争#!中将印度边境推进到#bold 印度河谷#!已经过去了许久，在这段时间里恒河流域的富饶为我们带来了许多财富。印度河谷环境浑然天成，可谓是#bold 次大陆的粮仓#!。\n\n占据着那里的[SCOPE.sCountry('PAN_scope').GetName]虽然拥有着规模庞大的军队，但却缺乏训练。不仅如此，有消息称他们的大君已经垂垂老矣，宫廷斗争正愈演愈烈；而[SCOPE.sCountry('SND_scope').GetName]则虚弱不堪，脱离了强权保护的他们#bold 根本不值一提#!。\n\n这正是派出我们的军队入主印度河谷的好时机，让我们吹起进军西尔欣德的号角吧！"
 gbr_punjab_disappear_tt:0 "#yellow 卡尔萨帝国#!和#yellow 信德#!是我们的[concept_subject]。"
 british_empire_conqueror_punjab_button:0 "在旁遮普山执行无嗣失权"
 british_empire_conqueror_punjab_button_desc:0 "我们计划在旁遮普山的边境建立起可靠的机构来确保德里与旁遮普的持续联系。因此当地的土邦毫无疑问非常碍事，然而他们距离其他土邦颇为遥远，我们或许可以直接派遣专员宣布剥夺他们的领地。"
 conqueror_baluchistan:0 "统一次大陆：阿富汗边界"
 conqueror_baluchistan_reason:0 "#bold 俾路支斯坦#!贫穷的山地对[ROOT.GetCountry.GetName]的经济利益殊无好处，不过却不能无视这里位居#bold 印度大门的战略价值#!。有传言称#variable 阿富汗#!的苏丹们正计划着将俾路支所谓#variable “杜兰尼帝国”#!的旧土收复入他们的领土，我们绝不能将这里拱手让人，必须迫使卡拉特的大汗屈服于我们的力量之下！"
 gbr_baluchistan_disappear_tt:0 "卡拉特和莫克兰均不存在。"
 #帝国联邦
 british_empire:0 "帝国联邦"
 british_empire_reason:0 "连接着[ROOT.GetCountry.GetName]在世界各地的领土的不仅仅是对地理的征服，更是共同#variable [concept_culture]和[concept_religion]的纽带#!。然而，虽然不可否认的是我们伟大国家的潜力巨大，但事实上，[ROOT.GetCountry.GetName]的机会在很大程度上却被当前#bold 分散的帝国体制#!浪费了：#yellow 本土和海外领地#!在政治和宪法上没有团结，没有共同政策，没有商定的中央方向，也没有#bold 永久的约束力#!。\n\n这样的情况不能再持续下去了，随着世界上其他[concept_great_power]开始追逐[ROOT.GetCountry.GetName]的脚步以及各个[concept_dominion]中出现的新的#bold 令人担忧的民族身份#!，我们必须将#yellow 大英帝国#!的全部力量统合到一起来确保我们的地位：尽管统治这样一个庞大的帝国将产生许多困难，但[concept_technology]的进步却为我们构建这样一个横跨全球的超级国家创造了可能；\n\n#V 帝国联邦#!将成为大英帝国的一个新替代方案：联邦[concept_government]将拥有一个共同议会并作为一个共同整体进行治理，世界各地的帝国省份仍然允许拥有自己的议会，借此来维持帝国的统一，而#O 威斯敏斯特#!将成为一个纯粹的帝国[concept_institution]。\n\n由全球领地组成而建立的拥有#bold 共同认同的帝国联邦#!才能够在全球事务中继续保持长期的霸权地位并维持帝国的紧密联系，#variable 统治吧不列颠尼亚！#!"
 british_empire_possible_tt:0 "#bold 在帝国议会中选择了帝国联邦方案#!"
 rise_of_empire_tt:0 "完成4项#variable 大英帝国#![concept_journal_entry]"
 rise_of_empire_2_tt:0 "我们将统合旗下的各大殖民地而成为一个整体，建立真正统一的帝国联邦。"
 rise_of_empire_3_tt:0 "你和你所有[concept_subject]如拥有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!修正，则其都将升级为#tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_modifier_effects_tt $imp_achievement_of_the_empire$#!。"
 rise_of_empire_modifier_effects_tt:0 "[GetStaticModifier('imp_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('imp_achievement_of_the_empire').GetDesc]"
 rise_of_empire_4_tt:0 "你和你所有[concept_subject]如拥有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],stabilize_british_empire_modifier_effects_tt $gbr_achievement_of_the_empire$#!修正，则其都将升级为#tooltippable;tooltip:[GetPlayer.GetTooltipTag],rise_of_empire_2_modifier_effects_tt $wsm_achievement_of_the_empire$#!。"
 rise_of_empire_2_modifier_effects_tt:0 "[GetStaticModifier('wsm_achievement_of_the_empire').GetName|v]\n[GetStaticModifier('wsm_achievement_of_the_empire').GetDesc]"
 rise_of_dominition_tt:0 "若我们不能在殖民地的自治权膨胀之前统一帝国，则我们将不得不授予他们更大的特权。"
 british_empire_status:0 "#V #O #B 将大英帝国拥有的所有海外领地统一为服从伦敦的整体#!#!#!"
 allow_to_form_imp_tt:0 "#bold 我们将被允许成立帝国联邦#!"
 british_empire_complete_2_tt:0 "成功完成了#variable 爱尔兰的地位问题#![concept_journal_entry]"
 #帝国自治
 british_dominion_act:0 "帝国自治"
 british_dominion_act_reason:0 "#variable 使大英帝国成为如此强大#!的从来不是地理上的管辖，而是我们#variable 帝国的文明，冒险和力量#!。我们的帝国由#bold 多元化的领地#!所构成，她共同的[concept_culture]纽带才是我们团结的标志。然而，虽然帝国的疆域在多年的扩张中达到了空前的辉煌，我们#bold 内部的管理体制#!却存在巨大的混乱：#yellow 加拿大#!被切分成许多完全不同的省份，#yellow 澳大利亚#!由当地行政#v $bureaucrats$#!的意志胡乱摆布，#yellow 南非#!对帝国的统治心不在焉，而#yellow 东印度公司#!对次大陆的统治则越发虚弱无力，这每一点都在构成#bold 足以影响到帝国的危机#!。\n\n这样的情况不能再持续下去了，随着世界上其他[concept_great_power]开始追逐[ROOT.GetCountry.GetName]的脚步以及各个[concept_colony]中出现的新的#bold 民族身份的认同#!，我们必须设计出全新的帝国体制以确保我们足以付出最小的代价从我们的帝国中获得最大的收益。\n\n#V 帝国自治#!将成为#yellow 大英帝国#!的一个替代方案：原本被割裂开来的[concept_colony]将被整合为新的统一的联邦[concept_dominion]，他们将接受帝国的领导而成为一个个自治的[concept_country]，享受帝国[concept_market]的好处也为我们的工业带来资源；他们#b 将自己负责自己的防务，组织自己的军队，保证在[concept_war]到来时为我们提供最有力的支持#!。\n\n只有真正#bold 自由的人民#!才能发挥出最大的力量，因此我们才需要顺应自治的呼吁而塑造#bold 共同的帝国认同#!而使我们一起在全球地位中占据领导位置；#variable 统治吧不列颠尼亚！#!"
 british_dominion_act_possible_tt:0 "#bold 在帝国议会中选择了帝国自治方案#!"
 british_dominion_act_complete_tt:0 "完成4项#variable 自治法案#![concept_journal_entry]"
 british_dominion_act_on_complete_tt:0 "属于帝国的自治领将以新的身份和我国建立更紧密的联系"
 british_dominion_act_complete_2_tt:0 "结束了#variable 爱尔兰的地位问题#![concept_journal_entry]"
 british_dominion_act_status:0 "#V #U #B 将大英帝国拥有的所有海外领地整合为帝国体制下的自治领#!#!#!"
 british_dominion_act_complete_3_tt:0 "#bold 加拿大，澳大利亚，南非#!都存在且已经统一"
 british_dominion_country_unify_1_tt:0 "加拿大已经成立且存在"
 british_dominion_country_unify_2_tt:0 "澳大利亚已经成立且存在"
 british_dominion_country_unify_3_tt:0 "南非已经成立且存在"
 #加拿大自治
 british_dominion_canada:0 "自治法案：加拿大联邦"
 british_dominion_canada_reason:0 "自#V 汉弗莱爵士在纽芬兰建立圣约翰斯#!以来#yellow 加拿大#!就是[ROOT.GetCountry.GetName]历史最悠久的海外领地，而根据#V 1791加拿大宪法法案#!所规定的，庞大的英属北美殖民地被划分为多个加拿大省份，拥有着#bold 皇家特许状#!的[SCOPE.sCountry('HBC_scope').GetName]管理着其中最为庞大的一部分。除此之外，其他领土则分属不同的[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]管辖。由于被划分开，她们之间互不统属，也没有统一合作和联盟。\n\n然而，随着南部[SCOPE.sCountry('USA_scope').GetName]邻居实力的逐步增长，他们的实力已经明显威胁到了[ROOT.GetCountry.GetName]和加拿大各邦在北美的利益；因此，#yellow 加拿大#!的民族主义者呼吁伦敦#B 将分裂的加拿大各邦整合起来而成为一个统一的，忠于帝国的[concept_dominion]以确保其在北美的安全与繁荣#!。\n\n如果这一构想能够实现，那么统一的加拿大将为我们提供比现在分散的状况要多得多的帮助；我们必须顺应当地的呼声，#V 将加拿大塑造成一个大英帝国治下真正的独立联邦#!。"
 british_dominion_canada_tt:0 "加拿大将拥有新的自治宪法。"
 #澳洲自治
 british_dominion_australia:0 "自治法案：澳大利亚联邦"
 british_dominion_australia_reason:0 "自#V 库克船长#!乘坐#bold 奋进号#!探索并宣称我们对#yellow 澳大利亚#!的主权以来已经过去了几十年，尽管从一开始#V 阿瑟·菲利普总督#!带领#bold 第一舰队#!前往#bold 新南威尔士#!时许多人都认为那里是一片空前富裕的大陆，然而到了现在澳大利亚的许多土地仍然是一片荒无人烟。这片#bold 遥远的罪犯流放地#!似乎除了鸟粪和袋鼠什么都没有；尽管如此，#yellow 澳大利亚#!的领土仍然是[ROOT.GetCountry.GetName]的庞大帝国在太平洋的重要资产。\n\n如今，随着澳大利亚人中诞生的新民族意识，当地的有识之士呼吁我们#B 将分裂的#yellow 澳大利亚#![concept_colony]整合起来而成为一个统一的，忠于帝国的[concept_dominion]以更好的帮助他们实施自己的治理政策，使得澳大利亚成为一个对我们更加具有帮助的繁荣之地。#!\n\n如果这一构想能够实现，那么统一的#yellow 澳大利亚#!将为我们提供比现在乱七八糟的状况要好得多的帮助；我们必须顺应当地的呼声，#V 将澳大利亚塑造成一个大英帝国治下真正的独立联邦。#!"
 british_dominion_australia_tt:0 "澳大利亚将拥有新的自治宪法。"
 #南非自治
 british_dominion_aferica:0 "自治法案：南非联邦"
