 second_british_civil_war_display:0 "保王党人动乱"
 second_british_civil_war_display_reason:0 "自从#bold [GetLawType('law_monarchy').GetName]被推翻#!，共和国在[ROOT.GetCountry.GetName]建立以来，整个国家便陷入了前所未有的分裂：尽管旧制度已经终结，但#V [GetIdeology('ideology_royalist').GetName]的怨恨与报复之心#!仍在全国燃烧：许多昔日效忠于王室的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]和[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]已经公开表达了不满，甚至秘密集结势力，企图恢复往日的[GetLawType('law_monarchy').GetName]。\n\n我们必须在未来的岁月中保持#V 坚定的秩序与稳定#!：#B [concept_civil_war]的阴影必须被阻止，只有和平才能证明新的共和国并非如同护国公一样的昙花一现#!：无论是通过安抚与改革，还是镇压与审判，#yellow 共和国#!都必须稳住根基。"
 second_british_civil_war_display_complete_tt:0 "#B 至少5年内没有爆发[concept_revolution]#!"
 second_british_civil_war_display_goal:0 ""
 gbr_event_52_a_tt:0 "[GetIdeology('ideology_royalist').GetName]不会善罢甘休，准备好迎接即将到来的风暴！"
 second_british_civil_war:0 "英国内战"
 second_british_civil_war_reason:0 "[GetIdeology('ideology_royalist').GetName]的阴谋终于化为烈火，#bold [concept_civil_war]已经在[ROOT.GetCountry.GetName]大地上爆发#!：昔日效忠王冠的贵族、地主与旧秩序的守护者，联合愤怒的保守派和狂热的教会势力，在乡村与城市点燃叛乱，打着#V “国王万岁”#!的旗号举兵反抗共和国。\n\n共和国如今面临生死存亡的时刻，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]以外的许多省份已经陷入了严重的混乱，如今没有妥协的余地：要么#yellow 共和国#!挺过这场考验，彻底镇压[GetIdeology('ideology_royalist').GetName]的余孽；要么历史的车轮倒退，[ROOT.GetCountry.GetName]再次沦为王权的附庸。"
 second_parliament_civil_war_display:0 "议会党人动乱"
 second_parliament_civil_war_display_reason:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经恢复神授君权与专制主义的神圣传统并解散了邪恶的议会，国家如今重新置于[GetLawType('law_monarchy').GetName]的意志之下；然而，#V 长久以来习惯了议会治理的[GetIdeology('ideology_constitutionalist').GetName]#!却并不愿轻易屈服：许多效忠于#O 宪政主义#!和#O 自由主义#!的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]和[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]已经公开表达了不满，甚至秘密集结势力，企图恢复往日的议会治理。\n\n[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下必须#B 以强力维持秩序#!，避免[concept_civil_war]的爆发，才能证明#V 君主专制依旧能够保证国家的安定与统一#!。"
 second_parliament_civil_war_display_goal:0 ""
 second_parliament_civil_war:0 "英国内战"
 second_parliament_civil_war_reason:0 "[GetIdeology('ideology_constitutionalist').GetName]的喧嚣终于化为硝烟与火焰，#bold 一场[concept_revolution]已经在[ROOT.GetCountry.GetName]大地爆发#!。他们打着#V 恢复传统#!的旗号集结反叛军，#v $clerks$#!，#v $shopkeepers$#!，#v $capitalists$#!与叛乱的#v $laborers$#!城镇都倒向了叛乱者的阵营：[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]以外的许多地区都陷入了混乱。\n\n而今，#V 王权的命运正悬于一线#!：[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]必须号召忠诚的#v $soldiers$#!、#v $aristocrats$#!与#v $clergymen$#!的力量集结在神圣的#yellow 君主专制#!的大旗下，#V 彻底粉碎这场叛乱，避免查理一世的故事在[ROOT.GetCountry.GetName]重新上演。#!"
 gbr_event_53_a_tt:0 "[GetIdeology('ideology_constitutionalist').GetName]不会善罢甘休，准备迎接好即将到来的风暴！"
 second_british_civil_war_complete_tt:0 "[concept_civil_war]已经以我们的胜利而告终。"
 #议会改革日志
 great_1867_parliament_reform:0 "呼吁城镇选举权"
 great_1867_parliament_reform_reason:0 "自#bold 大宪章#!与#bold 权利法案#!以来，议会制度始终是[ROOT.GetCountry.GetName]政治的根基。然而，随着#V 工业革命#!带来城市的兴起与人口的迁徙，旧有的[concept_election]格局正显出裂痕：#B 腐败选区依旧占据议席，而新兴的工商业城镇中的居民们却没有发出应有的声音#!。\n\n成千上万的[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]们为[ROOT.GetCountry.GetName]的[concept_wealth]与[concept_taxes]做出贡献，却在议会中没有发言的席位：这种不平衡已经引发了不断的请愿与集会，#B 城镇居民要求他们的声音能够进入#O 威斯敏斯特#!#!。\n\n#B [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的政府必须做出改革，否则#V 人民只会自己伸手去夺取选票#!#!。"
 great_1918_parliament_reform:0 "呼吁普遍选举权"
 great_1918_parliament_reform_reason:0 "尽管已经历数次改革，#B 大量公民依旧被排除在[concept_election]之外#!：无数#v $laborers$#!，#v $soldiers$#!和#v $farmers$#!仍然无法通过选票在#B #O 威斯敏斯特#!#!表达他们的意志。#B 这份不平等已经在全国各地酝酿出新的请愿与集会，呼吁普遍的[concept_election]权利#!，要求国家承认每个成年公民的政治身份。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的政府必须正视这一呼声：#V 若无法推进新的改革法案，选票的缺口终将被抗议与暴力所填补#!。"
 great_1922_parliament_reform:0 "呼吁平等选举权"
 great_1922_parliament_reform_reason:0 "尽管[ROOT.GetCountry.GetName]已经做出了许多改革和让步并使得选票真正进入了广大公民之手，但#B 这种[GetLawType('law_universal_suffrage').GetName]却依旧是不完整的#!：#V 全国半数的人口——妇女——仍然没有进入选民册#!。\n\n随着我们城市化和加快和经济的提升，[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]们也正需要从这些在过去被视为附属财产的妇女们成为新的劳动力进入工厂中工作；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的政府应该顺应人民的呼声，承认妇女的政治地位，建立一个真正人人平等的[concept_election]制度。"
 new_act_influence_mps_tt:0 "#V 这将使得威斯敏斯特中属于[concept_westminster_england]，[concept_westminster_wales]，[concept_westminster_scotland]和[concept_westminster_ireland]的议席分配开始出现变化。#!"
 #谷物法
 gbr_corn_law:0 "谷物法"
 gbr_corn_law_reason:0 "自#V 拿破仑战争#!以来，#O 谷物法#!所代表的[GetLawType('law_protectionism').GetName]系统一直是[ROOT.GetCountry.GetName]经济制度的基石：它以高额的[concept_tariffs]保护着本国的@grain!#V 谷物#!生产并确保我们忠诚的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]们的收益，也维持了农业在我们经济中的有利地位。\n\n然而，#B 工业革命#!带来的新局势正令#O 谷物法#!陷入争议：城市人口的日益增长带来了@grain!#V 谷物#![concept_market_price]的急剧上升，#v $laborers$#!，#v $shopkeepers$#!与[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]们都要求废除保护性的[concept_tariffs]以便进口新的廉价@grain!#B 谷物#!，从而释放更多投资进入他们的商业帝国。\n\n然而#O 谷物法#!的背后却也仍然是我们#v $aristocrats$#!与#v $farmers$#!阶层的利益所在：#B 争论已经无法回避，#!#G [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府必须在两条道路之间做出选择#!。"
 gbr_corn_law_on_complete_tt:0 "我们将转向更好的#yellow 自由贸易#!政策。"
 gbr_corn_law_on_fail_tt:0 "我们将回归上个世纪的#yellow 重商主义#!政策。"
