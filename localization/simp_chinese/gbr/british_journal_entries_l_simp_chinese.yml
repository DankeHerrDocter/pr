 imperial_preference_can_button:0 "向加拿大让步"
 imperial_preference_can_button_desc:0 "加拿大与我们的经济联系相比从前已经在逐渐减弱，甚至开始受到其他国家的影响。然而，它们对我们的忠诚仍然不改，我们需要尽可能的利用这一点，加强我们之间的经济联系。"
