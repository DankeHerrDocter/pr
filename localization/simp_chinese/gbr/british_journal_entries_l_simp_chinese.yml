 british_utility_principle_reason:0 "长久以来，[ROOT.GetCountry.GetAdjective]的#V 官职买卖与裙带关系#!使得现存的#tooltippable;tooltip:[GetPlayer.GetTooltipTag],civil_service_system_modifier_effects_tt $civil_service_system$#!几乎成为了少数[concept_upper_strata]的猎物，政府#v $bureaucrats$#!的#B 混乱与低效#!几乎成为了一种传统：而在面对工业化与殖民事务日益庞杂的行政任务时，#B 这种旧式体制已显得力不从心#!。\n\n通过奉行[GetIdeology('ideology_utilitarian_leader').GetName]的方法，设立更#V 有效率的公务员考试#!和#V 政治中立的文官队伍#!，我们将有能力确保[ROOT.GetCountry.GetName]国家机器的每一环节都#B 服务于全体公民的共同利益#!，并以此来#B 提高治理效率，恢复社会信任#!，#G 最终在世界范围内都成为一股强大的进步力量#!。"
