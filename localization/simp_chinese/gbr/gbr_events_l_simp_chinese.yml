l_simp_chinese:
 #英国不列颠治世
 victoria.1.b: "这将是一个时代的开始。"
 joi_flavor_gbr.1.t: "不列颠治世"
 joi_flavor_gbr.1.d: "这是属于[ROOT.GetCountry.GetName]的时代：太阳悬挂在天空之上，照射在大英帝国的领土之下，仿佛永远不会从不列颠尼亚的疆域内落下。"
 joi_flavor_gbr.1.f: "                                 #bold 当大不列颠受命于天，#!\n\n                                 从蔚蓝的大海中崛起，\n\n                            崛起，从蔚蓝的大海中崛起，\n\n                        这是契誓，守护这片陆地的契誓，\n\n                                 守护天使齐声歌唱：\n\n                              #bold  统治吧，不列颠尼亚！#!\n\n                               不列颠尼亚统治海洋！\n\n                                  #bold 不列颠人永不为奴！#!"
 joi_flavor_gbr.1.a: "西班牙人曾说他们的帝国上太阳永不落下，然而这一点却在我们的身上得到了更为雄伟的体现。"
 #英国联合法案
 joi_flavor_gbr.2.t: "[TimeKeeper.GetCurrentDate.Format('y年')]联合法案"
 joi_flavor_gbr.2.d: "帝国理事会代替帝国会议而成为了[ROOT.GetCountry.GetName]统治海外各属地的常设机关，各海外领地的代表依据选举而齐聚威斯敏斯特，宣誓为共同的帝国联邦而效忠；历史将把今天认定为大英帝国迈向统一联邦的日子。"
 joi_flavor_gbr.2.f: "伴随着昔日处于#bold 自治地位#!的殖民地尽皆并入[ROOT.GetCountry.GetName]的统治之下，帝国对于世界各地的掌控达到了#bold 世界历史上的巅峰#!，胜利的金狮骄傲地盘踞在繁荣昌盛的不列颠岛上环视这个#bold 由大英帝国统御的世界秩序#!：\n\n没有什么国家能超越不列颠治下的无上荣光，没有什么领袖能够超越不列颠[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的威服四海；#bold 大英帝国的幅员是如此的辽阔，以至于天上的太阳永远不会落下；大英帝国的力量是如此的强大，就如同皇家海军踏平征途的波涛#!；人们都将称呼这个时代，这个世纪为属于[ROOT.GetCountry.GetName]的世纪！\n\n北美和俄罗斯的平原是我们的谷仓；\n芝加哥和敖德萨是我们的矿区；\n加拿大和北欧半岛为我们种树；\n澳大利亚为我们牧羊；\n阿根廷为我们养牛；\n秘鲁送来白银，南非进贡黄金；\n印度人和中国人为我们种茶，中海是我们的果园；\n我们的棉花种植园则从美国南部向地球一切温暖的地方扩展。\n\n#bold 是时候宣告我们作为超级强权的地位了，统治吧不列颠尼亚！#!"
 joi_flavor_gbr.2.a: "统治吧！不列颠尼亚！"
 #英国自治
 joi_flavor_gbr.3.t: "[TimeKeeper.GetCurrentDate.Format('y年')]自治领关系法"
 joi_flavor_gbr.3.d: "在自治领的迫使之下，伦敦不得不出草法案确立了[ROOT.GetCountry.GetName]治下各地政府与伦敦的关系，终结了伦敦干涉自治领特权和宪法的权力。"
 joi_flavor_gbr.3.f: "本届内阁，代表受上帝洪恩的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName]陛下之政府宣布：\n一：加拿大，澳大利亚，南非设为帝国之自治领。\n\n二：本法实施后，自治领所订之法律或规定，不会因与联合王国将来可能制定之法律、规定或根据法律制订的规章抵触而无效。各自治领也有权根据自治领法律，撤废或修订法律、规定、规章。\n\n三：自治领议会有权制定可实施于其境外之法律。\n\n四：本法实施后，除非自治领有明确的表示，请求并同意外，联合王国所制订之法律不得在其自治领内适用。"
 joi_flavor_gbr.3.a: "愿上帝保佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。"
 #英国加拿大
 joi_flavor_gbr.4.t: "北境探索"
 joi_flavor_gbr.4.d: "随着#yellow 加拿大#!被并入[ROOT.GetCountry.GetName]的怀抱，对这片北方领土的探索狂潮开始了"
 joi_flavor_gbr.4.f: "为什么是加拿大？环顾四周！#bold 哈德孙湾的海水#!比天空本身还要湛蓝，郁郁葱葱的树林和一望无际的大平原#bold 吹动着惬意的微风#!，还有所有你可以在这里的城市中#bold 享受和英格兰一般无二的任何服务#!，找寻更具价值的工作！当我可以在这片庞大而无人的领土上搞到庞大的财富时，为什么还要在雾气熏天的伦敦挣扎？"
 joi_flavor_gbr.4.a: "加拿大在召唤！"
 joi_flavor_gbr.5.t: "加拿大自治政府"
 joi_flavor_gbr.5.d: "加拿大正筹备建立一个统一的自治政府..."
 joi_flavor_gbr.5.f: "每一份文件的签署与盖章都让北邦离建国更近一步；殖民地间的意见并不总是一致，但加拿大人民决心要坚持到底。不久的将来，在殖民办公室、当地行政机构的支持下，全体加拿大人民意识的驱动下，一个加拿大国家的崛起近在眼前。"
 joi_flavor_gbr.5.a: "噢，好吧。"
 #英国澳大利亚
 joi_flavor_gbr.6.t: "矿业前景"
 joi_flavor_gbr.6.d: "一个在#yellow 澳大利亚#!发现铁矿的消息震惊了[ROOT.GetCountry.GetName]社会"
 joi_flavor_gbr.6.f: "噢先生，你真的以为他们搬家只是因为想要一份工作吗？看看新闻，他们在那里看到了什么？没错！露天的铁矿！他们满眼都是贪婪，我告诉你，#bold 现在离开英格兰这片鬼地方还来得及#!，这里除了浓烟和工厂还有什么，大英帝国的荣耀吗？哦天哪，在澳大利亚，一个穷鬼都能轻松取得一大片矿场，成为腰缠万贯的老板！什么荣誉，都在英镑面前见鬼去吧！"
 joi_flavor_gbr.6.a: "冲冲冲！"
 joi_flavor_gbr.7.t: "澳大利亚自治政府"
 joi_flavor_gbr.7.d: "澳大利亚正筹备建立一个统一的自治政府..."
 joi_flavor_gbr.7.f: "每一份文件的签署与盖章都让澳大利亚离建国更近一步；殖民地间的意见并不总是一致，但澳大利亚人民决心要坚持到底。不久的将来，在殖民办公室、当地行政机构的支持下，全体澳新人民意识的驱动下，一个澳大利亚国家的崛起近在眼前。"
 joi_flavor_gbr.7.a: "噢，好吧。"
 #英国南非
 joi_flavor_gbr.8.t: "威斯敏斯特会议"
 joi_flavor_gbr.8.d: "尽管本意是巩固好望角航线，但#yellow 南非黄金#!的发现迅速传遍了世界，成为了[ROOT.GetCountry.GetName]的意外之喜。"
 joi_flavor_gbr.8.f: "“皮尔爵士在1816年建立金本位时绝对想不到这一天。”\n\n“不错，如今全世界的黄金不是在伦敦西区就是在英格兰银行的保险柜里。”\n\n“谁又能想到呢？英镑的价值将与黄金等同，对全世界都一样！法郎，马克，美元，卢布...今后都将对标英镑！英镑将成为世界的货币！而这又将为我们带来什么？！”\n\n“或许是一个威斯敏斯特体系的美称...以及无尽的财富和权力？”"
 joi_flavor_gbr.8.a: "威斯敏斯特体系？选举的那个？"
 joi_flavor_gbr.9.t: "布尔人反抗"
 joi_flavor_gbr.9.d: "[ROOT.GetCountry.GetName]试图侵略南非白人的事情已经不是秘密..."
 joi_flavor_gbr.9.f: "“每个符合服役条件的平民都是待征召的战士，平时在农场和城镇中从事自己的营生，并在一年中的某段时间里接受短期的军事训练，战争爆发后则迅速按地区集结报到，组成民团抵抗英军的入侵。\n我们将组织一切可以使用的力量，所有拒绝参战的男人都是将被绞死的叛国者，为了保卫布尔的自由与独立，我们必须促使全世界都抨击英国人这种可耻的入侵，以证明现在已经不是帝国主义可以随意主宰小国的时代了。”"
 joi_flavor_gbr.9.a: "就那群土包子？"
 #英国爱尔兰
 joi_flavor_gbr.10.t: "粮食危机的终结"
 joi_flavor_gbr.10.d: "曾经弥漫在#yellow 爱尔兰#!的饥荒危机已经被[ROOT.GetCountry.GetName]政府所解决，通过调派英格兰的资源至爱尔兰，对饥荒的救济获得了本地人民的爱戴。"
 joi_flavor_gbr.10.f: "“土豆，谁还吃土豆？那只不过是过去老掉牙的食物罢了，我们生活在一个如此强大的帝国，又何须为吃的事情发愁？慷慨仁慈的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下已经调拨英格兰的资源来到爱尔兰，发霉的土豆就丢在地里吧，城里正发放着牛肉和面包；我们将不再为生存而担忧，天佑吾王，天佑[ROOT.GetCountry.GetName]！”"
 joi_flavor_gbr.10.a: "说得好！"
 joi_flavor_gbr.11.t: "爱尔兰大饥荒！"
 joi_flavor_gbr.11.d: "又一场饥荒席卷了爱尔兰贫瘠的土地，而[ROOT.GetCountry.GetName]政府似乎对此不闻不问..."
 joi_flavor_gbr.11.f: "1739年的事情又重来了，一场空前的瘟疫席卷了爱尔兰；土豆腐坏了，一种未知的病毒入侵了田地，摧毁了一家人赖以度过明年的食物。乡下的农民逃离了土地，要到都柏林，要到伦敦德里，要到贝尔法斯特和科克去，那里有吃的吗？没有，城市里也都是饿死的乞丐，只有体面的英格兰老爷们的马车行驶在街道上，飘出一股股烤肉的香味..."
 joi_flavor_gbr.11.a: "...他们为什么不吃炸鱼薯条？"
 #英国印度
 joi_flavor_gbr.12.t: "印度事务法案"
 joi_flavor_gbr.12.d: "随着#yellow 英属印度政府法令#!的实施，东印度公司的统治彻底结束了，整个印度最终属于伦敦的直接所有，由内阁任命的印度事务大臣代表而统治。"
 joi_flavor_gbr.12.f: "“目前由东印度公司占有之[concept_colony]，以及该[concept_company]受[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#bold 委托授予或行使的所有与[concept_government]有关的权力均应停止#!。所#bold 有领土及行政管理之权利应改变而属于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!，并以她的名义行使；印度的或在印度产生的所有领土和其他[concept_taxes]，以及与任何领土有关的所有贡品均应以[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下之名义收取。”\n\n“为了本法的目的应设立一个理事会，由九名成员组成，并命名印度事务部。东印度公司董事会从担任过该[concept_company]董事的人员中选出三名人员与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下任命的人员行使其权力，并在经由首相提名且经议会审议后任命代表由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的印度事务大臣；议会有权以[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的名义#bold 罢免和任命大臣职位#!。”\n\n“东印度公司的[concept_army]和[concept_fleet]应被视为[ROOT.GetCountry.GetName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的印度[concept_army]和[concept_fleet]，并应承担为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下服务的相同义务，#bold 就像为该公司服务一样#!；印度总督收到本法案后，应尽快在印度各专员府和[concept_government]宣布本法案并将权力移交给#bold 印度事务部#!。”
 joi_flavor_gbr.12.a: "我们需要一名印度事务大臣！"
 joi_flavor_gbr.12.b: "还是重新任命一名总督吧。"
 joi_flavor_gbr.12.c: "让我们实现印度的重整！"
 joi_flavor_gbr.13.t: "印度自治法案"
 joi_flavor_gbr.13.d: "在印度本地人民不断暴动反抗帝国统治的环境下，议会不得不出台了一份允许#yellow 印度当地实施自治#!的法令来降低[ROOT.GetCountry.GetName]在印度的统治成本。"
 joi_flavor_gbr.13.f: "延续上届议会会议中制定的法案的法案，允许有更多时间支付公司应付的某些应付款项与东印度进行贸易的[ROOT.GetCountry.GetName]商人；批准进一步的时间支付某些应付款项，并将其应付给公众，并预付给上述公司，其中提到的条款，通过贷款或国库券筹集的一定数额的资金：\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的财政部长或其中任何三名或更多人推迟并留出更多时间支付这笔款项应该而且可能是合法的六十四万四千七百四十三英镑十七先令二便士，按上述法案中提到的几次时间应向海关缴纳的；十二月第一天到期的十万英镑总额为一千七百八十一；并允许在过期之十二个月内向海关支付应缴纳的款项。\n\n若东印度公司确实并应在上述付款或其任何部分分别按上述方式推迟的一个或多个时间分别支付上述款项，则应以与上述款项已分别于上述款项到期日或之前支付；且公司在推迟的一个或多个时间付款后，应免除并免除其因未分别在数次支付上述付款而承担的所有损害，利息和损失。该款项已到期，并有权获得相同的折扣，津贴和优惠，如同上述款项已分别在到期日或之前支付。"
 joi_flavor_gbr.13.a: "他们无法接受文明。"
 #爱尔兰大饥荒
 joi_flavor_gbr.14.t: "从饥荒中恢复"
 joi_flavor_gbr.14.d: "可怕的饥荒结束了，但是对爱尔兰的损失已经不可挽回..."
 joi_flavor_gbr.14.f: "恐怖，只有恐怖。街道上遍地饿殍，奄奄一息地趴在阴暗的角落中。老鼠吱吱吱的叫，地上连一根草都没有；往日在繁荣的乡村里劳作的辛勤的农民消失无踪，若没有离开这片土地，迎接他们的只有死亡。尽管[ROOT.GetCountry.GetName]政府最终注意到了发生在这里的惨剧，饿死和逃亡的人们也不会再重新出现在这片土地..."
 joi_flavor_gbr.14.a: "总比什么都不做要好。"
 joi_flavor_gbr.15.t: "饥荒结束"
 joi_flavor_gbr.15.d: "可怕的饥荒最终结束，爱尔兰剩下的只有悲剧和愤怒..."
 joi_flavor_gbr.15.f: "恐怖，只有恐怖。街道上遍地饿殍，奄奄一息地趴在阴暗的角落中。老鼠吱吱吱的叫，地上连一根草都没有；往日在繁荣的乡村里劳作的辛勤的农民消失无踪，若没有离开这片土地，迎接他们的只有死亡。[ROOT.GetCountry.GetName]的官员对这里的惨剧熟视无睹，甚至拦截一切试图给这里的人们提供援助的外国势力，仿佛爱尔兰不仅不属于联合王国，更是[ROOT.GetCountry.GetName]的敌人..."
 joi_flavor_gbr.15.a: "我也是[ROOT.GetCountry.GetName]公民，我怎么不知道有饥荒？"
 #征服缅甸
 joi_flavor_gbr.16.t: "在缅甸的胜利"
 joi_flavor_gbr.16.d: "[ROOT.GetCountry.GetName]最终取得了战争的胜利，而失败的一方则被迫投降..."
 joi_flavor_gbr.16.f: "兹[ROOT.GetCountry.GetName]及大清国大皇帝，缅甸国王议，将所议条款开列于左:\n一：中国允英国在缅甸现时所秉政权，均听其便。\n二：因缅甸每届十年，向有派员呈进方物成例，英国允由缅甸最大之大臣，每届十年，派员循例举行。其所派之人应选缅甸国人。\n三：本约立定由两国特派大臣在中国京城，将约文汉、英各三份先行画押，盖用印章，恭候两国御笔批准，在于英国京城速行互换，以昭信守。"
 joi_flavor_gbr.16.a: "统治吧不列颠尼亚！"
 joi_flavor_gbr.16.b: "缅甸将成为英属印度的一个省！"
 #征服埃及
 joi_flavor_gbr.17.t: "大英帝国治下的埃及"
 joi_flavor_gbr.17.d: "[ROOT.GetCountry.GetName]的军队占领了尼罗河和苏伊士，埃及已经臣服在了[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的皇冠之下。"
 joi_flavor_gbr.17.f: "尼罗河三角洲，多少伟大帝国的粮仓与核心；凯撒征服过这里，使她臣服于罗马帝国；塞利姆一世征服过这里，使她臣服于奥斯曼帝国。如今，[ROOT.GetCountry.GetName]帝国征服了这片土地，米字旗飘扬在金字塔的顶端，在埃及的胜利成为了帝国皇冠的又一颗宝石。\n\n同时，埃及的位置是如此的重要，在这个时代，我们不仅可以像曾经统治过埃及的伟大帝国一样把埃及设计成帝国农业的核心，为我们带来贸易和经济的好处；也可以将其转变成巩固全球统治的军事基地，为我们带来军事调度的好处。我们究竟应该怎样利用这片土地？"
 joi_flavor_gbr.17.a: "专注于埃及的经济投资！"
 joi_flavor_gbr.17.b: "专注于埃及的军事建设！"
 #从开罗到开普敦
 joi_flavor_gbr.18.t: "红绸带计划"
 joi_flavor_gbr.18.d: "半个非洲已经被[ROOT.GetCountry.GetName]收归旗下，大英帝国的领土跨越了整个非洲大陆"
 joi_flavor_gbr.18.f: "看看地图吧各位！没有人能够再次重复我们现在所实现的伟大功绩；代表着[ROOT.GetCountry.GetName]的红色如同一条绸带一样铺开在这片土地上；帝国的资产从尼罗河的城市直达好望角的海岸，所有敌人都已倒在沙子之中。而黑暗大陆最有价值的土地已经归我们所有，帝国万岁！"
 joi_flavor_gbr.18.a: "这是文明的红色！"
 #大印度半岛铁路
 joi_flavor_gbr.19.t: "大印度半岛铁路"
 joi_flavor_gbr.19.d: "联通[concept_indian_subcontinent]的大印度半岛铁路终于建成，这条漫长的新铁路为整个次大陆的发展提供了蓬勃的动力。"
 joi_flavor_gbr.19.f: "嗓门猛烈不羁的美人！\n把你所有无法无天的音乐、把你夜晚摇曳的灯，在我的吟唱中翻腾；\n你狂野地吹口哨的笑声，像地震一样轰隆回荡，把所有的人唤醒；\n你自己的律法完备，你自己的轨道牢牢地掌握手中；\n你激动的尖声长鸣应和着岩石和山丘的回声；\n扬起在辽远的大地上，越过湖面；\n无拘无束，\n喜兴冲冲，\n强壮孔武，\n奔向自由的天空！"
 joi_flavor_gbr.19.a: "穿过狂风，穿过平静；你是这个大陆现代脉搏的典型！"
 #英美特殊关系系列
 joi_flavor_gbr.20.t: "英美同盟！"
 joi_flavor_gbr.20.d: "随着世界局势的变化，[ROOT.GetCountry.GetName]和[SCOPE.sCountry('USA_scope').GetName]的关系正逐步改善..."
 joi_flavor_gbr.20.f: "尽管我们两国曾是对手，但面对共同的威胁，拥有共同的利益时，曾经的敌对将会烟消云散；英美两国拥有着共同的文化和语言，建立着共同的体制，由共同的血脉相连接的亲密的关系定将长久维持。\n鉴于此，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府的首相和外交大臣已经开启了赴美访问，与山巅之城进行了一次成功的会谈，会议上谈及了双边建立一套“牢不可破”的军事经济同盟的可能。"
 joi_flavor_gbr.20.a: "是时候签订一份全面而永久的同盟来巩固我们的关系了！"
 joi_flavor_gbr.20.b: "军事同盟可以暂缓，不过经济协定可以先行！"
 joi_flavor_gbr.21.t: "在美投资大获成功"
 joi_flavor_gbr.21.d: "数名[ROOT.GetCountry.GetName]最优秀的实业家向我们报告..."
 joi_flavor_gbr.21.f: "“喜讯！喜讯！这一段时间里，我们在美国的投资取得了空前的成功，我们的企业一片繁荣，我们的盟友也因此收益良多：当然了，我们的财富也因此而获益，真是一笔英明且具有远见的投资啊！"
 joi_flavor_gbr.21.a: "不错不错！"
 joi_flavor_gbr.22.t: "在美资本陷入困境"
 joi_flavor_gbr.22.d: "数名[ROOT.GetCountry.GetName]最优秀的实业家向我们报告..."
 joi_flavor_gbr.22.f: "悲报！尽管我们已经尽了自己最大的努力，但是由于美国市场近日连续的不振，我们投资的企业都亏损了许多，有个倒霉蛋的工厂还因此而倒闭了...真该把这些资产尽早转移到国内啊，可恶！"
 joi_flavor_gbr.22.a: "日了狗了！"
 joi_flavor_gbr.23.t: "[SCOPE.sCountry('GBR_scope').GetName]向我们请求贷款！"
 joi_flavor_gbr.23.d: "由于联合王国财政的困难，现在他们将目光投向了我们，请求我们的帮助..."
 joi_flavor_gbr.23.f: "英国的财政出现问题在国际上早已不是秘密；鉴于我们和他们之间亲密的友谊，英国财政大臣访问我国，希望能从我们的口袋里借得一笔财富，并承诺这将为我国带来许多的政治利好。国会正在就英国人的请求进行辩论，到底应不应该给他们借贷呢？"
 joi_flavor_gbr.23.a: "给吧给吧，我们可是慷慨的救世主！"
 joi_flavor_gbr.23.b: "我们可没有赡养牢父亲的义务！"
 #印度事务系列
 joi_flavor_gbr.24.t: "印度教士兵抗议"
 joi_flavor_gbr.24.d: "发放给部队的新式步枪所使用的弹药筒引发了事端，因为弹药筒所使用的油脂包括牛油和猪油，而这些在印度教信仰中是禁忌。"
 joi_flavor_gbr.24.f: "当我咬弹筒的时候我能尝出来。在战斗最激烈的时刻，我们这些最忠诚的士兵发现公司居然用如此狡诈卑鄙的手段破坏我们的信仰，这真是前所未闻的背叛。要是我能朝罪魁祸首开一枪，我会毫不犹豫地这么做。"
 joi_flavor_gbr.24.a: "你以为你是谁？给我枪毙了他们！"
 joi_flavor_gbr.24.b: "尊重他们的宗教或许会更好。"
 joi_flavor_gbr.25.t: "土邦议会请愿"
 joi_flavor_gbr.25.d: "土邦议会正因为他们所制定的政策被伦敦撤销而向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName]陛下请愿。"
 joi_flavor_gbr.25.f: "虽然我们将政策将政策视为议会的责任，将行政视为官员的责任，但行政政策问题可能会导致行政政策与政策管理之间的混淆，特别是当行政责任和行政政策的职责与政策行政的责任相冲突或重叠...\n简而言之，这些建议一旦得到落实，导致人们认识到，事实上，在某些情况下，替代行动方针可能会受到谨慎修改，导致重新评估最初的分歧领域，并指出鼓励妥协与合作的可能性。"
 joi_flavor_gbr.25.a: "确保尊敬的议员们的意见得到保障。"
 joi_flavor_gbr.25.b: "这些家伙理应认识到谁才是他们的主人！"
 joi_flavor_gbr.26.t: "一名杰出的次大陆官员"
 joi_flavor_gbr.26.d: "据悉，一名服务于印度事务部的官员在他的职位上干出了堪称杰出的成就。"
 joi_flavor_gbr.26.f: "“就目前情况，综观全局，纵览古今，考虑各部门平均水平，总结分析，也许可以认为，综上所述，概括来说，您很可能发现，尽管也许不中听，无论如何，恐怕前景微妙，现阶段只能如此预期：毕竟我只是卑微的社会公器，盛放内阁深思熟虑的果实。”"
 joi_flavor_gbr.26.a: "在当地提拔他的职位。"
 joi_flavor_gbr.26.b: "本土需要这样的人才。"
 joi_flavor_gbr.27.t: "严重的粮食问题"
 joi_flavor_gbr.27.d: "由于次大陆近日持续的干旱，许多印度人陷入了饥饿之中。"
 joi_flavor_gbr.27.f: "“您听说最近的事了吗？”\n\n“噢，那件事？无关紧要。”\n\n“但如果他们来请求我们帮助怎么办？”\n\n“那我们就这样：第一阶段，我们宣称什么事都没有。第二阶段，说也许有事发生，但我们不该采取行动。第三阶段，说也许应该行动但我们什么都做不了。第四阶段，说也许当初能做点什么但现在已经太迟了。”"
 joi_flavor_gbr.27.a: "是，大臣！"
 joi_flavor_gbr.27.b: "胡说八道！"
 joi_flavor_gbr.28.t: "英属印度政府"
 joi_flavor_gbr.28.d: "设立印度事务部门的尝试失败了；严重的动乱和反对迫使伦敦重新将印度的行政工作交给了一名在德里的总督。"
 joi_flavor_gbr.28.f: "“这届政府是来管理国家的，不能像往届那样就是来统治。”\n\n“那首相觉得我们应该怎么样？”\n\n“当一个国家正在走下坡路时，得有人坐在驾驶席上，往油门上踩一脚。”"
 joi_flavor_gbr.28.a: "敌在白厅啊，敌在白厅！"
 joi_flavor_gbr.29.t: "印度事务大臣的任命"
 joi_flavor_gbr.29.d: "根据受上帝洪恩的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName]陛下的谕旨，内阁增加了一名新成员。"
 joi_flavor_gbr.29.f: "大臣有三项职能。首先，搞推销，让议会和公众接受部里的行动，他是我们的公关员；其次，他是我们的议会代表，让我们立法得以通过；第三，他得养活我们，在内阁争取经费，好让我们运转我们的部门。但他不该审查部里的工作程序，与秘书及下属交流。"
 joi_flavor_gbr.29.a: "我知道，我刚去过下院。"
 #英美特殊关系（美国方）
 joi_flavor_gbr.30.t: "英美同盟？"
 joi_flavor_gbr.30.d: "随着世界局势的变化，[ROOT.GetCountry.GetName]和不列颠岛上我们曾经的敌人的关系正逐步改善..."
 joi_flavor_gbr.30.f: "尽管我们两国曾是对手，但面对共同的威胁，拥有共同的利益时，曾经的敌对将会烟消云散；英美两国拥有着共同的文化和语言，建立着共同的体制，由共同的血脉相连接的亲密的关系定将长久维持。\n鉴于此，英国首相和外交大臣已经访问我国并在外交会谈上向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]提出了一个缔结涉及经济和军事等多方面“永久特殊联盟”的设想，并保证这将同时为我国和他们带来利好。"
 joi_flavor_gbr.30.a: "婉拒英国人的提议。"
 joi_flavor_gbr.30.b: "合众国将欣然接受！"
 #大英帝国的未来
 joi_flavor_gbr.31.t: "第一届帝国会议"
 joi_flavor_gbr.31.d: "第一次涉及到所有不列颠殖民地的帝国会议在大英帝国的主人：[ROOT.GetCountry.GetName]的首都召开了，帝国的仪式巍峨壮丽。大街上行进着四亿属民派来的代表，大海上则集结着一百六十五艘皇家海军的军舰，受阅舰队长达几英里。"
 joi_flavor_gbr.31.f: "“我们的确需要你们的帮助，这个筋疲力尽的泰坦巨人同命运相搏斗的那个天地太广阔了。我们肩荷这个负担已经有很多年。我们想，这是我们的孩子们应该帮助我们来支撑的时候了。”\n\n“[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]必须接受代议制度的必然后果，如果[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]不得不继续使这个政府具有一个代议制机关，它就必须同意让获得代议制机关信任的那些人来继续管理政府...就殖民地而言，确保其完全的从属地位是靠殖民地能够在与帝国的继续不断的联系中获得好处。就母国政府而言，对殖民地涉及内部事务的法律的制定，或者对履行行政权力的人员的选择进行毫无根据的干涉，那么，这种从属关系肯定不能加强，只能大大削弱。”\n\n“如果固守经济上迂腐陈旧的原则，我们将失去殖民地提供给我们的加紧联合的机会。”"
 joi_flavor_gbr.31.a: "大英帝国应该成为一个牢不可破的整体：一个帝国联邦。"
 joi_flavor_gbr.31.b: "大英帝国应该发扬地方民主自治的传统：一个分权联邦。"
 #英格兰皇家赛艇大会
 joi_flavor_gbr.32.t: "英格兰皇家航海大会"
 joi_flavor_gbr.32.d: "赛艇在[ROOT.GetCountry.GetName]的风靡使得她成为了一项广受欢迎的国民运动，在热衷于此的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的赞助下，第一场国际的赛艇比赛：英格兰皇家航海大会在泰晤士河畔开幕了。"
 joi_flavor_gbr.32.f: "朴次茅斯队已经领先了100码，伯克郡队发力了！发力了！\n越来越接近终点了，距离终点越来越近了，伯克郡队又上来了两个桨位，加桨了！桨频！起来了！再往前超！超过了！\n还有最后的两百米！领起来！要拼！超过了一个桨位，前膀发力，就有最后的五十米了，冲啊伯克郡！\n伟大的伯克郡，伟大的伯克郡！他们才是英格兰光荣传统的继承人，在这一刻他不是一个人在战斗，他不是一个人！！最后五十米，领先！还领先两桨！冲啊！！！"
 joi_flavor_gbr.32.a: "混蛋，这个解说绝对是伯克人！"
 #英属北美法令
 joi_flavor_gbr.33.t: "英属北美法令"
 joi_flavor_gbr.33.d: "随着加拿大联邦的法令由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下签署，新生的[concept_dominion]成为了大英帝国中平等的一员。"
 joi_flavor_gbr.33.f: "#bold 鉴于新不伦瑞克，魁北克，马尼托巴，萨斯喀彻温，艾伯塔，不列颠哥伦比亚，努纳武特，鲁珀特地省#!已表示希望在[ROOT.GetCountry.GetName]的王冠下联邦统一为一个[concept_dominion]，其宪法原则与联合王国的宪法相似；由于这样的联盟将有助于各省的福利并促进大英帝国的利益，在议会授权下建立联邦的情况下，不仅应规定[concept_dominion]立法机构的宪法，而且还应宣布其中行政政府的性质，以使英属北美之联邦制定对其有利的规则：[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]根据[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下最尊贵的枢密院的建议，可以通过公告宣布，在其中指定的某一天及之后，不超过本法通过后六个月，英属北美各省应以加拿大名义形成并成为一个[concept_dominion]；\n\n如果[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下认为合适，可以不时授权总督在加拿大任何一个或多个地区以及在在总督乐意的情况下，行使总督认为有必要或适宜分配给他或他们的权力和职能。只要其在加拿大政府成立后继续存在并能够行使，应由总督授予和行使，经[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下枢密院或其任何成员的建议或建议和同意，但须遵守由联合王国议会设立之宪法。\n\n参议院和下议院及其成员各自持有和行使的特权，豁免权和权力应由加拿大议会法案规定，但须呈报联合王国议会审阅；联合王国议会有权驳回加拿大议会之议会法案。\n\n在根据本条⽂召开[concept_election]并设立议会后，上述[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下批准之法案#bold 即适⽤于加拿大联邦#!。"
 joi_flavor_gbr.33.a: "天佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]！"
 #澳大利亚政府法令
 joi_flavor_gbr.34.t: "澳大利亚政府法令"
 joi_flavor_gbr.34.d: "随着澳大利亚联邦的法令由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下签署，新生的[concept_dominion]成为了大英帝国中平等的一员。"
 joi_flavor_gbr.34.f: "#bold 鉴于新南威尔士，塔拉马尼亚，维多利亚，西澳大利亚，南澳大利亚，北领地，新西兰省#!已表示希望在[ROOT.GetCountry.GetName]的王冠下联邦统一为一个[concept_dominion]，其宪法原则与联合王国的宪法相似；由于这样的联盟将有助于各省的福利并促进大英帝国的利益，在议会授权下建立联邦的情况下，不仅应规定[concept_dominion]立法机构的宪法，而且还应宣布其中行政政府的性质，以使英属澳大利亚之联邦制定对其有利的规则：\n\n每⼀位年满⼆⼗⼀岁的男⼦，作为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下天⽣或⼊籍的⾂⺠，或合法成为#bold 澳大利亚公民之身份#!，在该选举令状⽇期之前⾄少六个⽉应进⾏选⺠登记。通过任何条例组建的⽴法机关或为此⽬的⽽制定的条例，并#bold 受该⽴法机关依法制定的条例所须遵守的条件和限制的约束#!：\n\n在联邦内设⽴⽴法委员会，全部议员由具有投票权之公民[concept_election]产生后由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下任命，⽽理事会的其余成员则须由#bold 拥有选举权之公⺠选举产⽣#!。\n\n该⽴法机关根据上述法律或条例，制定⼀切必要的规定，将[concept_dominion]下辖之地区划分为⽅便的选区，并任命和宣布每个选区选举的理事会成员⼈数，编制和修订所有有资格在这些选区内举⾏的[concept_election]中投票的⼈员名单，任命选举官员，以及发布，签署和返还此类选举所需的令状，确定所有有争议的选举结果的有效性，以及#bold 确保此类选举的有序，有效和公正的进⾏#!；\n\n在根据本条⽂设⽴⽴法委员会后，上述[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下批准之法案#bold 即适⽤于澳大利亚联邦#!。"
 joi_flavor_gbr.34.a: "天佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]！"
 #南非联邦法令
 joi_flavor_gbr.35.t: "南非联邦法令"
 joi_flavor_gbr.35.d: "随着南非联邦的法令由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下签署，新生的南非成为了大英帝国中平等的一员。"
 joi_flavor_gbr.35.f: "#bold 鉴于好望角，纳塔尔，德兰士瓦和奥兰治河[concept_colony]#!按照各自议会决议同意的条款和条件制定联盟规定是有利的，并定义联邦[concept_government]行使行政，立法和司法权力；鉴于规定设立省，对地方事务和可能专门保留给省级立法和行政的其他事务具有立法和行政权力是有利的：因此，由至高无上的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，经上议院，下议院的建议和同意，在本届议会中并经其授权，颁布如下：\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下根据枢密院的建议可以合法地通过公告宣布在本法通过后一年内指定的某一天和之后，#bold 英属南非各省应联合为一个立法联盟#!，隶属于一个[concept_government]，名称为#bold 南非联邦#!。在该公告指定之日及之后，联邦[concept_government]和议会在[concept_colony]范围内拥有全部权力和权威，但[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下可在公告后随时任命一位联邦总督；联邦行政属于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下亲自管理或#bold 由总督作为其代表管理#!，并应在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]乐意的情况下在联邦内行使权力。\n\n总督可任命不超过10名的官员来管理总督会同行政会议设立的联邦各部门；在众议院议员第一次大选后，任何部长的任期不得超过三个月，除非他是议会两院的议员；总督#bold 可以指定他认为合适的议会开会时间#!，也可以不时#bold 通过公告或其他方式使议会休会#!。\n\n本法通过之日和确定联邦成立之日之间，各总督应提名一#bold 最高法院#!的法官以便首次将各省划分为[concept_election]区，并在六个月内召开以[concept_election]一个#bold 有充分权力为联邦的秩序和善政制定法律的议会#!，但其议会之法令#bold 须提交联合王国#!之议会审议。\n\n在本条文颁布的三个月后，上述[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下批准之法案#bold 即适⽤于南非联邦#!。"
 joi_flavor_gbr.35.a: "天佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]！"
 #英属印度事务法
 joi_flavor_gbr.36.t: "英属印度法案"
 joi_flavor_gbr.36.d: "随着英属印度政府法令的实施，东印度公司的统治彻底结束了，整个印度最终属于伦敦的直接所有，由总督代表而统治。"
 joi_flavor_gbr.36.f: "#bold 东印度公司拥有管理的领土已经受女王陛下的委托#!，并且法案中提到的财产和权利由该公司以信托方式持有为了上述[concept_government]的目的，由于内阁认定上述领土应由#bold 女王陛下的名义进行管理是有利的#!，在征得女王陛下的同意后#bold 经颁布上议院和下议院#!，并根据其权力在本届议会中召开如下：\n\n目前由东印度公司占有之[concept_colony]，以及该公司受[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#bold 委托授予或行使的所有与[concept_government]有关的权力均应停止#!。所有领土及行政管理之权利应改变而属于女王陛下，并以她的名义行使；印度的或在印度产生的所有领土和其他[concept_taxes]，以及与任何领土有关的所有贡品均应以[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下之名义收取。\n\n为了本法的目的应设立一个理事会，由十五名成员组成，并命名印度总督理事会。东印度公司董事会从担任过该[concept_company]董事的人员中选出七名人员与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下任命的人员行使其权力，并在#bold 经由该理事会投票选举#!且经议会审议后任命代表由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的印度总督；议会有权以[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的名义#bold 罢免和不经理事会的提名任命总督职位#!。\n\n东印度公司的[concept_army]和[concept_fleet]应被视为[ROOT.GetCountry.GetName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的印度[concept_army]和[concept_fleet]，并应承担为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下服务的相同义务，#bold 就像为该公司服务一样#!。\n\n印度总督收到本法案后，应尽快在印度各专员府和[concept_government]宣布本法案。"
 joi_flavor_gbr.36.a: "天佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]！"
 joi_flavor_gbr.36.b: "公司结束了，但帝国仍在！"
 #威斯敏斯特法令
 joi_flavor_gbr.37.t: "[TimeKeeper.GetCurrentDate.Format('y年')]威斯敏斯特法令"
 joi_flavor_gbr.37.d: "[SCOPE.sCountry('GBR_scope').GetName]，[SCOPE.sCountry('AST_scope').GetName]，[SCOPE.sCountry('SAF_scope').GetName]，[SCOPE.sCountry('CAN_scope').GetName]和#yellow 印度#!与#yellow 爱尔兰#!政府的代表齐聚一起，在威斯敏斯特召开了帝国会议，讨论帝国自治的法令规定；历史将把今天认定为大英帝国走向自由的开始。"
 joi_flavor_gbr.37.f: "#bold 鉴于联合王国，加拿大自治领，澳大利亚自治领，南非联邦，爱尔兰[concept_government]代表多年来出席在威斯敏斯特举行的帝国会议#!，同意共同讨论的会议报告中提出的宣言和决议如下：\n\n[GetLawType('law_monarchy').GetName]是#bold 大英帝国成员国自由联合的象征#!，而且它们因#bold 共同效忠#!而团结在一起。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下根据帝国所有成员相互关系的既定宪法立场，任何涉及王位继承或王室风格和头衔的法律的变更此后也应#bold 获得联合王国议会的所有自治领议会之同意#!；\n\n根据既定的宪法立场，联合王国议会今后制定的任何法律均不得延伸至任何上述[concept_british_dominion]，作为该国[concept_government][concept_law]的一部分，除非经该自治领请求并征得其同意。\n\n#bold 保留英属北美法，澳大利亚政府法，南非联邦法和印度政府法在其颁布各国的适用#!，且授予上述各自治领议会或各省立法机关的权力，但仅限于颁布与各省议会或立法机关职权范围内的事项有关的法律分别。\n\n#bold 在本法生效后联合王国议会通过的任何法案中，[concept_colony]一词不得包括任何[concept_british_dominion]一部分的任何省或州#!。"
 joi_flavor_gbr.37.a: "他们已经向帝国证明了自己！"
 #爱尔兰叛乱！
 joi_flavor_gbr.38.t: "爱尔兰叛乱！"
 joi_flavor_gbr.38.d: "由于长期对[ROOT.GetCountry.GetName]统治的愤怒和近期爱尔兰的动荡局势，爱尔兰的本地议会在他们的立法会议上宣布独立了！"
 joi_flavor_gbr.38.f: "男孩凯文·巴里遭到了复仇。复仇是盲目的...这加剧了悲剧，他的死不仅仅是一个人的勇气，而是一个基督徒的脾气。\n如果他说出战友的名字，也许可以救他一命。该提议应该取消判决。尽管断头台笼罩在他身上，他还是拒绝了。但他死后仍为刽子手祈祷。他正值少年心灵最富于慷慨和高尚情操的年纪。\n像他这样的小伙子是一个国家的中坚力量，是地球上的中坚力量..."
 joi_flavor_gbr.38.a: "恐怖组织的胡言乱语！"
 #叛乱结束
 joi_flavor_gbr.39.t: "爱尔兰秩序恢复法"
 joi_flavor_gbr.39.d: "[ROOT.GetCountry.GetName]强大的军队最终踏破了爱尔兰共和军，重新将爱尔兰纳入了伦敦的统治之下，失败者只能充满畏惧的看着他们的英国领主们。"
 joi_flavor_gbr.39.f: "根据[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府的指示，内阁和军队必须行动起来恢复爱尔兰的局势。国民警卫队需要在本法案推行的一个月内在都柏林组建，当地驻军的最高长官有权指挥这支部队并对任何具有参与叛乱嫌疑的人进行军事法庭的审批。"
 joi_flavor_gbr.39.a: "可喜可贺。"
 #联合王国？
 joi_flavor_gbr.40.t: "爱尔兰的联合王国？"
 joi_flavor_gbr.40.d: "随着爱尔兰局势愈发稳定，爱尔兰人对[ROOT.GetCountry.GetName]的统治越发恭顺，或许一个真正执行联合法案的时机到来了。"
 joi_flavor_gbr.40.f: "“鉴于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下分别向大不列颠和爱尔兰议会两院提出的最仁慈的建议，考虑采取最有可能加强和巩固两国之间联系的措施，大不列颠议会两院，英国和爱尔兰议会两院分别同意并决定，为了促进和保障大不列颠和爱尔兰的根本利益，巩固大英帝国的实力、权力和资源，建议采取最有利于爱尔兰人民被合法的融入不列颠公民之身份的选举措施，并按照大不列颠和爱尔兰各自议会的法案所规定的方式，条款和条件达成一致。”"
 joi_flavor_gbr.40.a: "爱尔兰将被授予更多的自治权。"
 joi_flavor_gbr.40.b: "谁敢说爱尔兰不是联合王国的一部分？"
 #技术进步
 joi_flavor_gbr.41.t: "珀金爵士"
 joi_flavor_gbr.41.d: "一名年轻的皇家化学学院的学士，威廉·亨利·珀金爵士，在他的实验室里研究奎宁时却意外发现了一种新的化学染料。"
 joi_flavor_gbr.41.f: "“这玩意，我管他叫苯胺紫；这种物质在光和洗擦都不易脱色，非常适合当染料！就在前天，我在实验室里帮霍夫曼教授研究奎宁的时候，我发现苯胺可以部分转化为粗混合物，用酒精提取时，会产生一种深紫色的物质；所以我就偷偷的把这玩意从实验室里偷出来，带到家里和朋友们一起研究它，哈！可好用了！现在我想要去申请这玩意的专利，我相信我们已经发现了一种可能的替代品，我们发财了！"
 joi_flavor_gbr.41.a: "是的，你们发财了！"
 #英王陛下政府彩蛋事件
 joi_flavor_gbr.42.t: "陛下的生日庆典"
 joi_flavor_gbr.42.d: "一年一度的#V 君主生日#!又来到了[ROOT.GetCountry.GetName]，放假的人们欢聚在街头和广场庆祝这难得的休息时间，君主本人则在寿宴上按照惯例发布了生日授勋名单，向人们颁发纪念这一天的荣誉。"
 joi_flavor_gbr.42.f: "自1748年以来乔治三世国王陛下的统治以来，君主的生日就成为了不列颠群岛的官方节日；而在1760年之后，君主的生日也开始在整个大英帝国的海外臣民中被作为官方节日庆祝。虽然实际每一任陛下的诞辰日期都有所不同，但君主的生日却总是被固定在六月的某一天。\n\n从伦敦到多伦多，从悉尼到金斯顿，庆祝活动遍及每个城镇和村庄，每条街道都装饰着金狮，红狮和竖琴的王室徽旗。对于许多忠于[GetLawType('law_monarchy').GetName]的人来说，这是一个表达他们忠诚之心的好日子；对其他人而言，这也是一个值得放下手中繁忙的工作和争论，让自己好好快乐一天的轻松时刻。\n\n向陛下致敬！"
 joi_flavor_gbr.42.a: "天佑吾王，常胜利，沐荣光！"
 joi_flavor_gbr.42.b: "天佑吾王，常胜利，沐荣光！"
 joi_flavor_gbr.43.t: "帝国日"
 joi_flavor_gbr.43.d: "一年一度的#V 帝国日#!又来到了[ROOT.GetCountry.GetName]，帝国的支持者和士兵们在街道上组织游行，盛大的庆祝仪式被举办，在帝国的许多领地上，还按照惯例举行了烟花仪式来庆祝这个象征着团结与荣耀的节日。"
 joi_flavor_gbr.43.f: "早期的大英帝国并没有一个用于庆祝帝国这个概念的节日。不过在皇家殖民研究所的学者和帝国联邦联盟的爵士们提议下，这个节日在整个大英帝国范围内被设立为一个官方庆典，用来提醒孩子们他们是大英帝国的一部分。这一天的核心是对英国国旗进行有组织的、仪式性的崇敬，人们全天放假，这个节日被它的设立者们期待能够在年轻的帝国公民中培养集体认同感和帝国责任感。\n\n从大不列颠到直布罗陀，从加拿大到澳大拉西亚，从远东到南非，每个城市的广场上都悬挂着蓝，白，红的米字旗和属于自己的旗帜，每一口钟都自豪地宣告着这一天的庆祝；贵族、军官和无数老兵在欢呼雀跃的人群中自豪地游行。的确，这是一个美好的日子，一个让我们回想起自帝国建立以来所享有的和平与繁荣的日子。\n\n向帝国致敬！"
 joi_flavor_gbr.43.a: "这个日子属于大英帝国和[ROOT.GetCountry.GetName]的所有人！"
 #第二轮重置事件	重建威斯敏斯特
 joi_flavor_gbr.44.t: "威斯敏斯特宫"
 joi_flavor_gbr.44.d: "在1834年的大火摧毁旧宫殿后，[TimeKeeper.GetCurrentDate.Format('y年')]的今天，一座新的议会宫终于在#V 查尔斯·巴里爵士#!与#V 奥古斯都·普金先生#!的主持下建造完成。它大致呈矩形，其长轴与泰晤士河平行，围绕的中央大厅拥有一个宽敞的走廊，北通下议院，南通上议院，东侧则是委员会会议室和图书馆，那里还雕刻了一系列杰出议员的大理石雕像。"
 joi_flavor_gbr.44.f: "“陛下，这是一种沙色的镁质石灰岩，产自南约克郡的安斯顿村和诺丁汉郡的曼斯菲尔德伍德豪斯；它通过切斯特菲尔德运河、北海以及特伦特河和泰晤士河进行水运，供应我们厚达四英尺的荒料，适合精细雕刻。”\n\n“这是中央塔楼，它是三座主要塔楼中最矮的一座，我把它把它变成了尖顶，这样它就可以与烟囱一起工作排出烟雾；这也是我们的机械服务第一次对建筑设计产生真正的影响。”\n\n“陛下，这座宫殿完全是希腊式的；但它古典的主体上却充满了都铎式的细节。”"
 joi_flavor_gbr.44.a: "它将成为[ROOT.GetCountry.GetName]无与伦比的辉煌象征！"
 joi_flavor_gbr.45.t: "石匠罢工"
 joi_flavor_gbr.45.d: "威斯敏斯特宫的工地上，石匠工人因劳资纠纷而发起罢工，要求改善工资与工作条件；罢工一度导致议会重建的工程陷入了停滞。"
 joi_flavor_gbr.45.f: "“后来知道，这些害怕秘密会泄露出去的先生们经过热烈的商谈以后，决定在建筑工人没有正式放弃“协会”以前，在“巴里先生的工人们没有停止罢工”以前，同业协会的任何会员都不应开业；后一点很快就调解好了，因为不久以前查尔斯·巴里先生同石匠们举行了谈判，他郑重其事地断言，对他的指责完全是出于一种误会”"
 joi_flavor_gbr.45.a: "他们不干有的是人干！"
 joi_flavor_gbr.45.b: "给他们加工资。"
 #议会按钮事件
 joi_flavor_gbr.46.t: "[TimeKeeper.GetCurrentDate.Format('y年')]度预算案辩论"
 joi_flavor_gbr.46.d: "根据财政年度安排，[SCOPE.sParty('ruling_party').GetName]政府需向下议院提交新的预算案，以明确公共支出和收入来源；预算辩论不仅涉及财政拨款分配，也关系到各部门的政策优先顺序和国会对[ROOT.GetCountry.GetName]财政方针的监督职能。"
 joi_flavor_gbr.46.f: "“预算案为[ROOT.GetCountry.GetName]设定了新的长期目标，并应对了经济面临的主要挑战。这是一份旨在确保经济稳定、奖励劳动、鼓励创业和促进公平的预算案。”\n\n“本预算案是本届[SCOPE.sParty('ruling_party').GetName]政府计划的延伸、旨在通过彻底的税收和福利改革以及技能一揽子计划将促进就业并使工作更有回报。”\n\n“公平措施将有助于支持有子女的家庭，解决劳工贫困问题，改善公共服务和环境，并通过打击避税行为确保个人和企业缴纳合适的税款。”"
 joi_flavor_gbr.46.a: "政府应该拨款支持制造业。"
 joi_flavor_gbr.46.b: "农民们需要来自[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的支持。"
 joi_flavor_gbr.46.c: "为纳税人提供更好的基建！"
 joi_flavor_gbr.46.e: "提议推动新的公民福利计划。"
 joi_flavor_gbr.46.h: "我们的军队必须收到最多的预算！"
 joi_flavor_gbr.47.t: "紧急议会"
 joi_flavor_gbr.47.d: "面对着当前的特殊情况，[SCOPE.sParty('ruling_party').GetName]政府决定建议[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下召集紧急会议，以在法定会期外就紧急事务进行讨论。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下已经在今天上午批准了[SCOPE.sParty('ruling_party').GetName]政府的请求，然而，威斯敏斯特的座位似乎并没有坐满。"
 joi_flavor_gbr.47.f: "“我在此提议，本院就[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下我们刚刚听取的、今晨由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下特使向新组建的议会发表的慷慨演讲，向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下致辞。”\n\n“我们与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下一样相信，主要列强在所有事关欧洲重大利益的事务上联合起来将为维护和平提供坚实的保障；通过[SCOPE.sParty('ruling_party').GetName]内阁不断收到的外国列强令人满意的保证，表示他们希望与我国保持最友好的关系。”\n\n“作为一名商人，我非常高兴地看到[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下在御座致辞中祝贺[ROOT.GetCountry.GetName]，而不是祝贺外交事务的成功，或英国军队的巨大成功，而是祝贺与某个商业国家签订了新的自由商业条约，因为我们必须依靠这种方式来维护这个国家的伟大，而不是依靠我们舰队的威力。”"
 joi_flavor_gbr.47.a: "议会必须推动动员法案以应对战争。"
 joi_flavor_gbr.47.b: "议会必须授予政府更多的镇压权！"
 joi_flavor_gbr.47.c: "议会需要就当前法案设立特别委员会。"
 joi_flavor_gbr.47.e: "要求议会为政府考虑一份补充预算。"
 joi_flavor_gbr.48.t: "不信任投票"
 joi_flavor_gbr.48.d: "随着现任政府统治力和衰退和其在下议院的不利局势，议院开始认为[SCOPE.sParty('ruling_party').GetName]政府已无法维持多数支持，并在今天向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府提出了不信任动议，试图鼓动#yellow #B [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下最忠诚的反对党#!#!和其他党派的议员们共同推翻[SCOPE.sParty('ruling_party').GetName]的统治。"
 joi_flavor_gbr.48.f: "“谨向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下呈上如下谦卑的致辞：\n\n最仁慈的君主，\n\n我们，陛下最尽职尽责、最忠诚的臣民，#O #B 大不列颠及爱尔兰联合王国#!#!下议院议员，在此集会，谨向[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下致以谦卑的谢意，感谢陛下对议会两院发表的亲切演讲。\n\n但我们有责任恭敬地向陛下呈上以下信息：#B 陛下目前的顾问并未得到本院的信任。#!”"
 joi_flavor_gbr.48.a: "执政党必须团结起来应对动议。"
 joi_flavor_gbr.48.b: "投票通过了，内阁必须辞职！"
 joi_flavor_gbr.49.t: "皇家公告"
 joi_flavor_gbr.49.d: "首相总是可以建议[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下解散议会并由选举委员会启动新一轮大选；现任的[SCOPE.sParty('ruling_party').GetName]政府考虑到当前对他们的有利局势，已经拜访了[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，并成功说服陛下行使特权发布皇家公告，解散议会并开始[concept_election]程序。"
 joi_flavor_gbr.49.f: "“鉴于经枢密院建议，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下认为有必要解散本届议会，使本届议会暂停行使其职能；为此，我们特发布此皇家公告，并据此解散上述议会。神职人员和世俗议员以及下议院议员不再出席议会。”\n\n“[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下渴望并决心尽快与人民会面，并在议会中听取他们的建议，特此向我们所有亲爱的臣民宣布：我们皇家意愿并乐意召开新一届议会；并特此进一步宣布，经枢密院建议，我们已下令，由[SCOPE.sParty('ruling_party').GetName]首相在接到通知后，立即发布依照法律并按适当形式发出召集新议会的令状。”\n\n“我们还特此以我国国玺颁布的皇家公告，要求首相和国务大臣立即分别发出令状，以便将在上述议会任职的神职人员、世俗议员和平民议员于选举结束后正式返回我国议会，并出席会议；这些令状须依法归还。”"
 joi_flavor_gbr.49.a: "[SCOPE.sParty('ruling_party').GetName]的大臣们怕是要成为尊敬的后座议员了。"
 joi_flavor_gbr.49.b: "[SCOPE.sParty('ruling_party').GetName]在过去几年的功绩公民们有目共睹。"
 joi_flavor_gbr.49.c: "相信[SCOPE.sParty('ruling_party').GetName]能继续获得选民们的信任！"
 joi_flavor_gbr.50.t: "殖民主义政策"
 joi_flavor_gbr.50.d: "在议会的例行辩论中，#O #B 殖民政策#!#!再次成为全体议员关注的核心议题。支持扩张的议员强调，帝国在海外领地的存在关乎战略防御和经济利益的延续；而反对者则认为，过度的扩张会加重财政负担并引发与臣民的政治摩擦。[ROOT.GetCountry.GetName]应该如何在维护统治、推动发展与尊重自治之间取得平衡？"
 joi_flavor_gbr.50.f: "“我赞同尊敬的[SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName]议员所表达的意见，即这是提交议会审议的最重要的问题之一：当我读到这些事情时，我完全无法解释为什么有些人如此鲁莽地断言，说我们可耻地忽视了我们在殖民地的职责，而我本以为，从他们对这些领地的了解来看，他们应该对这个问题有更深入的了解。”\n\n“[SCOPE.sParty('ruling_party').GetName]政府完全承认，这并不意味着因为所有这些改进，我们这些殖民地中现有的政府就是现在可以设想的最好的政府；但我要说的是——如果我们要根据当地政府在当时条件下的施政成果来检验它们，那么就没有理由谴责它玩忽职守、效率低下。”\n\n“我的理解是，您这样说是代表了许多在当地从事这项服务的聪明人的观点吧？——毫无疑问。”"
 joi_flavor_gbr.50.a: "我们需要推动新的殖民扩张。"
 joi_flavor_gbr.50.b: "政府有义务在殖民地中传播真正的文明。"
 joi_flavor_gbr.50.c: "海外臣民必须负担一部分帝国的军费。"
 joi_flavor_gbr.50.e: "它们真正需要的是实现更好的自治！"
 joi_flavor_gbr.50.h: "殖民主义已经走到末路了，政府需要开始推动独立议程。"
 joi_flavor_gbr.51.t: "帝国战时内阁"
 joi_flavor_gbr.51.d: "随着[ROOT.GetCountry.GetName]卷入日益激烈的全球冲突，[SCOPE.sParty('ruling_party').GetName]政府正面临着前所未有的压力：[SCOPE.sCharacter('westminster_general_scope').GetFullName]，一位重要的[SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle]宣布从内阁中辞职，并在离任后对两位内阁部长的决策提出尖锐批评，将[SCOPE.sParty('ruling_party').GetName]内阁是否在战争时期适任的争议推向了高潮。"
 joi_flavor_gbr.51.f: "“议长先生，您以主席身份宣读的动议中提出的要求，据我所知，在本院历史上绝对是史无前例的：[SCOPE.sCharacter('westminster_general_scope').GetLastName][SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle]，一位杰出的[SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle]，无论出于好或坏的原因，辞去了他已任职两年的职务，并在离任后对两位部长在他任职期间所作的陈述提出质疑？”\n\n“我说我受到了不公平的对待：我想[SCOPE.sCharacter('westminster_general_scope').GetLastName][SCOPE.sCharacter('westminster_general_scope').GetPrimaryRoleTitle]可能没有跟我谈过这件事，因为他认为首先应该和他的顶头上司谈——要么是陆军大臣，要么是帝国总参谋长；也许他认为跟我谈不上他该谈。”\n\n“现在[SCOPE.sCountry('enemy_country_scope').GetName]正悄无声息地、在迷雾笼罩下准备着或许是战争中最重大的打击。战士们请求我们提供更多的帮助：为了我们共同的国家，为了它现在和未来几周的命运，我真心恳求议会停止这种攻击，并将精力放在支持我们的将军和士兵上。”"
 joi_flavor_gbr.51.a: "战时内阁必须为本土和欧洲防卫做好准备。"
 joi_flavor_gbr.51.b: "内阁需要能够实现全球防卫的指挥机构！"
 #英国内战
 joi_flavor_gbr.52.t: "保王党人起义"
 joi_flavor_gbr.52.d: "随着[GetLawType('law_monarchy').GetName]被废除，王权的支持者在全国各地集结并以#V 捍卫神圣宪制#!的理由发动了武装暴动；[GetIdeology('ideology_royalist').GetName]将[ROOT.GetCountry.GetName]的现任政府视为篡权的叛乱者，国家正走向一场决定政体与权力归属的全面内战。"
 joi_flavor_gbr.52.f: "“国王陛下的统治权力源于上帝赋予的君权神授，以及他加冕受膏时[ROOT.GetCountry.GetName]的传统和法律，试图推翻他的人所行使的权力仅仅是武力...没有一位博学的律师会肯定可以对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]提出弹劾：他们的座右铭之一是，国王不会做错事。”\n\n“我必须告诉你们，他们的自由在于拥有政府，但这并不是指他们参与政府事务；那与他们无关。臣民和国王是截然不同的！”"
 joi_flavor_gbr.52.a: "黑暗时代的降临。"
 joi_flavor_gbr.53.t: "议会派宣布废黜[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]"
 joi_flavor_gbr.53.d: "在血腥的对抗与不断升级的政治冲突中，[GetIdeology('ideology_constitutionalist').GetName]最终决定以#B 叛国与暴政的罪名#!正式宣布[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的王位不再合法并废除了[GetLawType('law_monarchy').GetName]，率领军队发动了对抗[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的武装叛乱。毫无疑问，继#V 1642年的英国内战#!以来，[ROOT.GetCountry.GetName]正再次被推向一场决定未来政体的内战。"
 joi_flavor_gbr.53.f: "“不列颠国王，[ROOT.GetCountry.GetRuler.GetFullName]，出于邪恶的意图，试图建立和维护自己无限的暴政权力，按照他的意愿进行统治，推翻人民的权利和自由，在要剥夺和废除人民的权利和自由的基础上，实行一切纠正和补救失政的措施；根据[ROOT.GetCountry.GetName]的基本宪法，这些权力和措施是代表人民在经常举行的议会或全国枢密会议上保留的；上述[ROOT.GetCountry.GetRuler.GetFullName]，为了实现他的邪恶计划，为了保护他自己及其追随者的邪恶行为，为了达到同样的目的，叛国地、恶意地对现任议会及其所代表的人民发动战争。”\n\n“综上所述，[ROOT.GetCountry.GetRuler.GetFullName]是上述这些违反自然、残酷而血腥的战争的煽动者、始作俑者和延续者，并且在战争中对我国犯下了或由此引起的一切叛国罪、谋杀罪、劫掠罪、焚烧罪、掠夺罪、毁坏罪、损害罪和伤害罪，理应判处死刑！”"
 joi_flavor_gbr.53.a: "大逆不道！"
 #议会改革事件
 joi_flavor_gbr.54.t: "[TimeKeeper.GetCurrentDate.Format('y年')]改革法案"
 joi_flavor_gbr.54.d: "在长期的呼声与激烈的辩论之后，议会推荐的[TimeKeeper.GetCurrentDate.Format('y年')]改革法案终于在[TimeKeeper.GetCurrentDate.Format('y年 m月')]得到了[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的御准。它扩大了[ROOT.GetCountry.GetName]的选举权范围，使更广泛的男性群体能够登记为选民；尽管选举资格依然附带着一定的财产条件，但许多城镇的[ROOT.GetCountry.GetNameNoFlag]公民们仍然为此欢呼雀跃！"
 joi_flavor_gbr.54.f: "“鉴于修改有关英格兰和威尔士人民代表权的法律是适宜的，经本届议会精神、世俗上议院议员和下议院议员的建议和同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n自公元[TimeKeeper.GetCurrentDate.Format('y年 m月')]起，每个男子都有权登记为选民，并在登记后，选举一名或多名议员代表自治市镇在议会任职，该议员应具备以下资格：已成年，且不存在任何法律上无行为能力的情况；并且在过去十二个日历月的整个期间内，作为业主或租户，是自治区内任何住宅的居住者或占用者，且已于[TimeKeeper.GetCurrentDate.Format('m月 d日')]前真诚地支付了应付的济贫税相等的金额。\n\n在任何一年的七月最后一天，并且在之前的十二个月内，作为所有者或租户，是该县土地或房屋的占用者，其应税价值为十二英镑或以上；并且在占用期间，其所占用的房屋已按为救济穷人而制定的所有税率缴纳。”"
 joi_flavor_gbr.54.a: "[SCOPE.sParty('ruling_party').GetName]政府将从中获益。"
 joi_flavor_gbr.54.b: "数百万获得了选举权的新选民一定会感谢[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下！"
 joi_flavor_gbr.55.t: "[TimeKeeper.GetCurrentDate.Format('y年')]人民代表法案"
 joi_flavor_gbr.55.d: "经历了漫长的辩论，[SCOPE.sParty('ruling_party').GetName]的主张最终取得了胜利：[SCOPE.sCharacter('ig_intelligentsia_leader').GetFullName]一手推动的[TimeKeeper.GetCurrentDate.Format('y年')]人民代表法案得到了[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的御准，赋予了全体[ROOT.GetCountry.GetName]成年男性公民以普选权，并使得女性也以特定条件的身份进入了公共政治。许多人都认为，这将是[ROOT.GetCountry.GetNameNoFlag]宪政民主史上的关键一笔。"
 joi_flavor_gbr.55.f: "“鉴于修改有关议会和地方政府选举权、议会和地方政府选民登记、选举行为的法律，并规定议会选举席位的重新分配，以及与此相关的其他目的是适宜的，经本届议会精神、世俗议院议员和下议院议员的建议和同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n任何男子，如果已成年且不存在任何法律行为能力障碍，且以所有者或租户的身份占用该地区的任何土地或房屋，则有权登记为地方政府选区的选民或议员候选人。\n\n任何妇女，如果她是在他们共同居住的房屋内进行登记的男子的妻子，或者取得了任何等同于学士学位的资质，并且她已年满30岁，则有权登记为地方政府选民。\n\n如果海军或军事选民已就其本应拥有的居住资格进行登记，而该资格若非因其服役而应已获得，则应被视为根据该资格而居住。”"
 joi_flavor_gbr.55.a: "下议院就是公民主权的最佳代表！"
 joi_flavor_gbr.55.b: "[GetIdeology('ideology_feminist').GetName]的思想将推动我们继续变革。"
 joi_flavor_gbr.56.t: "[TimeKeeper.GetCurrentDate.Format('y年')]人民代表法案"
 joi_flavor_gbr.56.d: "在经历了长期的[GetIdeology('ideology_feminist').GetName]运动与议会辩论之后，[ROOT.GetCountry.GetName]终于迈出了决定性的一步：就在[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，由[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下御准的[TimeKeeper.GetCurrentDate.Format('y年')]人民代表法案废除了对女性年龄和婚姻状况的限制，将投票权完全平等地赋予所有年满二十一岁的男女公民。从此选举权不再受到性别之分，获得了投票权的无数女性[ROOT.GetCountry.GetNameNoFlag]公民为[SCOPE.sParty('ruling_party').GetName]政府的伟大改革而欢呼！"
 joi_flavor_gbr.56.f: "“鉴于旨在平等化男女在议会和地方政府选举中的选举权，并实现其后续法案目的是适宜的，经本届议会精神、世俗上议院议员和下议院议员的建议和同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n任何已登记为任何选区的议会选民的人，在登记期间，如果是女性，无论性别或婚姻状况如何，均有权在该选区的议会议员选举中投票，但一个人不得在一次大选中投票超过一人。\n\n有权根据本条前述规定在地方政府选区登记为地方政府选民的人的丈夫或妻子，若其已成年且不存在任何法定行为能力障碍，则有权在该选区登记为地方政府选民。”"
 joi_flavor_gbr.56.a: "权力平等地属于[ROOT.GetCountry.GetName]的全体人民！"
 #谷物法事件
 joi_flavor_gbr.57.t: "[TimeKeeper.GetCurrentDate.Format('y年')]进口法案"
 joi_flavor_gbr.57.d: "经过了[SCOPE.sParty('ruling_party').GetName]的内部分裂和[SCOPE.sCharacter('corbden_leader').GetFullName]与[SCOPE.sCharacter('peel_leader').GetFullName]的共同合作，自1815年以来就一直保护着[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]利益的#V 谷物法#!最终在昨天被得到了[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下御准的#V [TimeKeeper.GetCurrentDate.Format('y年')]进口法案#!所终结，代表着[GetLawType('law_free_trade').GetName]主张的彻底胜利。"
 joi_flavor_gbr.57.f: "“关于我们提出这些措施，我无意剥夺任何人应得的功劳；但我要说的是，无论是坐在对面长凳上的先生们，还是我本人，或是坐在我周围的先生们——我都不是严格意义上有权享有这些功劳的政党。这其中存在着多党联合，而这种联合加上[SCOPE.sParty('ruling_party').GetName]政府的影响，最终促成了这些措施的成功。”\n\n“但是，先生，有一个名字应该与这些措施的成功联系在一起：它既不是[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的那位贵族勋爵的名字，也不是我的名字：与这些措施的成功联系在一起的，应该而且将会联系在一起的，是一位名叫[SCOPE.sCharacter('corbden_leader').GetFullName]的人的名字。”\n\n“我相信，他出于纯粹无私的动机，以不懈的热情，运用理性，雄辩地表达这些措施的理念，其雄辩之辞因其朴实无华而更令人钦佩。与这些措施的成功联系在一起的，应该而且将会联系在一起的，是[SCOPE.sCharacter('corbden_leader').GetFullName]；我毫不犹豫地将这些措施的成功归功于他。”"
 joi_flavor_gbr.57.a: "农民的利益仍然需要得到关注。"
 joi_flavor_gbr.57.b: "[GetLawType('law_free_trade').GetName]将带领我们走向新的繁荣！"
 joi_flavor_gbr.58.t: "[TimeKeeper.GetCurrentDate.Format('y年')]航海法案"
 joi_flavor_gbr.58.d: "在[SCOPE.sParty('ruling_party').GetName]的强烈主张下，[ROOT.GetCountry.GetName]议会通过了全新的#V 航海法案#!。这一法案继承了自17世纪以来的[GetLawType('law_mercantilism').GetName]传统，旨在通过限制殖民地贸易和强化船舶国籍要求进一步保障[ROOT.GetCountry.GetNameNoFlag]的经济利益。然而这一举措也让[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]，[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]和海外[concept_subject]们纷纷怨声载道。"
 joi_flavor_gbr.58.f: "“凡真正属于[ROOT.GetCountry.GetName]的船舶，其船长须为英国人，在航行中由至少一半英国海员和唯一一名英国船长驾驶，其所携带的来自于非欧洲大陆的商品，不另行缴纳关税。”\n\n“如果[ROOT.GetCountry.GetName]的任何海关官员签发任何许可证，或允许将其他国家的土地、岛屿、殖民地、种植园、领土或地方生长的任何糖、烟草、生姜、棉花、羊毛、木材运往任何其他国家或地方，直至这些货物首先被卸货并运抵[ROOT.GetCountry.GetNameNoFlag]的某个港口或避风港，则任何此类官员应因此类违法行为丧失其职位。”\n\n“如果任何人或团体抵抗或以武力反抗上述法令，则他将受到严厉的惩罚，除了该法令中规定的对此类罪行的处罚外，还将被送交发生此类罪行的郡县，不得保释或拘禁，直到他向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的继承人和继任者提供足额的1/10货物价值的英镑罚款作为担保，保证不再犯下或再次犯下类似罪行。”"
 joi_flavor_gbr.58.a: "我们海外的[concept_subject]必须为[ROOT.GetCountry.GetNameNoFlag]提供更多利益！"
 joi_flavor_gbr.58.b: "亚当斯密的[GetLawType('law_mercantilism').GetName]，我们必须继承！"
 joi_flavor_gbr.59.t: "反谷物法联盟"
 joi_flavor_gbr.59.d: "围绕谷物关税的辩论逐渐演变为一场全国性的政治斗争，在[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]的支持下，一名知名的[GetIdeology('ideology_market_liberal').GetName]演说家得到了[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]的支持，组建了一个新的民间施压联盟：#V 反谷物法联盟#!，要求[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府推动[GetLawType('law_free_trade').GetName]的议程。"
 joi_flavor_gbr.59.f: "“当@grain!#V 谷物#!价格高涨时，人们负担不起这些食物，以至于他们几乎没有剩余的钱来买@clothes!#V 衣服#!；而当他们几乎没有剩余的钱来买衣服时，衣服就卖不出去；而当@clothes!#V 衣服#!卖不出去时，又有太多衣服可卖，衣服就非常便宜；而当@clothes!#V 衣服#!非常便宜时，制造衣服的收入又不够高：结果，纺织厂工人的工资下降，工厂倒闭，生意惨淡，全国普遍陷入困境。”\n\n“但是，就像现在这样，当工人口袋里还剩下25先令时，他会用这笔钱来购买更多的@clothes!#V 衣服#!，这就增加了对这些物品的需求，而需求越大，就会导致它们的价格上涨，而上涨的价格又使工人获得更高的工资，雇主获得更好的利润。因此，这就是我证明@grain!#V 谷物#!高价导致工资降低，而@grain!#V 谷物#!廉价导致工资升高的方法。”"
 joi_flavor_gbr.59.a: "谷物法必须被废除！"
 joi_flavor_gbr.59.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府对此持保留意见。"
 joi_flavor_gbr.60.t: "中央农业保护协会"
 joi_flavor_gbr.60.d: "随着#V 反谷物法运动#!的声势日渐高涨，感到自身利益受到威胁的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]，[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]和保守派议员成立了一个名为#V 中央农业保护协会#!的政治联盟，试图在民间预留上捍卫谷物法的正当性，并借此向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府施压。"
 joi_flavor_gbr.60.f: "“各位大人，毫无疑问，您有责任考虑提交给您的所有措施，您有权对您认为合适的措施进行投票；尤其是，您有责任投票反对那些看似草率和不顾后果的措施；但是，各位大人，我请求允许向各位大人指出，你们也有义务认真考虑你们就任何问题所作的任何投票的后果——认真考虑你们将本院置于何种境地。”\n\n“各位大人，我现在请你们稍微审视一下今晚你们将要投票的议案——审视一下它提交给你们的方式，并考虑一下如果你们通过该法案可能带来的后果：我的贵族朋友表示，此次投票与下议院最初就同一问题做出的投票不一致，也与选举他们当选的选民所持有的所谓观点不一致。”"
 joi_flavor_gbr.60.a: "这肯定会在[SCOPE.sParty('ruling_party').GetName]内部导致分裂。"
 joi_flavor_gbr.60.b: "所谓协会不过是一块安抚佃农的奶嘴。"
 #海军
 joi_flavor_gbr.61.t: "[TimeKeeper.GetCurrentDate.Format('y年')]皇家海军阅舰式"
 joi_flavor_gbr.61.d: "一艘艘全新的#O #B 主力舰#!#!和#B #O 护卫舰#!#!在#V 海军大臣[SCOPE.sCharacter('lord_high_admiral').GetFullName]和议会#!的支持下被建成下海，恢弘的[concept_fleet]在#V 朴次茅斯#!港口列队，一眼望去成片的战舰铺满了整片海洋，就连波涛都被镇压在了战舰的脚下，#B 即便是波塞冬在不列颠尼亚的面前都要黯然失色！#!军乐队的歌声响起，宣讲官得意洋洋的告诉骇然失色的[SCOPE.sCountry('great_power_2nd').GetName]与[SCOPE.sCountry('great_power_3rd').GetName]观礼军官，不仅是这只伟大的[concept_fleet]，而且在她们的背后还有一个[ROOT.GetCountry.GetName]强大商船队支持的全球[concept_shipping_lane]，#V 以及最关键的，一个伟大的帝国。#!"
 joi_flavor_gbr.61.f: "#B “统治吧，不列颠尼亚！您主宰每片浪涛！不列颠子民们永远永远也不会成为奴隶！#!\n\n#B 希望与光荣的土地，自由之母；#!\n\n我们该如何赞美您，怎样将尔传颂？\n\n 你公正的律法，被自由护航，让您的帝国固若金汤；\n\n#B 您的疆域被开拓，宽而益广；上帝成就你伟业，使您坚而益强；#!\n\n听，这希望与光荣的国度，悦而答复；看，那众口感恩，众心鼓舞！\n\n#B 我心坚定，我身自主，我们加冕于吾王！”#!"
 joi_flavor_gbr.61.a: "希望与光荣的土地，我们该如何赞美你？"
 joi_flavor_gbr.61.b: "统治吧，不列颠尼亚！不列颠尼亚统治海洋！"
 #威灵顿公爵的葬礼
 joi_flavor_gbr.62.t: "威灵顿公爵的葬礼"
 joi_flavor_gbr.62.d: "[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，#V 陆军元帅，前任首相，滑铁卢的胜利者，世界征服者的征服者，最尊贵的威灵顿公爵[SCOPE.sCharacter('duke_of_wellington_scope').GetFullName]殿下#!因中风辞世。他是[ROOT.GetCountry.GetName]政治与军事舞台上最具声望的人物，他的去世令举国哀悼。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下下令为他举行盛大的国葬，整个[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]成千上万人聚集街头，目送这位最伟大的元帅最后一次行进于泰晤士河畔，进入圣保罗大教堂的长眠之所。同一天[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]下起了暴雨，仿佛上帝都在为这个男人的去世而哀悼。"
 joi_flavor_gbr.62.f: "“今夜，下议院被召唤去履行一项悲痛而崇高的职责——展现一个元老院为英雄致哀的景象：[ROOT.GetCountry.GetName]荣耀的陆军元帅，最尊贵的威灵顿公爵[SCOPE.sCharacter('duke_of_wellington_scope').GetFullName]殿下的葬礼。他不仅是一位伟人，更是动荡时代中的光明与不列颠人的英雄；他留给祖国的遗产甚至比他的声名更伟大：那是其品格的典范、功绩的辉煌、生活的简朴与动机的纯正。”\n\n“[SCOPE.sCharacter('duke_of_wellington_scope').GetFullName]殿下是当之无愧的，英格兰绅士与不列颠民族的典范：他表达了他们的情感，展现了他们的性格，捍卫了他们的荣誉，维护了他们的荣耀。人们在他的胜利中感到整个国家在凯旋；而在他的陨落中，人们亦感到不列颠尼亚为他而发出的哀痛与悲伤。”"
 joi_flavor_gbr.62.a: "愿他安息，并在主的荣耀中复活。"
 #议会法案日志事件
 joi_flavor_gbr.63.t: "[TimeKeeper.GetCurrentDate.Format('y年')]初等教育法"
 joi_flavor_gbr.63.d: "经过长期的辩论，议会终于通过了一项具有划时代意义的法案：在[ROOT.GetCountry.GetName]境内建立普遍的公共小学体系，使得任何儿童都应当有机会接受教育，而不再因父母贫困而被拒之门外，并提供一个更世俗的学习环境，标志着[ROOT.GetCountry.GetNameNoFlag]步入义务教育的时代。"
 joi_flavor_gbr.63.f: "“鉴于在英格兰，威尔士，苏格兰与爱尔兰等联合王国属地提供公共基础教育是适宜的，经本届议会精神、世俗议院议员和下议院议员的建议和同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n任何儿童被录取或继续在学校就读，不得以下列条件作为条件：他必须参加或不参加任何主日学校或任何宗教礼拜场所，或参加学校或其他地方的任何宗教仪式或宗教科目的任何教学。\n\n学校董事会有义务根据[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下督察官的授权，为居住在其辖区内、其父母因贫困而无力支付学费的任何儿童支付任何公立小学应支付的全部或部分学费。”"
 joi_flavor_gbr.63.a: "确保政府不会为此付出过度的行政力量。"
 joi_flavor_gbr.63.b: "这份法案将很好惠及[ROOT.GetCountry.GetNameNoFlag]的下一代们。"
 joi_flavor_gbr.64.t: "[TimeKeeper.GetCurrentDate.Format('y年')]国家援助法"
 joi_flavor_gbr.64.d: "[GetLawType('law_poor_laws').GetName]与它对应的马尔萨斯主义原则曾经是[ROOT.GetCountry.GetName]社会救济的基石，但在长期的批评声中，它越来越被视为陈旧、苛刻甚至带有耻辱的制度；根据议会的新法案，[GetLawType('law_old_age_pension').GetName]将取[GetLawType('law_poor_laws').GetName]而代之，由公共资金和地方当局共同承担，以人道主义为本向最贫困的群体提供体面的救济。"
 joi_flavor_gbr.64.f: "“现行济贫法应停止生效，并由本法第二部分关于使用议会提供的资金向需要帮助的人提供援助的规定、本法第三部分关于地方当局提供的住宿和其他服务的规定以及本法第四部分的相关规定取代。”\n\n“委员会有义务根据本法的规定，协助那些在英国无力满足自身需求或其资源必须得到补充才能满足自身需求的人；并应为盲人和因接受呼吸系统结核病治疗而遭受收入损失的人作出特殊规定。”\n\n“如果委员会认为，为保护援助补助金申请人或其受抚养人的利益，有必要将全部或部分补助金发放给申请人以外的其他人，则委员会可据此发放补助金；任何援助补助金收据均免征印花税。”"
 joi_flavor_gbr.64.a: "这是进步与人道的胜利。"
 joi_flavor_gbr.64.b: "济贫法，滚蛋吧！"
 #劳动法事件
 joi_flavor_gbr.65.t: "[TimeKeeper.GetCurrentDate.Format('y年')]雇佣合同法"
 joi_flavor_gbr.65.d: "经过多年来罢工、集会与工会的激烈斗争，#O #b $movement_labor$#!#!最终赢得了议会的关注；而工厂事故的频发和工人伤亡无数的现实又使得社会舆论逐渐倒向工人一边。在不断的抗争与压力之下，政府被迫让步，颁布了新的[GetLawType('law_worker_protections').GetName]，首次承认雇主对工伤的赔偿责任和最低工资要求。"
 joi_flavor_gbr.65.f: "“鉴于制定一部关于在工作中因意外受伤之工人应获赔偿的法律为时所需，经本届议会精神、世俗院与下议院议员之建议与同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n凡在任何雇佣劳动中，工人因工遭受意外伤害，其雇主应依照本法第一附表承担赔偿责任，但须遵循下列条件；若伤害发生于工人参与罢工之时，且其仍可领取全额工资，则雇主不负赔偿责任。\n\n倘若伤害系因雇主之过失或蓄意行为所致，工人准许自由选择依据本法要求赔偿，或依照本法列出之途径提起诉讼；但如证明伤害完全归因于工人严重且故意的不当行为，则就该伤害提出之任何赔偿请求，皆不应予以受理。\n\n工人每周所得工资不得低于由工资委员会所裁定之最低标准；任何雇主若以少于最低标准之工资雇佣工人，将处以罚金，并责令补足所欠工资；若雇主屡次违犯，可由法院根据本法判罚并要求停业。”"
 joi_flavor_gbr.65.a: "工会也该收敛收敛了。"
 joi_flavor_gbr.65.b: "正义从这里开始！"
 joi_flavor_gbr.66.t: "[ROOT.GetCountry.GetName][TimeKeeper.GetCurrentDate.Format('y年')]劳动法"
 joi_flavor_gbr.66.d: "经过多年来罢工、集会与工会的激烈斗争，#O #b $movement_labor$#!#!最终赢得了政府的关注；而工厂事故的频发和工人伤亡无数的现实又使得社会舆论逐渐倒向工人一边。在不断的抗争与压力之下，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]被迫让步，颁布了新的[GetLawType('law_worker_protections').GetName]，首次承认雇主对工伤的赔偿责任和最低工资要求。"
 joi_flavor_gbr.66.f: "“凡在任何雇佣劳动中，工人因工遭受意外伤害，其雇主应依照本法第一附表承担赔偿责任，但须遵循下列条件；若伤害发生于工人参与罢工之时，且其仍可领取全额工资，则雇主不负赔偿责任。”\n\n“倘若伤害系因雇主之过失或蓄意行为所致，工人准许自由选择依据本法要求赔偿，或依照本法列出之途径提起诉讼；但如证明伤害完全归因于工人严重且故意的不当行为，则就该伤害提出之任何赔偿请求，皆不应予以受理。”\n\n“工人每周所得工资不得低于由工资委员会所裁定之最低标准；任何雇主若以少于最低标准之工资雇佣工人，将处以罚金，并责令补足所欠工资；若雇主屡次违犯，可由法院根据本法判罚并要求停业。”"
 joi_flavor_gbr.66.a: "工会也该收敛收敛了。"
 joi_flavor_gbr.66.b: "正义从这里开始！"
 joi_flavor_gbr.67.t: "[SCOPE.sState('labor_law_strike_scope').GetCityHubName]火柴女工罢工"
 joi_flavor_gbr.67.d: "在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]的火柴厂里，年轻女工们终于忍无可忍：她们不仅总是因微小的过失而被罚款，而且长期接触白磷让她们患上一种骇人的疾病——下颌骨溃烂。她们决定宣布集体罢工，要求合理待遇与更安全的工作环境。"
 joi_flavor_gbr.67.f: "“脚脏要扣钱，座位不整齐要扣钱；讲话要扣钱，网子缠住机器要扣钱。”\n\n“许多弊病源于女性不参与公共生活；世界本来就很好，并没有变得更差。工会主义者团结一致，帮助所有人；不是为了个人，而是为了共同的利益。但他们必须坚持不懈；不能只是一时愤怒，而要坚定地团结在一起，为了所有人。”\n\n“我们敦促所有生产火柴的国家的工人，为了工人的健康，有必要向有关政府施加影响，以便通过法律禁止使用有毒的磷；在此之前，我们呼吁所有男女工人只购买无毒火柴。”"
 joi_flavor_gbr.67.a: "责任都在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]可恶的无良企业！"
 joi_flavor_gbr.67.b: "逮捕这些带头作乱的坏份子！"
 joi_flavor_gbr.68.t: "[SCOPE.sState('labor_law_strike_scope').GetCityHubName]码头工人罢工"
 joi_flavor_gbr.68.d: "在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]的繁忙码头，成千上万的非熟练工人——大多数衣衫褴褛、饥肠辘辘——停止了工作并宣布罢工。他们要求提高日薪，并改善恶劣的劳动条件；随着罢工蔓延和码头停运，[SCOPE.sState('labor_law_strike_scope').GetCityHubName]港口已经几乎陷入了瘫痪。"
 joi_flavor_gbr.68.f: "“这些可怜的家伙衣衫褴褛，脚上几乎没有靴子，状况极其悲惨...这些人来我们码头工作，肚子里一点东西都没吃，也许从前一天就没吃过。他们工作了一个小时，挣了6便士；他们的饥饿不允许他们继续下去：他们拿着这6便士，以便能得到食物，也许是他们二十四小时以来的第一顿饭。”\n\n“唱一首6便士之歌，码头工人罢工了；豚鼠饿极了，就像贪婪的梭子鱼一样；直到码头开放，伯恩斯会为你们代言；小伙子们，鼓起勇气，你们会赢，而且会在一周之内！”"
 joi_flavor_gbr.68.a: "资本离不开劳动，劳动离不开资本。"
 joi_flavor_gbr.68.b: "派出骑兵旅镇压这群刁民！"
 joi_flavor_gbr.69.t: "[SCOPE.sState('labor_law_strike_scope').GetCityHubName]占厂罢工"
 joi_flavor_gbr.69.d: "在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]，一群工人没有像往常一样走出工厂，而是直接占据了机器与锅炉：他们坐在车间的工作台旁，拒绝让生产继续。此举几乎导致了整个[SCOPE.sState('labor_law_strike_scope').GetCityHubName]的工厂陷入停顿。"
 joi_flavor_gbr.69.f: "“他们坐在机器、大锅、锅炉和工作台旁，交谈着；有些人第一次意识到他们在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]生产过程中的重要性。十二个人几乎把工厂都停工了！分散在工厂各个部门的活跃，支持工会的普通工人主动表示，‘我们必须和他们在一起！’于是，他们全都和他们在一起，无论工会成员还是非工会成员。”"
 joi_flavor_gbr.69.a: "这是工团主义的前兆，必须阻止左翼分子的野心！"
 joi_flavor_gbr.69.b: "很明显，占用工厂是严重的非法行为。"
 joi_flavor_gbr.69.c: "工厂主们必须明白，他们无法离开工人的支持。"
 joi_flavor_gbr.70.t: "血腥星期日"
 joi_flavor_gbr.70.d: "[TimeKeeper.GetCurrentDate.Format('m月 d日')]，[SCOPE.sState('labor_law_strike_scope').GetCityHubName]的大批工人聚集在广场上，挥舞着布满标语的横幅，高呼自由与面包的口号向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和政府提交了一份呼吁[GetLawType('law_worker_protections').GetName]的请愿书；局势迅速恶化，[SCOPE.sState('labor_law_strike_scope').GetCityHubName]政府担忧示威将会升级为全面暴乱。"
 joi_flavor_gbr.70.f: "“下达这些要求并宣誓履行，您将使[ROOT.GetCountry.GetName]幸福辉煌，并将您的名字永远铭刻在我们和我们子孙后代的心中；如果您不下达这些要求，我们将死在这里，死在这个广场上；我们无处可去，我们只有两条路——要么走向自由和幸福，要么走向坟墓！”\n\n“同志们，对吗？让我们的生命为受难的[ROOT.GetCountry.GetNameNoFlag]牺牲吧。我们并不后悔这种牺牲，我们是自愿的！”\n\n“那就这样吧！不要什么虔诚...让我们为[ROOT.GetCountry.GetNameNoFlag]而死！现在我们必须从官僚手里拯救[ROOT.GetCountry.GetNameNoFlag]，而我们我会冲在最前面，在第一排！”"
 joi_flavor_gbr.70.a: "命令城内驻军立刻开火！"
 joi_flavor_gbr.70.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]需要先离开[SCOPE.sState('labor_law_strike_scope').GetCityHubName]。"
 joi_flavor_gbr.70.c: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]将亲自出面与人民交谈！"
 joi_flavor_gbr.71.t: "干草市场暴乱"
 joi_flavor_gbr.71.d: "[TimeKeeper.GetCurrentDate.Format('m月 d日')]的[SCOPE.sState('labor_law_strike_scope').GetCityHubName]，呼吁#O #B 八小时工作制#!#!的集会演变为了#R 暴力冲突。#![GetIdeology('ideology_anarchist').GetName]的演讲与警察的驱散命令交织在一起，最终的爆炸声震撼了整个城市。"
 joi_flavor_gbr.71.f: "“[GetIdeology('ideology_anarchist').GetName]的邪恶教义今晚在[SCOPE.sState('labor_law_strike_scope').GetCityHubName]结出了血腥的果实，天亮之前，至少有十几位坚定的人士将献出生命，在这次骚乱和流血事件，以纪念他的教义。”\n\n“我首先要告诉你们，召开这次会议并非出于任何此类目的。这次会议的目的是阐明#O #B 八小时工作制#!#!运动的总体情况，并阐明与之相关的各种事件。”\n\n“我以法律的名义命令你们停止这种行为，并命令你们解散！”\n\n“八小时工作，八小时休息，八小时为所欲为；工人们武装起来，全力以赴！”"
 joi_flavor_gbr.71.a: "我们不能阻止公民的罢工权。"
 joi_flavor_gbr.71.b: "以法律的名义，开火！"
 joi_flavor_gbr.72.t: "[ROOT.GetCountry.GetName]铁路工人大罢工"
 joi_flavor_gbr.72.d: "从[SCOPE.sState('labor_law_strike_scope').GetCityHubName]的车站开始，整个[ROOT.GetCountry.GetName]的铁路线上现在挤满了举着标语的罢工工人；铁路工会要求更高的薪资与更短的工时，而雇主们拒绝让步。大罢工正在扩散，全国的运输网络都陷入了可怕的瘫痪。"
 joi_flavor_gbr.72.f: "“雇主们说：‘工人见鬼去吧！’，我们回答：‘劳动者理应得到服务！’我们的斗争不仅仅是为了自己，而是为了那些后来仍将辛勤劳作的人们的权利。”\n\n“当劳动者的力量汇聚起来时，它是不可抗拒的。它将粉碎压迫他们的制度，就像闪电劈裂橡树一样；有一天，我们的沉默将比你们今日扼杀的声音更为强大！”"
 joi_flavor_gbr.72.a: "哦，天哪！"
 joi_flavor_gbr.72.b: "警察必须立刻出动。"
 #济贫法
 joi_flavor_gbr.73.t: "济贫院状况报告书"
 joi_flavor_gbr.73.d: "[GetLawType('law_poor_laws').GetName]在近年来的运作状况饱受许多社会人士的批判。昨天，一份由[SCOPE.sParty('ruling_party').GetName]政府委托，由白厅#B 济贫事务委员会高级专员阁下#!，经过严谨详细的调查撰写的#V 济贫院状况报告书#!在议会中被宣读，内容直言不讳地点出了[GetLawType('law_poor_laws').GetName]的弊端与危险，充分证实了民间对济贫院非人道情况的指责。"
 joi_flavor_gbr.73.f: "“它既没有促进任何智力的发展，也没有培养男子气概和独立精神。它的影响枯竭了社会生活的最后冲动；它摧毁了所有自尊，使囚犯几乎失去了所有同情心，而这种同情心无论是在同等人还是上级身上，都是天性中固有的。”\n\n“排斥和不适是[GetLawType('law_poor_laws').GetName]测试发挥作用的唯一手段——为了使其发挥作用，济贫院就必须小心地保持这种非人的排斥和不适。”"
 joi_flavor_gbr.73.a: "令人震惊！[GetLawType('law_poor_laws').GetName]必须被彻底改革。"
 joi_flavor_gbr.74.t: "济贫院状况报告书"
 joi_flavor_gbr.74.d: "尽管[GetLawType('law_poor_laws').GetName]在近年来的运作状况饱受许多社会人士的批判，但昨天一份由白厅#B 济贫事务委员会高级专员阁下#!，经过“严谨详细”的调查撰写的#V 济贫院状况报告书#!却充分肯定了当前济贫院的状况，令议会的许多左翼党派成员与[SCOPE.sParty('ruling_party').GetName]内部的同情者感到十分愤慨。"
 joi_flavor_gbr.74.f: "“什么政府不立即决定一个源于数百年惯例、与人们的习惯交织在一起、根植于人们偏见的问题呢？在所有政府不宜粗暴或过早干预的立法事项中，如果没有弄清，并且如果可能的话，不带入国家主流情绪，我认为[GetLawType('law_poor_laws').GetName]是最不宜草率行事的。”\n\n“目前，它们监狱般的外观，以及它们旨在折磨穷人的意图，激起了人们对它们的一种有益的恐惧；而对非婚生子女的慷慨赔偿，其结果就是助长了私生子现象，使女性失去贞洁成为获得丈夫或获得足够赡养费的捷径，并鼓励敲诈勒索和伪证行为。”"
 joi_flavor_gbr.74.a: "哦，是这样吗？"
 #宪章运动
 joi_flavor_gbr.75.t: "人民宪章"
 joi_flavor_gbr.75.d: "昨天，六名国会议员和六名工人在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]举行了一场自称“宪章集会”的会议，并宣布推出了六条要求普选权的“人民宪章”，引起了[ROOT.GetCountry.GetName]全国许多劳工的共鸣；毫无疑问，一场政治风暴正在各地暗潮涌动。"
 joi_flavor_gbr.75.f: "“有鉴于议会下院目前既以人民的名义，作为人民所想象的代表，行使着制定法律之权，而为了明智地、忠实地完成其承担的重大职责，必须忠实地、正确地代表人民的愿望、感情和利益，兹规定：\n\n自本条例获得通过时始，[ROOT.GetCountry.GetNameNoFlag]境内的每一男性居民在下列条件下享有选举议会议员之权；兹规定，为了使人民在议会下院享有同等代表权，[ROOT.GetCountry.GetNameNoFlag]将划分为三百个选区。\n\n每区选举委员应委派一名副选举委员，在选举日主持各投票所的选举事宜，该副选举委员应服从本规定，对本规定负责，同时并按其权限行事，对其权限负责；会期结束时，下院每一议员有权向国库支领付款凭证一纸，作为其在为公众服务期间行使立法权的报酬，其薪额规定为每年20镑。”"
 joi_flavor_gbr.75.a: "密切关注宪章派的动向。"
 joi_flavor_gbr.76.t: "全国宪章大会"
 joi_flavor_gbr.76.d: "在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，受到[SCOPE.sCharacter('labor_leader_scope').GetFullName]鼓动的数以百万计的工人阶级群众支持“人民宪章”的六项要求，并通过全国宪章大会递交了大规模请愿书；请愿队伍秩序井然，示威行动大体保持和平。大会代表声称请愿签名人数已达三百五十万，然而，#O #B 威斯敏斯特#!#!内部对于是否接纳这份请愿仍存在巨大分歧。"
 joi_flavor_gbr.76.f: "“三百五十万人平静、有序、冷静、和平而坚定地要求统治者伸张正义；而统治者却对他们的抗议充耳不闻；三百五十万人请求允许他们详述自己的冤屈，并主张自己的权利，而“议会”却决定不让他们发言！”\n\n“三百五十万奴隶阶级向享有选举权和特权的阶级伸出了和平的橄榄枝，寻求在法律面前人人平等的原则下建立一个牢固而紧密的联盟；而享有选举权和特权的阶级却拒绝签订条约！同一个阶级，却依然是奴隶阶级；低人一等的烙印和烙印不会被去除，人民将不会获得自由。”"
 joi_flavor_gbr.76.a: "否决请愿书。"
 joi_flavor_gbr.76.b: "议会将考虑他们的请愿。"
 joi_flavor_gbr.76.c: "派出警察驱散他们！"
 joi_flavor_gbr.77.t: "[SCOPE.sState('chartism_movement_state').GetCityHubName]斗牛场暴动"
 joi_flavor_gbr.77.d: "在[SCOPE.sState('chartism_movement_state').GetCityHubName]，一场与#O #B 宪章运动#!#!有关的群众集会演变为严重的骚乱。当地部分居民与警察发生冲突，并有建筑物被纵火焚毁。目击者报告称平民与警察均有伤亡，[SCOPE.sState('chartism_movement_state').GetCityHubName]陷入了混乱。"
 joi_flavor_gbr.77.f: "“[SCOPE.sState('chartism_movement_state').GetCityHubName]人把伦敦警察当成外人；一些疯狂的人为了报复，放火烧毁了房屋。士兵们被带了出来，我的一个邻居碰巧手无寸铁地站在埃德巴斯顿街的拐角处观望，结果被砍掉了鼻子...虽然我们独自穿过了斗牛场，但士兵们还是冲了过来，试图将我砍倒。””"
 joi_flavor_gbr.77.a: "容忍他们。"
 joi_flavor_gbr.77.b: "宣读暴动法案并驱逐暴乱者！"
 joi_flavor_gbr.78.t: "[SCOPE.sState('chartism_movement_state').GetCityHubName]起义"
 joi_flavor_gbr.78.d: "在[SCOPE.sState('chartism_movement_state').GetCityHubName]，#yellow #B 宪章派#!#!领袖[SCOPE.sCharacter('john_frost_scope').GetFullName]呼吁群众武装集结，并声称全国已有成千上万的支持者响应；然而实际动员的力量远不及他的宣称，但却仍然在#O #B 威斯敏斯特#!#!内部引发了关于宪章派的激烈争论。"
 joi_flavor_gbr.78.f: "“他曾向[SCOPE.sState('chartism_movement_state').GetCityHubName]人说，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的宪章运动者是好样儿的，他们正在征集武器；但他难以为情地说，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]人使他成为一个说谎者。为了证实这一点，他想请凡已置备武器的人举起手来；这时，在一片喧嚣的笑声中，有一只手举了起来。”\n\n“[SCOPE.sCharacter('john_frost_scope').GetFullName]曾向大会宣称，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]有六千名宪章运动者，他们都是善良忠实之辈，全副武装，正在等待着一决雌雄。当时他明知[SCOPE.sCharacter('john_frost_scope').GetLastName]言过其实，但未加以驳斥，因为他想如果这样传开去，也许会有好处，也许会鼓励别人起来行动。”"
 joi_flavor_gbr.78.a: "议会必须考虑他他们的请愿。"
 joi_flavor_gbr.78.b: "派出警察维护[SCOPE.sState('chartism_movement_state').GetCityHubName]的秩序。"
 joi_flavor_gbr.78.c: "镇压暴乱，逮捕并审判邪恶的[SCOPE.sCharacter('john_frost_scope').GetFullName]！"
 joi_flavor_gbr.79.t: "[TimeKeeper.GetCurrentDate.Format('y年')]总罢工"
 joi_flavor_gbr.79.d: "受#O #B 宪章运动#!#!诉求的影响，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]及周边的城镇爆发了大规模罢工。工人们呼吁缩短工时、提高工资，并宣称宪章将成为他们繁荣的途径。在[SCOPE.sCharacter('labor_leader_scope').GetFullName]的支持下，罢工迅速蔓延到了整个[ROOT.GetCountry.GetName]。"
 joi_flavor_gbr.79.f: "“杂乱的建筑结构中，涌现出无数的庭院、后巷和偏僻的角落...再加上令人震惊的肮脏，斯泰利布里奇尽管环境优美，其令人厌恶的氛围可想而知。”\n\n“朋友们！宪章运动并非以争取选票为主要目标的政治运动；宪章运动是一个刀叉问题：宪章意味着舒适的住所、丰盛的食物和饮料、繁荣昌盛以及更短的工作时间！有了宪章，我们就能做到这一切！”"
 joi_flavor_gbr.79.a: "政府无能为力。"
 joi_flavor_gbr.79.b: "派出掷弹兵卫队镇压罢工者！"
 joi_flavor_gbr.80.t: "肯宁顿公园集会"
 joi_flavor_gbr.80.d: "[TimeKeeper.GetCurrentDate.Format('y年')]，[SCOPE.sCharacter('labor_leader_scope').GetFullName]领导的宪章派再度在伦敦的肯宁顿公园举行了大规模集会，声称将向议会递交数百万工人签名的请愿书。许多人向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]建议，认为在首都的这一暴行实际上是[SCOPE.sCharacter('labor_leader_scope').GetLastName]试图政变的前兆。"
 joi_flavor_gbr.80.f: "“全国各地都有宪章党的协会，但缺乏凝聚力；有人想要选举权，有人想要成年选举权等等...激进派的目标和方法缺乏统一，几乎看不到任何成就的希望。”\n\n“然而，当“人民宪章”起草后，它明确界定了工人阶级的迫切诉求，我们感到我们拥有了真正的团结纽带；所以，我们必须把激进协会转变为地方宪章运动中心！”"
 joi_flavor_gbr.80.a: "集会权不能被影响。"
 joi_flavor_gbr.80.b: "告诉他们，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下不希望暴力。"
 joi_flavor_gbr.81.t: "[TimeKeeper.GetCurrentDate.Format('y年')]宪章法案"
 joi_flavor_gbr.81.d: "随着#yellow #B 宪章派#!#!多次集会与大规模请愿的声势逐渐扩大，[ROOT.GetCountry.GetName]对议会改革的呼声不断高涨；长期以来，选举权的局限性、议员缺乏薪酬以及选区分配不均的问题饱受工人们的批评。如今，在#yellow #B 宪章派#!#!的施压下，议会决定就选举制度进行改革，制定了新的法案。"
 joi_flavor_gbr.81.f: "“鉴于呼应请愿者的意愿而修改有关议会和地方政府选举权、选民登记和选举行为的法律是有益的，经本届议会精神、世俗院与下议院议员之建议与同意，并经其授权，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下颁布如下：\n\n[ROOT.GetCountry.GetNameNoFlag]境内的每一男性居民在下列条件下享有选举议会议员之权；为了使人民在议会下院享有同等代表权，[ROOT.GetCountry.GetNameNoFlag]将划分为三百个选区。\n\n每区选举委员应委派一名副选举委员，在选举日主持各投票所的选举事宜，该副选举委员应服从本规定，对本规定负责，同时并按其权限行事，对其权限负责；会期结束时，下院每一议员有权向国库支领付款凭证一纸，作为其在为公众服务期间行使立法权的报酬，其薪额规定为每年20镑。”"
 joi_flavor_gbr.81.a: "这是[ROOT.GetCountry.GetName]人民的胜利！"
 joi_flavor_gbr.82.t: "北极星报停刊"
 joi_flavor_gbr.82.d: "随着#O #B 宪章运动#!#!的关注度不断下降，失去热情的[SCOPE.sCharacter('labor_leader_scope').GetFullName]最终决定将宪章派们最著名的宣传报纸“北极星报”出售给了别人。毫无疑问，宪章运动结束了，[ROOT.GetCountry.GetName]成功度过了这次风暴，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府的统治屹立不倒！"
 joi_flavor_gbr.82.f: "“我曾听他发过无数的誓言，只要能有报酬，什么誓言，他都会发，对于这样一个人，我还能相信吗？我曾听他读圣经，每逢读到基督或使徒的名字时，我就看见他把那几页撕下说，‘让我们烧掉这个该死的。这些使徒是我生平所听到的最大的无赖。’有一次我听他读到犹大的名字时说，‘他是一个顶呱呱的好汉。他得到的报酬可真不少。只要给我一半，我就会那样做。’”"
 joi_flavor_gbr.82.a: "这些讨厌的煽动恶棍终于滚了。"
 joi_flavor_gbr.82.b: "迟早会有后人想起这些人的工作。"
 #经济危机与铁路狂热
 joi_flavor_gbr.83.t: "恐怖周"
 joi_flavor_gbr.83.d: "随着铁路热潮和信贷扩张，金融市场在短时间内迅速膨胀；然而投机泡沫最终破裂，导致银行和企业相继倒闭，过去繁荣的铁路股票几乎直线下跌，恐慌席卷了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]证券交易所。哀嚎的#v $capitalists$#!们将这场危机被称为#R “恐怖周”#!。"
 joi_flavor_gbr.83.f: "“自1840年起，信贷扩张在[ROOT.GetCountry.GetName]恢复，并蔓延至[SCOPE.sCountry('railway_1_power').GetName]和[SCOPE.sCountry('railway_2_power').GetName]；数千英里的铁路建成，股票市场进入持续增长期，铁路股票尤为受惠；存款和贷款的规模在短短两年内就增长了五倍，由此引发了一场投机运动，直至[TimeKeeper.GetCurrentDate.Format('y年')][ROOT.GetCountry.GetNameNoFlag]爆发经济危机。”"
 joi_flavor_gbr.83.a: "早就告诉过这群混蛋不要过度！"
 joi_flavor_gbr.84.t: "黑色星期一"
 joi_flavor_gbr.84.d: "从#R [SCOPE.sCountry('first_rank_power').GetName]股市的毁灭性崩溃#!开始，一场由#R 恐怖的股市崩盘，金融危机和市场分配不均导致的大规模经济萧条#!瞬间席卷了整个[ROOT.GetCountry.GetName]：高水平的利率，预期的通货紧缩和人们持续的不愿借贷导致消费支出和投资连续下降，物价暴跌，工厂和农场纷纷破产，整个社会的每一个人都因为这场危机而哀嚎。"
 joi_flavor_gbr.84.f: "[TimeKeeper.GetCurrentDate.Format('y年')]伊始，经济前景良好：整个市场似乎都在增长。[TimeKeeper.GetCurrentDate.Format('m月')]中旬开始出现大规模股票抛售；最终，在[TimeKeeper.GetCurrentDate.Format('m月 d日')]，黑色星期一，[ROOT.GetCountry.GetNameNoFlag]股市开盘时暴跌11%，稳定市场的措施失败了；下午，市场再次暴跌12%；成千上万的投资者倾家荡产，损失了数十亿英镑；许多股票无论以什么价格都卖不出去；银行无力偿还所有债权人，它即将倒闭了。"
 joi_flavor_gbr.84.a: "哦，上帝！"
 joi_flavor_gbr.84.b: "草你妈！"
 joi_flavor_gbr.84.c: "万能的真主啊！"
 joi_flavor_gbr.84.e: "为什么这些外国人的事情总是这么糟糕？"
 joi_flavor_gbr.84.h: "笨蛋，问题是经济！"
 joi_flavor_gbr.85.t: "关税争议"
 joi_flavor_gbr.85.d: "在经济危机的冲击下，关于关税政策的辩论再度被推上议程。部分政府成员主张维持[GetLawType('law_free_trade').GetName]以保持市场流动；另一些人则呼吁通过[GetLawType('law_protectionism').GetName]来扶持国内产业。[ROOT.GetCountry.GetName]必须在不同的利益与意识形态之间作出抉择。"
 joi_flavor_gbr.85.f: "“政治动态会让人们看到关税与经济周期之间并不存在联系：繁荣时期会产生足够的收入来降低关税，而当经济衰退来临时，再次提高关税的压力就会增大。到那时，经济将会复苏，给人一种印象，即关税削减导致了经济崩溃，而关税增加又带来了经济复苏。”\n\n“在某些行业，关税或许可以使其发展速度加快几年；但真正的增长应该更多地归功于其丰富的资源以及对人才和思想的开放态度。”"
 joi_flavor_gbr.85.a: "市场会自己调控。"
 joi_flavor_gbr.85.b: "必须采取保护主义政策。"
 joi_flavor_gbr.85.c: "实施有限的干涉。"
 joi_flavor_gbr.86.t: "信用危机"
 joi_flavor_gbr.86.d: "财政赤字的积累终于引爆了国债危机：[ROOT.GetCountry.GetName] 发行的政府债券已失去市场信任，投资者拒绝继续认购，利率飙升；国内外资本家纷纷抛售债券，财政濒临崩溃。连续的恐慌还导致了许多私人机构的资金链断裂，舆论要求政府立即采取行动来恢复信用。"
 joi_flavor_gbr.86.f: "“人类商品交换的统治者因其自身的固执和无能而失败，他们承认了自己的失败，并放弃了权力。那些不择手段的货币兑换商的行径在舆论的法庭上受到控告，为人心所唾弃。”\n\n“货币兑换商已从我们文明圣殿的高位上逃走。现在，我们可以将这座圣殿恢复到古老的真理。恢复的尺度在于我们在多大程度上践行比单纯的金钱利润更高尚的社会价值观。”\n\n“认识到以物质财富作为成功标准的虚假性，就必须抛弃这样的错误信念：公职和高级政治地位的价值只能由地位的尊贵程度和个人利益的标准来衡量；银行业和商业中常常将神圣的信托视为冷酷无情和自私不法行为的行为必须终止。”"
 joi_flavor_gbr.86.a: "我们没有黄金了，你们别换了！"
 joi_flavor_gbr.86.b: "公告担保本国货币的汇率。"
 joi_flavor_gbr.86.c: "必须采取措施剥离金融机构的不良资产。"
 joi_flavor_gbr.86.e: "暂时征收海外黄金储备！"
 joi_flavor_gbr.87.t: "银行破产"
 joi_flavor_gbr.87.d: "一场严重的金融动荡正在[ROOT.GetCountry.GetName]蔓延：恐慌性的挤兑与交易瘫痪迅速扩散，无法兑换货币的银行相继倒闭，投资者陷入了恐慌性的撤资，市场开始陷入挤兑与资金外逃的恶性循环。"
 joi_flavor_gbr.87.f: "“[TimeKeeper.GetCurrentDate.Format('y年')]中期，金融危机逐渐失控，首先是[TimeKeeper.GetCurrentDate.Format('m月')][SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]信贷银行的倒闭；投资者对政府严厉的财政政策感到不安，随着信心螺旋式下降而从[ROOT.GetCountry.GetName]撤出短期资金，[TimeKeeper.GetCurrentDate.Format('m月')]第一周损失了1.5亿英镑，第二周损失了5.4亿英镑，[TimeKeeper.GetCurrentDate.Format('m月 d日')]，一天内又损失了1.5亿英镑。”"
 joi_flavor_gbr.87.a: "为银行提供紧急贷款来避免挤兑！"
 joi_flavor_gbr.87.b: "我们自己都顾不上，谁管他们？"
 joi_flavor_gbr.87.c: "政府需要出面临时接管私人银行。"
 joi_flavor_gbr.88.t: "赤字危机"
 joi_flavor_gbr.88.d: "长期的财政赤字已经拖垮了国家的经济基础。政府在债务与开支之间左右为难，议会与公众对财政政策的争论日益激烈。许多经济学家向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]建议，如果不及时采取措施，[ROOT.GetCountry.GetName]将会彻底失去金融市场的信任。"
 joi_flavor_gbr.88.f: "“数年来，这个国家饱受政府的无所闻和无所作为之苦：国家仰望着政府，但政府却视而不见！我们不得不与和平的宿敌——商业和金融垄断、投机、肆意妄为的银行、阶级对抗、地方主义、战争牟利——作斗争。他们已经开始将[ROOT.GetCountry.GetName]政府视为自身事务的附属物。”\n\n“我们现在知道，由有组织的金钱统治的政府与由有组织的暴徒统治的政府一样危险：在我们的历史上，这些势力从未像今天这样团结一致地反对同一位候选人。他们一致憎恨我——而我欢迎他们的憎恨。”"
 joi_flavor_gbr.88.a: "加税并强化政府支出才能拯救经济！"
 joi_flavor_gbr.88.b: "加税并削减政府支出。"
 joi_flavor_gbr.88.c: "可以拿外国的敌人来转移矛盾！"
 joi_flavor_gbr.89.t: "失业者与农民困境"
 joi_flavor_gbr.89.d: "经济危机的冲击波已经深入城乡：城市工人因工厂倒闭而失业，农村农民的收成也因市场萎缩而无人问津。越来越多的家庭陷入贫困，社会的恐慌与对政府不作为的指责不断上升；政府必须决定如何回应这场席卷全国的困境。"
 joi_flavor_gbr.89.f: "“工业企业到处都是枯叶；农民的农产品找不到市场；成千上万个家庭多年的积蓄化为乌有。更重要的是，大量失业[ROOT.GetCountry.GetName]公民面临着严峻的生存困境，同样多的人辛勤劳作却得不到任何回报。只有愚蠢的乐观主义者才会否认眼前的黑暗现实。”\n\n“我们最重要的任务是让人们就业。只要我们明智而勇敢地面对，这并非无法解决的问题，有很多方法可以解决这个问题，但仅仅靠空谈是无法解决的。我们必须行动起来，而且要迅速行动！”"
 joi_flavor_gbr.89.a: "我们管不了他们。"
 joi_flavor_gbr.89.b: "采取措施救济贫困潦倒的人民。"
 joi_flavor_gbr.89.c: "扩充基建项目来给他们提供工作。"
 joi_flavor_gbr.90.t: "[SCOPE.sState('economic_crisis_state').GetCityHubName]啤酒馆暴动"
 joi_flavor_gbr.90.d: "在经济困境与普遍失业的阴影下，[SCOPE.sState('economic_crisis_state').GetCityHubName]的啤酒馆成为失意工人、破产农民和激进分子聚集的温床：在一名[GetIdeology('ideology_fascist').GetName]的带领下，这些人开始在当地进行暴动。"
 joi_flavor_gbr.90.f: "“你们可以看出，我们前进的动力既不是自负，也不是私利，而只是一股强烈的渴望，要在这关键时刻投身于这场为[ROOT.GetCountry.GetNameNoFlag]祖国而战的战斗；最后，我还要告诉你们一件事：要么[ROOT.GetCountry.GetNameNoFlag]革命今晚就爆发，要么黎明时分，我们都将死去！”"
 joi_flavor_gbr.90.a: "或许他们才能拯救[ROOT.GetCountry.GetName]？"
 joi_flavor_gbr.90.b: "坚决镇压这群[GetIdeology('ideology_fascist').GetName]！"
 joi_flavor_gbr.90.c: "集会权不代表他们可以武力暴动，驱散他们！"
 #铁路狂热事件
 joi_flavor_gbr.91.t: "雄心勃勃的铁路投资者"
 joi_flavor_gbr.91.d: "随着铁路建设在[ROOT.GetCountry.GetName]如火如荼地展开，投资者的热情达到了顶点：他们在狂热的氛围中争相投入资金，仿佛每一英里的铁轨都能化为黄金。一家位于[SCOPE.sState('railway_mania_state').GetCityHubName]的铁路公司趁机开始向公众发售抵押股票，并宣称铁路将带来无与伦比的繁荣。"
 joi_flavor_gbr.91.f: "“先生们！实际上，铁路绝对是一种万无一失的投资：它们刺激了对建筑材料、煤炭、铁以及后来的钢铁的需求，它们还为工业熔炉和家用壁炉提供了燃料，让百万以前几乎从未出行过的人得以出行，铁路就是我们文明的本身！”\n\n“我们公司现在将为普通公众提供投资手段，只需支付10%的定金即可购买股票...先生们，我们运输的货物和旅客数量正在不断增加，只需要你今天投入10英镑，明天就能变成12，后天就变成15，过一周，它就会变成20，过一个月，你就会拥有50英镑！”"
 joi_flavor_gbr.91.a: "铁路就是财富，铁路就是未来！"
 joi_flavor_gbr.91.b: "荒谬！这太过头了！"
 #来自英伦一群伙伴，结庐加拿大
 joi_flavor_gbr.92.t: "皇家海军撤离"
 joi_flavor_gbr.92.d: "自[TimeKeeper.GetCurrentDate.Format('y年')]开始不断暴动的#R 共产主义者#!攻破了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，陛下和政府不得不在#U 皇家海军#!的拥护下撤离了我们本土并疏散到海外仍然忠于帝国的领土中。首相[SCOPE.sCharacter('red_pm').GetFullName]在最后一次广播中告知民众，尽管政府暂时停止对不断推进的共产主义叛徒的武装抵抗，但#V 随着时间的推移，国王陛下的政府将卷土重来，并恢复#yellow #B 联合王国#!#!的秩序。#!"
 joi_flavor_gbr.92.f: "“战事看不到尽头，前线停滞不前，军队向南紧急调动，战线的削弱使得工团主义者得以在[TimeKeeper.GetCurrentDate.Format('m月')]开始发动计划中的进攻。前线的协同打击使彼得伯勒和卢顿取得突破，并于当天攻破了布里斯托尔；消息传出，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]陷入一片混乱，最后一批公务员撤离，政府于[TimeKeeper.GetCurrentDate.Format('m月 d日')]放弃这座城市。在仓皇撤离的过程中，国库和大量政府文件，包括机密文件和公开文件，都被留给了叛军。留下的部队失去了与命令的联系，陷入了激烈的城市战斗，红旗在街头飘扬。”"
 joi_flavor_gbr.92.a: "革命万岁！"
 joi_flavor_gbr.92.b: "赶紧上船离开这里，目标渥太华！"
 joi_flavor_gbr.92.c: "赶紧上船离开这里，目标墨尔本！"
 joi_flavor_gbr.92.e: "赶紧上船离开这里，目标德里！"
 joi_flavor_gbr.92.h: "先跑再说，别管什么目的地了。"
 joi_flavor_gbr.93.t: "保王党人抵达"
 joi_flavor_gbr.93.d: "自[TimeKeeper.GetCurrentDate.Format('y年')]#yellow #B 大不列颠和爱尔兰联合王国#!#!解体以来，流亡者就经历了一段漫长的痛苦记忆：在此期间，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]、政府残余势力以及超过一百万的帝国精英纷纷逃往[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]..."
 joi_flavor_gbr.93.f: "忠于王室的人们显然期待着一场登陆，从#R 共产主义#!暴发户手中夺回本土；然而他们很快便发现，[GetIdeology('ideology_communist').GetName]的地位比预期的要强大。早期的尝试失败了，#R 不列颠联盟#!反而变得更加稳固。\n\n随着重返伦敦的梦想如同梦幻般逐渐消逝，帝国的剩余势力不得不重新审视自己的处境：他们清楚地意识到，在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的逗留很可能并非暂时的：于是，总督被王室取代，参议院被上议院取代，红旗被染成蓝色，以避免与[GetIdeology('ideology_communist').GetName]混淆。在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，人们称他们为#U #B “流亡者”#!#!，他们试图在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]安家落户；然而，旧英国的贵族文化与新的的[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]文化之间的诸多差异显而易见：对许多人来说，#G #B “不列颠国王”#!#!仅仅代表的是一个远房亲戚。\n\n#B 漂泊不定的流亡者决心夺回自己的祖国，然而，#V 他们最终要面对一个残酷的政治现实：这可能永远无法实现。#!#!"
 joi_flavor_gbr.93.a: "来自英伦一群伙伴，结庐[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]..."
 joi_flavor_gbr.93.b: "米字猎猎金狮怒吼，返指高地和海峡！"
 #维多利亚礼仪
 joi_flavor_gbr.94.t: "进步时代"
 joi_flavor_gbr.94.d: "随着[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的登基，一种新的道德价值和礼仪标准开始在[ROOT.GetCountry.GetName]流行：人们普遍培养外在的尊严和克制，同时也对如何践行新的道德观念展开了激烈的辩论；虔诚的[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]#v $clergymen$#!们建立了监督行为的组织，并敦促政府采取行动，将宗教道德纳入社会行为之中。"
 joi_flavor_gbr.94.f: "“1780年至[TimeKeeper.GetCurrentDate.Format('y年')]年间，[ROOT.GetCountry.GetAdjective]人不再是世界上最具侵略性、最野蛮、最吵闹、最直言不讳、最暴躁、最残忍和最嗜血的民族之一，而是成为了最内敛、最有礼貌、最有秩序、最温柔、最拘谨和最虚伪的民族之一。”\n\n“这一转变减少了对动物、罪犯、精神病患者和儿童的残忍行为；禁止了许多残酷的运动和游戏，例如斗牛和斗鸡，以及包括许多集市和守灵仪式在内的无伤大雅的娱乐活动”\n\n“[ROOT.GetCountry.GetAdjective]政府废除了刑法中约两百项死罪，废除了将罪犯流放到澳大利亚的制度，并清理了监狱；将星期日变成了一些人的祈祷日，也是所有人的禁欲日。”"
 joi_flavor_gbr.94.a: "[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]拥有崇高的道德标准。"
 joi_flavor_gbr.94.b: "[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]和[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]也将践行这些标准。"
 joi_flavor_gbr.95.t: "反奴隶制道德"
 joi_flavor_gbr.95.d: "以[SCOPE.sCharacter('devout_leader').GetFullName]为首的[GetIdeology('ideology_abolitionist').GetName]在全国范围内建立了一个由数百个地方废奴团体组成的网络，并向威斯敏斯特公开递交了一份请愿书，指责[SCOPE.sCountry('slave_state').GetName]可耻的奴隶制，并要求[ROOT.GetCountry.GetName]履行废奴主义的使命，打击邪恶的奴隶主们。"
 joi_flavor_gbr.95.f: "我们国内没有奴隶——那为什么还要在国外呢？\n他们自己也曾渡过分开，\n我们的浪潮，获得解放和自由。\n\n奴隶在英国无法呼吸；如果他们的肺，\n吸入我们的空气，那一刻他们就自由了！\n他们一踏上我们的土地，他们的枷锁就会被打破。\n\n这是高尚的，表明一个国家为之自豪，\n并为这份祝福而心怀嫉妒。那就传播它吧，\n让它流淌在你的帝国的每一条血管里，让他们感受到：\n英国的力量到哪里，哪里的人类就能感受到她的仁慈。"
 joi_flavor_gbr.95.a: "公开指责他们不道德的奴隶制。"
 joi_flavor_gbr.95.b: "皇家海军会让[SCOPE.sCountry('slave_state').GetName]知道我们是怎样对付奴隶贩子的。"
 joi_flavor_gbr.95.c: "还是不要招惹[SCOPE.sCountry('slave_state').GetName]。"
 joi_flavor_gbr.96.t: "虐待动物的残忍行为"
 joi_flavor_gbr.96.d: "一场被披露的在[SCOPE.sState('animal_scope').GetCityHubName]的残忍动物虐待在[ROOT.GetCountry.GetName]社会掀起了轩然大波，反对虐待动物协会的[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]和[GetIdeology('ideology_utilitarian_millian').GetName]希望说服议会将虐待动物的残忍行为定为非法"
 joi_flavor_gbr.96.f: "“任何人以残酷殴打、虐待、过度驱赶、凌辱或折磨任何动物的方式对该动物造成任何损害或伤害，或由此对任何人或任何财产造成任何损害或伤害，则每名此类违法者在被定罪后，应向该动物的主人或上述遭受损害或伤害的人支付不超过10英镑的赔偿金。”\n\n“残酷地殴打、虐待、过度驱赶、辱骂或折磨任何动物，或导致或促使残酷地殴打、虐待、过度驱赶、辱骂或折磨任何动物，则每个此类违法者应为每次此类违法行为没收财产并支付不超过5英镑的罚款。”"
 joi_flavor_gbr.96.a: "严厉制裁[SCOPE.sState('animal_scope').GetCityHubName]的动物虐待者。"
 joi_flavor_gbr.96.b: "按照法律给予罚款即可。"
 joi_flavor_gbr.97.t: "生活在罪恶中"
 joi_flavor_gbr.97.d: "随着城市化的繁荣，传统的，圣经中推崇的道德价值观开始在城市中遭受了挑战：婚前同居和淫乱等“享乐的罪恶”层出不穷，人们沉迷于肉欲，让虔诚的[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]#v $clergymen$#!们痛心疾首。"
 joi_flavor_gbr.97.f: "“神的旨意就是要你们成为圣洁，远避淫行：要你们各人晓得怎样用圣洁尊贵守着自己的身体；不要放纵私欲的邪情，像那不认识神的外邦人。”\n\n“婚姻，人人都当尊重，床也不可污秽；因为苟合行淫的人神必要审判；人若引诱没有受聘的处女，与她同寝，总要交出聘礼，娶她为妻。”"
 joi_flavor_gbr.97.a: "人们应该遵循主的教导，避免婚前同居。"
 joi_flavor_gbr.97.b: "这是人民的事，你们找政府干什么？"
 joi_flavor_gbr.98.t: "淫荡之国"
 joi_flavor_gbr.98.d: "根据最近一份来自于[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]的调查报告显示，仅在[SCOPE.sState('prostitution_scope').GetCityHubName]就存在超过8600名妓女。他们还指出，匿名性导致卖淫和非法性关系大幅增加，严重影响了[ROOT.GetCountry.GetName]社会的道德价值。"
 joi_flavor_gbr.98.f: "“她用心去感受，用眼去欣赏，她是万物之巅峰，是万物之精髓；”\n“是她追求的目标，也是她的缩影；”\n“因为她如此单纯，如此微妙地甜美，我最深沉的狂喜却辜负了她。”\n\n“然而，如今我选择的任务，是歌颂她作为少女和妻子的美德；”\n“我求不到比这更幸福的职位：那就是终生为她唱赞歌。”"
 joi_flavor_gbr.98.a: "严厉打击这些邪恶的妓女。"
 joi_flavor_gbr.98.b: "她们需要的是政府的关怀。"
 joi_flavor_gbr.99.t: "英国绅士"
 joi_flavor_gbr.99.d: "绅士式的追求与礼仪正成为[ROOT.GetCountry.GetName]这个时代最显著的象征：#B 黑礼服、高礼帽、文明棍与单片眼镜，骑士般的精神，智者的博学，谨守古代圣贤的箴言，主要致力于消除阻碍周围人自由自在行动的障碍#!。#V “英国绅士”#!正在一种光荣的道德价值观与印象。"
 joi_flavor_gbr.99.f: "“大街上站着一位真正的维多利亚绅士：他那件剪裁严谨的长礼服紧贴着身躯，怀表的银链在阴沉的布料上微微闪烁；他戴着手套的手拿着一根手杖，额头上戴着一顶高高的黑色礼帽，闪闪发光的单片眼镜使他的目光变得敏锐：审视，几乎像是在审判。”\n\n“他不听诽谤或流言蜚语，他会谨慎地推断干扰他的人的动机，并将每件事都解读为最好的；他在争论中从不卑鄙小人，从不占便宜，从不将人身攻击或尖刻的言论误认为是论点，也不会暗示他不敢说出口的邪恶。”\n\n“他拥有足够的理智，不会因侮辱而受到冒犯；他工作繁忙，不会记恨他人的伤害；他严厉刻板，不会容忍他人的恶意。他秉持着哲学原则，耐心、宽容、顺从；他忍受痛苦，因为痛苦不可避免；他忍受丧亲之痛，因为无法弥补；他坦然面对死亡，因为死亡是他的命运。”"
 joi_flavor_gbr.99.a: "绅士风度影响着我们中的每一个人。"
 joi_flavor_gbr.99.b: "真正的绅士风度是整个社会的高贵，从容与智慧。"
 #
 joi_flavor_gbr.100.t: "英式下午茶"
 joi_flavor_gbr.100.d: "@tea!#V 下午茶#!已经成为了[ROOT.GetCountry.GetName]社会一种时尚的社交活动，尽管一开始只是是上流社会用来弥补午餐和晚餐之间差距的一种方式，但现在已经成为了我们文化和生活方式的一部分。"
 joi_flavor_gbr.100.f: "“上流社会的女性会换上长袍，戴上手套和帽子，在客厅里享用@tea!#V 下午茶#!，时间通常是下午四五点；包括各种精致的三明治、配凝脂奶油和果酱的司康饼。此外，还提供蛋糕和糕点；产自印度或锡兰的茶叶则用银茶壶盛装，盛入精致的骨瓷杯中。”\n\n“当然，在奶油茶的饮用方式上，各地的差异很大，这场争论的焦点总是集中在两种：德文郡奶油茶和康沃尔奶油茶。说到这，温热的司康饼一分为二后，最重要的问题就是凝脂奶油和草莓酱应该按什么顺序加入？或许我们会认为...奶油优先！”"
 joi_flavor_gbr.100.a: "来喝一杯茶吧！"
 #维多利亚礼仪补充事件
 joi_flavor_gbr.101.t: "不道德的童工"
 joi_flavor_gbr.101.d: "童工现象正在[ROOT.GetCountry.GetAdjective]社会中层出不穷：儿童在幼年时期往往被迫工作，因为他们需要帮助家庭维持生计。[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]，[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]和[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]一致认为，这种劳动已经对儿童的身心、社会和道德造成了巨大的伤害。"
 joi_flavor_gbr.101.f: "“这是一栋破败不堪的老房子，当然，它紧邻河流，老鼠成群结队地爬来爬去。它那镶着护墙板的房间，腐朽的地板和楼梯，还有成群结队的灰老鼠，以及它们随时从楼梯上传来的吱吱叫声和扭打声，还有这地方的污垢和腐朽，都清晰地浮现在我眼前，仿佛我又回到了那里。”\n\n“楼下还有两三个男孩做着把装着石油黑的罐子盖上的工作，工资也差不多；第一个星期一早上，其中一个穿着破围裙、戴着纸帽的男孩上楼来，向我演示如何使用绳子打结。他叫鲍勃·费金。”"
 joi_flavor_gbr.101.a: "我们不能阻止工业的车轮。"
 joi_flavor_gbr.101.b: "童工是不列颠社会的耻辱！"
 #功利主义事件
 joi_flavor_gbr.102.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的文官队伍"
 joi_flavor_gbr.102.d: "[GetIdeology('ideology_utilitarian_millian').GetName]的原则成功在[ROOT.GetCountry.GetAdjective]的政策制定中发挥了核心作用：文官体系得到了改组，运作效率得到提升，这一政治观念也深入人心。"
 joi_flavor_gbr.102.f: "[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]对功利主义的贡献随着[ROOT.GetCountry.GetNameNoFormatting]发展的成功而加深；尽管一些人仍然质疑[GetIdeology('ideology_utilitarian_millian').GetName]对于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的文官队伍的价值，但[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]已经挺身而出，宣扬功利主义的办事准则：一个常设、统一和政治中立的公务员队伍，任人唯贤，并明确划分负责日常工作。\n\n它成功地消除了腐败，即使在战争压力下也能提供公共服务，并且有效地应对了政治变革；以公共利益为动机，并且愿意执行最终由大臣决定的政策。"
 joi_flavor_gbr.102.a: "可靠的公务员制度是[ROOT.GetCountry.GetName]坚不可摧的脊柱。"
 #议会事件
 joi_flavor_gbr.103.t: "考拉议员"
 joi_flavor_gbr.103.d: "一名[concept_westminster_england]在昨天被发现在一场关于[SCOPE.sLaw('current_law_scope').GetName]的敏感辩论中似乎睡着了：他最初坚称自己只是眯着眼睛——不过似乎无法说服公众。事实上，他并非第一个被抓到上班睡觉的议员，许多民众已经开始对这种现象感到非常愤怒。"
 joi_flavor_gbr.103.f: "“62岁的议员爵士在下议院一场关于[SCOPE.sLaw('current_law_scope').GetName]的辩论中睡着了：而且，他可不是随便闭上眼睛那么简单；这位尊敬的爵士几乎是平躺着的！最后，他终于睁开了眼睛，意识到自己可能完全暴露在下议院的旁观记者眼里；他迅速调整了一下姿势，看起来略显尴尬。”\n\n“这是对我们人民的侮辱：他们怎么敢如此无视自己的地位和我们生活中重要的事情？”"
 joi_flavor_gbr.103.a: "在工作时打盹永远不是一个好主意。"
 joi_flavor_gbr.103.b: "不喜欢自己的地位就赶紧滚蛋！"
 joi_flavor_gbr.104.t: "荒唐的隆重"
 joi_flavor_gbr.104.d: "#O #B 威斯敏斯特#!#!繁琐的程序引起了许多人的厌烦：一份最近流行的政治讽刺报纸宣称，[ROOT.GetCountry.GetAdjective]伟大的，庄严的，神圣的和关键的下议院实际上是“冗长、空洞、无关紧要的废话堆”。"
 joi_flavor_gbr.104.f: "“你看到那个身材魁梧、声音嘶哑的男人，穿着蓝色外套，戴着怪冠和宽边帽，下身穿白色灯芯绒马裤，脚蹬厚重的靴子，他已经滔滔不绝地讲了半个小时，他的重要性在陌生人中引发了不少欢笑；他就是威斯敏斯特和平的“伟大守护者”。”\n\n“他是先例方面的杰出权威，酒后健谈时，他会告诉你，某某爵士在为政府当政时，曾让四个人起床投票赞成多数票，其中三人在回家的路上去世；议会曾如何在现在是否要送来新蜡烛的问题上产生分歧；议长曾如何在会议结束时意外地留在议席上，不得不独自一人在议会中坐了三个小时，直到动议休会；以及许多其他类似的轶事。”"
 joi_flavor_gbr.104.a: "效率必须得到提升，我们应该专注于[SCOPE.sLaw('current_law_scope').GetName]。"
 joi_flavor_gbr.104.b: "很好，他们可以向隔壁独立委员会的先生们提交建议书。"
 joi_flavor_gbr.105.t: "投机丑闻"
 joi_flavor_gbr.105.d: "一位魅力非凡的投机者，[SCOPE.sParty('par_party').GetName]和[SCOPE.gsInterestGroup('par_interest_group').GetName]的议员在最近被披露犯下了严重投机欺诈行为：利用[SCOPE.sLaw('current_law_scope').GetName]的内幕消息获取利润，并依靠其可敬的政治资历来掩盖其罪行。"
 joi_flavor_gbr.105.f: "“他是在利用家族反对非国教和自由主义事业的声誉。他用普通百姓的积蓄投资房地产，建造了伦敦一些最好的酒店，并成立了其他公司；他做假账，拆东墙补西墙，将资产从一家公司转移到另一家公司。”\n\n“他精心策划公司间转账，以便从不存在的利润中支付股息；审计师则对此视而不见。然而他本人却失踪了，没有告诉任何人他的去向，但人们推测他秘密登上了轮船前往[SCOPE.sCountry('corrupt_state').GetName]。”"
 joi_flavor_gbr.105.a: "要求把他从[SCOPE.sCountry('corrupt_state').GetName]引渡回来接受审判！"
 joi_flavor_gbr.105.b: "我们无能为力，只能发布通缉令。"
 joi_flavor_gbr.106.t: "傻瓜委员会"
 joi_flavor_gbr.106.d: "[SCOPE.sLaw('current_law_scope').GetName]经过一读和二读之后法案进入了全院委员会阶段，然而居心不良的[SCOPE.sParty('par_party').GetName]和[SCOPE.sCharacter('shit_ig_leader').GetFullName]，该法案的知名反对者，勾搭在了一起，试图通过对其细节进行冗长的重复讨论，甚至是提交上百个完全胡闹的修正案来减缓立法进展。"
 joi_flavor_gbr.106.f: "“[SCOPE.sParty('par_party').GetName]的修正案内容奇特，写作方式更是奇特；文章的结构混乱，重复无休止，文风也完全不合时宜；他们没有用科学写作所特有的雄辩之道——清晰、精确、简洁地表达他想说的话，反而肆意沉迷于含糊不清、浮夸夸张的辞藻，充斥着十五岁男孩所钦佩的那些扯淡事物。”\n\n“至于[SCOPE.gsInterestGroup('shit_ig').GetName]及其委员会，或者更确切地说，[SCOPE.sCharacter('shit_ig_leader').GetFullName]先生在委员会中的活动，更是对全院委员会的完美嘲讽：他在收集事实时粗心大意；他无法在收集到事实后对其进行推理；他不懂最简单的术语并发表了一个他自己都不知道其含义的命题；他想要发表并试图证明的命题，直接导致了现在的所有恶性后果。”"
 joi_flavor_gbr.106.a: "无限制的修正案真是恶心！"
 joi_flavor_gbr.106.b: "可恶的[SCOPE.sParty('par_party').GetName]老保！"
 joi_flavor_gbr.107.t: "集体缺席"
 joi_flavor_gbr.107.d: "由于[SCOPE.sParty('wid_party').GetName]对[SCOPE.sLaw('current_law_scope').GetName]的毫无作用的反对情绪，愤怒的[SCOPE.sParty('wid_party').GetName]议员们决定集体罢工，在针对法案的关键投票中缺席，以此来迫使由[SCOPE.sParty('par_party').GetName]控制的下议院暂停表决程序。"
 joi_flavor_gbr.107.f: "“昨天，我代表[SCOPE.sParty('par_party').GetName]政府提交了一份部门会议纪要，通知了议会此次干预相关所有事务；很遗憾，由于投票工作是在休会期间进行的，我们未能遵循通常的14个议会开会日的通知期限。”\n\n“关于这些事务，我们当然希望尽可能诚实、公开、透明地对待议会：我们希望尽快向议会提交报告；然而，过去几个月，某些人一直在休假——我们希望扭转这种局面。我们认为，这个充满活力的机构正在不必要地萎靡不振。”"
 joi_flavor_gbr.107.a: "[SCOPE.sParty('par_party').GetName]将强行执行表决程序。"
 joi_flavor_gbr.107.b: "不负责任是[SCOPE.sParty('wid_party').GetName]的耻辱！"
 joi_flavor_gbr.108.t: "可恶的上院"
 joi_flavor_gbr.108.d: "在下议院获得了通过的[SCOPE.sLaw('current_law_scope').GetName]法案却令人震惊的在上议院遭遇了反惯例的驳回，以[SCOPE.sParty('wid_party').GetName]为首的上议院[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]世袭议员和[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]灵职议员被愤怒的公众认为是这场阴谋的主导者。"
 joi_flavor_gbr.108.f: "“如果[SCOPE.sParty('wid_party').GetName]没有自由表达自己观点的自由，就不可能承担起向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下呈递这份报告的责任。无论这场可怕的灾难最终会如何发展，有一件事是肯定的，那就是英格兰和爱尔兰的所有党派，从最高级别的王室大臣到社会最底层的成员，都有责任联合起来，竭尽全力，必要时甚至不惜牺牲个人利益，竭尽所能阻止这场巨大灾难的可怕蔓延。”"
 joi_flavor_gbr.108.a: "这群瞌睡的老头，石化的神棍！"
 joi_flavor_gbr.108.b: "如果他们不批准，那么[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下就会册封更多[SCOPE.sParty('par_party').GetName]贵族进入上院来阻止他们！"
 joi_flavor_gbr.109.t: "肃静！"
 joi_flavor_gbr.109.d: "关于[SCOPE.sLaw('current_law_scope').GetName]的辩论在下议院中已经引发了激烈的争吵，甚至许多议员已经违反了议事规则：这迫使议长阁下暂停了辩论并发布议长致辞。"
 joi_flavor_gbr.109.f: "“我收到了[SCOPE.sState('british_state').GetCityHubName]郡议员的建议，他请求允许将一个问题作为特权问题优先处理；该问题涉及一桩法律案件，该案件可能导致议会行政专员无法根据议会专员法的规定条向议会提交报告；该法案赋予公共行政和宪法事务委员会审查此类报告的任务。”\n\n“任何试图阻止信息向议会或其委员会传递的行为都被视为藐视议会，因此，我决定，此事确实应该优先考虑特权问题。因此，尊敬的议员可以提出一项动议，将于周四进行辩论；该动议将在任何紧急质询或声明之后，以及政府事务之前进行。”"
 joi_flavor_gbr.109.a: "这些议员是在酒馆喝酒吗？！"
 joi_flavor_gbr.109.b: "议长对这帮流氓一点约束力都没有。"
 #功利主义
 joi_flavor_gbr.110.t: "缺乏进展的改革"
 joi_flavor_gbr.110.d: "尽管[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府曾采用了[GetIdeology('ideology_utilitarian_millian').GetName]的政策，并充满希望，但这一改革性举措最终并未在[ROOT.GetCountry.GetName]扎根。"
 joi_flavor_gbr.110.f: "[ROOT.GetCountry.GetName]对功利主义的许诺随着该项目失去动力而动摇；[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]也不再将功利主义计划作为优先事项。\n\n在一个宁静的时刻，尊敬的首相反思了整个项目的教训。“也许我们必须在原则指导政策制定的方式上更加实际，”他沉思道。"
 joi_flavor_gbr.110.a: "愿上帝保佑[ROOT.GetCountry.GetName]。"
 joi_flavor_gbr.110.b: "我们的政府正失去过去的效率。"
 #英王陛下政府事件组
 joi_flavor_gbr.111.t: "透明政府？"
 joi_flavor_gbr.111.d: "新任部长[SCOPE.sCharacter('ypm_scope').GetFullName]致力于打开其部门的窗口，以一个被他称为“透明政府”的计划；但他却面临着第一个障碍：忠诚可靠的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的公务员队伍，以及微不足道的[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士。"
 joi_flavor_gbr.111.f: "“现在，坦白说，本部门必须彻底清理白厅那些沉闷的官僚机构：我们要打开窗户，放点新鲜空气进来，砍掉所有繁文缛节，精简这台吱吱作响的旧官僚机器——”\n“好的部长阁下，这些是实施这项政策的方法，以及一份供您审批的白皮书提案；这份白皮书可以命名为“开放政府”。”\n\n“听着，我们必须阻止他继续胡诌开放政府：我们把白皮书叫做“开放政府”，所有比标题更容易懂的部分一定要去掉！你越不想做什么，就越要谈论它。”\n“要么开放，要么拥有政府；民主国家的公民当然有权知情，但他们更有权无知！知情只意味着同谋和罪责，无知反倒有一定的尊严。”"
 joi_flavor_gbr.111.a: "[SCOPE.sCharacter('sir_humphrey_scope').GetLastName]爵士不会想让内阁知道真相的。"
 joi_flavor_gbr.111.b: "无知反倒有一定的尊严。"
 joi_flavor_gbr.112.t: "经济驱动"
 joi_flavor_gbr.112.d: "我们伟大的首相：[SCOPE.sCharacter('ypm_scope').GetFullName]正计划精简[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的公务员队伍，但[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士希望他能够先把自己以身作则的精简一下花费，这使得首相陷入了犹豫。"
 joi_flavor_gbr.112.f: "“但有多少人意识到，税务局的人员比皇家海军的还多？很明显，这就是白厅人手过剩最明显的典型例子；请坐，[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]，我们必须精简公务员队伍，起码裁掉一两个茶水阿姨！”\n“茶水阿姨！我要具体情况，我想知道有谁在工作，他们做什么，有什么办公楼，它们里头都办些什么；这样我们才知道从哪里开始削减开支、减少员工、简化程序。”\n\n“这样子首相，我们可以设立一个官僚监督办公室，然后招募400个公务员；然后它们自己又会招募400个公务员，然后我们关闭官僚监督办公室，这样就可以发布一个新闻稿，说尊敬的[SCOPE.sCharacter('ypm_scope').GetLastName]首相裁减了800个职位，节省了纳税人的资金。”\n“但这纯属虚伪，是在作弊，是不诚实的，只是在蒙蔽人们的眼睛！”\n“没关系首相，事实上，政府新闻稿就是这样的。”"
 joi_flavor_gbr.112.a: "很好，我们现在成功裁减了800个公务员，真是巨大的成功！"
 joi_flavor_gbr.112.b: "至少获得了一份可靠的新闻稿。"
 joi_flavor_gbr.113.t: "离校年龄"
 joi_flavor_gbr.113.d: "[SCOPE.sCharacter('ypm_scope').GetFullName]大臣和[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士讨论了改革国家教育供应的计划，大臣希望建立一个专门委员会来撰写一份“独立”报告，而[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]爵士则希望更多介入到其中。"
 joi_flavor_gbr.113.f: "“这个国家的教育简直是一场灾难！我们本该让孩子们为以后的职场生活做好准备。结果他们四分之三的时间都无聊透顶！”\n“将离校年龄提高到16岁，是为了让孩子们学到更多东西，但他们学到的东西却更少了！”\n“实际上大臣，我们提高离校年龄可不是为了让孩子们学得更多！我们提高它是为了让青少年远离就业市场，控制失业率。”\n\n“你是说这个国家的教育没有问题吗？”\n“不，当然不，大臣！教育系统这是个笑话，一直都是个笑话！只要你把事情交给地方议员处理，它就永远是个笑话！我的意思是，他们有一半是你的敌人，而另一半是那种让你宁愿选择敌人的朋友。”"
 joi_flavor_gbr.113.a: "那真是太好了。"
 joi_flavor_gbr.113.b: "诚实总能让你获得在下议院出其不意的优势？"
 joi_flavor_gbr.114.t: "首相的宏伟设计"
 joi_flavor_gbr.114.d: "[ROOT.GetCountry.GetName]的领袖，我们的伟大首相：[SCOPE.sCharacter('ypm_scope').GetFullName]最近又有了一个伟大的想法，并坚持要实现他为[ROOT.GetCountry.GetNameNoFlag]安全制定的“宏伟计划”——或者至少尽可能地实现它，但首相似乎被新闻发言稿和态度发生大变的大臣们的问题阻碍了。"
 joi_flavor_gbr.114.f: "“我们实行征兵制：这样不仅解决了国防问题，也解决了失业问题：教他们手艺和技能，甚至可能教他们读书识字！让他们接受综合教育，以弥补他们所接受的素质教育...只需一项政策，我们就解决了国防、教育和失业问题！”\n\n“这太棒了，[ROOT.GetCountry.GetName]的新政——[SCOPE.sCharacter('ypm_scope').GetLastName]的宏伟设计：在我们伟大的岛屿故事中，时不时地会有一个人肩负起带领他的人民走出阴影的山谷，走向阳光普照、和平繁荣的高地的重任！”\n\n“问题是首相灾难性的新国防理念，宏伟计划？他就是这么叫的：如果它能降低失业率？不不不，我们国防政策的目的不是保卫英国，而是让英国人相信他们得到了保卫！不是外国人，是英国人！外国人知道没有。”\n“难不成首相想要统治[ROOT.GetCountry.GetName]？那就阻止他！”"
 joi_flavor_gbr.114.a: "主要是要让英国人相信他们得到了保卫。"
 joi_flavor_gbr.114.b: "不行，首相的宏伟设计必须得到执行。"
 joi_flavor_gbr.115.t: "谁读报纸？"
 joi_flavor_gbr.115.d: "尊敬的[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士向[SCOPE.sCharacter('ypm_scope').GetFullName]首相提出了一个关于报纸报道的担忧，但首相似乎并不在乎，并自称非常了解这些“讨厌的媒体”。"
 joi_flavor_gbr.115.f: "“别跟我提报刊了。我很清楚谁在读报纸。《每日镜报》的读者是那些自认为在治理国家的人；《卫报》的读者是那些自认为应该治理国家的人；《泰晤士报》的读者是真正治理国家的人；《每日邮报》的读者是治理国家的人的妻子；《金融时报》的读者是国家的主人；《晨星报》的读者是那些认为国家应该被另一个国家治理的人；《每日电讯报》的读者是那些认为国家已经被另一个国家治理的人。”\n\n“首相，那些读《太阳报》的人怎么样？”\n\n“《太阳报》的读者并不关心谁来管理这个国家，只要她有大胸脯就行。”"
 joi_flavor_gbr.115.a: "那首相肯定很善于应对媒体了。"
 joi_flavor_gbr.115.b: "呃，所以到底为什么读报纸？"
 joi_flavor_gbr.116.t: "锄强扶弱"
 joi_flavor_gbr.116.d: "我们的首相：[SCOPE.sCharacter('ypm_scope').GetFullName]发现他自己很难弄懂外交部是否是为了执行政府政策而在办事，反之亦然；他为此感到十分恼怒，并将此怪罪在被他称为诡计多端的[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士身上：但爵士并不想承担责任。"
 joi_flavor_gbr.116.f: "“首相是个问题，他开始不信任我们的建议了：他甚至质疑外交部的政策！内阁甚至有可能推行自己的外交政策，但这太荒谬了，一个国家不能有两种外交政策！”\n\n“显然，我们外交部对此置之不理，我们不想得罪[SCOPE.sCountry('strong_country').GetName]或者[SCOPE.sCountry('weak_country').GetName]！一旦你干涉其他国家的内部争吵，你就走上了一条非常危险的轨道。一定要让首相明白，就外交事务而言，他的工作只是扮演好接待和礼仪角色。”\n\n“你是说，[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]爵士，[ROOT.GetCountry.GetNameNoFlag]不应该支持法律和正义吗？不应该促进和平、和谐与善意吗？我们必须为弱者而战来对抗强者！”\n\n“那您为什么不派兵去帮助[SCOPE.sCountry('major_power').GetName]对抗[SCOPE.sCountry('super_power').GetName]？”\n“呃，[SCOPE.sCountry('super_power').GetNameNoFlag]太强大了。”"
 joi_flavor_gbr.116.a: "[SCOPE.sCountry('super_power').GetNameNoFlag]太强大了。"
 joi_flavor_gbr.116.b: "[SCOPE.sCharacter('ypm_scope').GetFullName]的工作只是扮演好礼仪角色。"
 joi_flavor_gbr.116.c: "不要害怕[SCOPE.sCountry('super_power').GetNameNoFlag]，他们很虚弱！"
 joi_flavor_gbr.117.t: "四阶段外交"
 joi_flavor_gbr.117.d: "由于最近爆发在[SCOPE.sCountry('strong_country').GetName]和[SCOPE.sCountry('weak_country').GetName]之间的不可控的战争，[SCOPE.sCharacter('ypm_scope').GetFullName]首相开始对外交部的不负责任感到愤怒。不过[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士并不以此为然。"
 joi_flavor_gbr.117.f: "“首相，如果您一定要我明白地讲，我只能说就目前情况，综观全局，纵览古今，考虑各部门平均水平，分析总结也许可以认为，综上所述概括说来，您很可能发现，尽管也许不中听，但无论如何，恐怕前景微妙。”\n\n“所以是还是不是？——哦，首相，当适当的时候，首相，等机会来临，万事具备，条件成熟——那我们到底怎么做？[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]爵士，请直接告诉我？”\n\n“这样，我们一般采取四阶段战术：第一阶段：我们宣称什么事都没有；第二阶段：我们说也许有事发生，但不应该采取行动；第三阶段：也许我们应该采取行动，但什么都做不了；第四阶段：也许我们当初能做点什么，但现在已太迟了。”"
 joi_flavor_gbr.117.a: "看来我们果然什么都做不了。"
 joi_flavor_gbr.117.b: "这些官僚手段真是讨厌！"
 joi_flavor_gbr.118.t: "很好的计划，但不是现在"
 joi_flavor_gbr.118.d: "我们的伟大首相：[SCOPE.sCharacter('ypm_scope').GetFullName]最近又有了奇思妙想，提出了一个新的计划，不过尊敬的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的公务员队伍和[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士表示，这份计划仍然需要仔细研究。"
 joi_flavor_gbr.118.f: "“显然，委员会认为，您的新政策非常好，但是鉴于存在一些质疑的声音，我认为委员会的意思是经过深思熟虑尽管提案纲领得到广泛认可，某些原则理论原则上可行，某些方面太复杂，在实践中需要微妙的平衡。”\n\n“所以原则上，这是明智而谨慎的方案，只有将它付诸更加详细的考虑，加强新提案和已有原则的连续性以及原则的原则性争论由提议者在提议中建议批准的，原则上。”\n\n“你不是建议我放弃它吗？——我的天哪，没有！但愿不会！这是一项极其出色的政策！关键的问题是，在您发表任何意见之前，应该让我们先进行进一步的研究。”"
 joi_flavor_gbr.118.a: "所以你到底在说什么？"
 joi_flavor_gbr.118.b: "哦哦哦好的，那就这样办吧。"
 joi_flavor_gbr.119.t: "国家的恩人"
 joi_flavor_gbr.119.d: "我们充满道德感的首相：[SCOPE.sCharacter('ypm_scope').GetFullName]最近正从卫生大臣那里得到了一则灵感，试图说服内阁成员们一项“伟大的禁止[SCOPE.sGoods('tax_goods_scope').GetName]计划”，但遭到了财政部和许多官员们的反对，比如[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士。"
 joi_flavor_gbr.119.f: "“我建议政府采取行动消除[SCOPE.sGoods('tax_goods_scope').GetName]，彻底禁止所有[SCOPE.sGoods('tax_goods_scope').GetName]赞助和广告，花费50万英镑用于反[SCOPE.sGoods('tax_goods_scope').GetName]宣传，禁止在所有公共场所吸烟，并在未来五年内累进加税，直到一包20支[SCOPE.sGoods('tax_goods_scope').GetName]的价格与一瓶威士忌差不多。”\n“唯一的问题是，[SCOPE.sGoods('tax_goods_scope').GetName]税是政府的主要收入来源！”\n“[SCOPE.sGoods('tax_goods_scope').GetName]每年夺走10万人的生命，我们得到了什么？这是一个道德问题！”\n“没错，但从未证实过两者之间存在明确的因果关系，不是吗？统计数据——数据可以证明一切，甚至是真相。”\n\n“[SCOPE.sGoods('tax_goods_scope').GetName]行业创造了2.5万个就业岗位，蓬勃发展的[SCOPE.sGoods('tax_goods_scope').GetName]出口业务，帮助我们实现了贸易平衡，25万个与[SCOPE.sGoods('tax_goods_scope').GetName]相关的工作岗位——报刊亭、包装、运输——[SCOPE.sGoods('tax_goods_scope').GetName]税支付了医疗服务体系三分之一的费用！”\n“正是因为那些自愿为朋友献出生命的吸烟者，我们才挽救了比我们原本无法挽救的生命更多的生命：吸烟者是国家的恩人啊！呃，只要他们还活着。”"
 joi_flavor_gbr.119.a: "[SCOPE.sGoods('tax_goods_scope').GetName]正不断祸害不列颠人民。"
 joi_flavor_gbr.119.b: "吸[SCOPE.sGoods('tax_goods_scope').GetName]者是国家的恩人啊！"
 joi_flavor_gbr.120.t: "我们中的一员"
 joi_flavor_gbr.120.d: "一名重要的部长：[SCOPE.sCharacter('traitor_scope').GetFullName]在最近的秘密调查中被指控为一个[SCOPE.sCountry('russian_scope').GetName]间谍——尽管在前几个月的政府安全调查中被[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士洗脱了罪名。"
 joi_flavor_gbr.120.f: "“[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]爵士！我想和你谈谈一些非常秘密的事情：几个月前，有一个安全调查，是关于[SCOPE.sCharacter('traitor_scope').GetFirstName]爵士的，事实上是你亲自进行调查的，你没有发现任何罪证吗？——当然没有。[SCOPE.sCharacter('traitor_scope').GetFirstName]爵士是我们中的一员；我们多年来一直是朋友。整个故事都是媒体编造的，而内部安全调查的目的就是为了找不到证据，好让首相得以在议会宣布：‘这些指控没有证据。’”\n\n“好吧，恐怕我不得不告诉你，他职业生涯的大部分时间都是[SCOPE.sCountry('russian_scope').GetAdjective]间谍；他把文件留给了政府，包括一份详细的供词，一切都经得起检验。”\n“我，但是天哪！[SCOPE.sCountry('russian_scope').GetAdjective]间谍？——你本可以进行适当的调查，但你从未跟进，[SCOPE.sCharacter('sir_humphrey_scope').GetFirstName]爵士，为什么调查这么快就宣告他无罪？”\n\n“天哪！你不可能检查所有事情！你永远不知道你会发现什么！他向我保证了！一名绅士的诺言！首相，我向你保证这不是串通！我一句[SCOPE.sCountry('russian_scope').GetAdjectiveNoFormatting]语都不会说!我不可能是，我不在剑桥，我不是他们中的一员，我已婚，我是我们中的一员，我是无辜的！”"
 joi_flavor_gbr.120.a: "如果[SCOPE.sCharacter('traitor_scope').GetFullName]是间谍，[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士也难以洗清嫌疑啊！"
 joi_flavor_gbr.120.b: "不不不，[SCOPE.sCharacter('sir_humphrey_scope').GetFullName]爵士是我们中的一员！"
 #功利主义事件
 joi_flavor_gbr.121.t: "共同利益"
 joi_flavor_gbr.121.d: "奉行[GetIdeology('ideology_utilitarian_leader').GetName]哲学的政治领袖针对当前规模过于臃肿庞大的#V 文官制度#!提出了一项雄心勃勃的改革计划，旨在全面理顺[ROOT.GetCountry.GetAdjective]的文官体制。批评者们则宣称这是[SCOPE.sParty('ruling_party').GetName]利用来谋取政治利益的手段。"
 joi_flavor_gbr.121.f: "公务员体系在英格兰发展起来，后来[ROOT.GetCountry.GetAdjective]以白厅街为中心，白厅因此得名；他们由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下根据首相的建议委任，通常在首相的党派失去影响力时就会被替换。\n\n然而，帝国的规模不断扩大，随着帝国扩张而扩张的官僚机构——它们的每个机构都有自己的系统，而官员们则通过购买或上议院的推荐——让人们越来越清楚地认识到这些安排并不奏效。\n\n为了在这个国家塑造出更好的秩序，我们必须确保公务员体系不被执政党利用来谋取政治利益，而是维持政治中立。"
 joi_flavor_gbr.121.a: "我们必须建立中立的文官体系。"
 joi_flavor_gbr.121.b: "官僚机构应该在内部实现重整。"
 #帝国特惠制
 joi_flavor_gbr.122.t: "帝国特惠制"
 joi_flavor_gbr.122.d: "在#yellow 渥太华#!举行的帝国经济会议上，尽管进行了复杂而艰巨的谈判过程，但与会的代表们——包括[ROOT.GetCountry.GetName]——最终同意签署一份贸易特惠协定，规定大英帝国内部贸易的优惠与免税特权；同时，#yellow 联合王国首相#!也声明将对海外商品加征关税以保护帝国成员们的产业：即便这会损伤到本土的利益。"
 joi_flavor_gbr.122.f: "“在渥太华，庄重的贝斯伯勒勋爵端坐在“王冠宝座”上。在里多厅，他举行总督招待会，帝国各地的总督与总理们受邀出席；他悬挂着一面象征性的旗帜，旗帜的底色为蓝色，上面印着一顶金色王冠。”\n\n“问题在于：没有人比贝斯伯勒勋爵更清楚，母国是一个相对较小、人口稠密的制造业地区；相反，自治领地面积相对较大，多为乡村，人口稀少，但拥有引以为豪、充满希望的“新兴工业”：这本质上就是帝国经济会议的复杂而艰巨的问题。”\n\n“在这种性质的会议上，调查和处理对#yellow 大英帝国#!所有地区都至关重要的、具有重要政策意义的问题，最重要的是，与会代表应该能够以最大的自由，和完全信任的精神相互交流。”"
 joi_flavor_gbr.122.a: "为了上帝，荣耀与帝国！"
 #君主继承事件与日志
 joi_flavor_gbr.123.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的婚姻？"
 joi_flavor_gbr.123.d: "[SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle][SCOPE.sCharacter('royal_marriage_character').GetFullName]已经到了结婚的年龄，经过她的同意，受上帝保佑的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下如今需要确定一位出身名门的皇夫。"
 joi_flavor_gbr.123.f: "“亲爱的阿尔伯特，给我带来了无限的幸福...他具备我所能期望的一切品质，能让我获得完美的幸福。”\n\n“他非常英俊；他的头发颜色和我的差不多；他的眼睛又大又蓝，鼻子很漂亮，嘴巴甜美，牙齿整齐；但他面容的魅力在于他的表情，令人赏心悦目。”"
 joi_flavor_gbr.123.a: "#yellow 萨克森-科堡-哥达#!家族的#O 阿尔伯特亲王#!是最好的对象，他深爱着[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。"
 joi_flavor_gbr.123.b: "[SCOPE.sCountry('marriage_country_1').GetAdjective]的[SCOPE.sCharacter('foreign_ruler_1').GetLastName]家族成员会很合适。"
 joi_flavor_gbr.123.c: "[SCOPE.sCountry('marriage_country_2').GetName]的[SCOPE.sCharacter('foreign_ruler_2').GetPrimaryRoleTitle]有个亲属很合适。"
 #
 joi_flavor_gbr.124.t: "[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]访问[SCOPE.sCountry('GBR_scope').GetName]"
 joi_flavor_gbr.124.d_1: "来自[SCOPE.sCountry('RUS_scope').GetName]的[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]在今天抵达了伦敦，并觐见了[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]陛下，双方进行了一场友好的会面，[SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]陛下还承诺可以陪同他一起参观某些景点。"
 joi_flavor_gbr.124.d_2: "[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]已经抵达了伦敦，并与[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]进行了一场友好的会面。女王承诺他将可以自由参观英国各地，并会在空闲的时候一同前往。"
 joi_flavor_gbr.124.f: "“[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]身材高大瘦削，看起来很坚定，尽管如此，他的面容仍然和蔼可亲。很容易知道他很善良，也很热情；当他脱下帽子时，他的表情中流露出一种非常高贵的气质。”"
 joi_flavor_gbr.124.a: "希望他在[SCOPE.sCountry('GBR_scope').GetName]能学到东西！"
 joi_flavor_gbr.124.b: "欢迎皇子的到来。"
 #
 joi_flavor_gbr.125.t: "[SCOPE.sCharacter('prince_scope').GetFirstName]的奇妙冒险"
 joi_flavor_gbr.125.d_1: "遵守之前的承诺，[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]陛下昨天与[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]一起单独地前往观赏了伦敦的许多景点。然而回来之后[SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]陛下却面带红晕地告诉首相，她希望能娶[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]为夫..."
 joi_flavor_gbr.125.d_2: "遵守之前的承诺，[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]昨天与[SCOPE.sCharacter('prince_scope').GetFirstName][SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]殿下一起单独地前往观赏了伦敦的许多景点。然而回来之后[SCOPE.sCharacter('prince_scope').GetPrimaryRoleTitle]殿下却告诉访问代表团的成员们，他希望能成为[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]的丈夫，而[SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]似乎也对此颇为有意..."
 joi_flavor_gbr.125.f: "“他们什么也没说，什么也没问，只是手拉着手走着；有时，他们会停下来看着彼此，像是要确认这是真的。他望着她的侧脸，微风吹过。他不知道他到底在期望什么，或许只是觉得时间应该停下来，让她永远保持这个姿势。\n\n她走在他身旁，偶尔轻轻一笑。他听不清她说的话，只是听见她声音的旋律，就觉得心脏被击中一般。他忽然弯下头去亲吻那只手。她轻轻抽回，却没有离开，空气中似乎悬着一层颤动的光。\n\n他伸出手把她留住，他的眼神像火焰一般落在她身上。他抽出一支笔，写了一个字母，她立刻理解了，眼睛闪亮，脸色通红，她感到全身都被一种喜悦的战栗包围。\n他写：‘你愿意做我的妻子吗？’\n她读懂了，停顿了一下，拿起铅笔写下：‘是的。’”"
 joi_flavor_gbr.125.a: "“你必须允许我告诉你，我多么热烈地仰慕和爱你。”"
 joi_flavor_gbr.125.b: "“你必须允许我告诉你，我多么热烈地仰慕和爱你。”"
 joi_flavor_gbr.125.c: "这不可能！他是皇位的继承人！"
 joi_flavor_gbr.125.e: "一名[SCOPE.sCharacter('prince_scope').GetLastName]家族的皇夫？不可想象！"
 #
 joi_flavor_gbr.126.t: "世纪婚礼"
 joi_flavor_gbr.126.d_1: "尽管令双方都难以想象，但前往[SCOPE.sCountry('GBR_scope').GetName]游玩的[SCOPE.sCountry('RUS_scope').GetName]皇子[SCOPE.sCharacter('prince_scope').GetFirstName]与[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]一见钟情，经过沙皇和内阁的同意，在今天于伦敦举办了一场盛大的世纪婚礼，并约定女王将不日访问[SCOPE.sCountry('RUS_scope').GetName]。"
 joi_flavor_gbr.126.d_2: "一则令人惊掉下巴的新闻今天从伦敦传来，前往[SCOPE.sCountry('GBR_scope').GetName]游玩的[SCOPE.sCountry('RUS_scope').GetName]皇子[SCOPE.sCharacter('prince_scope').GetFirstName]与[SCOPE.sCharacter('queen_scope').GetFirstName][SCOPE.sCharacter('queen_scope').GetPrimaryRoleTitle]进行了一场盛大且离奇的婚礼，所有人都未曾料到这两个敌对情绪如此强烈的国家之间却出现了这样令人震惊的发展。"
 joi_flavor_gbr.126.f: "“那一夜灯火辉煌，鲜花与烛光交织，音乐与笑声久久回荡。新人的目光在烛火间相遇，仿佛世界上只剩下他们二人。他们的手终于紧紧握在一起。她穿着白纱，微微低下了头，手却在颤抖。\n\n他们在上帝面前说出誓言，他望着她，觉得自己全身都在发热，仿佛人生的全部都汇聚在这一刻的神圣誓言中。烛光摇曳在她的面纱上，他几乎不敢呼吸，唯恐惊扰这一瞬间的神圣。\n\n城市在星空下安睡，唯有他们的婚礼还在进行。火把照亮人群的笑容，夜晚都因此而变得温暖。星光在他们头顶闪耀，仿佛都是为他们而祝福。”"
 joi_flavor_gbr.126.a: "天佑...沙皇？"
 joi_flavor_gbr.126.b: "天佑...女王？"
 joi_flavor_gbr.126.c: "？？？"
 #
 joi_flavor_gbr.127.t: "乔治五世的加冕"
 joi_flavor_gbr.127.d: "国王去世了。继位的是他的儿子[SCOPE.sCharacter('george_v_relevant_ruler').GetFirstName]，举国上下欢欣鼓舞。愿他长久统治！"
 joi_flavor_gbr.127.f: "“我失去了最好的朋友和最慈爱的父亲……”\n“我一生中从未与他有过半句争执。”\n“我心碎不已，悲痛万分，但上帝会帮助我履行我的职责，亲爱的梅会像往常一样给我安慰。”\n“愿上帝赐予我力量与指引，助我扛起降临在身上的重担。”"
 joi_flavor_gbr.127.a: "天佑国王！"
 joi_flavor_gbr.128.t: "康斯坦丁一世登基"
 joi_flavor_gbr.128.d: "随着尼古拉一世统治的结束，[SCOPE.sCharacter('tsar_scope').GetFullName]登上[ROOT.GetCountry.GetAdjective]皇位，成为全俄罗斯的沙皇与独裁者：康斯坦丁一世。许多自由派官僚希望[SCOPE.sCharacter('tsar_scope').GetHerHis|U]的统治能开创一个改革的新时代。"
 joi_flavor_gbr.128.f: "“在无形的、与朕同在的上主面前，朕接受神圣的誓言，永远将祖国的福祉作为目标。\n\n是的，在召唤朕从事这项伟大事业的上主的指引和庇佑下，朕将在最高的权力和荣耀中建设俄罗斯，祈愿荣福而永受铭记的先皇的永恒愿望和旨意通过朕得以实现。”"
 joi_flavor_gbr.128.a: "天佑沙皇！"
 joi_flavor_gbr.129.t: "亚历山大亲王的葬礼"
 joi_flavor_gbr.129.d: "与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下共同生活与统治了数十年的[SCOPE.sCharacter('prince_scope').GetFirstName]亲王殿下去世了。他们在一场意外中认识，终于其中的一方走完了人生的旅途。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]并不悲伤，她沉默着，似乎她与他仍然并不遥远。"
 joi_flavor_gbr.129.f: "“他感到生命正在慢慢消逝，如同蜡烛的光一点点暗下去：他闭上眼睛。他看见了年轻时的那个傍晚：雾霭慢慢升起，他与女王手拉着手走在河岸边，他们互相凝望，他拿起笔，妻子面带红晕地看着他。他的嘴角浮现出微笑，那微笑不属于这尘世，而属于那无比高远、无限宁静的天空。\n\n他看到一个高大瘦削的身影从灰暗的角落走到窗边，转过身来，穿着军礼服，戴着叶卡捷琳娜女皇的大皇冠，默默地盯着他。亲王知道他是谁，他微笑着，似乎早已和命运和解。光辉从他的面容上渐渐消失，那是一种温柔的消失，如同黄昏替代白昼。\n\n突然，他的呼吸急促而断续，双眼紧闭，脸色发青。教堂的钟声沉重地敲响，回荡在灰色的天空下。伦敦和彼得堡都在流泪。”"
 joi_flavor_gbr.129.a: "他的故事将被永远传颂。"
 joi_flavor_gbr.130.t: "阿尔伯特亲王的葬礼"
 joi_flavor_gbr.130.d: "与[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下共同生活与统治了数十年的[SCOPE.sCharacter('prince_scope').GetFirstName]亲王殿下去世了。他们在一场宴会中认识，终于其中的一方走完了人生的旅途。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]并不悲伤，她沉默着，似乎她与他仍然并不遥远。"
 joi_flavor_gbr.130.f: "“黄昏的空气如此宁静，仿佛整个大地在屏息。只有远山的余辉还在闪烁，让他感觉一切好像都在向永恒的安宁靠拢。”\n\n“暮色中，海风吹来，他感到某种力量在黑暗里召唤，自己的呼吸在胸中变得越来越轻微。他向她伸出双手，仿佛要把生命交付。”\n\n“烛火快要熄灭了，光线只在他身旁颤动了一下，便彻底暗了下去。屋里很安静，只剩下女王握着他的手。”"
 joi_flavor_gbr.130.a: "阿门。"