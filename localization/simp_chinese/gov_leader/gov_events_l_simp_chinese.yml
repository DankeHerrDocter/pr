l_simp_chinese:
 #
 joi_flavor_gov.1.t: "官方民族性"
 joi_flavor_gov.1.d: "#yellow 尼古拉 罗曼诺夫#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的统治正进入尾声，他力图恢复和捍卫在拿破仑战争中被推翻的神圣秩序，在[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetLeader.GetFullName]等人的协助下，他的意志为[ROOT.GetCountry.GetName]留下了深远的遗产。"
 joi_flavor_gov.1.f: "“我们有共同的义务，确保按照我们尊贵的君主的最高意愿，在正统、专制和民族精神的共同指导下，开展人民的教育。我坚信，每一位教授和教师，只要心中充满对王位和祖国的忠诚，都会竭尽全力成为政府的得力助手，赢得政府的完全信任。”\n\n“即使我们从西方吸收了一些不可避免的瑕疵，但另一方面，我们自身也保留了三种纯粹的基本情感，它们蕴含着我们未来发展的种子和保障：这些让人民们清楚地看到，在所有与他们有关的事情上，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]都是按照上帝的旨意行事，而不是按照他们自己，或一些外国人的幻想行事。”"
 joi_flavor_gov.1.a: "即便是从专制的神圣统一中..."
 joi_flavor_gov.1.b: "他的专制政体不过是一个幌子..."
 joi_flavor_gov.1.c: "俄罗斯是一个大家庭：统治者是父亲，臣民是孩子..."
 #
 joi_flavor_gov.2.t: "自由的道德价值"
 joi_flavor_gov.2.d: "尊敬的#yellow 威廉 格莱斯顿#!阁下的政府任期已经进入了尾声，他力图在社会中强化机会平等，反对贸易保护主义，并主张建立公共教育体系，还通过反对轻率的帝国扩张而维护了不列颠的国际声望与世界的和平秩序。他的思想与政策为[ROOT.GetCountry.GetName]留下了深远的遗产。"
 joi_flavor_gov.2.f: "“我所能采取的唯一提高煤矿工人工资的手段，就是努力消除一切可能降低他们劳动产品价格的贸易限制，并尽可能降低他们所需或消费品的税收。除此之外，我还着眼于远见卓识，这种远见卓识在我国尚未像在苏格兰和一些外国那样广泛普及。”\n\n“格莱斯顿先生访问北方时，消息迅速传到工人们耳中，他们纷纷出来迎接这位唯一一位赋予英国人民权利的首相：绵延二十英里的河岸上挤满了前来迎接他的人们：妇女们在河岸上抱着孩子，希望她们以后能说自己亲眼目睹了人民的财政大臣经过。所有会划桨的人都停下来，为格莱斯顿先生欢呼；成千上万以前从未接近过公众人物的粗犷矿工们也蜂拥而至，围在他的马车周围伸出手臂，与格莱斯顿先生握手，就像和自己人一样。”"
 joi_flavor_gov.2.a: "我真诚的向你们祝愿..."
 joi_flavor_gov.2.b: "祝愿你们的自由和独立..."
 joi_flavor_gov.2.c: "一个行将就木的人..."
 #
 joi_flavor_gov.3.t: "[GetIdeology('ideology_one_nation_conservatism_leader').GetName]的崛起"
 joi_flavor_gov.3.d: "在[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]的新兴巨头：[SCOPE.sCharacter('disraeli_scope').GetFullName]的倡议下，许多原本被[GetIdeology('ideology_british_tory_conservatism_old').GetName]视为教条的思想被改良，为了吸引新兴的工人阶级，以他为代表的[GetIdeology('ideology_one_nation_conservatism_leader').GetName]主张正在[SCOPE.sParty('conservative_party').GetName]中崛起。"
 joi_flavor_gov.3.f: "“我一直认为[SCOPE.sCharacter('disraeli_scope').GetLastName]阁下是下议院中最伟大的激进分子，他做到了全国其他任何人都做不到的事情：他把那辆满载愚蠢、迟钝的乡绅——我这里说的“愚蠢”只是指议会意义上的——的大巴车拉了上来，并把这些保守党人变成了激进的改革者。”\n\n“因此，英国民众团结起来，寻求从挥霍无度的寡头政治、野蛮的宗派主义和贪婪的教士统治下，摆脱堕落的阴谋，而这一切的幕后推手正是他们的世袭领袖——贵族们。因此，此时此刻，上议院代表着除辉格党寡头、他们的工具——持不同政见者以及他们的主子——爱尔兰教士之外的一切。”"
 joi_flavor_gov.3.a: "这是新时代的贵族义务！"
 joi_flavor_gov.3.b: "家长式作风并不可取。"
 joi_flavor_gov.4.t: "保守党的恩底弥翁"
 joi_flavor_gov.4.d: "尊敬的#yellow 本杰明 迪斯雷利#!阁下的政府任期已经进入了尾声，他力图改革#yellow 保守党#!的陈旧思维，促进经济平等，公共卫生和社会稳定；他还通过强大的军事与外交手段维持了有利于[ROOT.GetCountry.GetName]的世界局势，扩充了不列颠帝国的利益。他获得了许多支持仁慈与改良的[GetIdeology('ideology_one_nation_conservatism_leader').GetName]们，以及工人阶层们的广泛支持。他的思想与政策为[ROOT.GetCountry.GetName]留下了深远的遗产。"
 joi_flavor_gov.4.f: "“难道会彻底更换政党吗？保护主义者会卷土重来吗？他们势力强大，但始终处于少数地位，就像一些拥有世界上最精锐军队的欧洲大陆强国一样，却总是战败。那群自恋的天才，曾经搅乱了所有与他们共事的内阁，他们是否会像他们一直梦想的那样，靠着人民的肩膀重返政坛？尽管人民似乎从来不会想起他们。”\n\n“我此行的目的并非仅仅是为了参观这些房间，我此行的目的是为了看看我们以前的育婴室，我们曾在这里一起生活了那么久，那么温馨！它就在这里；我们就在这里。我所渴望的一切，我所梦想的一切，都已成真。亲爱的，我灵魂的挚爱，在这充满我们童年和往昔岁月的场景中，让我以所有的悲伤和快乐，给你我最后的拥抱。”\n\n                                                    ——本杰明 迪斯雷利，《恩底弥翁》"
 joi_flavor_gov.4.a: "他是保守主义的救星..."
 joi_flavor_gov.4.b: "我仍然认为他肩负着使命..."
 joi_flavor_gov.4.c: "我以为他有使命在身..."
 #
 joi_flavor_gov.5.t: "昭昭天命的实践"
 joi_flavor_gov.5.d: "#yellow 詹姆斯·K·波尔克#!总统的任期已经进入了尾声，他反对贸易保护主义，通过降低关税方式意图促进贸易繁荣，并主张建立独立的国库，避免政府资金受到私有银行控制。在外界，他对太平洋西岸和墨西哥领土的扩张，大力发扬了[ROOT.GetCountry.GetName]昭昭天命的理念，人们更加相信受到上帝指引的[ROOT.GetCountry.GetName]，不仅命中注定统治大西洋到太平洋的土地，而且有义务将共和制度传播整个北美大陆，履行文明的使命。"
 joi_flavor_gov.5.f: "“我感到我已从所有公共事务的负担中彻底解脱出来了。我相信在我退休期间，我将比担任全国公民授予我的最高职务的4年间生活得更快乐。”\n\n“波尔克的身体已经被繁重的工作累垮了，他的头发全白了，还长期患慢性腹泻。当他离开白宫，返回田纳西州时，受到了各地群众的欢迎，这使他本就疲惫不堪的身体更加虚弱。他彷佛就像一位来去自由的英雄，完成使命后迅速消失在公众视野，但人民不会忘记他。”"
 joi_flavor_gov.5.a: "詹姆斯·K·波尔克，我们不会忘记你的付出..."
 joi_flavor_gov.5.b: "小山胡桃木，你该好好休息了..."
 joi_flavor_gov.5.c: "一个衰老的家伙罢了..."