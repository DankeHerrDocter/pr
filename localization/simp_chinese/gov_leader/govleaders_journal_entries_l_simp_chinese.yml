 government_leader_benjamin_disraeli_reason:0 "工业化不止正在改变我们的国家，对于[SCOPE.sParty('conservative_party').GetName]而言，#B 变革#!也同样重要。自#O 谷物法#!的废除和#O 改革法案#!的颁布以来，曾经辉煌的[SCOPE.sParty('conservative_party').GetName]却因关键支柱[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的衰弱，和数百万[concept_lower_strata]选民的涌入而失去权势。\n\n[SCOPE.sParty('conservative_party').GetName]的现任领袖，[SCOPE.sCharacter('disraeli_scope').GetFullName]#yellow 爵士#!认为，如果[SCOPE.sParty('conservative_party').GetName]想要在这个新兴的选民群体中赢得[concept_election]，就必须#B 推行社会改革#!：他希望通过一系列措施来#B 改善人民生活#!，提供社会支持来#B 保护工人阶级#!，并在一个家长式的[concept_government]中促使[concept_upper_strata]向下分享自己的财富和利益，最终在保留#B 保守等级制体系#!的前提下建立一个#V 仁慈的，人道的有机社会#!。\n\n#B [SCOPE.sCharacter('disraeli_scope').GetFullName]#yellow 纲领：#!#!\n实现[SCOPE.sCharacter('disraeli_scope').GetLastName]首相纲领中的各项事务，将提升此项[concept_journal_entry]的成效，相关成就将在#B 完成#!时计入。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_1_checkbox')]拥有[GetLawType('law_monarchy').GetName][concept_law]和投票权，且#B 激进主义运动#!，#B 劳工运动#!和所有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt 社会主义#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_activism]#B 低于25%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_2_checkbox')]拥有[GetLawType('law_public_health_insurance').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_3_checkbox')]拥有[GetLawType('law_regulatory_bodies').GetName]或[GetLawType('law_worker_protections').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_4_checkbox')][concept_sol]不低于#V 20#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_5_checkbox')]控制着#yellow 苏伊士运河公司#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_6_checkbox')]是世界第1[concept_great_power]，且[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]拥有#yellow #tooltippable;tooltip:[GetPlayer.GetTooltipTag],emperor_ofindia_list_tt 印度皇帝#!#!特质\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_7_checkbox')]俄罗斯或其附属在巴尔干控制的省份数量#B 不高于#!#V 1#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_disraeli_8_checkbox')]拥有[GetLawType('law_census_voting').GetName]或[GetLawType('law_universal_suffrage').GetName][concept_law]，且完成了#V $great_1867_parliament_reform$#![concept_journal_entry]"
