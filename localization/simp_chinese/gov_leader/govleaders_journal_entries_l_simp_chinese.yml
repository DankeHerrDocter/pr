 government_leader_nicholas_i_reason:0 "在#b 拿破仑战争#!之后，#R 不忠之心#!#b 正根深蒂固#!于[ROOT.GetCountry.GetName]的#v $aristocrats$#!阶层——[SCOPE.sCharacter('nicholas_i_scope').GetLastName]#yellow 王朝#!最重要的根基之中。[SCOPE.sCharacter('nicholas_i_scope').GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，作为欧洲反动主义和神圣秩序的至高保卫者，却在十二月党逆贼的叛乱中登基，这使得他始终怀疑身边有人在试图组织推翻他正统王位的密谋。\n\n为了#B 铲除叛乱#!，消灭试图摧毁君主制、宗教和士气的全欧洲阴谋，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下计划建立强大的#yellow 政治警察#!，#yellow 言论管制#!，并将#yellow 教育体系#!的目标改造为#B 摒弃西方思想，专注于培养#V 虔诚#!，#V 无条件忠于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!且#V 训练有素#!的君主意志执行者#!，最终在[GetReligion('orthodox').GetName]和[GetLawType('law_monarchy').GetName]的绝对权威下实现#O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],government_leader_nicholas_i_modifier_effects_tt 专制主义#!#!的帝国统一。\n\n[SCOPE.sCharacter('nicholas_i_scope').GetFirstName]#yellow 的反动主义议程：#!\n实现[SCOPE.sCharacter('nicholas_i_scope').GetFirstName]沙皇议程中的各项事务，将提升此项[concept_journal_entry]的成效，相关成就将在#B 完成#!时计入。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_1_checkbox')]拥有[GetLawType('law_autocracy').GetName]和[GetLawType('law_state_religion').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_2_checkbox')]拥有[GetLawType('law_censorship').GetName]或[GetLawType('law_outlawed_dissent').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_3_checkbox')]拥有[GetLawType('law_secret_police').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_4_checkbox')][concept_literacy]#V 低于15%#!，且[concept_bureaucracy]剩余不低于#V 1000#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_5_checkbox')]所有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt 自由派#!或#tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt 社会主义#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_activism]#B 低于10%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_6_checkbox')][GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]和[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]都[concept_in_government]且[concept_powerful]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_nicholas_7_checkbox')]欧洲#O 大陆#!不存在[concept_major_power][concept_rank]及以上的#L #B 共和制#!#![concept_country]"
