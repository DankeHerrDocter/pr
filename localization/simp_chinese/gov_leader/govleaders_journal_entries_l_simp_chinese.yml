 government_leader_william_gladstone_reason:0 "在这个#B 不列颠治世#!的鼎盛时代，#blue #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt 自由主义#!#!的坚定支持者，[SCOPE.sCharacter('gladstone_scope').GetFullName]，自[SCOPE.sParty('liberal_party').GetName]执政以来便一直担任[ROOT.GetCountry.GetName]的首相，并以近乎宗教般的#B 自由主义政治信念#!主导着不列颠政府。\n\n他的执政纲领旨在强化#B 个人主义、自由和平等权利#!，以[GetLawType('law_laissez_faire').GetName]与[GetLawType('law_free_trade').GetName]巩固[ROOT.GetCountry.GetName]的繁荣，并通过削减[concept_tariffs]、限制[concept_government_expenses]和降低[concept_taxes]，在预算平衡的情况下维护一个对#B #V 自由社会#!#!干预最小的#B 廉洁政府#!。\n\n#B [SCOPE.sCharacter('gladstone_scope').GetFullName]#yellow 纲领：#!#!\n实现[SCOPE.sCharacter('gladstone_scope').GetLastName]首相纲领中的各项事务，将提升此项[concept_journal_entry]的成效，相关成就将在#B 完成#!时计入。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_1_checkbox')]拥有[GetLawType('law_laissez_faire').GetName][concept_law]，且拥有世界最高GDP\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_2_checkbox')]拥有[GetLawType('law_free_trade').GetName][concept_law]，且我国[concept_market]与[concept_world_market]的进出口总[concept_traded_quantity]#B 至少为#!#V 500k#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_3_checkbox')]#O 赋税等级#!不高于#V 低#!，且已征收[concept_consumption_tax]的数量不高于#V 5#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_4_checkbox')][concept_investment_pool]获得的[concept_reinvestment]总收入#B 不低于#!#V 3M#!，且拥有[concept_economy_health]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_5_checkbox')]完成了#V $elementary_education_1870_act$#![concept_journal_entry]，且[concept_literacy]#B 不低于#!#V 70%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_6_checkbox')]完成了#V $british_empire_ireland$#![concept_journal_entry]，[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]执政且[concept_legitimacy]不低于80\n•[SCOPE.GetRootScope.GetCountry.GetCustom('government_leader_gladstone_7_checkbox')]欧洲处在战争中的[concept_great_