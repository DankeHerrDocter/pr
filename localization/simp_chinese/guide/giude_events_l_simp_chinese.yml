 company_equity_lobby: "#v 由该MOD解锁：Victorian Century#!\n关于公司的争议正在立德贺街的公司董事会中弥漫：利润连年下跌，债务逐年上涨。许多投资者已经开始对公司丧失了信心，如果不能重振公司，国有化就将不可避免。"
 bic_company_debts_lobby: "#v 由该MOD解锁：Victorian Century#!\n自18世纪后半叶以来公司的债务就不断增加，其中许多都是依靠议会法案从英格兰银行借贷的。换而言之，公司向白厅打了一张巨大的白条——而白厅已经开始对此感到不耐烦了。"
 unified_subcontinent_lobby: "#v 由该MOD解锁：Victorian Century#!\n公司已经统治了大半个印度次大陆，不过仍然有一些国家还游离于我们的仁慈治理之外。奉陛下和议会的指令，我们应该征服他们。"
 reform_east_india_lobby: "#v 由该MOD解锁：Victorian Century#!\n次大陆的治理是一桩麻烦事：如果没有合适的制度，我们的统治效率就将极大降低。我们应该彻底的改革现有的经济和政治系统，并通过私有企业对印度各省进行进一步投资。"
 ganges_irrigation_lobby: "#v 由该MOD解锁：Victorian Century#!\n恒河流域的农业条件并不能满足我们种植可靠的经济作物的需求。不过根据一项雄心勃勃的计划，政府将在北印度铺设一套全新且高效的灌溉系统，把曾经干裂贫瘠的土地变成肥沃的新耕地。"
 bombay_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n孟买拥有着印度最优良的港口条件，许多公司也在这里开设总部。通过继续威廉·霍比恩总督的填海工程，我们可以把孟买的不相邻群岛们聚集在一起，最终兴建一座繁荣的大城市。"
 raj_indian_major_railway_lobby: "#v 由该MOD解锁：Victorian Century#!\n印度次大陆充满着价值，不过其面积广大而又地形崎岖，运输不便；若不能有效利用这里，那印度的财富就形同与无物。如果我们能建成一条沟通整个印度次大陆的铁路，它就能为各省之间的运输提供巨大便利。"
 indian_home_rule_lobby: "#v 由该MOD解锁：Victorian Century#!\n本土印度人口的民族意识正在崛起。在英国学校受过教育并为殖民政府工作的本土印度人，开始要求在帝国体制内获得平等地位、更多的经济机会，并最终在全印度建立自治政府。"
 raj_towards_independence_lobby: "#v 由该MOD解锁：Victorian Century#!\n尽管白厅和激进的印度民族主义者暂时达成了妥协，但独立似乎已经是不可避免的未来。我们必须在经过充分的准备后，在保证不列颠利益和名望不受损失的情况下准许他们获得独立。"
 bic_conqueror_all_afk_lobby: "#v 由该MOD解锁：Victorian Century#!\n杜兰尼帝国的合法继承人已经落入了我们的控制。利用他的声望和宣称，只要我们能一举攻占喀布尔，阿富汗的各个部落必定闻风而降。"

 #TUR
 peter_the_great_of_turkey_lobby: "#v 由该MOD解锁：Victorian Century#!\n开创了一个时代的伟大帕迪沙：马哈茂德二世已经患上了疾病，似乎统治时日无多。在最后的时间，他如何延续过去几十年进行的改革，并为继任者奠定基石？"
 tanzimat_main_lobby: "#v 由该MOD解锁：Victorian Century#!\n曾经横跨三洲的奥斯曼帝国衰败了，但她可以再次崛起：在坦齐马特派的维齐尔和帕夏们的帮助下，新任的帕迪沙必须尽快采取行动，实现帝国的现代化与复兴，并在列强之间重振她的威严。"
 ottoman_constitutional_era_lobby: "#v 由该MOD解锁：Victorian Century#!\n在热衷于革命的知识分子与同情他们的政治家和官僚的支持下，立宪主义者正试图通过武装政变控制高门并颁布宪法，在奥斯曼建立责任政府。是宪政的理想将成功，还是独裁将重新回归奥斯曼帝国，抑或是...会出现什么出人意料的变化？"
 baghdad_railway_lobby: "#v 由该MOD解锁：Victorian Century#!\n我们新兴的资本家与工程师们提出了一项宏大的构想：铺设一条从地中海延伸至巴格达，直抵波斯湾的钢铁干线。许多人都相信这个伟大的计划将很好强化高门在伊拉克的统治，并服务于我们在近东的战略利益。"
 ottoman_conquest_lobby: "#v 由该MOD解锁：Victorian Century#!\n帝国的复兴必须是各方面的：如果奥斯曼想要重新站立于世界权力的巅峰，她就必须重新踏上征途——甚至是超越历代伟大征服者的功绩，夺取新的领地！"
 mesopotamia_management_lobby: "#v 由该MOD解锁：Victorian Century#!\n美索不达米亚泛洪平原一直以来就饱受幼发拉底河与底格里斯河洪水的危害。这里完全可以成为潜力巨大的肥沃土地：只要我们采取措施，治理当地的洪水灾害和盐碱地，并恢复被荒废的耕地。"
 istanbul_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n曾经被誉为世界渴望之城与众城之女皇的科斯坦丁尼耶在这个新兴的工业时代业已衰落。作为帝国的首善之都，被法提赫所征服的伟大城市，她必须接受改造，重新成为世界上最富盛名的伟大都会。"
 armenian_massacre_issue_lobby: "#v 由该MOD解锁：Victorian Century#!\n居住在帝国各地的亚美尼亚人长期以来就饱受土耳其人的敌视：而这种情绪正在最近愈演愈烈。如果不及时采取行动，这种敌对情绪就很可能演变为一场恐怖的种族灭绝。"
 great_ottomanism_lobby: "#v 由该MOD解锁：Victorian Century#!\n一种被称为大奥斯曼主义的思想正在官僚与军队之中兴起。其支持者认为，它将能够建立民族团结，从而防止以宗教为基础的米利特制度撕裂帝国。"
 caliph_and_ummah_lobby: "#v 由该MOD解锁：Victorian Century#!\n一场被称作“萨拉菲运动”的伊斯兰原教旨主义运动正在我们的国家兴起。他们希望通过恢复先知穆罕默德及其圣伴的纯正伊斯兰教传统来彻底洗涤现代化给国家造成的流毒。"
 the_unruly_arabs_lobby: "#v 由该MOD解锁：Victorian Century#!\n新兴的民族主义思想正在奥斯曼治下的阿拉伯半岛繁荣发展：在海外接受了西方教育的知识精英，以及本地痛恨奥斯曼统治的穆提夫们，正在同样敌视奥斯曼帝国的其他境外强权的帮助下，联合起来鼓动贝都因民众用武力推翻土耳其政权在阿拉伯的统治。"

