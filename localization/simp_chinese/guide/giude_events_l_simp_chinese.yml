l_simp_chinese:
 #法国指南
 joi_flavor_guide.1.t: "法国日志指南"
 joi_flavor_guide.1.d: "6/15/2025的最近一次法国更新：#V 第二共和国，波拿巴王朝相关日志，国防政府，第三共和国，英法协约等。#!"
 joi_flavor_guide.1.f: "Q：如何游玩波拿巴王朝相关的日志？\nA：在“分裂的君主派”中失败即可进入“第二共和国”日志，在这个日志中随着事件确保君主派的势力大于共和派，满足日志的失败条件即可通过失败事件：“卢比孔行动”加冕拿破仑三世，进入波拿巴王朝。\n\nQ：如何游玩“第三共和国”相关的日志？\nA：在“波拿巴王朝”日志生效期间战败并失去任意本土会触发一个事件，允许你再次建立共和；或者直接在“波拿巴王朝”生效期间制定共和制也可以。"
 joi_flavor_guide.1.a: "谢谢。"
 special_character_god_save_the_queen: "天佑女王"
 special_character_god_save_the_queen_desc: "信仰守卫者，蒙上帝洪恩的大不列颠及爱尔兰联合王国女王陛下。荣耀属于女王，愿她长久统治！"
 special_character_emperor_of_india: "印度皇帝"
 special_character_emperor_of_india_desc: "皇冠上的明珠，德里杜尔巴的印度皇帝陛下，印度次大陆广大领土的主宰。"
 special_character_second_world_conqueror: "世界征服者"
 special_character_second_world_conqueror_desc: "拿破仑皇帝的继承人，完成了皇帝在1815年的梦想，超越了祖先的功绩，以荣耀和鲜血缔造了空前的传奇。"
 special_character_abraham_lincoln_popularity: "伟大的解放者"
 special_character_abraham_lincoln_popularity_desc: "以对自由的坚定态度和非凡的政治才能废除了奴隶制，击败了南方邦联并维护了合众国的统一。"
 special_character_old_marshal: "老元帅"
 special_character_old_marshal_desc: "拿破仑时代所剩无几的传奇人物，亲身经历了大革命以来的战争岁月。在血与火中他脱颖而出，淬炼了敏锐的指挥才能，以及隆厚的名望。"
 special_iron_duke: "铁公爵"
 special_iron_duke_desc: "威灵顿公爵阿瑟韦尔斯利——世界征服者的征服者，欧洲的救世主——他在滑铁卢战役中凭借出色的指挥和巧妙的设计击败了曾经纵横欧陆的拿破仑皇帝，结束了拿破仑战争。这一史诗般的成就为他赢得了空前的爱戴与名望。"
 special_young_officers: "青年军官"
 special_young_officers_desc: "这位军官年轻有为，接受过最专业的军事教育，拥有开创性的新理念，并在军队中担任过重要的参谋和指挥职务。"
 special_chief_of_general_staff: "参谋总长"
 special_chief_of_general_staff_desc: "功勋卓著且对本国军队进行了开创性的改革，并在战争中立下了赫赫功勋。作为总参谋部的首脑，他被敌人称作组织和战术的天才，在本国也备受尊崇。"
 special_bloody_baron: "血腥男爵"
 special_bloody_baron_desc: "自称的成吉思汗的后裔，痴迷于金刚乘佛教，习惯用最残暴和怪异的手段对待敌人和自己的部下。许多崇拜他的鞑靼人将他称为“贝格特瑟”。"
 special_ottoman_fatih: "法提赫"
 special_ottoman_fatih_desc: "一名真正的征服者帕迪沙，两海与两陆的苏丹。他带领军队重现了其祖先——法提赫穆罕默德二世——的辉煌功绩，征服了继君士坦丁堡之后又一座最神圣的城市：罗马。"
 special_prince_governor: "奥斯曼之子"
 special_prince_governor_desc: "一名经验丰富的指挥官和统治者，依据奥斯曼王朝的传统在他的少年与青年时代完成了严苛的军事生涯和总督经历。他从中获得了许多管理政府和指挥军队的经验，同时，他在其曾经指挥的部队和管理的省份中也有着不错的声望和爱戴。"
 special_yellow_flood_leader: "治水英雄"
 special_yellow_flood_leader_desc: "一名饱受爱戴的杰出领袖，以非凡的毅力重现了神话传说中大禹治水的辉煌成就，带领汉民族彻底治理了中国王朝数千年来未曾平定的黄河水患。"
