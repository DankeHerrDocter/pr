 allow_enable_ottoman_public_debt:0 "发行公共债务"
 allow_enable_ottoman_public_debt_desc:0 "高门的财政困境已经持续了一段时间了。为了解决帝国的赤字危机，财政大臣建议我们或许可以试着通过在国际市场发行国债债券来获得资金：不过，如果我们借取了太多债务，这一负担就可能反而加深我们的赤字..."
 allow_enable_ottoman_public_debt_tt:0 "我们将向国际市场发行国债，启用#V $ottoman_public_debt$#![concept_journal_entry]。\n@information!#lore 该日志可以清空我们所有的国内债务，转为外国债务，并向其他国家支付利息。#!"
 #UK
 stabilize_british_empire_lobby: "#v 由该MOD解锁：Victorian Century#!\n大英帝国正处于黄金时代：从北美的平原到中国的茶园，从加勒比的咖啡田到澳大利亚的矿场，不列颠的财富和荣耀正支配着这个时代的一切。不仅如此，她的文明，道德与力量也理应继续闪耀！"
 gbr_corn_law_lobby: "#v 由该MOD解锁：Victorian Century#!\n曾经作为不列颠经济基石的谷物法正面临争议，废除其保护性关税的呼声正在威斯敏斯特高涨。英王陛下政府必须做出抉择。"
 england_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n进步的车轮正在英格兰的土地上蓬勃发展并迅速地改变着整个国家的面貌。我们应该加大一切可以推进产业发展的投资，让那些庞大的厂房得以发出轰鸣，让那些高耸入云的烟囱吞吐健康的烟云。"
 scotland_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n苏格兰拥有着丰富的煤炭储备和优越的港口条件，毫无疑问，这里的经济潜力不容低估。然而，吃水过浅的克莱德河与崎岖的山谷却构成了阻碍经济发展的障碍：我们当然不能向环境服输，我们将用工业的伟力改造自然，让苏格兰成为世界上最伟大的造船业与制造业中心！"
 rn_naval_defence_act_lobby: "#v 由该MOD解锁：Victorian Century#!\n规模庞大的海军是使不列颠赖以生存的海上航线维持安全和自由的关键。无论面对任何敌人的海上挑战，不列颠尼亚都必须迎难而上，确保皇家海军不容置疑的海上霸权。"
 english_afternoon_tea_lobby: "#v 由该MOD解锁：Victorian Century#!\n一壶浓郁的阿萨姆红茶，里面倒一些牛奶，再配上涂着奶油果酱的司康饼！这样一段在精致的茶室里度过的美好时光——当然就是最优雅的绅士习俗——自然应该成为全世界最流行的英式风尚！"
 anglo_american_special_relationship_lobby: "#v 由该MOD解锁：Victorian Century#!\n非凡的思想与目标促进了我们之间的团结，共同的理想和血脉促进了我们之间的友谊。团结的自由国家永远不会失败，血浓于水！"
 chartism_movement_lobby: "#v 由该MOD解锁：Victorian Century#!\n人民宪章的传播引发了一场席卷全国的激进运动，抗议者呼吁通过普选来行使他们的政治权利。这场运动已经威胁到了议会的权威，政府应该考虑采取措施。"
 railway_mania_lobby: "#v 由该MOD解锁：Victorian Century#!\n随着制造业的再次复苏和利率的下调，铁路公司们的股价正在飙升，从工业化中富裕起来的人们纷纷将存款投入到这场一本万利的英镑狂欢中。很明显，这是一种万无一失的投资...应该吧？"
 poor_law_act_lobby: "#v 由该MOD解锁：Victorian Century#!\n1834年的济贫法修正案在马尔萨斯主义者们的大力推动下获得了通过，却遭遇了大规模的社会抗议。或许它确实成功遏制了懒汉们的懒惰与依赖，但这些监狱般的收容所真的是适合不列颠公民们的救济之处吗？"
 joi_imperial_fortress_lobby: "#v 由该MOD解锁：Victorian Century#!\n随着威力强大的远洋战舰与火炮的发展，对一些关键战略节点的防御工事与军事设施进行升级正在变得必要：这些地方足以被称为我们全球帝国的中枢，必须严加防守。"
 #FRA
 paris_politic_lobby: "#v 由该MOD解锁：Victorian Century#!\n巴黎是法兰西政治的中心，不过她一直以来就以混乱和不受束缚闻名。如果现任政府想要坐稳统治国家的宝座，那首要的任务就是驯服巴黎这些可恶的无套裤汉！"
 paris_industrialize_lobby: "#v 由该MOD解锁：Victorian Century#!\n工业化正在改变我们的国家，曾经的巴黎老城区如今也已经变得不再那么可靠了。法兰西需要一座更辉煌，更伟大的巴黎矗立在塞纳河畔。"
 french_birthrate_lobby: "#v 由该MOD解锁：Victorian Century#!\n自拿破仑战争结束以后法兰西的生育率就节节下降，这种趋势正在危害整个民族。政府有义务倾听人民的需要，让社会重新走上正轨。"
 fra_aferican_empire_lobby: "#v 由该MOD解锁：Victorian Century#!\n在完成对阿尔及尔的征服后，整个黑暗大陆的大门已经对着法兰西敞开了怀抱。我们将要成为非洲最强大的势力，在这里为法兰西民族建立新的家园。"
 fra_conqueror_indochina_lobby: "#v 由该MOD解锁：Victorian Century#!\n天主的号令要求我们进军遥远的印度支那，拯救我们的同胞并惩罚那里野蛮人对主的羔羊们做出的暴行。前进，向印度支那进发！"
 russian_franco_alliance_lobby: "#v 由该MOD解锁：Victorian Century#!\n尽管我们两个国家之间曾经有过许多不愉快的过往，不过随着欧陆局势的巨大变化，我们应该消除过去的宿怨，并共同面对中欧的敌人。"
 entente_cordiale_lobby: "#v 由该MOD解锁：Victorian Century#!\n海峡两岸的我们曾经敌对了数百年，然而地缘局势的改变迫使我们双方都需要重新评估在欧陆的布局。或许考虑和海峡对面的狡猾青蛙结盟是不错的选择？"
 je_the_paris_commune_display_lobby: "#v 由该MOD解锁：Victorian Century#!\n红色的势力在巴黎崛起，首都的一切机构都已经被迫迁徙到了凡尔赛。共产主义者的野心会成真吗？"
