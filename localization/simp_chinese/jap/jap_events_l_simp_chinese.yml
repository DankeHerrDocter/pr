l_simp_chinese:
 #
 joi_flavor_jap.1.t: "[ROOT.Var('emperor_var').GetCharacter.GetFirstName]维新"
 joi_flavor_jap.1.d: "[GetLawType('law_bakufu').GetName]已经丧失了权力，王政已经归复于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName]。这一重大时刻标志着几个世纪以来武家在#v $JAP$#!统治的终结，同时也开启了一个现代化与革新的新纪元。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]必须谨慎地选择自己的政治盟友。"
 joi_flavor_jap.1.f: "前征夷大将军带着尊敬与羞愧向天皇行礼，将自己的住所及权力宝座——雄伟的江户城堡——交给了重新掌权的天皇。改造工作马上就要开始；一座辉煌的皇宫将取代这座老城堡。尽管外观将与京都的前皇居大同小异，但天皇计划将日本丰富的装饰传统与陌生的西方时尚结合起来。或许这就是对日本未来的一种隐喻。"
 joi_flavor_jap.1.a: "谨慎点总是没错的。"
 joi_flavor_jap.1.b: "改革的步伐必须大跨步的前进！"
 joi_flavor_jap.1.c: "维新派们将使整个国家都将焕然一新！"
 #
 joi_flavor_jap.2.t: "公武合体"
 joi_flavor_jap.2.d: "随着倒幕派的失势，德川[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的征夷大将军[ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]联合全国的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]们平定了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]内的叛乱，控制了天皇的御所，重新巩固了自己的权力。"
 joi_flavor_jap.2.f: "“我本以为他会在大坂之战中一骑绝尘，立下惊世骇俗的战功。然而，他却意外地迟到了，甚至连敌军的旗帜都没见过。这都是因为他的懒惰。即使是父子之间，也存在着一些猜疑。更让我怀疑将军究竟在想什么。”\n\n“即使将军走了，你也不能一刻忘记武道。你必须永远守护这片土地，你对天皇的侍奉，终生不得改变。”"
 joi_flavor_jap.2.a: "就像过去数百年一样，公家和武家将继续掌握大权。"
 joi_flavor_jap.2.b: "必须彻底消灭这些维新派！"
 #
 joi_flavor_jap.3.t: "安政五国条约"
 joi_flavor_jap.3.d: "以[SCOPE.sCountry('GBR_scope').GetName]，[SCOPE.sCountry('FRA_scope').GetName]，[SCOPE.sCountry('NET_scope').GetName]和[SCOPE.sCountry('RUS_scope').GetName]为首的洋人舰队在昨天到达了京都附近的港口，并迫使天皇批准了一系列规定了洋人贸易特权的条约。"
 joi_flavor_jap.3.f: "“长崎港和箱田港应向各国船舶开放，以便进行维修，并获得淡水、粮食和船舶使用所需的任何其他物资；只有因天气原因遇险或无法控制的船只，才允许在未经[ROOT.GetCountry.GetName]政府许可的情况下进入上述条款未指定的其他港口。”\n\n“停泊于[ROOT.GetCountry.GetName]港口的各国船舶应遵守日本法律；如高级军官或舰长违反任何此类法律，将导致港口关闭。如属下级军官或舰长违反此类法律，则应移交其舰长处罚。”\n\n“在日本的港口中，无论是现在开放的，还是今后可能开放的，对于任何外国的船只或臣民，各国船只和臣民都有权进入，并享有荷兰和中国因与日本现有关系而获得的平等利益。”"
 joi_flavor_jap.3.a: "这次开国将会成为[ROOT.GetCountry.GetName]政策的重大转折！"
 #
 joi_flavor_jap.4.t: "西方学问？"
 joi_flavor_jap.4.d: "随着兰学带动的西方技术的传入，兰学运动也日益深入地参与[ROOT.GetCountry.GetName]国内和对外政策的政治辩论。许多兰学的支持者认为，仿西方文化非但不会损害日本，反而会增强日本的实力，然而这一观点饱受以[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]为首的势力的反对。"
 joi_flavor_jap.4.f: "经过国家的开放和西洋学问的不断传入，兰学已经得到了巨大的扩充和弥补：荷兰书籍的禁令被解除，数万本这样的书籍被出版、印刷和流通，大量外国雇员来到[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]等城市传播和任教，欧罗巴各国所发明的先进技术逐渐在[ROOT.GetCountry.GetName]得到了普及。蒸汽机和轮船被我们的工匠效法西洋的做法制造出来，许多外国公使都称赞，认为日本的技术已经能够比肩许多世界上最为先进的国家。"
 joi_flavor_jap.4.a: "敞开国门，我们必须彻底实现西化！"
 joi_flavor_jap.4.b: "奇技淫巧不可持续，维持我国的传统文化更加重要。"
 #
 joi_flavor_jap.5.t: "天保大改革"
 joi_flavor_jap.5.d: "蔓延连续了近十年的大饥荒结束了，然而，饥荒留下的遗产仍然深深的影响着[ROOT.GetCountry.GetName]。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]不得不引咎辞职，而新任的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]则希望能够在全国范围内推动一场经济体制的改革来使国家回归到享保和宽政改革后的繁荣时代，并确保这种规模的饥荒不再会重演。"
 joi_flavor_jap.5.f: "“有人说，一个国家如果没有九年的积蓄，那就是不够的；如果没有六年的积蓄，那就是急躁的；如果没有三年的积蓄，那就不是一个好的国家；年号易迁廉而久，但高尚正直的各色人等如今却令人烦恼。”"
 joi_flavor_jap.5.a: "没有必要采取额外措施，这场饥荒只是一场意外。"
 joi_flavor_jap.5.b: "必须施行改革，防止这种灾难的重演。"
 #
 joi_flavor_jap.6.t: "尊王攘夷"
 joi_flavor_jap.6.d: "随着[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]统治在近期所遭遇的连续失败和饥荒，一种反对幕府，尊崇天皇，并把[ROOT.GetCountry.GetName]的失败归结于外夷入侵的思潮开始在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]和其周边地区扩散，并变得广受欢迎。"
 joi_flavor_jap.6.f: "“世世代代不间断的皇室神代延续了两百万年：这是因为皇室血统一旦确立，便会一代一代地传承下去；从创世到第一位的人类皇帝的出现，大约过了两百万年，而距离第一位神武天皇的出现，又过了两千三百年，但皇室血统从未改变过。”"
 joi_flavor_jap.6.a: "幕府大将军才是得到天皇陛下授权的真正执政者。"
 joi_flavor_jap.6.b: "驱逐蛮夷，天皇万岁！"
 #
 joi_flavor_jap.7.t: "水户浪人刺杀"
 joi_flavor_jap.7.d: "许多反对[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的忠于天皇的浪人武士由于对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]政策的强烈不满，秘密组织了一场针对幕府忠实支持者，大臣[SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] [SCOPE.sCharacter('shogunate_ig_minister').GetLastName]的刺杀，大臣本人遭受重伤，刺客则被逮捕。"
 joi_flavor_jap.7.f: "“[SCOPE.sCharacter('shogunate_ig_minister').GetFirstName] [SCOPE.sCharacter('shogunate_ig_minister').GetLastName]遇刺后就病倒了，挣扎了一段时间，然后迅速提交了继承表，表被接受，随后因病去世。”\n\n“好鸭子不是用网捕的，而是用轿子捕的；病人节俭到不需要枕头，病人用屁股写遗嘱...将军下令用人参斩首，武士为德川的肉之怨而复仇。”"
 joi_flavor_jap.7.a: "倒霉的大臣，这帮刺客下手也太不利索了。"
 joi_flavor_jap.7.b: "采取断然措施处决这些反对大将军的逆贼！"
 #
 joi_flavor_jap.8.t: "攘夷亲征"
 joi_flavor_jap.8.d: "随着攘夷派运动的兴起，天皇决定越过[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]通过#V 秘密的尊王派组织“天诛组”#!秘密向长崎的藩主发布诏书，要求他带领武士负责驱逐[ROOT.GetCountry.GetName]的蛮夷并入京主持幕府的改革。"
 joi_flavor_jap.8.f: "“近日，朝廷签订了条约，使节已调往[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，委任状的细节也转交给了前来[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的部下。在这重要的御赐仪式签订之后，我对各位表示，这与将军阁下及其家臣的意愿不符，应各位的要求，恳请各位给予答复。正像各位所说，你们将担任官员，暂时受国家所托，你们将如何如此深陷于自我谴责之中？”\n\n“藩国的人犯了某种罪行。世事难料，幕府全体成员目前正处于外敌强行入境的艰难时期；加之其他诸侯纷纷在总会上表态，全体民军团结一致，为长治久安而努力：他是国家家室的重要候选人，家族、藩士、各世代的全体成员都一致同意这一决定。”"
 joi_flavor_jap.8.a: "天皇陛下的旨意应该令全国知晓。"
 joi_flavor_jap.8.b: "必须派兵镇压反对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的势力。"
 #
 joi_flavor_jap.9.t: "[ROOT.GetCountry.GetRuler.GetFirstName]大狱"
 joi_flavor_jap.9.d: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]开始对倒幕派势力的增长感到不安，并下达指示，要求武士和朝臣开始一场对[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]内尊王派的支持者展开一场清洗。"
 joi_flavor_jap.9.f: "“于是迅疾鲁莽的人王说道：“既然如此，我就辞别天皇而去。”他随即升天，山河大震，国土摇撼。天皇闻声大惊，说道：“我兄尊贵的到来，必定不怀好意，他只不过是想夺取我的土地而已。”\n\n“当他向天照大威德神祈求，赐给他一串八尺长的、五百颗完整的、缠绕在左侧发束上的威严宝石时，从雾气中诞生的神的威严名字，当他在天上的真池井中挥舞和清洗宝石时，这个赐物发出叮当的声响。”"
 joi_flavor_jap.9.a: "这些人都是义士，应该放他们一马。"
 joi_flavor_jap.9.b: "必须镇压这些反对朝廷的逆贼！"
 #
 joi_flavor_jap.10.t: "[SCOPE.sCountry('western_merchantship_country').GetName]商船到访"
 joi_flavor_jap.10.d: "近日，数艘来自于[SCOPE.sCountry('western_merchantship_country').GetName]的商船队抵达了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]附近的港口，并向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]申请要求停靠在我国的海岸上进行补给。船长还拿出了由他们国家的一名海军提督：[SCOPE.sCharacter('western_army_merchant_leader').GetFirstName] [SCOPE.sCharacter('western_army_merchant_leader').GetLastName]代表政府颁发的商业许可证要求我国帮助。"
 joi_flavor_jap.10.f: "“今后，[ROOT.GetCountry.GetName]将修复失事的[SCOPE.sCountry('western_merchantship_country').GetName]船只，并为物资短缺的船只提供柴火、水和食物；如有煤炭，将移交给该船只，并以黄金、白银和其他金融工具进行交易。如果黄金和白银短缺，则将以货物进行交易。”\n\n“[SCOPE.sCountry('western_merchantship_country').GetName]和[ROOT.GetCountry.GetName]都将为遇难船只和遇难者提供相互援助，并将他们送往接收港口；虽然在逗留期间将获得宽容的等待，但他们仍需遵守各自国家的正确法律。”"
 joi_flavor_jap.10.a: "放开海岸允许他们的商船停靠，我们不能得罪[SCOPE.sCountry('western_merchantship_country').GetName]。"
 joi_flavor_jap.10.b: "赶走这些讨厌的[SCOPE.sCountry('western_merchantship_country').GetName]蛮夷！"
 #
 joi_flavor_jap.11.t: "荷兰报告"
 joi_flavor_jap.11.d: "[SCOPE.sCountry('NET_scope').GetName]的访问使团抵达了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，并根据第八代[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]德川吉宗阁下以来的传统，向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]呈上了今年用于记录外国事宜的报告书。"
 joi_flavor_jap.11.f: "“萨达尼先生不得不坐下来嘲笑我们提出的问题，显然他的目的是嘲笑我们，但他只是耳朵里有跳蚤，就闭上了嘴，不再做那些最恶毒的鬼脸。”\n\n“虽然细节上存在一些瑕疵，但我对那些能够在没有看到实际机器的情况下，仅依靠简单的图纸就建造出这些机器的人的天才表示敬意。”"
 joi_flavor_jap.11.a: "这份情报有利于帮助维持[ROOT.GetCountry.GetName]的孤立。"
 joi_flavor_jap.11.b: "我们必须对外国发生的事有更深的了解。"
 #
 joi_flavor_jap.12.t: "鼓吹兰学"
 joi_flavor_jap.12.d: "随着新的技术开始传入[ROOT.GetCountry.GetName]，许多兰学者开始在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]鼓吹这种新技术的优越性，并传入了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]的耳中。"
 joi_flavor_jap.12.f: "“这个由西洋人制作的最新物品，给人一种茫然、迷失的感觉，就像一个人在经历了一场不眠不休的跨太平洋飞行后，正在经历时差反应：这件物品肯定遗漏了一些东西，比如它的灵魂。”"
 joi_flavor_jap.12.a: "封禁这些奇技淫巧！"
 joi_flavor_jap.12.b: "鼓励兰学的进一步传播。"
 #
 joi_flavor_jap.13.t: "维新志士"
 joi_flavor_jap.13.d: "随着维新的蓬勃发展，一批被称为#V “维新志士”#!的维新派运动家，贵族和平民开始在[ROOT.GetCountry.GetName]的政坛中涌现，并受到了民间和维新派人士的广泛支持。"
 joi_flavor_jap.13.f: "“王政复古...必须气魄宏大，规模宏大，所以在制定官制时，应当以神武帝所立之本，以天下统一为目标，以复辟万物为标准。”\n\n“若想为国立功，我们必须先放下过去的恩怨和个人恩怨。现在，正是以[SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName]为首，奋起反抗的时候。”"
 joi_flavor_jap.13.a: "他们在扰乱社会的秩序。"
 joi_flavor_jap.13.b: "周虽旧国，其命维新！"
 #
 joi_flavor_jap.14.t: "宪章誓言"
 joi_flavor_jap.14.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和维新政府的主持下，[SCOPE.sCharacter('industrialists_ig_leader').GetFirstName] [SCOPE.sCharacter('industrialists_ig_leader').GetLastName]起草了一则关于维新和王政复古的大政方针，并由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]向全国宣读。"
 joi_flavor_jap.14.f: "“新政府应广泛召开会议，凡事皆由众人共同商议决定；上司与部下应同心协力，积极推进各项工作。”\n\n“新政府自官僚至武官乃至庶民，各人应能实现其愿望，务使人民不抱怨、不失望。”\n\n“新政府应摒弃陈旧陋习，依据普遍的道理行事；应从世界各地广泛吸取知识，使我国得以大幅发展，并应对[ROOT.GetCountry.GetName]现有前所未有之大变革。”"
 joi_flavor_jap.14.a: "“我愿向天下诸侯宣誓，使天下人民知道我所去之处，并让诸侯为其行为负责。”"
 #
 joi_flavor_jap.15.t: "禁断令"
 joi_flavor_jap.15.d: "随着维新的发展，[ROOT.GetCountry.GetName]正逐渐变为一个文明开化的国家。然而，在我国的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]阶层中，#V 佩刀和丁髪#!仍然被标榜为传统的象征。许多西化派的官员认为，应该#B 剥夺他们的佩刀特权，明令禁止丁髪，并要求他们改为西洋式的头发。#!"
 joi_flavor_jap.15.f: "“剪发、穿制服、穿便服，均可依个人意愿决定；但在穿礼服的场合，可以佩刀。”\n\n“自今以后，除了在穿着大礼服，以及军人、警察等依法制服之场合外，一律禁止佩刀，特此公告。”\n\n“凡有违反者，其刀具将被没收。”"
 joi_flavor_jap.15.a: "这是他们身份的象征，政府不宜剥夺。"
 joi_flavor_jap.15.b: "发布法令，禁止佩刀和丁髪。"
 #
 joi_flavor_jap.16.t: "血税暴动"
 joi_flavor_jap.16.d: "由于[ROOT.GetCountry.GetName]普遍的对征兵制度的反对情绪，许多恐怖化征兵的谣言开始在民间传播，导致恐慌的[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]们开始在各地兴起反对征兵的暴动；他们称征兵制度是“从平民的身体上吸血”。"
 joi_flavor_jap.16.f: "“从[TimeKeeper.GetCurrentDate.Format('y年')]春天开始，这里就流传着一个谣言，说朝廷被洋人欺骗了，现在人民完全听天由命：为了消灭日本民族，他们要放血杀死18到20岁的男性，让他们变得虚弱，然后把15岁以上的女性送到国外。在奥久郡，已经有很多人被放血了。”\n\n“他们会把所有壮年聚集在一个叫做“军校”的地方，然后立起一面旗子标记地点，然后西洋人会过来把所有孩子一次性勒死，并吸干他们的血。”"
 joi_flavor_jap.16.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和政府需要出面澄清这些谣言并安抚人民。"
 joi_flavor_jap.16.b: "到底是谁在散播这些扯淡的恐慌？统统抓起来枪毙！"
 #
 joi_flavor_jap.17.t: "最后的武士"
 joi_flavor_jap.17.d: "曾经统治[ROOT.GetCountry.GetName]的武士阶层随着现代化的进程而逐渐烟消云散，那些传统的武士道精神也不再被人们尊崇和谈论，残余的武士浪人们也变得销声匿迹，不复幕府时代的繁荣。"
 joi_flavor_jap.17.f: "“我来到祖先的故乡，去体会每一次呼吸、每一杯茶、以及我们夺走的每一个生命中蕴含的敬畏，这就是武士之道。天皇听不见我的话，但他的军队会来的——九百年来，我的祖先一直保护着我们的人民。现在...我辜负了他们。”\n\n“所以你要自杀？因为武士之道已经没有必要了？”\n\n“完美的花朵是稀有之物：你可以用一生去寻找一朵，这也不会白白浪费生命。而我，我将死于刀下。”"
 joi_flavor_jap.17.a: "必须强调文官统治的必要性。"
 joi_flavor_jap.17.b: "武士道的精神将会长存。"
 #
 joi_flavor_jap.18.t: "[ROOT.GetCountry.GetRuler.GetFirstName]宪法"
 joi_flavor_jap.18.d: "在经过漫长的改革后[ROOT.GetCountry.GetName]已经成为了一个现代化的全新国家，所有方面都向世界上最先进和开化的国家看齐。一部现代化的宪法出台，明确为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]陛下的政府和议会以及日本公民赋予，限定了权利和自由。"
 joi_flavor_jap.18.f: "“[ROOT.GetCountry.GetName]由万世一系之[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]统治之，皇位依皇室典范规定，由[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]之男子孙继承之；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]为国之元首，总揽统治权，依本宪法条规行使权力。”\n\n“[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]以帝国议会之协赞，行使立法权；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]召集帝国议会，命其开会，闭会，停会，及众议院之解散；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]为保持公共之安全或避免公共之灾厄，因紧急之必要，在帝国议会闭会期内，发布可代法律之敕令。”\n\n“凡为日本臣民按照法律命令所定之资格，均得充任文武官吏及就其他公务；遵从法律所定，有服兵役，纳税之义务；在法律范围内有居住及迁徙之自由，非依法律，不得逮捕，拘禁，审问，处罚；且不得夺其应受法律所定法官审判之权。”"
 joi_flavor_jap.18.a: "宪法必须强调[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的神圣性。"
 joi_flavor_jap.18.b: "宪法应该更具有功利性。"
 joi_flavor_jap.18.c: "宪政高于一切！"
 #
 joi_flavor_jap.19.t: "前景黯淡的维新"
 joi_flavor_jap.19.d: "改革，西化与维新的努力最终随着时间的流逝而遭遇了[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]强硬的抵抗并最终失败。那些最杰出和有影响力的维新派逐渐逝去，他们的事业也不再有人热衷。江户时代的旧秩序似乎正在重归[ROOT.GetCountry.GetName]。"
 joi_flavor_jap.19.f: "最初，那些呼喊“#B 脱亚入欧#!”和“#B 富国强兵#!”的人们曾在黑船来航之后掀起一场撼动国体的改革，然而改革者如今却在[concept_government]中节节败退，铁路、工厂、学校的建设也被迫放缓，甚至开始停滞；西洋的宪法、议会与军制，在我们的土地上仍如水上浮萍，找不到扎根之地。 \n\n曾几何时，我们以为可以像西洋诸国那样以热血改造国民，如德意志国那样以纪律训练军队；如今却只能眼睁睁看着邻国的铁甲舰驶入东海，而我们连一条完整的铁路都难以建成。维新的前景黯淡，似乎已经确定了失败。"
 joi_flavor_jap.19.a: "来自幕府一群伙伴..."
 #
 joi_flavor_jap.20.t: "华族令"
 joi_flavor_jap.20.d: "随着[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]的维新政府彻底掌握了权力和制度化爵位法令#V “华族令”#!的颁发，统治了数百年的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]和朝廷公卿最终退出了[ROOT.GetCountry.GetName]的政治核心；然而，在关于是否保留部分他们的政治特权的问题上，维新派们仍然处于争论之中。"
 joi_flavor_jap.20.f: "“任何拥有头衔的人都被视为华族成员，应享受与其同胞华族互惠的待遇；有爵位之寡妇，于其尚在户中时，应享有其原有之爵位。其成为户主或尚在户中而无爵位继承人时，于其尚在 户中时，应享有其原有之爵位。”\n\n“可以继承爵位的继承者应为其合法继承人及其长子，若没有合法继承人，则由其私生子继承爵位；被推选为爵位继承人的人，或者其法定代理人，必须经宫廷大臣核准继承。”\n\n“有下列情形之一的，应当停止其权利和待遇：那些无法维护华族尊严的人，与罪行深重，违背宫中大臣，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]命令和家规的人。”"
 joi_flavor_jap.20.a: "政府必须对华族施加更严密的约束。"
 joi_flavor_jap.20.b: "准许华族保留他们的政治权力。"
 #
 joi_flavor_jap.21.t: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]陷落"
 joi_flavor_jap.21.d: "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]内兴起的叛乱在得到了城内叛军的支持后迅速攻陷了议会和政府所在地，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]不得不颁布旨意，重新将权力赋予幕府大将军。"
 joi_flavor_jap.21.f: "“逆贼利用[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]长权和藩兵力，杀伤忠良，无视[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的命令，最后还曲解了先[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的诏书，毫无悔意，也不反省自己给人民带来的苦难；如果这种罪行发展到极点，[ROOT.GetCountry.GetName]很快就会灭亡。”\n\n“如果朕现在不做人民的父母，驱逐这些叛逆的臣子，又如何能上谢罪先[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的英灵，下报百姓的深仇大恨呢？这就是我悲愤的原因。按理说，我应该悼念先[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，谨言慎行，但这种悲愤却止不住：将军务必悉知吾意，诛杀逆贼，立下力挽狂澜的大功，还民以安宁。此乃吾愿，务必遵行此诏，切勿迟疑懈怠。”"
 joi_flavor_jap.21.a: "这不是结束，而是新的开始。"
 #
 joi_flavor_jap.22.t: "幕府军队北上"
 joi_flavor_jap.22.d: "昨天，一支忠于[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的军队出兵已经离开大阪，直逼京都；然而根据他们发布的缴文，这似乎只是一场藩主之间的内部争斗，朝廷究竟是否应该介入这场战斗？"
 joi_flavor_jap.22.f: "“臣[SCOPE.sCharacter('landowners_ig_leader').GetLastName]观上月九日以来所发生之事，悉非朝廷真意，皆为世所共知之松平首里大府奸臣谋害之所致；尤其江户、长崎、能州、相模等地之动乱盗窃，皆为其家臣所唆使，宴请各地民众，为天下之乱，如附函所示，为人神所憎恶。故恳请上谕，交出上述奸臣，若不允，臣将不得不处死。”"
 joi_flavor_jap.22.a: "按兵不动暂时观望局势。"
 joi_flavor_jap.22.b: "朝廷必须立刻介入战斗。"
 #
 joi_flavor_jap.23.t: "局中法度"
 joi_flavor_jap.23.d: "随着[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]成为[ROOT.GetCountry.GetName]的政治中心，来自各藩的尊王政义和幕府志士都聚集于此。在[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的支持下，许多秘密的浪人组织被成立，其中最闻名的就是在平定甲州中功勋卓著的#V 新选组#!。"
 joi_flavor_jap.23.f: "“不得做出背离武士道的行为，不得擅自退出新选组，不得擅自借贷。”\n\n“不得擅自卷入诉讼，不得进行私斗；凡违背上述各项者，将被命令切腹谢罪。”"
 joi_flavor_jap.23.a: "支持新选组。"
 joi_flavor_jap.23.b: "他们必须解散！"
 #
 joi_flavor_jap.24.t: "江户开城"
 joi_flavor_jap.24.d: "战局对[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的军队越发不利，江户城内的幕府官员已经开始对朝廷军队的进军感到恐惧，并面见[SCOPE.sCharacter('intelligentsia_ig_leader').GetLastName]，表示愿意献出江户并投降，"
 joi_flavor_jap.24.f: "前征夷大将军带着尊敬与羞愧向[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]行礼，将自己的住所及权力宝座——雄伟的江户城堡——交给了重新掌权的[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]。改造工作马上就要开始；一座辉煌的皇宫将取代这座老城堡；尽管外观将与京都的前皇居大同小异，但[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]计划将日本丰富的装饰传统与陌生的西方时尚结合起来。或许这就是对[ROOT.GetCountry.GetName]未来的一种隐喻。"
 joi_flavor_jap.24.a: "这明显是幕府的空城计。"
 joi_flavor_jap.24.b: "胜利属于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下！"
 #
 joi_flavor_jap.25.t: "列藩同盟"
 joi_flavor_jap.25.d: "随着幕府军的连续战败，东北的藩主们开始对自己的地位感到惶恐。他们结成了一个防御同盟，并向[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]朝廷提出请愿，宣称愿意服从新政府的管辖，但希望[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下免除他们的一切罪过。"
 joi_flavor_jap.25.f: "“如果[SCOPE.sCharacter('devout_ig_leader').GetFirstName] [SCOPE.sCharacter('devout_ig_leader').GetLastName]真心悔罪，愿意接受惩罚，并向幕府寻求宽恕，可能会给予宽大处理。”\n\n“会津藩一直在向仙台藩和北藩斡旋，并希望以此为基础向抚慰大臣递交请愿书，因此想听取各藩的意见；如果没有异议，他们希望立即递交请愿书，并着手斡旋请愿。”"
 joi_flavor_jap.25.a: "我想我们之间可以谈谈。"
 joi_flavor_jap.25.b: "出兵征讨这些叛徒！"
 #
 joi_flavor_jap.26.t: "标准语"
 joi_flavor_jap.26.d: "维新政府希望以官方标准的形式像西洋诸国那样在全[ROOT.GetCountry.GetName]范围内确定一个标准语，以便于施行接下来正准备推行的教育改革。然而，关于哪个语言应该成为标准语却并没有达成共识，来自于关东和关西的官员们似乎都希望自己的家乡语言成为新[ROOT.GetCountry.GetNameNoFlag]的标准语。"
 joi_flavor_jap.26.f: "#V 东京#!为新都，其#B 武家语音#!严整质朴，维新官员多出身此地，主张以其为准；而#V 京都大阪#!诸地，则自古为皇都与商贾之地，其#B 上方语音#!优雅悠长、富于辞藻，早已在剧场、诗歌与学术中根深蒂固，得众多世家支持：[ROOT.GetCountry.GetName]应当以何种方言，作为标准语传播于全国？"
 joi_flavor_jap.26.a: "关西方言将成为标准语。"
 joi_flavor_jap.26.b: "关东方言将成为标准语。"
 #
 joi_flavor_jap.27.t: "鹿鸣馆外交"
 joi_flavor_jap.27.d: "随着我国开始被世界各国广泛认为是一个先进而文明的国家，在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的提议下，一座被设计用于和各国使节外交的建筑物在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]被建成，并根据#B 诗经·小雅中“呦呦鹿鸣”的典故#!而命名为#V “鹿鸣馆”#!。"
 joi_flavor_jap.27.f: "“[ROOT.GetCountry.GetName]国旗中央的红色圆盘将不再像一块覆盖着密封帝国的薄饼，而是从此成为它本来的样子：成为冉冉升起的太阳的高贵象征，在世界开明的国家中不断前进、向上。”\n\n“那将会成为[ROOT.GetCountry.GetRuler.GetFirstName]时代的美好回忆，我认为这将会是[ROOT.GetCountry.GetRuler.GetFirstName]时代的人留给下一代人的一份美好的礼物。”"
 joi_flavor_jap.27.a: "这座建筑可以帮助我们宣示自身在亚洲的地位。"
 joi_flavor_jap.27.b: "这座建筑应该被用来与西方的强国们建立外交。"
 joi_flavor_jap.27.c: "这里应该成为华族们聚会的场所。"
 #
 joi_flavor_jap.28.t: "[ROOT.GetCountry.GetName]参谋本部"
 joi_flavor_jap.28.d: "随着[ROOT.GetCountry.GetName]军队的扩张的现代化，陈旧的指挥系统已经不再适应新的军事需求。在[SCOPE.sCharacter('armed_forces_ig_leader').GetFirstName] [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]的提议下，一个效法普鲁士总参谋部的日本参谋本部被设立了起来。然而，在我国军事建设未来的前景上，陆海军的将领们却爆发了严重的分歧。"
 joi_flavor_jap.28.f: "“是与国家治理相关的事，我都向[SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]请教。我什么都告诉他；现在与闭关锁国、驱逐外国人的时代不同，所以我们需要让他与那些有远见卓识、能够预见百年后事的人一起工作，[SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]就是这样的人。他拥有坚定的洞察力，并且能够将其付诸实践。我的所有政策都会征求他的意见。我会和他交谈。我完全信任他，并与他分享我的秘密。”\n\n“当人们晋升并变得更加稳固时，他们自然不会去打理自己的事务。他们会对下属发号施令，自己则无所事事，但[SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]从来不是那样。这不仅在当时如此，而且似乎在他的一生中一直如此。”"
 joi_flavor_jap.28.a: "陆军需要得到最多的经费。"
 joi_flavor_jap.28.b: "必须以海军的需求为优先。"
 #
 joi_flavor_jap.29.t: "版籍奉还"
 joi_flavor_jap.29.d: "随着行政体系的进一步改革，维持旧的幕藩体制已不合适。在南方许多藩主的请愿下，曾经被各地大名所统治的土地和户籍被归还给了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]朝廷，并对这些领土施行直辖。"
 joi_flavor_jap.29.f: "“诸藩归还版籍的请愿天皇已经知晓，此等深明大义之举已经深深地印证了尔等的忠诚和智慧。因而普天之下，莫非王土；率土之滨，莫非王臣；故而诸侯自不得私占土地人民。天皇亦然不会亏待诸位赤诚的忠臣，因而诏令朝廷酌情处理，该给的给予，该取的收回。”"
 joi_flavor_jap.29.a: "行政体制需要得到完全改组。"
 joi_flavor_jap.29.b: "准许保留部分大名的特权。"
 #
 joi_flavor_jap.30.t: "秩禄处分"
 joi_flavor_jap.30.d: "随着新政府的就任和统治的稳固，旧公卿们已经事实上退出了朝廷之中。然而，他们名义上却仍然保留着许多靡费巨大的职务，使得旧公卿们能够整日无所事事而从政府领取巨额的补贴。[SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName]和许多维新政府的官员们都开始对此感到愤怒，并劝说[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，停止对这些公卿秩禄的支付。"
 joi_flavor_jap.30.f: "“包括前大名在内的所有[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]，都应当获得面值为5至14年俸禄减去家俸税后的金禄债券，并须在30年内偿还本金；在五年冻结期后，每年通过抽签选出债券的受益人，政府收回债券并支付面值偿还。根据俸禄的数额，利率分别为5%、6%、7%和10%。俸禄越高，条件越差，俸禄越低，条件越优厚。”\n\n“如果那些携带金银来兑换的人能够迅速铸造并作为流通货币交付，那么人们就能延续他们的旧习俗，而现在被视为珍宝的旧金银，在短短几年内就能与金银等同起来。如果真是这样，那么重要的是让它们尽快开始交易和流通，确保货币的真正价值不被丢失。”"
 joi_flavor_jap.30.a: "打个白条意思意思得了。"
 joi_flavor_jap.30.b: "欠缺的俸禄将会以国债的形式发放给前公卿藩主们。"
 #
 joi_flavor_jap.31.t: "新时代的[ROOT.GetCountry.GetRuler.GetLastName]幕府"
 joi_flavor_jap.31.d: "随着[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName] [ROOT.GetCountry.GetRuler.GetLastName]领导下[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]新政的成功，[ROOT.GetCountry.GetName]逐渐实现了技术上的现代化，并开始被认为能够与世界各大列强所媲美。"
 joi_flavor_jap.31.f: "“请君大喜，说道：“我生儿育女，终于得了三个杰出的孩子。”说罢，他便叮当作响地取下并摇晃着项链上的珠串，将它赠予天照大神，说道：“请君主统治高天原。” 他便将项链赠予了她，这条项链的名字是仓架神；接下来，他对月夜神说道：“请君主统治夜之国度。” 他如此吩咐道；接下来，他对勇猛、迅捷、鲁莽的男尊说道：“请君主统治海之平原。””"
 joi_flavor_jap.31.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的权威将永远指导[ROOT.GetCountry.GetName]。"
 joi_flavor_jap.31.b: "[ROOT.GetCountry.GetName]需要更多有识之士进入朝廷。"
 #
 joi_flavor_jap.32.t: "[ROOT.GetCountry.GetRuler.GetFirstName]民主"
 joi_flavor_jap.32.d: "随着#V 御一新#!的#V 后一代新日本人#!逐渐成长并开始在社会上发出自己的声音，人们开始#B 将西方文化融入日常生活，并随着新的文学，艺术与戏剧一同繁荣发展#!。与此同时，随着#V 民本主义和自由主义#!思想的传播，人们开始关注提高普通民众和女性的地位，使得充满活力的自由与开放的氛围在整个[ROOT.GetCountry.GetName]的社会弥漫。"
 joi_flavor_jap.32.f: "“如今的政治究竟是为了谁而进行？恕我直言，它上不是为了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，下不是为了民众，而是为了一小撮政客；这些政客渐渐地将[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的尊严置于脑后，他们虽然号称是为民服务，但实际上却政令不一，奖惩不公，决策基于个人好恶。”\n\n“即使你试图抗议，你的意见也会被封锁，你的抱怨也无人理会；在这种状态下，天下还能繁荣昌盛吗？即使是小孩子也应该明白，在这种情况下，天下不可能繁荣昌盛，如果我们现在不结束这种旧习，国家就会灭亡。”\n\n“拯救国家唯一的办法就是广泛征求[ROOT.GetCountry.GetName]民众的意见，而通过广泛征求意见来施政的唯一办法就是建立民选议会。如此一来，就能限制某些暴政的权力，最终使[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]与民众的关系保持良好，并令双方都能享受幸福。”"
 joi_flavor_jap.32.a: "这种危险的利己主义思想正在威胁[ROOT.GetCountry.GetName]。"
 joi_flavor_jap.32.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]应该对此表现出宽容。"
 joi_flavor_jap.32.c: "浪漫主义将推动自由的发展和人民的共同幸福。"
 #
 joi_flavor_jap.33.t: "帝国剧场"
 joi_flavor_jap.33.d: "在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的市中心，当地的市民纷纷仰望那里一座新落成的恢弘建筑：#V 帝国剧场#!。欧式的外形，日式屏风与红漆雕梁的内饰，令它被称赞为“文明的剧场”。"
 joi_flavor_jap.33.f: "“花开的绚丽，难道就是眼见为实的吗？云开雾散，花开的绚丽如此美丽，让我想要驻足片刻，可是花开的绚丽很快就变成了一种谜，我想继续听着笛声，听着那令我感到冰冷的脚步声，心在天际飘荡.我是一个男人，这是一个浮生若梦的世界，我不知道自己的人生该如何度过。”\n\n“少女的双眼，少女的嘴唇，花妆婆娑的容貌，真是绝色佳人，就算和尚和尚香风郎已经进过洞府，也不会心动；轻轻挽起的舞袖，美人的温柔，正如我所听到的，是义经的心意，是静御前的女儿。”"
 joi_flavor_jap.33.a: "这座剧场将让[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]成为新的文化与艺术之都！"
 #
 joi_flavor_jap.34.t: "东京漫画协会"
 joi_flavor_jap.34.d: "近日，一批自称“诙谐画师”的青年漫画家在东京聚集在一起并创办了一个别开生面的艺术团体——#V 东京漫画协会#!。他们强调幽默和非主流的场景，比如裸体舞蹈，试图表明漫画是一种与主流美术有着不同价值体系的艺术形式。"
 joi_flavor_jap.34.f: "“人们对在报纸漫画中出现政治家和相扑选手的漫画家抱有不满情绪，而刊登这些漫画的漫画家也存在着刻板印象。”\n\n“我们都认为，遭遇这样的灾难和考验，面对生活中那么多非同寻常的难题和问题，然后将它们解决或者描绘、呈现出来，除了我们作为画家和漫画家的通常职责之外，一定是一项真正令人愉快的责任。”"
 joi_flavor_jap.34.a: "这帮人太放肆了！"
 joi_flavor_jap.34.b: "漫画确实是独特的！"
 #
 joi_flavor_jap.35.t: "太田丰太郎的爱情"
 joi_flavor_jap.35.d: "最近出版的一本名为#V “舞姬”的小说#!引发了潮流，书中描绘了一位年轻的日本#v $bureaucrats$#!：太田丰太郎在德意志的求学途中邂逅了一位名为爱丽丝的女舞者，两人的爱情跨越国界，但却遭到同胞的诽谤并最终被免职而不得不回到[ROOT.GetCountry.GetName]的悲伤故事。"
 joi_flavor_jap.35.f: "“在那里，我们整天坐在书房的屏风下，右边是叔本华，左边是席勒，那里开出了一朵美丽的花；从那时起，我和女孩的关系逐渐密切，甚至连我们镇上的同乡也知道了，他们很快就以为我是女孩们的丈夫，然而我们之间仍然只有纯真的快乐。”\n\n“我对她的爱突然间愈发强烈，正是在那时，我才发现与她分离是如此艰难。我抛开了个人顾虑，处境艰难，所以有些人可能会怀疑我的行为，甚至批评我，但我对爱丽丝的爱从未如此浅薄，自我们初次相遇以来，她那副愁眉苦脸、头发散落在两鬓，美丽而又楚楚可怜的模样，一下子涌上我那因悲痛刺激而变得不正常的大脑。”\n\n“如同在大海中失去舵的人，望向远方的群山，这就是相泽指引我的方向。然而，那座山依然笼罩在浓雾之中，我不确定何时才能到达，即使到达，它是否能让我感到满足。虽然我贫穷，但如今的生活充满乐趣，我无法放弃对爱丽丝的爱。”"
 joi_flavor_jap.35.a: "同西洋人谈恋爱？多么荒谬！"
 joi_flavor_jap.35.b: "爱情与责任总是无法两全。"
 joi_flavor_jap.35.c: "他可悲的祖国破坏了这样浪漫的爱情。"
 #
 joi_flavor_jap.36.t: "银座文化"
 joi_flavor_jap.36.d: "电车的叮铃声和报童的呼喊在石板街道上交织。在#V 东京#!的心脏，#V 银座的街头#!正悄然改写着生活的样貌：咖啡馆取代了居酒屋，百货商场取代了小商铺，一个#B 新的文明舞台和一种#V 新的生活方式#!正在报纸、时尚和都市之间冉冉升起#!。"
 joi_flavor_jap.36.f: "“走进那家位于银座通的咖啡屋，空气中漂浮着热奶油和报纸墨香。身边是一位身着洋裙的女学生，而不远处的窗边，有老绅士则戴着礼帽。”\n\n“城市正在发生变化。银座不再是官员们快步走过的要道，而是一个令人驻足、交谈、购物、沉思，甚至恋爱的地方。”\n\n“轻浮的城市，不洁的异性恋关系，成群的年轻人在大街的商店门前闲逛，而只是闲逛就会给生意带来麻烦。”"
 joi_flavor_jap.36.a: "过于浮华的歪风邪气。"
 joi_flavor_jap.36.b: "银座代表了时代的方向！"
 #
 joi_flavor_jap.37.t: "人间失格"
 joi_flavor_jap.37.d: "一本名为#V “人间失格”#!的出版物在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]阶层中悄然传阅。这本书讲述了一个只会在人前滑稽搞笑，却无法向任何人展现真实自我的男人：大场洋三从童年到青春期的一生。颓废和幻灭式的文风引起了许多人的共鸣。"
 joi_flavor_jap.37.f: "“我过着充满羞耻的一生...完全无法理解所谓‘人类的生活’是什么。”\n\n“我不断犯下令人耻笑的错误...期间我多次想要自杀，每次都失败了。”"
 joi_flavor_jap.37.a: "大场洋三就是我们每个人的影子。"
 joi_flavor_jap.37.b: "绝不能放任这种颓废文学在[ROOT.GetCountry.GetName]传播！"
 #
 joi_flavor_jap.38.t: "白桦"
 joi_flavor_jap.38.d: "一期名为#V “白桦”的小众文学杂志#!正在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]阶层中流行，期刊的支持者通过刊物来宣扬自由主义，人道主义与社会平等，并公开批判我国的传统荣誉感与社会文化。"
 joi_flavor_jap.38.f: "“看到一只蜜蜂的尸体，它孤独而安静的死亡让我感到似曾相识...而它临死前的骚动，让我感到恐惧。”\n\n“我偶然发现溪流中一块岩石上有一只蝾螈。我扔了一块石头吓唬它，结果它死了。我既同情它，又感受到它的孤独：想到这些动物的死亡，想到还活着的自己。”"
 joi_flavor_jap.38.a: "这个刊物肯定会在[ROOT.GetCountry.GetName]的文坛中举足轻重。"
 joi_flavor_jap.38.b: "我猜这个杂志很快就会因为“资金问题”而停刊了。"
 joi_flavor_jap.38.c: "很明显，他们是收了英镑的境外势力！"
 #
 joi_flavor_jap.39.t: "私奔的白莲花"
 joi_flavor_jap.39.d: "[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的报纸今天刊登了一则引人注目的消息：一位#v $aristocrats$#!的女儿，著名的文学家，因拒绝接受其父亲为她定下的婚约，抛弃了她经营煤矿，家财万贯的[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]未婚夫，而与一位贫穷的法律系学生携手私奔。"
 joi_flavor_jap.39.f: "“我向那些利用经济权力无视女性人格尊严的人永远告别。我离开你们，是为了守护和培养我个人的自由和尊严。”\n\n“这是我一生中最痛苦的时刻，尽管我不会容忍任何干涉，但她为什么不去死？为什么不去出家？”\n\n“如果情况恶化，你们可以一起自杀，而我至少也会在神龛前烧点香。”"
 joi_flavor_jap.39.a: "他的耻辱是因为自己腐朽的封建习俗而咎由自取。"
 joi_flavor_jap.39.b: "私奔者必须从#v $aristocrats$#!中除名。"
 joi_flavor_jap.39.c: "政府不能容忍这种道德败坏，警察必须把这个私奔者抓回来！"
 #
 joi_flavor_jap.40.t: "春与阿修罗"
 joi_flavor_jap.40.d: "一本名为#V “春与阿修罗”#!的诗集在近日出版，在诗句中，作者描绘了一个因精神上的圆满而美好的#B 乌托邦世界#!。经过一些忠实读者的追寻，他们发现这些才华横溢的诗句居然出自于一名默默无闻的[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]之手。"
 joi_flavor_jap.40.f: "“我背着一只白色的杂囊，像个随意的林务官，在五月的金色光芒中吹着口哨，踩着步伐——这是多么快乐的太阳系的春天啊。”\n\n“万物都通过我，发出它们的光；今天之内，你便会远行，我的妹妹啊；雨夹雪纷纷，天空却异常明亮。”"
 joi_flavor_jap.40.a: "这只是农村人的幻想。"
 joi_flavor_jap.40.b: "他的诗是世界的心象。"
 #
 joi_flavor_jap.41.t: "护宪运动"
 joi_flavor_jap.41.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的授意下，前御一新时期的元老与[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的代表：[SCOPE.sCharacter('armed_forces_ig_leader').GetFirstName] [SCOPE.sCharacter('armed_forces_ig_leader').GetLastName]被任命为首相，跳过了议会中多数党团的推举。这一做法被新闻界称作“违宪复辟”，顿时引发了[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]，[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]与[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]的大规模抗议游行；抗议者人群涌上[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的街头，高喊着#bold “还政于民”#!的口号，要求根据选举结果重新组阁。"
 joi_flavor_jap.41.f: "“[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]一开口就鼓吹忠诚，仿佛忠君爱国才是他们唯一的事业；但看他们的一举一动，却发现他们始终躲在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的阴影下狙击政敌。他们不难道是在以[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]为城垛，以圣旨为子弹来扯着虎皮击溃政敌吗？”\n\n“眼见民主内阁的更迭和军政府的上台，我无法保持沉默，我感到有必要再次尝试团结各党派的人士们：于是我们各党领袖齐聚一堂，我向他们阐述了各方联合守护宪政的必要性，他们一致表示赞同，没有异议。”\n\n“各党领袖的共识是：[ROOT.GetCountry.GetName]必须以重建真正符合宪政意义的议会内阁制为目标。”"
 joi_flavor_jap.41.a: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的执政是对宪政精神赤裸裸的背叛！"
 joi_flavor_jap.41.b: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]必须自己背锅而不是把责任甩给[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下。"
 joi_flavor_jap.41.c: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]才是[ROOT.GetCountry.GetName]的真正主心骨！"
 #
 joi_flavor_jap.42.t: "治安维持法"
 joi_flavor_jap.42.d: "面对连续的暴动和抗议，恼羞成怒的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]提议了一个名为“治安维持法”的法案，根据法案，政府将有权逮捕和秘密审判任何它认为可能危及“国家”的行为。"
 joi_flavor_jap.42.f: "“任何人组织或明知而加入以改变国家政体或否定私有财产制度为目的的结社，处十年以下有期徒刑；任何人为前条第一款之目的，就该款所列事项的执行进行协商，处七年以下有期徒刑或拘役。”\n\n“煽动他人实施第一条第一款所列行为者，处七年以下有期徒刑；意图使他人犯第一条第一项及前三条之罪，提供、提议或承诺金钱或其他利益者，处五年以下有期徒刑。明知而接受上述提供或作出上述承诺者，亦同。”\n\n“凡在本法实施区域内犯罪的，都适用本法。”"
 joi_flavor_jap.42.a: "这个法案是对言论和集会自由的公然背叛！"
 joi_flavor_jap.42.b: "批准法律，是时候重拳出击了！"
 joi_flavor_jap.42.c: "驳回重议，监察必须被约束在一定范围内。"
 #
 joi_flavor_jap.43.t: "思想犯保护监察法"
 joi_flavor_jap.43.d: "随着自由主义和改良主义的思潮不断遭受打压并最终被边缘化，成功执掌了大权的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]与[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]们开始对反对者进行彻底的清算：一部严格的思想犯罪法出台，为政府逮捕任何“思想上”不忠于“日本传统和荣誉”的人提供了法律依据。"
 joi_flavor_jap.43.f: "“对于违反和平维护法的人，如果被判处缓刑，或者由于认为没有必要提起诉讼而不提起诉讼，则可以根据保护观察审查委员会的决议对其进行保护观察。服刑完毕或获得假释的人也是如此。”\n\n“在保护观察下，观察该人的思想和行为是为了保护他或她，防止他或她再次犯罪的风险；缓刑监督是指将个人送至缓刑办公室接受缓刑官的监督，或将个人移交给监护人，或委托给保护机构、寺庙、教会、医院或其他适当人员进行监督。对于处于缓刑监督状态的个人，可能会受到居住、交往、通讯等方面的限制。”\n\n“任何人组织以改革国家政体为目的的社团，或担任该社团的干事或其他领导人，应处以死刑、终身监禁或五年以上有期徒刑；任何人明知而加入该社团，或为实现该社团宗旨而实施行为，应处以两年以上有期徒刑。”"
 joi_flavor_jap.43.a: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的力量将带领[ROOT.GetCountry.GetName]走向伟大！"
 joi_flavor_jap.43.b: "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]根据[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的神圣旨意而行事。"
 #
 joi_flavor_jap.44.t: "[ROOT.GetCountry.GetRuler.GetFirstName]维新"
 joi_flavor_jap.44.d: "随着自由主义者的边缘化，以及#v $bureaucrats$#!政府成功确立了对[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的可靠控制，要求恢复御一新精神并实行[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]直辖的呼声迅速高涨，并成功进入了[ROOT.GetCountry.GetName]的最高权力之中。"
 joi_flavor_jap.44.f: "“全国国民必须静下心来，从根本上思考天道赏罚为何不同，确立[ROOT.GetCountry.GetName]应如何重建的基础，确定全日本国民一致的国家意见，最终在全日本国民的大团结下，呼吁[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]行使最高权力，服从[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，迅速完成国家重建的基础。”\n\n“劳务工资原则上以自由合同为基础，工作时间必须实行统一的八小时制，周日和节假日休息，并支付工资；并禁止使用16岁以下的童工。”\n\n“一个为天下兄弟姐妹传扬天道的人，却虐待自己国家的年轻兄弟，这是何等的民族道德？因此，女性的劳动是自由的，与男性的劳动平等，并使作为下一代公民的子女更加优秀。”"
 joi_flavor_jap.44.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的神圣性不容任何质疑！"
 joi_flavor_jap.44.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]将与全国国民共享荣耀。"
 #
 joi_flavor_jap.45.t: "雨后阳光"
 joi_flavor_jap.45.d: "在经历了一段漫长的文化繁荣与思想开放的时代之后，自由民权运动最终在[ROOT.GetCountry.GetName]取得了成功：政府对文化，出版和艺术的限制被解除，[GetLawType('law_protected_speech').GetName]被载入宪法，一个权力分立的[GetLawType('law_universal_suffrage').GetName]议会制政府随着第一届全民选举的召开而被建立起来，自御一新以来一直阴魂不散的#v $bureaucrats$#!，#v $aristocrats$#!与#v $officers$#!的政府丧失了权力，并被移交给宪法，议会和全体公民手中。"
 joi_flavor_jap.45.f: "“我要对诸位说，你们都拥有相同的一件法宝，这件法宝是什么呢？是能够用钱衡量的木材，还是金、银、宝石？不是，都不是；有一种比那些更珍贵的法宝，那就是自由：如果不伸张民权，不争取自由，幸福也好，安乐也好，都是得不到的。”\n\n“我们[ROOT.GetCountry.GetName]的国体，值得全世界骄傲：我们力求理性地阐释其根本原则，使国民对国体的真谛坚信不移。那些所谓老派国学家所宣扬的神话式解释根本无法打动当今的年轻人，我们力求更进一步，明确日本在当今世界潮流中的地位，并阐明日本的全球使命，即日本应如何为全球人文科学和文明开化的进步做出贡献。”"
 joi_flavor_jap.45.a: "拨开专制与威权的乌云，自由的阳光属于[ROOT.GetCountry.GetName]的所有公民！"
 joi_flavor_jap.45.b: "大和民族将浴火重生。"
 #
 joi_flavor_jap.46.t: "征韩论"
 joi_flavor_jap.46.d: "随着#V 御一新#!的进行，许多国内的沙文主义者开始主张现在已经变得文明开化的[ROOT.GetCountry.GetName]负有将领土恢复到古代统辖朝鲜半岛的天命，也就是征服[SCOPE.sCountry('KOR_scope').GetName]的论调。"
 joi_flavor_jap.46.f: "“[SCOPE.sCountry('KOR_scope').GetName]知守不知攻、知己不知彼、其人深沉狡狞固陋傲顽；觉之不觉、激之不激、故断然不以兵力莅焉、则不为我也。”\n\n“况朝鲜蔑视皇国、谓文字有不逊、以兴耻辱；皇国君辱臣死、实不戴天之寇也、必不可不伐之、不伐，皇威不立也、非臣子也。”"
 joi_flavor_jap.46.a: "我们需要保持和[SCOPE.sCountry('KOR_scope').GetName]的友好关系。"
 joi_flavor_jap.46.b: "朝鲜半岛是[ROOT.GetCountry.GetName]的天命！"
 #
 joi_flavor_jap.47.t: "南满洲铁道局"
 joi_flavor_jap.47.d: "在经过与满洲各方利益代表的会谈后，[ROOT.GetCountry.GetName]，[SCOPE.sCountry('RUS_scope').GetName]与[SCOPE.sCountry('CHI_scope').GetName]共同出资建立了一家多方合作的铁路公司，并交由我国政府设立的铁道局管理，分红则按各方股权分配，管理权和所有权则划归[ROOT.GetCountry.GetName]所有。"
 joi_flavor_jap.47.f: "“关于满洲各项事业的发展，双方原则上应享有平等的利益。满洲铁路及其附属财产，包括轨道、枕木、桥梁及其他一切线路设施、站房、站台、仓库、船坞、码头等，均应按照双方共同代表商定的实际价格取得。”\n\n“鉴于我们认识到顺应日本的趋势是明智之举，公司应在[ROOT.GetCountry.GetName]的监督下组织运作；公司架构应在情况允许的范围内不时进行调整，最终目标是实现平等的代表权和监督权：[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下已同意通过一家官方公司开展业务，剩下的就是获得合伙人的同意，并相信这种同意一定会得到。”"
 joi_flavor_jap.47.a: "政府的介入将有助于稳定帝国在满洲的统治。"
 joi_flavor_jap.47.b: "铁道局也必须充分参与到公平市场竞争中。"
 #
 joi_flavor_jap.48.t: "[ROOT.GetCountry.GetName]的社会主义？"
 joi_flavor_jap.48.d: "一群社会主义者在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]成立了一个自称为“日本社会党”的党派，并推出了一个所谓的“党纲”。根据他们的纲领，[ROOT.GetCountry.GetName]将在未来改变国体，变成一个社会主义国家。"
 joi_flavor_jap.48.f: "“[ROOT.GetCountry.GetName]的社会党是一个由以工人阶级为核心的农民、自主小企业主、知识分子、学生等广大劳动人民组成的阶级性的群众性政党，党员有明确的信念，愿意为实现党的目标献身。”\n\n“党和群众组织的关系党员为自己所属的组织最勇敢地奋斗，赢得群众的信任和支持，并通过自己的道德影响力领导该组织的斗争。”\n\n“党的当前目标是实现和平与独立、捍卫自由与民主、并保护劳动群众的生命；保持党的阶级性，建立党内民主。”"
 joi_flavor_jap.48.a: "严厉查禁这些可恶的社会主义分子！"
 joi_flavor_jap.48.b: "即便我们不认同，也应该维护他们的参政权。"
 #
 joi_flavor_jap.49.t: "英日同盟"
 joi_flavor_jap.49.d: "随着[SCOPE.sCountry('JAP_scope').GetName]势力在远东的不断增长，和[ROOT.GetCountry.GetName]与他们在太平洋利益的共同之处，日本的外交大臣已经抵达[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，向[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的政府提议签署一份长期的军事同盟协议来缔结双方的友谊。"
 joi_flavor_jap.49.f: "“缔约双方相互承认双方的特殊利益，宣布双方不受两国侵略倾向的影响，但考虑到双方的特殊利益，其中[ROOT.GetCountry.GetName]的利益主要与中国有关，而[SCOPE.sCountry('JAP_scope').GetName]除在中国拥有利益外，还在政治、商业和工业上对朝鲜有特殊兴趣，缔约双方承认，如果受到任何其他国家的侵略行动或中国或朝鲜发生的骚乱的威胁，需要缔约任何一方进行干预以保护其国民的生命和财产，双方均可采取必要措施来维护这些利益。”\n\n“如果任何签署国根据第一条卷入战争，则宣布中立，如果任何签署国与多个大国发生战争，则承诺提供支持；签署国承诺不与其他国家签订有损该联盟的单独协议，并承诺：当本条约涉及的任何利益受到威胁时，将进行坦诚、充分的沟通。”"
 joi_flavor_jap.49.a: "那群矮子不值得我们花费哪怕一枚金币。"
 joi_flavor_jap.49.b: "签署条约，日本将成为[ROOT.GetCountry.GetName]在东方的可靠盟友！"
 #
 joi_flavor_jap.50.t: "日韩同祖论？"
 joi_flavor_jap.50.d: "随着[ROOT.GetCountry.GetName]成为稳定了在朝鲜半岛的统治，一种被称为“日韩同祖论”的论调开始在半岛传播。支持者认为，朝鲜人实际上和大和民族是同一起源的同一民族，因此理应成为一家人。"
 joi_flavor_jap.50.f: "“[ROOT.GetCountry.GetName]无意吞并朝鲜：朝鲜人每次行动都会误解日本的意图，但日本从未有过这样的意图，当然也不敢这么做。据说，有些日本人借此事件主张吞并朝鲜。我认为吞并毫无必要，只会徒增烦恼，应该让朝鲜发展自治能力。”\n\n“如果国家富强，军事强大，那自然就不用害怕朝鲜反戈一击；[ROOT.GetCountry.GetName]希望朝鲜富强，但唯一的限制条件是朝鲜必须长期与日本保持友好关系并与日本合作。”\n\n“我认为，像德意志邦联在符腾堡那样领导朝鲜，培育影响力，普及金融和经济教育，最终带领朝鲜建立联邦政府，或许更符合日本的利益。”"
 joi_flavor_jap.50.a: "我们和朝鲜人有相同的祖先，他们理应成为[ROOT.GetCountry.GetName]的合法公民。"
 joi_flavor_jap.50.b: "胡说！[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下一抽鞭子，朝鲜奴隶就要工作！"
 #
 joi_flavor_jap.51.t: "枪杀[SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName]"
 joi_flavor_jap.51.d: "新的驻韩总督[SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFirstName] [SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetLastName]在最近路过哈尔滨火车站并与[SCOPE.sCountry('RUS_scope').GetName]财政部长会晤时遭到了一名朝鲜民族主义者的刺杀，他身中三枪，当场去世。这则消息震惊了整个[ROOT.GetCountry.GetName]，嫌犯被抓捕并押送到了关东法院审判，许多支持他的西方律师都申请愿意为他辩护。"
 joi_flavor_jap.51.f: "“我为了恢复韩国的独立，维护东方的和平，在海外含辛茹苦三年之久，最终未能如愿，在此辞世。两千万兄弟姐妹们，应该各自努力学习，振兴产业，恢复自由独立，继承我的遗志，让逝者无憾。”\n\n“我死后，将我的遗骨葬在哈尔滨公园附近，待国家主权恢复后，再将它们送回祖国。即使我去了天堂，我也一定会努力恢复我们的国家。你回去告诉你们的同胞，要各自担负起国家的责任，履行国民的义务，同心协力，建立功业。当韩国独立的号角响彻天堂时，我一定会在天上为国家和民族而欢呼。”\n\n“我被枪击了三枪。这是谁...我明白了。他真是个白痴。”"
 joi_flavor_jap.51.a: "按照国际公法以敌军士兵的待遇审判他，不能让他成为朝鲜人的民族英雄。"
 joi_flavor_jap.51.b: "密令关东法院，必须以恐怖袭击的罪名对刺杀者处以极刑！"
 #
 joi_flavor_jap.52.t: "日满议定书"
 joi_flavor_jap.52.d: "随着满洲落入[ROOT.GetCountry.GetName]的掌控中，我们在当地成功扶植了一个傀儡政权和日本总督，并开始与[SCOPE.sCountry('CHI_scope').GetName]，要求他们承认我们在满洲的主权。"
 joi_flavor_jap.52.f: "“[SCOPE.sCountry('CHI_scope').GetName]将来中日两国间未另订约款：之前在满洲国领域内[ROOT.GetCountry.GetName]或日本臣民依据，既存之日中两方间之条约协定其他约款及公私契约，所有之一切权利利益即应确认尊重之。”\n\n“满洲国及日本国确认，对于缔约国一方之领土及治安之一切胁威，同时亦为对于缔约国他方之安宁及存立之胁威，相约两国协同当防卫国家之任；为此所要之日本国军驻扎于满洲国内。”"
 joi_flavor_jap.52.a: "对满洲的征服只是我们驯服巨龙的第一步。"
 joi_flavor_jap.52.b: "签署条约，现有的满洲边界已经足够好了。"
 #
 joi_flavor_jap.53.t: "马关条约"
 joi_flavor_jap.53.d: "随着[SCOPE.sCountry('CHI_scope').GetName]在战争中的巨大失败，北京政府不得不将台湾和其周边岛屿连带着大连一并割让给[SCOPE.sCountry('JAP_scope').GetName]，许多人认为，这或许就代表着[SCOPE.sCountry('CHI_scope').GetName]的天命终结的丧钟。"
 joi_flavor_jap.53.f: "“[SCOPE.sCountry('CHI_scope').GetName]明确承认[SCOPE.sCountry('JAP_scope').GetName]在朝鲜的一切权力，因此，朝鲜向中国纳贡和举行有损于此种独立和自治的仪式和礼节今后应全部停止。”\n\n“中国将奉天省南部，台湾岛，以及所有附属于或属于台湾岛的岛屿，澎湖群岛，即位于格林尼治以东经度119度至120度、北纬23度至24度之间的所有岛屿，及其上一切防御工事、军械库及公共财产永久全部割让给[SCOPE.sCountry('JAP_scope').GetName]。”\n\n“[SCOPE.sCountry('CHI_scope').GetName]同意向日本支付战争赔款二亿库平两，分八期支付；第一期五千万两应于本条例批准书互换后六个月内支付。”"
 joi_flavor_jap.53.a: "丰臣秀吉将军的未竟事业在[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的手中就将宣告成功！"
 joi_flavor_jap.53.b: "难道[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的天命真的末日将近？"
 #
 joi_flavor_jap.54.t: "[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting]军事顾问"
 joi_flavor_jap.54.d: "由于对[ROOT.GetCountry.GetName]的现代化进程颇有兴趣，[SCOPE.sCountry('military_consultant_country').GetName]提议向我们派遣[SCOPE.sCharacter('military_consultant_general').GetFullName]将军作为军事顾问。这一协议的条款看上去对我们非常有利，但在让外国势力给我们做人情这方面，我们应当三思。"
 joi_flavor_jap.54.f: "“这个，长官，是一挺加特林机枪。每分钟两百发。不管什么玩意，无论是人还是野兽还是机器，都无法承受这个器械释放的如地狱一般的子弹风暴。我们会教你的士兵操作这个机械，维持现代军事纪律，以及无条件地遵从上级的命令。”"
 joi_flavor_jap.54.a: "我们欢迎[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting]的援助。"
 joi_flavor_jap.54.b: "我们不想要他们的金杯毒酒。"
 #
 joi_flavor_jap.55.t: "往[SCOPE.sCountry('japan_embassy_country').GetName]使节团"
 joi_flavor_jap.55.d: "作为使团西行旅程的一部分，我们的权贵显要同[SCOPE.sCharacter('japan_embassy_politician').GetFullName]，一位老历的[SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting]的政客举行了会面。出于有兴趣同新近开国的[ROOT.GetCountry.GetAdjectiveNoFormatting]政权建立良好关系的目的，对方起草了几份我们可能希望同[SCOPE.sCountry('japan_embassy_country').GetName]签订的协议。"
 joi_flavor_jap.55.f: "“方今世界各国，虽皆以亲睦礼仪相交，是全为表面名义；其于阴私，强弱相凌、大小相辱之情形仍存。于当时[ROOT.GetCountry.GetName]，亲睦相交之国虽多，重国权自主如[SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting]者，当谓其亲睦中之最亲睦国也。”"
 joi_flavor_jap.55.a: "建立牢固的外交关系。"
 joi_flavor_jap.55.b: "[SCOPE.sCountry('japan_embassy_country').GetName]有许多东西要教我们。"
 joi_flavor_jap.55.c: "我们从[SCOPE.sCountry('japan_embassy_country').GetName]那里什么也得不到。"
 #
 joi_flavor_jap.56.t: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting]投资"
 joi_flavor_jap.56.d: "[SCOPE.sCharacter('western_investor_ig_leader').GetFullName]，一名来自[SCOPE.sCountry('western_investor_country').GetName]有钱又有权的实业家，将[ROOT.GetCountry.GetName]看作一个油水颇丰但尚未开发的市场。作为在未来某个时候予以政治支持的交换，[SCOPE.sCharacter('western_investor_ig_leader').GetFullName]很愿意同我们分享一些[SCOPE.sCharacter('western_investor_ig_leader').GetHerHis]母国的工业技术。"
 joi_flavor_jap.56.f: "“我的同僚中有一些人对[ROOT.GetCountry.GetName]的利益不屑一顾，认为此地缺乏有价值的自然资源，没有做生意的吸引力。然而，我却看到了这个国家的潜力。今日为原始森林和休耕田地的地方，明天将会成长为城市中心，吞吐着现代工业的健康烟云。”"
 joi_flavor_jap.56.a: "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting]的心灵手巧能够让[ROOT.GetCountry.GetName]富强起来。"
 joi_flavor_jap.56.b: "我们不需要外国人搅局我们的经济。"