 seikanron_korean_adm_reason:0 "#V 进度条显示当前[ROOT.GetCountry.GetName]在朝鲜半岛的统治稳定度#!。\n宽松的民族政策，普遍选举权，内务机构，强大的警察部门和较低的当地动乱将有助于提升#V 统治稳定度#!，严苛的民族政策，较高的当地动乱和无内务机构则会降低#V 统治稳定度#!。\n\n[ROOT.GetCountry.GetName]在#V 朝鲜半岛#!的统治并不稳定：一群#B 自称“合法政府”的共和主义者#!逃亡到了[SCOPE.sCountry('CHI_scope').GetName]和[SCOPE.sCountry('USA_scope').GetName]建立了流亡政府，半岛本身也正#B 面临着严重的[concept_turmoil]#!，许多#V 反对帝国统治的当地刁民#!正组织[concept_secession]试图脱离[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的权力，并恢复他们的独立。\n\n#B [ROOT.GetCountry.GetName]必须采取措施，平定当地的反抗，并将朝鲜半岛同化为日本国家的合法组成部分。#!"
