 anglo_japanese_alliance:0 "英日同盟"
 anglo_japanese_alliance_reason:0 "尽管[SCOPE.sCountry('GBR_scope').GetName]与[SCOPE.sCountry('JAP_scope').GetName]在过去的数百年间都没有什么历史交集，然而同为#V 海权强国#!的特质和#V 共同的亚洲利益#!使得[ROOT.GetCountry.GetName]最终和这个相距甚远的遥远国家缔结了一份军事同盟。\n\n#B 远东的局势正面临着剧烈的变化#!，一份新的#V 军事同盟#!条约无论是对于#B 欧洲的老牌强国：[SCOPE.sCountry('GBR_scope').GetName]抑或是亚洲的新兴国家：[SCOPE.sCountry('JAP_scope').GetName]都是相当有益的#!；通过这份条约对其他世界[concept_great_power]的威慑，我们两国#B 在亚洲的帝国利益将可以在互帮互助之下得到保障#!。\n\n只要这份联盟条约仍然有效，#B 我们两国就能借此孤立其他任何试图在亚洲占据新的利益的海外[concept_great_power]，并维持亲切的和平来往。#!"
