 taisho_roman_reason:0 "#U 自由主义#!的影响进度会随着进步主义势力，左翼社会科技和集会权等#U 自由[concept_law]#!而提升。\n#G 专制主义#!的影响进度会随着保守主义势力，中央计划科技和独裁制等#G 专制[concept_law]#!而提升。\n#N 军国主义#!的影响进度会随着保守主义势力，军队势力和秘密警察等#N 审查[concept_law]#!而提升。\n\n#V 在[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]即位后的这个春天#!，#B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的街头正弥漫着一种奇妙的气息#!：#V 咖啡馆#!里坐着西装革履的诗人、女学生拿着翻译过的卢梭、拜伦与屠格涅夫；朝霞下的报童呼喊着最新的政治新闻，新兴的剧场唱起了莎士比亚和#B 在#V 过去被认为败坏礼法的浪漫爱情#!。#!\n\n#U #B 浪漫主义的微风#!#!#B 正从银座的中心向整个[ROOT.GetCountry.GetName]吹去#!：在#V 御一新#!的数十年间，国家的#B #V 工业化进程#!不断推进，经济急剧发展，#O 物流和商业#!也取得了长足的进步#!；#O #B 铁路网，水上运输和公共交通#!#!的发展带来了#B 城市的大幅扩张#!；#I 新媒体#!应运而生，#B 大众报纸，书籍，杂志，声音记录乃至于摄影艺术#!正在新一代艺术家和文学家们的手中#B 传播到整个社会#!；#V 自由，开放和充满了活力的思想#!氛围弥漫，人们对#B 进口商品、西方思想和消费文化的热爱蓬勃发展：#!这一切都塑造了#V [ROOT.GetCountry.GetName]如今[ROOT.GetCountry.GetRuler.GetFirstName]时代的空前繁荣#!：充满了#B 希望与成功的气息#!使得过去陷于穷苦的，无知的人们，也将人生的梦想转向了#B 新兴的城市和商业之中，使得我们的整个社会都进入了一段#V 伟大与希望的时代#!。#!\n\n#B 然而，这个时代的一切也正在动摇过去#!#V 数千年赖以维系大和文化的道德标准#!，父辈与祖先的信仰正在遭受#B 新兴思想的冲击#!；报刊上的辩论从宪政到女权，从#U 自由主义#!到#I 社会主义#!，每一个话题都隐藏着#B 对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下政府的潜在威胁#!，导致[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]，[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]元老们内部#B #V 对这些风潮的反对越发激进#!#!。\n\n#B 然而无论如何，[ROOT.GetCountry.GetName]正在走入这个#V 日出之国#!#U 数千年的历史从未抵达过的辉煌时刻#!：一个既继承传统又渴望文明开化，既存在繁荣昌盛又隐伏暗流涌动的矛盾时代#!——#V 理想、情感与浪漫#!被灌输到#O 国家与民族的共同体#!之中，#B #N 但这段美好的年代还会持续多久，却没人能给出一个答案。#!#!"
