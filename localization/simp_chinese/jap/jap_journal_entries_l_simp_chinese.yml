 #锁国
 edo_sakoku:0 "锁国政策"
 edo_sakoku_reason:0 "自#V 元和禁教#!和#V 宽永驱船#!以来[ROOT.GetCountry.GetName]就效法[SCOPE.sCountry('CHI_scope').GetNameNoFlag]施行着严格的#V 锁国政策#!以屏蔽外夷之侵扰：根据法令，唯保#V 长崎#!一隅通商于[SCOPE.sCountry('NET_scope').GetName]与[SCOPE.sCountry('CHI_scope').GetName]，而#B 其余港口都被严格的封锁，禁止任何外夷船只进#!入。\n\n尽管这一法度维系了我国#B 近两百年的稳定与宁谧#!，但洋人势力的日益增长也开始对我国构成显著的威胁；洋人惑乱邦俗，煽动下民，正所谓#B “非我族类，其心必异；洋物虽新，实为祸始”#!。正因此，#V 锁国政策#!是[ROOT.GetCountry.GetRuler.GetLastName]幕府赖以维系天下安宁的重要手段，如果这条法令遭遇不测，那么#B 势必会对幕府的权威造成严重的打击#!。"
 edo_sakoku_on_fail_tt:0 "我们将不得不结束锁国政策并与西洋诸国谈判开放。"
 edo_sakoku_1_button:0 "停止驱逐外国船只"
 edo_sakoku_1_button_desc:0 "自文政八年以来颁布的驱洋令已经不再适合当下的局势：西洋诸国的势力绝非我国所可匹敌，如果一意孤行拒绝他们商船的停泊，势必招致他们的愤怒和打击。我国必须审时度势，解除对他们的封锁和严格限制。"
 joi_flavor_jap_3_tt:0 "我们将与西洋的各强国签署一份开放海岸和贸易最惠国待遇的条约。"
 china_lose_opium_wars_tt:0 "中国在鸦片战争中战败。"
 #
 edo_rangaku:0 "兰学"
 edo_rangaku_reason:0 "#V 兰学#!#B 是我国国内一批通过荷兰语学习西洋学问的学者研究的知识体系#!：自#V 天保年间#!以来，尽管#B 锁国令牢牢控制着我国的海疆#!，但在长崎港等对外开放的城市之中，#V 出岛贸易带来的技巧#!却也吸引了一大批热衷于这些技术研究的学者，并被吹捧为开化之门户。\n\n#B 从街头郎中到藩中上士#!，手捧#B 杉田玄白、前野良泽之流所译西洋书籍者#!并不罕见；这些学者仿制器械之形制，效习西洋之疗法，其用亦不违正理，[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]对此也多持默许之态。\n\n然而#B 兰学技术的扩散#!也正引起朝廷内部的国学派对这一西洋夷学的争论，#B [ROOT.GetCountry.GetRuler.GetLastName]幕府必须对兰学采取一个合适的定论来解决朝廷内部的分歧。#!"
 edo_rangaku_1_button:0 "压制兰学传播"
 edo_rangaku_1_button_desc:0 "兰学传播奇技淫巧，无不威胁我国生民的传统习俗。朝廷必须严格查禁这些讨厌的兰学士，阻止我国秩序的动摇。"
 edo_rangaku_2_button:0 "鼓励兰学传播"
 edo_rangaku_2_button_desc:0 "若我朝将兰学仅视作医药博物之奇技，不敢引为治国之具，则将永困于蛮夷之后。必须引其精华转而图强，确保这些学问为我所用。"
 edo_rangaku_3_button:0 "请求荷兰海军技术支持"
 edo_rangaku_3_button_desc:0 "荷兰人在长崎的贸易港已经发展成了一片繁荣之势，许多兰国的舰船也停靠在那里。他们的舰船技术比我国要先进许多，如果能得到他们的帮助，在长崎港建立一所专事海军事务的学院，将会对我国的国防大为有利。"
 edo_rangaku_3_button_possible_tt:0 "我们将在长崎的出岛附近建立一所海军训导基地。\n我们也将引进荷兰教官帮助我们建设西洋船只。"
 #
 tenpo_famine:0 "天保大饥荒"
 tenpo_famine_reason:0 "自#V 天保四年#!以来，一场#B 堪比享保、天明时代的大规模[concept_famine]#!就席卷了[ROOT.GetCountry.GetName]。冷害频繁蝗虫肆虐，自奥羽至畿内的大和列岛上禾稻歉收，百姓饥馁，致使米价飙升，饿殍遍野。\n\n严重的[concept_famine]给日本的人民带来了无法估量的痛苦，他们请求[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]治下的[ROOT.GetCountry.GetRuler.GetLastName]幕府#B 采取特别措施从这场恐怖的灾难中拯救他们的生命#!。"
 tenpo_famine_on_timeout_tt:0 "等待饥荒自然结束或者采取措施救济民众。"
 tenpo_famine_status:0 "#R #B 始于天保四年的大饥荒仍在我国肆虐#!#!"
 #
 tenpo_reform:0 "天保改革"
 tenpo_reform_reason:0 "自#V 天保年间#!的饥荒肆虐以来，[ROOT.GetCountry.GetName]的国力就每况愈下：#B 农家空仓，商家闭户，百姓四散流离，连[ROOT.GetCountry.GetRuler.GetLastName]幕府赖以驾驭各藩主的统治力也已动摇#!，许多平民甚至开始认为上天已经不再庇佑伟大的日出之国。\n\n尽管如今饥荒已经结束，但它留下的痕迹仍然严重损伤着[ROOT.GetCountry.GetName]的经济。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经任命[SCOPE.sCharacter('landowners_ig_leader').GetLastName]大臣和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的元老们主持一场#V 复兴俭朴节约之风#!#B 的农业改革，挽救国家的道德沦丧和经济危机#!。"
 tenpo_reform_tt:0 "改革的成功可以给予我国经济更多活力。"
 tenpo_reform_status:0 "#B 采取措施重新振新我国的农村经济#!"
 #
 meiji_restoration_add_je_tt:0 "将#V 御一新#!添加进#V #O #B 日本幕府#!#!#!的日志"
 meiji_restoration:0 "[ROOT.GetCountry.GetRuler.GetFirstName]维新"
 meiji_restoration_reason:0 "“如果[concept_government]能够忠实的执行改革的政策，我们将能够恢复帝国的繁荣，增强国力，使国家与其他国家并驾齐驱，但这并非易事；我谦卑地希望，我们能够基于公平正义的原则，做出一个伟大而大胆的决定，彻底革新整个[ROOT.GetCountry.GetName]。”\n\n孤立而停滞的[ROOT.GetCountry.GetName]#B 数个世纪以来都被幕府统治#!：不过随着#V 幕府将军的失势#!，权力已经被奉还给了#V 合法的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!，使[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]得以亲断机务；但是#B 百余年封闭所积累的沉重负担#!早已压得这个#V 日出之国#!喘不过气，导致我们#B 与世界上的强大国家仍然相距甚远#!，以至于我们随时面临着#V 被殖民和掠夺的危险#!。\n\n然而维新并非一纸诏令就可以完成的事，[ROOT.GetCountry.GetName]需要一场#B 横跨全国的根本变革：废除旧制，整饬律法，富国强兵，殖产兴业#!...以[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]为首的新[concept_government]仍然还有许多工作要做。\n\n#B 如果[ROOT.GetCountry.GetName]还想在这个迅速现代化的世界中占有一席之地，那么我们就必须不惜一切代价地实现文明开化，甚至成为世界舞台上的一极。#!"
 meiji_restoration_complete_tt:0 "完成了6项#V 维新#![concept_journal_entry]和#B 遣西使节团#!"
 meiji_restoration_fail_tt:0 "在与保守派的内部冲突中失败"
 meiji_restoration_effect_tt:0 "如果我们完成了额外的6项#V 维新#![concept_journal_entry],一个奖励事件就将触发："
 meiji_restoration_status:0 "#B #P 将日本改造为一个现代化的国家#!#!"
 meiji_restoration_birth_rate_tt:0 "所有#O 日本列岛#!的[concept_state]都将获得一个修正，效果示例如下："
 meiji_restoration_mil:0 "维新：富国强兵"
 meiji_restoration_mil_reason:0 "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]是[ROOT.GetCountry.GetName]延续数百年的#B 世袭封建战士阶层#!。他们曾驰骋沙场、以忠义守护主君，是国家的栋梁。\n\n然而，#V 数百年的太平#!早已磨钝了他们的刀刃，使他们忘记了[concept_war]之道，只知抱残守缺，仰赖曾经公家幕府授予的特权，#V 根本无法适应西方传来的军事制度#!；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]若仍依赖这一阶层维持国防，几乎无异于抱薪救火。\n\n#B 无论是想要保卫我们的领土和海疆，还是扩充帝国在外的势力范围，我们都必须建设一支忠于国家的新式常备军#!。他们必须是一支编制清晰，训练有素，装备精良，并能代表整个[ROOT.GetCountry.GetName]的国民，而非某个特权阶层的#V 现代武装#!。"
 meiji_restoration_dip:0 "维新：巩固主权"
 meiji_restoration_dip_reason:0 "#B 数个世纪以来#!，[ROOT.GetCountry.GetName]始终依靠#V 锁国政策#!来抵御外夷的骚扰，以求一隅之安；然而，当西洋军舰出现在长崎与浦贺的海面上时，我们才意识到那些西洋强国的#B 坚船利炮#!足以#B 击垮我们的国家#!。\n\n如果我们不能自主开放，就会被迫屈辱地开放；如果我们不能自己建立外交，就将永远被他国践踏主权。现在是时候向世界敞开我们自己了：[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]和[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]都认为，我们必须要拆除锁国的壁垒，并建立起一个#B 有能力与[concept_great_power]对等往来，保卫自身尊严与利益的现代[ROOT.GetCountry.GetName]#!。"
 meiji_restoration_eco:0 "维新：殖产兴业"
 meiji_restoration_eco_reason:0 "如果[ROOT.GetCountry.GetName]想与那些觊觎我国土地与市场的[concept_great_power]抗衡，我们就必须#B 迅速发展自己的产业#!，建立起一套#B 足以自给自足、乃至与海外竞争#!的#V 近代工业体系#!。\n\n我们必须设立国营工厂，鼓励民间投资兴业，引进西方人才与技术：为了实现这一点，我们必须#B 不拘泥于单单技术的进步#!，而是#V 在体制上对日本的经济根基进行彻底的重塑#!。"
 finish_meiji_restoration_mil_je_tt:0 "完成了#V 御一新：富国强兵#![concept_journal_entry]"
 meiji_restoration_law:0 "维新：废藩置县"
 meiji_restoration_law_reason:0 "#V 日本的大名制度#!自#V 平安时代#!后期以来已有近千年之久：各地藩主虽名义上听命于[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的[concept_government]，但实则#B 各拥武力，征税自理，几乎相当于地方上的土皇帝#!，连[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]由各藩主自己派兵组成。\n\n这种#V 等同于割据的体制#!根本无法支撑一个现代化[ROOT.GetCountry.GetName]的治理需要：我们必须彻底废除这些#V 幕藩体制的残余#!，建立一个府藩县三治一致的全国一致政体，#B 实现中央集权，这样[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的旨意才能够传遍四方#!。"
 meiji_restoration_lad:0 "维新：士族授产"
 meiji_restoration_lad_reason:0 "数百年来，[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]一直作为#B 国家最为尊贵的阶层#!传承着庞大的家业和特权；然而随着#V 幕府统治的结束#!，这些人表面上仍然保留的#B 尊贵地位和高昂俸禄#!就成为了维新政府最尴尬的地方。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的[concept_government]不可能再#B 继续无条件供养着这群米虫#!，坐视着他们继续对自己治下的#v $slaves$#!和#v $peasants$#!们任意施为：我们必须设法结束他们的#V 特权地位#!，#B 以其他的方式提供资金补偿来替代幕府时期的俸禄，好让他们#!#V 为新政府的支持者们让位#!。"
 meiji_restoration_ray:0 "维新：建立铁路"
 meiji_restoration_ray_reason:0 "从江户到大坂，过去的旅人需舟车劳顿数日。不过随着#V 技术的发展#!，我们前往欧洲的考察团发现#B 西方[concept_great_power]的国内已经铺满了互相连接的铁路#!，使得物资的运输极为便捷：#V 货物日行百里，军队一夕南北#!，#B 极大改变了他们的整个社会#!。\n\n如果#B [ROOT.GetCountry.GetName]也想要在经济上取得和#!#V 世界强国们的同等地位#!，那么也就必须建立一条#B 横贯国土的铁路网#!，将各府县从过去的互不关联改造为一个#V 一体连通的现代[concept_country]#!的紧密部分。"
