 kenseiyougoundo_movement:0 "护宪运动"
 kenseiyougoundo_movement_reason:0 "#V 护宪支持度#!会随着进步主义势力，自由法律而提升；并随着保守主义势力，军队势力，专制和审查法律而降低。\n\n许多人曾经乐观的认为在[ROOT.GetCountry.GetRuler.GetFirstName]的光辉下[ROOT.GetCountry.GetName]将会迎来一个#B 自由与民主的时代#!，但现在的局势打破了他们的幻想：#B 一伙受到了[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]支持的#v $officers$#!违反了#V 日本帝国宪法#!#!，#N 发动了武装政变#!解散了上一届[concept_election]产生的#V 合法内阁#!，推举出了一个#N 军部内阁#!并#B 以“紧急状态”的名义接管了神圣的帝国议会#!，公开操纵[concept_government]为[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的利益而服务。\n\n#B [ROOT.GetCountry.GetName]宪法正在遭受最野蛮的践踏#!，社会各界反对政变#v $officers$#!的游行示威层出不穷；#B 数个民主政党的领袖已经向[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下发起了请愿，希望他行使宪法授予的权力，发布圣旨解散#N 军部内阁#!并重新召开[concept_election]。#!"
