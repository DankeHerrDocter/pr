 shogunate_restoration:0 "[ROOT.GetCountry.GetRuler.GetLastName]新政"
 shogunate_restoration_reason:0 "经过了一段漫长的动荡时期，伟大的[ROOT.GetCountry.GetRuler.GetLastName]家和[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]阁下再次证明了对[ROOT.GetCountry.GetName]统治的稳固：尽管那群自称“维新志士”的逆贼试图要挟天皇把国家变成西洋人的傀儡，但他们的邪恶意图最终未能实现，光荣的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]最终重新收复了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]城。\n\n尽管[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]如今已经恢复了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的秩序，使得天下安定，但世势无常，如今局势变化亦是极大：彼之西洋[concept_great_power]虎视眈眈，商舶频来，洋枪洋炮远胜我国；若不因时制宜、革故鼎新，则百姓之困苦日甚一日，[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]之权威亦难保万年不替。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和大臣们已经达成共识：我们必须整顿武士之风，厘定藩属之责，尝试兴办洋务，以期保住我国之纲常名教，使得[ROOT.GetCountry.GetName]免于辱没。"
