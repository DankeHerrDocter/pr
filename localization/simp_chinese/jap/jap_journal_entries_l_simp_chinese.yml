 give_back_peiking_tt:0 "我们将归还占领的北京和蒙古省份给中国。"
 jap_conqueror_taiwan:0 "征服台湾"
 jap_conqueror_taiwan_reason:0 "台湾对于[ROOT.GetCountry.GetName]在南方海域的战略地位有着重要的价值。通过控制这座岛屿，我们不仅能获得丰富的资源，还能取得一个继续进军太平洋诸岛的有利基地。\n\n[SCOPE.sCountry('CHI_scope').GetName]正面临着自身统治地位的巨大衰弱，我们必须抓住这个千载难逢的时机，从他们的手中获得这座宝岛，巩固[ROOT.GetCountry.GetName]在东亚的权力地位。"
