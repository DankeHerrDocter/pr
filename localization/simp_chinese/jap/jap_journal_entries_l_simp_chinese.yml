 edo_period:0 "江户时代"
 edo_period_reason:0 "#V 倒幕派进度#!#B 会随着进步主义势力，对外开放和[concept_revolution]胜利而提升#!。\n#V 佐幕派进度#!#B 会随着反动主义势力，锁国政策和[concept_revolution]失败而提升#!。\n\n自#B 首任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#!#V 德川家康#!在#V 关原之战#!的胜利后称霸全国并#B 带领日本进入#V 江户时代#!以来#!，[ROOT.GetCountry.GetName]已有二百余年未闻大乱：忠诚于[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的#B 藩主大名#!代表朝廷治理着日本各地，#B 公家和武家#!的法度森严，社会各阶层上下分明，士农工商各司其职，百姓安分守道，使得天下虽不至富强，却也太平久矣。\n\n然而随着#V 天保四年大饥荒#!的不断蔓延，天下大地哀鸿遍野，使得百年累积遭受重创；#B 西洋势力和外国商船的不时来访#!也正在打击[ROOT.GetCountry.GetRuler.GetLastName]幕府赖以维持权威的#V 锁国政策#!，导致#B [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]中央的统治力不断衰微#!，百姓怨声载道，藩人议论纷纷，似乎[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]对[ROOT.GetCountry.GetName]统治正在#B 摇摇欲坠#!。\n\n#B 日本的江户时代持续了超过两百年，[ROOT.GetCountry.GetRuler.GetLastName]幕府的统治还能再持续另一个两百年吗？#!"
