 bansei_ikkei:0 "万世一系"
 bansei_ikkei_reason:0 "#V #P 天照大神的直系后裔，现代人世间的神明化身，神圣不可侵犯的[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!#!#V #B 是现任[ROOT.GetCountry.GetName]的君主#!#!。\n\n[ROOT.GetCountry.GetName]的[GetLawType('law_monarchy').GetName]历史哪怕在世界各国的历史中，也#B 堪称是最为源远流长的历史之一#!：自#V 神武天皇#!陛下发起东征，统一奈良盆地并#B 御极大和诸岛以来#!，他的子孙后代就一直统治着这个#V 伟大的日出之国#!：在大化改革后的#B 天武天皇时代#!，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下承天命而育民众，施政以德，居天下之中而不动摇，带来了[ROOT.GetCountry.GetName]的一段繁荣时期。然而，在随后的#V 平安时代#!中#B 清和天皇#!陛下由于年龄的幼小而不得不将权力交由摄政大臣代理，并在#V 镰仓时代#!之后形成了#B 幕府制度#!，以幕府大将军作为政府领袖。\n\n然而，随着#B 德川幕府的终结和[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在#V 御一新#!中的亲政#!，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]作为名义[concept_ruler]的时期业已结束；#V 日本帝国宪法#!#B 重新将神圣的权力和荣耀归还给了[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!，使得[ROOT.GetCountry.GetName]在御一新之后重新实现了文明开化，#B 成为了世界舞台的一极。#!\n\n#B 皇国之道，根于忠孝；万民之志，归于君上#!：[GetLawType('law_monarchy').GetName]对于大和民族的所有人而言都具有特殊的意义，#B [ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下所展示的高雅典范亦足为万国之楷模，必将延续万世，正如我们的国歌所唱：#!\n\n#V 我皇御统传千代，万世不变兮悠长；直到小石变巨岩，更岩生绿苔之祥！#!"
 bansei_ikkei_status:0 "#B #V #I 现任天皇的年号是[ROOT.GetCountry.GetRuler.GetFirstName]#!#!#!"
