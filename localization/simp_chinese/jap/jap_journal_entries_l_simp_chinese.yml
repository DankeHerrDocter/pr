 japanese_sanbo_honbu:0 "参谋本部"
 japanese_sanbo_honbu_reason:0 "#V 参谋本部#!是[ROOT.GetCountry.GetName]在维新后学习#V 普鲁士总参谋部#!而建立的军事中枢机构，肩负着#bold 统筹全军，制定计划#!的重任，它的存在本身就标志着我国在#V 御一新#!中取得的最大成就之一：将指挥系统成功的#B 从诸藩割据的封建制度转变为了高度现代化的统一[concept_war]机器。#!\n\n作为[ROOT.GetCountry.GetName]的最高指挥机关，参谋本部下辖作战、情报、运输和动员等各大下级部门，其参谋官员多为#B 陆军大学出身或海外留学归来的精英军官#!，对现代军队的运转有着充分的理解，同时也#B 兼具日本传统的#!#V 武士道精神#!；他们既负责战时的[concept_mobilize_army]和计划调度，也负责平时的战略规划、军制研究与战史整理。\n\n然而，[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]内部的权力格局并非铁板一块：#bold 陆军出身的将官常自诩为国家根本，拥护中央集权、主张大陆战略；而海军将领则多以文明开化为旗帜，倚重英式训练与舰政本位，主张扩展海权、保障通商。#!\n\n在这个各国都在迅速进步并扩充自身[concept_war]机器的年代，#variable 参谋本部#!必须及时调解这一矛盾，#B 确保我们的军队能够在[concept_war]时期达成充分的合作#!。"
