 anglo_japanese_alliance_1_button:0 "续签同盟条约"
 anglo_japanese_alliance_1_button_desc:0 "同盟条约是我们互相维持亚洲利益的重要外交联盟，但目前正面临着到期的问题：我们双方必须进行磋商，维护这个重要的联盟。"
 anglo_japanese_alliance_2_button:0 "续签同盟条约"
 anglo_japanese_alliance_2_button_desc:0 "同盟条约是我们互相维持亚洲利益的重要外交联盟，但目前正面临着到期的问题：我们双方必须进行磋商，维护这个重要的联盟。"
 anglo_japanese_alliance_3_button:0 "租借日本军港"
 anglo_japanese_alliance_3_button_desc:0 "尽管我们在亚洲有着不少军事据点和港口，但日本位置优良且补给充足的港口却仍然可以支持我们在远东和太平洋的任何军事行动：通过同盟条约，相信我们能够在港口租用上取得他们的谅解。"
 anglo_japanese_alliance_4_button:0 "租借英国军港"
 anglo_japanese_alliance_4_button_desc:0 "英国是一个老牌的全球帝国，通过他们的军事据点和港口帝国的军队将可以轻松地在世界上的任意一个地方展开行动而不受补给的困扰：通过同盟条约，相信我们能够在港口租用上取得他们的谅解。"
 anglo_japanese_alliance_5_button:0 "退出英日同盟"
 anglo_japanese_alliance_5_button_desc:0 "英日同盟的条款以现在的局势而论对我国已经没有任何益处，甚至妨碍了我国在亚洲和太平洋地区利益的持续扩张：知会对方，我们将在条约到期后退出这个联盟。"
 never_leave_anglo_japanese_alliance_tt:0 "尚未有任何一方退出同盟"
 anglo_japanese_alliance_5_button_tt:0 "我们将退出同盟，从双方移除#V 英日同盟#!日志。"
 #征服朝鲜
 seikanron_conqueror_korea:0 "征韩论"
 seikanron_conqueror_korea_reason:0 "随着我国逐渐实现了文明开化，[ROOT.GetCountry.GetName]内部逐渐出现了#B 对外扩张的呼声#!；在众多目标之中，[SCOPE.sCountry('KOR_scope').GetName]这个近在咫尺的邻国就成为了最常被提及的焦点。\n\n#V 朝鲜半岛#!地处东亚的枢纽，自古以来即与我邦文化相通；然而如今的[SCOPE.sCountry('KOR_scope').GetName]却依旧墨守旧制，闭关自守，面对世界潮流无动于衷，#B 反复拒绝伟大的[ROOT.GetCountry.GetName]派遣的使节与友好互通的建议，甚至无礼相待#!；#B 这不仅被许多[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的领导者视为#V 外交羞辱#!#!，更有主张积极进取的一些#v $officers$#!直接向[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下建议，#B 发动一场快速的军事行动，洗刷我们在万历时代失败的耻辱，终结[SCOPE.sCountry('CHI_scope').GetName]对[SCOPE.sCountry('KOR_scope').GetName]的非法宗主权，并将其转移给我们的国家。#!"
