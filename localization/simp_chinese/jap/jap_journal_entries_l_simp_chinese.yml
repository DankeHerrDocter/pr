 shogunate_restoration_mil:0 "新政：改革武士"
 shogunate_restoration_mil_reason:0 "[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]曾是[ROOT.GetCountry.GetName]的柱石，是我幕府赖以立国的铁壁长城；自家和[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]赖以称霸的关原之战以降，武士之道就被铭刻在武家的法度之中，帮助公家维持了数百年的太平盛世。\n\n然而，#V 数百年的太平#!早已磨钝了他们的刀刃，使他们忘记了[concept_war]之道，只知抱残守缺，仰赖公家幕府授予的特权，#V 根本无法继续旅行保卫主君的责任#!；[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]若仍依赖这一阶层维持幕府的统治，那几乎无异于抱薪救火。\n\n我们必须对[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]施行全面的改革，将他们从习奢而废训的陋习中拔出出来，恢复过去的武士之义。"
 shogunate_restoration_adm:0 "新政：版籍革令"
 shogunate_restoration_adm_reason:0 "自[ROOT.GetCountry.GetName]公家[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]肇建以来就#B 天下分封于诸侯大名，各藩奉法而治，各尽其责#!，这种被称为#V 幕藩体制#!的封建制度虽然维持了数百年的安宁，但业已不再符合现行#V 中央集权#!的需要；同时，#B 许多贫穷的藩主也已经向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]发出请愿，希望以他们的藩地为代价换取一份稳定的俸禄。#!\n\n为了中兴国本，巩固公家与武家的统治，#B 我们必须改革现有的幕藩体制和版籍制度，将权力收归[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的朝廷。#!"
 remove_all_edo_local_daimyo_tt:0 "所有省份的#V 地方大名#!修正将被移除。"
 shogunate_restoration_gov:0 "新政：维护幕藩"
 shogunate_restoration_gov_reason:0 "尽管如今的[ROOT.GetCountry.GetName]需要实现中央集权，但#V 幕藩体制#!仍然是#B 公家和武家赖以维系天下的关键，不可轻易动摇#!；各地诸侯藩主世代为国效命，强行尽除其权未免伤及士族之心。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]计划#B 保留诸侯家名与家禄，允其世袭封号和特殊地位，以表彰他们对国家的功勋#!；并#V 保留特定藩主领军之职权#!以负责抵御外夷的侵扰，#B 使得天下大名仍得延续其家传之名望，又不伤及[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]朝廷的集权与统一。#!"
 shogunate_restoration_gov_tt:0 "维持[GetLawType('law_oligarchy').GetName]或[GetLawType('law_autocracy').GetName]法律，持续10年。"
