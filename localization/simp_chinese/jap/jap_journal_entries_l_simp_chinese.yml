 #满洲台湾
 jap_conqueror_manchuria:0 "征服满洲"
 jap_conqueror_manchuria_reason:0 "昔日的[SCOPE.sCountry('CHI_scope').GetName]皇族正是从这片白山黑水之间的满洲土地上崛起，逐鹿中原，最终成就了横跨万里的大帝国。然而，#B 时至今日，曾经有着重要地位的满洲已非昔日的龙兴之地#!：政局凋敝，军队不力，列强环伺，百姓苦于战乱与饥馑之间，连带着统治这片地方的国家也处于剧烈的内部危机之中。\n\n同时，在[concept_government]的#v $bureaucrats$#!与#v $officers$#!眼中，#B 满洲不仅是地理上的边陲#!，更是#B 战略与资源的重心所在#!：它幅员辽阔，连接中原大地，蒙古与朝鲜；据说还蕴藏着丰富的的煤炭，铁矿，森林与黑土地，可以为我国提供工业与军备扩充的优质资源基础。\n\n[SCOPE.sCountry('RUS_scope').GetName]已经先下手为强从东亚夺走了许多利益，我们绝不能再落于人后，必须乘着[SCOPE.sCountry('CHI_scope').GetName]内部动乱的机会夺取这片有着重要价值的土地，并将其打造为大和民族的新家乡和对中原的前进基地。"
