 #工业化
 japan_industrialize:0 "日本列岛工业化"
 japan_industrialize_reason:0 "自#V 御一新#!以来[ROOT.GetCountry.GetName]已经成功进入了现代化的时代：#B 列岛的对外贸易带来了大量资源和技术，引进自西洋的机械动力正改变着工坊的面貌；新式工厂则在关东、关西、九州甚至北海道相继落成。#!\n\n然而，随着世界上其他[concept_great_power]的#V 工业化#!进程继续迅速推进，我们仍然#B 距离[concept_great_power]的经济水平相距甚远#!：为了使我国的工业水平迅速达到世界先进水准，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的[concept_government]已经批准了一项庞大的投资计划，我们将以[concept_government]为主导将整个列岛打造出一套#B 连贯互通且区域分工的强大工业体系，以保证[ROOT.GetCountry.GetName]不会在这场世界工业竞赛中落于人后。#!"
 japan_industrialize_status:0 "在本土建成连续的庞大工业区"
 japan_industrialize_possible_1_tt:0 "完成了#V 殖产兴业#![concept_journal_entry]"
 manchuria_industrialize:0 "满洲工业化"
 manchuria_industrialize_reason:0 "随着[ROOT.GetCountry.GetName]的国力日盛，我们工业开发的视线绝不应该继续局限于本土的领地：#bold #V 满洲#!这片辽阔而富饶的土地#!理应我们纳入国家工业体系的长远规划中。\n\n自[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]成功征服了满洲的土地以来，这里就被视作我们在#B 东亚的新家乡和继续进攻[SCOPE.sCountry('CHI_scope').GetName]的优秀前进基地#!，然而着这毫无疑问#B 需要来自本土的投资#!。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经批准了在满洲建立工业基地的提案，我们将#B 有计划地向满洲输送[concept_migration]，将广大的黑土地建成[ROOT.GetCountry.GetName]在东亚帝国的坚实骨骼。#!"
 russia_finish_vladivostok_tt:0 "完成了#V 符拉迪沃斯托克城建#![concept_journal_entry]"
 manchuria_industrialize_status:0 "将满洲建设为我们在中国的前进性工业基地"
 tohoku_industrialize:0 "东北军工建设"
 tohoku_industrialize_reason:0 "在[ROOT.GetCountry.GetName]的工业化过程中，东京与关西一带长期占据着资源与资本的集中优势，而#V 东北地方#!则始终作为#B “边缘地带”#!而被忽视；然而随着[concept_war]的阴云逐渐开始笼罩在帝国的头上，[concept_government]才发现了许多#B 东北地方在军工安全上的独特优势。#!\n\n#V 东北地方#!地广人稀，山区众多，与朝鲜海峡相隔不远，又靠近我们与太平洋其他强国的交战前线；为此，[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant]已经推动内阁批准了一项对东北的#B 全面军事开发计划#!。\n\n武器厂，火炮厂和弹药厂正在被规划，造船厂也开始从江户和长崎迁移到东北的港口；相信在[concept_government]的扶持下，#B 东北地方将成为[ROOT.GetCountry.GetName]乃至于世界军事工业的最大产区。#!"
 tohoku_industrialize_possible_tt:0 "完成了#V 日本列岛工业化#![concept_journal_entry]"
 manchuria_railway_bureau:0 "满洲铁路局"
 manchuria_railway_bureau_reason:0 "#V 满洲铁路局#!是[ROOT.GetCountry.GetName]政府为#B 管理，经营和开发满洲地区铁路而设立的官方机构#!，兼具#B 铁路管理机关、商业开发企业与军事后勤枢纽#!三重职能，其地位可谓前所未有，甚至被欧洲的一些好事者称为#V “远东的东印度公司”#!。\n\n自满洲实现工业化以来那里复杂的#V 铁路网络#!就急需统筹规划与一体化运作：为此，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]下令组建了#V 满洲铁路局#!，并授权其#B 接管自旅顺到黑龙江的所有铁路线，扩建支线与军事站点，管理沿线土地、矿山、港口与仓储设施#!。\n\n尽管#V 满洲铁道局#!在目前仍然在为我国[concept_government]创造着丰富的利润的收益，但它就如同任何[concept_government]主导的大型企业一样正面临着#B 治理效率低下和贪污腐败的问题#!；然而无法否认的是，#B 它确实也使得满洲成为了[ROOT.GetCountry.GetName]产业版图中不可或缺的一环#!。"
 #联合舰队
 combined_fleet_shipbuilding_plan:0 "联合舰队造舰计划"
 combined_fleet_shipbuilding_plan_reason:0 "自#V 御一新#!以来[ROOT.GetCountry.GetName]就立志建设一支能与西方[concept_great_power]比肩的#V 现代海军#!。如今随着#B 工业化进程的完成和帝国海外利益的不断扩张#!，#B 建设一只强大的舰队已经提上了日程#!。\n\n在一批优秀的海军#v $officers$#!的帮助下，[concept_government]已经参考欧洲诸如皇家海军的强大[concept_fleet]，制定了一个#B 以三支战列舰队为骨干，辅以巡洋舰、驱逐舰与补给舰来打造一支具备远洋作战、岛链封锁与制海权夺取能力的现代[concept_fleet]#!的恢弘计划，整个国家也将在接下来的数年里#B 为这项工程倾尽所能#!。\n\n#B 为了[ROOT.GetCountry.GetName]的海外利益，我们的海军力量必须能够与世界上那些最[concept_powerful][concept_fleet]相提并论！#!"
 combined_fleet_shipbuilding_plan_complete_tt:0 "我国的海军规模必须至少不低于俄罗斯，且大于中国。"
