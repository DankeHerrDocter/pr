 meiji_boshin_war:0 "王政复古"
 meiji_boshin_war_reason:0 "#V 幕府势力#!#B 会随着进步主义势力与忠诚的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]而降低，并随着保守主义势力而提升。#!\n\n自[ROOT.GetCountry.GetRuler.GetFirstName]#V [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]亲政以来#!，[ROOT.GetCountry.GetName]上下一直在尝试构建一套融合旧制与新政的体制，以期在不动摇根本的前提下完成维新：然而，#B 曾经控制着全国的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]和其分散在各藩国的支持者们并不打算轻易交出手中的权力。#!\n\n[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]与[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]中忠于#V 幕府大将军#!的反对者正在结成新的同盟，#B 联络全国各地的旧藩势力#!，试图#V 以武力推翻[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]领导的维新政府#!。\n\n#B 我们必须迅速巩固自己的势力，建立足够的武力来防备[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]#!#V 随时可能到来的复辟尝试。#!"
