l_simp_chinese:
 concept_lander_der_krone: "王冠领地"
 concept_lander_der_krone_desc: "$concept_lander_der_krone$是只效忠于共同[concept_ruler]和王室的自治领地，拥有各自的立法机关，并有权在王室许可下对地方事务进行立法。$concept_lander_der_krone$与宗主国没有法理上的联系，仅仅由共同的[GetLawType('law_monarchy').GetName]王位关系联系在一起。$concept_lander_der_krone$没有外交自主权，不能发起自己的[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]，会强制加入[Concept('concept_overlord','$concept_overlord_possessive$')]的[Concept('concept_war','$concept_wars$')]。他们必须每周向$concept_overlord$支付[concept_treasury]收入的#v 50%#!。该关系将在$concept_overlord$结束[GetLawType('law_monarchy').GetName]后自动取消。"
 #
 concept_british_dominion: "英属自治领"
 concept_british_dominion_desc: "$concept_british_dominion$是大英帝国自治方案下适用其海外领地的独特体制，$concept_british_dominion$相比$concept_puppet$拥有更大的自主权，但是相比$concept_dominion$与宗主国的联系更紧密。$concept_british_dominion$可以发起自己的[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]，会强制加入[Concept('concept_overlord','$concept_overlord_possessive$')]的[Concept('concept_war','$concept_wars$')]，并且效忠于宗主国的[concept_ruler]。他们必须每周向$concept_overlord$支付[concept_treasury]收入的#v 20%#!。"
 #
 concept_commonwealth_realm: "英联邦王国"
 concept_commonwealth_realm_desc: "$concept_commonwealth_realm$是英联邦内自愿加入[GetLawType('law_monarchy').GetName]共主联邦的主权国家，其君主和国家[concept_ruler]均由英国君主担任，并由总督代表。$concept_commonwealth_realm$和任何国家均地位平等，拥有和独立国家相同的所有权利，不受国际地位限制，无需向$concept_overlord$支付收入，且不会强制加入[Concept('concept_overlord','$concept_overlord_possessive$')]的[Concept('concept_war','$concept_wars$')]。该关系将在$concept_overlord$结束[GetLawType('law_monarchy').GetName]后自动取消。"
 #
 concept_franco_state: "卫戍国"
 concept_franco_state_desc: "$concept_franco_state$是法兰西帝国在欧洲的权力延伸，波拿巴家族的领袖担任其保护者，担负着帝国在其治下地区的军事义务。$concept_franco_state$可以发起自己的[Concept('concept_diplomatic_play','$concept_diplomatic_plays$')]，会强制加入[Concept('concept_overlord','$concept_overlord_possessive$')]的[Concept('concept_war','$concept_wars$')]，他们必须每周向$concept_overlord$支付[concept_treasury]收入的#v 30%#!。该关系将在$concept_overlord$结束[GetLawType('law_monarchy').GetName]后自动取消。"
 #英国党派
 concept_westminster_england: "英格兰议员"
 concept_westminster_england_desc: "英格兰是下议院的核心与权力中枢，自中世纪以来一直在威斯敏斯特主持全国事务，通常情况下英格兰的议员们代表着联合王国的大部分人口，并促使政府优先推动英格兰的利益。"
 concept_westminster_wales: "威尔士议员"
 concept_westminster_wales_desc: "威尔士在16世纪的威尔士法令中就被并入了威斯敏斯特，然而它的席位直到1832年改革法令才被明确分配。虽然席位数量有限，但在许多议题上它仍然在下议院具备影响力。"
 concept_westminster_scotland: "苏格兰议员"
 concept_westminster_scotland_desc: "苏格兰议会在1707年联合法案后被并入威斯敏斯特。尽管它的议员数量通常少于英格兰，但仍然是下议院中举足轻重的一部分。"
 concept_westminster_ireland: "爱尔兰议员"
 concept_westminster_ireland_desc: "自1801年的联合法案爱尔兰议会被并入威斯敏斯特起，爱尔兰就获得了固定的保底席位。然而爱尔兰的议员们通常因为土地、宗教与自治等问题而与下议院的多数议员们有着分歧。"
 concept_indian_subcontinent: "印度次大陆"
 concept_indian_subcontinent_short: "次大陆"
 concept_indian_subcontinent_desc: "$concept_indian_subcontinent$是亚洲在喜马拉雅山脉以下的一个[concept_georegion]，有时被简称为$concept_indian_subcontinent_short$。它南至印度洋，东临孟加拉湾，西临阿拉伯海。$concept_indian_subcontinent_short$拥有多个[concept_state_region]：（[GetStateRegion('STATE_BOMBAY').GetName]和[GetStateRegion('STATE_MADRAS').GetName]中由非印度国家拥有的海岸[concept_province]不会被计入必须拥有的$concept_indian_subcontinent_short$范围。）\n\n#B 东印度#!：\n[GetStateRegion('STATE_BIHAR').GetName]，[GetStateRegion('STATE_ORISSA').GetName]，[GetStateRegion('STATE_WEST_BENGAL').GetName]，[GetStateRegion('STATE_EAST_BENGAL').GetName]和[GetStateRegion('STATE_ASSAM').GetName]。\n\n#B 南印度#!：\n[GetStateRegion('STATE_BOMBAY').GetName]，[GetStateRegion('STATE_HYDERABAD').GetName]，[GetStateRegion('STATE_CIRCARS').GetName]，[GetStateRegion('STATE_KURNOOL').GetName]，[GetStateRegion('STATE_MYSORE').GetName]，[GetStateRegion('STATE_TRAVANCORE').GetName]，[GetStateRegion('STATE_MADRAS').GetName]和[GetStateRegion('STATE_CEYLON').GetName]。\n\n#B 西印度#!：\n[GetStateRegion('STATE_GUJARAT').GetName]，[GetStateRegion('STATE_SINDH').GetName]和[GetStateRegion('STATE_BALUCHISTAN').GetName]。\n\n#B 中印度#!：\n[GetStateRegion('STATE_AWADH').GetName]，[GetStateRegion('STATE_CENTRAL_PROVINCES').GetName]，[GetStateRegion('STATE_BUNDELKHAND').GetName]，[GetStateRegion('STATE_AGRA').GetName]，[GetStateRegion('STATE_DELHI').GetName]，[GetStateRegion('STATE_MALWA').GetName]和[GetStateRegion('STATE_RAJPUTANA').GetName]。\n\n#B 北印度#!：\n[GetStateRegion('STATE_PUNJAB').GetName]，[GetStateRegion('STATE_HILL_PUNJAB').GetName]，[GetStateRegion('STATE_KASHMIR').GetName]，[GetStateRegion('STATE_PASHTUNISTAN').GetName]和[GetStateRegion('STATE_QUETTA').GetName]。\n\n#B 缅甸#!：\n[GetStateRegion('STATE_ARAKAN').GetName]，[GetStateRegion('STATE_PEGU').GetName]，[GetStateRegion('STATE_MANDALAY').GetName]，[GetStateRegion('STATE_KACHIN').GetName]和[GetStateRegion('STATE_SHAN_STATES').GetName]。"
 #
 concept_yellow_river_flood_area: "黄泛区"
 concept_yellow_river_flood_area_desc: "黄泛区泛指黄河改道之后受影响的地区，通常是受直接影响的#yellow 河南#!，#yellow 山东#!和#yellow 安徽北部#!与受高水位间接影响的#yellow 江苏#!。除了#yellow 江苏#!以外处于黄泛区的省份将在黄河泛滥时期遭受严重的负面影响，但也可能随着黄河治理的进度而获得[concept_arable_land]。"
 #
 concept_caretaker_government: "看守政府"
 concept_caretaker_government_desc: "看守政府是一种[concept_election]期间的临时性[concept_government]，在新政府组建之前暂时维持[concept_government]运转。由于缺乏行使立法职能的合法[concept_election]授权，看守政府通常权力有限，仅负责维持现状，而非真正治理[concept_country]或制定新的[concept_law]。"
 #土鸡
 concept_sublime_court_dissatisfaction: "宫廷不满度"
 concept_sublime_court_dissatisfaction_short: "不满度"
 concept_sublime_court_dissatisfaction_desc: "$concept_sublime_court_dissatisfaction$代表了对$RULER_TITLE_PADISAH$（[concept_ruler]）感到不满并试图推翻他的各种阴谋的进度。$concept_sublime_court_dissatisfaction_short$可在#Y $tur_sublime_porte$#![concept_journal_entry]中进行追踪。\n\n如果$concept_sublime_court_dissatisfaction_short$达到了#v 100%#!，$RULER_TITLE_PADISAH$（$concept_ruler$）将被政变逼迫退位，[concept_sublime_porte_authority]#bold 重置#!为#v 0#!，$concept_sublime_court_dissatisfaction_short$降低，一位新候选人登基。\n\n#title 以下条件#g #b 降低#!#!$concept_sublime_court_dissatisfaction$：#!#indent_newline:3 \n•$RULER_TITLE_PADISAH$（[concept_ruler]）是#yellow 马哈茂德二世#!\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]拥有[GetCharacterTrait('special_prince_governor').GetName][concept_character_trait]\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]拥有[GetCharacterTrait('special_ottoman_fatih').GetName][concept_character_trait]\n•拥有[GetCharacterTrait('experienced_political_operator').GetName]或[GetCharacterTrait('expert_political_operator').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•拥有[GetCharacterTrait('celebrity_commander').GetName]，[GetCharacterTrait('expert_offensive_planner').GetName]或[GetCharacterTrait('master_bureaucrat').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]高于#G 5#!\n•[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]高于#G 5#!\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_powerful]\n•[concept_legitimacy]#G 至少90#!\n•[concept_sublime_porte_authority]达到#G 500#!\n•事件和其他效果#!\n\n#title 以下条件#r #b 提高#!#!$concept_sublime_court_dissatisfaction$：#!#indent_newline:3 \n•拥有[GetCharacterTrait('reckless').GetName]，[GetCharacterTrait('bigoted').GetName]或[GetCharacterTrait('cruel').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•拥有[GetCharacterTrait('trait_child').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•拥有[GetCharacterTrait('alcoholic').GetName]，[GetCharacterTrait('opium_addiction').GetName]或[GetCharacterTrait('expensive_tastes').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•[concept_ruler][concept_popularity]较低\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]低于#R 0#!\n•[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]低于#R -5#!\n•[GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]低于#R -5#!\n•[GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_marginalized]化\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_marginalized]化\n•[concept_sublime_porte_authority]低于#R 300#!\n•[concept_legitimacy]#R 低于50#!\n•事件和其他效果#!"
 concept_sublime_porte_authority: "高门权威"
 concept_sublime_porte_authority_short: "权威"
 concept_sublime_porte_authority_desc: "$concept_sublime_porte_authority$代表了$RULER_TITLE_PADISAH$（[concept_ruler]）的力量。[Concept('concept_sublime_porte_authority','$concept_sublime_porte_authority_short$')]可在#Y $tur_sublime_porte$#![concept_journal_entry]中进行追踪。\n\n合法性必须高于#v 50#!$concept_sublime_porte_authority_short$才能提高。如果[concept_sublime_court_dissatisfaction]达到#v 100%#!，$RULER_TITLE_PADISAH$（[concept_ruler]）将被政变逼迫退位，$concept_sublime_porte_authority_short$#bold 重置#!为#v 0#!，$concept_sublime_court_dissatisfaction_short$降低，$RULER_TITLE_SEHZADE$（[concept_heir]）将登基。\n\n#title 以下条件#g #b 提高#!#!$concept_sublime_porte_authority$：#!#indent_newline:3 \n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]拥有[GetCharacterTrait('special_prince_governor').GetName][concept_character_trait]\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]拥有[GetCharacterTrait('special_ottoman_fatih').GetName][concept_character_trait]\n•拥有[GetCharacterTrait('experienced_political_operator').GetName]或[GetCharacterTrait('expert_political_operator').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•拥有[GetCharacterTrait('celebrity_commander').GetName]，[GetCharacterTrait('expert_offensive_planner').GetName]或[GetCharacterTrait('master_bureaucrat').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_in_government]\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_powerful]且[concept_approval]至少为#G 5#!\n•[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_in_government]且[concept_approval]至少为#G 5#!\n•[GetReligion('sunni').GetName]是[concept_state_religion]且已[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_millet_system').GetName][concept_law]\n•已[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_professional_army').GetName]或[GetLawType('law_mass_conscription').GetName][concept_law]\n•已[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_autocracy').GetName][concept_law]且[concept_legitimacy]#G 至少90#!\n•[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]是继承顺位中最正统的\n•事件和其他效果#!\n\n#title 以下条件#r #b 降低#!#!$concept_sublime_porte_authority$：#!#indent_newline:3 \n•拥有[GetCharacterTrait('trait_child').GetName][Concept('concept_ruler','$RULER_TITLE_PADISAH$')]\n•未[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_subjecthood').GetName]或[GetLawType('law_ethnostate').GetName][concept_law]\n•未[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_outlawed_dissent').GetName]或[GetLawType('law_censorship').GetName][concept_law]\n•[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant][concept_interest_group][concept_approval]低于#R -5#!\n•[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant][concept_interest_group]未[concept_in_government]\n•已[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_autocracy').GetName][concept_law]且[concept_legitimacy]#R 低于75#!\n•已[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_autocracy').GetName][concept_law]且[concept_legitimacy]#R 低于50#!\n•未[Concept('concept_enactment_of_laws','$concept_enactment_of_laws_enacted$')][GetLawType('law_autocracy').GetName][concept_law]且[concept_legitimacy]#R 低于30#!\n•[concept_sublime_court_dissatisfaction]达到#R 200#!\n•[concept_sublime_court_dissatisfaction]达到#R 400#!\n•事件和其他效果#!"
 concept_unruly_arabs_progress: "阿拉伯民族热情"
 concept_unruly_arabs_progress_short: "民族热情"
 concept_unruly_arabs_progress_desc: "$concept_unruly_arabs_progress$代表了$dyn_c_ottoman_empire$治下阿拉伯民族主义的团结度和凝聚力。如果$concept_unruly_arabs_progress$达到500，阿拉伯大起义就将爆发，目标是推翻$dyn_c_ottoman_empire$的在阿拉伯半岛的统治。[Concept('concept_unruly_arabs_progress','$concept_unruly_arabs_progress_short$')]可在#b $the_unruly_arabs$#![concept_journal_entry]中进行追踪。\n\n#title 以下条件会#r #b 提高#!#!$concept_unruly_arabs_progress$：#!#indent_newline:3 \n•$dyn_c_ottoman_empire$的[concept_legitimacy]低于#v 50#!\n•$dyn_c_ottoman_empire$处于[concept_war]\n•$dyn_c_ottoman_empire$#r #b 有#!#!任何发展中的[Concept('concept_secession','$concept_secessionist$')][Concept('concept_political_movement','$concept_political_movements$')]\n•[GetCulture('bedouin').GetName][concept_culture]的[concept_fervor]高于等于50和75\n•[GetCulture('mashriqi').GetName][concept_culture]的[concept_fervor]高于等于50和75\n•境外[concept_great_power]或其他阿拉伯国家的支持\n•完成了#b $caliph_and_ummah$#![concept_journal_entry]\n•$dyn_c_ottoman_empire$国际地位低于[concept_great_power]\n•$dyn_c_ottoman_empire$控制的[GetStrategicRegion('region_arabia').GetName]地块至少为50%，70%和90%\n•事件，按钮与其他效果\n\n#title 以下条件会#g #b 降低#!#!$concept_unruly_arabs_progress$：#!#indent_newline:3 \n•$dyn_c_ottoman_empire$的[concept_legitimacy]高于等于#v 90#!\n•[GetCulture('bedouin').GetName][concept_culture]的[concept_fervor]低于等于25\n•[GetCulture('mashriqi').GetName][concept_culture]的[concept_fervor]低于等于25\n•完成了#b $great_ottomanism$#![concept_journal_entry]\n•完成了#b $ottoman_conquest$#![concept_journal_entry]\n•完成了#b $hejaz_railway$#![concept_journal_entry]\n•$dyn_c_ottoman_empire$国际地位至少为[concept_great_power]\n•$dyn_c_ottoman_empire$控制的[GetStrategicRegion('region_arabia').GetName]地块不高于33%\n•事件，按钮与其他效果"
 concept_unruly_arabs_timer: "阿拉伯稳定度"
 concept_unruly_arabs_timer_desc: "$concept_unruly_arabs_timer$代表了$dyn_c_ottoman_empire$对治下阿拉伯半岛的控制力和当地人民的顺从程度。$concept_unruly_arabs_timer$越低，阿拉伯的恶性事件就更容易发生，其他国家也将更容易干预阿拉伯。当[Concept('concept_unruly_arabs_progress','$concept_unruly_arabs_progress_short$')]等于#G 0#!时，$concept_unruly_arabs_timer$就将每月#G 提高1%#!。[concept_unruly_arabs_timer]可在#b $the_unruly_arabs$#![concept_journal_entry]中进行追踪。"
 