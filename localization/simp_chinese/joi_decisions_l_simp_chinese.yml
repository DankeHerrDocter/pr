l_simp_chinese:
 ai_unique_buff_decision: "强化AI国家"
 ai_unique_buff_decision_desc: "这个决议是用来帮助您尝试更加强大和符合历史的AI国家。在此决议下的AI国家将会根据国家位阶获得强大的，包括经济发展，科技研发和战争的多个修正，并降低内战发生的幅度。\n这会大大提升您的国际竞争和贸易体验，但#variable 会在游戏中后期造成卡顿和崩溃（如果设备性能较差）#!。\n#R 多人游戏请勿使用，通常会导致联机不同步！#!"
 ai_unique_buff_decision_tt: "尚未强化AI国家"
 ai_unique_buff_decision_tt_2: "这将使得强化开始对所有AI国家生效。\n如果您切换到了其他AI国家，那么您切换后游玩的国家将失去该强化。\n强化将不会对松散政权生效。"
 ai_unique_buff_get_again_decision: "重新获得强化"
 ai_unique_buff_get_again_decision_desc: "这个决议是如果AI目前没有强化强化日志时，则会获得一个对应自己国家位阶的日志修正。"
 ai_unique_buff_get_again_decision_tt: "强化已经被玩家批准但是目前尚未获得"
 ai_gbr_annex_india: "收归印度统治"
 ai_gbr_annex_india_desc: "东印度公司的权力已经毫无疑问的被兵变所削弱，为了保障大不列颠在印度的权威，我们需要将印度纳入帝国的直接统治。"
 delete_private_investment_decision: "删除私人投资"
 delete_private_investment_decision_desc: "这个决议会夺取投资池的钱并将所有建造力变为直接控制。"
 rebuild_private_investment_decision: "重建私人投资"
 rebuild_private_investment_decision_desc: "该决议将从你的游戏中重建和原版一致的私人投资。"
 joi_force_privatization: "实施私有化"
 joi_force_privatization_desc: "这个决议将调整所有建筑至私有化状态。"
 joi_stop_force_privatization: "停止私有化"
 joi_stop_force_privatization_desc: "这个决议将停止所有建筑的私有化状态。"
 joi_remove_chinese_state_modifier_decision: "在中国建立当地机构"
 joi_remove_chinese_state_modifier_decision_desc: "随着中国的省份落入我们的控制中，我们应该把中国皇帝的机构以及统治体系全部赶出我们的领土，并在当地建立我们的统治。"
 #
 deutsch_abrogation_of_the_naval_treaty: "重新谈判海军军备条约"
 deutsch_abrogation_of_the_naval_treaty_desc: "随着我国力量的增长和国际地位的提升，过去为了取得伦敦信任而签署的海军协议显然已经不合适了。让我们从实力地位出发，向他们承诺一份长期有效的友好条约，以换取他们解除对我国的海军军备限制。"
 deutsch_abrogation_of_the_naval_treaty_tt: "英国方面会同意废除当前的海军条约，并以一份长期的友好条约取代之。"
 deutsch_abrogation_of_the_naval_treaty_single: "单方面废除海军军备条约"
 deutsch_abrogation_of_the_naval_treaty_single_desc: "英国的地位已经远远不够限制我国继续履行这份海军条约了，尽管会招致国际上的恶名，但出于我国的利益考虑，这份条约必须作废。"
 deutsch_abrogation_of_the_naval_treaty_single_tt: "我国会宣布单方面废除海军军备条约。"
 expand_deutsche_reich_states_to_poland: "扩展波兰的帝国州"
 expand_deutsche_reich_states_to_poland_desc: "帝国政府早就有一份将波兰地区纳入德意志帝国的提案。尽管那里的民族和德意志人相距甚远，但考虑到帝国日渐开明的民族政策，相信议会不会拒绝将波兰省份纳入帝国州的要求。"
 expand_deutsche_reich_states_to_aus: "增加德意志领地的州地位"
 expand_deutsche_reich_states_to_aus_desc: "新的，曾经属于德意志邦联的州已经回归到了德意志的怀抱。根据宪法，所有德意志邦联的省份都理应属于整个德意志国家平等的一部分，我们有完全合法的理由，宣布授予这些领土上的德国人完全平等的权力，并宣告它们帝国州的身份。"
 #私人投资
 joi_disable_private_investment: "禁用私人投资"
 joi_disable_private_investment_desc: "这个决议将禁用投资池的私人投资功能（这意味着金融区也将无法私有化，只有公司的私有化可用）。"
 joi_second_disable_private_investment: "禁用私人投资分配"
 joi_second_disable_private_investment_desc: "这个决议将取消私人投资分配（但实际上投资池仍然在你不建造时私人建设）。"
 joi_enable_private_investment: "启用私人投资"
 joi_enable_private_investment_desc: "这个决议将启用投资池的私人投资功能和正常的私人投资分配。"
 #圣地危机
 claiming_the_right_of_holy_places: "宣称圣地保护权"
 claiming_the_right_of_holy_places_desc: "奥斯曼帝国的权力已经彻底衰弱，东正教，乃至于全基督教的圣地：耶路撒冷圣城正在向我们招手；作为全世界东正教徒的保护者，沙皇陛下有必要发兵这个邪恶的异教徒国家，收复光荣的耶路撒冷圣城！同时，通过统治巴勒斯坦港口，我们将获得宝贵的，将影响力扩展到整个地中海的机会。"
 #国家指南
 joi_french_guide_decision: "法国指南"
 joi_french_guide_decision_desc: "这个决议将提供一些关于法国的游玩指南，只能使用一次。"
 #英国决议
 direct_rule_of_ceylon: "接管锡兰岛"
 direct_rule_of_ceylon_desc: "锡兰是我们在印度洋的重要基地，借助这里我们可以有效施展从南亚次大陆，阿拉伯半岛到远东的影响力；出于军事考虑，我们必须越过当地的统治机关，命令殖民事务部重申亚眠和约的管理条例，将其纳入伦敦的直接统治中。"
 direct_rule_of_ceylon_tt: "我们将撤销#yellow #B 锡兰#!#!的当地管理机关并直辖该岛。"
 direct_rule_of_malaya: "接管海峡殖民地"
 direct_rule_of_malaya_desc: "现存归属印度政府管理的海峡殖民地人口分散，利润微薄且管理成本高昂；然而马六甲海峡的位置却对帝国的战略有着非凡的意义，我们将发布命令，要求印度将海峡殖民地移交给伦敦的殖民事务办公室。"
 direct_rule_of_malaya_taken_tt: "我们将接管#yellow #B 新加坡#!#!等海峡殖民地省份。"
 agree_with_proposal_of_conference: "同意帝国经济会议的提案"
 agree_with_proposal_of_conference_desc: "英国在经济会议上承诺承诺英国将允许大多数帝国商品继续自由进入，并对某些来自外国的食品和金属进口征收新的关税。很明显，这种经济交流的强化对我们双方都有好处，我们将承诺英国同意目前的基本会议原则，保持规定的优惠幅度。"
 agree_with_proposal_of_conference_tt: "我们将同意英国在经济会议上的提案。\n如果会议最终获得批准，我们就将施行#yellow #B 帝国特惠制#!#!贸易法律。"
 permanent_imperial_conference: "制度化帝国会议"
 permanent_imperial_conference_desc: "#V 帝国会议#!是我们强调帝国统一和各地自治政府们表达其政治愿望的重要论坛：通过将这一机制设立为#B 定期举行的，全体帝国成员都能参与的会议#!，而不是只有在帝国政要参加皇家庆典时举办，我们在#yellow 大英帝国#!各地的经济联系和政治稳定将得以保障。"
 permanent_imperial_conference_taken_tt: "我们将把#V 帝国会议#!变成一个固定召开的政治机制。\n所有我们的附属国都将获得一个#B #L 帝国会议#!#!修正，效果如下："
 end_of_malaya: "终结新加坡条约"
 end_of_malaya_desc: "根据#B 1824年英荷条约#!和#B 1819年新加坡条约#!的规定，新加坡等港口被移交给#yellow 东印度公司#!管辖；不过，鉴于我们需要进一步在马来半岛扩张利益的需求，应该知会柔佛苏丹，结束1819年新加坡条约的和约。"
 end_of_malaya_taken_tt: "我们将单方面退出#yellow 新加坡条约#!，结束该地的特殊地位。"
 direct_rule_of_malaya_possible_tt: "#yellow 新加坡条约#!已经作废了至少1个月"
 spouse_for_her_majesty: "女王陛下的联姻"
 spouse_for_her_majesty_desc: "女王陛下已经登基有一段时间了，她本人也已经表现出了寻找一位皇夫的意愿，我们应该从欧洲各国的王室中为她寻找一位合适的配偶。"
 spouse_for_her_majesty_possible_tt: "女王陛下已经展现出了联姻的意愿"
 spouse_for_her_majesty_taken_tt: "我们将为女王陛下寻找一名配偶。"
 prince_alex_visit_west_europe: "准许亚历山大皇子访问西欧"
 prince_alex_visit_west_europe_desc: "现任沙皇子#yellow 亚历山大#!一直想学习他的祖先：伟大的彼得大帝前往西欧各国访问和学习。或许我们应该挑选一个合适的时机，准许他实施这项计划。"
 prince_alex_visit_west_europe_possible_tt: "#yellow 大不列颠#!的新君已经登基。\n我们能以此为由前往英国作为访问的第一站。"
 prince_alex_visit_west_europe_taken_tt: "沙皇子#yellow 亚历山大#!将动身前往英国。"
 gbr_give_crown_dependencies: "赋予海外岛屿王室领地地位"
 gbr_give_crown_dependencies_desc: "尽管主要的帝国问题已经解决，但许多面积较小的海外岛屿的地位却仍然悬而未决。为了解决这一残留问题，我们可以赋它们王室领地这一特殊地位，并促成它们的自治。"
 gbr_give_crown_dependencies_possible: "完成了#V 帝国自治#!或#V 帝国联邦#![Concept('concept_journal_entry', '$concept_journal_entries$')]"
 gbr_give_crown_dependencies_taken_tt: "所有海外岛屿都将成为#O 英格兰#!文化的本土，并获得一个修正，效果如下："
 set_the_balfour_declaration: "承诺犹太人国家"
 set_the_balfour_declaration_desc: "英王陛下的政府赞成在巴勒斯坦为犹太人建立民族家园，并将尽最大努力促进这一目标的实现；由于我们在犹太民族的古老发源地犹地亚和黎凡特拥有重大影响力，我们可以发表一项宣言，表达我们对在那里为犹太人建立民族国家的赞成态度。"
 set_the_balfour_declaration_taken_tt: "我们将在巴勒斯坦建立一个托管地并准许犹太人进行迁徙。"
 expand_scotland_yard: "扩建苏格兰场"
 expand_scotland_yard_desc: "根据1829年《伦敦警察法》成立的伦敦警察厅，被我们的公民们非正式地称为“苏格兰场”，因为它的总部位于白厅街4号，那里曾经是一条被称为“大苏格兰场”的道路的所在地。作为我们最具标志性的警察机构之一，苏格兰场在许多知名作家的作品中都有提及，它无疑帮助我们破获了一两起案件。"
 sign_lonian_treaty_of_london: "爱奥尼亚群岛的命运"
 sign_lonian_treaty_of_london_desc: "自拿破仑战争结束以来，#yellow 爱奥尼亚群岛#!一直是#yellow 大不列颠#!友好的保护国；然而维护该保护国的成本十分高昂，当地人也希望回归他们的希腊祖国，我们应该顺从他们的意愿，将岛屿转让给希腊。"
 joi_burn_the_summer_palace: "火烧圆明园"
 joi_burn_the_summer_palace_desc: "圆明园是位于中国北京皇城西北的一座园林建筑群，它建于18世纪至19世纪初，是清朝皇帝的夏宫。如今我们已经占领了北京，鉴于之前中国皇帝对我们的外交使团犯下的令人发指的暴行，我们应该焚毁这个邪恶的，属于中国皇帝的财产，为我们的使者复仇。"
 joi_burn_the_summer_palace_possible_tt: "我们的军队已经攻破了#yellow 北京城#!。"
 joi_webster_ashburton_treaty: "签署北纬49度线条约"
 joi_webster_ashburton_treaty_desc: "1783年的《巴黎条约》结束了美国革命战争，但却并未明确划定英属北美与美国的边界；而#yellow 美利坚合众国#!对这些边界上小问题的宣称也具备一定合理性。我们可以签署一份条约，划定缅因州和新不伦瑞克省之间北纬49度线的边界，规范五大湖的共享使用，并呼吁双方共同承诺终止#V 大西洋奴隶贸易#!。"
 joi_webster_ashburton_treaty_taken_tt: "这将在未来给我们双方提供共同开发五大湖的机会。"
 colonzed_yukon_territory: "殖民育空领地"
 colonzed_yukon_territory_desc: "#yellow 育空领地#!蕴藏着许多潜力，但严峻的天气的复杂的地形都阻拦了我们进一步探索这里。通过增加对育空领地的冒险，我们可以将旗子插到这片土地上，并建立起新的定居点。"
 #
 relocating_the_capital_to_chongqing: "迁都重庆"
 relocating_the_capital_to_chongqing_desc: "中国已经到了最危险的时刻：北京和南京都已经落入了敌人的魔掌中。宁为玉碎，不为瓦全，为国家生命计，为民族人格计，出于坚定不移的长期抵抗与统筹的需求，我们的政府必须迁都重庆：相信以中华人民之众，土地之广，只要人人抱定必死之决心继续抗战，我们必能达到维护国家民族生存独立之目的。"
 relocating_the_capital_to_chongqing_possible_1_tt: "任意敌军战线抵达了#yellow 北京#!"
 relocating_the_capital_to_chongqing_possible_2_tt: "任意敌军战线抵达了#yellow 南京#!"
 act_state_general_mobilization_law: "颁布国民征用令"
 act_state_general_mobilization_law_desc: "欧洲战争的经验告诉我们，在这个时代，只有全面投入我们国家的每个公民才能取得战争的胜利——如今，帝国的战争正处于急需人手的时刻，内阁必须请求天皇御准实施总动员，并准许政府强制征募所有性别的公民进入工厂服役。"
 relocating_the_capital_to_batavia: "迁都巴达维亚"
 relocating_the_capital_to_batavia_desc: "虽然军队已竭尽全力坚持，但鉴于国家所遭受的损失，是时候承认失败了。我们的本土已经沦陷于敌人的控制中，但海外的殖民地——建设良好的巴达维亚——仍然可以成为我们的第二个首都。尽管暂时离开了祖国，但低地人依然斗志昂扬，并注定将返回家园！"
 relocating_the_capital_to_batavia_possible_1_tt: "任意敌军战线抵达了#yellow 阿姆斯特丹#!"
 building_defensive_line_in_alsace_lorraine: "在阿尔萨斯-洛林修建防线"
 building_defensive_line_in_alsace_lorraine_desc: "精心构筑的防御堑壕的威力已经得到了充分证明：几个士兵在一个机枪阵地就能杀死数百名开阔地带的敌人。因此，建造一条巨大的防线，并修建地下混凝土工事，毫无疑问是应对陆上威胁和保护我国关键领土的最合理方式。"
 imp_use_uk_flag: "使用联合旗"
 imp_use_uk_flag_desc: "将我们的国旗改为代表联合王国的联合旗，而非联邦旗帜。"
 abolish_the_german_title: "废除德国头衔"
 abolish_the_german_title_desc: "德国人是不列颠的仇人——毫无疑问。在这场战争中，这些日耳曼魔鬼给我们带来了太多的创伤，无数英国家庭死于他们的子弹下。然而，作为联合王国的君主，统治着不列颠的家族却仍然还持有着来自德意志的姓氏。我们的民众正在质疑国王对国家和民族的忠诚，王室必须做出回应。"
 colonzed_australia_desert: "殖民澳大利亚沙漠"
 colonzed_australia_desert_desc: "#yellow 澳大利亚沙漠#!蕴藏着许多潜力，但严峻的气候和缺水阻拦了我们进一步探索这里。通过增加对澳大利亚沙漠的冒险，我们可以将旗子插到这片土地上，并建立起新的定居点。"
