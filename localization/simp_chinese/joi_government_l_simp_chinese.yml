l_simp_chinese:
 #Monarchies
 gov_frankfurter_kaiserreich: "帝国政府"
 gov_frankfurter_kaiserreich_desc: "这种[concept_government_type]下，[concept_country]由世袭继承的[Concept('concept_ruler','$RULER_TITLE_KAISER$')]或[Concept('concept_ruler','$RULER_TITLE_KAISERINE$')]担任[concept_ruler]；[concept_ruler]则根据法兰克福宪法的规定实施权力，并授权帝国议会进行统治。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_lander_der_krone: "王冠领地"
 gov_lander_der_krone_desc: "帝国政府授权的[concept_lander_der_krone]；[Concept('concept_ruler','$RULER_TITLE_KAISER$')]或[Concept('concept_ruler','$RULER_TITLE_KAISERINE$')]王冠下由其议会所代表的王国及属地。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_second_napolean_empire: "法兰西帝国"
 gov_second_napolean_empire_desc: "承蒙上帝和宪法的恩典，元老院与法国人民所选举的：法兰西人的[Concept('concept_ruler','$RULER_TITLE_EMPEROR$')]或[Concept('concept_ruler','$RULER_TITLE_EMPRESS$')]陛下的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_jap_japanese_empire: "天皇国"
 gov_jap_japanese_empire_desc: "这种[concept_government_type]下，[Concept('concept_ruler','$RULER_TITLE_JAPEMPEROR$')]由天照大神万世一系而不革的后裔继承；祂被认定是一名神圣不可侵犯的名义[concept_ruler]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_celestial_empire: "天朝"
 gov_celestial_empire_desc: "这种[concept_government_type]下，[concept_country]由作为上天之子的[Concept('concept_ruler','$RULER_TITLE_EMPEROR$')]统治，他被认为是一名以贤明执掌天命，统治伟大的中央王朝而至高无上的神圣[concept_ruler]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sublime_porte: "崇高之门"
 gov_sublime_porte_desc: "至高无上的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]，真主在世上的影子，圣地监护，两海与两陆的[Concept('concept_ruler','$RULER_TITLE_EMPEROR$')]，突厥与伊斯兰的[Concept('concept_ruler','$RULER_TITLE_SULTAN$')]，罗马[Concept('concept_ruler','$RULER_TITLE_KAISER$')]，奥斯曼[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]陛下的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_sublime_porte_caliph: "崇高之门"
 gov_sublime_porte_caliph_desc: "至高无上的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]，真主在世上的影子，圣地监护，两海与两陆的[Concept('concept_ruler','$RULER_TITLE_EMPEROR$')]，突厥与伊斯兰的[Concept('concept_ruler','$RULER_TITLE_SULTAN$')]，罗马[Concept('concept_ruler','$RULER_TITLE_KAISER$')]，奥斯曼[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]陛下的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_spqr: "元老院与罗马人民"
 gov_spqr_desc: "自由的全体罗马公民之代表，尊贵的[Concept('concept_ruler','$RULER_TITLE_KAISER$')]，神之子，统帅[Concept('concept_ruler','$RULER_TITLE_AUGUSTUST$')]，最高祭司，保民官权拥有者，天下的主宰，罗马[Concept('concept_ruler','$RULER_TITLE_IMPERATOR$')]奉罗马人民与元老院的旨意所授权的[concept_government]。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 #republic
 gov_british_presidential_dominion: "自治领"
 gov_british_presidential_dominion_desc: "这种[concept_government_type]下，[concept_country]由一位代表不列颠君主的[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]统治，并享有高度的自治权。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_british_parliamentary_dominion: "自治领"
 gov_british_parliamentary_dominion_desc: "这种[concept_government_type]下，[concept_country]由经民主程序[Concept('concept_election','$concept_elected$')]的议会统治；虽然有一位代表不列颠君主的[Concept('concept_ruler','$RULER_TITLE_GOVERNOR_GENERAL$')]，但他并没有治理国家的实权。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_federal_government_of_united_states: "联邦政府"
 gov_federal_government_of_united_states_desc: "这种[concept_government_type]下，[concept_country]由经各州选举人团[Concept('concept_election','$concept_elected$')]产生的[Concept('concept_ruler','$RULER_TITLE_PRESIDENT$')]在国会、最高法院与州政府的制约下根据宪法行使行政权。\n\n$TRANSFER_OF_POWER_NAME_DESC$"
