l_simp_chinese:
 ideology_inclusiveness:0 "普世主义者"
 ideology_inclusiveness_desc:0 "#lore 普世主义主张在宗教管理和教义上允许多样性，并提倡不同意见之间的对话与共识，以仁爱为本接受和包含不同的观点，文化，种族或信仰。#!"
 ideology_bourgeoisie_capitalism:0 "资本主义者"
 ideology_bourgeoisie_capitalism_desc:0 "#lore 这一集团坚决支持私有财产的神圣不可侵犯性，认为政府除了维护法治以外应该尽可能减少对社会的干预。政治上赞同自由主义意识形态，并寻求建立一套有限的代议制民主。#!"
 ideology_british_capitalism:0 "古典自由主义者"
 ideology_british_capitalism_desc:0 "#lore 这一集团具有悠久的议会治理传统，奉行大卫·休谟与亚当·斯密的学说，坚决支持私有财产的神圣不可侵犯，认为对个人利益和利润的追求是经济增长的关键。#!"
 ideology_interventionlism:0 "干预主义者"
 ideology_interventionlism_desc:0 "#lore 凯恩斯主义经济学主张政府应当根据情况采用收缩或扩张性的经济政策和财政赤字来维持经济稳定增长，认为适当的国家干预更可能确保市场的持续繁荣。#!"
 ideology_enlightlism:0 "开明主义者"
 ideology_enlightlism_desc:0 "#lore 这一集团拥护自由主义意识形态，认为政府的合法性应该基于社会契约的公民授权和公正且人人平等的法律体系，其目的则是实现社会正义和保护个人自由。#!"
 ideology_english_enlightlism:0 "开明主义者"
 ideology_english_enlightlism_desc:0 "#lore 这一集团拥护自由主义意识形态，认为政府的合法性应该基于社会契约的公民授权和公正且人人平等的法律体系，其目的则是实现社会正义和保护个人自由。#!"
 ideology_authoritarianism:0 "威权主义者"
 ideology_authoritarianism_desc:0 "#lore 这一集团提倡强有力的官僚政府，主张专制或寡头统治，确保政治绝对服从于社会精英的意见。#!"
 ideology_misoneism:0 "保守主义者"
 ideology_misoneism_desc:0 "#lore 这一集团主张抵抗改变传统的改革措施，只接受极为有限的体制改良以维持社会的等级制。#!"
 ideology_expansionism:0 "扩张主义者"
 ideology_expansionism_desc:0 "#lore 这一集团主张努力寻求更为广阔的发展空间，以扩张本国公民所拥有的土地和财富。#!"
 ideology_imperialism:0 "帝国主义者"
 ideology_imperialism_desc:0 "#lore 建立对别国政治上或军事上的控制，从而使自身处于政治与经济上的优势地位来夺取任何可能的生存空间。#!"
 ideology_british_conservatism:0 "英式保守主义者"
 ideology_british_conservatism_desc:0 "#lore 英国的保守改良主义者主张在尊重英国光荣传统和文化的前提下顺应社会呼声进行逐步改革，反对可能的激进主义威胁，维护基于《权利法案》的英国君主立宪制。#!"
 ideology_british_whig_liberalism:0 "辉格自由主义者"
 ideology_british_whig_liberalism_desc:0 "#lore 英国的辉格自由主义理念建立在詹姆斯·泰瑞尔和约翰·洛克等哲学家的思想基础上，主张维护以《权利法案》为核心的议会主权与君主立宪制度，强调个人自由、自然权利与有限政府，并希望通过遵循程序正义的渐进式改革，逐步扩大公民自由与代议制民主。#!"
 ideology_british_tory_conservatism_old:0 "托利保守主义者"
 ideology_british_tory_conservatism_old_desc:0 "#lore 英国的托利保守主义建立在埃德蒙·伯克和大卫·休谟等哲学家的思想基础上，主张在政治民主体制内维护既有制度和传统原则，强调历史经验，习俗惯例和继承式智慧的重要性，赞同在遵循传统秩序下结合旨在造福普通民众的社会和经济方案。#!"
 ideology_british_tory_conservatism_reformed:0 "托利保守主义者"
 ideology_british_tory_conservatism_reformed_desc:0 "#lore 英国的托利保守主义建立在埃德蒙·伯克和大卫·休谟等哲学家的思想基础上，主张在政治民主体制内维护既有制度和传统原则，强调历史经验，习俗惯例和继承式智慧的重要性，赞同旨在造福普通民众的社会和经济方案，并最终使精英阶层负担起改善其他社会阶层福祉的义务。#!"
 ideology_tory_patriarchal:0 "父权主义者"
 ideology_tory_patriarchal_desc:0 "#lore 这个集团相信男人应当拥有政治权威，而女人应当服从她们的父亲和丈夫。#!"
 ideology_british_hierarchic:0 "阶序主义者"
 ideology_british_hierarchic_desc:0 "#lore 这个集团赞同通过传统形式的税收与劳动关系来维持社会的等级制。#!"
 ideology_revolutionism:0 "激进共和主义者"
 ideology_revolutionism_desc:0 "#lore 这一集团拥护法国大革命的激进主义思想，并自认为是1791年革命的真正继承者，希望动员群众，自下而上推翻专制制度并建立一个民主共和国。#!"
 ideology_junker_militarism:0 "容克军官团"
 ideology_junker_militarism_desc:0 "#lore 这一集团是普鲁士容克军事贵族的代表，主张国家应当以军事利益为首要利益，建立具有效率的国家机器，确保军队接受贵族的纪律和荣耀。#!"
 ideology_puritan:0 "清教徒"
 ideology_puritan_desc:0 "#lore 美国清教徒从英国流亡而来，寻求平等的共和制度，主张将自己在世间的工作和生活作好作为对信仰的修行和敬拜。#!"
 ideology_innovationist:0 "改革派"
 ideology_innovationist_desc:0 "#lore 十二月党人的遗留，受法国大革命的影响而寻求对俄罗斯实行现代化改革。#!"
 ideology_westernlism:0 "洋务派"
 ideology_westernlism_desc:0 "#lore 主张推动“师夷长技”的西化改革，在维持中国传统体制的前提下引进西方先进的科学技术来兴办中国的工业。#!"
 ideology_revivalism:0 "复兴主义者"
 ideology_revivalism_desc:0 "#lore 热衷于意大利民族过去的伟大历史，并试图在这个时代重现一个强大的意大利国家。#!"
 ideology_tanzimatism:0 "坦齐马特派"
 ideology_tanzimatism_desc:0 "#lore 这一集团主张通过一场制度改革来保证奥斯曼帝国的存续和领土完整，支持被称为坦齐马特的现代化措施。#!"
 ideology_shariah:0 "逊尼派教法"
 ideology_shariah_desc:0 "#lore 这一集团主张以沙里亚法，即真主的诫命，作为指导人们日常生活每个方面的法律。#!"
 ideology_anti_shogunate:0 "倒幕派"
 ideology_anti_shogunate_desc:0 "#lore 这一集团相信日本的统治只能属于天照大神的的天皇后裔，并维护立宪的天皇统治。#!"
 ideology_austria_centraliser:0 "建制派"
 ideology_austria_centraliser_desc:0 "#lore 这一集团希望维持奥地利帝国作为一个中央集权的单一制国家的地位。#!"
 ideology_austria_federalist:0 "联邦派"
 ideology_austria_federalist_desc:0 "#lore 这一集团希望将奥地利帝国改革为一个各族平等自治的联邦制国家。#!"
 ideology_agrarian_russian:0 "村社主义者"
 ideology_agrarian_russian_desc:0 "#lore 这一集团支持农民以村社形式集体持有土地。#!"
 ideology_progressivism:0 "进步主义者"
 ideology_progressivism_desc:0 "#lore 美国的进步主义者寻求通过基于科学，技术和社会组织进步的社会改革来改善人类状况；倡导社会进步和积极变革，例如民主的扩展和平等主义的增强。#!"
 ideology_protestant_church:0 "基督新教会"
 ideology_protestant_church_desc:0 "#lore 源自宗教改革的新教国家教会否认罗马教廷的权威，相信每个信徒都具有敬拜上帝的能力，要求信徒依自身的良心解释圣经。#!"
 ideology_catholic_church:0 "罗马天主教"
 ideology_catholic_church_desc:0 "#lore 天主教徒相信历史悠久的罗马教廷的权威，尊崇教皇的威严，依照教廷驻扎在各地的枢机主教们的意见解读圣经。#!"
 ideology_german_nobles:0 "德意志贵族"
 ideology_german_nobles_desc:0 "#lore 德意志土地上古老的贵族们在扮演世袭庄园主的同时拥有着在军中服役的义务，这使得他们在某种程度上乐于照顾军队的需求。#!"
 ideology_western_confucian:0 "维新派"
 ideology_western_confucian_desc:0 "#lore 变法运动改变了传统儒家学者对政治的观点，寻求对国家进行务实的改革。#!"
 ideology_catholicisme_social:0 "天主教社会主义者"
 ideology_catholicisme_social_desc:0 "#lore 天主教会的社会教义希望根据根据基督教原则对社会的分配不公采取更广泛的关怀，在不改变阶级结构的情况下实现社会正义。#!"
 ideology_opportunistes:0 "温和共和主义者"
 ideology_opportunistes_desc:0 "#lore 这一集团认可法国大革命的自由主义思想，但反对过于激进的民粹主义煽动，希望通过议会变革阻止专制，并在稳定的宪政框架下建立一个民主共和国。#!"
 ideology_bonapartiste:0 "波拿巴主义者"
 ideology_bonapartiste_desc:0 "#lore 这一集团希望直接诉诸人民并将政府交由一个公民直接授权的凯撒式人物领导，集中行政权力并积极干预社会事务，以带领法国走向注定强大的新时代。#!"
 ideology_us_federalism:0 "联邦宪法派"
 ideology_us_federalism_desc:0 "#lore 这一集团坚决拥护自1789年以来生效的合众国宪法，支持代议制民主，维护各州的自治权和联邦政府依法被授予的权力。#!"
 ideology_patriotism:0 "爱国主义者"
 ideology_patriotism_desc:0 "#lore 这一集团对自己的国家和本国独有的生活方式抱有深厚的热爱和忠诚，对自己国家的文化传统及其价值观有着强烈的认同感，并愿意为之奉献和牺牲。#!"
 ideology_united_states_constitution:0 "联邦宪法派"
 ideology_united_states_constitution_desc:0 "#lore 这一集团坚决拥护自1789年以来生效的合众国宪法，认为军队只有义务服从总统经过国会，且符合宪法的命令。#!"
 ideology_militarism:0 "军国主义者"
 ideology_militarism_desc:0 "#lore 这一集团信奉侵略性的军国主义思想，认为国家应当保持强大的军事能力来为军队服务，而军队的义务则应当是不惜一切代价的扩大国家利益。#!"
 ideology_puritan_ecumenical:0 "普世公理派"
 ideology_puritan_ecumenical_desc:0 "#lore 美国的普世主义运动试图通过接纳宗派与民族的多样性，修补基督宗教各教会间的裂痕，鼓励各派合作与合一，并最终实现普世教会的理想。#!"
 ideology_protestant_awakening:0 "大觉醒派"
 ideology_protestant_awakening_desc:0 "#lore 大觉醒运动认为，救赎不止于个人忏悔，还应努力实现社会的道德革新，透过制度与组织将恩典带入公共生活，最终根除一切形式的罪。#!"
 ideology_ecumenical_anglicanism:0 "普世圣公会"
 ideology_ecumenical_anglicanism_desc:0 "#lore 英格兰圣公会是全世界圣公会公认的同侪之首，以公祷书作为神学和实践的指南，遵循传统圣礼，主张公教会的合一性和宗教事务的多元化。#!"
 ideology_british_anglicanism:0 "英格兰圣公会"
 ideology_british_anglicanism_desc:0 "#lore 英国的圣公国教会遵循传统的圣礼，遵奉英国君主为教会领袖，相信基督信仰的真理源自圣经与大公信经，并应结合传统、理性与经验加以理解。#!"
 ideology_evangelical_revival:0 "福音派"
 ideology_evangelical_revival_desc:0 "#lore 福音派将圣经视为信仰的最终权威，重视个人的皈依，提倡通过传播福音和社会行动来洁净个人的罪，并最终实现因信称义和悔改。#!"
 ideology_indian_farmer_sovereignist:0 "主权主义者"
 ideology_indian_farmer_sovereignist_desc:0 "#lore 该集团反对殖民当局强加的高压措施，更倾向于国家自治的政策。#!"
 ideology_ottomanism: "奥斯曼主义者"
 ideology_ottomanism_desc: "#lore 这一集团主张消除国家内基于民族与宗教的不平等政策，使所有人民在法律面前人人平等，以建立一个新的奥斯曼式民族团结，从而防止以宗教为基础的米利特撕裂帝国。#!"
 ideology_salafi:0 "萨拉菲主义者"
 ideology_salafi_desc: "#lore 这一集团主张依据《古兰经》与圣训的教诲恢复伊斯兰教神圣的纯洁传统，反对越过经文或超越经文本身的任何解读，强调严格遵循沙里亚法和效忠于伊斯兰统治者的第一优先性。#!"
 ideology_janissary:0 "耶尼切里禁卫军"
 ideology_janissary_desc: "#lore 这一集团维护耶尼切里的特殊权利与待遇，反对自由主义或其他外来势力针对军队进行的任何现代化改造。#!"
 ideology_economic_statism:0 "国家主义者"
 ideology_economic_statism_desc: "#lore 这一集团认为一个强大的、权威的国家天然拥有政治权威，而不依赖于特殊的合法性授权，主张政府在指导经济的主要方面发挥着重要、必要和合法的作用。#!"
 ideology_national_conservatism:0 "民族保守主义者"
 ideology_national_conservatism_desc:0 "#lore 这一集团致力于捍卫本民族的文化认同，支持维护国家主权，拥护国家干预和保护主义，希望建立一支用以维护本国利益的强大公民军队。#!"
 #人物意识形态
 ideology_westernlism_leader:0 "洋务派"
 ideology_westernlism_leader_desc:0 "#lore 主张推动“师夷长技”的西化改革，在维持中国传统体制的前提下引进西方先进的科学技术来兴办中国的工业。#!"
 ideology_liberal_bonapartist:0 "波拿巴主义者" 
 ideology_liberal_bonapartist_desc:0 "#lore 这个领袖希望国家由一位通过公决而获得人民授权的波拿巴皇帝领导，以带领法国走向注定强大的新时代。#!"
 ideology_kemalism_leader:0 "土耳其世俗主义者"
 ideology_kemalism_leader_desc:0 "#lore 这个领袖支持将共和主义，平民主义，世俗主义，改良主义，民族主义和国家主义的六个原则作为土耳其国家的支柱意识形态，并根据这些原则塑造与维护一个世俗的，自由的土耳其民族国家。#!"
 ideology_gladstonian_liberalism_leader:0 "格莱斯顿自由主义者"
 ideology_gladstonian_liberalism_leader_desc:0 "#lore 以威廉·尤尔特·格莱斯顿命名的格莱斯顿自由主义主张限制政府开支和降低税收，同时确保政府预算平衡，支持自由贸易与个人的自由意志和自由选择，反对政府干预经济，并将自由视为一种伟大的道德理想。#!"
 ideology_reactionism_leader:0 "反动专制主义者"
 ideology_reactionism_leader_desc:0 "#lore 这个领袖在治理中维护传统东正教价值观，力图恢复和捍卫在现代社会被认为传统，专制的政治制度和社会秩序，并将这一秩序扩散到相邻的其他国家。#!"
 ideology_one_nation_conservatism_leader:0 "一国保守主义者"
 ideology_one_nation_conservatism_leader_desc:0 "#lore 由本杰明·迪斯雷利提出的一国保守主义认为，在一个民主国家中，社会成员彼此负有义务，而精英阶层应该践行其家长式的贵族作风，努力协调所有社会阶层的利益，将他们的财富传递给其他人，而不是将社会福祉仅仅等同于精英阶层的利益。#!"
 ideology_imperial_reformer_leader:0 "帝国改革主义者"
 ideology_imperial_reformer_leader_desc:0 "#lore 这个领袖支持施行大范围的社会改良，认为国家应该改善社会矛盾，解决贫困并保护工人阶层，反对自由贸易思想，希望通过对关税等体系的保护主义改革以将大英帝国整合为一个统一的政治实体。#!"
 ideology_paternalistic_conservative:0 "家长式保守主义者"
 ideology_paternalistic_conservative_desc:0 "#lore 这个领袖希望使政府被视为一位仁慈的家长，采取广泛的国家干预措施以促进所有公民的利益，并通过社会福利增强普通民众对政府的忠诚，赢得工人阶层的支持。#!"
 ideology_polk_jingoist_leader:0 "波尔克主义者"
 ideology_polk_jingoist_leader_desc:0 "#lore 该角色不仅是杰克逊民主派的忠诚信徒，支持低关税和限制联邦权力，而且坚信美利坚受到上帝感召，有着从大西洋扩张到太平洋的神圣使命。#!"


