l_simp_chinese:
 #Trade Policy group
 law_kyushu_system:0 "长崎开港"
 law_kyushu_system_desc:0 "一种$law_isolationism$的变体，仅允许在一个沿海地区开展贸易。"
 kyushu_system_trade_center_trigger_tt:0 "在[GetLawType('law_kyushu_system').GetName][concept_law]下，贸易中心只能在#v $STATE_KYUSHU$#!建造最多#v 50#!级"
 law_imperial_preference:0 "帝国特惠制"
 law_imperial_preference_desc:0 "一种$law_protectionism$的变体，基于“国内生产者优先，帝国生产者次之，外国生产者最后”的原则，强调大英帝国体系的内部贸易和优惠待遇，最小化对外国商品的进口。"
 #economic
 law_gram_swaraj:0 "乡村主义"
 law_gram_swaraj_desc:0 "一种$law_agrarianism$的变体，强调以村庄为基础单位的经济自治和去中心化。"
 #官僚
 law_imperial_examination:0 "科举考试"
 law_imperial_examination_desc:0 "一种$law_appointed_bureaucrats$的变体，科举始于隋朝，是中国的传统官员选拔制度，由皇帝亲自担任考官，旨在确保官员对儒家哲学传统和君臣等级制度的忠诚，加强君主的专制权力。"
 #警察
 law_scotland_yard:0 "苏格兰场"
 law_scotland_yard_desc:0 "一种$law_dedicated_police$的变体，苏格兰场指总部位于白厅街4号的大伦敦警察厅。作为全世界最早的标准化警察部队，苏格兰场也是英国警察机构，乃至于侦探的代名词。"
 law_scotland_yard_enable_tt:0 "已经执行了#V 扩建苏格兰场#!决议"
 #税收
 law_askeri_tax:0 "贝德尔·阿斯克里税"
 law_askeri_tax_desc:0 "一种$law_per_capita_based_taxation$的变体，贝德尔·阿斯克里税指非穆斯林应纳税，是吉兹亚税的改良。其基于人头均等地向男性不信者征税，以免除其服兵役的义务。"
 law_askeri_tax_enable_tt:0 "在#V 税务问题#!事件中选择了整改吉兹亚税"
 #教育
 law_madrasa:0 "伊斯兰学校"
 law_madrasa_desc:0 "一种$law_religious_schools$的变体，起源于11世纪塞尔柱王朝的官方伊斯兰教法教育体系，是一种主要教授古兰经，教法，语言语法和其他辅修科目的学院。它实际上的目的是维护宗教正统和信仰纯洁，而非担任学术机构，因此伊斯兰学校缺乏真正的哲学教育，其中也几乎不包括世俗的科学学校。"
 law_classical_learning:0 "私塾书院"
 law_classical_learning_desc:0 "一种$law_private_schools$的变体，流行于儒家文化圈的一种半私人半官方的儒学教育体系，兼具对幼儿的启蒙识字和文人研习儒家经籍的功能。它往往只对富裕家庭的子弟开放，且由于逻辑思想的高度封闭和与科举制度的高度绑定，使私塾书院实际上不具备任何现代学术教育的特征。"
 #权利分配
 law_sublime_porte_absolutism:0 "哈里发专制"
 law_sublime_porte_absolutism_desc:0 "一种$law_autocracy$的变体，将所有政治权力都聚集在被认为是先知正统继承人的世袭哈里发手中，并允许哈里发的高门政府用基于《古兰经》的宗教意识形态控制社会的方方面面。"
 law_sublime_porte_absolutism_enable_tt:0 "在#V 立宪主义时代#![concept_journal_entry]中失败了，且任意#I 伊斯兰国家#!已经完成了#V 泛伊斯兰主义#![concept_journal_entry]"
 #民族法律
 law_pan_islamism:0 "泛伊斯兰主义"
 law_pan_islamism_desc:0 "一种$law_ethnostate$的变体，它关注的更多是宗教而非种族或民族，将乌玛（穆斯林社群）视为效忠和动员的中心，强调伊斯兰的团结，包括在《古兰经》和圣训的指导下信奉认主独一的信仰。"
 EFFECTS_ON_ACCEPTANCE_law_pan_islamism:0 "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],law_pan_islamism_modifier_effects_tt $law_pan_islamism_modifier$#!"
 law_pan_islamism_modifier_effects_tt:0 "[GetStaticModifier('law_pan_islamism_modifier').GetDesc]"
 law_pan_islamism_aviliable_tt:0 "任意#I 伊斯兰国家#!已经完成了#V $caliph_and_ummah$#![concept_journal_entry]"
 law_official_nationalism:0 "官方民族性"
 law_official_nationalism_desc:0 "一种$law_subjecthood$的变体，认为俄罗斯民众的天性就是对东正教会的虔诚，以及对沙皇与专制权威的忠诚，并视其为俄罗斯存在的绝对基础；而为了保护这一独立民族传统，国家应该高度警惕外来的邪恶思想，尤其铲除任何自由主义，民族主义或社会主义意识形态的传播，并从教育和社会中彻底去除任何质疑、叛逆政府或权威的危险倾向。"
 EFFECTS_ON_ACCEPTANCE_law_official_nationalism:0 "#tooltippable;tooltip:[GetPlayer.GetTooltipTag],law_official_nationalism_modifier_effect_tt $law_official_nationalism_modifier$#!"
 law_official_nationalism_modifier_effect_tt:0 "[GetStaticModifier('law_official_nationalism_modifier').GetDesc]"
 law_official_nationalism_aviliable_tt:0 "以完成#B 所有条件#!结束#V $government_leader_nicholas_i$#![concept_journal_entry]"
 #修正案
 amendment_westminster_system_amendment: "威斯敏斯特体系"
 amendment_westminster_system_amendment_desc: "一种以英国议会所在地——威斯敏斯特宫命名的议会制君主立宪体系。君主作为名义上的国家元首在其中拥有着众多保留权力，但其往往被要求遵从政府首脑的意愿行事，而日常职责则主要在于履行礼仪性职能；对于非君主制国家而言，这种体制则意味着两院制议会民主下的虚位元首。不成文的惯例、做法和先例在许多宪法并未明确规定重要的程序要素中发挥着重要作用，使行政权高度集中于议会多数所产生的内阁，并以政治责任而非法理分权来实现权力分立。"
 amendment_magna_carta_amendment: "大宪章"
 amendment_magna_carta_amendment_desc: "《大宪章》是一部法律文件，由英格兰国王约翰最初于1215年6月15日在温莎附近的兰尼米德以拉丁文书写并订立。它旨在保护领主阶层的政治权利、并防止君主以不公手段征税及滥用司法权力。它是最早将公民自由理念以法律形式确立下来的文献，例如其中明确了公正审判的权利和对非法拘禁的保护。"
 amendment_bill_of_rights_1689_amendment: "1689年权利法案"
 amendment_bill_of_rights_1689_amendment_desc: "“未经议会授权，国王无权执行，暂停或发布任何法律；未经议会批准，或征税期限或征税方式与议会批准的方式存在不同，国王无权为王室征税或供王室使用；未经议会同意，国王无权在王国境内组建或维持常备军；臣民有权向国王请愿，任何因请愿而进行的拘禁和起诉均为非法；议会内的言论自由、辩论或议事程序不应在议会外的任何法庭或场所受到弹劾或质疑。”"
 amendment_slavery_abolition_act_1833_amendment: "1833年废奴法案"
 amendment_slavery_abolition_act_1833_amendment_desc: "“奴隶制是如此令人憎恶：为了人类的公义和道德的胜利，它决不能在大英帝国境内的任何地方存在。为此，让我们不要绝望，因为这是一项崇高的事业；让我们坚持不懈，直到取得彻底的胜利；让我们永不放弃，直到彻底洗刷基督名誉上的耻辱，摆脱我们如今背负的罪恶重担，彻底在全世界根除这种血腥交易的痕迹。”"
 amendment_catholic_emancipation_act: "1829年天主教解放法案"
 amendment_catholic_emancipation_act_desc: "《天主教解放法案》旨在废除禁止大不列颠及爱尔兰联合王国的罗马天主教徒进入议会，以及担任司法和国家高级职务的宗教宣誓，终止了《至尊法案》要求的反天主教宣誓词，结束了对英国天主教徒——尤其是爱尔兰天主教徒的法律性宗教歧视与政治限制。"
 amendment_gladstone_liberalism_dogmas: "格莱斯顿式自由主义"
 amendment_gladstone_liberalism_dogmas_desc: "格莱斯顿政府的遗产促使不列颠形成了一股强大的自由贸易和放任主义教条。这些思想的支持者对政府影响深远，他们的主张包括削减关税、限制政府支出和降低税收，并在预算平衡的情况下维护一个对自由社会干预最小的廉洁政府。"
 amendment_american_first_amendment: "宪法第一修正案"
 amendment_american_first_amendment_desc: "“国会不得制定关于下列事项的法律：确立国教或禁止信教自由；剥夺言论自由或出版自由；或剥夺人民和平集会和向政府请愿申冤的权利。”"
 amendment_american_third_amendment: "宪法第三修正案"
 amendment_american_third_amendment_desc: "“在和平时期，未经房主同意，士兵不得在民房驻扎；除依法律规定的方式，战时也不允许如此。”"
 amendment_american_forth_amendment: "宪法第四修正案"
 amendment_american_forth_amendment_desc: "“人民的人身、住房、文件和财产不受无理搜查和扣押的权利，不得侵犯。除依照合理根据，以宣誓或代誓宣言保证，并具体说明搜查地点和扣押的人或物，不得发出搜查和扣押状。”"
 amendment_american_fifth_amendment: "宪法第五修正案"
 amendment_american_fifth_amendment_desc: "“无论何人，除非根据大陪审团的报告或起诉，不得受判处死罪或其他不名誉罪行之审判，惟发生在陆、海军中或发生在战时或出现公共危险时服现役的民兵中的案件，不在此限。任何人不得因同一罪行为而两次遭受生命或身体的危害；不得在任何刑事案件中被迫自证其罪；不经正当法律程序，不得被剥夺生命、自由或财产。不给予公平赔偿，私有财产不得充作公用。”"
 amendment_usa_declaration_of_independence: "独立宣言"
 amendment_usa_declaration_of_independence_desc: "“我们认为下面这些真理是不证自明的：人人生而平等，造物主赋予他们若干不可剥夺的权利，其中包括生命权、自由权和追求幸福的权利。为了保障这些权利，人们才在他们之间建立政府，而政府之正当权力，则来自被统治者的同意。”"
 amendment_rus_obshchina_system: "俄罗斯村社"
 amendment_rus_obshchina_system_desc: "俄罗斯的村社制度起源于古老的斯拉夫社群。漫长的农奴制历史在东欧建立起了广泛的农村自治传统，并通过基谢廖夫伯爵的改革而在俄罗斯被制度化。在一个村社中，村庄土地归集体所有，并由当地的米尔村委会按照某种统一的标准分配一块土地，每个成员单独耕种，且不得出售或遗赠。这使得村社中的农民有权拥有土地，但无权拥有特定土地，也不能随意处置土地。"
 amendment_rus_20_years_conscription: "20年兵役制"
 amendment_rus_20_years_conscription_desc: "俄罗斯陆军的应征入伍者通常从年满20岁的城乡男性中选拔，征兵的数量则根据当年军队的实际需求通过抽签的方式确定入伍人选。而这些倒霉的入伍兵员们担负着高达20年的现役服役期的5年的后备服役期，同时还不豁免其人头税。这增强了俄军作为一支大规模陆军的长期服役能力，但却是以削弱其后备力量和持续作战能力为代价的。"
 amendment_table_of_ranks: "官秩表"
 amendment_table_of_ranks_desc: "官秩表由彼得大帝于1722年设立，它重新构建了俄罗斯贵族制度的基础，将军功、文职和宫廷服务确立为贵族社会地位的基石。该表将等级划分为14个等级，所有贵族，理论上无论其出身或财富都从表的底部开始，通过为沙皇服务而逐步晋升。尽管贵族们最初对此有所抵制，但官秩表仍然成功造就了一个受过良好教育的贵族官僚阶层。"
 amendment_1789_decree_on_the_goods: "1789年国有财产法"
 amendment_1789_decree_on_the_goods_desc: "《关于将教士财产交由国家支配的法令》是法国国民制宪议会于1789年11月2日在法国大革命期间通过的一项法令，它迫使罗马天主教神职人员将土地和财产上缴法国政府以偿还债务，使得神职人员的财产和土地成为“国家财产”，其中部分被出售以充实国库。这项法令为没收教会和流亡贵族的财产奠定了法律基础，永久改变了法国的土地所有权结构，并被后续的历届政府所承认。"
 amendment_declaration_of_the_rights_of_man: "人权和公民权宣言"
 amendment_declaration_of_the_rights_of_man_desc: "“对人权的无知、遗忘或蔑视是造成公共苦难和政府腐败的唯一原因：人人生而自由，在权利上平等，这些权利包括自由、财产、安全和反抗压迫的权利；所有公民在法律面前人人平等，均有资格根据其能力获得一切公共荣誉、职位和工作，除其德行和才能外，不得有其他区别。”"
 amendment_civil_code_of_french: "法国民法典"
 amendment_civil_code_of_french_desc: "《法国民法典》，又被称为《拿破仑法典》，是在1804年法国执政府时期由拿破仑·波拿巴效法罗马法主持制定的民法典。尽管它并非欧洲大陆法系国家所制定的第一部成文法，但它却是欧洲大陆第一部将自由主义司法原则纳入法律的法典。它还统一了法国各地原本混乱的司法体系，奠定了大陆法系的基础，从而产生了深远的影响。"
 amendment_window_tax: "门窗税"
 amendment_window_tax_desc: "门窗税是一种根据房屋窗户数量征收的房产税，它相对所得税而言来说不太扰民，也易于评估。但它往往会对不同财富等级的阶层征收同等比例的税，从而导致人们倾向于建造不卫生的房屋，这些房屋的窗户很小，因此光线昏暗、通风不良。居住在其中往往会对贫民阶层造成致命的健康后果。"
 amendment_pru_general_state_laws: "普鲁士普通邦法"
 amendment_pru_general_state_laws_desc: "《普鲁士普通邦法》是一部由腓特烈大帝起草，并于1794年在腓特烈·威廉二世统治时期颁布的总法典。它系统地编纂了普鲁士民法、刑法及其他各种公法内容，是腓特烈大帝时代开明专制的典范。尽管它在法国大革命期间受到了《法国民法典》的影响，但却仍然维持了立法者试图巩固贵族秩序的初始意愿。"
 amendment_salt_monopoly: "盐业特许制"
 amendment_salt_monopoly_desc: "一种将盐的生产、流通和定价置于政府的直接控制之下，并通过官营或特许经营获取稳定财政收入的制度。只有国家或获准者可以开采盐矿或经营盐田，甚至盐的出售都可能受到严格管控。尽管它往往为国家贡献了许多财政，但同时也极大损害了平民阶层的利益。"
 amendment_aus_gesetzbuch: "一般民法典"
 amendment_aus_gesetzbuch_desc: "《一般民法典》，又被称为《奥地利民法典》，是一部在1811年6月1日颁布的民法总则。它受到了《法国民法典》的深刻影响，以法律面前人人平等和自由为原则，并遵循罗马法的分类方法。"
 amendment_common_law: "普通法"
 amendment_common_law_desc: "普通法是一种起源于英格兰的法律体系，它一开始通过联合法案的规定被传播到不列颠群岛与爱尔兰岛，并在几个世纪中随着大英帝国的扩张而被广泛的传播到全世界。普通法的特点在于其依赖判例：法官们受到过去判决的约束，而不是严格遵循国家的成文法。这使得法律判决具有一定的可预测性和一致性，但也可能导致难以适应变化的情况，并可能使不公正或过时的法律根深蒂固。"
 amendment_bic_salt_tax: "东印度盐税法"
 amendment_bic_salt_tax_desc: "印度次大陆对盐的征税历史悠久，而在东印度公司统治的时期，这一税种被大幅提高。1835年的盐税委员会通过整合与重新审查孟加拉与奥里萨的盐税法规而在英属印度建立了统一的盐税规范，为公司创造了巨额的利润。"
 amendment_1793_permanent_settlement: "1793年永久地租法"
 amendment_1793_permanent_settlement_desc: "《永久地租》是东印度公司与印度地主之间达成的一项协议，旨在确定土地税收的征收方式。在这种制度下，原本并未拥有土地所有权的地主阶层被授予永久性的土地所有权，并负责向耕种者征收税款，且只需要向政府缴纳额度永久固定的税收，从而使他们手中的土地成为了炙手可热的永久保值商品。作为交换，他们保留武装部队的权利被剥夺，且被禁止对治下居民进行司法审判。这项法案直接造就了印度富有的柴明达尔阶层，他们对英国统治的延续深感受益，并对农民施加着强有力的控制。"
 amendment_kanunname_law: "苏莱曼法典"
 amendment_kanunname_law_desc: "《苏莱曼法典》是“立法者”苏莱曼大帝统治时期编纂的一系列法律法规。它规范了帝国的社会、教育、税收、刑律和民事法规，将帝国各地的习俗和伊斯兰教法结合，从而形成了相对世俗的法律体系，奠定了奥斯曼帝国在之后几个世纪的法律制度。"
 amendment_tur_janissary: "德夫希尔梅制度"
 amendment_tur_janissary_desc: "德夫希尔梅，又被称为“血税”，是一种从治下的基督教地区征召男孩，强迫他们接受割礼和伊斯兰教皈依并编入奥斯曼军队的制度。他们受制于严格的纪律和强大的内部凝聚力，并在理论上和大多数时候听命与苏丹。"
 amendment_qing_land_tax: "摊丁入亩"
 amendment_qing_land_tax_desc: "摊丁入亩是雍正四年到雍正七年开始陆续施行的一种税收改革制度，它将中国实行两千多年的丁税废除，并将其并入田赋，从而将人力形式的地方税收归朝廷所有。这一措施将佃农的纳税负担转嫁给了地主阶层，并免除了工商业者的人头税。"
 amendment_tifayifu_act: "剃发易服"
 amendment_tifayifu_act_desc: "剃发易服是清朝入主中原后推行的一项强制同化政策。头发在汉族的文化中占有重要地位，“身体发肤，受之父母，不敢毁伤，孝之始也”，在中国传统中，汉人成年之后除了必要修剪不可随意剃发；但随着1645年清军攻破南京，剃发易服法令强制汉族男子剪除其传统发型，即发髻，而改为满洲式长辫，并将汉服也替换为满洲式的旗装马褂，违者处死。尽管一开始引起了汉人的普遍愤怒，但在康熙帝之后逐渐潜移默化，巩固了清王朝对中国的统治。"
 ###
 amendment_landwehr_conscription: "普鲁士义务兵役制"
 amendment_landwehr_conscription_desc: "普鲁士义务兵役制是19世纪初为了反抗拿破仑统治而建立的军事制度，它的起源是由沙恩霍斯特效仿法国的普遍征兵制而创造的克吕姆佩体系，并由腓特烈·威廉三世根据1814年《兵役法》正式实施。这部法律规定所有年满二十岁的男性均有服役义务，且必须加入预备役或国土防卫军服役，并在服役期间进行轮换训练和军官的直接选拔，实现了兵员的快速动员与高质量补充。"
 amendment_landwehr_system: "国土防卫军"
 amendment_landwehr_system_desc: "国土防卫军原本是一种流行于神圣罗马帝国各邦中拥有特殊建制的民兵组织。在拿破仑战争所带来的军事革命中，它们被融入预备役系统，并成为这些国家高效动员体制的一部分。它们通常规模庞大但作战效率较低，并在训练和纪律方面有所缺陷。"
 amendment_prussian_union_of_churches: "普鲁士福音国教联盟"
 amendment_prussian_union_of_churches_desc: "普鲁士福音国教联盟是普鲁士境内受到官方指定的新教教会团体，它于1817年由普鲁士国王腓特烈·威廉三世颁布的一系列法令联合而成，这些法令将普鲁士境内的路德宗和改革宗联合起来。经过集权主义改革，这个组织事实上成为了政府的附庸，以在信徒中推行国教信仰和王室指定的圣礼。"
 amendment_prussian_dreiklassenwahlrecht: "三级选举制"
 amendment_prussian_dreiklassenwahlrecht_desc: "三级选举制将选民的投票权根据其纳税额分为三个等级，有资格投票且缴纳税款最多的选民在第一等级投票，以此类推。这种制度导致不同等级选民的选票所产生的影响截然不同，使得选举结果实际上更有利于富有阶层和税收水平更高的农村地区。"
 ###
 amendment_state_general_mobilization: "国民征用令"
 amendment_state_general_mobilization_desc: "国民征用令规定了日本帝国政府在战时对民间组织的控制、战略产业的国有化、价格管制和配给制，以及新闻媒体的国有化。它还赋予政府动用无限预算补贴战争生产的权力，对全部大于14岁的男性公民实施强制征兵的权力，以及对大于16岁的女性公民进行强制劳动征用的权力。"
 amendment_american_sixth_amendment: "宪法第六修正案"
 amendment_american_sixth_amendment_desc: "“在一切刑事诉讼中，被告有权由犯罪行为发生地的州和地区的公正陪审团予以迅速和公开的审判，该地区应事先已由法律确定；得知控告的性质和理由；同原告证人对质；以强制程序取得对其有利的证人；并取得律师帮助为其辩护。”"
 amendment_american_seventh_amendment: "宪法第七修正案"
 amendment_american_seventh_amendment_desc: "“在普通法的诉讼中，其争执价额超过二十美元，由陪审团审判的权利应受到保护。由陪审团裁决的事实，合众国的任何法院除非按照普通法规则，不得重新审查。”"
 amendment_american_eighth_amendment: "宪法第八修正案"
 amendment_american_eighth_amendment_desc: "“不得要求过多的保释金，不得处以过重的罚金，不得施加残酷并且不正常的惩罚。”"
 amendment_american_ninth_amendment: "宪法第九修正案"
 amendment_american_ninth_amendment_desc: "“本宪法对某些权利的列举，不得被解释为否定或轻视由人民保留的其他权利。”"
 amendment_american_tenth_amendment: "宪法第十修正案"
 amendment_american_tenth_amendment_desc: "“本宪法未授予联邦、也未禁止各州行使的权力，保留给各州行使，或保留给人民行使之。”"
 amendment_factories_act_1833: "1833年工厂法案"
 amendment_factories_act_1833_desc: "作为30年代广泛改革运动的一部分，1833年工厂法是1831年纺织劳工法的标志性修订。它由安东尼·阿什利·库珀领导的十小时工作制运动和托利党议员迈克尔·萨德勒推动，是世界上第一部旨在通过政府干预来限制和保护童工的法律。该法案首次禁止9岁以下的儿童从事工厂工作，规定9至13岁的儿童每天工作时间不得超过8小时。它还宣布雇佣18岁以下儿童从事夜间工作为非法，并设立了一个工厂监察局以执行该法案。然而，由于较小的监察规模和庞大的工厂数量，这部法案仍然在许多情况中遭到工厂主们的规避。"