l_simp_chinese:
 #德意志统一方案
 joi_flavor_pru.1.t: "德意志统一方案"
 joi_flavor_pru.1.d: "伴随着对[SCOPE.sCountry('AUS_scope').GetName]战争的胜利，#V 德意志统一#!的热切思潮席卷了[ROOT.GetCountry.GetName]，政府也对德意志统一的方针问题展开了讨论。"
 joi_flavor_pru.1.f: "“若是将奥地利和波西米亚纳入德意志帝国的范围，这毫无疑问会将我国陷于孤立在欧洲的不利境地...从[SCOPE.sCountry('GBR_scope').GetName]到[SCOPE.sCountry('RUS_scope').GetName]，我们的一支独大将引起世界各国的警惕，而这绝非新生的德意志帝国可以承受的...”\n\n“叛国贼！你在说什么胡话！普鲁士怎么可以因为虚无缥缈的害怕而放弃这个把德意志民族完全融为一体的好机会，而惟独落下奥地利？！若是这么做，我们将遗臭万年，为所有期盼着我们带来统一的德意志人民唾骂！”\n\n“[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，若是您不采纳我的方案，那我唯有辞职。”"
 joi_flavor_pru.1.a: "采纳伟大的大德意志方案！"
 joi_flavor_pru.1.b: "还是小德意志方案比较现实。"
 #莱茵兰的工业巨头
 joi_flavor_pru.2.t: "莱茵兰的工业巨头"
 joi_flavor_pru.2.d: "伴随着莱茵兰的不断发展，曾经建设一片伟大工业区的计划已经成为现实，轰鸣的机器为[ROOT.GetCountry.GetName]的血脉提供了澎湃的动力。"
 joi_flavor_pru.2.f: "“莱茵兰是我国最重要的工业区...政府一向鼓励企业在这里建立新的工厂，把新的技术投入到工业之中。”\n\n“是的阁下！我有一个好主意...听我说！我们手里有一个新的弹药制造法门，我们相信通过这项技术我们将可以在莱茵兰建立一家新的弹药厂，并在未来击败[SCOPE.sCountry('GBR_scope').GetName]，[SCOPE.sCountry('FRA_scope').GetName]和[SCOPE.sCountry('USA_scope').GetName]的军工同僚们！地址我已经选好了，就在鲁尔的杜塞尔多夫，那里地理环境好，我已经购置了土地！”\n\n“听起来前途美好先生，那您为何要和我说呢？”\n“是这样的，我的工厂...缺乏资金，希望得到政府我补助来帮助我建立这座工厂，相对的，我愿意提供一部分股份给[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]...相信我！这会是一笔一本万利的生意！”"
 joi_flavor_pru.2.a: "军火？莱茵兰的弹药厂已经够多了！还是把宝贵的资金提供给其他企业吧。"
 joi_flavor_pru.2.b: "一座能击败所有同行的弹药厂？我们的军队很喜欢，让我们抓紧时间投资！"
 #义务教育法
 joi_flavor_pru.3.t: "义务教育法"
 joi_flavor_pru.3.d: "新的学校被建立，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]则已经就[ROOT.GetCountry.GetName]新的义务教育法照章批示"
 joi_flavor_pru.3.f: "“首先，我们#bold 希望所有负责年轻人教育的臣民#!，无论是父母，监护人还是统治者，#bold 都有自己的孩子#!，无论是男孩还是女孩...以及那些委托他们照顾的孩子。”\n\n“如果不能更早，那就从他们#bold 五岁起就送他们上学#!，并在继续到十四岁的时间内#bold 都让他们留在学校#!，直到他们不仅掌握了物理，化学和政治经济的基本要点，并且能够阅读和正确写作，以及拥有基本的数学技巧。一应所有应当教学给他们的东西，都必须#bold 根据政府所规定和批准的教科书回答#!，并在这个纲领内，充分地让这些学生学会，并接受考验他们是否达到了毕业要求的考试。”\n\n“对于考试中取得了优良成绩的学生，当地的政府应当#bold 每年拨出金钱#!来确保这些学生能够进入我国的#bold 高等学府#!完成他们的学业...并最终得以最大化他们的智慧为我国做贡献。”"
 joi_flavor_pru.3.a: "人人应受教！"
 #伟大的军事改革
 joi_flavor_pru.4.t: "伟大的军事改革"
 joi_flavor_pru.4.d: "近日连续的军事改革的措施已经宣告完成，赫尔穆特·冯·毛奇自信地向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]宣称，[ROOT.GetCountry.GetName]的军队已经堪称全欧第一。"
 joi_flavor_pru.4.f: "“总参谋部是[ROOT.GetCountry.GetName]陆军的灵魂，因此我扩充了总参谋部，设立了新的处理部门...其中最令我骄傲和自豪的就是这里：#bold 铁道处！#!这里可以在战争时越过政府直接控制我国全国的铁路，帮助我们的军队以极快的速度完成动员。”\n\n“同时还有这里...从极其古老的时代开始，君主就总是指挥国家的陆军，然而这在现代已经不合适了。从现在起，#bold 总参谋长#!将代替君主的职务，总领全国陆军的指挥权。”\n\n“新的武器引进到我们的陆军之中，这点是任何其他欧洲国家都没有完成的功绩！许多人宣称新的武器不可靠不好用成本高，但是我们不在乎：相反，[ROOT.GetCountry.GetName]必须树立起一种根植于其政府和军队的意识，那就是一切的预算必须#bold 以培养我们的军事为优先#!，而军事的预算则以#bold 更新我们的武器为优先#!。”"
 joi_flavor_pru.4.a: "从现在开始，对集结的军队和其独立组成部分的军事行动的命令应当传达给总参谋长。"
 #守望莱茵
 joi_flavor_pru.5.t: "守望莱茵"
 joi_flavor_pru.5.d: "[SCOPE.sCountry('FRA_scope').GetName]对莱茵兰“自然疆界”的鼓吹引起了德意志人民的广泛愤怒，一名叫贝克尔的诗人撰写了一首名为《守望莱茵》的诗歌，引爆了德意志境内广泛的反法情绪。"
 joi_flavor_pru.5.f: "“一声怒吼如惊雷，像海在啸，像剑在鸣；\n谁去莱茵，谁去莱茵，去保卫她不受欺凌？！\n#bold 亲爱的祖国，请您放心：我们将坚定不移，守望莱茵！#!\n\n吼声迅速传四方，无数眼睛发精光，\n忠勇的德国青年们，去保卫神圣国境！\n#bold 亲爱的祖国，请您放心：我们将坚定不移，守望莱茵！#!\n\n举目仰望，蓝天无垠，雄视大地，豪气凛凛，\n莱茵，我对你发誓：你永属德国，就像我的心！\n#bold 亲爱的祖国，请您放心：我们将坚定不移，守望莱茵！#!\n\n誓言犹在，巨浪滚滚，旌旗在迎风翻腾，\n快去莱茵，快去德意志的莱茵，去保卫她不受欺凌！\n#bold 亲爱的祖国，请您放心：我们将坚定不移，守望莱茵！#!”"
 joi_flavor_pru.5.a: "莱茵，我对你发誓：你永属德国，就像我的心！"
 joi_flavor_pru.5.b: "亲爱的祖国，请您放心：我们将坚定不移，守望莱茵！"
 #第一次重置事件组
 joi_flavor_pru.6.t: "最高主教"
 joi_flavor_pru.6.d: "在[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的努力下，政府有效加强了对[ROOT.GetCountry.GetName]境内各个[GetReligion('protestant').GetName]教派——尤其是加尔文宗和路德宗的管控。他们被要求强制执行新的圣礼，服从政府的指示，而[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]本人则希望更进一步：效法圣公会，宣布自己为普鲁士教会的最高主教。"
 joi_flavor_pru.6.f: "“[ROOT.GetCountry.GetName]的整个教会体制建立在一个不确定、模糊且不稳固的基础之上...只有对信义宗和路德宗兄弟姐妹们的迫害。因此，我怀疑我们当地的教会是否是一个真正的基督教会，也怀疑我们的事工是否真正服务于上帝的旨意。”\n\n“兄弟，主会告诉你，尽管存在一些斯蒂芬主义的谬误，但上帝的道依然存在。我们当中仍然都是基督徒，因此教会仍然在我们中间。上帝保佑[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。”"
 joi_flavor_pru.6.a: "现在是和解的时候了，授予老路德教徒们更多的自由。"
 joi_flavor_pru.6.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]应该成为福音派国教的最高主教！"
 #市政法典
 joi_flavor_pru.7.t: "莱茵市政法典"
 joi_flavor_pru.7.d: "经过数年的编撰和#V 人民之春#!带来的影响，一部新的法典——针对#yellow 莱茵兰#!市政当局的法典——已经在[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName]等人的努力下撰写完成：然而，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]似乎并不希望授予市政当局更多的法定自治权，而是计划在其中加入王室御令的特殊文本。"
 joi_flavor_pru.7.f: "“市政区域包括所有位于其边界内的不动产，市政区域的边界变更必须经[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]批准并需听取市政代表机构意见。若涉及多个市政区域之间的关系调整，则由政府机关在听取相关各方意见后，通过行政程序作出决定；私人法律关系不得因上述变更而受到损害。”\n\n“所有市政区域内居民，有权使用城市的公共设施，并有义务根据本法规定参与承担城市公共负担。对于与市政公共机构相结合的特殊基金，其既有法律规定仍然有效，不受本法影响；凡未在市政区域居住，但在当地拥有地产或经营企业者，仍须按其从该地产或企业所得收益承担相应税费；此外，通过王室命令，本《市镇法》亦可应申请授予莱茵省内其他由城市等级代表的市镇。”"
 joi_flavor_pru.7.a: "将法典授予所有在莱茵省议会中拥有代表的市镇。"
 joi_flavor_pru.7.b: "命令内政大臣采取一切必要措施执行王室御令。"
 joi_flavor_pru.8.t: "帝国市政宪法"
 joi_flavor_pru.8.d: "在[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetLeader.GetFullName]和[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetLeader.GetFullName]等人的努力下，我们的政府成功整合了过去完全分裂和数量庞大的，颁行在[ROOT.GetCountry.GetName]各地的市政法典，并准备在得到[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的批准后生效。"
 joi_flavor_pru.8.f: "“在民族意志所贯穿的秩序中，市镇不仅应服务于国家整体，而且应独立存在，在人民最佳力量的领导之下，为建立真正的民族共同体作出贡献，使人民在最终认知中获得共同体归属感；在其中，市镇将人民在地方共同体中生存的力量汇聚起来，以履行其更紧密家园范围内的公共任务。它们在自身责任下管理自身事务。其行为必须与法律规定以及国家领导的目标保持一致。”\n\n“市镇在其辖区内，应在自身责任下履行所有公共事务，除非法律明确禁止，或基于法律规定由其他机构承担；其可以通过章程管理其自身事务，只要法律未作规定或本法明确允许；国家可以通过法律将国家任务委托给市镇执行，新的义务只能通过法律强加于市镇；对其权利的干预亦须依法律进行。为执行此类法律所发布的条例，须经帝国内政部长批准。”"
 joi_flavor_pru.8.a: "元首原则必须得到执行。"
 joi_flavor_pru.8.b: "各市政的自治传统是我们国家最宝贵的财富。"
 #普鲁士的保守秩序
 joi_flavor_pru.9.t: "王位上的浪漫主义者"
 joi_flavor_pru.9.d: "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的保守主义努力取得了成效。作为一名坚信君权神授的传统君主和虔诚的基督教徒，他采取了较为温和的政策，但也成功阻止了革命和激进主义的威胁。他的理想塑造了这个时代的[ROOT.GetCountry.GetName]国家。"
 joi_flavor_pru.9.f: "“朕深感自己能为王完全是出于上帝的恩典，并且会一直这样认为，直到生命的尽头。我毫无嫉妒之心，将荣耀和虚伪留给那些所谓的宪政君主，他们不过是纸上谈兵，是人民眼中一个抽象的概念。”\n\n“朕对臣民的需求有着神圣的洞察力，任何对其事实上的绝对权力的限制都是对其神圣使命的不负责任的阻碍——你们的职责不是代表某种观点，也不是要把时代的舆论摆在台面上：这完全不符合德意志民族的精神，而且也完全不切实际。”"
 joi_flavor_pru.9.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的统治遵从上帝的旨意。"
 joi_flavor_pru.9.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下是进步与正义的代言人。"
 joi_flavor_pru.10.t: "退位"
 joi_flavor_pru.10.d: "保守主义的势力在革命和激进派在[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]组织的动乱下遭受重创，反动的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]被迫退位，而新任的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]则在革命者的枪支下仓促登基。"
 joi_flavor_pru.10.f: "“下午两点，城里各处爆发了骚乱。我们之所以注意到骚乱，是因为有人向弗朗茨军团营房前的哨兵开枪，而该营房与少年军校营房相邻。传来消息说，少年军校——这个反动势力的温床——要被彻底清除！这使我们的上级军官陷入了非常尴尬的境地；与外界的一切联系都被切断了，而原本驻扎在我们隔壁的弗朗茨军团也被调走了，所以我们不得不自己决定下一步该怎么做。”\n\n“我们接到警报，必须披上斗篷，带上枪支，奉普里特维茨将军之命向[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]皇宫进发。我们天刚蒙蒙亮就出发了。在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]大街上，我们经过了三四个废弃的街垒；可以看到街上大部分窗户都被打碎了，所有房屋上都留有弹痕。”"
 joi_flavor_pru.10.a: "[ROOT.GetCountry.GetHeir.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下万岁！"
 joi_flavor_pru.11.t: "基督教国家"
 joi_flavor_pru.11.d: "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在国内推行基督教价值观的工作广受欢迎，通过对艺术和神圣价值观的复兴，[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]教会已经成为了[ROOT.GetCountry.GetName][GetLawType('law_monarchy').GetName]的强大支柱。"
 joi_flavor_pru.11.f: "“国家肩负着我们为[ROOT.GetCountry.GetName]设定的伟大道德目标——提升人类的境界——它自身也负有双重义务：促进这种宗教信仰，从而引领其臣民走向更大的幸福。这样做，他将对这种趋势产生强大的影响，使其广泛传播并占据主导地位。”\n\n“一场旨在实现正义战胜邪恶、真正高尚的自由和宗教信仰战胜奴役、虚伪的道德沦丧和贪婪专制的斗争——这样的斗争将是最振奋人心的，并且必将取得辉煌的胜利。领导这场斗争的君主，作为人类的恩人，必须成为真正的精神领袖。”"
 joi_flavor_pru.11.a: "[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]向我们启示神圣的秩序。"
 joi_flavor_pru.11.b: "只有基督教才能保护[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的臣民免受革命的侵害！"
 joi_flavor_pru.12.t: "[TimeKeeper.GetCurrentDate.Format('y年')]王室法令"
 joi_flavor_pru.12.d: "通过政治上的强力手段和合适的妥协，尽管面临着革命的连续打击和激进主义的巨大威胁，但[ROOT.GetCountry.GetName]的神圣[GetLawType('law_monarchy').GetName]秩序仍然遵从上帝的旨意而获得了存续。"
 joi_flavor_pru.12.f: "“所有为阻止革命而筑起的堤坝都收效甚微，因为软弱、自私自利和错误的观念有时导致堤坝建设缺乏连贯性，有时导致堤坝建设遭到危险的破坏，从而使毁灭性的浪潮得以蔓延并产生影响。认为对抗革命最安全的方法是固守旧习并严格遵守革命所倡导的原则，这种错觉极大地促进了革命的传播和日益扩大。”\n\n“因此，一场真正意义上的革命，其最终目标是通过政府的智慧而非来自内部或外部的暴力冲动，实现人类进步的伟大目标——这才是我们的指导原则，在[GetLawType('law_monarchy').GetName]政府中奉行民主原则：在我看来，这才是符合当今时代精神的恰当形式。纯粹的民主制度，如果真能真正适合人类，那就留待2440年吧。”"
 joi_flavor_pru.12.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的统治如同腓特烈大帝般稳固，且明智。"
 joi_flavor_pru.12.b: "对抗革命的坚固堤坝恰恰是民主制度本身。"
 joi_flavor_pru.13.t: "普鲁士工业法典"
 joi_flavor_pru.13.d: "在[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的统治下，莱茵兰，西里西亚和[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]逐渐发展成为工业化中心——[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]支持工业革命带来的技术进步，尤其通过发行政府债券来促进铁路网络的扩张，促进了[ROOT.GetCountry.GetName]的进步：然而，[GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetName]的崛起也带来了许多新的威胁。"
 joi_flavor_pru.13.f: "“社会主义是一种旨在推翻现存国家与社会秩序的运动：我们必须把社会主义当作[ROOT.GetCountry.GetName]的敌人来对待。对这种运动，除了坚决镇压别无他法；他们的每一次胜利都是[ROOT.GetCountry.GetName]的失败，我们不能按照民事司法规则与这一势力作战，而只能按照战争规则。”\n\n“劳动者、贫困公民，以及所有无资本阶级，完全有理由要求国家将目标和一切努力导向改善劳动阶级悲惨贫困的境况，并探索各种途径，帮助那些创造了我们文明赖以炫耀的一切财富的劳动者。所有这些产品都源于他们的双手，没有他们，整个社会将不堪重负；因此，国家有责任帮助他们获得更丰厚、更有保障的工资，从而有机会接受合理的教育，并最终过上真正体面的生活。”"
 joi_flavor_pru.13.a: "劳工运动必须受到严厉监视。"
 joi_flavor_pru.13.b: "社会主义与叛国无异！"
 joi_flavor_pru.13.c: "放轻松。工人们只是提出自己的诉求。"
 #科隆大教堂
 joi_flavor_pru.14.t: "1248年的回响"
 joi_flavor_pru.14.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，政府以及许多热情的民族主义者的赞助下，#yellow 科隆大教堂#!在今天成功落成。[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]出席了完工庆典，整个#yellow 德意志民族#!都在为了这件伟大艺术品，伟大民族成就的完工而欢呼！"
 joi_flavor_pru.14.f: "“当我站在它面前时，眼前的景象令我感到无比震撼！一种完整而宏大的印象充盈着我的灵魂，它由无数和谐的细节构成，我得以品味和享受，却无法辨识和解释。人们说，这就是天堂的喜悦，而我曾多少次回到这里，享受这天人合一的喜悦，去拥抱我们祖先们作品中蕴藏的伟大智慧。”\n\n“你站在那里，心潮澎湃，无法调和灵魂深处交织的矛盾，此刻感受到整体不可抗拒的力量，此刻却因为我看到了你眼中只有力量和粗糙的地方的美，而称我为空想家。他们想让你相信，美术源于我们天生想要美化周遭事物的倾向，这并非事实！因为即便从某种意义上说它是真的，真正需要这些话语的，也只有普通百姓和工匠，而非哲学家。”"
 joi_flavor_pru.14.a: "跨越六个世纪的光阴，我们正与那些伟大先贤们的意志相通！"
 #普鲁士美德
 joi_flavor_pru.15.t: "普鲁士美德"
 joi_flavor_pru.15.d: "通过对#yellow 普鲁士美德#!的大力弘扬，其理念对我们的整个社会以及军事都产生了深远的影响：人们热衷于追求包括忠诚、为国家和[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]谋福利的，自我牺牲与无私奉献式的品德，为整个[ROOT.GetCountry.GetName]与#yellow 德意志民族#!都赢得了广泛的尊重。"
 joi_flavor_pru.15.f: "“服务至上，而潇洒不过是虚张声势...真正高尚的人服从的不是统治者，而是责任感：我们所肩负的不是享乐，甚至不是爱情，而是责任。这更是普鲁士特有的品质。我们因此而区别于其他民族，即使是那些不理解它、甚至对我们怀有恶意的人，最终也会意识到，我们的优越性正是源于此。”"
 joi_flavor_pru.15.a: "永远忠贞正直，直至你冰冷的坟墓；切勿偏离上帝的道路，哪怕一指之远。"
 