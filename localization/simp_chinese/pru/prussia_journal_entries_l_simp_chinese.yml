l_simp_chinese:
 #总参谋部
 general_staff:0 "总参谋部"
 general_staff_reason:0 "#bold 指挥点#!的数值由多个#tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_advance 正面#!或#tooltippable;tooltip:[Country.GetTooltipTag],general_staff_tooltip_delete 负面#!条件决定。\n\n#variable 总参谋部#!是[ROOT.GetCountry.GetName][GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]中对[concept_war]进行#bold 规划和决策的高级军事机构#!，是当代所有军队总参谋部的样板。#bold 总参谋部#!的#bold 崛起#!和#bold 发展#!是我军与其对手相比最大的#bold 优势#!，也是我军在战场上#variable 令人生畏的主因。#!\n\n#bold 1806年#!由#bold 沙恩霍斯特将军#!和#bold 格奈森瑙元帅#!建立的#bold 参谋本部#!被设计为[concept_army]的中枢，负责对[concept_war]各方面的研究，制定部队机动方案及战役实施方案，拟定作战和[concept_mobilize_army]的计划，而#bold 1821年#!首任#bold 总参谋长卡尔·冯·米夫林男爵#!的上任则标志着#bold 总参谋部#!的正式成立。\n\n#bold 总参谋部#!的培训机制并不只为了培养出合格的参谋人员，更为了为[ROOT.GetCountry.GetName]的战争机器开足马力，使军队长胜不败。\n\n吾乃普鲁士人，汝可知我颜色？\n普鲁士的旗帜在猎猎飘扬，\n普鲁士的雄鹰在云端翱翔；\n普鲁士的旗挥向的是无上荣耀，\n普鲁士的剑指向的是胜利之路；\n而在普鲁士的光辉之上，\n我将如磐石和橡树般守望！"
 general_staff_status:0 "#V #I #B 总参谋长和军需总监负责指挥总参谋部。#!#!#!"
 general_staff_1_button:0 "轮换军官"
 general_staff_1_button_desc:0 "尽管参谋人员理论上终身服役，但若是只靠参谋部内的军官并不足以保证我们的军队能够及时得到最新的战术革新和实战经验。当然，在我们的体制中，参谋人员可以在一线部队和参谋部之间轮换工作，而被他们替换的基层军官则会提拔到总参谋部中历练，最终成为杰出的前线指挥官。通过提高这一行动的频率，我们可以更好地锻炼我们的军队。"
 general_staff_1_button_tt:0 "花费25#bold 指挥点数#!\n1次#bold 轮换军官#!将持续5年\n只有在当前未进行#bold 轮换军官#!时执行该行动。"
 general_staff_2_button:0 "参谋计划"
 general_staff_2_button_desc:0 "宏观上的战争计划对我们的胜利起到至关重要的作用，而总参谋部的各级部门拥有充足的地理资料和作战数据，可以命令他们综合这些制定一份针对当前局势行之有效且能够应对任何突发情况的计划。根据计划的需要，总参谋部将全权调配国家资源以确保其执行到位。同时，总参谋部还可以对前线指挥官提交的战役计划作细节上的修改。"
 general_staff_2_button_tt:0 "花费50#bold 指挥点数#!\n1次#bold 参谋计划#!将持续2年\n只有在当前未进行#bold 参谋计划#!时执行该行动。"
 general_staff_3_button:0 "坚定防御"
 general_staff_3_button_desc:0 "战争局势需要我们的军队顽强地把守住前线的阵地，总参谋部应当起草一份可行的防御计划下发给前线的所有指挥官和士兵，使他们能够领会到指挥部的战略意图以执行坚守的命令；同时，总参谋部也将调拨大量的资源给前线的军队来确保士兵能够保持战线的稳定。"
 general_staff_3_button_tt:0 "花费50#bold 指挥点数#!\n1次#bold 坚定防御#!将持续1年\n只有在当前未命令#bold 坚定防御#!时执行该行动。"
 general_staff_4_button:0 "强行进攻"
 general_staff_4_button_desc:0 "战争局势需要我们的军队快速向前突进以夺取前线的优势，总参谋部应当起草一份可行的进攻计划下发给前线的所有指挥官和士兵，使他们能够领会到指挥部的战略意图以执行突击的命令；同时，总参谋部也将调拨大量的资源给前线的军队来确保士兵能够发起连续的冲锋。"
 general_staff_4_button_tt:0 "花费50#bold 指挥点数#!\n1次#bold 强行进攻#!将持续1年\n只有在当前未命令#bold 强行进攻#!时执行该行动。"
 general_staff_5_button:0 "全国动员"
 general_staff_5_button_desc:0 "战争已经进行到了最关键的时候，任何手下留情或保留都会导致我们伟大国家的利益遭受损失。为了战争的胜利，总参谋部将得到指示，允许他们动员全国的力量为军队服务，不论投入地倾尽全部的力量只为追逐胜利！"
 general_staff_5_button_tt:0 "花费50#bold 指挥点数#!\n1次#bold 全国动员#!令将持续5年\n只有在当前未下发#bold 全国动员#!令时执行该行动。\n过度的全国总动员将破坏我国的经济秩序！"
 general_staff_6_button:0 "战争授权"
 general_staff_6_button_desc:0 "当前的战争局势不容乐观，总参谋部已经向政府提交了一份文件，里面全面阐述了对敌我双方实力对比的忧虑，并请求内阁临时通过特殊授权法，将政治权力转交给总参谋长和军需总监，以便以最大的可能发挥整个国家的潜力夺取胜利。"
 general_staff_6_button_tt:0 "花费100#bold 指挥点数#!\n1次#bold 战争授权#!将持续5年\n只有在当前未#bold 战争授权#!给总参谋部时执行该行动。\n过度的军事化授权将破坏我国的政治稳定！"
 general_staff_tt_1:0 "总参谋部是我国陆军的灵魂与核心，而维持强大的陆军则是我国确保利益的关键。"
 general_staff_tt_2:0 "#bold 轮换军官#!将花费25#bold 指挥点数#!\n#bold 参谋计划#!将花费25#bold 指挥点数#!\n#bold 坚定防御#!和#bold 强行进攻#!都将花费50#bold 指挥点数#!\n#bold 全国动员#!将花费50#bold 指挥点数#!\n#bold 战争授权#!将花费100#bold 指挥点数#!。"
 general_staff_unlock_button_tt:0 "完成了#V 毛奇军事改革#![concept_journal_entry]"
 general_staff_tooltip_advance:0 "#bold 以下情况每个月会增加2指挥点#!：\n•#variable 处在战争中#!\n•#variable 拥有[GetLawType('law_professional_army').GetName]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName][concept_approval]大于等于5#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName][concept_clout]是[concept_powerful]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]正在执政#!\n•#variable 已研究#bold 电报#!#!\n•#variable 正在进行轮换军官#!"
 general_staff_tooltip_delete:0 "#bold 以下情况每个月会减少5指挥点#!：\n•#variable [concept_rank]小于[concept_great_power]#!\n•#variable 未拥有[GetLawType('law_professional_army').GetName]或[GetLawType('law_mass_conscription').GetName]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName][concept_clout]是[concept_marginalized]#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName][concept_approval]小于等于-5#!\n•#variable [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]未在执政#!"
 #莱茵兰工业化
 rhineland_industrialize:0 "莱茵兰工业化"
 rhineland_industrialize_status:0 "将资源丰富的莱茵兰变成真正的工业区"
 rhineland_industrialize_reason:0 "莱茵兰，这片在维也纳会议后被划归[ROOT.GetCountry.GetName]所拥有的领土，尽管这里和我国的核心并不接壤，但随着技术的发展，当地陆续开采出的自然资源却为那里的工业发展提供了极大的便利。\n\n以#bold 阿尔弗雷德·克虏伯#!为首的企业已经向柏林政府提交了一份方案，计划将这里建成我们国家的一个新工业区：不过这需要来自中央的支持。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经指示政府以这份方案为最优先事项，将其描绘的莱茵兰工业区变成现实，缓缓流淌的莱茵河将成为我国的一个新的主要经济支柱。"
 rhineland_indu_tt_1:0 "在莱茵兰的建设将为我们提供许多好处..."
 #普鲁士的教育体系
 peussia_education:0 "普鲁士教育法"
 peussia_education_reason:0 "“每个学生没有证明自己成为优秀的工匠，商人，军人，政治家，但仍然是一个诚实的人和一个好公民，他们不考虑他自己的工作而寻求必要的培训，通过此将很容易地获得工作的特殊能力，并始终保持自由。”\n\n[ROOT.GetCountry.GetName]的教育体制在目前的欧洲和世界都可以说是#V 最为先进#!，这都归功于#yellow 威廉·冯·洪堡#!在#V 1810年#!所推动的教育改革：实施了十几年的#blue #B #L 洪堡教育法#!#!#!规定所有公民必须接受基础的小学教育；技术教育开始被推行；#variable 柏林大学#!更是从国家财政中获得了一大笔拨款来进行她的学术研究，从而使得杰出的#v $academics$#!前来为她服务。\n\n不过，现有的#O 教育体系#!也有所缺憾，诸如欠缺职业技术培训，学生升学的财政保证等问题正限制着[ROOT.GetCountry.GetName]人才的涌现。相信进一步推进教育改革，以建立一个#B 人人都能接受，且人人都能进一步深造#!的#G 平等的，义务的#!教育系统将对我们的国家产生巨大的好处。"
 peussia_education_tt_1:0 "新的教育法将被颁布。"
 #毛奇军事改革
 peussia_army_reform:0 "毛奇军事改革"
 peussia_army_reform_status:0 "由#bold 赫尔穆特·冯·毛奇#!推进的军事改革旨在对军队进行全面改革来增强作战能力"
 peussia_army_reform_reason:0 "[SCOPE.sCharacter('eldermoltke_scope').GetFullName]，#yellow 克劳塞维茨将军#!的弟子，正在计划针对[ROOT.GetCountry.GetName]的军队进行全面的改革：\n\n他希望#V 彻底改革总参谋部#!，极大扩张其权职范围，使得#B #L 总参谋部#!#!在[concept_war]时期成为总司令“唯一的顾问”，由它#bold 制订战略和策略，协调军力和物力#!，统一军事行动的指挥；#V 引入新的战争技术#!，大规模更新军队的装备，#bold 发展新的强力火炮，把#yellow 铁路和电报#!用于[concept_war]之中#!，保证部队的调动和接应；并最终#V 加强总参谋部军官的训练#!以执行新的战争计划，要求#v $officers$#!们充分发挥主动性，周密地规划作战计划，并采取猛烈的攻势。\n\n如果政府想要维持[ROOT.GetCountry.GetNameNoFlag][GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]在欧洲的威严，我们就应该采纳[SCOPE.sCharacter('eldermoltke_scope').GetLastName]的意见，全面现代化我国的军队。"
 peussia_army_reform_tt_1:0 "军事改革的成功将为我们解锁新的#bold 总参谋部#!可用行动！\n同时，我们的军队也将得到强化。"
 #德意志之路
 way_to_germany:0 "德意志之路"
 way_to_germany_reason:0 "“[ROOT.GetCountry.GetName]在德意志的地位不取决于它的自由主义，而是取决于它的力量...普鲁士必须集中力量，而且维持力量以待适当时机，这时机来临了好几次，也离开好几次了。自从维也纳诸条约以来，我们的边界划分得太差了，不利于健全政治。当代的重大问题不是通过演说和多数派决议所能解决的，而是要用#variable 铁和血#!来解决！”\n\n德意志统一的理想目前看来似乎已经不在遥远：只要夺取[concept_war]的胜利，击败我们最大的挡路石[SCOPE.sCountry('AUS_scope').GetName]，就能成为唯一的[concept_unification_candidate]，终结德意志邦联来真正将德意志统一为一个整体。\n\n然而，德意志并非一片固定不变的疆土——有人宣称德意志只需要从马斯到梅梅尔就足够了，也有人坚持通过军事手段彻底#variable 统一整个德意志邦联#!。\n\n摆在[ROOT.GetCountry.GetName]的道路未来晦涩难明，我们究竟应该踏上哪一条道路？"
 big_germany_tt:0 "我们将获得整个德意志邦联的宣称。\n但这将断送我们未来和奥地利的联盟可能。"
 little_germany_tt_1:0 "我们将获得奥地利以外的德意志邦联宣称。"
 little_germany_tt_2:0 "德奥同盟将在我们建立德意志帝国后可用。"
 way_to_germany_1_tt:0 "必须没有[GetPlayer.GetName]以外的德意志[Concept('concept_unification_candidate', '$concept_unification_candidates$')]"
 way_to_germany_complete_tt:0 "奥地利不存在"

 #3/2026 普鲁士第一次重置
 prussian_union_of_churches:0 "改革普鲁士新教会"
 prussian_union_of_churches_reason:0 "选帝侯#V 约翰·西吉斯蒙德#!的遗产为当时的#yellow 勃兰登堡侯国#!带来了大量的#B 加尔文宗#!教徒，尽管他们一直和平共处，但自宗教改革以来，[ROOT.GetCountry.GetName]的两个[GetReligion('protestant').GetName]教派——#B 加尔文教宗和路德宗#!——就一直拥有各自的教会管理机构。在#V 拿破仑战争#!之后，#yellow 腓特烈·威廉三世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]将这些机构被合并入[concept_government]中的#B 宗教事务部#!，但王室对这些宗教派别的控制仍然处于相当弱小的状态，尤其是在距离[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]较远的地方。\n\n#V 1829年的改革#!废除了#B 路德宗#!和#B 加尔文宗#!的专有教会名称，并将他们改名为[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]，但是一些被称为#yellow “老路德教徒”#!的异议者仍然在[ROOT.GetCountry.GetName]的各地盘踞，他们成立了自己的秘密路德教会，拒绝使用[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]要求他们使用的新圣礼，并#B 与[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]政府分庭抗礼#!。\n\n如果[concept_government]想要强化对于[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]信徒们的管控，我们就必须采取措施，确保对他们的#B 持续监视和逮捕#!。"
 event_joi_pru_6_b_tt:0 "1000名信仰[GetReligion('protestant').GetName]的[GetCulture('north_german').GetName]人会迁徙到#yellow 密苏里#!\n1000名信仰[GetReligion('protestant').GetName]的[GetCulture('north_german').GetName]人会迁徙到#yellow 南澳大利亚#!"
 #
 rheinische_homerule:0 "莱茵兰的市政自治"
 rheinische_homerule_reason:0 "自#v 启蒙主义#!以来，市政当局与国家在宪法上的融合长期以来都是争论的焦点。许多流行于[GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetName]群体中的主流观点认为市政当局实际上并非中央政府的一部分，而是一种社会现象。\n\n这种分歧在[ROOT.GetCountry.GetName]治下的#yellow 莱茵兰#!尤为突出：#yellow 莱茵兰#!拥有现代化的[concept_law]、#O 经济#!和#O 宪政结构#!——这是继承自[SCOPE.sCountry('FRA_scope').GetName]统治时期的成就——而东部各省则以农业为主，以庄园为基础。尽管#V 1831年#!的#B 普鲁士市政法典#!宣布将其纳入了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的司法范围，但事实上，#yellow 莱茵兰#!仍然保持着司法与行政上的高度自治。\n\n作为[ROOT.GetCountry.GetName]重要的工业和城市中心，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]必须重新划定#yellow 莱茵兰#!的市政当局与中央政府的关系，无论是通过授予他们#B 法定的自治权#!，又或是采取#B 更强力的统治#!。"
 rheinische_homerule_complete_tt:0 "完成了#V 编写市政法典#!"
 rheinische_homerule_complete_3_tt:0 "正在经历或经历过#V 人民之春#!"
 rheinische_homerule_complete_2_tt:0 "以#B 反革命胜利#!结束了#V 人民之春#!"
 rheinische_homerule_button:0 "开始编写市政法典"
 rheinische_homerule_button_desc:0 "在我们的内阁大臣的帮助下，我们已经完全有能力为莱茵兰的市政当局编写一部专门的新法典以取代1831年普鲁士市政法中不合时宜的规定部分了。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]希望能够在其中保留一些传统的可靠社会秩序，并确保那里不会成为激进主义的温床。"
 rheinische_homerule_button_tt:0 "尚未开始编写工程\n这项编写工程预计耗时5年"
 deutsche_gemeindeordnung:0 "统一德国市政法"
 deutsche_gemeindeordnung_reason:0 "尽管[ROOT.GetCountry.GetName]治下的#B 德意志各邦#!尽管早就已经成为了统一的国家，但延续自#V 神圣罗马帝国#!和#V 德意志邦联#!时代的许多传统到如今还仍然发挥着作用——尤其是在#B #L 市政法典#!#!的问题上。市政议员就像邦联时代的市政代表那样，持有政党或公民选举授予的授权，使得各地在#B 市政管理#!上仍然游离于[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]政府之外。\n\n[ROOT.GetCountry.GetName]机构规模的扩张和这个时代的需求都要求我们彻底整肃所有过去的#O 市政法律#!，建立#V 统一的市政职能结构#!，明确市政当局在其活动范围内所有事项的职责，并将它们纳入一部在整个[concept_country]都生效的#V 帝国法典#!之中。"
 deutsche_gemeindeordnung_complete_tt:0 "完成了#V 整合各邦市政法#!"
 deutsche_gemeindeordnung_button:0 "开始整合各邦市政法"
 deutsche_gemeindeordnung_button_desc:0 "德意志境内有着超过51000个市镇和数不清的居民，他们共制定了66部不同的城市和市政法典，颁行在帝国各地。我们不应该继续坐视这一不和谐，必须将他们的传统习惯整合起来，形成统一的法律。"
 deutsche_gemeindeordnung_button_tt:0 "尚未开始整合工程\n这项整合工程预计耗时5年"
 #普鲁士的保守秩序
 conservative_order_prussia:0 "普鲁士的保守秩序"
 conservative_order_prussia_reason:0 "尽管#yellow 神圣罗马帝国#!已于#V 1806年#!在#B 拿破仑#!的统治下解体，但帝国时代的那些#O 古老法律#!和#o 社会习俗#!——以及这些传统所塑造的框架却仍然对整个#V 德意志邦联#!的各国影响深刻。#B 后拿破仑时代#!的反动浪潮呼吁在欧洲范围内恢复这些#B 古老神圣的传统#!，而在[ROOT.GetCountry.GetName]，这更是受到了广泛的支持。\n\n[ROOT.GetCountry.GetRuler.GetFullName]——[ROOT.GetCountry.GetName]的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，渴望在自己看来具有历史#O 合法性#!的框架内恢复[concept_country]的保守秩序，反对德国的自由化，并最终重建[ROOT.GetCountry.GetNameNoFlag]人民与君主之间中世纪#V 封建式的忠诚关系#!——无论是采取#B 较为温和的政策#!，还是使用#B 不可撼动的铁腕#!。"
