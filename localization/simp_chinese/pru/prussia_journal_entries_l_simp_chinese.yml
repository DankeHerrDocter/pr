 conservative_order_prussia_religious:0 "保守秩序：虔敬主义"
 conservative_order_prussia_religious_reason:0 "#V 浪漫主义#!正在#yellow 德意志#!各邦盛行，对#B 中世纪的怀旧之情#!——一种相信只有过一种更能#B 取悦上帝#!的生活才能重新塑造一个#V 正统而和平#!的[concept_country]的运动——正在[ROOT.GetCountry.GetName]繁荣发展。\n\n[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]也视新兴的#V 虔敬主义运动#!为一场反对#B 启蒙运动#!和#B 法国大革命#!思想的#L #B 十字军东征#!#!。很明显，如果我们想要巩固#V 传统的保守秩序#!，#B 上帝的旨意#!和#B [GetReligion('protestant').GetName]的传统#!就应该被强调和纳入。"
