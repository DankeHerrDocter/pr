 restore_cologne_cathedral:0 "修复科隆大教堂"
 restore_cologne_cathedral_reason:0 "#V 自中世纪以来未竟的工程#!——那座矗立在#yellow 莱茵河#!畔的#B 科隆大教堂#!——至今仍以未完成的姿态俯瞰着[ROOT.GetCountry.GetName]的城市与人民；它的塔楼半途而废，石料风化剥落，仿佛一段被遗忘的信仰与时代的遗产。\n\n然而，在#B 浪漫主义与民族精神#!的感召之下，这座古老的教堂再次被赋予了新的意义：它不仅属于教会，更属于整个#yellow 德意志民族#!。尽管这项工程所需的#B 资金、工期与社会动员#!将远超以往任何建筑计划，但我们#B 必须完成这一伟大工程#!，让这座象征#yellow 德意志民族精神#!的伟大建筑从先贤的手中继承给我们这代人，再从我们的手中以完整的姿态矗立于世。"
 restore_cologne_cathedral_tt:0 "完成了#V 修建工作#!"
 restore_cologne_cathedral_button:0 "开始修建工作"
 restore_cologne_cathedral_button_desc:0 "对于正在崛起的[ROOT.GetCountry.GetName]而言，这不仅是一项建筑工程——#B 它更是一场关于历史、信仰与民族未来的宣言#!。既然我们已走到这一步，那么将其完成，难道不是命中注定的吗？"
