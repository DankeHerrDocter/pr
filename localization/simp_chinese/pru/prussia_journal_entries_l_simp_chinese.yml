 conservative_order_prussia_constitution:0 "保守秩序：宪法问题"
 conservative_order_prussia_constitution_reason:0 "“唯一持久的宪法是等级君主制，由教士和贵族加以制衡，它也是最古老、最好的宪法。”\n\n作为我们面对新兴的[GetIdeology('ideology_liberal').GetName]臣民们#V 和解政策#!的一部分，[ROOT.GetCountry.GetRuler.GetFullName]陛下正致力于寻找[ROOT.GetCountry.GetName]#B 宪法问题#!的解决方案。他希望在#B 激进与反动#!之中#V 寻找平衡#!，在维持[GetLawType('law_monarchy').GetName]与#yellow 君主权力#!的基础上重新#B 赢得臣民们的广泛支持#!。"
 conservative_order_prussia_constitution_complete_1_tt:0 "维持[GetLawType('law_autocracy').GetName]或[GetLawType('law_oligarchy').GetName][concept_law]，持续10年"
 conservative_order_prussia_constitution_complete_2_tt:0 "已经执行了#B 在选举权上做出妥协#!"
 conservative_order_prussia_constitution_button:0 "在选举权上做出妥协"
 conservative_order_prussia_constitution_button_desc:0 "民众对于选举权的渴望迫使我们不再能阻止他们了，如果一意孤行，恐怕会导致更加严厉的后果——我们必须做出妥协。当然，这必须是建立在维护政府和王室权益的前提下做出的。"
 conservative_order_prussia_constitution_button_tt:0 "我们将颁布宪法准许选举权，立刻完成该日志。\n同时我们会建立#yellow 三级选举制#!，以确保政府对民选议会的实际影响力。\n然而，该#O 修正案#!将对我们的民主制度产生负面影响。"
 conservative_order_prussia_industy:0 "保守秩序：工业化"
 conservative_order_prussia_industy_reason:0 "#V 工业革命#!正在改变我们的国家：面对着广泛的#B 工业化浪潮#!，[ROOT.GetCountry.GetName]必须确保自己跟上时代的脚步。只有一个#V 强大的，繁荣的，且富裕的#!国家才能为[GetLawType('law_monarchy').GetName]的神圣秩序赢得更多支持。\n\n民意支持#B 迅速果断的行动#!，形势也要求我们这样做：如果我们想要拯救[ROOT.GetCountry.GetName]，让它重现繁荣，就不要犹豫，全力以赴，让全体臣民们都享受到#B 从工业革命中获得的益处吧#!！"
