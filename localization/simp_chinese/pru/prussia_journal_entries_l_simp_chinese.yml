 conservative_order_prussia_1_button:0 "开始颁发科学与艺术功勋勋章"
 conservative_order_prussia_1_button_desc:0 "我们杰出的科学家和探险大师——#yellow 亚历山大·冯·洪堡#!阁下向[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]提出了一项建议，为腓特烈大帝所设立的军事功绩勋章中新增和平的科学与艺术功绩勋章，以表彰为我们社会与文化做出杰出贡献的人士。"
