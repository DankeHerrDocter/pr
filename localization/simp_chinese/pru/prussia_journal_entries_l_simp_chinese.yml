 prussian_state_railways_reason:0 "#yellow 铁路#!是我们[ROOT.GetCountry.GetName]国家的血管——而这一#B 关键通道#!必须受到[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的[concept_government]的控制。我们应该设立#B 独特的铁路管理机构#!，资助修建各地的重要铁路线，并通过吞并、直接收购或提供财政支持等方式，将各个#O 铁路#![concept_company]置于控制之下。不仅如此，#V 铁路运营#!也可以成为一项#B 非凡的盈利活动#!，甚至成为[ROOT.GetCountry.GetName]的#B 主要财政收入来源#!。"
 prussian_virtues:0 "普鲁士美德"
 prussian_virtues_reason:0 "自从#V 士兵王#!和#V 腓特烈大帝#!在[ROOT.GetCountry.GetName]的统治以来，通过秩序、勤勉、谦逊和敬畏上帝的原则，以及#B 虔敬主义#!与#B 启蒙运动#!的理性，宽容价值观，他们为[ROOT.GetCountry.GetName]的人民塑造了一种新的性格：一种基于#B 骑士精神#!的#O #tooltippable;tooltip:[GetPlayer.GetTooltipTag],prussian_virtues_modifier_1_effects_tt $prussia_strong_army$#!#!——也正是这一道德和社会准则推动了[ROOT.GetCountry.GetName]从大选帝侯#yellow 腓特烈·威廉#!统治下的巴洛克国家崛起为现代欧洲[concept_great_power]。\n\n[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]相信，通过继承并发扬这些光荣的普鲁士传统：#B 真诚、谦虚、勤奋、正直、尽责、忠诚、秩序、节俭、克制与奉献#!的精神，我们将可以塑造出一个强大而受全世界敬畏的#V 普鲁士国家#!，以及一个高尚而严谨的#V 德意志民族#!。"
