l_simp_chinese:
 #
 joi_flavor_tur.1.t: "花厅御诏"
 joi_flavor_tur.1.d: "老[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#yellow 马哈茂德二世#!驾崩了。与其父一样，新任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]也是改革的倡导者，并得到了[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]等#O 坦齐马特派#!帕夏的支持。新任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]决意延续其父亲的道路，继续对帝国实施彻底的改革。"
 joi_flavor_tur.1.f: "“全世界都知道，在[ROOT.GetCountry.GetName]统治初期，#yellow 《古兰经》#!的光荣戒律和帝国的法律始终受到尊崇。帝国因此而日渐强大，其臣民无一例外地都过着极其安逸和富足的生活。近一百五十年来，接连发生的变故和各种原因导致人们对神圣的法律及其制定的规章制度漠视不顾，昔日的强盛和繁荣沦为衰弱和贫困。”\n\n“我们坚信，只要努力寻找有效的方法，我们期望在真主的帮助下实现的目标，几年之内就能实现。因此，我们满怀信心地相信至高无上的真主的帮助，并确信先知的支持，我们认为，通过新的制度，为组成[ROOT.GetCountry.GetAdjectiveNoFormatting]之国的各省提供良好的治理，是明智之举。”"
 joi_flavor_tur.1.a: "命运在此刻合上了他的篇章。"
 joi_flavor_tur.1.b: "我们确实属于真主，并且必将归于祂。"
 joi_flavor_tur.1.c: "帝国的新黎明。"
 joi_flavor_tur.1.e: "急需大改革。"
 #
 joi_flavor_tur.2.t: "重新组织法令"
 joi_flavor_tur.2.d: "[ROOT.GetCountry.GetName]已经成功完成了现代化，再次跻身于世界舞台。[ROOT.GetCountry.GetAdjectiveNoFormatting]之国开启了一个全新的纪元。"
 joi_flavor_tur.2.f: "高。这是唯一可以匹配它的字词。穿过科斯坦丁尼耶的街道，可以看见现代化的工厂和学校，可以看见卫兵在进行军事训练。曾经遍布农场的地方，现在拔地而起闪亮的城区。谁能想到短短几十年前帝国还处在濒临崩溃的边缘！曾几何时，欧洲强权看待我们的眼光里充满了可怜与贪婪，无时无刻不在伺机分裂我们的土地。现在，我们能看到，他们的外交官眼里满是对我们成就的敬畏，不得不将我们平等对待。真主至上！"
 joi_flavor_tur.2.a: "帝国已经重组，我们将向旧领土进军。"
 joi_flavor_tur.2.b: "法律与平等必须被提上帝国的最优先。"
 joi_flavor_tur.2.c: "重组意味着经济的新繁荣。"
 joi_flavor_tur.2.e: "我们将收获教育带来的益处。"
 joi_flavor_tur.3.t: "马赫苏萨委员会"
 joi_flavor_tur.3.d: "坦齐马特改革——尽管一度被认为是挽救帝国的良方，但如今已经变得不受欢迎。认为改革太过局限的[GetIdeology('ideology_constitutionalist').GetName]成立了一个政府内的委员会，并逼迫[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]接受了他们起草的民主宪法，宣布成立立宪政府。"
 joi_flavor_tur.3.f: "“所有奥斯曼人都享有个人自由，但前提是不得侵犯他人的自由...除法律规定的情况和形式外，任何人不得以任何借口遭受任何惩罚。”\n\n“所有奥斯曼人在法律面前一律平等；他们享有同等权利，对国家负有同等义务，且不分宗教。”\n\n“担任公职有一个条件——必须懂土耳其语，这是国家的官方语言。所有奥斯曼人均根据其才能、功绩和能力获准担任公职。”"
 joi_flavor_tur.3.a: "只有彻底的立宪才能挽救帝国！"
 joi_flavor_tur.3.b: "或许[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]说的才是对的？"
 joi_flavor_tur.4.t: "欧洲死尸"
 joi_flavor_tur.4.d: "[ROOT.GetCountry.GetName]未能实现现代化，在世界舞台上重新站稳跟脚。秃鹰开始盘旋，[ROOT.GetCountry.GetName]的末日近了。"
 joi_flavor_tur.4.f: "高门陷入了沉寂。[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]宣布意图退位——极有可能是受到了他大臣的胁迫——之后，人们发现他死在了自己的房间里。正如我们挚爱的帝国一样，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]长期以来饱受病痛的折磨，最终使得他无法承受皇冠的重量，最终变成了自己破碎而癫狂的残影。"
 joi_flavor_tur.4.a: "我们确实属于真主，并且必将归于祂。"
 joi_flavor_tur.5.t: "奥斯曼民法典"
 joi_flavor_tur.5.d: "尽管遭到了[SCOPE.sCharacter('devout_pasha_scope').GetFirstName]穆提夫的强烈反对，但在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的支持下，歧视性的宗教政策终于被废除。许多[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]改革家正期望将[ROOT.GetCountry.GetName]从法律上变成一个彻底的世俗化国家。"
 joi_flavor_tur.5.f: "“人人应拥有其所有财产，并应完全自由地处置，不受任何人的许可或阻碍；例如，罪犯的无辜继承人不得被剥夺其合法权利，罪犯的财产也不得被没收。这些帝国特许权应适用于我们所有的臣民，无论其宗教或教派如何；他们应无一例外地享受这些特许权。因此，我们为帝国居民的生命、荣誉和财产提供绝对安全，因为这些都受到神圣法律文本的保障。”"
 joi_flavor_tur.5.a: "世俗法将取代伊斯兰教法。"
 joi_flavor_tur.5.b: "教法法庭仍然应拥有一定特权。"
 joi_flavor_tur.6.t: "税务问题"
 joi_flavor_tur.6.d: "过去繁复且被频繁错误征收的税收体系得到了重整。在[SCOPE.sCharacter('progress_pasha_scope').GetFullName]等财政专家的帮助下，[ROOT.GetCountry.GetName]的税务制度焕然一新。"
 joi_flavor_tur.6.f: "“如果个人的财产缺乏保障，每个人都会对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和国家的声音漠不关心；没有人关心公共福利的进步，而只顾自己的事情。相反，如果公民对自己的所有财产都充满信心，那么，当他对自己的事业充满热情，并努力扩大事业以增加自己的舒适时，他不仅会感到对君主和国家的热爱日益增长，而且对祖国的忠诚也日益加深。”\n\n“因此，今后有必要对[ROOT.GetCountry.GetAdjectiveNoFormatting]社会的每个成员根据其财富和收入征收一定比例的固定税，并且不得再向其征收任何税款；此外，还有必要制定专门的法律来规定和限制我方陆军和海军的开支。”"
 joi_flavor_tur.6.a: "服役将成为义务，而不是能以交税来代替的措施。"
 joi_flavor_tur.6.b: "吉兹亚税将得到整改，避免对穆斯林的错误征收。"
 joi_flavor_tur.7.t: "[TimeKeeper.GetCurrentDate.Format('y年')]省级改革法"
 joi_flavor_tur.7.d: "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的许多特权被撤销，一套以西方列强为范本起草的“#yellow 维拉耶特#!”省级行政制度被推出，极大改善了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和高门对治下领土的治理能力。"
 joi_flavor_tur.7.f: "“除了各种法律上的保留之外，[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]还应负有庄严的义务：尊重科学、时代要求、自身政治考量，以及超越一切私人考量的公民权利和国家利益。正是这种义务才能保障公共秩序。即使在这条道路上出现失误和错误，纠正这些错误的有效工具也不会像过去那样，依靠某些机构来控制新闻界。”"
 joi_flavor_tur.7.a: "人员和言论的流动都将更加自由！"
 joi_flavor_tur.7.b: "行政区划的改革是帝国现代化的标志。"
 joi_flavor_tur.7.c: "高门必须加紧对异议人士的审查。"
 joi_flavor_tur.8.t: "皇家正规军"
 joi_flavor_tur.8.d: "通过改革#yellow 曼苏尔军#!，采用新的西式服饰和训练标准，[ROOT.GetCountry.GetName]的军队经历了一段艰难的现代化时期。但成果最终卓著：许多西方军事观察家们都不得不承认：帝国的军队已经完全有能力达到欧洲标准。"
 joi_flavor_tur.8.f: "“战争中的一切看似简单，但最简单的事也是困难的。这些困难积聚成一种“摩擦”，没有亲历战争的人无法想象。整体更像是混沌，而非一部精密的机器。”\n\n“勇气是战士的第一品质——不仅是面对死亡的勇气，更是精神上的勇气：在承担责任、作出决断、忍受怀疑与不确定中体现出来。”"
 joi_flavor_tur.8.a: "一支良好的军队需要杰出的军官与士兵。"
 joi_flavor_tur.8.b: "军队的战斗力在于其组织与调度部门。"
 joi_flavor_tur.9.t: "一般教育条例"
 joi_flavor_tur.9.d: "老旧的#yellow 伊斯兰教法学校#!被废除了，西方式的教育系统被高门建立起来，它们的宗旨被认为是为整个[ROOT.GetCountry.GetName]的社会提供尽可能均等的教育机会。"
 joi_flavor_tur.9.f: "“社会能够并且确实在执行自己的命令：如果它颁布了错误的命令而不是正确的命令，或者颁布了任何它不应该干涉的命令，那么它就实行了一种比许多政治压迫更为可怕的社会暴政，因为，虽然通常不会受到如此极端的惩罚，但它留下的逃脱手段更少，渗透到生活的细节中更深入，奴役灵魂本身。”"
 joi_flavor_tur.9.a: "教育机构需要确保人民的忠诚与皈依。"
 joi_flavor_tur.9.b: "教育机构应该专注于客观真理的教导。"
 joi_flavor_tur.10.t: "土地解放法案"
 joi_flavor_tur.10.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]陛下仁慈而英明的统治之下，[ROOT.GetCountry.GetName]在开发其丰饶资源方面取得了显著进步；一部全新的土地法案被颁布，使过去贫穷的[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName]能够理解土地耕作者与政府之间所确立的权利与义务关系。"
 joi_flavor_tur.10.f: "“对于持有塔普已达十年且无人反对的土地，若未被申诉或挑战，其占有权将被视为合法，但在具有法定障碍情形下，诉讼可在障碍消除后十年内提起，逾期则不得再起诉。但若对方承认其非法侵占并耕种的事实，则不能以时效抗辩；土地应归还原主。”\n\n“城镇或村庄中的整块土地不可由整块授予某一个或几个居民；应将土地切割为若干块，分配给各户；政府应向他们交付地契以证明其合法占有。”"
 joi_flavor_tur.10.a: "签署法令，将土地分发给农民。"
 joi_flavor_tur.10.b: "农业，就像其他产业一样，将归于市场的支配。"
 joi_flavor_tur.11.t: "东方铁路特许权"
 joi_flavor_tur.11.d: "在[ROOT.GetCountry.GetName]治下的巴尔干地区，曾经互不链接的村庄和城镇如今通过漫长且可靠的铁路线被连接了起来。兴致勃勃的[GetInterestGroupVariant('ig_industrialists',GetPlayer).GetName]向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]请求获得经营这条铁路的特许权，并宣称这会将我们的巴尔干省份带入一个伟大的经济繁荣。"
 joi_flavor_tur.11.f: "“特许权包括一条从伊斯坦布尔到多布尔金的主干线，途经阿德里安堡、索非亚、尼奇、萨拉热窝和巴尼亚卢卡。这条线路被称为“南线”，因为它倾向于绕过塞尔维亚，靠近波斯尼亚。”\n\n“特许经营线路总长度预计为2500公里，特许经营期为99年；作为线路建设成本的补偿，特许经营权持有人将从政府获得每公里14000法郎的租金，并从运营公司获得每公里8000法郎的租金。这些金额的计算旨在为特许经营权持有人带来11%的投资回报率。”"
 joi_flavor_tur.11.a: "批准该公司的私营特许。"
 joi_flavor_tur.11.b: "铁路必须被国有机构垄断。"
 joi_flavor_tur.12.t: "青年奥斯曼党政变"
 joi_flavor_tur.12.d: "在热衷于革命的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]和同情他们的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的支持下，一个自称为“青年奥斯曼党”的组织闯进了高门，绑架了大维齐尔[SCOPE.sCharacter('progress_pasha_scope').GetFullName]，迫使[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]屈服并将权力移交给他他们。而他们则迅速颁布了一部临时宪法，宣布对[ROOT.GetCountry.GetName]进行立宪改革。"
 joi_flavor_tur.12.f: "“[SCOPE.sCharacter('progress_pasha_scope').GetFullName]宣称，辞职是全体民众的诉求。“任何承诺都不可能，”他说道，“内阁改组意味着我们将捍卫国家荣誉，否则就将灭亡。全国人民都准备好做出牺牲。在金钱方面，全国人民都将做出牺牲。我们决心不惜一切代价废除高门不合理的统治。”这是繁荣不可或缺的条件。\n\n所有不属于#yellow 青年奥斯曼党#!的君士坦丁堡报纸都已停刊。他们宣称，[SCOPE.sCharacter('army_pasha_scope').GetFirstName]帕夏已经背叛了国家；行动令人担忧。预计青年奥斯曼党将采取武装行动。”"
 joi_flavor_tur.12.a: "立宪万岁！"
 joi_flavor_tur.12.b: "可恶的自由派，我还会回来的！"
 joi_flavor_tur.13.t: "[TimeKeeper.GetCurrentDate.Format('y年')]国民议会大选"
 joi_flavor_tur.13.d: "在[GetIdeology('ideology_constitutionalist').GetName]的大力推进下，旧的政治体制被彻底废除；曾经被[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和高门垄断的权力被移交给民主选举的国民议会，而[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]本人则签署了一份由[SCOPE.sCharacter('progress_pasha_scope').GetFullName]起草的宪法，承认成为一名立宪君主，并将忠实保卫宪法。"
 joi_flavor_tur.13.f: "天气晴朗，今天：[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]——一个注定要成为[ROOT.GetCountry.GetName]历史上最具标志性的日子——国民议会第一次全国普选的开幕之日。已经宣誓忠于宪法的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下自托普卡帕宫启驾，往被指定为议会大厦的多尔玛巴赫切宫而行。众多首次获得选票的民众列道两侧，许多市民与将毕生奉献与自由事业的知识分子与工人看着手中的选票，他们都流下了眼泪。这份选票经过了多少代人的努力才落在了他们的手上！他们现在是这个国家的公民！\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]迈入了议会宫，他被宪法禁止进入下议院——他的确也遵守了宪法，将这次伟大的开幕典礼放在了上议院举办。他走了进去，议员们起立致敬，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]沉默的坐在宝座上，正对着议会墙壁上雕刻的宪法序言。是的，在全体公民与真主的见证下，我们誓忠于国家、法律与君主；我们誓不解散，直至国家的自由确立而坚固！"
 joi_flavor_tur.13.a: "自由的国家是最伟大的国家。"
 joi_flavor_tur.14.t: "奥斯曼之剑"
 joi_flavor_tur.14.d: "曾经一度控制了[ROOT.GetCountry.GetName]的#yellow 自由主义者#!与#yellow 立宪主义者#!在一场由[ROOT.GetCountry.GetRuler.GetFullName]带领忠于宫廷的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]发动的武装政变中被全数逮捕，经过了短暂的审判后，在托普卡帕宫的门前被处于极刑。前任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在[ROOT.GetCountry.GetRuler.GetFirstName]的武力威胁下被迫宣布退位，极度专制的[ROOT.GetCountry.GetRuler.GetFirstName]登上了[ROOT.GetCountry.GetAdjective]的宝座：尽管前路未知，但毫无疑问，他将以最独裁的手段统治这个帝国。"
 joi_flavor_tur.14.f: "[ROOT.GetCountry.GetName]的登基大典也许是许多人一辈子所能见到的最为宏大的场面，而[ROOT.GetCountry.GetRuler.GetFirstName]的登基典礼也不例外。由科尼亚的谢里夫给新[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFirstName]陛下佩戴上#G 奥斯曼之剑#!，而我们的维齐尔带着几分敬畏仰视着他。\n\n没人想得到[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]居然在这场残酷的政治斗争中最终取胜并接替了他的父亲。有些人私底下愤怒的抨击着他的残酷和暴力，并宣称因为他的残暴，而非他的正义才使得[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]能够胜出；而曾经坐在高门内的革命党——哪些从来都不认为[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]是一个威胁的自由派——曾经希望通过[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]来掌控帝国，但他们最终全都失败了，死在了托普卡帕宫的门前，血溅广场。\n\n毫无疑问，有一件事我们的新[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下已经清楚地表明了：当有必要的时候，他绝不会犹豫给那些被他认为背叛他的人们狠狠地捅上一刀。"
 joi_flavor_tur.14.a: "愿真主赐予陛下长久而昌盛的统治！"
 #坦齐马特事件
 joi_flavor_tur.15.t: "教法法庭的审判"
 joi_flavor_tur.15.d: "一场在最近由于土地纠纷导致的审判正在演变为宗教问题。新颁布的法律要求异教徒与穆斯林共同受审，但主持案件的[SCOPE.sCharacter('devout_pasha_scope').GetFullName]穆夫提却拒绝坐在异教徒的旁边。"
 joi_flavor_tur.15.f: "“他们乐于听虚妄之言，贪食非法之物。若他们来请你裁决，你可以为他们裁决，也可以拒绝，他们不会伤害你分毫；若你裁决，就应以公正裁决，因为真主喜爱公正者。他们明知自己手中已有《讨拉特》载有真主的判决，却仍求你裁断，然后背弃自己的经典——这些人并非真正的信士。”\n\n“我们确已降示《讨拉特》，其中有引导与光明；诸先知顺从真主的命令，为犹太人施行判决；经师与学者们也据此守护真主的经典，为它作见证。故你们不要畏惧众人，只应畏惧我；不要以我的迹象换取微利。凡不以真主所启示的律例断事者，皆为不信之人。”"
 joi_flavor_tur.15.a: "命令世俗法庭照章行事。"
 joi_flavor_tur.15.b: "我们需要将尊重教法摆在第一位。"
 joi_flavor_tur.15.c: "换一位可靠的穆夫提会让我们满意。"
 joi_flavor_tur.16.t: "通货膨胀的问题"
 joi_flavor_tur.16.d: "过去几个世纪以来，由于长期的财政赤字，高门不得不不断贬值帝国原有的古鲁什币，导致了严重的物价上涨和货币体系混乱。不仅如此，帝国内部还流通着多种币种：金银混铸币、地方铸币、外国币等等。坦齐马特改革的需要要求我们继续扩大财政收入，[SCOPE.sCharacter('progress_pasha_scope').GetFullName]帕夏建议我们废除原有的古鲁什币，并以新的里拉取代之。"
 joi_flavor_tur.16.f: "“巨大的行政维护成本、一系列毁灭性的战争导致军事支出大幅增加，导致了预算赤字、财政困难和经济停滞；17-18世纪的[ROOT.GetCountry.GetName]政府的努力稳定货币体系的努力是徒劳且模棱两可的：铸币当局试图与硬币贬值作斗争，撤回劣质货币，将它们融化并重复之后用新的金币增强他们的含金量。”\n\n“这些措施导致了两种问题：第一，币质较差已从流通中移除，个人有动力去保留它们，融化并出售金属以获得更高的金条价值；以及托马斯·格雷欣描述的现象，现在被称为格雷欣法则，即：含金量高的钱币流出发行国，而外国劣币则大量涌入市场。”"
 joi_flavor_tur.16.a: "很明显，货币汇率并不是导致通货膨胀的原因。"
 joi_flavor_tur.16.b: "新的里拉货币将由#B #yellow 高门#!#!出资直接保障其价值。"
 joi_flavor_tur.16.c: "通过让里拉的币值与#B #O 英镑#!#!挂钩，我们的通胀可以得到控制。"
 joi_flavor_tur.16.h: "通过让里拉的币值与#B #U 法郎#!#!挂钩，我们的通胀可以得到控制。"
 joi_flavor_tur.17.t: "总督与文官"
 joi_flavor_tur.17.d: "在[SCOPE.sState('tur_17_event_scope').GetCityHubName]，我们新任命的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]的行政长官要求昔日统治这里的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]交出手中超过了法律的私人武装，并移交所有行政权力，但遭到了总督的抵抗。"
 joi_flavor_tur.17.f: "“土耳其语中“总督”一词是“贝勒贝伊”，意为“诸侯之王”。战争时期，他们会聚集在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的旗帜下，作为[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]军队的一支部队作战；然而，作为领地总督，贝勒贝伊现在肩负着更广泛的责任。他在分配其辖区封地方面发挥着重要作用，并负责维持秩序和伸张正义。”\n\n“贝勒贝伊的职位是省级政府中最有声望、利润最高的职位，苏丹几乎总是从贝勒贝伊中挑选维齐尔，当贝勒贝伊被解除其行政长官职务时，他们会发起诉讼，并继续行使其指挥权，直到他们被召回科斯坦丁尼耶。”"
 joi_flavor_tur.17.a: "[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]的权力需要得到尊重。"
 joi_flavor_tur.17.b: "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]的命令高于一切！"
 joi_flavor_tur.18.t: "[SCOPE.sState('tur_18_event_scope').GetCityHubName]征兵抽签"
 joi_flavor_tur.18.d: "在[SCOPE.sState('tur_18_event_scope').GetCityHubName]的集市上，鼓声响起：征兵官们正在从穆斯林和不信者中征募士兵。然而令许多穆斯林愤愤不平的是：他们不仅被以各种其他名义多缴纳了税收，且缴纳的比不信者更多，却仍然有着服役的义务。"
 joi_flavor_tur.18.f: "“你们应当与那些不信真主与末日，不遵守真主及其使者所禁，不奉真道的有经人作战，直到他们自愿缴纳吉兹亚税，承认服从地位。犹太人说：‘乌兹尔是真主之子’，基督徒说：‘麦西哈是真主之子’，他们口中所言，如前世不信者之语。愿真主诅咒他们——他们怎么如此偏离！”\n\n“他们企图以口灭真主之光，但真主决不容许，祂要完成祂的光明，即使不信者憎恶；祂派遣了祂的使者，带着引导与真理之宗，以便使它胜过一切宗教，即使多神者不悦。”"
 joi_flavor_tur.18.a: "很明显，这对信士们是不公平的！"
 joi_flavor_tur.18.b: "吉兹亚税的免役金为我们带来财富。"
 #立宪事件
 joi_flavor_tur.19.t: "[TimeKeeper.GetCurrentDate.Format('m月 d日')]政变"
 joi_flavor_tur.19.d: "一批长期以来反对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]独裁专制的秘密政治团体——青年土耳其党——在他们令人震惊的领袖——隐藏良好的[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏的领导下发动了一场军事政变，试图结束[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的专制政府并逼迫他退位。"
 joi_flavor_tur.19.f: "“统一与进步委员会的革命者在[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏的带领下强行闯入了高门的内阁办公室，他们的闯入遭到守卫的反击——某位内阁侍从首先向入侵者开枪——原本可能是瞄准[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏的，导致了交火，在场的[SCOPE.sCharacter('army_pasha_scope').GetFullName]帕夏当场身亡。”\n\n“而近来传出的消息称，[SCOPE.sCharacter('army_pasha_scope').GetFirstName]的部下正自恰塔尔贾及其他地区向君士坦丁堡进军，誓为他复仇：毫无疑问，此事对新政府而言是极不祥的预兆。”"
 joi_flavor_tur.19.a: "一个新的时代将会到来。"
 joi_flavor_tur.19.b: "召集军队，反攻倒算的时候到了！"
 joi_flavor_tur.20.t: "突袭崇高门"
 joi_flavor_tur.20.d: "一场针对场针对[SCOPE.sCharacter('old_pasha_scope').GetFirstName]内阁的轰动性示威最终演变为了军事政变，支持保守派的[SCOPE.sCharacter('army_pasha_scope').GetFullName]遭枪击身亡，支持革命的军队在[SCOPE.sCharacter('progress_pasha_scope').GetFullName]的领导下迅速接管了高门与议会，并宣布建立救国军政府。"
 joi_flavor_tur.20.f: "“就在上周四，一场示威突然被组织起来——十五人携带六面旗帜向“崇高门”进发。[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]加入其中，而同时又有数十名同党从附近的咖啡馆中出现。最终，一支约一百五十人的队伍抵达高门大门口。当天早晨，高门的正规卫兵被神秘地替换为同情青年土耳其党的部队。此时，[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]撩开上衣，裸露胸膛，高声向士兵呼喊：‘来吧！拯救祖国的荣誉吧！它已被一个叛国的政府践踏在脚下！若你们愿意，就朝我开枪，让我带着这耻辱入墓——因为在土耳其，再也没有荣誉可言了！’。\n\n随即，[SCOPE.sCharacter('army_pasha_scope').GetFullName]与另外五人被射杀，尸检表明，这些受害者除枪伤外还被刺伤；持剑帕夏本人则身中三弹。在枪声响起的同时，[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏走向[SCOPE.sCharacter('old_pasha_scope').GetFirstName]帕夏，对他说：‘“你必须颁布这些，要么立刻辞职——否则将有更多血流成河。’而[SCOPE.sCharacter('old_pasha_scope').GetFirstName]帕夏在危急时刻仍镇定自若，选择了辞职，以避免更大的流血。”"
 joi_flavor_tur.20.a: "[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏万岁！"
 joi_flavor_tur.21.t: "包围多尔玛巴赫切宫"
 joi_flavor_tur.21.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的授意下，忠于皇室的[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]在首都发动了军事政变，包围了议会宫——多尔玛巴赫切宫，并迫使正在主持议会的[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]维齐尔和他的内阁辞职，并宣布暂停了宪法，武力解散了帝国的民选议会。"
 joi_flavor_tur.21.f: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]上午拜访了[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]维齐尔，敦促他辞职，维齐尔拒绝了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的要求。下午3点，收到了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]秘密旨意的[SCOPE.sCharacter('old_pasha_scope').GetFirstName]帕夏率领五名骑兵抵达了多尔玛巴赫切宫。\n\n与此同时，宫廷禁卫军被突然召集并迅速封锁了整个科斯坦丁尼耶，包围了议会，并按照事先安排展开一面旗帜，要求整个内阁辞职。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]骑着白马出现，陪同他的是前驻华盛顿大使[SCOPE.sCharacter('army_pasha_scope').GetFirstName]帕夏。\n\n他们在皇宫门口下马，要求与议员们见面，然而议会大门紧闭，议员们拒绝接见除了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]本人以外的任何人。[SCOPE.sCharacter('army_pasha_scope').GetFirstName]统帅军队突破了议会卫队的防线进入了议会厅，宣布内阁必须辞职。于是，在刀枪的威逼下，[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]维齐尔写下辞呈，并将其递交给[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。"
 joi_flavor_tur.21.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下最顺从的仆人谨上。"
 joi_flavor_tur.22.t: "[SCOPE.sState('armenian_state_scope').GetCityHubName]大叛乱"
 joi_flavor_tur.22.d: "自由主义的立宪革命导致了[SCOPE.sState('armenian_state_scope').GetCityHubName]的[GetReligion('sunni').GetName]群体陷入了自身特权被削弱的恐慌。作为报复，他们在当地制造了一起针对[SCOPE.sCulture('armenian_scope').GetName]人的大屠杀：而[SCOPE.sCulture('armenian_scope').GetName]人则拿起武器反抗当地的[SCOPE.sCulture('turkish_scope').GetName]施暴者，导致了当地驻军介入其中，参加了这场屠杀。"
 joi_flavor_tur.22.f: "“兄弟，如果你想知道这边的消息，我们已经杀了1200名[SCOPE.sCulture('armenian_scope').GetName]人，全都喂了狗；母亲，我平安无事。父亲，20天前我们向[SCOPE.sCulture('armenian_scope').GetName]异教徒发动了战争。感谢真主，我们毫发无损。”\n\n“现在有传言说，我们的营将被派往你们那边——如果真是这样，我们就把那里的[SCOPE.sCulture('armenian_scope').GetName]人全杀光。此外，还有511名[SCOPE.sCulture('armenian_scope').GetName]人受伤，每天都有几百个人死去。如果你去问问那些士兵和野蛮的民兵，他们一个都没流鼻血；愿真主保佑你们。”"
 joi_flavor_tur.22.a: "毫无疑问，这是一场亚美尼亚异教徒的邪恶叛乱。"
 joi_flavor_tur.22.b: "采取措施，严厉审判屠杀的发起者！"
 #铁路
 joi_flavor_tur.23.t: "巴格达-科斯坦丁尼耶铁路"
 joi_flavor_tur.23.d: "经历了漫长的工程，一条能够有效沟通#yellow 科斯坦丁尼耶#!和#yellow 巴格达#!的庞大铁路线终于落成了。尽管受限于偏远的托罗斯山脉导致的技术困难，但在[ROOT.GetCountry.GetName]的努力下，这项恢弘的工程最终取得了伟大的成功。"
 joi_flavor_tur.23.f: "“[SCOPE.sCountry('GBR_scope').GetAdjective]人认为，如果像拿破仑所说的那样，安特卫普落入一个大陆强国之手，就好比一把瞄准英格兰海岸的手枪；那么巴格达和波斯湾落入任何其他强国之手，就好比一把瞄准印度的42厘米火炮。”\n\n“一个专家委员会就对底格里斯河和幼发拉底河的地质状况进行了研究，他们宣布，该地区拥有名副其实的“石油湖”，其储量几乎取之不尽、用之不竭；但考虑到交通不便，这些油田能否与[SCOPE.sCountry('USA_scope').GetAdjective]和[SCOPE.sCountry('RUS_scope').GetAdjective]现有的油田竞争尚存疑问。”"
 joi_flavor_tur.23.a: "伊拉克省将通过铁路而繁荣！"
 joi_flavor_tur.23.b: "铁路帮助了我们的军事调动。"
 joi_flavor_tur.24.t: "朝觐之路"
 joi_flavor_tur.24.d: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的努力投资下，一条连接耶路撒冷，大马士革至麦地那，并途经希贾兹的铁路落成，极大便利了每年的朝圣者们前往圣地的旅途。"
 joi_flavor_tur.24.f: "“我遇到的许多叙利亚人都对火车上的氛围有着美好的回忆。这当然是火车旅行的美妙之处之一：陌生人聚集在一个公共空间，轻柔的列车节奏促进着人们的交谈。‘每一节车厢都是一个充满友善和礼貌的小世界，’老人回忆道。”\n\n“‘不过，如果你想找火车，那你来错地方了，’这位老人笑着说。当然，他说得对，因为尽管这里是大马士革市中心宏伟的希贾兹火车站，但它已不再有用途，也不再有乘客。\如今，这里仿佛凝固了，仿佛是一段逝去时光的快照；仿佛是一座鲜活的博物馆，展现着一个从未实现的梦想。”"
 joi_flavor_tur.24.a: "这条铁路将为所有朝圣者服务。"
 joi_flavor_tur.24.b: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]对真主的虔诚无可置疑！"
 #收复日志事件
 joi_flavor_tur.25.t: "埃及行省"
 joi_flavor_tur.25.d: "埃及叛乱的赫迪夫在[ROOT.GetCountry.GetName]的军队进入开罗之后放弃了抵抗并向御驾亲征的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]投降。[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，就像数百年前的他的祖先：#V 冷酷者塞利姆#!一样，高举着胜利的旗帜进入了开罗。随军的画师记录下了这一史诗的时刻，许多外国观察家认为，这标志着[ROOT.GetCountry.GetAdjectiveNoFormatting]之国权力的伟大复兴。"
 joi_flavor_tur.25.f: "“赫迪夫站在军旗下，向士兵们呼喊：“阿迦斯！振作起来！战斗吧，我会奖赏你们！” 但无人理会，士兵们纷纷逃离战场。“祈求真主赐予我们胜利！” 赫迪夫高呼道，“现在是祈祷的时刻”。 \n\n但他既没有找到支援，也没有找到守卫；随后，他感到一阵难以扑灭的火焰。那天天气格外炎热，两军之间弥漫着异常浓重的尘雾。这是真主向埃及军队发怒的日子，埃及军队停止了战斗。”"
 joi_flavor_tur.25.a: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的官僚将取代赫迪夫的统治。"
 joi_flavor_tur.25.b: "重新任命一名开罗总督。"
 joi_flavor_tur.26.t: "奥斯曼请求干预叙利亚"
 joi_flavor_tur.26.d: "由于[SCOPE.sCountry('EGY_scope').GetName]的公然叛乱，[SCOPE.sCountry('TUR_scope').GetName]高门驻我国的大使馆昨天发来了外交照会，希望[ROOT.GetCountry.GetName]能够支持他们收复叙利亚的主张。"
 joi_flavor_tur.26.f: "“帕迪沙察觉到穆罕默德·阿里并不满足于自己的所得，于是试图先发制人，阻止[SCOPE.sCountry('TUR_scope').GetName]采取进一步行动，提出如果阿里撤出叙利亚和克里特岛，并放弃完全独立的愿望，就给予他在埃及和阿拉伯半岛的世袭统治权。”\n\n“然而，在帝国内部，双方都已做好战争准备。易卜拉欣在叙利亚已经拥有一支相当规模的军队。在君士坦丁堡，[SCOPE.sCountry('TUR_scope').GetName]挥官#yellow 哈菲兹帕夏#!向帕迪沙保证，他能够击败[SCOPE.sCountry('EGY_scope').GetName]军队。”"
 joi_flavor_tur.26.a: "此事与我国无关。"
 joi_flavor_tur.26.b: "我们应该支持[SCOPE.sCountry('TUR_scope').GetName]。"
 joi_flavor_tur.27.t: "叙利亚维拉耶特"
 joi_flavor_tur.27.d: "随着叙利亚地区的动乱被平定，这些帝国旧有的领土被重新整合进了高门的统治中，[ROOT.GetCountry.GetName]总算彻底把任何觊觎这块领地的敌人赶出了叙利亚。"
 joi_flavor_tur.27.f: "“鉴于真主的旨意，高门已将大马士革、叙利亚的黎波里、西顿、萨菲特、阿勒颇、耶路撒冷和纳布卢斯地区确立在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的统治下，允许朝觐者前往，并规定每年向先知陵墓献祭。”\n\n“[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的子孙享有麦加谢赫的称号，以及吉达地区的称号；此外，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经准许了总督的请求，将阿达纳地区交由托鲁斯的总督府管辖，并授予其穆哈西尔的称号。”"
 joi_flavor_tur.27.a: "愿主福安之。"
 #奥斯曼征服
 joi_flavor_tur.28.t: "最崇高的国度"
 joi_flavor_tur.28.d: "随着[ROOT.GetCountry.GetName]的疆域重新抵达辉煌时代的版图，甚至超越了#yellow 立法者苏莱曼#!时代的成就，乃至于将征服#V 永恒之城#!的荣耀加冕在了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的头上，毫无疑问，#G [ROOT.GetCountry.GetAdjectiveNoFormatting]之国#!已经真正摆脱了延续数百年的衰弱与下降期，重新登上了世界的顶峰。"
 joi_flavor_tur.28.f: "“战友们，获得了这一点，这场胜利的荣耀才得以圆满：如今，在这欢欣鼓舞的时刻，我们拥有了罗马人的财富，赢得了他们的帝国，他们的宗教也彻底被消灭了。我们的祖先渴望实现这一目标：现在，你们应该欢欣鼓舞，因为正是你们的英勇，为我们赢得了这个帝国。”\n\n“真主垂爱那胜利的事业，神圣的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]之事迹，以之使天下归于[ROOT.GetCountry.GetAdjectiveNoFormatting]人民之治：[ROOT.GetCountry.GetAdjectiveNoFormatting]，天下之冠，她的宏伟无人可及；她是命运所定——那将统御万邦之城！””"
 joi_flavor_tur.28.a: "万岁，罗马凯撒，两海与两陆的皇帝[ROOT.GetCountry.GetRuler.GetFullName]陛下！"
 joi_flavor_tur.28.b: "愿主福安之，突厥与伊斯兰的帕迪沙，至高的哈里发[ROOT.GetCountry.GetRuler.GetFullName]陛下！"
 joi_flavor_tur.29.t: "巴巴里行省"
 joi_flavor_tur.29.d: "正如真主所愿，异教徒已被击败，[ROOT.GetCountry.GetName]的军队征服了马格里布昔日属于臣服于高门的#yellow 巴巴里海盗#!，但又随后落入#yellow 法兰西#!的行省。地中海的海风吹过阿尔及尔的港口，毫无疑问，我们已经在地中海占据了强大的权力。"
 joi_flavor_tur.29.f: "“在突尼斯，为教育儿童而设的学校将近两百所，\n每一所都如一座宽阔的大厅。\n教师不以书授，而以大板为课；\n\n每日讲解《古兰经》一句，诵毕复诵，\n一遍又一遍，直至全章铭刻于心。\n他们往往要花上七年的时光，\n方能将圣言牢记——\n\n而他们确实做到了。”"
 joi_flavor_tur.29.a: "巴巴里将建立维拉耶特。"
 joi_flavor_tur.29.b: "巴巴里的权力应该被交还给合法的埃米尔们。"
 joi_flavor_tur.30.t: "特兰西瓦尼亚行省"
 joi_flavor_tur.30.d: "[ROOT.GetCountry.GetName]的军队重新收复了自1687年后被哈布斯堡王朝夺取的特兰西瓦尼亚。[ROOT.GetCountry.GetRuler.GetFirstName]站在古老的布兰城堡的高台上，下面是特兰西瓦尼亚的丛林，和帝国军队的旗帜。"
 joi_flavor_tur.30.f: "“我有一种印象，仿佛我们正在离开西方，进入东方。\n那座横跨多瑙河、壮丽无比的桥梁——此处的河流宽广而深邃——\n把我们带入了土耳其统治的遗风之中。\n\n我读过这样一句话：\n‘世上所有的迷信都汇聚在喀尔巴阡山的马蹄形谷地里，\n仿佛这里是它们的圣坛。’\n\n在那片土地上，有达契亚人的后裔——\n西有马扎尔人，东与北是塞凯伊人。\n而我将前往他们的居处，\n那些自称阿提拉与匈奴后代的民族。”"
 joi_flavor_tur.30.a: "特兰西瓦尼亚将建立维拉耶特。"
 joi_flavor_tur.30.b: "特兰西瓦尼亚行省将重建！"
 joi_flavor_tur.31.t: "匈牙利领地"
 joi_flavor_tur.31.d: "#yellow 匈牙利王国#!曾是我们在巴尔干地区事务上的一个主要竞争对手，尤其是在其落入哈布斯堡家族的掌控后。但命运对他们来说并非幸运，这个小王国最终再次在[ROOT.GetCountry.GetName]面前屈服：就像对苏莱曼大帝屈服一样。"
 joi_flavor_tur.31.f: "“啊，如今的草原才真是荒寂！\n冬天到来，万物的财富都化作空影。\n连那最微小的蟋蟀，也不再为夜晚奏鸣。\n原野像冻结的海洋，一片平滑；\n\n太阳低飞，如一只疲惫的鸟，\n或像老年近视的旅人，\n必须俯身，才能看清大地的模糊形状。\n然而，即便如此，他也看不清多少。\n\n草丛中寂静无声，\n连最微小的虫鸣都已消逝。”"
 joi_flavor_tur.31.a: "匈牙利将成为我们再次进军维也纳的基地。"
 joi_flavor_tur.31.b: "巩固领土，我们需要在中欧立足。"
 joi_flavor_tur.32.t: "第二次库丘克·凯纳尔卡条约"
 joi_flavor_tur.32.d: "[ROOT.GetCountry.GetName]的军队继1783年克里米亚陷与[SCOPE.sCountry('RUS_scope').GetName]之手后又一次征服了克里米亚的许多关键领土，包括曾经作为帝国北部边疆的哥萨克草原。[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]维齐尔认为，以古老的#yellow 克里米亚汗国#!的名义重建一个自治的哥萨克国家，并管理这片动荡的地区是更加明智的决定。"
 joi_flavor_tur.32.f: "“[SCOPE.sCountry('RUS_scope').GetName]归还克里米亚，顿巴斯，赫尔松，摩尔达维亚。[ROOT.GetCountry.GetName]承诺绝不阻碍这些地区基督教信仰的自由，并允许希望离开该国的家庭携带全部财产自由移居。自本条约生效之日起，[ROOT.GetCountry.GetName]将免除这些地区居民两年的赋税。两年期满后，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]承诺在征税方面公平公正地对待他们。”\n\n“[SCOPE.sCountry('RUS_scope').GetName]承诺，当[ROOT.GetCountry.GetAdjectiveNoFlag]宫廷有意与帝国之保护国缔结任何商业条约时，[SCOPE.sCountry('RUS_scope').GetAdjectiveNoFlag]将利用其权力和影响力协助[ROOT.GetCountry.GetAdjectiveNoFlag]宫廷；授权[ROOT.GetCountry.GetAdjectiveNoFlag]高门在莫斯科建造一座“阿拉伯礼仪”的公共清真寺；该寺将永远受到高门的保护。”"
 joi_flavor_tur.32.a: "克里米亚将接受高门的直接统治。"
 joi_flavor_tur.32.b: "我们应该恢复克里米亚汗国作为保护国。"
 joi_flavor_tur.33.t: "高加索行政"
 joi_flavor_tur.33.d: "随着[ROOT.GetCountry.GetName]的军队彻底击垮了[SCOPE.sCountry('RUS_scope').GetName]的占领者，高加索山脉再次被纳入了高门的控制。"
 joi_flavor_tur.33.f: "“我爱在暴风山巅俯瞰夜空——\n云海翻涌，无边无际；\n闪电闪烁，雷声如鼓，\n激流在山壁间轰鸣。\n\n在高加索，有一种自由——\n悬崖在星空下伫立如铁，\n雪峰在幽暗中燃烧着幻光；\n\n鹰在回旋，瀑流在吟唱，\n而人，在此感到自己的渺小，\n却又被这景象托举至崇高之境。”"
 joi_flavor_tur.33.a: "高加索将设立维拉耶特。"
 joi_flavor_tur.33.b: "重建高加索的傀儡国们。"
 joi_flavor_tur.34.t: "法提赫帕迪沙"
 joi_flavor_tur.34.d: "[ROOT.GetCountry.GetName]的军队征服了曾经#yellow 征服者穆罕默德二世#!都未曾踏上的领土，#V 圣伯多禄大教堂#!被[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]下旨改造为清真寺，四根宣礼塔被迅速的扩建在了这座天主教世界最神圣的教堂的四周。[SCOPE.sCharacter('progress_pasha_scope').GetFullName]维齐尔建议[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，或许我们可以效法征服者的故事，将首都搬迁到这座#yellow 罗马帝国#!曾经的帝都。"
 joi_flavor_tur.34.f: "“在所有这些暴行中，亵渎#yellow 圣伯多禄大教堂#!的行为尤为突出：大教堂里聚集着大批人，绝望地祈祷。那扇著名的铜门紧闭着，所有人都满怀痛苦地等待着[ROOT.GetCountry.GetAdjective]征服者的到来。突然，猛烈的撞击震动了大门，将其撞破，一股浑身是血的暴徒涌入圣地。为了给自己腾出地方，出于贪婪，他们开始挥舞长矛和弯刀。”\n\n“他们环顾四周，心想：幸运就在眼前。转眼间，所有年轻、英俊、健康的人都被剥光衣服、抢劫一空，然后被赶走；出身高贵的修女，年轻温柔的贵族女孩，如今长发下赤身裸体，就这样沦为奴隶。她们的[ROOT.GetCountry.GetAdjective]主人用手边的一切东西捆绑她们：腰带、腰带、头巾、圣带、帐篷绳、骆驼和马缰绳...他们被拳打脚踢地赶到外面，排成长长的队伍，接受可耻的命运，并被带到伊斯兰世界的各个角落。”"
 joi_flavor_tur.34.a: "科斯坦丁尼耶依然会是首都，但罗马也会得到她的地位。"
 joi_flavor_tur.34.b: "就像法提赫征服君士坦丁堡一样，罗马应该成为新的首都！"
 #美索不达米亚和君堡
 joi_flavor_tur.35.t: "平定两河"
 joi_flavor_tur.35.d: "经过我们在美索不达米亚的长期投资与开发，古苏美尔和阿拔斯的田野总算再次被[ROOT.GetCountry.GetName]所灌溉。我们成功平定了当地泛滥的洪水，治理了受盐碱化影响的土地，并建立了一个覆盖大约三百万公顷农田的庞大灌溉网络。"
 joi_flavor_tur.35.f: "“巴格达——大地的乐园，和平之城，伊斯兰的穹顶，双河的汇合之地，诸邦之珠，伊拉克之眼，哈里发的宫廷；她的空气，比世上任何空气都滋养；她的水，比世上任何水都甘甜；她的微风，比世上任何微风都柔和。”\n\n“至于那两条尊贵的河流——底格里斯与幼发拉底，它们的盛名，已足以免去一切描述；只须说：真主已祝福使它们与兄弟尼罗河并列，因此而永远为人所颂扬、所铭记。”"
 joi_flavor_tur.35.a: "整个[ROOT.GetCountry.GetName]都会因此获益良多。"
 joi_flavor_tur.35.b: "美索不达米亚的人民将因此而受惠！"
 joi_flavor_tur.36.t: "众城之女皇"
 joi_flavor_tur.36.d: "经过了一番浩大且投入庞大的改造，[ROOT.GetCountry.GetName]曾经在过去的上千年都最负有盛名的伟大城市——#yellow 科斯坦丁尼耶#!——实现了现代化改造。横跨#yellow 金角湾#!的桥梁被建成，还修建了宽阔的新林荫大道、新歌剧院、中央市场、供水网络、铁路系统、下水道和公园。这座拥有着悠久而辉煌历史的城市终于以一座#V 宏伟大都会#!的身份重新屹立在博斯普鲁斯海峡。"
 joi_flavor_tur.36.f: "“我仿佛窥见一片浩瀚的光之海，无尽的形象与色彩在闪烁；\n船首已越过那道界线：君士坦丁堡现身了！\n\n无垠的君士坦丁堡，骄傲的君士坦丁堡，崇高的君士坦丁堡！\n荣耀归于造物主，归于她的人！\n\n而今啊，去描绘吧——卑微的笔，用你的词语亵渎这神圣的景像！\n谁能描绘君士坦丁堡？众城的女皇，世界对她渴望！”"
 joi_flavor_tur.36.a: "众城之女皇——她就是地中海最耀眼的明珠！"
 joi_flavor_tur.36.b: "世界渴望之城！没有城市会比她更伟大！"
 #开始事件
 joi_flavor_tur.37.t: "欧洲病夫"
 joi_flavor_tur.37.d: "[ROOT.GetCountry.GetName]现在进入了一段稳定的下降期。如果我们不去声张[ROOT.GetCountry.GetAdjectiveNoFormatting]的主权，在群雄并起的世界夺回我们的地位，我们就会陷入毁灭的风险。"
 joi_flavor_tur.37.f: "我们衰败了，但我们可以再次崛起。在一次富有冒险精神的事变中，我们废除了禁卫军——这些人可悲地把持权力长达几个世纪，终于在最后关头同意进行改革。许多地方上横行霸道的无赖势力被拔除，接下来还有更多的工作要做。\n\n然而，曾经主持了这些改革的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的生命却所剩无几：在他统治的最后一段时间，我们要用一支真正的现代化军队来取代禁卫军，并重建[ROOT.GetCountry.GetAdjectiveNoFormatting]高门作为文明的最高点。同时，确保我们的主权，结交可靠的外国盟友，并计划收复我们帝国的故土——应当被提到[ROOT.GetCountry.GetAdjectiveNoFormatting]议程的最优先项。"
 joi_flavor_tur.37.a: "再伟大的君主也终有落幕。我们能做的就是唱好最后一班戏。"
 #奥斯曼高门
 joi_flavor_tur.38.t: "外放委任"
 joi_flavor_tur.38.d: "根据[ROOT.GetCountry.GetName]的传统，我们的[Concept('concept_heir','$RULER_TITLE_SEHZADE$')][ROOT.GetCountry.GetHeir.GetFirstName]应该在这样一个他的年轻时代外放委任到外地的小省份作为总督和统治者，不过[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的母亲，我们的苏丹皇太后并不支持这样做。"
 joi_flavor_tur.38.f: "我们最宠爱的同时也是我们继承人的[ROOT.GetCountry.GetHeir.GetFirstName]还是太年轻，因而有许多人生经验和有关如何成为优秀统治者的东西要去学习。大多数我们的维齐尔认为我们有责任维系我们王朝的优良传统，即将我们的儿子外放委任到外地的小省份作为总督和统治者。这样他们就可以学习成为一个统治者是怎么样的；通过合理分配给他们富强的省份我们也能够降低未来发生继位斗争的可能。\n\n[SCOPE.sState('prince_governor_state').GetCityHubName]过去就曾经作为一个外放委任的地点，而可能非常适合[ROOT.GetCountry.GetHeir.GetFirstName]到那去。然而其他人，包括[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的母亲，苏丹皇太后，都感觉年轻的[ROOT.GetCountry.GetHeir.GetFirstName]在帝国后宫中接受教育是最好的，因为他能够一直接触到好的老师而被那些了解他的人监护着。"
 joi_flavor_tur.38.a: "帝国后宫更适合年轻的[ROOT.GetCountry.GetHeir.GetFirstName]。"
 joi_flavor_tur.38.b: "治理[SCOPE.sState('prince_governor_state').GetCityHubName]将会给[ROOT.GetCountry.GetHeir.GetFirstName]带来许多好处。"
 joi_flavor_tur.39.t: "委任归来"
 joi_flavor_tur.39.d: "经过了一段时间的训练，我们的[Concept('concept_heir','$RULER_TITLE_SEHZADE$')][ROOT.GetCountry.GetHeir.GetFirstName]已经从他担任总督的职务上归来了。不过根据现在的情况来看，他似乎并没有学到什么东西，可能还需要进一步的磨练。"
 joi_flavor_tur.39.f: "[ROOT.GetCountry.GetHeir.GetFirstName]已经从他的总督生涯中回归了。据他自己所说这段经历在许多方面都使他成长，而且他比任何时候都准备得更充分来继位，当神召唤我们的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的时候。\n\n我们宠爱的儿子究竟学到了什么在我们看来并不是十分明显，但是在后宫中流言正在传播说[ROOT.GetCountry.GetHeir.GetFirstName]唯一有成长的是在地方上收税时膨胀的腰包。"
 joi_flavor_tur.39.a: "筹划一下，他还需要锻炼。"
 joi_flavor_tur.39.b: "一切都好。"
 joi_flavor_tur.40.t: "在[SCOPE.sState('prince_governor_state').GetCityHubName]总督的岁月"
 joi_flavor_tur.40.d: "在[SCOPE.sState('prince_governor_state').GetCityHubName]担任总督行事的经历无疑给了我们的[Concept('concept_heir','$RULER_TITLE_SEHZADE$')]：[ROOT.GetCountry.GetHeir.GetFullName]，这位终将统治[ROOT.GetCountry.GetName]的人，带来了许多有价值的经验；这也给予了他对真正权力的初体验。"
 joi_flavor_tur.40.f: "[ROOT.GetCountry.GetHeir.GetFirstName]已经回到了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]，结束了他在[SCOPE.sState('prince_governor_state').GetCityHubName]的总督时期。[ROOT.GetCountry.GetHeir.GetFirstName]宣称这些年的经历教会了他许多事情，主要是关于成为一个统治者意味着什么，以及我们在地方省份的体系是如何工作的。\n\n在[ROOT.GetCountry.GetHeir.GetFirstName]离开[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的岁月里，他也获得了充足的时间来领导地方部队，监管行政系统以及和地方势力打交道，这些都让他能够在未来成为一名杰出的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。"
 joi_flavor_tur.40.a: "他已经证明了自己是一名真正的奥斯曼的儿子。"
 joi_flavor_tur.41.t: "成人仪式"
 joi_flavor_tur.41.d: "根据[ROOT.GetCountry.GetName]的传统，在我们的[ROOT.GetCountry.GetHeir.GetFirstName][Concept('concept_heir','$RULER_TITLE_SEHZADE$')]，在他成年仪式的16岁这一年，应该被下派到帝国的军队中去担任职务，以便于获得指挥的经验和军队的信任。"
 joi_flavor_tur.41.f: "就像过去的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]们一样，[ROOT.GetCountry.GetHeir.GetFirstName]希望为他自己获得一个征服者的称号，被人称为在马背上领导一个帝国的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]。鉴于[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]仍然非常健康，以及我们不会让[Concept('concept_heir','$RULER_TITLE_SEHZADE$')]真正上战场，这个梦想的实现只得留待未知。\n\n不过，现在[ROOT.GetCountry.GetHeir.GetFirstName]被其他王子嘲笑而他的妈妈要求[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]给予他一支他自己的部队：这并不是一个不合理的要求，然而当有人试图拿我们宠爱的继承人和他的生命与身体来冒险时我们必须要好好考量一下他们的动机。"
 joi_flavor_tur.41.a: "这对[ROOT.GetCountry.GetHeir.GetFirstName]有好处。"
 joi_flavor_tur.41.b: "还是后宫里安全得多。"
 joi_flavor_tur.42.t: "苏丹皇太后的支持"
 joi_flavor_tur.42.d: "我们钦定[ROOT.GetCountry.GetHeir.GetFirstName]为最佳继位人选，皇储在所有帝国王子和他们的母亲之间是最受欢迎的那一个。即使如此他的继位也也比任何人想象的来得艰难，许多人将这归咎于我们的哈塞基苏丹。然而，为了阻止这种破坏性的密谋，苏丹皇太后，[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的母亲，亲自站出来保护[ROOT.GetCountry.GetHeir.GetFirstName]。"
 joi_flavor_tur.42.f: "“流言传说，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]最受宠爱的儿子[ROOT.GetCountry.GetHeir.GetFirstName]，正在谋划反叛[ROOT.GetCountry.GetRuler.GetFirstName]父亲并颠覆国家。陛下，我请求您将国家躯体上的这个肿瘤给切除，并诛灭[ROOT.GetCountry.GetHeir.GetFirstName]。”\n\n“我的儿子，帝国和高门的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，毫无疑问哈赛基苏丹在这件事上是为了自己的利益而发言，[ROOT.GetCountry.GetHeir.GetFirstName]并不是她的儿子，但替代者却很有可能是。您应该考虑到这一点，我常常为他的事业提供建议和保护，我相信他不是这样的人。”\n\n“陛下，[ROOT.GetCountry.GetHeir.GetFirstName]是最为合适的继承人。然而，他有许多兄弟，这些兄弟嫉妒他继承人的地位，而且在帝国内各据要职。这些无能的蠢货一心想着在他登基时破坏他的统治并且飞黄腾达。因此最好趁着我们有时间，赶紧翦除这些豺狼虎豹。但是，这么做在未来也会有一些难以预料的后果。陛下，必须慎之又慎，考虑清楚。”"
 joi_flavor_tur.42.a: "召回[ROOT.GetCountry.GetHeir.GetFirstName]，他需要被严密调查。"
 joi_flavor_tur.42.b: "毫无疑问，母亲的支持是正确的，[ROOT.GetCountry.GetHeir.GetFirstName]是清白的。"
 joi_flavor_tur.42.c: "严惩挑拨离间的奸臣，发信告诉[ROOT.GetCountry.GetHeir.GetFirstName]他的父亲完全相信他。"
 joi_flavor_tur.43.t: "[SCOPE.sState('prince_governor_state').GetCityHubName]的繁荣"
 joi_flavor_tur.43.d: "最近，[SCOPE.sState('prince_governor_state').GetCityHubName]的管理任务被转交给了我们的[Concept('concept_heir','$RULER_TITLE_SEHZADE$')]：[ROOT.GetCountry.GetHeir.GetFullName]，而他处理这些管理事务的速度之快超出了我们的预期。当地的经济繁荣发展，市中心吸引到了更多的商人和工匠来定居，税收情况也有了长期的改善。"
 joi_flavor_tur.43.f: "“[SCOPE.sState('prince_governor_state').GetCityHubName]，真主统治下的一座真正和平而繁荣的城镇：这里的人民睿智、魅力、优雅，学识渊博。这里的气候温和，一切美好事物都汇聚于此，人人都向往它。人们愿意每场战争都为它而战，每双手都举起，捍卫它。它声名远扬，无需赘述，它的辉煌远超我们的想象，无可比拟。”"
 joi_flavor_tur.43.a: "别高兴得太早了。"
 joi_flavor_tur.43.b: "真是优秀。"
 joi_flavor_tur.44.t: "在前线的皇子总督"
 joi_flavor_tur.44.d: "令人高兴，我们在军队中服役的[ROOT.GetCountry.GetHeir.GetFirstName][Concept('concept_heir','$RULER_TITLE_SEHZADE$')]在他长期的军事生涯中获益良多，而这些都表现在了这场战争中：在最近的一次战役，他奉命带领一个营发动突击，感谢真主，他取得了空前的胜利。他的战术思想得到了战友和上级的一致赞扬，即便是对他的服役并不知情的持剑帕夏[SCOPE.sCharacter('progress_pasha_scope').GetFullName]阁下也正计划将他调任到其他更关键的职务中。"
 joi_flavor_tur.44.f: "最近对抗[SCOPE.sCountry('enemy_country_scope').GetName]的战争使得皇子总督[ROOT.GetCountry.GetHeir.GetFirstName]有机会真正证明自己作为一个军事指挥官和圣战士的价值：根据报告所述，他在他的地盘上竭尽全力打败了敌人部队，将战火烧到边境的敌人那一边。信众踊跃加入他的军队，而军队精英开始注意起他并可能在将来的继位斗争中支持他。\n\n“你像穆罕默德的家人一样值得赞美！诵读[ROOT.GetCountry.GetHeir.GetFirstName]的英勇，被赞美的人正值青年与辉煌：他是我们在困难时期的希望，并接受光荣的哈桑的荣耀；正如慷慨和明亮的太阳，又如世界的荣耀和崇高：你是战争的雄狮，胜利的野兽！”"
 joi_flavor_tur.44.a: "[ROOT.GetCountry.GetHeir.GetFirstName]可以被调去指挥骑兵以进一步深造。"
 joi_flavor_tur.44.b: "应该让[ROOT.GetCountry.GetHeir.GetFirstName]接触我国最先进的火炮部队。"
 joi_flavor_tur.45.t: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]之子"
 joi_flavor_tur.45.d: "众所周知，[ROOT.GetCountry.GetName]的继承在当前的局势中并不稳定。[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]维齐尔坚持现在是时候让[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]钦定一个他最为中意的[concept_heir]人选，以避免接下来可能出现的最为糟糕的继位斗争。"
 joi_flavor_tur.45.f: "尊贵的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下，[ROOT.GetCountry.GetName]的领袖，众苏丹们的苏丹，被誉为一个伟人和一个无可动摇的统治者。与他这样的身份和能力相匹配，他也养育了许多能力出众的孩子，并且其中一些人展现出君王的潜质。\n\n我们的政府官员和这些子女都知道只有一个人能继承大统而失败者将面对什么，任命一名[concept_heir]——尽管这未必能停止他们就最为中意的人选进行角逐，但有希望阻止接下来可能出现的最为糟糕的继位斗争，如果我们的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在去见真主前没有明确钦定继位者的话这是很可能发生的。"
 joi_flavor_tur.45.a: "最为虔诚的儿子是我们的最佳人选。"
 joi_flavor_tur.45.b: "最为强大的儿子是我们的最佳人选。"
 joi_flavor_tur.45.c: "最为正统的儿子是我们的最佳人选。"
 joi_flavor_tur.45.e: "最为公正的儿子是我们的最佳人选。"
 joi_flavor_tur.45.g: "最为博学的儿子是我们的最佳人选。"
 joi_flavor_tur.46.t: "持剑者帕夏？"
 joi_flavor_tur.46.d: "现任持剑帕夏：[SCOPE.sCharacter('progress_pasha_scope').GetFullName]——尽管十分英勇且为[ROOT.GetCountry.GetName]和[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]都立下了赫赫功劳，但由于一些原因，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]决定取消他的政治职务，并以其他帕夏替代之。我们应该需要怎样的一位新持剑帕夏？"
 joi_flavor_tur.46.f: "“据传，先知穆罕默德曾说：“真主喜爱勇气，即使只是用来杀一条蛇。”——而[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]——愿真主怜悯他的灵魂——的确是最伟大的勇士之一，他心志坚毅，气概刚烈，镇定非凡，任何变故都不能使他惊惧。”\n\n“我亲眼见过他，在寒冬初起之时，向众军发布命令后，只带极少随从，便与敌军大部对峙而不退。我曾问海岸上的君王，他当时正与苏丹同席，在休战日谈及敌军人数。”\n\n“译者转述他的回答：‘我与苏尔的领主一同前往观察他们的营地，当我们登高俯瞰，估算其势，发现他们的军队多达五十万人。’”"
 joi_flavor_tur.46.a: "我们需要一位战功赫赫的帕夏。"
 joi_flavor_tur.46.b: "一名开明和锐意改革的帕夏最有利。"
 joi_flavor_tur.46.c: "军队最重要的是保持对[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的忠诚。"
 joi_flavor_tur.46.e: "军队可以自己推举一名帕夏。"
 joi_flavor_tur.47.t: "圣战诏书"
 joi_flavor_tur.47.d: "最近与邪恶的异教徒：[SCOPE.sCountry('enemy_country_scope').GetName]的战争促使[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]决定在大穆夫提[SCOPE.sCharacter('progress_pasha_scope').GetFullName]的帮助下以全体[GetReligion('sunni').GetName]和[GetReligion('shiite').GetName]哈里发的名义召唤全体穆斯林向异教徒发动吉哈德，愿真主保佑[ROOT.GetCountry.GetName]！"
 joi_flavor_tur.47.f: "“我的英雄战士们：在我们发起圣战和战争的神圣道路上，面对威胁我们昭昭宗教和我们珍爱家园的敌人，你们一刻也不要放弃你们的决心、坚定和自我牺牲。你们像驱赶雄狮一样驱赶敌人。我以这份神圣的教令号召三亿伊斯兰信徒参加这场最伟大的圣战，而[ROOT.GetCountry.GetName]的生存和存亡，都取决于你们的胜利。三亿无辜和受压迫的信徒的祈祷和祝福，他们怀着无比的狂喜和欣喜，在各地的清真寺和天房中，在真主的怀抱中，向主祈祷，与你们同在。”\n\n“我的军人儿子们：你们现在肩负的职责，世上从未有任何军队被赋予过：展现你们是曾经震撼世界的奥斯曼军队的真正继承者，使异教的敌人永远不敢再踏足我们的圣地。毫无疑问，全能真主的恩典和我们光荣先知的神圣援助将帮助我们战胜敌人：请不要忘记，你们也是世界上最英勇、最伟大的军队的战友，在今天的战争中，我们与他们并肩作战！愿正义的烈士为我们带来胜利的喜讯，愿加齐们的圣战蒙福，愿他们的宝剑锋利。”"
 joi_flavor_tur.47.a: "动员整个伊斯兰世界与异教徒作决死斗争！"
 joi_flavor_tur.47.b: "确保我国的加齐勇士们热衷于圣战。"
 joi_flavor_tur.48.t: "宫廷赏赐"
 joi_flavor_tur.48.d: "为了表彰高门内的各级官僚和政府要员们的忠诚，以及安抚他们的目的，[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下决定给高门全体被认为有功的官员们发布一次公开赏赐。"
 joi_flavor_tur.48.f: "“他从不把金银财宝留在自己的金库里。相反，每当有钱到手，他都会将其用于真主的事业，施舍给穷人和为真主奋斗的人。他曾说过：“以真主之名，我绝不让一分钱留在我家。” \n\n每当他看到穷人，他的心就会变得柔软，有时甚至会脱下衣服盖在他们身上。他乐于宽恕他人，并常说：“人在我面前，是真主的造物。如果我宽恕他们，真主也会宽恕我。””"
 joi_flavor_tur.48.a: "金币和荣誉的双重赏赐将确保忠诚。"
 joi_flavor_tur.48.b: "赏赐一些黄金。"
 joi_flavor_tur.48.c: "册封几个头衔敷衍一下得了。"
 joi_flavor_tur.49.t: "新任大维齐尔？"
 joi_flavor_tur.49.d: "尽管现任大维齐尔[SCOPE.sCharacter('progress_pasha_scope').GetFullName]曾经很好的履行了他的职责，但是由于当前政治形式的需要，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下决定改任一名新的大维齐尔。"
 joi_flavor_tur.49.f: "“你这位心智光明的宰辅、我之忠臣[SCOPE.sCharacter('progress_pasha_scope').GetFullName]帕夏啊！朕之御笔一到，片刻不可耽搁——当与朕之伟大统帅[SCOPE.sCharacter('army_pasha_scope').GetFirstName]帕夏同赴神圣之征；以周备而整肃之府军，启行君王之征。”\n\n“[SCOPE.sCharacter('progress_pasha_scope').GetFirstName]帕夏是为主道而战的勇士大臣，我怎能在此处就行其诛？因为我们的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下一生极力避讳亲手杀人与令人生死，他总是尽可能地不杀、不使人被杀。”"
 joi_flavor_tur.49.a: "我们的大维齐尔必须最懂得执行苏丹的意志。"
 joi_flavor_tur.49.b: "听下面人的推举就行了。"
 joi_flavor_tur.50.t: "[TimeKeeper.GetCurrentDate.Format('y年')]高门会议"
 joi_flavor_tur.50.d: "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下——托普卡帕和高门的主人——发布了皇家诏令，决定在[TimeKeeper.GetCurrentDate.Format('y年 m月')]召开本年度的高门会议，商讨[ROOT.GetCountry.GetName]现在所处的境况。"
 joi_flavor_tur.50.f: "“税收的确定也至关重要，因为一个维护土地的国家必然需要士兵、军营和其他必要的开支，而这些都需要资金来管理，而资金又来自臣民的税收。因此，重要的是要以良好的面貌看待税收，感谢真主，因为过去人们认为税收是收入，而这笔钱却落入了高门之手。”\n\n“为了不受任何一方的干涉，并且在有人指控或犯罪的情况下，由于他们没有受到指控或犯罪的侵害，因此不应没收他们的财产，不应剥夺他们的继承权，伊斯兰教徒和其他代表我们崇高主权的人应无一例外地获得这种许可。”"
 joi_flavor_tur.50.a: "高门应该关注国内的经济。"
 joi_flavor_tur.50.b: "高门需要专注于海军。"
 joi_flavor_tur.50.c: "高门必须侧重于陆上防卫。"
 joi_flavor_tur.50.e: "叛乱的阴云！严格调查高门内的叛徒。"
 joi_flavor_tur.50.g: "高门需要帮助帝国的人民。"
 joi_flavor_tur.51.t: "心碎"
 joi_flavor_tur.51.d: "我们正在军队中秘密担任职务的[ROOT.GetCountry.GetHeir.GetFirstName][Concept('concept_heir','$RULER_TITLE_SEHZADE$')]最近不幸的在一次边境摩擦时中枪，子弹贯穿了他的身体，但没有命中重要部位。尽管如此，严重的感染和伤口仍然在威胁他的生命。"
 joi_flavor_tur.51.f: "多么天真无邪的微笑啊，他好奇于帝国的种种问题是那样将我打动。“父亲！”他曾会这样说，“父亲，圣地有多大？”就这样问了一遍又一遍。我还记得我们一起品尝水果时的欢笑。我以为...我为他所做的一切都是为了更好的结果。然而，显然我错了。我健康坚定的王子受伤了，伤势如此沉重，现在，他躺在我面前，可能就要永远地睡去了。\n\n从他的前额的汗珠上反射出他的侍从为[ROOT.GetCountry.GetHeir.GetFirstName]的性命担忧的眼睛，他可能活不过今晚了。我不希望这是我看到他的最后一眼，但只有真主能决定这一点，愧疚萦绕着我的心头。在睡梦中，我所有亲生骨肉的面孔从记忆中浮现，我又该如何面对我的妻子与妾室？如今，唯有内疚和羞耻。"
 joi_flavor_tur.51.a: "让我们为[ROOT.GetCountry.GetHeir.GetFirstName]的性命祈祷吧。"
 joi_flavor_tur.51.b: "去请一位训练有素的医生来。"
 joi_flavor_tur.51.c: "用最新的药物治疗他。"
 joi_flavor_tur.51.e: "我们需要组织国际专家会诊。"
 joi_flavor_tur.51.h: "新研究的抗生素药物肯定有用。"
 #亚美尼亚大屠杀事件组
 joi_flavor_tur.52.t: "亚美尼亚种族灭绝！"
 joi_flavor_tur.52.d: "随着[ROOT.GetCountry.GetName]的[SCOPE.sCulture('turkish_scope').GetName]人民对[SCOPE.sCulture('armenian_scope').GetName]人的敌视情绪到达顶峰，一场由[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]亲自策划，并经过了[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]批准的秘密屠杀命令传播到了帝国在各地的驻军军营中。一场史无前例的屠杀开始了，前来采访的外国记者发现了这一罪行，《泰晤士报》愤怒的称[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]为“人类的公敌”。"
 joi_flavor_tur.52.f: "“[TimeKeeper.GetCurrentDate.Format('m月 d日')]下午，我亲眼目睹的景象永远铭刻在我的脑海中，那是我所能见到的最可怕的景象：沿着乱葬岗的北墙，横七竖八地躺着数不尽的被屠杀的[SCOPE.sCulture('armenian_scope').GetName]人的遗体。许多尸体惨遭肢解，面目全非。我看到一具尸体的脸被某种重物击碎，面目全非。我看到一些人的脖子几乎被刀砍断。我还看到一具尸体的胸膛被剥了皮，前臂被砍断，上臂的皮也被刮掉了。”\n\n“我问是不是狗干的，他们告诉我，是[SCOPE.sCulture('turkish_scope').GetName]人用刀干的。十几具尸体被烧了一半。所有尸体的衣服都被扒光了，只剩下一两件棉质内衣...被勇敢的战士在战场上杀死是一回事；被懦弱的武装士兵冷血屠杀，而且毫无还手之力，则是另一回事。”"
 joi_flavor_tur.52.a: "这只是一场仁慈的特别教化行动，不要听信境外势力的胡言乱语。"
 joi_flavor_tur.53.t: "[SCOPE.sState('armenian_scope').GetCityHubName]亚美尼亚叛乱"
 joi_flavor_tur.53.d: "一群渴望争取自治的[SCOPE.sCulture('armenian_culture_scope').GetName]人，由于最近反[SCOPE.sCulture('armenian_culture_scope').GetName]情绪的持续增长而激进化，并在[SCOPE.sState('armenian_scope').GetCityHubName]发动了武装袭击。据称，当地的政府机关已经失守——不过也有官员认为，这只是当地贝伊为了推卸责任的胡言乱语。"
 joi_flavor_tur.53.f: "“我对[SCOPE.sState('armenian_scope').GetCityHubName]的汇报与阁下的汇报有所不同。”[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]犹豫着，语气中带着一丝不苟。“我的汇报中没有提到当地民众的任何叛乱，而是提到地区和当地官员长达数月的挑衅性镇压。他们说的是一些无关紧要的骚乱，只要加强城镇警力就能轻易平息，而任何一个公正的人都能轻易看出，动用一千多名士兵增援军队是蓄意之举。”"
 joi_flavor_tur.53.a: "宽恕[SCOPE.sState('armenian_scope').GetCityHubName]的人民。"
 joi_flavor_tur.53.b: "叛乱必须被镇压，哪怕是大开杀戒！"
 joi_flavor_tur.54.t: "[ROOT.GetCountry.GetRuler.GetFirstName]大屠杀"
 joi_flavor_tur.54.d: "对[SCOPE.sCulture('armenian_culture_scope').GetName]人的敌意正在愈演愈烈，即便是[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]本人也开始倾向于“彻底灭绝”[SCOPE.sCulture('armenian_culture_scope').GetName]人的立场。他正试图指挥[SCOPE.sState('armenian_scope').GetCityHubName]忠于自己的军官，比如[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]，秘密灭绝当地的[SCOPE.sCulture('armenian_culture_scope').GetName]社区。"
 joi_flavor_tur.54.f: "“[SCOPE.sState('armenian_scope').GetCityHubName]的状况惨不忍睹。这座城镇遭到洗劫和破坏：死亡人数无法估计。尸体散落在街道各处。星期五我出门时，不得不小心翼翼地从尸体间穿过，以免踩到它们。星期六早上，我数了数，半小时内就有十几车[SCOPE.sCulture('armenian_culture_scope').GetName]人的尸体被运到河边，扔进了河里。在他们的墓地里，坟墓正被成批地挖掘。”\n\n“星期五下午，250名所谓的[ROOT.GetCountry.GetAdjectiveNoFormatting]预备役人员，没有军官，在[SCOPE.sState('capital_state').GetCityHubName]劫持了一列火车，强迫司机把他们送到[SCOPE.sState('armenian_scope').GetCityHubName]。在那里，他们参与了对[SCOPE.sState('armenian_scope').GetCityHubName][SCOPE.sCulture('armenian_culture_scope').GetName]人聚居区的彻底摧毁，而这片区域正是[SCOPE.sState('armenian_scope').GetCityHubName]最好的地方。他们的劫掠行动彻底而迅速。”"
 joi_flavor_tur.54.a: "阻止[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的无理旨意。"
 joi_flavor_tur.54.b: "[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]干得好！我们称之为高效。"
 joi_flavor_tur.55.t: "[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]帕夏遇刺案"
 joi_flavor_tur.55.d: "昨天，一名在首都的[SCOPE.sCulture('armenian_culture_scope').GetName]学生在街上公然开枪杀死了我们的帕夏：[SCOPE.sCharacter('tur_pasha_scope').GetFullName]。他在繁忙的街角近距离朝他的后颈开枪，子弹穿过他的脊髓，从左眼上方穿出，击碎了他的大脑，致其当场死亡。在今天的庭审上，多位外国的知名律师前来为他辩护，并向法庭辩解称，他并不是杀人犯，只是代表正义对组织了数次大屠杀的[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]帕夏进行了神圣的复仇。"
 joi_flavor_tur.55.f: "“在这个可恶的人的命令下，一名宪兵带走了我的妹妹，数百人强奸了她，她的尸体暴露在大街上；武装宪兵强迫城里的亚美尼亚人放弃家园和财产，我们一离开城市，宪兵就开始枪杀受害者并抢劫我们的财物。”\n\n“我宁愿现在死去，也不愿再提起那段黑暗的日子：我不认为自己有罪，因为我问心无愧...我杀了一个人，但我不是杀人犯。”\n\n“我做了一个梦：大屠杀的画面一遍又一遍地出现在我的眼前。我看到了我母亲的尸体。这具尸体站了起来，走到我面前说：‘你明明看到[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]在这里，却对此漠不关心？你不再是我的儿子了！’”"
 joi_flavor_tur.55.a: "帕夏已死，是非对错我无心分辨...让[SCOPE.sCulture('armenian_culture_scope').GetName]人，做出回答！"
 joi_flavor_tur.55.b: "[SCOPE.sCharacter('tur_pasha_scope').GetFirstName]帕夏的屠杀罪行令人发指！宣判刺客无罪！"
 joi_flavor_tur.56.t: "[SCOPE.sState('armenian_state_scope').GetCityHubName]大屠杀"
 joi_flavor_tur.56.d: "一场残酷的针对[SCOPE.sCulture('armenian_scope').GetName]人的屠杀计划被呈上了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的案头。组织屠杀的军官告诉[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，他将准备对[SCOPE.sState('armenian_state_scope').GetCityHubName]的[SCOPE.sCulture('armenian_scope').GetName]人进行彻底的灭绝，以便为真正的[ROOT.GetCountry.GetAdjective]公民开拓生存空间。"
 joi_flavor_tur.56.f: "“[SCOPE.sCulture('armenian_scope').GetName]人被迫分成四批，每批500个家庭，离开[SCOPE.sState('armenian_state_scope').GetCityHubName]前往埃尔津詹。他们不得不踩着之前被杀害的其他[SCOPE.sCulture('armenian_scope').GetName]人的尸体行走。她作证说，到达埃尔津詹后，男人们被与其他被驱逐者分开，捆绑在一起扔进了河里。”\n\n“宪兵来了，挑走了最漂亮的妇女和女孩，任何拒绝的人都会被刺刀刺穿，双腿被撕裂；刽子手会剖开孕妇的肚子，杀死她们的孩子。这实际上是要消灭全部的[SCOPE.sCulture('armenian_scope').GetName]人民。”"
 joi_flavor_tur.56.a: "阻止这种暴行！[SCOPE.sCulture('armenian_scope').GetName]的齐米受到神圣律法的保护！"
 joi_flavor_tur.56.b: "对[SCOPE.sState('armenian_state_scope').GetCityHubName]的[SCOPE.sCulture('armenian_scope').GetName]人大开杀戒！"
 #保加利亚大屠杀
 joi_flavor_tur.57.t: "保加利亚种族灭绝！"
 joi_flavor_tur.57.d: "[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，一道秘密的命令由[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]签发并传达给了驻索菲亚的军营，一场针对[SCOPE.sCulture('bulgarian_scope').GetName]人的大规模种族灭绝开始了。"
 joi_flavor_tur.57.f: "“这些屠杀中遇难的儿童数量惊人。他们常常被刺刀刺伤，我们有好几位目击者讲述，他们看到小婴儿被刺刀抵着在街上游荡，无论是在这里还是在奥卢克-克尼。原因很简单。当一个穆斯林杀死一定数量的异教徒后，无论他犯下怎样的罪孽，他都能确保进入天堂。”\n\n“那里堆满了头骨，混杂着人体各个部位的骨头，几乎完整的骨架正在腐烂，衣服、头发和腐肉堆积成一堆污秽不堪的尸体，周围长满了茂盛的野草。它散发着令人作呕的气味，就像死马的气味一样，我们的不合时宜的到来打断了那些狗的觅食...这里的地面上到处都是骨架，上面粘着衣物和腐肉碎片。”"
 joi_flavor_tur.57.a: "我们称之为高效。"
 #塞尔维亚大屠杀
 joi_flavor_tur.58.t: "塞尔维亚种族灭绝！"
 joi_flavor_tur.58.d: "[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，一道秘密的命令由[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]签发并传达给了驻塞尔维亚的军营，一场针对[SCOPE.sCulture('serb_scope').GetName]人的大规模种族灭绝开始了。"
 joi_flavor_tur.58.f: "“距离约兹加德镇大约四个小时路程时，我们在一个山谷里看到数百颗长发披肩的头颅，那是妇女和女孩的头颅。我们护卫队的宪兵队长名叫舒克里。我对他说：“我以为只有男人被杀了。” \n\n他说：“不，如果我们只杀男人，而不杀妇女和孩子，五十年后，[SCOPE.sCulture('serb_scope').GetName]人又会达到数百万。因此，我们必须消灭妇女和儿童，才能一劳永逸地解决这个问题，无论是在国内还是国外；我们要确保永远没有任何证人能够出庭作证。实在不行，就把他们赶到叙利亚沙漠饿死。”"
 joi_flavor_tur.58.a: "我们称之为高效。"
 #亚述大屠杀
 joi_flavor_tur.59.t: "亚述种族灭绝！"
 joi_flavor_tur.59.d: "[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，一道秘密的命令由[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]签发并传达给了驻摩苏尔的军营，一场针对[SCOPE.sCulture('assyrian_scope').GetName]人的大规模种族灭绝开始了。"
 joi_flavor_tur.59.f: "“我恳请我的同胞们，”他写道，“比起欧洲任何其他民族，[SCOPE.sCulture('assyrian_scope').GetName]的命运更取决于你们，要求并坚持我国政府，既然一直以来都朝着一个方向努力，就应该朝着另一个方向努力，并竭尽全力与欧洲各国一道，消灭[ROOT.GetCountry.GetName]在[SCOPE.sCulture('assyrian_scope').GetName]的行政权力。现在就让[SCOPE.sCulture('turkish_scope').GetName]人以唯一可能的方式——即自取灭亡——来结束他们的暴行吧...”"
 joi_flavor_tur.59.a: "这都是境外势力的阴谋！"
 #希腊大屠杀
 joi_flavor_tur.60.t: "希腊种族灭绝！"
 joi_flavor_tur.60.d: "[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，一道秘密的命令由[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]签发并传达给了驻马其顿的军营，一场针对[SCOPE.sCulture('greek_scope').GetName]人的大规模种族灭绝开始了。"
 joi_flavor_tur.60.f: "“种种迹象表明，[SCOPE.sCulture('turkish_scope').GetName]人计划像对待[SCOPE.sCulture('armenian_scope').GetName]人一样，将[SCOPE.sCulture('greek_scope').GetName]人视为国家敌人而予以清除。[SCOPE.sCulture('turkish_scope').GetName]人采取的策略是将人们驱逐到内陆，却不采取任何措施保障他们的生存，任由他们遭受死亡、饥饿和疾病的折磨。随后，他们洗劫并焚毁或摧毁被遗弃的房屋。[SCOPE.sCulture('turkish_scope').GetName]人对[SCOPE.sCulture('greek_scope').GetName]人所做的事情，正是当年对待[SCOPE.sCulture('armenian_scope').GetName]人的方式。”"
 joi_flavor_tur.60.a: "我们称之为高效。"
 #大奥斯曼主义
 joi_flavor_tur.61.t: "[GetIdeology('ideology_ottomanism').GetName]运动的兴起"
 joi_flavor_tur.61.d: "一种被称为[GetIdeology('ideology_ottomanism').GetName]的思想正在[ROOT.GetCountry.GetName]兴起。其支持者认为，它能够建立民族团结，从而防止以宗教为基础的米利特制度撕裂帝国。"
 joi_flavor_tur.61.f: "“当我们说‘受保护民’时，意思是：他们受真主及其使者和穆斯林社群的盟约约束，他们有责任保护他们，这是每个人的义务，这就是这个词的含义。目前，我们的许多兄弟对‘受保护民’这个词感到冒犯，我在我的书中写道，我认为没有任何理由阻止当代伊斯兰伊智提哈德摒弃‘受保护民’这个词，称他们为非穆斯林公民。”\n\n“不应为了征收吉兹亚税而殴打任何受保护民，不应强迫他们站在烈日下，也不应对他们的身体施加任何可憎之物，或做任何类似的事情。相反，[ROOT.GetCountry.GetName]应该宽容对待他们。”"
 joi_flavor_tur.61.a: "我们只属于真主，并且必将归于祂！"
 joi_flavor_tur.61.b: "我们的祖国属于每一个奥斯曼人，无论他的出身！"
 joi_flavor_tur.62.t: "[GetIdeology('ideology_ottomanism').GetName]思想的破产"
 joi_flavor_tur.62.d: "试图建立一种新的#yellow 奥斯曼#!民族认同的尝试失败了。许多人认为，如果不采取措施挽救我们的领土，那么伟大的[ROOT.GetCountry.GetName]就将被宗教隔离与民族主义的狂潮卷的粉碎。"
 joi_flavor_tur.62.f: "“基督徒和土耳其人已不可能共存：只有基督教政权才能提供平等、公正和良心自由。基督教政权应当取代穆斯林政权...东安纳托利亚和基利基亚是建立基督教政权的地区：土耳其的基督徒希望如此，也就是说，他们正在要求建立基督教政权，就像在欧洲的其他地方一样。”"
 joi_flavor_tur.62.a: "这是真主的旨意。"
 joi_flavor_tur.62.b: "[GetIdeology('ideology_ottomanism').GetName]的遗产仍然使我们受益良多。"
 joi_flavor_tur.63.t: "[SCOPE.sCulture('gtr_event_scope').GetName]国民议会"
 joi_flavor_tur.63.d: "[SCOPE.sCulture('gtr_event_scope').GetName]陈旧的米利特制度接受了我们的改革，废除了针对当地人民的一切不平等措施，在宪法中保障了[SCOPE.sCulture('gtr_event_scope').GetName]人的平等权力；并在当地设立了自治议会与自治机构，宣布本土官员的任免将由当地议会与人民自行决定，并授予他们自行分配与征收部分税收的权力。而[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]则不再干预当地的内部治理，转而只负责领导共同的国防与外交事务。"
 joi_flavor_tur.63.f: "“每当立法者企图剥夺和摧毁人民的财产，或以专制权力奴役人民时，他们便将自己置于与人民的战争状态。人民从此不再服从立法者，并可寻求上帝为全人类提供的共同庇护，以抵御强权和暴力。”\n\n“因此，每当立法者违背这一社会基本准则，或出于野心、恐惧、愚昧或腐败，企图攫取或将对人民生命、自由和财产的绝对权力置于他人之手时，他们便因背信弃义而丧失了人民赋予他们的、用于完全相反目的的权力，而这权力应归还人民，人民有权恢复其原有的自由。”"
 joi_flavor_tur.63.a: "[SCOPE.sCulture('gtr_event_scope').GetName]人民的自治权将受到宪法保障！"
 #伊斯兰日志事件组
 joi_flavor_tur.64.t: "萨拉菲运动"
 joi_flavor_tur.64.d: "一场被称作“萨拉菲运动”的[GetReligion('sunni').GetName]原教旨主义运动正在[ROOT.GetCountry.GetName]兴起。[GetIdeology('ideology_salafi').GetName]希望通过恢复先知穆罕默德及其圣伴，以及三代内再传弟子的纯正伊斯兰教传统来彻底洗涤现代化运动给国家造成的流毒。"
 joi_flavor_tur.64.f: "“宣称自己是先贤的追随者，属于先贤的教派，并为此感到自豪，这并非耻辱；相反，根据学者们的共识，这应该被接受。先贤的教法学派必然是真理。如果一个人内心和外在都坚持这一教法，那么他就如同内心和外在都遵循真理的信徒一样。”\n\n“很简单。我们想要伊斯兰教法。在经济、政治、司法、边境管理和外交关系中都要实行伊斯兰教法。”"
 joi_flavor_tur.64.a: "[ROOT.GetCountry.GetName]将坚定沿着现代化的道路前进！"
 joi_flavor_tur.64.b: "先知的言行与圣训将成为[ROOT.GetCountry.GetName]治理的神圣标准。"
 joi_flavor_tur.65.t: "伊斯兰新世界"
 joi_flavor_tur.65.d: "随着[ROOT.GetCountry.GetName]开始彻底的在政治，外交和军事上都贯彻[GetReligion('sunni').GetName]教法，并从帝国的剔除中消灭自由主义，社会主义等邪恶现代性意识形态的毒瘤，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]认为，是时候召开一场全世界穆斯林之间的会议来巩固他至高无上的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]的身份了。"
 joi_flavor_tur.65.f: "“世界是一座花园，浇灌它的是王朝，即权威。守护这一权威的是伊斯兰教法，伊斯兰教法也是维系帝国的政策；帝国是军队缔造的产物；军队的保障在于财富；财富由乌玛获得，他们通过正义成为君主的仆人；正义是世界福祉的基石。”\n\n“[ROOT.GetCountry.GetName]的旨意是明确的：学者和显贵中的领袖应该聚在一起，编纂一部基于神圣律法根深蒂固的基本原则、符合时代需要、易于运用且没有分歧的教规。然后，哈里发命令[GetReligion('sunni').GetName]的统治者们执行这部教规。”"
 joi_flavor_tur.65.a: "[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]是真主的代言人！"
 joi_flavor_tur.66.t: "至高的民族"
 joi_flavor_tur.66.d: "试图将所有[GetReligion('sunni').GetName]穆斯林联合在一起的尝试失败了。[GetLawType('law_monarchy').GetName]的支持者们遭受重创，前任[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]被驱逐出国，宗教传统在我国的影响力正受到前所未有的打击：而民族主义的呼声却正在崛起。"
 joi_flavor_tur.66.f: "“面对知识、科学以及整个文明的辉煌，我无法接受[SCOPE.sCulture('turkish_scope').GetName]文明社会中存在如此原始的人，他们竟然在酋长的指导下寻求物质和精神上的利益。[ROOT.GetCountry.GetName]不能是一个由酋长、苦行僧和门徒组成的国家。最好、最真实的秩序是文明的秩序：做一个真正的人，只需履行文明的要求即可。苦行僧团的领袖们终将明白我话中的真谛，他们会关闭自己的修道院，并承认他们的教义已经过时了。”"
 joi_flavor_tur.66.a: "[GetReligion('sunni').GetName]的传统必须被严肃保留。"
 joi_flavor_tur.66.b: "文明的[SCOPE.sCulture('turkish_scope').GetName]民族万岁！"
 joi_flavor_tur.67.t: "西方的毒瘤"
 joi_flavor_tur.67.d: "[ROOT.GetCountry.GetName]的反西方，乃至于反现代化情绪正在随着[GetReligion('sunni').GetName]教士们影响力的加强而不断上升。许多忠实的穆斯林正向[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]发起请愿，要求根除帝国内所采取的某些西方式政策。"
 joi_flavor_tur.67.f: "“在中东和[ROOT.GetCountry.GetName]，宗教话语主导着社会、广播和世界观。激进[GetReligion('sunni').GetName]清真寺在国内遍地开花。书店里充斥着宗教题材的书籍...对伊斯兰教法的诉求、认为政府背离伊斯兰教义、认为伊斯兰教是解决一切问题的答案，以及坚信西方已经向伊斯兰教宣战——这些都是主导公共讨论的主题。伊斯兰主义者或许无法掌控议会或政府机构，但他们已经占据了大众的想象。”"
 joi_flavor_tur.67.a: "[GetLawType('law_freedom_of_conscience').GetName]的毒草必须被拔除！"
 joi_flavor_tur.67.b: "[GetLawType('law_private_schools').GetName]和[GetLawType('law_public_schools').GetName]应该接受教法的改造。"
 joi_flavor_tur.67.c: "[GetLawType('law_no_womens_rights').GetName]是真主的旨意。"
 joi_flavor_tur.67.e: "[GetLawType('law_outlawed_dissent').GetName]有助于神圣秩序的稳定。"
 joi_flavor_tur.67.g: "[GetLawType('law_industry_banned').GetName]可以根除现代化在帝国内排出的毒素。"
 joi_flavor_tur.67.k: "[GetLawType('law_agrarianism').GetName]可以帮助我们恢复真主的眷顾。"
 joi_flavor_tur.67.i: "我们不能拒绝现代文明。"
 joi_flavor_tur.68.t: "恢复禁卫军？"
 joi_flavor_tur.68.d: "耶尼切里禁卫军是过去[ROOT.GetCountry.GetName]最精锐的军队之一，但在1834年的吉兆事件中，这支军队遭到了时任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]#yellow 马哈茂德二世#!的解散，从此不复存在。然而，鉴于#O 奴隶制#!在最近一段时间的重建，现任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]认为，是时候恢复德夫希尔梅制度，并重建这支令基督教世界闻风丧胆的伟大军队了。"
 joi_flavor_tur.68.f: "“为了执行伊斯兰教长谢赫·伊斯兰的著名圣训，根据此训，凡有不信教的父母或其他任何人反对将儿子献给近卫军，他将被立即吊死在门框上，因为他的血被视为不洁。”\n\n“想想这撕心裂肺的悲痛吧！有多少母亲抓破脸颊！有多少父亲捶胸顿足！这些基督徒因子女在世时便与自己分离而承受着何等的痛苦，与其让他们活着被抓去成为土耳其人，背弃我们的信仰，还不如让他们死后葬在我们的教堂里。他们死了才好！”"
 joi_flavor_tur.68.a: "现有的军队才是最符合需要的。"
 joi_flavor_tur.68.b: "耶尼切里禁卫军必须重生！"
 joi_flavor_tur.69.t: "[ROOT.GetCountry.GetName]的奴隶制传统"
 joi_flavor_tur.69.d: "尽管在现代化运动中[GetLawType('law_slavery_banned').GetName]一度饱受追捧，并被立法成为了[ROOT.GetCountry.GetName]的法律，但随着[GetReligion('sunni').GetName]传统的再次复兴，许多人认为，帝国应该恢复过去的奴隶制传统——尤其是将邪恶的异教徒贩为奴隶的传统。"
 joi_flavor_tur.69.f: "“[ROOT.GetCountry.GetName]的规矩应该是遵从于奴隶制，因为奴隶根本没有人性和财产，与愚蠢的动物十分相似：将他们视为与本国人民同样的人类显然是一种不合理的行为。”\n\n“我们过去在伊斯兰世界的边境捕获或购买到新的奴隶，把他们运送到各大主要城市，并在那里的奴隶市场被销售到各地。”"
 joi_flavor_tur.69.a: "[GetLawType('law_debt_slavery').GetName]符合真主的训导。"
 joi_flavor_tur.69.b: "[GetLawType('law_slave_trade').GetName]可以充实我们的劳动力。"
 joi_flavor_tur.69.c: "我们不能接受这种退步！"
 joi_flavor_tur.70.t: "世界伊斯兰大会"
 joi_flavor_tur.70.d: "[SCOPE.sCountry('leader_scope').GetName]的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]宣布召开一场涉及全世界穆斯林的会议，以讨论[GetReligion('sunni').GetName]国家的未来。"
 joi_flavor_tur.70.f: "“对我们的国家和人民来说，有两件事至关重要：宗教和从我们父辈那里继承的权利。我们知道应该避免什么，也知道为了我们自身的利益应该接受什么。”\n\n“以真主的名义发誓，我们再也无法容忍这种对我们祖先的诋毁、对我们传统价值观的嘲弄和对我们神灵的亵渎。[ROOT.GetCountry.GetRuler.GetFullName]，要么你自己阻止这些异教徒，要么就让我们来阻止他。既然你和我们一样反对他的言论，我们就把他们除掉。”"
 joi_flavor_tur.70.a: "[GetReligion('sunni').GetName]的同胞们必须服从哈里发的旨意。"
 joi_flavor_tur.70.b: "[SCOPE.sCountry('leader_scope').GetName]的旨意，我们服从。"
 joi_flavor_tur.70.c: "[SCOPE.sCountry('leader_scope').GetName]在痴心妄想些什么鬼？"
 #大奥斯曼完成事件
 joi_flavor_tur.71.t: "奥斯曼人之国"
 joi_flavor_tur.71.d: "经过漫长的平等化改革，[GetIdeology('ideology_ottomanism').GetName]的理想被记录成为法律：包括宗教平等，民族平等的思想被灌输进我们学校的义务教育中。高门还出台了许多惠及曾经被压迫的民族的优待政策，世俗化改革取得了巨大的成功。"
 joi_flavor_tur.71.f: "“大树不断地茁壮成长，直到成为一株壮丽的巨树：它的枝条和树干盘绕汇集成柔美的树荫，阴影笼罩了整个世界的地平线，树荫之下并有四座山岭，[ROOT.GetCountry.GetRuler.GetLastName]认出它们分别是高加索山脉、阿特拉斯山脉、托鲁斯山脉与巴尔干山脉。”\n\n“这四座高山就彷如四根巨大的柱子，支撑著这棵神圣巨树的穹顶，大地的中心即位处穹顶之下，从巨树的树根涌出四条河流，它们分别是底格里斯河、幼发拉底河、多瑙河以及尼罗河。”\n\n“山谷中有座闪耀动人的宏伟城市，那儿有着圆顶和尖顶的建筑，以及金字塔与方尖碑，还有叫拜楼和高塔，新月的月光映照在它们的顶峰上；突然间，一阵大风刮起，树上的叶子纷纷化作锐利的弯刀，肆虐的狂风将剑叶吹向世界上每一座城市，尤其直指君士坦丁堡。”"
 joi_flavor_tur.71.a: "团结一致的奥斯曼人永远不会被击败！"
 #奴隶制/禁卫军完成事件
 joi_flavor_tur.72.t: "黄金之国，奴隶海湾"
 joi_flavor_tur.72.d: "随着[GetLawType('law_slave_trade').GetName]在[ROOT.GetCountry.GetName]重新复兴，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的贸易市场上又再次充斥起了来自于非洲和许多其他地方——乃至于欧洲海岸——进口或是掳掠而来的#v $slaves$#!，运奴船停满了城市的港口，为我们带来了巨大的财富。"
 joi_flavor_tur.72.f: "“过去，一个“中等”的切尔克斯女孩只需100英镑就被认为是非常便宜的，但现在同样的商品只需5英镑就能买到！过去，切尔克斯女奴几乎肯定能被卖到一个好人家，在那里她不仅能得到良好的待遇，而且往往还能获得地位和财富；但现在价格如此低廉，任何一个以前从未想过要蓄奴的人都可以买走她。”\n\n“由于复兴的[GetLawType('law_slave_trade').GetName]，源源不断的女性奴隶——来自格鲁吉亚和切尔克斯的金发美人、来自撒哈拉边缘的棕色皮肤阿拉伯女孩——通过各种迂回的渠道涌入[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的市场，与她们的[SCOPE.sCulture('turkish_scope').GetName]主人生活在一起，并保持着频繁的性关系。”"
 joi_flavor_tur.72.a: "帝国只有两种人：[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]和他的奴隶。"
 joi_flavor_tur.73.t: "耶尼切里的鬼魂"
 joi_flavor_tur.73.d: "耶尼切里——这支在过去带给了[ROOT.GetCountry.GetName]无数荣耀，也带来了无数灾难与混乱的军队——在饱受争议中被[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]亲手复活了。这支军队将为这个时代的帝国带来怎样的影响尚未可知，但有一点却无法改变：禁卫军已经回来了！"
 joi_flavor_tur.73.f: "“他们发现[SCOPE.sCulture('turkish_scope').GetName]人逼近城墙，意图交战，尤其是那些禁卫军：当一两个耶尼切里被杀后，立刻有更多的耶尼切里赶来，把尸体抬走。他们根本不在乎离城墙有多近，我们的人用枪和弩箭射击他们，瞄准那些抬着死去同胞的[SCOPE.sCulture('turkish_scope').GetName]人，两人都应声倒地身亡，然后又有其他耶尼切里赶来，把尸体抬走，他们无所畏惧，宁愿牺牲十个人，也不愿忍受在城墙边留下一具禁卫军尸体的耻辱。”"
 joi_flavor_tur.73.a: "誓死效忠！"
 #桀骜不驯的阿拉伯事件
 joi_flavor_tur.74.t: "阿拉伯觉醒"
 joi_flavor_tur.74.d: "随着印刷术的普及、报纸和出版社的兴起，以及新兴的民族主义思想在[SCOPE.sCountry('TUR_scope').GetName]治下的[GetStrategicRegion('region_arabia').GetName]的繁荣，[GetStrategicRegion('region_arabia').GetName]掀起了一股被称为#V “纳赫达运动”#!的阿拉伯复兴运动的热潮。从对阿拉伯语文化和艺术的复兴，到反对[SCOPE.sCulture('turkish_scope').GetName]的集权统治，这片曾经宁静的半岛开始躁动不安了起来。"
 joi_flavor_tur.74.f: "“暴政没有止境，它会导致各种各样的腐败：它腐蚀宗教，扭曲道德，扼杀知识，摧毁勇气，使民族沦为奴隶而非公民。如果暴政持续下去，民族除了自由的名号之外，对自由一无所知；除了尊严的影子之外，对尊严也一无所知。”\n\n“阿拉伯主义并非对过去的记忆，也非对逝去时代的怀念，而是鲜活的现实，流淌在这个民族的良知之中。无论国界如何撕裂，无论政权如何分裂，阿拉伯民族始终是一个整体，因为它承载着尚未实现的使命：当这个民族觉醒，领悟到自身的使命时，它的历史将成为力量，它的未来将成为对全人类的责任！”"
 joi_flavor_tur.74.a: "帝国必须维持住在半岛的统治！"
 joi_flavor_tur.74.b: "瓦解[SCOPE.sCulture('turkish_scope').GetName]统治的好机会！让我们接触一下这些[SCOPE.sCulture('bedouin_scope').GetName]人！"
 joi_flavor_tur.74.c: "[SCOPE.sCountry('TUR_scope').GetName]是我们的朋友！我们理应支持他们！"
 joi_flavor_tur.74.e: "自由的[SCOPE.sCulture('bedouin_scope').GetName]人岂能忍受铁链枷锁？！"
 joi_flavor_tur.74.i: "让我们向[SCOPE.sCulture('turkish_scope').GetName]人传达[ROOT.GetCountry.GetName]的忠诚。"
 joi_flavor_tur.74.g: "有趣的发展，让我们静观其变。"
 joi_flavor_tur.75.t: "沉睡的沙漠"
 joi_flavor_tur.75.d: "[GetStrategicRegion('region_arabia').GetName]民族主义的潮流在经历了数十年的汹涌后最终在[SCOPE.sCulture('turkish_scope').GetName]人及其境外盟友的铁拳镇压下偃旗息鼓。这片一度燃烧起来的沙漠又陷入了沉睡：毫无疑问，这是[SCOPE.sCountry('TUR_scope').GetName]在最近所取得的最重大的胜利。"
 joi_flavor_tur.75.f: "“从而恢复阿拉伯国家，在下沉的[SCOPE.sCulture('turkish_scope').GetName]位置上建立一个伟大的阿拉伯帝国？不要相信那些拿外国人钱的雇佣文人的谎言！伊斯兰宗教这两根支柱之间一旦不和，就会带来穆斯林力量的覆灭...这两个民族一旦分离，就注定走向毁灭。”\n\n“[SCOPE.sCountry('TUR_scope').GetName]对伊斯兰教和穆斯林的贡献毋庸置疑，他们的英勇事迹不容低估。近期许多穆斯林兄弟对该家族的质疑，反对乃至于叛乱令真主心痛不已，作为伊斯兰兄弟，我们有神圣的义务满足该家族的需求，服从他们的指示。”"
 joi_flavor_tur.75.a: "万岁，是[ROOT.GetCountry.GetName]的光荣！"
 joi_flavor_tur.75.b: "我们无惧岁月，纵然苦难相逼..."
 joi_flavor_tur.75.c: "看来这些[SCOPE.sCulture('turkish_scope').GetName]人这次走运了。"
 joi_flavor_tur.76.t: "阿拉伯大起义！"
 joi_flavor_tur.76.d: "随着[SCOPE.sCountry('TUR_scope').GetName]治下[SCOPE.sCulture('bedouin_scope').GetName]人民族热情的不断上升，加上某些境外强国对他们的援助，阿拉伯人在圣裔[SCOPE.sCharacter('holy_ruler').GetFullName]的带领下宣布[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]哈里发[SCOPE.sCharacter('tur_ruler').GetFullName]为篡位者和非法哈里发，并组织了一支军队，试图从[SCOPE.sCountry('TUR_scope').GetName]中获得独立。"
 joi_flavor_tur.76.f: "“我们已经看清了[SCOPE.sCountry('TUR_scope').GetName]篡位者的真面目：我们已经了解了他们对我们的信仰的邪恶意图，我们已经目睹了他们在我们圣地犯下的罪行和邪恶行径，我们的信仰为我们指明了救赎之路，我们以信仰的名义，履行了我们对自身和全世界穆斯林的责任。”\n\n“我们最终为了取悦真主而举起义旗，祂赐予我们胜利，并与我们同在，支持祂的律法和宗教，这完全符合祂的智慧，祂的旨意必将提升这群人民的福祉。”\n\n“如果阿拉伯的人民们还有一丝真正的宗教热情尚存，就必须拯救其国家免遭其居民所陷入的灾难，并将它们从那些[SCOPE.sCulture('turkish_scope').GetName]的罪恶之手拖入的毁灭和灾难中解救出来！”"
 joi_flavor_tur.76.a: "这些该死的[SCOPE.sCulture('bedouin_scope').GetName]叛贼！"
 joi_flavor_tur.76.b: "立刻召集内阁会议，[ROOT.GetCountry.GetName]必须做出抉择！"
 joi_flavor_tur.76.c: "起来，[SCOPE.sCulture('bedouin_scope').GetName]勇士们！屈辱与压迫的生活，唯奴隶才甘心承受！"
 joi_flavor_tur.77.t: "独立宣言"
 joi_flavor_tur.77.d: "[SCOPE.sCountry('ARA_scope').GetName]在圣裔[SCOPE.sCharacter('holy_ruler').GetFullName]的带领下宣布[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]哈里发[SCOPE.sCharacter('tur_ruler').GetFullName]为篡位者和非法哈里发，并以圣地守护者和正统哈里发的名义向[ROOT.GetCountry.GetName]发布了照会，要求我国加入到为阿拉伯民族独立而战斗的正义事业中。"
 joi_flavor_tur.77.f: "“我们，[SCOPE.sCountry('ARA_scope').GetName]渴望自由的人民，希望告诉阿拉伯的兄弟们，在末日审判之时，我们将在全能的真主面前承认，如今我们所知的穆斯林统治者中，没有谁比祂的先知之子、现在统治[SCOPE.sCountry('ARA_scope').GetName]国家的君主，[SCOPE.sCharacter('holy_ruler').GetFullName]更加正直、更加敬畏真主。”\n\n“我们找不到比他更虔诚、更恪守真主律法、更能以取悦真主的方式处理国事的人了。圣地人民拥立他为王，仅仅是因为他们这样做是在为自己的宗教和国家服务。”\n\n“我们呼吁那些反对我们的人注意，如果你还有一丝真正的宗教热情尚存，就必须拯救其他国家免遭其居民所陷入的灾难，并将它们从那些[SCOPE.sCulture('turkish_scope').GetName]的罪恶之手拖入的毁灭和灾难中解救出来。”"
 joi_flavor_tur.77.a: "起来，[SCOPE.sCulture('bedouin_scope').GetName]勇士们！屈辱与压迫的生活，唯奴隶才甘心承受！"
 joi_flavor_tur.77.b: "不行不行，我们可是[SCOPE.sCountry('TUR_scope').GetName]的忠臣。"
 joi_flavor_tur.78.t: "阿拉伯危机"
 joi_flavor_tur.78.d: "[SCOPE.sCountry('ARA_scope').GetName]在圣裔[SCOPE.sCharacter('holy_ruler').GetFullName]的带领下正在与昔日统治着阿拉伯半岛的[SCOPE.sCountry('TUR_scope').GetName]发生着小规模的交火——可以预计的是，这些交火在双方的主力军队集结完成后必定将升级为一场全面的战争。[ROOT.GetCountry.GetName]应该在其中持有怎样的立场？"
 joi_flavor_tur.78.f: "“这对我们有利，因为它符合我们的近期目标，即瓦解伊斯兰“集团”，击败并瓦解[SCOPE.sCountry('TUR_scope').GetName]，而且[SCOPE.sCharacter('holy_ruler').GetFullName]建立的继承[SCOPE.sCulture('turkish_scope').GetName]统治的国家对我们无害：[SCOPE.sCulture('bedouin_scope').GetName]人比[SCOPE.sCulture('turkish_scope').GetName]人更不稳定。如果处理得当，他们将保持政治碎片化的状态，由许多互不相让、缺乏凝聚力的小公国组成。”\n\n“我丝毫不认为目前的谈判能够对[GetStrategicRegion('region_arabia').GetName]的未来格局产生多大影响，或者能够确立我们在该国的权利，或者束缚我们的手脚。局势及其各种因素都太过复杂，无法做到这一点。我们现在必须做的是引导[SCOPE.sCulture('bedouin_scope').GetName]人民走上正途，使他们脱离[SCOPE.sCulture('turkish_scope').GetName]人，并让他们站在我们这边。”"
 joi_flavor_tur.78.a: "我们将支持[SCOPE.sCulture('bedouin_scope').GetName]人的正义事业！"
 joi_flavor_tur.78.b: "我们应该帮助[SCOPE.sCulture('turkish_scope').GetName]人镇压叛乱。"
 joi_flavor_tur.78.c: "这不关[ROOT.GetCountry.GetName]的事情。"
 joi_flavor_tur.78.e: "承诺向[SCOPE.sCountry('TUR_scope').GetName]提供军事援助。"
 joi_flavor_tur.78.i: "承诺向[SCOPE.sCountry('ARA_scope').GetName]提供军事援助。"
 joi_flavor_tur.79.t: "阿拉伯的劳伦斯"
 joi_flavor_tur.79.d: "以[SCOPE.sCharacter('te_lawrence_scope').GetFullName]爵士为首的[SCOPE.sCountry('GBR_scope').GetName]军事顾问团，以及一小支训练有素的英军营队已经开拔，并预计将很快抵达[SCOPE.sCountry('ARA_scope').GetName]，为他们抵抗[SCOPE.sCulture('turkish_scope').GetName]人的战争提供支援。[SCOPE.sCharacter('te_lawrence_scope').GetLastName]爵士穿着阿拉伯式的长袍，据他所说，这样在沙漠里显得更干净、更得体。"
 joi_flavor_tur.79.f: "“部落的价值仅限于防御，其真正的领域是游击战。他们聪明机敏，活力十足，近乎鲁莽，但又过于个人主义，无法服从命令，无法列队作战，也无法互相帮助。我认为，要将他们组织成一支正规军是不可能的：汉志战争是苦行僧对抗正规军的战争——而我们站在苦行僧的一边。”\n\n“对于我在阿拉伯前线的工作，我决心不接受任何回报。内阁以战后给予自治的明确承诺来激励[SCOPE.sCountry('ARA_scope').GetName]人为我们而战。阿拉伯人相信的是人，而不是制度。他们视我为[SCOPE.sCountry('GBR_scope').GetName]的自由代理人，并要求我为[SCOPE.sCountry('GBR_scope').GetAdjectiveNoFormatting]政府的书面承诺背书。怀着这样的希望，他们取得了一些辉煌的成就。”"
 joi_flavor_tur.79.a: "欢迎[SCOPE.sCharacter('te_lawrence_scope').GetLastName]爵士的到来！"
 joi_flavor_tur.79.b: "[SCOPE.sCharacter('te_lawrence_scope').GetLastName]爵士肯定能帮助[SCOPE.sCountry('ARA_scope').GetName]奠定胜利！"
 joi_flavor_tur.80.t: "阿拉伯的布雷蒙德"
 joi_flavor_tur.80.d: "以[SCOPE.sCharacter('fra_bremond_scope').GetFullName]将军为首的[SCOPE.sCountry('FRA_scope').GetName]军事顾问团，以及一小支训练有素的法军营队已经开拔，并预计将很快抵达[SCOPE.sCountry('ARA_scope').GetName]，为他们抵抗[SCOPE.sCulture('turkish_scope').GetName]人的战争提供支援。"
 joi_flavor_tur.80.f: "“撤退的决定至今仍是个谜。它既不是在贝鲁特做出的，也不是在阿达纳做出的，而是在马拉什做出的。毫无疑问，如果马拉什有无线电设备可以与阿达纳保持不间断的通讯，那么撤离的命令就不会下达。”\n\n“他们大约有八百人，沉默不语，但并未因羞愧而感到丝毫畏惧。[SCOPE.sCharacter('holy_ruler').GetFirstName]本人似乎也毫不在意。他进城时，转身对着跟在他身后的指挥官喊道：“哎呀，我们的城都成废墟了！我得给首相发个电报，让他派四十个石匠来修缮公共建筑。” 而他真的这么做了。”"
 joi_flavor_tur.80.a: "欢迎[SCOPE.sCharacter('fra_bremond_scope').GetLastName]将军的到来！"
 joi_flavor_tur.80.b: "经验丰富的[SCOPE.sCharacter('fra_bremond_scope').GetLastName]将军肯定能帮上[SCOPE.sCountry('ARA_scope').GetName]的忙。"
 joi_flavor_tur.81.t: "遣[GetStrategicRegion('region_arabia').GetName]军事顾问团"
 joi_flavor_tur.81.d_1: "一支以[SCOPE.sCharacter('general_scope').GetFullName]将军为首的外国军事顾问团已经抵达了[ROOT.GetCountry.GetName]，帮助我们对抗这场战争中的敌人。"
 joi_flavor_tur.81.d_2: "以[SCOPE.sCharacter('general_scope').GetFullName]将军为首的[ROOT.GetCountry.GetName]军事顾问团，以及一小支训练有素的[ROOT.GetCountry.GetAdjectiveNoFormatting]军营队已经开拔，并预计将很快抵达目的地，介入[SCOPE.sCulture('turkish_scope').GetName]与[SCOPE.sCulture('bedouin_scope').GetName]之间的战争。"
 joi_flavor_tur.81.f: "“[SCOPE.sCharacter('general_scope').GetFullName]将军比任何人都更清楚地看到了[ROOT.GetCountry.GetName]力量的愿景，以及它在交通和战争中的意义。他认为，通过在[ROOT.GetCountry.GetAdjectiveNoFormatting]陆军中担任一名军事顾问，他能够彰显这一光荣职业的尊严，并帮助吸引我们年轻男性中最热忱的人才投身于最迫切需要的领域。为了这份贡献和榜样，我们对他怀有特殊的感激之情：这本身就是一份无比珍贵的礼物。”"
 joi_flavor_tur.81.a: "欢迎[SCOPE.sCharacter('general_scope').GetLastName]将军的到来！"
 joi_flavor_tur.81.b: "祝[SCOPE.sCharacter('general_scope').GetLastName]将军的[SCOPE.sCountry('ARA_scope').GetName]之旅顺利！"
 joi_flavor_tur.81.c: "祝[SCOPE.sCharacter('general_scope').GetLastName]将军的[SCOPE.sCountry('TUR_scope').GetName]之旅顺利！"
 joi_flavor_tur.82.t: "[SCOPE.sCountry('button_scope').GetName]袭击[GetStrategicRegion('region_arabia').GetName]省份"
 joi_flavor_tur.82.d: "[SCOPE.sCountry('button_scope').GetName]利用沙漠地区的战术优势，派出了数支精干的小部队开始袭击[SCOPE.sCountry('TUR_scope').GetName]治下的阿拉伯省份：[SCOPE.sState('arabic_state').GetCityHubName]在这场袭击中损失惨重。"
 joi_flavor_tur.82.f: "“事实上，[SCOPE.sCulture('turkish_scope').GetName]人遭遇了始料未及的困境：他们的驻军面临着士兵高发病率和牲畜日益衰弱的问题：这既是过度劳累的征兆，也是缺乏充足食物的体现。部落在他们背后不断的活动也始终阻碍着他们。”\n\n“一些部落或许会背弃[SCOPE.sCulture('bedouin_scope').GetName]人的阵营，但这并不意味着他们就成了[SCOPE.sCulture('turkish_scope').GetName]人可靠的盟友。[SCOPE.sCulture('turkish_scope').GetName]人很快发现自己身处一个处处充满敌意的地区：[TimeKeeper.GetCurrentDate.Format('m月')]的前两周，部落的袭击平均每天给他们造成四十头骆驼和二十名士兵的伤亡，物资也因此损失惨重。”"
 joi_flavor_tur.82.a: "真是该死！"
 joi_flavor_tur.82.b: "[SCOPE.sCulture('bedouin_scope').GetName]勇士永不为奴！"
 joi_flavor_tur.83.t: "[SCOPE.sCharacter('ara_ruler').GetLastName]-[SCOPE.sCharacter('great_power_politician').GetLastName]通信"
 joi_flavor_tur.83.d: "[SCOPE.sCountry('ara_scope').GetName]的[SCOPE.sCharacter('ara_ruler').GetFullName]埃米尔通过电报与[SCOPE.sCountry('great_power_scope').GetName]的重要内阁官员与阿拉伯事务负责人[SCOPE.sCharacter('great_power_politician').GetFullName]进行了数次秘密沟通，以期获得[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的支持来进一步推进反抗[SCOPE.sCountry('TUR_scope').GetName]的事业。"
 joi_flavor_tur.83.f: "“在上述修改的基础上，且不影响我们与阿拉伯酋长国缔结的现有条约，我们接受这些限制和边界。对于[SCOPE.sCountry('great_power_scope').GetName]可以在不损害其盟友利益的前提下自由行动的领土，我谨代表[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府作出如下保证，并对您的来信作出如下回复：在遵守上述修改的前提下，[SCOPE.sCountry('great_power_scope').GetNameNoFlag]准备承认并支持[SCOPE.sCountry('ara_scope').GetName]谢里夫提议的领土范围内阿拉伯人的独立。”\n\n“官方保证，在会议期间采取的任何措施都只是暂时的，绝不能妨碍会议的最终解决。[SCOPE.sCountry('ara_scope').GetName]无疑会在和平会议上派代表出席：如果我发现有人违反这些命令，我将撤换他们。我提醒[SCOPE.sCharacter('ara_ruler').GetLastName]埃米尔，[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]有义务尽力达成符合相关民族意愿的解决方案，并敦促他全心全意地信任[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的诚意。”"
 joi_flavor_tur.83.a: "我们将支持[SCOPE.sCharacter('ara_ruler').GetLastName]埃米尔反抗[SCOPE.sCountry('TUR_scope').GetName]的正义行动。"
 joi_flavor_tur.83.b: "我们应该婉拒[SCOPE.sCharacter('ara_ruler').GetLastName]埃米尔的请求。"
 joi_flavor_tur.83.c: "感谢我们亲爱的[SCOPE.sCountry('great_power_scope').GetName]盟友！"
 joi_flavor_tur.83.e: "哦，真是可惜。"
 joi_flavor_tur.84.t: "[SCOPE.sCharacter('great_power_politician').GetLastName]-[SCOPE.sCharacter('ara_ruler').GetLastName]通信"
 joi_flavor_tur.84.d: "[SCOPE.sCountry('great_power_scope').GetName]的重要内阁官员与阿拉伯事务负责人[SCOPE.sCharacter('great_power_politician').GetFullName]通过电报与[SCOPE.sCountry('ara_scope').GetName]的[SCOPE.sCharacter('ara_ruler').GetFullName]埃米尔进行了数次秘密沟通，并表示愿意向[SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting]提供一些关键性的援助以支持他们反抗[SCOPE.sCountry('TUR_scope').GetName]的事业。"
 joi_flavor_tur.84.f: "“在上述修改的基础上，且不影响我们与阿拉伯酋长国缔结的现有条约，我们接受这些限制和边界。对于[SCOPE.sCountry('great_power_scope').GetName]可以在不损害其盟友利益的前提下自由行动的领土，我谨代表[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府作出如下保证，并对您的来信作出如下回复：在遵守上述修改的前提下，[SCOPE.sCountry('great_power_scope').GetNameNoFlag]准备承认并支持[SCOPE.sCountry('ara_scope').GetName]谢里夫提议的领土范围内阿拉伯人的独立。”\n\n“官方保证，在会议期间采取的任何措施都只是暂时的，绝不能妨碍会议的最终解决。[SCOPE.sCountry('ara_scope').GetName]无疑会在和平会议上派代表出席：如果我发现有人违反这些命令，我将撤换他们。我提醒[SCOPE.sCharacter('ara_ruler').GetLastName]埃米尔，[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]有义务尽力达成符合相关民族意愿的解决方案，并敦促他全心全意地信任[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的诚意。”"
 joi_flavor_tur.84.a: "[SCOPE.sCountry('great_power_scope').GetName]的支持对我们大有裨益。"
 joi_flavor_tur.84.b: "可恶的境外势力，滚一边去！"
 joi_flavor_tur.84.c: "很好，[SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting]会成为伟大的[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]摧毁[SCOPE.sCountry('TUR_scope').GetName]的重要棋子。"
 joi_flavor_tur.84.e: "这些不识抬举的[SCOPE.sCountry('ara_scope').GetAdjectiveNoFormatting]人！"
 joi_flavor_tur.85.t: "[SCOPE.sCountry('great_power_scope').GetNameNoFlag]与[SCOPE.sCountry('ara_scope').GetNameNoFlag]联合宣言"
 joi_flavor_tur.85.d: "在[SCOPE.sCountry('great_power_scope').GetName]高官[SCOPE.sCharacter('great_power_politician').GetFullName]与[SCOPE.sCountry('ara_scope').GetName]埃米尔[SCOPE.sCharacter('ara_ruler').GetFullName]的推动下，[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]议会批准了一项联合条约，公开向世界宣布[SCOPE.sCountry('great_power_scope').GetNameNoFlag]将承认[SCOPE.sCountry('ara_scope').GetNameNoFlag]作为一个受尊重的独立国家的地位，并暗示这种地位应该延展到所有仍然处于[SCOPE.sCountry('TUR_scope').GetName]辐射下的[GetStrategicRegion('region_arabia').GetName]国家。"
 joi_flavor_tur.85.f: "“[SCOPE.sCountry('great_power_scope').GetName]的目标是彻底解放长期受[SCOPE.sCulture('turkish_scope').GetName]人压迫的人民，并建立从当地居民的主动性和自由选择中获得权力的民族政府和行政机构。为了实现这些目标，[SCOPE.sCountry('great_power_scope').GetNameNoFlag]和[SCOPE.sCountry('ara_scope').GetNameNoFlag]齐心协力，鼓励和协助在叙利亚和美索不达米亚，以及他们正在努力解放的领土上建立本土政府和行政机构，并在这些政府和行政机构实际建立后立即予以承认。”\n\n“[SCOPE.sCountry('great_power_scope').GetName]绝无意将这些地区的民众强加任何特定的制度，而只是希望通过支持和充分的援助，确保由民众自由选举产生的政府和行政机构正常运作。为了保障所有人享有公正平等的司法，通过激励和鼓励地方主动性来促进国家经济发展，有利于教育普及，结束长期以来被[SCOPE.sCountry('TUR_scope').GetName]利用的纷争。”"
 joi_flavor_tur.85.a: "他们怎么敢！"
 joi_flavor_tur.85.b: "真是令人兴奋！或许我们也应该尝试接触一下[SCOPE.sCountry('great_power_scope').GetName]？"
 joi_flavor_tur.85.c: "有趣的发展。看来情况正变得不利于[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]人。"
 joi_flavor_tur.85.e: "颤抖吧，可恶的[SCOPE.sCulture('turkish_scope').GetName]人，你们的末日快到了！"
 joi_flavor_tur.85.i: "阿拉伯同胞们！我们的机会来了！"
 joi_flavor_tur.86.t: "[SCOPE.sCountry('great_power_scope').GetName]驻奥斯曼军事代表团"
 joi_flavor_tur.86.d: "经过[SCOPE.sCountry('great_power_scope').GetName]陆军部长[SCOPE.sCharacter('great_power_politician').GetFullName]与[SCOPE.sCountry('TUR_scope').GetName]帕迪沙[SCOPE.sCharacter('tur_ruler').GetFullName]的沟通，[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府决定派出一支以[SCOPE.sCharacter('general_scope').GetFullName]将军为首的军事顾问团前往[SCOPE.sCountry('TUR_scope').GetNameNoFlag]，为[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]平定[GetStrategicRegion('region_arabia').GetName]骚乱的军事行动提供参谋和帮助。"
 joi_flavor_tur.86.f: "“激发青年人的爱国主义和军人精神，让他们为[SCOPE.sCountry('TUR_scope').GetName]的荣耀和伟大而感到自豪，同时给予他们健康的体育教育，为他们从事军事职业做好准备。以及，培养爱国情怀、热爱祖国、军人美德和强健体魄。”\n\n“[SCOPE.sCulture('turkish_scope').GetName]的所有希望都寄托在她的青年一代身上：你们就是这一代人，一旦你们登上顶峰，就能拯救这个国家。”"
 joi_flavor_tur.86.a: "感谢[SCOPE.sCountry('great_power_scope').GetName]的帮助！"
 joi_flavor_tur.86.b: "[SCOPE.sCharacter('general_scope').GetFullName]将军将为奥斯曼效力。"
 joi_flavor_tur.86.c: "[SCOPE.sCharacter('general_scope').GetFullName]将军将带领一支军事顾问团前去支援[SCOPE.sCulture('turkish_scope').GetName]人。"
 joi_flavor_tur.87.t: "阿拉伯戒严！"
 joi_flavor_tur.87.d: "鉴于最近[GetStrategicRegion('region_arabia').GetName]的严峻局势，[SCOPE.sCountry('turkish_scope').GetAdjectiveNoFormatting]高门决心采取暴力措施，宣布在帝国治下的[GetStrategicRegion('region_arabia').GetName]省份执行军事管制，并发布了戒严令。"
 joi_flavor_tur.87.f: "致伟大的[SCOPE.sCulture('turkish_scope').GetName]民族与全体[GetStrategicRegion('region_arabia').GetName]的帝国臣民：\n\n自[TimeKeeper.GetCurrentDate.Format('m月 d日')]凌晨3点起，[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]武装部队已接管[GetStrategicRegion('region_arabia').GetName]的行政管理。此次行动得益于全体臣民和安全部队的密切合作，圆满成功，基本无人员伤亡。除武装部队成员外，阿拉伯范围内实行宵禁，直至另行通知。\n\n高门代表至高无上的帕迪沙与伊斯兰教的哈里发[SCOPE.sCharacter('tur_ruler').GetFullName]陛下要求：全体帝国臣民应该竭尽全力配合武装部队的行动，积极举报你周围的可疑分子，共同重建帝国人民所期盼的和平。\n\n[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]高门，[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]，于托普卡帕宫。"
 joi_flavor_tur.87.a: "[SCOPE.sCulture('bedouin_scope').GetName]老鼠，你们无处藏身！"
 joi_flavor_tur.87.b: "真是令人惊讶的消息，不过似乎也并不出意料。"
 joi_flavor_tur.87.c: "可恶的[SCOPE.sCulture('turkish_scope').GetName]人！"
 #阿拉伯大起义
 joi_flavor_tur.88.t: "奥斯曼统治的崩溃"
 joi_flavor_tur.88.d: "[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]军队在这场沙漠战争中遭遇了巨大的失败，[SCOPE.sCountry('TUR_scope').GetName]高门不得不与[SCOPE.sCountry('ARA_scope').GetName]签署合约，宣布承认阿拉伯国家的独立地位。许多人认为，这就是[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]这个穆斯林帝国末日的丧钟。"
 joi_flavor_tur.88.f: "“帝国已经筋疲力尽。我们的资源被抽空，战争耗尽了国家最后的力量。阿拉伯起义则是一记沉重的打击：它击中了帝国最为敏感的统一核心。”\n\n“[SCOPE.sCulture('turkish_scope').GetName]人的帝国正在我们眼前崩塌：在漫长的苦难之后，阿拉伯民族重新获得了自由。”"
 joi_flavor_tur.88.a: "这就是帝国的末日与荣耀的终结。"
 joi_flavor_tur.88.b: "这就是我们的祖国，先祖长眠的土地！"
 joi_flavor_tur.88.c: "我们必须承认，阿拉伯人展现了自由的强大力量。"
 joi_flavor_tur.88.i: "伟大的成就！"
 joi_flavor_tur.89.t: "[SCOPE.sCountry('great_power_scope').GetName]宣称叙利亚"
 joi_flavor_tur.89.d: "[SCOPE.sCountry('great_power_scope').GetName]政府正试图通过阿拉伯大起义来拓展自己在[GetStrategicRegion('region_arabia').GetName]的影响力。[SCOPE.sCountry('SYR_scope').GetName]已经收到了来自于[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的通知，要求[SCOPE.sCountry('SYR_scope').GetAdjectiveNoFormatting]接受[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的托管统治。"
 joi_flavor_tur.89.f: "“[SCOPE.sCountry('great_power_scope').GetName]要求达成一项解决方案，该方案旨在在补偿其因[SCOPE.sCountry('TUR_scope').GetName]崩溃而遭受的不便和损失的同时，维护其在叙利亚的历史和传统地位，确保其在近东充分实现其经济目标。”\n\n“我曾多次向[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府指出，阿拉伯人对[SCOPE.sCountry('great_power_scope').GetName]管辖任何阿拉伯领土的前景都抱有深深的反感。这给我们与阿拉伯的未来关系带来了相当大的危险，因为要让[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]认识到她的错误是困难重重，甚至是不可能的。”"
 joi_flavor_tur.89.a: "我们应该接受现实。"
 joi_flavor_tur.89.b: "自由的阿拉伯人永不屈服！"
 joi_flavor_tur.89.c: "一次伟大的外交胜利！"
 joi_flavor_tur.89.e: "[SCOPE.sCountry('SYR_scope').GetName]必须认清自己的实力地位。"
 joi_flavor_tur.90.t: "[SCOPE.sCountry('great_power_scope').GetName]宣称伊拉克"
 joi_flavor_tur.90.d: "[SCOPE.sCountry('great_power_scope').GetName]政府正试图通过阿拉伯大起义来拓展自己在[GetStrategicRegion('region_arabia').GetName]的影响力。[SCOPE.sCountry('IRQ_scope').GetName]已经收到了来自于[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的通知，要求[SCOPE.sCountry('IRQ_scope').GetAdjectiveNoFormatting]接受[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的托管统治。"
 joi_flavor_tur.90.f: "“[SCOPE.sCountry('great_power_scope').GetName]政府要求确保其在波斯湾的地位，有机会开发美索不达米亚南部地区，建立波斯湾和地中海之间的陆路商业和军事通道，且在足够大的范围内拥有影响力，以便为参与美索不达米亚灌溉工程的人员提供合适的疗养院和避暑胜地。”\n\n“接受整个方案将意味着[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]放弃相当一部分利益，但只要确保阿拉伯人的合作，并且阿拉伯人满足相关条件并获得霍姆斯、哈马、大马士革和阿勒颇这四座城市，[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府就不会反对这项安排。”"
 joi_flavor_tur.90.a: "我们应该接受现实。"
 joi_flavor_tur.90.b: "自由的阿拉伯人永不屈服！"
 joi_flavor_tur.90.c: "一次伟大的外交胜利！"
 joi_flavor_tur.90.e: "[SCOPE.sCountry('IRQ_scope').GetName]必须认清自己的实力地位。"
 joi_flavor_tur.91.t: "[SCOPE.sCountry('great_power_scope').GetName]宣称巴勒斯坦"
 joi_flavor_tur.91.d: "[SCOPE.sCountry('great_power_scope').GetName]政府正试图通过阿拉伯大起义来拓展自己在[GetStrategicRegion('region_arabia').GetName]的影响力。[SCOPE.sCountry('ARA_scope').GetName]已经收到了来自于[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]的通知，要求[SCOPE.sCountry('ARA_scope').GetAdjectiveNoFormatting]接受[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]对其治下巴勒斯坦和约旦的托管统治。"
 joi_flavor_tur.91.f: "“如果我们支持[SCOPE.sCharacter('ara_ruler').GetFirstName]国王和其他出身和声望不如[SCOPE.sCharacter('ara_ruler').GetLastName]国王的阿拉伯领袖有任何意义，那就是我们准备承认巴勒斯坦阿拉伯人的完全主权独立。现在似乎是时候让[SCOPE.sCountry('great_power_scope').GetAdjectiveNoFormatting]政府了解我们对[SCOPE.sCountry('ARA_scope').GetAdjectiveNoFormatting]的详细承诺，并向他明确说明，究竟是他还是其他人将成为巴勒斯坦的统治者——[SCOPE.sCountry('ARA_scope').GetName]是唯一可能成为阿拉伯国家领袖的国家，能够使其他阿拉伯埃米尔臣服。”\n\n“托管地应负责执行[SCOPE.sCountry('great_power_scope').GetName]政府于，[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]发表并经上述列国采纳的宣言，该宣言赞成在巴勒斯坦建立犹太人的民族家园，但明确理解，不得采取任何可能损害巴勒斯坦现有非犹太社群的公民权利和宗教权利，或损害犹太人在任何其他国家享有的权利和政治地位的行动。”"
 joi_flavor_tur.91.a: "我们应该接受现实。"
 joi_flavor_tur.91.b: "自由的阿拉伯人永不屈服！"
 joi_flavor_tur.91.c: "一次伟大的外交胜利！"
 joi_flavor_tur.91.e: "[SCOPE.sCountry('ARA_scope').GetName]必须认清自己的实力地位。"
 joi_flavor_tur.92.t: "久违了，我的祖国"
 joi_flavor_tur.92.d: "摆脱了[SCOPE.sCountry('TUR_scope').GetName]统治的[SCOPE.sCulture('bedouin_scope').GetName]人在[SCOPE.sCountry('ARA_scope').GetName]与其领袖[SCOPE.sCharacter('ara_ruler').GetFullName]的带领下维护了自己的独立，抵抗住了来自于各方的压力与侵略，并最终从沙漠中崛起，统一为一个自由，独立与平等的新国家：#V 一个属于全体[GetStrategicRegion('region_arabia').GetName]人的新国家。#!"
 joi_flavor_tur.92.f: "“为荣耀与祖国，我们生存亦牺牲，\n我们皆怀崇高志向，刚毅不屈。\n自由之人岂能忍受铁链枷锁？！\n屈辱与压迫的生活，唯奴隶才甘心承受！\n\n我们无惧岁月，纵然苦难相逼，\n为祖国奋战，多少烈士捐躯？\n\n这是我们的祖国，先祖长眠之地，\n苍穹之下，灵感与神谕降临之境。\n青山绿水，美景令人陶醉，\n每一寸土地，皆与我们的血脉相连！”"
 joi_flavor_tur.92.a: "我们发誓永不回头，直到祖国光复胜利时！"
 joi_flavor_tur.92.b: "荣耀属于我们，和我们创造的国家！"
 joi_flavor_tur.92.c: "这些阿拉伯人竟然真的能搞成？！"
 joi_flavor_tur.92.e: "这些该死的阿拉伯人..."
 joi_flavor_tur.92.i: "祝贺我们的[SCOPE.sCountry('ARA_scope').GetName]同胞挣脱[SCOPE.sCulture('turkish_scope').GetName]人的百年枷锁！"
 #海盗事件
 joi_flavor_tur.93.t: "海盗帝国的复活"
 joi_flavor_tur.93.d: "在[SCOPE.sCountry('corsairs_scope').GetName]的主导下，地中海的伊斯兰[GetLawType('law_slave_trade').GetName]再度兴起。通过对诸如#yellow [SCOPE.sState('TRIPOLI_state_scope').GetCityHubName]#!和#yellow [SCOPE.sState('CRETE_state_scope').GetCityHubName]#!等关键海盗港口的控制，曾经在两次巴巴里战争，英国炮轰阿尔及尔和扇击事件后消亡的地中海海盗团伙又再次在[SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting]海军的支持下卷土重来了。"
 joi_flavor_tur.93.f: "“他们的《古兰经》中写道，所有不承认先知的民族都是罪人，信士有权利和义务掠夺和奴役他们；每个在这场战争中阵亡的穆斯林都必定会进入天堂。他还说，第一个登上敌船的人可以额外获得一个奴隶，当他们跳上敌船甲板时，每个水手双手各持一把匕首，嘴里还叼着第三把；这通常会让敌人感到极度恐惧，以至于他们立刻求饶。”"
 joi_flavor_tur.93.a: "扬帆起航，你们的海盗[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]回来了！"
 joi_flavor_tur.93.b: "这些巴巴里的狗屎玩意！"
 joi_flavor_tur.94.t: "[SCOPE.sCountry('TUR_scope').GetName]的海盗行动"
 joi_flavor_tur.94.d: "[SCOPE.sCountry('TUR_scope').GetName]的海盗袭击了位于#yellow 伊比利亚#!和#yellow 奥克西塔尼亚#!的一些地中海海岸，造成了当地的损失和动荡。[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]则从中获益颇丰。"
 joi_flavor_tur.94.f: "“阁下，我的主人，是一位极富耐心的人；但他深知，对于那些用虚幻的友谊之词耗尽他耐心的国家，应该采取怎样的措施。”他说，“我必须拥有一艘装满了奴隶和商品的运输船，就像以前你们进贡给阿尔及尔人的那艘一样。”\n\n“条约中没有提到运输船！我们宁愿战斗也不愿屈服于这种勒索。”总督抗议道。“你刚刚收到这些珍贵的珠宝，提出这样的要求，难道不感到羞耻吗？”\n\n苏丹从烟斗里吐出一口烟雾。“我们觉得这一切都是虚张声势；我们看得出来你们是如何继续与[SCOPE.sCountry('TUR_scope').GetName]作战的。你们可笑的行为只会招致鄙夷和嘲笑。””"
 joi_flavor_tur.94.a: "桀桀桀..."
 joi_flavor_tur.94.b: "该死的[SCOPE.sCountry('TUR_scope').GetName]海盗！"
 joi_flavor_tur.95.t: "[SCOPE.sCountry('TUR_scope').GetName]的海盗行动"
 joi_flavor_tur.95.d: "[SCOPE.sCountry('TUR_scope').GetName]的海盗袭击了位于#yellow 意大利#!和#yellow 巴尔干#!的一些地中海海岸，造成了当地的损失和动荡。[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]则从中获益颇丰。"
 joi_flavor_tur.95.f: "“如果成功，是为了我们所有人；如果失败，是为了我自己，”他在信件中写道，引用古典回忆录中的一段话： “但是，”他用一种夸张的修辞补充道，“任何个人风险都比与卑鄙的海盗谈判，索要自由的合法继承者的赎金这种屈辱要好得多。坦白说，我宁愿失去和平，甚至被钉在木桩上，也不愿做出这样的让步。难道我的国家就不能被激怒吗？”\n\n“不能。”苏丹回答说，“对于我们提出的要求，我们等了这么久，你们却丝毫没有回报我们的耐心。所有沿海的国家每隔两三年都会从我们这里得到同样的要求；而你们，和其他基督徒一样，将不得不遵守这些要求。”"
 joi_flavor_tur.95.a: "桀桀桀..."
 joi_flavor_tur.95.b: "该死的[SCOPE.sCountry('TUR_scope').GetName]海盗！"
 joi_flavor_tur.96.t: "[SCOPE.sCountry('TUR_scope').GetName]的海盗行动"
 joi_flavor_tur.96.d: "[SCOPE.sCountry('TUR_scope').GetName]的海盗袭击了位于#yellow 第聂伯#!，#yellow 高加索#!和#yellow 多瑙#!的一些地中海海岸，造成了当地的损失和动荡。[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]则从中获益颇丰。"
 joi_flavor_tur.96.f: "“就在前几天，”官员写道，“他们才要了八十个二十四磅重的硬币。照这个速度，我们的付款什么时候才能结束？我再也无法谈论抵抗和胁迫了：我们舰队本季的行动对我的努力毫无助益。政府派出的所谓舰队到这片海域航行，还不如派出由雇佣兵指挥的护卫舰。”\n\n“完全不是。我们原本期望一年内就能收到和平协议的全部款项，结果他们什么也没带来，尽管我们多次暗示[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]人，希望他们能表达出真诚的友谊，但至今我们仍未收到任何他们真正友谊的迹象。”"
 joi_flavor_tur.96.a: "桀桀桀..."
 joi_flavor_tur.96.b: "该死的[SCOPE.sCountry('TUR_scope').GetName]海盗！"
 joi_flavor_tur.97.t: "[SCOPE.sCountry('TUR_scope').GetName]劫掠商船"
 joi_flavor_tur.97.d: "[SCOPE.sCountry('TUR_scope').GetName]的海盗袭击了一支[SCOPE.sCountry('unlcky_scope').GetName]途径地中海进行贸易的商船队。船队上的财富被洗劫一空，舰艇也被抢走，许多[SCOPE.sCountry('unlcky_scope').GetAdjectiveNoFormatting]的商人因此而损失惨重。"
 joi_flavor_tur.97.f: "“将[SCOPE.sCountry('unlcky_scope').GetName]的商船强行悬挂[SCOPE.sCountry('TUR_scope').GetName]国旗送往君士坦丁堡，并用于如此目的，不仅令元帅本人，也令[SCOPE.sCountry('unlcky_scope').GetAdjectiveNoFormatting]人民深感愤慨。无论此举在短期内对我们的利益有何益处，其所受的侮辱性质如此严重，以至于在适当的时候，或许有必要重新审视此事。鉴于此，元帅希望各位不要发表任何言论或采取任何行动，以免不必要地妨碍主管当局对此事进行任何有助于维护国家荣誉的审查。”"
 joi_flavor_tur.97.a: "干得好，小伙子们！"
 joi_flavor_tur.97.b: "向[SCOPE.sCountry('TUR_scope').GetName]发去抗议！"
  #奥斯曼公共债务
 joi_flavor_tur.98.t: "穆哈雷姆法令"
 joi_flavor_tur.98.d: "[SCOPE.sCountry('TUR_scope').GetName]严重的债务问题促使高门开始向欧洲列强们发行国债。然而，资不抵债的情况却令欧洲的银行家们感到了担忧，在他们的推动下，[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]的债务问题开始摆上了各国政府的案头。"
 joi_flavor_tur.98.f: "“[SCOPE.sCountry('TUR_scope').GetName]政府，鉴于其代表在[TimeKeeper.GetCurrentDate.Format('y年 m月 d日')]会议上所作之声明，并依照其在照会中所承担之义务，以及同年之补充照会，邀请[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]公共债务各债权人选出若干名代表，尽快赴君士坦丁堡，与高门直接磋商，就[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]公共债务之公平且切实可行之整顿方案达成协议，并讨论恢复该债务利息支付及偿还本金之办法。”\n\n“帝国政府方面已成立一个特别委员会，负责与这些代表进行谈判。该委员会的审议自本年9月1日开始，并在9月、10月、11月及12月持续进行。最终，帝国专员与各代表之间达成完全一致，此项协议已由双方签署之会议记录予以确认。帝国政府据此协议为基础，将颁布条款。”"
 joi_flavor_tur.98.a: "希望这次借贷能一劳永逸的解决问题..."
 joi_flavor_tur.98.b: "看来[SCOPE.sCulture('turkish_scope').GetName]人的财政问题已经相当严重了？"
 joi_flavor_tur.98.c: "哪怕破产，我们也拒绝从外国借债！"
 joi_flavor_tur.99.t: "一笔新的公共债务？"
 joi_flavor_tur.99.d: "[SCOPE.sCountry('TUR_scope').GetName]正试图从[SCOPE.sCountry('debt_lender_scope').GetName]那里借得一笔新的#O 公共债务#!。尽管高门承诺这份债权的可靠性，但[SCOPE.sCountry('debt_lender_scope').GetAdjectiveNoFormatting]的银行家们仍然担忧破产的可能性。"
 joi_flavor_tur.99.f: "“显而易见，利率本身并不能作为储蓄或等待的回报。因为如果一个人把积蓄都以现金形式存放，即使他储蓄的金额和以前一样多，他也得不到任何利息。相反，利率的定义本身就明确地告诉我们，利率是对在特定时期内提供流动资金的回报。”\n\n“按照类似的推理，你可以否认工资是劳动的报酬，或者利润是承担风险的报酬，因为劳动有时是在没有预期或实现回报的情况下进行的，而且人们也知道承担财务风险的人最终会遭受损失而不是获得利润。”"
 joi_flavor_tur.99.a: "[SCOPE.sCountry('debt_lender_scope').GetAdjectiveNoFormatting]人真是吝啬！"
 joi_flavor_tur.99.b: "感谢[SCOPE.sCountry('debt_lender_scope').GetName]的慷慨！"
 joi_flavor_tur.99.c: "借吧借吧，我们可是慷慨的救世主！"
 joi_flavor_tur.99.e: "让他们滚去找自己的真主借钱去吧！"
 joi_flavor_tur.100.t: "[TimeKeeper.GetCurrentDate.Format('y年')]主权债务法令"
 joi_flavor_tur.100.d: "在[SCOPE.sCountry('TUR_scope').GetName]的努力下，困扰了高门多年的#O 公共债务#!问题终于得到了解决：尽管帝国政府的金库都几乎被庞大的利息所掏空，但这份威胁到[SCOPE.sCountry('TUR_scope').GetAdjectiveNoFormatting]主权独立的债务总算是在今天被高门所偿清了。"
 joi_flavor_tur.100.f: "“因此，每个人都竭尽所能地运用自己的资本来支持国内产业，并引导该产业使其产品价值最大化；每个人都必然努力使社会年度收入最大化。事实上，他通常既无意促进公共利益，也不知道自己究竟在多大程度上促进了公共利益。”\n\n“他之所以优先支持国内产业而非国外产业，仅仅是为了自身的安全；他之所以引导该产业使其产品价值最大化，仅仅是为了自身的利益。在这一点上，如同在许多其他情况下一样，他是被一只看不见的手引导着去实现一个并非他本意的目标。”\n\n“而这并非总是对社会不利。通过追求自身利益，他往往比真正有意促进社会利益时更能有效地促进社会利益。”"
 joi_flavor_tur.100.a: "黄金运出金库，主权回到皇宫！"
 joi_flavor_tur.100.b: "可喜可贺，起码我们借出去的钱完好无损——还附带利息的回来了！"
 #共和/立宪的通用事件
 joi_flavor_tur.101.t: "阿塔图尔克"
 joi_flavor_tur.101.d_1: "在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][ROOT.GetCountry.GetRuler.GetFullName]的强力改革下，[ROOT.GetCountry.GetName]业已焕然一新：一个同质化，统一的世俗民族被建立起来，#V 自由主义，世俗主义和国家主义#!价值观被认为已经成为了[ROOT.GetCountry.GetAdjectiveNoFormatting]民族的重要价值观。在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的拥护者的支持下，[ROOT.GetCountry.GetAdjectiveNoFormatting]国民议会决定授予[ROOT.GetCountry.GetRuler.GetFullName]以“#yellow 阿塔图尔克#!”的名号，意为“#yellow 国父#!”。"
 joi_flavor_tur.101.d_2: "前任[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][SCOPE.sCharacter('liberalism_leader').GetFullName]去世了，他被认为是[ROOT.GetCountry.GetName]在这个时代最重要的领袖，重新塑造了#yellow [ROOT.GetCountry.GetAdjectiveNoFormatting]#!民族：尽管这个民族仍然有着许多他希望达到，但却仍然有所缺憾的地方。作为对他最崇高的纪念，[ROOT.GetCountry.GetAdjectiveNoFormatting]国民议会决定授予[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle][SCOPE.sCharacter('liberalism_leader').GetFirstName]以“#yellow 阿塔图尔克#!”的名号，意为“#yellow 国父#!”。"
 joi_flavor_tur.101.f: "“所谓完全独立，当然是指在经济、金融、司法、军事、文化等各方面完全自由。在任何方面失去独立，都等同于国家和民族失去一切独立：我们必须将我们的正义观念、法律和制度从束缚中解放出来，尽管这些观念、法律和制度与我们这个世纪的需求不符，但它们仍然牢牢地束缚着我们。”\n\n“剥夺妇女的政治权利没有任何合乎逻辑的解释：任何对此问题的犹豫和消极态度都不过是过去逐渐消逝的社会现象罢了。妇女必须拥有投票权和被选举权；因为民主制度要求如此，因为妇女有必须捍卫的利益，也因为妇女有必须履行的社会义务。”\n\n“在他葬礼那天，我正在执行公务，为死亡的终结而痛哭流涕。今天我并不悲伤，因为15年的经历让我明白，阿塔图尔克永远不会真正死去。”"
 joi_flavor_tur.101.a: "希望[ROOT.GetCountry.GetAdjectiveNoFormatting]国家能够继承#yellow 阿塔图尔克#!的衣钵..."
 joi_flavor_tur.101.b: "#yellow 阿塔图尔克#!缔造了一个真正独立而自由的[ROOT.GetCountry.GetAdjectiveNoFormatting]。"
 joi_flavor_tur.101.c: "#yellow 阿塔图尔克#!将以这个世纪最伟大的国家缔造者之一的身份而被历史所铭记。"
 joi_flavor_tur.101.e: "他是我们国家的华盛顿。#yellow 阿塔图尔克#!将以这个世纪最伟大的国家缔造者之一的身份而被历史所铭记。"
 joi_flavor_tur.101.g: "他是我们国家的华盛顿。#yellow 阿塔图尔克#!将以这个世纪最伟大的国家缔造者之一的身份而被历史所铭记。"