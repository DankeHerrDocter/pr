 baghdad_railway:0 "巴格达铁路"
 baghdad_railway_reason:0 "[ROOT.GetCountry.GetName]的疆域横跨中东，却始终受限于#B 漫长的距离与崎岖的地形#!：尤其是在#yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!与#yellow 伊拉克#!之间，间隔着#B 安纳托利亚高原与叙利亚荒漠#!，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的命令往往需要数周甚至数月才能抵达。双边之间的运输仍然依赖着#B 古老的驿站与骆驼#!——这不仅削弱了我们的行政效率，也使高门在军事调度上更难控制当地。\n\n然而，随着#yellow 坦齐马特#!带来的现代化改革，我们新兴的#v $capitalists$#!与#v $engineers$#!提出了一项宏大的构想：铺设一条从#V [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!延伸至#V 巴格达#!，直抵#V 波斯湾#!的#B 钢铁干线#!。许多高门的官员都认为，这条铁路将毫无疑问的带来#G 贸易的增长#!与#G 工业的振兴#!，并帮助[ROOT.GetCountry.GetName]更迅速将军队调往遥远的[GetStrategicRegion('region_arabia').GetName]省份，从而遏制#R 分离主义与地方动荡#!。"
