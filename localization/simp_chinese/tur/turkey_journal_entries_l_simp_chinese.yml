 tur_tobacco_industry_reason:0 "@tobacco!#V 烟草#!自16世纪传入帝国以来，就迅速成为了[ROOT.GetCountry.GetName]城乡之间最普遍的消费品：它在清真寺庭院外的石阶上燃起，在咖啡馆的长椅上升腾，也在士兵行军途中伴随风沙而行。#B 对烟草的喜爱几乎成为了一种生活习惯#!——无论贫富贵贱，人们都在烟雾中#B 短暂的忘却平时的烦恼#!。\n\n然而，@tobacco!#V 烟草#!不应该仅仅停留在消费品的层次：随着帝国财政的日益紧张，烟草税逐渐成为最稳定且最可靠的收入来源之一。我们必须设立#V 专营制度#!、进行#B 严格管制与集中收购#!，将这一日常消费品转化为#B [concept_government]权力与财政秩序的支柱#!——乃至于[ROOT.GetCountry.GetName]信用的担保——和#V 最具利润的出口产品#!。"
