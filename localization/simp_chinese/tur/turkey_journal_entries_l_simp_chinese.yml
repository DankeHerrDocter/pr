 ottoman_conquest_complete_tt:0 "完成了7项#V 大征服者#![concept_journal_entry]"
 ottoman_conquest_status:0 "#G 重新征服[ROOT.GetCountry.GetName]在辉煌的过去曾统治的领土#!"
 ottoman_conquest_north_africa:0 "大征服者：夺回巴巴里"
 ottoman_conquest_north_africa_reason:0 "#yellow 巴巴里诸省#!曾长期在[ROOT.GetCountry.GetName]的宗主权之下，构成帝国在西地中海的重要屏障。然而，随着其他欧洲[concept_great_power]的军事干预，#V 1830年的[SCOPE.sCountry('FRA_scope').GetName]征服#!与地方自治势力的崛起，这一地区逐渐脱离了[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的控制。\n\n如果[ROOT.GetCountry.GetName]希望重建在地中海的战略地位，北非沿岸的领地就必须被重新整合：我们应该恢复我们在巴巴里的#B 合法宗主权#!，确保帝国海上贸易的畅通。"
 ottoman_conquest_morocco:0 "大征服者：解放摩洛哥"
 ottoman_conquest_morocco_reason:0 "尽管曾经向[ROOT.GetCountry.GetName]俯首称臣，但#yellow 摩洛哥#!实际上长期游离于#B 高门#!的影响力之外。随着欧洲势力的深入渗透，很明显，单凭#yellow 摩洛哥#!自己已经不再足以保卫他们的主权。\n\n出于保卫伊斯兰世界的神圣职责，#yellow 摩洛哥#!绝不应完全落入他国之手：他们必须接受[ROOT.GetCountry.GetName]的仁慈统治。"
 ottoman_conquest_hungary:0 "大征服者：征服匈牙利"
 ottoman_conquest_hungary_reason:0 "自从#V 苏莱曼大帝#!征服#B 匈牙利与特兰西瓦尼亚#!以来，#yellow 潘诺尼亚平原#!就是[ROOT.GetCountry.GetName]在欧洲的重要前线，也是多瑙河体系的核心地带。然而，随着[SCOPE.sCountry('AUS_scope').GetName]的崛起，匈牙利逐渐脱离了帝国的影响，成为了欧洲势力的桥头堡。\n\n让我们重新复现苏莱曼大帝的辉煌功绩，一举打垮邪恶的[SCOPE.sCountry('AUS_scope').GetName]，从德意志人的统治中夺回属于帝国的匈牙利吧！"
 ottoman_conquest_transylvania:0 "大征服者：收复特兰西瓦尼亚"
 ottoman_conquest_transylvania_reason:0 "自从#V 苏莱曼大帝#!征服#B 匈牙利与特兰西瓦尼亚#!以来，#yellow 特兰西瓦尼亚#!就是[ROOT.GetCountry.GetName]在欧洲的重要前线，也是多瑙河体系的主要地带。然而，随着[SCOPE.sCountry('AUS_scope').GetName]的崛起，特兰西瓦尼亚逐渐脱离了帝国的影响，成为了欧洲势力的桥头堡。\n\n很明显，如果[ROOT.GetCountry.GetName]希望恢复对巴尔干事务的主导权，这片山地地区的战略地位就不可忽视：我们必须收复这片曾经受制于[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的附庸领地。"
 ottoman_conquest_persia:0 "大征服者：保护克里米亚"
 ottoman_conquest_persia_reason:0 "位于黑海北岸的#yellow 克里米亚汗国#!在历史上曾经长期与[ROOT.GetCountry.GetName]维持着密切的附庸关系。然而，随着[SCOPE.sCountry('RUS_scope').GetName]从东欧的崛起，和帝国在#V 1768年俄土战争#!中的惨败，这片领土被北方的奸诈沙皇所夺取，成为了他们所谓黑海舰队的基地。\n\n帝国的复兴和再征服要求我们为#V 俄土战争#!的耻辱雪耻：过去的条约必须作废，[ROOT.GetCountry.GetName]将把这些可恶的#yellow 斯拉夫人#!#B 赶回他们的东欧平原！#!"
 ottoman_conquest_caucasus:0 "大征服者：平定高加索"
 ottoman_conquest_caucasus_reason:0 "高加索的民族众多，从[GetCulture('georgian').GetName]人，[GetCulture('armenian').GetName]人到[GetCulture('azerbaijani').GetName]人，他们都有一个共同点：依托于险峻的山脉和[SCOPE.sCountry('RUS_scope').GetName]的保护抗拒帝国的影响力。\n\n很明显，[SCOPE.sCountry('RUS_scope').GetName]在这里的统治是不合时宜的，[ROOT.GetCountry.GetName]应该让高加索的民族们屈膝臣服于[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的威严之下。"
 ottoman_conquest_southern_italy:0 "大征服者：征服意大利"
 ottoman_conquest_southern_italy_reason:0 "#B #italic “帝国环绕地中海一周...其征服者称之为“我们的海”。”#!#!\n\n自遥远的罗马时代以来，#yellow 意大利半岛#!和她的#yellow 地中海沿岸#!就是欧洲的中心：而在[ROOT.GetCountry.GetName]最为辉煌的时代，奥斯曼的舰队曾主宰着大半个地中海，并一度将兵锋推进到#V 奥特朗托#!，开创了#I 阿拉伯帝国#!之后第一次#I 穆斯林帝国#!重新登陆意大利的成就。\n\n雄心勃勃的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]正计划着达成曾经#yellow 征服者穆罕默德二世#!都未曾完成的成就，坐实#O 罗马皇帝#!的称号，就像#V 法提赫征服君士坦丁堡#!一样，将#yellow 罗马#!——乃至于整个意大利纳入[ROOT.GetCountry.GetName]的统治下——自不用说，这将是我们#B 最伟大的征服！#!"
 #叙利亚的行政统治
 ottoman_rebuild_syria:0 "叙利亚的省级改革"
 ottoman_rebuild_syria_reason:0 "尽管#yellow 叙利亚#!重新回到了[ROOT.GetCountry.GetName]的统治中，但#yellow 埃及#![Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')]在这里的漫长统治却给当地造成了#B 巨大的混乱#!。许多我们的行政结构被拆散，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的权威荡然无存。\n\n不过，这也给我们重新塑造#yellow 叙利亚#!的行政结构创造了一个很好的机会：这里可以成为[GetIdeology('ideology_tanzimatism').GetName]领袖们所规划的#V 全新省级结构#!的#B 绝佳实验场所#!。如果我们能够在这里积累一些关于#V 现代化行政治理#!的经验，我们就能更有效的将其推向整个[ROOT.GetCountry.GetName]。"
 ottoman_rebuild_syria_status:0 "在叙利亚建立一个牢固的省级行政结构"
 #宪政
 ottoman_constitutional_era:0 "立宪主义时代"
 ottoman_constitutional_era_reason:0 "#U 议会势力#!进度会随着[GetIdeology('ideology_constitutionalist').GetName]势力和集会权等#U 自由[concept_law]#!而提升。\n#G 宫廷权威#!进度会随着[GetIdeology('ideology_reactionary').GetName]势力和独裁制等#G 专制[concept_law]#!而提升。\n\n在[GetIdeology('ideology_constitutionalist').GetName]#v $bureaucrats$#!和#v $officers$#!的支持下，#G 青年奥斯曼党#!正试图通过武装政变控制#B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt 高门#!#!，颁布#yellow 民主宪法#!，迫使[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]成为#yellow 立宪君主#!并在[ROOT.GetCountry.GetAdjectiveNoFlag]建立责任政府。\n\n#U #B 立宪主义的风潮#!#!正迅速从首都扩散至整个[ROOT.GetCountry.GetName]：数十年的#V 坦齐马特#!改革为这个时期铺平了道路，#B 新式学校、铁路与电报#!将思想传递得比以往更快；#O 报纸与印刷品#!让政治辩论走出宫廷并进入城市的街头。即便是许多#v $aristocrats$#!家族都开始相信#U 议会与成文法律#!对于帝国前途和赢得世界尊重的帮助。\n\n对于#V 帝国政府#!而言，无论在内政还是外交方面，这都是一段#B 极其动荡的时期#!：激烈的#V 权力斗争#!和迅速的#V 权力更迭#!正在主导[ROOT.GetCountry.GetName]的政治：是#U 宪政的理想#!将成功，还是#G 宫廷独裁#!将重新回归[ROOT.GetCountry.GetName]，抑或是...会出现什么#B 出人意料的变化#!？"
