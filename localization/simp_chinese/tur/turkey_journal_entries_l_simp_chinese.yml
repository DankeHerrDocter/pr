 hejaz_railway:0 "圣城铁路"
 hejaz_railway_reason:0 "作为#G 两圣地的监护人#!，[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]治下的[ROOT.GetCountry.GetName]不仅统治着[GetStrategicRegion('region_arabia').GetName]的广阔土地，更肩负着守护#V 麦加#!与#V 麦地那#!两座#yellow 圣城#!的责任。然而，在#yellow [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]#!与#yellow 圣城#!之间距离遥远，朝觐者与官员往返其间往往需要数月之久，沿途还时常受到#R 部族袭扰#!的威胁。\n\n随着帝国行政体系的重组与财政能力的增强，许多高门#v $bureaucrats$#!与虔诚的#v $clergymen$#!们提出，应当铺设一条自#V 大马士革#!直通#V 麦地那#!的#B 铁路干线#!，以确保朝觐者安全抵达圣城，并加强[ROOT.GetCountry.GetName]对[GetStrategicRegion('region_arabia').GetName]领土的#V 直接治理#!，巩固[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]作为伊斯兰世界#V 正统哈里发的地位#!，并守护帝国的南方边疆。"
 hejaz_railway_status:0 "修建一条铁路将麦加和麦地那与耶路撒冷连接在一起"
