 ottoman_conqueror_syria:0 "收复叙利亚"
 ottoman_conqueror_syria_reason:0 "由[SCOPE.sCountry('EGY_scope').GetName]的叛徒[Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')][SCOPE.sCharacter('EGY_leader').GetFirstName]发动的1832年埃及叛乱一度攻占了距离帝国首都[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]仅咫尺之遥的#yellow 科尼亚城#!，并从[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的手中夺走了帝国对叙利亚主权的合法权利。\n\n高门再也不能坐视[SCOPE.sCountry('EGY_scope').GetName]的暴君继续统治我们的神圣领土了：无论通过什么手段，叙利亚必须回归[ROOT.GetCountry.GetName]的怀抱！"
 ottoman_conqueror_syria_status:0 "重夺在1833年被[SCOPE.sCountry('EGY_scope').GetName]窃取的#O 叙利亚#!"
 ottoman_conqueror_syria_1_button:0 "请求欧洲[concept_great_power]干涉"
 ottoman_conqueror_syria_1_button_desc:0 "叙利亚是帝国的合法领地，[SCOPE.sCountry('EGY_scope').GetName][Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')]对这里的占领是完全不合法理的。在欧洲[concept_great_power]中，支持我国行动的人士也不在少数，通过向各国政府发送照会，我们有很大的机会请求他们介入这场战争中。"
 ottoman_conqueror_syria_1_button_possible_tt:0 "尚未向欧洲[concept_great_power]发出过外交照会"
 ottoman_conqueror_syria_1_button_effect_tt:0 "我们将向所有欧洲的[concept_great_power]发出照会，请求他们支持我们的外交博弈。\n我们与对应欧洲[concept_great_power]的外交关系越好，或埃及与对应欧洲[concept_great_power]的外交关系越差，则他们选择支持我们的概率就越高。"
 ottoman_conqueror_egypy:0 "收复埃及"
 ottoman_conqueror_egypy_reason:0 "#V 1517年#!#G 冷酷者塞利姆一世#!陛下对#yellow 埃及#!的征服使[ROOT.GetCountry.GetName]从一个位于伊斯兰世界边缘的安纳托利亚与巴尔干王国，成为了一个幅员辽阔的帝国，并获得了#I 两圣地监护人#!的神圣称号。然而，#yellow 拿破仑#!从#yellow 埃及#!撤离后的混乱与穆罕默德·阿里在#V 1831年#!后的叛乱行动，[SCOPE.sCountry('EGY_scope').GetName]却几乎完全从帝国的统治中取得了独立。\n\n随着#yellow 叙利亚#!被收复，我们应当把注意力转向这片扼守了#B 地中海粮仓和红海#!的关键领地：作为[ROOT.GetCountry.GetName]的合法领地，我们不能放任[SCOPE.sCountry('EGY_scope').GetName]的篡权者继续统治这里：只有#B 通过武力#!迫使#yellow 埃及#!重新臣服在[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的脚下，帝国的主权才能得到声张。"
 #奥斯曼征服
 ottoman_conquest:0 "奥斯曼征服"
 ottoman_conquest_reason:0 "#white #B #italic “我的朋友，我帝国的臣民们！你们都清楚，我们的先辈历经无数艰苦卓绝的斗争和巨大的危险，才得以建立起我们如今拥有的这片帝国。你们当中一些年长者曾亲身参与过他们的诸多功绩——而你们中的年轻人也从父辈那里听闻过这些事迹，这些事绝不会被时间遗忘：然而，亲眼所见者的传奇，远胜于对曾经发生的史诗的耳闻。”#!#!#!\n\n[ROOT.GetCountry.GetName]#B 旧日的辉煌#!不是我们凭空获得，或者从文书和外交中而得来的：它们是帝国的祖先#V 用刀剑所征服的土地#!。从蜿蜒流经#B 潘诺尼亚#!的#yellow 多瑙河#!、延伸到#B 富饶的北非沿海#!的#yellow 阿斯特拉山#!、到#yellow 埃及尼罗河#!旁#B 郁郁葱葱的河谷#!，和#B 叙利亚#!阳光炙烤的#yellow 幼发拉底河畔#!——[ROOT.GetCountry.GetName]曾经主宰了几乎半个#O 罗马帝国#!的疆域。\n\n但时代的变化是如此剧烈：自#V 17世纪#!开始的#R 漫长衰落#!让[ROOT.GetCountry.GetName]失去了许多#B 原本属于我们的领地#!，有些是在[concept_war]中，有些是在#O 谈判桌#!上。如今，欧洲[concept_great_power]正在我们周围重新划分世界，而我们的名字却越来越少地出现在他们的文件上。\n\n#B 如果帝国已经完成了整顿，那么高门是否还要继续退让？#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]必须要让整个世界都重新认识到：至高无上的[ROOT.GetCountry.GetName]仍然存在，她手中的刀剑仍然有能力#V 主宰从欧洲到#O 世界#!的命运！#!"
