 ottoman_autocratic_rule:0 "[ROOT.GetCountry.GetRuler.GetFirstName]的开明专制"
 ottoman_autocratic_rule_reason:0 "宪法暂停之后，以[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]主导的专制宫廷已经重新掌控了[ROOT.GetCountry.GetName]的权力。信奉#yellow 伊斯兰主义#!和[GetLawType('law_autocracy').GetName]原则的[ROOT.GetCountry.GetRuler.GetFirstName]，他的执政纲领旨在通过#V 仁慈的专制统治#!削弱#B #tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt 帝国政府#!#!的权力、巩固[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的统治、维系#I 伊斯兰教#!和#O 哈里发#!的权威、镇压分离主义、并继续推动[ROOT.GetCountry.GetName]的#B 中央集权和现代化#!。\n\n[SCOPE.sCharacter('autocratic_ruler').GetFullName]的#V 开明专制议程#!：\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_1_checkbox')]拥有[GetLawType('law_autocracy').GetName]和[GetLawType('law_outlawed_dissent').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_2_checkbox')]拥有[GetLawType('law_appointed_bureaucrats').GetName]和[GetLawType('law_secret_police').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_3_checkbox')]所有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt 自由派#!或#tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt 社会主义#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_political_movement_support]#B 不高于5%#!。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_4_checkbox')]所有#tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt 自由派#!或#tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt 社会主义#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_activism]#B 不高于25%#!。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_5_checkbox')]完成了#V 巴格达铁路#!和#V 圣城铁路#![concept_journal_entry]。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_6_checkbox')]完成了#V 复兴科斯坦丁尼耶#!，#V 安纳托利亚工业化#!和#V 鲁米利亚城镇化#![concept_journal_entry]。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_8_checkbox')][concept_rank]至少为[concept_great_power]。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_9_checkbox')]#B GDP#!至少为300M。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('ottoman_autocratic_rule_10_checkbox')]拥有所有#yellow 土耳其#!和#yellow 马什里克#![concept_culture]的[concept_homeland] (#yellow 阿拉伯斯坦#!和#yellow 卡尔斯#!除外)，且最近未在[concept_war]中失败。"
