 #劫掠日志
 ottoman_corsairs:0 "地中海海盗"
 ottoman_corsairs_reason:0 "尽管一度在#B 巴巴里战争，炮轰阿尔及尔和法国占领#!的打击下消亡，但如今#R 地中海的海盗劫掠#!又开始重新恢复。来自#yellow 北非#!和#yellow 安纳托利亚#!的海盗正席卷#V 地中海#!各国的海岸进行劫掠，打劫各国[concept_trade]的商船，使得各国的[concept_trade]遭受损失。\n\n@information!如果#V $ottoman_corsairs$#!的主导国仍然持有着#V 地中海#!的某些#V 关键良港#!，他们就仍然可以#B 继续劫掠行动#!。如果他们废除了[GetLawType('law_slave_trade').GetName]，则海盗危机也将结束。"
