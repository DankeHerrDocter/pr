 caliph_and_ummah:0 "哈里发与乌玛"
 caliph_and_ummah_reason:0 "#V 民族主义#!的浪潮正在#R 撕裂我们的国家#!：[ROOT.GetCountry.GetName]必须寻找一种比血缘与语言更为深远的纽带——愿主福安之，没有什么比我们所共同信仰的#G 伊斯兰教#!更可靠的了。\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]不仅是[ROOT.GetCountry.GetName]的统治者，更是#B 真主在世上的影子，伊斯兰世界的[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]#!——这一身份并不局限于[ROOT.GetCountry.GetName]的内部，而延伸至整个#G 乌玛#!——无论身处世界上的任何地方，只要信奉[GetReligion('sunni').GetName]#G 伊斯兰教#!，便承认[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]至高无上的权威。\n\n我们必须强化#yellow 宗教教育#!、支持[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]、并恢复神圣的#yellow 沙里亚法#!在公共生活中的地位，并最终战胜所谓#O  现代性的毒瘤#!与#O 欧洲[concept_great_power]的威胁#!，重建一个#b 以信仰为核心的政治共同体#!。"
