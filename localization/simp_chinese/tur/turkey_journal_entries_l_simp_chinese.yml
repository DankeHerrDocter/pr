 great_ottomanism:0 "联合之国"
 great_ottomanism_reason:0 "在这个世纪之前，庞大的[ROOT.GetCountry.GetName]被分割成许多#B 各自为政的小社群#!：[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]统治着这些社群，但大多数地区仍然遵循着各自的[concept_law]和[concept_religion]。\n\n尽管这曾经一度推动了#B 帝国征服#!的成功，但随着具有#B 共同身份认同感#!的#V 民族国家#!概念开始在欧洲兴起，以及欧洲#O 思想#!以及欧洲[concept_great_power]日益深入[ROOT.GetCountry.GetName]的影响，内部#R [concept_national_awakening]#!日益增长的威胁正在推动#B 帝国治下领土的分裂#!。\n\n为了重新团结整个[ROOT.GetCountry.GetName]，受#V 约翰·洛克、孟德斯鸠与卢梭#!等哲学家的理论启发，受#V 美国革命#!和#V 法国大革命#!影响的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]们，希望通过倡导各#G 米利特#!之间的平等，无论[concept_religion]#o 信仰#!如何地接纳帝国境内所有不同的民族，确立#V [concept_law]面前人人平等#!的观念，让所有公民共享同样的#O 传统#!与[concept_law]，最终将帝国完全统一在一个#B 所有人都被视为#yellow [GetCulture('rumeli_turkish').GetName]人#!，并享有平等权利的联合体#!之下。"
