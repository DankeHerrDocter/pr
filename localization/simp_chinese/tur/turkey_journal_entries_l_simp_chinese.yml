 the_unruly_arabs_modifier_activated_tt:0 "#yellow 奥斯曼帝国#!的所有#B [GetStrategicRegion('region_arabia').GetName]民族运动#!将获得#tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_unruly_arabs_modifier_effects_tt $arabic_nations_wakeup_modifier$#!修正。"
 the_unruly_arabs_modifier_effects_tt:0 "[GetStaticModifier('arabic_nations_wakeup_modifier').GetName|v]\n[GetStaticModifier('arabic_nations_wakeup_modifier').GetDesc]"
 the_unruly_arabs_tur_victory_tt:0 "#O 阿拉伯#!民族主义运动将告一段落。\n#tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_unruly_arabs_modifier_effects_tt $arabic_nations_wakeup_modifier$#!修正将从所有#yellow 奥斯曼帝国#!的#B [GetStrategicRegion('region_arabia').GetName]民族运动#!中移除。"
 the_unruly_arabs_tur_start_tt:0 "[GetStrategicRegion('region_arabia').GetName]的民族主义者将开始试图争取独立：这可能通过对我们#B 治下领土的袭击#!，#B 出版阿拉伯语文学#!，甚至是#V 争取境外势力的支持#!来达成他们的目标。\n若是不能及时安抚或镇压住这些蠢蠢欲动的[GetStrategicRegion('region_arabia').GetName]人，他们将迟早有一天发动#R 武装革命！#!"
 foreign_support_arab_enable_tt:0 "#O 阿拉伯#!民族主义者将开始在#yellow 奥斯曼帝国#!治下开始各种行动以争取独立。\n我国将开始支持他们的行动，这将在#V 桀骜不驯的阿拉伯#![concept_journal_entry]中为我们解锁一系列具体的#B 支持措施#!，以帮助这些#O 阿拉伯人#!获得独立；我们也可以随时#B 终止这些支持#!。\n如果我国最终决定采取#yellow 军事干预#!，那么成功#G 获得独立的[GetStrategicRegion('region_arabia').GetName][concept_country]将可能成为我们的[concept_subject]#!。"
 foreign_support_arab_stay_tt:0 "#O 阿拉伯#!民族主义者将开始在#yellow 奥斯曼帝国#!治下开始各种行动以争取独立。\n我国将开始支持#yellow 奥斯曼帝国#!的镇压行动，这将在#V 桀骜不驯的阿拉伯#![concept_journal_entry]中为我们解锁一系列具体的#B 支持措施#!，以帮助#yellow 奥斯曼帝国#!维持在[GetStrategicRegion('region_arabia').GetName]的统治；我们也可以随时#B 终止这些支持#!。\n如果#yellow 奥斯曼帝国#!成功镇压了独立运动，#V 我们双方的关系将大大改善#!——甚至有可能从他们手中#G 获得[concept_trade_privilege]，[concept_foreign_investment_rights]，甚至[concept_treaty_port]等好处#!。"
 foreign_support_arab_rise_tt:0 "#O 阿拉伯#!民族主义者将开始在#yellow 奥斯曼帝国#!治下开始各种行动以争取独立。\n我国将支持这一行动，并开始从#yellow 奥斯曼帝国#!的统治下争取独立，或是帮助我们的其他#B 阿拉伯兄弟获得独立#!。\n如果#yellow 奥斯曼帝国#!在[GetStrategicRegion('region_arabia').GetName]的统治最终瓦解，我们就将#V 获得好处#!，甚至#G 合并其中的某些关系友好的独立兄弟国家，组成更强大的联邦#!。"
 foreign_support_arab_fall_tt:0 "#O 阿拉伯#!民族主义者将开始在#yellow 奥斯曼帝国#!治下开始各种行动以争取独立。\n我国将反对这一行动，并支持#yellow 奥斯曼帝国#!继续在[GetStrategicRegion('region_arabia').GetName]维持统治。如果#yellow 奥斯曼帝国#!成功镇压了独立运动，#V 我们双方的关系将大大改善#!，并获得他们所授予的#G #tooltippable;tooltip:[GetPlayer.GetTooltipTag],the_arab_khedive_modifier_effects_tt $the_arab_khedive_modifier$#!称号#!。"
 the_arab_khedive_modifier_effects_tt:0 "[GetStaticModifier('the_arab_khedive_modifier').GetName|v]\n[GetStaticModifier('the_arab_khedive_modifier').GetDesc]"
 foreign_support_arab_neutral_tt:0 "#O 阿拉伯#!民族主义者将开始在#yellow 奥斯曼帝国#!治下开始各种行动以争取独立。\n我国将保持一段时间的#B 中立#!，但未来仍然有机会选择在其中选择自己的立场。"
 the_unruly_arabs_tur_victory_other_tt:0 "#yellow 奥斯曼帝国#!最终在这场与阿拉伯人的较量中取得了胜利！如果我国是支持#yellow 奥斯曼帝国#!的一方，我们就将根据在其中的参与程度从他们那里#G 获得回报#!。"
 the_unruly_arabs_arb_fail_tt:0 "让我们不要停留在衰退的过去流沙里：尽管那一瞬间的魅力是那么美好。"
 the_unruly_arabs_1_button:0 "提高阿拉伯贵族的职位"
 the_unruly_arabs_1_button_desc:0 "在部族与城市精英之间，职位与体面往往比说教更有效。通过在省级行政、税务与司法体系中适度拔擢阿拉伯文化的显贵家族，我们可以把一部分最有影响力的人从街头与清真寺带回到官署与会议室——至少让他们在公开场合更愿意“维持秩序”。"
 the_unruly_arabs_2_button:0 "强化阿拉伯集权统治"
 the_unruly_arabs_2_button_desc:0 "当地方议会、宗教法院与私人的征税网络各行其是时，任何首都的命令都只是一张纸。通过把关键职能重新收拢到#v $bureaucrats$#!体系之下，高门将可以强化在沙漠中的统治。"
 the_unruly_arabs_2_button_allow_tt:0 "[concept_unruly_arabs_progress]至少为100"
 the_unruly_arabs_3_button:0 "取缔阿拉伯人社团"
 the_unruly_arabs_3_button_desc:0 "如果任由私人的阿拉伯社团与出版网络扩张，它们迟早会变成有组织的政治暴乱。帝国的警察部队必须组织起来，取缔与查封他们的活动场所，并切断其资金联络。"
 the_unruly_arabs_3_button_allow_tt:0 "[concept_unruly_arabs_progress]至少为200"
 the_unruly_arabs_4_button:0 "在阿拉伯实施军管"
 the_unruly_arabs_4_button_desc:0 "当局势进入公开对抗阶段，地方行政就已经明显不足以应对这些阿拉伯暴徒：我们将把阿拉伯的城市、铁路站、关隘与水源地都置于军方的直接管控之下，并实施宵禁与巡逻，确保当地的统治机构不受进一步的威胁。"
 the_unruly_arabs_4_button_allow_tt:0 "[concept_unruly_arabs_progress]至少为300"
 the_unruly_arabs_5_button:0 "宣扬阿拉伯语文学"
 the_unruly_arabs_5_button_desc:0 "阿拉伯民族仍然是一个初生的概念：我们应该资助报纸、学校与印刷所，鼓励以#O 阿拉伯语#!撰写诗歌、史书与政治评论——以求把分散的地方身份锻造成“民族”这一更团结的整体。"
 the_unruly_arabs_6_button:0 "袭击奥斯曼统治区"
 the_unruly_arabs_6_button_desc:0 "我们伟大的沙漠民族最擅长的就是在沙漠中打游击！通过对奥斯曼边境哨所、补给线与偏远省份的突袭，我们可以迫使这些土耳其人在广阔领土上分兵自顾，在他们的土地上制造持续的毁灭与动荡。"
 the_unruly_arabs_6_button_possible_tt:0 "最近的3个月内没有其他[GetStrategicRegion('region_arabia').GetName]国家袭击了奥斯曼统治区"
 the_unruly_arabs_7_button:0 "与境外列强沟通"
 the_unruly_arabs_7_button_desc:0 "单靠我们的力量很难在国际舞台上站稳脚跟，更不谈与强大的奥斯曼帝国对抗了——我们必须秘密的通过非正式渠道与境外[concept_great_power]建立接触，试探他们对半岛局势的底线与兴趣，并尽可能争取他们的援助与承认。"
 the_unruly_arabs_7_button_possible_2_tt:0 "该国还尚未与任意阿拉伯国家达成过协议"
 the_unruly_arabs_7_button_possible_tt:0 "在最近的1年内你或任意阿拉伯国家没有与外国[concept_great_power]沟通过"
 the_unruly_arabs_8_button:0 "与阿拉伯人沟通"
 the_unruly_arabs_8_button_desc:0 "阿拉伯半岛的局势变化令人难以预测：但对于我们来说，下注的时间或许已经到了。我们必须搞清楚：这些阿拉伯人要的是资金、武器、顾问，还是仅仅一纸承诺？"
 the_unruly_arabs_8_button_possible_1_tt:0 "我国还尚未与任意阿拉伯国家达成过协议"
 the_unruly_arabs_8_button_possible_2_tt:0 "是[GetStrategicRegion('region_arabia').GetName]地区的国家"
 accept_the_unruly_arabs_8_button_tt:0 "尚未同意过我国的支持"
 the_unruly_arabs_9_button:0 "提供军事支持"
 the_unruly_arabs_9_button_desc:0 "阿拉伯民族的这些苦行僧和游牧民们根本不具备与奥斯曼帝国作战的能力。我们将提供军火、训练、顾问与后勤联络，并在必要时协助他们建立更稳定的指挥体系。"
 the_unruly_arabs_9_button_possible_tt:0 "该国已经在#B 通信#!中与我国进行过沟通且达成了一致"
 the_unruly_arabs_10_button:0 "承诺阿拉伯国家"
 the_unruly_arabs_10_button_desc:0 "承认并不等于出兵，但它会让局势不可逆。让我们通过公开声明承认阿拉伯国家的合法性与独立性，这对我们瓦解土耳其人的事业而言可谓是无本万利。"
 the_unruly_arabs_10_button_possible_1_tt:0 "尚未公开承认过阿拉伯国家"
 the_unruly_arabs_10_button_possible_2_tt:0 "我国至少与任一阿拉伯国家通过#B 通信#!进行过沟通且达成了一致"
 great_power_unruly_arabs_10_tt:0 "最近的3个月内没有其他[concept_great_power]承诺过阿拉伯国家"
 the_unruly_arabs_11_button:0 "援助阿拉伯同胞"
 the_unruly_arabs_11_button_desc:0 "作为同宗同文的阿拉伯同胞，我们必须支持我们兄弟反抗土耳其暴政的伟大事业。让我们持续向奥斯曼治下的阿拉伯属国输送支持，提升他们进行宣传、动员与武装的能力。"
 the_unruly_arabs_12_button:0 "提供军事援助"
 the_unruly_arabs_12_button_desc:0 "尽管令人难堪，但奥斯曼帝国的军事实力实在令人无法直视。作为盟友，我们应该提供军火、训练、顾问与后勤联络，并在必要时协助他们建立更强大的指挥与军事体系。"
 the_unruly_arabs_12_button_possible_tt:0 "尚未向奥斯曼提供过军事援助"
 the_unruly_arabs_13_button:0 "支持奥斯曼主权"
 the_unruly_arabs_13_button_desc:0 "立场需要被写进外交语言里。我们将向各国递交照会，明确支持奥斯曼在阿拉伯半岛的领土主权：这对我们打垮阿拉伯人的事业而言可谓是无本万利。"
 the_unruly_arabs_14_button:0 "镇压阿拉伯主义"
 the_unruly_arabs_14_button_desc:0 "我们是奥斯曼帝国正统哈里发的臣民，而从来不是什么所谓的阿拉伯民族共同体！必须命令当地当局以审查、取缔与教育整顿的方式压制相关的民族主义宣传，优先打击组织者与传播链条。"
 the_unruly_arabs_15_button:0 "改变立场"
 the_unruly_arabs_15_button_desc:0 "在风云变幻的国际局势中，观望本身也是一种选择——而选择可以被重新修正。我们将正式调整外交立场：或由支持奥斯曼转向支持阿拉伯人，或反之。改变一次态度可能会带来代价，但也可以让我们避免把筹码押在错误的一边。"
 the_unruly_arabs_new_button:0 "撤离阿拉伯城市"
 the_unruly_arabs_new_button_desc:0 "阿拉伯人的抵抗已经对我们在阿拉伯的统治，乃至于整个帝国的稳定造成了巨大的影响，国际上反对我们镇压的舆论随之水涨船高：很明显，继续在阿拉伯城市投入力量镇压和维持统治已经是一笔不划算的买卖了。"
 the_unruly_arabs_new_button_effect_tt:0 "[concept_unruly_arabs_progress]将每月提升2，持续2年"
 the_unruly_arabs_15_button_possible_tt:0 "1年内没有改变过立场"
 the_unruly_arabs_15_button_ara_tt:0 "我们会放弃支持#yellow 奥斯曼#!的立场，转而支持#yellow 阿拉伯人#!。"
 the_unruly_arabs_15_button_tur_tt:0 "我们会放弃支持#yellow 阿拉伯人#!的立场，转而支持#yellow 奥斯曼#!。"
 the_unruly_arabs_15_button_set_tt:0 "我们将随机宣布一边我们的立场，并允许立刻改变一次立场。"
 the_unruly_arabs_tur_act_timer_tt:0 "1年内没有采取过其他行动"
 the_unruly_arabs_ara_act_timer_tt:0 "1年内没有采取过其他行动"
 the_unruly_arabs_tur_act_benifit_1_tt:0 "[concept_unruly_arabs_progress]将每月降低0.5，持续6个月"
 the_unruly_arabs_tur_act_benifit_2_tt:0 "[concept_unruly_arabs_progress]将每月降低0.5，持续12个月"
 the_unruly_arabs_tur_act_benifit_3_tt:0 "[concept_unruly_arabs_progress]将每月降低1，[concept_unruly_arabs_timer]也将#V 每年#!降低1，持续5年"
 the_unruly_arabs_ara_act_benifit_1_tt:0 "[concept_unruly_arabs_progress]将每月提升1，持续12个月"
 the_unruly_arabs_ara_act_benifit_2_tt:0 "[concept_unruly_arabs_progress]将每月提升1，持续6个月"
 the_unruly_arabs_ara_act_benifit_3_tooltip_tt:0 "该选项的谈判对象只有在拥有满足条件的国家后才会显示。\n如果[concept_great_power]同意了我们的请求，[concept_unruly_arabs_progress]就将每月提升1，持续5年"
 the_unruly_arabs_ara_act_benifit_3_tt:0 "[concept_unruly_arabs_progress]将每月提升1，持续5年"
