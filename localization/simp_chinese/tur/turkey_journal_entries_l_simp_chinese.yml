 rebuild_janissary:0 "重建禁卫军"
 rebuild_janissary_reason:0 "自#v 1826年#!#G 禁卫军#!遭到#yellow 马哈茂德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]废除以来，[ROOT.GetCountry.GetName]的#yellow 军事体系#!就在不断向欧洲模式靠拢。然而，[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的所谓“专业化”根本就没有解决#b 军队干预政治#!的问题，反而培养出一批自视为改革先锋的#v $officers$#!：这些遭受了#V 西方邪恶思想污染#!的叛徒，不再效忠于#B 受命于真主的[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#!，反而对帝国的神圣秩序指手画脚，自以为是。\n\n毫无疑问，当年#V 废除耶尼切里#!的决定压根就是错误的：我们必须纠正这个错误，让伟大的#G 禁卫军#!回归到[ROOT.GetCountry.GetName]。"
