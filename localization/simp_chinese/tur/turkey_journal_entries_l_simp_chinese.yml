 peter_the_great_of_turkey:0 "奥斯曼的彼得大帝"
 peter_the_great_of_turkey_reason:0 "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]自#V 在1808年#!成为[ROOT.GetCountry.GetName]的[Concept('concept_ruler','$RULER_TITLE_PADISAH$')]以来，已经为了挽救帝国的衰亡实施了数项改革：在#V 1826年的吉兆事件#!中他处决了叛乱的禁卫军，废除了#O 耶尼切里#!；1827年他建造了世界上最大的#O 战列舰#!#yellow 马哈茂迪耶号#!，复兴了帝国的[concept_fleet]；1830年他废除了已经失效许久的#B 蒂马尔和齐亚梅特制度#!；1834年他取缔了地方的#O 世袭德雷贝领主#!，他们曾经在帝国的几乎每个省份#B 都自封为小国王。#!\n\n然而[ROOT.GetCountry.GetRuler.GetFullName]的身体情况不容乐观：他被认为患上了#V 白色瘟疫#!。随着[SCOPE.sCountry('EGY_scope').GetName][Concept('concept_ruler','$RULER_TITLE_KHEDIVE$')]的崛起和#R 叙利亚的丢失#!，[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]决心在生命的最后几年进一步以西欧的[concept_great_power]为模板改革[ROOT.GetCountry.GetName]落后的政治和军事系统。这需要我们积极的采取政治措施，并结交西欧的[concept_great_power]们，以便从他们身上获得更多支持。\n\n[ROOT.GetCountry.GetRuler.GetFirstName]#yellow 的改革议程：#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_1_checkbox')]拥有[GetLawType('law_appointed_bureaucrats').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_2_checkbox')]是[SCOPE.sGoods('tobacco_scope').GetName]的#O 首要生产国#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_3_checkbox')][concept_army]#O 规模#!#B 至少200#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_4_checkbox')][concept_fleet]#O 规模#!#B 至少50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_5_checkbox')]拥有[GetLawType('law_professional_army').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_6_checkbox')]与[SCOPE.sCountry('GBR_scope').GetName]的[concept_relations]#G 至少为50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_7_checkbox')]与[SCOPE.sCountry('FRA_scope').GetName]的[concept_relations]#G 至少为50#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_peter_the_great_of_turkey_8_checkbox')]成功从[SCOPE.sCountry('GBR_scope').GetName]，[SCOPE.sCountry('FRA_scope').GetName]或[SCOPE.sCountry('RUS_scope').GetName]获得了[concept_military_assistance]\n\n如果我们能在[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]驾崩前完成尽可能多的改革议程，[ROOT.GetCountry.GetHeir.GetFirstName][Concept('concept_heir','$RULER_TITLE_SEHZADE$')]继位时高门的权威就越大，而改革的阻力也就越小。"
 peter_the_great_of_turkey_status:0 "#B 继续[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的宏大改革#!"
 peter_the_great_of_turkey_complete_tt:0 "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经驾崩"
 edict_of_gulhane_event_1_tt:0 "他被认为是堪比彼得大帝之雄才伟略的大改革家，为帝国注入新的呼吸。"
 edict_of_gulhane_event_2_tt:0 "他被认为是一位充满矛盾的改革家，挥刀向腐朽冲锋，其意志无人能及。"
 edict_of_gulhane_event_3_tt:0 "他被认为是旧制度的掘墓人，新时代的奠基者；他的名字横跨衰落与复兴。"
 edict_of_gulhane_event_4_tt:0 "他被认为是一位反叛的苏丹，试图拯救自己的帝国，然真主却并未允其功成。"
 peter_the_great_of_turkey_button:0 "聘请不列颠专家会诊"
 peter_the_great_of_turkey_button_desc:0 "根据我们宫廷中最杰出医师的诊断，按照西方的说法，帕迪沙患上的症状是肺结核——我们对此无药可医，但从技术最先进的#yellow 大不列颠#!那里，我们或许可以花费一笔钱聘请皇家医学会的顶尖学者们至少改善一下帕迪沙的病情。"
 peter_the_great_of_turkey_button_possible_tt:0 "帕迪沙的病情已经显著恶化（进度条至少为15）"
 peter_the_great_of_turkey_button_effect_tt:0 "我们将与英国方面沟通，邀请皇家医学会的专家前来托普卡帕为帕迪沙会诊。\n这将被预计有效延缓帕迪沙的病情，但不可能根治其症状。"
 #坦齐马特
 tanzimat_main:0 "坦齐马特改革"
 tanzimat_main_reason:0 "尽管我们在那个曾经属于[ROOT.GetCountry.GetName]的#G 古典时代#!创造了许多辉煌，但自从#V 18世纪的#yellow 郁金香时代#!#!结束以来，[ROOT.GetCountry.GetName]就陷入了一段混乱时期：#B 帝国的疆域不断缩小，实力与欧洲[concept_great_power]相比也日渐式微#!。随着新技术和思想在欧洲的传播，帝国与欧洲[concept_great_power]们的差距正在变得越来越大。尽管#yellow 马哈茂德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]已经试图针对帝国的衰落进行了众多的改革，但这些措施相比日新月异的欧洲相比却仍然#B 显得不足#!。\n\n如果想要扭转帝国缓慢衰落的局面，我们就必须对政府的各项职能进行#V 彻底的改革#!：#O 立法职能#!、#O 贸易政策#!、[concept_law]#O 体系#!的#B 世俗化和法典化#!、对[GetLawType('law_slave_trade').GetName]的打击、#O 教育、财产法、执法和军事#!等机构，有的需要被彻底重组，有的则需要#B 高门从零开始建立#!。\n\n通过建立新的制度，将良好行政管理的益处带给[ROOT.GetCountry.GetName]的各个#O 省份#!，[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFirstName]#yellow 帕夏#!认为，帝国将能够建立一个更加#G 中央集权与现代化#!的[concept_government]，提升[ROOT.GetCountry.GetAdjectiveNoFlag]统治的[concept_legitimacy]，#V 在[concept_great_power]之间重振她的威严，乃至于——恢复其往日的荣耀#!。"
 tanzimat_main_possible_tt:0 "#yellow 马哈茂德二世#!帕迪沙已经驾崩，花厅御诏被颁布。"
 tanzimat_main_status:0 "#U #B 完成[ROOT.GetCountry.GetName]的现代化与复兴#!#!"
 tanzimat_main_complete_tt:0 "完成了7项#V 坦齐马特#![concept_journal_entry]"
 tanzimat_main_1_button:0 "颁布帝国改革诏书"
 tanzimat_main_1_button_desc:0 "到目前的为止的改革措施并不足以应对帝国当前的需求。帕迪沙必须签署法令，根据[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetLeader.GetFullName]的改革草案，进一步推动帝国的宗教平等以取信于基督教的强国们，并缓解我们国家内部的矛盾。"
 tanzimat_main_1_button_possible_tt:0 "至少已经完成了3项#V 坦齐马特#![concept_journal_entry]"
 tanzimat_main_1_button_visible_tt:0 "尚未颁布过改革诏书"
 tanzimat_main_advance:0 "推进#V 坦齐马特#!进度条1"
 tanzimat_religious_modernization:0 "坦齐马特：信仰自由"
 tanzimat_religious_modernization_reason:0 "基于#I 沙里亚法#!的[concept_law]已经过时了：随着#yellow 民族主义#!思想的兴起，帝国内非[GetReligion('sunni').GetName][concept_pop]的不满——尤其是来自于巴尔干#O 基督徒#!的不满正在瓦解[ROOT.GetCountry.GetAdjectiveNoFlag]统治的[concept_legitimacy]。\n\n如果想要重建一个团结的[ROOT.GetCountry.GetAdjectiveNoFlag]国家，基于[concept_religion][concept_discrimination]的特权与不平等待遇就必须被废除。我们还需要从[concept_law]和[concept_government]中塑造出对#B 正义和平等#!的全新理解，消除#O 米利特#!和[concept_religion]的群体矛盾，明确公民身份的概念及其所衍生的权利——并将[ROOT.GetCountry.GetAdjectiveNoFlag]的#V 公民身份#!，以及#B 对[ROOT.GetCountry.GetName]的忠诚置于首要位置——而非某个特殊社群的特殊认同#!。"
 tanzimat_fiscal_modernization:0 "坦齐马特：财政现代化"
 tanzimat_fiscal_modernization_reason:0 "[ROOT.GetCountry.GetName]的[concept_taxes]体系已经古老而过时：它依靠地方的#V 伊尔提扎姆#!#v $aristocrats$#!们代为征税，严重削弱了高门所能支配的税收。这种制度还加剧了帝国政府的内部腐败，并迫使#v $farmers$#!们承担了沉重的税负。\n\n如果[ROOT.GetCountry.GetName]还想要与欧洲[concept_great_power]同席竞争，高门就必须拥有一个足够调度全国[concept_money]的#v $bureaucrats$#!机构：我们应该效法欧洲的强国们，设立#B 独立的财政部和审计部门#!，引入#B 新式会计制度#!，并#B 统一全国各地复杂繁琐的税种与税率#!，以便高门建立#V 真正的长期预算#!。"
 tanzimat_centralisation:0 "坦齐马特：中央集权"
 tanzimat_centralisation_reason:0 "尽管许多在地方上作威作福的#O 德雷贝领主#!已经#V 1820年#!被消灭殆尽，但高门在[ROOT.GetCountry.GetAdjectiveNoFlag]各省的权威仍然处于#b 相当不稳固的状态#!。在#V 1815年的第二次塞尔维亚叛乱#!和#V 1828年的希腊叛乱#!后，[ROOT.GetCountry.GetName]已经失去了统治了数百年的#O 伯罗奔尼撒半岛#!和#O 北塞尔维亚#!，这进一步动摇了[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的权威。\n\n我们绝不能坐视#R 分离主义叛军#!和#R 地方自治#!分裂帝国：古老的统治体系已经不能满足这个时代的需求，我们必须进行#B 彻底的重新组织#!，建立#V 现代化的$bureaucrats$系统#!，让部门制取代御前会议，省级治理取代私人性质的[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]，并明确它们的职责范围，以便更好地服务于[ROOT.GetCountry.GetAdjectiveNoFlag][concept_country]的各个省份。"
 tanzimat_centralisation_goal:0 "以下条件必须满足5年："
 tanzimat_centralisation_complete_tt:0 "完成了#V 财政现代化#![concept_journal_entry]"
 tanzimat_centralisation_complete_2_tt:0 "完成了#V 叙利亚的省级改革#![concept_journal_entry]"
 tanzimat_military_modernization:0 "坦齐马特：军队改革"
 tanzimat_military_modernization_reason:0 "传统的[ROOT.GetCountry.GetAdjectiveNoFlag][GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]——#O 耶尼切里军#!——在军事威望方面已经衰落，并在#v 1826年的吉兆事件#!中被#yellow 马哈茂德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]所废除，并以现行的#O 曼苏尔军#!取代之。然而，面对欧洲[concept_great_power]的军事威胁，这支军队仍然远远不足以保卫我们的主权。\n\n我们必须建立一支以纪律和操练为基础的军队，聘请来自欧洲的优秀#v $officers$#!，并以欧洲的操练和战术训练新兵。我们还需要设立专门的机构研究#O 军事#![concept_technology]和#o 战术#!，建立#B 统一的指挥，后勤和调度部门#!——毫无疑问，这将是#V 一项艰巨的长期任务#!。"
 tanzimat_reform_education:0 "坦齐马特：教育世俗化"
 tanzimat_reform_education_reason:0 "在[ROOT.GetCountry.GetName]，只有极少数人有#v 基本的读写能力#!：如果我们的改革必须进行下去，那么#b 对[ROOT.GetCountry.GetAdjectiveNoFlag]人民的公共生活进行彻底的重建#!就是有必要的。\n\n我们需要#b 规范和现代化帝国的教育体系#!，建立自己的#v 国家学校#!，并鼓励我们的公民入学，普及针对儿童和少年的#yellow 初级教育#!；还要成立属于[ROOT.GetCountry.GetAdjectiveNoFlag]自己的#yellow 高等院校#!，培育属于[ROOT.GetCountry.GetAdjectiveNoFlag]自己的学术和神学#v $academics$#!。"
 tanzimat_reform_education_goal:0 "将我国的[concept_literacy]提升了20%"
 tanzimat_economic_modernization:0 "坦齐马特：城镇化"
 tanzimat_economic_modernization_reason:0 "在这个时代，#V 工业和城镇#!才是让[concept_country]强大和繁荣的根源：然而，在欧洲各国进展迅猛的推进工业化的同时，[ROOT.GetCountry.GetName]却受限于许多制度和结构性因素而难以追赶他们的脚步。\n\n[ROOT.GetCountry.GetName]需要统一#B 关税与商业法#!，引进欧洲式的[concept_company]#O 制度#!和#O 经济调控#!，#B 立法保护私有财产#!，鼓励#B 新兴的投资者#!，确保本土手工业和生产者得到#V 足够的保护#!，推进[ROOT.GetCountry.GetAdjectiveNoFlag]的#V [concept_market]繁荣#!，以解决我们经济不发达的问题，并#B 走上工业化的道路#!。"
 tanzimat_economic_modernization_state_tt:0 "是[concept_incorporated_state]"
 tanzimat_build_railways:0 "坦齐马特：铺设铁路"
 tanzimat_build_railways_reason:0 "[ROOT.GetCountry.GetName]的疆域极为广泛，地理条件又#B 复杂而多元#!，这为高门的治理和沟通都创造了#V 巨大的困难#!。在[ROOT.GetCountry.GetAdjectiveNoFlag]许多遥远的[concept_state_region]，受限于#B 艰巨的距离和山脉的阻隔#!，[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的命令根本无法有效被传达和执行。\n\n然而，#O 铁路#![concept_technology]的发明为我们创造了机遇：如果我们能为帝国各地都铺设上运转良好的#O 铁路#!，那么#B 无论是#V 行政治理#!还是#V 军事调度#!都将不再是问题#!。"
 failed_sick_man_main_tt:0 "未能完成#V 坦齐马特改革#!或#V 坦齐马特：中央集权#![concept_journal_entry]"
 #帝国兵工厂
 ottoman_imperial_arsenal:0 "加拉塔帝国军械库"
 ottoman_imperial_arsenal_reason:0 "位于#O 加拉塔和托普哈内#!的#yellow 帝国军械库#!由#B #G 征服者穆罕默德二世#!#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]建造，多年来一直用于铸造大炮。[ROOT.GetCountry.GetName]的炮兵技术便是从这里开始发展，并为[ROOT.GetCountry.GetAdjectiveNoFlag]的崛起创下了巨大的功劳。随着历代[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下的扩建，其产能不断扩大，并长期保持着帝国#B 最重要的军事工业机构#!的地位。\n\n然而，自#V 17世纪#!起，面对欧洲#O 炮兵#!的挑战，[ROOT.GetCountry.GetName]的#O 军事#![concept_technology]却开始停滞不前：这也导致了#yellow 帝国军械库#!的衰落。许多设备陈旧且效率低下，导致帝国国内的供应在满足[ROOT.GetCountry.GetName]的军事装备需求方面面临着相当大的困难，以至于许多#V 关键的军事物资都依赖进口#!。\n\n如果我们想要恢复#G 帝国军队#!的辉煌，最重要的任务便是复兴我们过去曾经拥有的#B 技术优势和精湛技艺#!——而这些都应该从复兴这座古老的#yellow 帝国军械库#!开始。"
 ottoman_imperial_arsenal_usa_reform_button:0 "聘请美国造船工程师"
 ottoman_imperial_arsenal_usa_reform_button_desc:0 "来自新大陆的造船专家带来了前所未见的理念——钢铁包裹，螺旋桨与蒸汽机：这些都令帝国海军的官员们肃然起敬。如果托普哈内与帝国造船厂能得到他们的帮助，金角湾的造船厂将可以重振过去的产量。"
 ottoman_imperial_arsenal_fra_reform_button:0 "聘请法国火炮工程师"
 ottoman_imperial_arsenal_fra_reform_button_desc:0 "法国的炮兵学校与兵工厂长期被视为欧洲军事工业的典范。我们与法国在过去也曾达成过多项合作，通过法国的支持，我们和火炮生产工业将可以追赶上西方标准。"
 ottoman_imperial_arsenal_gbr_reform_button:0 "聘请英国机械工程师"
 ottoman_imperial_arsenal_gbr_reform_button_desc:0 "我们的机械工具和铸造机床老旧不堪，古老的管理系统也无法支持我们继续扩张帝国军械库。通过引进英国标准，管理方式与机械技术，加拉塔将重获新生。"
 #穆赫塔尔
 muhtar_system:0 "穆赫塔尔制度"
 muhtar_system_reason:0 "#V 穆赫塔尔#!，意为#B “被选中的人”#!，是由#yellow 马哈茂德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]在取缔#I 蒂玛尔采邑#!和#I 德雷贝体系#!后建立的地方行政制度。它意味着由[ROOT.GetCountry.GetName]最基层的#G 村庄#!级行政单位中所自行选举出的#V 本地负责人#!。\n\n在这一制度推行之前，高门对地方的治理依赖于本地[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]和[GetInterestGroupVariant('ig_landowners',GetPlayer).GetName]们，严重降低了[concept_government]征税和征兵的效率。#yellow 马哈茂德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]授予这些由当地人民推举出的本地长老们以帝国官员的身份，从而帮助高门摆脱了对#v $aristocrats$#!与#v $clergymen$#!们的依赖。\n\n然而，作为一种新生的体系，#tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_1_effect_tt $muhtar_system_old_modifier$#!仍然十分脆弱，且常常不能如[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]期望的那样发挥更强大的作用：如果我们能够在经济层面强化[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]对治下[concept_state]的影响力，#tooltippable;tooltip:[GetPlayer.GetTooltipTag],muhtar_system_modifier_2_effect_tt $muhtar_system_new_modifier$#!将很可能在[ROOT.GetCountry.GetName]的行政体系中发挥出更大的作用。"
 muhtar_system_status:0 "#B 地方推举的穆赫塔尔在帝国的各省管辖村庄#!"
