 the_unruly_arabs_reason:0 "在整个[GetStrategicRegion('region_arabia').GetName]#yellow 半岛#!，曾经依靠部族结构与宗教权威维系的平衡正受到#L #R 民族主义#!#!认同观念的冲击。随着#O 阿拉伯语#!语言、文学与外来意识形态的传播，反对[GetCulture('turkish').GetName]统治的思想正在[SCOPE.sCountry('TUR_scope').GetName]治下的沙漠中悄然成形。\n\n在海外接受了西方教育的[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]，以及本地痛恨奥斯曼统治的[GetInterestGroupVariant('ig_devout',GetPlayer).GetName]们，正在同样敌视[SCOPE.sCountry('TUR_scope').GetName]的其他#O 境外[concept_great_power]#!的帮助下，联合起来鼓动[GetCulture('bedouin').GetName]民众用武力推翻[GetCulture('turkish').GetName]政权在[GetStrategicRegion('region_arabia').GetName]的统治：\n\n尽管事态对于#tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt 高门#!而言尚未彻底失控，但潜在的#B 分离倾向和外交危机#!已不容忽视：这片长期处于帝国秩序之下的土地正面临着#V 前所未有的躁动#!，沙漠的未来会走向何方？\n\n@information!在#V $the_unruly_arabs$#!进行期间，[GetStrategicRegion('region_arabia').GetName]的国家将采取行动以求反抗[SCOPE.sCountry('TUR_scope').GetName]的统治，更可能要求独立，并寻求其他[concept_great_power]的支持。"
