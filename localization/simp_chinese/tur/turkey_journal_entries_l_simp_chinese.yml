 #共和/立宪的改革日志
 liberalism_of_turkey:0 "土耳其的世俗主义"
 liberalism_of_turkey_reason:0 "在[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的带领下，[ROOT.GetCountry.GetName]正在进行一系列影响深远的#B 政治，社会，文化和宗教改革#!，以期通过这些#V 世俗化与民主化#!的改革措施推进[ROOT.GetCountry.GetAdjectiveNoFlag]的#B #blue 自由主义#!#!进程。\n\n[ROOT.GetCountry.GetRuler.GetFirstName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]希望在我们的社会中强化[concept_government]#B 对私有经济的监管，禁止宗教干预政府事务，并强调法治、人民主权和公民美德的精神#!，最终将这些理念塑造为一个#B 世俗的，民主的，独立的，强大的，自由的#![ROOT.GetCountry.GetAdjectiveNoFlag]#yellow 国家#!的#V 关键价值观#!。\n\n[ROOT.GetCountry.GetRuler.GetFirstName]#yellow 的世俗主义议程：#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_1_checkbox')]拥有[GetLawType('law_universal_suffrage').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_2_checkbox')]拥有[GetLawType('law_womens_suffrage').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_3_checkbox')]拥有[GetLawType('law_presidential_republic').GetName]或[GetLawType('law_parliamentary_republic').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_4_checkbox')]拥有[GetLawType('law_right_to_associate').GetName]和[GetLawType('law_public_schools').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_5_checkbox')]拥有[GetLawType('law_protected_speech').GetName][concept_law]。\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_6_checkbox')]拥有[GetLawType('law_interventionism').GetName]和[GetLawType('law_total_separation').GetName][concept_law]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_7_checkbox')][GetInterestGroupVariant('ig_devout',GetPlayer).GetName]不[concept_powerful]，且不在[concept_in_government]\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_8_checkbox')]所有#B #L 文化多数派#!#!或#B #L 文化少数派#!#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_activism]#B 都低于50%#!\n•[SCOPE.GetRootScope.GetCountry.GetCustom('joi_liberalism_of_turkey_9_checkbox')]所有#B #L 宗教多数派#!#!或#B #L 宗教少数派#!#![Concept('concept_political_movement','$concept_political_movements$')]的[concept_activism]#B 都低于25%#!""
