 hejaz_railway_1_button_desc:0 "圣城铁路的建设当然不仅仅是一个帝国内部的问题：这条铁路将会惠及到每一个虔诚的朝觐者。如果伊斯兰国家们还对真主保持着虔诚，对哈里发保持着尊重，那么他们就应该为此出力。"
