 tur_sublime_porte_1_button:0 "召开高门会议"
 tur_sublime_porte_1_button_desc:0 "高门御前会议是帕迪沙向高门施加影响和统治帝国的很好场所。帕迪沙应该召集高门的官员们前往托普卡帕宫，并听取他们的意见。"
 tur_sublime_porte_1_button_effect_tt:0 "帕迪沙将召开高门会议并决定接下来几年的侧重政策。\n根据会议的侧重，[concept_sublime_court_dissatisfaction]有可能会提升，但[concept_sublime_porte_authority]也将提升。"
 tur_sublime_porte_2_button:0 "罢免大维齐尔"
 tur_sublime_porte_2_button_desc:0 "虽然大维齐尔贵为帝国的首相，但帕迪沙才真正拥有着任免大维齐尔的至高权力。如果现任大维齐尔被帕迪沙认为是不适任的话，那么结果肯定是显而易见的..."
 tur_sublime_porte_2_button_effect_tt:0 "帕迪沙将发布诏令罢免现任大维齐尔，并挑选一名更可能被需要的人物接任。\n根据新任大维齐尔的选择，[concept_sublime_porte_authority]有可能会提升。"
 tur_sublime_porte_3_button:0 "册封新继承人"
 tur_sublime_porte_3_button_desc:0 "作为奥斯曼后宫的主人，帕迪沙自然拥有着许多优秀的继承人，而其中一些则展现了作为统治者的潜力。让我们至少从名义上确定下下一任帕迪沙的人选吧。"
 tur_sublime_porte_3_button_effect_tt:0 "帕迪沙将召集所有臣民，册封一位新的皇子作为我们的继承人。"
 tur_sublime_porte_3_button_possible_tt:0 "继承人没有[GetCharacterTrait('special_prince_governor').GetName][concept_character_trait]"
 tur_sublime_porte_4_button:0 "任命持剑帕夏"
 tur_sublime_porte_4_button_desc:0 "持剑帕夏是帝国军队的最高指挥官，而他的任免权自然也属于帕迪沙陛下。帕迪沙需要一名忠诚可靠的帕夏：而现任的这位似乎并不符合这个标准？"
 tur_sublime_porte_4_button_effect_tt:0 "帕迪沙将罢免现任[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName]的持剑帕夏，并寻找新人替代他。\n根据新任帕夏的选择，[concept_sublime_court_dissatisfaction]有可能会降低。"
 tur_sublime_porte_5_button:0 "号召发动圣战"
 tur_sublime_porte_5_button_desc:0 "帝国是伊斯兰世界无可置疑的领袖，帕迪沙陛下则是整个伊斯兰世界的正统哈里发。作为加齐圣战士，没有穆斯林可以逃避与异教徒作战的神圣义务：让我们号召伊斯兰世界的各国参加到这场伟大的吉哈德中吧！"
 tur_sublime_porte_5_button_effect_tt:0 "帕迪沙以哈里发的身份将向整个伊斯兰世界发布圣战诏书，动员全体穆斯林与异教徒敌人开战。"
 tur_sublime_porte_6_button:0 "发布宫廷赏赐"
 tur_sublime_porte_6_button_desc:0 "叛乱的阴影正在高门中弥漫：帕迪沙应该采取措施，至少拉拢或确保一些臣子的忠诚。"
 tur_sublime_porte_6_button_effect_tt:0 "帕迪沙将挑选一个利益集团并给予他们中的高层人物财物赏赐和爵位封赏。\n这将有助于降低[concept_sublime_court_dissatisfaction]。"
