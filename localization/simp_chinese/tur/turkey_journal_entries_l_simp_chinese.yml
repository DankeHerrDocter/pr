 event_tur_65_a_tt:0 "我国[concept_ruler]的第一头衔将改变为[Concept('concept_ruler','$RULER_TITLE_CALIPH$')]，[concept_heir]则改变为[Concept('concept_ruler','$RULER_TITLE_SHARIF$')]。\n我们将向世界上所有[GetReligion('sunni').GetName]国家发送世界伊斯兰大会的邀请函，同意参会的国家将成为我们国家集团的成员；关系更好的国家有可能向我国宣誓效忠，从而成为附属国。"
 rebuild_muslism_slavery:0 "复兴伊斯兰奴隶贸易"
 rebuild_muslism_slavery_reason:0 "[ROOT.GetCountry.GetName]的衰弱本质上是因为我们放弃了#B 祖先所遵循的神圣秩序#!：世界是一座花园，浇灌它的是[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，即权威；守护这一权威的是伊斯兰教法，伊斯兰教法也是维系国家的政策：而[GetLawType('law_slave_trade').GetName]则是#V 教法所认可的神圣制度#!。\n\n过去我们在欧洲[concept_great_power]的压迫下废除了[GetLawType('law_slave_trade').GetName]，这导致我们违反了神圣的[concept_law]，#B 失去了真主的宠爱#!：[ROOT.GetCountry.GetName]理应恢复这一#V 古老正统的[concept_law]#!，让帝国才能#B 再次得到真主的庇护#!。"
