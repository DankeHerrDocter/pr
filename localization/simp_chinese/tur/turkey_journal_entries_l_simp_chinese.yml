 istanbul_industrialize:0 "复兴科斯坦丁尼耶"
 istanbul_industrialize_reason:0 "#B #italic “如果世界是一个国家的话，君士坦丁堡必定是它的首都。”#!#!\n\n自#G 征服者穆罕默德二世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]攻陷#yellow 君士坦丁堡#!以来，#G 科斯坦丁尼耶#!就是[ROOT.GetCountry.GetName]的[concept_capital_state]与欧亚贸易的枢纽。然而随着#B 人口增长与工业化#!的到来，#B 狭窄的街巷、拥挤的码头与老旧的市政设施#!，阻碍城市向外扩张的#B 城墙与旧城区#!，这些都导致#G 科斯坦丁尼耶#!已经无法满足作为[ROOT.GetCountry.GetName]#V 首善之都#!的需求。\n\n我们必须对#G 科斯坦丁尼耶#!展开一次全面的重建与扩张：我们将拓宽#V 港口与船坞设施#!，规划现代化的#V 工业区与排污设施#!，修建#V 铁路与高效的城市街区#!，并以#V 宽阔的林荫大道与整洁的公共广场#!重塑城市的面貌，并推动#G 科斯坦丁尼耶#!重新成为那座#B 地中海的明珠，众城之女皇，以及欧洲最富盛名，最被渴望的伟大都会#!。"
