 armenian_massacre_issue_reason:0 "居住在[ROOT.GetCountry.GetName]各地的[GetCulture('armenian').GetName]人长期以来就饱受[GetCulture('turkish').GetName]人的敌视：而随着前段时间爆发的[GetCulture('armenian').GetName]动乱之后，这种情绪正在目前弥漫在#B 帝国境内的紧张局势#!中愈演愈烈。\n\n不仅仅是两个民族之间在民间的敌对，在#V 帝国政府#!内部，以[GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetLeader.GetFirstName]#yellow 帕夏#!为首的一群高级官员正在四处鼓动#R 反亚美尼亚情绪#!并试图集结军队，游说#G #L 高门#!#!的其他成员促成一场#V 规模巨大的种族灭绝#!——如果我们不#B 及时采取行动#!的话，这种情况几乎是#B 注定将要发生的#!。"
