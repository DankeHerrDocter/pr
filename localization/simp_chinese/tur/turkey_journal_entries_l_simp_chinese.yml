 #奥斯曼高门
 tur_sublime_porte:0 "崇高之门"
 tur_sublime_porte_reason:0 "#B #G 奥斯曼帝国[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]，伊斯兰的哈里发，真主在世上的影子，圣地监护，两海与两陆的皇帝，突厥与伊斯兰的苏丹，罗马凯撒，至高无上的[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]陛下#V 是现任君主#!。#!#!\n\n作为#V 帝国政府#!最为知名的称号，#tooltippable;tooltip:[GetPlayer.GetTooltipTag],tur_sublime_porte_modifier_effects_tt 奥斯曼高门#!本来代表着通往#B 托普卡帕宫#!最外庭院的大门：这个名称源于古代君主在宫殿大门宣布官方决定和判决的习俗，自#V 奥尔汗一世#![ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]起[ROOT.GetCountry.GetName]也沿用了这一做法。不过在18世纪，在#B 托普卡帕宫西侧的阿莱姆达尔大街#!兴建了一座宏伟的宫殿，成为了#yellow 大维齐尔#!和众多政府部门的所在地，并从此取代了皇宫的庭院而被称为#G #B “崇高之门”#!#!。\n\n随着#B 时代变迁与行政事务的日益繁重#!，#G #B 高门#!#!逐渐演变为一套#V 完备而复杂的官僚体系#!：帝国政府的#v $bureaucrats$#!与#v $aristocrats$#!在此协调#O 财政、军务与立法#!，将[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的意志转化为具体的[concept_law]与[concept_decree]。它不仅吸纳了帝国最杰出的文官与顾问，也在无数次内外危机中#B 维系着国家机器的运转#!，使[ROOT.GetCountry.GetName]得以在广袤疆域之上#B 保持统一与秩序#!。\n\n然而，#G #B 高门#!#!往往也意味着宫廷中的阴谋，斗争与背叛：如果[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]不能对高门宣示他#V 至高无上的权威#!和#V 强力的铁腕#!，来自宫廷和[SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]的阴谋或许就随时有可能将他从[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的宝座上掀翻。"
