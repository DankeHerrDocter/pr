 status_ottoman_corsairs_banned:0 "地中海海盗已经在美国巴巴里战争，英国炮轰阿尔及尔和法国占领的打击下消亡"
 event_tur_93_a_tt:0 "我们将被允许通过#V $ottoman_corsairs$#![concept_journal_entry]对地中海沿岸的省份进行劫掠，抢夺它们的人口和金钱，但这也将给我们带来恶名。\n劫掠期间，海盗们将随机劫掠外国经过地中海的商船，给我国带来金钱，并损害对方的贸易。\n如果我国废除了[GetLawType('law_slave_trade').GetName]，或丧失了某些关键海盗港口，则海盗行动将不得不结束。"
 event_tur_93_b_tt:0 "当[SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting]海盗们处于#V 劫掠期#!的时候，它们将可能劫掠任何处在地中海沿岸的省份，给这些省份带来损失。\n海盗们还可能劫掠我国经过地中海的商船，使得我国的贸易遭受损失。\n如果想要结束海盗们的劫掠，我们必须迫使[SCOPE.sCountry('corsairs_scope').GetName]废除[GetLawType('law_slave_trade').GetName]，或占领[SCOPE.sCountry('corsairs_scope').GetAdjectiveNoFormatting]的特定关键海盗港口。"
