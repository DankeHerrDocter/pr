 ottoman_conqueror_greek:0 "收复希腊"
 ottoman_conqueror_greek_reason:0 "#V 1827年#!的[GetCulture('greek').GetName]叛乱在[SCOPE.sCountry('GBR_scope').GetName]，[SCOPE.sCountry('FRA_scope').GetName]和[SCOPE.sCountry('RUS_scope').GetName]的军事干预下取得了成功，迫使我们在#V 1830年的《伦敦议定书》#!中承认了[SCOPE.sCountry('GRE_scope').GetName]的独立，导致[ROOT.GetCountry.GetName]从此失去了统治长达数百年的#O 伯罗奔尼撒与南希腊#!省份。\n\n如果[ROOT.GetCountry.GetName]想要恢复帝国在巴尔干和欧洲的威望，[SCOPE.sCountry('GRE_scope').GetName]的叛徒们就必须被摧毁：只有[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]的刀剑才能让[GetCulture('greek').GetName]人认识到自身的地位！"
 ottoman_conqueror_greek_fail_tt:0 "未能完成#V 坦齐马特改革#!或#V 坦齐马特：中央集权#![concept_journal_entry]"
 ottoman_conqueror_greek_on_complete_1_tt:0 "所有#yellow 希腊省份#!将重新成为[concept_incorporated_state]。\n如果#yellow 伊奥尼亚群岛#!被外国所控制，我们就将与控制者谈判，使其归还该岛给我国。"
